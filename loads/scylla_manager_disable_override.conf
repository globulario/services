# Ad-hoc disable installed by operator (loads/scylla_manager_disable_decision.md).
# scylla-manager has a startup bug: it recreates null healthcheck rows in
# scylla_manager.scheduler_task and crashes on JSON parse. Until root cause is
# fixed (see loads/scylla_manager_null_healthcheck_tasks_root_cause.md),
# this drop-in neutralizes the unit so the controller's install workflow can
# successfully "start" it without producing the restart loop.
#
# Strategy: replace ExecStart with a long-running placeholder so systemd
# reports active/running and the install workflow's "wait until is-active"
# check succeeds. The scylla-manager binary is never invoked.
[Service]
Restart=no
RestartSec=0
ExecStartPre=
ExecStartPre=/bin/true
ExecStart=
ExecStart=/bin/sleep infinity
