apiVersion: workflow.globular.io/v1alpha1
kind: WorkflowDefinition
metadata:
  name: day0.bootstrap
  displayName: Cluster Day-0 bootstrap
  description: >-
    Day-0 cluster bootstrap workflow. Runs on the node-agent AFTER the
    install-day0.sh script has installed the minimal prerequisites
    (TLS, etcd, scylladb, minio, node-agent). This workflow installs
    all remaining packages, bootstraps DNS, publishes artifacts, and
    seeds desired state.

    Prerequisites (handled by install-day0.sh before this workflow):
      1. TLS root + server + client certificates
      2. Bootstrap mode enabled (30-minute window)
      3. Minimal packages installed: scylladb, etcd, minio, node-agent
      4. Node-agent running and reachable on :11000
spec:
  inputSchema:
    type: object
    required:
      - cluster_id
      - bootstrap_node_id
      - bootstrap_node_hostname
      - domain
    properties:
      cluster_id: { type: string }
      bootstrap_node_id: { type: string }
      bootstrap_node_hostname: { type: string }
      repository_address: { type: string, default: "" }
      domain: { type: string }
      install_timeout: { type: string, default: 20m }
      health_timeout: { type: string, default: 10m }
  defaults:
    install_timeout: 20m
    health_timeout: 10m
    repository_address: ""
  strategy:
    mode: single
  steps:
    # ── Tier 0: Verify prerequisites are truly healthy ─────────────────
    - id: verify_etcd_healthy
      title: Verify etcd is healthy (etcdctl endpoint health)
      actor: node-agent
      action: node.probe_infra_health
      with:
        probe: probe-etcd-health
      retry:
        maxAttempts: 30
        backoff: 5s
      timeout: 3m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: verify_scylla_healthy
      title: Verify ScyllaDB is accepting CQL connections
      actor: node-agent
      action: node.probe_infra_health
      with:
        probe: probe-scylla-health
      retry:
        maxAttempts: 60
        backoff: 10s
      timeout: 12m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: verify_minio_healthy
      title: Verify MinIO is healthy (HTTP health endpoint)
      actor: node-agent
      action: node.probe_infra_health
      with:
        probe: probe-minio-health
      retry:
        maxAttempts: 30
        backoff: 5s
      timeout: 3m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    # ── Tier 1: Configure shared storage ────────────────────────────────
    - id: configure_shared_storage
      title: Configure MinIO buckets and upload workflow definitions
      dependsOn: [verify_etcd_healthy, verify_scylla_healthy, verify_minio_healthy]
      actor: installer
      action: installer.configure_shared_storage
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: write_bootstrap_credentials
      title: Write bootstrap superuser credentials
      dependsOn: [verify_etcd_healthy, verify_scylla_healthy, verify_minio_healthy]
      actor: installer
      action: installer.write_bootstrap_credentials
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 2: Data layer ──────────────────────────────────────────────
    - id: install_persistence
      title: Install persistence service
      dependsOn: [configure_shared_storage, write_bootstrap_credentials]
      actor: installer
      action: installer.install_package
      with:
        package: persistence
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 3: Mesh + proxy ────────────────────────────────────────────
    - id: install_mesh_services
      title: Install xDS, Envoy, gateway
      dependsOn: [install_persistence]
      actor: installer
      action: installer.install_package_set
      with:
        packages: [xds, envoy, gateway]
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 4: Core infrastructure ─────────────────────────────────────
    - id: install_infra_services
      title: Install cluster-controller and cluster-doctor
      dependsOn: [install_mesh_services]
      actor: installer
      action: installer.install_package_set
      with:
        packages: [cluster-controller, cluster-doctor]
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 5: Control plane ───────────────────────────────────────────
    - id: install_control_plane
      title: Install resource, RBAC, authentication, discovery, DNS and repository
      dependsOn: [install_infra_services]
      actor: installer
      action: installer.install_package_set
      with:
        packages: [resource, rbac, authentication, discovery, dns, repository]
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 6: DNS bootstrap ───────────────────────────────────────────
    - id: bootstrap_dns
      title: Create initial DNS zone and records
      dependsOn: [install_control_plane]
      actor: installer
      action: installer.bootstrap_dns
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 7: Ops services ────────────────────────────────────────────
    - id: install_ops_services
      title: Install monitoring, event, log, backup, AI, workflow
      dependsOn: [bootstrap_dns]
      actor: installer
      action: installer.install_package_set
      with:
        packages:
          - sidekick
          - node-exporter
          - prometheus
          - alertmanager
          - monitoring
          - event
          - log
          - backup-manager
          - workflow
          - mcp
          - ai-memory
          - ai-watcher
          - ai-executor
          - ai-router
          - scylla-manager-agent
          - scylla-manager
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 8: Workload services (parallel with CLI tools) ─────────────
    - id: install_workload_services
      title: Install file, search, media, title, torrent
      dependsOn: [install_ops_services]
      actor: installer
      action: installer.install_package_set
      with:
        packages:
          - file
          - search
          - media
          - title
          - torrent
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: install_cli_tools
      title: Install CLI tools (mc, globular-cli, etcdctl, restic, etc.)
      dependsOn: [install_ops_services]
      actor: installer
      action: installer.install_package_set
      with:
        packages:
          - mc
          - globular-cli
          - etcdctl
          - rclone
          - restic
          - sctool
          - sha256sum
          - yt-dlp
          - ffmpeg
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    # ── Tier 9: Post-install ────────────────────────────────────────────
    - id: validate_cluster_health
      title: Validate cluster health and conformance
      dependsOn: [install_workload_services, install_cli_tools]
      actor: installer
      action: installer.validate_cluster_health
      timeout: $.health_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: generate_join_token
      title: Generate shared join token and write controller config
      dependsOn: [validate_cluster_health]
      actor: installer
      action: installer.generate_join_token
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: restart_for_join_token
      title: Restart controller and node-agent after join token wiring
      dependsOn: [generate_join_token]
      actor: installer
      action: installer.restart_bootstrap_services
      with:
        services: [cluster-controller, node-agent]
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: bootstrap_first_node
      title: Register first node and seed cluster desired state
      dependsOn: [restart_for_join_token]
      actor: installer
      action: installer.cluster_bootstrap
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: publish_bootstrap_artifacts
      title: Publish local bootstrap artifacts to repository
      dependsOn: [bootstrap_first_node]
      actor: repository
      action: repository.publish_bootstrap_artifacts
      with:
        source: local-bootstrap-cache
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: import_installed_into_desired
      title: Import installed packages into desired state
      dependsOn: [publish_bootstrap_artifacts]
      actor: cluster-controller
      action: controller.seed_desired_from_installed
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: stabilize
      title: Final reconciliation stabilization pass
      dependsOn: [import_installed_into_desired]
      actor: cluster-controller
      action: controller.reconcile_until_stable
      retry:
        maxAttempts: 12
        backoff: 10s
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: cleanup_bootstrap
      title: Disable bootstrap mode and remove temporary credentials
      dependsOn: [stabilize]
      actor: installer
      action: installer.disable_bootstrap_window
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

  onFailure:
    actor: installer
    action: installer.capture_bootstrap_failure_bundle

  onSuccess:
    actor: cluster-controller
    action: controller.emit_cluster_bootstrap_succeeded
