apiVersion: workflow.globular.io/v1alpha1
kind: WorkflowDefinition
metadata:
  name: node.join
  displayName: Day-1 node join and converge
  description: >-
    Full Day-1 flow: after a node is admitted, install the packages its
    profiles claim (placement authority: component_catalog/profilemap.go)
    in dependency order with parallelism within each tier. Replaces the
    one-plan-per-30s-cycle reconciler with a single workflow run that
    completes in minutes, not tens of minutes.
spec:
  inputSchema:
    type: object
    required:
      - cluster_id
      - node_id
      - node_hostname
      - node_ip
      - node_profiles
    properties:
      cluster_id: { type: string }
      node_id: { type: string }
      node_hostname: { type: string }
      node_ip: { type: string }
      node_profiles:
        type: array
        items: { type: string }
      repository_address: { type: string, default: "" }
      # 15m (was 5m): a cold Day-1 join installs workload tiers serially per
      # step; the old single 24-package step took ~8m, so 5m failed the last
      # package (mcp, priority 1000) on "context deadline exceeded" and the
      # whole join with it. Tier 4 is now profile-gated and split into small
      # per-group steps, so each step's budget covers far fewer packages —
      # 15m is generous headroom, not a bigger bucket for the same leak.
      install_timeout: { type: string, default: 15m }
  defaults:
    install_timeout: 15m
  strategy:
    mode: single
  steps:
    # ── Tier 0: Verify join-script prerequisites ────────────────────────
    - id: verify_prerequisites
      title: Verify join-script prerequisites are running
      actor: node-agent
      action: node.verify_services_active
      with:
        services: [etcd, node-agent]
      retry:
        maxAttempts: 6
        backoff: 5s
      timeout: 1m
      execution:
        idempotency: safe_retry
        resume_policy: retry
      verification:
        actor: node-agent
        action: node.verify_services_active
        with:
          services: [etcd, node-agent]
        success:
          expr: ok == true

    # ── Tier 1: Mesh infrastructure (parallel) ──────────────────────────
    # minio and sidekick are intentionally absent: MinIO requires 3 storage nodes
    # to form erasure-coding quorum, so those packages are always "held" at join
    # time. Including them here causes install_mesh to fail immediately, which
    # falls back to the slow 1-package-per-30s reconciler path. MinIO and sidekick
    # are installed later by the topology workflow once quorum is achievable.
    - id: install_mesh
      title: Install mesh infrastructure
      dependsOn: [verify_prerequisites]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: node-exporter, kind: INFRASTRUCTURE }
          - { name: prometheus, kind: INFRASTRUCTURE }
          - { name: alertmanager, kind: INFRASTRUCTURE }
          - { name: xds, kind: INFRASTRUCTURE }
          - { name: keepalived, kind: INFRASTRUCTURE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_mesh
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: node-exporter, kind: INFRASTRUCTURE }
            - { name: prometheus, kind: INFRASTRUCTURE }
            - { name: alertmanager, kind: INFRASTRUCTURE }
            - { name: xds, kind: INFRASTRUCTURE }
            - { name: keepalived, kind: INFRASTRUCTURE }
        success:
          expr: all_installed == true

    - id: install_envoy
      title: Install Envoy proxy
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
          - expr: contains(inputs.node_profiles, 'gateway')
      dependsOn: [install_mesh]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: envoy, kind: INFRASTRUCTURE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_envoy
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: envoy, kind: INFRASTRUCTURE }
        success:
          expr: all_installed == true

    - id: install_gateway
      title: Install gateway
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
          - expr: contains(inputs.node_profiles, 'gateway')
      dependsOn: [install_envoy]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: gateway, kind: INFRASTRUCTURE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_gateway
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: gateway, kind: INFRASTRUCTURE }
        success:
          expr: all_installed == true

    # ── Tier 2: Storage (ScyllaDB needs Envoy for cluster comms) ──────────
    - id: install_scylladb
      title: Install ScyllaDB
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
          - expr: contains(inputs.node_profiles, 'storage')
          - expr: contains(inputs.node_profiles, 'scylla')
          - expr: contains(inputs.node_profiles, 'database')
      dependsOn: [install_envoy]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: scylladb, kind: INFRASTRUCTURE }
      retry:
        maxAttempts: 2
        backoff: 30s
      timeout: 10m
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_scylladb
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: scylladb, kind: INFRASTRUCTURE }
        success:
          expr: all_installed == true

    - id: wait_scylladb_ready
      title: Wait for ScyllaDB to accept CQL connections
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
          - expr: contains(inputs.node_profiles, 'storage')
          - expr: contains(inputs.node_profiles, 'scylla')
          - expr: contains(inputs.node_profiles, 'database')
      dependsOn: [install_scylladb]
      actor: node-agent
      action: node.probe_infra_health
      with:
        probe: probe-scylla-health
      retry:
        # 120 attempts × 15s backoff = 30 minutes of polling.
        # The 3rd-node bootstrap competes with the RF-raise repair streaming
        # that fires after the 2nd node joined; in developer_mode (single shard)
        # this can exceed 15 minutes. 30m covers the worst realistic case.
        maxAttempts: 120
        backoff: 15s
      timeout: 35m
      execution:
        idempotency: safe_retry
        resume_policy: retry
      verification:
        actor: node-agent
        action: node.probe_infra_health
        with:
          probe: probe-scylla-health
        success:
          expr: healthy == true

    - id: install_scylla_tools
      title: Install ScyllaDB manager and agent
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
          - expr: contains(inputs.node_profiles, 'storage')
          - expr: contains(inputs.node_profiles, 'scylla')
          - expr: contains(inputs.node_profiles, 'database')
      dependsOn: [wait_scylladb_ready]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: scylla-manager, kind: INFRASTRUCTURE }
          - { name: scylla-manager-agent, kind: INFRASTRUCTURE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_scylla_tools
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: scylla-manager, kind: INFRASTRUCTURE }
            - { name: scylla-manager-agent, kind: INFRASTRUCTURE }
        success:
          expr: all_installed == true

    # ── Tier 3: Foundational services (parallel, need ScyllaDB) ───────────
    - id: install_foundational
      title: Install foundational services
      dependsOn: [wait_scylladb_ready, install_gateway]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: dns, kind: SERVICE }
          - { name: event, kind: SERVICE }
          - { name: rbac, kind: SERVICE }
          - { name: resource, kind: SERVICE }
          - { name: authentication, kind: SERVICE }
          - { name: repository, kind: SERVICE }
          - { name: monitoring, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_foundational
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: dns, kind: SERVICE }
            - { name: event, kind: SERVICE }
            - { name: rbac, kind: SERVICE }
            - { name: resource, kind: SERVICE }
            - { name: authentication, kind: SERVICE }
            - { name: repository, kind: SERVICE }
            - { name: monitoring, kind: SERVICE }
        success:
          expr: all_installed == true

    # ── Tier 4: Workload services (profile-gated, parallel) ───────────────
    # Placement authority: component_catalog/profilemap.go (ProfilePackages).
    # Each step installs only packages eligible under the profiles named in
    # its `when` gate, grouped by EXACT catalog profile set so a step never
    # fires on a node whose profiles don't claim its packages. The regression
    # test nodejoin_profile_gating_test.go validates every list against the
    # catalog — change profilemap.go first, then mirror the change here.
    # (Scar 2026-07-10: a hardcoded 24-package list installed ~10 profile-
    # orphan packages on every joiner and pushed the serial install past its
    # 5m timeout, failing the whole join on the final package.)
    - id: install_workloads_core
      title: Install core workload services
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'core')
          - expr: contains(inputs.node_profiles, 'compute')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: log, kind: SERVICE }
          - { name: search, kind: SERVICE }
          - { name: persistence, kind: SERVICE }
          - { name: ai-router, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_core
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: log, kind: SERVICE }
            - { name: search, kind: SERVICE }
            - { name: persistence, kind: SERVICE }
            - { name: ai-router, kind: SERVICE }
        success:
          expr: all_installed == true

    - id: install_workloads_file
      title: Install file service
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'core')
          - expr: contains(inputs.node_profiles, 'compute')
          - expr: contains(inputs.node_profiles, 'storage')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: file, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_file
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: file, kind: SERVICE }
        success:
          expr: all_installed == true

    - id: install_workloads_compute
      title: Install compute workload services
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'compute')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: sql, kind: SERVICE }
          - { name: catalog, kind: SERVICE }
          - { name: ldap, kind: SERVICE }
          - { name: mail, kind: SERVICE }
          - { name: blog, kind: SERVICE }
          - { name: conversation, kind: SERVICE }
          - { name: echo, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_compute
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: sql, kind: SERVICE }
            - { name: catalog, kind: SERVICE }
            - { name: ldap, kind: SERVICE }
            - { name: mail, kind: SERVICE }
            - { name: blog, kind: SERVICE }
            - { name: conversation, kind: SERVICE }
            - { name: echo, kind: SERVICE }
        success:
          expr: all_installed == true

    - id: install_workloads_storage
      title: Install storage workload service
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'storage')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: storage, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_storage
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: storage, kind: SERVICE }
        success:
          expr: all_installed == true

    - id: install_workloads_media
      title: Install media-server workload services
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'media-server')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: title, kind: SERVICE }
          - { name: media, kind: SERVICE }
          - { name: torrent, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_media
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: title, kind: SERVICE }
            - { name: media, kind: SERVICE }
            - { name: torrent, kind: SERVICE }
        success:
          expr: all_installed == true

    - id: install_workloads_control_plane
      title: Install control-plane workload services
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: backup-manager, kind: SERVICE }
          - { name: cluster-controller, kind: SERVICE }
          - { name: cluster-doctor, kind: SERVICE }
          - { name: mcp, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_control_plane
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: backup-manager, kind: SERVICE }
            - { name: cluster-controller, kind: SERVICE }
            - { name: cluster-doctor, kind: SERVICE }
            - { name: mcp, kind: SERVICE }
        success:
          expr: all_installed == true

    - id: install_workloads_data_ai
      title: Install data-plane AI workload services
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'control-plane')
          - expr: contains(inputs.node_profiles, 'database')
          - expr: contains(inputs.node_profiles, 'scylla')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: workflow, kind: SERVICE }
          - { name: ai-memory, kind: SERVICE }
          - { name: ai-executor, kind: SERVICE }
          - { name: ai-watcher, kind: SERVICE }
      timeout: $.install_timeout
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_workloads_data_ai
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: workflow, kind: SERVICE }
            - { name: ai-memory, kind: SERVICE }
            - { name: ai-executor, kind: SERVICE }
            - { name: ai-watcher, kind: SERVICE }
        success:
          expr: all_installed == true

    # ── Tier 5: Command-line tools (parallel, no systemd) ─────────────────
    - id: install_commands
      title: Install CLI tools
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        # Base command tools installed on every node. Media-server-only commands
        # (ffmpeg, yt-dlp) are intentionally NOT here — they are installed by the
        # media-server-gated install_commands_media step below. Installing them
        # unconditionally orphans them on non-media nodes
        # (placement.installed_package_orphaned). rclone/restic/mc are storage
        # tools but every node in this topology carries the storage profile.
        packages:
          - { name: globular-cli, kind: COMMAND }
          - { name: etcdctl, kind: COMMAND }
          - { name: rclone, kind: COMMAND }
          - { name: restic, kind: COMMAND }
          - { name: mc, kind: COMMAND }
          - { name: sctool, kind: COMMAND }
          - { name: sha256sum, kind: COMMAND }
          - { name: claude, kind: COMMAND }
          - { name: codex, kind: COMMAND }
      timeout: 2m
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_commands
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: globular-cli, kind: COMMAND }
            - { name: etcdctl, kind: COMMAND }
            - { name: rclone, kind: COMMAND }
            - { name: restic, kind: COMMAND }
            - { name: mc, kind: COMMAND }
            - { name: sctool, kind: COMMAND }
            - { name: sha256sum, kind: COMMAND }
            - { name: claude, kind: COMMAND }
            - { name: codex, kind: COMMAND }
        success:
          expr: all_installed == true

    # ── Tier 5b: Media-server command tools (profile-gated) ───────────────
    # ffmpeg and yt-dlp are media-server-only COMMAND packages
    # (component_catalog/profilemap.go: media-server → ffmpeg, yt-dlp). They are
    # installed ONLY on nodes carrying the media-server profile — never in the
    # unconditional install_commands step above, which would orphan them on
    # non-media nodes (placement.installed_package_orphaned). Kept separate from
    # the Tier-4 install_workloads_media step, which installs SERVICE workloads
    # only.
    - id: install_commands_media
      title: Install media-server CLI tools
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'media-server')
      dependsOn: [install_foundational]
      actor: node-agent
      action: node.install_packages
      with:
        packages:
          - { name: ffmpeg, kind: COMMAND }
          - { name: yt-dlp, kind: COMMAND }
      timeout: 2m
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: install_commands_media
      verification:
        actor: node-agent
        action: node.verify_packages_installed
        with:
          node_id: $.node_id
          packages:
            - { name: ffmpeg, kind: COMMAND }
            - { name: yt-dlp, kind: COMMAND }
        success:
          expr: all_installed == true

    # ── Final: Report convergence ─────────────────────────────────────────
    - id: report_installed
      title: Sync installed state to etcd
      dependsOn:
        - install_workloads_core
        - install_workloads_file
        - install_workloads_compute
        - install_workloads_storage
        - install_workloads_media
        - install_workloads_control_plane
        - install_workloads_data_ai
        - install_scylla_tools
        - install_commands
        - install_commands_media
      actor: node-agent
      action: node.sync_installed_state
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect
        receipt_key: report_installed_state
      verification:
        actor: node-agent
        action: node.verify_installed_state_synced
        with:
          node_id: $.node_id
        success:
          expr: synced == true

    - id: mark_converged
      title: Mark node as converged
      dependsOn: [report_installed]
      actor: cluster-controller
      action: controller.bootstrap.set_phase
      with:
        phase: workload_ready
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.bootstrap.verify_phase
        with:
          node_id: $.node_id
          phase: workload_ready
        success:
          expr: phase_matches == true

  onFailure:
    actor: cluster-controller
    action: controller.bootstrap.mark_failed
    with:
      reason: join_workflow_failed

  onSuccess:
    actor: cluster-controller
    action: controller.bootstrap.emit_ready
