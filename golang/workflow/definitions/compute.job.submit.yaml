apiVersion: workflow.globular.io/v1alpha1
kind: WorkflowDefinition
metadata:
  name: compute.job.submit
  displayName: Submit compute job
  description: >-
    Validates a compute job, admits it, creates execution units (single or
    partitioned), dispatches all units for execution, waits for completion,
    then aggregates results and finalizes the job. Single workflow path
    with no child workflow dispatch.
spec:
  strategy:
    mode: single
  inputSchema:
    type: object
    required:
      - job_id
    properties:
      job_id: { type: string }
  steps:
    - id: load_job
      title: Load job from state
      actor: compute
      action: compute.load_job
      with:
        job_id: $.job_id

    - id: validate_definition
      title: Validate compute definition exists
      dependsOn: [load_job]
      actor: compute
      action: compute.validate_job_definition
      with:
        job_id: $.job_id
      execution:
        idempotency: safe_retry

    - id: admit_job
      title: Admit job for execution
      dependsOn: [validate_definition]
      actor: compute
      action: compute.admit_job
      with:
        job_id: $.job_id
      execution:
        idempotency: safe_retry

    - id: create_units
      title: Create execution units (single or partitioned)
      dependsOn: [admit_job]
      actor: compute
      action: compute.create_single_unit
      with:
        job_id: $.job_id
      execution:
        idempotency: safe_retry

    - id: dispatch_all
      title: Dispatch all units for execution
      dependsOn: [create_units]
      actor: compute
      action: compute.dispatch_all_units
      with:
        job_id: $.job_id
      execution:
        idempotency: safe_retry

    - id: await_all
      title: Wait for all units to complete
      dependsOn: [dispatch_all]
      actor: compute
      action: compute.await_all_units
      with:
        job_id: $.job_id
        timeout_seconds: 3600
      execution:
        idempotency: safe_retry

    - id: assess_units
      title: Assess unit outcomes
      dependsOn: [await_all]
      actor: compute
      action: compute.assess_unit_outcomes
      with:
        job_id: $.job_id
      execution:
        idempotency: safe_retry

    - id: create_result
      title: Create aggregate result
      dependsOn: [assess_units]
      actor: compute
      action: compute.create_result
      with:
        job_id: $.job_id
      execution:
        idempotency: safe_retry

    - id: finalize_job
      title: Finalize job to terminal state
      dependsOn: [create_result]
      actor: compute
      action: compute.finalize_job
      with:
        job_id: $.job_id
        verification_passed: $.verification_passed
        trust_level: $.trust_level
      execution:
        idempotency: safe_retry

  onFailure:
    actor: compute
    action: compute.mark_job_failed
