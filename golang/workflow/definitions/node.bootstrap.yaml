apiVersion: workflow.globular.io/v1alpha1
kind: WorkflowDefinition
metadata:
  name: node.bootstrap
  displayName: Node bootstrap
  description: >-
    Formalized replacement for the controller-side bootstrap phase machine.
    Advances a node from admitted to workload_ready by waiting on profile-specific
    convergence conditions instead of hardcoded Go transitions.
spec:
  inputSchema:
    type: object
    required:
      - cluster_id
      - node_id
      - node_hostname
      - node_profiles
    properties:
      cluster_id: { type: string }
      node_id: { type: string }
      node_hostname: { type: string }
      node_profiles:
        type: array
        items: { type: string }
      bootstrap_timeout: { type: string, default: 30m }
  defaults:
    bootstrap_timeout: 30m
  strategy:
    mode: single
  steps:
    - id: mark_infra_preparing
      title: Mark node as infra_preparing
      actor: cluster-controller
      action: controller.bootstrap.set_phase
      with:
        phase: infra_preparing
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.bootstrap.verify_phase
        with:
          node_id: $.node_id
          phase: infra_preparing
        success:
          expr: phase_matches == true

    - id: maybe_wait_etcd_unit
      title: Wait for etcd package or systemd unit
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'etcd')
          - expr: contains(inputs.node_profiles, 'control-plane')
      actor: cluster-controller
      action: controller.bootstrap.wait_condition
      with:
        condition: node_has_etcd_unit
        phase: etcd_joining
      retry:
        maxAttempts: 60
        backoff: 5s
      timeout: 5m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: maybe_wait_etcd_join
      title: Wait for etcd join to be verified
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'etcd')
          - expr: contains(inputs.node_profiles, 'control-plane')
      dependsOn: [maybe_wait_etcd_unit]
      actor: cluster-controller
      action: controller.bootstrap.wait_condition
      with:
        condition: etcd_join_verified
        phase: etcd_ready
      retry:
        maxAttempts: 60
        backoff: 5s
      timeout: 5m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: maybe_wait_xds
      title: Wait for xDS to be active
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'xds')
          - expr: contains(inputs.node_profiles, 'gateway')
          - expr: contains(inputs.node_profiles, 'control-plane')
      dependsOn: [maybe_wait_etcd_join]
      actor: cluster-controller
      action: controller.bootstrap.wait_condition
      with:
        condition: xds_active
        phase: xds_ready
      retry:
        maxAttempts: 60
        backoff: 5s
      timeout: 5m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: maybe_wait_envoy
      title: Wait for Envoy to be active
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'gateway')
          - expr: contains(inputs.node_profiles, 'ingress')
          - expr: contains(inputs.node_profiles, 'control-plane')
      dependsOn: [maybe_wait_xds]
      actor: cluster-controller
      action: controller.bootstrap.wait_condition
      with:
        condition: envoy_active
        phase: envoy_ready
      retry:
        maxAttempts: 60
        backoff: 5s
      timeout: 5m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: maybe_wait_storage
      title: Wait for storage subsystems to be verified
      when:
        anyOf:
          - expr: contains(inputs.node_profiles, 'minio')
          - expr: contains(inputs.node_profiles, 'scylla')
          - expr: contains(inputs.node_profiles, 'storage')
      dependsOn: [maybe_wait_envoy]
      actor: cluster-controller
      action: controller.bootstrap.wait_condition
      with:
        condition: storage_verified
        phase: storage_joining
      retry:
        maxAttempts: 60
        backoff: 5s
      timeout: 10m
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: mark_workload_ready
      title: Mark node as workload_ready
      dependsOn:
        - maybe_wait_etcd_join
        - maybe_wait_xds
        - maybe_wait_envoy
        - maybe_wait_storage
      actor: cluster-controller
      action: controller.bootstrap.set_phase
      with:
        phase: workload_ready
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.bootstrap.verify_phase
        with:
          node_id: $.node_id
          phase: workload_ready
        success:
          expr: phase_matches == true

  onFailure:
    actor: cluster-controller
    action: controller.bootstrap.mark_failed
    with:
      reason: workflow_failed

  onSuccess:
    actor: cluster-controller
    action: controller.bootstrap.emit_ready
