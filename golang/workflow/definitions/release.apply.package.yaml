apiVersion: workflow.globular.io/v1alpha1
kind: WorkflowDefinition
metadata:
  name: release.apply.package
  displayName: Apply package release
  description: >-
    Generic direct package rollout for SERVICE, WORKLOAD, COMMAND and
    INFRASTRUCTURE packages. This is the uniform rollout model. Specialized
    workflows may wrap it, but rollout execution must remain direct and
    workflow-native.
spec:
  inputSchema:
    type: object
    required:
      - cluster_id
      - release_id
      - package_name
      - package_kind
      - resolved_version
      - desired_hash
      - candidate_nodes
    properties:
      cluster_id: { type: string }
      release_id: { type: string }
      release_name: { type: string, default: "" }
      package_name: { type: string }
      package_kind: { type: string }
      resolved_version: { type: string }
      desired_hash: { type: string }
      candidate_nodes:
        type: array
        items: { type: string }
      max_parallel_nodes: { type: integer, default: 2 }
      execute_timeout: { type: string, default: 20m }
      verify_timeout: { type: string, default: 10m }
      restart_policy: { type: string, default: auto }
      runtime_check: { type: string, default: auto }
      resolved_build_id: { type: string, default: "" }
      resolved_build_number: { type: integer, default: 0 }
      # BINARY sha256 from the repository manifest's entrypoint_checksum.
      # Propagated to node-agent's ApplyPackageRelease.expected_sha256.
      # The node-agent verify gate refuses verified SUCCESS without it. An
      # empty value is allowed for legacy manifests; the node-agent then
      # writes installed_unverified honestly. NEVER synthesize this value
      # from desired_hash, filename parsing, or runtime observation.
      resolved_entrypoint_checksum: { type: string, default: "" }
  defaults:
    max_parallel_nodes: 2
    execute_timeout: 20m
    verify_timeout: 10m
    restart_policy: auto
    runtime_check: auto
    resolved_entrypoint_checksum: ""
  strategy:
    mode: single
  steps:
    - id: mark_resolved
      title: Mark release resolved
      actor: cluster-controller
      action: controller.release.mark_resolved
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.release.verify_status
        with:
          release_id: $.release_id
          expected_status: RESOLVED
        success:
          expr: status_matches == true

    - id: select_targets
      title: Select eligible package targets
      dependsOn: [mark_resolved]
      actor: cluster-controller
      action: controller.release.select_package_targets
      with:
        candidate_nodes: $.candidate_nodes
        package_name: $.package_name
        package_kind: $.package_kind
        desired_hash: $.desired_hash
      # Handler writes selected_targets directly to run outputs
      # (array, not wrapped map) for foreach consumption.
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: short_circuit_if_no_targets
      title: Finalize immediately when all targets are already converged
      dependsOn: [select_targets]
      when:
        expr: len(selected_targets) == 0
      actor: cluster-controller
      action: controller.release.finalize_noop
      with:
        status: AVAILABLE
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.release.verify_status
        with:
          release_id: $.release_id
          expected_status: AVAILABLE
        success:
          expr: status_matches == true

    - id: mark_applying
      title: Mark release applying
      dependsOn: [select_targets]
      when:
        expr: len(selected_targets) > 0
      actor: cluster-controller
      action: controller.release.mark_applying
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.release.verify_status
        with:
          release_id: $.release_id
          expected_status: APPLYING
        success:
          expr: status_matches == true

    - id: apply_per_node
      title: Apply package per target node
      dependsOn: [mark_applying]
      when:
        expr: len(selected_targets) > 0
      foreach: $.selected_targets
      itemName: target
      strategy:
        mode: parallel
        concurrency: $.max_parallel_nodes
      steps:
        - id: mark_node_started
          actor: cluster-controller
          action: controller.release.mark_node_started
          with:
            node_id: $.target.node_id
          execution:
            idempotency: safe_retry
            resume_policy: verify_effect
          verification:
            actor: cluster-controller
            action: controller.release.verify_node_status
            with:
              release_id: $.release_id
              node_id: $.target.node_id
              expected_status: APPLYING
            success:
              expr: status_matches == true

        - id: install_package
          dependsOn: [mark_node_started]
          actor: node-agent
          action: node.install_package
          with:
            node_id: $.target.node_id
            package_name: $.package_name
            version: $.resolved_version
            desired_hash: $.desired_hash
            # BINARY sha256 — node-agent verify gate compares against installed binary
            expected_sha256: $.resolved_entrypoint_checksum
            kind: $.package_kind
            build_id: $.resolved_build_id
            build_number: $.resolved_build_number
          timeout: $.execute_timeout
          execution:
            idempotency: verify_then_continue
            resume_policy: verify_effect
            receipt_key: install_package
          verification:
            actor: node-agent
            action: node.verify_installed_package_state
            with:
              node_id: $.target.node_id
              package_name: $.package_name
              version: $.resolved_version
              desired_hash: $.desired_hash
            success:
              expr: installed == true

        - id: verify_installed
          dependsOn: [install_package]
          actor: node-agent
          action: node.verify_package_installed
          with:
            node_id: $.target.node_id
            package_name: $.package_name
            version: $.resolved_version
            desired_hash: $.desired_hash
          retry:
            maxAttempts: 20
            backoff: 5s
          timeout: $.verify_timeout
          execution:
            idempotency: safe_retry
            resume_policy: retry

        - id: maybe_restart
          dependsOn: [verify_installed]
          when:
            expr: inputs.restart_policy != 'never'
          actor: node-agent
          action: node.maybe_restart_package
          with:
            node_id: $.target.node_id
            package_name: $.package_name
            package_kind: $.package_kind
            restart_policy: $.restart_policy
          execution:
            idempotency: verify_then_continue
            resume_policy: verify_effect
            receipt_key: restart_package_service

        - id: verify_runtime
          dependsOn: [verify_installed, maybe_restart]
          actor: node-agent
          action: node.verify_package_runtime
          with:
            node_id: $.target.node_id
            package_name: $.package_name
            package_kind: $.package_kind
            runtime_check: $.runtime_check
          # WF-DEFER: short in-run retry, then yield to scheduler. The
          # scheduler honours `defer.cooldown` unless an external event
          # matches a blocker tag (see DeferPolicy). Replaces the previous
          # 60×5s = 5min synchronous hammer that held the executor slot.
          retry:
            maxAttempts: 5
            backoff: 5s
          defer:
            cooldown: 60s
            maxDefers: 5
            blockerTags:
              - "runtime.active:{{ .target.node_id }}:{{ .package_name }}"
              - "deps.installed:{{ .target.node_id }}:{{ .package_name }}"
          timeout: $.verify_timeout
          execution:
            idempotency: safe_retry
            resume_policy: retry

        - id: sync_installed_state
          dependsOn: [verify_runtime]
          actor: node-agent
          action: node.sync_installed_package_state
          with:
            node_id: $.target.node_id
            package_name: $.package_name
            version: $.resolved_version
            desired_hash: $.desired_hash
            # Project J: thread the BINARY sha256 (manifest entrypoint_checksum)
            # so the sync actor writes InstalledPackage.Checksum with the binary
            # hash. INC-2026-0014's hash_schemas_must_not_alias invariant
            # forbids aliasing desired_hash (synthetic identity) into the
            # binary-sha256 slot.
            resolved_entrypoint_checksum: $.resolved_entrypoint_checksum
            package_kind: $.package_kind
            build_id: $.resolved_build_id
          execution:
            idempotency: verify_then_continue
            resume_policy: verify_effect
            receipt_key: sync_installed_package_state
          verification:
            actor: node-agent
            action: node.verify_installed_package_state
            with:
              node_id: $.target.node_id
              package_name: $.package_name
              version: $.resolved_version
              desired_hash: $.desired_hash
            success:
              expr: installed == true

        - id: mark_node_succeeded
          dependsOn: [sync_installed_state]
          actor: cluster-controller
          action: controller.release.mark_node_succeeded
          with:
            node_id: $.target.node_id
            version: $.resolved_version
            desired_hash: $.desired_hash
          execution:
            idempotency: safe_retry
            resume_policy: verify_effect
          verification:
            actor: cluster-controller
            action: controller.release.verify_node_status
            with:
              release_id: $.release_id
              node_id: $.target.node_id
              expected_status: SUCCEEDED
            success:
              expr: status_matches == true

      onFailure:
        actor: cluster-controller
        action: controller.release.mark_node_failed
        with:
          node_id: $.target.node_id
          package_name: $.package_name

    - id: aggregate_outcome
      dependsOn: [apply_per_node]
      when:
        expr: len(selected_targets) > 0
      actor: cluster-controller
      action: controller.release.aggregate_direct_apply_results
      with:
        release_id: $.release_id
        package_name: $.package_name
      export: aggregate
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: finalize_release
      dependsOn: [aggregate_outcome]
      when:
        expr: len(selected_targets) > 0
      actor: cluster-controller
      action: controller.release.finalize_direct_apply
      with:
        aggregate: $.aggregate
      execution:
        idempotency: safe_retry
        resume_policy: verify_effect
      verification:
        actor: cluster-controller
        action: controller.release.verify_terminal_status
        with:
          release_id: $.release_id
        success:
          expr: terminal == true

  onFailure:
    actor: cluster-controller
    action: controller.release.mark_failed
    with:
      reason: workflow_failed

  onSuccess:
    actor: cluster-controller
    action: controller.release.recheck_convergence
