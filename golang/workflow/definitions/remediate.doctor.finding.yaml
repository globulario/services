apiVersion: workflow.globular.io/v1alpha1
kind: WorkflowDefinition
metadata:
  name: remediate.doctor.finding
  displayName: Remediate a cluster-doctor finding
  description: >-
    Executes one structured RemediationAction attached to a single
    cluster-doctor Finding. Pipeline: resolve -> assess -> approve ->
    execute -> verify. Wraps cluster_doctor.ExecuteRemediation without
    bypassing it, then re-runs doctor checks to verify convergence.
    Scope is strictly one finding and one remediation attempt.
spec:
  inputSchema:
    type: object
    required:
      - finding_id
    properties:
      finding_id:
        type: string
      step_index:
        type: integer
        default: 0
      approval_token:
        type: string
      dry_run:
        type: boolean
        default: false
      verify_timeout:
        type: string
        default: 30s

  defaults:
    step_index: 0
    approval_token: ""
    dry_run: false
    verify_timeout: 30s

  strategy:
    mode: single

  steps:
    - id: resolve_finding
      title: Resolve finding and select remediation step
      actor: cluster-doctor
      action: doctor.resolve_finding
      with:
        finding_id: $.finding_id
        step_index: $.step_index
      # Expected run outputs written by handler:
      # resolved_finding:
      #   {
      #     node_id,
      #     action_type,
      #     risk,
      #     idempotent,
      #     description
      #   }
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: assess_risk
      title: Assess remediation risk
      dependsOn:
        - resolve_finding
      actor: cluster-doctor
      action: doctor.assess_risk
      with:
        resolved_finding: $.resolved_finding
      # Expected run outputs written by handler:
      # risk_assessment:
      #   {
      #     auto_executable: bool,
      #     requires_approval: bool,
      #     reason: string
      #   }
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: require_approval
      title: Require approval when remediation risk demands it
      dependsOn:
        - assess_risk
      actor: cluster-doctor
      action: doctor.require_approval
      with:
        risk_assessment: $.risk_assessment
        approval_token: $.approval_token
      # Handler behavior:
      # - pass through when action is auto-executable
      # - pass through when approval_token is present and sufficient
      # - fail step otherwise
      # Gating lives in the handler because current condition expressions
      # do not support the needed compound logic cleanly.
      execution:
        idempotency: safe_retry
        resume_policy: retry

    - id: execute_remediation
      title: Execute remediation through cluster-doctor
      dependsOn:
        - require_approval
      actor: cluster-doctor
      action: doctor.execute_remediation
      with:
        finding_id: $.finding_id
        step_index: $.step_index
        approval_token: $.approval_token
        dry_run: $.dry_run
      # Expected run outputs written by handler:
      # execution_result:
      #   {
      #     audit_id,
      #     status,
      #     executed,
      #     output,
      #     reason
      #   }
      execution:
        idempotency: verify_then_continue
        resume_policy: verify_effect

    - id: verify_convergence
      title: Re-run doctor and verify finding cleared
      dependsOn:
        - execute_remediation
      when:
        expr: inputs.dry_run == false
      actor: cluster-doctor
      action: doctor.verify_convergence
      with:
        finding_id: $.finding_id
        node_id: $.resolved_finding.node_id
      timeout: $.verify_timeout
      # Expected run outputs written by handler:
      # verification:
      #   {
      #     converged: bool,
      #     finding_still_present: bool,
      #     remaining_related: int
      #   }
      execution:
        idempotency: safe_retry
        resume_policy: retry

  onFailure:
    actor: cluster-doctor
    action: doctor.mark_failed
    with:
      finding_id: $.finding_id
