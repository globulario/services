    - filesystem
    - runbook
  content: |
    Use this runbook when a cluster node has a non-OS disk that contains a Windows/NTFS
    partition you want to shrink to free space for a new ext4 partition (typically for
    MinIO at /mnt/data).

    Tools required: `ntfs-3g` package (for ntfsresize, ntfsfix), `parted`, `e2fsprogs`
    (for mkfs.ext4). All present on Globular nodes by default.

    WORKS ON: a non-root disk (the OS lives on a different physical device).
    DOES NOT APPLY TO: the OS root disk; LVM volumes; disks currently in use by another
    Globular service (you'd need to stop that service first).
