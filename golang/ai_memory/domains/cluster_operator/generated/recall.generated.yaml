- id: ops.runbook.republish-artifact-data-after-pool-change
  type: SKILL
  title: Re-publish artifact data after a MinIO pool topology change
  tags:
    - day-2
    - objectstore
    - repository
    - runbook
  content: |
    Use this runbook after `globular objectstore topology apply` has
    successfully reformed the pool (standalone → distributed, or
    adding nodes). Symptoms that you need this:

      - `globular package list --kind SERVICE` shows fewer artifacts
        than the repository's Scylla index claims should exist.
      - `globular package install <name>` fails with "blob not found"
        for artifacts that the repository says are PUBLISHED.
      - `mc ls <minio-alias>/artifacts` returns empty or shows fewer
        objects than `cqlsh -e 'SELECT COUNT(*) FROM repository.artifacts'`.

    Three orthogonal sources of truth here — keep them straight:

      1. Repository Scylla index (`repository.artifacts` table) — the
         catalog of "what artifacts the repository thinks exist".
      2. MinIO blob storage (`artifacts/` bucket) — the actual bytes.
         AUTHORITATIVE for whether an artifact is installable.
      3. Local POSIX CAS (`/var/lib/globular/repository/blobs/`) — the
         per-node receipt cache that the repository's local-receipts
         reconciler uses to verify MinIO contents.

    A topology change does NOT touch (1) — the Scylla index is
    independent of MinIO topology — but it CAN orphan (2). The
    local-receipts reconciler will eventually flag every PUBLISHED
    artifact whose blob no longer resolves through the new pool, and
    the repository will surface those as findings.
  related_ids:
    - ops.day-1.minio.topology-contract
    - ops.day-1.minio.apply-flow
    - ops.role.repository
    - ops.role.repository.dependencies
  seed_sha256: faafbc9c1d3adacecd8fc225b360e635b5f3f7d3fe616dfc3a084d87376c5802
- id: ops.runbook.restore-from-backup
  type: SKILL
  title: Restore cluster state from backup (etcd / ScyllaDB / MinIO)
  tags:
    - day-2
    - disaster-recovery
    - runbook
  content: |
    Use this runbook when you have lost one or more of:
      - etcd (cluster config + service registry, founding-quorum dependency)
      - ScyllaDB (ai-memory, workflow correlation state, repository index)
      - MinIO (artifact blobs and any user-data buckets)

    Constraints (read these before touching anything):

      - Restore order is STRICT: etcd → ScyllaDB → MinIO. Higher layers
        read from lower layers; restoring out of order produces dangling
        references the system will then try to "self-heal" by deleting
        things you just restored.

      - Each store has its own backup mechanism. There is NO unified
        "globular cluster restore" command — that intentional gap forces
        the operator to think about which truth is being recovered.

      - Repository index (Scylla) and artifact CAS (MinIO) MUST be
        restored from backups taken at the same point in time, or the
        repository's local-receipts reconciler will quarantine artifacts
        whose blob is missing.

      - ai-memory seed entries (metadata.source=seed) are reseeded
        automatically from the awareness bundle on the next ai-memory
        start — you do NOT need to restore them. But user/runtime
        memories (source=agent or human) DO need a Scylla backup.

    Mental model: walk the four truth layers bottom-up.
      Layer 0 (PKI + bootstrap) is on local disk under /var/lib/globular/pki/
        — restore from filesystem backup or re-bootstrap if first 3 nodes
        come up clean.
      Layer 1 (etcd) — restore from etcd snapshot, then start exactly one
        node, verify, expand the cluster.
      Layer 2 (ScyllaDB) — restore via scylla-manager from the matching
        backup_id. RF rules apply: a 3-node restore needs all 3 nodes up
        before reads return correct data.
      Layer 3 (MinIO) — restore from `mc mirror` backup or external object
        replica. Repository's local-receipts loop will re-validate.
      Layer 4 (workload services) — restart in dependency order; the
        release reconciler will reconcile from the active BOM.
  related_ids:
    - ops.day-0.cluster.what-exists
    - ops.day-1.join.founding-quorum-invariant
    - ops.day-2.audit-and-event-stream
    - ops.role.repository.dependencies
  seed_sha256: 62634eb27d227155803a476df30b5614ef05738097a600d451d3189cc5b67fa0
- id: ops.runbook.rotate-pki-certificates
  type: SKILL
  title: Rotate PKI certificates — service certs and the cluster CA
  tags:
    - day-2
    - pki
    - security
    - runbook
  content: |
    Two scenarios, very different processes:

    **Service cert rotation (automatic, every ~1 year)**:
    - Each node-agent's `reconcileTLS` loop checks cert expiry every cycle
    - Renews when remaining TTL < 40% of original
    - Uses the cluster CA at `/var/lib/globular/pki/ca.crt`
    - You don't initiate this; you VERIFY it happens

    **Cluster CA rotation (manual, infrequent — every few years or on suspected compromise)**:
    - The CA is the trust anchor for ALL cluster-internal mTLS
    - Naive rotation = every cert becomes untrusted simultaneously = total cluster outage
    - Must use overlap rotation: new CA exists alongside old; new certs issued from new
      CA; both CAs trusted in trust bundle; old certs expire naturally; eventually old
      CA can be removed
  seed_sha256: 835ef3816fb4d00c2aad6c45106d3c96881632719b798d058bd671ac77b5b8b4
- id: ops.runbook.safe-minio-topology-restart
  type: SKILL
  title: Safe MinIO restart when topology (drive count) has changed
  tags:
    - day-2
    - objectstore
    - hazard
    - runbook
  content: |
    USE THIS BEFORE running `systemctl restart globular-minio.service` on
    ANY storage-pool node where the topology has been changed (node added,
    node removed, drive count changed, pool mode changed standalone↔distributed).

    WHY THIS RUNBOOK EXISTS — incident 2026-05-10:
      Operator restarted MinIO on ryzen+dell to pick up a new 3-node
      env config, expecting Kubernetes-style rolling restart semantics.
      MinIO instead reformatted all three drives into a fresh deployment
      (new deployment ID), wiping 921 MiB / 203 objects. The original
      data persisted ONLY because the repository service holds a local
      POSIX CAS copy independent of MinIO. Without that, the loss would
      have been complete and unrecoverable.

    WHY MinIO IS NOT KUBERNETES PODS:
      MinIO requires format consistency across the whole erasure set.
      When argv-drives disagrees with on-disk format-drives:
        a. Most common: FATAL "drive already used in another erasure
           deployment. (Number of drives specified: N but the number of
           drives found in the Kth drive's format.json: M)" — service
           enters restart loop.
        b. If the new-config nodes reach quorum first (≥ ceil(N/2)
           drives online with the new argv), MinIO will REFORMAT every
           drive in the set into the new deployment, generating a new
           deployment ID. format.json is rewritten on every drive.
           Bucket directories persist but are empty. Object data gone.
      Path (b) is silent — no big warning, no operator confirmation.

    THE GOLDEN RULE:
      Before restarting MinIO on a node where topology has changed:
        1. Compare argv-drives vs on-disk format-drives.
        2. If they differ, take an `mc mirror` backup FIRST.
        3. Stop ALL MinIO instances (not rolling).
        4. Reformat using the documented full-pool procedure.
        5. Restore data via `mc mirror` after the new pool is healthy.

    The "rolling restart" mental model from Kubernetes / etcd / ScyllaDB
    does NOT apply to MinIO when drive count changes.
  related_ids:
    - ops.day-1.minio.topology-contract
    - ops.day-1.minio.apply-flow
    - ops.day-1.minio.vip-contamination
    - ops.runbook.republish-artifact-data-after-pool-change
    - ops.runbook.add-node-to-minio-pool
  seed_sha256: fba5db11fc0ab8a735e4c2ab6951d0f2cbf484632d36cef3947568720c7120f3
