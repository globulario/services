    - awareness
    - runbook
    - ai
  content: |
    The AWG sidecar (`awg serve`) runs the gRPC server and a managed Oxigraph store
    (http://localhost:7878). On an empty store it auto-loads the embedded seed
    (`awareness-graph/golang/server/embeddata/awareness.nt`) unless started with `--no-seed`.
    After YAML/annotation changes you rebuild the graph so the live store reflects them.

    **Trigger this runbook when:**
    - `awg metadata` shows `coverage_state=EMPTY` (or `triple_count` 0), or briefings return
      `DEGRADED`
    - `awg metadata` shows `seed_state=STALE`
    - `docs/awareness/*.yaml` or `docs/intent/**/*.yaml` were updated and the graph needs to
      reflect the changes

    **Note:** both `briefing(file=<repo-relative-path>)` and `briefing(task=<description>)`
    are supported (file XOR task). File-anchored briefings return direct invariants;
    task-only briefings rely on keyword matching + implementation patterns.

    **Repos involved:**
    - `services/` — YAML sources: `docs/awareness/`, `docs/intent/`
    - `awareness-graph/` — `awg` CLI, yaml2nt converter, embeddata, server
  seed_sha256: e385bf2ae110906c36d5f25b95f9f06436883e54589174e228a5d9c9453921dd
- id: ops.runbook.minio-stale-topology-proposal
  type: DEBUG
  title: Stale destructive MinIO topology proposal — detect and remove
  tags:
    - day-1
    - day-2
    - objectstore
    - minio
    - topology
    - hazard
    - footgun
  content: |
    ## Background: the .minio.sys wipe safety contract

    The only way a `topology apply` wipes `.minio.sys` is ALL of the following are true:
      1. A TopologyTransition record exists in etcd
      2. TopologyTransition.IsDestructive = true
      3. TopologyTransition.Approved = true  (written by `topology apply --i-understand-data-reset`)

    No local inference, no auto-wipe, no recovery mode that bypasses this.
    The controller enforces this at `applyObjectStoreTopologyRequest`.

    Even with a stale proposal in etcd, data is ONLY at risk if an operator
    explicitly runs `topology apply --proposal <id> --i-understand-data-reset`.
    A stale proposal cannot self-apply.

    ## Symptoms of a stale proposal

    `globular objectstore topology plan` shows a proposal from an earlier generation
    (before the current generation was applied), or `etcdctl get` reveals a proposal
    whose `generation` field is less than the current applied_generation.

    Doctor finding: none directly. The stale proposal does NOT fire a doctor CRITICAL.
    It is a silent footgun detectable only by inspection.

    ## How to detect

    1. List all topology proposals in etcd:
         etcdctl get /globular/objectstore/topology/proposals/ --prefix --keys-only

    2. Inspect each proposal for staleness:
         etcdctl get /globular/objectstore/topology/proposals/<proposal_id>

       Look for:
         - "status": "proposed"  (never applied)
         - "is_destructive": true  (would wipe .minio.sys if applied)
         - "generation": N where N < current applied_generation

    3. Get the current applied generation to compare:
         etcdctl get /globular/cluster/minio/applied_generation

       Or via CLI: globular objectstore topology status

    ## When is a proposal stale (and safe to delete)?

    A proposal is stale-and-safe-to-delete when:
      - Its target generation < current applied_generation  (the cluster moved on)
      - OR its target topology matches the already-applied topology exactly
        (same nodes, same drives, same mode — the plan would be a no-op)
      - AND status is "proposed" (not "applying" or "applied")

    If a proposal's status is "applying" — do not delete it. The workflow may be in
    flight. Check workflow status first.

    ## How to delete a stale proposal

    etcdctl del /globular/objectstore/topology/proposals/<proposal_id>

    Verify it is gone:
      etcdctl get /globular/objectstore/topology/proposals/ --prefix --keys-only

    ## Post-deletion verification

    1. Run `globular objectstore topology status` — should show CONVERGED with current
       applied_generation matching desired_generation.
    2. Run `globular cluster doctor --category objectstore` — no new findings should appear.
    3. Verify MinIO is healthy: `mc admin info local`

    ## Incident context (2026-05-15)

    A proposal with id 8593bc754432 was found with:
      - is_destructive: true
      - status: proposed
      - generated BEFORE generation-1 was applied (the first distributed apply)

    The proposal was created when disk approvals were run for 5 nodes, planning a
    distributed topology before any node had yet applied. After generation-1 was applied
    successfully, the proposal was never cleaned up by the controller.

    The proposal was safely deleted with `etcdctl del`. Topology remained CONVERGED,
    doctor found 0 objectstore findings, MinIO remained healthy throughout.

    ## TODO (controller improvement)

    The controller should auto-expire proposals whose target_generation < applied_generation.
    Until then, operators must check for stale proposals manually after any topology apply
    that superseded an earlier plan.
  related_ids:
    - ops.day-1.minio.topology-contract
    - ops.day-1.minio.apply-flow
    - ops.day-1.minio.restart-hazard
  seed_sha256: 951317f94c00e1f57437b114397cc3d313812d41dea723a838c0d2613620b51f
- id: ops.runbook.recover-day-0-bootstrap-failure
  type: SKILL
  title: Recover from a failed day-0 bootstrap
  tags:
    - day-0
    - recovery
    - bootstrap
    - runbook
  content: |
    Day-0 bootstrap has 4 distinct phases that can fail independently:

    1. **PKI generation** — CA + service certs created under /var/lib/globular/pki/
    2. **etcd start** — single-node etcd with TLS on 2379
    3. **node-agent start** — systemd unit, mTLS-enabled, listens on 11000
    4. **cluster-controller start** — leader-of-self, listens on 12000, writes its own
       service config to etcd

    Identify WHICH phase failed before attempting recovery — fixing the wrong layer
    compounds the failure.
  seed_sha256: e8f2db6da9efaa378c25fd7e09084688b71a9a88156cb4fd2fae114e3ae9ae72
- id: ops.runbook.recover-etcd-member-eviction
  type: SKILL
  title: Recover from an evicted or stale etcd member
  tags:
    - day-1
    - day-2
    - etcd
    - incident-recovery
    - runbook
  content: |
    Symptom: a node that should be in the etcd cluster is missing from `etcdctl member list`,
    OR is listed but `unstarted`. Possibly accompanied by:
    - Cluster running fine on the remaining members
    - The "missing" node's globular-etcd.service is failing or running but cannot rejoin
    - cluster-doctor finding `etcd.member.missing` or `etcd.cluster.under_quorum`

    The 2026-05-10 keepalived-enable incident is the canonical example: a healthy etcd
    member was evicted by removeStaleMembers because PrimaryIP() returned the floating VIP
    (not the stable member URL), and the legacy bootstrap name didn't match the modern
    sanitized hostname. The member was wrongly classified as stale.
  seed_sha256: a50842da6db9b041e0c7f72b504926492b411f98e6b5f3e096226d03ee9170cb
- id: ops.runbook.recover-failed-platform-upgrade
  type: SKILL
  title: Recover from a failed platform upgrade
  tags:
    - day-2
    - deploy
    - incident-recovery
    - runbook
  content: |
    Use this runbook when `globular platform-upgrade vX.Y.Z` reports failures
    OR when a subset of packages stays on the previous version after the upgrade
    command exits.

    Symptoms:
      - `globular cluster nodes status --output json` shows nodes with
        mixed `installed_versions` across the cluster.
      - `globular workflow runs --status FAILED --since 1h` lists release
        workflows that did not reach SUCCEEDED.
      - cluster-doctor surfaces `release.workflow.failed` or
        `convergence.installed_versus_desired` findings.

    Constraints:
      - The release BOM at /globular/release/active is the desired-state
        truth. We do NOT roll it back — a failed upgrade is recovered
        forward (by retrying or by publishing a corrected release).
      - Repository VERIFIED → INSTALLED is the only legal flow. Manual
        installs that bypass the workflow leave installed_state unstamped
        and cluster-doctor will flag the divergence.

    Mental model:
      Workflow failure usually means ONE of three things broke:
        1. A node was unreachable when the per-package release-apply step
           ran. Re-dispatching the workflow once the node is back is safe.
        2. The artifact's signature/checksum could not be verified against
           the repository. The workflow ABANDONED the package.
        3. A health gate (e.g. controller leader handover) failed. The
           workflow is BLOCKED waiting for operator unblock.
  related_ids:
    - ops.day-1.deploy.pipeline-overview
    - ops.day-1.deploy.platform-upgrade
    - ops.day-1.deploy.version-reservation-lock
    - ops.runbook.deploy-controller-fix
  seed_sha256: 75e3714eaec8707beb0b066b96212f9c199b33390bf36756b1385f1908ade4ab
- id: ops.runbook.recover-keepalived-vip-loss
  type: SKILL
  title: Recover from a lost or flapping keepalived VIP
  tags:
    - day-1
    - day-2
    - keepalived
    - vip
    - incident-recovery
    - runbook
  content: |
    Symptom: external traffic to https://<VIP>:443 fails (timeout, refused, or wrong cert).
    OR: the VIP is bouncing between two nodes faster than ~1 transition per minute.

    Three common causes:
    1. **No node is healthy enough to win the election** — all keepalived health checks
       failing → no MASTER → VIP unassigned
    2. **Cert SAN mismatch** — VIP holder serves a cert without the VIP in SANs → external
       clients see x509 errors → looks like a VIP failure but isn't
    3. **VRRP partition** — interface change, firewall rule, or VLAN issue is preventing
       VRRP advertisements from being seen → split brain (multiple MASTERs)
  seed_sha256: b123246f56c451fd5b99477f328446e920c44df019a682c9028e0d3c16654d2b
- id: ops.runbook.recover-stuck-topology-apply
  type: SKILL
  title: Recover from a stuck objectstore topology apply
  tags:
    - day-1
    - day-2
    - objectstore
    - incident-recovery
    - runbook
  content: |
    Use this runbook when `globular objectstore topology apply` returns:
      Error: timeout waiting for controller to process apply request

    The CLI submitted the request to etcd at /globular/objectstore/topology/apply_request,
    but the controller's apply-watcher goroutine is dead on every node. The drain only fires
    on a leader's controller startup — so we restart controllers in sequence until the new
    leader's drain catches the queued request.
