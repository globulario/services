- id: ops.role.ai-executor
  type: ARCHITECTURE
  title: ai-executor — diagnoses, acts (within bounds), records
  tags:
    - day-1
    - day-2
    - ai-executor
    - role
  content: |
    **What it is**: The acting hand of the AI tier. Receives incidents from ai-watcher,
    classifies them, executes auto-remediation when safe, escalates when not, records the
    outcome to ai-memory.

    **Port**: 10230 (gRPC over mTLS).

    **What it OWNS**:
    - Incident classification by tier (0/1/2)
    - Action execution via typed gRPC RPCs (NEVER shell-out)
    - Outcome recording to ai-memory (the single auto-write path that today's session
      observed)
    - Escalation to operator for Tier 2 incidents

    **What it MUST NOT do**:
    - Construct shell commands — typed RPCs only. If an action lacks a typed API, it MUST
      NOT be done by AI. This is the strongest rule in `ai-operating-rules.md`.
    - Bypass RBAC — ai-executor has its own service account with scoped permissions; it
      cannot escalate
    - Take Tier 2 actions without explicit human approval — even a Tier 2 plan goes through
      a gate
    - Write to AI Memory entries with `provenance.source = seed` (those are immutable)
  seed_sha256: 95bf37e94c57312d89a9950be46c0d1e260eb4a945e818588635212c2f073a4a
- id: ops.role.ai-executor.three-tier-permissions
  type: ARCHITECTURE
  title: Three-tier permission model
  tags:
    - day-1
    - day-2
    - ai-executor
    - security
    - tiers
  content: |
    Every action has a TIER that determines who can execute and when:

    **Tier 0 — OBSERVE** (always safe, AI may do freely):
    - Read-only: doctor reports, node-agent inventory, etcd reads, log queries
    - No state mutation
    - Used during diagnosis phase before any action

    **Tier 1 — AUTO_REMEDIATE** (pre-approved, AI executes without human in the loop):
    - Restart a single service unit (`globular cluster service restart <name>`)
    - Clear a stale local cache
    - Re-trigger a workflow that was correctly converged but locally evicted
    - Idempotent and reversible operations

    **Tier 2 — REQUIRE_APPROVAL** (always needs human gate, even from AI):
    - Anything destructive: wipe a disk, delete a cluster member, force-rollback a release
    - Anything wide-blast-radius: stop a leader controller, change topology, rotate the CA
    - Anything that affects external state: Let's Encrypt cert rotation, DNS provider change

    **Failsafe rule**: if AI services are down, the cluster keeps running through
    deterministic convergence. AI is supplementary, never required. Operationally, the
    tier model means: a critical alert isn't blocked by ai-executor being down — it
    surfaces in doctor findings and waits for human action.
  seed_sha256: 116a92f2a4f16d850187b37f764ee65098d0e184b3a73a43f61d97b914194a6c
- id: ops.role.ai-executor.action-recording
  type: ARCHITECTURE
  title: Every action produces a memory entry
  tags:
    - day-1
    - day-2
    - ai-executor
    - ai-memory
    - audit
  content: |
    The single sanctioned write path from runtime cluster events into AI Memory:

    ```
    doctor finding / node-agent event
                   ↓
              ai-watcher (subscribe + aggregate)
                   ↓
              ai-executor (classify + act + record)
                   ↓
              ai-memory.Store(type=DEBUG, tags=[incident, <finding-id>],
                              metadata={action:..., outcome:..., principal:'ai-executor'})
    ```

    Every entry's `provenance.source = "incident"` (NOT "seed"). The principal in
    metadata is "ai-executor" so future audit can distinguish auto-recorded from
    seed entries from session entries from human entries.

    Today's session observed exactly ONE such entry (scylla-manager-agent crash → restart
    → succeeded), proving the pipeline works but doesn't fire consistently. Most cluster
    events are NOT today reaching ai-watcher — see `failure_modes.yaml:
    ops_knowledge.seeder_workflow_skipped` for one part of the gap (doctor was overloaded).

    Operator query for these auto-recorded incidents:
    ```
    globular memory query --project globular-services --tags incident
    ```
    Or via MCP:
    ```
    mcp__globular__memory_query(project="globular-services", tags="incident")
    ```
  seed_sha256: 455541ca02ee197cc4a56c25d56a66e3eb9df5374f372f66aedd05d6193a9191
- id: ops.role.ai-memory
  type: ARCHITECTURE
  title: ai-memory — persistent cluster knowledge base
  tags:
    - day-1
    - day-2
    - ai-memory
    - role
  content: |
    **What it is**: Durable, queryable knowledge store for everything the cluster has
    learned about itself. Backed by ScyllaDB (RF=3) so it survives single-node failure.

    **Port**: 10200 (gRPC over mTLS).

    **What it OWNS**:
    - Memory entries with rich metadata: id (UUID), project, type (one of 10), title,
      content (markdown), tags, metadata (KV map), related_ids (bidirectional graph),
      reference_count, created_at, updated_at, ttl_seconds (optional)
    - Full-text search across title and content
    - Project namespacing (multiple projects per cluster, e.g. `globular-services`,
      `customer-app-foo`)
    - Bidirectional linking — set `related_ids` on one entry, the reverse link is
      materialized automatically

    **Memory types** (per docs/ai/ai-services.md):
    - FEEDBACK — user correction or validation
    - ARCHITECTURE — what the cluster IS (definitional, durable)
    - DECISION — choices made and their rationale
    - DEBUG — observed bug + diagnosis + fix (incident-level)
    - SESSION — conversational context, resumable
    - USER — preferences and profile of an operator
    - PROJECT — context about the work the operator is doing
    - REFERENCE — pointers to external systems (Linear, Grafana, etc.)
    - SCRATCH — ephemeral notes (TTL'd, low confidence)
    - SKILL — codified procedure / runbook

    **Provenance** (every entry MUST declare):
    - `source` — one of: `seed` (from operational-knowledge bundle), `incident` (from
      ai-watcher → ai-executor pipeline), `session` (saved by an operator/agent),
      `human` (direct write, audit-logged)
    - For `source = seed`: also `seed_version` and `seed_sha256` for integrity verification
  seed_sha256: 11e6496be9f7d28b80d9480e73631f96f6d539f5e50a183761f55a57ad31b0cf
- id: ops.role.ai-memory.immutability-layer
  type: ARCHITECTURE
  title: ai-memory immutability — seed entries are protected
  tags:
    - day-1
    - day-2
    - ai-memory
    - integrity
    - security
  content: |
    Seed entries (provenance.source == "seed") are IMMUTABLE at runtime. The ai-memory
    Update and Delete RPCs MUST reject requests that target a seed entry unless the
    caller's gRPC principal is exactly `seeder` (the day-1 seeder workflow's service
    account).

    Why: operational knowledge is the AI's source of truth for incident response. A
    poisoned seed entry could cause future AI sessions to recommend wrong remediations.
    The seed must be cryptographically verifiable against the awareness bundle.

    Allowed write paths to seed entries:
    - SeederWorkflow with `seeder` principal — runs after every awareness bundle install
      OR awareness bundle version change. Idempotent: same id + same sha256 = noop;
      same id + new sha256 = upsert.

    Forbidden write paths (return PERMISSION_DENIED with audit log):
    - Any human-direct write (operator, sa, admin role) — even sa cannot mutate seed
      entries; the design is "ship a new awareness bundle to change the seed"
    - Any write from ai-executor — incident remediations create new memories with
      `source = incident`, never overwrite seed knowledge
    - Any write from CLI tools that don't carry the `seeder` principal

    Drift detection:
    - cluster-doctor runs the `ops_knowledge.seed_integrity` invariant every cycle
    - For each seed-source entry, recompute SHA256 of the canonical-form content,
      compare to the awareness bundle's manifest
    - On drift: emit `ops_knowledge.seed_drift_post_install` finding (severity=warning,
      ADVISORY, never gates reconciliation)
  seed_sha256: f4cd02fd3cda2b47f4f80bf924dd92a49f6b3f2bc181356b01a59879a24f5c3a
- id: ops.role.ai-memory.failure-modes
  type: DEBUG
  title: ai-memory — common failure modes
  tags:
    - day-1
    - day-2
    - ai-memory
    - debug
  content: |
    **Symptom: ai-memory RPCs hang or return Unavailable**
    → ScyllaDB lost quorum. Memory cannot serve writes (CL=QUORUM by default). Restore
      ScyllaDB before troubleshooting ai-memory itself.

    **Symptom: `globular memory query --tags seed` returns empty**
    → Seeder workflow has not run. See failure_mode `ops_knowledge.seeder_workflow_skipped`.
      Check controller scheduled the seeder; check workflow service shows the run; check
      ai-memory was healthy at run time.

    **Symptom: `globular memory query` returns entries but they're missing recent incidents**
    → ai-watcher → ai-executor → ai-memory pipeline broken. Check ai-watcher is subscribed
      to doctor and node-agent events; check ai-executor is processing incidents and
      writing back. See ops.role.cluster-doctor.feedback-loop.

    **Symptom: doctor reports `ops_knowledge.seed_drift_post_install`**
    → A seed entry's content drifted from the bundle's manifest. Either someone bypassed
      the immutability layer (investigate audit log) OR the on-disk YAML at
      `/var/lib/globular/operational-knowledge/` was hand-edited (re-install the
      awareness bundle). Re-running the seeder heals the entry.
  seed_sha256: fed9b9805879c4538bf01a7f3d9bb2ee85c05ee843bd62230d92ff21f40d9062
- id: ops.role.ai-router
  type: ARCHITECTURE
  title: ai-router — dynamic LLM/MCP routing for AI requests
  tags:
    - day-1
    - day-2
    - ai-router
    - role
  content: |
    **What it is**: Routes AI requests (from operators, agents, or other Globular services)
    to the appropriate downstream — local MCP tools, remote MCP peers, LLM providers, or
    cluster-internal AI services.

    **Port**: 10240 (gRPC over mTLS).

    **What it OWNS**:
    - Provider catalog (Anthropic, OpenAI, local Ollama, etc.) — per-cluster config
    - Tool/MCP routing table (which MCP server has which tools)
    - Per-request quota enforcement and cost tracking
    - Fallback ordering when a primary provider fails

    **What it DOES NOT do**:
    - Store request content (that goes to ai-memory if the caller asks)
    - Make decisions about WHICH AI service to invoke (that's the caller's job)
    - Bypass auth — every routed request carries the original principal forward

    **Why it exists**: prevents every Globular service from needing direct LLM SDKs and
    direct provider credentials. Providers are configured centrally; rotation, quota, and
    cost tracking are all in one place.
  seed_sha256: 0fbb1da5e3aeae0e7815291275cad5ad39a9397145ce549abb84e7fddf2b81fb
- id: ops.role.ai-router.failure-modes
  type: DEBUG
  title: ai-router — common failure modes
  tags:
    - day-1
    - day-2
    - ai-router
    - debug
  content: |
    **Symptom: AI requests fail with "no provider available"**
    → All configured providers are down or over quota. Check `globular ai-router status`.
      If Anthropic/OpenAI is the primary, verify network reachability AND credentials.

    **Symptom: requests routed to a removed MCP server**
    → Routing table is stale. ai-router subscribes to /globular/mcp/nodes/ in etcd; if
      the watcher died (similar pattern to the objectstore-apply-watcher we hit), the
      routing table never updates. Restart ai-router to force refresh.

    **Symptom: cost/quota mismatches reality**
    → ai-router's local accumulator may have lost a tick during a restart. Reconcile via
      `globular ai-router reconcile-quota` (Tier 2 — needs operator approval).
  seed_sha256: 757912e8f6913f70404536b1973a1a3f7ce4dc81be99d896e7b50c1fcb398228
- id: ops.role.ai-watcher
  type: ARCHITECTURE
  title: ai-watcher — event bridge between cluster and AI tier
  tags:
    - day-1
    - day-2
    - ai-watcher
    - role
  content: |
    **What it is**: The eyes of the AI tier. Subscribes to streams from cluster-doctor and
    node-agent event publishers, aggregates raw events into structured incidents, and
    forwards incidents to ai-executor.

    **Port**: 10210 (gRPC over mTLS).

    **What it OWNS**:
    - Subscriptions to upstream event streams (doctor's findings, node-agent service.*
      events, workflow events)
    - Incident aggregation rules (e.g., "5 service.crashed in 30s = crash-loop incident")
    - Confidence scoring (single event → low; pattern match → medium; doctor-correlated → high)
    - Forwarding to ai-executor with classification hints

    **What it DOES NOT do**:
    - Take action — ai-watcher is OBSERVATIONAL only
    - Modify cluster state
    - Make decisions about what to remediate
    - Write to ai-memory directly (ai-executor records the incident outcome)

    **Failure modes**:
    - If ai-watcher is down: ai-executor sees no events; incident pipeline goes dark.
      Cluster still heals through deterministic convergence — AI observability is supplementary.
    - If subscriptions are dropped: events accumulate in upstream services until GC;
      on reconnect, ai-watcher does NOT replay history — events in the gap are lost.
      The doctor finding catalog is the authoritative state for "what's wrong now";
      use `mcp__globular__cluster_get_doctor_report(freshness="fresh")` to recover context.
    - If ai-watcher is overwhelmed by event flooding (common when doctor has the event
      amplification bug): check for 100+ identical events/min; see
      `ops.role.cluster-doctor.event-amplification`.
  seed_sha256: 45141954f437ecb069c8ceca4aeceac8df2b872b402312a7ebf60ca6b4356ca6
- id: ops.role.ai-watcher.aggregation-discipline
  type: DECISION
  title: ai-watcher aggregation rules — avoid event flooding ai-executor
  tags:
    - day-1
    - day-2
    - ai-watcher
    - throttling
  content: |
    Without aggregation, a flapping service would generate hundreds of incidents per
    minute, each prompting ai-executor to act. The aggregation discipline:

    - **Rate limit per finding-id**: same finding-id within 60s is folded into one incident
    - **Crash-loop detection**: 5+ service.crashed for the same unit in 5min → one
      crash-loop incident; subsequent crashes are correlated to that incident, not new ones
    - **Doctor correlation**: if a doctor finding fires AND a related node-agent event
      fires within 30s, fold them into one incident with both as evidence
    - **Confidence threshold**: only forward incidents with confidence >= MEDIUM unless the
      finding has severity=critical (then forward immediately)

    Operator implication: if you see ai-executor "doing nothing" about a clear problem,
    check ai-watcher's aggregation. The incident may be queued waiting for the rate-limit
    window to close, or the confidence might be below threshold.
  seed_sha256: 399fb54579d7b1a9530eaac80c38244541eece238426f86ef466554d01f07e43
- id: ops.role.awareness-graph
  type: ARCHITECTURE
  title: awareness-graph (AWG) — standalone sidecar knowledge graph of codebase intent
  tags:
    - always
    - awareness-graph
    - role
  content: |
    **What it is**: AWG answers questions about a codebase — what invariants a file must
    uphold, which failure modes it is involved in, which fixes are forbidden, which tests
    pin the contract, and which architectural intent governs it. It is the AI agent's
    primary preflight tool before non-trivial edits.

    **Status (since 2026-06-12)**: AWG was extracted from Globular and now runs as a
    **standalone sidecar tool** living in the `awareness-graph` repo. The services repo no
    longer imports it, packages it, registers it in etcd, or manages its version with the
    reconciler. The old `globular awareness ...` CLI subcommands and the platform MCP
    awareness tools (including `awareness_diagnose`) were deleted. Do NOT look for a
    `globular-awareness-graph` package, an Envoy route, or a component-catalog entry — none
    exist anymore.

    **Three moving parts** (all in the awareness-graph repo):
    1. **`awg` CLI** — ~30 subcommands (query, build, authoring, validation, gating, eval).
    2. **`awg serve`** — starts the gRPC server (default `:10120`) AND a managed Oxigraph
       SPARQL store (default `127.0.0.1:7878`) as one unit. No Docker required.
    3. **`awareness-mcp` bridge** — a stdio MCP server that re-exposes the gRPC service as
       the seven `mcp__awg__*` tools an agent calls.

    **Backend**: Oxigraph (single-binary SPARQL store, RocksDB-backed). The server binary
    embeds a compiled `awareness.nt` seed; on startup it loads the seed if the store is
    empty.

    **What it OWNS**:
    - The RDF graph of invariants, failure modes, forbidden fixes, required tests, intents,
      the architectural spine (Component/Boundary/Contract/Decision/Evidence), design/
      implementation patterns, meta-principles, and `@awareness` code-symbol annotations.
    - The seven gRPC RPCs (see `ops.role.awareness-graph.rpcs`).

    **What feeds the graph** (build pipeline, not runtime): `@awareness` annotations in Go
    source + `docs/awareness/*.yaml` + `docs/intent/*.yaml`, compiled by
    annotation-scanner → yaml2nt → loadnt → Oxigraph. See the
    `awareness-graph-operations` stage entries.
  related_ids:
    - ops.role.awareness-graph.rpcs
    - ops.role.awareness-graph.tool-decision-tree
  seed_sha256: 573973908d22c0dd991d72a7d41dc0ec0f24aeb00eb5c90c38ae1620caebe4f2
- id: ops.role.awareness-graph.rpcs
  type: REFERENCE
  title: awareness-graph — the seven RPCs and seven MCP tools
  tags:
    - always
    - awareness-graph
    - rpcs
    - agent-usage
  content: |
    AWG exposes **seven** gRPC RPCs. The `awareness-mcp` bridge re-exposes each as one
    `mcp__awg__*` tool. There is no `awareness_diagnose` tool anymore (removed with the
    extraction), and `globular awareness ...` no longer exists — use the `awg` CLI.

    | # | RPC / MCP tool | Use it to… |
    |---|---|---|
    | 1 | `Briefing` · `mcp__awg__awareness_briefing` | get ~500-token prose context for a file or task — **call first** |
    | 2 | `Impact` · `mcp__awg__awareness_impact` | get the same anchors as typed nodes (no prose) |
    | 3 | `Preflight` · `mcp__awg__awareness_preflight` | get a typed `risk_class` + actions to branch on before reading |
    | 4 | `EditCheck` · `mcp__awg__awareness_edit_check` | warn (advisory) if a proposed edit's content violates an in-scope rule |
    | 5 | `Resolve` · `mcp__awg__awareness_resolve` | fetch one node by `class` + bare `id` (expand a referenced_id) |
    | 6 | `Query` · `mcp__awg__awareness_query` | typed/whitelisted browse (`by_file`/`by_id`/`by_class`/`related`) — **no raw SPARQL** |
    | 7 | `Metadata` · `mcp__awg__awareness_metadata` | graph-level coverage/freshness; disambiguate an EMPTY briefing |

    **CLI equivalents** (run the standalone binary from the awareness-graph repo):
    ```bash
    awg briefing --file golang/cluster_controller/reconciler.go
    awg briefing --task "fix etcd key permissions"
    awg impact   --file golang/cluster_controller/reconciler.go
    awg preflight --task "rotate the service CA" --file golang/security/ca.go
    awg edit-check --file golang/foo/bar.go --content-file -    # content on stdin
    awg resolve invariant install.result.atomic_commit
    awg query --mode by_class --class invariant --limit 5
    awg metadata
    ```

    **Domain scoping**: when the graph hosts more than one repo domain, Briefing / Impact /
    Preflight / EditCheck MUST be scoped with `--domain`/`domain=` or they fail closed
    (never mix domains). A single-domain graph resolves an empty domain trivially.
  related_ids:
    - ops.role.awareness-graph
    - ops.role.awareness-graph.preflight
    - ops.role.awareness-graph.edit-check
    - ops.role.awareness-graph.metadata
    - ops.role.awareness-graph.tool-decision-tree
    - ops.role.awareness-graph.write-path
  seed_sha256: 3bd7898a42c129fc770f77544c1712886daa03f8ddb5b0e70dca31b4c6bc751d
- id: ops.role.awareness-graph.status-handling
  type: DEBUG
  title: awareness-graph — interpreting ok / empty / degraded status
  tags:
    - always
    - awareness-graph
    - debug
    - agent-usage
  content: |
    Every Briefing / Impact / Preflight response carries an explicit status. Handle each
    case differently.

    **OK** — direct anchors found. Treat the returned invariants, failure modes, forbidden
    fixes, and required tests as active context. Resolve any referenced_id marked
    `high`/`critical` before writing code.

    **EMPTY** — no direct anchors for this file/task. This is NOT proof the edit is safe.
    Say explicitly "no direct awareness anchors found for <target>", then call
    `awareness_metadata`: if the graph is healthy overall, the silence is probably real; if
    counts are low, the empty means nothing. Proceed by reading the code, nearby tests, and
    docs.

    **DEGRADED** (or a transport error) — the AWG sidecar is unavailable. Do NOT make
    high-risk architectural changes without explicit user approval. Fall back to code,
    tests, docs, and runtime state, and say so.

    Common degraded causes (sidecar model — no Envoy/etcd involved):
    1. `awg serve` is not running, or the MCP bridge can't reach it on `--awareness-addr`
       (default `localhost:9090`; the server's own default listen port is `:10120`).
    2. Oxigraph is up but the store is empty (seed load failed or was skipped).
    3. `awareness.degraded_source_sentinel_collapsed_to_critical` — AWG running outside a
       git checkout emits false-critical coverage telemetry. These are false positives and
       do NOT affect Briefing/Impact/Resolve quality.

    **Operator recovery**:
    ```bash
    # Is the sidecar up and is its store populated?
    awg metadata                         # triple_count, coverage_state, seed_state
    awg seed-status --require-current     # does the live store have the embedded seed?

    # Restart the sidecar (it manages its own Oxigraph):
    awg serve --no-seed &                 # or without --no-seed to load the embedded seed

    # Raw triple count if needed:
    curl -s 'http://localhost:7878/query' \
      -H 'Accept: application/sparql-results+json' \
      --data-urlencode 'query=SELECT (COUNT(*) AS ?n) WHERE { ?s ?p ?o }'
    ```

    **Required end-of-response template** (append to every non-trivial task response):
    ```
    AWG: preflight(<task>) -> <risk_class> | briefing(<files>) |
         invariants: <ids> | forbidden-fixes avoided: <ids> |
         tests run: <ids> | proposed: <kind/id or none> | uncertainty: <what you couldn't verify>
    ```
  related_ids:
    - ops.role.awareness-graph
    - ops.role.awareness-graph.rpcs
  seed_sha256: 14f1d45bf1d1fb563dd16c90441eb9f9dbdeb7b851b4d5bb9af79a59daccedaa
- id: ops.role.awareness-graph.tool-decision-tree
  type: REFERENCE
  title: awareness-graph — which tool to call for which situation
  tags:
    - always
    - awareness-graph
    - agent-usage
  content: |
    Seven tools are reachable via the `awg` MCP bridge. Pick the right one; do NOT default
    to `briefing` for everything.

    | I am about to… | Call | Why |
    |---|---|---|
    | Decide whether/how to touch an area | `awareness_preflight(task=…, files=[…])` | typed `risk_class` + `confidence` to branch on before reading prose |
    | Edit a specific file | `awareness_briefing(file=<path>)` | direct anchors + intent + patterns for that file |
    | Chain on file anchors (no prose) | `awareness_impact(file=<path>)` | typed nodes, cheaper to process |
    | Sanity-check a concrete edit's content | `awareness_edit_check(file=, proposed_content=)` | advisory warning if the edit's shape violates a rule (never blocks) |
    | Expand a `referenced_id` | `awareness_resolve(class=<Class>, id=<bare-id>)` | full node text + provenance anchor |
    | Tell "no rule here" vs "graph thin here" | `awareness_metadata` | triple/node counts, coverage_state, build/seed freshness |
    | Operator/debug browse | `awareness_query(mode=…)` | typed/whitelisted — no raw SPARQL |

    **Anti-patterns:**
    - Treating a `briefing`/`preflight` `EMPTY` as "no risk" — call `metadata` first; an
      empty over a thin graph means nothing. `EMPTY` is never `LOW_RISK`.
    - Using `briefing(task=)` for a file you already know — use `briefing(file=)`;
      file-anchored briefings return direct invariants, task-only ones rely on keyword
      matching + patterns.
    - Looking for `awareness_diagnose` or `globular awareness ...` — both were removed in
      the extraction. Use the `awg` CLI and the seven `mcp__awg__*` tools.

    **Common chains:**
    - Pre-edit, file known: `briefing(file=)` → `resolve` high/critical referenced_ids →
      edit → optional `edit_check` → run required_tests.
    - Pre-edit, file unknown: `preflight(task=, files=[best guesses])` → branch on
      `risk_class` → `briefing(file=)` per file if not LOW_RISK.
    - After a fix that taught something durable: `awg propose --kind … --contract …`
      (see `ops.role.awareness-graph.write-path`).
  related_ids:
    - ops.role.awareness-graph.rpcs
    - ops.role.awareness-graph.preflight
    - ops.role.awareness-graph.edit-check
    - ops.role.awareness-graph.metadata
    - ops.role.awareness-graph.write-path
  seed_sha256: f1517816f91a8db66800165b735aca45e24e2239f364a14c1b02bf65788e2f10
- id: ops.role.awareness-graph.preflight
  type: SKILL
  title: awareness-graph Preflight — pre-edit risk classifier (file/task → risk_class)
  tags:
    - always
    - awareness-graph
    - preflight
    - agent-usage
  content: |
    Preflight is the agent's branch-able pre-edit RPC. Where Briefing returns prose,
    Preflight returns a typed `risk_class` so the agent can decide what to do
    *programmatically* before reading anything.

    **Input:** `task` (free-form; required if no files), `files` (repo-relative paths;
    optional but recommended), `mode` (`compact` default / `standard`), `domain` (scope).

    **`status`:** `OK` (≥1 anchor or ≥1 pattern) · `EMPTY` (zero anchors AND coverage
    sufficient) · `DEGRADED` (store unavailable; `risk_class=UNKNOWN_IMPACT`).

    **`risk_class` (branch on this):**
    - `LOW_RISK` — proceed; action list short/empty
    - `ARCHITECTURE_SENSITIVE` — read `files_to_read`; brief every file in the edit set
    - `CONVERGENCE_RISK` — touches the desired/installed/runtime/repository truth model
    - `SECURITY_RISK` — auth/tokens/PKI/RBAC/secret keys → user approval required
    - `DATA_LOSS_RISK` — install/wipe/rollback/migration → user approval required
    - `UNKNOWN_IMPACT` — graph cannot classify (degraded or sparse) → behave as
      SECURITY_RISK until proven otherwise

    **`confidence`:** `HIGH` (≥3 direct anchors AND coverage sufficient) · `MEDIUM` (1–2
    anchors OR strong pattern) · `LOW` (anything else, incl. degraded).

    **Action lists (bounded by mode):** `required_actions`, `forbidden_fixes`,
    `tests_to_run`, `files_to_read`, `blind_spots`; plus a `coverage` summary with a
    load-bearing `sufficient` flag.

    **CLI:** `awg preflight --task "rotate the service CA" --file golang/security/ca.go`
    **MCP:** `mcp__awg__awareness_preflight`

    **Critical rule:** EMPTY does NOT mean LOW_RISK. The server only collapses to EMPTY
    when coverage is explicitly sufficient; otherwise it returns OK with
    `risk_class=UNKNOWN_IMPACT` and populated `blind_spots`. Always read BOTH `status` and
    `risk_class`.
  related_ids:
    - ops.role.awareness-graph.rpcs
    - ops.role.awareness-graph.tool-decision-tree
  seed_sha256: f31ff651731cb7b5cdade40f6b5686bc281dad3313c44615de7795bb311c8785
- id: ops.role.awareness-graph.edit-check
  type: SKILL
  title: awareness-graph EditCheck — advisory edit-time guard (never blocks)
  tags:
    - always
    - awareness-graph
    - edit-check
    - agent-usage
  content: |
    EditCheck evaluates a proposed edit's CONTENT against the active repo-scoped advisory
    rules (`detect` blocks) that apply to the file. It is **warning-only**: it never blocks
    and never modifies code. Use it as a cheap sanity check on a concrete diff before you
    apply it.

    **Input:** `file` (repo-relative), `proposed_content` (full file or edited region — the
    MCP bridge accepts up to 8 MB), `domain` (scope; required on a multi-domain graph).

    **Output:** `warnings[]` (each naming `rule_id`, `class` = Invariant|ForbiddenFix,
    `severity` = warning, `message`, `detail` = which pattern tripped, `provenance`,
    `enforcement` = warn|block) and `rules_evaluated` (distinguishes "checked, clean" from
    "nothing to check").

    **CLI:** `awg edit-check --file golang/foo/bar.go --content-file -` (content on stdin),
    or `--content "<inline>"`.
    **MCP:** `mcp__awg__awareness_edit_check`

    **Related: `awg gate`** runs EditCheck over the added/changed lines of a git diff and
    reports which findings WOULD block — also advisory by default. `awg gate --contracts
    <file> --enforce` is the only mode that can exit non-zero (frozen-contract gate, no
    server needed). EditCheck itself is always advisory.
  related_ids:
    - ops.role.awareness-graph.rpcs
    - ops.role.awareness-graph.tool-decision-tree
  seed_sha256: 3dc4f2f7ac9a6af65e626ed023fcd1e9ecc935b9ba0d307eb71f405a42855b8f
- id: ops.role.awareness-graph.write-path
  type: SKILL
  title: awareness-graph write path — record a scar with `awg propose` (contract-first)
  tags:
    - always
    - awareness-graph
    - authoring
    - agent-usage
  content: |
    When a fix taught you something durable — a new failure mode, an invariant you
    clarified, a forbidden fix you ruled out, a regression test that pins it — record it
    with ONE typed call. This is the supported write path; it is CLI-only by design (not an
    MCP tool) so a human stays in the loop.

    ```bash
    awg propose --kind failure_mode --title "Stale seed served after reload" \
      --contract "reload must serve fresh triples" \
      --related-invariant awareness.seed_reload_must_be_fresh \
      --source-file golang/server/reload.go \
      --required-test golang/server/reload_test.go:TestReloadFresh \
      --evidence "observed stale node after PUT"
    ```

    `--kind` is one of `failure_mode | invariant | required_test | forbidden_fix |
    contract_unknown`. `propose` appends the entry to the right YAML source, rebuilds the
    seed, reloads the local store, and `git add`s the change — then STOPS. **It never
    commits — you review and commit.**

    It is **contract-first**: every entry must answer what contract was violated/clarified,
    what failure was observed, what test proves it, what fix is forbidden, and which
    invariant/failure_mode it connects to. Vague notes are rejected (`validation_failed`).
    If the contract is genuinely unknown, use `--kind contract_unknown` with
    `--proposed-contract` or `--revision-request`; the entry is parked under
    `docs/awareness/candidates/` outside the active build until resolved.

    **Stop-hook reminder**: `awg feedback-check` (wired as a Claude Code `Stop` hook) is
    advisory — it warns when a session changed risky code or added an incident/regression
    test but wrote no graph feedback. It NEVER blocks. A session that already proposed
    feedback (or changed nothing risky) stays silent.
  related_ids:
    - ops.role.awareness-graph.rpcs
    - ops.role.awareness-graph.tool-decision-tree
  seed_sha256: 212c715a73a895ce12dcfb73be067da6271ac7f60c9524a38ab3dc64b7303ee8
- id: ops.role.awareness-graph.metadata
  type: REFERENCE
  title: awareness-graph Metadata — graph coverage and freshness signals
  tags:
    - always
    - awareness-graph
    - metadata
    - agent-usage
  content: |
    `Metadata` reports graph-level coverage and freshness — NOT per-file context. Call it
    once per session (or per task) to disambiguate an `EMPTY` briefing: "graph well-covered,
    this area really has no rules" vs "graph thin everywhere, an empty means nothing".

    **Server-side verdicts (interpret these, not the raw counts):**
    - `coverage_state` — `EMPTY` / `THIN` / `SUFFICIENT`
    - `seed_state` — `CURRENT` / `STALE` / `UNSTAMPED`
    - `build_provenance_state` — `STAMPED` / `DEV` / `INCOMPLETE`

    **Useful raw fields:** `triple_count` (healthy graphs run ~15k–18k), per-class counts
    (`invariant_count`, `failure_mode_count`, `intent_count`, …), `source_file_count`,
    `code_symbol_count`, build provenance (`graph_build_commit`, `source_repo_commit`),
    and the architectural-spine counts (`component_count`, `contract_count`, …).

    **How to interpret:**
    - `coverage_state=EMPTY` / `triple_count` < 1000 → store empty or nearly so; rebuild
      (see the awareness-graph-operations stage / runbook).
    - `coverage_state=SUFFICIENT` and an EMPTY briefing → trust the empty; this area is
      genuinely unannotated.
    - `seed_state=STALE` → live store predates the current embedded seed; reload additively
      with `awg seed-status` then a `loadnt`/`awg rebuild`.

    **CLI:** `awg metadata`     **MCP:** `mcp__awg__awareness_metadata`
    Cheap: bounded SPARQL. Safe to call once per session.
  related_ids:
    - ops.role.awareness-graph.rpcs
    - ops.role.awareness-graph.tool-decision-tree
    - ops.role.awareness-graph.status-handling
  seed_sha256: 2f83c2a396d8d966959d8788f5f9ee17075702e7df462f575413a6935af98437
- id: ops.role.awareness-graph.coverage-philosophy
  type: ARCHITECTURE
  title: awareness-graph — coverage is selective by design (not blanket annotation)
  tags:
    - always
    - awareness-graph
    - authoring
    - philosophy
  content: |
    Awareness coverage is intentionally NOT uniform across the codebase. This is a design
    choice, not a backlog. Annotation effort has diminishing returns past a point and
    negative returns past another.

    **What SHOULD be annotated** — knowledge code cannot express by itself: incident lineage
    ("this exists because v1.2.141 shipped unverified"), cross-file invariants, forbidden
    fixes, ordering constraints not enforced by types, authority boundaries, hidden
    cross-cutting effects (VIP/PrimaryIP pollution, etcd key semantics, cert SANs).

    **What should NOT be annotated** — self-explanatory or type-enforced code: generated
    proto/gRPC stubs, pure helpers, self-documenting CRUD, tests. Annotating these dilutes
    signal-to-noise and trains agents to skim briefings.

    **Why selective annotation is safe:** an `EMPTY` briefing on an uncovered file is not a
    green light. Pair it with `awareness_metadata` (is the graph healthy overall?) and, for
    anything non-trivial, `awareness_preflight` — which returns `UNKNOWN_IMPACT` rather than
    `LOW_RISK` when coverage is thin, so the agent is told to proceed carefully instead of
    assuming safety. (Note: the old runtime-correlating `awareness_diagnose` composite no
    longer exists; coverage discipline now lives in Preflight + Metadata.)

    **For annotation authors:** ask "does removing this annotation lose knowledge the code
    itself cannot express?" If yes, annotate. If no, don't. The cost of a noisy graph is
    paid by every agent on every call; the cost of a missing annotation is paid only when an
    incident reveals it. Annotate after incidents, not before — see
    `ops.role.awareness-graph.write-path`.
  related_ids:
    - ops.role.awareness-graph
    - ops.role.awareness-graph.metadata
    - ops.role.awareness-graph.write-path
  seed_sha256: 99b9f3e2d5f653460eb262af4d1b6b611a489b72c1f652848630767bbae5a725
- id: ops.role.cluster-controller
  type: ARCHITECTURE
  title: cluster-controller — central control plane
  tags:
    - always
    - cluster-controller
    - role
  content: |
    **What it is**: The decision-making brain of the cluster. Runs on every `control-plane`
    profile node; one is elected leader via etcd lease.

    **Port**: 12000 (gRPC over mTLS). DNS: `<hostname>.globular.internal:12000`.

    **What it OWNS** (sole authority — no other service writes these):
    - Cluster membership state (which nodes exist, their profiles, status)
    - Desired releases per service (what version SHOULD be running where)
    - ObjectStoreDesiredState at `/globular/objectstore/config`
    - Topology transition records and apply-request processing
    - Release reconciliation dispatching workflows to nodes
    - ACME cert management (via embedded `domain` package)

    **What it MUST NOT do** (security boundary, enforced by `make check-services`):
    - `os/exec` of any kind (no shell-out)
    - `syscall` use (no direct kernel calls)
    - `systemctl` invocation (delegate to node-agent)
    - Direct package installation (delegate to node-agent)
    - Bypass the workflow service for cluster mutations

    **Decides, does not execute**: The architecture pattern is "controller decides, workflow
    coordinates, node-agent executes". Anything mutating systemd, packages, or the local
    filesystem on a node MUST go through node-agent.

    **High availability**: Multi-leader-eligible via etcd lease at `/globular/cluster_controller/leader/`.
    Leader address published at `/globular/cluster_controller/leader/addr`. Followers proxy
    writes to the current leader.

    **Critical state in etcd**:
    - `/globular/cluster_controller/state` — full in-memory mirror, periodically flushed
    - `/globular/cluster_controller/leader/<lease-id>` — current leader's lease
    - `/globular/cluster_controller/leader/addr` — current leader's host:port
    - `/globular/cluster_controller/epoch` — election epoch counter
  seed_sha256: faed384500e2bc093c02c1dda325c591cec3ae2de5e23803f1359683a8c4f743
- id: ops.role.cluster-controller.failure-modes
  type: DEBUG
  title: cluster-controller — common failure modes & first-look diagnostics
  tags:
    - always
    - cluster-controller
    - debug
  content: |
    **Symptom: workflow says 'no leader available'**
    → Read `/globular/cluster_controller/leader/addr`. If empty, etcd lease expired and
      election is in progress (~10s). If non-empty but the address is unreachable, that
      node is down — restart its controller and a new election fires.

    **Symptom: "release-workflow ... RUN_STATUS_FAILED" loop in journal (every ~30ms)**
    → A package release is failing fast and being retried unbounded. Check the workflow
      service logs for the specific failure cause. Common: missing artifact in repository,
      node-agent unreachable, package metadata mismatch. Until the underlying cause is
      fixed, this loop saturates the controller's CPU and may starve other goroutines
      (apply-watchers, reconcilers).

    **Symptom: an etcd-watching goroutine silently dies**
    → Search for `watch error` in the controller log. If etcd emits "mvcc compacted",
      many goroutines `continue` on the now-dead channel and never re-establish the watch.
      Recovery: restart the leader controller (drain runs on startup). See
      `runbooks/recover-stuck-topology-apply.yaml`. CODE FIX REQUIRED in each watch
      goroutine.

    **Symptom: split-brain — etcd says X is leader, but X's log says 'not leader'**
    → X's controller restarted recently; etcd lease still belongs to X but X hasn't
      re-claimed leadership in-memory yet. If it persists for >30s, restart X.

    **Symptom: a node's MinioJoinPhase is stuck at non_member after apply**
    → VIP-contamination class. See `failure_modes.yaml: vip_contamination.node_routable_ip_returns_vip`.
  seed_sha256: 8d640abccca4c23cc7b422a436cdaeaa8a6e43998d37f95c7a547a2368692e00
- id: ops.role.cluster-controller.restart-safe-policy
  type: DECISION
  title: When restarting a controller is safe vs requires care
  tags:
    - always
    - cluster-controller
    - recovery
  content: |
    **Safe to restart any time**: a non-leader controller. Election is already in equilibrium;
    restarting a follower triggers no leadership change. ~10s of leader-proxy reconnect noise.

    **Safe with brief disruption**: the leader controller. Restart triggers election (~10-15s
    with no leader). During that window: workflow dispatches queue, ACME refresh defers, drift
    reconciler pauses. Most user-facing services don't notice.

    **Requires sequence**: when multiple controllers need to be bounced (e.g., to recover
    stuck etcd watchers across all of them). Restart followers first so they have fresh
    goroutines, THEN restart the leader last — election picks among fresh-watcher candidates,
    and the new leader's drain catches any queued requests on startup.

    **Never bypass HA**: do NOT stop a leader without restarting it; do NOT delete the etcd
    leader key manually unless explicitly recovering from a stuck state (the leader key is
    lease-bound; deleting it just hastens election by a few seconds anyway).
  seed_sha256: 04016dd1b0d4cf6dc04d53e2d3ed48755d26d225dd0789e77781ace8f5b97254
- id: ops.role.cluster-doctor
  type: ARCHITECTURE
  title: cluster-doctor — operational awareness for the cluster
  tags:
    - day-1
    - day-2
    - cluster-doctor
    - role
    - operational-awareness
  content: |
    **What it is**: The diagnostic engine. Continuously checks invariants across the
    cluster and emits structured findings with severity, category, evidence, and
    remediation hints.

    **Port**: 12005 (gRPC over mTLS).

    **What it OWNS**:
    - Finding catalog (every diagnostic check has a stable `finding_id`, e.g.,
      `objectstore.minio.contract_missing`, `objectstore_topology_mismatch`,
      `etcd.member.split_brain`, `keepalived.vip_unassigned`)
    - Per-cycle scan results with freshness metadata (snapshot_age_seconds, source,
      observed_at)
    - Plan generation: for findings with safe remediations, generates a plan with risk
      assessment that ai-executor can execute (Tier 1) or escalate (Tier 2)

    **What it MUST NOT do**:
    - Apply remediations directly (that's ai-executor's role)
    - Hide findings (every finding must be visible regardless of severity)
    - Gate cluster reconciliation on its own findings (advisory only — see
      `convergence.no_infinite_retry`)
    - Treat its own findings as authoritative TRUTH; doctor reflects observed state, the
      underlying state is in etcd / systemd / live process

    **The three tiers** (see ai-executor):
    - Tier 0 (OBSERVE) — read-only diagnosis; always safe; doctor's primary mode
    - Tier 1 (AUTO_REMEDIATE) — pre-approved actions like restart-service,
      clear-stale-cache; ai-executor runs without human approval
    - Tier 2 (REQUIRE_APPROVAL) — destructive or wide-blast-radius; human approval gate
  seed_sha256: e01b8a6770c159587fbb2422fc26245956c3b732eb884ca3ec48ce4df4db7e7a
- id: ops.role.cluster-doctor.feedback-loop
  type: ARCHITECTURE
  title: doctor → ai-watcher → ai-executor → ai-memory feedback loop
  tags:
    - day-1
    - day-2
    - cluster-doctor
    - ai-services
    - observability
  content: |
    The closed loop that turns operational events into accumulated knowledge:

    1. **doctor** runs invariant checks, emits findings to its event stream and to etcd.
    2. **ai-watcher** subscribes to doctor's event stream + systemd events from node-agent.
       Filters/aggregates into incidents with confidence scores.
    3. **ai-executor** receives incidents, classifies action tier (0/1/2), executes Tier 1
       immediately, escalates Tier 2, observes outcome.
    4. **ai-memory** records: incident + classification + action + outcome + timestamp.
       Subsequent sessions can query these as `tags=incident,<finding-id>`.

    The operational awareness briefing (planned, not yet built) will:
    - Read doctor's current findings (current cluster state)
    - Query ai-memory for prior incidents matching those finding-ids (have we seen this
      before? what worked?)
    - Surface both to the operator / AI agent at the start of work

    Today's session showed the gap: doctor was overloaded (couldn't respond), and ai-memory
    had only 1 entry. The pipeline EXISTS but isn't running consistently. See
    `failure_modes.yaml: ops_knowledge.seeder_workflow_skipped` for one part of the gap.
  seed_sha256: 890bb634a4fd44a1acc8478467f08001d772d02a5631f0bdc55a604f3a2b30e8
- id: ops.role.cluster-doctor.key-invariants
  type: REFERENCE
  title: cluster-doctor — invariants it enforces and finding categories
  tags:
    - day-1
    - day-2
    - cluster-doctor
    - invariants
    - reference
  content: |
    cluster-doctor checks these categories of invariants every cycle. AI agents should
    know which finding IDs map to which category:

    **Identity / claims vs proofs** (`doctor.must_compare_claims_to_proofs`):
    - Services claim versions/states via heartbeat. Doctor verifies claims against
      proofs (SHA256 of running binary, systemd active status, actual mTLS cert SANs).
    - Finding IDs: `runtime_identity_unproven`, `service.old_pid_after_upgrade`,
      `unit_hash_drift`, `entrypoint_checksum_mismatch`

    **Convergence / desired vs installed** (`convergence.no_infinite_retry`):
    - Desired state diverges from installed for > threshold. Retries are never infinite.
    - Finding IDs: `release_workflow_retry_storm`, `service_version_drift`,
      `desired_not_converging`

    **Artifact layout** (`artifact.layout_contract`):
    - Unexpected directories under `/var/lib/globular/` that aren't in the canonical
      allowlist. Finding IDs: `unknown_state_dir`, `legacy_alias_dir`

    **Platform base allowlist** (current canonical list — NOT expandable without documenting why):
    `pki/`, `etcd/`, `config/`, `services/`, `node-agent/`, `cluster_controller/`,
    `state/`, `repository/`, `staging/`, `packages/`, `domains/`, `objectstore/`,
    `minio/`, `prometheus/`, `awareness/`, `operational-knowledge/`,
    `scylla-manager/`, `scylla-manager-agent/`, `mcp/`, `keys/`, `bootstrap.enabled`

    **Forbidden fix** (`forbidden.fix.layout_drift_by_expanding_allowlist_only`):
    Do NOT add a new directory to the allowlist just to silence the finding. Document
    WHY the directory belongs there AND add it to the canonical layout contract
    (`ops.artifacts.subdir-contract`). The allowlist is documentation, not a bypass.

    **etcd health** (`etcd.endpoint_reachability`):
    - Each cluster member's etcd peer connection is verified.
    - Finding IDs: `etcd_member_unreachable`, `etcd_member_split_brain`, `etcd_nospace`

    **PKI / certificates**:
    - TLS cert SAN set verified against cluster VIP, node hostnames, domain.
    - Finding IDs: `cert_sans_missing_vip`, `cert_expiring`, `ca_not_published`

    **ScyllaDB**:
    - ScyllaDB cluster registration with scylla-manager verified.
    - Finding ID: `scylla_manager.cluster_registered`
      (IDs: `scylla_manager_cluster_unregistered`)

    **Ops knowledge seed integrity** (`ops_knowledge.seed_integrity`):
    - Re-computes SHA256 of each seed entry and compares against bundle manifest.
    - Finding ID: `ops_knowledge.seed_drift_post_install` (severity=warning, advisory).

    **Hard-blocked actions never execute** (`doctor.hard_blocked_actions_never_execute`):
    - Doctor marks certain action categories as hard-blocked (never attempt auto-remediation).
      These include: topology apply, CA rotation, cluster membership changes.
      Hard-blocked findings are surfaced with severity=critical and escalated to Tier 2.
  seed_sha256: 4c272f80b4ae6b2b77fc1a18847deb85036b967e85c286f2c569d3b2c7053c7b
- id: ops.role.cluster-doctor.event-amplification
  type: DEBUG
  title: Doctor event amplification — the lookup cache vs delta authority split
  tags:
    - day-1
    - day-2
    - cluster-doctor
    - debug
    - incident
  content: |
    **Incident INC-2026-0004**: Doctor was emitting 100+ phantom finding events per minute
    because `cacheFindings` was using a SINGLE cache for two different purposes:
    1. Lookup deduplication (any scope: per-node, per-cluster, per-service)
    2. Delta authority (cluster-wide only: "emit this finding to the event stream")

    When the lookup cache was shared with cluster-wide delta authority, a per-node
    finding (e.g., "node ryzen has unknown_state_dir") would be treated as "not yet
    seen cluster-wide" on every cycle, even though it was already emitted. Result:
    100+ events/min for the same stable finding, flooding ai-watcher and overwhelming
    the event pipeline.

    **Fix**: Split the two caches:
    - Lookup cache: keyed by `(finding_id, scope, evidence_hash)` — any scope
    - Delta authority: keyed by `(finding_id, cluster-wide-scope, evidence_hash)` — cluster-wide ONLY

    **Impact on operations**: If doctor appears to be flooding ai-watcher with repeated
    identical events, suspect this pattern. Check the doctor version; if pre-a821e0fa,
    the fix has not been deployed. Force-deploy the latest cluster-doctor package.

    **Diagnosis**:
    ```bash
    journalctl -u globular-cluster-doctor.service | grep 'emit.*finding' | wc -l
    # If > 20 per minute for stable cluster, suspect event amplification
    ```
  seed_sha256: 0f733fe03e355c97d9dbae8cf861d3e25e9eb3ceec407444a98c71ca2e6085fa
- id: ops.role.cluster-doctor.failure-modes
  type: DEBUG
  title: cluster-doctor — common failure modes
  tags:
    - day-1
    - day-2
    - cluster-doctor
    - debug
  content: |
    **Symptom: doctor RPCs time out (both `fresh` and `cached`)**
    → Doctor's worker pool is starved. Most common cause: a flooding workflow loop in
      cluster-controller (e.g., release-workflow firing every ~30ms with RUN_STATUS_FAILED)
      is saturating the controller and choking doctor's snapshot generation. Fix the
      upstream loop first; doctor recovers when it can complete a snapshot.

    **Symptom: doctor reports findings that are clearly stale**
    → snapshot_age_seconds in the response will reveal it. If old, force fresh:
      `cluster_get_doctor_report freshness=fresh`. If still stale, check doctor's own
      cycle timer is running.

    **Symptom: doctor reports a finding repeatedly, ai-executor never auto-remediates**
    → Either the finding's tier is not in ai-executor's allowlist, OR ai-executor is
      unhealthy. Inspect ai-executor logs and its action history.

    **Symptom: auto-remediation is rate-limited or escalated and operators need quick visibility**
    → Check doctor report category counters:
      - `remediation_gate.cooldown` = findings currently blocked by cooldown window
      - `remediation_gate.escalated` = findings escalated after repeated cooldown rejects
    If `remediation_gate.escalated` > 0, operator approval token is required for execution.

    **Symptom: same finding-id keeps appearing across many sessions, never closed out**
    → The auto-remediation isn't sufficient OR the underlying invariant isn't being
      addressed. Promote it to a failure_mode in `docs/awareness/failure_modes.yaml` so
      future preflight surfaces the pattern at code-edit time.
  seed_sha256: 512567b3459103050d00ed7c8cf1432ba67e85716b3eaa4f4a2dc586e276248b
- id: ops.role.dns
  type: ARCHITECTURE
  title: dns — authoritative name service for cluster and optional public zones
  tags:
    - always
    - dns
    - role
  content: |
    **What it is**: Authoritative DNS service for Globular internal discovery
    (`*.globular.internal`) and optionally public domains delegated to the cluster.

    **Ports**:
    - gRPC API: `dns.DnsService` on 10006 (authoritative record store API)
    - Resolver: UDP/TCP 53 (answers DNS queries)

    **What it OWNS**:
    - DNS record storage semantics (A/AAAA/TXT/MX/NS/CNAME/SRV/CAA/SOA/...)
    - Authoritative serving behavior for managed zones
    - Internal naming records consumed by steady-state clients/services

    **What it does NOT own**:
    - Cluster membership authority
    - Service desired-state authority
    - Runtime health authority for infra services

    DNS is discovery substrate, not decision authority.
  seed_sha256: 79384d0533be897115cec19328fe5711029ca5d1ac21b56d6bdab20e81308d66
- id: ops.role.dns.bootstrap-boundaries
  type: DECISION
  title: Bootstrap boundary — when DNS must not be on the critical path
  tags:
    - always
    - dns
    - bootstrap
    - boundary
  content: |
    **Hard boundary**: During day-0/day-1 critical infra bootstrap, avoid using
    DNS names whose resolution depends on the very infra being bootstrapped.

    Example anti-pattern:
    - Configuring Scylla seed/peer bootstrap through a not-yet-stable name like
      `scylla.internal.globular`.

    Why this fails:
    - DNS readiness depends on control-plane/storage health.
    - Scylla/bootstrap readiness can depend on control-plane/storage progress.
    - This creates a chicken-and-egg dependency loop.

    Required strategy in bootstrap paths:
    - Use explicit stable node IPs from authoritative cluster state for first-hop
      substrate config (etcd/scylla/minio membership and seed lists).
    - Move to DNS-based discovery only after foundational infra reaches steady state.

    Practical rule:
    - **Bootstrap substrate**: explicit stable endpoints.
    - **Steady-state client discovery**: DNS names.
  seed_sha256: fb37b30d6d7ce57a0fbdc64b7b36106fd27843ec978f0db9433ba79fa6682354
- id: ops.role.dns.failure-modes
  type: DEBUG
  title: dns — common failure modes and operator checks
  tags:
    - always
    - dns
    - debug
  content: |
    **Symptom: record exists via gRPC but not via resolver**
    - Treat gRPC store as authority.
    - Investigate resolver reload/caching path.

    **Symptom: public resolver differs from authoritative resolver**
    - Compare in order: gRPC -> authoritative @dns node -> public resolver.
    - If authoritative is correct and public is stale, this is propagation/TTL.

    **Symptom: day-1 node joins but role records flap**
    - Ensure role records are not used as readiness proof during join transitions.
    - Validate node identity/stable IP publication path first.

    **Symptom: TLS/routing errors blamed on DNS**
    - Verify SAN and endpoint mode (mesh vs explicit backend endpoint).
    - DNS alone cannot fix identity mismatch.

    First checks:
    - `globular dns domains list`
    - `globular dns inspect <name> --types A,AAAA,TXT,SRV`
    - `dig +short <name> @dns.<domain>`
    - `dig +short <name> @8.8.8.8`
  seed_sha256: a96261a7b0bb1d44f3cac1b6fb6833ac092ad8459c1e054e9dd1cb2b64d718b4
- id: ops.role.ingress
  type: ARCHITECTURE
  title: ingress — external traffic edge and TLS termination plane
  tags:
    - always
    - ingress
    - gateway
    - envoy
    - xds
  content: |
    **Role**: Ingress accepts external client traffic and maps domain + SNI +
    path/host rules to cluster backends.

    **Composed path**:
    1. Authoritative DNS resolves domain.
    2. Certificate identity (SAN/CN) matches requested host.
    3. Envoy listener/route config is delivered from xDS intent.
    4. Upstream backend is selected and proxied.

    **Ingress is not authority**:
    - Not membership authority.
    - Not desired-state authority.
    - Not package/release authority.
    - Not identity authority.
  seed_sha256: 5e3e71c8edcbc0063fd26e17adbadf28d89a752e8d80816a032ca2ecca844ab2
- id: ops.role.ingress.ports-and-redirection
  type: DECISION
  title: Ports and redirection boundaries
  tags:
    - always
    - ingress
    - tls
    - ports
  content: |
    **Client edge**:
    - HTTP/HTTPS ingress enters at edge ports (80/443 by policy).
    - TLS termination is performed at ingress (Envoy/gateway path).

    **Control plane**:
    - xDS drives dynamic listener/route policy.
    - Keepalived/VIP is transport failover only, never identity authority.

    **Rule**:
    - Redirect behavior and listener wiring must be controlled by ingress spec +
      xDS state, not ad-hoc node-local static overrides.
  seed_sha256: 1f5c107dd4e22e1d3fd9d1968a3a6b5510553061b9c094c6e93ee1c612028880
- id: ops.role.ingress.acme-dns01
  type: DECISION
  title: ACME DNS-01 and PKI contract
  tags:
    - always
    - ingress
    - acme
    - dns
    - pki
  content: |
    ACME issuance requires:
    - domain delegated to authoritative NS that can answer `_acme-challenge` TXT;
    - writable DNS API path for TXT set/remove;
    - certificate storage/sync path to ingress runtime.

    PKI role in ingress:
    - certificate SAN set is the identity contract for served names;
    - routing convenience must not bypass SAN mismatch;
    - wildcard assumptions do not replace explicit SAN validation.

    Operational boundary:
    - If DNS authority is not delegated yet, ACME DNS-01 is expected to fail;
    - do not treat that as ingress runtime corruption.
  seed_sha256: 67da48f135631ddd9eba01e0f6778cf30603a1bde9cf12fa7a2fbf7fde421316
- id: ops.role.ingress.bootstrap-boundary
  type: DECISION
  title: When NOT to use ingress naming in bootstrap
  tags:
    - always
    - ingress
    - bootstrap
    - boundary
  content: |
    Do not make early substrate bootstrap depend on unresolved ingress/DNS names.
    Example anti-pattern: using `scylla.internal.globular` for first-hop seed/member
    wiring before DNS and control-plane are stable.

    Bootstrap rule:
    - infra membership/seeds use explicit stable endpoints from authoritative state;
    - ingress/domain routing is layered on top after foundational infra converges.
  seed_sha256: e790fd3526e4ce5a7fd64e894a263817c292147a1eed63da491c258ff2328ac8
- id: ops.role.mcp
  type: ARCHITECTURE
  title: mcp — Model Context Protocol server, 148+ operator tools over HTTP
  tags:
    - always
    - mcp
    - role
  content: |
    **What it is**: The primary interface between AI assistants (Claude Code, LLM agents)
    and the Globular cluster. Exposes 148+ typed, audited operator tools over HTTP with
    JSON-RPC, using the Model Context Protocol (MCP) standard.

    **Port**: 10260 (HTTP/MCP over TLS). Config: `/var/lib/globular/mcp/config.json`.
    Service unit: `globular-mcp.service`. Binary: `/usr/lib/globular/bin/mcp`.

    **Package kind**: INFRASTRUCTURE. Spec:
    `packages/metadata/mcp/specs/mcp_service.yaml`. The controller reconciler manages
    its version.

    **What it OWNS**:
    - The HTTP listener and MCP session lifecycle
    - Tool dispatch and routing to gRPC backends
    - Audit log of every tool call (configurable via `audit_log_path` in config)
    - The shared gateway client pool (`clientPool` in `golang/mcp/clients.go`) — a
      per-endpoint pool of mTLS gRPC connections, reused across all tool calls

    **Tool routing**: most tools route through the shared Envoy gateway client pool
    (`gatewayEndpoint()`) — Envoy's path-based routing forwards each gRPC call to the
    correct service regardless of which node it runs on. One exception: awareness tools
    (`awareness_briefing`, `awareness_impact`, `awareness_resolve`, `awareness_query`)
    use a direct-dial path via `awarenessEndpoint()` that reads the Address directly
    from etcd. See `ops.role.awareness-graph.routing` for why.

    **Tool categories** (from config `tool_groups`):
    - `cluster` — node membership, profiles, convergence, reconciliation
    - `doctor` — health reports, findings, drift, explanations
    - `nodeagent` — installed packages, service logs, service control, inventory
    - `repository` — artifact versions, manifests, publish, repair, rollback candidates
    - `backup` — backup/restore plans, schedules, MinIO buckets
    - `rbac` — role bindings, access validation, permission queries
    - `resource` — account/group/org identity context
    - `memory` — AI Memory store (query, get, store, update, delete)
    - `workflow` — run history, service status, diagnosis
    - `etcd` — direct get/put/delete on etcd keys (privileged — requires approval tier)
    - `monitoring` — Prometheus query, range query, alerts, targets
    - `browser` — remote Chrome automation (screenshot, evaluate, network, profiler)
    - `ai_executor` — AI job dispatch, peer listing, observation sharing
    - `cli` — full `globular` CLI execution via MCP (plan → validate → execute)
    - `proto` — gRPC service map and descriptor lookup
    - `composed` — multi-node MCP aggregator (remote cluster calls)
  seed_sha256: 83bc3ae2cd7d26a0557ce0065c188c0f430e52f284ac60542cb2fd3f9065e7e5
- id: ops.role.mcp.untracked-service
  type: DECISION
  title: mcp is untracked — no DesiredService record, outside the release pipeline
  tags:
    - always
    - mcp
    - deploy
    - untracked
  content: |
    **Untracked status**: The MCP server has NO `DesiredService` record in etcd. The
    cluster controller reconciler does not manage its desired version. It is NOT part of
    the automatic upgrade pipeline triggered by `platform-upgrade` or `repo sync --tag`.

    **Implication for operators**: MCP version changes require an explicit deploy action.
    The correct deploy sequence is:
    1. Build the package: use `mcp__globular__package_build` MCP tool
    2. Publish the artifact: use `mcp__globular__package_publish` MCP tool
    These tools go through the 4-layer model (Repository → Desired → Installed → Runtime).
    NEVER deploy MCP by copying the binary directly with `cp` or `scp` — manual copy
    bypasses the 4-layer model, skips the `.sha256` sidecar write, and causes the
    node-agent verifier to emit `hash_drift` findings permanently.

    **Why untracked**: MCP bootstraps before the full reconciler pipeline is available.
    Along with monitoring, repository, and torrent, it is one of 4 services that are
    installed outside the tracked release pipeline. This is a known architectural gap
    (see `project_next_priorities` in AI Memory).

    **Deploy via MCP tools** (the paradox: you use MCP to deploy MCP):
    ```
    # Build a new mcp package
    mcp__globular__package_build(package="mcp", bump="patch")

    # Publish to the repository
    mcp__globular__package_publish(package="mcp")

    # Node-agent then installs via convergence — no manual step required
    ```

    **Version reporting gap**: `globular deploy` does NOT inject ldflags. MCP binaries
    built via that path report `version=0.0.0-dev`. The correct path is `package_build`
    (CI/package pipeline) which injects the version via ldflags. Deployed binaries
    from CI will report the correct version.
  related_ids:
    - ops.role.mcp
  seed_sha256: 7e9cea354d1595bbf805b6f34d9c5b839f0c6030ba44cd8d389652c369c8d1a7
- id: ops.role.mcp.authentication
  type: REFERENCE
  title: mcp — authentication, tokens, and session management
  tags:
    - always
    - mcp
    - authentication
    - session
  content: |
    **Authentication flow**: MCP tools call gRPC backends that enforce the interceptor
    chain (auth → RBAC → audit). The MCP server passes the caller's JWT token as gRPC
    metadata (`"token"` key) on every backend call.

    **Getting a token**:
    ```bash
    globular auth login --user sa --password adminadmin
    # Token is cached at ~/.config/globular/token (60s expiry margin in memory)
    # Valid for cluster-admin-level operations
    ```

    **Token lifecycle**: Tokens are ephemeral and generated on demand. They are NEVER
    stored in etcd values, config files, or source code. The MCP server holds a cached
    token in memory and refreshes it before expiry. The cached token path is
    `~/.config/globular/token` for the `globular` user running the MCP process.

    **Session expired error**: If an MCP tool call returns `"invalid or expired session"`
    or `Unauthenticated`:
    1. The token expired and the cache miss happened before the MCP server could refresh.
    2. Recovery: call `globular auth login --user sa --password adminadmin` on the node
       running the MCP server, or restart the MCP service to force a fresh token fetch.
    3. In Claude Code: reconnect the MCP session by running `/mcp` in the terminal.

    **RBAC enforcement**: Every gRPC RPC has a `(globular.auth.authz)` annotation. The
    RBAC interceptor enforces permissions based on the token's role binding. Service
    account `sa` has cluster-admin role and can call all RPCs. Individual operator
    accounts may have narrower bindings — check with:
    ```
    mcp__globular__rbac_get_permissions_by_subject(subject="<username>")
    ```

    **Tool approval tiers** (from AI operating rules):
    - Tier 0 (OBSERVE): read-only — always safe, no token escalation needed
    - Tier 1 (AUTO_REMEDIATE): pre-approved actions (restart service, clear cache)
    - Tier 2 (REQUIRE_APPROVAL): human must approve before execution (etcd writes,
      node removal, topology changes, force-publish)

    **Audit log**: every MCP tool call is recorded in the audit log when `audit_log: true`
    in config. Default path: syslog/journal. A custom path can be set in
    `/var/lib/globular/mcp/config.json` under `audit_log_path`.
  related_ids:
    - ops.role.mcp
  seed_sha256: a40804c319ab56baea7142fd8c6ed0675cd51dfd23498d89c1e1c62f349b94da
- id: ops.role.mcp.failure-modes
  type: DEBUG
  title: mcp — common failure modes and first-look diagnostics
  tags:
    - always
    - mcp
    - debug
  content: |
    **Symptom: `globular-mcp.service` fails to start — 'address already in use' on :10260**
    → Orphaned `mcp_server` process (PPid=1, escaped systemd cgroup) is holding port 10260.
      Manual recovery: `sudo killall -9 mcp_server` on the affected node.
      The systemd unit has `ExecStartPre=+/bin/sh -c 'pkill -9 -x mcp_server || true'` to
      prevent this — if still failing, check unit file is up to date. MUST use `-x` (exact
      process name), never `-f` (`-f` matches parent shell argv and self-SIGKILLs).
      See failure_mode: `mcp.orphan_port_hold` (INC-2026-0002, INC-2026-0003).

    **Symptom: doctor reports `service.old_pid_after_upgrade` for mcp**
    → Root cause: node-agent anchors `InstalledUnix` to the PID start time (from
      `/proc/<pid>/exe` mtime). When the binary is updated while the service is running,
      the new binary's PID start time is newer than `InstalledUnix`, which triggers the
      `service.old_pid_after_upgrade` finding (severity: critical).
      Fix: `sudo systemctl restart globular-mcp.service` to get a fresh PID.
      This is expected after any MCP deploy — the restart clears the finding.

    **Symptom: deploy fails with sha256 mismatch**
    → The staging artifact cache is stale. Check for a stale artifact at:
      `/var/lib/globular/staging/core@globular.io/mcp/latest.artifact`
      Remove it to force re-download, then retry the install.

    **Symptom: awareness tools return HTML or 'text/html' content**
    → MCP is dialing the Envoy gateway for awareness-graph instead of the direct endpoint.
      Go's TLS suppresses the IP as SNI → Envoy gets empty SNI → returns wrong filter chain
      response (HTTP 200, HTML). Check `awarenessEndpoint()` in `golang/mcp/clients.go`
      reads `Address` from etcd, not the gateway address. Verify:
      ```
      globular etcd get /globular/services/awareness-graph/config
      # Should show a valid Address field like 10.0.0.63:10120
      ```

    **Symptom: mcp binary installed on Day-1 but `globular-mcp.service` is not running**
    → The mcp spec is missing a `start_services` step. This was fixed in
      `mcp_service.yaml` (INC-2026-0003). If observed on an older package version,
      manually start: `sudo systemctl start globular-mcp.service` and file a package
      update. See failure_mode: `mcp.day1_install_no_start`.

    **Symptom: MCP tools return `Unauthenticated` for all calls**
    → Token expired or MCP process lost its cached token. Restart the service:
      `sudo systemctl restart globular-mcp.service`
      If the issue recurs, check that etcd is reachable (token refresh requires etcd).

    **Symptom: MCP tool call times out for a specific service (e.g., repository)**
    → That service is down or Envoy can't route to it. Diagnose with:
      ```
      mcp__globular__cluster_get_health
      mcp__globular__nodeagent_get_service_logs(service="globular-repository.service")
      ```
      The MCP server itself is healthy; the issue is with the backend service.

    **Symptom: MCP reports `version=0.0.0-dev` for itself**
    → The binary was built without ldflags (e.g., via `globular deploy` or plain
      `go build`). This is a known CI gap — the binary functions correctly but version
      tracking is unreliable. The correct path is `package_build` + `package_publish`
      via the CI pipeline, which injects the version via ldflags.
  related_ids:
    - ops.role.mcp
    - ops.role.mcp.untracked-service
    - ops.role.awareness-graph.routing
  seed_sha256: 0e8527b79dcab2a0295f1d8c7308ae2ab72c0c50c912445614763c646c6d9062
- id: ops.role.node-agent
  type: ARCHITECTURE
  title: node-agent — per-node executor
  tags:
    - always
    - node-agent
    - role
  content: |
    **What it is**: The hands of the cluster on every node. Receives RPCs from
    cluster-controller and workflow service; executes them locally.

    **Port**: 11000 (gRPC over mTLS). DNS: `<hostname>.globular.internal:11000`.

    **What it OWNS** (sole authority for these on its own node):
    - Local systemd unit lifecycle (`os/exec` is allowed ONLY here, scoped to
      `internal/supervisor/`)
    - Local package installation under `/var/lib/globular/packages/` and `/usr/lib/globular/`
    - Heartbeats to controller (every 30s) and disk inventory rescan (every 5min syncTicker)
    - Local rendering of MinIO config (`distributed.conf` etc.) from etcd
      ObjectStoreDesiredState
    - Reporting installed-state to etcd (per-package metadata under
      `/globular/nodes/<node-id>/packages/<kind>/<name>`)
    - Enforcing the topology contract: starts MinIO ONLY when this node is in the
      published pool; stops MinIO when not

    **What it MUST NOT do**:
    - Make decisions about cluster-wide state (delegate to controller via RPC)
    - Write `/globular/objectstore/config` or other controller-owned etcd keys
    - Infer pool membership from local disk state (e.g., presence of `.minio.sys`)
    - Promote runtime observation to desired state (heartbeat is OBSERVATIONAL only)

    **Cadence**:
    - Heartbeat: every 30s (reports node identity, profiles, status, last error)
    - syncTicker: every 5min (re-reads installed packages, reconciles MinIO systemd config,
      rescans disks, fetches awareness bundle if stale)
    - Watcher events: continuous (systemd unit state changes published as service.* events)
  seed_sha256: 0a8ae747c2567a356b0cdfb4650c93627ee7a3e2322738d49520c319f0b5d20f
- id: ops.role.node-agent.dependencies
  type: ARCHITECTURE
  title: node-agent — what it depends on, what depends on it
  tags:
    - always
    - node-agent
    - dependencies
  content: |
    **node-agent depends on**:
    - etcd (read its own service config; write installed-state and disk candidates)
    - cluster-controller (callback target for heartbeats; receives release-workflow RPCs)
    - workflow service (executes apply-package workflows dispatched here)
    - local PKI material at `/var/lib/globular/pki/` (mTLS server identity)

    **node-agent does NOT depend on** (so day-0 bring-up works):
    - ai-memory, ai-watcher, ai-executor (AI tier is downstream of node-agent)
    - cluster-doctor (advisory; doctor reads node-agent state, not the reverse)
    - MinIO / object store (node-agent installs MinIO; the reverse would create a recovery
      deadlock — see failure_modes.yaml: repository.minio.recovery_cycle)

    **Services that depend on node-agent**:
    - cluster-controller (heartbeat liveness; release dispatch target)
    - workflow service (executes workloads on the local node)
    - cluster-doctor (reads installed-state, unit state)

    The asymmetry matters at day-0: node-agent must come up FIRST on the founding node,
    with NO dependencies on cluster services. Once it's up, it bootstraps everything else.
  seed_sha256: b2bfe36146fa4f017c41cc241f37ce5918d04296a1e9683028726b67a3e510ff
- id: ops.role.node-agent.failure-modes
  type: DEBUG
  title: node-agent — common failure modes & first-look diagnostics
  tags:
    - always
    - node-agent
    - debug
  content: |
    **Symptom: a node never appears in `globular cluster nodes list`**
    → Heartbeat isn't reaching the controller. Check on the node:
      - `systemctl status globular-node-agent.service` (running?)
      - `journalctl -u globular-node-agent.service | grep -i 'heartbeat'` (failures?)
      - DNS / mTLS: `globular cluster info` — does this node resolve `globular.internal`?
      - From the controller side: TLS SAN mismatch warnings if cert doesn't include
        this node's hostname (similar to the SAN issue noted earlier this session)

    **Symptom: a recently-attached disk doesn't show in `objectstore disk scan`**
    → syncTicker hasn't fired yet (5min interval). Either wait or restart node-agent.
      Loop devices are filtered out by design — never appear as eligible.

    **Symptom: MinIO won't start on a node that's in the pool**
    → minio-topology-gate logs explain why. Likely either (a) topology_contract holding it
      because the published desired-state is stale, or (b) `MinIO data directory not found`
      — verify `/mnt/data` exists and is owned by `globular:globular`.

    **Symptom: 'unit_hash_drift' status on globular-node-agent.service**
    → systemd unit content drift detected. Either someone hand-edited the unit file, or
      the package install left a stale drop-in. Re-deploy the node-agent package to
      re-render the canonical unit.

    **Symptom: 'pkill: not found' or 'self-SIGKILL on ExecStartPre'**
    → Known historical class. ExecStartPre uses `pkill -x <binary>` (NOT `-f`). `-f`
      matches the parent shell's argv → self-kill. The systemd unit lives in
      `globulario/packages/metadata/<svc>/{specs,systemd}/`, NOT just in the services
      repo. Sweeps in services don't reach package metadata — fix BOTH.
  seed_sha256: 39a6cbc23ed3abbd75b302ec8aa303f6ffb65398e89b696d54cf7542604cac25
- id: ops.role.repository
  type: ARCHITECTURE
  title: repository — package registry, MinIO-backed, ScyllaDB-indexed
  tags:
    - day-1
    - day-2
    - repository
    - role
  content: |
    **What it is**: The package registry for the cluster. Source of truth for "this version
    of this service exists, here is its content".

    **What it OWNS**:
    - Artifact metadata in ScyllaDB (publisher, name, version, build_id, build_number,
      platform, kind, sha256, size, dependencies, comment, publish_state)
    - Artifact CONTENT in the local MinIO `globular` bucket (immutable, content-addressed
      by build_id + version + platform)
    - Version allocation (`AllocateUpload` reserves the next `--bump` version with a
      5-minute TTL)
    - Upload, download, list, search, verify RPCs
    - Local installable receipts at `/var/lib/globular/repository/installable/` —
      operating-system-truth that "I have this version locally"
    - Quarantine state for untrusted upstream sources

    **Trust model** (per session_scylla_trust_model in user memory):
    - Scylla = INDEX (fast lookup, but never authoritative for "is this installed?")
    - Local POSIX CAS in MinIO = installable truth (the bytes either exist locally or
      they don't)
    - Upstream sources (e.g. GitHub releases) are quarantine-by-default; require explicit
      trust grant per-publisher

    **What it MUST NOT do**:
    - Mark a release as "available" or "installable" based on remote-only existence
    - Promote artifact metadata before the bytes are confirmed in local CAS
    - Bypass quarantine for any upstream source (even "trusted" ones must explicitly opt-in)
  seed_sha256: d64875b60f941497a971667926aa75e4368cc37d06fc060c217044737fc74d48
- id: ops.role.repository.dependencies
  type: ARCHITECTURE
  title: repository — dependencies and the recovery-cycle hazard
  tags:
    - day-1
    - repository
    - dependencies
  content: |
    **repository depends on**:
    - MinIO distributed pool (for blob storage)
    - ScyllaDB (for the metadata index)

    **Recovery deadlock hazard**:
    - node-agent depends on repository during package_install (RECOVERY phase)
    - repository depends on MinIO for blob reads
    - MinIO depends on node-agent to install its binary

    This forms a cycle during cluster recovery. The architectural fix:
    1. Repository MUST be able to serve metadata WITHOUT MinIO (metadata_first invariant) —
       ScyllaDB index alone is sufficient for "does this version exist".
    2. node-agent bootstrap uses `local_bom_cache` during recovery, NOT network repository.
    3. MinIO bootstrap uses a local BOM cache path, NOT network repository.

    Implication: never add a repository dependency on MinIO health for the read path.
    Never gate metadata responses on MinIO availability. The recovery cycle is real and
    has bitten the cluster before.
  seed_sha256: 0d36f96c8f7ef8577386bc9c1a68792be224ad27af7644eb4a1bf4388804b832
- id: ops.role.repository.failure-modes
  type: DEBUG
  title: repository — common failure modes
  tags:
    - day-1
    - repository
    - debug
  content: |
    **Symptom: deploy fails with `Unauthenticated`**
    → Token expired or missing. `globular auth login --user sa --password <pwd>`.

    **Symptom: deploy fails with `ResourceExhausted: version X already reserved`**
    → A previous deploy reserved that version and didn't complete. Wait for the printed
      TTL to expire (5min default), then retry. There's no early-release operator command.

    **Symptom: artifact appears in repository but never propagates to nodes**
    → release reconciler in cluster-controller is responsible. Check:
      - cluster-controller is healthy and is leader
      - `journalctl -u globular-cluster-controller.service | grep release-workflow.*<service>`
      - if no log entries appear, the controller didn't notice the new artifact;
        re-running deploy will trigger fresh dispatch

    **Symptom: download/install fails with sha256 mismatch**
    → The local CAS bytes drifted from the metadata. Either ScyllaDB schema corruption
      (rare) or someone manually wrote to the MinIO bucket. Run
      `globular repository repair-artifact` and investigate audit logs.

    **Symptom: 'CORRUPTED' state on a build**
    → entrypoint_checksum verification failed at install time. Triggered by the per-binary
      signing pipeline (cluster-controller signs build artifacts; node-agent verifies on
      install). See session_entrypoint_checksum_invariants in user memory.
  seed_sha256: 8a20c288867a27f936775c15bc7703b3c7a04a3f66d4e1153bfcf5f9c08d7e2c
- id: ops.role.workflow
  type: ARCHITECTURE
  title: workflow — the only path for cluster mutations
  tags:
    - day-1
    - day-2
    - workflow
    - role
  content: |
    **What it is**: The execution engine for state-changing cluster operations. Every
    meaningful cluster mutation (package installs, topology changes, certificate rotations,
    etcd member changes) MUST flow through a workflow run.

    **Port**: 10004 (gRPC over mTLS).

    **Why workflows, not direct RPCs**:
    - Idempotent — safe to replay on partial failure
    - Durable — run state persisted in etcd; survives controller restart
    - Auditable — every step recorded with timestamp + outcome
    - Coordinated — controller decides, workflow coordinates, node-agents execute
    - Terminal — every workflow reaches SUCCEEDED or FAILED (no zombies)

    **Workflow run states**:
    - PENDING — created, awaiting dispatch
    - DISPATCHING — in-flight to executor
    - RUNNING — executor (usually node-agent) is processing
    - SUCCEEDED — terminal; correlates with the convergence-committer writing installed-state
    - FAILED — terminal; the workflow's failure mode determines retry policy
    - DEFERRED — awaiting an event (per WF-DEFER B3/B4 — counter-tracked, ABANDONED if max attempts reached)

    **What it MUST NOT do**:
    - Spin forever — every workflow MUST terminate within its declared timeout
    - Bypass the controller's authority — workflows execute decisions, don't make them
    - Skip the convergence committer — installed-state is committed atomically with
      workflow success (see invariant `install.result.atomic_commit`)
  seed_sha256: 5372aa3ea3e575a2ac589ec3258ac4cb37528ca613b78d16b7faf3cca06177da
- id: ops.role.workflow.failure-modes
  type: DEBUG
  title: workflow — common failure modes
  tags:
    - day-1
    - day-2
    - workflow
    - debug
  content: |
    **Symptom: workflow stuck in DISPATCHING for >1 minute**
    → executor lease stall. The previous executor crashed without releasing its lease.
      Lease TTL is ~15 min; it auto-recovers but blocks all retries until then. Operational
      workaround: restart the workflow service to clear leases (use sparingly).

    **Symptom: same workflow correlation re-runs every ~30ms**
    → tight retry loop. The workflow's failure isn't being classified as deterministic.
      Look at the failure_mode in the workflow's last attempt. Common cause: missing
      artifact in repository, or node-agent unreachable. Fix the upstream cause; the
      workflow's retry stops naturally.

    **Symptom: workflow status SUCCEEDED but installed-state in etcd doesn't reflect it**
    → broke the atomic_commit invariant. Either the workflow lied about success, or the
      convergence-committer crashed mid-write. Force a re-run; if it persists, file a bug.

    **Symptom: workflow correlation marked ABANDONED**
    → max-attempt counter exceeded (per WF-DEFER B3 design). The workflow is permanently
      stuck. Investigate the underlying blocker; once cleared, manually clear the
      ABANDONED state via `globular workflow clear-abandoned <correlation>`.

    **Symptom: dispatch timeout under high control-plane churn**
    → control plane (controller + workflow + etcd) is overloaded. Look for the upstream
      cause (deploy storm? failed reconcile loop?). Workflow service is downstream of the
      controller's choices; fixing the controller's issue usually unblocks workflow.
  seed_sha256: d2820ac4e20b13dab67d90d8bb9cba4db7b02ed3a767eab64f8048df64568a6c
- id: ops.awareness.arch.build-pipeline
  type: ARCHITECTURE
  title: Awareness graph build pipeline — four stages
  tags:
    - always
    - awareness-graph
    - build-pipeline
  content: |
    The awareness graph is populated from two source types: code annotations and YAML files.
    The pipeline has four stages:

    ```
    @awareness annotations in Go source
        +
    docs/awareness/*.yaml  (invariants, failure_modes, incident_patterns, etc.)
    docs/intent/*.yaml     (200+ service intent files)
    awareness-graph/docs/awareness/*.yaml   (self-awareness)
        |
        v
    [1] annotation-scanner   → docs/awareness/generated/<pkg>_code_symbols.yaml
                                docs/awareness/generated/<pkg>_code_edges.yaml
        |
        v
    [2] yaml2nt              → awareness.nt  (N-Triples RDF serialization)
        |
        v
    [3] loadnt               → POST to Oxigraph graph store (http://localhost:7878)
        |
        v
    [4] awareness-graph gRPC → Briefing / Impact / Resolve / Query RPCs
                                → MCP tools / CLI / AI agents
    ```

    **Stage 1 — annotation-scanner**: Walks Go source files in `services/golang/`,
    finds `// @awareness` comment blocks, emits YAML stubs into
    `docs/awareness/generated/`. Also scans `docs/awareness/*.yaml` and
    `docs/intent/*.yaml` for cross-referencing.

    **Stage 2 — yaml2nt**: Reads ALL YAML sources (invariants, failure_modes,
    incident_patterns, intent files, generated code symbols/edges) and serializes
    them as N-Triples RDF. Output is a single `.nt` file.

    **Stage 3 — loadnt**: POSTs the `.nt` file to Oxigraph's graph-store endpoint
    (`/store?default`). IMPORTANT: POST *appends* to the existing graph. For a
    full refresh, you MUST DELETE the store first, then POST.
    ```bash
    # Full refresh (wipe + reload):
    curl -X DELETE http://localhost:7878/store?default
    curl -X POST -H "Content-Type: application/n-triples" \
         --data-binary @awareness.nt http://localhost:7878/store?default
    ```

    **Stage 4 — gRPC service**: awareness-graph reads from Oxigraph at startup and
    on each RPC. The binary also has an *embedded seed* (`awareness.nt` baked in at
    compile time) that it loads if Oxigraph is empty. This means a fresh install
    always has baseline knowledge, even before a cluster refresh runs.
  seed_sha256: 3010be501324bfe7be43efaf207819871a081a4dc746317e5e82a9fc70b0b0d6
- id: ops.awareness.init.cluster-refresh
  type: SKILL
  title: Refreshing the awareness graph (standalone sidecar)
  tags:
    - day-1
    - day-2
    - awareness-graph
    - runbook
  content: |
    Run this when source code or YAML intent/invariant files have changed and you want the
    running AWG sidecar to reflect the latest knowledge. AWG is a standalone sidecar (no
    Globular package / reconciler / `globular pkg publish` step anymore) — you rebuild the
    graph in place with the `awg` CLI.

    **Prerequisites:**
    - Both repos cloned as siblings:
      ```
      ~/Documents/github.com/globulario/
        services/
        awareness-graph/
      ```
    - Go toolchain installed; the AWG sidecar reachable (`awg serve` running, or start it).

    **Rebuild the graph from current sources (preferred):**
    ```bash
    cd ~/Documents/github.com/globulario/awareness-graph
    awg rebuild        # scan YAML -> N-Triples -> validate -> update embeddata -> reload Oxigraph
    awg rebuild --check  # CI: exit 1 if the committed embeddata/awareness.nt is stale
    ```
    `awg rebuild` updates `golang/server/embeddata/awareness.nt` AND reloads the live
    Oxigraph store. Use `--no-runtime-reload` to update the file only.

    **Manual reload (equivalent, if you prefer the raw pipeline):**
    ```bash
    cd ~/Documents/github.com/globulario/awareness-graph
    go run ./cmd/yaml2nt \
        -input ../services/docs/awareness -input ../services/docs/intent \
        -input ./docs/awareness -output /tmp/awareness.nt
    curl -X DELETE http://localhost:7878/store?default
    curl -X POST -H "Content-Type: application/n-triples" \
         --data-binary @/tmp/awareness.nt http://localhost:7878/store?default
    ```

    **Verify:**
    ```bash
    awg metadata                       # coverage_state SUFFICIENT, seed_state CURRENT
    awg seed-status --require-current   # live store contains the current embedded seed?
    ```
  seed_sha256: b12131d5d41218339b3e7f96e26f7603466f4a7de171ed93b4e32c8ed511656d
- id: ops.awareness.init.day0-seed
  type: REFERENCE
  title: Embedded awareness seed — baseline knowledge on a fresh store
  tags:
    - day-0
    - awareness-graph
    - bootstrap
  content: |
    The AWG server binary ships with an embedded seed (`awareness.nt`) baked in at compile
    time via `//go:embed`. When `awg serve` finds the Oxigraph store empty
    (`CountTriples == 0`), it loads this embedded seed automatically before accepting RPCs.

    This means:
    - Awareness tools (briefing/impact/preflight/resolve) work immediately after the sidecar
      starts — no manual data-load step required — as long as you do NOT pass `--no-seed`.
      (`--no-seed` is for cold-start projects that build their own graph.)
    - The embedded seed reflects knowledge at build time. It may lag the latest
      `services/docs/awareness/` YAML; run `awg rebuild` to refresh.

    To check coverage and seed freshness, prefer the typed verdicts over raw counts:
    ```bash
    awg metadata        # coverage_state (EMPTY/THIN/SUFFICIENT), seed_state (CURRENT/STALE)
    awg seed-status     # does the live store contain the embedded seed marker?
    ```
    Raw fallback:
    ```bash
    curl -s "http://localhost:7878/query" \
         --data-urlencode "query=SELECT (COUNT(*) as ?c) WHERE { ?s ?p ?o }" \
         -H "Accept: application/sparql-results+json"
    ```
    `< 1000` triples → store nearly empty (seed not loaded yet or load failed).
    `15,000–18,000` → healthy graph with full seed.
  seed_sha256: d9d09b84d2d57fef057dfc50d56096a926cabb13f7dba8a3830f08f8996c4afe
- id: ops.awareness.annotations.how-to-write
  type: REFERENCE
  title: How to write @awareness annotations in Go source
  tags:
    - always
    - awareness-graph
    - annotations
    - development
  content: |
    @awareness annotations are structured YAML comment blocks in Go source files.
    The annotation-scanner extracts them and emits code symbol/edge YAML that yaml2nt
    then merges with the rest of the graph.

    **Basic annotation format:**
    ```go
    // @awareness
    // invariants:
    //   - id: myservice.my_invariant
    //     title: "Short description"
    //     severity: high
    //     description: |
    //       What must always be true here and why.
    // failure_modes:
    //   - id: myservice.my_failure_mode
    //     title: "What goes wrong"
    //     severity: medium
    //     description: |
    //       When this breaks and how to recognize it.
    // forbidden_fixes:
    //   - id: forbidden.fix.my_bad_fix
    //     title: "Don't do this"
    //     description: |
    //       Why this fix makes things worse.
    // required_tests:
    //   - id: test.myservice.coverage
    //     title: "What must be tested"
    //     description: |
    //       The test scenario this invariant requires.
    func criticalFunction(...)  {
    ```

    **Minimal viable annotation (invariant only):**
    ```go
    // @awareness
    // invariants:
    //   - id: etcd.dir.permissions_0700
    //     title: "etcd data dir must be mode 0700"
    //     severity: high
    //     description: |
    //       The etcd data directory must be owner-only (0700). Group or world
    //       access to the WAL exposes cluster keys and Raft state.
    func ensureEtcdPermissions() {
    ```

    **Naming conventions:**
    - Invariant IDs: `<service>.<area>.<rule>` (e.g. `etcd.dir.permissions_0700`)
    - Failure mode IDs: `<service>.<area>.<what_breaks>` (e.g. `scylla.registration.tmp_not_writable`)
    - Forbidden fix IDs: `forbidden.fix.<what_not_to_do>` (e.g. `forbidden.fix.layout_drift_by_expanding_allowlist_only`)
    - Required test IDs: `test.<service>.<scenario>` (e.g. `test.etcd.dir_permission_after_restart`)

    **Where to place annotations:**
    - In the file closest to the invariant being enforced (not on wrappers or callers)
    - In spec YAML files (packages/metadata/**/*.yaml) for package-level invariants — the scanner handles YAML annotations too
    - In docs/awareness/invariants.yaml for cross-cutting platform invariants not tied to one file

    After adding/editing annotations, run the full build pipeline to propagate:
    ```bash
    cd awareness-graph && bash scripts/build-awareness-graph.sh
    ```
  seed_sha256: 92c10245691f1c9d5347ae1abe5dc5e3da15d99751e6c28affa487f8c83a5907
- id: ops.awareness.register.new-service
  type: SKILL
  title: Registering a new service for awareness scanning
  tags:
    - always
    - awareness-graph
    - annotations
    - development
  content: |
    To add a new Go package to the annotation scan:

    1. **Add Go annotations** in the source files (see `ops.awareness.annotations.how-to-write`).

    2. **Register the package in the scanner config** (if the scanner has a package registry;
       if it walks all of `services/golang/` automatically, this step is skipped — check
       `awareness-graph/cmd/annotation-scanner/` for the current discovery logic).

    3. **Add a service-role YAML** in
       `services/docs/operational-knowledge/service-roles/<service-name>.yaml` —
       this is the human-curated source-of-truth about what the service IS and how it
       integrates. The yaml2nt tool ingests this.

    4. **Add intent files** in `services/docs/intent/` if the service introduces new
       cross-cutting invariants (e.g., the service owns an etcd key namespace, has a
       specific permission model, or participates in a convergence contract).

    5. **Run the build pipeline** to validate and load:
       ```bash
       cd awareness-graph && bash scripts/build-awareness-graph.sh
       ```
       Check the final triple count; it should increase compared to the previous run.

    6. **Verify with a briefing call:**
       ```bash
       awg briefing --file golang/<new-service>/<new-service>_server/server.go
       ```
       Expect `status: ok` and at least one invariant or failure_mode returned.
  seed_sha256: a2466473b093dfe67a8c744332cf76ad5a80b10bce109e29e06e5d0060946cb2
- id: ops.awareness.diagnose.failures
  type: DEBUG
  title: Diagnosing AWG sidecar failures
  tags:
    - day-1
    - day-2
    - awareness-graph
    - debug
  content: |
    AWG is a standalone sidecar — there is no Envoy route, no etcd registration, and no
    `globular-awareness-graph.service` to inspect. Diagnose with the `awg` CLI.

    **Symptom: MCP tools return DEGRADED / connection refused**
    The `awareness-mcp` bridge cannot reach the gRPC server. Check the sidecar is up and the
    bridge `--awareness-addr` matches the server's listen `--addr` (server default `:10120`;
    bridge default `localhost:9090`). Start/restart: `awg serve &`.

    **Symptom: briefing returns `status: empty` for everything**
    Causes, most likely first:
    1. Oxigraph store empty (`awg metadata` → `coverage_state=EMPTY` / `triple_count` 0).
       Rebuild: `awg rebuild`.
    2. yaml2nt produced an empty .nt (parse error in source YAML). Re-run
       `bash scripts/build-awareness-graph.sh` (or `awg build --strict`) and read the errors.
    3. The file/task genuinely has no anchors. `empty` means "no direct anchors found", not
       "safe to change without thinking" — confirm with `awg metadata`.

    **Symptom: `awg metadata` shows `seed_state=STALE`**
    The live store predates the embedded seed. Reload additively (`awg rebuild`, or
    `loadnt` of `embeddata/awareness.nt`); confirm with `awg seed-status --require-current`.

    **Symptom: after a manual reload, triple count did not change**
    `loadnt` / a raw POST APPENDS. A full refresh must `curl -X DELETE
    http://localhost:7878/store?default` first, then load. `awg rebuild` and
    `build-awareness-graph.sh` handle the wipe for you.
  seed_sha256: 32f7bce0862525abcf96ef27d71031134dc516f0a80b8ff08b87f8648aa53740
- id: ops.day-0.cluster.what-exists
  type: ARCHITECTURE
  title: 'Day-0 cluster: what is running'
  tags:
    - day-0
    - bootstrap
    - baseline
  content: |
    After the Day-0 install script (`install-day0.sh`) completes on the founding node, the cluster has:

    - **One node** (the founding node), with profiles `core`, `control-plane`, `storage`.
    - **etcd**: single-node, listening on this node only (no quorum yet).
    - **cluster-controller**: leader of itself, port 12000.
    - **node-agent**: port 11000, supervises systemd units on this node.
    - **workflow**: port 10220, but it cannot dispatch across nodes (only one).
    - **PKI**: cluster CA generated under `/var/lib/globular/pki/`. Service certs issued.
    - **A bootstrap flag file** at `/var/lib/globular/bootstrap.enabled` with a 30-min TTL.

    What does NOT yet exist:
    - ScyllaDB quorum (needs 3 storage nodes)
    - MinIO distributed pool (needs 3 storage nodes admitted)
    - keepalived VIP (manual enable on day-1)
    - ai-memory, ai-watcher, ai-executor, ai-router (depend on ScyllaDB)
    - Any user-data buckets in MinIO

    Implication for AI sessions: do NOT query `ai-memory` or `cluster-doctor` at this stage —
    they are not running. Use the on-disk operational knowledge bundle directly.
  seed_sha256: 4078400e3e9f12617b039f8f2eb96fa2aeb3aabfa04ddc12e558227708fba7c1
- id: ops.day-0.bootstrap.flag-and-ttl
  type: REFERENCE
  title: Bootstrap mode flag and its TTL
  tags:
    - day-0
    - bootstrap
    - security
  content: |
    Bootstrap mode is gated by `/var/lib/globular/bootstrap.enabled`. While present and within its
    30-minute TTL, the cluster accepts unauthenticated localhost-only RPCs to set initial state
    (root password, CA, etc.).

    Once the flag expires or is removed, all RPCs require an authenticated `sa` (super-admin) token.
    Default sa password is `adminadmin` — MUST be changed via `globular auth root-passwd` before
    day-1 join.

    If you find a cluster post-day-1 that still has bootstrap.enabled present: that is a
    **security incident** — log it as a doctor finding and disable.
  seed_sha256: 080298e3efaa1e49c955d0d6a299b1850854a537d43b06526aafaaf21fa5ff50
- id: ops.day-0.pki.locations
  type: REFERENCE
  title: PKI material — file locations on every node
  tags:
    - day-0
    - pki
    - security
    - always
  content: |
    Every Globular node has the same PKI layout. Memorize these paths — many failures look like
    "permission denied" or "x509 unknown authority" until you check the file is where it should be.

    | What | Path |
    |---|---|
    | CA certificate | /var/lib/globular/pki/ca.crt |
    | CA private key | /var/lib/globular/pki/ca.key |
    | Service cert (used by all gRPC servers) | /var/lib/globular/pki/issued/services/service.crt |
    | Service private key | /var/lib/globular/pki/issued/services/service.key |
    | Ed25519 signing keys | /var/lib/globular/keys/<id>_private |

    The legacy `/etc` credentials path does NOT exist. If you see a doc reference to it, it is wrong.
  seed_sha256: 23cc64544de8d5704761f83f35c3e36af1720fd4bd94de204df4fe4146314a16
- id: ops.day-0.etcd.single-node-warning
  type: DECISION
  title: Day-0 etcd is a single point of failure — by design, briefly
  tags:
    - day-0
    - etcd
    - baseline
  content: |
    The day-0 etcd is **single-node**. There is no quorum, no replication, no failover.
    Power-loss on the founding node before day-1 means losing the entire cluster state.

    This is intentional and brief — day-1 join completes the transition to 3-node quorum.

    Implication: do NOT promise "production-ready" or "highly available" until day-1 is complete
    and three storage nodes are visible in `globular cluster nodes list`. The founding-quorum
    invariant is enforced at join time and cannot be bypassed.
  seed_sha256: 99bcef25f1c875b15e4c75a8f1cd32018f62c6e571469a9d523956434f13c2d5
- id: ops.day-0.config.etcd-only
  type: ARCHITECTURE
  title: etcd is the sole source of truth — even on day-0
  tags:
    - day-0
    - etcd
    - configuration
    - always
  content: |
    Globular has zero configuration via environment variables or hardcoded addresses.
    All service endpoints, ports, and config come from etcd at runtime.

    On day-0, etcd is single-node, but it IS the source of truth. If a service can't reach etcd
    it errors out — there are no silent fallbacks to defaults. The few exceptions:

    - Standard protocol ports (443, 53, 2379) — these are protocol definitions, not config
    - `localhost` — only for: etcdctl pointing to local etcd, or local DNS resolver in resolv.conf
    - `0.0.0.0` — only for bind/listen operations

    Implication: if a fresh AI session is tempted to write `os.Getenv("CLUSTER_ENDPOINT")` —
    stop. That is a forbidden fix. Resolve from etcd or error.
  seed_sha256: 024dceb4c3687f551b393dfc843ef81993afbfc760cff7bb389d5cb46066b58a
- id: ops.day-0.observability.dark
  type: REFERENCE
  title: 'Day-0: cluster-doctor and AI services are dark'
  tags:
    - day-0
    - observability
    - ai-services
  content: |
    On day-0, the following are NOT yet running and cannot be queried:

    - `cluster-doctor` — depends on cluster-controller's full state; only meaningful with multi-node
    - `ai-memory` — backend ScyllaDB has no quorum
    - `ai-watcher` — needs ai-memory
    - `ai-executor` — needs ai-memory + ai-watcher
    - `ai-router` — needs ai-memory

    An AI session entering at day-0 must rely on:
    1. The on-disk operational-knowledge bundle at
       `/var/lib/globular/awareness/current/ops-knowledge/` (these YAML files)
    2. Direct etcd reads (with the cluster CA + service cert)
    3. systemd unit status (`systemctl status globular-*`)

    Do NOT attempt to call MCP tools that require ai-memory at this stage.

    Note: the AWG graph is NOT a day-0 resource. Since the 2026-06 extraction, AWG is a
    standalone sidecar (its own `awg` binary + MCP bridge), no longer shipped as a Globular
    package or deployed to cluster nodes. If you have it, run `awg` from your workstation;
    do not expect a `globular-awareness-graph` unit or a `globular awareness ...` command on
    the node. The `/var/lib/globular/awareness/current/` path now holds only the
    ops-knowledge bundle, not an AWG triple store.
  seed_sha256: aa1e8bd9bede554f9e7fcfe1826784cbcbb058587ce24ff09849c87289a06e39
- id: ops.day-1.deploy.pipeline-overview
  type: ARCHITECTURE
  title: Deploy pipeline — code → repository → reconciler → all nodes
  tags:
    - day-1
    - deploy
    - repository
    - release-pipeline
  content: |
    `globular deploy <service>` is the only sanctioned path from a code change to running
    processes across the cluster. The flow has FIVE phases:

    1. **Build** — `go build` produces the service binary into the local stage dir.
    2. **Allocate** — RPC to repository: AllocateUpload reserves the next version per `--bump
       {patch|minor|major}`. The repository creates a 5-minute reservation in etcd. **A failed
       publish does not release the reservation early** — you wait 5 min before retrying with
       the same `--bump` (it'll re-allocate the same version while reserved).
    3. **Package** — the deploy tool packs the binary + spec + systemd unit into a `.tgz` at
       `generated/<name>_<version>_linux_amd64.tgz`. The `generated/` dir must exist and be
       writable by the running user.
    4. **Publish** — uploads the .tgz to the repository service. The repository stores it in
       MinIO under the `globular` bucket and computes/persists the artifact manifest in
       ScyllaDB.
    5. **Reconcile** — the controller's release reconciler observes the new artifact, marks
       it as the desired version, and dispatches a release.apply.package workflow per node.
       Each node-agent downloads, verifies (build_id + sha256), installs, restarts the unit.
       Convergence is recorded in etcd.

    Authority for "this version is published" lives in the **repository's local CAS** (MinIO
    blob + ScyllaDB metadata), not in a JSON file. Read more in the scylla-trust session
    memory.
  seed_sha256: 71256efb3f2a00a272934a9cc37d336b0fe4c62b28bdaa6a2cc41c2257757d61
- id: ops.day-1.deploy.auth-required
  type: REFERENCE
  title: Deploy requires sa authentication — token handling policy
  tags:
    - day-1
    - deploy
    - auth
    - gotcha
  content: |
    `globular deploy` calls authenticated repository RPCs. It needs an `sa` (super-admin)
    token. To get one:

    ```
    globular --controller <leader> auth login --user sa --password <sa-password>
    ```

    The token is JWT, ~15-minute TTL with auto-refresh on use. CLI login does not persist
    the token to disk by default; pass `--save-token` only when explicit local persistence
    is required.

    Common failure modes:

    - Token expired: re-login. There is no auto-prompt; the deploy fails with `Unauthenticated`.
    - Default sa password is `adminadmin` and triggers a WARNING on every login. Change with
      `globular auth root-passwd` before any production exposure.

    For the repository RPC specifically, the token must carry the `repository:publish`
    capability. By default `sa` has it; custom roles do not unless explicitly granted.
  seed_sha256: 920f5b5aa7f6f5da10a6ec78fcb8fb4e00933f1f1e1fc2ce55ed2fa9b03ffdb8
- id: ops.day-1.deploy.version-reservation-lock
  type: REFERENCE
  title: Failed deploy → 5-minute version reservation lock — wait or use a fresh --bump
  tags:
    - day-1
    - deploy
    - reservation-lock
    - gotcha
  content: |
    AllocateUpload returns a version (e.g. 1.2.28) AND creates a 5-minute reservation. The
    reservation prevents two parallel deploys from picking the same version.

    If your deploy fails AFTER allocate (build error, generated/ permission denied, network
    blip on upload), the reservation persists. The next `--bump patch` retry will get
    `ResourceExhausted: version 1.2.28 already reserved ... (expires <T>)`. You can:

    - Wait the remaining reservation time (printed in the error), then retry with the same
      `--bump patch`. The repository will re-issue the same version since nothing committed.
    - Skip ahead: `--version 1.2.29 --bump patch` is not supported simultaneously; just wait.
    - The reservation auto-expires; there is no operator command to release early (this is
      deliberate — preserves single-writer semantics).

    Practical recipe when iterating fast: do all your testing locally with `go test ./...`,
    THEN run deploy once. Don't use deploy as a build-validation step.
  seed_sha256: bc27c1d5ad732aff2d0964ee966086e25e71c29c0b95f4f541d205b72dd4d05c
- id: ops.day-1.deploy.ldflags-not-injected
  type: DEBUG
  title: Known gap — globular deploy does NOT inject ldflags; binaries report 0.0.0-dev
  tags:
    - day-1
    - deploy
    - version
    - gotcha
  content: |
    The deploy pipeline allocates a real version (e.g. 1.2.28) and ships the package, but
    the underlying `go build` doesn't pass `-ldflags "-X main.Version=..."`. As a result,
    `<binary> --version` on a deployed node prints `0.0.0-dev`, NOT the published version.

    Implications:
    - Don't use `--version` output to confirm propagation. Use the package metadata instead:
      `cat /var/lib/globular/packages/installed/<service>.json` (path may vary; check the
      node-agent's installed-state etcd key).
    - The release reconciler logs are authoritative: search for
      `release-workflow: node <id> succeeded for ... v=<version>`.
    - To verify visually: `globular --controller <leader> cluster nodes get <id> --output json`
      and inspect installed package state.

    Fix is on the roadmap (inject ldflags during build phase of deploy). Until then,
    operators must verify by metadata, not by binary self-report.
  seed_sha256: a33aa617992c339283506f99bd51934548c589f6abb86c6a9189f34fa02c5fb4
- id: ops.day-1.deploy.generated-dir-and-sudo
  type: DEBUG
  title: generated/ dir permissions and the sudo edge case
  tags:
    - day-1
    - deploy
    - gotcha
    - filesystem
  content: |
    The deploy command writes `.tgz` packages into `<repo-root>/generated/`. The directory
    must exist and be writable by the running user. Subtle issue observed in practice:

    - On a fresh checkout, `generated/` may not exist. First deploy creates it; if invoked
      as `sudo`, the dir is then root-owned and subsequent non-sudo deploys fail with
      `permission denied`.
    - Fix: `sudo chown -R <user>:<user> generated/` after any accidental sudo deploy.

    Sandboxed environments (Claude Code, container builds) may also block specific tgz
    filenames after a denied attempt. If you hit `permission denied` on a path the FS says
    is writable, escalate the next attempt with `sudo` — that bypasses both unix perms AND
    the sandbox cache.
  seed_sha256: 23c620abd4403e18e2659cfd6911b5d834442200230eddf1018cd628e9925606
- id: ops.day-1.deploy.propagation-watch
  type: SKILL
  title: How to watch package propagation across the cluster
  tags:
    - day-1
    - deploy
    - observability
  content: |
    Once `globular deploy` returns success, the controller's release reconciler dispatches
    `release.apply.package` workflows per node. Watch progress two ways:

    1. **Controller log** (most direct):
       ```
       sudo journalctl -u globular-cluster-controller.service --since '2 minutes ago' \
         | grep -iE 'release-workflow|installing.*<service>'
       ```
       Look for `installing <service>@<ver>` per node, then `node <id> succeeded`.

    2. **Convergence committer** writes per-node confirmations to etcd:
       ```
       release-workflow: node <id> succeeded for core@<domain>/<service> (v=X h=<sha>)
       convergence-committer: committed node=<id> SERVICE/<service>@<ver> build_number=<n>
       ```
       Until you see BOTH for every node, propagation is incomplete.

    3. **AI Memory after pipeline matures**: ai-watcher catches `convergence-committer` events
       and ai-executor writes a memory entry per release. Query later with
       `globular memory query --tags release,<service>`.
  seed_sha256: d7bef9334e758ab785dcb3b4f7dccb759f1de1bb9f5d91c4768947323a5457f8
- id: ops.day-1.deploy.platform-upgrade
  type: REFERENCE
  title: Two distinct operator commands — repo sync vs platform upgrade
  tags:
    - day-1
    - day-2
    - deploy
    - platform-release
  content: |
    Globular distinguishes:

    - **Service version** — per-service version tag allocated by `globular deploy --bump`.
      SemVer is the standard for Globular-built services; upstream-native tags are
      valid where explicitly supported. Each
      service evolves independently; only changed services get a new version.
    - **Platform release** — a BOM (Bill of Materials) pinning a versioned set of services.
      Tracked in `release-index.json`, the platform truth.

    Two operator commands matter at platform-upgrade time:

    1. `globular repo sync --tag vX.Y.Z` — pulls the platform release artifacts into the
       local repository's MinIO + ScyllaDB.
    2. `globular platform-upgrade vX.Y.Z` — applies the BOM, dispatching release workflows
       for every changed service.

    The build_id (UUID) and the build_number (integer) are SEPARATE concepts:
    - build_id = artifact identity (immutable, computed from content)
    - build_number = CI sequence (monotonically increasing per service)
    Never overload one for the other. See ops.day-1.repository.identity-discipline.
  seed_sha256: d1741b5ec0b34ef12d111e282efcb9132cda38be79ae48ac142ced0d9d8af778
- id: ops.day-1.repository.identity-discipline
  type: ARCHITECTURE
  title: Repository identity rules — version, build_id, build_number, hash
  tags:
    - day-1
    - repository
    - identity
  content: |
    Four distinct identifiers, each with a single role:

    | Identifier | Type | Allocated by | Purpose |
    |---|---|---|---|
    | version | version tag ("1.2.28", "RELEASE.2025-09-07T16-13-09Z") | repository AllocateUpload | What humans say to refer to a release |
    | build_number | integer | CI per-service sequence | Counts builds within a version |
    | build_id | UUID | repository at upload time | Artifact identity; the only safe content key |
    | sha256 | hex | computed from the .tgz bytes | Cryptographic verification at install |

    Forbidden conflations (each has been a bug at least once):
    - Using version as a content key (multiple builds per version are valid)
    - Using build_number as the artifact identity (sequence isn't unique across rebuilds)
    - Treating sha256 as identity (multiple build_ids may have the same content if rebuilt
      deterministically)

    Always log all four when troubleshooting. Always verify build_id AND sha256 before
    install — neither alone is sufficient.
  seed_sha256: 67199c878cbdae3e533b2f4df78ff48c77211f2576404496c23289bfc0e77fb6
- id: ops.day-1.join.founding-quorum-invariant
  type: ARCHITECTURE
  title: Founding quorum — first 3 nodes MUST be core+control-plane+storage
  tags:
    - day-1
    - join
    - founding-quorum
    - etcd
    - scylla
    - minio
  content: |
    Globular's founding-quorum invariant is non-negotiable: the FIRST THREE nodes of any
    cluster MUST carry profiles `core`, `control-plane`, AND `storage`. Why:

    - **etcd**: needs 3 voting members for quorum (loses 1 = still operational)
    - **ScyllaDB**: needs 3 nodes for the default replication factor of 3 (RF=3 with QUORUM
      consistency = lose 1 = still operational)
    - **MinIO**: needs 3 drives for distributed mode with EC:1 (lose 1 = degraded but readable)

    Without all three, you have no real high availability. The founding-quorum invariant is
    enforced in `enforceFoundingProfiles()` and CANNOT be bypassed at join time. Even later,
    `SetNodeProfiles` will refuse to remove `storage` from a node if it would drop below 3
    storage nodes.

    Implication: don't add `compute`-only nodes (analytics workers, GPU nodes, etc.) until
    the founding quorum is solid. They can join freely AFTER.
  seed_sha256: 5c331558cb201a1c864f35c42259c042cb85faa9bc55dc6c02d3fc960d9f1bb1
- id: ops.day-1.join.curl-script-not-tarball
  type: SKILL
  title: Day-1 join is `curl gateway-script | bash`, NOT a tarball copy
  tags:
    - day-1
    - join
    - gateway
    - install
  content: |
    The join flow is operator-friendly. On the new node:

    ```
    curl -sfL https://<controller-fqdn>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>
    ```

    Important: `--token` here is a JOIN TOKEN, not an auth JWT from `globular auth login`.
    Keep the join command isolated on its own line. Do not append unrelated commands to the
    token argument.

    How it works:
    - The controller's gateway exposes a dynamically-generated install script at /join.
    - The script downloads the node-agent binary, installs systemd units, configures TLS,
      and contacts the controller with the join token.
    - The controller verifies the token, issues a node-id and TLS cert, adds the node to
      cluster state, and the script triggers a heartbeat.

    Generate the join token first on the controller:
    ```
    globular cluster token create --controller <controller-ip>:12000 --token <AUTH_JWT> --insecure --expires 30m
    ```

    Then run join on the new node with the returned token:
    ```
    curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>
    ```

    If a prior join attempt failed after creating local etcd state, rerun explicitly with:
    ```
    curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN> --repair-etcd
    ```
    `--repair-etcd` authorizes backup + wipe of local etcd data; never use it blindly.

    What you do NOT do:
    - Manually scp the node-agent binary — bypasses TLS and version pinning
    - Edit /etc/hosts to redirect the controller — breaks mTLS SAN verification
    - Run `globular cluster join` directly without the script — the script handles
      prerequisites the bare command doesn't (system user, mounts, certs)
    - Paste extra shell text into the token argument (for example appending `systemctl ...`)
      because it turns the token into garbage and join fails
  seed_sha256: c74df5fb2bc26e3930a3a98c660afa1a19b170c5d9f24a679d7dd31cc67af592
- id: ops.day-1.join.etcd-add-discipline
  type: ARCHITECTURE
  title: etcd add sequence — sequential, not parallel
  tags:
    - day-1
    - join
    - etcd
  content: |
    etcd cluster expansion is SEQUENTIAL by design — adding two members in parallel can
    cause a partition. The join flow respects this:

    1. Controller adds the new member to etcd with `MemberAdd` (single-RPC, atomic)
    2. Controller waits for the new member to report HEALTHY
    3. Only then does it process the next pending join

    Operational implication: if you have a script that runs join on 2 nodes simultaneously,
    you get inconsistent results — sometimes both succeed, sometimes one is silently rejected
    and ends up not in the cluster. Always join nodes one at a time.

    Key etcd state in /var/lib/globular:
    - /var/lib/globular/etcd/ — data dir (per node)
    - /var/lib/globular/config/etcd.yaml — config (TLS paths, peer URLs)

    Failure pattern observed historically: VIP-contamination caused etcd member eviction
    during keepalived enable. See `failure_modes.yaml: vip_contamination.node_routable_ip_returns_vip`.
  seed_sha256: d3b4d92dfb3e986b1466963b8d08851e52debe7f433811298f78ff9ac5e2c08a
- id: ops.day-1.join.scylla-sequential-join
  type: ARCHITECTURE
  title: ScyllaDB Raft join is sequential too — second node stalls if first hasn't completed
  tags:
    - day-1
    - join
    - scylla
  content: |
    ScyllaDB's Raft-based group0 join is sequential. The second joining node waits for the
    first to complete its bootstrap before starting its own. The join script should sequence,
    not parallelize.

    Symptoms of accidental parallel join:
    - Second node hangs at "joining group0" forever
    - First node's CPU spikes from constant Raft re-election
    - `nodetool status` shows both nodes as `UJ` (joining) for >5 minutes

    Recovery: kill the second node's scylla, wait for the first to reach `UN` (up-normal),
    then restart the second. Avoid by running join script on one node at a time.

    Bootstrap detail: the founding node's seed config is special — it's its own seed.
    Joining nodes use the founding node as the seed via etcd-discovered hosts.
    `publishScyllaHostsIfNeeded` writes seed addresses to /globular/scylla/hosts; this MUST
    use `StableIP(clusterVIP)` (NOT `PrimaryIP()` which would return the VIP).
  seed_sha256: bea47392a17c8692c33d6cab42cf396c50902bc4d600aed0c68b8884efd71aa1
- id: ops.day-1.node.clean
  type: SKILL
  title: How to cleanly wipe a node before rejoining the cluster
  tags:
    - day-1
    - join
    - uninstall
    - clean
    - node
    - rejoin
  content: |
    Before rejoining a node that was previously part of a cluster (or that had a failed
    join attempt), you MUST wipe all Globular and ScyllaDB state first. Failing to do this
    leaves stale etcd WAL, leftover unit files, and old PKI certs that cause silent
    divergence in the new cluster.

    ## The canonical way — fetch the clean script from the gateway

    The clean script is served by the cluster controller's gateway. Fetch and run it
    ON THE NODE TO BE CLEANED (not on the controller):

    ```bash
    # Interactive (asks for confirmation):
    curl -sfL https://<controller-ip>:8443/clean -k | sudo bash

    # Non-interactive (AI agents and automation MUST use this form):
    curl -sfL https://<controller-ip>:8443/clean -k | sudo bash -s -- --force
    ```

    The `--force` flag skips the confirmation prompt. Always use `--force` when running
    non-interactively or from an AI agent — the script blocks forever on stdin otherwise.

    ## What the script does (in order)

    1. **Stop all Globular services** — stops and disables all `globular-*` systemd units
    2. **Stop ScyllaDB** — stops scylla-server, scylla-node-exporter, and all scylla timers
    3. **Force-kill survivors** — SIGKILL any remaining server processes and etcd
    4. **Remove unit files** — deletes `/etc/systemd/system/globular-*.service` and drop-ins,
       then runs `systemctl daemon-reload`
    5. **Wipe state** — removes `/var/lib/globular`, `/etc/globular`, `/usr/lib/globular`,
       MinIO object data (`/mnt/data/minio`), and stale CLI wrapper scripts
    6. **Remove ScyllaDB packages** — `apt remove --purge scylla*` so node-agent owns the
       install from scratch on rejoin (avoids systemd auto-starting scylla before node-agent)
    7. **Wipe ScyllaDB state** — `/var/lib/scylla`, `/etc/scylla`, `/etc/scylla.d`
    8. **Clean etcd data** — removes `/var/lib/etcd`
    9. **Remove PKI/trust store** — deletes all Globular CA certs from system trust store
       and runs `update-ca-certificates --fresh`
    10. **Clean user certs** — removes `~/.config/globular/` for all users and root,
        removes the `globular` entry from `~/.claude/.mcp.json`
    11. **Remove globular user/group** — `userdel globular`, `groupdel globular`

    ## After cleaning — rejoin

    Once the clean script completes, the node is ready for a fresh Day-1 join:

    ```bash
    # On the controller — generate a new join token:
    globular cluster token create

    # On the cleaned node — join the cluster:
    curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>
    ```

    ## Running remotely via SSH

    AI agents can clean a remote node without SSH session interaction:

    ```bash
    ssh root@<node-ip> "curl -sfL https://<controller-ip>:8443/clean -k | sudo bash -s -- --force"
    ```

    ## What NOT to do

    - Do NOT manually delete individual files or stop services one by one — the script
      handles ordering and edge cases (e.g. ScyllaDB package removal timing)
    - Do NOT skip the clean step and run `--repair-etcd` alone — that only fixes etcd WAL,
      not PKI, unit files, or ScyllaDB state
    - Do NOT run the clean script on a HEALTHY cluster member that you want to keep —
      it wipes everything; it is for nodes being DECOMMISSIONED or RESET
  seed_sha256: 7b21dd586d46f93733181b3c4e8fc80f41a44899f4b29ac471ab44b3c88d5782
- id: ops.day-1.join.stale-dep-blocks
  type: DEBUG
  title: Stale dep-blocks permanently block node convergence — how to diagnose and clear
  tags:
    - day-1
    - day-2
    - join
    - convergence
    - debug
  content: |
    **What are dep-blocks?**
    Dependency-block records are written to etcd by the node-agent when a package cannot
    be installed because a prerequisite hasn't been met yet. Key:
    `/globular/convergence/nodes/<node-id>/packages/<kind>/<name>/latest`

    **The bug**: `writeRuntimeDepBlock` records are NEVER auto-cleared once written. If
    a dependency becomes active AFTER the block was written, the block key persists
    forever in etcd. On every subsequent convergence cycle, the node-agent reads the
    stale BLOCKED record and skips installation — node never converges, and doctor never
    surfaces the root cause clearly.

    **When it manifests**: most commonly after a join that was interrupted mid-way (dep
    satisfied later, but the BLOCKED key was already written). Can also appear when a
    node-agent is restarted with a new package set that has deps that were already active.

    **How to diagnose**:
    ```bash
    # List all convergence keys for a node
    etcdctl get /globular/convergence/nodes/<node-id>/ --prefix --keys-only

    # Look for any key with BLOCKED status
    etcdctl get /globular/convergence/nodes/<node-id>/packages/ --prefix | grep BLOCKED

    # Check the action key too (separate from the status key)
    etcdctl get /globular/convergence/nodes/<node-id>/ --prefix | jq -r 'select(.status == "BLOCKED")'
    ```

    **How to clear (recovery procedure)**:
    1. Identify the stale BLOCKED keys
    2. Delete each BLOCKED status key AND its corresponding action key:
       ```bash
       etcdctl del /globular/convergence/nodes/<node-id>/packages/<kind>/<name>/latest
       etcdctl del /globular/convergence/nodes/<node-id>/packages/<kind>/<name>/action
       ```
    3. Force a convergence re-evaluation:
       ```bash
       globular cluster services repair --node <node-id>
       ```
    4. Observe that the node-agent picks up the package and installs it on the next heartbeat.

    **Long-term fix**: This is a known architectural gap (INC-2026-0005). The fix is to
    invalidate dep-block records when their blocking dependency becomes active. Until the
    fix ships, this manual procedure is the remediation path.

    **AI agent instructions**: When a node is stuck at a convergence phase and not advancing
    for >5 minutes with no other obvious errors, check for stale dep-blocks FIRST — it's
    the most silent and most common cause of permanent convergence stall.
  seed_sha256: cc071b8753c1c09a9cdae6ce28d877e2d83ea4e4f4bec68562dabca665275e08
- id: ops.day-1.join.completion-checklist
  type: REFERENCE
  title: How to know day-1 is actually done
  tags:
    - day-1
    - join
    - completion
  content: |
    You're done with day-1 when ALL of these are true:

    - [ ] `globular cluster nodes list` returns exactly 3 nodes, all with profiles
          `core`, `control-plane`, `storage`
    - [ ] All 3 nodes show `status = ready` (not `converging`, not `unreachable`)
    - [ ] `etcdctl member list` shows 3 members all `started` (not `unstarted`)
    - [ ] `nodetool status` (on any node) shows 3 nodes `UN` (up-normal)
    - [ ] `globular objectstore topology status` shows mode=distributed with 3 pool nodes
          and `Overall: ✓ CONVERGED` (per the MinIO add-node runbook)
    - [ ] `/var/lib/globular/bootstrap.enabled` is GONE on the founding node (controller
          removes it post-join)
    - [ ] `globular auth login --user sa --password <new-password>` works (default
          password should already be changed)

    Until all checks pass, do NOT call this cluster "production-ready". Day-2 maintenance
    assumes all of the above.
  seed_sha256: aecdf5be3099bc307b6ac5c3cc59c19cef5697c5f8ba166e4823cc78a766e233
- id: ops.day-1.keepalived.what-changes
  type: ARCHITECTURE
  title: keepalived enable — what changes when the VIP starts floating
  tags:
    - day-1
    - keepalived
    - vip
    - ha
  content: |
    Before keepalived: each node is reachable only at its stable interface IP. External
    traffic targets one specific node; if that node fails, external clients break.

    After keepalived enable: a floating VIP (e.g. 10.0.0.100) is held by ONE node at a time
    (the keepalived MASTER). Failover via VRRP: if the MASTER stops advertising health, a
    BACKUP takes the VIP. External traffic always hits whichever node currently holds it.

    Cluster spec lives in etcd at `/globular/ingress/v1/spec` (VIP, VRID, interface,
    priority per node). Per-node VRRP state at `/globular/ingress/v1/status/<node-id>`.

    What this UNLOCKS:
    - DMZ external routing — router forwards external traffic to a single VIP, not 5 IPs
    - Single TLS cert with the VIP in SANs serves all external traffic
    - DNS A records for external FQDNs point to the VIP (one record, automatic failover)

    What it INTRODUCES:
    - Every node's `node.Identity.Ips` now MAY include the VIP (in addition to its stable
      interface IP). Specifically, the MASTER node will have BOTH the VIP and the stable IP
      in its reported list.
    - Health-gated failover: keepalived only advertises health if local checks pass
      (gateway responsive, etc.). A node with broken gateway loses the VIP.
  seed_sha256: bde42528ce14ca0f7790f2cac0f65c93fce9f3ae8499883919faee6c4c6e86ec
- id: ops.day-1.keepalived.vip-contamination-class
  type: DEBUG
  title: VIP contamination — a recurring class of bug
  tags:
    - day-1
    - day-2
    - keepalived
    - vip-contamination
    - class-of-bug
  content: |
    The VIP appears in `node.Identity.Ips` whenever a node holds it. Any code that picks a
    single representative IP from that list — `node.PrimaryIP()`, `node.Identity.Ips[0]`,
    `nodeRoutableIP(node)` — returns the VIP whenever the node is the keepalived MASTER.

    Anything downstream that compares that representative IP against a curated list of
    stable IPs (etcd peer URLs, MinIO pool nodes, controller pool nodes, DNS A records)
    will fail to match. Result: the node is treated as "unknown" / "stale" / "non-member"
    depending on the consumer.

    Subsystems known to have hit this class (and how):
    - **etcd member eviction** (2026-05-10): `removeStaleMembers` evicted a healthy member
      when its `memberNode.IP` came back as the VIP. Fixed in commit a4ea9ef1 with
      `node.StableIP(clusterVIP)`.
    - **dns reconciler**: per-node A records contained both real IP and VIP. Fixed in
      the same commit.
    - **publishGateway / publishController**: gateway/controller external DNS records
      mixed VIP among stable node IPs. Fixed in the same commit.
    - **MinIO pool publish filter** (2026-05-10): `nodeRoutableIP` returned VIP, the IP
      wasn't in the admitted pool list, the node got stuck at `MinioJoinPhase=non_member`
      forever. Fixed in 1.2.28 with `nodeAnyIPInPool` (the AnyIP pattern).
    - **scylla/hosts publish**: `publishScyllaHostsIfNeeded` was bitten too; uses
      `StableIP(clusterVIP)` now.
    - **WriteInstalledPackage / heartbeat Phase 2 / SyncInstalledPackage build_id**: misc
      related sites — see session_vip_contamination_fix in user memory.

    Two valid fix recipes (use one consistently within a code path):
    1. `node.StableIP(clusterVIP)` — explicitly excludes the VIP. Best when picking ONE
       representative IP for publishing or addressing.
    2. `nodeAny<X>(node, list)` helpers — match against ANY of `node.Identity.Ips`. Best
       when CHECKING membership in a stable list.

    Forbidden non-fixes:
    - Filtering the VIP out of `node.Identity.Ips` (the node legitimately HAS that IP)
    - Special-casing keepalived MASTER as an exception (creates worse coupling)
    - Hardcoding node-to-pool mappings to avoid the filter
  seed_sha256: bb6c0b3381b67c37adab7cfb7c7a1dcb5631c97a240b55401a80eef828fc7a3c
- id: ops.day-1.keepalived.cert-san-requirement
  type: REFERENCE
  title: TLS cert MUST include VIP in SANs
  tags:
    - day-1
    - keepalived
    - pki
    - certificates
  content: |
    External clients hitting `https://<VIP>:443` get a TLS handshake against the cert held
    by whichever node currently has the VIP. If the VIP is NOT in the cert's SANs, the
    handshake fails with `x509: certificate is valid for ..., not <VIP>` and the operator
    sees mysterious silent outages on failover.

    Specifically: the SAN list MUST include:
    - The cluster VIP (e.g. 10.0.0.100)
    - Every node's hostname.cluster-domain (e.g. globule-ryzen.globular.internal)
    - The cluster domain itself (e.g. globular.internal)
    - "localhost" (for local-loopback bind/listen)

    Historical incident (16h silent nuc outage) was caused exactly by VIP missing from
    SANs. The 4-commit fix added: prevention at issuance, validation at issuance, TLS
    error surfacing in logs, and a doctor invariant for cert health. See
    session_vip_cert_fix in user memory.

    Quick check on a running node:
    ```
    openssl x509 -in /var/lib/globular/pki/issued/services/service.crt -noout -text | grep -A1 'Subject Alternative Name'
    ```
  seed_sha256: 8ff146d9e886301f178305db14a50e77bf8a8037e53afd2dd2d2c187dee00ed3
- id: ops.day-1.keepalived.health-gated-failover
  type: ARCHITECTURE
  title: Health-gated failover — VIP only goes to healthy nodes
  tags:
    - day-1
    - day-2
    - keepalived
    - ha
  content: |
    keepalived runs a `vrrp_script` per node that checks local service health (gateway
    reachable, controller responsive, etc.). If any check fails, the node DEMOTES itself
    (drops priority by `weight`), letting another node win the VRRP election.

    Implication: if you're debugging "the VIP keeps moving", the cause is almost always
    a health check failing on the current MASTER. Check:

    ```
    systemctl status keepalived.service
    journalctl -u keepalived.service --since '5 minutes ago' | grep -iE 'transition|priority|vrrp_script'
    cat /globular/ingress/v1/status/<node-id>  # what the node thinks it is (MASTER / BACKUP / FAULT)
    ```

    The operational interaction with cluster-doctor: a flapping VIP triggers
    `keepalived.flapping` finding (severity=warning if rate > 1/min). The remediation
    hint usually points at the failing local service.

    Common gotchas:
    - keepalived's interface name in /etc/keepalived/keepalived.conf must match the actual
      interface — RHEL uses ens33, Debian 12 sometimes enp1s0
    - The VIP must NOT be the network's gateway IP (router conflict)
    - VRID must be unique per VLAN — two clusters on the same VLAN with the same VRID will
      fight for the VIP
  seed_sha256: 995d08aa4952ff927139d3cf93e6835ba7e54f13f51c5d0649b2518798f80b90
- id: ops.day-1.minio.topology-contract
  type: ARCHITECTURE
  title: MinIO topology contract — controller is sole authority
  tags:
    - day-1
    - objectstore
    - minio
    - contract
  content: |
    The MinIO topology has ONE authority: `cluster-controller`. It owns:

    - `/globular/objectstore/config` — the published desired state (mode, pool nodes, drives, endpoint, volumes hash)
    - The decision of WHICH nodes are pool members
    - The transition from standalone → distributed (and any future expansion)

    Node-agents:
    - May only START MinIO when their node is in `ObjectStoreDesiredState.Nodes`
    - Must NEVER infer pool membership from local disk state (presence of `.minio.sys`)
    - Must NEVER write to `/globular/objectstore/config` directly

    The contract is enforced at:
    - `golang/config/minio_runtime_render.go::enforceMinioHeld`
    - `golang/cluster_controller/cluster_controller_server/objectstore_admission.go`

    Forbidden fixes:
    - `start_minio_from_local_health_check`
    - `infer_minio_membership_from_disk`
    - `wipe_minio_sys_without_approved_transition`
    - `round_robin_dns_for_minio_writes`
  seed_sha256: 6936606675c52499e92bcf7ffbd2b6f9df5fc965a6fc41f7b8a6290e158917c6
- id: ops.day-1.minio.apply-flow
  type: SKILL
  title: Standard MinIO topology apply flow
  tags:
    - day-1
    - objectstore
    - minio
    - runbook-summary
  content: |
    The four steps to apply a new MinIO topology (covers add-node and disk-change):

    1. `globular objectstore disk scan` — node-agents report eligible disks every 5 minutes via
       syncTicker. If you just attached a disk, you may need to wait up to 5 min OR restart node-agent.
       Loop devices are filtered out — they are NOT eligible for MinIO authoritative storage.

    2. `globular objectstore disk approve --node <id> --node-ip <STABLE-IP> --path /mnt/data`
       — operator consent for one (node, path) pair. CRITICAL: pass the STABLE interface IP
       (e.g. 10.0.0.8 for nuc), NEVER the VIP (e.g. 10.0.0.100). See ops.day-1.minio.vip-contamination.

    3. `globular objectstore topology plan` — computes a proposal from admitted disks. Review
       pool nodes, drives/node, destructiveness reasons, expected fingerprint.

    4. `globular objectstore topology apply --proposal <id> --i-understand-data-reset`
       — DESTRUCTIVE. Stops MinIO on all pool nodes, wipes `.minio.sys`, restarts in new
       distributed config. ALL existing bucket data on the OLD pool becomes inaccessible.
       Re-publish via `globular deploy --all --bump patch` and re-upload webroot/users after.

    The CLI request goes to etcd at `/globular/objectstore/topology/apply_request`. The current
    leader's apply-watcher picks it up and runs `applyObjectStoreTopologyRequest`.
  seed_sha256: 9bd681e036b5a78a67ce1e003b57ba0dc1a8d8095898725749da77969e756701
- id: ops.day-1.minio.vip-contamination
  type: DEBUG
  title: VIP-contamination — node stuck at MinioJoinNonMember after apply
  tags:
    - day-1
    - objectstore
    - keepalived
    - vip-contamination
    - debug
  content: |
    **Symptom**: After a successful `globular objectstore topology apply`, the published
    `/globular/objectstore/config` is missing one node. That node's `minio_join_phase` is
    `non_member` and never transitions, even though MinIO is installed and the node is healthy.

    **Cause**: The node holds the keepalived VIP. `node.Identity.Ips` lists the floating VIP
    (e.g. 10.0.0.100) BEFORE the stable interface IP (e.g. 10.0.0.8). `nodeRoutableIP()` returns
    the first non-loopback IP — which is the VIP. The pool list contains the stable IP from the
    apply, so `ipInPool(VIP, [stable, ...])` is false → the node never transitions out of
    `MinioJoinNonMember`. The publish filter then excludes that node forever (chicken-and-egg).

    **Diagnosis**: Run `globular cluster nodes get <node_id>` and inspect `identity.ips`. If the
    VIP appears (typically 10.0.0.100), this is the pattern.

    **Fix (in code)**: Match by ANY of the node's IPs, not just `nodeRoutableIP`. See
    `nodeAnyIPInPool` in `minio_pools.go` — pattern mirrors `nodeAnyIPIsEtcdMember`.

    **Fix (operationally, before code lands)**: There is no good operational workaround. The
    published state is filtered server-side; restarting the node-agent does not change the phase
    because the node-agent correctly evaluates "I'm not in the desired pool, so I'm non_member".
    Code fix + redeploy is required.

    Same VIP-contamination pattern has hit etcd member eviction and DNS reconciliation. Common
    fix recipe: replace `node.PrimaryIP()` / `node.Identity.Ips[0]` / `nodeRoutableIP(node)`
    with `node.StableIP(clusterVIP)` OR a `nodeAny<X>Has<Y>` helper that matches against all IPs.
  seed_sha256: 61a22d1635ae9153303e5b340c449b0defcecbff76b7c0253cc7c4cac0b156bb
- id: ops.day-1.minio.minimum-3-storage-nodes
  type: DECISION
  title: MinIO requires 3 storage nodes for distributed mode
  tags:
    - day-1
    - objectstore
    - minio
    - founding-quorum
  content: |
    Distributed MinIO requires a minimum of 3 nodes with the `storage` profile. EC:1 with 3
    drives can lose 1 node. With fewer than 3 storage nodes, the cluster operates standalone
    (single point of failure) — this is the day-0 baseline.

    The first 3 nodes of any cluster MUST have profiles `core`, `control-plane`, `storage`.
    This is enforced at join in `enforceFoundingProfiles()` and cannot be bypassed. If a storage
    node leaves, another must replace it before MinIO topology can be modified.

    Loop-device-backed `/mnt/data` (a file mounted as a fake block device) is technically
    possible but NOT recommended for production — the backing file lives on root fs and a
    reboot can lose data if the file was deleted while held open.
  seed_sha256: 0819b1ddfed0b134b8435a1216b319d2a8daa037e0c6f3e71f1ecd2845114d95
- id: ops.day-1.minio.path-recommendation
  type: REFERENCE
  title: MinIO data disk recommendations
  tags:
    - day-1
    - objectstore
    - minio
    - hardware
  content: |
    MinIO official guidance plus what we've validated in production:

    - Dedicated physical disk per node (NOT shared with OS)
    - Filesystem: ext4 or xfs (NOT NTFS/exFAT, NOT NFS, NOT loop-device-backed)
    - Mount path convention: `/mnt/data`
    - Stable mount via `/etc/fstab` with UUID (NOT device path — sda may renumber)
    - Owner: `globular:globular`
    - Pre-existing `.minio.sys` from a previous pool will be wiped on apply (this is what
      `--i-understand-data-reset` confirms)

    Bad ideas observed in our cluster history:
    - NFS-mounted MinIO data (locking semantics broken)
    - Loop device with deleted backing file (ghost-allocated, data vanishes on reboot)
    - Sharing the OS root fs (root fills up → MinIO degrades unpredictably)
  seed_sha256: be680ba41c82f785b7ed2e9c945d2e7fcc0e04466f98b23c75bb3b4197ed6a4f
- id: ops.day-1.minio.restart-hazard
  type: DEBUG
  title: MinIO restart with mismatched format.json wipes data — NOT a rolling restart
  tags:
    - day-1
    - objectstore
    - minio
    - hazard
    - incident-2026-05-10
  content: |
    **READ BEFORE running `systemctl restart globular-minio.service`** on
    any storage node where the topology has changed (node added, node
    removed, drive count changed, pool mode changed).

    MinIO is NOT Kubernetes pods. The "rolling restart" mental model
    that works for stateless services and even for etcd / ScyllaDB
    does NOT apply to MinIO when drive count changes.

    ## What MinIO does when argv-drive-count != on-disk-format-drive-count

    Two outcomes, both bad:

    1. **FATAL on startup** — most common path. Service logs:
       `FATAL Unable to initialize backend: /mnt/data/data drive is
       already being used in another erasure deployment. (Number of
       drives specified: N but the number of drives found in the
       Kth drive's format.json: M)`. The service enters a restart
       loop and the node is unavailable until you intervene.

    2. **Silent reformat** — the destructive path. If at least
       ceil(N/2) drives reach quorum with the new argv before the
       old-format drives come online, MinIO REFORMATS every drive in
       the new deployment. format.json is rewritten with a new
       deployment ID. Bucket directories persist on disk but are
       empty. **All object data is gone, no warning, no operator
       confirmation.**

    ## Pre-flight check (mandatory before any topology-affecting restart)

        # 1. argv-drives — count "https://...:9000/mnt/data/data" tokens
        ps aux | grep "minio.*server" | grep -v grep

        # 2. format-drives — read directly from the on-disk format.json
        sudo cat /mnt/data/data/.minio.sys/format.json | jq '.xl.sets[0] | length'

        # 3. env-drives — what the next restart WILL pick up
        sudo cat /var/lib/globular/minio/minio.env | grep VOLUMES

    If all three agree → routine restart, safe.
    If env-drives > argv-drives, format-drives still matches argv-drives
    → DESTRUCTIVE case. STOP. Take an `mc mirror` backup first, then
    follow the safe procedure in
    runbooks/safe-minio-topology-restart.yaml.

    ## Why the topology "CONVERGED" status can lie

    `globular objectstore topology status` reports CONVERGED when the
    env file's contents match the expected fingerprint on every node.
    It does NOT cross-check the running process's argv. So a node
    whose env was re-rendered but service NOT restarted will report
    RENDERED_GEN=2 ✓ FINGERPRINT_MATCH=✓ even though the running
    process is still on the old generation. Trust `mc admin info`
    and the running argv before you trust the topology status.

    ## What survived the 2026-05-10 incident (and only because of it)

    The repository service holds a local POSIX CAS at
    /var/lib/globular/repository/artifacts/ that is independent of
    MinIO. After the silent reformat wiped 921 MiB / 203 objects from
    the MinIO mirror, all artifacts remained installable from the
    local CAS. Without that secondary truth source, the loss would
    have been complete.

    Lesson: design every MinIO consumer to assume MinIO can vanish.
    Local CAS, restic backups, mc-mirror to external pool —
    something. MinIO is fast and durable but its topology surgery
    is brittle.
  related_ids:
    - ops.day-1.minio.topology-contract
    - ops.day-1.minio.apply-flow
    - ops.runbook.safe-minio-topology-restart
  seed_sha256: 48ddcfcde1a242f8a79c0837ed7afc30cb514eedbaae2ff7ba086a1cdd45fb66
- id: ops.day-1.minio.credentials-contract
  type: ARCHITECTURE
  title: MinIO credentials and etcd contract — where secrets live and how to connect
  tags:
    - day-1
    - objectstore
    - minio
    - credentials
    - etcd
    - mc-alias
  content: |
    ## Two etcd keys carry MinIO credentials

    1. `/globular/objectstore/config`
       The published desired state (ObjectStoreDesiredState proto, JSON-encoded). Fields include:
         - mode: "standalone" or "distributed"
         - nodes: [list of pool IPs]
         - drives_per_node: N
         - endpoint: "https://minio.globular.internal:9000"
         - volumes_hash: "<fingerprint>"
       NOTE: Credentials are NOT in this key. This key is the topology contract, not auth.

    2. `/globular/cluster/minio/config`
       The cluster-wide MinIO access config (MinioClusterConfig proto, JSON-encoded). Fields include:
         - access_key: "globular"
         - secret_key: "globularadmin"  (or the current rotation value)
         - endpoint: "https://minio.globular.internal:9000"

    There is NO service-account "admin" user in MinIO. The Globular MinIO deployment uses
    a single operator key stored in etcd. Never try SA "admin/admin" or "minioadmin/minioadmin".

    ## How to set up the mc alias for manual operations

    Read the credentials from etcd:
      ACCESS=$(etcdctl get /globular/cluster/minio/config --print-value-only | jq -r '.access_key')
      SECRET=$(etcdctl get /globular/cluster/minio/config --print-value-only | jq -r '.secret_key')
      ENDPOINT=$(etcdctl get /globular/cluster/minio/config --print-value-only | jq -r '.endpoint')

    Register the mc alias:
      mc alias set local "$ENDPOINT" "$ACCESS" "$SECRET" --insecure

    Verify connectivity:
      mc admin info local --insecure

    The `--insecure` flag is required when using the internal hostname and the cluster CA
    is not in the system trust store of the machine running mc.

    ## Admitted disk records

    Disk admission records live at:
      /globular/objectstore/disk/admitted/{nodeID}/{pathHash}

    Each record is an AdmittedDisk proto (JSON), containing:
      - node_id
      - node_ip  (must be stable interface IP, NOT the VIP)
      - path
      - force_existing_data (bool — operator acknowledged pre-existing non-minio data)

    To list all admitted disks:
      etcdctl get /globular/objectstore/disk/admitted/ --prefix --keys-only

    To inspect a specific record:
      etcdctl get /globular/objectstore/disk/admitted/<nodeID>/<pathHash>

    The pathHash is the hex-encoded SHA-256 of the path string (e.g. "/mnt/data/minio").
    It is computed by the controller at approve time and is opaque for the operator.

    ## Disk approval for a new install (5-node cluster example)

    For each storage node run:
      globular objectstore disk approve \
        --node <nodeID> --node-ip <STABLE-IP> --path /mnt/data/minio \
        [--force-existing-data]   # only if the path has non-minio data

    Use --force-existing-data when:
      - The mount has files left over from a previous OS install or non-MinIO data
      - The mount has a .minio.sys from a PREVIOUS generation that will be wiped by apply

    Do NOT use --force-existing-data as a shortcut to skip the existence check.

    After approving all nodes, verify:
      etcdctl get /globular/objectstore/disk/admitted/ --prefix --keys-only
    Expected: one key per node.

    ## Credential rotation

    If the secret_key in etcd needs to be rotated:
      1. Run `globular objectstore credentials rotate` (CLI command, calls controller RPC)
      2. The controller updates /globular/cluster/minio/config AND calls mc admin user update
      3. Do NOT update the etcd key manually — the rotation workflow keeps MinIO and etcd in sync

    Manual mc admin user updates that bypass the controller will cause an auth split (etcd
    has old key, MinIO has new key) that breaks all service-to-MinIO connections silently.
  related_ids:
    - ops.day-1.minio.topology-contract
    - ops.day-1.minio.apply-flow
  seed_sha256: 723710434c24efde489dc5c3cdac00533e970fcd3ba40e5767e74699cfa3cf99
- id: ops.day-1.public-domain.architecture
  type: ARCHITECTURE
  title: Public domain flow — UI → DNS-01 → cert in etcd → gateway serves HTTPS
  tags:
    - day-1
    - public-domain
    - acme
    - tls
    - dns
    - gateway
  content: |
    ## Overview

    Globular supports exposing the cluster under one or more public FQDNs (e.g. `globular.io`)
    with automatically-renewed Let's Encrypt certificates. The full pipeline is:

    ```
    Admin UI (External Domains tab)
      → saves ExternalDomainSpec to etcd /globular/domains/v1/<fqdn>
      → cluster-controller reconciler detects the PUT (etcd watch, no delay)
      → reconciler calls dns.DnsService.SetTXT(_acme-challenge.<fqdn>)
      → Let's Encrypt DNS-01 verification
      → cert issued, written to etcd /globular/acme/certs/<fqdn>
      → gateway SyncACMECertsFromEtcd writes cert to disk
      → Envoy SNI picks up the new cert
      → https://<fqdn> works
    ```

    ## Key components

    ### ExternalDomainSpec (etcd)
    - Key prefix: `/globular/domains/v1/`
    - Fields: `fqdn`, `acme.enabled`, `acme.email`, `acme.provider` (default: letsencrypt)
    - Set via admin UI: Infrastructure → DNS → External Domains → Save
    - Set via CLI: `globular domain set <fqdn> --acme`

    ### cluster-controller domain reconciler
    - Watches `/globular/domains/v1/` prefix in etcd
    - On PUT event: triggers reconcile immediately (no 5-min wait)
    - Reconcile calls the DNS service to place the `_acme-challenge` TXT record
    - Calls the ACME provider (Let's Encrypt) with the DNS-01 challenge
    - Stores the issued cert in etcd at `/globular/acme/certs/<fqdn>`
    - Also writes the cert to `/var/lib/globular/domains/<fqdn>/` on the controller node

    ### gateway — cert sync
    - On startup: `domain.SyncACMECertsFromEtcd` pulls all known certs from etcd to disk
    - Background: `domain.WatchACMECerts` watches etcd for new/renewed certs and writes them
    - Disk paths written: `/var/lib/globular/domains/<fqdn>/fullchain.pem` and `privkey.pem`
    - These paths are picked up by the Envoy SDS configuration for SNI serving

    ### dns.DnsService
    - Must be running and reachable on port 53 from Let's Encrypt validators
    - Handles `SetTXT` and `DeleteTXT` RPCs for the `_acme-challenge` record
    - The cluster's NS records for the public domain must delegate to this DNS server

    ### MinIO webroot
    - Bucket: `globular` (from MinIO contract `/var/lib/globular/objectstore/minio.json`)
    - Webroot prefix: `webroot/` — top-level, NOT prefixed with the cluster domain
      (e.g. NOT `globular.internal/webroot/` — that path is empty)
    - External domain requests that have no domain-specific webroot in MinIO
      automatically fall back to the cluster's `webroot/` content
    - Default landing page ships at `webroot/index.html`, `webroot/logo.png`, `webroot/style.css`
  seed_sha256: 6c65be7429653ba99d4b809bfcb0a78cf6b23aa50ee25220b2545089cd72cef3
- id: ops.day-1.public-domain.prerequisites
  type: REFERENCE
  title: Prerequisites for DNS-01 ACME certificate issuance
  tags:
    - day-1
    - public-domain
    - acme
    - dns
    - prerequisites
  content: |
    Before ACME DNS-01 can succeed, the following must all be true:

    1. **dns.DnsService is running** on the target node (check: `globular services list`)
       and is accessible on UDP/TCP port 53 from the internet (or Let's Encrypt validators).

    2. **NS records delegate to the cluster DNS**.
       The public domain's registrar/DNS must have NS records pointing to the node
       running dns.DnsService. Example: `globular.io NS ns1.globular.io; ns1.globular.io A 203.x.x.x`.

    3. **Port 53 is open** on the node running dns.DnsService. Verify with:
       ```bash
       dig _acme-challenge.globular.io TXT @<dns-server-ip>
       ```

    4. **cluster-controller is healthy** and the domain reconciler is running.
       Check logs: `journalctl -u globular-cluster-controller.service | grep reconcil`

    5. **ACME email is configured** in the domain spec. Let's Encrypt requires a valid
       email for registration and expiry notifications.

    6. **The DNS server zone is managed**.
       The dns.DnsService must recognize the fqdn's zone as managed (not external-only).
       If `isManaged()` returns false for the zone, TXT records cannot be set.
  seed_sha256: 698804bb88f003ac85dfc88725e399105ed8aa499be4c5433860b9dbc9d42911
- id: ops.day-1.public-domain.minio-webroot-layout
  type: ARCHITECTURE
  title: MinIO webroot layout for public domains
  tags:
    - day-1
    - public-domain
    - minio
    - webroot
    - gateway
  content: |
    ## MinIO webroot key structure

    The gateway reads the MinIO contract from `/var/lib/globular/objectstore/minio.json`.
    The contract has a `prefix` field (e.g. `"globular.internal"`) used for USER DATA only.

    **Critical**: the webroot prefix is always `"webroot"` — never `"<prefix>/webroot"`.
    The base prefix scopes user data (`globular.internal/users/`) but does NOT apply to
    the webroot.

    ```
    Bucket: globular
      webroot/              ← cluster landing page (all domains fall back here)
        index.html
        logo.png
        style.css
      globular.io/webroot/  ← domain-specific webroot (optional, overrides fallback)
        index.html
        ...
      globular.internal/
        users/              ← user files
        artifacts/          ← repository artifacts
    ```

    ## Routing logic (gateway)

    For a request to `https://globular.io/`:
    1. Gateway calls `webrootPrefixForHost("globular.io")` → `"globular.io/webroot"`
    2. Tries `globular/globular.io/webroot/index.html` in MinIO → NoSuchKey
    3. Falls back to `webrootPrefixValue()` → `"webroot"`
    4. Tries `globular/webroot/index.html` → found → served

    For a request to `https://globular.internal/` (internal cluster domain):
    1. `webrootPrefixForHost("globular.internal")` → `"webroot"` (cluster domain uses cluster prefix)
    2. Tries `globular/webroot/index.html` → found → served

    ## Serving a custom public website

    Upload to the domain-scoped prefix: `globular.io/webroot/index.html` etc.
    The gateway will prefer the domain-scoped content over the cluster default.

    ```bash
    mc alias set cluster https://<minio-endpoint>:9000 globular globularadmin --insecure
    mc cp index.html cluster/globular/<fqdn>/webroot/index.html
    mc cp -r dist/ cluster/globular/<fqdn>/webroot/
    ```
  seed_sha256: 408f5ba459a56f48973fe049c8df6482f40aa098295bf5313ce3aa51785d5841
- id: ops.day-1.public-domain.cert-storage
  type: REFERENCE
  title: ACME certificate storage paths — etcd and disk
  tags:
    - day-1
    - public-domain
    - acme
    - tls
    - certificates
  content: |
    ## etcd storage

    | Key | Content |
    |-----|---------|
    | `/globular/acme/certs/<fqdn>` | JSON blob: `{cert, key, chain, issued_at, expires_at}` |
    | `/globular/domains/v1/<fqdn>` | ExternalDomainSpec JSON |

    Check cert presence:
    ```bash
    etcdctl get /globular/acme/certs/globular.io --print-value-only | python3 -c \
      "import sys,json; d=json.load(sys.stdin); print(d.get('expires_at','?'))"
    ```

    ## Disk paths (written by gateway at startup + watch)

    | Path | Content |
    |------|---------|
    | `/var/lib/globular/domains/<fqdn>/fullchain.pem` | Certificate + intermediates |
    | `/var/lib/globular/domains/<fqdn>/privkey.pem` | Private key |
    | `/var/lib/globular/pki/acme/<fqdn>/fullchain.pem` | Alternate path (some tools) |

    The gateway writes these on:
    - Startup: `domain.SyncACMECertsFromEtcd(etcdCli, logger)`
    - Runtime: `domain.WatchACMECerts(ctx, etcdCli, logger)` (background goroutine)

    ## Certificates page in admin UI

    Security → Certificates → Public TLS tab shows all certs on disk.
    If cert is in etcd but not on disk: gateway restart will sync it.
    If cert is not in etcd: ACME issuance has not completed — check controller logs.
  seed_sha256: 5254e371be6b2dd67d98f99266472da0095eeb14cefa225e862a2f9e86a56969
- id: ops.day-1.public-domain.known-issues
  type: DEBUG
  title: Known issues and fixes — public domain + ACME setup
  tags:
    - day-1
    - public-domain
    - acme
    - dns
    - gateway
    - bug
  content: |
    ## DNS server panic — getTtl on empty data (fixed in dns@1.2.55)

    **Symptom**: `dns.DnsService` enters a crash loop (68+ restarts).
    Logs show: `runtime error: index out of range [3] with length 0`

    **Root cause**: `getTtl()` called `binary.LittleEndian.Uint32(data)` without
    checking `len(data) >= 4`. An empty or short BadgerDB value causes a panic.

    **Fix**: Added `if err != nil || len(data) < 4 { return 60 }` guard.
    Shipped in `dns@1.2.55`.

    ---

    ## Gateway serves JSON error instead of webroot (fixed in gateway@1.2.57)

    **Symptom**: `https://<public-domain>/` returns
    `{"error":"file /var/lib/globular/webroot/index.html not found"}`

    **Root cause**: Two bugs in the gateway:
    1. `deriveMinioLayout` prepended the MinIO base prefix to the webroot path
       (`globular.internal/webroot`) but the content is at the top-level `webroot/`.
    2. No fallback to the cluster webroot when the domain-scoped prefix is empty.

    **Fix**: Webroot prefix is always `"webroot"` (never `<base-prefix>/webroot`).
    External domains fall back to `"webroot"` when no domain-scoped content exists.
    Shipped in `gateway@1.2.57`.

    ---

    ## Cert in etcd but not visible in Certificates page (fixed in gateway@1.2.55)

    **Symptom**: ACME issuance succeeded (cert in etcd), but Security → Certificates
    shows "No public TLS certificates found".

    **Root cause**: The gateway never called `SyncACMECertsFromEtcd` or `WatchACMECerts`,
    so the cert in etcd was never written to disk.

    **Fix**: Added both calls in `cmd/gateway/main.go` after the signal context is set up.
    Shipped in `gateway@1.2.55`.

    ---

    ## Reconciler waited up to 5 minutes after domain save (fixed in cluster-controller@1.2.55)

    **Symptom**: Saving an External Domain with ACME enabled does not immediately start
    certificate issuance. User must wait up to 5 minutes.

    **Root cause**: The domain reconciler ran on a fixed 5-minute ticker. No immediate
    trigger on domain spec changes.

    **Fix**: Added `watchSpecChanges()` goroutine that watches `/globular/domains/v1/`
    in etcd and calls `Trigger()` on PUT events, bypassing the ticker.
    Shipped in `cluster-controller@1.2.55`.
  seed_sha256: 3d36d4915b90c2f9aee5b150c585dade77b64f31a7f79b7382dc9accae7507c4
- id: ops.day-2.normal-state
  type: ARCHITECTURE
  title: Day-2 normal state — what 'healthy' looks like
  tags:
    - day-2
    - baseline
    - observability
  content: |
    A healthy day-2 cluster shows:

    - All nodes `status = ready` in `globular cluster nodes list`
    - `globular objectstore topology status` → `Overall: ✓ CONVERGED`
    - `globular cluster nodes get <id>` for every node:
      - `day1_phase = ready`
      - `etcd_join_phase = verified`
      - `scylla_join_phase = verified`
      - `minio_join_phase = verified` (for storage nodes only)
    - `cluster-doctor` returns no findings of severity > info
    - `journalctl -u globular-cluster-controller --since '5 min ago'` is QUIET (heartbeats
      and periodic loops only — no tight retry loops, no panics)
    - `ai-memory query --tags incident,recent` returns the EXPECTED operations log (small,
      understood entries — not a flood)

    Anti-signals (something to investigate):
    - Any "release-workflow ... RUN_STATUS_FAILED" loop firing repeatedly (>1/min)
    - Any `unit_hash_drift` on a critical service unit
    - Doctor freshness > 60s (snapshot stale)
    - ai-memory empty for >24h (the watcher → executor → memory pipeline is dark)
    - `bootstrap.enabled` flag present on any node post-day-1
    - A node stuck at a convergence phase for >5min with no obvious errors (check for stale
      dep-blocks at `/globular/convergence/nodes/<id>/packages/*/latest` — see
      `ops.day-1.join.stale-dep-blocks` for the recovery procedure)
  seed_sha256: c0891b223926c4ae2f9a385d8b38d287a72dc70795ef4fd6c80f2da30ecc8c84
- id: ops.day-2.cert-lifecycle
  type: REFERENCE
  title: Certificate lifecycle — what auto-renews vs requires intervention
  tags:
    - day-2
    - pki
    - certificates
  content: |
    Globular has TWO cert hierarchies that follow different lifecycles:

    **Cluster-internal mTLS certs** (controller-managed, auto-renewed):
    - Issued from the cluster CA at /var/lib/globular/pki/ca.crt
    - Service certs at /var/lib/globular/pki/issued/services/service.{crt,key}
    - TTL: typically 1 year, but auto-renewed at 60% of TTL
    - Automatic on every node by node-agent's reconcileTLS loop
    - YOU should not touch these manually unless rotating the CA

    **External-facing ACME certs** (Let's Encrypt, controller-managed, auto-renewed):
    - Stored at /var/lib/globular/domains/<fqdn>/fullchain.pem + privkey.pem
    - For external FQDNs registered via `globular dns register`
    - TTL: 90 days (Let's Encrypt), auto-renewed at 30 days remaining
    - Symlinked from /var/lib/globular/config/tls/acme/<fqdn>/ for envoy/xDS to load
    - Failure surfaces as `acme.cert_expiring` finding in cluster-doctor

    Operator action items:
    - If you change DNS provider config, re-trigger ACME with `globular domain refresh <fqdn>`
    - If a node's TLS cert is found expired, restart node-agent → reconcileTLS will reissue
    - To rotate the CA itself, see `runbooks/rotate-pki-certificates.yaml`
  seed_sha256: 8b30164cca6de36eb97ee3338b384df0ae1df0d80d50c303f2a8c686ff6de0d9
- id: ops.day-2.routine-deploy-cadence
  type: REFERENCE
  title: Routine service deploys — what's safe at any time vs requires care
  tags:
    - day-2
    - deploy
    - change-management
  content: |
    Most service deploys are SAFE AT ANY TIME thanks to per-service rolling reconcile:

    - User services (file, blog, search, title, media, etc.) — rolling restart, no downtime
    - AI services (ai-memory, ai-watcher, ai-executor, ai-router) — rolling, no downtime
    - cluster-doctor, monitoring, log — rolling, brief observability gap acceptable

    Requires CARE (do during low-traffic window, monitor closely):
    - cluster-controller — leader changes during rolling restart; brief workflow queue;
      ~10s decision-tier pause per node restart
    - workflow service — in-flight workflows pause; check no critical workflow is mid-flight
    - node-agent — local supervised services restart-detect; brief ~30s blip per node
    - dns — short-lived DNS resolution gap on the affected node

    Requires PLANNING (downtime announcement, backup beforehand):
    - etcd — sequential, manual, careful (use platform-upgrade, not deploy)
    - scylla — same
    - minio — same; topology changes are destructive (see add-node-to-minio-pool runbook)
    - keepalived — VIP movement during restart; clients in mid-call may break
  seed_sha256: 4953fb477574789a0daeb65fbed5e1af2b746e991e92776dc0d5ea6db7def56f
- id: ops.day-2.etcd-nospace-alarm
  type: DEBUG
  title: etcd NOSPACE alarm — cluster write operations freeze until compacted
  tags:
    - day-2
    - etcd
    - storage
    - alarm
    - debug
  content: |
    etcd has a built-in storage quota (default 2GiB). When the backend DB exceeds the
    quota, etcd raises a NOSPACE alarm and REJECTS ALL WRITE OPERATIONS. Reads still
    work. The cluster appears partially healthy (nodes visible, queries answer) but NO
    state mutation works: no workflow dispatches, no heartbeat writes, no package installs.

    **Symptoms**:
    - Controller logs: `etcdserver: mvcc: database space exceeded`
    - Any write RPC to etcd returns: `rpc error: code = ResourceExhausted desc = etcdserver: mvcc: database space exceeded`
    - Workflows stay PENDING forever; node states don't update
    - `globular cluster nodes list` shows stale data but the call succeeds

    **Diagnosis**:
    ```bash
    # Check for active alarms on any etcd node
    etcdctl --endpoints=https://localhost:2379 alarm list

    # Check current DB size vs quota
    etcdctl --endpoints=https://localhost:2379 endpoint status --write-out=table
    # Look at DB SIZE and DB SIZE IN USE columns
    ```

    **Recovery (must be done on ALL etcd members)**:
    ```bash
    # 1. Compact: remove old revisions (keeps latest revision only)
    REV=$(etcdctl --endpoints=https://localhost:2379 endpoint status --write-out=json \
          | jq '.[0].Status.header.revision')
    etcdctl --endpoints=https://localhost:2379 compact $REV

    # 2. Defragment: reclaim the freed space
    etcdctl --endpoints=https://localhost:2379 defrag

    # 3. Disarm the alarm ONLY after defrag succeeds and DB size is below quota
    etcdctl --endpoints=https://localhost:2379 alarm disarm

    # 4. Verify writes work again
    etcdctl --endpoints=https://localhost:2379 put /globular/test/nospace-recovery-probe ok
    etcdctl --endpoints=https://localhost:2379 del /globular/test/nospace-recovery-probe
    ```

    **Prevention**:
    - etcd auto-compaction is configured in `/var/lib/globular/config/etcd.yaml` via
      `auto-compaction-mode: revision` and `auto-compaction-retention: 1000`.
      Verify these are present on every node.
    - Watch the etcd DB size via Prometheus: `etcd_mvcc_db_total_size_in_bytes`
    - Alert threshold: > 1.5GiB (75% of default 2GiB quota)

    **Important**: Do NOT disarm the alarm before defragmenting. Defrag may temporarily
    need MORE space before reclaiming — disarming first risks immediate re-alarm.
    Always compact → defrag → disarm in order.
  seed_sha256: ccfabd651e255e42833fd8a10da8136c718f83461c30ded31e6774f4c2e5a128
- id: ops.day-2.audit-and-event-stream
  type: REFERENCE
  title: Audit log and event stream — what's recorded, where to find it
  tags:
    - day-2
    - audit
    - observability
  content: |
    Three streams to know about for day-2 forensics:

    **gRPC audit log** (auth → rbac → audit interceptor chain):
    - Every authenticated RPC is logged
    - Includes principal, method, resource, allow/deny verdict, timestamp
    - Backend: ScyllaDB; queryable via `log` service
    - Use when investigating "who changed X"

    **Event stream** (per-service event publishers):
    - Service lifecycle events: service.started, service.stopped, service.crashed
    - Workflow events: workflow.started, workflow.succeeded, workflow.failed
    - Topology events: objectstore.topology_change, etcd.member_change
    - Subscribed by: ai-watcher, cluster-doctor

    **Doctor finding history**:
    - Every finding emit recorded with severity, category, evidence
    - Resolved findings keep their history (queryable via `cluster-doctor history`)
    - Used by ai-watcher to detect "this finding repeats every X" (chronic patterns)

    **NOT routinely recorded** (be aware):
    - Read-only RPC bodies (only metadata logged)
    - Internal health-probe RPCs (rate-limit floor; only failures logged)
    - SSH sessions (those are systemd journal, not Globular audit)
  seed_sha256: 43ba5a58d7730467fcc5ca5ccb1e332bf7821b52a52dd11d58c7c99fe0e9718a
- id: ops.grpc.backbone.ownership
  type: ARCHITECTURE
  title: 'Backbone ownership split: runtime, client, policy'
  tags:
    - always
    - grpc
    - architecture
  content: |
    Globular gRPC backbone has three responsibilities:

    - `globular_service`: service runtime contract (init/start/stop/save, server construction, TLS, health registration).
    - `globular_client`: client bootstrap, endpoint normalization, TLS dial, readiness checks, reconnect behavior.
    - `interceptors`: admission/authz/security/audit policy on RPC calls.

    This split is intentional:
    - services define behavior, not transport policy internals;
    - clients consume services through shared dial/retry/metadata policy;
    - interceptors enforce trust and authorization centrally.
  seed_sha256: a0635cdbc9af1d23eba11efd2acb8baee1f45ecb625d5cb1a237b8a637502687
- id: ops.grpc.backbone.service-lifecycle
  type: DECISION
  title: Service lifecycle contract
  tags:
    - always
    - grpc
    - lifecycle
  content: |
    Service lifecycle contract:
    - `InitService` loads identity/config baselines, desired-state values, TLS paths, and startup runtime snapshot.
    - `InitGrpcServer` applies standard keepalive, middleware, metrics, health server, and security interceptors.
    - `StartService` binds, handles port conflict reallocation, starts serve loop, and persists runtime state.
    - `StopService` gracefully stops gRPC server and marks runtime state accordingly.

    Rules:
    - do not bypass shared start/stop helpers in service implementations;
    - do not mutate desired config from runtime observations;
    - startup fallback behavior must remain explicit and auditable.
  seed_sha256: 980a9a24dd18965f95782cc35244bae8c1c3deb5547dd39a414c56cd5e18cd2c
- id: ops.grpc.backbone.client-usage
  type: DECISION
  title: How services use other services via clients
  tags:
    - always
    - grpc
    - client
    - mesh
  content: |
    Cross-service calls must use shared client mechanisms:
    - `globular_client.GetClient(...)` for typed service clients;
    - centralized address normalization to routable `host:port`;
    - shared TLS config and readiness probing;
    - shared client interceptors for metadata (`cluster_id`, `x-call-depth`) and reconnect policy.

    Anti-patterns:
    - ad hoc gRPC dials without metadata propagation;
    - direct localhost shortcuts for remote service calls;
    - service-specific retry loops that bypass shared reconnect policy.
  seed_sha256: ad387d2f432d356bbaa810b55076d5795df2774af932dc56ad04f65643e69b38
- id: ops.grpc.backbone.rpc-validation
  type: ARCHITECTURE
  title: RPC validation and enforcement path
  tags:
    - always
    - grpc
    - authz
    - security
  content: |
    Every RPC traverses interceptor policy:
    - unauthenticated allowlist for bootstrap/public endpoints (health/login/reflection);
    - auth context extraction (JWT/mTLS + metadata);
    - cluster boundary checks (`cluster_id` enforcement after initialization);
    - call-depth guard (`x-call-depth`) to prevent circular call storms;
    - RBAC/resource permission evaluation;
    - audit/security event emission.

    This is the authoritative validation surface for RPC admission.
    Service handlers must not re-implement parallel ad hoc authorization systems.

    Doctor-enforced invariant linkage:
    - `grpc.backbone.contract` surfaces runtime-observed regressions in this
      contract (cluster_id propagation breaks, call-depth loop guard trips,
      and public probe admission denials).
  seed_sha256: b97727b5da23fd44db9f9be17980b6c6bf586fe1b690a2044db707d9e405f373
- id: ops.grpc.backbone.health-readiness
  type: REFERENCE
  title: Health and readiness semantics
  tags:
    - always
    - grpc
    - health
    - readiness
  content: |
    Health/readiness are evidence-based, not process-only:
    - gRPC health service registration is standard in server bootstrap;
    - readiness combines server init + state + bindability;
    - operational checks use process/tcp/grpc signals in order;
    - health probes must not be blocked by normal RBAC controls.

    Operational rule:
    - "running process" is insufficient proof; grpc/tcp evidence is required for runtime health claims.
  seed_sha256: 61c1027e3b8ebc957e8d5ae2272621312915d3d43909539fe8b651d6b014f0d1
- id: ops.grpc.backbone.config-members
  type: REFERENCE
  title: Why services carry shared config members
  tags:
    - always
    - grpc
    - config
  content: |
    Common service config members (name, id, domain, address, port, tls paths, dependencies,
    keepalive/update flags, permissions) exist because they are consumed by shared runtime
    bootstrap and control-plane automation (registration, desired/runtime split, package metadata,
    lifecycle supervision, and operational tooling).

    Changing semantics of these members is a backbone-level change and must be treated as
    cross-service architecture migration, not local refactor.
  seed_sha256: 50770387ce9e1dc692885c3b3732edc71706d16034f23be50d2fc957d6ee1220
- id: ops.artifacts.root-layout
  type: ARCHITECTURE
  title: 'Two-root runtime layout: binaries vs mutable state'
  tags:
    - always
    - artifacts
    - filesystem
  content: |
    Canonical roots:
    - `/usr/lib/globular/bin/` — installed executable entrypoints.
    - `/var/lib/globular/` — mutable state root (`GetStateRootDir` default on Linux).

    Contract:
    - executables are package-pipeline outputs (repository/install workflow), not ad-hoc copied bytes;
    - mutable operational files (etcd data, PKI, runtime render config, receipts, local caches) stay under state root;
    - no new runtime owner paths under `/etc/globular` for mutable state.
  seed_sha256: b645818c550019bdd623a4fa9a0e445d6330be4792c997a1a9cff3e98bc2b1f0
- id: ops.artifacts.authority-boundary
  type: DECISION
  title: 'Authority boundary: etcd authority, disk as runtime materialization'
  tags:
    - always
    - artifacts
    - etcd
    - authority
  content: |
    etcd remains the source of truth for cluster authority keys (desired state,
    service discovery, workflow state, control-plane coordination).

    On-disk files under `/var/lib/globular` are classified as:
    - runtime materialization (rendered config, downloaded artifacts, installed files),
    - local backup copy (e.g., controller state disk backup),
    - cache/staging,
    - secret/key material.

    Disk files must never silently override etcd authority when values diverge.
    If etcd is unavailable, control-plane writes should fail/degrade explicitly.
  seed_sha256: cf55b8609d5fb4395fc2678a7484f11fe00c19c617621a8edb775a5d8cbd3c8d
- id: ops.artifacts.subdir-contract
  type: REFERENCE
  title: State-root subdirectory contract
  tags:
    - always
    - artifacts
    - layout
    - reference
  content: |
    Canonical high-signal paths under `/var/lib/globular`:
    - `pki/` — cluster CA + issued service certificates (sensitive).
    - `etcd/` — etcd data directory.
    - `config/` — rendered runtime config fragments (etcd.yaml, endpoints, install-policy, tls symlink/materialized views).
    - `services/` — service config JSON files.
    - `node-agent/state.json` — node-agent local state (canonical hyphenated form).
      Contains controller_endpoint, node_id, advertise_ip, cluster_domain.
      Legacy aliases `nodeagent/` and `node_agent/` may exist after a migration; they are
      cleanup candidates once the canonical file is confirmed valid.
    - `cluster_controller/state.json` — controller local backup copy of authoritative etcd state.
    - `state/` — platform installation-state tracking. Written by package post-install scripts.
      Example: `state/scylladb/ownership.json` records the cluster fingerprint at ScyllaDB
      install time; used by `install-day0.sh` to detect prior installations and avoid
      wiping valid Raft state. Do NOT delete this directory without operator review.
    - `repository/`, `staging/`, `packages/` — artifacts/install receipts/staging.
    - `domains/`, `objectstore/`, `minio/`, `prometheus/`, `awareness/`, `operational-knowledge/`.

    Notes:
    - `config/` is operational render/cache, not authority.
    - local backup files are restore aids and diagnostics, not writer authority sources.
    - The directory `state/` is a legitimate platform path even though it is not a named service.
      cluster-doctor's platformBaseAllowlist includes it explicitly.
  seed_sha256: 3da1226878b826edeb52b03edff04bb3409bb9d7161e45b0c71ff7912ea7aefb
- id: ops.artifacts.permission-baseline
  type: DECISION
  title: Permission baseline by artifact class
  tags:
    - always
    - artifacts
    - permissions
    - security
  content: |
    Baseline permission posture:
    - etcd data dir: `0700` (owner-only). Contains Raft WAL + cluster keys.
      CRITICAL: the etcd package spec MUST set mode 0700 in BOTH the `ensure-dirs` step
      AND the systemd unit's `ExecStartPre`. If either is 0750, the etcd service restart
      resets permissions and the doctor will report the error on every restart cycle.
    - state directories (non-secret): usually `0750` (globular:globular).
    - private keys, token files, secret credentials: owner-restricted (`0600` or stricter).
    - public cert/chain material: readable (`0644`) when needed by dependent processes.

    Existing code path `ensureEtcdAndScyllaPerms` enforces:
    - etcd data dir `0700`,
    - TLS private material restricted (`0640` root:scylla or `0600` fallback),
    - public cert material readable (`0644`).

    Any new artifact type must declare owner/group/mode explicitly in BOTH the package
    spec ensure-dirs step AND any ExecStartPre that touches the directory.
  seed_sha256: 53f613eddf3eb74b60f4a47e1367751f1c5489a740fafbc1faf49765cfb56dd5
- id: ops.artifacts.anti-patterns
  type: DEBUG
  title: Filesystem anti-patterns that poison convergence
  tags:
    - always
    - artifacts
    - anti-pattern
  content: |
    Do not:
    - bypass package publishing/install by copying binaries directly into `/usr/lib/globular/bin`;
    - store mutable authority config under ad-hoc paths and read them preferentially over etcd;
    - create per-service top-level state directories without canonical contract;
    - make rollback/repair by deleting broad state roots without scoped procedure.

    Convergence consequence:
    - verifier/doctor will surface binary hash mismatch, runtime drift, or identity conflicts.
  seed_sha256: fd628b5b9bc318be176f2ce6104d7efb23b58af2dc691b98f6f01d6954654266
- id: ops.artifacts.stable-ip-in-templates
  type: DECISION
  title: Template variable {{.NodeIP}} MUST be the stable interface IP — never the VIP
  tags:
    - always
    - artifacts
    - keepalived
    - vip-contamination
    - templates
  content: |
    Package spec template variables are resolved at install time by the node-agent.
    The `{{.NodeIP}}` variable is resolved via `StableIP(clusterVIP)`, which explicitly
    excludes the keepalived VIP. This is CRITICAL.

    Why: on a node that holds the keepalived VIP, `node.Identity.Ips` includes the
    floating VIP (e.g. 10.0.0.100) BEFORE the stable interface IP. If the template
    used `PrimaryIP()` or `node.Identity.Ips[0]`, the installed config would contain
    the VIP, making it non-functional when the VIP moves to a different node.

    Examples of where `{{.NodeIP}}` or `StableIP` is used:
    - MinIO env file: MINIO_VOLUMES, peer URL
    - ScyllaDB scylla.yaml: `listen_address`, `rpc_address`
    - etcd config: `advertise-peer-urls`, `advertise-client-urls`

    Rule for spec authors:
    - ALWAYS use `{{.NodeIP}}` for node-local addresses in config files.
    - NEVER use `{{.VIP}}` or derive node IP from environment at startup time.
    - If a config file needs to list ALL cluster node IPs, read from etcd — the
      node-agent provides stable IPs there.

    Awareness invariant: `identity.stable_node_identity_not_floating_vip`
  seed_sha256: eaf19df7a1b2aa4df00b6ccfdba4e93a6133f0bc8f01a91495d1bfb97ac713c2
- id: ops.artifacts.current-audit-notes
  type: REFERENCE
  title: 'Current audit note: naming consistency hotspots'
  tags:
    - always
    - artifacts
    - audit
  content: |
    Current code uses `/var/lib/globular/cluster_controller/state.json` for controller
    backup state. Keep this path stable for compatibility unless a migration plan is
    implemented. Avoid introducing parallel aliases (e.g., both `cluster-controller`
    and `cluster_controller`) without explicit migration and dual-read/write guardrails.
  seed_sha256: 04d048fe762e8ce63fec700421c9414967adc1b8172ea61ca0afedfa28d498b2
- id: ops.always.package.identity-single-source
  type: DECISION
  title: Package identity (binary + kind) is single-source via registry.yaml, build-gated
  tags:
    - always
    - package
    - identity
    - build
  content: |
    A package's binary name and kind are declared in up to six places: registry.yaml,
    metadata/<name>/package.json, the spec's metadata.entrypoint, the spec's inline
    systemd ExecStart, the spec's start_services.binaries map, and the standalone
    metadata/<name>/systemd unit. Nothing enforced agreement, so they drifted.

    Canonical example: mcp ships as `mcp_server` (the Go build for ./mcp collides with
    the package dir name), but the spec repeatedly drifted back to `mcp`, breaking fresh
    Day-0 with `ExecStart=/usr/lib/globular/bin/mcp: no such file`. Fixed by hand 5+
    times; re-broken by the 2026-06 spec consolidation that resolved a duplicate toward
    the stale copy.

    RULE: registry.yaml is the authority. Every other declaration of a package's binary
    name and kind MUST agree with it; registry.yaml itself is cross-checked against the
    canonical component_catalog.go classification. The build runs
    scripts/validate-package-identity.py (wired into packages/build.sh) and FAILS LOUD
    on any drift.

    KIND is determined by bootstrap role, not language: `infrastructure` = day0_required
    / control_plane_critical bootstrap floor (etcd, scylla, minio, envoy, prometheus,
    keepalived, gateway, xds). `service` = a post-bootstrap workload (bootstrap_tier:
    workload), e.g. mcp. `command` = CLI tool.

    FORBIDDEN: relaxing the identity check to make a build pass, or editing registry.yaml
    to match a drifting file. Fix the drifting file to match the authority.
  seed_sha256: 58dc78b99a3c6e5c2369ae89b31691f1f32440f168ca89bc0ca241e0bacfdd87
- id: ops.always.doctor.reduced-harvest-honesty
  type: DEBUG
  title: Doctor reduced-harvest findings are UNKNOWN/WARN, not FAIL/ERROR
  tags:
    - always
    - cluster-doctor
    - diagnostic-honesty
  content: |
    "Could not observe" must never be reported as "observed failure"
    (meta.harvest_and_yield_are_distinct_availability_dimensions).

    Incident (2026-06-22, globule-ryzen): a single context-canceled doctor harvest
    produced 5 CRITICAL/ERROR `*.probe_required_when_installed` findings
    (scylla/etcd/minio/envoy + repository.unreachable) against a FULLY HEALTHY node.
    Verified false-positive: infra_probe_all showed all components member_ready; node
    health ready; reconcile CONVERGED. A fresh harvest cleared them.

    Root cause: the four probe_required rules emitted ERROR + INVARIANT_FAIL when an
    installed component had no probe — even when the cause was the collector's own
    GetInfraProbe sub-fetch erroring (snap.HadError). That asserts failure on evidence
    never collected.

    RULE (shared builder rules/infra_probe_required.go):
    - collector error (HadError) OR capability gap -> WARN + INVARIANT_UNKNOWN +
      CheckError set (aggregators never count it as FAIL). Verdict INDETERMINATE.
    - complete harvest but still no probe for an installed component -> ERROR +
      INVARIANT_FAIL (a genuine source failure).
    - NEVER go silent (degraded_is_explicit_not_hidden): absence is always surfaced,
      just at the correct epistemic level.

    Operator note: a wall of reduced-harvest probe errors against otherwise-healthy
    infra usually means a transient harvest hiccup (e.g. MCP/controller reconnect).
    Re-scan fresh before acting. FORBIDDEN: suppressing probe_required entirely (re-opens
    the FALSE_NEGATIVE class where "could not see" looks like "healthy") — downgrade the
    verdict, don't delete it.
  seed_sha256: e912d4bff18b9ec09bbb92684a14e4fa9cc3870d690838be58629f51a12c308a
- id: ops.always.awareness.coherence-loop
  type: ARCHITECTURE
  title: The coherence loop — ai-memory + awareness-graph + behavioral-memory + CI
  tags:
    - always
    - awareness-graph
    - ai-memory
    - coherence
  content: |
    How the platform stays coherent as it grows. Canonical detail:
    docs/awareness/coherence_pipeline.yaml.

    THREE memory systems, distinct authorities — do not conflate:
    1. ai-memory (ScyllaDB, mcp__globular__memory_*) — mutable runtime recall log
       (what happened / what we learned). At session start run
       memory_query(tags="always"). It does NOT gate edits. Runtime entries are
       node-local (RF=1 single-node) and LOST on clean-node — promote durable lessons
       into docs/operational-knowledge so they survive and reseed.
    2. awareness-graph (AWG, mcp__awg__awareness_*) — compiled context graph (intent,
       invariants, failure_modes, forbidden_fixes). Call briefing(file=) BEFORE editing
       (hook-enforced in high-risk dirs). It is context, NOT runtime authority — verify
       live state with MCP tools, never infer it from the graph.
    3. behavioral-memory — enforced meta-principles (meta.*) + principle-check scanners
       + behavioral ratchet tests. CI hard-gates these.

    READ path (every session): recall ai-memory (tags=always) -> briefing before edits
    -> follow the invariants/forbidden_fixes named -> patch -> run required tests.
    WRITE-BACK path (teach the system): scar -> record in ai-memory -> promote to
    docs/awareness (graph) or docs/operational-knowledge (Day-0 seed) -> rebuild ->
    CI validates. Closing this loop is the goal; the weak rung is the manual rebuild.

    CI enforcement plane (services/.github/workflows/ci.yml): HARD GATES =
    make principle-check-all, behavioral ratchets, awg validate. ADVISORY =
    awg audit -check (embeddata freshness) — re-arm as a hard gate once rebuild
    determinism lands (it now passes).

    DEGRADED mode: if ai-memory/AWG are unreachable, CLAUDE.md is the always-available
    safety floor; verify live, do not fabricate state from memory.
  seed_sha256: 4460e6308c3e7ef45c7f0ae46c3f9a7030a9e0e4f013f19d47c5e621495dd4ca
- id: ops.always.package.what-a-package-is
  type: ARCHITECTURE
  title: What a Globular package IS — identity, kind, recipe
  tags:
    - always
    - package
    - architecture
  content: |
    A Globular package is an immutable, content-addressed `.tgz` artifact describing
    one installable unit. Three properties define it:

    1. **Identity** = (name, version, build_id, platform, publisher). `build_id` is
       a UUIDv7 allocated by the repository post-upload; `build_number` is a
       display-only monotonic counter. NEVER confuse build_id with build_number.
    2. **Kind** ∈ {service, infrastructure, command, application}.
       - `service`  — exposes a gRPC API to the mesh, supervised by desired state.
       - `infrastructure` — runs a daemon (etcd, MinIO, ScyllaDB, envoy, keepalived).
       - `command`  — CLI tool, no systemd unit.
       - `application` — rare; for whole-platform apps.
    3. **Recipe** — an ordered, idempotent list of install steps the node-agent
       executes to bring the package from blob to healthy.

    A package is NOT a deb/rpm, NOT a container image, NOT a source bundle.

    Authority lives across 4 INDEPENDENT layers (HARD RULE: never collapse):
      L1 Repository  — "does (name, version, build_id) exist?" — repository svc
      L2 Desired     — "what SHOULD run on each node?"          — controller, etcd
      L3 Installed   — "what IS installed on this node?"        — node-agent, etcd + local receipts
      L4 Runtime     — "is the process running and healthy?"    — systemd + node-agent runtime check

    Every package-related diagnosis walks these layers in order.

    Full reference: docs/operational-knowledge/packages.md
  seed_sha256: 4e4106f6ec97ee44cb6efe7f5d26d4821e8cbd056069c99eb58e1119036d122e
- id: ops.always.package.required-files
  type: REFERENCE
  title: Required files in a package source tree
  tags:
    - always
    - package
    - reference
  content: |
    For a package named `<name>`, four files are load-bearing:

    ```
    packages/registry.yaml                          # one canonical entry
    packages/specs/<name>_{service,cmd}.yaml         # install recipe (steps)
    packages/metadata/<name>/package.json            # reference manifest
    packages/metadata/<name>/awareness.yaml          # invariants + failure modes
    ```

    Plus optional per-package assets:

    ```
    packages/metadata/<name>/systemd/<unit>.service  # if not inline in spec
    packages/metadata/<name>/config/<name>/<file>    # default config templates
    packages/metadata/<name>/scripts/*.sh            # pre/post hooks
    packages/metadata/<name>/debs/*.deb              # bundled .debs (ScyllaDB only today)
    ```

    The built `.tgz` adds a stamped `package.json` at the root and re-shapes the
    payload under `bin/`, `specs/`, `config/`, `systemd/`, `scripts/`, `debs/`,
    `data/`.

    `package.json` MUST agree on `type` with `spec.metadata.kind` AND with
    `registry.yaml.kind` AND with `component_catalog.go`. The validator
    `packages/scripts/validate-package-metadata.sh` enforces this cross-source
    agreement. There is ONE source of truth for kind: the spec.
  seed_sha256: d95cf1bd5f35ad13901d02575d21f2daa95dfa02d7957fa8dfd9a165e35e398c
- id: ops.always.package.identity-rules
  type: ARCHITECTURE
  title: version vs build_number vs build_id — never confused
  tags:
    - always
    - package
    - identity
    - version-control
  content: |
    Three identifiers exist and are NOT interchangeable:

    | Identifier      | Type           | Allocated by                          | Purpose                                              |
    |-----------------|----------------|---------------------------------------|------------------------------------------------------|
    | `version`       | version tag    | `globular deploy --bump {patch,...}` reserves via repository | Human-readable; goes in manifest + filename. |
    | `build_number`  | int64 counter  | Stamped at build time (`--build-number`) | DISPLAY ONLY. Never used for convergence. |
    | `build_id`      | UUIDv7 string  | Repository service, post-upload       | SOLE identity used for convergence. Empty in committed `package.json`. |

    Hard rules:

    - `Version = ""` in source. NEVER hardcode. Injected via ldflags at build:
      `-ldflags "-X main.Version=1.2.3 -X main.BuildNumber=42"`
    - Build numbers are plain integers only. Never encode build identity inside
      `version` (reject forms like `1.2.3+b325`, `1.2.3-b12`, `1.2.3-build7`).
    - Platform release version (release-index.json after `globular repo sync --tag vX.Y.Z`)
      is NOT the package version. Only changed packages get a new version.
    - `--bump` reservations hold for 5 minutes. Failed publish does NOT release early.
      Re-run with same `--bump` to re-allocate the same version.
    - Convergence by `build_number` is a bug. Always compare `build_id`.

    Convergence flow:
      deploy --bump → repository.AllocateUpload (5-min reservation, allocates version)
        → build .tgz → repository.Upload (assigns build_id) → release reconciler
        updates DesiredService.build_id → per-node package_install workflow
        → node-agent verifies sha256+build_id, installs, restarts
        → writes /globular/nodes/<id>/packages/<kind>/<name>
        → runtime check: /proc/<pid>/exe sha256 == manifest.entrypoint_checksum

    If any equality breaks, the layer that owns it owns the fix.
  seed_sha256: be6fc775c667fa2496e8da0113b8f898044608476fedb0acd991721496cfddfc
- id: ops.always.package.install-steps
  type: REFERENCE
  title: Install step catalogue — every supported step type
  tags:
    - always
    - package
    - install
    - reference
  content: |
    The node-agent's install runner (`globular-installer/pkg/installer/specplan_builder.go`)
    accepts these step types. Every step is idempotent — re-running on a node already in
    the target state is a no-op.

    | Step type                | Purpose                                                                                     |
    |--------------------------|---------------------------------------------------------------------------------------------|
    | `ensure_user_group`      | Create the `globular` system user/group if missing.                                          |
    | `ensure_dirs`            | Create dirs with owner/group/mode.                                                           |
    | `install_package_payload`| Extract `bin/`, `config/`, `specs/`, `systemd/` from the tarball. REQUIRED for service/infra.|
    | `install_files`          | Write arbitrary files (configs, env, wrappers). Supports `content`, `atomic`, `skip_if_exists`. |
    | `install_services`       | Drop systemd unit files (inline content or from package).                                    |
    | `enable_services`        | `systemctl enable <unit>`.                                                                   |
    | `start_services`         | `systemctl start <unit>`. Supports `restart_on_files` + `binaries` for hash check.           |
    | `health_checks`          | Wait for active + (optional) TCP port. `timeout`, `interval`.                                |
    | `run_script`             | Run a script from `scripts/`. Used for stateful init (TLS, buckets, controlled first-start). |
    | `install_local_debs`     | `dpkg -i debs/*.deb`. Offline OS package install — .debs bundled at build time.              |
    | `install_os_packages`    | `apt-get install <pkg>...`. Online OS install (keepalived).                                  |
    | `ensure_service_config`  | Write the per-service config.json under `{{.StateDir}}/services/<name>/<exec>/<version>/`.   |
    | `ensure_hosts_block` / `remove_hosts_block` | Manage Globular's /etc/hosts section.                                      |
    | `normalize_scylla_config`| ScyllaDB-only rewrite that preserves Raft identity.                                          |
    | `fetch_file`             | Download from URL (rare; prefer bundling).                                                   |
    | `noop`                   | Placeholder.                                                                                 |

    Template variables in spec content blocks:
      `{{.Prefix}}` — install prefix (e.g. /usr/local/share/globular)
      `{{.StateDir}}` — state root (/var/lib/globular)
      `{{.NodeIP}}` — STABLE node IP (NEVER the keepalived VIP; resolved via StableIP)
      `{{.MinioDataDir}}` — MinIO data dir
      `{{.Domain}}` — external domain
  seed_sha256: f9ef19d39b6534523b84854d53db8274c5bbcea688c6e2eebb0054964a6a6b48
- id: ops.always.package.canonical-recipe
  type: REFERENCE
  title: Canonical install sequence for service / infrastructure / command
  tags:
    - always
    - package
    - install
    - reference
  content: |
    Service package (e.g. cluster-controller, echo, dns):
      1. ensure_user_group         # create globular user/group
      2. ensure_dirs               # prefix, state dirs, PKI dirs
      3. install_package_payload   # extract bin/<exec>
      4. ensure_service_config     # write per-service config.json
      5. install_services          # drop systemd unit
      6. enable_services
      7. start_services
      8. health_checks

    Infrastructure with stateful first-start (ScyllaDB):
      1. ensure_dirs
      2. install_package_payload   # install_bins: false — uses upstream binary
      3. run_script prevent-autostart.sh    # block dpkg auto-start
      4. install_local_debs                 # dpkg -i debs/*.deb (offline)
      5. run_script allow-autostart.sh      # remove policy-rc.d block
      6. run_script post-install.sh         # TLS wiring + controlled first-start of Raft

    Infrastructure wrapping an upstream binary (MinIO):
      1. ensure_user_group
      2. ensure_dirs                         # incl. MinIO data dir
      3. install_package_payload             # extract minio binary
      4. install_files                       # minio.env, credentials
      5. install_services                    # globular-minio.service
      6. enable_services
      7. run_script pre-start.sh             # TLS cert symlinks BEFORE start
      8. start_services
      9. health_checks
      10. run_script post-install.sh         # bucket provisioning AFTER start

    Command (CLI tool, no systemd):
      1. ensure_user_group
      2. ensure_dirs                         # {{.Prefix}}/bin/
      3. install_package_payload             # extract binary
      4. (optional) install_files            # /usr/local/bin/<name> wrapper

    Script conventions:
      - `pre-start.sh`   — last-mile prep BEFORE the unit starts (cert symlinks,
                            env files, contract JSON).
      - `post-install.sh`— after the unit is up (bucket provisioning, schema migration,
                            controlled first-start sequences).
      - `prevent-autostart.sh` / `allow-autostart.sh` — bracket dpkg installs for daemons
        whose first-start has a one-way side effect (ScyllaDB Raft bootstrap).

    Every script MUST: `set -euo pipefail`, read inputs from env (`STATE_DIR`, `NODE_IP`,
    `GLOBULAR_DOMAIN`), be idempotent, log with a `[<pkg>/<script>]` prefix, fail loudly.
    NEVER use `pkill -f` (self-SIGKILL); always `pkill -x <binary>`.
  seed_sha256: 57e232ee48fe5a8c03b03ad60fa1b3f6ef3621ac9297ad9e0b0981c8a4437f82
- id: ops.always.package.spec-validation
  type: REFERENCE
  title: Spec validation rules — what the build enforces
  tags:
    - always
    - package
    - validation
  content: |
    `pkgpack.ValidateSpec` and `assertPackageGuards` enforce (build aborts on any
    violation):

    Spec-level:
      - `version: 1` exactly.
      - `metadata.name` resolvable (explicit, or from `service.name`, or from filename).
      - `metadata.kind` ∈ {service, infrastructure, command, application} if set.
      - `metadata.install_mode` ∈ {repository, day0_join} if set.
      - `metadata.priority` ≥ 0.
      - `steps` non-empty; every step has a unique `id` and non-empty `type`.
      - kind=service MUST have exactly one `install_package_payload` step.
      - kind=infrastructure MUST have `install_package_payload` UNLESS
        `metadata.entrypoint: "noop"` (OS-managed exception).
      - Version/build semantics MUST pass:
        - version string is structurally valid for Globular package manifests.
        - build_number is a plain integer and non-negative.
        - version must not embed build tokens (`+bNN`, `-bNN`, `-buildNN`, etc.).

    Built-tarball guards (`assertPackageGuards`):
      - `bin/<exec>` exists in the tarball.
      - `specs/<name>_*.yaml` exists.
      - That spec contains the literal string `install_package_payload`.

    Cross-source validation (`packages/scripts/validate-package-metadata.sh`):
      - `spec.metadata.kind` == `package.json.type` == `registry.yaml.kind`
        == `component_catalog.go` classification.
      - Mismatch → script exits 1.

    Run this BEFORE any commit that touches `packages/`.

    Runtime validation (continuous, by node-agent):
      - systemd unit active.
      - `health_check_port` TCP probe (if declared).
      - `entrypoint_checksum` from manifest matches SHA256 of `/proc/<pid>/exe`
        (detects hot-deploy drift and `(deleted)` inode hazards).
      - `installed.build_id` == `desired.build_id`.

    Publish preflight validation (CLI side) MUST reject publish when:
      - `version` is malformed for package policy.
      - `build_number` is negative or non-integer.
      - `version` embeds a build token instead of using `build_number`.
  seed_sha256: 528d6ab71c798ef7990e1f1b90f13df6a350607e5be709a83450e6c6906e9910
- id: ops.always.package.kind-contracts
  type: REFERENCE
  title: Kind-specific minimum contracts
  tags:
    - always
    - package
    - kind
    - validation
  content: |
    Minimum requirements by package kind:

    - `service`:
      - Exposes a Globular API and participates in mesh routing/discovery.
      - MUST include `install_package_payload`, `ensure_service_config`,
        `install_services`, `start_services`, and runtime health checks.
    - `infrastructure`:
      - Hosts a control-plane/storage daemon (etcd, MinIO, ScyllaDB, envoy, keepalived).
      - MAY use OS-managed delivery (`install_local_debs`, `install_os_packages`) with
        `entrypoint: noop` where appropriate; otherwise follows service-like lifecycle.
    - `command`:
      - CLI-only artifact; no long-running daemon contract.
      - MUST NOT require systemd unit installation/start in canonical flow.
    - `application`:
      - Rare whole-platform bundle; must still declare explicit install recipe and
        pass identity/manifest validation.

    Any ambiguity between kinds is a release-blocking validation error.
  seed_sha256: 467a5952f5c76001888cc62c5df8f5a167f182df22c1c8b652eddc7fe2ad2df8
- id: ops.always.package.deb-strategy
  type: REFERENCE
  title: Debian .deb usage strategy
  tags:
    - always
    - package
    - deb
    - infrastructure
  content: |
    `.deb` artifacts are for OS-managed components, mostly infrastructure daemons.

    Rules:
      - Prefer bundled offline `.deb` (`install_local_debs`) for deterministic installs.
      - Use `install_os_packages` only when online apt resolution is intentional.
      - For first-start-sensitive daemons (ScyllaDB), bracket dpkg with
        `prevent-autostart.sh` and `allow-autostart.sh` to prevent accidental bootstrap.
      - Never treat `.deb` identity as package identity; Globular convergence still keys
        on package manifest/build_id.
      - `.deb` presence does not bypass package validation gates (manifest, checksums,
        recipe validity, kind consistency).
  seed_sha256: a67451c4e3c0e64b7dff739b0ae06ab2d50656f2efdd7d588a22901bc9a439b2
- id: ops.always.package.authoring-checklist
  type: SKILL
  title: Authoring a new package — checklist
  tags:
    - always
    - package
    - authoring
    - skill
  content: |
    When adding a new package, do all of:

    1. Decide kind: gRPC mesh API → `service`; standalone daemon → `infrastructure`;
       CLI tool → `command`.
    2. Add the entry to `packages/registry.yaml` with correct kind, profiles,
       hard_deps, bootstrap_tier.
    3. Add the entry to `component_catalog.go` (runtime catalog authority — must agree).
    4. Create `packages/metadata/<name>/`:
       - `package.json` — reference manifest (name, type, version "0.0.1", publisher,
         entrypoint).
       - `awareness.yaml` — invariants + failure modes (encouraged; flagged by doctor
         if absent).
       - `systemd/`, `config/`, `scripts/` as needed.
    5. Create `packages/specs/<name>_{service,cmd}.yaml`:
       - `metadata.kind` matching registry.
       - Canonical sequence: ensure_user_group → ensure_dirs → install_package_payload
         → ensure_service_config (services) → install_services → enable_services
         → start_services → health_checks.
       - For OS-managed daemons set `entrypoint: noop`, `install_bins: false`, use
         `install_local_debs` / `install_os_packages`.
    6. Code: `Version = ""` in source. Injected via ldflags. NEVER hardcode.
    7. Every spec MUST have `start_services`. No silent "Day-0 will handle it".
    8. Validate:
       `cd packages && ./scripts/validate-package-metadata.sh`
       `cd golang && go build ./globularcli/...`
    9. Local build:
       `globular pkg build --spec packages/specs/<name>_service.yaml --version 0.0.1 --out /tmp/pkgs --root <build-root>`
       `globular pkg inspect /tmp/pkgs/<name>_0.0.1_linux_amd64.tgz`
    10. Publish via deploy:
       `globular --controller <leader>.globular.internal deploy <name> --bump patch --comment "initial release"`
    11. Verify convergence across profile-matching nodes:
       `globular cluster nodes list && globular pkg status <name>`
  seed_sha256: f973a4502cf0a7b5a67d45c12fba191fb3a1c698d1685578f239b6fa8ce5546b
- id: ops.always.package.anti-patterns
  type: DEBUG
  title: Package anti-patterns — what AI agents and humans get wrong
  tags:
    - always
    - package
    - anti-patterns
    - debug
  content: |
    Pulled from accumulated incident memory. AI agents MUST refuse to propose these.

    - Hardcoding `version` in `main.go` — pipeline injects via ldflags; hardcoded
      diverges from deploy-allocated and breaks convergence.
    - Hardcoding gRPC ports or addresses in source — etcd is the sole truth.
    - Using `127.0.0.1` / `localhost` in spec templates — listen MAY use `0.0.0.0`;
      remote addressing MUST resolve from etcd. `{{.NodeIP}}` is the resolved
      STABLE IP, never the VIP.
    - Skipping `install_package_payload` — build fails (`assertPackageGuards`).
      For OS-managed packages set `entrypoint: "noop"` and pass an empty payload step.
    - Adding `start_services` only inside post-install.sh — every spec MUST start
      its own service explicitly.
    - Forgetting to update `registry.yaml` — validator fails across spec /
      package.json / catalog.
    - Overloading `build_number` for convergence — `build_id` is convergence identity;
      `build_number` is display only.
    - Encoding build number inside `version` (for example `1.2.3+b325`) — ordering and
      policy checks become ambiguous; keep build identity only in `build_number`.
    - Using `pkill -f <name>` in scripts — matches parent shell argv → self-SIGKILL.
      Always `pkill -x <binary>`.
    - Hot-deploying a locally-built binary to a node — no ldflags → wrong version
      + wrong checksum → runtime drift → leader election breaks. Always go through
      `globular deploy`.
    - Reformatting MinIO drive count without `mc mirror` backup — drive count
      mismatch → silent reformat or data wipe.
    - Replacing a ScyllaDB binary without restarting the unit — old process holds
      the deleted-inode binary; `/proc/<pid>/exe` reports drift forever.
    - Adding a `repository → MinIO health` gate on the read path — forms a recovery
      deadlock (node-agent → repository → MinIO → node-agent). Repository must
      serve metadata without MinIO.
  seed_sha256: 532348c0baca193f716651bae8bb681fc4c27af96f15a739f4d27e7567bf08f8
- id: ops.always.profile.authority-model
  type: ARCHITECTURE
  title: Profile authority model — intent is controller-owned
  tags:
    - always
    - profile
    - architecture
    - join
  content: |
    Profiles are placement intent, not runtime telemetry.

    Authority boundaries are strict:
    - Controller is the sole authority for assigned node profiles.
    - Gateway is a courier for JoinPlan, never a profile writer.
    - Node-agent executes controller-assigned intent; it does not invent target profiles.

    JoinPlan is the contract:
    - `assigned_profiles` MUST be present and non-empty.
    - Installer MUST validate signature, expiry, identity, and profile validity before join actions.

    A node joining without a valid controller-signed profile set is a hard policy violation.
  seed_sha256: e1638768d43a655e130dc61eac7cd77f23be6d7ac8a4c94a8c0406bc050fcbcd
- id: ops.always.profile.canonicalization
  type: REFERENCE
  title: Canonical profile normalization
  tags:
    - always
    - profile
    - normalization
    - reference
  content: |
    Profile inputs are canonicalized before any policy decision:
    - trim whitespace
    - lowercase
    - deduplicate
    - expand inheritance
    - sort for deterministic comparison

    Current inheritance:
    - `control-plane` implies `core`
    - `compute` implies `core`

    Unknown profiles are invalid in controller-issued JoinPlan and in node-agent join gate.
    They are rejected with explicit errors (never silently accepted during join/bootstrap).
  seed_sha256: 5623ba02e6db45483613240c04599362961527b9be965f12b7be2e5935d0baf0
- id: ops.always.profile.founding-quorum
  type: ARCHITECTURE
  title: Founding quorum profile invariant
  tags:
    - always
    - profile
    - founding-quorum
    - invariant
  content: |
    Founding quorum is non-negotiable:
    the first 3 nodes MUST include `core`, `control-plane`, and `storage`.

    Why:
    - etcd quorum safety
    - Scylla replication safety
    - MinIO distributed durability safety

    Day-0 bootstrap default profiles must satisfy this invariant. Any fallback/default profile set
    that omits `storage` is unsafe and must be treated as a defect.
  seed_sha256: f3b074a2fcedd06925a0d99902e3579f91548afc81e47f3168fbe35dcc9295db
- id: ops.always.profile.catalog-resolution
  type: REFERENCE
  title: Profile → package resolution contract
  tags:
    - always
    - profile
    - package
    - resolution
  content: |
    Profile membership resolves to package install sets through the canonical component catalog map.

    Rules:
    - A profile with zero packages is invalid.
    - Resolution is union(profile package sets), then deduplicated and sorted.
    - Day-0 install uses the same canonical map the controller validates for Day-1+.

    This prevents split-brain between bootstrap install behavior and steady-state reconciliation.
  seed_sha256: 4377a97c3e7f9f8c3c0eff0a9c6f23d1aa91d7d0cd209ae209fc4dcf01d026c8
- id: ops.always.profile.join-gates
  type: DECISION
  title: Join-time validation gates for profiles
  tags:
    - always
    - profile
    - join
    - validation
  content: |
    Profile-specific join gates that must pass before state mutation:

    Controller-side JoinPlan validation:
    - assigned_profiles non-empty
    - assigned_profiles known after canonicalization

    Node-agent JoinPlan gate:
    - signed plan present
    - assigned_profiles non-empty
    - assigned_profiles known after canonicalization

    If these fail, join is blocked. Do not bypass by editing local files or rerunning with ad-hoc flags.
  seed_sha256: ace2849665988d5dfb227e3852cba2d73fe92726d1a8d2183bcb7fb55410d3ab
- id: ops.always.profile.runtime-vs-intent
  type: DEBUG
  title: Intent drift vs runtime drift — do not confuse layers
  tags:
    - always
    - profile
    - drift
    - debug
  content: |
    Profile drift and service runtime drift are different failures:

    - Profile/intent drift: wrong or missing assigned profiles for a node.
    - Runtime drift: desired services known, but applied/runtime state has not converged.

    Do not mutate etcd profile data just because runtime warnings appear.
    First classify whether mismatch is in intent assignment or in apply/runtime layers.

    Typical sequence:
    1. verify node assigned profiles
    2. verify profile-derived desired service set
    3. verify node applied hash progression
    4. verify unit/runtime health
  seed_sha256: 47663e1f191a64bc3c4f3586c1aa31f4e7dc520056f5ca23e56f2e36805b0597
- id: ops.always.profile.anti-patterns
  type: DEBUG
  title: Profile anti-patterns
  tags:
    - always
    - profile
    - anti-patterns
    - debug
  content: |
    Reject these patterns:

    - Gateway or installer inventing profiles when controller did not assign them.
    - Accepting unknown profile names during JoinPlan validation.
    - Using profile defaults that violate founding quorum (`core+control-plane+storage`).
    - Keeping separate normalization rules in controller and node-agent.
    - Treating profiles as runtime health evidence (they are intent).

    Corrective principle: one canonical profile policy surface, enforced at join and bootstrap,
    then propagated through package resolution and reconciliation.
  seed_sha256: 9df6c48a11f5a8bba210e6527a215ffb1415719635da79a23e786a17a0cf7d92
- id: ops.security.credential-separation
  type: ARCHITECTURE
  title: 'Credential separation: token vs certificate vs key'
  tags:
    - always
    - security
    - auth
    - pki
  content: |
    Globular has three distinct credential classes:

    - **JWT token**: short-lived authorization bearer for user/session flows.
    - **Certificate**: identity assertion anchored in cluster/public trust chain.
    - **Private key**: signing authority; must remain secret and filesystem-restricted.

    Do not treat these as interchangeable:
    - token is not machine identity,
    - certificate is not authorization grant,
    - private key is never transport metadata.
  seed_sha256: 67f36c963f66127232231b7b2374fdb18b3fd026e1d4855f46934d91b2130ae4
- id: ops.security.token-policy
  type: DECISION
  title: Token policy — ephemeral by default, explicit persistence only
  tags:
    - always
    - security
    - token
    - jwt
  content: |
    Token handling policy:
    - JWT tokens are short-lived and should be used ephemerally.
    - CLI login must not persist token to disk by default.
    - Disk persistence is explicit opt-in for constrained automation paths only.
    - Any persisted token file must be owner-only (`0600`) and treated as secret.

    Operational implications:
    - Prefer `--token` or ephemeral env injection in CI/runtime automation.
    - Do not rely on hidden token auto-load from home directory.
    - Rotate/re-authenticate rather than extending token lifetime excessively.
  seed_sha256: 2040f0dfc51b780112a63d7d3d6f57a8aef9e0d1ba3d909a0d49197fb807e842
- id: ops.security.internal-pki-policy
  type: DECISION
  title: Internal PKI policy — cluster CA is trust anchor for mTLS
  tags:
    - always
    - security
    - pki
    - mtls
  content: |
    Internal service-to-service and control-plane calls rely on mTLS chained to
    the cluster CA (`/var/lib/globular/pki/ca.crt` with etcd-published CA metadata).

    Rules:
    - verify issuer and SAN identity for every TLS peer;
    - no insecure TLS bypass outside explicitly documented bootstrap exceptions;
    - CLI `--insecure` is explicit operator override only (never implicit default);
    - CA rotation must follow staged trust migration (never single-step hard replace).

    Explicit insecure exceptions must be opt-in and auditable:
    - MCP unverified TLS fallback requires `GLOBULAR_MCP_ALLOW_UNVERIFIED_FALLBACK=true`.
    - Backup destination TLS bypass requires destination option `insecure_skip_verify=true`.
  seed_sha256: 6f8942b048b819d3c2e3b47457e7093f5b8582174c4417f817876753fdb44a8c
- id: ops.security.external-cert-policy
  type: DECISION
  title: External certificate policy — ingress/public domains
  tags:
    - always
    - security
    - ingress
    - acme
    - tls
  content: |
    Public-domain certificates (ACME DNS-01) are ingress-facing certificates used
    for external HTTPS/SNI flows. They do not replace internal cluster CA authority.

    Rules:
    - internal mTLS trust stays on cluster CA,
    - external leaf cert SANs must match served public domains,
    - DNS delegation/challenge failures are operational readiness issues, not identity overrides.
  seed_sha256: fb33413f78bb97c78f1e3d870faf7aa14358c037f86c8e51c981939314a76c73
- id: ops.security.private-key-policy
  type: REFERENCE
  title: Private-key handling policy
  tags:
    - always
    - security
    - keys
  content: |
    Private-key policy:
    - never log private key or token content;
    - never commit keys/tokens in source or runbooks;
    - enforce owner-only file permissions for private keys;
    - treat key copy/backup as explicit ceremony with auditability.

    If a key is suspected leaked:
    - rotate affected key material,
    - invalidate dependent credentials,
    - verify cluster trust chain convergence before resuming normal operations.
  seed_sha256: c0e34571ecb2773f72174919637d5535a762ba7a4f5b7048fc939d5b095fa7d1
- id: ops.security.certificate-rollback-policy
  type: DECISION
  title: Certificate rollback policy — explicit, gated, and reversible
  tags:
    - always
    - security
    - pki
    - rollback
    - tls
  content: |
    Certificate rollback is an incident operation, not a convenience operation.
    It is allowed only when a newer cert/cert-chain rollout causes verified
    production impact and operator intent is explicit.

    Rules:
    - do not rollback CA/certificates as first response; diagnose SAN/issuer/chain mismatch first;
    - do not single-step rollback trust anchors without staged trust validation;
    - preserve rollback evidence (what changed, why, on which nodes) for auditability.

    Mandatory gates before rollback:
    - explicit operator approval and incident context;
    - known-good previous cert/chain identity (issuer + SAN set + validity);
    - convergence plan covering all impacted nodes and control-plane services.

    Mandatory verification after rollback:
    - cluster doctor PKI checks are clean (or explicitly waived with reason);
    - mTLS paths succeed for controller/node-agent/service clients;
    - ingress/public cert behavior matches expected domain/SAN coverage;
    - no node remains on mixed unintended trust state.

    Never reopen repository write operations until post-rollback trust convergence
    is verified across the active cluster.
  seed_sha256: 9f6bf240ed838e342f526dc7f1f6821c2533ab3de0b4e7ba25fe78ddd707c5e0
- id: ops.service.version.identity-source
  type: ARCHITECTURE
  title: Service runtime version identity source of truth
  tags:
    - always
    - version
    - services
  content: |
    For Go services, runtime version identity is a two-step contract:

    1. `zz_version_generated.go` provides a generated baseline `var Version = "<tag>"`.
    2. Build pipeline MAY override via ldflags: `-X main.Version=<version>`.

    The variable MUST remain a `var` (not `const`) so ldflags can override.
    Runtime consumers (`--version`, `--describe`, service config) must read from this same variable.
  seed_sha256: c5d484d0fb68be225d52e6f4dfaf1dd87ac118ea96de3aa80896dbe9ea5382bf
- id: ops.service.version.zz-generated-file-contract
  type: DECISION
  title: zz_version_generated.go contract
  tags:
    - always
    - version
    - generated
  content: |
    Every service `zz_version_generated.go` file must:
    - be marked generated (`Code generated by build/gen-version.sh — DO NOT EDIT`);
    - declare `var Version = "..."`;
    - include an init-time non-empty guard (panic on empty version).

    Why:
    - generated provenance is auditable;
    - `var` preserves ldflags override capability;
    - non-empty guard catches broken build/version pipelines early.
  seed_sha256: 03311f15c3c873b4bef778087c93e15f24d8368d4acbfa38d6c221c1b25fdf80
- id: ops.service.version.runtime-wiring
  type: REFERENCE
  title: Service runtime wiring requirement
  tags:
    - always
    - version
    - runtime
  content: |
    Service startup/default config must wire runtime version from package variable:
    - `srv.Version = Version` (or equivalent in config initialization).
    - Never assign `Version: ""` in defaults for real services.

    If runtime version is empty/mismatched, verifier and release diagnostics
    lose identity continuity and emit runtime identity drift symptoms.
  seed_sha256: 2a52a2d2bf3767a7b20c6038d2345797e58d98495af580f74b72c0e28fe26922
