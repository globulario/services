# cluster_operator forbidden-move catalog.
# MANDATORY: every forbidden move carries a paired generative `recommended_behavior`
# (and where useful a safe_next_step) — negative-only rules are not allowed.
- id: forbidden.cluster.restart_before_quorum_check
  title: Restart dependent services before checking quorum
  reason: a blind restart under etcd pressure can lose quorum and cascade failures
  recommended_behavior: Establish member health, alarm state, and compaction/defrag safety, then restart only if quorum is preserved.
  safe_next_step: gather evidence.cluster.etcd.member_health and evidence.cluster.etcd.alarm_status first
- id: forbidden.cluster.claim_recovery_without_authoritative_evidence
  title: Claim recovery after a command succeeds
  reason: a command result is action evidence, not recovery; the owner authority defines recovery
  recommended_behavior: Claim recovery only after the owner authority's desired vs observed state compares clean.
  safe_next_step: gather evidence.cluster.owner_service.desired_state and evidence.cluster.owner_service.observed_state
- id: forbidden.cluster.direct_runtime_mutation_without_owner_authority
  title: Mutate runtime state without the owning service's authority
  reason: bypassing the owner's typed API corrupts the authority boundary
  recommended_behavior: Route every runtime mutation through the owner service's typed API.
  safe_next_step: resolve authority.cluster.owner_service.runtime_state before acting
- id: forbidden.cluster.minio_topology_change_without_pool_authority
  title: Change MinIO topology without pool/format authority
  reason: drive-count/topology changes can trigger silent reformat and data loss
  recommended_behavior: Reason from pool health, format/topology authority, and convergence evidence before any topology change; mirror first.
  safe_next_step: gather evidence.cluster.minio.pool_health before topology mutation
- id: forbidden.cluster.controller_executes_local_mutation
  title: Controller performs local node mutation
  reason: collapsing decide/execute authority puts execution into a decision service
  recommended_behavior: Keep decide/coordinate/execute separate — controller decides, workflow coordinates, node-agent executes.
  safe_next_step: dispatch a workflow rather than executing locally from the controller
- id: forbidden.cluster.raw_owner_owned_state_write
  title: Raw-write owner-owned desired/spec/status state (bypassing the owner path)
  reason: >-
    A raw storage write (etcdctl put/del, mcp raw write, repair script, or a CLI --force that
    bypasses kind validation) to owner-owned control-plane state skips the owner/controller RPC
    path. That path is what bumps the generation, triggers reconcile, and refreshes derived
    projections. Bypassing it leaves a stale resolved_version / cache_digest, a generation that
    never moved, false-green dashboards, and — when the kind is wrong — a permanently
    unconvergeable desired record (the xds-as-SERVICE cross-kind scar). The owner is the only
    writer of its desired/spec/status.
  recommended_behavior: >-
    Route every owner-owned state change through the owning controller's typed RPC
    (UpsertDesiredService, ApplyInfrastructureRelease, RemoveDesiredService, ...) so generation
    bumps, reconcile triggers, and the resolved projection refreshes; verify those postconditions
    before claiming success.
  safe_next_step: resolve authority.cluster.owner_service.runtime_state and use the owner RPC; raw etcd is read-only / break-glass only
  action_aliases: etcdctl_put, etcdctl_del, etcd_put, etcd_delete, raw_etcd_write, mcp_raw_write, write_desired_state_directly, patch_resolved_version, patch_cache_digest, patch_generation, manual_placement_patch, manual_release_state_patch, manual_package_lifecycle_patch, set_infra_version_raw, services_desired_set_force_cross_kind, nodeagent_installed_set_raw, cluster_config_put_owner_owned
- id: forbidden.cluster.hot_swap_binary_outside_release_pipeline
  title: Hot-swap a service binary outside the release pipeline (cp-swap / local build)
  reason: a locally-built or cp-swapped binary has no ldflags version and a different checksum, so the 4-layer truth model (repository → desired → installed → runtime) diverges — runtime drift, broken leader election, and a deleted-inode binary that reports drift forever
  recommended_behavior: Deploy every binary change through the release pipeline (globular deploy / package_build + package_publish + reconcile) so version and checksum stay coherent across all four layers; walk the lane.
  safe_next_step: resolve authority.cluster.release_pipeline.deployed_identity (repository active release + node-agent installed state) before changing what a service runs
  action_aliases: replace_binary_in_place, direct_binary_replacement, cp_swap_binary, hot_deploy_binary, hot_swap_binary, scp_binary_to_node, deploy_local_build
