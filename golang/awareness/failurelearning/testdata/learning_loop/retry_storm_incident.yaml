# Fixture for TestLearningLoopClosesOnReoccurrence.
#
# This is the canonical example used by the learning-loop closure test:
# a deterministic-failure retry storm. The test promotes this incident,
# applies the proposal to the failure graph, then injects the same error
# again and asserts the loop catches it (no fresh CreateCategory proposal).

source_id: INC-2026-RETRY-STORM
source_type: incident
created_by: assurance-loop-test

raw_errors:
  - "workflow_runner: deterministic install failure for compute_pool retried 47 times in 12 minutes — last error: package signature invalid"

root_causes:
  - "workflow_runner retried a deterministic install failure forever; signature-invalid is not a transient error"

resolutions:
  - "quarantine the deterministic failure and require explicit operator action; do not blindly retry"

wrong_fixes:
  - "blindly_retry_failed_action"
  - "increase_retry_count"

regression_tests:
  - "TestDeterministicFailureDoesNotRetryForever"

related_invariants:
  - "deterministic_failures_must_quarantine_or_require_user_action"

# Recurrence string used by the second-incident probe to verify the freshly
# applied category matches when the same failure recurs. We keep it
# identical to the first raw_error so the test asserts loop closure on
# *recurrence*, not on the matcher's fuzzy-matching tolerance.
recurrence_raw_error: "workflow_runner: deterministic install failure for compute_pool retried 47 times in 12 minutes — last error: package signature invalid"
