incident_id: infra.desired_hash_mismatch_restart_storm.2026-05-06
title: Infrastructure desired hash mismatch causes Envoy restart storm
status: draft
severity: critical

time_range:
  from: "2026-05-06T10:00:00Z"
  to: "2026-05-06T11:00:00Z"

symptoms:
  - gRPC-Web calls failed with status 0
  - Envoy received repeated SIGTERM
  - systemd reported start-limit-hit
  - InfrastructureRelease install workflows dispatched repeatedly
  - installed-state checksum did not match InfrastructureRelease DesiredHash

observed_services:
  - envoy
  - xds
  - cluster-controller
  - workflow-service
  - node-agent

state_deltas:
  - InfrastructureRelease DesiredHash did not match installed-state checksum
  - xds installed-state record was missing after restart
  - lookupServiceReleaseBuildID returned ResolvedArtifactDigest instead of canonical DesiredHash

workflow_receipts:
  - InfrastructureRelease install workflow dispatched 7 times in 45 minutes
  - repair-via-start path called systemctl restart on every convergence tick
  - workflow completed with SUCCEEDED but convergence re-triggered immediately

doctor_findings:
  - "convergence.no_infinite_retry violated: envoy install loop detected"
  - xds installed-state missing after claimed successful install
  - desired_hash in workflow did not match InfrastructureRelease canonical hash

runtime_events:
  - "envoy.service: start-limit-hit (systemd)"
  - "envoy.service: SIGTERM received (systemd)"
  - xds version marker file missing from /var/lib/globular/packages/

manual_repairs:
  - stamped correct desired_hash checksums into infra package etcd keys
  - wrote xds version marker file to /var/lib/globular/packages/xds/
  - wrote xds installed-state record to etcd with canonical DesiredHash
  - restarted cluster-controller leader to clear stale convergence state

suspected_root_cause: >
  The drift reconciler workflow used ResolvedArtifactDigest (raw artifact digest) as desired_hash
  while the InfrastructureRelease convergence check used ComputeInfrastructureDesiredHash.
  The two hashes will never match, making convergence mathematically impossible.
  Each convergence tick dispatched a new install workflow, which restarted Envoy via
  repair-via-start, triggering systemd start-limit-hit and killing gRPC-Web traffic.

related_files:
  - golang/cluster_controller/cluster_controller_server/infrastructure_reconciler.go
  - golang/node_agent/node_agent_server/installed_services.go
  - golang/workflow/workflow_server/infra_release_handler.go

related_symbols:
  - lookupServiceReleaseBuildID
  - ComputeInfrastructureDesiredHash
  - ResolvedArtifactDigest
  - CommitConvergenceResult
  - ManagedInstalled

evidence:
  - Workflow receipts showing 7 repeated dispatches in 45 minutes
  - "Doctor finding: convergence.no_infinite_retry violated"
  - Manual repair confirmed hash mismatch as root cause

proposed:
  failure_modes:
    - id: infra.desired_hash_mismatch_restart_storm
      title: Infrastructure desired hash mismatch causes install loop and Envoy restart storm
      severity: critical
      symptoms:
        - gRPC-Web calls fail with status 0
        - Envoy receives repeated SIGTERM
        - systemd reports start-limit-hit
        - InfrastructureRelease install workflows dispatch repeatedly
        - installed-state checksum does not match InfrastructureRelease DesiredHash
      root_cause: >
        Drift reconciler workflow used raw artifact digest as desired_hash while
        InfrastructureRelease convergence checks used ComputeInfrastructureDesiredHash.
        The mismatch made convergence impossible and caused repeated install/restart workflows.
      architecture_fix: >
        Use the canonical InfrastructureRelease DesiredHash everywhere: workflow desired_hash,
        LocalHash, installed-state checksum, and convergence commit paths.
        Do not use ResolvedArtifactDigest as desired_hash for infrastructure drift reconciliation.
      related_invariants:
        - convergence.no_infinite_retry
        - infra.desired_hash_consistency
        - service.restart_singleflight
        - infra.heartbeat_not_desired_authority
        - runtime.installed_state_not_liveness
      related_services:
        - envoy
        - xds
        - cluster-controller
        - workflow-service
        - node-agent
      forbidden_fixes:
        - restart_envoy_on_every_drift_tick
        - use_raw_artifact_digest_as_desired_hash
        - create_infra_release_from_heartbeat_only
        - stamp_installed_state_without_canonical_desired_hash
      required_tests:
        - TestInfrastructureDesiredHashConsistency
        - TestDriftWorkflowUsesDesiredHash
        - TestRestartSingleflightPerService
        - TestHeartbeatDoesNotCreateInfrastructureRelease
        - TestMissingXDSInstalledStateBlocksEnvoyWithClearDiagnosis

  invariants:
    - id: infra.desired_hash_consistency
      title: Infrastructure desired hash identity must be consistent
      severity: critical
      summary: >
        InfrastructureRelease DesiredHash, workflow desired_hash, installed-state checksum,
        and convergence committer package checksum must all use the same canonical
        ComputeInfrastructureDesiredHash value. Raw artifact digest must not be used
        as desired_hash for drift reconciliation.
      protects:
        state:
          - /globular/resources/InfrastructureRelease
          - /globular/installed-state
        symbols:
          - lookupServiceReleaseBuildID
          - ComputeInfrastructureDesiredHash
          - CommitConvergenceResult
          - ManagedInstalled
        services:
          - cluster-controller
          - workflow-service
          - node-agent
      forbidden_fixes:
        - use_raw_artifact_digest_as_desired_hash
        - stamp_installed_state_from_noncanonical_hash
        - restart_service_to_resolve_hash_mismatch
      required_tests:
        - TestInfrastructureDesiredHashConsistency
        - TestDriftWorkflowUsesDesiredHashNotArtifactDigest

    - id: service.restart_singleflight
      title: Service restart actions must be singleflight and bounded
      severity: critical
      summary: >
        Multiple convergence paths must not issue concurrent Restart calls for the same service.
        Restart is an effectful action and must be deduplicated, rate-limited, and tied to a
        verified state transition.
      forbidden_fixes:
        - restart_on_every_drift_tick
        - parallel_restart_same_service
        - restart_without_state_change
        - restart_to_fix_hash_mismatch
      required_tests:
        - TestRestartSingleflightPerService
        - TestDriftLoopDoesNotRestartRepeatedly
        - TestSystemdStartLimitNotHitByConvergence

    - id: infra.heartbeat_not_desired_authority
      title: Heartbeat discovery must not create desired infrastructure authority
      severity: critical
      summary: >
        Runtime heartbeat or ManagedInstalled observation may report discovered infrastructure,
        but must not alone create authoritative InfrastructureRelease desired state.
        Desired infrastructure must come from package, release, BOM, or controller authority.
      forbidden_fixes:
        - create_infra_release_from_heartbeat_only
        - promote_discovered_runtime_to_desired_without_source
        - treat_managed_installed_as_release_authority
      required_tests:
        - TestHeartbeatDoesNotCreateInfrastructureRelease
        - TestFallbackDiscoveredDoesNotTriggerInstallWorkflow

  forbidden_fixes:
    - id: restart_envoy_on_every_drift_tick
      summary: >
        Restarting Envoy on every convergence tick is not a fix for desired_hash mismatch.
        It triggers systemd start-limit-hit and kills gRPC-Web traffic without resolving
        the underlying hash identity bug.
      related_invariants:
        - service.restart_singleflight
        - infra.desired_hash_consistency
    - id: use_raw_artifact_digest_as_desired_hash
      summary: >
        Using ResolvedArtifactDigest as the desired_hash for InfrastructureRelease convergence
        produces a hash that will never match ComputeInfrastructureDesiredHash, making
        convergence mathematically impossible.
      related_invariants:
        - infra.desired_hash_consistency
    - id: create_infra_release_from_heartbeat_only
      summary: >
        Creating an authoritative InfrastructureRelease from heartbeat discovery data alone
        bypasses the package/release/BOM authority chain and can produce incorrect desired state.
      related_invariants:
        - infra.heartbeat_not_desired_authority
    - id: stamp_installed_state_without_canonical_desired_hash
      summary: >
        Writing an installed-state record with a non-canonical desired_hash causes all future
        convergence checks to fail, resulting in an infinite install loop.
      related_invariants:
        - infra.desired_hash_consistency
        - install.result.atomic_commit

  required_tests:
    - TestInfrastructureDesiredHashConsistency
    - TestDriftWorkflowUsesDesiredHash
    - TestRestartSingleflightPerService
    - TestHeartbeatDoesNotCreateInfrastructureRelease
    - TestMissingXDSInstalledStateBlocksEnvoyWithClearDiagnosis

  context_aliases:
    infra.desired_hash_consistency:
      - desired hash mismatch
      - checksum mismatch
      - drift loop
      - install loop
      - raw artifact digest
      - ComputeInfrastructureDesiredHash
      - ResolvedArtifactDigest

    service.restart_singleflight:
      - restart storm
      - SIGTERM storm
      - start-limit-hit
      - repeated restart
      - restart loop

    infra.heartbeat_not_desired_authority:
      - heartbeat created release
      - ManagedInstalled created InfrastructureRelease
      - runtime promoted to desired
