rules:
  - id: desired_hash_drift_loop
    summary: >
      When a convergence loop is detected and the installed-state checksum does not match
      the InfrastructureRelease DesiredHash, use ComputeInfrastructureDesiredHash to
      re-derive the canonical hash before comparing. Never use ResolvedArtifactDigest
      as the desired_hash for drift reconciliation.

  - id: restart_storm_requires_singleflight
    summary: >
      When a service receives repeated SIGTERMs or systemd reports start-limit-hit,
      check whether multiple convergence paths are issuing concurrent Restart calls.
      Apply singleflight deduplication before issuing any restart workflow.

  - id: etcd_nospace_requires_compaction
    summary: >
      When etcd disk usage exceeds the warn threshold, schedule a compaction and
      defragmentation. Do not write new entries until disk usage falls below 70%.
      NOSPACE alarm blocks all writes cluster-wide.

  - id: minio_offline_disk_requires_investigation
    summary: >
      When MinIO reports offline disks, investigate before adding replacement drives.
      Drive count changes to format.json can trigger silent reformatting and data loss.
      Back up with mc mirror before any topology change.
