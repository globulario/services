dns_zones:
  - id: globular.internal
    kind: internal
    summary: Internal cluster DNS zone for service discovery
    records:
      - name: globular.internal
        type: A
        resolves_to: 10.0.0.100
        risks_invariants:
          - recovery.must_not_depend_on_dns_only
      - name: cluster-controller.globular.internal
        type: A
        resolves_to: 10.0.0.100
      - name: etcd.globular.internal
        type: A
        resolves_to: 10.0.0.100
      - name: minio.globular.internal
        type: A
        resolves_to: 10.0.0.100
      - name: scylla.globular.internal
        type: A
        resolves_to: 10.0.0.100

  - id: globular.io
    kind: external
    summary: External public DNS zone
    records:
      - name: "*.globular.io"
        type: CNAME
        resolves_to: globular.internal

service_endpoints:
  - id: cluster_controller.globular.internal
    fqdn: cluster-controller.globular.internal
    port: 12000
    protocol: grpc
    tls: true
    zone: globular.internal
    covered_by_cert: cert:cluster-controller.globular.internal
    advertised_by: cluster_controller
  - id: workflow.globular.internal
    fqdn: workflow.globular.internal
    port: 10220
    protocol: grpc
    tls: true
    zone: globular.internal
    covered_by_cert: cert:cluster.globular.internal
    advertised_by: workflow

domain_specs:
  - id: globular.internal
    fqdn: globular.internal
    zone: globular.internal
    kind: internal
    acme_enabled: false
    cert_id: cert:cluster.globular.internal
    records:
      - globular.internal
      - cluster-controller.globular.internal
      - etcd.globular.internal
  - id: globular.io
    fqdn: "*.globular.io"
    zone: globular.io
    kind: external
    acme_enabled: true
    cert_id: cert:wildcard.globular.io
    records:
      - "*.globular.io"
