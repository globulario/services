queries:
  - id: etcd_fsync_latency_ms
    query: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) * 1000
    service: etcd
    unit: ms

  - id: etcd_disk_percent
    query: 100 * (1 - (node_filesystem_avail_bytes{mountpoint="/var/lib/etcd"} / node_filesystem_size_bytes{mountpoint="/var/lib/etcd"}))
    service: etcd
    unit: percent

  - id: workflow_failed_runs_15m
    query: increase(workflow_run_total{status="failed"}[15m])
    service: workflow
    unit: count

  - id: minio_offline_disks
    query: minio_cluster_drive_offline_total
    service: minio
    unit: count

  - id: scylla_disk_percent
    query: 100 * (1 - (node_filesystem_avail_bytes{mountpoint="/var/lib/scylla"} / node_filesystem_size_bytes{mountpoint="/var/lib/scylla"}))
    service: scylla
    unit: percent

  - id: node_memory_used_percent
    query: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))
    service: node
    unit: percent
