invariants:
  - id: critical_state.absence_is_not_destructive_intent
    title: Absent configuration must not be treated as an intent to destroy running state
    severity: critical
    status: active
    summary: >
      When a configuration key or spec is absent (etcd key missing, YAML removed),
      a running service must not be stopped, disabled, or destroyed. Absence means
      "not configured" — it does not mean "should not exist". Destructive actions
      require explicit intent markers (tombstones, deletion records), not absence detection.
    forbidden_fixes:
      - stop_runtime_on_missing_key
      - delete_runtime_on_timeout
      - treat_invalid_spec_as_disable
      - disable_service_on_absent_config
    required_tests:
      - TestAbsentKeyDoesNotStopRunningService
      - TestMissingSpecDoesNotDisableKeepAlived
      - TestAbsenceIsNotDestructiveIntent

  - id: runtime.installed_state_must_match_package_kind
    title: Installed state runtime classification must match the package kind
    severity: high
    status: active
    summary: >
      When the doctor or node-agent classifies installed state, it must use the
      package kind (COMMAND, SERVICE, INFRA) to determine runtime expectations.
      COMMAND packages do not have systemd units — flagging them as missing a
      unit is a false positive. The installed_state record must carry the
      canonical kind so the convergence check can distinguish expected absence
      from actual absence.
    forbidden_fixes:
      - require_systemd_unit_for_command_package
      - flag_command_package_as_missing_unit
      - treat_command_package_as_service
      - ignore_package_kind_in_doctor
    required_tests:
      - TestCommandPackageDoesNotRequireSystemdUnit
      - TestInstalledStateKindMatchesCatalog
      - TestDoctorFalsePositiveCommandPackage

  - id: desired.bootstrap_state_requires_promotion
    title: Bootstrap discovery state must not be promoted to desired without explicit approval
    severity: critical
    status: active
    summary: >
      The first-boot bootstrap phase discovers a candidate desired state from
      package manifests and node profiles. This discovery result must be
      explicitly promoted (via the bootstrap workflow or operator approval)
      before it becomes authoritative desired state. Treating bootstrap
      discovery as already-convergent desired state causes premature
      convergence claims and hides real drift.
    forbidden_fixes:
      - auto_promote_bootstrap_state
      - treat_bootstrap_discovery_as_desired
      - skip_bootstrap_promotion_workflow
      - claim_convergence_from_bootstrap_only
    required_tests:
      - TestBootstrapStateRequiresPromotion
      - TestBootstrapDiscoveryNotAuthoritative
      - TestFirstBootDoesNotClaimConvergence

  - id: recovery.must_not_depend_on_dns_only
    title: Recovery paths must not depend solely on DNS resolution
    severity: high
    status: active
    summary: >
      Emergency recovery procedures (node repair, cluster rejoin, manual
      intervention) must not rely exclusively on DNS resolution. DNS may be
      degraded during the exact conditions that require recovery. Recovery
      paths must always have a fallback to direct IP or etcd-resolved addresses.
    forbidden_fixes:
      - use_dns_only_for_recovery_endpoints
      - assume_dns_available_during_failure
    required_tests:
      - TestRecoveryUsesIPFallback
      - TestJoinScriptDoesNotRequireDNS
