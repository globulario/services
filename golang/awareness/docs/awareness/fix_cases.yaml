fix_cases:
  - id: absence_as_destructive_intent
    title: Absent etcd key treated as intent to stop keepalived
    status: DONE
    pattern: absent config disabled runtime keepalived
    target_invariants:
      - critical_state.absence_is_not_destructive_intent
    fixed_files:
      - golang/node_agent/node_agent_server/keepalived_reconciler.go
    required_tests:
      - TestAbsentKeyDoesNotStopRunningService
      - TestMissingSpecDoesNotDisableKeepAlived
    dod: Keepalived reconciler reads absent spec as no-op, not disable. Confirmed with integration test.

  - id: bootstrap_state_promotion
    title: Bootstrap state auto-promoted to authoritative desired state
    status: DONE
    pattern: bootstrap state claimed convergence
    target_invariants:
      - desired.bootstrap_state_requires_promotion
    fixed_files:
      - golang/cluster_controller/cluster_controller_server/bootstrap_phases.go
    required_tests:
      - TestBootstrapStateRequiresPromotion
      - TestFirstBootDoesNotClaimConvergence
    dod: Bootstrap phase does not auto-promote. Promotion requires explicit workflow completion. Promoted via proposal.inc_2026_0002.promoted in v1.2.20.

  - id: scylla_critical_keyspace_rf_policy
    title: ScyllaDB critical keyspace replication factor below minimum
    status: DONE
    pattern: scylla replication factor below minimum
    target_invariants:
      - scylla.critical_keyspace_replication_policy
    required_tests:
      - TestScyllaKeyspaceRFAtLeastThree
      - TestCriticalKeyspaceRFEnforced
    dod: All critical keyspaces verified RF>=3. Schema migration adds enforcement check.

  - id: lkg_expansion
    title: Last-known-good state expansion misclassified active nodes
    status: DONE
    pattern: lkg expansion misclassified active node
    target_invariants:
      - recovery.must_not_depend_on_dns_only
    required_tests:
      - TestLKGExpansionDoesNotMisclassifyActiveNodes
    dod: LKG expansion validated against live etcd membership before acting.

  - id: critical_state_registry_ownership
    title: Critical state registry owned by wrong authority
    status: IN_PROGRESS
    pattern: critical state registry ownership violation
    target_invariants:
      - critical_state.absence_is_not_destructive_intent
    required_tests:
      - TestCriticalStateRegistryOwnership
      - TestRegistryAuthorityChain
    dod: Registry write paths gated on authority check. No implicit ownership escalation.

  - id: intent_markers_tombstones
    title: Tombstone records missing for deleted resources
    status: PROPOSED
    pattern: deleted resource no tombstone
    target_invariants:
      - critical_state.absence_is_not_destructive_intent
    required_tests:
      - TestDeletedResourceHasTombstone
      - TestAbsenceVsTombstoneDistinction
    dod: All delete paths write tombstone records. Absence without tombstone triggers alert.

  - id: reconcile_lane_starvation
    title: Reconcile lane starvation under high-priority load
    status: DONE
    pattern: reconcile starvation P0 blocking P1
    target_invariants:
      - reconcile.global_work_must_not_starve_completion
    required_tests:
      - TestReconcileLaneStarvation
      - TestP0DoesNotStarveP1
    dod: Reconcile lanes separated by priority. P0 cap enforced. Verified under load test.

  - id: bounded_critical_queries
    title: Critical etcd queries unbounded causing leader instability
    status: DONE
    pattern: unbounded etcd query leader instability
    target_invariants:
      - service.endpoint.etcd_address_reachability
    required_tests:
      - TestCriticalQueriesAreBounded
      - TestEtcdQueryTimeout
    dod: All critical etcd queries have explicit timeouts and result limits.

  - id: derived_state_blocks_authority
    title: Derived state used as authority for desired state decisions
    status: DONE
    pattern: derived state promoted to authority
    target_invariants:
      - desired.bootstrap_state_requires_promotion
    required_tests:
      - TestDerivedStateDoesNotBlockAuthority
      - TestAuthorityChainPreserved
    dod: Derived state computation separated from authority chain. No derived state write to authority paths.

  - id: recovery_without_dns
    title: Recovery procedure requires DNS to be available
    status: DONE
    pattern: recovery depends on DNS resolution
    target_invariants:
      - recovery.must_not_depend_on_dns_only
    required_tests:
      - TestRecoveryUsesIPFallback
      - TestJoinScriptDoesNotRequireDNS
    dod: Recovery scripts and join procedure work with direct IPs. DNS checked last, not first.

  - id: destructive_action_guards
    title: Destructive cluster actions lacked confirmation guard
    status: DONE
    pattern: destructive action without guard
    target_invariants:
      - critical_state.absence_is_not_destructive_intent
    required_tests:
      - TestDestructiveActionsRequireConfirmation
      - TestForceRequiredForDestructiveOps
    dod: All destructive operations require Force=true or explicit confirmation. CLI enforces --force flag.

  - id: topology_safety_drift_reconciler
    title: Drift reconciler bypassed topology safety checks
    status: DONE
    pattern: topology safety bypassed drift reconciler
    target_invariants:
      - objectstore.topology_contract
    required_tests:
      - TestDriftReconcilerRespectsTopologySafety
      - TestMinIOTopologyContractEnforced
    dod: Drift reconciler reads topology invariants before dispatching install workflows.

  - id: drift_severity_escalation
    title: Drift severity not escalating on repeated failures
    status: DONE
    pattern: drift severity not escalating repeated failures
    target_invariants:
      - reconcile.global_work_must_not_starve_completion
    required_tests:
      - TestDriftSeverityEscalates
      - TestRepeatedDriftTriggersIncident
    dod: Drift severity escalates P1→P0 after threshold. Incident created at P0.

  - id: pki_ca_registry
    title: PKI CA registry missing secondary validation
    status: DONE
    pattern: pki ca registry missing validation
    target_invariants:
      - recovery.must_not_depend_on_dns_only
    required_tests:
      - TestPKICARegistryValidation
      - TestCertificateChainVerified
    dod: CA registry validates cert chain on write. Stale entries rejected.

  - id: runtime_proof_package_kind
    title: Runtime proof did not check package kind before asserting unit presence
    status: DONE
    pattern: runtime proof package kind mismatch
    target_invariants:
      - runtime.installed_state_must_match_package_kind
    required_tests:
      - TestRuntimeProofChecksPackageKind
      - TestCommandPackageDoesNotRequireSystemdUnit
    dod: Runtime proof skips systemd unit check for COMMAND packages. Package kind sourced from catalog, not guessed.

  - id: objectstore_critical_registry
    title: Object store critical registry lacked replication check
    status: DONE
    pattern: objectstore registry replication below minimum
    target_invariants:
      - objectstore.topology_contract
    required_tests:
      - TestObjectstoreRegistryReplicationCheck
      - TestMinIOErasureCodingMinimum
    dod: Object store registry checks that RF >= erasure coding minimum before accepting writes.
