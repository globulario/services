id: ERRCAT-vip_used_as_member_endpoint
type: ErrorCategory
name: vip_used_as_member_endpoint
severity: critical
summary: Keepalived floating VIP used where a real node NIC IP is required for member identity.

signatures:
  - "unable to connect to initial hosts dial tcp <ip>:<port> connect connection refused"
  - "scylla hosts include <ip>"
  - "gocql unable to create session"

symptoms:
  - id: SYM-scylla_hosts_include_vip
    summary: "Scylla hosts include cluster VIP."
  - id: SYM-service_config_points_to_vip
    summary: "Service config points to floating VIP address."
  - id: SYM-clients_connect_through_vip_where_member_identity_required
    summary: "Clients connect through VIP where member identity is required."

causes:
  - id: CAUSE-primaryip_returned_keepalived_vip
    summary: "PrimaryIP() returned keepalived VIP instead of real node NIC IP because VIP is the first non-loopback interface on the VIP holder."

resolutions:
  - id: RES-use_stableip_clusterVIP
    summary: "Use StableIP(clusterVIP) — filters out the floating VIP, returns real node NIC IP."
  - id: RES-read_vip_from_ingress_spec
    summary: "Read VIP from /globular/ingress/v1/spec vip_failover.vip field."
  - id: RES-exclude_vip_from_member_endpoint_lists
    summary: "Exclude VIP from member endpoint lists: Scylla hosts, MinIO peers, etcd advertise addresses."

wrong_fixes:
  - id: WRONG-add_vip_to_service_member_hosts
    summary: "Do not add VIP to service member hosts."
  - id: WRONG-disable_tls_verification_vip
    summary: "Do not disable TLS verification to work around VIP identity mismatch."
  - id: WRONG-add_vip_to_unrelated_cert_sans
    summary: "Do not add VIP to unrelated certificate SANs."
  - id: WRONG-treat_ingress_address_as_node_identity
    summary: "Do not treat ingress address as node identity."

tests:
  - id: REGTEST-scylla_hosts_exclude_vip
    summary: "Scylla hosts in /globular/cluster/scylla/hosts must not contain /globular/ingress/v1/spec VIP."
  - id: REGTEST-service_member_endpoints_equal_active_member_ips
    summary: "Service member endpoints equal real member NIC IPs, not the VIP."
