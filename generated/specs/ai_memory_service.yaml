version: 1

metadata:
  name: ai_memory
  profiles: [core, compute]
  priority: 1000

service:
  name: ai_memory
  exec: ai_memory_server

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/ai_memory"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      # INV-PKI-1: Removed obsolete config/tls directory - all certs under pki/

  - id: install-ai_memory-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: ensure-ai_memory-config
    type: ensure_service_config
    service_name: ai_memory
    exec: ai_memory_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: install-ai_memory-service
    type: install_services
    units:
      - name: globular-ai-memory.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular ai_memory
          After=network-online.target globular-event.service globular-resource.service scylla-server.service
          Wants=network-online.target globular-event.service globular-resource.service scylla-server.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/ai_memory
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services

          ExecStartPre=+/bin/sh -c 'mkdir -p {{.StateDir}}/ai_memory && chown globular:globular {{.StateDir}}/ai_memory'
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -f /var/lib/globular/pki/issued/services/service.crt ] && exit 0; sleep 1; done; echo "TLS cert not ready after 60s"; ls -la /var/lib/globular/pki/issued/services/ 2>&1 || echo "cert dir missing"; exit 1'
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 90); do ss -lnt | grep -q ":9042 " && exit 0; sleep 1; done; echo "scylla 9042 not ready after 90s"; ss -lnt 2>&1; systemctl status scylla-server.service --no-pager -l 2>&1 | tail -5; exit 1'
          ExecStart={{.Prefix}}/bin/ai_memory_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-ai_memory
    type: enable_services
    services:
      - globular-ai-memory.service

  - id: start-ai_memory
    type: start_services
    services:
      - globular-ai-memory.service
    binaries:
      globular-ai-memory.service: ai_memory_server

  - id: health-ai_memory
    type: health_checks
    services:
      - globular-ai-memory.service
