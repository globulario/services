version: 1

metadata:
  name: cluster_controller

service:
  name: cluster_controller
  exec: cluster_controller_server

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/cluster_controller"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      # INV-PKI-1: Removed obsolete config/tls directory - all certs under pki/

  - id: install-cluster_controller-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: ensure-cluster_controller-config
    type: ensure_service_config
    service_name: cluster_controller
    exec: cluster_controller_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: install-cluster_controller-service
    type: install_services
    units:
      - name: globular-cluster-controller.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular cluster_controller
          After=network-online.target globular-event.service
          Wants=network-online.target globular-event.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/cluster_controller
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          Environment=GLOBULAR_BOOTSTRAP=1
          ExecStartPre=/bin/sh -c 'mkdir -p {{.StateDir}}/cluster_controller && chown globular:globular {{.StateDir}}/cluster_controller'
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -f /var/lib/globular/pki/issued/services/service.crt ] && exit 0; sleep 1; done; echo "TLS cert not ready"; exit 1'
          ExecStart={{.Prefix}}/bin/cluster_controller_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-cluster_controller
    type: enable_services
    services:
      - globular-cluster-controller.service

  - id: start-cluster_controller
    type: start_services
    services:
      - globular-cluster-controller.service
    binaries:
      globular-cluster-controller.service: cluster_controller_server

  - id: health-cluster_controller
    type: health_checks
    services:
      - globular-cluster-controller.service
