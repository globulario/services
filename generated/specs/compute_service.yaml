version: 1

metadata:
  name: compute
  profiles: [compute]
  priority: 2000

service:
  name: compute
  exec: compute_server

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/compute"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/compute/jobs"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750

  - id: install-compute-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-workflow-definitions
    type: ensure_dirs
    dirs:
      - path: "{{.StateDir}}/workflows"
        owner: globular
        group: globular
        mode: 0750

  - id: ensure-compute-config
    type: ensure_service_config
    service_name: compute
    exec: compute_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: install-compute-service
    type: install_services
    units:
      - name: globular-compute.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular compute
          After=network-online.target globular-event.service globular-workflow.service
          Wants=network-online.target globular-event.service globular-workflow.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/compute
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services

          ExecStartPre=+/bin/sh -c 'mkdir -p {{.StateDir}}/compute/jobs {{.StateDir}}/workflows && chown -R globular:globular {{.StateDir}}/compute {{.StateDir}}/workflows'
          ExecStartPre=+/bin/sh -c 'cp -f {{.Prefix}}/workflows/compute.*.yaml {{.StateDir}}/workflows/ 2>/dev/null || true'
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -f /var/lib/globular/pki/issued/services/service.crt ] && exit 0; sleep 1; done; echo "TLS cert not ready"; exit 1'
          ExecStart={{.Prefix}}/bin/compute_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-compute
    type: enable_services
    services:
      - globular-compute.service

  - id: start-compute
    type: start_services
    services:
      - globular-compute.service
    binaries:
      globular-compute.service: compute_server

  - id: health-compute
    type: health_checks
    services:
      - globular-compute.service
