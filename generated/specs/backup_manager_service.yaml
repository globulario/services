version: 1

metadata:
  name: backup_manager
  profiles: [core, compute, storage]
  priority: 1000

service:
  name: backup_manager
  exec: backup_manager_server

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/backup_manager"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      # INV-PKI-1: Removed obsolete config/tls directory - all certs under pki/

  - id: install-backup_manager-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: ensure-backup_manager-config
    type: ensure_service_config
    service_name: backup_manager
    exec: backup_manager_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: install-backup_manager-service
    type: install_services
    units:
      - name: globular-backup-manager.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular backup_manager
          After=network-online.target globular-event.service globular-resource.service
          Wants=network-online.target globular-event.service globular-resource.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/backup_manager
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services

          ExecStartPre=+/bin/sh -c 'mkdir -p {{.StateDir}}/backup_manager && chown globular:globular {{.StateDir}}/backup_manager'
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -f /var/lib/globular/pki/issued/services/service.crt ] && exit 0; sleep 1; done; echo "TLS cert not ready after 60s"; ls -la /var/lib/globular/pki/issued/services/ 2>&1 || echo "cert dir missing"; exit 1'
          Environment=PATH={{.Prefix}}/bin:/usr/local/bin:/usr/bin:/bin
          ExecStart={{.Prefix}}/bin/backup_manager_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-backup_manager
    type: enable_services
    services:
      - globular-backup-manager.service

  - id: start-backup_manager
    type: start_services
    services:
      - globular-backup-manager.service
    binaries:
      globular-backup-manager.service: backup_manager_server

  - id: health-backup_manager
    type: health_checks
    services:
      - globular-backup-manager.service
