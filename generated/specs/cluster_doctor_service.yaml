version: 1

metadata:
  name: cluster_doctor
  profiles: [control-plane]
  priority: 1000

service:
  name: cluster_doctor
  exec: cluster_doctor_server

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/cluster_doctor"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      # INV-PKI-1: Removed obsolete config/tls directory - all certs under pki/

  - id: install-cluster_doctor-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: ensure-cluster_doctor-config
    type: ensure_service_config
    service_name: cluster_doctor
    exec: cluster_doctor_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: install-cluster_doctor-service
    type: install_services
    units:
      - name: globular-cluster-doctor.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular cluster_doctor
          After=network-online.target globular-event.service globular-cluster-controller.service
          Wants=network-online.target globular-event.service globular-cluster-controller.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/cluster_doctor
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services

          ExecStartPre=+/bin/sh -c 'mkdir -p {{.StateDir}}/cluster_doctor && chown globular:globular {{.StateDir}}/cluster_doctor'
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -f /var/lib/globular/pki/issued/services/service.crt ] && exit 0; sleep 1; done; echo "TLS cert not ready after 60s"; ls -la /var/lib/globular/pki/issued/services/ 2>&1 || echo "cert dir missing"; exit 1'
          ExecStart={{.Prefix}}/bin/cluster_doctor_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-cluster_doctor
    type: enable_services
    services:
      - globular-cluster-doctor.service

  - id: start-cluster_doctor
    type: start_services
    services:
      - globular-cluster-doctor.service
    binaries:
      globular-cluster-doctor.service: cluster_doctor_server

  - id: health-cluster_doctor
    type: health_checks
    services:
      - globular-cluster-doctor.service
