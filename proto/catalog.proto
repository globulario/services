message StopRequest {
	
}

message StopResponse {
	
}

service CatalogService {
	
	// Stop the server.
  	rpc Stop(StopRequest) returns (StopResponse) {
		option (globular.auth.authz) = {
			action: "catalog.stop"
			permission: "admin"
			resource_template: "/catalog"
			default_role_hint: "admin"
		};
	};
	
  	// Save function.
	
	// Save a connection.
	rpc CreateConnection(CreateConnectionRqst) returns (CreateConnectionRsp) {
		option (globular.auth.authz) = {
			action: "catalog.connection.create"
			permission: "write"
			collection_template: "/catalog/connections"
			default_role_hint: "editor"
		};
	};
	
	// Delete a connection.
	rpc DeleteConnection(DeleteConnectionRqst) returns (DeleteConnectionRsp) {
		option (globular.auth.authz) = {
			action: "catalog.connection.delete"
			permission: "delete"
			resource_template: "/catalog/connections/{id}"
			default_role_hint: "admin"
		};
	};
	
	//////////////////////// Save (Create) functions ///////////////////////////
	
	// Save unit of measure exemple inch
	rpc SaveUnitOfMeasure(SaveUnitOfMeasureRequest) returns (SaveUnitOfMeasureResponse) {
		option (globular.auth.authz) = {
			action: "catalog.unit_of_measure.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/unit-of-measures"
			default_role_hint: "editor"
		};
	};
	
	// Save property definition return the Id of the Saved property
	rpc SavePropertyDefinition(SavePropertyDefinitionRequest) returns (SavePropertyDefinitionResponse) {
		option (globular.auth.authz) = {
			action: "catalog.property_definition.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/property-definitions"
			default_role_hint: "editor"
		};
	};
	
	// Save item definition.
	rpc SaveItemDefinition(SaveItemDefinitionRequest) returns (SaveItemDefinitionResponse) {
		option (globular.auth.authz) = {
			action: "catalog.item_definition.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/item-definitions"
			default_role_hint: "editor"
		};
	};
	
	// Save item
	rpc SaveItemInstance(SaveItemInstanceRequest) returns (SaveItemInstanceResponse) {
		option (globular.auth.authz) = {
			action: "catalog.item_instance.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/item-instances"
			default_role_hint: "editor"
		};
	};
	
		
	// Save inventory
	rpc SaveInventory(SaveInventoryRequest) returns (SaveInventoryResponse) {
		option (globular.auth.authz) = {
			action: "catalog.inventory.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/inventories"
			default_role_hint: "editor"
		};
	};
	
	
	// Save Manufacturer
	rpc SaveManufacturer(SaveManufacturerRequest) returns (SaveManufacturerResponse) {
		option (globular.auth.authz) = {
			action: "catalog.manufacturer.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/manufacturers"
			default_role_hint: "editor"
		};
	};
	
	// Save Supplier
	rpc SaveSupplier(SaveSupplierRequest) returns (SaveSupplierResponse) {
		option (globular.auth.authz) = {
			action: "catalog.supplier.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/suppliers"
			default_role_hint: "editor"
		};
	};
	
	// Save localisation
	rpc SaveLocalisation(SaveLocalisationRequest) returns (SaveLocalisationResponse) {
		option (globular.auth.authz) = {
			action: "catalog.localisation.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/localisations"
			default_role_hint: "editor"
		};
	};

	// Save Package
	rpc SavePackage(SavePackageRequest) returns (SavePackageResponse) {
		option (globular.auth.authz) = {
			action: "catalog.package.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/packages"
			default_role_hint: "editor"
		};
	};
	
	// Save Package Supplier
	rpc SavePackageSupplier(SavePackageSupplierRequest) returns (SavePackageSupplierResponse) {
		option (globular.auth.authz) = {
			action: "catalog.package_supplier.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/package-suppliers"
			default_role_hint: "editor"
		};
	};
	
	// Save Item Manufacturer
	rpc SaveItemManufacturer(SaveItemManufacturerRequest) returns (SaveItemManufacturerResponse) {
		option (globular.auth.authz) = {
			action: "catalog.item_manufacturer.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/item-manufacturers"
			default_role_hint: "editor"
		};
	};
	
	// Save Item Category
	rpc SaveCategory(SaveCategoryRequest) returns (SaveCategoryResponse) {
		option (globular.auth.authz) = {
			action: "catalog.category.write"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/categories"
			default_role_hint: "editor"
		};
	};
	
	// Append a Category to item definition.
	rpc AppendItemDefinitionCategory(AppendItemDefinitionCategoryRequest) returns (AppendItemDefinitionCategoryResponse) {
		option (globular.auth.authz) = {
			action: "catalog.item_definition.category.link"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/item-definitions"
			default_role_hint: "editor"
		};
	};
	
	// Remove a Category from item definition.
	rpc RemoveItemDefinitionCategory(RemoveItemDefinitionCategoryRequest) returns (RemoveItemDefinitionCategoryResponse) {
		option (globular.auth.authz) = {
			action: "catalog.item_definition.category.unlink"
			permission: "write"
			collection_template: "/catalog/connections/{connectionId}/item-definitions"
			default_role_hint: "editor"
		};
	};
	
	// Getter function.
	
	// Get supplier
	rpc getSupplier(GetSupplierRequest) returns (GetSupplierResponse) {
		option (globular.auth.authz) = {
			action: "catalog.supplier.read"
			permission: "read"
			resource_template: "/catalog/connections/{connectionId}/suppliers/{supplierId}"
			default_role_hint: "viewer"
		};
	};
	rpc getSuppliers(GetSuppliersRequest) returns (GetSuppliersResponse) {
		option (globular.auth.authz) = {
			action: "catalog.supplier.list"
			permission: "read"
			collection_template: "/catalog/connections/{connectionId}/suppliers"
			default_role_hint: "viewer"
		};
	};
	
	// Get manufacturers
	rpc getManufacturer(GetManufacturerRequest) returns (GetManufacturerResponse) {
		option (globular.auth.authz) = {
			action: "catalog.manufacturer.read"
			permission: "read"
			resource_template: "/catalog/connections/{connectionId}/manufacturers/{manufacturerId}"
			default_role_hint: "viewer"
		};
	};
	rpc getManufacturers(GetManufacturersRequest) returns (GetManufacturersResponse) {
		option (globular.auth.authz) = {
			action: "catalog.manufacturer.list"
			permission: "read"
			collection_template: "/catalog/connections/{connectionId}/manufacturers"
			default_role_hint: "viewer"
		};
	};
	
	
	// Get Supplier Packages
	rpc getSupplierPackages(GetSupplierPackagesRequest) returns (GetSupplierPackagesResponse) {
		option (globular.auth.authz) = {
			action: "catalog.package_supplier.read"
			permission: "read"
			resource_template: "/catalog/connections/{connectionId}/suppliers/{supplierId}/packages"
			default_role_hint: "viewer"
		};
	};
	
	// Getter function for pacakge.
	rpc getPackage(GetPackageRequest) returns (GetPackageResponse) {
		option (globular.auth.authz) = {
