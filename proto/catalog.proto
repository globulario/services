/////////////////////////// Getter functions ///////////////////////////////////
message GetSupplierRequest{
	string connectionId = 1 [(globular.auth.resource) = { kind: "connection", scope_anchor: true }];
	string supplierId = 2 [(globular.auth.resource) = { kind: "supplier" }];
}

message GetSupplierResponse{
