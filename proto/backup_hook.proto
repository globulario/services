syntax = "proto3";

package backup_hook;

option go_package = "github.com/globulario/services/golang/backup_hook/backup_hookpb;backup_hookpb";

// BackupHookService is a lightweight contract implemented by any Globular service
// that holds state needing consistency during cluster backups.
//
// Backup-manager calls PrepareBackup before taking snapshots and FinalizeBackup
// after (regardless of success/failure).
service BackupHookService {
  rpc PrepareBackup(PrepareBackupRequest) returns (PrepareBackupResponse);
  rpc FinalizeBackup(FinalizeBackupRequest) returns (FinalizeBackupResponse);
}

message PrepareBackupRequest {
  string backup_id = 1;
  string mode = 2;                     // "SERVICE" or "CLUSTER"
  repeated string providers = 3;       // providers being run (etcd, restic, etc.)
  repeated string services = 4;        // scoped services (empty = all)
  map<string, string> labels = 5;
  int32 deadline_seconds = 6;          // informational; real deadline in context
}

message PrepareBackupResponse {
  bool ok = 1;
  string message = 2;
  map<string, string> details = 3;     // e.g. flushed_items, blocked_writes
  repeated ServiceDataEntry service_data = 4;  // local data paths to include in backup
}

// ServiceDataEntry declares a local data path a service needs backed up or tracked.
message ServiceDataEntry {
  string service_name = 1;         // e.g. "title.TitleService"
  string logical_name = 2;        // short identifier, e.g. "file_associations"
  string path = 3;                 // absolute filesystem path
  string data_class = 4;           // "AUTHORITATIVE" or "DERIVED"
  string description = 5;          // human-readable, e.g. "file-title associations (Badger)"
  bool   backup_by_default = 6;   // include in backup unless explicitly excluded
  bool   restore_by_default = 7;  // include in restore unless explicitly excluded
  bool   path_exists = 8;         // true if path existed at declaration time
  uint64 size_bytes = 9;          // approximate size (0 if unknown)
}

message FinalizeBackupRequest {
  string backup_id = 1;
  string mode = 2;
  repeated string providers = 3;
  repeated string services = 4;
  map<string, string> labels = 5;
  bool backup_succeeded = 6;
}

message FinalizeBackupResponse {
  bool ok = 1;
  string message = 2;
  map<string, string> details = 3;
}
