syntax = "proto3";
package workflow;

option go_package = "github.com/globulario/services/golang/workflow/workflowpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

// WorkflowActor identifies the system component that owns a step.
enum WorkflowActor {
  ACTOR_UNKNOWN            = 0;
  ACTOR_CLUSTER_CONTROLLER = 1;
  ACTOR_REPOSITORY         = 2;
  ACTOR_NODE_AGENT         = 3;
  ACTOR_INSTALLER          = 4;
  ACTOR_RUNTIME            = 5;
  ACTOR_OPERATOR           = 6;
  ACTOR_AI_DIAGNOSER       = 7;
  ACTOR_AI_EXECUTOR        = 8;
  ACTOR_CLUSTER_DOCTOR     = 9;
  ACTOR_WORKFLOW_SERVICE   = 10;
}

// WorkflowPhaseKind is the coarse execution phase a step belongs to.
// Typed enum prevents free-string drift. UI maps these to display labels.
enum WorkflowPhaseKind {
  PHASE_UNKNOWN   = 0;
  PHASE_DECISION  = 1;   // release evaluated, profile checked
  // 2, 3 retired: PHASE_PLAN, PHASE_DISPATCH (plan-era).
  reserved 2, 3;
  reserved "PHASE_PLAN", "PHASE_DISPATCH";
  PHASE_FETCH     = 4;   // artifact download, checksum verify
  PHASE_INSTALL   = 5;   // package extract, OS install, spec steps
  PHASE_CONFIGURE = 6;   // config render, env patch, post-install script
  PHASE_START     = 7;   // systemd enable/start/restart
  PHASE_VERIFY    = 8;   // readiness check, cluster join sanity
  PHASE_PUBLISH   = 9;   // installed-state write, release update
  PHASE_COMPLETE  = 10;  // terminal success
}

// RunStatus is the lifecycle state of a workflow run. All workflow-native:
// a run is created (pending), may wait (blocked/retrying), executes, and
// ends in a single terminal state.
enum RunStatus {
  RUN_STATUS_UNKNOWN          = 0;
  RUN_STATUS_PENDING          = 1;  // created, not yet started
  // 2, 3, 4 retired: PLANNING, WAITING_FOR_SLOT, DISPATCHED (plan-era).
  reserved 2, 3, 4;
  reserved "RUN_STATUS_PLANNING", "RUN_STATUS_WAITING_FOR_SLOT", "RUN_STATUS_DISPATCHED";
  RUN_STATUS_EXECUTING        = 5;  // workflow engine is running steps
  RUN_STATUS_BLOCKED          = 6;  // waiting on dependency/operator/node (see wait_reason)
  RUN_STATUS_RETRYING         = 7;  // auto-retry in progress (see retry_attempt)
  RUN_STATUS_SUCCEEDED        = 8;  // terminal
  RUN_STATUS_FAILED           = 9;  // terminal
  RUN_STATUS_CANCELED         = 10; // terminal, operator-initiated
  RUN_STATUS_ROLLED_BACK      = 11; // terminal, rolled back to prior state
  RUN_STATUS_SUPERSEDED       = 12; // terminal, replaced by newer run (see superseded_by)
}

// StepStatus is the lifecycle state of a workflow step.
enum StepStatus {
  STEP_STATUS_UNKNOWN   = 0;
  STEP_STATUS_PENDING   = 1;
  STEP_STATUS_RUNNING   = 2;
  STEP_STATUS_SUCCEEDED = 3;
  STEP_STATUS_FAILED    = 4;
  STEP_STATUS_SKIPPED   = 5;
  STEP_STATUS_BLOCKED   = 6;
}

// FailureClass categorizes why a step or run failed.
enum FailureClass {
  FAILURE_CLASS_UNKNOWN    = 0;
  FAILURE_CLASS_CONFIG     = 1;  // config mismatch, missing field, overwritten
  FAILURE_CLASS_PACKAGE    = 2;  // GPG key, dpkg prompt, missing package
  FAILURE_CLASS_DEPENDENCY = 3;  // waiting for upstream component
  FAILURE_CLASS_NETWORK    = 4;  // connectivity, DNS, TLS
  FAILURE_CLASS_REPOSITORY = 5;  // artifact not found, checksum mismatch
  FAILURE_CLASS_SYSTEMD    = 6;  // unit missing, restart failure
  FAILURE_CLASS_VALIDATION = 7;  // readiness check failed
}

// ComponentKind distinguishes infrastructure from services.
enum ComponentKind {
  COMPONENT_KIND_UNKNOWN        = 0;
  COMPONENT_KIND_INFRASTRUCTURE = 1;
  COMPONENT_KIND_SERVICE        = 2;
  COMPONENT_KIND_CONFIG_ONLY    = 3;
}

// TriggerReason explains why this run was initiated.
enum TriggerReason {
  TRIGGER_REASON_UNKNOWN              = 0;
  TRIGGER_REASON_DESIRED_DRIFT        = 1;  // desired != installed
  TRIGGER_REASON_BOOTSTRAP            = 2;  // Day-0 or Day-1 bootstrap
  TRIGGER_REASON_RETRY                = 3;  // auto-retry after failure
  TRIGGER_REASON_MANUAL               = 4;  // operator action
  TRIGGER_REASON_DEPENDENCY_UNBLOCKED = 5;  // upstream finished
  TRIGGER_REASON_UPGRADE              = 6;  // version bump
  TRIGGER_REASON_REPAIR               = 7;  // stale state cleanup on node removal/re-add
}

// ArtifactKind describes what kind of object an artifact reference points to.
enum ArtifactKind {
  ARTIFACT_KIND_UNKNOWN     = 0;
  ARTIFACT_KIND_RELEASE     = 1;
  // 2 retired: ARTIFACT_KIND_PLAN (plan-era).
  reserved 2;
  reserved "ARTIFACT_KIND_PLAN";
  ARTIFACT_KIND_PACKAGE     = 3;
  ARTIFACT_KIND_MANIFEST    = 4;
  ARTIFACT_KIND_SPEC        = 5;
  ARTIFACT_KIND_SCRIPT      = 6;
  ARTIFACT_KIND_UNIT        = 7;
  ARTIFACT_KIND_CONFIG_FILE = 8;
  ARTIFACT_KIND_ETCD_KEY    = 9;
  ARTIFACT_KIND_LOG         = 10;
}

// ─── Domain messages ─────────────────────────────────────────────────────────

// WorkflowContext groups the reconciliation identity fields shared across
// runs, events, and stream envelopes. Avoids repeating the same set of
// fields on every message and makes reuse in future APIs cleaner.
message WorkflowContext {
  string cluster_id         = 1;
  string node_id            = 2;
  string node_hostname      = 3;
  string component_name     = 4;
  ComponentKind component_kind = 5;
  string component_version  = 6;
  string release_kind       = 7;   // InfrastructureRelease, ServiceRelease
  string release_object_id  = 8;
  string desired_object_id  = 9;
  // Fields 10/11 retired: plan_id, plan_generation (plan-era).
  // Use workflow run id + step id for correlation instead.
  reserved 10, 11;
  reserved "plan_id", "plan_generation";
}

// WorkflowRun represents one reconciliation attempt for a component on a node.
//
// Identity:
//   - id:             unique per execution attempt (this exact run)
//   - correlation_id: stable lineage across retries for the same operator story
//                     e.g. "{release_kind}/{component}/{node_id}"
//   - parent_run_id:  links a retry to the original failed run
message WorkflowRun {
  string id              = 1;   // UUID — unique per execution attempt
  string correlation_id  = 2;   // stable lineage across retries
  string parent_run_id   = 3;   // links retries to original run

  // Reconciliation context
  WorkflowContext context = 4;

  // Lifecycle
  TriggerReason trigger_reason = 5;
  RunStatus     status         = 6;
  WorkflowActor current_actor  = 7;   // who currently owns the workflow
  FailureClass  failure_class  = 8;
  string        summary        = 9;
  string        error_message  = 10;
  int32         retry_count    = 11;

  // Acknowledgment (operator saw and accepted the failure)
  bool   acknowledged    = 12;
  string acknowledged_by = 13;
  google.protobuf.Timestamp acknowledged_at = 14;

  // Timing
  google.protobuf.Timestamp started_at  = 15;
  google.protobuf.Timestamp updated_at  = 16;
  google.protobuf.Timestamp finished_at = 17;

  // Workflow definition name (e.g. "day0.bootstrap", "release.apply.package")
  string workflow_name = 18;

  // Wait reason when status=BLOCKED (e.g. "waiting_on_dependency:verify_etcd",
  // "waiting_on_node:globule-nuc", "waiting_on_slot").
  string wait_reason = 19;

  // Retry tracking: current attempt (1-indexed) and max allowed.
  int32 retry_attempt = 20;
  int32 max_retries   = 21;
  // Unix millis: when retry backoff expires and next attempt can start.
  int64 backoff_until_ms = 22;

  // Supersession: when a newer run obsoletes this one for the same
  // correlation_id. Both fields point to the replacement run id.
  string superseded_by = 23;
}

// WorkflowStep represents a single action or transition within a run.
message WorkflowStep {
  string run_id    = 1;
  int32  seq       = 2;    // ordering within the run
  string step_key  = 3;    // e.g. "release_evaluated", "system_package_install"
  string title     = 4;    // human-readable: "Install OS packages: scylla, scylla-server"

  WorkflowActor     actor = 5;
  WorkflowPhaseKind phase = 6;   // typed phase enum
  StepStatus        status = 7;
  int32             attempt = 8; // retry attempt within this step (1-based)

  google.protobuf.Timestamp created_at  = 9;   // when the step record was created
  google.protobuf.Timestamp started_at  = 10;
  google.protobuf.Timestamp finished_at = 11;
  int64 duration_ms = 12;

  string message       = 13;
  string error_code    = 14;  // e.g. "repository.gpg_key_missing"
  string error_message = 15;

  bool   retryable                = 16;
  bool   operator_action_required = 17;
  string action_hint              = 18;  // "Package spec likely incomplete"

  // Handoff tracking: which actor produced this step's input,
  // which actor consumes its output. Enables swimlane edge rendering.
  WorkflowActor source_actor = 19;  // who handed off to this step
  WorkflowActor target_actor = 20;  // who this step hands off to next

  // Supplemental raw context (command output, config diff, etc.).
  // Rule: anything important for filtering, alerting, or UI logic
  // MUST be in typed fields above. details_json is for drill-down only.
  string details_json = 21;
}

// WorkflowArtifactRef links a step or run to a concrete object.
message WorkflowArtifactRef {
  string id       = 1;   // UUID
  string run_id   = 2;
  int32  step_seq = 3;   // -1 = run-level

  ArtifactKind kind = 4;

  // Common fields
  string name    = 5;
  string version = 6;
  string digest  = 7;
  string node_id = 8;

  // Typed locators — use these instead of stuffing everything into metadata_json.
  // Only the relevant field is populated per artifact kind.
  string path            = 9;   // generic filesystem path
  string etcd_key        = 10;  // for ARTIFACT_KIND_ETCD_KEY
  string unit_name       = 11;  // for ARTIFACT_KIND_UNIT
  string config_path     = 12;  // for ARTIFACT_KIND_CONFIG_FILE
  string package_name    = 13;  // for ARTIFACT_KIND_PACKAGE
  string package_version = 14;  // for ARTIFACT_KIND_PACKAGE
  string spec_path       = 15;  // for ARTIFACT_KIND_SPEC
  string script_path     = 16;  // for ARTIFACT_KIND_SCRIPT

  // Supplemental metadata (drill-down only, same rule as details_json).
  string metadata_json = 17;

  google.protobuf.Timestamp created_at = 18;
}

// WorkflowEvent is an append-only status transition record.
message WorkflowEvent {
  string run_id     = 1;
  string event_id   = 2;  // UUID
  int32  step_seq   = 3;  // -1 = run-level
  string event_type = 4;  // status_changed, step_started, step_completed, error, artifact_resolved, handoff
  WorkflowActor actor = 5;
  string old_value  = 6;
  string new_value  = 7;
  string message    = 8;
  google.protobuf.Timestamp created_at = 9;
}

// WorkflowPhase is a coarse grouping of steps for graph rendering.
message WorkflowPhase {
  WorkflowPhaseKind kind = 1;
  string display_name    = 2;   // "Decision", "Install", etc.
  StepStatus status      = 3;   // derived from child steps
  repeated WorkflowStep steps = 4;
}

// WorkflowActorLane groups steps by actor for swimlane rendering.
message WorkflowActorLane {
  WorkflowActor actor = 1;
  repeated WorkflowStep steps = 2;
}

// WorkflowGraph is the pre-assembled rendering model returned by GetWorkflowGraph.
message WorkflowGraph {
  WorkflowRun run = 1;
  repeated WorkflowPhase phases     = 2;  // ordered by execution flow
  repeated WorkflowActorLane lanes  = 3;  // grouped by actor
  repeated WorkflowArtifactRef artifacts = 4;
  int32 current_step_seq  = 5;            // which step is active now
  WorkflowActor current_actor = 6;        // who currently owns the workflow
  string blocked_reason   = 7;            // if status is BLOCKED
}

// WorkflowRunDetail bundles a run with its steps and artifacts.
message WorkflowRunDetail {
  WorkflowRun run = 1;
  repeated WorkflowStep steps = 2;
  repeated WorkflowArtifactRef artifacts = 3;
}

// ─── Request / Response ──────────────────────────────────────────────────────

// Write path

message StartRunRequest {
  WorkflowRun run = 1;
}

message UpdateRunRequest {
  string id         = 1;
  string cluster_id = 2;
  RunStatus status  = 3;
  string summary    = 4;
  reserved 5, 6;  // retired: plan_id, plan_generation
  reserved "plan_id", "plan_generation";
  WorkflowActor current_actor = 7;
  string wait_reason = 8;
}

message FinishRunRequest {
  string id            = 1;
  string cluster_id    = 2;
  RunStatus status     = 3;
  FailureClass failure_class = 4;
  string summary       = 5;
  string error_message = 6;
}

message RecordStepRequest {
  string cluster_id = 1;
  WorkflowStep step = 2;
}

message UpdateStepRequest {
  string cluster_id = 1;
  string run_id     = 2;
  int32  seq        = 3;
  StepStatus status = 4;
  string message    = 5;
  int64  duration_ms = 6;
}

message FailStepRequest {
  string cluster_id = 1;
  string run_id     = 2;
  int32  seq        = 3;
  string error_code    = 4;
  string error_message = 5;
  string action_hint   = 6;
  bool   retryable     = 7;
  bool   operator_action_required = 8;
  FailureClass failure_class = 9;
}

message AddArtifactRefRequest {
  string cluster_id = 1;
  WorkflowArtifactRef artifact = 2;
}

message AppendEventRequest {
  string cluster_id = 1;
  WorkflowEvent event = 2;
}

// Read path

message GetRunRequest {
  string cluster_id = 1;
  string id         = 2;
}

message ListRunsRequest {
  string cluster_id     = 1;
  string node_id        = 2;   // optional filter
  string component_name = 3;   // optional filter
  RunStatus status      = 4;   // optional filter (0 = all)
  ComponentKind kind    = 5;   // optional filter (0 = all)
  bool active_only      = 6;
  bool failed_only      = 7;
  int32 limit           = 8;   // default 50
  string page_token     = 9;   // opaque pagination cursor
  string workflow_name  = 10;  // optional filter by definition name
}

message ListRunsResponse {
  repeated WorkflowRun runs = 1;
  int32 total               = 2;
  string next_page_token    = 3;  // empty = no more pages
}

message GetRunEventsRequest {
  string cluster_id = 1;
  string run_id     = 2;
}

message GetRunEventsResponse {
  repeated WorkflowEvent events = 1;
}

message GetCurrentRunsForNodeRequest {
  string cluster_id = 1;
  string node_id    = 2;
}

message GetComponentHistoryRequest {
  string cluster_id     = 1;
  string component_name = 2;
  int32 limit           = 3;
  string page_token     = 4;
}

message GetWorkflowGraphRequest {
  string cluster_id = 1;
  string run_id     = 2;
}

// Streaming

message WatchRunRequest {
  string cluster_id = 1;
  string run_id     = 2;
}

message WatchNodeRunsRequest {
  string cluster_id = 1;
  string node_id    = 2;
}

// WorkflowEventEnvelope wraps events for streaming, including run context.
message WorkflowEventEnvelope {
  string run_id         = 1;
  WorkflowContext context = 2;   // full reconciliation context
  WorkflowEvent event   = 3;
  RunStatus run_status  = 4;
}

// ─── Action requests ─────────────────────────────────────────────────────────

message RetryRunRequest {
  string cluster_id = 1;
  string run_id     = 2;
}

message CancelRunRequest {
  string cluster_id = 1;
  string run_id     = 2;
}

message AcknowledgeRunRequest {
  string cluster_id    = 1;
  string run_id        = 2;
  string acknowledged_by = 3;  // operator identity
}

message DiagnoseRunRequest {
  string cluster_id = 1;
  string run_id     = 2;
}

message DiagnoseRunResponse {
  string diagnosis       = 1;
  string confidence      = 2;   // high, medium, low
  repeated string related_run_ids = 3;
  string suggested_action = 4;
}

// ─── Summary messages ────────────────────────────────────────────────────────

// WorkflowRunSummary is a bounded per-workflow-name aggregate. Used for
// dashboards where full run detail would inflate storage (e.g. periodic
// cluster.reconcile runs firing every 30s). One row per (cluster, workflow).
message WorkflowRunSummary {
  string cluster_id    = 1;
  string workflow_name = 2;

  int64 total_runs     = 3;
  int64 success_runs   = 4;
  int64 failure_runs   = 5;

  // Last run (regardless of outcome)
  string    last_run_id       = 6;
  RunStatus last_run_status   = 7;
  google.protobuf.Timestamp last_started_at  = 8;
  google.protobuf.Timestamp last_finished_at = 9;
  int64 last_duration_ms      = 10;

  // Last success
  string last_success_id = 11;
  google.protobuf.Timestamp last_success_at = 12;

  // Last failure (for forensic drill-down)
  string last_failure_id     = 13;
  google.protobuf.Timestamp last_failure_at = 14;
  string last_failure_reason = 15;

  google.protobuf.Timestamp updated_at = 16;
}

message RecordOutcomeRequest {
  string cluster_id       = 1;
  string workflow_name    = 2;
  string run_id           = 3;   // optional; empty for purely summary-only callers
  RunStatus status        = 4;
  google.protobuf.Timestamp started_at  = 5;
  google.protobuf.Timestamp finished_at = 6;
  int64 duration_ms       = 7;
  string failure_reason   = 8;   // set when status is FAILED/ROLLED_BACK
}

message ListWorkflowSummariesRequest {
  string cluster_id    = 1;
  string workflow_name = 2;  // optional filter
}

message ListWorkflowSummariesResponse {
  repeated WorkflowRunSummary summaries = 1;
}

// ─── Convergence telemetry ───────────────────────────────────────────────────

// Per-step aggregate for a workflow definition.
message WorkflowStepOutcome {
  string cluster_id         = 1;
  string workflow_name      = 2;
  string step_id            = 3;
  int64  total_executions   = 4;
  int64  success_count      = 5;
  int64  failure_count      = 6;
  int64  skipped_count      = 7;
  StepStatus last_status    = 8;
  google.protobuf.Timestamp last_started_at  = 9;
  google.protobuf.Timestamp last_finished_at = 10;
  int64  last_duration_ms   = 11;
  string last_error_code    = 12;
  string last_error_message = 13;
  google.protobuf.Timestamp first_seen_at = 14;
  google.protobuf.Timestamp updated_at    = 15;
}

message RecordStepOutcomeRequest {
  string cluster_id    = 1;
  string workflow_name = 2;
  string step_id       = 3;
  StepStatus status    = 4;
  google.protobuf.Timestamp started_at  = 5;
  google.protobuf.Timestamp finished_at = 6;
  int64  duration_ms   = 7;
  string error_code    = 8;
  string error_message = 9;
}

message ListStepOutcomesRequest {
  string cluster_id    = 1;
  string workflow_name = 2;  // optional filter
}

message ListStepOutcomesResponse {
  repeated WorkflowStepOutcome outcomes = 1;
}

// Phase transition event (append-only, 7-day TTL).
message PhaseTransitionEvent {
  string cluster_id    = 1;
  string resource_type = 2;
  string resource_name = 3;
  google.protobuf.Timestamp event_at = 4;
  string event_id      = 5;
  string from_phase    = 6;
  string to_phase      = 7;
  string reason        = 8;
  string caller        = 9;
  bool   blocked       = 10;  // true = rejected by invariant guard
}

message RecordPhaseTransitionRequest {
  string cluster_id    = 1;
  string resource_type = 2;
  string resource_name = 3;
  string from_phase    = 4;
  string to_phase      = 5;
  string reason        = 6;
  string caller        = 7;
  bool   blocked       = 8;
}

message ListPhaseTransitionsRequest {
  string cluster_id    = 1;
  string resource_type = 2;  // required
  string resource_name = 3;  // required
  int32  limit         = 4;  // default 100
}

message ListPhaseTransitionsResponse {
  repeated PhaseTransitionEvent events = 1;
}

// Drift item that has been observed in at least one reconcile cycle and not
// yet cleared. consecutive_cycles increments each cycle it reappears.
message DriftUnresolved {
  string cluster_id          = 1;
  string drift_type          = 2;
  string entity_ref          = 3;
  int32  consecutive_cycles  = 4;
  google.protobuf.Timestamp first_observed_at = 5;
  google.protobuf.Timestamp last_observed_at  = 6;
  string chosen_workflow     = 7;
  string last_remediation_id = 8;
}

message RecordDriftObservationRequest {
  string cluster_id      = 1;
  string drift_type      = 2;
  string entity_ref      = 3;
  string chosen_workflow = 4;
  string remediation_id  = 5;
}

message ClearDriftObservationRequest {
  string cluster_id = 1;
  string drift_type = 2;
  string entity_ref = 3;
}

message ListDriftUnresolvedRequest {
  string cluster_id = 1;
  string drift_type = 2;  // optional filter
  int32  min_cycles = 3;  // optional: only items observed >= N cycles
}

message ListDriftUnresolvedResponse {
  repeated DriftUnresolved items = 1;
}

// ─── Incident model (operator surface for self-correcting control plane) ────
//
// See docs/incidents-design.md for the full specification. Incidents are
// persistent, operator-visible aggregations of related signals pointing to
// the same underlying root cause.

enum IncidentStatus {
  INCIDENT_STATUS_UNKNOWN   = 0;
  INCIDENT_STATUS_OPEN      = 1;
  INCIDENT_STATUS_RESOLVING = 2;
  INCIDENT_STATUS_RESOLVED  = 3;
  INCIDENT_STATUS_ACKED     = 4;
}

enum IncidentSeverity {
  INCIDENT_SEVERITY_UNKNOWN  = 0;
  INCIDENT_SEVERITY_INFO     = 1;
  INCIDENT_SEVERITY_WARN     = 2;
  INCIDENT_SEVERITY_ERROR    = 3;
  INCIDENT_SEVERITY_CRITICAL = 4;
}

// Provenance layer — where a statement came from. See design doc §5.
enum Provenance {
  PROVENANCE_UNKNOWN     = 0;
  PROVENANCE_OBSERVED    = 1;  // raw measurement from a single source
  PROVENANCE_CORRELATED  = 2;  // joined from two or more Observed facts
  PROVENANCE_DIAGNOSED   = 3;  // rule-based inference (cluster_doctor etc.)
  PROVENANCE_AI_PROPOSED = 4;  // LLM-based inference with confidence
}

enum FixStatus {
  FIX_STATUS_UNKNOWN  = 0;
  FIX_STATUS_PROPOSED = 1;
  FIX_STATUS_APPROVED = 2;
  FIX_STATUS_APPLIED  = 3;
  FIX_STATUS_REJECTED = 4;
  FIX_STATUS_FAILED   = 5;
}

// EvidenceItem — "what was observed/correlated" (design §6).
message EvidenceItem {
  string id         = 1;
  Provenance provenance = 2;  // OBSERVED or CORRELATED only
  string source     = 3;      // "workflow.step_outcomes", "node_agent", …
  string summary    = 4;
  map<string, string> facts = 5;
  google.protobuf.Timestamp observed_at = 6;
}

// DiagnosisItem — "what a rule inferred" (design §7). MUST cite evidence.
message DiagnosisItem {
  string id           = 1;
  string source       = 2;       // "cluster_doctor", "workflow.invariants"
  string invariant_id = 3;
  string summary      = 4;
  repeated string cited_evidence_ids = 5;
  IncidentSeverity severity = 6;
  google.protobuf.Timestamp diagnosed_at = 7;
}

// Concrete change types that a ProposedFix can carry.
message CodePatch {
  string file_path  = 1;
  int32  line       = 2;
  string old_text   = 3;
  string new_text   = 4;
  string repository = 5;
}
message ConfigPatch {
  string target_path = 1;  // where the config lives (file / etcd key)
  string old_value   = 2;
  string new_value   = 3;
  string format      = 4;  // "yaml" | "json" | "env"
}
message CommandList {
  repeated string commands = 1;
  string target_host       = 2;  // node to run on (empty = cluster-wide)
}
message RestartAction {
  repeated string unit_names = 1;
  string target_host         = 2;
}

// ProposedFix — "what AI suggested" (design §8). MUST cite evidence/diagnosis.
message ProposedFix {
  string id         = 1;
  string proposer   = 2;       // "ai_executor" | "operator_suggestion"
  string summary    = 3;
  string confidence = 4;       // "high" | "medium" | "low"
  string reasoning  = 5;
  repeated string cited_evidence_ids  = 6;
  repeated string cited_diagnosis_ids = 7;

  CodePatch      code_patch     = 8;
  ConfigPatch    config_patch   = 9;
  CommandList    command_list   = 10;
  RestartAction  restart_action = 11;

  FixStatus status             = 12;
  string    applied_by         = 13;
  google.protobuf.Timestamp applied_at = 14;
  string    application_result = 15;

  google.protobuf.Timestamp proposed_at = 16;
  string target_incident_id = 17;  // set by server from RPC ctx
}

message Incident {
  string id          = 1;
  string cluster_id  = 2;
  string category    = 3;
  string signature   = 4;
  IncidentStatus   status   = 5;
  IncidentSeverity severity = 6;

  string headline          = 7;
  int32  occurrence_count  = 8;
  google.protobuf.Timestamp first_seen_at = 9;
  google.protobuf.Timestamp last_seen_at  = 10;

  repeated EvidenceItem  evidence       = 11;
  repeated DiagnosisItem diagnoses      = 12;
  repeated ProposedFix   proposed_fixes = 13;

  bool   acknowledged    = 14;
  string acknowledged_by = 15;
  google.protobuf.Timestamp acknowledged_at = 16;
  string assigned_to     = 17;

  string entity_ref  = 18;
  string entity_type = 19;

  repeated string related_incident_ids = 20;
}

message IncidentAction {
  string incident_id = 1;
  string action      = 2;  // "ack" | "retry" | "apply_fix" | "reject_fix" | "assign" | "dismiss"
  string actor       = 3;
  string fix_id      = 4;
  string comment     = 5;
}

// --- RPC request/response ---

message ListIncidentsRequest {
  string cluster_id     = 1;
  IncidentStatus status = 2;  // 0 = all
  int32  limit          = 3;
  string page_token     = 4;
}
message ListIncidentsResponse {
  repeated Incident incidents = 1;
  string next_page_token      = 2;
}

message GetIncidentRequest {
  string cluster_id  = 1;
  string incident_id = 2;
}

message SubmitProposedFixRequest {
  string cluster_id  = 1;
  string incident_id = 2;
  ProposedFix fix    = 3;
}

// ─── gRPC Service ────────────────────────────────────────────────────────────

service WorkflowService {
  // Write path — internal producers (controller, node-agent, installer)
  rpc StartRun(StartRunRequest)             returns (WorkflowRun);
  rpc UpdateRun(UpdateRunRequest)           returns (google.protobuf.Empty);
  rpc FinishRun(FinishRunRequest)           returns (google.protobuf.Empty);
  rpc RecordStep(RecordStepRequest)         returns (WorkflowStep);
  rpc UpdateStep(UpdateStepRequest)         returns (google.protobuf.Empty);
  rpc FailStep(FailStepRequest)             returns (google.protobuf.Empty);
  rpc AddArtifactRef(AddArtifactRefRequest) returns (google.protobuf.Empty);
  rpc AppendEvent(AppendEventRequest)       returns (google.protobuf.Empty);

  // Read path — admin UI and AI
  rpc GetRun(GetRunRequest)                                   returns (WorkflowRunDetail);
  rpc ListRuns(ListRunsRequest)                               returns (ListRunsResponse);
  rpc GetRunEvents(GetRunEventsRequest)                       returns (GetRunEventsResponse);
  rpc GetCurrentRunsForNode(GetCurrentRunsForNodeRequest)     returns (ListRunsResponse);
  rpc GetComponentHistory(GetComponentHistoryRequest)         returns (ListRunsResponse);
  rpc GetWorkflowGraph(GetWorkflowGraphRequest)               returns (WorkflowGraph);

  // Streaming — live workflow monitor
  rpc WatchRun(WatchRunRequest)             returns (stream WorkflowEventEnvelope);
  rpc WatchNodeRuns(WatchNodeRunsRequest)   returns (stream WorkflowEventEnvelope);

  // Actions — operator controls
  rpc RetryRun(RetryRunRequest)             returns (WorkflowRun);
  rpc CancelRun(CancelRunRequest)           returns (google.protobuf.Empty);
  rpc AcknowledgeRun(AcknowledgeRunRequest) returns (google.protobuf.Empty);
  rpc DiagnoseRun(DiagnoseRunRequest)       returns (DiagnoseRunResponse);

  // Definitions — workflow YAML definitions stored in MinIO (single source of truth)
  rpc ListWorkflowDefinitions(ListWorkflowDefinitionsRequest) returns (ListWorkflowDefinitionsResponse);
  rpc GetWorkflowDefinition(GetWorkflowDefinitionRequest)     returns (GetWorkflowDefinitionResponse);

  // Summaries — bounded per-workflow-name aggregates (dashboard view)
  rpc RecordOutcome(RecordOutcomeRequest)                       returns (google.protobuf.Empty);
  rpc ListWorkflowSummaries(ListWorkflowSummariesRequest)       returns (ListWorkflowSummariesResponse);

  // Convergence telemetry — AI-facing diagnostic signals
  rpc RecordStepOutcome(RecordStepOutcomeRequest)               returns (google.protobuf.Empty);
  rpc ListStepOutcomes(ListStepOutcomesRequest)                 returns (ListStepOutcomesResponse);
  rpc RecordPhaseTransition(RecordPhaseTransitionRequest)       returns (google.protobuf.Empty);
  rpc ListPhaseTransitions(ListPhaseTransitionsRequest)         returns (ListPhaseTransitionsResponse);
  rpc RecordDriftObservation(RecordDriftObservationRequest)     returns (google.protobuf.Empty);
  rpc ClearDriftObservation(ClearDriftObservationRequest)       returns (google.protobuf.Empty);
  rpc ListDriftUnresolved(ListDriftUnresolvedRequest)           returns (ListDriftUnresolvedResponse);

  // Incidents — operator surface (see docs/incidents-design.md)
  rpc ListIncidents(ListIncidentsRequest)           returns (ListIncidentsResponse);
  rpc GetIncident(GetIncidentRequest)               returns (Incident);
  rpc ApplyIncidentAction(IncidentAction)           returns (google.protobuf.Empty);
  rpc SubmitProposedFix(SubmitProposedFixRequest)   returns (ProposedFix);

  // Centralized execution — WorkflowService drives the engine and dispatches
  // steps to actor services via WorkflowActorService.ExecuteAction callbacks.
  // See docs/centralized-workflow-execution.md.
  rpc ExecuteWorkflow(ExecuteWorkflowRequest)       returns (ExecuteWorkflowResponse);
}

// ─── Workflow Definition messages ─────────────────────────────────────────

message ListWorkflowDefinitionsRequest {}

message WorkflowDefinitionSummary {
  string name = 1;             // e.g. "day0.bootstrap"
  string display_name = 2;     // from metadata.displayName
  string description = 3;      // from metadata.description
}

message ListWorkflowDefinitionsResponse {
  repeated WorkflowDefinitionSummary definitions = 1;
}

message GetWorkflowDefinitionRequest {
  string name = 1;             // e.g. "day0.bootstrap"
}

message GetWorkflowDefinitionResponse {
  string name = 1;
  string yaml_content = 2;     // raw YAML text
}

// ─── Centralized execution ───────────────────────────────────────────────

// ExecuteWorkflowRequest asks WorkflowService to load a definition from
// MinIO, compile and execute it, dispatching steps to actor services via
// their WorkflowActorService.ExecuteAction callbacks.
message ExecuteWorkflowRequest {
  string cluster_id     = 1;
  string workflow_name  = 2;   // definition name in MinIO (e.g. "remediate.doctor.finding")
  string inputs_json    = 3;   // JSON-encoded map[string]any — workflow inputs
  // Actor endpoint map: actor_type → gRPC address.
  // Only actors referenced by the workflow need entries.
  // e.g. {"cluster-doctor": "localhost:10300"}
  // All endpoints are resolved via config.ResolveDialTarget before dialing.
  map<string, string> actor_endpoints = 4;
  string correlation_id = 5;   // optional, for linking to existing workflow lineage
}

message ExecuteWorkflowResponse {
  string run_id       = 1;
  string status       = 2;   // terminal: "SUCCEEDED" or "FAILED"
  string error        = 3;   // empty on success
  string outputs_json = 4;   // JSON-encoded accumulated step outputs
}

// ─── Actor callback service ──────────────────────────────────────────────

// WorkflowActorService is implemented by any service that acts as a workflow
// actor (cluster-doctor, cluster-controller, node-agent). The workflow
// service calls back into actors when executing steps assigned to them.
//
// Each actor resolves the action name against its local handler registry.
// Unknown actions MUST return an error, never a silent no-op.
service WorkflowActorService {
  rpc ExecuteAction(ExecuteActionRequest) returns (ExecuteActionResponse);
}

// ExecuteActionRequest is the callback payload sent from WorkflowService
// to an actor service when a workflow step targets that actor.
message ExecuteActionRequest {
  string run_id      = 1;   // workflow run ID (for correlation/logging)
  string step_id     = 2;   // step ID within the workflow
  string actor       = 3;   // actor type (e.g. "cluster-doctor")
  string action      = 4;   // action name (e.g. "doctor.resolve_finding")
  string with_json   = 5;   // JSON-encoded step.With (resolved expressions)
  string inputs_json = 6;   // JSON-encoded workflow-level inputs
  string outputs_json = 7;  // JSON-encoded accumulated step outputs (exports)
}

// ExecuteActionResponse is returned by the actor after executing an action.
message ExecuteActionResponse {
  bool   ok          = 1;   // true if the action succeeded
  string output_json = 2;   // JSON-encoded action result (merged into step outputs)
  string message     = 3;   // human-readable status or error description
}
