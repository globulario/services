syntax = "proto3";

package node_agent;

option go_package = "github.com/globulario/services/golang/node_agent/node_agentpb;node_agentpb";

import "google/protobuf/timestamp.proto";
import "cluster_controller.proto";
import "globular_auth.proto";

message JoinClusterRequest {
  string controller_endpoint = 1;
  string join_token = 2;
}
message JoinClusterResponse {
  string request_id = 1;
  string node_id = 2;
  string status = 3;
  string message = 4;
}

message InstalledComponent {
  string name = 1;
  string version = 2;
  bool installed = 3;
}

// InstalledPackage is the canonical installed-state record for a package on a node.
// Written by Node Agent after successful lifecycle execution for all package kinds.
// Stored in etcd at: /globular/nodes/{node_id}/packages/{kind}/{name}
message InstalledPackage {
  string node_id = 1;
  string name = 2;
  string version = 3;
  string publisher_id = 4;
  string platform = 5;
  string kind = 6;              // "SERVICE", "APPLICATION", "INFRASTRUCTURE"
  string checksum = 7;           // SHA256 of installed archive
  int64 installed_unix = 8;      // when first installed
  int64 updated_unix = 9;        // last update timestamp
  string status = 10;            // "installed", "updating", "failed", "removing"
  string operation_id = 11;      // last operation that modified this
  map<string, string> metadata = 12; // additional key-value pairs
  int64 build_number = 13;      // build iteration within version (0 = legacy)
}

message ListInstalledPackagesRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];            // required
  string kind = 2;               // optional filter: "SERVICE", "APPLICATION", etc.
}

message ListInstalledPackagesResponse {
  repeated InstalledPackage packages = 1;
}

message GetInstalledPackageRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  string kind = 2;
  string name = 3 [(globular.auth.resource) = { kind: "package" }];
}

message GetInstalledPackageResponse {
  InstalledPackage package = 1;
}

message SetInstalledPackageRequest {
  InstalledPackage package = 1;
}

message SetInstalledPackageResponse {
  bool ok = 1;
  string message = 2;
}

message UnitStatus {
  string name = 1;
  string state = 2;
  string details = 3;
}

message Inventory {
  cluster_controller.NodeIdentity identity = 1;
  google.protobuf.Timestamp unix_time = 2;
  repeated InstalledComponent components = 3;
  repeated UnitStatus units = 4;
}

message GetInventoryRequest {}
message GetInventoryResponse { Inventory inventory = 1; }

// Plan messages removed — Globular is workflow-native.

message WatchOperationRequest { string operation_id = 1 [(globular.auth.resource) = { kind: "operation" }]; }

message OperationEvent {
  string operation_id = 1;
  cluster_controller.OperationPhase phase = 2;
  string message = 3;
  int32 percent = 4;
  bool done = 5;
  string error = 6;
  google.protobuf.Timestamp ts = 7;
}

message BootstrapFirstNodeRequest {
  string cluster_domain = 1;
  string controller_bind = 2;
  repeated string profiles = 3;
}
message BootstrapFirstNodeResponse {
  string operation_id = 1;
  string join_token = 2;
  string message = 3;
}

// --- Backup provider execution (called by backup-manager during cluster fan-out) ---

message BackupProviderSpec {
  string provider = 1;           // "restic", "etcd", etc.
  map<string, string> options = 2; // provider-specific options (repo, password, paths, etc.)
  uint32 timeout_seconds = 3;
}

message RunBackupProviderRequest {
  string backup_id = 1 [(globular.auth.resource) = { kind: "backup" }];
  BackupProviderSpec spec = 2;
  string node_id = 3 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];            // the node's own ID (for tagging)
  map<string, string> labels = 4;
}

message RunBackupProviderResponse {
  string task_id = 1;            // async task ID
}

message GetBackupTaskResultRequest {
  string task_id = 1 [(globular.auth.resource) = { kind: "backup_task" }];
}

message BackupProviderResult {
  string provider = 1;
  bool ok = 2;
  string summary = 3;
  string error_message = 4;
  map<string, string> outputs = 5;    // snapshot_id, paths, etc.
  repeated string output_files = 6;   // relative paths in capsule
  int64 started_unix_ms = 7;
  int64 finished_unix_ms = 8;
  uint64 bytes_written = 9;
  bool done = 10;                     // true when task is complete
  map<string, bytes> artifacts = 11;  // relative_path -> file content (for small artifacts)
}

message GetBackupTaskResultResponse {
  BackupProviderResult result = 1;
}

// --- Restore provider execution (called by backup-manager to restore on a node) ---

message RestoreProviderSpec {
  string provider = 1;             // "etcd", "restic", "scylla"
  map<string, string> options = 2; // provider-specific options
  uint32 timeout_seconds = 3;
  bool force = 4;                  // override safety checks (e.g. stop running services)
}

message RunRestoreProviderRequest {
  string backup_id = 1 [(globular.auth.resource) = { kind: "backup" }];
  RestoreProviderSpec spec = 2;
  string node_id = 3 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
}

message RunRestoreProviderResponse {
  string task_id = 1;
}

message GetRestoreTaskResultRequest {
  string task_id = 1 [(globular.auth.resource) = { kind: "restore_task" }];
}

message GetRestoreTaskResultResponse {
  BackupProviderResult result = 1; // reuse: ok, summary, outputs, etc.
}

service NodeAgentService {
  rpc JoinCluster(JoinClusterRequest) returns (JoinClusterResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.cluster.join"
      permission: "admin"
      resource_template: "/node_agent/cluster"
      default_role_hint: "admin"
    };
  };
  rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.inventory.read"
      permission: "read"
      resource_template: "/node_agent/inventory"
      default_role_hint: "viewer"
    };
  };
  // Plan RPCs removed — Globular is workflow-native.
  // ApplyPlan, ApplyPlanV1, GetPlanStatusV1, WatchPlanStatusV1 deleted.

  rpc WatchOperation(WatchOperationRequest) returns (stream OperationEvent) {
    option (globular.auth.authz) = {
      action: "node_agent.operation.watch"
      permission: "read"
      resource_template: "/node_agent/operations/{operation_id}"
      default_role_hint: "viewer"
    };
  };
  rpc BootstrapFirstNode(BootstrapFirstNodeRequest) returns (BootstrapFirstNodeResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.cluster.bootstrap"
      permission: "admin"
      resource_template: "/node_agent/cluster"
      default_role_hint: "admin"
    };
  };

  // Backup provider execution (called by backup-manager for cluster-wide fan-out)
  rpc RunBackupProvider(RunBackupProviderRequest) returns (RunBackupProviderResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.backup_provider.run"
      permission: "admin"
      resource_template: "/node_agent/nodes/{node_id}/backup-providers"
      default_role_hint: "admin"
    };
  };
  rpc GetBackupTaskResult(GetBackupTaskResultRequest) returns (GetBackupTaskResultResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.backup_task.read"
      permission: "read"
      resource_template: "/node_agent/backup-tasks/{task_id}"
      default_role_hint: "viewer"
    };
  };

  // Restore provider execution (called by backup-manager to restore on a node)
  rpc RunRestoreProvider(RunRestoreProviderRequest) returns (RunRestoreProviderResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.restore_provider.run"
      permission: "admin"
      resource_template: "/node_agent/nodes/{node_id}/restore-providers"
      default_role_hint: "admin"
    };
  };
  rpc GetRestoreTaskResult(GetRestoreTaskResultRequest) returns (GetRestoreTaskResultResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.restore_task.read"
      permission: "read"
      resource_template: "/node_agent/restore-tasks/{task_id}"
      default_role_hint: "viewer"
    };
  };

  // Installed-state registry — canonical package inventory on this node.
  rpc ListInstalledPackages(ListInstalledPackagesRequest) returns (ListInstalledPackagesResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.installed_package.list"
      permission: "read"
      collection_template: "/node_agent/nodes/{node_id}/packages"
      default_role_hint: "viewer"
    };
  };
  rpc GetInstalledPackage(GetInstalledPackageRequest) returns (GetInstalledPackageResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.installed_package.read"
      permission: "read"
      resource_template: "/node_agent/nodes/{node_id}/packages/{name}"
      default_role_hint: "viewer"
    };
  };
  rpc SetInstalledPackage(SetInstalledPackageRequest) returns (SetInstalledPackageResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.installed_package.write"
      permission: "admin"
      resource_template: "/node_agent/nodes/{node_id}/packages/{name}"
      default_role_hint: "admin"
    };
  };

  // Node identity token rotation (Phase 2)
  rpc RotateNodeToken(RotateNodeTokenRequest) returns (RotateNodeTokenResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.node_token.rotate"
      permission: "admin"
      resource_template: "/node_agent/node-token"
      default_role_hint: "admin"
    };
  };

  // Observability: read service journal logs
  rpc GetServiceLogs(GetServiceLogsRequest) returns (GetServiceLogsResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.service_logs.read"
      permission: "read"
      resource_template: "/node_agent/services/{unit}/logs"
      default_role_hint: "viewer"
    };
  };

  // Systemd service control (restart/stop/start/status)
  rpc ControlService(ControlServiceRequest) returns (ControlServiceResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.service.control"
      permission: "admin"
      resource_template: "/node_agent/services/{unit}"
      default_role_hint: "admin"
    };
  };

  // Observability: search service logs by time range, pattern, severity
  rpc SearchServiceLogs(SearchServiceLogsRequest) returns (SearchServiceLogsResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.service_logs.search"
      permission: "read"
      resource_template: "/node_agent/services/{unit}/logs"
      default_role_hint: "viewer"
    };
  };

  // Observability: TLS certificate status
  rpc GetCertificateStatus(GetCertificateStatusRequest) returns (GetCertificateStatusResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.certificate_status.read"
      permission: "read"
      resource_template: "/node_agent/certificates"
      default_role_hint: "viewer"
    };
  };

  // Workflow execution: run a workflow definition on this node
  rpc RunWorkflow(RunWorkflowRequest) returns (RunWorkflowResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.workflow.execute"
      permission: "execute"
      resource_template: "/node_agent/workflows"
      default_role_hint: "admin"
    };
  };

  // Remote package apply: fetch from repository, install, restart, health check.
  // This is the reusable primitive for leader-aware control-plane deployments.
  rpc ApplyPackageRelease(ApplyPackageReleaseRequest) returns (ApplyPackageReleaseResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.package_release.apply"
      permission: "admin"
      resource_template: "/node_agent/packages/{package_name}"
      default_role_hint: "admin"
    };
  };

  // VerifyPackageIntegrity runs the `package.verify_integrity` action locally
  // and returns a JSON integrity report. See internal/actions/verify_integrity.go
  // for the invariant set and result schema.
  //
  // Read-only: does not modify any state. Safe to call on demand from CLI,
  // doctor, or admin UI.
  rpc VerifyPackageIntegrity(VerifyPackageIntegrityRequest) returns (VerifyPackageIntegrityResponse) {
    option (globular.auth.authz) = {
      action: "node_agent.package_integrity.verify"
      permission: "read"
      resource_template: "/node_agent/packages/{package_name}"
      default_role_hint: "admin"
    };
  };
}

// VerifyPackageIntegrityRequest narrows the scope of a verify_integrity run.
// All fields are optional; an empty request verifies every installed package
// of every kind on the local node.
message VerifyPackageIntegrityRequest {
  string package_name    = 1; // filter to a single package (empty = all)
  string kind            = 2; // SERVICE | INFRASTRUCTURE | COMMAND | APPLICATION (empty = all)
  string repository_addr = 3; // optional override; auto-discovered if empty
  string node_id         = 4; // optional override; defaults to local node id
}

// VerifyPackageIntegrityResponse carries the JSON report produced by
// package.verify_integrity. The schema is documented alongside the action
// definition. Callers should parse `report_json` to read findings.
message VerifyPackageIntegrityResponse {
  bool   ok             = 1;
  string report_json    = 2; // JSON-encoded integrityReport
  int32  finding_count  = 3; // convenience: total findings (sum of invariants)
  int32  checked_count  = 4; // packages actually checked
  string error_detail   = 5; // populated only on failure
}

// ── Node identity token rotation (Phase 2) ──

message RotateNodeTokenRequest {
  string new_token = 1;
  string new_principal = 2;
}

message RotateNodeTokenResponse {
  bool ok = 1;
}

// ── Service log retrieval ──

message GetServiceLogsRequest {
  string unit = 1 [(globular.auth.resource) = { kind: "service_unit" }];        // systemd unit name (must start with "globular-")
  int32  lines = 2;       // max lines to return (capped at 200)
  string priority = 3;    // optional journalctl priority filter: "emerg","alert","crit","err","warning","notice","info","debug"
}

message GetServiceLogsResponse {
  string unit = 1;
  int32  line_count = 2;
  repeated string lines = 3;
}

// ── Log search ──

message SearchServiceLogsRequest {
  string unit = 1 [(globular.auth.resource) = { kind: "service_unit" }];   // systemd unit name (must start with "globular-" or "scylla")
  string pattern = 2;      // grep pattern (regex supported via journalctl --grep)
  string since = 3;        // time range start: "5m ago", "1h ago", "2026-03-25 00:00:00", etc.
  string until = 4;        // time range end (optional)
  string priority = 5;     // severity filter: "emerg","alert","crit","err","warning","notice","info","debug"
  int32  limit = 6;        // max lines to return (default 100, max 500)
  bool   case_sensitive = 7; // default false (case-insensitive grep)
}

message SearchServiceLogsResponse {
  string unit = 1;
  int32  match_count = 2;
  repeated string lines = 3;
  string since = 4;        // actual time range used
  string until = 5;
  bool   truncated = 6;    // true if more lines matched than limit
}

// ── Certificate status ──

message CertificateInfo {
  string subject = 1;
  string issuer = 2;
  repeated string sans = 3;   // Subject Alternative Names
  string not_before = 4;      // RFC3339
  string not_after = 5;       // RFC3339
  int32  days_until_expiry = 6;
  bool   chain_valid = 7;
  string fingerprint = 8;     // SHA256 fingerprint
}

// ── Systemd service control ──

message ControlServiceRequest {
  string unit = 1 [(globular.auth.resource) = { kind: "service_unit" }];   // systemd unit name (must start with "globular-" or "scylla")
  string action = 2;    // "restart", "stop", "start", "status"
}

message ControlServiceResponse {
  bool ok = 1;
  string unit = 2;
  string action = 3;
  string state = 4;       // current state after action: "active", "inactive", "failed", etc.
  string message = 5;     // human-readable status or error detail
}

message GetCertificateStatusRequest {}

message GetCertificateStatusResponse {
  CertificateInfo server_cert = 1;
  CertificateInfo ca_cert = 2;
}

// ── Workflow execution ──

message RunWorkflowRequest {
  string workflow_name = 1;               // e.g. "node.join"
  string definition_path = 2;            // path to YAML on local disk (optional, resolved from name if empty)
  map<string, string> inputs = 3;        // workflow inputs (cluster_id, node_id, etc.)
}

message RunWorkflowResponse {
  string run_id = 1;
  string status = 2;                      // SUCCEEDED, FAILED, RUNNING
  int32 steps_succeeded = 3;
  int32 steps_failed = 4;
  int32 steps_total = 5;
  string error = 6;
  int64 duration_ms = 7;
}

// ── Remote package apply ──

message ApplyPackageReleaseRequest {
  string package_name = 1;       // e.g. "cluster-controller", "dns"
  string package_kind = 2;       // "SERVICE" or "INFRASTRUCTURE"
  string version = 3;            // e.g. "0.0.2"
  string publisher = 4;          // e.g. "core@globular.io" (default if empty)
  string platform = 5;           // e.g. "linux_amd64" (auto-detected if empty)
  bool force = 6;                // skip idempotency check (same version already installed)
  string expected_sha256 = 7;    // optional: verify artifact checksum
  string operation_id = 8;       // caller-provided correlation ID
  string repository_addr = 9;    // gRPC address of repository (auto-discovered if empty)
  int64 build_number = 10;       // build iteration within version
}

message ApplyPackageReleaseResponse {
  bool ok = 1;
  string message = 2;
  string package_name = 3;
  string version = 4;
  string status = 5;             // "installed", "failed", "skipped"
  string error_detail = 6;       // non-empty on failure
  string checksum = 7;           // SHA256 of installed artifact
  string operation_id = 8;
}

