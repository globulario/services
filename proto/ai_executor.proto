syntax = "proto3";

package ai_executor;

option go_package = "github.com/globulario/services/golang/ai_executor/ai_executorpb";

import "globular_auth.proto";

// AiExecutorService receives incidents from the ai_watcher, diagnoses them
// by gathering context from cluster services, and executes remediation
// actions according to the permission tier.
//
// It is the "hands" of the AI system — the watcher sees, the executor acts.
service AiExecutorService {

    // ProcessIncident receives an incident and handles it according to tier.
    // Tier 1 (OBSERVE):          diagnose → record findings in ai_memory
    // Tier 2 (AUTO_REMEDIATE):   diagnose → execute pre-approved action
    // Tier 3 (REQUIRE_APPROVAL): diagnose → propose action → wait for approval
    rpc ProcessIncident(ProcessIncidentRequest) returns (ProcessIncidentResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "write"
            collection_template: "/ai/executor/incidents"
            default_role_hint: "operator"
        };
    };

    // GetDiagnosis returns the diagnosis for an incident.
    rpc GetDiagnosis(GetDiagnosisRequest) returns (GetDiagnosisResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            resource_template: "/ai/executor/incidents/{incident_id}/diagnosis"
            default_role_hint: "viewer"
        };
    };

    // GetStatus returns operational status.
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            resource_template: "/ai/executor/status"
            default_role_hint: "viewer"
        };
    };

    // ListActions returns recent remediation actions taken.
    rpc ListActions(ListActionsRequest) returns (ListActionsResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            collection_template: "/ai/executor/actions"
            default_role_hint: "viewer"
        };
    };

    // ApproveAction approves a Tier 3 pending action and triggers execution.
    rpc ApproveAction(ApproveActionRequest) returns (ApproveActionResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute.admin"
            permission: "write"
            resource_template: "/ai/executor/jobs/{incident_id}"
            default_role_hint: "admin"
        };
    };

    // DenyAction denies a Tier 3 pending action.
    rpc DenyAction(DenyActionRequest) returns (DenyActionResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute.admin"
            permission: "write"
            resource_template: "/ai/executor/jobs/{incident_id}"
            default_role_hint: "admin"
        };
    };

    // RetryAction retries a failed action.
    rpc RetryAction(RetryActionRequest) returns (RetryActionResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute.admin"
            permission: "write"
            resource_template: "/ai/executor/jobs/{incident_id}"
            default_role_hint: "admin"
        };
    };

    // GetJob returns a durable job record by incident ID.
    rpc GetJob(GetJobRequest) returns (GetJobResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            resource_template: "/ai/executor/jobs/{incident_id}"
            default_role_hint: "viewer"
        };
    };

    // ListJobs returns jobs filtered by state.
    rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            collection_template: "/ai/executor/jobs"
            default_role_hint: "viewer"
        };
    };

    // Stop gracefully shuts down the executor.
    rpc Stop(StopRequest) returns (StopResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute.admin"
            permission: "write"
            resource_template: "/ai/executor"
            default_role_hint: "admin"
        };
    };

    // ── Conversational AI ─────────────────────────────────────────────────────
    // Direct conversation with the cluster's AI. History persisted in ScyllaDB.

    // SendPrompt sends a user message and streams the AI response.
    // Supports multi-turn via conversation_id. Can route to a specific node.
    rpc SendPrompt(SendPromptRequest) returns (stream SendPromptResponse) {
        option (globular.auth.authz) = {
            action: "ai.tools.invoke"
            permission: "write"
            collection_template: "/ai/executor/conversations"
            default_role_hint: "operator"
        };
    };

    // GetConversation retrieves message history for a conversation.
    rpc GetConversation(GetConversationRequest) returns (GetConversationResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            resource_template: "/ai/executor/conversations/{conversation_id}"
            default_role_hint: "viewer"
        };
    };

    // ListConversations lists a user's conversations.
    rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            collection_template: "/ai/executor/conversations"
            default_role_hint: "viewer"
        };
    };

    // DeleteConversation removes a conversation and its messages.
    rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute.admin"
            permission: "delete"
            resource_template: "/ai/executor/conversations/{conversation_id}"
            default_role_hint: "admin"
        };
    };

    // ── Peer Collaboration ───────────────────────────────────────────────────
    // Multi-node AI consensus: executors on different nodes communicate to
    // share observations, confirm diagnoses, and coordinate actions.

    // Ping checks if a peer executor is alive and returns its capabilities.
    rpc Ping(PeerPingRequest) returns (PeerPingResponse) {
        option (globular.auth.authz) = {
            action: "ai.execute"
            permission: "read"
            resource_template: "/ai/executor/peers"
            default_role_hint: "viewer"
        };
    };

    // ShareObservation sends a local observation to a peer for confirmation.
    // The peer checks its own local state and returns whether it sees the same thing.
    rpc ShareObservation(PeerObservationRequest) returns (PeerObservationResponse) {
        option (globular.auth.authz) = {
            action: "ai.tools.invoke"
            permission: "write"
            collection_template: "/ai/executor/peers/observations"
            default_role_hint: "operator"
        };
    };

    // ProposeAction asks peers to vote on a proposed remediation action.
    // Used for Tier 1+ actions that need consensus before execution.
    rpc ProposeAction(PeerProposalRequest) returns (PeerProposalResponse) {
        option (globular.auth.authz) = {
            action: "ai.tools.invoke"
            permission: "write"
            collection_template: "/ai/executor/peers/proposals"
            default_role_hint: "operator"
        };
    };

    // NotifyActionTaken informs peers that an action was executed,
    // so they can update their local state and avoid duplicate actions.
    rpc NotifyActionTaken(PeerActionNotification) returns (PeerActionAck) {
        option (globular.auth.authz) = {
            action: "ai.tools.invoke"
            permission: "write"
            collection_template: "/ai/executor/peers/notifications"
            default_role_hint: "operator"
        };
    };
}

// ── Diagnosis ─────────────────────────────────────────────────────────────────

message Diagnosis {
    string incident_id = 1;
    string summary = 2;              // one-line diagnosis
    string detail = 3;               // full diagnosis text
    repeated string evidence = 4;     // what data was gathered
    string root_cause = 5;           // best guess at root cause
    float confidence = 6;            // 0.0-1.0 confidence in diagnosis
    string proposed_action = 7;       // what should be done
    string action_reason = 8;        // why this action
    int64 diagnosed_at_ms = 9;
}

// ── Remediation Actions ───────────────────────────────────────────────────────

enum ActionType {
    ACTION_NONE            = 0;
    ACTION_RESTART_SERVICE = 1;
    ACTION_CLEAR_STORAGE   = 2;
    ACTION_RENEW_CERT      = 3;
    ACTION_DRAIN_ENDPOINT  = 4;
    ACTION_BLOCK_IP        = 5;
    ACTION_NOTIFY_ADMIN    = 6;
}

enum ActionStatus {
    ACTION_PENDING   = 0;
    ACTION_EXECUTING = 1;
    ACTION_SUCCEEDED = 2;
    ACTION_FAILED    = 3;
    ACTION_SKIPPED   = 4;
}

message RemediationAction {
    string id = 1;
    string incident_id = 2;
    ActionType type = 3;
    ActionStatus status = 4;
    string target = 5;           // service name, endpoint, IP, etc.
    string detail = 6;           // what exactly was done
    string error = 7;            // error message if failed
    int64 started_at_ms = 8;
    int64 completed_at_ms = 9;
}

// ── RPC Messages ──────────────────────────────────────────────────────────────

message ProcessIncidentRequest {
    string incident_id = 1;
    string rule_id = 2;
    int32 tier = 3;                     // 0=observe, 1=auto_remediate, 2=require_approval
    string trigger_event_name = 4;
    bytes trigger_event_data = 5;
    repeated string event_batch = 6;     // event names in batch
    map<string, string> metadata = 7;
}

message ProcessIncidentResponse {
    Diagnosis diagnosis = 1;
    RemediationAction action = 2;   // nil if observe-only
}

message GetDiagnosisRequest {
    string incident_id = 1;
}

message GetDiagnosisResponse {
    Diagnosis diagnosis = 1;
}

message GetStatusRequest {}

message GetStatusResponse {
    int64 incidents_processed = 1;
    int64 diagnoses_completed = 2;
    int64 actions_executed = 3;
    int64 actions_failed = 4;
    int64 uptime_seconds = 5;
}

message ListActionsRequest {
    int32 limit = 1;
}

message ListActionsResponse {
    repeated RemediationAction actions = 1;
}

// ── Job State Machine ─────────────────────────────────────────────────────────

enum JobState {
    JOB_DETECTED          = 0;
    JOB_DIAGNOSING        = 1;
    JOB_DIAGNOSED         = 2;
    JOB_EXECUTING         = 3;
    JOB_SUCCEEDED         = 4;
    JOB_FAILED            = 5;
    JOB_AWAITING_APPROVAL = 6;
    JOB_APPROVED          = 7;
    JOB_DENIED            = 8;
    JOB_EXPIRED           = 9;
    JOB_CLOSED            = 10;
}

// Job is a durable record of an incident's remediation lifecycle.
// Persisted in etcd at /globular/ai/jobs/{incident_id}.
// Survives restarts. Idempotency key prevents double execution.
message Job {
    string incident_id = 1;
    string action_id = 2;
    JobState state = 3;
    int32 tier = 4;

    // Proposed action (preserved exactly — never recomputed after approval).
    ActionType action_type = 5;
    string action_target = 6;
    string action_params = 7;   // JSON

    // Diagnosis context.
    Diagnosis diagnosis = 8;

    // Approval metadata.
    string approved_by = 9;
    int64 approved_at_ms = 10;
    string denied_by = 11;
    string denied_reason = 12;
    int64 expires_at_ms = 13;

    // Execution tracking.
    int32 attempts = 14;
    int64 last_attempt_at_ms = 15;
    string result = 16;
    string error = 17;
    string idempotency_key = 18;

    // Timestamps.
    int64 created_at_ms = 19;
    int64 updated_at_ms = 20;
}

// ── Approval RPCs ─────────────────────────────────────────────────────────────

message ApproveActionRequest {
    string incident_id = 1;
    string approved_by = 2;  // who approved (username or "cli")
}

message ApproveActionResponse {
    Job job = 1;
}

message DenyActionRequest {
    string incident_id = 1;
    string denied_by = 2;
    string reason = 3;
}

message DenyActionResponse {
    Job job = 1;
}

message RetryActionRequest {
    string incident_id = 1;
}

message RetryActionResponse {
    Job job = 1;
}

message GetJobRequest {
    string incident_id = 1;
}

message GetJobResponse {
    Job job = 1;
}

message ListJobsRequest {
    JobState state_filter = 1;  // 0 = all
    int32 limit = 2;
}

message ListJobsResponse {
    repeated Job jobs = 1;
}

message StopRequest {}
message StopResponse {}

// ── Peer Collaboration Messages ──────────────────────────────────────────────

message PeerPingRequest {
    string sender_node_id = 1;
    string sender_hostname = 2;
}

message PeerPingResponse {
    string node_id = 1;
    string hostname = 2;
    bool ai_available = 3;          // has a working Claude connection
    repeated string profiles = 4;    // node profiles (control-plane, core, etc.)
    int64 uptime_seconds = 5;
    int64 incidents_processed = 6;
}

// Observation: "I see X on my node, do you see it too?"
message PeerObservationRequest {
    string observation_id = 1;       // unique ID for dedup
    string sender_node_id = 2;
    string sender_hostname = 3;
    string category = 4;             // service_crash, high_latency, disk_full, etc.
    string subject = 5;              // what's affected (service name, unit, path)
    string detail = 6;               // human-readable description
    map<string, string> evidence = 7; // key-value evidence from sender
    int64 observed_at_ms = 8;
}

message PeerObservationResponse {
    string node_id = 1;
    bool confirmed = 2;              // "yes I see the same thing"
    string local_evidence = 3;       // what this node sees
    float confidence = 4;            // 0-1 how sure
}

// Proposal: "I want to do X, do you agree?"
message PeerProposalRequest {
    string proposal_id = 1;          // unique ID
    string incident_id = 2;
    string sender_node_id = 3;
    ActionType proposed_action = 4;
    string target = 5;
    string rationale = 6;
    Diagnosis diagnosis = 7;         // share the diagnosis for context
    int32 tier = 8;
}

enum PeerVote {
    VOTE_ABSTAIN = 0;    // can't decide / not enough info
    VOTE_APPROVE = 1;    // agree with proposed action
    VOTE_REJECT = 2;     // disagree — too risky or wrong diagnosis
    VOTE_ESCALATE = 3;   // agree something is wrong but want human approval
}

message PeerProposalResponse {
    string node_id = 1;
    PeerVote vote = 2;
    string reason = 3;               // why this vote
    string counter_proposal = 4;     // alternative action if rejecting
}

// Notification: "I did X, update your state"
message PeerActionNotification {
    string incident_id = 1;
    string sender_node_id = 2;
    ActionType action = 3;
    string target = 4;
    ActionStatus status = 5;
    string result = 6;
    int64 executed_at_ms = 7;
}

message PeerActionAck {
    string node_id = 1;
    bool acknowledged = 2;
}

// ── Conversational AI Messages ──────────────────────────────────────────────

message SendPromptRequest {
    string prompt = 1;                    // User's message text
    string conversation_id = 2;           // Empty = new conversation, set = continue
    string target_node = 3;               // Optional: route to specific peer by hostname
    string user_id = 4;                   // Who is sending (extracted from auth if empty)
    string system_prompt_override = 5;    // Optional: override system prompt
    map<string, string> metadata = 6;     // Extra context
}

message SendPromptResponse {
    string conversation_id = 1;
    string message_id = 2;

    string text_chunk = 3;        // Partial text (streaming)
    string full_text = 4;         // Complete response (when done)
    ConversationStatus status = 5;

    bool done = 6;                    // True on final message
    bool needs_human_reply = 7;       // AI is asking the human a question
    string question_for_human = 8;    // The question text

    int32 input_tokens = 10;
    int32 output_tokens = 11;
    string responding_node = 12;      // Which node answered
}

enum ConversationStatus {
    CONV_STATUS_UNKNOWN = 0;
    CONV_STATUS_THINKING = 1;
    CONV_STATUS_USING_TOOL = 2;
    CONV_STATUS_STREAMING = 3;
    CONV_STATUS_COMPLETE = 4;
    CONV_STATUS_ERROR = 5;
    CONV_STATUS_WAITING_FOR_HUMAN = 6;
}

message ConversationMessage {
    string id = 1;
    string conversation_id = 2;
    string role = 3;                  // "user" or "assistant"
    string content = 4;
    int64 created_at_ms = 5;
    string node_id = 6;
    string node_hostname = 7;
    int32 input_tokens = 8;
    int32 output_tokens = 9;
    map<string, string> metadata = 10;
}

message ConversationSummary {
    string id = 1;
    string title = 2;
    string user_id = 3;
    int64 created_at_ms = 4;
    int64 updated_at_ms = 5;
    int32 message_count = 6;
    string last_message_preview = 7;
}

message GetConversationRequest {
    string conversation_id = 1;
    int32 limit = 2;                  // Max messages (0 = all)
    int64 before_ms = 3;              // Pagination cursor
}

message GetConversationResponse {
    repeated ConversationMessage messages = 1;
    string conversation_id = 2;
    string title = 3;
}

message ListConversationsRequest {
    string user_id = 1;
    int32 limit = 2;
}

message ListConversationsResponse {
    repeated ConversationSummary conversations = 1;
}

message DeleteConversationRequest {
    string conversation_id = 1;
}

message DeleteConversationResponse {}
