syntax = "proto3";
package repository;

import "resource.proto";
import "globular_auth.proto";

option go_package="github.com/globulario/services/golang/repository/repositorypb";

enum ArtifactKind {
  ARTIFACT_KIND_UNSPECIFIED = 0;
  SERVICE = 1;
  APPLICATION = 2;
  AGENT = 3;
  SUBSYSTEM = 4;
  INFRASTRUCTURE = 5;
  COMMAND = 6;             // CLI tools (ffmpeg, rclone, restic, mc, etc.)
  AWARENESS_BUNDLE = 7;   // compiled awareness graph + YAML knowledge base — distributed as a release artifact
}

// ArtifactChannel controls which release tier an artifact belongs to.
// Channels gate which artifacts the reconciler and search surfaces can see.
//
//   STABLE    — default; eligible for cluster reconciliation
//   CANDIDATE — explicit workflow only; reconciler ignores unless overridden
//   CANARY    — limited scope rollouts; reconciler uses only when policy allows
//   DEV       — internal/CI builds; never pulled by cluster reconciliation
//   BOOTSTRAP — day-0 essential packages; cluster boot-path only
//
// Resolution rule (Invariant E): reconciler resolves from STABLE only unless
// an explicit channel override is present in desired state.
enum ArtifactChannel {
  CHANNEL_UNSET = 0;   // treated as STABLE by resolver and search
  STABLE = 1;
  CANDIDATE = 2;
  CANARY = 3;
  DEV = 4;
  BOOTSTRAP = 5;
}

// PublishState tracks the lifecycle of an artifact through the publish pipeline.
// Artifacts progress: STAGING → VERIFIED → PUBLISHED.
// Failed or abandoned artifacts may be marked FAILED or ORPHANED.
enum PublishState {
  PUBLISH_STATE_UNSPECIFIED = 0; // Legacy artifacts without explicit state
  STAGING = 1;                   // Upload in progress, not yet verified
  VERIFIED = 2;                  // Upload complete, checksum verified, not yet discoverable
  PUBLISHED = 3;                 // Fully published and discoverable
  FAILED = 4;                    // Publish pipeline failed
  ORPHANED = 5;                  // Artifact exists but descriptor registration failed
  DEPRECATED = 6;                // Superseded by a newer version; still downloadable with warning
  YANKED = 7;                    // Removed from discovery; download blocked for non-owners
  QUARANTINED = 8;               // Admin hold — security review pending; download blocked
  REVOKED = 9;                   // Terminal — permanently removed from all access
  CORRUPTED = 10;                // Integrity check failed — binary checksum doesn't match manifest
  ARCHIVED  = 11;                // Soft-deleted by GC — outside retention window, hidden from catalog, binary retained
}

message ArtifactRef {
  string publisher_id = 1;
  string name = 2;
  string version = 3;
  string platform = 4;
  ArtifactKind kind = 5;
}

// ArtifactDependencyRef is a typed reference to a package dependency.
// Used in hard_deps to form install/activation dependency graph edges.
// Only name is required; publisher_id scopes to a specific publisher when set.
message ArtifactDependencyRef {
  string name = 1;          // canonical package name (hyphenated, e.g. "etcd", "scylladb")
  string publisher_id = 2;  // optional: restrict to a specific publisher
}

message ArtifactManifest {
  ArtifactRef ref = 1;
  string checksum = 2;          // sha256 of the archive
  int64 size_bytes = 3;
  int64 modified_unix = 4;

  // Build identification — build_number disambiguates multiple builds within the
  // same semantic version. Legacy artifacts without a build number default to 0.
  // Repository uniqueness: (ref.publisher_id, ref.name, ref.platform, ref.version, build_number).
  int64 build_number = 5;

  // Dependency graph
  repeated string provides = 10;
  repeated string requires = 11;
  map<string,string> defaults = 12;
  repeated string entrypoints = 13;

  // Universal metadata
  string description = 14;
  repeated string keywords = 15;
  string icon = 16;              // base64 data-uri or URL
  string alias = 17;             // human-friendly display name
  string license = 18;
  string min_globular_version = 19;
  int64 published_unix = 20;

  // Optional build metadata
  string build_commit = 21;          // git short-SHA at build time
  int64 build_timestamp_unix = 22;   // when the build was produced
  string build_source = 23;          // build host / CI job identifier
  string build_notes = 24;           // free-text changelog for this build

  // Type-specific detail — exactly one set per manifest, determined by ref.kind.
  oneof type_detail {
    ServiceDetail service_detail = 30;
    ApplicationDetail application_detail = 31;
    InfrastructureDetail infrastructure_detail = 32;
  }

  // Catalog metadata — drives dynamic component catalog in the cluster controller.
  // These fields are populated from package.json during artifact upload.
  repeated string profiles = 50;                     // profiles that include this component (e.g. "core", "compute")
  int32 priority = 51;                               // start order (lower = starts first, stops last)
  string install_mode = 52;                          // "repository" | "day0_join"
  bool managed_unit = 53;                            // included in profileUnitMap for unit actions
  string systemd_unit = 54;                          // systemd unit name (e.g. "globular-etcd.service")
  repeated string runtime_local_dependencies = 55;   // DEPRECATED: migrate to hard_deps
  repeated string install_dependencies = 56;         // DEPRECATED: migrate to hard_deps
  string health_check_unit = 57;                     // systemd unit for health check
  int32 health_check_port = 58;                      // TCP port for health check (0 = skip)

  // Typed dependency declarations (PR 2).
  //
  // hard_deps: install/activation blockers. These form directed graph edges
  // for Invariant D (acyclic) and the reachability engine (PR 4). An artifact
  // in hard_deps MUST be installed and healthy before this artifact starts.
  // The uninstaller MUST refuse to remove any artifact that is a hard dep of
  // a currently installed or desired artifact.
  //
  // runtime_uses: informational API peers. These declare which gRPC services
  // or packages this artifact communicates with at runtime. They are NEVER
  // graph edges, NEVER cycle-detectable, and NEVER block uninstall. They
  // exist purely for documentation, mesh routing hints, and admin UX.
  repeated ArtifactDependencyRef hard_deps = 59;
  repeated string runtime_uses = 60;

  // Publish pipeline state — tracks artifact lifecycle from upload through promotion.
  PublishState publish_state = 40;

  // Provenance record — immutable record of who published this artifact.
  ProvenanceRecord provenance = 41;

  // Phase 2: exact artifact identity. Repository-allocated UUIDv7, the sole
  // authoritative identifier for convergence, rollback, and installed-state.
  // Semantic version + build_number remain human-facing; build_id is machine-facing.
  string build_id = 42;

  // Phase 6: true for day-0 provisionally installed packages that have not
  // yet been imported into the repository. Cleared on successful import.
  bool provisional = 43;

  // Upstream import provenance — present only when artifact was imported from
  // a named upstream source (SyncFromUpstream). Informational; not required
  // for installation. Written once at import time, never modified.
  UpstreamImportRecord upstream_import = 61;

  // SHA256 of the entrypoint binary (not the archive). Computed at build time
  // and stored alongside the package checksum. Enables reverse lookup:
  // "which package version contains this binary?" — used by node-agent process
  // fingerprinting to reconcile etcd installed_state with reality.
  string entrypoint_checksum = 44;

  // Release channel this artifact belongs to. Controls resolver and search
  // visibility. CHANNEL_UNSET and STABLE are equivalent for all resolution
  // purposes. DEV and CANDIDATE are never returned to the cluster reconciler
  // unless the caller explicitly requests them. See ArtifactChannel enum.
  ArtifactChannel channel = 45;

  // Phase CLI-D — package config ownership declarations. Each entry tells
  // the node-agent how to treat one config file path during install /
  // upgrade / rollback (preserve, replace, three-way merge, etc.). When
  // empty (legacy artifacts), all paths default to MERGE_REPLACE.
  repeated PackageConfigFile configs = 70;

  // Phase CLI-B — signature / provenance reference. Detached signatures live
  // in the trusted_signatures Scylla table (one row per (artifact_key, key_id)).
  // This field carries the key_id of the most recent signature so clients
  // can fetch the full record via ListArtifactSignatures.
  string signature_key_id = 71;
}

// ServiceDetail contains fields specific to SERVICE packages.
message ServiceDetail {
  string proto_file = 1;                    // e.g. "repository.proto"
  string grpc_service_name = 2;             // e.g. "repository.PackageRepository"
  int32 default_port = 3;
  string systemd_unit = 4;                  // e.g. "globular-repository.service"
  repeated string service_dependencies = 5; // gRPC names of required services
}

// ApplicationDetail contains fields specific to APPLICATION packages.
message ApplicationDetail {
  string route = 1;                         // URL path, e.g. "/apps/myapp"
  string index_file = 2;                    // entry HTML file, e.g. "index.html"
  repeated string actions = 3;              // RBAC action declarations
  repeated string roles = 4;               // RBAC role names
  repeated string groups = 5;              // RBAC group names
  bool set_as_default = 6;                 // become default application on install
  repeated string required_services = 7;   // backend services this app needs
  map<string,string> app_config = 8;       // optional application config/defaults
}

// InfrastructureDetail contains fields specific to INFRASTRUCTURE packages.
message InfrastructureDetail {
  string component = 1;                    // e.g. "etcd", "minio", "envoy"
  string config_template = 2;             // default config content or path
  repeated string data_dirs = 3;          // directories to create with ownership
  string health_endpoint = 4;             // health check URL or command
  string upgrade_strategy = 5;            // "stop-start", "rolling", "blue-green"
  repeated string required_privileges = 6; // e.g. "root", "cap_net_bind"
}

// ProvenanceRecord captures who published an artifact, when, and how.
// Written once at upload time and never modified.
message ProvenanceRecord {
  string subject = 1;          // JWT subject (who published)
  string principal_type = 2;   // "user" | "application" | "node"
  string auth_method = 3;      // "jwt" | "mtls"
  string source_ip = 4;        // caller remote address
  string build_commit = 5;     // git SHA (from manifest metadata)
  string build_source = 6;     // CI job/workflow ID
  int64  timestamp_unix = 7;   // publish timestamp
  string cluster_id = 8;       // accepting cluster
}

// SetArtifactStateRequest transitions an artifact's lifecycle state.
// Used for deprecation, yanking, quarantine, and revocation.
message SetArtifactStateRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64 build_number = 2;
  PublishState target_state = 3;
  string reason = 4;           // audit reason for state change
}

message SetArtifactStateResponse {
  PublishState previous_state = 1;
  PublishState current_state = 2;
}

// GetNamespaceRequest queries namespace ownership information.
message GetNamespaceRequest {
  string namespace_id = 1 [(globular.auth.resource) = { kind: "namespace", scope_anchor: true }];     // publisher namespace to query
}

message NamespaceInfo {
  string namespace_id = 1;
  repeated string owners = 2;           // subjects with owner role
  repeated string permitted = 3;        // subjects with write permission
}

message GetNamespaceResponse {
  NamespaceInfo namespace = 1;
}

message ListArtifactsRequest {}

message ListArtifactsResponse {
  repeated ArtifactManifest artifacts = 1;
}

message UploadArtifactRequest {
  string user = 1;
  string organization = 2 [(globular.auth.resource) = { kind: "namespace", scope_anchor: true }];
  ArtifactRef ref = 3;
  bytes data = 4;
  int64 build_number = 5;       // build iteration within version (0 = legacy)
  string reservation_id = 6;   // Phase 4: optional, links to AllocateUpload reservation
}

message UploadArtifactResponse {
  bool result = 1;
  string build_id = 2;  // Phase 2: repository-allocated artifact identity (UUIDv7)
}

message DownloadArtifactRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64 build_number = 2;  // Build iteration to download (0 = legacy/latest)
  bool allow_upstream_fallback = 3;  // if local blob missing, re-fetch from upstream (server policy decides)
}

message DownloadArtifactResponse {
  bytes data = 1;
}

message GetArtifactManifestRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64 build_number = 2;  // Build iteration within version (0 = legacy/unspecified).
}

message GetArtifactManifestResponse {
  ArtifactManifest manifest = 1;
}

// Request for uploading a bundle.
message UploadBundleRequest {
  string user = 1;              // Username of the person uploading the bundle.
  string organization = 2 [(globular.auth.resource) = { kind: "namespace", scope_anchor: true }];      // Name of the organization uploading the bundle.
  bytes data = 3;               // Binary data of the bundle being uploaded.
}

// Response after uploading a bundle.
message UploadBundleResponse {
  bool result = 1;              // Indicates success or failure of the bundle upload.
}

// Request for downloading a bundle.
message DownloadBundleRequest {
  resource.PackageDescriptor descriptor = 1 [(globular.auth.resource) = { kind: "bundle", scope_anchor: true }];  // Descriptor of the package to be downloaded.
  string platform = 2;                         // Platform for which the bundle is intended.
}

// Response for downloading a bundle.
message DownloadBundleResponse {
  bytes data = 1;               // Binary data of the downloaded bundle.
}

// BundleSummary holds the catalog metadata for a published bundle.
message BundleSummary {
  string name = 1;           // service / package name
  string version = 2;        // semver or build tag
  string platform = 3;       // e.g. linux_amd64
  string publisher_id = 4;   // publishing organization
  string service_id = 5;     // descriptor UUID
  int64  size_bytes = 6;     // archive size
  int64  published_unix = 7; // upload timestamp (unix seconds)
  string sha256 = 8;         // checksum of the archive
  int64  build_number = 9;   // build iteration within version (0 = legacy)
}

message ListBundlesRequest {
  string prefix = 1 [(globular.auth.resource) = { kind: "bundle" }]; // optional: filter bundles whose name starts with this
}

message ListBundlesResponse {
  repeated BundleSummary bundles = 1;
}

// ── Search / Version History / Delete (Phase 2 RPCs) ────────────────────────

// SearchArtifactsRequest queries the artifact catalog with optional filters.
message SearchArtifactsRequest {
  string query = 1;              // free-text search across name/description/keywords
  ArtifactKind kind = 2;         // filter by package type (0 = all)
  string publisher_id = 3 [(globular.auth.resource) = { kind: "namespace" }];       // filter by publisher
  string platform = 4;           // filter by platform
  int32 page_size = 5;           // max results per page (0 = server default)
  string page_token = 6;         // opaque token for next page
  // Channel filter. CHANNEL_UNSET (default) returns only STABLE artifacts.
  // Set to a specific channel to restrict results to that channel only.
  // DEV and CANDIDATE are never returned unless explicitly requested here.
  ArtifactChannel channel = 7;
  // When true, include all channels in results regardless of the channel field.
  // Intended for admin/operator UX only — never set this from the reconciler.
  bool include_all_channels = 8;
}

message SearchArtifactsResponse {
  repeated ArtifactManifest artifacts = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// GetArtifactVersionsRequest returns all versions of a given package.
message GetArtifactVersionsRequest {
  string publisher_id = 1 [(globular.auth.resource) = { kind: "namespace", scope_anchor: true }];
  string name = 2 [(globular.auth.resource) = { kind: "artifact" }];
  string platform = 3;           // optional: filter by platform
}

message GetArtifactVersionsResponse {
  repeated ArtifactManifest versions = 1;
}

// DeleteArtifactRequest removes a specific artifact version from the repository.
// This is a repository/catalog operation only — it never uninstalls from nodes.
// When force is false (default), deletion is rejected if any node still has this
// artifact installed. Set force=true to delete from the repository even if
// installed instances exist on nodes.
message DeleteArtifactRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  bool force = 2;
}

message DeleteArtifactResponse {
  bool result = 1;
  string message = 2;  // Human-readable status or rejection reason
}

// PromoteArtifactRequest transitions an artifact's publish state.
// Typical transitions: VERIFIED→PUBLISHED (success) or VERIFIED→ORPHANED (descriptor failed).
message PromoteArtifactRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64 build_number = 2;           // identifies the specific build to promote
  PublishState target_state = 3;     // desired state (PUBLISHED, ORPHANED, FAILED)
}

message PromoteArtifactResponse {
  bool result = 1;
  PublishState previous_state = 2;   // state before promotion
  PublishState current_state = 3;    // state after promotion
  string message = 4;               // human-readable status
}

// ── DescribePackage (live aggregator) ──────────────────────────────────────
//
// Phase 2 introspection: "what is this package, what's desired, where is it
// installed, is anything failing?" Aggregates repository catalog + etcd
// desired state + per-node installed state into a single flat response.
//
// Follows projection-clauses.md:
//   - Clause 2 (Minimal Surface): one question ("what is this package?")
//   - Clause 5 (Scoped Query): always filters to a single package name
//   - Clause 6 (Size): stays under 3 KB even for 30-node clusters — each
//     per-node entry carries only node_id + version + status
//   - Clause 11 (AI Consumption): flat explicit fields, no joins — callers
//     chain into node_resolve for hostname lookups when needed
//
// This is a live aggregator, not a ScyllaDB projection. Response cache is
// in-process LRU with 10s TTL (to tame thundering herds on the repo scan).

message DescribePackageRequest {
  // Package name. May use either '-' or '_' separators; the handler tries
  // both forms against the catalog.
  string name = 1 [(globular.auth.resource) = { kind: "artifact" }];
  // Optional: filter by publisher. Empty matches any.
  string publisher_id = 2 [(globular.auth.resource) = { kind: "namespace" }];
}

// NodeInstallation is one (node_id, version, status) tuple. Callers chain
// node_id → node_resolve to get hostname/ips/labels for display.
message NodeInstallation {
  string node_id         = 1;
  string version         = 2;
  string status          = 3;  // "installed" | "failed" | "pending"
  string checksum        = 4;
  int64  installed_at    = 5;  // unix seconds
}

// DesiredInfo captures the cluster-wide desired-version pointer for a
// package. Kind determines which etcd path was read:
//   - SERVICE        → /globular/resources/ServiceDesiredVersion/<name>
//   - INFRASTRUCTURE → /globular/resources/InfrastructureRelease/<pub>/<name>
//   - COMMAND        → no desired-state (commands are installed directly)
message DesiredInfo {
  string version     = 1;
  int64  generation  = 2;
  string publisher   = 3;
  bool   present     = 4;  // false when no desired-state entry exists
}

// PackageInfo is the flat response shape. Never holds raw spec YAML or
// full manifests — just the identity + state pointers an operator or AI
// needs to decide "is this package healthy cluster-wide?".
message PackageInfo {
  string name                     = 1;
  ArtifactKind kind               = 2;
  string publisher                = 3;
  repeated string versions        = 4;  // all published versions in the repo
  string latest_version           = 5;
  DesiredInfo desired             = 6;
  repeated NodeInstallation installed_on = 7;
  repeated NodeInstallation failing_on   = 8;
  // Freshness & origin (Clause 4). source describes the aggregation path,
  // not a single data source.
  string source                   = 9;   // "live-aggregator"
  int64  observed_at              = 10;  // unix seconds when aggregation ran
}

message DescribePackageResponse {
  PackageInfo info = 1;
}

// Service for managing package uploads and downloads in a repository.
service PackageRepository {
  // Downloads a package bundle from the package repository.
  // Input: DownloadBundleRequest containing the package descriptor and platform.
  // Output: Stream of DownloadBundleResponse containing the binary data of the bundle.
  rpc DownloadBundle(DownloadBundleRequest) returns(stream DownloadBundleResponse) {
    option (globular.auth.authz) = {
      action: "repository.bundle.read"
      permission: "read"
      resource_template: "/repository/bundles/{descriptor}"
      default_role_hint: "viewer"
    };
  };

  // Uploads a package bundle to the repository.
  // Input: Stream of UploadBundleRequest containing the user, organization, and bundle data.
  // Output: UploadBundleResponse indicating the result of the upload operation.
  rpc UploadBundle(stream UploadBundleRequest) returns(UploadBundleResponse) {
    option (globular.auth.authz) = {
      action: "repository.bundle.write"
      permission: "write"
      collection_template: "/repository/namespaces/{organization}/bundles"
      default_role_hint: "editor"
    };
  };

  // Lists stored artifacts (services, applications, agents, subsystems).
  rpc ListArtifacts(ListArtifactsRequest) returns(ListArtifactsResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.list"
      permission: "read"
      collection_template: "/repository/artifacts"
      default_role_hint: "viewer"
    };
  };

  // Uploads an artifact stream into the repository.
  rpc UploadArtifact(stream UploadArtifactRequest) returns(UploadArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.write"
      permission: "write"
      collection_template: "/repository/namespaces/{organization}/artifacts"
      default_role_hint: "editor"
    };
  };

  // Downloads a complete artifact from the repository.
  rpc DownloadArtifact(DownloadArtifactRequest) returns(stream DownloadArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.read"
      permission: "read"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "viewer"
    };
  };

  // Retrieves metadata for a specific artifact reference.
  rpc GetArtifactManifest(GetArtifactManifestRequest) returns(GetArtifactManifestResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.read"
      permission: "read"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "viewer"
    };
  };

  // Lists all bundles published to the repository (from the Resource service index).
  rpc ListBundles(ListBundlesRequest) returns(ListBundlesResponse) {
    option (globular.auth.authz) = {
      action: "repository.bundle.list"
      permission: "read"
      collection_template: "/repository/bundles"
      default_role_hint: "viewer"
    };
  };

  // Searches artifacts with optional text query and filters.
  rpc SearchArtifacts(SearchArtifactsRequest) returns(SearchArtifactsResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.search"
      permission: "read"
      collection_template: "/repository/artifacts"
      default_role_hint: "viewer"
    };
  };

  // Returns all published versions of a given package.
  rpc GetArtifactVersions(GetArtifactVersionsRequest) returns(GetArtifactVersionsResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.read"
      permission: "read"
      resource_template: "/repository/namespaces/{publisher_id}/artifacts/{name}/versions"
      default_role_hint: "viewer"
    };
  };

  // DescribePackage aggregates catalog + desired-state + per-node installed
  // state for a single package. Live aggregator, no server-side cache.
  // See projection-clauses.md for the contract.
  rpc DescribePackage(DescribePackageRequest) returns(DescribePackageResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.read"
      permission: "read"
      resource_template: "/repository/artifacts/{name}"
      default_role_hint: "viewer"
    };
  };

  // Deletes a specific artifact version from the repository.
  rpc DeleteArtifact(DeleteArtifactRequest) returns(DeleteArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.delete"
      permission: "delete"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "admin"
    };
  };

  // Promotes an artifact's publish state (e.g. VERIFIED→PUBLISHED).
  rpc PromoteArtifact(PromoteArtifactRequest) returns(PromoteArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.promote"
      permission: "write"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "editor"
    };
  };

  // Transitions an artifact's lifecycle state (deprecate, yank, quarantine, revoke).
  rpc SetArtifactState(SetArtifactStateRequest) returns(SetArtifactStateResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.set_state"
      permission: "write"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "editor"
    };
  };

  // Queries namespace ownership and permission information.
  rpc GetNamespace(GetNamespaceRequest) returns(GetNamespaceResponse) {
    option (globular.auth.authz) = {
      action: "repository.namespace.read"
      permission: "read"
      resource_template: "/repository/namespaces/{namespace_id}"
      default_role_hint: "viewer"
    };
  };

  // Updates only the binary of an existing artifact, creating a new build entry.
  // The repository copies the manifest from the latest build, updates checksum/size,
  // assigns the next build_number, and promotes to PUBLISHED.
  // This enables delta deploys where only the binary changed.
  rpc UpdateArtifactBinary(stream UpdateArtifactBinaryRequest) returns(UpdateArtifactBinaryResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.write"
      permission: "write"
      collection_template: "/repository/namespaces/{header.ref.publisher_id}/artifacts"
      default_role_hint: "editor"
    };
  };

  // Phase 6: Imports a day-0 provisionally installed artifact into the repository.
  // Validates version/digest against the release ledger, assigns confirmed build_id,
  // and adds to the ledger as RELEASED. Rejects conflicts (same version, different digest).
  rpc ImportProvisionalArtifact(ImportProvisionalRequest) returns(ImportProvisionalResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.write"
      permission: "admin"
      collection_template: "/repository/namespaces/{publisher_id}/artifacts"
      default_role_hint: "admin"
    };
  };

  // Phase 4: Reserves a version and pre-assigns a build_id before upload.
  // The repository allocates or validates the version, enforces monotonicity,
  // and returns a short-lived reservation token. The client then uploads
  // the artifact using the reservation_id.
  rpc AllocateUpload(AllocateUploadRequest) returns(AllocateUploadResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.write"
      permission: "write"
      collection_template: "/repository/namespaces/{publisher_id}/artifacts"
      default_role_hint: "editor"
    };
  };

  // Deterministic resolver: resolves a package to exactly one concrete build_id
  // or returns a hard error. Used by the controller planning phase.
  // NEVER call this from the reconciler execution path — read build_id from
  // desired state instead.
  rpc ResolveArtifact(ResolveArtifactRequest) returns(ResolveArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.read"
      permission: "read"
      collection_template: "/repository/artifacts"
      default_role_hint: "viewer"
    };
  };

  // Reverse-lookup: given a binary's SHA256 checksum (entrypoint_checksum),
  // find the artifact manifest that produced it. Used by the node-agent
  // process fingerprinting to resolve "which version is this binary?"
  // Returns the matching manifest or NOT_FOUND if no published artifact
  // has this entrypoint checksum.
  rpc ResolveByEntrypointChecksum(ResolveByEntrypointChecksumRequest) returns(ResolveByEntrypointChecksumResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.read"
      permission: "read"
      collection_template: "/repository/artifacts"
      default_role_hint: "viewer"
    };
  };

  // ArchiveUnreachableArtifacts runs the repository GC: every artifact that is
  // outside the retention window AND not actively deployed (build_id not in
  // installed state) is moved to ARCHIVED state.  dry_run=true previews without
  // writing.  Returns a per-artifact report.
  rpc ArchiveUnreachableArtifacts(ArchiveUnreachableArtifactsRequest) returns(ArchiveUnreachableArtifactsResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.delete"
      permission: "delete"
      collection_template: "/repository/artifacts"
      default_role_hint: "owner"
    };
  };

  // ── Upstream Source Registry (Phase 3) ───────────────────────────────────
  // All upstream operations require cluster-admin or repository-admin role.

  // Registers a named upstream artifact source (e.g. GitHub Releases).
  // Overwrites if a source with the same name already exists.
  rpc RegisterUpstream(RegisterUpstreamRequest) returns(RegisterUpstreamResponse) {
    option (globular.auth.authz) = {
      action: "repository.upstream.write"
      permission: "admin"
      collection_template: "/repository/upstreams"
      default_role_hint: "admin"
    };
  };

  // Lists all registered upstream sources.
  rpc ListUpstreams(ListUpstreamsRequest) returns(ListUpstreamsResponse) {
    option (globular.auth.authz) = {
      action: "repository.upstream.read"
      permission: "admin"
      collection_template: "/repository/upstreams"
      default_role_hint: "admin"
    };
  };

  // Removes a registered upstream source by name.
  rpc RemoveUpstream(RemoveUpstreamRequest) returns(RemoveUpstreamResponse) {
    option (globular.auth.authz) = {
      action: "repository.upstream.write"
      permission: "admin"
      collection_template: "/repository/upstreams"
      default_role_hint: "admin"
    };
  };

  // Fetches a release index from the named upstream source, validates each
  // entry, and imports missing artifacts. Leaf operation — intended to be
  // called by the repository.sync.upstream workflow.
  // release_tag is REQUIRED in phase 1 — empty tag returns InvalidArgument.
  // dry_run=true previews without writing anything.
  rpc SyncFromUpstream(SyncFromUpstreamRequest) returns(SyncFromUpstreamResponse) {
    option (globular.auth.authz) = {
      action: "repository.upstream.sync"
      permission: "admin"
      collection_template: "/repository/upstreams"
      default_role_hint: "admin"
    };
  };

  // ── Operator verify / repair / explain (Phase CLI-A) ────────────────────
  //
  // VerifyArtifact runs a read-only integrity probe against a single
  // artifact. Never mutates state. Read by `globular repository verify`.
  rpc VerifyArtifact(VerifyArtifactRequest) returns(VerifyArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.verify"
      permission: "read"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "viewer"
    };
  };

  // RepairArtifact attempts to repair a broken artifact by re-importing
  // from the upstream source recorded in its manifest. Refuses REVOKED
  // unconditionally; refuses QUARANTINED unless allow_quarantine_override.
  // Used by `globular repository repair`.
  rpc RepairArtifact(RepairArtifactRequest) returns(RepairArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.repair"
      permission: "admin"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "admin"
    };
  };

  // RepairIndex reconstitutes PUBLISHED index authority for artifacts whose local
  // CAS blob + manifest sidecar are intact but whose repository index row is
  // UNKNOWN / missing / skeleton / non-PUBLISHED — a bulk, owner-driven,
  // dry-run-by-default sweep. Identity comes only from the on-disk manifest (never
  // minted); refuses when CAS evidence is missing/contradictory; never touches
  // desired state; never elevates REVOKED/QUARANTINED. SCAR-3. Used by
  // `globular repository repair-index`.
  rpc RepairIndex(RepairIndexRequest) returns(RepairIndexResponse) {
    option (globular.auth.authz) = {
      action: "repository.index.repair"
      permission: "admin"
      resource_template: "/repository/index"
      default_role_hint: "admin"
    };
  };

  // ExplainArtifact composes manifest, ledger, blob, signature, and pipeline
  // state into a single operator-readable answer. Read-only. Used by
  // `globular repository explain` — the AI/operator cockpit command.
  rpc ExplainArtifact(ExplainArtifactRequest) returns(ExplainArtifactResponse) {
    option (globular.auth.authz) = {
      action: "repository.artifact.explain"
      permission: "read"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "viewer"
    };
  };

  // ── Phase CLI-B: signing + trusted publishers ───────────────────────────

  // TrustPublisher registers a trusted publisher key. Admin-only.
  rpc TrustPublisher(TrustPublisherRequest) returns(TrustPublisherResponse) {
    option (globular.auth.authz) = {
      action: "repository.trust.publisher"
      permission: "admin"
      collection_template: "/repository/trust"
      default_role_hint: "admin"
    };
  };

  // RevokePublisherKey marks a trusted publisher key as REVOKED. Terminal.
  rpc RevokePublisherKey(RevokePublisherKeyRequest) returns(RevokePublisherKeyResponse) {
    option (globular.auth.authz) = {
      action: "repository.trust.revoke"
      permission: "admin"
      collection_template: "/repository/trust"
      default_role_hint: "admin"
    };
  };

  // ListTrustedPublishers enumerates publisher keys and their trust state.
  rpc ListTrustedPublishers(ListTrustedPublishersRequest) returns(ListTrustedPublishersResponse) {
    option (globular.auth.authz) = {
      action: "repository.trust.list"
      permission: "read"
      collection_template: "/repository/trust"
      default_role_hint: "viewer"
    };
  };

  // RegisterArtifactSignature stores a detached signature for an artifact.
  // Used by signing tools after they sign an artifact's digest with a
  // trusted private key. The repository never stores the private key.
  rpc RegisterArtifactSignature(RegisterArtifactSignatureRequest) returns(RegisterArtifactSignatureResponse) {
    option (globular.auth.authz) = {
      action: "repository.signature.register"
      permission: "write"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "editor"
    };
  };

  // VerifyArtifactSignature returns the trust outcome for the most recent
  // signature on an artifact. Read-only.
  rpc VerifyArtifactSignature(VerifyArtifactSignatureRequest) returns(VerifyArtifactSignatureResponse) {
    option (globular.auth.authz) = {
      action: "repository.signature.verify"
      permission: "read"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "viewer"
    };
  };

  // ListArtifactSignatures returns every signature recorded for an artifact.
  rpc ListArtifactSignatures(ListArtifactSignaturesRequest) returns(ListArtifactSignaturesResponse) {
    option (globular.auth.authz) = {
      action: "repository.signature.list"
      permission: "read"
      resource_template: "/repository/artifacts/{ref}"
      default_role_hint: "viewer"
    };
  };

  // ── Phase CLI-C: rollback ───────────────────────────────────────────────

  // RecordInstalledRevision is called by the node-agent (or the controller
  // on its behalf) after an install/upgrade/rollback succeeds. The repository
  // owns the installed-revision history table; rollback selection reads it.
  rpc RecordInstalledRevision(RecordInstalledRevisionRequest) returns(RecordInstalledRevisionResponse) {
    option (globular.auth.authz) = {
      action: "repository.revision.record"
      permission: "write"
      collection_template: "/repository/revisions"
      default_role_hint: "editor"
    };
  };

  // ListInstalledRevisions returns the install history for a package.
  rpc ListInstalledRevisions(ListInstalledRevisionsRequest) returns(ListInstalledRevisionsResponse) {
    option (globular.auth.authz) = {
      action: "repository.revision.list"
      permission: "read"
      collection_template: "/repository/revisions"
      default_role_hint: "viewer"
    };
  };

  // ListRollbackCandidates returns the previous installable revisions for a
  // package, with eligibility flags (target must be PUBLISHED, signature must
  // pass policy, target must not be REVOKED, etc.).
  rpc ListRollbackCandidates(ListRollbackCandidatesRequest) returns(ListRollbackCandidatesResponse) {
    option (globular.auth.authz) = {
      action: "repository.rollback.candidates"
      permission: "read"
      collection_template: "/repository/revisions"
      default_role_hint: "viewer"
    };
  };

  // ── Phase F: config receipts + repository findings ─────────────────────

  rpc RecordConfigReceipt(RecordConfigReceiptRequest) returns(RecordConfigReceiptResponse) {
    option (globular.auth.authz) = {
      action: "repository.config.receipt.record"
      permission: "write"
      collection_template: "/repository/config_receipts"
      default_role_hint: "editor"
    };
  };

  rpc ListConfigReceipts(ListConfigReceiptsRequest) returns(ListConfigReceiptsResponse) {
    option (globular.auth.authz) = {
      action: "repository.config.receipt.list"
      permission: "read"
      collection_template: "/repository/config_receipts"
      default_role_hint: "viewer"
    };
  };

  rpc ListRepositoryFindings(ListRepositoryFindingsRequest) returns(ListRepositoryFindingsResponse) {
    option (globular.auth.authz) = {
      action: "repository.findings.list"
      permission: "read"
      collection_template: "/repository/findings"
      default_role_hint: "viewer"
    };
  };

  // GetRepositoryStatus returns the live operational mode and capability status.
  // This RPC NEVER calls requireHealthy() — it must answer even when ScyllaDB
  // is down. Use it to determine repository health before making capability decisions.
  rpc GetRepositoryStatus(GetRepositoryStatusRequest) returns(GetRepositoryStatusResponse) {
    option (globular.auth.authz) = {
      action: "repository.status.read"
      permission: "read"
      collection_template: "/repository/status"
      default_role_hint: "viewer"
    };
  };
}

// ── Operator verify / repair / explain messages ─────────────────────────────

// ArtifactVerifyStatus is the outcome of an integrity probe (VerifyArtifact).
// PUBLISHED + blob_present + size_match + digest_match maps to OK; every
// other status carries a specific reason for the operator / AI executor.
enum ArtifactVerifyStatus {
  ARTIFACT_VERIFY_STATUS_UNSPECIFIED = 0;
  ARTIFACT_VERIFY_OK                       = 1;
  ARTIFACT_VERIFY_BROKEN_MISSING_BLOB      = 2;
  ARTIFACT_VERIFY_BROKEN_CHECKSUM_MISMATCH = 3;
  ARTIFACT_VERIFY_BROKEN_LEDGER_MISSING    = 4;
  ARTIFACT_VERIFY_BROKEN_MANIFEST_MISSING  = 5;
  ARTIFACT_VERIFY_BROKEN_SIGNATURE_MISSING = 6;
  ARTIFACT_VERIFY_BROKEN_SIGNATURE_INVALID = 7;
  ARTIFACT_VERIFY_BROKEN_PROVENANCE_INVALID = 8;
  ARTIFACT_VERIFY_QUARANTINED              = 9;
  ARTIFACT_VERIFY_REVOKED                  = 10;
  ARTIFACT_VERIFY_INCONCLUSIVE             = 11;
}

message VerifyArtifactRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64  build_number       = 2;  // 0 = resolve latest
  string build_id           = 3;  // optional exact build_id
  bool   verify_digest      = 4;  // if true, recompute sha256 over the blob
  bool   verify_signature   = 5;  // reserved — Phase CLI-B
  bool   include_ledger     = 6;  // include ledger row presence in response
  bool   include_manifest   = 7;  // include manifest fields in response
  bool   include_blob       = 8;  // include blob_key + size details
}

message VerifyArtifactResponse {
  ArtifactRef ref          = 1;
  string artifact_key      = 2;
  string artifact_state    = 3;   // ArtifactPipelineState as string
  PublishState publish_state = 4;
  bool   installable       = 5;
  ArtifactVerifyStatus status = 6;
  string reason            = 7;
  string blob_key          = 8;
  int64  expected_size     = 9;
  int64  actual_size       = 10;
  string expected_digest   = 11;
  string actual_digest     = 12;
  string signature_status  = 13; // reserved — Phase CLI-B
  string provenance_status = 14; // reserved — Phase CLI-B
  bool   repairable        = 15;
  string recommended_action = 16;
}

// RepairArtifactRequest asks the repository to repair a broken artifact by
// re-importing it from the upstream source recorded in its manifest.
message RepairArtifactRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64  build_number = 2;  // 0 = resolve latest
  bool   dry_run      = 3;  // preview only
  bool   force        = 4;  // allow repair from any non-REVOKED state
  bool   allow_quarantine_override = 5;  // permit repair of QUARANTINED rows
  string operator_subject = 6;  // for audit; usually filled in by the server from auth context
}

message RepairArtifactResponse {
  ArtifactRef ref       = 1;
  string artifact_key   = 2;
  string action         = 3;   // repair_blob | repair_checksum_mismatch | skipped_ok | blocked_revoked | blocked_quarantined | failed
  string detail         = 4;
  string artifact_state_before = 5;
  string artifact_state_after  = 6;
  string workflow_run_id = 7;  // when repair started a workflow run; empty otherwise
}

// RepairIndexRequest drives the bulk CAS->index reconstitution (SCAR-3). The safe
// default is NO-MUTATION: an omitted/false `commit` is a dry-run (report only).
message RepairIndexRequest {
  bool   commit           = 1;  // false (default) = dry-run report; true = apply
  string publisher_filter = 2;  // optional: restrict to one publisher id
  string name_filter      = 3;  // optional: restrict to one package name
  string operator_subject = 4;  // for audit; usually filled by the server from auth context
}

message RepairIndexItem {
  string artifact_key  = 1;
  string name          = 2;
  string version       = 3;
  string platform      = 4;
  string build_id      = 5;  // echoed from the on-disk manifest evidence, never minted
  string state_before  = 6;
  string state_after   = 7;
  string action        = 8;  // would_repair_publish_index | repair_publish_index | refused | skipped_ok | skipped_policy
  string detail        = 9;
}

message RepairIndexResponse {
  bool   dry_run        = 1;
  int32  scanned        = 2;
  int32  repairable     = 3;
  int32  repaired       = 4;
  int32  refused        = 5;
  int32  skipped_ok     = 6;
  int32  skipped_policy = 7;
  repeated RepairIndexItem items = 8;
}

// ExplainArtifactRequest asks for one operator-readable answer about an artifact.
message ExplainArtifactRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64  build_number = 2;
}

message ExplainArtifactResponse {
  ArtifactRef ref      = 1;
  string artifact_key  = 2;
  string artifact_state = 3;
  PublishState publish_state = 4;
  string blob_key      = 5;
  bool   blob_present  = 6;
  int64  expected_size = 7;
  int64  actual_size   = 8;
  string expected_digest = 9;
  string actual_digest   = 10;
  bool   ledger_present  = 11;
  bool   manifest_present = 12;
  string signature_status = 13;
  bool   installable     = 14;
  string recommended_action = 15;
  string related_workflow_run_id = 16;
  ArtifactVerifyStatus verify_status = 17;
  string detail        = 18;
  // Source availability — populated when blob is missing locally.
  // Each entry is "name:type:status:reason" (status: PRESENT|ABSENT|REACHABLE|UNREACHABLE|UNCONFIGURED).
  repeated string source_availability = 19;
  // True when blob is absent locally but at least one source can provide it.
  bool repairable = 20;
}

// ── ResolveArtifact (deterministic resolver) ────────────────────────────────
//
// ResolveArtifact resolves a package reference to exactly one concrete build_id
// or returns a hard error. This is the canonical resolution endpoint for the
// controller planning phase.
//
// Contract (Invariant E):
//   - Result is always a single concrete build_id — never a list
//   - If zero artifacts match: hard error with NOT_FOUND
//   - If multiple artifacts match after all filters: hard error (ambiguous)
//   - Only PUBLISHED artifacts are eligible unless caller passes channel override
//   - DEV and CANDIDATE are never returned unless explicitly requested
//   - "latest" resolution is valid here, but callers MUST persist build_id into
//     desired state immediately. The reconciler MUST NOT call this at execution
//     time — it must read build_id from desired state only.
message ResolveArtifactRequest {
  string publisher_id = 1;         // e.g. "core@globular.io"
  string name = 2;                 // package name
  ArtifactKind kind = 3;           // artifact kind (0 = SERVICE by default)
  string platform = 4;             // e.g. "linux_amd64"
  // Channel to resolve from. Defaults to STABLE. Controller must use STABLE.
  ArtifactChannel channel = 5;
  // Optional: exact version to resolve (e.g. "1.4.2"). When empty, returns the
  // latest PUBLISHED build on the requested channel.
  string version = 6;
  // Optional: exact build_id to resolve (highest-priority match if present).
  string build_id = 7;
}

message ResolveArtifactResponse {
  // The resolved artifact manifest. build_id is the sole convergence identity.
  ArtifactManifest manifest = 1;
  // Human-readable description of how resolution was performed.
  string resolution_source = 2;  // e.g. "exact-build_id", "latest-stable", "exact-version"
}

// ResolveByEntrypointChecksum — reverse lookup from binary checksum to artifact.
message ResolveByEntrypointChecksumRequest {
  string checksum = 1; // sha256 hex string of the binary (no "sha256:" prefix)
  string platform = 2; // optional filter (default: "linux_amd64")
}

message ResolveByEntrypointChecksumResponse {
  ArtifactManifest manifest = 1; // the matching artifact, or nil if not found
}

// ── UpdateArtifactBinary (delta deploy) ─────────────────────────────────────

message UpdateArtifactBinaryRequest {
  oneof payload {
    UpdateArtifactBinaryHeader header = 1;
    bytes chunk = 2;
  }
}

message UpdateArtifactBinaryHeader {
  ArtifactRef ref = 1;       // publisher, name, version, platform, kind
  string checksum = 2;       // expected SHA256 of the new binary ("sha256:<hex>")
  int64 size_bytes = 3;      // expected size of the new binary
}

message UpdateArtifactBinaryResponse {
  int64 build_number = 1;    // assigned by repository (max + 1)
  string checksum = 2;       // verified checksum
  string status = 3;         // "published" | "error"
}

// ── Phase 4: Upload Allocation ──────────────────────────────────────────────

// VersionIntent specifies how the repository should allocate a version.
enum VersionIntent {
  VERSION_INTENT_UNSPECIFIED = 0;
  BUMP_PATCH = 1;    // increment patch: 1.4.2 → 1.4.3
  BUMP_MINOR = 2;    // increment minor: 1.4.2 → 1.5.0
  BUMP_MAJOR = 3;    // increment major: 1.4.2 → 2.0.0
  EXACT = 4;         // use the exact version specified in exact_version field
}

message AllocateUploadRequest {
  string publisher_id = 1;  // e.g. "core@globular.io"
  string name = 2;          // package name
  string platform = 3;      // e.g. "linux_amd64"
  VersionIntent intent = 4; // how to compute the version
  string exact_version = 5; // required when intent=EXACT
  // Release channel for the allocated artifact. Defaults to STABLE.
  ArtifactChannel channel = 6;
}

message AllocateUploadResponse {
  string version = 1;          // allocated version (e.g. "1.4.3")
  string reservation_id = 2;  // short-lived token (5 min TTL)
  string build_id = 3;        // pre-assigned UUIDv7
  int64 build_number = 4;     // derived monotonic counter
}

// ── Phase 6: Provisional Import ─────────────────────────────────────────────

message ImportProvisionalRequest {
  string publisher_id = 1;          // e.g. "core@globular.io"
  string name = 2;                  // package name
  string version = 3;               // declared version from day-0 install
  string platform = 4;              // e.g. "linux_amd64"
  string digest = 5;                // SHA256 of the .tgz content (trusted)
  string provisional_build_id = 6;  // locally-generated build_id from day-0
  bytes data = 7;                   // optional: .tgz content for re-upload
  string kind = 8;                  // SERVICE, INFRASTRUCTURE, COMMAND
}

message ImportProvisionalResponse {
  bool ok = 1;
  string confirmed_build_id = 2;    // repository-issued build_id
  string confirmed_version = 3;     // may differ if admin re-versioned
  string state = 4;                 // "RELEASED"
  string message = 5;
}

// ── Upstream Source Registry ─────────────────────────────────────────────────
//
// UpstreamSource is a named, registered upstream artifact source.
// Stored in etcd at /globular/repository/upstreams/<name>.
// Source type is extensible: add new enum values for future source systems.

enum UpstreamSourceType {
  UPSTREAM_TYPE_UNSPECIFIED = 0;
  GITHUB_RELEASE = 1;   // GitHub Releases (public or token-authenticated)
  HTTP_INDEX     = 2;   // Generic HTTPS index endpoint
  GIT_INDEX      = 3;   // Git repository with release index (Gitea, GitLab, bare)
  LOCAL_DIR      = 4;   // Local filesystem (air-gapped / USB / offline)
}

message UpstreamSource {
  string name             = 1;  // unique identifier, e.g. "globulario-github"
  UpstreamSourceType type = 2;  // source system type
  string index_url        = 3;  // URL or template; use {tag} for release tag substitution
  string channel          = 4;  // "stable" (default)
  string platform         = 5;  // e.g. "linux_amd64"
  bool   enabled          = 6;
  string last_synced_tag  = 7;  // tag of the last fully successful sync (no rejected/failed)
  string credentials_ref  = 8;  // etcd key to a credential record; empty = public

  // ── Import policy fields ──────────────────────────────────────────────
  string default_publisher_id     = 10;  // e.g. "core@globular.io"
  repeated string allowed_publishers = 11;
  repeated string allowed_kinds      = 12;  // "SERVICE", "INFRASTRUCTURE", etc.
  repeated string allowed_channels   = 13;  // "stable", "candidate", etc.
  bool   require_checksum            = 14;  // reject entries without sha256
  string trust_policy                = 15;  // "import" (default) | "quarantine"

  // ── Sync status tracking ──────────────────────────────────────────────
  int64  last_sync_unix   = 16;  // unix timestamp of last sync attempt
  string last_sync_status = 17;  // "succeeded" | "failed" | "partial"
  string last_sync_error  = 18;  // error message from last failed sync

  // ── Provider-specific fields ────────────────────────────────────────────
  // Not all fields apply to all types. Provider ignores irrelevant fields.
  string repo_url            = 20;  // Git repo URL or GitHub "owner/repo"
  bool   include_prereleases = 21;  // include prerelease tags in --latest (GITHUB_RELEASE)
  string owner               = 30;  // GitHub owner (GITHUB_RELEASE)
  string repo                = 31;  // GitHub repo name (GITHUB_RELEASE)
  string branch              = 32;  // Git branch (GIT_INDEX)
  string index_path_template = 33;  // Path within repo/dir: "releases/{tag}/release-index.json"
  string artifact_base_url   = 34;  // Base URL for artifact downloads (HTTP_INDEX, GIT_INDEX)
  string local_root          = 35;  // Filesystem root (LOCAL_DIR)
}

message RegisterUpstreamRequest  { UpstreamSource source = 1; }
message RegisterUpstreamResponse { UpstreamSource source = 1; }
message ListUpstreamsRequest     {}
message ListUpstreamsResponse    { repeated UpstreamSource sources = 1; }
message RemoveUpstreamRequest    { string name = 1; }
message RemoveUpstreamResponse   {}

// ── SyncFromUpstream ─────────────────────────────────────────────────────────
//
// Leaf operation invoked by the repository.sync.upstream workflow (or directly
// by an authorized operator). Fetches a release index from a named upstream
// source, validates each entry, and imports missing or new artifacts.
//
// Phase 1 rule: release_tag is REQUIRED. Empty tag returns InvalidArgument.
// "Latest" discovery is not implemented — operators specify the tag explicitly.
//
// dry_run=true produces a full preview without any writes to ScyllaDB, MinIO,
// or etcd. Preview results use SYNC_WOULD_* statuses exclusively.
//
// last_synced_tag advances only on a fully clean successful run (no rejected
// or failed entries). Partial success does not advance the tag.

enum UpstreamSyncStatus {
  // Real run outcomes (dry_run=false)
  SYNC_IMPORTED  = 0;  // artifact downloaded, verified, registered
  SYNC_SKIPPED   = 1;  // already present with same digest — idempotent
  SYNC_REJECTED  = 2;  // digest conflict — audit record written, binary not stored
  SYNC_FAILED    = 3;  // download or digest verification error

  // Preview outcomes (dry_run=true) — no writes of any kind
  SYNC_WOULD_IMPORT = 4;
  SYNC_WOULD_SKIP   = 5;
  SYNC_WOULD_REJECT = 6;
  SYNC_WOULD_FAIL   = 7;
}

message UpstreamSyncResult {
  string name           = 1;
  string version        = 2;
  string build_id       = 3;
  string platform       = 4;
  string package_digest = 5;
  UpstreamSyncStatus status = 6;
  string detail         = 7;
  // Rich fields for update-check display (populated by server)
  string publisher          = 10;
  string kind               = 11;
  string channel            = 12;
  int64  build_number       = 13;
  bool   checksum_present   = 14;
  string local_version      = 15;
  int64  local_build_number = 16;
  string action             = 17;  // "new" | "update" | "up_to_date" | "ahead" | "blocked" | "conflict"
  string blocked_reason     = 18;
}

message SyncFromUpstreamRequest {
  string source_name    = 1;  // references a registered UpstreamSource
  string release_tag    = 2;  // Explicit tag. Optional when resolve_latest=true + source has repo_url.
  bool   dry_run        = 3;
  repeated string only  = 4;  // optional: restrict to these package names
  bool   resolve_latest = 5;  // When true, discover latest release from source.repo_url
}

message SyncFromUpstreamResponse {
  repeated UpstreamSyncResult results = 1;
  int32 imported     = 2;
  int32 skipped      = 3;
  int32 rejected     = 4;
  int32 failed       = 5;
  bool  dry_run      = 6;
  string resolved_tag = 7;   // actual release tag used (explicit or discovered)
  string source_name  = 8;   // echoes source for display
}

// UpstreamImportRecord is written once at import time and never modified.
// Attached to ArtifactManifest for artifacts sourced from upstream.
message UpstreamImportRecord {
  string source_name  = 1;  // references UpstreamSource.name
  string release_tag  = 2;  // e.g. "v1.0.17"
  string asset_url    = 3;  // direct URL the binary was downloaded from
  string index_url    = 4;  // URL of the release index used
  int64  imported_at  = 5;  // unix timestamp of import
  // Supply-chain provenance (Phase 2)
  string publisher    = 6;  // normalized publisher at import time
  string kind         = 7;  // normalized kind at import time
  string channel      = 8;  // normalized channel at import time
  int64  build_number = 9;  // from release index
  string checksum     = 10; // sha256 digest at import time
  // BOM composition provenance (Phase 3)
  string origin_release        = 11;  // release where this artifact was originally built
  bool   changed_in_release    = 12;  // true if built in the importing platform release
  string platform_release      = 13;  // platform release version (e.g. "1.0.84")
  string package_contract_digest = 14; // normalized content identity for change detection
}

// ── GC / Archive ────────────────────────────────────────────────────────────

message ArchiveUnreachableArtifactsRequest {
  // dry_run: if true, report what would be archived without modifying state.
  bool dry_run = 1;
}

message ArchivedArtifactRecord {
  string key         = 1; // storage key (e.g. "core%echo%1.0.0%linux_amd64%3")
  string build_id    = 2;
  string name        = 3;
  string version     = 4;
  string publisher   = 5;
  string reason      = 6; // "outside_retention_window" or "unreachable"
}

message ArchiveUnreachableArtifactsResponse {
  int32                        archived_count  = 1;
  int32                        skipped_count   = 2; // already archived / terminal
  int32                        protected_count = 3; // reachable (retention or deployed)
  repeated ArchivedArtifactRecord archived     = 4;
}

// ── Phase CLI-D: package config ownership ─────────────────────────────────

// MergeStrategy declares how a given config file should be handled during
// install / upgrade / rollback. The node-agent honors this when applying a
// new package over an existing installed revision.
enum MergeStrategy {
  MERGE_STRATEGY_UNSPECIFIED = 0;
  MERGE_REPLACE                  = 1;  // overwrite unconditionally
  MERGE_PRESERVE                 = 2;  // keep operator copy; new pkg writes .pkg-new
  MERGE_THREE_WAY                = 3;  // base/current/new merge; record conflicts
  MERGE_TEMPLATE_RENDER          = 4;  // regenerate from desired state template
  MERGE_APPEND_ONLY              = 5;  // append new lines; never delete
  MERGE_FAIL_ON_LOCAL_MODIFICATION = 6; // upgrade blocks if file changed locally
  MERGE_SECRET_EXTERNAL          = 7;  // file is a secret; managed outside pkg
}

// ConfigKind classifies a config file. Drives logging, redaction, and
// install/upgrade/rollback policy.
enum ConfigKind {
  CONFIG_KIND_UNSPECIFIED = 0;
  CONFIG_DEFAULT             = 1;  // shipped default; replaceable on upgrade if unmodified
  CONFIG_OPERATOR_OVERRIDE   = 2;  // operator-edited; never overwritten silently
  CONFIG_GENERATED           = 3;  // generated from desired state; regenerable
  CONFIG_SECRET              = 4;  // sensitive; never logged, never in plain manifest output
  CONFIG_RUNTIME_STATE       = 5;  // not desired config; not packaged
}

// PackageConfigFile is one config file declared by a package manifest.
// The node-agent uses this list to drive install / upgrade / rollback safely.
message PackageConfigFile {
  string path                  = 1;   // absolute path on the target node
  ConfigKind config_kind       = 2;
  string owner_package         = 3;   // "publisher/name" — the package that owns this file
  string checksum_at_install   = 4;   // sha256 captured at install time (filled in by node-agent)
  string current_checksum      = 5;   // sha256 currently on disk (filled in by node-agent on read)
  int64  last_modified_unix    = 6;   // file mtime
  MergeStrategy merge_strategy = 7;
  bool   preserve_on_upgrade   = 8;
  bool   restore_on_rollback   = 9;
  bool   sensitive             = 10;  // SECRET or otherwise redaction-required
}

// ── Phase CLI-B: signing + trusted publishers ─────────────────────────────

// TrustState tracks the lifecycle of a registered publisher key.
enum TrustState {
  TRUST_STATE_UNSPECIFIED = 0;
  TRUST_TRUSTED   = 1;
  TRUST_UNTRUSTED = 2;
  TRUST_REVOKED   = 3;  // terminal — key is permanently invalid for verification
  TRUST_EXPIRED   = 4;  // valid_until passed
}

// TrustedPublisher is one (publisher_id, public_key_id) entry in the
// trusted-publishers table. The repository stores public keys only.
message TrustedPublisher {
  string publisher_id    = 1;  // e.g. "core@globular.io"
  string public_key_id   = 2;  // operator-supplied identifier (often a thumbprint)
  bytes  public_key_pem  = 3;  // PEM-encoded ed25519 public key
  TrustState trust_state = 4;
  int64  valid_from_unix = 5;
  int64  valid_until_unix = 6; // 0 = no expiry
  string created_by      = 7;  // operator subject who registered
  int64  created_unix    = 8;
  string algorithm       = 9;  // e.g. "ed25519"
  string notes           = 10; // optional free-form note
}

// SignatureStatus is the outcome of VerifyArtifactSignature.
enum SignatureStatus {
  SIGNATURE_STATUS_UNSPECIFIED = 0;
  SIGNATURE_OK                 = 1;
  SIGNATURE_MISSING            = 2;
  SIGNATURE_INVALID            = 3;
  SIGNATURE_UNTRUSTED_PUBLISHER = 4;
  SIGNATURE_REVOKED_KEY        = 5;
  SIGNATURE_EXPIRED_KEY        = 6;
  SIGNATURE_DIGEST_MISMATCH    = 7;
  SIGNATURE_INCONCLUSIVE       = 8;
}

// ArtifactSignature is one detached signature record.
message ArtifactSignature {
  string artifact_key    = 1;
  string digest          = 2;  // the digest that was signed (sha256:<hex>)
  string algorithm       = 3;  // e.g. "ed25519"
  bytes  signature_bytes = 4;  // raw signature bytes
  string public_key_id   = 5;  // matches TrustedPublisher.public_key_id
  string signed_by       = 6;  // signer subject
  int64  signed_at_unix  = 7;
  string provenance_ref  = 8;  // optional pointer to provenance record
}

// TrustPublisherRequest registers a publisher's public key.
message TrustPublisherRequest {
  string publisher_id     = 1 [(globular.auth.resource) = { kind: "namespace", scope_anchor: true }];
  string public_key_id    = 2;
  bytes  public_key_pem   = 3;
  string algorithm        = 4;  // default "ed25519"
  int64  valid_until_unix = 5;  // 0 = no expiry
  string notes            = 6;
}

message TrustPublisherResponse {
  TrustedPublisher publisher = 1;
}

message RevokePublisherKeyRequest {
  string publisher_id  = 1 [(globular.auth.resource) = { kind: "namespace", scope_anchor: true }];
  string public_key_id = 2;
  string reason        = 3;
}

message RevokePublisherKeyResponse {
  TrustedPublisher publisher = 1;
}

message ListTrustedPublishersRequest {
  string publisher_id = 1; // empty = all
}

message ListTrustedPublishersResponse {
  repeated TrustedPublisher publishers = 1;
}

message RegisterArtifactSignatureRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64  build_number    = 2;
  string algorithm       = 3;  // default "ed25519"
  string public_key_id   = 4;
  bytes  signature_bytes = 5;
  string provenance_ref  = 6;
}

message RegisterArtifactSignatureResponse {
  ArtifactSignature signature = 1;
  SignatureStatus   status    = 2;  // verification result against the trusted-publishers table
}

message VerifyArtifactSignatureRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64 build_number = 2;
}

message VerifyArtifactSignatureResponse {
  SignatureStatus   status    = 1;
  string            reason    = 2;
  ArtifactSignature signature = 3;  // most recent signature on the artifact
  TrustedPublisher  publisher = 4;  // matched publisher key (if any)
}

message ListArtifactSignaturesRequest {
  ArtifactRef ref = 1 [(globular.auth.resource) = { kind: "artifact", scope_anchor: true }];
  int64 build_number = 2;
}

message ListArtifactSignaturesResponse {
  repeated ArtifactSignature signatures = 1;
}

// ── Phase CLI-C: installed revisions + rollback ───────────────────────────

// InstalledPackageRevision is one row of install history. Written by the
// node-agent (or the controller) after every successful install / upgrade /
// rollback so that ListRollbackCandidates can show "previous verified versions".
message InstalledPackageRevision {
  string publisher_id    = 1;
  string name            = 2;
  ArtifactKind kind      = 3;
  string version         = 4;
  string build_id        = 5;
  int64  build_number    = 6;
  string platform        = 7;
  string checksum        = 8;
  int64  installed_at_unix = 9;
  string installed_by_workflow_run_id = 10;
  string node_id         = 11;
  string previous_revision_id = 12;  // points to the prior row's revision_id
  string config_snapshot_id = 13;    // optional pointer to a config snapshot blob
  string service_status_before = 14;
  string service_status_after  = 15;
  string revision_id     = 16;       // unique id for this revision row (UUID)
  string action          = 17;       // "install" | "upgrade" | "rollback"
}

message RecordInstalledRevisionRequest {
  InstalledPackageRevision revision = 1;
}

message RecordInstalledRevisionResponse {
  string revision_id = 1;
}

message ListInstalledRevisionsRequest {
  string publisher_id = 1;
  string name         = 2;
  ArtifactKind kind   = 3;
  string platform     = 4;
  string node_id      = 5;  // empty = all nodes
  int32  limit        = 6;  // 0 = default
}

message ListInstalledRevisionsResponse {
  repeated InstalledPackageRevision revisions = 1;
}

// RollbackEligibility holds why a candidate is or isn't a viable rollback target.
message RollbackEligibility {
  bool eligible           = 1;
  string reason           = 2;
  ArtifactVerifyStatus verify_status = 3;
  SignatureStatus signature_status = 4;
}

message RollbackCandidate {
  InstalledPackageRevision revision = 1;
  ArtifactRef target_ref            = 2;
  RollbackEligibility eligibility   = 3;
}

message ListRollbackCandidatesRequest {
  string publisher_id = 1;
  string name         = 2;
  ArtifactKind kind   = 3;
  string platform     = 4;
  string node_id      = 5;
  int32  limit        = 6;  // 0 = default (5)
}

message ListRollbackCandidatesResponse {
  ArtifactRef current_ref           = 1;  // currently installed
  repeated RollbackCandidate candidates = 2;
}

// ── Phase F: signature policy ─────────────────────────────────────────────

// SignaturePolicy controls when missing/invalid signatures block installability.
// The repository reads it from etcd at /globular/repository/security/policy.
// Defaults are conservative: core packages require signatures, third-party do
// not, dev mode is OFF in production, ON in dev/test.
message SignaturePolicy {
  // require_signatures_for_core: when true, an artifact whose publisher_id
  // matches one of trusted_core_publishers MUST carry a valid trusted
  // signature to become / remain PUBLISHED.
  bool require_signatures_for_core = 1;

  // require_signatures_for_all: strict mode — every artifact requires a
  // valid trusted signature regardless of publisher.
  bool require_signatures_for_all = 2;

  // allow_unsigned_local_development: when true, the LOCAL_DIR upstream
  // source provider is allowed to skip signature checks. Off by default
  // in production. Useful for `globular pkg build` / dev.
  bool allow_unsigned_local_development = 3;

  // trusted_core_publishers: list of publisher_ids that count as "core" for
  // require_signatures_for_core. Default ["core@globular.io"].
  repeated string trusted_core_publishers = 4;

  // quarantine_on_invalid_signature: when true, an artifact found to have
  // an invalid (forged or wrong-key) signature is moved to QUARANTINED on
  // detection. When false, the artifact is left in its current state but
  // resolver/download still refuse it.
  bool quarantine_on_invalid_signature = 5;
}

// ── Phase F: package config receipts ──────────────────────────────────────

// ConfigReceiptAction is what the node-agent did to a single config file
// during install / upgrade / rollback.
enum ConfigReceiptAction {
  CONFIG_RECEIPT_ACTION_UNSPECIFIED = 0;
  CONFIG_RECEIPT_PRESERVED      = 1;  // local copy kept (operator edits intact)
  CONFIG_RECEIPT_REPLACED       = 2;  // file overwritten with package new default
  CONFIG_RECEIPT_GENERATED      = 3;  // re-rendered from desired state
  CONFIG_RECEIPT_MERGED         = 4;  // three-way merge succeeded
  CONFIG_RECEIPT_CONFLICT       = 5;  // merge / replace blocked by local changes
  CONFIG_RECEIPT_RESTORED       = 6;  // restored from rollback snapshot
  CONFIG_RECEIPT_SKIPPED_SECRET = 7;  // SECRET file — never read or write
  CONFIG_RECEIPT_FAILED         = 8;  // exec error
}

// PackageConfigReceipt is one node-agent receipt for one config file.
// Repository accepts these via RecordConfigReceipt; doctor + CLI consume
// them to surface conflicts and post-install audit trails.
message PackageConfigReceipt {
  string node_id            = 1;
  string publisher_id       = 2;  // package owner
  string name               = 3;  // package name
  string platform           = 4;
  int64  build_number       = 5;
  string path               = 6;  // redacted to "[REDACTED]" when sensitive=true
  ConfigKind config_kind    = 7;
  MergeStrategy merge_strategy = 8;
  string checksum_before    = 9;
  string checksum_after     = 10;
  ConfigReceiptAction action = 11;
  string snapshot_id        = 12; // pointer to a config snapshot blob (when applicable)
  string workflow_run_id    = 13;
  int64  timestamp_unix     = 14;
  string reason             = 15;
  bool   sensitive          = 16;
}

message RecordConfigReceiptRequest {
  PackageConfigReceipt receipt = 1;
}

message RecordConfigReceiptResponse {}

message ListConfigReceiptsRequest {
  string publisher_id  = 1;
  string name          = 2;
  string platform      = 3;
  string node_id       = 4;       // empty = all nodes
  ConfigReceiptAction action_filter = 5;  // 0 = no filter
  int32  limit         = 6;
}

message ListConfigReceiptsResponse {
  repeated PackageConfigReceipt receipts = 1;
}

// ── Phase F: repository findings (doctor pull-source) ─────────────────────

// RepositoryFindingKind enumerates the integrity findings the repository
// service can self-report.
enum RepositoryFindingKind {
  REPOSITORY_FINDING_UNSPECIFIED = 0;
  REPO_FIND_PUBLISHED_MISSING_BLOB        = 1;
  REPO_FIND_PUBLISHED_CHECKSUM_MISMATCH   = 2;
  REPO_FIND_PUBLISHED_UNSIGNED_REQUIRED   = 3;
  REPO_FIND_REVOKED_INSTALLABLE           = 4;
  REPO_FIND_QUARANTINED_INSTALLABLE       = 5;
  REPO_FIND_CONFIG_CONFLICT               = 6;
  REPO_FIND_ROLLBACK_FAILED               = 7;
  // Phase 1 operational-mode invariants:
  REPO_FIND_SCYLLA_DOWN_MODE_INCONSISTENT = 10; // service reports FULL mode but ScyllaDB is unavailable
  // 11 retired: MinIO removed from the repository — packages live only in the
  // local POSIX CAS, so there is no mirror dependency to block a capability.
  // Never reuse this number.
  reserved 11;
  reserved "REPO_FIND_MINIO_BLOCKS_REPOSITORY";
  REPO_FIND_SOURCE_CHAIN_UNAVAILABLE      = 12; // no source can provide any artifact
  REPO_FIND_LOCAL_CACHE_CORRUPTION        = 13; // receipt exists but local blob is missing or corrupt
}

// RepositoryFindingSeverity mirrors the doctor's severity scale.
enum RepositoryFindingSeverity {
  REPO_FIND_SEVERITY_UNSPECIFIED = 0;
  REPO_FIND_INFO     = 1;
  REPO_FIND_WARN     = 2;
  REPO_FIND_ERROR    = 3;
  REPO_FIND_CRITICAL = 4;
}

// RepositoryFinding is one self-reported integrity issue. The doctor pulls
// these via ListRepositoryFindings and surfaces them as Findings.
message RepositoryFinding {
  RepositoryFindingKind kind     = 1;
  RepositoryFindingSeverity severity = 2;
  string artifact_key           = 3;
  ArtifactRef ref               = 4;
  string node_id                = 5;
  string current_state          = 6;
  string expected_state         = 7;
  string reason                 = 8;
  string recommended_command    = 9;  // operator action to remediate
  map<string, string> evidence  = 10; // free-form key-values (digest, size, key_id, …)
  int64  observed_at_unix       = 11;
}

message ListRepositoryFindingsRequest {
  // kind_filter: 0 = all kinds.
  RepositoryFindingKind kind_filter = 1;
  int32 limit = 2;
}

message ListRepositoryFindingsResponse {
  repeated RepositoryFinding findings = 1;
  int64 generated_at_unix             = 2;
}

// ── Phase 1: operational status ───────────────────────────────────────────────

// DependencyHealthProto describes one dependency's live state and which
// capabilities are affected when it is unhealthy. "Proto" suffix avoids
// collision with the Go operational.DependencyHealth type.
message DependencyHealthProto {
  string name   = 1;  // e.g. "scylladb"
  string kind   = 2;  // REQUIRED, OPTIONAL, INDEX, CACHE, …
  string status = 3;  // HEALTHY, DEGRADED, UNAVAILABLE, UNSAFE
  string reason = 4;
  repeated string affects_capabilities = 5;
}

// CapabilityHealthProto describes the live status of one named capability.
message CapabilityHealthProto {
  string name   = 1;  // e.g. "repository.write", "repository.read"
  string status = 2;  // AVAILABLE, DEGRADED, BLOCKED, DISABLED
  string mode   = 3;  // FULL, DEGRADED, READ_ONLY, LOCAL_ONLY, UNAVAILABLE
  string reason = 4;
}

message GetRepositoryStatusRequest {}

// GetRepositoryStatusResponse is the live operational picture of this
// repository instance. The gRPC SERVING state is orthogonal: a service may
// be SERVING with mode DEGRADED or READ_ONLY.
//
//   mode = FULL        → all capabilities available
//   mode = DEGRADED    → MinIO mirror unavailable; core capabilities work
//   mode = READ_ONLY   → ScyllaDB unavailable; writes blocked; local reads work
//   mode = LOCAL_ONLY  → ScyllaDB + MinIO unavailable; only local POSIX CAS
//   mode = UNAVAILABLE → service cannot serve any capability
message GetRepositoryStatusResponse {
  string service                               = 1;
  string mode                                  = 2;
  string reason                                = 3;
  repeated DependencyHealthProto dependencies  = 4;
  repeated CapabilityHealthProto capabilities  = 5;
  int64  observed_at_unix                      = 6;
}
