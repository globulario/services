syntax = "proto3";

package cluster_controller;

option go_package = "github.com/globulario/services/golang/cluster_controller/cluster_controllerpb;cluster_controllerpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "globular_auth.proto";

message ClusterInfo {
  string cluster_id = 1;
  string cluster_domain = 2;
  google.protobuf.Timestamp created_at = 3;
}

message ClusterNetworkSpec {
  string cluster_domain = 1;
  string protocol = 2;
  uint32 port_http = 3;
  uint32 port_https = 4;
  repeated string alternate_domains = 5;
  bool acme_enabled = 6;
  string admin_email = 7;

  // DNS-first naming fields (PR0)
  string gateway_fqdn = 8;              // e.g., "gateway.cluster.local"
  string dns_endpoint = 9;              // e.g., "ns1.cluster.local:10033"
  repeated string dns_nameservers = 10; // e.g., ["ns1.cluster.local"]
  uint32 dns_ttl = 11;                  // default 60 seconds for internal records

  // External DNS integration (PR8)
  ExternalDNSConfig external_dns = 12;

  // Domain migration (PR9)
  DomainMigration domain_migration = 13;
}

// DomainMigration tracks cluster domain migration state (PR9)
message DomainMigration {
  string old_domain = 1;              // Domain being migrated from
  string new_domain = 2;              // Domain being migrated to
  MigrationState state = 3;           // Current migration state
  int64 started_at = 4;               // Unix timestamp when migration started
  uint32 grace_period_seconds = 5;   // Grace period before removing old records (default 3600)

  enum MigrationState {
    MIGRATION_NOT_STARTED = 0;
    MIGRATION_IN_PROGRESS = 1;
    MIGRATION_COMPLETED = 2;
  }
}

// ExternalDNSConfig configures external/authoritative DNS publishing (PR8)
message ExternalDNSConfig {
  bool enabled = 1;                       // Enable external DNS publishing
  string provider = 2;                    // Provider: "rfc2136", "cloudflare", "route53"
  string domain = 3;                      // Public domain (e.g., "example.com")
  repeated string publish = 4;            // What to publish: ["gateway", "controller"]
  uint32 ttl = 5;                         // TTL for external records (default 300)
  bool allow_private_ips = 6;             // Allow publishing RFC1918 IPs (default false)
  map<string, string> provider_config = 7; // Provider-specific config (API keys, etc.)
}

message NodeIdentity {
  string hostname = 1;
  string domain = 2;
  repeated string ips = 3;
  string os = 4;
  string arch = 5;
  string agent_version = 6;

  // DNS-first naming fields (PR0)
  string node_name = 7;         // canonical node name (e.g., "node-01")
  string advertise_ip = 8;      // IP to advertise (validated non-loopback)
  string advertise_fqdn = 9;    // e.g., "node-01.cluster.local"
}

// Hardware capabilities reported by a node agent.
// Used by the controller to suggest appropriate profiles during join approval.
message NodeCapabilities {
  uint32 cpu_count       = 1;  // logical CPU cores (runtime.NumCPU)
  uint64 ram_bytes       = 2;  // total RAM in bytes
  uint64 disk_bytes      = 3;  // total capacity of primary volume in bytes
  uint64 disk_free_bytes = 4;  // free bytes on primary volume
  bool can_apply_privileged = 5;  // true when node can write systemd units (root or equivalent)
  string privilege_reason   = 6;  // human-readable reason: "running as root", "direct systemd write access", etc.
}

message NodeRecord {
  string node_id = 1;
  NodeIdentity identity = 2;
  google.protobuf.Timestamp last_seen = 3;
  string status = 4;
  repeated string profiles = 5;
  map<string,string> metadata = 6;
  string agent_endpoint = 7;
  string advertise_fqdn = 8;  // e.g., "node-01.cluster.local" (PR2)
  NodeCapabilities capabilities = 9;  // hardware capabilities from last heartbeat
}

message CreateJoinTokenRequest {
  google.protobuf.Timestamp expires_at = 1;
}
message CreateJoinTokenResponse {
  string join_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message RequestJoinRequest {
  string join_token = 1;
  NodeIdentity identity = 2;
  map<string,string> labels = 3;
  NodeCapabilities capabilities = 4;  // hardware capabilities for profile suggestion
}
message RequestJoinResponse {
  string request_id = 1;
  string status = 2;
  string message = 3;
}

message GetJoinRequestStatusRequest {
  string request_id = 1 [(globular.auth.resource) = { kind: "join_request" }];
}
message GetJoinRequestStatusResponse {
  string status = 1;
  string node_id = 2;
  repeated string profiles = 3;
  string message = 4;
  string node_token = 5;      // JWT with node_<uuid> principal
  string node_principal = 6;  // e.g., "node_<uuid>"
  bytes plan_json = 7;        // JSON-encoded JoinPlan (set after authorization)
}

// JoinAuthorizationRequest is the v2 join path. The installer calls this with
// a join token and stable identity; the controller returns a signed JoinPlan.
message JoinAuthorizationRequest {
  string join_token = 1;
  NodeIdentity identity = 2;
  map<string,string> labels = 3;
  NodeCapabilities capabilities = 4;
  string nonce = 5;
  string installer_version = 6;
  string cluster_id = 7;
}

// JoinAuthorizationResponse carries the signed JoinPlan on success.
// plan_json is a JSON-encoded JoinPlan. The installer must validate the
// signature before executing any cluster-affecting step.
message JoinAuthorizationResponse {
  bool allowed = 1;
  string denied_reason = 2;
  string join_id = 3;
  bytes plan_json = 4;
  int64 controller_generation = 5;
}

message JoinRequestRecord {
  string request_id = 1;
  NodeIdentity identity = 2;
  string status = 3;
  string message = 4;
  repeated string profiles = 5;
  map<string,string> metadata = 6;
  NodeCapabilities capabilities = 7;        // hardware capabilities from the joining node
  repeated string suggested_profiles = 8;   // profiles deduced from capabilities
}

message ListJoinRequestsRequest {}
message ListJoinRequestsResponse {
  repeated JoinRequestRecord pending = 1;
}

message ApproveJoinRequest {
  string request_id = 1 [(globular.auth.resource) = { kind: "join_request" }];
  string node_id = 2 [deprecated = true];
  repeated string profiles = 3;
  map<string,string> metadata = 4;
}
message ApproveJoinResponse {
  string node_id = 1;
  string message = 2;
  string node_token = 3;      // JWT with node_<uuid> principal
  string node_principal = 4;  // e.g., "node_<uuid>"
}

message RejectJoinRequest {
  string request_id = 1 [(globular.auth.resource) = { kind: "join_request" }];
  string node_id = 2 [deprecated = true];
  string reason = 3;
}
message RejectJoinResponse {
  string node_id = 1;
  string message = 2;
}

// NodeIdentityProjection is the minimal "who is this node?" answer, governed
// by projection-clauses.md. It MUST NOT be extended with services, packages,
// metrics, logs, or health fields — those belong to separate projections.
message NodeIdentityProjection {
  string node_id     = 1;
  string hostname    = 2;
  repeated string ips    = 3;
  repeated string macs   = 4;
  repeated string labels = 5;
  // Freshness & origin (Clause 4) — the response never lies about its source.
  string source      = 6;  // "scylla" | "cluster-controller" | "node-agent"
  int64  observed_at = 7;  // unix seconds when underlying data was written
}

message ResolveNodeRequest {
  // Identifier may be a node_id (uuid), hostname, mac, or ip.
  // The resolver picks a lookup table based on the identifier's shape.
  string identifier = 1;
}

message ResolveNodeResponse {
  NodeIdentityProjection identity = 1;
}

message ListNodesRequest {}
message ListNodesResponse {
  repeated NodeRecord nodes = 1;
}

message SetNodeProfilesRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  repeated string profiles = 2;
}
message SetNodeProfilesResponse {
  string operation_id = 1;
}

// Called by node-agent from workflow steps to update bootstrap phase.
message SetNodeBootstrapPhaseRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  string phase = 2;  // e.g. "infra_preparing", "workload_ready", "bootstrap_failed"
  string reason = 3; // optional: error message for failed phase
}
message SetNodeBootstrapPhaseResponse {
  bool accepted = 1;
}

// Called by node-agent from workflow steps to emit cluster-wide events.
message EmitWorkflowEventRequest {
  string event_type = 1;  // e.g. "node.bootstrap.ready"
  map<string, string> data = 2;
}
message EmitWorkflowEventResponse {
  bool published = 1;
}

// RemoveNode removes a node from the cluster.
// The node's services will be stopped and it will be deregistered.
message RemoveNodeRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  bool force = 2;        // Force removal even if node is unreachable
  bool drain = 3;        // Stop services gracefully before removal
}
message RemoveNodeResponse {
  string operation_id = 1;
  string message = 2;
}

// GetClusterHealth returns the overall health status of the cluster.
message GetClusterHealthRequest {}
message GetClusterHealthResponse {
  string status = 1;     // healthy, degraded, unhealthy
  int32 total_nodes = 2;
  int32 healthy_nodes = 3;
  int32 unhealthy_nodes = 4;
  int32 unknown_nodes = 5;
  repeated NodeHealthStatus node_health = 6;
}

message NodeHealthStatus {
  string node_id = 1;
  string hostname = 2;
  string status = 3;     // healthy, unhealthy, unknown
  string last_error = 4;
  google.protobuf.Timestamp last_seen = 5;
  int32 failed_checks = 6;
}

message UpdateClusterNetworkRequest {
  ClusterNetworkSpec spec = 1;
}
message UpdateClusterNetworkResponse {
  uint64 generation = 1;
}

// Plan messages removed — Globular is workflow-native.

enum ArtifactKind {
  ARTIFACT_KIND_UNSPECIFIED = 0;
  ARTIFACT_SERVICE = 1;
  ARTIFACT_APPLICATION = 2;
  ARTIFACT_SUBSYSTEM = 3;
}

message ArtifactRef {
  ArtifactKind kind = 1;
  string name = 2;
  string publisher = 3;
  string version = 4;
  string discovery_id = 5;
}

message UnitAction {
  string unit_name = 1;
  string action = 2;
}

message UpgradeGlobularRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  string platform = 2;
  bytes artifact = 3;
  string sha256 = 4;
  string target_path = 5;
  uint32 probe_port = 6;
}

message UpgradeGlobularResponse {
  string upgrade_id = 1;
  string terminal_state = 2;
  string error_message = 3;
}

message StartApplyRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
}
message StartApplyResponse {
  string operation_id = 1;
}

enum OperationPhase {
  OP_PHASE_UNSPECIFIED = 0;
  OP_QUEUED = 1;
  OP_RUNNING = 2;
  OP_SUCCEEDED = 3;
  OP_FAILED = 4;
}

message OperationEvent {
  string operation_id = 1;
  string node_id = 2;
  OperationPhase phase = 3;
  string message = 4;
  int32 percent = 5;
  bool done = 6;
  string error = 7;
  google.protobuf.Timestamp ts = 8;
}

message CompleteOperationRequest {
  string operation_id = 1 [(globular.auth.resource) = { kind: "operation" }];
  string node_id = 2 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  bool success = 3;
  string message = 4;
  string error = 5;
  int32 percent = 6;
}

message CompleteOperationResponse {
  string message = 1;
}

message NodeUnitStatus {
  string name = 1;
  string state = 2;
  string details = 3;
}

// ── Infrastructure Truth Plane (Phase 1) ────────────────────────────────────
// External infrastructure (ScyllaDB first; etcd/Envoy/MinIO later) must be
// represented as desired state, rendered config, runtime truth, lifecycle
// state, and violations — never just "the process is active". These messages
// live here (rather than in node_agent.proto) because NodeStatus carries them
// in the heartbeat and node_agent.proto already imports cluster_controller.proto;
// putting them in node_agent.proto would create a circular import. The
// node_agent GetInfraProbe RPC references these same messages.
//
// Design rule: keep the messages generic so etcd/Envoy/MinIO adapters can reuse
// them without a redesign. Component-specific facts go into the desired/rendered/
// runtime string maps and the typed config_fields/violations lists.

// InfraLifecycleState is the finite-state model for an infrastructure component's
// join/health lifecycle. Numbers are ordered by progress; DEGRADED/STALLED are
// terminal-ish error states, not points on the happy path.
enum InfraLifecycleState {
  INFRA_LIFECYCLE_UNKNOWN = 0;
  INFRA_NOT_PRESENT       = 1;  // package not installed
  INFRA_PACKAGE_INSTALLED = 2;  // installed, config not yet rendered
  INFRA_CONFIG_RENDERED   = 3;  // config file exists
  INFRA_CONFIG_ATTESTED   = 4;  // config passed attestation rules
  INFRA_DAEMON_STARTING   = 5;  // unit active, local API not yet up
  INFRA_LOCAL_API_READY   = 6;  // native REST/admin API answers
  INFRA_CQL_READY         = 7;  // query protocol answers (Scylla: CQL)
  INFRA_CLUSTER_CONTACTED  = 8; // gossip/peer contact established
  INFRA_JOINING           = 9;  // bootstrap/streaming in progress
  INFRA_SCHEMA_AGREEING   = 10; // schema version converging
  INFRA_MEMBER_READY      = 11; // full, healthy cluster member
  INFRA_DEGRADED          = 12; // running but impaired
  INFRA_STALLED           = 13; // stuck — see blocking_reason
}

// InfraConfigField is one attested field from a rendered config file: the
// expected value (from desired state), the actual value (from the file), and
// whether it passed. `evidence` records where the value came from.
message InfraConfigField {
  string field_name     = 1;
  string expected_value = 2;
  string actual_value   = 3;
  bool   valid          = 4;
  string violation      = 5; // invariant id violated (empty when valid)
  string severity       = 6; // CRITICAL | ERROR | WARN | INFO
  string evidence       = 7;
}

// InfraViolation is a single attested or runtime problem with remediation that
// points at the OWNER of the bad state — never "edit the file by hand".
message InfraViolation {
  string id          = 1; // invariant/failure-mode id, e.g. scylla.loopback_forbidden
  string severity    = 2; // CRITICAL | ERROR | WARN | INFO
  string message     = 3;
  string evidence    = 4;
  string remediation = 5; // owner-targeted fix, not manual file edit
}

// InfraLifecycleObservation is the FSM state plus staleness metadata. state_age
// is approximate in Phase 1 (no persisted transition history yet).
message InfraLifecycleObservation {
  InfraLifecycleState state            = 1;
  string              state_label      = 2;
  int64               observed_at_unix = 3;
  int64               state_age_seconds = 4;
  string              last_transition  = 5;
  string              blocking_reason  = 6; // why progress stopped (empty when healthy)
}

// InfraProbeResult is the full structured truth for one component on one node.
// Booleans are deliberately separate (daemon_active vs healthy vs config_valid)
// so a "green" daemon can never hide an invalid config or a partial failure.
message InfraProbeResult {
  string component = 1; // "scylladb", later "etcd"/"envoy"/"minio"
  string node_id   = 2;

  bool installed     = 3;
  bool daemon_active = 4;
  bool healthy       = 5;
  bool config_valid  = 6;

  string summary = 7;

  InfraLifecycleObservation lifecycle    = 8;
  repeated InfraConfigField  config_fields = 9;
  repeated InfraViolation    violations   = 10;

  repeated string expected_peers = 11;
  repeated string observed_peers = 12;
  bool            peers_match    = 13;

  map<string, string> desired  = 14; // computed desired state (provenance in desired["source"])
  map<string, string> rendered = 15; // parsed config file
  map<string, string> runtime  = 16; // native-API observed truth

  int64 probed_at_unix   = 17;
  int64 probe_duration_ms = 18;
  repeated string errors = 19; // partial-failure evidence; non-empty != whole probe failed

  // probe_stale / probe_age_seconds let a heartbeat-attached cached result
  // announce that it is NOT fresh — cache must never be served as live truth.
  bool  probe_stale       = 20;
  int64 probe_age_seconds = 21;
}

message NodeStatus {
  string node_id = 1;
  NodeIdentity identity = 2;
  repeated string ips = 3;
  repeated NodeUnitStatus units = 4;
  string last_error = 5;
  google.protobuf.Timestamp reported_at = 6;
  string agent_endpoint = 7;
  // SHA256 (lowercase hex) of a canonicalized, sorted representation of installed services.
  // P2 canonical form per service entry: "<publisher_id>/<service_name>=<version>;"
  // Entries are sorted deterministically by canonical key "<publisher_id>/<service_name>".
  // Config key/value pairs are excluded from P2 hashes (to be reintroduced in P3 once
  // config distribution is normalized).
  // NOTE: The hash algorithm and canonicalization rules are part of the
  // cluster-controller/node-agent compatibility contract and must not change without versioning.
  string applied_services_hash = 8;
  // Installed service versions reported by the node.
  // Key MUST be the canonical service identifier: "<publisher_id>/<service_name>"
  //   (publisher_id normalized to "unknown" if not discoverable; service_name is
  //    lower-case, no "globular-" prefix, no ".service" suffix).
  // Value MUST be the resolved version string read from the version marker file.
  map<string, string> installed_versions = 9;
  // installed_unit_files lists every systemd unit file known to this node
  // (scanned from /etc/systemd/system and /lib/systemd/system).
  // Used by the controller for capability gating (Phase 3).
  repeated string installed_unit_files = 10;
  // inventory_complete is true when the node agent has finished scanning unit files
  // and installed_unit_files is a complete, authoritative inventory.
  // When false, the controller uses soft-mode gating (warn, don't block).
  bool inventory_complete = 11;
  // Hardware capabilities of the node, refreshed each heartbeat.
  NodeCapabilities capabilities = 12;
  // Installed build_ids reported by the node agent.
  // Key is canonical service name (same as installed_versions), value is
  // the repository-assigned build_id (UUIDv7). Used for convergence identity
  // comparison — build_id is authoritative, version strings are informational.
  map<string, string> installed_build_ids = 13;
  // Cached infrastructure truth-plane probe results (Phase 1: scylladb only).
  // Attached from the node-agent's probe cache — NEVER produced inline in the
  // heartbeat path. Each result carries probe_stale/probe_age_seconds so the
  // controller can tell live truth from a stale cache snapshot.
  repeated InfraProbeResult infra_probes = 14;
}

message ReportNodeStatusRequest {
  NodeStatus status = 1;
}

message ReportNodeStatusResponse {
  string message = 1;
}

message WatchOperationsRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  string operation_id = 2 [(globular.auth.resource) = { kind: "operation" }];
}

service ClusterControllerService {
  rpc GetClusterInfo(google.protobuf.Timestamp) returns (ClusterInfo) {
    option (globular.auth.authz) = {
      action: "cluster_controller.cluster.info"
      permission: "read"
      resource_template: "/cluster_controller/cluster"
      default_role_hint: "viewer"
    };
  };

  rpc CreateJoinToken(CreateJoinTokenRequest) returns (CreateJoinTokenResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join_token.create"
      permission: "admin"
      collection_template: "/cluster_controller/join-tokens"
      default_role_hint: "admin"
    };
  };
  rpc RequestJoin(RequestJoinRequest) returns (RequestJoinResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join_request.create"
      permission: "write"
      collection_template: "/cluster_controller/join-requests"
      default_role_hint: "editor"
    };
  };
  rpc ListJoinRequests(ListJoinRequestsRequest) returns (ListJoinRequestsResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join_request.list"
      permission: "read"
      collection_template: "/cluster_controller/join-requests"
      default_role_hint: "admin"
    };
  };
  rpc ApproveJoin(ApproveJoinRequest) returns (ApproveJoinResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join_request.approve"
      permission: "admin"
      resource_template: "/cluster_controller/join-requests/{request_id}"
      default_role_hint: "admin"
    };
  };
  rpc RejectJoin(RejectJoinRequest) returns (RejectJoinResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join_request.reject"
      permission: "admin"
      resource_template: "/cluster_controller/join-requests/{request_id}"
      default_role_hint: "admin"
    };
  };

  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.list"
      permission: "read"
      collection_template: "/cluster_controller/nodes"
      default_role_hint: "viewer"
    };
  };
  // ResolveNode returns the minimal identity projection for a single node
  // given any of: node_id, hostname, mac, or ip. Scoped per Clause 5 — always
  // one target. Governed by projection-clauses.md (Phase 1 contract).
  rpc ResolveNode(ResolveNodeRequest) returns (ResolveNodeResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.resolve"
      permission: "read"
      resource_template: "/cluster_controller/nodes"
      default_role_hint: "viewer"
    };
  };
  rpc SetNodeProfiles(SetNodeProfilesRequest) returns (SetNodeProfilesResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.set_profiles"
      permission: "admin"
      resource_template: "/cluster_controller/nodes/{node_id}"
      default_role_hint: "admin"
    };
  };
  // SetNodeBootstrapPhase is called by node-agent from workflow steps to
  // update its own bootstrap phase. The controller updates in-memory node
  // state and emits lifecycle events.
  rpc SetNodeBootstrapPhase(SetNodeBootstrapPhaseRequest) returns (SetNodeBootstrapPhaseResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.set_bootstrap_phase"
      permission: "write"
      resource_template: "/cluster_controller/nodes/{node_id}"
      default_role_hint: "editor"
    };
  };
  // EmitWorkflowEvent is called by node-agent from workflow steps to publish
  // lifecycle events (e.g. node.bootstrap.ready) through the controller.
  rpc EmitWorkflowEvent(EmitWorkflowEventRequest) returns (EmitWorkflowEventResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.workflow.emit_event"
      permission: "write"
      collection_template: "/cluster_controller/workflow"
      default_role_hint: "editor"
    };
  };
  rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.remove"
      permission: "admin"
      resource_template: "/cluster_controller/nodes/{node_id}"
      default_role_hint: "admin"
    };
  };
  rpc GetClusterHealth(GetClusterHealthRequest) returns (GetClusterHealthResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.cluster.health"
      permission: "read"
      resource_template: "/cluster_controller/cluster/health"
      default_role_hint: "viewer"
    };
  };
  // Plan RPCs removed — Globular is workflow-native.
  // GetNodePlan, GetNodePlanV1, ReconcileNodeV1, WatchNodePlanStatusV1,
  // ApplyNodePlan, ApplyNodePlanV1 deleted.

  rpc UpdateClusterNetwork(UpdateClusterNetworkRequest) returns (UpdateClusterNetworkResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.network.update"
      permission: "admin"
      resource_template: "/cluster_controller/cluster/network"
      default_role_hint: "admin"
    };
  };
  rpc ReportNodeStatus(ReportNodeStatusRequest) returns (ReportNodeStatusResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.status.report"
      permission: "write"
      collection_template: "/cluster_controller/nodes"
      default_role_hint: "editor"
    };
  };
  rpc GetJoinRequestStatus(GetJoinRequestStatusRequest) returns (GetJoinRequestStatusResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join_request.status"
      permission: "read"
      resource_template: "/cluster_controller/join-requests/{request_id}"
      default_role_hint: "viewer"
    };
  };
  rpc UpgradeGlobular(UpgradeGlobularRequest) returns (UpgradeGlobularResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.upgrade"
      permission: "admin"
      resource_template: "/cluster_controller/nodes/{node_id}"
      default_role_hint: "admin"
    };
  };
  rpc CompleteOperation(CompleteOperationRequest) returns (CompleteOperationResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.operation.complete"
      permission: "write"
      resource_template: "/cluster_controller/nodes/{node_id}/operations/{operation_id}"
      default_role_hint: "editor"
    };
  };

  rpc WatchOperations(WatchOperationsRequest) returns (stream OperationEvent) {
    option (globular.auth.authz) = {
      action: "cluster_controller.operation.watch"
      permission: "read"
      resource_template: "/cluster_controller/nodes/{node_id}/operations/{operation_id}"
      default_role_hint: "viewer"
    };
  };

  rpc GetClusterHealthV1(GetClusterHealthV1Request) returns (GetClusterHealthV1Response) {
    option (globular.auth.authz) = {
      action: "cluster_controller.cluster.health_v1"
      permission: "read"
      resource_template: "/cluster_controller/cluster/health"
      default_role_hint: "viewer"
    };
  };
  // Subsystem health registry: reports the health of all background goroutines
  // (leader election, reconciler, drift detector, event publisher, etc.)
  rpc GetSubsystemHealth(GetControllerSubsystemHealthRequest) returns (GetControllerSubsystemHealthResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.subsystem_health.read"
      permission: "read"
      resource_template: "/cluster_controller/subsystems"
      default_role_hint: "viewer"
    };
  };
  rpc GetNodeHealthDetailV1(GetNodeHealthDetailV1Request) returns (GetNodeHealthDetailV1Response) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.health_detail"
      permission: "read"
      resource_template: "/cluster_controller/nodes/{node_id}/health"
      default_role_hint: "viewer"
    };
  };

  // PreviewNodeProfiles computes the unit actions and config changes that WOULD result
  // from assigning the given profiles to a node, without mutating any state.
  rpc PreviewNodeProfiles(PreviewNodeProfilesRequest) returns (PreviewNodeProfilesResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.node.profiles.preview"
      permission: "read"
      resource_template: "/cluster_controller/nodes/{node_id}/profiles"
      default_role_hint: "viewer"
    };
  };

  // ── Desired-state management (typed, replaces ResourcesService JSON hack) ──
  rpc GetDesiredState(google.protobuf.Empty) returns (DesiredState) {
    option (globular.auth.authz) = {
      action: "cluster_controller.desired_state.read"
      permission: "read"
      resource_template: "/cluster_controller/desired-state"
      default_role_hint: "viewer"
    };
  };
  // ListDesiredBuildIDs returns the canonical set of artifact build_ids
  // the controller currently considers actively desired. The set is the
  // union of:
  //   - ServiceDesiredVersion.Spec.BuildID
  //   - ServiceRelease.Spec.BuildID + Status.ResolvedBuildID
  //   - InfrastructureRelease.Spec.BuildID + Status.ResolvedBuildID
  //   - ApplicationRelease.Spec.BuildID + Status.ResolvedBuildID
  // (empty build_ids are skipped).
  //
  // Repository, cluster_doctor, and any other consumer that needs the
  // "which build_ids must I keep around?" answer MUST call this RPC
  // instead of scanning /globular/resources/* etcd prefixes directly.
  // Anchored by invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage:
  // the owner computes the reachability set with its in-memory contracts
  // intact; a raw etcd scan that mirrors the logic in a consumer is a
  // forbidden_fix:read_owned_etcd_prefix_directly_instead_of_calling_owner_rpc.
  rpc ListDesiredBuildIDs(ListDesiredBuildIDsRequest) returns (ListDesiredBuildIDsResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.desired_state.read"
      permission: "read"
      resource_template: "/cluster_controller/desired-state"
      default_role_hint: "viewer"
    };
  };
  // GetRoutingRefresh returns the current routing-refresh generation
  // (the controller's leader epoch). xDS, gateway, and other
  // routing-aware components poll this RPC to detect leader changes
  // and rebuild their routing tables. Replaces the prior
  // /globular/routing/refresh-generation etcd watch in xDS —
  // anchored by invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  //
  // The handler is leader-forwarded so the returned epoch is the
  // authoritative leader's epoch (followers retain their last-known
  // value, which may be stale after a resign — only the leader
  // increments).
  //
  // Polled at ~2s cadence by xDS; the cost is negligible (one int
  // read per poll). Sub-second latency is not a hard requirement
  // (routing refresh is a rare cluster event).
  rpc GetRoutingRefresh(GetRoutingRefreshRequest) returns (GetRoutingRefreshResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.routing.read"
      permission: "read"
      resource_template: "/cluster_controller/routing"
      default_role_hint: "viewer"
    };
  };
  // ListExternalDomains returns every external-domain spec the
  // controller's embedded domain reconciler manages, paired with the
  // current status. Replaces the prior xDS etcd scan of
  // /globular/domains/v1/* (spec) and per-domain /status reads —
  // those prefixes are owned by the controller-side domain reconciler,
  // so consumers MUST read them via this typed RPC per
  // invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  //
  // Only the fields xDS actually consumes are surfaced. Conditions,
  // CertExpiry, LastReconcile, NodeID, Zone, ProviderRef, TargetIP,
  // PublishExternal, UseWildcardCert, TTL are deliberately omitted to
  // keep the response narrow; extend the proto when a new consumer
  // arrives that needs them.
  rpc ListExternalDomains(ListExternalDomainsRequest) returns (ListExternalDomainsResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.domains.read"
      permission: "read"
      resource_template: "/cluster_controller/domains"
      default_role_hint: "viewer"
    };
  };
  // ListServices returns the merged service-registry view used by xDS
  // to build Envoy clusters. Each entry is the per-(service, instance)
  // map produced by config.GetServicesConfigurations() — config fields
  // merged with per-node instance fields (Address, Port, State, ...).
  //
  // Encoded as a list of JSON strings because Globular service configs
  // have dynamic schemas (different services contribute different
  // keys); a typed proto message would either bloat or constrain that.
  // The cluster_controller owns /globular/services/* (writers
  // PutInstance / PutConfig in config/etcd_service_config.go), so this
  // RPC is the canonical typed boundary for consumers reading the
  // registry — anchored by
  // invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.services.read"
      permission: "read"
      resource_template: "/cluster_controller/services"
      default_role_hint: "viewer"
    };
  };
  // GetIngressStatus returns the current ingress spec summary and
  // the per-node ingress status (VRRP state, has_vip, last_error,
  // …). The cluster_controller owns /globular/ingress/v1/spec
  // (ingress_spec_guard) and aggregates the per-node status reports;
  // consumers MUST call this RPC instead of reading the keys
  // directly per
  // invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  rpc GetIngressStatus(GetIngressStatusRequest) returns (GetIngressStatusResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.ingress.read"
      permission: "read"
      resource_template: "/cluster_controller/ingress"
      default_role_hint: "viewer"
    };
  };
  // RequestIngressRepublish writes the republish-request signal so
  // the ingress spec guard re-emits the current spec. Replaces the
  // CLI's prior direct write to
  // /globular/ingress/v1/republish_request.
  rpc RequestIngressRepublish(RequestIngressRepublishRequest) returns (RequestIngressRepublishResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.ingress.republish"
      permission: "write"
      resource_template: "/cluster_controller/ingress"
      default_role_hint: "admin"
    };
  };
  // CreateExternalDomain writes a new external-domain spec.
  // Owner-typed: the controller's domain reconciler is the writer of
  // /globular/domains/v1/{fqdn}. Consumers MUST call this RPC
  // instead of putting the JSON spec directly into etcd.
  rpc CreateExternalDomain(CreateExternalDomainRequest) returns (CreateExternalDomainResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.domains.create"
      permission: "write"
      resource_template: "/cluster_controller/domains/{fqdn}"
      default_role_hint: "admin"
    };
  };
  // DeleteExternalDomain removes an external-domain spec.
  rpc DeleteExternalDomain(DeleteExternalDomainRequest) returns (DeleteExternalDomainResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.domains.delete"
      permission: "write"
      resource_template: "/cluster_controller/domains/{fqdn}"
      default_role_hint: "admin"
    };
  };
  // CreateDNSProvider writes a DNS-provider config (Cloudflare,
  // Route53, manual, …). Replaces the prior CLI putting raw JSON
  // into /globular/providers/v1/{name}.
  rpc CreateDNSProvider(CreateDNSProviderRequest) returns (CreateDNSProviderResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.providers.create"
      permission: "write"
      resource_template: "/cluster_controller/providers/{name}"
      default_role_hint: "admin"
    };
  };
  // ListDNSProviders returns every configured DNS provider with its
  // type, zone, default TTL, and the count (not values) of credential
  // keys held server-side. Replaces the prior CLI etcd prefix scan.
  rpc ListDNSProviders(ListDNSProvidersRequest) returns (ListDNSProvidersResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.providers.read"
      permission: "read"
      resource_template: "/cluster_controller/providers"
      default_role_hint: "viewer"
    };
  };
  // ListServiceReleases returns every ServiceRelease object the
  // controller manages, encoded as JSON strings. cluster_doctor's
  // verification step consumes the full typed structs (resolved
  // build_id, status.nodes, required_nodes, …) that the narrow
  // GetDesiredState projection drops. Wire format is JSON per
  // release because the Go types are not yet proto-generated;
  // consumers json.Unmarshal each string into
  // cluster_controllerpb.ServiceRelease as before.
  //
  // The cluster_controller owns /globular/resources/ServiceRelease/* —
  // consumers MUST call this RPC instead of scanning etcd directly
  // per invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  rpc ListServiceReleasesJson(ListServiceReleasesJsonRequest) returns (ListServiceReleasesJsonResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.releases.read"
      permission: "read"
      resource_template: "/cluster_controller/releases"
      default_role_hint: "viewer"
    };
  };
  // ListInfrastructureReleasesJson is the parallel RPC for
  // /globular/resources/InfrastructureRelease/*. Same wire format
  // and rationale as ListServiceReleasesJson.
  rpc ListInfrastructureReleasesJson(ListInfrastructureReleasesJsonRequest) returns (ListInfrastructureReleasesJsonResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.releases.read"
      permission: "read"
      resource_template: "/cluster_controller/releases"
      default_role_hint: "viewer"
    };
  };
  // CleanupGhostNodePackages removes installed-package records under
  // /globular/nodes/{node_id}/packages/ for nodes that are no longer
  // members of the cluster. The controller validates that node_id is
  // genuinely absent from ListNodes before deleting — guarding
  // against accidentally wiping an active node's state — then
  // performs the cleanup as the cluster's authoritative actor
  // (cluster_controller orchestrates node lifecycle, node_agent
  // owns L3 installed state but the cleanup decision is a controller
  // concern).
  //
  // Replaces the prior globularcli cleanupGhostNodes path that
  // issued cli.Delete directly against /globular/nodes/{ghost}/packages/
  // — a cross-layer write by a non-owner that violated both
  // invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage
  // and the broader cross-owner-write principle.
  rpc CleanupGhostNodePackages(CleanupGhostNodePackagesRequest) returns (CleanupGhostNodePackagesResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.nodes.cleanup_ghost_packages"
      permission: "admin"
      resource_template: "/cluster_controller/nodes"
      default_role_hint: "admin"
    };
  };
  // GetScyllaSchemaGuardStatus returns per-keyspace guard status
  // (current_rf, required_rf, violation, last_error). Replaces the
  // CLI's prior /globular/scylla/schema_guard/* prefix scan. The
  // schema guard runs inside cluster_controller; consumers MUST
  // call this RPC per
  // invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  rpc GetScyllaSchemaGuardStatus(GetScyllaSchemaGuardStatusRequest) returns (GetScyllaSchemaGuardStatusResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.scylla.read"
      permission: "read"
      resource_template: "/cluster_controller/scylla"
      default_role_hint: "viewer"
    };
  };
  // RequestScyllaSchemaEnforce writes the enforce-request signal
  // that the schema guard polls. Returns the stamp timestamp so
  // consumers can poll GetScyllaSchemaGuardStatus and confirm via
  // updated_at_unix >= request_unix.
  rpc RequestScyllaSchemaEnforce(RequestScyllaSchemaEnforceRequest) returns (RequestScyllaSchemaEnforceResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.scylla.enforce"
      permission: "write"
      resource_template: "/cluster_controller/scylla"
      default_role_hint: "admin"
    };
  };
  rpc UpsertDesiredService(UpsertDesiredServiceRequest) returns (DesiredState) {
    option (globular.auth.authz) = {
      action: "cluster_controller.desired_service.upsert"
      permission: "admin"
      collection_template: "/cluster_controller/desired-state/services"
      default_role_hint: "admin"
    };
  };
  rpc RemoveDesiredService(RemoveDesiredServiceRequest) returns (DesiredState) {
    option (globular.auth.authz) = {
      action: "cluster_controller.desired_service.remove"
      permission: "admin"
      resource_template: "/cluster_controller/desired-state/services/{service_id}"
      default_role_hint: "admin"
    };
  };
  rpc SeedDesiredState(SeedDesiredStateRequest) returns (DesiredState) {
    option (globular.auth.authz) = {
      action: "cluster_controller.desired_state.seed"
      permission: "admin"
      resource_template: "/cluster_controller/desired-state"
      default_role_hint: "admin"
    };
  };

  // ── Artifact validation + dry-run ──
  rpc ValidateArtifact(ValidateArtifactRequest) returns (ValidationReport) {
    option (globular.auth.authz) = {
      action: "cluster_controller.artifact.validate"
      permission: "read"
      resource_template: "/cluster_controller/artifacts/{service_id}"
      default_role_hint: "viewer"
    };
  };
  rpc PreviewDesiredServices(DesiredServicesDelta) returns (ServiceChangePreview) {
    option (globular.auth.authz) = {
      action: "cluster_controller.desired_service.preview"
      permission: "read"
      collection_template: "/cluster_controller/desired-state/services"
      default_role_hint: "viewer"
    };
  };

  // PlanServiceUpgrades, ApplyServiceUpgrades, ReportPlanRejection removed —
  // workflow-native release pipeline replaces plan-based upgrades.

  // ResignLeadership causes the current leader to resign the etcd election lease,
  // allowing a different controller instance to become leader. Used by leader-aware
  // deploy workflows to safely update control-plane binaries.
  rpc ResignLeadership(ResignLeadershipRequest) returns (ResignLeadershipResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.leadership.resign"
      permission: "admin"
      resource_template: "/cluster_controller/leadership"
      default_role_hint: "admin"
    };
  };

  // DeployControlPlanePackage triggers a leader-aware rolling update for a
  // control-plane service. Updates followers first, transfers leadership,
  // then updates the old leader. Returns the workflow run ID on acceptance.
  rpc DeployControlPlanePackage(DeployControlPlanePackageRequest) returns (DeployControlPlanePackageResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.deploy.control_plane"
      permission: "admin"
      resource_template: "/cluster_controller/deploy"
      default_role_hint: "admin"
    };
  };

  // RequestJoinAuthorization is the v2 join path. The installer submits a join
  // token and its stable identity; the controller returns a signed JoinPlan.
  // The gateway is a courier — it MUST NOT modify the plan or assign profiles.
  rpc RequestJoinAuthorization(JoinAuthorizationRequest) returns (JoinAuthorizationResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.join.authorize"
      permission: "write"
      collection_template: "/cluster_controller/join/authorizations"
      default_role_hint: "editor"
    };
  };

  // ── ACC (adaptive concurrency control) config ──
  // The interceptor ACC config lives at /globular/system/acc/config, owned by the
  // cluster-controller. These RPCs let the CLI (and other clients) set/reset it
  // through the owner instead of a raw etcd write (RT-2).
  rpc SetAccConfig(SetAccConfigRequest) returns (SetAccConfigResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.acc_config.set"
      permission: "admin"
      resource_template: "/cluster_controller/system/acc-config"
      default_role_hint: "admin"
    };
  };
  rpc ResetAccConfig(ResetAccConfigRequest) returns (ResetAccConfigResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.acc_config.reset"
      permission: "admin"
      resource_template: "/cluster_controller/system/acc-config"
      default_role_hint: "admin"
    };
  };

  // ── ObjectStore topology apply ──
  // ApplyObjectStoreTopology applies a previously-planned topology proposal. It
  // replaces the etcd-mediated apply_request/apply_result handshake the CLI used
  // to drive directly: the controller (owner of objectstore desired topology)
  // loads the proposal by id, runs the full admission/validation/transition
  // contract, and returns the outcome synchronously. Leader-gated.
  rpc ApplyObjectStoreTopology(ApplyObjectStoreTopologyRequest) returns (ApplyObjectStoreTopologyResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.objectstore_topology.apply"
      permission: "admin"
      resource_template: "/cluster_controller/objectstore/topology"
      default_role_hint: "admin"
    };
  };

  // SanitizeObjectStorePool removes stale MinIO pool peers (IPs that no longer
  // belong to an eligible cluster node) from the controller's authoritative
  // state. The controller is the sole owner of /globular/clustercontroller/state;
  // it read-modify-writes its FULL state struct (no field loss — unlike the old
  // CLI path, which clobbered the blob down to a 4-field projection) and
  // republishes objectstore desired state canonically. dry_run computes the
  // change without applying. Leader-gated.
  rpc SanitizeObjectStorePool(SanitizeObjectStorePoolRequest) returns (SanitizeObjectStorePoolResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.objectstore_pool.sanitize"
      permission: "admin"
      resource_template: "/cluster_controller/objectstore/pool"
      default_role_hint: "admin"
    };
  };

  // ── ObjectStore disk admission + topology planning (owner writes) ──
  // The cluster-controller owns objectstore placement state (admitted disks +
  // topology proposals). These replace the CLI's direct config.SaveAdmittedDisk /
  // DeleteAdmittedDisk / SaveTopologyProposal writes (RT-2). Leader-gated.
  rpc ApproveObjectStoreDisk(ApproveObjectStoreDiskRequest) returns (ApproveObjectStoreDiskResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.objectstore_disk.approve"
      permission: "admin"
      resource_template: "/cluster_controller/objectstore/disks"
      default_role_hint: "admin"
    };
  };
  rpc RejectObjectStoreDisk(RejectObjectStoreDiskRequest) returns (RejectObjectStoreDiskResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.objectstore_disk.reject"
      permission: "admin"
      resource_template: "/cluster_controller/objectstore/disks"
      default_role_hint: "admin"
    };
  };
  rpc PlanObjectStoreTopology(PlanObjectStoreTopologyRequest) returns (PlanObjectStoreTopologyResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.objectstore_topology.plan"
      permission: "admin"
      resource_template: "/cluster_controller/objectstore/topology"
      default_role_hint: "admin"
    };
  };

  // ActivatePlatformRelease advances the cluster's ACTIVE platform release
  // pointer (etcd /globular/platform/active_release) to release_tag, after a
  // synchronous convergence gate: every package in the local repository BOM that
  // is installed on a node must already run the BOM version on that node (native-
  // version safe). Refuses on lagging nodes unless force=true, and on a
  // platform_release older than the current anchor unless allow_regression=true.
  // Idempotent: re-activating the current tag is a no-op. The controller writes
  // ONLY the etcd anchor here — node-local release-index.json materialization is a
  // later slice. See docs/design/platform-release-pointer-advance.md.
  rpc ActivatePlatformRelease(ActivatePlatformReleaseRequest) returns (ActivatePlatformReleaseResponse) {
    option (globular.auth.authz) = {
      action: "cluster_controller.platform.activate_release"
      permission: "admin"
      resource_template: "/cluster_controller/platform/active-release"
      default_role_hint: "admin"
    };
  };
}

message ActivatePlatformReleaseRequest {
  string release_tag = 1;       // tag to activate, e.g. "v1.2.250"
  bool allow_regression = 2;    // permit activating an older platform_release (audited)
  bool force = 3;               // bypass the convergence gate (activate despite lagging nodes)
}
message ActivatePlatformReleaseResponse {
  bool ok = 1;                       // true if the anchor was written (or already current)
  string message = 2;                // human-readable summary
  repeated string verified_nodes = 3; // nodes whose installed packages matched the BOM
  string previous_tag = 4;           // the active tag before this call ("" if none)
}

// SetAccConfigRequest carries the opaque ACC config JSON to persist at
// /globular/system/acc/config. The CLI owns the config schema; the controller
// validates it is well-formed JSON and writes it through the owner path.
message SetAccConfigRequest {
  bytes config_json = 1;
}
message SetAccConfigResponse {
  bool ok = 1;
}
message ResetAccConfigRequest {}
message ResetAccConfigResponse {
  bool deleted = 1;
}

// ApplyObjectStoreTopologyRequest identifies a planned proposal to apply. The
// controller re-loads the proposal by id and re-validates authoritatively; the
// CLI's local pre-flight is advisory. force_destructive must be set explicitly
// to apply a proposal the planner flagged as destructive.
message ApplyObjectStoreTopologyRequest {
  string proposal_id = 1;
  bool force_destructive = 2;
}
message ApplyObjectStoreTopologyResponse {
  string status = 1;      // "accepted" | "failed"
  int64 generation = 2;   // new objectstore desired generation (on accepted)
  string error = 3;       // populated when status == "failed"
  string proposal_id = 4;
}

// SanitizeObjectStorePoolRequest requests removal of stale MinIO pool peers.
// dry_run computes before/after/removed without mutating state.
message SanitizeObjectStorePoolRequest {
  bool dry_run = 1;
}
message SanitizeObjectStorePoolResponse {
  repeated string before = 1;  // pool IPs before sanitize
  repeated string after = 2;   // pool IPs after sanitize
  repeated string removed = 3;  // peers removed (before - after)
  int64 generation = 4;        // objectstore generation (bumped when applied)
  bool applied = 5;            // true when state was written (false on dry_run / no-op)
}

// ApproveObjectStoreDiskRequest admits a mount path on a node for MinIO use. The
// controller computes the path hash and approval timestamp authoritatively.
message ApproveObjectStoreDiskRequest {
  string node_id = 1;
  string node_ip = 2;
  string path = 3;
  int64 drives_per_node = 4;
  bool force_root = 5;
  bool force_existing_data = 6;
}
message ApproveObjectStoreDiskResponse {
  string path_hash = 1;  // the admitted disk's path hash (admission identity)
}
message RejectObjectStoreDiskRequest {
  string node_id = 1;
  string path = 2;
}
message RejectObjectStoreDiskResponse {
  bool ok = 1;
}

// PlanObjectStoreTopologyRequest carries the CLI-computed proposal as opaque JSON
// (a config.TopologyProposal). The controller validates and persists it; apply
// re-validates authoritatively.
message PlanObjectStoreTopologyRequest {
  bytes proposal_json = 1;
}
message PlanObjectStoreTopologyResponse {
  string proposal_id = 1;
}

message DesiredNetwork {
  string domain = 1;
  string protocol = 2;
  uint32 port_http = 3;
  uint32 port_https = 4;
  bool acme_enabled = 5;
  string admin_email = 6;
  repeated string alternate_domains = 7;
}

message GetClusterHealthV1Request {
  string cluster_id = 1 [(globular.auth.resource) = { kind: "cluster", scope_anchor: true }];
}

message NodeHealth {
  string node_id = 1;
  string desired_network_hash = 2;
  string applied_network_hash = 3;
  string desired_services_hash = 4;
  string applied_services_hash = 5;
  reserved 6, 7, 8; // was: current_plan_id, current_plan_generation, current_plan_phase
  string last_error = 9;
  bool can_apply_privileged = 10;  // from node capabilities, for UI display
  map<string, string> installed_versions = 11;  // canonical name → installed version
  map<string, string> installed_build_ids = 12; // canonical name → build_id (convergence identity)
}

message ServiceSummary {
  string service_name = 1;
  string desired_version = 2;
  int32 nodes_at_desired = 3;
  int32 nodes_total = 4;
  int32 upgrading = 5;
  // Package kind: "SERVICE", "INFRASTRUCTURE", "APPLICATION", "COMMAND".
  // Allows the frontend to filter — e.g. the Services Catalog only shows SERVICE.
  string kind = 6;
}

message GetClusterHealthV1Response {
  repeated NodeHealth nodes = 1;
  repeated ServiceSummary services = 2;
}

// ── Per-node health detail (Feature A) ────────────────────────────────────────

message NodeHealthCheck {
  string subsystem = 1;   // "heartbeat", "unit:envoy.service", "version:gateway", "inventory"
  bool   ok        = 2;
  string reason    = 3;   // human-readable when !ok
  // Phase 3 (Diagnostic Honesty Refactor): claim-vs-proof distinction.
  // Empty for checks that don't carry the distinction (heartbeat, inventory).
  // Set on "version:<service>" checks to one of:
  //   "verified"   — desired claim == installed proof == running proof
  //   "claim_only" — only desired-vs-installed claim was checked; no runtime proof consumed
  //   "unverified" — proof unavailable / partial; consumer raises service.runtime_identity_unproven
  //   "mismatch"   — claim or proof disagrees; finding_id names the specific failure
  string proof_status = 4;
  // finding_id is set when ok=false specifically for diagnostic-honesty
  // reasons so consumers can correlate with docs/awareness/invariants.yaml.
  // Examples: package.installed_binary_hash_mismatch,
  // service.running_binary_hash_mismatch, service.runtime_identity_unproven.
  string finding_id = 5;
}

message GetNodeHealthDetailV1Request { string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }]; }

message GetNodeHealthDetailV1Response {
  string node_id              = 1;
  string overall_status       = 2;  // "ready"|"converging"|"degraded"|"unhealthy"
  bool   healthy              = 3;
  repeated NodeHealthCheck checks = 4;
  string last_error           = 5;
  bool   can_apply_privileged = 6;
  bool   inventory_complete   = 7;
  google.protobuf.Timestamp last_seen = 8;
  string privilege_reason     = 9;  // human-readable privilege capability reason
}

// PreviewNodeProfiles dry-run messages (Phase 5).
// These are read-only — no state is mutated.

message PreviewNodeProfilesRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
  repeated string profiles = 2;  // proposed profiles to preview
}

// ConfigFileDiff describes a single rendered config file and whether its content changed.
message ConfigFileDiff {
  string path = 1;         // absolute file path on the target node
  string old_hash = 2;     // sha256 hex of current on-node content ("" if not previously rendered)
  string new_hash = 3;     // sha256 hex of new content
  bool   changed = 4;      // true when new_hash != old_hash (or first render)
}

// AffectedNodeDiff describes config changes that would ripple to another node
// as a result of membership changes (etcd, minio cluster composition changes).
message AffectedNodeDiff {
  string node_id = 1;
  repeated ConfigFileDiff config_diff = 2;  // files that would change on that node
}

message PreviewNodeProfilesResponse {
  repeated string normalized_profiles = 1;   // profiles after normalization
  repeated UnitAction unit_diff = 2;          // actions that WOULD be generated
  repeated ConfigFileDiff config_diff = 3;    // per-file hash comparison for target node
  repeated string restart_units = 4;          // units that WOULD be restarted due to config changes
  repeated AffectedNodeDiff affected_nodes = 5; // other nodes whose configs would change
}

// Note: ServiceRelease resource type is defined as a hand-written Go struct in
// clustercontrollerpb/resources_types.go (JSON-over-gRPC pattern, same as
// ClusterNetwork and ServiceDesiredVersion). See that file for the full type.

// ── Desired-state management ──────────────────────────────────────────────────

// DesiredService declares one service the controller should maintain cluster-wide.
message DesiredService {
  // Canonical service identifier. Use "<publisher>/<name>" when publisher is known,
  // otherwise just "<name>". The controller normalises to lowercase.
  string service_id = 1;
  string version    = 2;
  string platform   = 3;  // optional; e.g. "linux_amd64"
  int64 build_number = 4; // build iteration within version (0 = legacy)
  // Release workflow phase: PENDING, RESOLVED, APPLYING, AVAILABLE, DEGRADED,
  // FAILED, ROLLED_BACK, REMOVING, REMOVED. Empty if no release exists yet.
  string status = 5;
  // Exact artifact identity (UUIDv7, repository-allocated). Carried so
  // consumers like globularcli's desired-state canon/repair commands
  // can read build_id via this typed RPC instead of scanning
  // /globular/resources/* etcd directly — anchored by
  // invariant:four_layer.truth_read_via_owner_rpc_not_direct_storage.
  // Empty for legacy records that never had a build_id pin (pre-Phase 2).
  string build_id = 6;
}

// DesiredState is the full desired-service plan returned by every write RPC.
message DesiredState {
  repeated DesiredService services = 1;
  // Monotonically increasing revision set by the controller on each write.
  string revision = 2;
}

message ListDesiredBuildIDsRequest {
  // Reserved for future filtering (by kind, publisher). Empty request
  // is the canonical "give me everything desired" call.
}

message GetRoutingRefreshRequest {}

message ListExternalDomainsRequest {}

message ListServicesRequest {}

message GetIngressStatusRequest {}

// IngressNodeStatus mirrors the per-node entry the keepalived
// controller writes to /globular/ingress/v1/status/{node_id}.
message IngressNodeStatus {
  string node_id = 1;
  string phase = 2;
  string vrrp_state = 3;
  bool has_vip = 4;
  string last_error = 5;
}

message GetIngressStatusResponse {
  // Spec summary — only the fields the CLI surfaces today. Extend
  // when a new consumer needs more.
  bool spec_present = 1;
  int64 generation = 2;
  string mode = 3;
  bool explicit_disabled = 4;
  string writer_leader_id = 5;
  int64 written_at_unix = 6;
  // Per-node ingress status reports.
  repeated IngressNodeStatus nodes = 7;
}

message RequestIngressRepublishRequest {}

message RequestIngressRepublishResponse {
  // Unix-seconds timestamp the controller stamped on the request.
  // Consumers may poll GetIngressStatus and wait for
  // written_at_unix >= request_unix to confirm the republish.
  int64 request_unix = 1;
}

// ExternalDomainACMEConfig mirrors domain.ACMEConfig.
message ExternalDomainACMEConfig {
  bool enabled = 1;
  string challenge_type = 2;
  string email = 3;
  string directory = 4;
}

// ExternalDomainIngressConfig mirrors domain.IngressConfig.
message ExternalDomainIngressConfig {
  bool enabled = 1;
  string service = 2;
  int32 port = 3;
}

message CreateExternalDomainRequest {
  string fqdn = 1;
  string zone = 2;
  string node_id = 3;
  string target_ip = 4;
  string provider_ref = 5;
  int32 ttl = 6;
  bool publish_external = 7;
  bool use_wildcard_cert = 8;
  ExternalDomainACMEConfig acme = 9;
  ExternalDomainIngressConfig ingress = 10;
}

message CreateExternalDomainResponse {}

message DeleteExternalDomainRequest {
  string fqdn = 1;
}

message DeleteExternalDomainResponse {}

message CreateDNSProviderRequest {
  string name = 1;
  string type = 2; // "cloudflare", "route53", "manual", …
  string zone = 3;
  int32 default_ttl = 4;
  // Provider-specific credential key/value pairs (api_token,
  // api_key, api_email, region, …). The handler stores them
  // opaquely; consumers MUST treat the map as secret material.
  map<string, string> credentials = 5;
}

message CreateDNSProviderResponse {}

message ListDNSProvidersRequest {}

// DNSProviderEntry is the read-side projection of a stored provider
// config. Credentials are intentionally NOT surfaced — the entry
// carries only the count of credential keys so callers can display
// "n keys stored" without ever transporting the values.
message DNSProviderEntry {
  string name = 1;
  string type = 2;
  string zone = 3;
  int32 default_ttl = 4;
  int32 credential_key_count = 5;
}

message ListDNSProvidersResponse {
  repeated DNSProviderEntry providers = 1;
}

// Names suffixed with "Json" to avoid colliding with the existing
// hand-written ListServiceReleasesRequest / -Response Go types in
// cluster_controllerpb/resources_service.go.

message ListServiceReleasesJsonRequest {}

// ListServiceReleasesJsonResponse carries every ServiceRelease
// object as a JSON string. Consumers (cluster_doctor verification,
// future audit tools) json.Unmarshal each entry into
// cluster_controllerpb.ServiceRelease.
message ListServiceReleasesJsonResponse {
  repeated string releases_json = 1;
}

message ListInfrastructureReleasesJsonRequest {}

message ListInfrastructureReleasesJsonResponse {
  repeated string releases_json = 1;
}

message CleanupGhostNodePackagesRequest {
  // node_id of the ghost node to clean up. The controller validates
  // this is NOT a current member of ListNodes before issuing any
  // delete; a node that exists is never cleaned up via this RPC.
  string node_id = 1;
}

message CleanupGhostNodePackagesResponse {
  // Number of installed-package keys deleted under
  // /globular/nodes/{node_id}/packages/. Zero indicates the ghost
  // had no recorded state.
  int32 deleted = 1;
  // True when the controller refused to clean up because node_id
  // is still listed as an active cluster member — guards against
  // wiping a live node's state. In that case `deleted` is 0.
  bool refused_active_node = 2;
}

message GetScyllaSchemaGuardStatusRequest {}

// ScyllaKeyspaceGuardStatus mirrors the per-keyspace JSON blob
// stored at /globular/scylla/schema_guard/<keyspace>.
message ScyllaKeyspaceGuardStatus {
  string keyspace = 1;
  // current_rf and required_rf are integers in the JSON but stored
  // as int32 here. Zero means "unknown" — JSON omitempty / nil.
  int32 current_rf = 2;
  int32 required_rf = 3;
  // True when current_rf != required_rf (or the guard recorded a
  // violation for any other reason).
  bool violation = 4;
  string last_error = 5;
  int64 updated_at_unix = 6;
}

message GetScyllaSchemaGuardStatusResponse {
  repeated ScyllaKeyspaceGuardStatus keyspaces = 1;
}

message RequestScyllaSchemaEnforceRequest {}

message RequestScyllaSchemaEnforceResponse {
  // Unix-seconds timestamp stamped on the enforce request.
  // Consumers may poll GetScyllaSchemaGuardStatus and wait for
  // any keyspace's updated_at_unix >= request_unix.
  int64 request_unix = 1;
}

// ListServicesResponse carries the merged service-registry view as a
// list of JSON strings. Each string is the (config + instance) map
// produced by config.GetServicesConfigurations(); the dynamic schema
// is intentional — Globular service configs vary by service kind.
//
// Consumers (xDS) json.Unmarshal each string into map[string]any and
// proceed as before. The wire-format is JSON only because no static
// proto can capture the dynamic field set without locking it in.
message ListServicesResponse {
  repeated string services_json = 1;
}

// ExternalDomainEntry is the narrow projection of (spec, status) that
// xDS consumes when building Envoy snapshots. See the RPC docstring
// for the omitted-field list and the v1.2.181 inflation policy.
message ExternalDomainEntry {
  string fqdn = 1;
  // Ingress configuration mirrored from spec.Ingress.
  bool ingress_enabled = 2;
  string ingress_service = 3;
  int32 ingress_port = 4;
  // ACME enable flag mirrored from spec.ACME.Enabled.
  bool acme_enabled = 5;
  // Reconciler status phase: "Pending", "Ready", "Error". Empty when
  // the reconciler has not yet written a status record for this FQDN.
  string status_phase = 6;
}

message ListExternalDomainsResponse {
  repeated ExternalDomainEntry domains = 1;
}

// GetRoutingRefreshResponse carries the controller's current
// leader-epoch. Routing-aware components compare epoch to their
// last-known value and rebuild routing on change.
message GetRoutingRefreshResponse {
  // Monotonically increasing on every leadership acquisition.
  uint64 epoch = 1;
  // Optional: current leader's advertise address (host:port). May be
  // empty if the responding instance has not yet learned the leader
  // address; consumers must not rely on this for correctness.
  string leader_addr = 2;
  // Wall-clock timestamp of the most recent leader-acquisition.
  google.protobuf.Timestamp timestamp = 3;
}

// ListDesiredBuildIDsResponse carries the canonical reachability set of
// build_ids the controller considers actively desired. Order is
// unspecified; duplicates are not emitted; empty strings are skipped.
message ListDesiredBuildIDsResponse {
  repeated string build_ids = 1;
  // Monotonically increasing revision matching the SDV resource version
  // at the moment the set was computed. Consumers may use this to
  // detect staleness in caches.
  string revision = 2;
}

message UpsertDesiredServiceRequest {
  DesiredService service = 1;
  // When true, permits a desired-version write that would otherwise be rejected
  // for regressing below max(current desired version, installed high). The write
  // is recorded with a distinct, audited action (D4 — desired.no_regression_all_paths).
  // This is the ONLY path that may move desired state backward; it is deliberate,
  // named operator intent, not a generic --force.
  bool allow_regression = 2;
}

message RemoveDesiredServiceRequest {
  string service_id = 1 [(globular.auth.resource) = { kind: "desired_service" }];
}

message SeedDesiredStateRequest {
  enum Mode {
    DEFAULT_CORE_PROFILE  = 0;
    IMPORT_FROM_INSTALLED = 1;
  }
  Mode mode = 1;
}

// ── Artifact validation ───────────────────────────────────────────────────────

message ValidateArtifactRequest {
  string service_id              = 1 [(globular.auth.resource) = { kind: "artifact" }];
  string version                 = 2;
  repeated string target_node_ids = 3;
}

message ValidationIssue {
  enum Severity { ERROR = 0; WARNING = 1; }
  Severity severity = 1;
  string   message  = 2;
}

message ValidationReport {
  bool   checksum_ok       = 1;
  string signature_status  = 2;  // "valid", "unsigned", "invalid", "unknown"
  bool   platform_ok       = 3;
  repeated ValidationIssue issues = 4;
}

// ── Dry-run / preview ─────────────────────────────────────────────────────────

message DesiredServicesDelta {
  repeated DesiredService upserts  = 1;
  repeated string         removals = 2;
}

message NodeChange {
  string node_id            = 1;
  repeated string will_install = 2;
  repeated string will_remove  = 3;
  repeated string warnings      = 4;
}

message ServiceChangePreview {
  repeated NodeChange      node_changes    = 1;
  repeated ValidationIssue blocking_issues = 2;
}

// Plan upgrade messages removed — workflow-native release pipeline replaces them.

// InstallPolicy controls which artifacts a cluster will accept during resolution.
// Stored in etcd at /globular/resources/InstallPolicy/{name}.
message InstallPolicy {
  string name = 1;
  bool verified_publishers_only = 2;   // only allow artifacts from claimed namespaces
  repeated string allowed_namespaces = 3;   // whitelist (empty = allow all)
  repeated string blocked_namespaces = 4;   // blacklist (checked after allowed)
  bool block_deprecated = 5;           // skip DEPRECATED artifacts in resolution
  bool block_yanked = 6;               // true by default in resolution logic
}

// ── Leadership management ──

message ResignLeadershipRequest {
  string reason = 1;             // human-readable reason for resignation
}

message ResignLeadershipResponse {
  bool ok = 1;
  string message = 2;
  string former_leader_id = 3;   // ID of the leader that resigned
}

// ── Control-plane deployment ──

message DeployControlPlanePackageRequest {
  string cluster_id = 1;         // e.g. "globular.internal"
  string package_name = 2;       // e.g. "cluster-controller"
  string package_kind = 3;       // "SERVICE" or "INFRASTRUCTURE"
  string version = 4;            // e.g. "0.0.2"
  int64 build_number = 5;        // build iteration within version
  string publisher = 6;          // e.g. "core@globular.io"
  string repository_addr = 7;    // auto-discovered if empty
  bool force = 8;                // skip idempotency check
  string resign_reason = 9;      // reason for leadership handoff
}

message DeployControlPlanePackageResponse {
  bool accepted = 1;             // true if workflow was dispatched
  string run_id = 2;             // workflow run ID (for tracking)
  string status = 3;             // "ACCEPTED", "REJECTED", "FAILED"
  string error = 4;              // non-empty on rejection/failure
  string message = 5;            // human-readable summary
  string workflow_name = 6;      // "release.apply.controller"
  string accepted_by_node_id = 7;  // node that accepted the deploy
  string current_leader_node_id = 8; // leader at time of acceptance
}

// ── Controller subsystem health ──

enum ControllerSubsystemState {
  CONTROLLER_SUBSYSTEM_STATE_UNSPECIFIED = 0;
  CONTROLLER_SUBSYSTEM_STATE_HEALTHY     = 1;
  CONTROLLER_SUBSYSTEM_STATE_DEGRADED    = 2;
  CONTROLLER_SUBSYSTEM_STATE_FAILED      = 3;
  CONTROLLER_SUBSYSTEM_STATE_STARTING    = 4;
  CONTROLLER_SUBSYSTEM_STATE_STOPPED     = 5;
}

message ControllerSubsystemHealth {
  string                         name         = 1;
  ControllerSubsystemState       state        = 2;
  google.protobuf.Timestamp      last_tick    = 3;
  string                         last_error   = 4;
  int64                          error_count  = 5;
  map<string, string>            metadata     = 6;
}

message GetControllerSubsystemHealthRequest {}

message GetControllerSubsystemHealthResponse {
  repeated ControllerSubsystemHealth subsystems = 1;
  ControllerSubsystemState           overall    = 2;
}
