syntax = "proto3";

package cluster_doctor;

option go_package = "github.com/globulario/services/golang/cluster_doctor/cluster_doctorpb;cluster_doctorpb";

import "google/protobuf/timestamp.proto";
import "globular_auth.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum Severity {
  SEVERITY_UNKNOWN  = 0;
  SEVERITY_INFO     = 1;
  SEVERITY_WARN     = 2;
  SEVERITY_ERROR    = 3;
  SEVERITY_CRITICAL = 4;
}

enum ClusterStatus {
  CLUSTER_STATUS_UNKNOWN = 0;
  CLUSTER_HEALTHY        = 1;
  CLUSTER_DEGRADED       = 2;
  CLUSTER_CRITICAL       = 3;
}

enum DriftCategory {
  DRIFT_UNKNOWN        = 0;
  MISSING_UNIT_FILE    = 1;
  UNIT_STOPPED         = 2;
  UNIT_DISABLED        = 3;
  VERSION_MISMATCH     = 4;
  STATE_HASH_MISMATCH  = 5;
  ENDPOINT_MISSING     = 6;
  INVENTORY_INCOMPLETE = 7;
}

enum PlanRisk {
  PLAN_RISK_UNKNOWN   = 0;
  PLAN_RISK_SAFE      = 1;
  PLAN_RISK_MODERATE  = 2;
  PLAN_RISK_DANGEROUS = 3;
}

enum InvariantStatus {
  INVARIANT_UNKNOWN = 0;
  INVARIANT_PASS    = 1;
  INVARIANT_FAIL    = 2;
  INVARIANT_PENDING = 3;
}

// ─── Shared Types ─────────────────────────────────────────────────────────────

message ReportHeader {
  google.protobuf.Timestamp generated_at = 1;
  string snapshot_id                     = 2;
  string globular_version                = 3;
  repeated string data_sources           = 4;
  bool data_incomplete                   = 5;
  repeated Evidence data_errors          = 6;
}

message Evidence {
  string source_service               = 1;
  string source_rpc                   = 2;
  map<string, string> key_values      = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message RemediationStep {
  uint32 order            = 1;
  string description      = 2;
  string cli_command      = 3;
  string future_action_id = 4;
}

message Finding {
  string finding_id                    = 1;
  string invariant_id                  = 2;
  Severity severity                    = 3;
  string category                      = 4;
  string entity_ref                    = 5;
  string summary                       = 6;
  repeated Evidence evidence           = 7;
  repeated RemediationStep remediation = 8;
  InvariantStatus invariant_status     = 9;
}

// ─── Cluster Report ───────────────────────────────────────────────────────────

message ClusterReportRequest {}

message ClusterReport {
  ReportHeader header                    = 1;
  ClusterStatus overall_status           = 2;
  repeated Finding findings              = 3;
  map<string, uint32> counts_by_category = 4;
  repeated string top_issue_ids          = 5;
}

// ─── Node Report ──────────────────────────────────────────────────────────────

message NodeReportRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
}

message NodeReport {
  ReportHeader header         = 1;
  string node_id              = 2;
  bool reachable              = 3;
  int64 heartbeat_age_seconds = 4;
  repeated Finding findings   = 5;
}

// ─── Drift Report ─────────────────────────────────────────────────────────────

message DriftReportRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
}

message DriftItem {
  string node_id             = 1;
  string entity_ref          = 2;
  DriftCategory category     = 3;
  string desired             = 4;
  string actual              = 5;
  repeated Evidence evidence = 6;
}

message DriftReport {
  ReportHeader header       = 1;
  repeated DriftItem items  = 2;
  uint32 total_drift_count  = 3;
}

// ─── Explain Finding ──────────────────────────────────────────────────────────

message ExplainFindingRequest {
  string finding_id = 1 [(globular.auth.resource) = { kind: "finding" }];
}

message FindingExplanation {
  string finding_id                    = 1;
  string invariant_id                  = 2;
  string why_failed                    = 3;
  repeated RemediationStep remediation = 4;
  repeated Evidence evidence           = 5;
  PlanRisk plan_risk                   = 6;
  repeated string plan_diff            = 7;
}

// ─── Service ──────────────────────────────────────────────────────────────────

service ClusterDoctorService {
  rpc GetClusterReport(ClusterReportRequest) returns (ClusterReport) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.cluster_report.read"
      permission: "read"
      resource_template: "/cluster_doctor/cluster/report"
      default_role_hint: "viewer"
    };
  };
  rpc GetNodeReport(NodeReportRequest) returns (NodeReport) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.node_report.read"
      permission: "read"
      resource_template: "/cluster_doctor/nodes/{node_id}/report"
      default_role_hint: "viewer"
    };
  };
  rpc GetDriftReport(DriftReportRequest) returns (DriftReport) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.drift_report.read"
      permission: "read"
      resource_template: "/cluster_doctor/nodes/{node_id}/drift"
      default_role_hint: "viewer"
    };
  };
  rpc ExplainFinding(ExplainFindingRequest) returns (FindingExplanation) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.finding.explain"
      permission: "read"
      resource_template: "/cluster_doctor/findings/{finding_id}"
      default_role_hint: "viewer"
    };
  };
}
