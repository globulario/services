syntax = "proto3";

package cluster_doctor;

option go_package = "github.com/globulario/services/golang/cluster_doctor/cluster_doctorpb;cluster_doctorpb";

import "google/protobuf/timestamp.proto";
import "globular_auth.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum Severity {
  SEVERITY_UNKNOWN  = 0;
  SEVERITY_INFO     = 1;
  SEVERITY_WARN     = 2;
  SEVERITY_ERROR    = 3;
  SEVERITY_CRITICAL = 4;
}

enum ClusterStatus {
  CLUSTER_STATUS_UNKNOWN = 0;
  CLUSTER_HEALTHY        = 1;
  CLUSTER_DEGRADED       = 2;
  CLUSTER_CRITICAL       = 3;
}

enum DriftCategory {
  DRIFT_UNKNOWN        = 0;
  MISSING_UNIT_FILE    = 1;
  UNIT_STOPPED         = 2;
  UNIT_DISABLED        = 3;
  VERSION_MISMATCH     = 4;
  STATE_HASH_MISMATCH  = 5;
  ENDPOINT_MISSING     = 6;
  INVENTORY_INCOMPLETE = 7;
}

enum PlanRisk {
  PLAN_RISK_UNKNOWN   = 0;
  PLAN_RISK_SAFE      = 1;
  PLAN_RISK_MODERATE  = 2;
  PLAN_RISK_DANGEROUS = 3;
}

enum InvariantStatus {
  INVARIANT_UNKNOWN = 0;
  INVARIANT_PASS    = 1;
  INVARIANT_FAIL    = 2;
  INVARIANT_PENDING = 3;
}

// ─── Shared Types ─────────────────────────────────────────────────────────────

message ReportHeader {
  google.protobuf.Timestamp generated_at = 1;
  string snapshot_id                     = 2;
  string globular_version                = 3;
  repeated string data_sources           = 4;
  bool data_incomplete                   = 5;
  repeated Evidence data_errors          = 6;
}

message Evidence {
  string source_service               = 1;
  string source_rpc                   = 2;
  map<string, string> key_values      = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message RemediationStep {
  uint32 order            = 1;
  string description      = 2;
  string cli_command      = 3;
  string future_action_id = 4;
  // Optional structured action. When set, the step can be executed via
  // ExecuteRemediation(finding_id, step_index) without shell interpolation.
  // See projection-clauses.md (Clause 8) for the contract.
  RemediationAction action = 5;
}

// ── Structured Remediation Actions ──────────────────────────────────────────
//
// Typed, bounded, risk-classified fixes that cluster-doctor rules can emit
// and the ExecuteRemediation RPC can run. No free-form shell.
//
// Hand-grenade enforcement (server-side, non-overridable):
//   - ETCD_PUT, ETCD_DELETE, NODE_REMOVE: ALWAYS require MEDIUM+ risk and
//     approval_token, regardless of what the rule tagged.
//   - FILE_DELETE: auto-executable only when path matches the safe-trash
//     allowlist (/usr/lib/globular/bin/*.tmp, /usr/lib/globular/bin/*.bak).
//     Otherwise require MEDIUM+ + approval.
// Safe-by-default LOW (auto-executable with no approval token):
//   - SYSTEMCTL_RESTART, SYSTEMCTL_START on units prefixed "globular-"
//   - FILE_DELETE under the safe-trash allowlist

enum ActionType {
  ACTION_UNSPECIFIED     = 0;
  SYSTEMCTL_RESTART      = 1;  // params: {unit, node_id}
  SYSTEMCTL_STOP         = 2;  // params: {unit, node_id}
  SYSTEMCTL_START        = 3;  // params: {unit, node_id}
  FILE_DELETE            = 4;  // params: {path, node_id}
  ETCD_DELETE            = 5;  // params: {key}  — hand grenade
  ETCD_PUT               = 6;  // params: {key, value}  — hand grenade
  PACKAGE_REINSTALL      = 7;  // params: {package, node_id, version}
  NODE_REMOVE            = 8;  // params: {node_id}  — hand grenade
}

enum ActionRisk {
  RISK_UNSPECIFIED = 0;
  RISK_LOW         = 1;  // idempotent, auto-executable (subject to allowlist)
  RISK_MEDIUM      = 2;  // requires approval token
  RISK_HIGH        = 3;  // CLI-only, human operator
}

message RemediationAction {
  ActionType action_type    = 1;
  ActionRisk risk           = 2;
  map<string, string> params = 3;
  bool idempotent           = 4;   // safe to retry on transient failure
  string description        = 5;   // one-line human summary
}

message ExecuteRemediationRequest {
  string finding_id      = 1;  // the finding this action belongs to
  uint32 step_index      = 2;  // which remediation step within the finding
  string approval_token  = 3;  // required for MEDIUM+ risk
  bool   dry_run         = 4;  // validate + resolve target, do not execute
}

message ExecuteRemediationResponse {
  bool   executed        = 1;
  string status          = 2;   // "executed" | "dry_run_ok" | "rejected"
  string reason          = 3;   // non-empty on rejection
  string output          = 4;   // trimmed stdout/stderr or structured result
  string audit_id        = 5;   // correlator into the audit log
}

// StartRemediationWorkflow runs the remediate.doctor.finding workflow
// in-process: resolve → assess → approve → execute → verify. It wraps
// ExecuteRemediation (does not bypass it) and re-runs the doctor scan to
// confirm convergence.
message StartRemediationWorkflowRequest {
  string finding_id     = 1;
  uint32 step_index     = 2;
  string approval_token = 3;
  bool   dry_run        = 4;
}

message StartRemediationWorkflowResponse {
  string run_id                = 1;  // engine-generated run identifier
  string run_status            = 2;  // SUCCEEDED | FAILED
  string run_error             = 3;  // non-empty when run_status=FAILED
  // Pipeline outcomes — mirror the per-step run outputs.
  string resolved_node_id      = 4;  // node_id extracted from the action
  string resolved_action_type  = 5;  // e.g. SYSTEMCTL_RESTART
  string risk                  = 6;  // RISK_LOW | RISK_MEDIUM | RISK_HIGH
  bool   auto_executable       = 7;
  bool   requires_approval     = 8;
  // Mirrors ExecuteRemediationResponse for the wrapped call.
  bool   executed              = 9;
  string execute_status        = 10; // "executed" | "dry_run_ok" | "rejected"
  string execute_output        = 11;
  string audit_id              = 12;
  // Verification outcome.
  bool   converged             = 13;
  bool   finding_still_present = 14;
}

message Finding {
  string finding_id                    = 1;
  string invariant_id                  = 2;
  Severity severity                    = 3;
  string category                      = 4;
  string entity_ref                    = 5;
  string summary                       = 6;
  repeated Evidence evidence           = 7;
  repeated RemediationStep remediation = 8;
  InvariantStatus invariant_status     = 9;
}

// ─── Cluster Report ───────────────────────────────────────────────────────────

message ClusterReportRequest {}

message ClusterReport {
  ReportHeader header                    = 1;
  ClusterStatus overall_status           = 2;
  repeated Finding findings              = 3;
  map<string, uint32> counts_by_category = 4;
  repeated string top_issue_ids          = 5;
}

// ─── Node Report ──────────────────────────────────────────────────────────────

message NodeReportRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
}

message NodeReport {
  ReportHeader header         = 1;
  string node_id              = 2;
  bool reachable              = 3;
  int64 heartbeat_age_seconds = 4;
  repeated Finding findings   = 5;
}

// ─── Drift Report ─────────────────────────────────────────────────────────────

message DriftReportRequest {
  string node_id = 1 [(globular.auth.resource) = { kind: "node", scope_anchor: true }];
}

message DriftItem {
  string node_id             = 1;
  string entity_ref          = 2;
  DriftCategory category     = 3;
  string desired             = 4;
  string actual              = 5;
  repeated Evidence evidence = 6;
}

message DriftReport {
  ReportHeader header       = 1;
  repeated DriftItem items  = 2;
  uint32 total_drift_count  = 3;
}

// ─── Explain Finding ──────────────────────────────────────────────────────────

message ExplainFindingRequest {
  string finding_id = 1 [(globular.auth.resource) = { kind: "finding" }];
}

message FindingExplanation {
  string finding_id                    = 1;
  string invariant_id                  = 2;
  string why_failed                    = 3;
  repeated RemediationStep remediation = 4;
  repeated Evidence evidence           = 5;
  PlanRisk plan_risk                   = 6;
  repeated string plan_diff            = 7;
}

// ─── Service ──────────────────────────────────────────────────────────────────

service ClusterDoctorService {
  rpc GetClusterReport(ClusterReportRequest) returns (ClusterReport) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.cluster_report.read"
      permission: "read"
      resource_template: "/cluster_doctor/cluster/report"
      default_role_hint: "viewer"
    };
  };
  rpc GetNodeReport(NodeReportRequest) returns (NodeReport) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.node_report.read"
      permission: "read"
      resource_template: "/cluster_doctor/nodes/{node_id}/report"
      default_role_hint: "viewer"
    };
  };
  rpc GetDriftReport(DriftReportRequest) returns (DriftReport) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.drift_report.read"
      permission: "read"
      resource_template: "/cluster_doctor/nodes/{node_id}/drift"
      default_role_hint: "viewer"
    };
  };
  rpc ExplainFinding(ExplainFindingRequest) returns (FindingExplanation) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.finding.explain"
      permission: "read"
      resource_template: "/cluster_doctor/findings/{finding_id}"
      default_role_hint: "viewer"
    };
  };
  // ExecuteRemediation runs a structured RemediationAction attached to a
  // finding. Never takes free-form shell — dispatches through typed handlers
  // with hardcoded blocklists. See projection-clauses.md Clause 8.
  rpc ExecuteRemediation(ExecuteRemediationRequest) returns (ExecuteRemediationResponse) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.remediation.execute"
      permission: "write"
      resource_template: "/cluster_doctor/findings/{finding_id}"
      default_role_hint: "admin"
    };
  };
  // StartRemediationWorkflow runs the remediate.doctor.finding workflow:
  // resolve → assess → approve → execute → verify. Wraps ExecuteRemediation
  // and does not bypass its blocklist or approval gates. See
  // docs/remediation_workflow.md.
  rpc StartRemediationWorkflow(StartRemediationWorkflowRequest) returns (StartRemediationWorkflowResponse) {
    option (globular.auth.authz) = {
      action: "cluster_doctor.remediation.workflow_start"
      permission: "write"
      resource_template: "/cluster_doctor/findings/{finding_id}"
      default_role_hint: "admin"
    };
  };
}
