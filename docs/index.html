<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Globular Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap">
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    /* ── Tokens ──────────────────────────────────────────── */
    :root {
      --theme-color:                           #22d3ee;
      --base-background-color:                 #0f1f35;
      --sidebar-background:                    #0b1929;
      --sidebar-border-color:                  rgba(255,255,255,0.08);
      --base-color:                            #e2eaf4;
      --sidebar-nav-link-color:                #8ba0b8;
      --sidebar-nav-link-color--hover:         #22d3ee;
      --sidebar-nav-link-color--active:        #22d3ee;
      --sidebar-nav-link-border-color--active: #22d3ee;
      --link-color:                            #22d3ee;
      --link-color--hover:                     #06b6d4;
      --heading-color:                         #ffffff;
      --code-theme-background:                 rgba(34,211,238,0.07);
      --code-theme-text:                       #e2eaf4;
    }

    /* ── Base ────────────────────────────────────────────── */
    html, body {
      background: #0f1f35 !important;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif !important;
      color: #e2eaf4 !important;
    }
    .content, .app-content, main, section {
      background: #0f1f35 !important;
    }
    .markdown-section {
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif !important;
      color: #e2eaf4 !important;
      max-width: 860px;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      background: #0b1929 !important;
      border-right: 1px solid rgba(255,255,255,0.08) !important;
    }
    /* Logo / app name */
    .app-name-link, .app-name-link:hover {
      color: #ffffff !important;
      font-family: "IBM Plex Sans", sans-serif !important;
      font-weight: 700 !important;
    }
    .app-name img {
      width: 2rem !important;
      height: 2rem !important;
      display: inline-block !important;
      vertical-align: middle !important;
      margin-right: 0.4rem !important;
    }
    /* Section labels (bold text between links) */
    .sidebar-nav p {
      color: #ffffff !important;
      font-weight: 700 !important;
      font-size: 0.72rem !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      margin: 1.2rem 0 0.4rem !important;
    }
    /* Nav links */
    .sidebar-nav a,
    .sidebar-nav ul li a {
      color: #8ba0b8 !important;
      font-family: "IBM Plex Sans", sans-serif !important;
      font-size: 0.88rem !important;
      line-height: 1.6 !important;
    }
    .sidebar-nav a:hover,
    .sidebar-nav ul li a:hover {
      color: #22d3ee !important;
    }
    .sidebar-nav li.active > a,
    .sidebar-nav li > a.active {
      color: #22d3ee !important;
      font-weight: 600 !important;
      border-right: 3px solid #22d3ee !important;
    }

    /* ── Search ──────────────────────────────────────────── */
    .search input {
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      color: #e2eaf4 !important;
      font-family: "IBM Plex Sans", sans-serif !important;
      border-radius: 6px !important;
    }
    .search input:focus {
      border-color: #22d3ee !important;
      outline: none !important;
    }
    .search .results-panel { background: #0b1929 !important; }
    .search .matching-post { border-bottom: 1px solid rgba(255,255,255,0.07) !important; }
    .search .matching-post a { color: #22d3ee !important; }
    .search .matching-post p { color: #8ba0b8 !important; }

    /* ── Typography ──────────────────────────────────────── */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      font-family: "IBM Plex Sans", sans-serif !important;
      color: #ffffff !important;
    }
    .markdown-section h1,
    .markdown-section h2 {
      border-bottom: 1px solid rgba(255,255,255,0.08) !important;
      padding-bottom: 0.4rem !important;
    }
    .markdown-section h3,
    .markdown-section h4 {
      color: #c8d4e0 !important;
    }
    .markdown-section p,
    .markdown-section li,
    .markdown-section td {
      color: #e2eaf4 !important;
    }
    .markdown-section a { color: #22d3ee !important; }
    .markdown-section a:hover { color: #06b6d4 !important; }
    .markdown-section em { color: inherit !important; font-style: italic !important; }
    .markdown-section strong { color: #e2eaf4 !important; }

    /* ── Code ────────────────────────────────────────────── */
    code, pre, .token {
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace !important;
    }
    .markdown-section code {
      background: rgba(34,211,238,0.10) !important;
      color: #22d3ee !important;
      border-radius: 3px !important;
      padding: 0.1em 0.35em !important;
    }
    .markdown-section pre {
      background: rgba(255,255,255,0.04) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 8px !important;
    }
    .markdown-section pre > code {
      background: transparent !important;
      color: #e2eaf4 !important;
    }

    /* ── Tables ──────────────────────────────────────────── */
    .markdown-section table {
      background: rgba(255,255,255,0.03) !important;
      border-collapse: collapse !important;
      border: 1px solid rgba(255,255,255,0.10) !important;
      width: 100% !important;
      border-radius: 6px !important;
      overflow: hidden !important;
    }
    .markdown-section table th {
      background: rgba(255,255,255,0.08) !important;
      color: #ffffff !important;
      font-weight: 600 !important;
      font-size: 0.88rem !important;
      border-bottom: 1px solid rgba(255,255,255,0.14) !important;
      border-right: 1px solid rgba(255,255,255,0.07) !important;
      padding: 0.65rem 1rem !important;
      text-align: left !important;
    }
    .markdown-section table td {
      color: #c8d4e0 !important;
      background: transparent !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      border-right: 1px solid rgba(255,255,255,0.05) !important;
      padding: 0.6rem 1rem !important;
      font-size: 0.9rem !important;
      vertical-align: middle !important;
    }
    .markdown-section table tr:last-child td { border-bottom: none !important; }
    .markdown-section table th:last-child,
    .markdown-section table td:last-child { border-right: none !important; }
    /* Remove alternating rows entirely */
    .markdown-section table tr:nth-child(2n),
    .markdown-section table tr:nth-child(2n) td {
      background: transparent !important;
    }
    .markdown-section table tr:hover td {
      background: rgba(34,211,238,0.04) !important;
    }

    /* ── Blockquotes ─────────────────────────────────────── */
    .markdown-section blockquote {
      border-left: 4px solid #22d3ee !important;
      background: rgba(34,211,238,0.05) !important;
      color: #8ba0b8 !important;
    }
    .markdown-section blockquote p { color: #8ba0b8 !important; }

    /* ── Copy button ─────────────────────────────────────── */
    .docsify-copy-code-button {
      background: #22d3ee !important;
      color: #0b1929 !important;
      font-family: "IBM Plex Sans", sans-serif !important;
    }

    /* ── Mascot ──────────────────────────────────────────── */
    .sidebar-mascot {
      display: flex;
      justify-content: center;
      padding: 1.2rem 1rem 0.4rem;
    }
    .sidebar-mascot img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Globular',
      repo: 'https://github.com/globulario/services',
      logo: '/logo.png',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'index.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs',
        noData: 'No results.',
        depth: 6,
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
      themeColor: '#22d3ee',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script>
    // Inject mascot below the logo in the sidebar after Docsify renders
    Docsify.plugins.push(function(hook) {
      hook.doneEach(function() {
        if (!document.querySelector('.sidebar-mascot')) {
          var sidebar = document.querySelector('.sidebar');
          if (sidebar) {
            var wrap = document.createElement('div');
            wrap.className = 'sidebar-mascot';
            wrap.innerHTML = '<img src="/docs/mascot.png" alt="Globular mascot">';
            var appName = sidebar.querySelector('.app-name');
            if (appName && appName.nextSibling) {
              sidebar.insertBefore(wrap, appName.nextSibling);
            } else if (appName) {
              sidebar.appendChild(wrap);
            }
          }
        }
      });
    });
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
