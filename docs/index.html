<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Globular Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap">
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --theme-color:        #ca5a2e;
      --base-background-color: #f4efe6;
      --sidebar-background: #ede8df;
      --sidebar-border-color: rgba(20, 33, 43, 0.10);
      --base-color:         #14212b;
      --sidebar-nav-link-color: #14212b;
      --sidebar-nav-link-color--active: #ca5a2e;
      --sidebar-nav-link-border-color--active: #ca5a2e;
      --link-color:         #ca5a2e;
      --link-color--hover:  #a34422;
      --heading-color:      #14212b;
      --code-theme-background: rgba(20, 33, 43, 0.06);
      --code-theme-text:    #14212b;
    }

    body, .markdown-section {
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: #14212b;
    }

    code, pre, .token {
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
    }

    /* Sidebar */
    .sidebar {
      background: var(--sidebar-background);
      border-right: 1px solid var(--sidebar-border-color);
    }
    .sidebar .app-name-link {
      color: #14212b !important;
      font-weight: 700;
    }

    /* Active sidebar link */
    .sidebar-nav li.active > a {
      color: #ca5a2e !important;
      border-right: 3px solid #ca5a2e;
      font-weight: 600;
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2 {
      border-bottom: 1px solid rgba(20, 33, 43, 0.10);
    }
    .markdown-section h1 { color: #14212b; }
    .markdown-section h2 { color: #14212b; }

    /* Inline code */
    .markdown-section code {
      background: rgba(202, 90, 46, 0.08);
      color: #a34422;
      border-radius: 3px;
      padding: 0.1em 0.35em;
    }

    /* Code blocks */
    .markdown-section pre {
      background: rgba(20, 33, 43, 0.05);
      border: 1px solid rgba(20, 33, 43, 0.08);
      border-radius: 8px;
    }
    .markdown-section pre > code {
      background: transparent;
      color: #14212b;
    }

    /* Tables */
    .markdown-section table th {
      background: rgba(202, 90, 46, 0.10);
      color: #14212b;
    }
    .markdown-section table tr:nth-child(2n) {
      background: rgba(20, 33, 43, 0.03);
    }

    /* Search box */
    .search input {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(20, 33, 43, 0.15);
      color: #14212b;
      border-radius: 6px;
    }
    .search input:focus {
      border-color: #ca5a2e;
      outline: none;
    }

    /* Blockquotes / tips */
    .markdown-section blockquote {
      border-left: 4px solid #ca5a2e;
      background: rgba(202, 90, 46, 0.05);
      color: #14212b;
    }

    /* Copy-code button */
    .docsify-copy-code-button {
      background: #ca5a2e !important;
      color: #fff !important;
    }

    /* Mascot in sidebar */
    .sidebar-mascot {
      display: flex;
      justify-content: center;
      padding: 1.2rem 1rem 0.4rem;
    }
    .sidebar-mascot img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Globular',
      repo: 'https://github.com/globulario/services',
      logo: '/logo.png',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'index.md',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs',
        noData: 'No results.',
        depth: 6,
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
      themeColor: '#ca5a2e',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script>
    // Inject mascot below the logo in the sidebar after Docsify renders
    Docsify.plugins.push(function(hook) {
      hook.doneEach(function() {
        if (!document.querySelector('.sidebar-mascot')) {
          var sidebar = document.querySelector('.sidebar');
          if (sidebar) {
            var wrap = document.createElement('div');
            wrap.className = 'sidebar-mascot';
            wrap.innerHTML = '<img src="/docs/mascot.png" alt="Globular mascot">';
            var appName = sidebar.querySelector('.app-name');
            if (appName && appName.nextSibling) {
              sidebar.insertBefore(wrap, appName.nextSibling);
            } else if (appName) {
              sidebar.appendChild(wrap);
            }
          }
        }
      });
    });
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
