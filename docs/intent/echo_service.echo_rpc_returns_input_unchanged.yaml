id: echo_rpc_returns_input_unchanged
level: safety_rule
title: Echo RPC must return the input message field unchanged
intent: >
  The Echo RPC handler returns exactly the input message. No transformation,
  truncation, or enrichment is permitted. This is the defining contract of
  the reference implementation.
status: active
activation_triggers:
  - "modifying the Echo RPC handler"
  - "changing how the echo service builds its response"
bad_smells:
  - "echo response differs in any byte from the request message"
expressed_by:
- golang/echo/echo_server/handlers.go
- golang/echo/echo_server/server_test.go
related_invariants:
  - echo_rpc_preserves_message_bytes
  - echo_rpc_is_stateless
required_tests:
- golang/echo/echo_server/server_test.go::TestEchoHandler
