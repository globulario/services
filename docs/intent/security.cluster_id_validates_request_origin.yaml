id: security.cluster_id_validates_request_origin
level: contract
title: Cluster membership UUID validates request origin — empty, mismatched, or unavailable identity is an unconditional denial
intent: |
  Cross-cluster impersonation is prevented by validating the caller's claimed
  cluster MEMBERSHIP identity against the local cluster's opaque minted UUID
  (config.ClusterMembershipIDKey → security.GetLocalClusterUID). The decision is
  binary and FAIL-CLOSED: DENY if the claimed cluster_uid is empty, DENY if the
  local minted UID is unavailable (never fall back to the domain), DENY on
  mismatch, ALLOW only if equal. This prevents a node from cluster A from
  replaying its tokens against cluster B's controller or services.

  The membership credential is the opaque UUID, NOT the domain. The domain
  (config.GetDomain) and cluster_id are the DNS/storage/workflow NAMESPACE — a
  distinct axis, never a membership credential. The identity is also distinct from
  the node MAC (the JWT Issuer's signing key). The UUID is minted once by the
  controller and immutable; readers cache it read-through and never derive it from
  a mutable attribute.

  (The intent id retains the historical "cluster_id" name; the mechanism is now
  the minted cluster_uid. The legacy domain-based ValidateClusterID was removed —
  cluster membership is validated only by ValidateClusterMembership.)
agent_guidance: |
  Validate cluster membership with security.ValidateClusterMembership(claimedUID),
  taking the claimed cluster_uid from the AuthContext (JWT cluster_uid claim or
  gRPC metadata). NEVER validate membership against the domain, the JWT Issuer
  (signing MAC), or any mutable attribute. An empty or unavailable identity is an
  attack/failure, not "local-only" access — deny, never fail open, never fall back
  to the domain. The domain remains only the namespace, emitted as cluster_id
  metadata alongside the cluster_uid.
bad_smells:
  - validating cluster membership against the domain instead of the minted UUID
  - falling back to the domain when the local cluster_uid is unavailable (fail-open)
  - treating an empty cluster_uid as a loopback-only exemption
  - deriving the membership identity from the MAC, hostname, or Issuer field
  - wiring new membership checks through the legacy ValidateClusterID
activation_triggers:
  - ValidateClusterMembership
  - cluster_uid
  - ClusterUID
  - cross-cluster
  - impersonation
expressed_by:
  - golang/security/cluster.go
  - golang/interceptors/ServerInterceptors.go
zooms_out_to:
  - security.tokens_certificates_keys.cluster_trust_contract
zooms_in_to: []
related_invariants: []
related_to:
  - authentication.identity_strips_domain_suffix
  - controller.leader_election_gates_all_writes
required_tests:
  - security:TestValidateClusterMembership_UUIDOnlyFailClosed
  - security:TestGetLocalClusterUID_CacheHitIsNotDomain
status: extracted_candidate
