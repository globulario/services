id: mcp.governor.plan_validate_approve_execute_is_only_execute_path
level: safety_rule
title: MCP command execution surfaces are explicit and allowlisted
intent: >
  Agent-initiated general globular CLI execution MUST flow through the governor
  discipline implemented in golang/mcp/tools_governor.go: plan → validate →
  check_approval → execute (or execute_plan). Specialized MCP helpers that shell
  out to the canonical CLI, such as package build/publish, must stay explicit
  and allowlisted so new ad-hoc execute branches cannot appear unnoticed.
agent_guidance: >
  When asked to run a CLI command on the cluster, do NOT shell out from an
  unrelated tool. Use globular_cli.plan + globular_cli.validate +
  globular_cli.check_approval + globular_cli.execute_plan for general command
  execution. If an MCP tool appears to execute commands directly and is not in
  the explicit allowlist, treat that as a contract violation and surface it.
activation_triggers:
  - mcp governor
  - tools_governor
  - plan validate execute
  - check_approval
  - execute_plan
bad_smells:
  - exec.Command added to a non-governor MCP tool
  - new "shortcut" tool that runs commands without a plan id
  - execute tool added that does not consult check_approval
  - knowledge tool (help/examples) grows an execute branch
expressed_by:
  - golang/mcp/governor.go
  - golang/mcp/tools_governor.go
  - golang/mcp/tools_cli.go
  - golang/mcp/tools_package.go
  - golang/mcp/tools_exec_allowlist_test.go
related_to:
  - awareness.mcp_bridge_exposes_safe_tools_only
required_tests:
  - golang/mcp:TestMCPExecSurfacesAreExplicitlyAllowlisted
status: seed
