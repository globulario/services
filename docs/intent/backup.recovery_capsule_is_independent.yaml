id: backup.recovery_capsule_is_independent
level: mechanism
title: Recovery capsule must survive objectstore loss
intent: Disaster recovery needs a recovery capsule and remote/restic path that can restore the cluster even when MinIO or the cluster itself is unavailable.
agent_guidance: Do not make the only recovery path depend on the same objectstore or cluster service that may be lost.
bad_smells:
- recovery metadata stored only in MinIO
- restore requires running cluster
- capsule missing etcd seed or credentials
- remote sync not tracked
activation_triggers:
- recovery capsule
- disaster recovery
- MinIO unavailable
- restic repo
- remote backup
expressed_by:
- operators/backup-and-restore.md
related_invariants: []
zooms_out_to:
- backup.must_be_restorable_not_just_taken
zooms_in_to: []
related_to:
- objectstore.topology_requires_contract
change_risk:
- data_safety_sensitive
- recovery_path_sensitive
required_tests:
- backup_manager/backup_manager_server:TestWriteAndLoadRecoverySeed
- backup_manager/backup_manager_server:TestRecoverySeedValidation
- backup_manager/backup_manager_server:TestResolveRecoveryDestination
- backup_manager/backup_manager_server:TestUpdateRecoverySeedAfterBackup
- backup_manager/backup_manager_server:TestLocalOnlyDisasterRecoveryNotReady
- backup_manager/backup_manager_server:TestResolveRecoveryDestination_IgnoresLocalAuthoritative
- backup_manager/backup_manager_server:TestWriteRecoverySeed_SkipsLocalDestination
- golang/backup_manager/backup_manager_server/recovery_capsule_phase1b_test.go::TestWriteMainRestoreScript_InsertsPhase1b_BetweenPhase1AndPhase2
- node_agent/node_agent_server:TestValidateCapsuleDir_RejectsOutsideBackupRoot
- node_agent/node_agent_server:TestValidateCapsuleDir_AcceptsCanonicalUnderRoot
- node_agent/node_agent_server:TestValidateCapsuleDir_RejectsSymlinkEscape
- node_agent/node_agent_server:TestCollectBackupSecrets_RequiredPresent_AndManifestRecordsIdentity
