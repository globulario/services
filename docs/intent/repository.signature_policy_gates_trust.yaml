id: repository.signature_policy_gates_trust
level: principle
title: Publisher signatures gate artifact trust
intent: Artifact trust is based on registered publisher keys, signatures, revocation state, and policy mode, not just repository possession.
agent_guidance: When enforcing strict mode, require trusted key coverage and treat revoked keys as terminal denial.
bad_smells:
- unsigned artifact accepted in strict mode
- revoked key signature accepted
- publisher identity inferred from filename
- private key handled by Globular
activation_triggers:
- signature
- publisher key
- strict mode
- trusted publisher
- revoked key
expressed_by:
- operators/package-lifecycle.md
- operators/repository-overview.md
related_invariants: []
zooms_out_to:
- repository.metadata_is_authority
zooms_in_to:
- repository.revoked_key_is_unconditional_veto
related_to:
- globular.security.ceremony_over_configuration
change_risk:
- security_boundary_sensitive
- trust_model_sensitive
required_tests:
- repository/repository_server:TestSignaturePolicy_Required_AllowsValidSignature
- repository/repository_server:TestSignaturePolicy_Required_BlocksMissingSignature
- repository/repository_server:TestSignaturePolicy_NotRequired_AllowsMissing
- repository/repository_server:TestSignaturePolicy_RevokedKeyAlwaysBlocks
- repository/repository_server:TestSignaturePolicy_AllowUnsignedLocalDev
- repository/repository_server:TestResolver_BlocksMissingRequiredSignature
- repository/repository_server:TestSignature_ValidTrustedPublisher_AllowsVerify
- repository/repository_server:TestSignature_MissingSignature
- repository/repository_server:TestSignature_InvalidSignature_Detected
- repository/repository_server:TestSignature_RevokedKey_BlocksVerification
- repository/repository_server:TestSignature_UntrustedPublisher
- repository/repository_server:TestRollbackCandidate_BlocksRevokedPublisherKey
status: extracted_candidate
