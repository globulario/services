id: service.installation_is_not_runtime_truth
level: principle
title: Installation success is not runtime truth
intent: >
  A successful install/update step does not prove runtime health; running state
  and service proof must be validated separately.
agent_guidance: >
  Keep installed and runtime layers distinct in diagnosis and enforcement.
activation_triggers:
  - install success
  - runtime failure
  - verification
expressed_by:
- golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
- golang/cluster_controller/cluster_controller_server/release_proof_status.go
- golang/cluster_doctor/cluster_doctor_server/rules/installed_state_runtime_mismatch.go
related_to:
  - state.repository_desired_installed_runtime
required_tests:
  - verifier:TestInstalledDoesNotImplyRuntimeHealthy
status: seed
