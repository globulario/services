id: subsystem.boundaries_define_authority
level: principle
title: Subsystem boundaries define ownership and authority
intent: >
  Each subsystem owns specific state and must not mutate or infer the state
  owned by another subsystem. Where authority is shared (e.g. installed state),
  the split must be explicit: one subsystem observes/emits evidence, the other
  validates and commits.
agent_guidance: >
  Before adding cross-subsystem behavior, identify who owns desired, installed,
  runtime, artifact, inventory, and remediation authority. Installed state uses
  a split model: node-agent emits evidence, controller validates and commits.
bad_smells:
- controller fabricates installed state without node-agent evidence
- node-agent writes desired state
- repository decides runtime health
- objectstore infers inventory truth
- authority split undocumented
activation_triggers:
- subsystem boundary
- ownership
- authority
- controller
- node-agent
- repository
- objectstore
expressed_by:
- awareness/subsystem_boundaries.yaml
- operators/architecture-overview.md
related_invariants: []
zooms_out_to:
- state.repository_desired_installed_runtime
zooms_in_to:
- installed_state.owned_by_node_agent
- repository.metadata_is_authority
- objectstore.topology_requires_contract
related_to:
- etcd.is_source_of_truth
required_tests:
- installed_state:TestWriteInstalledPackage_ControllerOnlyGuard
- installed_state:TestCommitConvergenceWithInstallPromotion
- repository:TestGetArtifactVersionsUsesPublishStateColumn
status: seed
