id: api.grpc_contracts_are_operational_surface
level: principle
title: gRPC/proto contracts are the operational surface
intent: Services expose typed gRPC/protobuf contracts so clients, workflows, MCP tools, and AI agents operate through structured APIs rather than private implementation details.
agent_guidance: Do not replace typed control paths with ad hoc shell/log parsing. Add or evolve proto contracts when operations need structure.
bad_smells:
- agent scrapes logs to decide action
- CLI shells into service internals
- operation has no typed RPC
- contract change not reflected in workflow/MCP
activation_triggers:
- gRPC
- proto
- MCP tool
- API
- typed interface
- reflection
