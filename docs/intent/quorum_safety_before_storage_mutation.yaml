id: quorum_safety_before_storage_mutation
level: principle
title: Storage mutations require quorum safety check
intent: Any repair, reseed, topology change, or destructive storage operation must verify that remaining nodes can preserve quorum and data safety.
agent_guidance: Before storage repair or node recovery, compute cluster safety. Refuse or require operator approval if quorum would be lost.
bad_smells:
- recover two storage nodes simultaneously
- wipe before quorum check
- storage repair assumes all nodes healthy
- write quorum alert from uncertain inventory
activation_triggers:
- quorum
- storage
- reseed
- repair
- node recovery
- MinIO
- Scylla
- etcd
expressed_by:
- operators/node-recovery.md
- operators/minio-topology-validation.md
- operators/cluster-self-healing.md
related_invariants: []
zooms_out_to:
- globular.vision.explicit_convergence
zooms_in_to:
- node_recovery.fence_before_destructive_reseed
- objectstore.destructive_changes_require_approval
related_to:
- inventory.missing_means_uncertain
required_tests:
- cluster_doctor:TestQuorumShape_StandaloneMode_OK
- cluster_doctor:TestQuorumShape_DistributedOneNode_CRITICAL
- cluster_doctor:TestQuorumShape_TwoNodesTwoDrivesTotal_WARN
- cluster_doctor:TestQuorumShape_FourDrives_OK
- cluster_doctor:TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
- cluster_doctor:TestWriteQuorumLost_VIPHolder_RealDowntimeStillFires
- cluster_doctor:TestWriteQuorumLost_OneNodeActive_CRITICAL
- cluster_doctor:TestWriteQuorumLost_AllActive_OK
- cluster_doctor:TestWriteQuorumLost_NoInventoryOnly_DataIncomplete_Suppressed
- cluster_doctor:TestWriteQuorumLost_NoInventory_DataComplete_Fires
- cluster_doctor:TestWriteQuorumLost_KnownDown_DataIncomplete_StillFires
- cluster_doctor:TestWriteQuorumLost_StaleRemoteInventory_Suppressed
- cluster_doctor:TestWriteQuorumLost_StaleInventory_DataComplete_StillFires
- cluster_controller:TestRemoveNodeNotFound
- cluster_controller:TestRemoveNodeSuccess
change_risk:
- quorum_sensitive
- data_safety_sensitive
- topology_sensitive
status: extracted_candidate
