id: config.operator_ownership_is_preserved
level: principle
title: Operator-owned config must not be clobbered by packages
intent: Package upgrades must respect declared config ownership, merge strategy, sensitive flags, and conflict receipts rather than overwriting operator changes.
agent_guidance: Before changing package install/config logic, preserve pre-install conflict gate and operator visibility of unresolved config conflicts.
bad_smells:
- upgrade overwrites config silently
- sensitive config logged
- conflict ignored
- default config replaces operator edit
activation_triggers:
- config ownership
- merge strategy
- conflict receipt
- pre-install gate
- operator config
expressed_by:
- docs/operators/package-lifecycle.md
- docs/developers/workflow-integration.md
- golang/repository/repository_server/config_ownership.go
related_invariants: []
zooms_out_to:
- repository.metadata_is_authority
zooms_in_to: []
related_to:
- audit.every_authority_change_is_explainable
required_tests:
- repository:TestDefaultMergeStrategy_PerKind
- repository:TestResolveConfigEntry_FillsDefaults
- repository:TestResolveConfigEntry_SecretForcesSensitive
- repository:TestRecordAndListConfigReceipts
- repository:TestConfigReceipts_RedactsSecretPath
- repository:TestConfigReceipts_ConflictFilterReturnsOnlyConflicts
change_risk:
- config_sensitive
- operator_trust_sensitive
status: extracted_candidate
