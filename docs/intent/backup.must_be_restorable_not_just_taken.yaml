id: backup.must_be_restorable_not_just_taken
level: principle
title: A backup is only real if it can be restored
intent: Backups must include verification, quality state, restore testing, recovery capsule, and independent recovery path. A completed upload alone is not enough.
agent_guidance: When changing backup logic, preserve restore validation, per-provider status, quality labels, and recovery capsule generation.
bad_smells:
- backup marked successful without verification
- no restore test path
- recovery depends on unavailable MinIO only
- provider partial failure hidden
activation_triggers:
- backup
- restore
- recovery capsule
- restic
- snapshot
- quality
expressed_by:
- operators/backup-and-restore.md
- operational-knowledge/runbooks/restore-from-backup.yaml
related_invariants: []
zooms_out_to:
- globular.vision.explicit_convergence
zooms_in_to:
- backup.recovery_capsule_is_independent
- backup.provider_results_are_explicit
- backup.job_fsm_orphan_recovery
- backup.capsule_quality_is_monotonic
- backup.retention_preserves_restore_tested_floor
- backup.cluster_lock_serializes_backup_execution
related_to:
- degraded_is_explicit_not_hidden
required_tests:
- backup_manager:TestRetention_MinRestoreTestedToKeep
- backup_manager:TestArtifact_RestoreTestReportRoundTrip
- backup_manager:TestWriteMainRestoreScript_InsertsPhase1b_BetweenPhase1AndPhase2
- backup_manager:TestServiceDataForRestore_FilterByService
- backup_manager:TestServiceDataForRestore_SkipRebuildable
- backup_manager:TestServiceDataForRestore_IncludeRebuildable
- backup_manager:TestServiceDataForRestore_CacheNeverRestored
- backup_manager:TestListArtifacts_FilterByQualityState
change_risk:
- data_safety_sensitive
- recovery_path_sensitive
status: extracted_candidate
