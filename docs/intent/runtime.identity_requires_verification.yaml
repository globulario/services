id: runtime.identity_requires_verification
level: principle
title: Runtime identity must be proven, not assumed from liveness
intent: A running process or reachable endpoint is not enough. Runtime identity must be tied to the expected package/build or signed proof before being treated as verified.
agent_guidance: When fixing runtime verification, distinguish live, installed, verified, and corrupted. Do not collapse UNVERIFIED into healthy.
bad_smells:
- reachable service treated as correct build
- checksum skipped because process running
- unverified runtime hidden
- wrapper package hashed as real binary
activation_triggers:
- runtime identity
- verification
- checksum
- build proof
- unverified
- corrupted
