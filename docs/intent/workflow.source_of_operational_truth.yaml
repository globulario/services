id: workflow.source_of_operational_truth
level: principle
title: All cluster mutations flow through workflows

intent: >
  Every meaningful change to cluster state — service deployment, node join,
  upgrade, remediation — goes through the Workflow Service. There are no
  hidden imperative shortcuts. Workflows are idempotent, reach a terminal
  state, and leave a complete audit trail. The controller decides, the
  Workflow Service coordinates, Node Agents execute.

agent_guidance: >
  If you are tempted to make a cluster mutation directly (a direct etcd write,
  a direct systemctl call from the controller, an inline state change), stop.
  That action needs a workflow. If no workflow exists for it yet, the right
  answer is to create one — not to bypass the model. AI remediation actions
  must also go through workflows, not direct execution.

bad_smells:
  - cluster_controller calling os/exec or systemctl directly
  - state change without a corresponding workflow run record
  - remediation action taken outside the workflow engine
  - workflow that never reaches SUCCEEDED or FAILED
  - inline convergence logic that bypasses the semaphore and circuit breaker

expressed_by:
  - golang/workflow/workflow_server/server.go
  - golang/cluster_controller/cluster_controller_server/release_pipeline.go

related_invariants:

activation_triggers:
  - direct state mutation
  - controller calling systemctl
  - remediation without audit trail
  - inline fix bypassing workflow engine
  - operation with no run record

zooms_out_to:
  - globular.vision.explicit_convergence

related_to:
  - etcd.is_source_of_truth

zooms_in_to:
  - workflow.remediation_truth_consistency
  - workflow.step_receipts_are_evidence
  - workflow.backend_health_gate_before_dispatch
  - workflow.definition_loading_is_etcd_first
  - workflow.compiler_rejects_cyclic_dependencies
  - workflow.preflight_validates_all_actor_action_pairs
  - workflow.cluster_invariants_gate_mutations

required_tests:
- golang/workflow/engine/doctor_remediation_test.go::TestDoctorFindingWorkflow_HappyPath
- cluster_controller:TestMinioTopologyDriftDispatchesWorkflow
- cluster_doctor:TestRemediationWorkflowNameMatchesCanonical
change_risk:
  - workflow_sensitive
  - authority_boundary_sensitive
violation_patterns:
  - "os/exec in cluster_controller"
  - "remediation without workflow run record"
exceptions:
  - name: healer_direct_actions
    description: >
      Cluster doctor healer executes bounded auto-heal actions
      (delete_stale_cache, clear_resolved_drift) via direct RPCs with
      JSONL audit trail, not through the workflow engine.
    see: remediation.must_go_through_workflow
    bounded: true
    permanent: false
  - name: ai_remediation_consumer_audit_wrapper
    description: >
      AI remediation consumer wraps a direct node-agent restart call in
      a workflow run record. The workflow is an audit wrapper, not the
      execution coordinator.
    see: remediation.must_go_through_workflow
    bounded: true
    permanent: false

status: seed
