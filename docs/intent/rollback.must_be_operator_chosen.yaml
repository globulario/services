id: rollback.must_be_operator_chosen
level: contract
title: Rollback is an explicit operator decision
intent: Rollback candidates can be listed and verified, but execution requires intentional choice and safety checks.
agent_guidance: Expose eligible revisions with verify/signature status. Do not auto-select rollback target from panic logic.
bad_smells:
- rollback target chosen automatically
- signature status ignored
- quarantined revision offered normally
- rollback bypasses workflow
activation_triggers:
- rollback candidates
- previous revision
- operator rollback
- signature status
expressed_by:
- docs/operators/package-lifecycle.md
- golang/repository/repository_server/rollback.go
- golang/repository/repository_server/rollback_rpc.go
- golang/repository/repository_server/rollback_rpc_test.go
- golang/repository/repository_server/signature_policy.go
- golang/repository/repository_server/signature_policy_test.go
- golang/globularcli/pkg_rollback_cmds.go
- golang/globularcli/release_cmds.go
- golang/globularcli/release_cmds_test.go
- golang/node_agent/node_agent_server/apply_package_release.go
related_invariants: []
zooms_out_to:
- deployment.automatic_rollback_is_forbidden
zooms_in_to: []
related_to:
- repository.signature_policy_gates_trust
required_tests:
- golang/repository/repository_server/rollback_rpc_test.go::TestListRollbackCandidates_PicksPreviousAndEvaluates
- golang/repository/repository_server/rollback_rpc_test.go::TestListRollbackCandidates_RevokedNotEligible
- golang/repository/repository_server/signature_policy_test.go::TestRollbackCandidate_BlocksRevokedPublisherKey
- globularcli:TestRunReleaseRollback
- globularcli:TestRunReleaseRollbackRequiresTarget
change_risk:
- operator_trust_sensitive
- deployment_sensitive
status: extracted_candidate
