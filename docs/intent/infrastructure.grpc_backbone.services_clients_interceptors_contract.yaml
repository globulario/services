id: infrastructure.grpc_backbone.services_clients_interceptors_contract
level: principle
title: gRPC backbone defines service runtime contract and trust boundaries
intent: >
  The Globular microservice backbone is the composition of service runtime
  (`globular_service`), service clients (`globular_client`), and server/client
  interceptors. Together they define how services start, stop, authenticate,
  authorize, observe health, and call each other safely.

agent_guidance: >
  Treat service/server/client/interceptor behavior as one architecture surface.
  Do not patch one layer in isolation when the effect crosses lifecycle, authz,
  transport, or observability. Keep TLS and metadata policies centralized.

bad_smells:
  - service startup bypasses shared Init/StartService path
  - ad hoc grpc.Dial with missing cluster_id/token propagation
  - rpc admitted without interceptor authz or cluster boundary checks
  - readiness inferred from process state without grpc/tcp evidence
  - client retry/reconnect loops implemented outside shared interceptors
  - health endpoint blocked or throttled by authz/rate control

activation_triggers:
  - globular_service
  - globular_client
  - interceptors
  - grpc server
  - grpc dial
  - service lifecycle
  - health check
  - cluster_id
  - x-call-depth

expressed_by:
  - operational-knowledge/stages/grpc-service-backbone.yaml
  - services/golang/globular_service/services.go
  - services/golang/globular_service/lifecycle.go
  - services/golang/globular_client/clients.go
  - services/golang/globular_client/ClientInterceptors.go
  - services/golang/interceptors/ServerInterceptors.go

