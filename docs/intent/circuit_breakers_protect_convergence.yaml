id: circuit_breakers_protect_convergence
level: pattern
title: Circuit breakers protect the convergence loop
intent: >
  Failing dependencies must not stall or poison the release/convergence lane.
  Circuits open, expose degraded state, serve last-known-good when safe, and
  probe recovery. Circuit breaker infrastructure exists (StreamCircuitBreaker,
  reconcileCircuitBreaker, fallback package) but the LKG (last-known-good)
  fallback path is not yet wired into production services.
agent_guidance: >
  Pair retries with circuit state, bounded deadline, and LKG/degraded response.
  Never block authority publication on a degraded dependency. Note: the fallback
  package (fallback.Enter/fallback.Exit) exists but is not wired into production
  services yet — consider wiring it when adding new degraded-mode handling.
bad_smells:
- blind retry forever
- dependency hang blocks release
- all failures treated transient
- no LKG fallback for critical consumer
- fallback infrastructure exists but is not wired
activation_triggers:
- circuit
- dependency degraded
- timeout
- LKG
- critical query
- release lane
expressed_by:
- awareness/design_patterns.yaml
- operators/convergence-model.md
- services/golang/fallback/fallback.go
related_invariants:
- critical_queries.must_be_bounded
- convergence.no_infinite_retry
zooms_out_to:
- reconciliation.must_be_idempotent_and_bounded
zooms_in_to:
- workflow.backend_health_gate_before_dispatch
- interceptors.chain_order_is_load_shed_first
- controller.posture_suppresses_rollouts_during_recovery
related_to:
- degraded_is_explicit_not_hidden
status: seed

required_tests:
  - repository/repository_server:TestT2_ScyllaDown_RequireWriteBlocked
