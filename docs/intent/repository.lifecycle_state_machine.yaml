id: repository.lifecycle_state_machine
level: contract
title: Artifact lifecycle states gate what operations are legal
intent: Artifacts move through explicit lifecycle states such as discovered, verified, published, quarantined, revoked, or broken. Each state constrains installation and repair.
agent_guidance: When touching repository logic, preserve explicit state transitions. Do not make broken/quarantined/revoked artifacts installable through fallback paths.
bad_smells:
- state ignored during install
- revoked artifact can be restored silently
- quarantine bypass without explicit override
- broken artifact treated as missing only
activation_triggers:
- artifact state
- quarantine
- revoke
- publish
- repair
- verify
expressed_by:
- docs/operators/package-lifecycle.md
- docs/operators/repository-overview.md
- golang/repository/repository_server/artifact_state.go
- golang/repository/repository_server/artifact_state_test.go
- golang/repository/repository_server/artifact_handlers.go
- golang/repository/repository_server/artifact_admin.go
- golang/repository/repository_server/resolver.go
related_invariants:
- repository.metadata_first
zooms_out_to:
- repository.metadata_is_authority
zooms_in_to:
- repository.signature_policy_gates_trust
- repository.repair_is_explicit
- repository.resolver_is_deterministic_or_errors
- repository.gc_preserves_safety_states
- repository.publish_pipeline_is_ordered
related_to:
- degraded_is_explicit_not_hidden
required_tests:
- golang/repository/repository_server/artifact_state_test.go::TestTransitionArtifactState_RejectsIllegalTransition
- repository:TestArtifactStateHappyPathSync
- repository:TestPromoteArtifact_InvalidTransition
status: extracted_candidate
