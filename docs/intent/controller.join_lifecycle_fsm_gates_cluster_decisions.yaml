id: controller.join_lifecycle_fsm_gates_cluster_decisions
level: mechanism
title: Only nodes in ACTIVE phase participate in RF, topology, workflow scheduling, and dependency calculations
intent: |
  The join FSM has 8 non-terminal phases (JOIN_REQUESTED → JOIN_AUTHORIZED →
  BOOTSTRAPPING → NODE_AGENT_REGISTERED → ADMISSION_PENDING → ADMITTED →
  CONVERGING → ACTIVE) and 4 terminal phases (REJECTED, QUARANTINED, REMOVED,
  STALE_GHOST). EligibleForClusterDecisions() returns true only for ACTIVE nodes.
  Nodes not yet ACTIVE are excluded from: replication factor calculations,
  topology placement, workflow scheduling, and package dependency resolution.
  This prevents a partially-joined node from being counted for quorum or
  receiving packages before it is ready to accept them.
agent_guidance: |
  Always call EligibleForClusterDecisions() before including a node in any
  cluster-wide calculation. Never assume a node in JOIN_AUTHORIZED or ADMITTED
  is ready for workload placement. BLOCKED is recoverable; QUARANTINED requires
  manual operator intervention before the node can re-join.
bad_smells:
  - counting a BOOTSTRAPPING node toward RF quorum
  - scheduling a workflow step on an ADMITTED (not ACTIVE) node
  - including a STALE_GHOST node in topology calculations
  - treating BLOCKED as terminal (it is recoverable)
activation_triggers:
  - JoinLifecyclePhase
  - EligibleForClusterDecisions
  - ACTIVE
  - BOOTSTRAPPING
  - join phase
expressed_by:
  - golang/cluster_controller/cluster_controller_server/join_lifecycle.go
  - golang/cluster_controller/cluster_controller_server/handlers_join.go
zooms_out_to:
  - desired_state.is_authority
zooms_in_to: []
related_invariants: []
related_to:
  - controller.leader_election_gates_all_writes
required_tests:
  - cluster_controller:TestEligibleForClusterDecisions_OnlyActiveNodes
  - cluster_controller:TestJoinFSM_BlockedIsRecoverable
status: extracted_candidate
