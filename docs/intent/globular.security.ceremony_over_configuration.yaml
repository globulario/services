- interceptors:TestIntegration_RemoteBootstrapDenied
- interceptors:TestIntegration_AuditLoggingStructured
- rbac/rbac_server:TestDenyOverridesSAAllow
- rbac/rbac_server:TestDenyOverridesOwnerAllow
- rbac/rbac_server:TestMgmtProtection_BootstrapBypass
