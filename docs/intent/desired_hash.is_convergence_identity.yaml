id: desired_hash.is_convergence_identity
level: contract
title: Desired hash is the compact identity of convergence
intent: The desired hash represents the resolved desired snapshot and allows drift detection without re-resolving external repository state.
agent_guidance: When changing convergence logic, preserve desired hash as the comparison token for resolved desired state.
bad_smells:
- hash recomputed from floating latest
- desired hash ignored
- drift comparison uses partial fields
- hash changed without desired transition
activation_triggers:
- desired_hash
- convergence
- drift
- snapshot
- build identity
expressed_by:
- docs/awareness/decisions.yaml
- docs/developers/build-identity.md
- golang/cluster_controller/cluster_controller_server/release_hash.go
- golang/cluster_controller/cluster_controller_server/infrastructure_reconciler.go
- golang/cluster_controller/cluster_controller_server/infrastructure_reconciler_test.go
- golang/workflow/workflow_server/infra_release_handler.go
- golang/workflow/workflow_server/infra_release_handler_test.go
related_invariants:
- desired.build_id_immutable
zooms_out_to:
- desired.build_id_immutable_after_resolution
zooms_in_to: []
related_to:
- state.repository_desired_installed_runtime
change_risk:
- convergence_sensitive
- state_model_sensitive
required_tests:
- golang/cluster_controller/cluster_controller_server/infrastructure_reconciler_test.go::TestInfraDesiredHashConsistency
- golang/cluster_controller/cluster_controller_server/infrastructure_reconciler_test.go::TestLookupServiceReleaseBuildIDUsesDesiredHash
