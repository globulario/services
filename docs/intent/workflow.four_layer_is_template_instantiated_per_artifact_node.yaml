change_risk:
  - workflow_sensitive
  - authority_boundary_sensitive
  - architectural_framing

violation_patterns:
  - "single failure blocks the whole reconcile cycle for all instances"
  - "convergence assumed to operate on the entire cluster as one unit"
  - "a state mutation with no workflow_run_id + step_id binding"

