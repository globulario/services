activation_triggers:
  - cluster-wide convergence design
  - reconciler logic touching desired/installed state
  - any new workflow definition for deploy / upgrade / remediation
  - audit question about whether a code path needs to be a workflow
  - cross-instance coupling concern (one failure blocking others)

zooms_out_to:
  - workflow.source_of_operational_truth
  - globular.vision.explicit_convergence

zooms_in_to:
  - workflow.cluster_invariants_gate_mutations
  - workflow.step_receipts_are_evidence
