id: missing_state_is_not_delete_intent
level: principle
title: Missing state is not destructive intent
intent: Absent etcd keys or missing inventory entries can result from expiry, partial collection, partition, or startup race. Absence alone must not trigger destructive stop/delete behavior.
agent_guidance: Distinguish explicit delete intent from missing evidence. Require intent markers, watch event classification, or last-known-state comparison before destructive action.
bad_smells:
- missing desired key stops service
- absent key treated as delete
- inventory absence means down
- cleanup based on partial snapshot
activation_triggers:
- missing key
- absent state
- delete intent
- lease expiry
- inventory missing
- destructive absence
expressed_by:
- docs/awareness/decisions/missing-state-is-not-delete-intent.md
