id: day2_operations_are_routine_not_heroics
level: vision
title: Day-2 operations should be routine, not heroic
intent: Daily health, failed workflows, doctor findings, backups, updates, and recovery should be regular checkable operations instead of emergency improvisation.
agent_guidance: When adding operational features, make them scriptable, explainable, repeatable, and safe for routine use.
bad_smells:
- only manual SSH can diagnose
- recovery docs lack status command
- update path has no dry-run
- backup not scheduled or visible
