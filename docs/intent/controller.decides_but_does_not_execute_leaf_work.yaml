id: controller.decides_but_does_not_execute_leaf_work
level: principle
title: Controller decides, actors execute
intent: The controller computes desired convergence and dispatches workflows, but leaf operations like package install, systemd manipulation, and node-local cleanup are executed by node agents/actors.
agent_guidance: Do not move node-local side effects into controller code. Dispatch workflow/actor calls instead.
bad_smells:
- controller runs os/exec
- controller writes installed state
- controller restarts unit directly
- controller performs node-local file edit
activation_triggers:
- controller
- actor
- leaf operation
- systemctl
- os/exec
- dispatch
expressed_by:
- operators/architecture-overview.md
- awareness/subsystem_boundaries.yaml
related_invariants: []
zooms_out_to:
- globular.vision.explicit_convergence
- subsystem.boundaries_define_authority
zooms_in_to:
- workflow.source_of_operational_truth
- node_agent.is_executor_not_cluster_brain
- controller.leader_election_gates_all_writes
- controller.leader_proxy_makes_writes_transparent
related_to:
- remediation.must_go_through_workflow
required_tests:
  - cluster_controller/cluster_controller_server:TestRequestJoin_DoesNotAdmitNodeWhenPreflightFails
change_risk:
- authority_boundary_sensitive
- workflow_sensitive
violation_patterns:
- "exec.Command in cluster_controller"
- "os/exec import in cluster_controller"
- "systemctl in controller non-comment code"
exceptions:
- name: convergence_committer_installed_state
  description: >
    Controller commits installed state via convergence_committer after
    validating node-agent ConvergenceResultV1 evidence.
  see: installed_state.owned_by_node_agent
  bounded: true
  permanent: true
status: extracted_candidate
