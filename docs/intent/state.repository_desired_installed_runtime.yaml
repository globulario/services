id: state.repository_desired_installed_runtime
level: principle
title: Four independent truth layers — never collapse

intent: >
  Globular tracks every service across four independent layers, each with its
  own owner and data source. Repository answers "does this version exist?"
  Desired answers "what should be running?" Installed answers "what is actually
  on this node?" Runtime answers "is it running and healthy?" Each layer can
  fail independently. Never assume one implies another.

agent_guidance: >
  Before any fix involving service state, identify which layer the problem
  lives in. A fix that collapses two layers (e.g. inferring runtime health from
  desired state, or assuming installed means running) is architecturally wrong
  even if it passes tests. Always walk the full chain:
  Repository → Desired → Installed → Runtime.

bad_smells:
  - desired state treated as proof of installation
  - installed state treated as proof of runtime health
  - skipping layers when diagnosing convergence failures
  - a single status field encoding multiple layer states
  - assuming a missing layer means "not applicable" rather than "unknown"

expressed_by:
  - golang/cluster_controller/cluster_controller_server/reconciler.go
  - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
  - golang/node_agent/node_agent_server/apply_package_release.go
  - golang/repository/repository_server/server.go
  - golang/repository/repository_server/describe_package.go

related_invariants:
  - four_layer.layer_has_single_writing_actor
  - four_layer.actor_layer_mapping
  - four_layer.workflow_actor_attribution_required
  - etcd.path_has_single_owner
  - cluster_doctor.observer_only_never_writes_etcd
  - cluster_doctor.is_the_authority_for_health_state_queries
  - repository.minio_is_not_valid_package_source
  - desired_installed_runtime_identity_must_match

activation_triggers:
  - service not starting after install
  - desired state set but nothing happens
  - service running but not in desired state
  - drift not detected
  - convergence stuck
  - cross-layer hash mismatch (e.g. 5804f523 vs 2eb07b67 split)
  - permanent service.old_pid_after_upgrade for a correctly-installed binary
  - PUBLISHED artifact has no blob in the authoritative POSIX CAS

zooms_out_to:
  - globular.vision.explicit_convergence

zooms_in_to:
  - desired_state.is_authority
  - installed_state.owned_by_node_agent
  - repository.metadata_is_authority
  - service.installation_is_not_runtime_truth
  - runtime.identity.requires_proof
  - runtime_observation_must_not_mutate_desired

change_risk:
  - state_model_sensitive
  - convergence_sensitive

required_tests:
  - TestDecideNodeRolloutProof_ClusterControllerStaleHashRegression
  - TestHeartbeatPhase2_SelfHosted_PreservesUpdatedUnix
  - TestUploadArtifact_FinalGate_RejectsPostPublishLocalBlobMissing

status: accepted
