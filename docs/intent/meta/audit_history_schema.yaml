# Audit history schema for intent drift tracking.
#
# Each entry records the result of an intent audit pass. This allows
# Awareness to distinguish new regressions from known gaps, and to
# track when an intent started or stopped failing.
#
# History is append-only. Entries are written by the audit tool after
# each pass. The most recent entry per intent_id is the current status.

schema:
  fields:
    intent_id:
      type: string
      description: The intent node being audited.
    status:
      type: enum
      values: [pass, violation, test_coverage_gap, accepted_exception, not_testable]
      description: Audit result for this intent.
    previous_status:
      type: string
      description: Status from the previous audit (null if first audit).
    changed_at:
      type: datetime
      description: When this status was recorded.
    pass_id:
      type: string
      description: Identifier for the audit pass (e.g. "pass-3", "2026-05-26-fix").
    files_changed:
      type: list
      description: Files that changed since the previous audit.
    evidence:
      type: string
      description: Brief evidence supporting the status.
    agent_or_author:
      type: string
      description: Who ran the audit.

