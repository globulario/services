id: workflow.step_receipts_are_evidence
level: mechanism
title: Workflow step receipts are evidence of operation
intent: Each meaningful workflow step should leave durable receipts/outcomes so agents and operators can reconstruct what happened and why.
agent_guidance: When adding workflow actors, emit step outcomes with status, error class, timestamps, and relevant identity metadata.
bad_smells:
- step does side effect with no receipt
- failure logged only
- terminal state unclear
- operator cannot explain partial progress
activation_triggers:
- step receipt
- workflow outcome
- audit
- run status
- actor
expressed_by:
- operators/workflows.md
- awareness/live_overlay.md
related_invariants:
- install.result.atomic_commit
zooms_out_to:
- workflow.source_of_operational_truth
zooms_in_to:
- audit.every_authority_change_is_explainable
- workflow.infra_desired_hash_must_carry_schema_prefix
related_to:
- doctor.findings_are_operator_language
change_risk:
- observability_sensitive
- workflow_sensitive
required_tests:
- golang/workflow/workflow_server/receipt_failure_classifier_test.go::TestClassifyStepFailureForReceipt_NativeDependencyMissing
- golang/workflow/workflow_server/receipt_failure_classifier_test.go::TestClassifyStepFailureForReceipt_TransientTimeout
- golang/workflow/workflow_server/receipt_failure_classifier_test.go::TestBuildStepReceiptPayload_BlockedFields
- repository/repository_server:TestWorkflowReceiptsContainArtifactStateTransitions
- awareness/extractors/workflowstate:TestWorkflowReceipts_ReceiptOnlyEvidenceLowerConfidence
- awareness/extractors/workflowstate:TestWorkflowReceipts_MissingCriticalReceiptWarns
- awareness/extractors/clusterstate:TestVarLibScanner_EmitsReceiptNodes
status: extracted_candidate
