id: schema.migrations_are_versioned_and_reversible
level: constraint
title: Schema migrations are versioned, idempotent, and reversible
intent: >
  etcd/Scylla/repository schema evolution must use explicit versions and
  idempotent migrations, with explicit approval markers for destructive steps.
agent_guidance: >
  Forbid silent reset-to-empty behavior and require reversible migration plans
  or explicit non-reversible rationale.
activation_triggers:
  - schema migration
  - data model change
  - destructive migration
expressed_by:
- golang/repository/repository_server/invariant_test.go
- golang/cluster_controller/cluster_controller_server/state_migration_test.go
- golang/node_agent/node_agent_server/state_migration_test.go
related_to:
- repository.metadata_is_authority
- workflow.source_of_operational_truth
required_tests:
  - migration:TestSchemaMigrationsIdempotent
status: seed
