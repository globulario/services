id: workflow.backend_health_gate_before_dispatch
level: contract
title: Workflow dispatch requires backend health gate
intent: Workflow runs depend on durable backend state. Dispatching when the backend is unhealthy creates orphaned or unobservable operations.
agent_guidance: Before dispatch, check workflow backend health and report blocked/degraded if unavailable. Do not clear actions without durable run result.
bad_smells:
- workflow dispatched when Scylla down
- action cleared without run
- backend error ignored
- orphan scanner resumes terminal run
activation_triggers:
- workflow backend
- Scylla
- dispatch
- orphan
- blocked run
expressed_by:
- docs/operators/workflows.md
- docs/awareness/convergence_rules.yaml
- golang/cluster_controller/cluster_controller_server/workflow_execute.go
- golang/cluster_controller/cluster_controller_server/workflow_health_gate_test.go
related_invariants:
- workflow.backend_health_gate
zooms_out_to:
- workflow.source_of_operational_truth
zooms_in_to:
- workflow.step_receipts_are_evidence
related_to:
- circuit_breakers_protect_convergence
change_risk:
- workflow_sensitive
- convergence_sensitive
required_tests:
- cluster_controller/cluster_controller_server:TestWorkflowGateReclosesAfterHealthyProbe
- cluster_controller/cluster_controller_server:TestWorkflowGateBackoffPreventsStorm
- cluster_controller/cluster_controller_server:TestWorkflowGateExpiresCooldownEvenWithoutProbe
- cluster_controller/cluster_controller_server:TestWorkflowGateHalfOpenAllowsExactlyOneProbe
- workflow/workflow_server:TestOrphanScannerDoesNotPanicWithoutScylla
- workflow/workflow_server:TestWorkflowHealthHealthyAfterReconnect
status: extracted_candidate
