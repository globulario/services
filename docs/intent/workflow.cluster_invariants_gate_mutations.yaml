id: workflow.cluster_invariants_gate_mutations
level: contract
title: Cluster invariant enforcement reports capacity and gates only explicit safety checks
status: active

intent: >
  The cluster.invariant.enforcement workflow (actors_invariant.go) must preserve
  explicit safety checks such as PKI validity, disk reachability, workflow definition
  completeness, and component-specific destructive-operation guards. Infrastructure
  quorum is reported as observed capacity/risk posture, not converted into a global
  admission floor for bootstrap, join, rollout, or profile assignment.

agent_guidance: >
  actors_invariant.go orchestrates the gate. When adding a new invariant check, wire it
  into the InvariantConfig struct as a dependency-injected function so it is testable.
  Do not add inline etcd or PKI calls — keep actor logic testable. Quorum/capacity
  findings must stay report data unless the operation is explicitly destructive and
  the component contract requires a safety gate.

bad_smells:
  - invariant violation logged but workflow calls EmitCompleted anyway
  - observed quorum count reused as a global rollout/profile admission floor
  - non-destructive convergence blocked because a preferred node count is absent
  - quorum check using cached stale membership for a destructive storage operation

activation_triggers:
  - editing engine/actors_invariant.go
  - adding a new cluster invariant
  - debugging "operation blocked by quorum"

zooms_out_to:
  - meta.quorum_is_quality_not_constraint

zooms_in_to: []

expressed_by:
- golang/workflow/engine/actors_invariant.go
- golang/workflow/engine/actors_reconcile.go
- golang/workflow/engine/actors_node_repair.go

related_invariants:

related_to:
  - workflow.preflight_validates_all_actor_action_pairs
  - workflow.infra_desired_hash_must_carry_schema_prefix
  - quorum_safety_before_storage_mutation

required_tests:
  - workflow/engine:TestInvariantEnforcement_PKIExpiredFails
  - workflow/engine:TestInvariantEnforcement_AllClearEmitsCompleted
