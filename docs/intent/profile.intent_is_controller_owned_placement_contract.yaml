id: profile.intent_is_controller_owned_placement_contract
level: principle
title: Profile intent is controller-owned placement contract
intent: Profiles encode node placement intent (what should run where), not runtime health or package identity. Profile assignment is owned by the controller and carried as a signed JoinPlan contract.
agent_guidance: Treat profiles as authoritative intent only after controller-issued validation. Enforce canonical normalization, reject unknown profiles at join/bootstrap gates, and keep profile policy shared across controller and node-agent.
bad_smells:
- gateway or installer invents profiles
- JoinPlan accepts unknown profiles
- controller and node-agent normalize profiles differently
- Day-0 default profiles omit storage for founding node
- profile mismatch is "fixed" by editing etcd without join/reconcile evidence
- profile state is used as runtime health evidence
activation_triggers:
- profile
- assigned_profiles
- JoinPlan
- bootstrap
- founding quorum
- placement intent
- normalize profiles
expressed_by:
- operational-knowledge/stages/profile-system.yaml
- operational-knowledge/stages/day-0-bootstrap.yaml
- operational-knowledge/stages/day-1-join.yaml
- operators/adding-nodes.md
