id: operator_action_requires_explain_plan_verify
level: pattern
title: Operator actions follow explain → plan → execute → verify
intent: Operational actions should expose diagnosis, proposed action, safety assessment, execution path, and verification result.
agent_guidance: When adding operator commands or MCP operations, include dry-run/explain/status output and post-action verification.
bad_smells:
- command mutates without preview
- no verification phase
- operator cannot see why action was chosen
- status after action unknown
activation_triggers:
- operator command
- dry-run
- explain
- verify
- repair
- MCP
expressed_by:
- operators/cluster-doctor.md
- operators/repository-repair.md
- operators/node-recovery.md
- tasks/debug-failed-workflow.md
related_invariants: []
