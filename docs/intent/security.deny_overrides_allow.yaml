id: security.deny_overrides_allow
level: principle
title: Deny overrides allow in RBAC
intent: Authorization must be conservative. Explicit deny wins over broad allow so permissions cannot accidentally expand through group or role composition.
agent_guidance: When changing RBAC matching, preserve deny precedence and audit the final decision path.
bad_smells:
- allow checked before deny and returns early
- deny ignored for owner
- role aggregation expands privilege silently
- permission decision lacks audit
activation_triggers:
- RBAC
- deny
- allow
- permission
- authorization
- role binding
expressed_by:
- docs/operators/security.md
- docs/operators/rbac-permissions.md
related_invariants: []
zooms_out_to:
- globular.security.ceremony_over_configuration
zooms_in_to:
- audit.every_authority_change_is_explainable
- rbac.permission_resolution_walks_path_hierarchy
- rbac.service_excludes_self_from_interceptor
- rbac.subject_id_normalization_prevents_bypass
- interceptors.unauthenticated_allowlist_must_be_minimal
- security.node_principal_is_scoped_to_own_node
- security.path_canonicalization_prevents_traversal
related_to:
- bootstrap.window_is_not_steady_state_auth
required_tests:
