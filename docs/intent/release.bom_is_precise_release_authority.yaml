id: release.bom_is_precise_release_authority
level: principle
title: Release BOM is the precise authority for bootstrap artifacts
intent: Bootstrap and install should resolve packages from an explicit release index/BOM, not filename guessing or floating latest behavior.
agent_guidance: Do not infer release identity from filenames when BOM exists. Preserve exact version/build resolution and fallback warnings.
bad_smells:
- filename inference as primary path
- latest release used during deterministic install
- BOM copied but ignored
- bootstrap artifact source ambiguous
activation_triggers:
- BOM
- release-index
- bootstrap artifact
- version resolution
- install-day0
expressed_by:
- docs/design/version-control-phase1.md
- docs/design/version-control-redesign.md
- docs/developers/versioning.md
related_invariants: []
zooms_out_to:
- package.identity_requires_build_id
zooms_in_to: []
related_to:
- day0_day1_are_repeatable_ceremonies
required_tests:
- repository:TestVA1_V2BOM_PlatformReleaseIsMetadataNotVersion
- repository:TestVA1_V2BOM_PlatformReleaseFieldIsOnTopLevelOnly
- repository:TestValidateReleaseIndex_V1_Valid
- repository:TestValidateReleaseIndex_MissingReleaseTag
- repository:TestValidateReleaseIndex_EntryMissingVersion
- repository:TestReleaseIndexV2InstallRejectsMissingBuildID
- repository:TestScenarioD_ReleaseIndexPin_ResolveByBuildIDIsDeterministic
- mcp:TestLoadReleaseIndexBOMShape
- mcp:TestLoadReleaseIndexBOMShapePrefersCanonicalName
change_risk:
- state_model_sensitive
- bootstrap_sensitive
status: extracted_candidate
