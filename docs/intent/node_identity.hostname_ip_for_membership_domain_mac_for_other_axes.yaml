  - cluster_controller/cluster_controller_server:TestJoinAuthorization_WrongNodeIdentityFailsValidation
  - node_agent/node_agent_server:TestNodeJoinPlanGate_RefusesNoProfiles
  - node_agent/node_agent_server:TestNodeJoinPlanGate_RefusesMissingExpectedHostname
  - node_agent/node_agent_server:TestNodeJoinPlanGate_RefusesWrongIdentity

change_risk:
