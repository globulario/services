id: health.requires_fresh_evidence
level: principle
title: Health claims require freshness
intent: A health status is meaningful only if its evidence is fresh enough for the decision being made. Stale proofs should become unknown or degraded.
agent_guidance: Attach timestamps/freshness to observations and do not let stale status masquerade as current truth.
bad_smells:
- cached health never expires
- old proof shown as verified
- freshness not checked before decision
- status has no checked_at
activation_triggers:
- freshness
- health
- TTL
- checked_at
- cached status
- stale proof
expressed_by:
- docs/operators/cluster-doctor.md
- docs/awareness/live_overlay.md
- golang/evidence/trust.go
- golang/mcp/tools_runtime_evidence.go
- golang/mcp/tools_doctor.go
related_invariants: []
zooms_out_to:
- globular.vision.explicit_convergence
zooms_in_to:
- runtime_health.requires_live_observation
related_to:
- degraded_is_explicit_not_hidden
required_tests:
- mcp:TestFreshnessStatusReady
- mcp:TestFreshnessStatusStaleOnBuildIDDrift
- mcp:TestSessionStart_GraphStale_CriticalOrWarning
- mcp:TestHealthPulse_GraphStaleCritical
- mcp:TestFileImpact_StaleGraph_LowersConfidence
- config:TestServiceConfigCacheStaleOnEtcdError
- config:TestScyllaHostsCacheStaleOnEtcdDown
- globularcli:TestPreflight_LiveOverlayStaleLowersConfidence
change_risk:
- health_sensitive
- freshness_sensitive
status: extracted_candidate
