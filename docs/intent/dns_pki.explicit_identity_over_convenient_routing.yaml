id: dns_pki.explicit_identity_over_convenient_routing
level: principle
title: DNS and PKI identities must be explicit
intent: Routing convenience must not bypass certificate SANs, cluster identity, or service identity. DNS, VIPs, hostnames, and certificates must agree explicitly.
agent_guidance: Do not solve routing by localhost/loopback hacks or wildcard assumptions that break TLS identity. Fix SANs, DNS records, or explicit routing config.
bad_smells:
- localhost bypasses cluster DNS
- VIP missing from SAN
- wildcard assumed to cover node host
- TLS error hidden by insecure client
activation_triggers:
- DNS
- PKI
- SAN
- VIP
- localhost
- certificate
- routing
expressed_by:
- docs/operators/dns-and-pki.md
- docs/operators/network-and-routing.md
- docs/operators/security.md
related_invariants: []
zooms_out_to:
- globular.security.ceremony_over_configuration
zooms_in_to:
- dns.domain_names_normalize_before_storage
- dns.record_deletion_cascades_to_rbac
- pki.san_must_include_all_service_identities
- pki.ca_files_live_at_canonical_path
- pki.leaf_cert_rotation_is_proactive_not_reactive
related_to:
- etcd.is_source_of_truth
- node_address.mesh_name_for_routing_explicit_endpoint_for_backend_peers
required_tests:
- golang/globular_client/clients_tls_test.go::TestMeshConnectionDoesNotSkipTLSVerification
- security:TestMeshServerNameFromTarget
- security:TestMeshServerNameOverride
change_risk:
- tls_pki_sensitive
- security_sensitive
violation_patterns:
- "InsecureSkipVerify.*true in non-test non-bootstrap code"
exceptions:
- name: bootstrap_tls_bypass
  scope: security/tls.go
  reason: Bootstrap TLS bypass for initial CA fetch before trust is established
  files:
  - security/tls.go
  - security/bootstrap.go
- name: reachability_probe
  scope: clients.go:1061
  reason: Reachability probe uses InsecureSkipVerify to test connectivity before full TLS setup
  files:
  - globular_client/clients.go
- name: loopback_minio
  scope: repository/media/file servers
  reason: Loopback MinIO connections for local file serving where TLS identity is not meaningful
  files:
  - repository/repository_server
  - media/media_server
  - file/file_server
status: extracted_candidate
