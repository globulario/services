id: ai.memory.authority_is_domain_relative
level: principle
title: authority in governed memory is domain-relative — cross-domain conflicts escalate, they never rank
intent: |
  Behavioral memory governs an agent across heterogeneous domains (programming, law, medicine,
  management, cluster operation). Each domain is a pluggable pack that supplies its OWN authority
  lattice — a strict partial order over who governs a truth in that domain. The same nominal level
  sits at different heights in different lattices: a passing test governs a code change; a clinical
  guideline governs a dose; a statute-in-force governs a legal claim. There is no global authority
  scale.
  Within one domain the kernel may use the lattice rank to break ties between conflicting principles
  and suppress the dominated one (recording the conflict as a Contradiction, never averaging it).
  ACROSS domains, authorities are incommensurable: a green test cannot authorize a clinical change,
  and a management policy cannot overrule a statute. When principles from different domains disagree,
  the resolution is to ESCALATE (needs_human_approval) with both principles and their provenance
  surfaced — never to rank one lattice above another.
  The kernel stays domain-generic: it resolves opaque DomainRef / AuthorityRef / ConditionRef through
  registered packs and never hardcodes a domain's meaning or a cross-domain priority.
agent_guidance: |
  Before acting, identify every domain the action touches, not just the obvious one. Resolve the
  governing authority within each engaged domain's lattice. Use rank only to order conflicts inside
  the same domain. If two engaged domains disagree, or any engaged domain classes the action
  irreversible, do not pick a winner — surface both and require human approval. Never promote a
  claim to authority using a generative extraction; authority comes from deterministic source
  mapping or human/domain governance.
bad_smells:
  - a single global authority ranking applied across domains
  - a passing test (or any programming evidence) used to authorize a medical, legal, or financial action
  - cross-domain conflict silently resolved by ranking or averaging instead of escalating
  - kernel code importing a domain pack or hardcoding a domain-specific authority
  - authority_level set by a generative/LLM extractor rather than deterministic policy or human governance
  - a repealed statute / withdrawn guideline still governing because it was never superseded or revoked
activation_triggers:
  - authority
  - domain pack
  - authority lattice
  - cross-domain
  - promotion gate
  - forbidden move
  - governed memory
  - policy calculus
expressed_by:
  - golang/ai_memory/behavioral/domain/domain.go
  - golang/ai_memory/behavioral/domain/registry.go
  - golang/ai_memory/domains/programming/pack.go
  - golang/ai_memory/domains/cluster_operator/pack.go
related_invariants: []
zooms_out_to:
  - ai.memory.outcome_history_not_cluster_authority
zooms_in_to:
