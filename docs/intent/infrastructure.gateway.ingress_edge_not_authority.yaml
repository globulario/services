id: infrastructure.gateway.ingress_edge_not_authority
level: principle
title: Gateway is ingress edge and courier, not authority
intent: >
  Gateway terminates ingress and exposes operator entrypoints, but it does not own
  cluster membership, profile assignment, or desired-state authority.
agent_guidance: >
  Keep gateway behavior scoped to transport, auth mediation, and static/web routing.
  Do not move controller authority decisions into gateway handlers.
bad_smells:
  - gateway assigns join profiles or node IDs
  - gateway writes authority keys directly as decision maker
  - gateway bypasses signed JoinPlan validation chain
activation_triggers:
  - gateway
  - join endpoint
  - ingress api
  - courier path
expressed_by:
  - operational-knowledge/stages/day-1-join.yaml
  - services/golang/cluster_controller/cluster_controller_server/handlers_join_authorization.go
related_invariants: []
zooms_out_to:
  - controller.decides_but_does_not_execute_leaf_work
zooms_in_to: []
related_to:
  - cluster.membership.earned_trust
change_risk:
  - security_sensitive
  - membership_sensitive
status: seed

required_tests:
  - node_agent/node_agent_server/internal/actions/serviceports:TestEnsureServicePortReadyHealsConflict_Gateway
