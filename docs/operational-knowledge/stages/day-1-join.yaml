schema_version: 1
file_kind: stage
metadata:
  title: "Day-1 — Multi-node join and founding quorum"
  description: |
    What it takes to grow from a single founding node (day-0) to the 3-node founding quorum
    that day-1 requires. Covers the join script, the founding-profile invariant, the etcd add
    sequence, and the ScyllaDB join discipline.
  source_documents:
    - docs/operators/day-0-1-2-operations.md
    - docs/operators/adding-nodes.md
    - docs/operators/installation.md

entries:

  - id: ops.day-1.join.founding-quorum-invariant
    type: ARCHITECTURE
    title: "Founding quorum — first 3 nodes MUST be core+control-plane+storage"
    tags: [day-1, join, founding-quorum, etcd, scylla, minio]
    applies_when:
      cluster_phases: [day-1]
      services_present: []
    content: |
      Globular's founding-quorum invariant is non-negotiable: the FIRST THREE nodes of any
      cluster MUST carry profiles `core`, `control-plane`, AND `storage`. Why:

      - **etcd**: needs 3 voting members for quorum (loses 1 = still operational)
      - **ScyllaDB**: needs 3 nodes for the default replication factor of 3 (RF=3 with QUORUM
        consistency = lose 1 = still operational)
      - **MinIO**: needs 3 drives for distributed mode with EC:1 (lose 1 = degraded but readable)

      Without all three, you have no real high availability. The founding-quorum invariant is
      enforced in `enforceFoundingProfiles()` and CANNOT be bypassed at join time. Even later,
      `SetNodeProfiles` will refuse to remove `storage` from a node if it would drop below 3
      storage nodes.

      Implication: don't add `compute`-only nodes (analytics workers, GPU nodes, etc.) until
      the founding quorum is solid. They can join freely AFTER.
    links:
      awareness_invariants:
        - founding.quorum.three_nodes_required
      awareness_failure_modes:
        - bootstrap.flag_persists_post_day_1

  - id: ops.day-1.join.curl-script-not-tarball
    type: SKILL
    title: "Day-1 join is `curl gateway-script | bash`, NOT a tarball copy"
    tags: [day-1, join, gateway, install]
    applies_when:
      cluster_phases: [day-1]
      services_present: [cluster-controller, gateway]
    content: |
      The join flow is operator-friendly. On the new node:

      ```
      curl -sfL https://<controller-fqdn>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>
      ```

      Important: `--token` here is a JOIN TOKEN, not an auth JWT from `globular auth login`.
      Keep the join command isolated on its own line. Do not append unrelated commands to the
      token argument.

      How it works:
      - The controller's gateway exposes a dynamically-generated install script at /join.
      - The script downloads the node-agent binary, installs systemd units, configures TLS,
        and contacts the controller with the join token.
      - The controller verifies the token, issues a node-id and TLS cert, adds the node to
        cluster state, and the script triggers a heartbeat.

      Generate the join token first on the controller:
      ```
      globular cluster token create --controller <controller-ip>:12000 --token <AUTH_JWT> --insecure --expires 30m
      ```

      Then run join on the new node with the returned token:
      ```
      curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>
      ```

      If a prior join attempt failed after creating local etcd state, rerun explicitly with:
      ```
      curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN> --repair-etcd
      ```
      `--repair-etcd` authorizes backup + wipe of local etcd data; never use it blindly.

      What you do NOT do:
      - Manually scp the node-agent binary — bypasses TLS and version pinning
      - Edit /etc/hosts to redirect the controller — breaks mTLS SAN verification
      - Run `globular cluster join` directly without the script — the script handles
        prerequisites the bare command doesn't (system user, mounts, certs)
      - Paste extra shell text into the token argument (for example appending `systemctl ...`)
        because it turns the token into garbage and join fails
    links:
      cli_commands:
        - "globular cluster token create --controller <controller-ip>:12000 --token <auth-jwt> --insecure --expires 30m"
        - "curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <join-token>"
        - "curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <join-token> --repair-etcd"

  - id: ops.day-1.join.etcd-add-discipline
    type: ARCHITECTURE
    title: "etcd add sequence — sequential, not parallel"
    tags: [day-1, join, etcd]
    applies_when:
      cluster_phases: [day-1]
      services_present: [cluster-controller]
    content: |
      etcd cluster expansion is SEQUENTIAL by design — adding two members in parallel can
      cause a partition. The join flow respects this:

      1. Controller adds the new member to etcd with `MemberAdd` (single-RPC, atomic)
      2. Controller waits for the new member to report HEALTHY
      3. Only then does it process the next pending join

      Operational implication: if you have a script that runs join on 2 nodes simultaneously,
      you get inconsistent results — sometimes both succeed, sometimes one is silently rejected
      and ends up not in the cluster. Always join nodes one at a time.

      Key etcd state in /var/lib/globular:
      - /var/lib/globular/etcd/ — data dir (per node)
      - /var/lib/globular/config/etcd.yaml — config (TLS paths, peer URLs)

      Failure pattern observed historically: VIP-contamination caused etcd member eviction
      during keepalived enable. See `failure_modes.yaml: vip_contamination.node_routable_ip_returns_vip`.
    links:
      awareness_invariants:
        - etcd.endpoint_reachability
      awareness_failure_modes:
        - vip_contamination.node_routable_ip_returns_vip

  - id: ops.day-1.join.scylla-sequential-join
    type: ARCHITECTURE
    title: "ScyllaDB Raft join is sequential too — second node stalls if first hasn't completed"
    tags: [day-1, join, scylla]
    applies_when:
      cluster_phases: [day-1]
      services_present: []
    content: |
      ScyllaDB's Raft-based group0 join is sequential. The second joining node waits for the
      first to complete its bootstrap before starting its own. The join script should sequence,
      not parallelize.

      Symptoms of accidental parallel join:
      - Second node hangs at "joining group0" forever
      - First node's CPU spikes from constant Raft re-election
      - `nodetool status` shows both nodes as `UJ` (joining) for >5 minutes

      Recovery: kill the second node's scylla, wait for the first to reach `UN` (up-normal),
      then restart the second. Avoid by running join script on one node at a time.

      Bootstrap detail: the founding node's seed config is special — it's its own seed.
      Joining nodes use the founding node as the seed via etcd-discovered hosts.
      `publishScyllaHostsIfNeeded` writes seed addresses to /globular/scylla/hosts; this MUST
      use `StableIP(clusterVIP)` (NOT `PrimaryIP()` which would return the VIP).
    links:
      awareness_failure_modes:
        - vip_contamination.node_routable_ip_returns_vip

  - id: ops.day-1.node.clean
    type: SKILL
    title: "How to cleanly wipe a node before rejoining the cluster"
    tags: [day-1, join, uninstall, clean, node, rejoin]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: [cluster-controller, gateway]
    content: |
      Before rejoining a node that was previously part of a cluster (or that had a failed
      join attempt), you MUST wipe all Globular and ScyllaDB state first. Failing to do this
      leaves stale etcd WAL, leftover unit files, and old PKI certs that cause silent
      divergence in the new cluster.

      ## The canonical way — fetch the clean script from the gateway

      The clean script is served by the cluster controller's gateway. Fetch and run it
      ON THE NODE TO BE CLEANED (not on the controller):

      ```bash
      # Interactive (asks for confirmation):
      curl -sfL https://<controller-ip>:8443/clean -k | sudo bash

      # Non-interactive (AI agents and automation MUST use this form):
      curl -sfL https://<controller-ip>:8443/clean -k | sudo bash -s -- --force
      ```

      The `--force` flag skips the confirmation prompt. Always use `--force` when running
      non-interactively or from an AI agent — the script blocks forever on stdin otherwise.

      ## What the script does (in order)

      1. **Stop all Globular services** — stops and disables all `globular-*` systemd units
      2. **Stop ScyllaDB** — stops scylla-server, scylla-node-exporter, and all scylla timers
      3. **Force-kill survivors** — SIGKILL any remaining server processes and etcd
      4. **Remove unit files** — deletes `/etc/systemd/system/globular-*.service` and drop-ins,
         then runs `systemctl daemon-reload`
      5. **Wipe state** — removes `/var/lib/globular`, `/etc/globular`, `/usr/lib/globular`,
         MinIO object data (`/mnt/data/minio`), and stale CLI wrapper scripts
      6. **Remove ScyllaDB packages** — `apt remove --purge scylla*` so node-agent owns the
         install from scratch on rejoin (avoids systemd auto-starting scylla before node-agent)
      7. **Wipe ScyllaDB state** — `/var/lib/scylla`, `/etc/scylla`, `/etc/scylla.d`
      8. **Clean etcd data** — removes `/var/lib/etcd`
      9. **Remove PKI/trust store** — deletes all Globular CA certs from system trust store
         and runs `update-ca-certificates --fresh`
      10. **Clean user certs** — removes `~/.config/globular/` for all users and root,
          removes the `globular` entry from `~/.claude/.mcp.json`
      11. **Remove globular user/group** — `userdel globular`, `groupdel globular`

      ## After cleaning — rejoin

      Once the clean script completes, the node is ready for a fresh Day-1 join:

      ```bash
      # On the controller — generate a new join token:
      globular cluster token create

      # On the cleaned node — join the cluster:
      curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>
      ```

      ## Running remotely via SSH

      AI agents can clean a remote node without SSH session interaction:

      ```bash
      ssh root@<node-ip> "curl -sfL https://<controller-ip>:8443/clean -k | sudo bash -s -- --force"
      ```

      ## What NOT to do

      - Do NOT manually delete individual files or stop services one by one — the script
        handles ordering and edge cases (e.g. ScyllaDB package removal timing)
      - Do NOT skip the clean step and run `--repair-etcd` alone — that only fixes etcd WAL,
        not PKI, unit files, or ScyllaDB state
      - Do NOT run the clean script on a HEALTHY cluster member that you want to keep —
        it wipes everything; it is for nodes being DECOMMISSIONED or RESET

    links:
      cli_commands:
        - "curl -sfL https://<controller-ip>:8443/clean -k | sudo bash -s -- --force"
        - "curl -sfL https://<controller-ip>:8443/join -k | sudo bash -s -- --token <JOIN_TOKEN>"
      related_ids:
        - ops.day-1.join.curl-script-not-tarball
        - ops.day-1.join.completion-checklist

  - id: ops.day-1.join.stale-dep-blocks
    type: DEBUG
    title: "Stale dep-blocks permanently block node convergence — how to diagnose and clear"
    tags: [day-1, day-2, join, convergence, debug]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: [cluster-controller, node-agent]
    content: |
      **What are dep-blocks?**
      Dependency-block records are written to etcd by the node-agent when a package cannot
      be installed because a prerequisite hasn't been met yet. Key:
      `/globular/convergence/nodes/<node-id>/packages/<kind>/<name>/latest`

      **The bug**: `writeRuntimeDepBlock` records are NEVER auto-cleared once written. If
      a dependency becomes active AFTER the block was written, the block key persists
      forever in etcd. On every subsequent convergence cycle, the node-agent reads the
      stale BLOCKED record and skips installation — node never converges, and doctor never
      surfaces the root cause clearly.

      **When it manifests**: most commonly after a join that was interrupted mid-way (dep
      satisfied later, but the BLOCKED key was already written). Can also appear when a
      node-agent is restarted with a new package set that has deps that were already active.

      **How to diagnose**:
      ```bash
      # List all convergence keys for a node
      etcdctl get /globular/convergence/nodes/<node-id>/ --prefix --keys-only

      # Look for any key with BLOCKED status
      etcdctl get /globular/convergence/nodes/<node-id>/packages/ --prefix | grep BLOCKED

      # Check the action key too (separate from the status key)
      etcdctl get /globular/convergence/nodes/<node-id>/ --prefix | jq -r 'select(.status == "BLOCKED")'
      ```

      **How to clear (recovery procedure)**:
      1. Identify the stale BLOCKED keys
      2. Delete each BLOCKED status key AND its corresponding action key:
         ```bash
         etcdctl del /globular/convergence/nodes/<node-id>/packages/<kind>/<name>/latest
         etcdctl del /globular/convergence/nodes/<node-id>/packages/<kind>/<name>/action
         ```
      3. Force a convergence re-evaluation:
         ```bash
         globular cluster services repair --node <node-id>
         ```
      4. Observe that the node-agent picks up the package and installs it on the next heartbeat.

      **Long-term fix**: This is a known architectural gap (INC-2026-0005). The fix is to
      invalidate dep-block records when their blocking dependency becomes active. Until the
      fix ships, this manual procedure is the remediation path.

      **AI agent instructions**: When a node is stuck at a convergence phase and not advancing
      for >5 minutes with no other obvious errors, check for stale dep-blocks FIRST — it's
      the most silent and most common cause of permanent convergence stall.
    links:
      awareness_failure_modes:
        - reconcile.stale_dep_block_persists_after_dep_active
      cli_commands:
        - "etcdctl get /globular/convergence/nodes/<node-id>/ --prefix --keys-only"
        - "etcdctl del /globular/convergence/nodes/<node-id>/packages/<kind>/<name>/latest"
        - "globular cluster services repair --node <node-id>"

  - id: ops.day-1.join.completion-checklist
    type: REFERENCE
    title: "How to know day-1 is actually done"
    tags: [day-1, join, completion]
    applies_when:
      cluster_phases: [day-1]
      services_present: [cluster-controller]
    content: |
      You're done with day-1 when ALL of these are true:

      - [ ] `globular cluster nodes list` returns exactly 3 nodes, all with profiles
            `core`, `control-plane`, `storage`
      - [ ] All 3 nodes show `status = ready` (not `converging`, not `unreachable`)
      - [ ] `etcdctl member list` shows 3 members all `started` (not `unstarted`)
      - [ ] `nodetool status` (on any node) shows 3 nodes `UN` (up-normal)
      - [ ] `globular objectstore topology status` shows mode=distributed with 3 pool nodes
            and `Overall: ✓ CONVERGED` (per the MinIO add-node runbook)
      - [ ] `/var/lib/globular/bootstrap.enabled` is GONE on the founding node (controller
            removes it post-join)
      - [ ] `globular auth login --user sa --password <new-password>` works (default
            password should already be changed)

      Until all checks pass, do NOT call this cluster "production-ready". Day-2 maintenance
      assumes all of the above.
    links:
      cli_commands:
        - "globular cluster nodes list"
        - "etcdctl ... member list"
        - "nodetool status"
        - "globular objectstore topology status"
