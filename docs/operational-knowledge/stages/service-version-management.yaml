schema_version: 1
file_kind: stage
metadata:
  title: "Service version management — generated version contract"
  description: |
    Canonical rules for service runtime version identity, centered on
    `zz_version_generated.go` and build-time ldflags injection.
  source_documents:
    - golang/event/event_server/zz_version_generated.go
    - golang/deploy/deploy.go
    - golang/*/*_server/server.go

entries:

  - id: ops.service.version.identity-source
    type: ARCHITECTURE
    title: "Service runtime version identity source of truth"
    tags: [always, version, services]
    applies_when:
      cluster_phases: [day-0, day-1, day-2]
      services_present: []
    content: |
      For Go services, runtime version identity is a two-step contract:

      1. `zz_version_generated.go` provides a generated baseline `var Version = "<tag>"`.
      2. Build pipeline MAY override via ldflags: `-X main.Version=<version>`.

      The variable MUST remain a `var` (not `const`) so ldflags can override.
      Runtime consumers (`--version`, `--describe`, service config) must read from this same variable.

  - id: ops.service.version.zz-generated-file-contract
    type: DECISION
    title: "zz_version_generated.go contract"
    tags: [always, version, generated]
    applies_when:
      cluster_phases: [day-0, day-1, day-2]
      services_present: []
    content: |
      Every service `zz_version_generated.go` file must:
      - be marked generated (`Code generated by build/gen-version.sh — DO NOT EDIT`);
      - declare `var Version = "..."`;
      - include an init-time non-empty guard (panic on empty version).

      Why:
      - generated provenance is auditable;
      - `var` preserves ldflags override capability;
      - non-empty guard catches broken build/version pipelines early.

  - id: ops.service.version.runtime-wiring
    type: REFERENCE
    title: "Service runtime wiring requirement"
    tags: [always, version, runtime]
    applies_when:
      cluster_phases: [day-0, day-1, day-2]
      services_present: []
    content: |
      Service startup/default config must wire runtime version from package variable:
      - `srv.Version = Version` (or equivalent in config initialization).
      - Never assign `Version: ""` in defaults for real services.

      If runtime version is empty/mismatched, verifier and release diagnostics
      lose identity continuity and emit runtime identity drift symptoms.
