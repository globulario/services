schema_version: 1
file_kind: service-role
metadata:
  title: "Service role — awareness-graph (AWG standalone sidecar)"
  description: |
    What AWG (the Awareness Graph) IS after its extraction from Globular: a standalone
    sidecar tool (its own repo, own binary, own MCP bridge — no Globular imports). It is
    NO LONGER a reconciler-managed cluster service: there is no Globular package, no etcd
    registration, no Envoy route, and the old `globular awareness ...` subcommands and the
    `awareness_diagnose` MCP composite were removed. Agents now reach it through the `awg`
    MCP bridge (`mcp__awg__*`, seven tools) and operators drive it with the standalone `awg`
    CLI. This is the primary seed reference for AI agents that need awareness context before
    editing Globular code.
  source_documents:
    - awareness-graph/docs/agent-usage.md
    - awareness-graph/docs/cli-reference.md
    - awareness-graph/docs/api-reference.md
    - awareness-graph/proto/awareness_graph.proto
    - docs/operational-knowledge/awg-operator-guide.md

entries:

  - id: ops.role.awareness-graph
    type: ARCHITECTURE
    title: "awareness-graph (AWG) — standalone sidecar knowledge graph of codebase intent"
    tags: [always, awareness-graph, role]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      **What it is**: AWG answers questions about a codebase — what invariants a file must
      uphold, which failure modes it is involved in, which fixes are forbidden, which tests
      pin the contract, and which architectural intent governs it. It is the AI agent's
      primary preflight tool before non-trivial edits.

      **Status (since 2026-06-12)**: AWG was extracted from Globular and now runs as a
      **standalone sidecar tool** living in the `awareness-graph` repo. The services repo no
      longer imports it, packages it, registers it in etcd, or manages its version with the
      reconciler. The old `globular awareness ...` CLI subcommands and the platform MCP
      awareness tools (including `awareness_diagnose`) were deleted. Do NOT look for a
      `globular-awareness-graph` package, an Envoy route, or a component-catalog entry — none
      exist anymore.

      **Three moving parts** (all in the awareness-graph repo):
      1. **`awg` CLI** — ~30 subcommands (query, build, authoring, validation, gating, eval).
      2. **`awg serve`** — starts the gRPC server (default `:10120`) AND a managed Oxigraph
         SPARQL store (default `127.0.0.1:7878`) as one unit. No Docker required.
      3. **`awareness-mcp` bridge** — a stdio MCP server that re-exposes the gRPC service as
         the seven `mcp__awg__*` tools an agent calls.

      **Backend**: Oxigraph (single-binary SPARQL store, RocksDB-backed). The server binary
      embeds a compiled `awareness.nt` seed; on startup it loads the seed if the store is
      empty.

      **What it OWNS**:
      - The RDF graph of invariants, failure modes, forbidden fixes, required tests, intents,
        the architectural spine (Component/Boundary/Contract/Decision/Evidence), design/
        implementation patterns, meta-principles, and `@awareness` code-symbol annotations.
      - The seven gRPC RPCs (see `ops.role.awareness-graph.rpcs`).

      **What feeds the graph** (build pipeline, not runtime): `@awareness` annotations in Go
      source + `docs/awareness/*.yaml` + `docs/intent/*.yaml`, compiled by
      annotation-scanner → yaml2nt → loadnt → Oxigraph. See the
      `awareness-graph-operations` stage entries.
    links:
      awareness_invariants:
        - awareness.no_false_silence_for_sensitive_tasks
        - awareness.graph_edges_need_provenance
        - awareness.preflight.required_before_edit
    related_ids:
      - ops.role.awareness-graph.rpcs
      - ops.role.awareness-graph.tool-decision-tree

  - id: ops.role.awareness-graph.rpcs
    type: REFERENCE
    title: "awareness-graph — the seven RPCs and seven MCP tools"
    tags: [always, awareness-graph, rpcs, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      AWG exposes **seven** gRPC RPCs. The `awareness-mcp` bridge re-exposes each as one
      `mcp__awg__*` tool. There is no `awareness_diagnose` tool anymore (removed with the
      extraction), and `globular awareness ...` no longer exists — use the `awg` CLI.

      | # | RPC / MCP tool | Use it to… |
      |---|---|---|
      | 1 | `Briefing` · `mcp__awg__awareness_briefing` | get ~500-token prose context for a file or task — **call first** |
      | 2 | `Impact` · `mcp__awg__awareness_impact` | get the same anchors as typed nodes (no prose) |
      | 3 | `Preflight` · `mcp__awg__awareness_preflight` | get a typed `risk_class` + actions to branch on before reading |
      | 4 | `EditCheck` · `mcp__awg__awareness_edit_check` | warn (advisory) if a proposed edit's content violates an in-scope rule |
      | 5 | `Resolve` · `mcp__awg__awareness_resolve` | fetch one node by `class` + bare `id` (expand a referenced_id) |
      | 6 | `Query` · `mcp__awg__awareness_query` | typed/whitelisted browse (`by_file`/`by_id`/`by_class`/`related`) — **no raw SPARQL** |
      | 7 | `Metadata` · `mcp__awg__awareness_metadata` | graph-level coverage/freshness; disambiguate an EMPTY briefing |

      **CLI equivalents** (run the standalone binary from the awareness-graph repo):
      ```bash
      awg briefing --file golang/cluster_controller/reconciler.go
      awg briefing --task "fix etcd key permissions"
      awg impact   --file golang/cluster_controller/reconciler.go
      awg preflight --task "rotate the service CA" --file golang/security/ca.go
      awg edit-check --file golang/foo/bar.go --content-file -    # content on stdin
      awg resolve invariant install.result.atomic_commit
      awg query --mode by_class --class invariant --limit 5
      awg metadata
      ```

      **Domain scoping**: when the graph hosts more than one repo domain, Briefing / Impact /
      Preflight / EditCheck MUST be scoped with `--domain`/`domain=` or they fail closed
      (never mix domains). A single-domain graph resolves an empty domain trivially.
    links:
      awareness_invariants:
        - awareness.preflight.required_before_edit
        - awareness.no_false_silence_for_sensitive_tasks
    related_ids:
      - ops.role.awareness-graph
      - ops.role.awareness-graph.preflight
      - ops.role.awareness-graph.edit-check
      - ops.role.awareness-graph.metadata
      - ops.role.awareness-graph.tool-decision-tree
      - ops.role.awareness-graph.write-path

  - id: ops.role.awareness-graph.status-handling
    type: DEBUG
    title: "awareness-graph — interpreting ok / empty / degraded status"
    tags: [always, awareness-graph, debug, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      Every Briefing / Impact / Preflight response carries an explicit status. Handle each
      case differently.

      **OK** — direct anchors found. Treat the returned invariants, failure modes, forbidden
      fixes, and required tests as active context. Resolve any referenced_id marked
      `high`/`critical` before writing code.

      **EMPTY** — no direct anchors for this file/task. This is NOT proof the edit is safe.
      Say explicitly "no direct awareness anchors found for <target>", then call
      `awareness_metadata`: if the graph is healthy overall, the silence is probably real; if
      counts are low, the empty means nothing. Proceed by reading the code, nearby tests, and
      docs.

      **DEGRADED** (or a transport error) — the AWG sidecar is unavailable. Do NOT make
      high-risk architectural changes without explicit user approval. Fall back to code,
      tests, docs, and runtime state, and say so.

      Common degraded causes (sidecar model — no Envoy/etcd involved):
      1. `awg serve` is not running, or the MCP bridge can't reach it on `--awareness-addr`
         (default `localhost:9090`; the server's own default listen port is `:10120`).
      2. Oxigraph is up but the store is empty (seed load failed or was skipped).
      3. `awareness.degraded_source_sentinel_collapsed_to_critical` — AWG running outside a
         git checkout emits false-critical coverage telemetry. These are false positives and
         do NOT affect Briefing/Impact/Resolve quality.

      **Operator recovery**:
      ```bash
      # Is the sidecar up and is its store populated?
      awg metadata                         # triple_count, coverage_state, seed_state
      awg seed-status --require-current     # does the live store have the embedded seed?

      # Restart the sidecar (it manages its own Oxigraph):
      awg serve --no-seed &                 # or without --no-seed to load the embedded seed

      # Raw triple count if needed:
      curl -s 'http://localhost:7878/query' \
        -H 'Accept: application/sparql-results+json' \
        --data-urlencode 'query=SELECT (COUNT(*) AS ?n) WHERE { ?s ?p ?o }'
      ```

      **Required end-of-response template** (append to every non-trivial task response):
      ```
      AWG: preflight(<task>) -> <risk_class> | briefing(<files>) |
           invariants: <ids> | forbidden-fixes avoided: <ids> |
           tests run: <ids> | proposed: <kind/id or none> | uncertainty: <what you couldn't verify>
      ```
    links:
      awareness_failure_modes:
        - awareness.degraded_source_sentinel_collapsed_to_critical
      awareness_invariants:
        - awareness.no_false_silence_for_sensitive_tasks
    related_ids:
      - ops.role.awareness-graph
      - ops.role.awareness-graph.rpcs

  - id: ops.role.awareness-graph.tool-decision-tree
    type: REFERENCE
    title: "awareness-graph — which tool to call for which situation"
    tags: [always, awareness-graph, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      Seven tools are reachable via the `awg` MCP bridge. Pick the right one; do NOT default
      to `briefing` for everything.

      | I am about to… | Call | Why |
      |---|---|---|
      | Decide whether/how to touch an area | `awareness_preflight(task=…, files=[…])` | typed `risk_class` + `confidence` to branch on before reading prose |
      | Edit a specific file | `awareness_briefing(file=<path>)` | direct anchors + intent + patterns for that file |
      | Chain on file anchors (no prose) | `awareness_impact(file=<path>)` | typed nodes, cheaper to process |
      | Sanity-check a concrete edit's content | `awareness_edit_check(file=, proposed_content=)` | advisory warning if the edit's shape violates a rule (never blocks) |
      | Expand a `referenced_id` | `awareness_resolve(class=<Class>, id=<bare-id>)` | full node text + provenance anchor |
      | Tell "no rule here" vs "graph thin here" | `awareness_metadata` | triple/node counts, coverage_state, build/seed freshness |
      | Operator/debug browse | `awareness_query(mode=…)` | typed/whitelisted — no raw SPARQL |

      **Anti-patterns:**
      - Treating a `briefing`/`preflight` `EMPTY` as "no risk" — call `metadata` first; an
        empty over a thin graph means nothing. `EMPTY` is never `LOW_RISK`.
      - Using `briefing(task=)` for a file you already know — use `briefing(file=)`;
        file-anchored briefings return direct invariants, task-only ones rely on keyword
        matching + patterns.
      - Looking for `awareness_diagnose` or `globular awareness ...` — both were removed in
        the extraction. Use the `awg` CLI and the seven `mcp__awg__*` tools.

      **Common chains:**
      - Pre-edit, file known: `briefing(file=)` → `resolve` high/critical referenced_ids →
        edit → optional `edit_check` → run required_tests.
      - Pre-edit, file unknown: `preflight(task=, files=[best guesses])` → branch on
        `risk_class` → `briefing(file=)` per file if not LOW_RISK.
      - After a fix that taught something durable: `awg propose --kind … --contract …`
        (see `ops.role.awareness-graph.write-path`).
    links:
      awareness_invariants:
        - awareness.preflight.required_before_edit
    related_ids:
      - ops.role.awareness-graph.rpcs
      - ops.role.awareness-graph.preflight
      - ops.role.awareness-graph.edit-check
      - ops.role.awareness-graph.metadata
      - ops.role.awareness-graph.write-path

  - id: ops.role.awareness-graph.preflight
    type: SKILL
    title: "awareness-graph Preflight — pre-edit risk classifier (file/task → risk_class)"
    tags: [always, awareness-graph, preflight, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      Preflight is the agent's branch-able pre-edit RPC. Where Briefing returns prose,
      Preflight returns a typed `risk_class` so the agent can decide what to do
      *programmatically* before reading anything.

      **Input:** `task` (free-form; required if no files), `files` (repo-relative paths;
      optional but recommended), `mode` (`compact` default / `standard`), `domain` (scope).

      **`status`:** `OK` (≥1 anchor or ≥1 pattern) · `EMPTY` (zero anchors AND coverage
      sufficient) · `DEGRADED` (store unavailable; `risk_class=UNKNOWN_IMPACT`).

      **`risk_class` (branch on this):**
      - `LOW_RISK` — proceed; action list short/empty
      - `ARCHITECTURE_SENSITIVE` — read `files_to_read`; brief every file in the edit set
      - `CONVERGENCE_RISK` — touches the desired/installed/runtime/repository truth model
      - `SECURITY_RISK` — auth/tokens/PKI/RBAC/secret keys → user approval required
      - `DATA_LOSS_RISK` — install/wipe/rollback/migration → user approval required
      - `UNKNOWN_IMPACT` — graph cannot classify (degraded or sparse) → behave as
        SECURITY_RISK until proven otherwise

      **`confidence`:** `HIGH` (≥3 direct anchors AND coverage sufficient) · `MEDIUM` (1–2
      anchors OR strong pattern) · `LOW` (anything else, incl. degraded).

      **Action lists (bounded by mode):** `required_actions`, `forbidden_fixes`,
      `tests_to_run`, `files_to_read`, `blind_spots`; plus a `coverage` summary with a
      load-bearing `sufficient` flag.

      **CLI:** `awg preflight --task "rotate the service CA" --file golang/security/ca.go`
      **MCP:** `mcp__awg__awareness_preflight`

      **Critical rule:** EMPTY does NOT mean LOW_RISK. The server only collapses to EMPTY
      when coverage is explicitly sufficient; otherwise it returns OK with
      `risk_class=UNKNOWN_IMPACT` and populated `blind_spots`. Always read BOTH `status` and
      `risk_class`.
    links:
      awareness_invariants:
        - awareness.preflight.required_before_edit
    related_ids:
      - ops.role.awareness-graph.rpcs
      - ops.role.awareness-graph.tool-decision-tree

  - id: ops.role.awareness-graph.edit-check
    type: SKILL
    title: "awareness-graph EditCheck — advisory edit-time guard (never blocks)"
    tags: [always, awareness-graph, edit-check, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      EditCheck evaluates a proposed edit's CONTENT against the active repo-scoped advisory
      rules (`detect` blocks) that apply to the file. It is **warning-only**: it never blocks
      and never modifies code. Use it as a cheap sanity check on a concrete diff before you
      apply it.

      **Input:** `file` (repo-relative), `proposed_content` (full file or edited region — the
      MCP bridge accepts up to 8 MB), `domain` (scope; required on a multi-domain graph).

      **Output:** `warnings[]` (each naming `rule_id`, `class` = Invariant|ForbiddenFix,
      `severity` = warning, `message`, `detail` = which pattern tripped, `provenance`,
      `enforcement` = warn|block) and `rules_evaluated` (distinguishes "checked, clean" from
      "nothing to check").

      **CLI:** `awg edit-check --file golang/foo/bar.go --content-file -` (content on stdin),
      or `--content "<inline>"`.
      **MCP:** `mcp__awg__awareness_edit_check`

      **Related: `awg gate`** runs EditCheck over the added/changed lines of a git diff and
      reports which findings WOULD block — also advisory by default. `awg gate --contracts
      <file> --enforce` is the only mode that can exit non-zero (frozen-contract gate, no
      server needed). EditCheck itself is always advisory.
    links:
      awareness_invariants:
        - awareness.no_false_silence_for_sensitive_tasks
    related_ids:
      - ops.role.awareness-graph.rpcs
      - ops.role.awareness-graph.tool-decision-tree

  - id: ops.role.awareness-graph.write-path
    type: SKILL
    title: "awareness-graph write path — record a scar with `awg propose` (contract-first)"
    tags: [always, awareness-graph, authoring, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      When a fix taught you something durable — a new failure mode, an invariant you
      clarified, a forbidden fix you ruled out, a regression test that pins it — record it
      with ONE typed call. This is the supported write path; it is CLI-only by design (not an
      MCP tool) so a human stays in the loop.

      ```bash
      awg propose --kind failure_mode --title "Stale seed served after reload" \
        --contract "reload must serve fresh triples" \
        --related-invariant awareness.seed_reload_must_be_fresh \
        --source-file golang/server/reload.go \
        --required-test golang/server/reload_test.go:TestReloadFresh \
        --evidence "observed stale node after PUT"
      ```

      `--kind` is one of `failure_mode | invariant | required_test | forbidden_fix |
      contract_unknown`. `propose` appends the entry to the right YAML source, rebuilds the
      seed, reloads the local store, and `git add`s the change — then STOPS. **It never
      commits — you review and commit.**

      It is **contract-first**: every entry must answer what contract was violated/clarified,
      what failure was observed, what test proves it, what fix is forbidden, and which
      invariant/failure_mode it connects to. Vague notes are rejected (`validation_failed`).
      If the contract is genuinely unknown, use `--kind contract_unknown` with
      `--proposed-contract` or `--revision-request`; the entry is parked under
      `docs/awareness/candidates/` outside the active build until resolved.

      **Stop-hook reminder**: `awg feedback-check` (wired as a Claude Code `Stop` hook) is
      advisory — it warns when a session changed risky code or added an incident/regression
      test but wrote no graph feedback. It NEVER blocks. A session that already proposed
      feedback (or changed nothing risky) stays silent.
    links:
      awareness_invariants:
        - awareness.graph_edges_need_provenance
    related_ids:
      - ops.role.awareness-graph.rpcs
      - ops.role.awareness-graph.tool-decision-tree

  - id: ops.role.awareness-graph.metadata
    type: REFERENCE
    title: "awareness-graph Metadata — graph coverage and freshness signals"
    tags: [always, awareness-graph, metadata, agent-usage]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: []
    content: |
      `Metadata` reports graph-level coverage and freshness — NOT per-file context. Call it
      once per session (or per task) to disambiguate an `EMPTY` briefing: "graph well-covered,
      this area really has no rules" vs "graph thin everywhere, an empty means nothing".

      **Server-side verdicts (interpret these, not the raw counts):**
      - `coverage_state` — `EMPTY` / `THIN` / `SUFFICIENT`
      - `seed_state` — `CURRENT` / `STALE` / `UNSTAMPED`
      - `build_provenance_state` — `STAMPED` / `DEV` / `INCOMPLETE`

      **Useful raw fields:** `triple_count` (healthy graphs run ~15k–18k), per-class counts
      (`invariant_count`, `failure_mode_count`, `intent_count`, …), `source_file_count`,
      `code_symbol_count`, build provenance (`graph_build_commit`, `source_repo_commit`),
      and the architectural-spine counts (`component_count`, `contract_count`, …).

      **How to interpret:**
      - `coverage_state=EMPTY` / `triple_count` < 1000 → store empty or nearly so; rebuild
        (see the awareness-graph-operations stage / runbook).
      - `coverage_state=SUFFICIENT` and an EMPTY briefing → trust the empty; this area is
        genuinely unannotated.
      - `seed_state=STALE` → live store predates the current embedded seed; reload additively
        with `awg seed-status` then a `loadnt`/`awg rebuild`.

      **CLI:** `awg metadata`     **MCP:** `mcp__awg__awareness_metadata`
      Cheap: bounded SPARQL. Safe to call once per session.
    links: {}
    related_ids:
      - ops.role.awareness-graph.rpcs
      - ops.role.awareness-graph.tool-decision-tree
      - ops.role.awareness-graph.status-handling

  - id: ops.role.awareness-graph.coverage-philosophy
    type: ARCHITECTURE
    title: "awareness-graph — coverage is selective by design (not blanket annotation)"
    tags: [always, awareness-graph, authoring, philosophy]
    applies_when:
      cluster_phases: [day-0, day-1, day-2]
      services_present: []
    content: |
      Awareness coverage is intentionally NOT uniform across the codebase. This is a design
      choice, not a backlog. Annotation effort has diminishing returns past a point and
      negative returns past another.

      **What SHOULD be annotated** — knowledge code cannot express by itself: incident lineage
      ("this exists because v1.2.141 shipped unverified"), cross-file invariants, forbidden
      fixes, ordering constraints not enforced by types, authority boundaries, hidden
      cross-cutting effects (VIP/PrimaryIP pollution, etcd key semantics, cert SANs).

      **What should NOT be annotated** — self-explanatory or type-enforced code: generated
      proto/gRPC stubs, pure helpers, self-documenting CRUD, tests. Annotating these dilutes
      signal-to-noise and trains agents to skim briefings.

      **Why selective annotation is safe:** an `EMPTY` briefing on an uncovered file is not a
      green light. Pair it with `awareness_metadata` (is the graph healthy overall?) and, for
      anything non-trivial, `awareness_preflight` — which returns `UNKNOWN_IMPACT` rather than
      `LOW_RISK` when coverage is thin, so the agent is told to proceed carefully instead of
      assuming safety. (Note: the old runtime-correlating `awareness_diagnose` composite no
      longer exists; coverage discipline now lives in Preflight + Metadata.)

      **For annotation authors:** ask "does removing this annotation lose knowledge the code
      itself cannot express?" If yes, annotate. If no, don't. The cost of a noisy graph is
      paid by every agent on every call; the cost of a missing annotation is paid only when an
      incident reveals it. Annotate after incidents, not before — see
      `ops.role.awareness-graph.write-path`.
    links:
      awareness_invariants:
        - awareness.no_false_silence_for_sensitive_tasks
        - awareness.graph_edges_need_provenance
    related_ids:
      - ops.role.awareness-graph
      - ops.role.awareness-graph.metadata
      - ops.role.awareness-graph.write-path
