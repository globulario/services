schema_version: 1
file_kind: runbook
metadata:
  title: "Runbook — Add a node to an existing MinIO pool"
  description: |
    Phased procedure to expand an existing distributed MinIO pool with one additional node.
    Captures the destructive nature of the apply step, the VIP-contamination class, and the
    recovery path if the apply-watcher silently dies.
  source_documents:
    - docs/operators/day-0-1-2-operations.md
    - docs/operational-knowledge/stages/day-1-objectstore.yaml

entries:

  - id: ops.runbook.minio.add-node-to-pool
    type: SKILL
    title: "Add a node to the MinIO pool"
    tags: [day-1, objectstore, minio, runbook]
    applies_when:
      cluster_phases: [day-1, day-2]
      services_present: [cluster-controller, repository, node-agent]
      services_healthy: [cluster-controller]
    content: |
      Use this runbook to add a new node to an existing MinIO distributed pool, OR to transition
      from standalone to distributed by including the founding node plus N new ones.

      The apply step is **destructive on existing MinIO data** — the artifact bucket, webroot,
      and users data on the OLD pool become inaccessible. Plan for a re-publish.
    links:
      awareness_invariants:
        - objectstore.topology_contract
        - meta.quorum_is_quality_not_constraint
      awareness_failure_modes:
        - objectstore.local_membership_inference
        - vip_contamination.node_routable_ip_returns_vip
        - objectstore.minio.standalone_to_distributed_grow_deadlock
      runbooks:
        - runbooks/recover-stuck-topology-apply.yaml
    procedure:
      - phase: observe
        description: "Confirm preconditions"
        commands:
          - cmd: "globular cluster nodes list --output json"
            expect: "target node is in 'ready' state and has 'storage' profile"
          - cmd: "globular --controller globule-<leader>.globular.internal objectstore disk scan"
            expect: "target node's data mount appears with ELIGIBLE=yes"
            note: "If absent, wait up to 5 min (node-agent syncTicker) or restart the node-agent"
          - cmd: "ssh <node> 'systemctl is-active globular-minio.service'"
            expect: "either 'inactive' (held out) or 'active' (already in pool); never 'failed'"

      - phase: plan
        description: "Capture stable IP and prepare disk admission"
        commands:
          - cmd: "globular cluster nodes get <node_id> --output json | jq '.identity.ips'"
            expect: "list of IPs; pick the STABLE interface IP, NOT the keepalived VIP"
            note: |
              VIP (typically 10.0.0.100) appears first when the node is the keepalived MASTER.
              Pass the real interface IP (e.g. 10.0.0.8) to --node-ip below.

      - phase: preserve-data
        description: "Back up existing objects via S3 BEFORE the destructive apply"
        warning: |
          The apply step wipes .minio.sys on every pool node and repoints MinIO at a fresh
          (empty) erasure backend. The old objects become invisible via the S3 API even though
          the bytes may still sit on the old disk. DO NOT rely on a filesystem rsync/cp of
          /var/lib/globular/minio/data — those files are MinIO's internal layout and will NOT
          restore into a new distributed erasure set. Back up and restore at the S3 layer with
          `mc mirror`. This is the only method that survives the format change.
        commands:
          - cmd: |
              # Configure an mc alias from the live MinIO root creds (do not echo the secret).
              set -a; source <(sudo cat /var/lib/globular/minio/minio.env); set +a
              export MC_CONFIG_DIR=/tmp/mc-mig
              /usr/lib/globular/bin/mc alias set src "https://$(hostname -I | awk '{print $1}'):9000" \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --insecure
              /usr/lib/globular/bin/mc du src --insecure   # note object count + size
            note: "Capture the pre-migration object count so you can verify the restore."
          - cmd: |
              BK=/home/$(logname)/minio-backup-$(date +%Y%m%d-%H%M%S)
              /usr/lib/globular/bin/mc mirror --preserve src "$BK" --insecure
              echo "$BK"   # remember this path for the restore phase
            expect: "Transferred bytes == source du; backup dir holds one subdir per non-empty bucket"

      - phase: execute
        description: "Approve disks on every pool node, generate proposal, apply"
        warning: |
          The apply step wipes .minio.sys on every pool node and ALL existing buckets become
          inaccessible. Ensure the preserve-data phase completed and the byte counts matched.
        commands:
          - cmd: "globular --controller globule-<leader>.globular.internal objectstore disk approve --node <id> --node-ip <stable-ip> --path /mnt/data"
            note: "Repeat for every node that will be in the new pool"
          - cmd: "globular --controller globule-<leader>.globular.internal objectstore disk approve --node <id> --node-ip <ip> --path /mnt/data --force-existing-data"
            note: "Use --force-existing-data when the disk already has stale .minio.sys"
          - cmd: "globular --controller globule-<leader>.globular.internal objectstore topology plan"
            expect: "proposal lists exactly the intended pool nodes; volumes_hash printed"
          - cmd: "globular --controller globule-<leader>.globular.internal objectstore topology apply --proposal <id> --i-understand-data-reset"
            expect: "✓ Topology applied: generation=<n>"

      - phase: verify
        description: "Confirm convergence on all pool nodes"
        commands:
          - cmd: "globular --controller globule-<leader>.globular.internal objectstore topology status"
            expect: "Overall: ✓ CONVERGED, all pool nodes show RENDERED_GEN matching desired"
          - cmd: "globular cluster nodes get <new_node_id> --output json | jq '.metadata.minio_join_phase'"
            expect: "verified"
          - cmd: |
              for ip in <pool_ips>; do
                curl -sk https://$ip:9000/minio/health/live -o /dev/null -w "$ip: HTTP %{http_code}\n"
              done
            expect: "every pool node returns HTTP 200"

      - phase: recover-if-needed
        description: "If apply hangs or topology never converges"
        commands:
          - cmd: "etcdctl ... get /globular/objectstore/topology/apply_result"
            expect: "should contain a result JSON within 60s of the apply"
            note: |
              Empty for >60s typically means the apply-watcher goroutine died on a
              prior etcd 'mvcc compacted' error. See runbooks/recover-stuck-topology-apply.yaml.
          - cmd: "globular cluster nodes get <new_node_id> --output json | jq '.metadata.minio_join_phase'"
            expect: "should reach 'verified' within ~30s of MinIO becoming active"
            note: |
              If a node is stuck at 'non_member' even though the apply succeeded AND the published
              /globular/objectstore/config still shows mode=standalone with only the original node,
              this is the standalone→distributed grow deadlock
              (objectstore.minio.standalone_to_distributed_grow_deadlock): the controller's publish
              filter excludes NonMember nodes, so a node admitted into a non-empty pool never enters
              the contract and never gets its minio unit. FIXED in controller versions that include
              resetHeldNonMembersInPool (apply-topology resets NonMember→None for admitted nodes).
              On a fixed controller the node converges automatically. If you are on an OLDER
              controller, upgrade cluster-controller first, then re-run topology apply.
              If instead the config shows all nodes but one stays non_member, suspect
              VIP-contamination — see ops.day-1.minio.vip-contamination in stages/day-1-objectstore.yaml.

    success_criteria:
      - "Topology status shows ✓ CONVERGED at the new desired generation"
      - "Every pool node returns HTTP 200 from /minio/health/live"
      - "Every pool node's minio_join_phase = verified"
      - "ai-memory query for project=globular-services tags=objectstore,topology returns the new pool layout (auto-recorded by ai-watcher → ai-executor)"

    post_apply_data_repopulation:
      restore_from_backup: |
        Once topology status shows CONVERGED and all pool nodes are HTTP 200, restore the objects
        captured in the preserve-data phase back into the NEW distributed cluster via S3:
          export MC_CONFIG_DIR=/tmp/mc-mig
          set -a; source <(sudo cat /var/lib/globular/minio/minio.env); set +a
          /usr/lib/globular/bin/mc alias set dst "https://$(hostname -I | awk '{print $1}'):9000" \
            "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --insecure
          # recreate any empty buckets that held no objects (mirror only carries non-empty ones)
          for b in globular globular-config globular-search-index; do
            /usr/lib/globular/bin/mc mb --ignore-existing dst/$b --insecure
          done
          /usr/lib/globular/bin/mc mirror --overwrite "$BK" dst --insecure   # $BK from preserve-data
          /usr/lib/globular/bin/mc du dst --insecure   # object count must match the pre-migration du
        Then shred the temp creds:  shred -u /tmp/mc-mig/config.json; rm -rf /tmp/mc-mig
      notes:
        - "mc mirror is the authoritative restore — it replays objects through the S3 API into the new erasure set. A filesystem copy of the old data dir will NOT work."
        - "globular-search-index is typically empty and rebuilt by the search service; recreate the empty bucket so dependents find it."
        - "Only after the restore verifies should you consider re-deploying services (globular deploy) to refresh artifact-bucket contents."
