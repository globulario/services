schema_version: 1
file_kind: runbook
metadata:
  title: "Runbook — Initialize or rebuild the awareness graph"
  description: |
    AWG is a standalone sidecar: `awg serve` runs the gRPC server plus a managed Oxigraph
    store. On an empty store it auto-loads the embedded seed (unless `--no-seed`). When the
    YAML sources change you rebuild the graph. The one-shot modern command is `awg rebuild`
    (scan -> N-Triples -> validate -> update embeddata -> reload Oxigraph). The lower-level
    pipeline `scripts/build-awareness-graph.sh` does the same scan/convert/embeddata-update
    and is still used in CI; a curl PUT then loads Oxigraph.
  source_documents:
    - docs/awareness/
    - docs/intent/
    - awareness-graph/scripts/build-awareness-graph.sh

entries:

  - id: ops.runbook.initialize-awareness-graph
    type: SKILL
    title: "Initialize or rebuild the awareness graph from YAML sources"
    tags: [always, awareness, runbook, ai]
    applies_when:
      cluster_phases: [day-0, day-1, day-2]
      services_present: []
    content: |
      The AWG sidecar (`awg serve`) runs the gRPC server and a managed Oxigraph store
      (http://localhost:7878). On an empty store it auto-loads the embedded seed
      (`awareness-graph/golang/server/embeddata/awareness.nt`) unless started with `--no-seed`.
      After YAML/annotation changes you rebuild the graph so the live store reflects them.

      **Trigger this runbook when:**
      - `awg metadata` shows `coverage_state=EMPTY` (or `triple_count` 0), or briefings return
        `DEGRADED`
      - `awg metadata` shows `seed_state=STALE`
      - `docs/awareness/*.yaml` or `docs/intent/**/*.yaml` were updated and the graph needs to
        reflect the changes

      **Note:** both `briefing(file=<repo-relative-path>)` and `briefing(task=<description>)`
      are supported (file XOR task). File-anchored briefings return direct invariants;
      task-only briefings rely on keyword matching + implementation patterns.

      **Repos involved:**
      - `services/` — YAML sources: `docs/awareness/`, `docs/intent/`
      - `awareness-graph/` — `awg` CLI, yaml2nt converter, embeddata, server

    procedure:
      - phase: observe
        description: "Check coverage/freshness and that the sidecar is up"
        commands:
          - cmd: "awg metadata"
            expect: "coverage_state=EMPTY (or low triple_count) means rebuild; seed_state=STALE means reload."
          - cmd: "awg serve &   # start the sidecar if it is not already running"
            expect: "server listening on :10120; Oxigraph ready on :7878"

      - phase: build-and-convert
        description: "Run the canonical pipeline — annotation scanner + yaml2nt + embeddata update (all-in-one)"
        note: |
          One-shot alternative: `awg rebuild` runs scan -> N-Triples -> validate -> update
          embeddata -> reload Oxigraph in a single command (use `--check` in CI to diff only).
          The explicit pipeline below is the lower-level equivalent.

          `build-awareness-graph.sh` handles everything: builds both tools from source,
          runs the annotation scanner against all 33 Go services (extracts @awareness
          annotations → code_symbols + code_edges YAML), converts all YAML sources +
          generated files to N-Triples, and writes awareness.nt to embeddata/.
          Set SERVICES_REPO if services/ is not a sibling of awareness-graph/.
        commands:
          - cmd: |
              cd /home/dave/Documents/github.com/globulario/awareness-graph && \
              SERVICES_REPO=/home/dave/Documents/github.com/globulario/services \
              bash scripts/build-awareness-graph.sh
            expect: |
              Each service prints "OK". Final lines:
                "N triples emitted"
                "triples: 17000+"
              [known_unsupported] skips are expected (Phase B/C importers not yet wired).
              Any [error] lines indicate broken YAML — fix before continuing.

      - phase: load
        description: "PUT the N-Triples into Oxigraph (idempotent — replaces default graph)"
        commands:
          - cmd: |
              curl -s -X PUT "http://localhost:7878/store?default" \
                -H "Content-Type: application/n-triples" \
                --data-binary @/home/dave/Documents/github.com/globulario/awareness-graph/golang/server/embeddata/awareness.nt
            expect: "empty response body, exit 0"
          - cmd: |
              curl -s "http://localhost:7878/query" \
                -H "Accept: application/sparql-results+json" \
                --data-urlencode "query=SELECT (COUNT(*) as ?n) WHERE { ?s ?p ?o }"
            expect: "\"value\":\"13000+\" — Oxigraph deduplicates; unique triple count is less than emitted line count"

      - phase: verify
        description: "Confirm briefing works against a known high-risk file"
        commands:
          - cmd: |
              awg briefing --file golang/node_agent/node_agent_server/server.go
            expect: "status: ok, prose contains at least one intent or invariant"
          - cmd: "awg seed-status --require-current"
            expect: "live store contains the current embedded seed marker (exit 0)"

    success_criteria:
      - "`awg metadata` reports coverage_state=SUFFICIENT and seed_state=CURRENT (triple count typically 13 000+ unique after Oxigraph dedup)"
      - "`awg briefing --file golang/node_agent/node_agent_server/server.go` returns status: ok"
      - "embeddata/awareness.nt updated (awg rebuild / build-awareness-graph.sh writes it automatically)"

    important:
      - "Both briefing(file=<path>) and briefing(task=<description>) are supported (file XOR task)"
      - "`awg rebuild` is the modern one-shot; the explicit pipeline is the lower-level equivalent"
      - "A raw Oxigraph PUT replaces the entire default graph; a POST appends (DELETE first for a clean refresh)"
      - "build-awareness-graph.sh / awg rebuild accept --check to diff committed vs fresh without writing"
      - "Commit the updated embeddata/awareness.nt and docs/awareness/generated/*.yaml so the next checkout ships fresh data"

    provenance:
      source: seed
      seed_version: ""
      seed_sha256: ""
      immutable: true
