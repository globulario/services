      every state-changing request, but the generalized generation-guard check is
      not built yet.
  - principle: meta.workflow.compensation_is_forward_recovery
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-recovery gate requiring explicit compensation
      states/events instead of silent rollback fantasy, but the generalized
      compensation-model check is not built yet.
  - principle: meta.workflow.current_state_is_rebuildable_projection
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow replay gate proving current state can be rebuilt
      from history, but the generalized replayability check is not built yet.
  - principle: meta.workflow.failure_state_is_classified
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a state-machine gate requiring named, classified failure
      states instead of generic failed buckets, but the generalized failure-state
      classification check is not built yet.
  - principle: meta.workflow.history_is_append_only
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-store gate forbidding mutation/deletion of
      historical events, but the generalized append-only history proof is not
      built yet.
  - principle: meta.workflow.instance_has_single_transition_writer
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-ownership gate requiring CAS/lease/single-writer
      discipline per instance, but the generalized single-writer proof is not
      built yet.
  - principle: meta.workflow.observation_is_not_transition_authority
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a probe/event handling gate proving observations append
      evidence but do not mutate workflow state directly, but the generalized
      observation-vs-transition check is not built yet.
  - principle: meta.workflow.projection_must_not_drive_progression
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow gate forbidding queue/UI/cache projections from
      triggering state transitions, but the generalized projection-feedback check
      is not built yet.
  - principle: meta.workflow.retry_is_modeled_state
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a retry-contract gate requiring explicit retry state,
      attempt count, and schedule instead of hidden loops, but the generalized
      modeled-retry enforcement is not built yet.
  - principle: meta.workflow.side_effects_cross_outbox_boundary
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow delivery gate requiring durable receipts/outbox
      semantics before external side effects are considered sent, but the
      generalized outbox-boundary proof is not built yet.
  - principle: meta.workflow.state_is_declared_machine_state
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-definition gate requiring closed state enums and
      declared transition tables, but the generalized declared-state-machine check
      is not built yet.
  - principle: meta.workflow.state_machine_version_is_pinned
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-instance contract requiring definition version
      pinning plus explicit migrations for incompatible changes, but the
      generalized version-pinning check is not built yet.
  - principle: meta.workflow.terminal_state_is_final_without_recovery_contract
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a state-machine gate proving terminal states cannot
      transition without a named recovery contract, but the generalized
      terminal-state enforcement is not built yet.
  - principle: meta.workflow.time_is_durable_event
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-event gate requiring retry/backoff/deadline time
      facts to be durably recorded instead of hidden in process memory, but the
      generalized durable-time check is not built yet.
  - principle: meta.workflow.transition_guards_are_named_contracts
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow-definition gate requiring named transition guards
      instead of anonymous condition piles, but the generalized guard-contract
      check is not built yet.
  - principle: meta.workflow.transition_is_atomic_with_history
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a transaction gate requiring state updates and causal events
      to commit atomically, but the generalized atomic-transition proof is not
      built yet.
  - principle: meta.workflow.transitions_are_explicit
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow implementation gate requiring named transition
      APIs rather than implicit boolean/status jumps, but the generalized
      explicit-transition check is not built yet.
  - principle: meta.workflow.unknown_must_not_be_invented
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a workflow truth-classification gate requiring UNKNOWN /
      reconcile-needed states when truth cannot be proven, but the generalized
      unknown-vs-invented-state check is not built yet.

  # ── behavioral: scanner-backed via ruleguard/regex gates ────────────────
  # These principles have dedicated scanner rules in cmd/principle-check/rules/
  # that provide Go AST / regex enforcement. The auto-derived code_scanner tier
  # requires instance → meta related_invariants links in the services corpus
  # (cross-repo, not available without SERVICES_REPO). Until those links are
  # wired, this explicit behavioral entry satisfies the coverage ratchet —
  # the scanners are real and gate CI, so behavioral is the accurate tier.
  # ── review_only: irreducible design philosophy (terminal tier) ───────────
  - principle: meta.MTTR_focus_outperforms_MTBF_for_evolving_systems
    tier: review_only
    reason: A design-strategy stance (optimize recovery time over failure rate); no artifact proves it. Surfaces at design review.
  - principle: meta.abstraction_must_not_hide_unmeasured_cost
    tier: review_only
    reason: Whether an abstraction hides a cost is a judgment about the cost model, not a code pattern.
  - principle: meta.adoption_requires_running_existing_systems_unchanged
    tier: review_only
    reason: An adoption-strategy principle about migration design; evaluated per proposal, not by scanning.
  - principle: meta.bad_path_must_make_progress
    tier: review_only
    reason: Whether an error path makes forward progress (vs silently stalls) requires understanding the path's semantics, not a syntactic match.
  - principle: meta.early_consolidation_ossifies_uncertainty
    tier: review_only
    reason: A design-timing principle (do not collapse uncertainty too early); a review lens, not a checkable artifact.
  - principle: meta.end_to_end_check_is_the_only_truth
    tier: review_only
    reason: Argues for end-to-end verification over component checks; a testing-strategy stance evaluated in review.
  - principle: meta.feedback_loop_must_be_faster_than_drift
    tier: review_only
    reason: Comparing a control loop's period to a drift rate is mostly a design judgment; only partially measurable, no clean gate.
  - principle: meta.least_privilege_is_not_a_default_it_is_an_explicit_grant
    tier: review_only
    reason: RBAC grants are explicit by construction; "is this grant minimal" is a per-grant judgment, not a generic gate.
  - principle: meta.mobility_is_stronger_recovery_than_replication
    tier: review_only
    reason: A recovery-design stance (prefer relocation over replication); evaluated per subsystem design.
  - principle: meta.power_hiding_hurts_at_the_edges
    tier: review_only
    reason: An API-design principle (don't hide the powerful primitive); a judgment about interface design.
  - principle: meta.uniform_naming_reduces_conceptual_load
    tier: review_only
    reason: Naming uniformity is a judgment a linter would approximate worse than review; a design lens.

  # ── Perception (GUI) principles — review_only ───────────────────────────
  # The perception category protects operator truth on screens. No admin
  # console exists yet; when frontend Tier-2 enforcement lands (Semgrep/
  # ESLint per intent.awareness.multi_language_extraction), several of
  # these become mechanizable and MUST be re-classified then. Until a
  # frontend codebase exists, design review + briefing-time surfacing is
  # the honest tier, not a silent gap.
  - principle: meta.ui.screen_claim_must_bind_to_authority
    tier: review_only
    reason: Whether a rendered claim binds to the correct authority is a data-flow judgment per screen; gate tests (see the objectstore topology screen contract) enforce it per page once components exist.
  - principle: meta.ui.state_certainty_must_be_visually_distinct
    tier: review_only
    reason: Visual distinctness of epistemic states is a design-review judgment; per-screen gate tests cover the concrete cases.
  - principle: meta.ui.same_truth_same_language
    tier: review_only
    reason: One-meaning-one-rendering is enforced by the shared component vocabulary at review time; no static artifact exists before the design system does.
  - principle: meta.ui.destructive_action_requires_confirmed_authority
    tier: review_only
    reason: RBAC-bound enablement is per-action wiring; the topology screen contract's gate test covers the first concrete instance. Candidate for ESLint mechanization when frontend Tier-2 lands.
  - principle: meta.ui.failure_must_preserve_diagnostic_context
    tier: review_only
    reason: What context a fallback must preserve depends on the screen's diagnostic role — semantic, not syntactic.
  - principle: meta.ui.provenance_over_recall
    tier: review_only
    reason: Which provenance is operationally relevant per claim is a design judgment; review lens at screen-contract time.
  - principle: meta.ui.meaning_must_survive_presentation_loss
    tier: review_only
    reason: Channel-loss survival is provable per component via a11y/visual tests once components exist; until then design review. Candidate for behavioral tier with the first component test suite.
  - principle: meta.ui.decoration_must_not_impersonate_authority
    tier: review_only
    reason: Whether decoration is confusable with state is a perceptual judgment; no artifact can prove it.
  - principle: meta.ui.simplicity_must_not_hide_operational_truth
    tier: review_only
    reason: Whether a removed detail was decision-relevant is exactly the judgment a reviewer must make; irreducibly human.
  - principle: meta.ui.operator_must_remain_in_control
    tier: review_only
    reason: Consent boundaries for automation are product decisions per surface; review lens plus per-screen contracts.
  - principle: meta.ui.control_must_be_reversible_or_guarded
    tier: review_only
    reason: Guard sufficiency (undo vs dry-run vs preflight) is per-action; the topology contract names the first concrete guard chain and gate test.
  - principle: meta.ui.workflow_must_yield_closure
    tier: review_only
    reason: Closure binding is per-flow wiring; the topology contract gate test (receipt-not-submit-success) covers the first instance. Candidate for behavioral tier as flows accumulate.
  - principle: meta.ui.ai_assistance_must_be_explainable_and_bounded
    tier: review_only
    reason: Evidence-boundary sufficiency for generated prose is a judgment about the claim, not a pattern; review plus the ai_text concrete invariant.
  - principle: meta.ui.task_path_must_match_operator_goal
    tier: review_only
    reason: Whether a screen serves a task or mirrors a schema is an information-architecture judgment; preflight surfaces it at design time.
  - principle: meta.ui.notification_volume_must_match_operator_capacity
    tier: review_only
    reason: Alarm rationalization (actionability, priority, dedup per class) is an operational design decision; candidate for behavioral budget tests once a notification layer exists.

  # ── Composition (visual) principles — review_only ───────────────────────
  # Composition is evidence architecture: layout/color/typography choices
  # that make truth perceivable. Like perception, these are design-review
  # judgments until a frontend codebase exists. theme_tokens is the named
  # first candidate for mechanization (token-only lint via Semgrep/ESLint).
  - principle: meta.ui.visual_hierarchy_must_match_decision_hierarchy
    tier: review_only
    reason: Whether layout prominence matches the operator decision path is a per-screen design judgment; screen contracts carry the concrete ordering (see the topology contract's required-evidence list).
  - principle: meta.ui.visual_grouping_must_match_semantic_grouping
    tier: review_only
    reason: Whether a visual group's members share real semantic relationship requires knowing the authority of each member — semantic, not syntactic.
  - principle: meta.ui.spacing_must_encode_relationships
    tier: review_only
    reason: Spacing semantics are relative to the screen's relationship structure; no static artifact proves them.
  - principle: meta.ui.proportion_must_reflect_operational_weight
    tier: review_only
    reason: Operational-weight ranking per screen is a design decision; review lens at screen-contract time.
  - principle: meta.ui.color_must_have_semantic_contract
    tier: review_only
    reason: Role-to-meaning stability is auditable once the token palette exists; until then design review. Re-classify with theme_tokens mechanization.
  - principle: meta.ui.typography_must_express_information_hierarchy
    tier: review_only
    reason: Type-role sufficiency is a legibility judgment; component tests can cover concrete cases once components exist.
  - principle: meta.ui.theme_tokens_must_encode_roles_not_preferences
    tier: behavioral
    reason: >
      MECHANIZED 2026-06-12. The first GUI meta-principle moved from review_only
      to an enforced gate, against the globular-admin frontend codebase. The
      gate is a raw-color-literal ratchet (count frozen, can only decrease;
      token-definition CSS excluded), run in CI on every push. This is the
      proof the gate-to-principle ratchet improves by mechanizing once a real
      frontend codebase exists.
    tests:
      - globular-admin:scripts/check-theme-tokens.sh

  # ── Structure (code reusability) principles — review_only ───────────────
  # meta.code.* governs Go and TypeScript alike. Several are mechanizable
  # once a frontend codebase exists (named below); until then design review
  # plus briefing-time surfacing.
  - principle: meta.code.reusable_unit_must_have_a_stable_semantic_boundary
    tier: review_only
    reason: Boundary completeness (contract + lifecycle + extension points) is the synthesis judgment the other structure principles decompose; reviewed per unit.
  - principle: meta.code.contract_must_outlive_implementation_fashion
    tier: review_only
    reason: Whether a surface is semantic-vs-private is a design judgment; candidate for import-boundary lint (no consumer imports of internal paths) when the component tree exists.
  - principle: meta.code.complexity_must_be_hidden_behind_honest_boundaries
    tier: review_only
    reason: Whether a hidden state was operationally load-bearing requires understanding caller decisions; the error-absorption half is partially covered by existing connection-error scanners on the Go side.
  - principle: meta.code.reuse_must_follow_semantic_cohesion
    tier: review_only
    reason: Semantic identity vs surface resemblance is irreducibly a design judgment; flag-count heuristics would misfire.
  - principle: meta.code.composition_must_prefer_standard_protocols
    tier: review_only
    reason: Protocol choice is per-integration; candidate for a no-framework-global-state lint once the frontend stack is chosen.
  - principle: meta.code.debuggability_is_part_of_correctness
    tier: review_only
    reason: Inspection-cost judgments span tooling and build layers; no static artifact proves them.
  - principle: meta.code.local_state_must_not_become_hidden_authority
    tier: review_only
    reason: Authority classification of local fields is semantic; concrete twin ui.data_holder_is_cache_not_authority carries per-screen gate tests once components exist.
  - principle: meta.code.extension_points_must_be_explicit
    tier: review_only
    reason: "Candidate for mechanization (lint: no shadow-root reaching, no deep imports into component internals) when frontend Tier-2 lands."
  - principle: meta.code.abstraction_must_be_deeper_than_its_interface
    tier: review_only
    reason: Depth-vs-interface weighing is a design judgment (Ousterhout); pass-through-wrapper detection heuristics misfire on legitimate adapters.
  - principle: meta.code.framework_dependency_must_be_earned
    tier: review_only
    reason: Dependency economics is a written-case review at adoption and major bumps, not a scannable property.
  - principle: meta.code.identity_bound_state_must_not_be_copied
    tier: review_only
    reason: >
      Values whose semantics depend on identity, hidden mutable state, aliasing,
      synchronization, cursor position, or lifecycle ownership require design
      judgement. A scanner cannot generally decide whether a copy/share is
      invalid or a legitimate defensive copy. Corroborated independently in
      Go/etcd and TypeScript/Vite. Candidate pending review and future
      mechanization strategy.
