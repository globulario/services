# Meta-principle coverage map
# ===========================
# declare-then-conform, applied one level UP — to the meta-principles themselves.
#
# Every meta.* principle must have a known ENFORCEMENT TIER. The tier answers
# "how is this principle protected — and if it is not mechanically protected,
# is that a deliberate, named decision or a silent gap?" (This is
# meta.negative_result_requires_coverage_attestation applied to the principle
# set: name what you don't cover.)
#
# TIERS:
#   code_scanner  — ruleguard/regex gate in principle-check-all (AUTO-derived
#                   from the Makefile + invariants; NOT listed here).
#   declaration   — declare-then-conform via architectural_declarations.yaml
#                   (AUTO-derived; NOT listed here).
#   behavioral    — enforced by a runtime/integration test, not a static scanner.
#                   Must cite the test(s).
#   planned       — a mechanizable tier is identified but not yet built. Must
#                   name `intended_tier`. This is a TRACKED gap, not a silent one.
#   review_only   — irreducibly human design philosophy; no artifact can prove
#                   it. Surfaces via awareness.briefing at design time. This is a
#                   legitimate terminal tier, not a failure to mechanize.
#
# This file lists ONLY the residual principles — those NOT auto-derived as
# code_scanner or declaration. TestMetaPrincipleCoverageComplete fails if any
# meta.* is neither auto-derived NOR listed here: a new principle cannot land
# unclassified.

schema_version: 1

# ── Gate-to-principle ratchet (keep-it-honest check) ────────────────────────
# AWG's value comes from MECHANICAL enforcement, not declared advice. The
# danger is the unenforced pile growing silently until the meta-principle set
# is a beautiful document instead of a system that bites.
#
# `review_only` is the terminal tier: no artifact can prove the principle, so
# it is enforced only by design review. This ceiling caps how many there may
# be. Adding a review_only principle FAILS the build unless you bump this
# number in the same commit — the moment to ask "should this be mechanized
# instead?" When you convert a review_only principle to behavioral/code_scanner
# (e.g. when the admin console lands and the GUI principles gain ESLint /
# component-test gates), LOWER this number to lock in the gain.
#
# Enforced by TestMetaPrincipleCoverage (cmd/principle-check). It also prints
# the mechanized-vs-unenforced ratio on every run so the number stays visible.
enforcement_ratchet:
  # 43 → 42 (2026-06-12): meta.ui.theme_tokens_must_encode_roles_not_preferences
  # was mechanized (review_only → behavioral, CI-gated against globular-admin),
  # freeing a slot. The 16th perception principle landed as `planned` (concrete
  # mechanism named), not review_only, so it did not consume the slot. First
  # time the ratchet TIGHTENED — exactly the "improve by mechanizing" path.
  # 42 → 43: meta.code.identity_bound_state_must_not_be_copied added as
  # review_only — a cross-language (etcd/Go + vite/TS) identity/aliasing
  # principle that is design judgement, not yet a scannable property. Conscious
  # bump; revisit if a copylock-style scanner is later wired (→ behavioral).
  # 43 → 45 (2026-06-17): the two contract-first resolution principles
  # (meta.contract_must_be_explicit_before_resolution and
  # meta.no_resolution_without_a_respected_contract) added as review_only.
  # Whether a governing contract was identified before a change is called
  # "resolved" — and whether the patch respects it — is an epistemic design
  # judgement made at review time; no static artifact can prove it in general.
  # Conscious bump; revisit if the contract-first repair protocol's `awg gate`
  # step is wired into CI against a frozen contract set (→ behavioral).
  max_review_only: 45

meta_principle_coverage:

  # ── behavioral: gated by a runtime/integration test ──────────────────────
  - principle: meta.harvest_and_yield_are_distinct_availability_dimensions
    tier: behavioral
    reason: >
      The doctor snap-error contract is gated by services-CI behavioral ratchets,
      not the (too-broad) static doctor_rule scanner.
    tests:
      - golang/cluster_doctor/cluster_doctor_server/rules/registry_source_error_enforcement_test.go::TestNoRuleEmitsConfidentFailureOnErroredSnapshot
      - TestClusterScopedRulesRefuseOnSourceError
      - TestEvaluateAll_EmptyFindings_SurfacesSourceUnavailable
  - principle: meta.fail_safe_defaults_when_authority_is_uncertain
    tier: behavioral
    reason: RBAC fails closed and the remediator refuses unknown tiers under uncertainty.
    tests:
      - golang/interceptors/role_binding_failsafe_test.go::TestRBACFallback_FailsClosedForUserMutationOutsideBootstrap
      - TestRemediator_UnknownTierFailsSafeNoAutoExecute
  - principle: meta.authorization_check_is_a_snapshot_not_a_promise
    tier: behavioral
    reason: Permission-cache grant TTL is bounded and flushes are surgical, so a stale authz snapshot cannot outlive its evidence.
    tests:
      - TestPermCacheGrantTTLIsBounded
      - TestFlushPermCache_SurgicalAndComplete
  - principle: meta.clock_skew_invalidates_cross_node_time_comparison
    tier: behavioral
    reason: Node last-seen uses the server clock, not the reporting node's clock, so cross-node comparisons are skew-free.
    tests:
      - golang/cluster_controller/cluster_controller_server/clock_skew_lastseen_test.go::TestReportNodeStatus_LastSeenUsesServerClockNotNodeClock
  - principle: meta.negative_result_requires_coverage_attestation
    tier: behavioral
    reason: >
      Enforced reflexively by the meta-tooling: the positive-control attestation
      forbids a dead scanner from reporting "clean", and the declaration gates
      reject a silent omission (a `none` without a reason fails). The principle
      polices its own enforcement layer.
    tests:
      - TestRuleguardRulesHavePositiveControl
      - TestArchitecturalDeclarationsComplete
  - principle: meta.alert_must_name_a_violated_invariant_not_a_crossed_threshold
    tier: behavioral
    reason: >
      Every Prometheus alert must carry an `invariant` annotation naming the
      architectural contract it detects a violation of. Alerts that fire on a
      threshold alone are allowed but must appear in the carve-out list with a
      reason. The test parses globular_alerts.yml and fails on an unmapped alert.
    tests:
      - TestAlertsMustNameInvariant
  - principle: meta.metric_aggregation_destroys_actionable_signal
    tier: behavioral
    reason: >
      Alert expressions that aggregate metrics must preserve scope labels
      (instance/node) so the operator can act. The test parses alert expr
      fields and flags aggregations that drop actionable labels. Cluster-wide
      aggregations are allowed with a documented carve-out.
    tests:
      - TestMetricAggregationPreservesActionableLabels
  - principle: meta.topology_change_is_a_first_class_event
    tier: behavioral
    reason: >
      Topology-mutating operations must emit a cluster event so downstream
      consumers can react. The test scans controller source for topology-
      mutating function signatures and verifies each file also calls
      emitClusterEvent. Files where the event is emitted by the caller are
      allowed with a documented carve-out.
    tests:
      - TestTopologyChangeEmitsEvent

  # ── review_only: irreducible design philosophy (terminal tier) ───────────
  - principle: meta.MTTR_focus_outperforms_MTBF_for_evolving_systems
    tier: review_only
    reason: A design-strategy stance (optimize recovery time over failure rate); no artifact proves it. Surfaces at design review.
  - principle: meta.abstraction_must_not_hide_unmeasured_cost
    tier: review_only
    reason: Whether an abstraction hides a cost is a judgment about the cost model, not a code pattern.
  - principle: meta.adoption_requires_running_existing_systems_unchanged
    tier: review_only
    reason: An adoption-strategy principle about migration design; evaluated per proposal, not by scanning.
  - principle: meta.bad_path_must_make_progress
    tier: review_only
    reason: Whether an error path makes forward progress (vs silently stalls) requires understanding the path's semantics, not a syntactic match.
  - principle: meta.early_consolidation_ossifies_uncertainty
    tier: review_only
    reason: A design-timing principle (do not collapse uncertainty too early); a review lens, not a checkable artifact.
  - principle: meta.end_to_end_check_is_the_only_truth
    tier: review_only
    reason: Argues for end-to-end verification over component checks; a testing-strategy stance evaluated in review.
  - principle: meta.feedback_loop_must_be_faster_than_drift
    tier: review_only
    reason: Comparing a control loop's period to a drift rate is mostly a design judgment; only partially measurable, no clean gate.
  - principle: meta.least_privilege_is_not_a_default_it_is_an_explicit_grant
    tier: review_only
    reason: RBAC grants are explicit by construction; "is this grant minimal" is a per-grant judgment, not a generic gate.
  - principle: meta.mobility_is_stronger_recovery_than_replication
    tier: review_only
    reason: A recovery-design stance (prefer relocation over replication); evaluated per subsystem design.
  - principle: meta.power_hiding_hurts_at_the_edges
    tier: review_only
    reason: An API-design principle (don't hide the powerful primitive); a judgment about interface design.
  - principle: meta.uniform_naming_reduces_conceptual_load
    tier: review_only
    reason: Naming uniformity is a judgment a linter would approximate worse than review; a design lens.

  # ── Perception (resolution epistemics) principles — review_only ──────────
  # The contract-first resolution principles govern what "resolved" is allowed
  # to mean. They are foundational design philosophy: a reviewer (or the agent
  # itself, honestly) must judge whether a governing contract was identified
  # before claiming resolution, and whether the patch respects it. No general
  # static artifact can prove this. Candidate for behavioral mechanization when
  # the contract-first repair protocol's `awg gate` step runs in CI against a
  # frozen contract set (see awareness-graph docs/design/contract-first-resolution.md).
  - principle: meta.contract_must_be_explicit_before_resolution
    tier: review_only
    reason: >
      Whether the governing contract was identified, inferred, or proposed
      before a change is called "resolved" is an epistemic judgment about the
      task, not a code pattern. A green test cannot prove a contract was
      respected — only that an oracle was matched. Surfaces via awareness.briefing
      at repair time.
  - principle: meta.no_resolution_without_a_respected_contract
    tier: review_only
    reason: >
      The operational form: "resolved" requires contract explicit ∧ respected ∧
      evidence-backed. Whether a patch respects an identified contract is design
      judgment until a contract carries a mechanizable detect rule; until then,
      review plus briefing-time surfacing is the honest tier, not a silent gap.

  # ── Perception (GUI) principles — review_only ───────────────────────────
  # The perception category protects operator truth on screens. No admin
  # console exists yet; when frontend Tier-2 enforcement lands (Semgrep/
  # ESLint per intent.awareness.multi_language_extraction), several of
  # these become mechanizable and MUST be re-classified then. Until a
  # frontend codebase exists, design review + briefing-time surfacing is
  # the honest tier, not a silent gap.
  - principle: meta.ui.screen_claim_must_bind_to_authority
    tier: review_only
    reason: Whether a rendered claim binds to the correct authority is a data-flow judgment per screen; gate tests (see the objectstore topology screen contract) enforce it per page once components exist.
  - principle: meta.ui.state_certainty_must_be_visually_distinct
    tier: review_only
    reason: Visual distinctness of epistemic states is a design-review judgment; per-screen gate tests cover the concrete cases.
  - principle: meta.ui.same_truth_same_language
    tier: review_only
    reason: One-meaning-one-rendering is enforced by the shared component vocabulary at review time; no static artifact exists before the design system does.
  - principle: meta.ui.destructive_action_requires_confirmed_authority
    tier: review_only
    reason: RBAC-bound enablement is per-action wiring; the topology screen contract's gate test covers the first concrete instance. Candidate for ESLint mechanization when frontend Tier-2 lands.
  - principle: meta.ui.failure_must_preserve_diagnostic_context
    tier: review_only
    reason: What context a fallback must preserve depends on the screen's diagnostic role — semantic, not syntactic.
  - principle: meta.ui.provenance_over_recall
    tier: review_only
    reason: Which provenance is operationally relevant per claim is a design judgment; review lens at screen-contract time.
  - principle: meta.ui.meaning_must_survive_presentation_loss
    tier: review_only
    reason: Channel-loss survival is provable per component via a11y/visual tests once components exist; until then design review. Candidate for behavioral tier with the first component test suite.
  - principle: meta.ui.decoration_must_not_impersonate_authority
    tier: review_only
    reason: Whether decoration is confusable with state is a perceptual judgment; no artifact can prove it.
  - principle: meta.ui.simplicity_must_not_hide_operational_truth
    tier: review_only
    reason: Whether a removed detail was decision-relevant is exactly the judgment a reviewer must make; irreducibly human.
  - principle: meta.ui.operator_must_remain_in_control
    tier: review_only
    reason: Consent boundaries for automation are product decisions per surface; review lens plus per-screen contracts.
  - principle: meta.ui.control_must_be_reversible_or_guarded
    tier: review_only
    reason: Guard sufficiency (undo vs dry-run vs preflight) is per-action; the topology contract names the first concrete guard chain and gate test.
  - principle: meta.ui.workflow_must_yield_closure
    tier: review_only
    reason: Closure binding is per-flow wiring; the topology contract gate test (receipt-not-submit-success) covers the first instance. Candidate for behavioral tier as flows accumulate.
  - principle: meta.ui.ai_assistance_must_be_explainable_and_bounded
    tier: review_only
    reason: Evidence-boundary sufficiency for generated prose is a judgment about the claim, not a pattern; review plus the ai_text concrete invariant.
  - principle: meta.ui.task_path_must_match_operator_goal
    tier: review_only
    reason: Whether a screen serves a task or mirrors a schema is an information-architecture judgment; preflight surfaces it at design time.
  - principle: meta.ui.notification_volume_must_match_operator_capacity
    tier: review_only
    reason: Alarm rationalization (actionability, priority, dedup per class) is an operational design decision; candidate for behavioral budget tests once a notification layer exists.

  # ── Composition (visual) principles — review_only ───────────────────────
  # Composition is evidence architecture: layout/color/typography choices
  # that make truth perceivable. Like perception, these are design-review
  # judgments until a frontend codebase exists. theme_tokens is the named
  # first candidate for mechanization (token-only lint via Semgrep/ESLint).
  - principle: meta.ui.visual_hierarchy_must_match_decision_hierarchy
    tier: review_only
    reason: Whether layout prominence matches the operator decision path is a per-screen design judgment; screen contracts carry the concrete ordering (see the topology contract's required-evidence list).
  - principle: meta.ui.visual_grouping_must_match_semantic_grouping
    tier: review_only
    reason: Whether a visual group's members share real semantic relationship requires knowing the authority of each member — semantic, not syntactic.
  - principle: meta.ui.spacing_must_encode_relationships
    tier: review_only
    reason: Spacing semantics are relative to the screen's relationship structure; no static artifact proves them.
  - principle: meta.ui.proportion_must_reflect_operational_weight
    tier: review_only
    reason: Operational-weight ranking per screen is a design decision; review lens at screen-contract time.
  - principle: meta.ui.color_must_have_semantic_contract
    tier: review_only
    reason: Role-to-meaning stability is auditable once the token palette exists; until then design review. Re-classify with theme_tokens mechanization.
  - principle: meta.ui.typography_must_express_information_hierarchy
    tier: review_only
    reason: Type-role sufficiency is a legibility judgment; component tests can cover concrete cases once components exist.
  - principle: meta.ui.theme_tokens_must_encode_roles_not_preferences
    tier: behavioral
    reason: >
      MECHANIZED 2026-06-12. The first GUI meta-principle moved from review_only
      to an enforced gate, against the globular-admin frontend codebase. The
      gate is a raw-color-literal ratchet (count frozen, can only decrease;
      token-definition CSS excluded), run in CI on every push. This is the
      proof the gate-to-principle ratchet improves by mechanizing once a real
      frontend codebase exists.
    tests:
      - globular-admin:scripts/check-theme-tokens.sh

  # ── Perception (newer GUI principle) — planned ──────────────────────────
  - principle: meta.ui.interactive_element_must_have_stable_identity
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a styled-element-identity lint against globular-admin
      (data-carrying spans/badges/counts must have id|data-bind|data-*), the
      sibling gate to check-theme-tokens.sh. Classified planned (not
      review_only) because the mechanism is concrete and named — the gate is
      simply not built yet. Discovered by the admin incidents-page audit.

  # ── Structure (code reusability) principles — review_only ───────────────
  # meta.code.* governs Go and TypeScript alike. Several are mechanizable
  # once a frontend codebase exists (named below); until then design review
  # plus briefing-time surfacing.
  - principle: meta.code.reusable_unit_must_have_a_stable_semantic_boundary
    tier: review_only
    reason: Boundary completeness (contract + lifecycle + extension points) is the synthesis judgment the other structure principles decompose; reviewed per unit.
  - principle: meta.code.contract_must_outlive_implementation_fashion
    tier: review_only
    reason: Whether a surface is semantic-vs-private is a design judgment; candidate for import-boundary lint (no consumer imports of internal paths) when the component tree exists.
  - principle: meta.code.complexity_must_be_hidden_behind_honest_boundaries
    tier: review_only
    reason: Whether a hidden state was operationally load-bearing requires understanding caller decisions; the error-absorption half is partially covered by existing connection-error scanners on the Go side.
  - principle: meta.code.reuse_must_follow_semantic_cohesion
    tier: review_only
    reason: Semantic identity vs surface resemblance is irreducibly a design judgment; flag-count heuristics would misfire.
  - principle: meta.code.composition_must_prefer_standard_protocols
    tier: review_only
    reason: Protocol choice is per-integration; candidate for a no-framework-global-state lint once the frontend stack is chosen.
  - principle: meta.code.debuggability_is_part_of_correctness
    tier: review_only
    reason: Inspection-cost judgments span tooling and build layers; no static artifact proves them.
  - principle: meta.code.local_state_must_not_become_hidden_authority
    tier: review_only
    reason: Authority classification of local fields is semantic; concrete twin ui.data_holder_is_cache_not_authority carries per-screen gate tests once components exist.
  - principle: meta.code.extension_points_must_be_explicit
    tier: review_only
    reason: "Candidate for mechanization (lint: no shadow-root reaching, no deep imports into component internals) when frontend Tier-2 lands."
  - principle: meta.code.abstraction_must_be_deeper_than_its_interface
    tier: review_only
    reason: Depth-vs-interface weighing is a design judgment (Ousterhout); pass-through-wrapper detection heuristics misfire on legitimate adapters.
  - principle: meta.code.framework_dependency_must_be_earned
    tier: review_only
    reason: Dependency economics is a written-case review at adoption and major bumps, not a scannable property.
  - principle: meta.code.identity_bound_state_must_not_be_copied
    tier: review_only
    reason: >
      Values whose semantics depend on identity, hidden mutable state, aliasing,
      synchronization, cursor position, or lifecycle ownership require design
      judgement. A scanner cannot generally decide whether a copy/share is
      invalid or a legitimate defensive copy. Corroborated independently in
      Go/etcd and TypeScript/Vite. Candidate pending review and future
      mechanization strategy.

  # ── Evolution (safe project change) principles ──────────────────────────
  # The eighth category, defined in awareness-graph docs/awareness/generic.
  # These govern HOW the project may change, not what is true about it. Two are
  # already gated by behavioral tests; the rest are mechanizable and named
  # `planned` (concrete gate identified, not yet built) — none consume a
  # review_only slot, so the ratchet ceiling is unchanged.
  - principle: meta.generated_artifacts_must_be_fresh_before_merge
    tier: behavioral
    reason: >
      The ownership-aware seed-freshness gate proves every artifact derived from
      the corpus matches its source: owned drift fails, paired cross-repo lag is
      tolerated. Wired into build-awareness-graph.sh --check and the principle
      pack --check.
    tests:
      - TestClassifySeedDiff_RealOwnedDriftStillFails
      - TestClassifySeedDiff_MissingOwnedTripleStillFails
      - TestClassifySeedDiff_MixedDriftFailsOnOwned
      - TestClassifySeedDiff_IdenticalIsClean
  - principle: meta.discovery_produces_candidates_not_facts
    tier: behavioral
    reason: >
      Extraction/mining emit status:candidate proposals, never corpus facts; the
      tests assert the discovery paths produce candidate entries that require a
      separate human promotion step.
    tests:
      - TestExtractMisuseCandidates
      - TestExtractPatternCandidates
  - principle: meta.main_branch_must_remain_releasable
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a meta-test pinning that the merge gate runs build + go
      test + awg validate + seed-freshness on the merge result (the CI pipeline
      already does this; a guard test that asserts the gate composition is the
      concrete mechanism). Planned, not review_only — the gate is named, just not
      yet pinned by a test.
  - principle: meta.change_must_be_split_into_reviewable_slices
    tier: planned
    intended_tier: code_scanner
    reason: >
      Mechanizable as a diff-shape scanner that raises a reviewable candidate when
      a change exceeds a size threshold or crosses N boundaries / M high-critical
      invariants. Advisory (candidate), never a hard block. Mechanism named; gate
      not yet built.
  - principle: meta.high_risk_change_requires_test_evidence
    tier: planned
    intended_tier: code_scanner
    reason: >
      Mechanizable as a scanner mapping changed files → protected high/critical
      invariants → linked/required tests, raising a missing-test candidate when a
      high-risk diff carries no test evidence. Mechanism named; gate not yet built.
  - principle: meta.graph_truth_must_come_from_approved_corpus
    tier: planned
    intended_tier: behavioral
    reason: >
      Mechanizable as a test asserting the served graph is read-only (no
      fact-writing RPC) and that promotion appends to a corpus YAML + rebuilds
      rather than mutating the store. The promotion path already enforces this; a
      guard test pinning the read-only boundary is the named gate.
  - principle: meta.runtime_change_requires_observability_path
    tier: planned
    intended_tier: code_scanner
    reason: >
      Mechanizable as a scanner flagging changes to runtime/lifecycle paths that
      add no log / metric / state-transition / status and no asserting test.
      Mechanism named; gate not yet built.
  - principle: meta.cross_repo_reference_must_be_validated
    tier: planned
    intended_tier: behavioral
    reason: >
      Already implemented by awg validate and yaml2nt -validate-refs (dangling
      cross-references and missing source files fail), run by
      build-awareness-graph.sh --check against an allowed-dangling baseline.
      Planned pending a dedicated go test pinning the dangling-ref gate (the
      integration gate runs today).
  - principle: meta.exception_must_have_reason_owner_and_expiry
    tier: planned
    intended_tier: code_scanner
    reason: >
      Mechanizable as a checker that every allowlist / baseline / suppression
      entry carries reason, owner, and expiry/review metadata, reporting expired
      or unowned entries so the list can shrink. Mechanism named; gate not yet
      built.
  - principle: meta.architectural_intent_must_change_before_structural_drift
    tier: planned
    intended_tier: code_scanner
    reason: >
      Mechanizable as a scanner detecting structural diffs to spine entities
      (component / boundary / contract) or high/critical invariants that lack a
      corresponding intent / decision / invariant update, raising a
      drift-without-decision candidate. Mechanism named; gate not yet built.
