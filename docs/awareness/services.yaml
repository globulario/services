      - golang/rbac/rbac_server/rbac_space.go
      - golang/rbac/rbac_server/rbac_streams.go
      - golang/rbac/rbac_server/storage_helpers.go
      - golang/rbac/rbac_server/logutil.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads and writes RBAC policy data.

  - id: resource
    name: resource
    summary: Resource registry — manages accounts, applications, peers, roles, and sessions.
    systemd_unit: globular-resource.service
    proto_service: resource.ResourceService
    proto_file: proto/resource.proto
    implementation:
      - golang/resource/resource_server/server.go
      - golang/resource/resource_server/accounts.go
      - golang/resource/resource_server/applications.go
      - golang/resource/resource_server/backup_hooks.go
      - golang/resource/resource_server/calls.go
      - golang/resource/resource_server/cors.go
      - golang/resource/resource_server/helpers.go
      - golang/resource/resource_server/misc.go
      - golang/resource/resource_server/peers.go
      - golang/resource/resource_server/references.go
      - golang/resource/resource_server/roles.go
      - golang/resource/resource_server/security.go
      - golang/resource/resource_server/sessions.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads cluster config and service endpoints.
      - service: authentication
        phase: day1
        required: true
        reason: Validates tokens on all resource RPCs.
      - service: rbac
        phase: day1
        required: true
        reason: Enforces access control for resource operations.

  # ── Networking and discovery ──────────────────────────────────────────────

  - id: dns
    name: dns
    summary: Authoritative DNS for the internal cluster domain (globular.internal).
    systemd_unit: globular-dns.service
    proto_service: dns.DnsService
    proto_file: proto/dns.proto
    implementation:
      - golang/dns/dns_server/server.go
      - golang/dns/dns_server/handlers.go
      - golang/dns/dns_server/backup_hooks.go
      - golang/dns/dns_server/config.go
    depends_on:
      - service: scylladb
        phase: startup
        required: true
        reason: Persists DNS zone records.

  # discovery: RETIRED — service registry/endpoint resolution moved to etcd
  # (/globular/services/{id}/config); package version queries go through the
  # repository service directly. Removed in commit deleting golang/discovery/.

  # ── Package registry ──────────────────────────────────────────────────────

  - id: repository
    name: repository
    summary: Package registry — stores artifacts in ScyllaDB/MinIO, enforces publish lifecycle, signs and verifies blobs.
    systemd_unit: globular-repository.service
    proto_service: repository.PackageRepository
    proto_file: proto/repository.proto
    implementation:
      - golang/repository/repository_server/server.go
      - golang/repository/repository_server/handlers.go
      - golang/repository/repository_server/artifact_handlers.go
      - golang/repository/repository_server/artifact_state.go
      - golang/repository/repository_server/artifact_state_backfill.go
      - golang/repository/repository_server/artifact_admin.go
      - golang/repository/repository_server/artifact_law_validator.go
      - golang/repository/repository_server/artifact_verify_rpc.go
      - golang/repository/repository_server/allocate_upload.go
      - golang/repository/repository_server/publish_reconciler.go
      - golang/repository/repository_server/publish_workflow.go
      - golang/repository/repository_server/release_index.go
      - golang/repository/repository_server/release_ledger.go
      - golang/repository/repository_server/rollback.go
      - golang/repository/repository_server/rollback_rpc.go
      - golang/repository/repository_server/signing.go
      - golang/repository/repository_server/signing_rpc.go
      - golang/repository/repository_server/signature_policy.go
      - golang/repository/repository_server/trusted_publisher.go
