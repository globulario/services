      - golang/repository/repository_server/manifest_cache.go
      - golang/repository/repository_server/migration.go
      - golang/repository/repository_server/namespace.go
      - golang/repository/repository_server/objectstore_admission.go
      - golang/repository/repository_server/provenance.go
      - golang/repository/repository_server/reachability.go
      - golang/repository/repository_server/reachability_guard.go
      - golang/repository/repository_server/repository_findings.go
      - golang/repository/repository_server/repository_reconciler.go
      - golang/repository/repository_server/repository_source.go
      - golang/repository/repository_server/repository_source_policy.go
      - golang/repository/repository_server/repository_source_resolver.go
      - golang/repository/repository_server/repository_source_upstream.go
      - golang/repository/repository_server/resolver.go
      - golang/repository/repository_server/scylla_store.go
      - golang/repository/repository_server/storage_topology.go
      - golang/repository/repository_server/sync_from_upstream.go
      - golang/repository/repository_server/audit.go
      - golang/repository/repository_server/config.go
      - golang/repository/repository_server/config_ownership.go
      - golang/repository/repository_server/config_receipts.go
      - golang/repository/repository_server/dep_health.go
    depends_on:
      - service: scylladb
        phase: metadata_read
        required: true
        reason: Stores artifact metadata and publish state.
      - service: minio
        phase: blob_read
        required: true
        reason: Stores and retrieves artifact blobs.
      - service: etcd
        phase: startup
        required: true
        reason: Reads cluster config and coordinates leader election.

  # ── Event bus ─────────────────────────────────────────────────────────────

  - id: event
    name: event
    summary: Event bus — publish/subscribe for cluster events, backed by ScyllaDB.
    systemd_unit: globular-event.service
    proto_service: event.EventService
    proto_file: proto/event.proto
    implementation:
      - golang/event/event_server/server.go
      - golang/event/event_server/handlers.go
      - golang/event/event_server/scylla_bus.go
      - golang/event/event_server/config.go
    depends_on:
      - service: scylladb
        phase: startup
        required: true
        reason: Persists events and subscriptions in ScyllaDB.
      - service: etcd
        phase: startup
        required: true
        reason: Reads service config.

  # ── Monitoring ────────────────────────────────────────────────────────────

  - id: monitoring
    name: monitoring
    summary: Monitoring service — collects and exposes cluster metrics.
    systemd_unit: globular-monitoring.service
    proto_service: monitoring.MonitoringService
    proto_file: proto/monitoring.proto
    implementation:
      - golang/monitoring/monitoring_server/server.go
      - golang/monitoring/monitoring_server/monitoring.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads cluster config and service endpoints.

  - id: log
    name: log
    summary: Log service — stores and serves service log entries.
    systemd_unit: globular-log.service
    proto_service: log.LogService
    proto_file: proto/log.proto
    implementation:
      - golang/log/log_server/server.go
      - golang/log/log_server/handlers.go
      - golang/log/log_server/config.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads service config.
      - service: scylladb
        phase: startup
        required: false
        reason: Optionally persists log entries.

  # ── AI services ───────────────────────────────────────────────────────────

  - id: ai-memory
    name: ai-memory
    summary: Persistent AI knowledge store — scar tissue for incidents, decisions, and learning.
    systemd_unit: globular-ai-memory.service
    proto_service: ai_memory.AiMemoryService
    proto_file: proto/ai_memory.proto
    implementation:
      - golang/ai_memory/ai_memory_server/server.go
      - golang/ai_memory/ai_memory_server/migration_coordinator.go
