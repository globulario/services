      - service: etcd
        phase: startup
        required: true
        reason: Reads and writes all cluster state.
      - service: repository
        phase: package_install
        required: true
        reason: Resolves artifact versions for reconciliation.
      - service: workflow-service
        phase: reconcile
        required: true
        reason: Dispatches all state-changing cluster workflows.

  - id: node-agent
