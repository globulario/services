services:
  # ── Core infrastructure (no proto service, no implementation listing) ──────

  - id: etcd
    name: etcd
    summary: Distributed key-value store — sole source of truth for all cluster config and state.
    systemd_unit: etcd.service

  - id: scylladb
    name: scylladb
    summary: Distributed database — stores workflow state, AI memory, and service metadata.
    systemd_unit: scylla.service

  - id: minio
    name: minio
    summary: Object store — caches artifact blobs and hosts large binary data.
    systemd_unit: globular-minio.service
    depends_on:
      - service: node-agent
        phase: bootstrap_recovery
        required: false
        reason: Node agent triggers MinIO topology join workflows.

  # ── Control plane ─────────────────────────────────────────────────────────

  - id: cluster-controller
