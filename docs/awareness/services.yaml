  # ── File and storage ──────────────────────────────────────────────────────

  - id: file-service
    name: file-service
    summary: File and object-storage service — manages user files, public directories, indexing, metadata, thumbnails, and web content. Stores blobs in MinIO, metadata in ScyllaDB.
    systemd_unit: globular-file.service
    proto_service: file.FileService
    proto_file: proto/file.proto
    implementation:
      - golang/file/file_server/server.go
      - golang/file/file_server/file_ops.go
      - golang/file/file_server/dir_ops.go
      - golang/file/file_server/storage_helpers.go
      - golang/file/file_server/public_proxy.go
      - golang/file/file_server/indexing_rpc.go
      - golang/file/file_server/path_util.go
      - golang/file/file_server/thumbnails.go
      - golang/file/file_server/metadata.go
    depends_on:
      - service: etcd
        phase: bootstrap
        required: true
        reason: Reads service config and publishes instance record.
      - service: scylladb
        phase: day0
        required: true
        reason: Persists file metadata.
      - service: authentication
        phase: day1
        required: true
        reason: Authenticates all file operations.
      - service: rbac
        phase: day1
        required: true
        reason: Enforces RBAC for upload, download, deletion.
      - service: minio
        phase: day1
        required: true
        reason: Stores file blobs.
      - service: event
        phase: day1
        required: false
        reason: Emits file.uploaded / file.deleted events.
      - service: resource
        phase: day1
        required: false
        reason: Resource registry for file paths and access control.
    authority:
      owns:
        - user_file_paths
        - public_file_paths
        - file_metadata
        - file_indexing_events
      must_not_own:
        - global_cluster_identity
        - root_certificate_authority
    security:
      tls_required: true
      authz_required: true
      streaming_rpcs_require_path_before_write: true

  - id: storage
    name: storage
    summary: Object storage service — general-purpose blob read/write interface over MinIO.
    systemd_unit: globular-storage.service
    proto_service: storage.StorageService
    proto_file: proto/storage.proto
    implementation:
      - golang/storage/storage_server/server.go
      - golang/storage/storage_server/handlers.go
      - golang/storage/storage_server/config.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads service config.
      - service: minio
        phase: startup
        required: true
        reason: Stores and retrieves all blobs.
      - service: authentication
        phase: day1
        required: true
        reason: Validates tokens on storage operations.
      - service: rbac
        phase: day1
        required: true
        reason: Enforces storage access control.

  - id: persistence
    name: persistence
    summary: Persistence service — key-value and collection storage backed by ScyllaDB.
    systemd_unit: globular-persistence.service
    proto_service: persistence.PersistenceService
    proto_file: proto/persistence.proto
