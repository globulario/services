      - golang/node_agent/node_agent_server/xds_config_reconcile.go
      - golang/node_agent/node_agent_server/dns_sync.go
      - golang/node_agent/node_agent_server/infra_health_probe.go
      - golang/node_agent/node_agent_server/hardware.go
      - golang/node_agent/node_agent_server/disk_inventory.go
      - golang/node_agent/node_agent_server/cleanup_disk_journal.go
      - golang/node_agent/node_agent_server/delete_cache_artifact.go
      - golang/node_agent/node_agent_server/event_handler.go
      - golang/node_agent/node_agent_server/event_publisher.go
      - golang/node_agent/node_agent_server/control_service_handler.go
      - golang/node_agent/node_agent_server/actor_service.go
      - golang/node_agent/node_agent_server/backup_provider.go
      - golang/node_agent/node_agent_server/restore_provider.go
      - golang/node_agent/node_agent_server/metrics.go
      - golang/node_agent/node_agent_server/native_dep_check.go
      - golang/node_agent/node_agent_server/operation_tracker.go
      - golang/node_agent/node_agent_server/package_config_pre.go
      - golang/node_agent/node_agent_server/package_revision_post.go
      - golang/node_agent/node_agent_server/scylla_manager_agent_config.go
      - golang/node_agent/node_agent_server/search_logs_handler.go
      - golang/node_agent/node_agent_server/service_discovery.go
      - golang/node_agent/node_agent_server/webroot_sync.go
      - golang/node_agent/node_agent_server/main.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads cluster config, writes node heartbeat.
      - service: repository
        phase: package_install
        required: true
        reason: Downloads artifacts for installation.
      - service: cluster-controller
        phase: registration
        required: true
        reason: Registers with controller on startup.

  - id: workflow-service
    name: workflow-service
    summary: Workflow engine — coordinates multi-step cluster mutations with durable state.
    systemd_unit: globular-workflow.service
    proto_service: workflow.WorkflowService
    proto_file: proto/workflow.proto
    implementation:
      - golang/workflow/workflow_server/server.go
      - golang/workflow/workflow_server/executor.go
      - golang/workflow/workflow_server/executor_lease.go
      - golang/workflow/workflow_server/executor_resume.go
      - golang/workflow/workflow_server/incidents.go
      - golang/workflow/workflow_server/incident_projection.go
      - golang/workflow/workflow_server/step_receipts.go
      - golang/workflow/workflow_server/receipt_failure_classifier.go
      - golang/workflow/workflow_server/infra_release_handler.go
      - golang/workflow/workflow_server/import_day0.go
      - golang/workflow/workflow_server/scylla_reconnect.go
      - golang/workflow/workflow_server/schema.go
      - golang/workflow/workflow_server/metrics.go
    depends_on:
      - service: scylladb
        phase: startup
        required: true
        reason: Stores all workflow state durably.
      - service: etcd
        phase: startup
        required: true
        reason: Reads cluster config and service endpoints.

  - id: cluster-doctor
    name: cluster-doctor
    summary: Health analysis — evaluates invariants, emits findings, triggers remediations.
    systemd_unit: globular-cluster-doctor.service
    proto_service: cluster_doctor.ClusterDoctorService
    proto_file: proto/cluster_doctor.proto
    implementation:
      - golang/cluster_doctor/cluster_doctor_server/server.go
      - golang/cluster_doctor/cluster_doctor_server/executor.go
      - golang/cluster_doctor/cluster_doctor_server/healer_loop.go
      - golang/cluster_doctor/cluster_doctor_server/handler_remediation.go
      - golang/cluster_doctor/cluster_doctor_server/handler_remediation_workflow.go
      - golang/cluster_doctor/cluster_doctor_server/leader_election.go
      - golang/cluster_doctor/cluster_doctor_server/actor_service.go
      - golang/cluster_doctor/cluster_doctor_server/workflow_runner.go
      - golang/cluster_doctor/cluster_doctor_server/node_agent_dialer.go
      - golang/cluster_doctor/cluster_doctor_server/main.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads cluster state and service endpoints.
      - service: cluster-controller
        phase: snapshot
        required: true
        reason: Queries controller for desired/installed/runtime snapshot.

  # ── Identity and access ───────────────────────────────────────────────────

  - id: authentication
    name: authentication
    summary: JWT token issuer and validator — the identity boundary for all Globular services.
    systemd_unit: globular-authentication.service
    proto_service: authentication.AuthenticationService
    proto_file: proto/authentication.proto
    implementation:
      - golang/authentication/authentication_server/server.go
      - golang/authentication/authentication_server/handlers.go
      - golang/authentication/authentication_server/config.go
    depends_on:
      - service: etcd
        phase: startup
        required: true
        reason: Reads signing keys and service config from etcd.

  - id: rbac
    name: rbac
    summary: Permission enforcement — RBAC policies, role bindings, and access decisions.
    systemd_unit: globular-rbac.service
    proto_service: rbac.RbacService
    proto_file: proto/rbac.proto
    implementation:
      - golang/rbac/rbac_server/server.go
      - golang/rbac/rbac_server/rbac_access.go
      - golang/rbac/rbac_server/rbac_actions.go
      - golang/rbac/rbac_server/rbac_cleanup.go
      - golang/rbac/rbac_server/rbac_index.go
      - golang/rbac/rbac_server/rbac_ownership.go
