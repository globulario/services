design_patterns:

  # ── Design Patterns ─────────────────────────────────────────────────────────

  - id: pattern.circuit_breaker
    title: Circuit Breaker
    type: design_pattern
    summary: |
      Stop retrying a failing dependency after N consecutive failures. Open the
      circuit, serve degraded or last-known-good state, and probe for recovery
      on a fixed interval. Never cascade failure into the convergence loop.
    applies_to:
      - golang/cluster_controller/cluster_controller_server/reconciler.go
      - golang/node_agent/node_agent_server/
      - golang/workflow/workflow_server/
    invariants:
      - convergence.no_infinite_retry
      - critical_queries.must_be_bounded
      - service.restart_singleflight
    failure_modes:
      - deterministic.install.failure.retry_loop
      - critical_queries.unbounded_hang
    forbidden_fixes:
      - blind_reconcile_retry
      - treating_all_failures_as_transient
    code_smells:
      - "Retry loop with no circuit state or backoff"
      - "Raw for-loop retry without singleflight gate"
      - "No exponential backoff on reconnect"
      - "context.Background() on hot reconcile call"
    required_tests:
      - TestProjectionHangDoesNotBlockReleaseLane
      - TestQueryTimeoutMappedToDegradedCategory
      - TestSlowBackendTriggersTimeoutAndLaneRecovery
    recommended_searches:
      - "singleflight"
      - "withBounded"
      - "backoff"
      - "circuit"
    examples:
      - "singleflight restart gate in reconciler.go"
      - "withBounded() context deadline in reconciler hot paths"
      - "LKG fallback in ingress_consumer.go"
    safe_fix_rule: >
      Pair every retry with a singleflight gate, an exponential backoff, and a
      bounded context deadline. Serve LKG state when the circuit is open — never
      block the authority-publication lane waiting for a degraded dependency.

  - id: pattern.saga_workflow
    title: Saga Workflow
    type: design_pattern
    summary: |
      Every multi-step cluster mutation is coordinated by the Workflow Service.
      Each step is a durable, compensatable unit of work. The workflow reaches a
      terminal state (SUCCEEDED or FAILED) before any result is treated as
      authoritative. Failed steps emit FAILED — never silently abort.
    applies_to:
      - golang/workflow/workflow_server/
      - golang/cluster_controller/cluster_controller_server/
    invariants:
      - install.result.atomic_commit
      - desired.build_id_immutable
    failure_modes:
      - workflow.backend_unavailable
      - install.result.partial_commit
    forbidden_fixes:
      - clearing_action_without_durable_result
      - dispatch_workflow_when_scylla_down
      - ignore_backend_health_on_dispatch
    code_smells:
      - "Multi-step mutation without workflow coordination"
      - "Direct etcd write from node-agent without workflow receipt"
      - "Compensating action missing for failure path"
      - "Workflow dispatched without backend health gate"
    required_tests:
      - TestWorkflowReachesTerminalState
      - TestWorkflowFailedEmitsFailedNotSilent
    recommended_searches:
      - "workflow_server"
      - "WorkflowService"
      - "completePublish"
      - "terminal"
    examples:
      - "install_workflow.go — atomic commit pattern"
      - "infra_release_handler.go — durable workflow receipt before desired-state write"
    safe_fix_rule: >
      Never write cluster state directly from a reconciler tick. Always dispatch
      a workflow, wait for SUCCEEDED, then consume the receipt as authority.
      If the workflow backend is unhealthy, gate the dispatch — do not skip it.

  - id: pattern.state_machine
    title: Explicit State Machine
    type: design_pattern
    summary: |
      Services and install results have explicit, enumerated states with valid
      transitions. The runtime authority is systemd — not package presence on
      disk, not etcd key existence. State must be queried, never inferred.
    applies_to:
      - golang/node_agent/node_agent_server/
      - golang/cluster_controller/cluster_controller_server/
    invariants:
      - install.result.atomic_commit
      - runtime.installed_state_not_liveness
      - runtime.installed_state_must_match_package_kind
    failure_modes:
      - install.result.partial_commit
      - deterministic.install.failure.retry_loop
    forbidden_fixes:
      - assume_installed_means_running
      - skip_systemd_health_check_if_installed
      - require_systemd_unit_for_command_package
    code_smells:
      - "State expressed as string literals instead of typed constants"
      - "Missing transition guard — direct jump from DESIRED to RUNNING"
      - "Running state inferred from binary-on-disk presence"
      - "Package kind ignored when asserting systemd unit expectations"
    required_tests:
      - TestStateTransitionGuard
      - TestCommandPackageWithNoUnitProducesNoFinding
      - TestServicePackageWithNoUnitProducesFinding
    recommended_searches:
      - "unit_state"
      - "ActiveState"
      - "SubState"
      - "installed_state"
    examples:
      - "rules/installed_state_runtime_mismatch.go — package-kind-driven state machine"
      - "node_agent_server.go — DESIRED→INSTALLING→INSTALLED progression"
    safe_fix_rule: >
      Treat systemd as the runtime oracle. Query service state — never infer it
      from disk. Distinguish COMMAND packages (no unit expected) from SERVICE
      packages (unit required). Enumerate all states and validate every transition.

  - id: pattern.repository_authority
    title: Repository as Artifact Authority
    type: design_pattern
    summary: |
      The Repository service is the sole source of truth for artifact versions,
      build_ids, and publish state. The controller reads from the repository.
      Node agents never call the repository at install time — they receive
      artifact metadata through the controller's desired-state record.
    applies_to:
      - golang/repository/
      - golang/cluster_controller/cluster_controller_server/
      - golang/node_agent/node_agent_server/
    invariants:
      - desired.build_id_immutable
      - runtime.installed_state_must_match_package_kind
    failure_modes:
      - service.desired_state.pipeline_gap
      - release.failed.wave_succeeded_commit_error
      - repository.minio.recovery_cycle
    forbidden_fixes:
      - resolve_build_id_at_install_time
      - overwrite_desired_build_id_silently
      - store_artifact_index_only_in_minio
      - gate_metadata_reads_on_minio_health
      - marking_available_from_local_success_only
    code_smells:
      - "Node-agent calling repository service at install time"
      - "Build identity expressed as version string, not UUID build_id"
      - "MinIO used as source of truth for artifact versions"
      - "Desired state build_id overwritten by later reconcile tick"
    required_tests:
      - TestBuildIDIsUUIDNotVersionString
      - TestDesiredStateBuildIDNotOverwritten
    recommended_searches:
      - "build_id"
      - "GetArtifactVersions"
      - "promoteToPublished"
      - "release-index.json"
    examples:
      - "repository_server.go — Scylla-first publish state"
      - "cluster_controller desired-state write — build_id immutable after first write"
    safe_fix_rule: >
      build_id is a UUID assigned at publish time — it never changes. The
      controller reads it from the repository and stamps it into desired state.
      Node-agent consumes desired state, never calls the repository directly.
      MinIO is a binary cache, not the index.

  - id: pattern.supervisor
    title: Supervisor Pattern for Process Control
    type: design_pattern
    summary: |
      The node-agent uses a restricted supervisor pattern for process management.
      All subprocess control flows through internal/supervisor/. The cluster
      controller never uses os/exec or syscall — it coordinates only through
      typed workflows. Systemd is the runtime authority; node-agent is its
      reconciler, not its replacement.
    applies_to:
      - golang/node_agent/node_agent_server/internal/supervisor/
      - golang/node_agent/node_agent_server/
    invariants:
      - runtime.installed_state_not_liveness
      - runtime.last_known_good_required_for_critical_consumers
    failure_modes:
      - critical_state.absent_key_interpreted_as_stop
      - runtime.lkg_corrupt_or_missing
    forbidden_fixes:
      - assume_installed_means_running
      - stop_runtime_from_ambiguous_disable
    code_smells:
      - "os/exec call outside internal/supervisor/ in node-agent"
      - "syscall or os/exec import in cluster_controller_server"
      - "Service control issued directly from convergence loop without singleflight"
      - "Restart issued without checking current systemd state first"
    required_tests:
      - TestSupervisorRestartIsIdempotent
      - TestMissingKeyDoesNotStopRuntime
    recommended_searches:
      - "internal/supervisor"
      - "systemctl"
      - "os/exec"
      - "singleflight"
    examples:
      - "node_agent_server/internal/supervisor/ — canonical subprocess control"
      - "ingress_consumer.go — absence check before any stop action"
    safe_fix_rule: >
      All subprocess management in node-agent goes through internal/supervisor/.
      cluster_controller must never touch os/exec or systemctl. Any service-stop
      action requires: explicit intent record, explicit approval guard, and
      singleflight to prevent concurrent restarts.

  - id: pattern.leader_election
    title: Leader Election with Write Forwarding
    type: design_pattern
    summary: |
      Only one controller instance is the leader and performs writes. Followers
      forward write RPCs to the leader transparently. Domain, DNS, and
      objectstore reconcilers are gated on leader status — they do not run on
      followers. Leader status is verified on each reconcile tick, not cached.
    applies_to:
      - golang/cluster_controller/cluster_controller_server/
    invariants:
      - service.desired_state.direct_etcd_write
      - derived_state.must_not_block_authority
    failure_modes:
      - reconcile.lane_starvation
      - derived_state.projection_blocks_authority
    forbidden_fixes:
      - require_derived_state_before_publishing_authority
      - block_authority_on_cache_availability
    code_smells:
      - "etcd write without leader status check"
      - "Domain reconciler runs on all nodes simultaneously"
      - "DNS reconciler not gated on leader election"
      - "Leader status cached across ticks"
    required_tests:
      - TestNonLeaderDomainReconcilerIsGated
      - TestProjectionScanHangAllowsIngressRepublish
      - TestDerivedLaneErrorDoesNotFlipAuthorityToBlocked
    recommended_searches:
      - "isLeader"
      - "leaderOnly"
      - "forwardToLeader"
      - "leader election"
    examples:
      - "cluster_controller_server.go — leader-election gate on each tick"
      - "domain reconciler — leader-only guard prevents split-brain"
    safe_fix_rule: >
      Every etcd write path in cluster_controller must verify leader status on
      each invocation. Reconcilers for domain, DNS, objectstore are leader-only.
      Followers forward writes — they never apply writes directly. Authority
      publication cannot block on derived state availability.

  - id: pattern.idempotent_reconciliation
    title: Idempotent Reconciliation Loop
    type: design_pattern
    summary: |
      The reconciler loop runs indefinitely. Every step is safe to replay — it
      reads current state, computes desired delta, and applies only if the delta
      is non-zero. CONVERGED is written only when all four layers agree. No
      reconcile step mutates state before verifying current state first.
    applies_to:
      - golang/cluster_controller/cluster_controller_server/reconciler.go
      - golang/cluster_controller/cluster_controller_server/
    invariants:
      - convergence.no_infinite_retry
      - install.result.atomic_commit
      - reconcile.global_work_must_not_starve_completion
    failure_modes:
      - deterministic.install.failure.retry_loop
      - reconcile.lane_starvation
    forbidden_fixes:
      - blind_reconcile_retry
      - block_controller_loop_on_external_query
      - require_derived_state_before_publishing_authority
    code_smells:
      - "Reconciler step mutates state without reading current state first"
      - "Desired-state comparison skipped — action always applied"
      - "No timeout on reconciler tick — can block indefinitely"
      - "Authority lane blocked waiting for derived-state scan"
    required_tests:
      - TestProjectionHangDoesNotBlockReleaseLane
      - TestScyllaDegradedAllowsIngressRepublish
      - TestTimeoutReleasesLaneLock
    recommended_searches:
      - "reconcile"
      - "convergence"
      - "CONVERGED"
      - "withBounded"
      - "lane"
    examples:
      - "reconciler.go — lane isolation with timeout+status contract"
      - "infrastructure_reconciler.go — ComputeInfrastructureDesiredHash before action"
    safe_fix_rule: >
      Reconcilers must read-compare-write, never write-then-read. CONVERGED is
      a fact, not a target. Authority lanes must always drain regardless of
      derived-state health. Every blocking call needs a bounded context deadline.

  # ── Anti-Patterns ────────────────────────────────────────────────────────────

  - id: antipattern.runtime_observation_as_desired_authority
    title: Runtime Observation as Desired Authority
    type: anti_pattern
    summary: |
      A heartbeat, node-agent health report, or runtime observation writes or
      overwrites the desired-state record in etcd. This inverts the control
      plane: the controller is supposed to set desired state; runtime observers
      are supposed to report installed/running state only.
    applies_to:
      - golang/node_agent/node_agent_server/
      - golang/cluster_controller/cluster_controller_server/
    invariants:
      - infra.heartbeat_not_desired_authority
      - service.desired_state.direct_etcd_write
      - infra.desired_hash_consistency
    failure_modes:
      - deterministic.install.failure.retry_loop
    forbidden_fixes:
      - overwrite_desired_build_id_silently
    code_smells:
      - "Heartbeat writes to /globular/resources/DesiredService/ path"
      - "Node-agent sets desired state without controller approval"
      - "Runtime observation used to bootstrap desired state permanently"
      - "Installed-state hash written to desired-state key"
    required_tests:
      - TestHeartbeatDoesNotWriteDesiredState
      - TestInfrastructureDesiredHashConsistency
    recommended_searches:
      - "DesiredService"
      - "desired_hash"
      - "heartbeat"
      - "HeartBeat"
    examples:
      - "INC-2026-0002 — heartbeat typo wrote installed state to desired path, caused MinIO version drift"
    safe_fix_rule: >
      Heartbeat and node-agent health code may only write to observation paths
      (/globular/nodes/{id}/status, /globular/nodes/{id}/packages/).
      Never write to /globular/resources/DesiredService/ from a node agent.
      Desired hash must use ComputeInfrastructureDesiredHash on both sides.

  - id: antipattern.absence_as_destructive_intent
    title: Absence as Destructive Intent
    type: anti_pattern
    summary: |
      A missing etcd key — from network partition, key expiry, or a Watch
      returning ErrCompacted — is treated as an instruction to stop or delete a
      running service. Absence of a key is never an intent to destroy.
      Destruction requires an explicit, audited approval record.
    applies_to:
      - golang/node_agent/node_agent_server/ingress_reconcile.go
      - golang/node_agent/node_agent_server/minio_systemd_reconcile.go
      - golang/node_agent/node_agent_server/network_reconcile.go
      - golang/node_agent/node_agent_server/dns_sync.go
    invariants:
      - critical_state.absence_is_not_destructive_intent
      - destructive_actions.require_explicit_guard
      - critical_state.deletion_requires_audited_intent
    failure_modes:
      - critical_state.absent_key_interpreted_as_stop
    forbidden_fixes:
      - stop_runtime_from_ambiguous_disable
      - perform_destructive_action_from_inferred_intent
      - delete_runtime_data_from_ambiguous_state
    code_smells:
      - "etcd Watch returns nil/empty — consumer immediately stops the service"
      - "Watch ErrCompacted triggers service shutdown"
      - "Missing key treated as delete intent without approval record"
      - "Service stopped because Watch() fired with no value"
    required_tests:
      - TestMissingKeyDoesNotStopRuntime
      - TestDeleteKeyWhileRunningKeepsRuntimeActive
      - TestDeleteWithoutApprovalRestoresKey
      - TestDeleteWithValidApprovalAccepted
    recommended_searches:
      - "ErrCompacted"
      - "Watch"
      - "stop"
      - "delete"
      - "ingress_consumer"
    examples:
      - "ingress_consumer.go — IsExplicitDisable() guard before any stop"
      - "INC-2026-0004 — missing key from network partition stopped ingress"
    safe_fix_rule: >
      On receiving nil/empty from a Watch: if the service is running, keep it
      running. A stop requires an explicit approval record with a matching
      generation counter. Never infer destructive intent from absence alone.

  - id: antipattern.version_only_identity
    title: Version String as Artifact Identity
    type: anti_pattern
    summary: |
      An artifact is identified by its version string or package name alone,
      rather than its immutable build_id UUID. Version strings are not unique
      across builds — the same version can be rebuilt with a different binary.
      This breaks the downgrade guard, the desired-hash computation, and the
      convergence check.
    applies_to:
      - golang/cluster_controller/cluster_controller_server/
      - golang/node_agent/node_agent_server/
      - golang/repository/
    invariants:
      - desired.build_id_immutable
    failure_modes:
      - service.desired_state.pipeline_gap
    forbidden_fixes:
      - resolve_build_id_at_install_time
      - overwrite_desired_build_id_silently
    code_smells:
      - "Artifact identity expressed as version string, not build_id UUID"
      - "Downgrade guard compares version strings, not build_ids"
      - "Controller desired state references package name only, omits build_id"
      - "build_number (integer) used in place of build_id (UUID)"
    required_tests:
      - TestBuildIDIsUUIDNotVersionString
    recommended_searches:
      - "build_id"
      - "build_number"
      - "version"
      - "downgrade"
    examples:
      - "INC-2026-0003 — version-only identity caused false convergence after rebuild"
    safe_fix_rule: >
      build_id is a UUID assigned once at publish time. It is the only stable
      identifier for a specific build artifact. Never use version strings or
      build_numbers as identity in desired state, convergence checks, or
      the downgrade guard. build_id != build_number.

  - id: antipattern.unbounded_critical_query
    title: Unbounded Critical Query
    type: anti_pattern
    summary: |
      A critical reconcile path — authority publication, desired-state write,
      or convergence committer — issues an etcd or gRPC query with
      context.Background() or no deadline. If the backend is slow or
      unreachable, the reconcile tick hangs indefinitely, starving the
      authority-publication lane.
    applies_to:
      - golang/cluster_controller/cluster_controller_server/reconciler.go
      - golang/dns/dns_server/handlers.go
    invariants:
      - critical_queries.must_be_bounded
      - reconcile.global_work_must_not_starve_completion
    failure_modes:
      - critical_queries.unbounded_hang
      - reconcile.lane_starvation
    forbidden_fixes:
      - block_controller_loop_on_external_query
      - block_authority_on_cache_availability
    code_smells:
      - "etcd.Get or gRPC call with context.Background() in reconciler"
      - "No withBounded() wrapper on hot reconcile path"
      - "External service query blocking the authority publication lane"
      - "DNS reconciler or watcher with no context deadline"
    required_tests:
      - TestQueryTimeoutMappedToDegradedCategory
      - TestSlowBackendTriggersTimeoutAndLaneRecovery
    recommended_searches:
      - "context.Background"
      - "withBounded"
      - "deadline"
      - "timeout"
    examples:
      - "reconciler.go — withBounded() applied to 13 hot paths (2026-05-04)"
      - "dns/dns_server/reconciler.go — not yet audited for bounded context"
    safe_fix_rule: >
      Wrap every etcd and gRPC call on the reconcile hot path with withBounded()
      or an explicit context deadline. Authority-publication lanes must never
      block on derived-state, DNS, or cache availability. Timeout maps to a
      degraded status, not a hang.

  - id: antipattern.partial_truth_promoted_to_authority
    title: Partial Truth Promoted to Authority
    type: anti_pattern
    summary: |
      A bootstrap record, a partial install result, or a single-node success is
      stamped as final cluster-wide authority — without explicit promotion,
      quorum confirmation, or a complete convergence check. Downstream consumers
      then treat this partial truth as the definitive desired state.
    applies_to:
      - golang/cluster_controller/cluster_controller_server/desired_state_handlers.go
      - golang/cluster_controller/cluster_controller_server/workflow_release.go
      - golang/workflow/workflow_server/executor.go
    invariants:
      - desired.bootstrap_state_requires_promotion
      - install.result.atomic_commit
    failure_modes:
      - desired.bootstrap_premature_convergence
      - install.result.partial_commit
    forbidden_fixes:
      - clearing_action_without_durable_result
      - marking_available_from_local_success_only
    code_smells:
      - "Bootstrap record consumed as final desired state without explicit promotion"
      - "Partial install result marked CONVERGED before all layers confirmed"
      - "Local node success stamped as cluster-wide authority"
      - "'authoritative' field set before quorum confirmation"
    required_tests:
      - TestBootstrapRecordIgnoredAsFinalByConsumers
      - TestFirstBootClaimsConvergenceOnlyAfterPromotion
    recommended_searches:
      - "authoritative"
      - "bootstrap"
      - "promotion"
      - "CONVERGED"
    examples:
      - "desired_state_publisher.go — authoritative field stamped; promotion reconciler not implemented"
      - "INC-2026-0001 — premature bootstrap convergence caused install loop"
    safe_fix_rule: >
      Bootstrap defaults are starting points, not authority. A desired-state
      record becomes authoritative only after explicit promotion by an operator
      or promotion reconciler that confirms quorum. Partial install results
      must never be promoted to CONVERGED without all-layer confirmation.
