candidates:
  - id: remediation.test_audit_writes_must_be_isolated_from_production_etcd
    class: invariant
    label: |
      Test suites that invoke ExecuteRemediation must NEVER reach production etcd's
      /globular/cluster_doctor/audit/ namespace.
    source_file: golang/cluster_doctor/cluster_doctor_server/executor.go
    evidence: |
      Patch C M1 and M3 cache cleanup test fixtures called srv.ExecuteRemediation
      directly without stubbing config.GetEtcdClient. On any developer machine where
      /var/lib/globular/pki/* resolved (i.e. any cluster node), the auditRemediation()
      path wrote 13 rem-* rows into production etcd with TTL 30 days, all tagged with
      test fixture finding-ids (finding-hardblock-risk_high_with_token, f-verify-1).
      Fixed structurally in commit a80f7a83 by adding auditEtcdPersistFn package-level
      seam + TestMain swap to a no-op + skipUnlessLiveEtcd opt-in for the rare test
      that genuinely needs production etcd.
    summary: |
      The fix relied on a swappable function value (auditEtcdPersistFn) in
      executor.go. Any future code that reaches etcd from a remediation handler
      must use the same swappable-seam pattern so unit tests can install a no-op
      via TestMain. The principle generalizes: ANY etcd-writing function inside
      cluster_doctor must be swappable via a package-level var so tests cannot
      accidentally hit production.
    protects:
      files:
        - golang/cluster_doctor/cluster_doctor_server/executor.go
        - golang/cluster_doctor/cluster_doctor_server/audit_isolation_test.go
      symbols:
        - auditEtcdPersistFn
        - persistAuditToEtcd
        - withStubbedAuditEtcd
    risk: medium
    confidence: high
    status: candidate
    discovered_from: |
      Patch C audit-leak fix; commit a80f7a83 on services/master @ 2026-06-02 17:35 EDT.
    review_required: true

  - id: preflight.high_risk_no_anchor_must_degrade_not_low_risk
    class: invariant
    label: |
      Preflight must return DEGRADED + UNKNOWN_IMPACT for any file under a
      high-risk directory with zero direct anchors — never LOW_RISK on the
      "graph indexed this file" basis alone.
    source_file: golang/cluster_doctor/cluster_doctor_server/rules/heal_policy.go
    evidence: |
      Before Phase 5 (awareness-graph v0.0.11, commit 1c45551 + 8a00d3a), Preflight
      could return LOW_RISK for unannotated files in high-risk directories: rule 9
      of classifyRisk fell through to LOW_RISK whenever coverage.sufficient=true
      regardless of whether actual anchors were present. The Phase 1 audit showed
      heal_policy.go was patched 3x in Patch C while returning EMPTY. The handler
      gate in preflight.go now escalates Status to DEGRADED and clamps Confidence
      to LOW when the request includes a high-risk file AND directAll is empty.
    summary: |
      This invariant lives ONE level above the classifier rule — it expresses the
      operator-level contract: "silence about a high-risk file is NEVER proof of
      safety". The classifier rule (rule 9) and the handler gate together
      implement it. Any future Preflight refactor that introduces a "graph
      indexing implies LOW_RISK" shortcut for any class of files must be checked
      against this invariant.
    protects:
      files:
        - golang/awareness-graph/golang/server/preflight.go
        - golang/awareness-graph/golang/server/risk_classify.go
      symbols:
        - anyPathInHighRiskDir
        - HighRiskNoAnchorReasonPrefix
    risk: high
    confidence: high
    status: candidate
    discovered_from: |
      Phase 5 design + implementation; awareness-graph v0.0.11; commit 1c45551 +
      8a00d3a + 930d934 @ 2026-06-02 18:00-18:25 EDT.
    review_required: true
