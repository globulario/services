# Session-discovered invariants — review queue, not canonical knowledge.
#
# This file is intentionally NOT picked up by the awareness-graph build
# pipeline. See ../candidates/README.md for the workflow.
#
# Every entry MUST stay status:candidate until explicitly promoted via:
#   scripts/promote-awareness-candidate.py --id <id> --target docs/awareness/invariants.yaml
#
# The two example entries below illustrate the schema using facts
# discovered during Patch C (Phase 5 honest-DEGRADED + the cache
# cleanup test fixture leak). They have NOT been promoted yet — they
# exist here as a worked example of the schema, and to seed a real
# review queue.

candidates:
  - id: remediation.test_audit_writes_must_be_isolated_from_production_etcd
    class: invariant
    label: |
      Test suites that invoke ExecuteRemediation must NEVER reach production etcd's
      /globular/cluster_doctor/audit/ namespace.
    source_file: golang/cluster_doctor/cluster_doctor_server/executor.go
    evidence: |
      Patch C M1 and M3 cache cleanup test fixtures called srv.ExecuteRemediation
      directly without stubbing config.GetEtcdClient. On any developer machine where
      /var/lib/globular/pki/* resolved (i.e. any cluster node), the auditRemediation()
      path wrote 13 rem-* rows into production etcd with TTL 30 days, all tagged with
      test fixture finding-ids (finding-hardblock-risk_high_with_token, f-verify-1).
      Fixed structurally in commit a80f7a83 by adding auditEtcdPersistFn package-level
      seam + TestMain swap to a no-op + skipUnlessLiveEtcd opt-in for the rare test
      that genuinely needs production etcd.
    summary: |
      The fix relied on a swappable function value (auditEtcdPersistFn) in
      executor.go. Any future code that reaches etcd from a remediation handler
      must use the same swappable-seam pattern so unit tests can install a no-op
      via TestMain. The principle generalizes: ANY etcd-writing function inside
      cluster_doctor must be swappable via a package-level var so tests cannot
      accidentally hit production.
    protects:
      files:
        - golang/cluster_doctor/cluster_doctor_server/executor.go
        - golang/cluster_doctor/cluster_doctor_server/audit_isolation_test.go
      symbols:
        - auditEtcdPersistFn
        - persistAuditToEtcd
        - withStubbedAuditEtcd
    risk: medium
    confidence: high
    status: candidate
    discovered_from: |
      Patch C audit-leak fix; commit a80f7a83 on services/master @ 2026-06-02 17:35 EDT.
    review_required: true

  - id: preflight.high_risk_no_anchor_must_degrade_not_low_risk
    class: invariant
    label: |
      Preflight must return DEGRADED + UNKNOWN_IMPACT for any file under a
      high-risk directory with zero direct anchors — never LOW_RISK on the
      "graph indexed this file" basis alone.
    source_file: golang/cluster_doctor/cluster_doctor_server/rules/heal_policy.go
    evidence: |
      Before Phase 5 (awareness-graph v0.0.11, commit 1c45551 + 8a00d3a), Preflight
      could return LOW_RISK for unannotated files in high-risk directories: rule 9
      of classifyRisk fell through to LOW_RISK whenever coverage.sufficient=true
      regardless of whether actual anchors were present. The Phase 1 audit showed
      heal_policy.go was patched 3x in Patch C while returning EMPTY. The handler
      gate in preflight.go now escalates Status to DEGRADED and clamps Confidence
      to LOW when the request includes a high-risk file AND directAll is empty.
    summary: |
      This invariant lives ONE level above the classifier rule — it expresses the
      operator-level contract: "silence about a high-risk file is NEVER proof of
      safety". The classifier rule (rule 9) and the handler gate together
      implement it. Any future Preflight refactor that introduces a "graph
      indexing implies LOW_RISK" shortcut for any class of files must be checked
      against this invariant.
    protects:
      files:
        - golang/awareness-graph/golang/server/preflight.go
        - golang/awareness-graph/golang/server/risk_classify.go
      symbols:
        - anyPathInHighRiskDir
        - HighRiskNoAnchorReasonPrefix
    risk: high
    confidence: high
    status: candidate
    discovered_from: |
      Phase 5 design + implementation; awareness-graph v0.0.11; commit 1c45551 +
      8a00d3a + 930d934 @ 2026-06-02 18:00-18:25 EDT.
    review_required: true

  - id: join.mesh_reload_must_not_terminalize_install_retries
    class: failure_mode
    label: |
      During Day-1 join, envoy/xds mesh reload makes :443 transiently refuse
      connections; a node-agent install step that fails on that transient is
      recorded terminally for some packages and never retried — the package
      stays "not installed" (with its unit flapping) until an operator bumps
      the desired generation.
    source_file: golang/node_agent/node_agent_server/main.go
    evidence: |
      2026-06-12 globule-dell join (node 4c2b3cb3): at 20:43:03 the workflow
      step install_workloads FAILED for all 25 SERVICE packages with "resolve
      package version: ... dial tcp 10.0.0.63:443: connect: connection
      refused" — envoy was mid-reload from the xds topology push for the new
      node. The Day-0 fallback also failed correctly (release-index.json does
      not exist on Day-1 nodes). Convergence subsequently re-installed 24/25
      packages, but ai-watcher's retry was never dispatched; its unit file
      (laid down before the binary) flapped failed/failed x10 until
      start-limit. Fix: `globular services desired set ai-watcher 1.2.208`
      (idempotent re-assert) bumped the generation and the install completed
      in under a minute. Same family as INC-2026-0017 (wave-blocked workflow
      result must dispatch retry) and meta.write_creates_completion_obligation
      (desired state creates an install obligation that a transient dial
      error must not silently cancel). Sibling smell: unit-file-before-binary
      is meta.half_done_must_not_look_done.
    proposed_required_test: |
      A node_agent test where the repository dial fails transiently during
      install_workloads must assert a retry is dispatched (or the action is
      left in a retryable, non-terminal state) — not a permanent FAILED with
      no successor.
    status: candidate
    discovered_from: |
      Live dell join repair driven by awareness_diagnose + node-agent log
      walk; awareness-graph 0.0.23; 2026-06-12 ~00:40-01:00 UTC.
    review_required: true

  - id: repository.day1_repository_instance_must_seed_local_cas_from_staged_packages
    class: invariant
    label: |
      A repository instance starting on a freshly joined node must seed its
      local POSIX CAS from the staged join packages (digest-gated against the
      Scylla manifest authority) before it can be considered a full replica —
      Scylla metadata without local blobs is a half-replica that floods the
      doctor with scope-blind missing_blob findings.
    source_file: golang/repository/repository_server/blob_seed.go
    evidence: |
      2026-06-12 dell + nuc joins: 57 missing_blob_for_published_manifest
      findings from the new instances' empty local CAS while all 236 blobs sat
      intact on ryzen. The implied cross-node transport was a MinIO blob
      mirror tier, contradicting the packages-never-in-MinIO hard rule;
      operator removed the mirror and the day-1 seeder shipped in v1.2.210
      (TestBlobSeed_* encode the contract). Related principle observed in the
      same incident: blob findings must carry their instance scope
      (meta.assertions_must_carry_their_scope) — already stamped in evidence
      fields, still absent from doctor summary lines.
    proposed_required_test: |
      TestBlobSeed_PublishedWithMatchingStagedArchiveIsSeeded and siblings
      (already exist, v1.2.210); a day-1 integration assertion that a joined
      node reports zero missing_blob findings within one seeding pass.
    status: candidate
    discovered_from: |
      Live multi-node join debugging via doctor findings + repository
      explain_artifact + code walk; fixed same-day in v1.2.210.
    review_required: true
