guardrails:
  - id: config_ownership
    title: Package install may seed defaults only if missing. Live config is owned by controller/node-agent/workflow/identity.
    priority: P1
    status: DONE
    category: configuration
    target_invariants:
      - install.result.atomic_commit
    required_fixes:
      - config_seed_protection
    summary: DONE 2026-06-28. Current package metadata layout is enforced by the seed guard; audited cluster-owned config seeds fail closed when specs are missing, ambiguous, or lack skip_if_exists.

  - id: join_script_safety
    title: Day-1 joins existing truth. It does not invent local truth.
    priority: P1
    status: DONE
    category: day1
    target_invariants:
      - convergence.no_infinite_retry
    required_fixes:
      - join_script_safety
    summary: Complete 2026-05-03, 20 tests pass.

  - id: infra_drift
    title: AVAILABLE is not a memory. AVAILABLE must remain true.
    priority: P1
    status: DONE
    category: infrastructure
    target_invariants:
      - runtime.installed_state_not_liveness
    required_fixes:
      - infra_drift_detection
    summary: Complete 2026-05-03, 15 components.

  - id: desired_hash_identity
    title: Infrastructure convergence must use canonical DesiredHash throughout.
    priority: P0
    status: DONE
    category: convergence
    target_invariants:
      - infra.desired_hash_consistency
    required_fixes:
      - desired_hash_consistency
    summary: DONE 2026-05-07. Convergence paths use canonical DesiredHash, not artifact digest; required tests cover controller, workflow, doctor, MCP, and debug-session paths.

  - id: critical_state_absence_guard
    title: Missing control-plane key must never stop or delete runtime
    priority: P0
    status: DONE
    category: safety
    target_invariants:
      - critical_state.absence_is_not_destructive_intent
    required_fixes:
      - absence_as_destructive_intent
    summary: DONE 2026-06-28. Ingress, objectstore, xDS/Envoy, and DNS consumers hold or restore last-known-good state when control-plane state is absent; missing state is not delete/stop intent.

  - id: lkg_required_for_critical_consumers
    title: LKG must cover all critical runtime consumers
    priority: P1
    status: DONE
    category: resilience
    target_invariants:
      - runtime.last_known_good_required_for_critical_consumers
    required_fixes:
      - lkg_expansion
    summary: DONE 2026-05-07. Shared LKG plus ingress, DNS, MinIO/objectstore contract, and Envoy/xDS consumers are covered by required tests.

  - id: critical_registry_completeness
    title: Every critical key must have registered owner, schema, and policy
    priority: P1
    status: DONE
    category: governance
    target_invariants:
      - critical_state.registry_ownership_required
    required_fixes:
      - critical_state_registry_ownership
    summary: DONE 2026-05-07. CriticalKeyPolicies are declarative and doctor emits registry-completeness findings.

  - id: bootstrap_promotion_guard
    title: Bootstrap state must never become authoritative without promotion
    priority: P1
    status: DONE
    category: desired_state
    target_invariants:
      - desired.bootstrap_state_requires_promotion
    required_fixes:
      - bootstrap_state_promotion
    summary: DONE 2026-05-07. Bootstrap labels are stamped and promotion reconciler promotes only after AVAILABLE.

  - id: topology_safety_gate
    title: Drift reconciler must always run topology safety preflight
    priority: P0
    status: DONE
    category: safety
    target_invariants:
      - topology.reconciler_must_respect_safety_contract
    required_fixes:
      - topology_safety_drift_reconciler
    summary: DONE 2026-05-07. Drift action planner applies per-action safety gates; safe SERVICE/COMMAND work can continue while unsafe INFRASTRUCTURE drift is blocked.

  - id: bounded_queries_everywhere
    title: All critical control-path queries must have bounded context
    priority: P0
    status: DONE
    category: resilience
    target_invariants:
      - critical_queries.must_be_bounded
    required_fixes:
      - bounded_critical_queries
    summary: DONE 2026-05-07. Thirteen hot paths plus DNS reconciler are bounded and timeout maps to degraded state.

  - id: destructive_action_guards
    title: All destructive actions require explicit guard and audit
    priority: P0
    status: DONE
    category: safety
    target_invariants:
      - destructive_actions.require_explicit_guard
    required_fixes:
      - destructive_action_guards
    summary: DONE 2026-05-07. IsExplicitDisable guards runtime stop and doctor emits proactive unguarded-disable findings.

  - id: scylla_rf_policy
    title: Critical Scylla keyspace RF must match storage node count policy
    priority: P1
    status: DONE
    category: database_resilience
    target_invariants:
      - scylla.critical_keyspace_replication_policy
    required_fixes:
      - scylla_critical_keyspace_rf_policy
    summary: Done 2026-05-04. Schema guard wired, doctor finding emitted.
