        - go test ./golang/cluster_doctor/cluster_doctor_server/render/ -run "TestOverallStatus"

  - id: test.artifact_state_distinguishes_unknown_from_legacy
    title: readArtifactState must return PipelineUnknown on store-unreachable, not PipelineUnspecified
    protects:
      invariants:
        - meta.fallback_must_degrade_semantics
