required_tests:
  - id: test.desired_build_id_immutable_after_write
    title: Desired build_id must not change after resolution
    protects:
      invariants:
        - desired.build_id_immutable
      failure_modes:
        - minio.version_drift_auth_failure
    required_for_changes:
      paths:
        - golang/cluster_controller/**
        - golang/node_agent/**
      task_terms:
        - build_id
        - desired state
        - convergence
        - version resolution
    commands:
      - go test ./golang/cluster_controller/... -run BuildID
      - go test ./golang/node_agent/... -run DesiredState
    evidence:
      - desired build_id cannot be overwritten once set
      - drift comparison uses build_id not version string

  - id: test.heartbeat_does_not_write_desired_state
    title: Heartbeat must only write observed/installed state, never desired state
    protects:
      invariants:
        - infra.heartbeat_not_desired_authority
      failure_modes:
        - node_agent.state_poisoning_from_stale_reconciler
    required_for_changes:
      paths:
        - golang/node_agent/**
      task_terms:
        - heartbeat
        - installed state
        - observed state
        - node agent
    commands:
      - go test ./golang/node_agent/... -run Heartbeat
    evidence:
      - heartbeat writes only to installed/runtime keys
      - no writes to /globular/resources/DesiredService/ from node agent

  - id: test.absent_key_does_not_stop_service
    title: Missing desired state key must not trigger service stop
    protects:
      invariants:
        - critical_state.absence_is_not_destructive_intent
      failure_modes:
        - critical_state.absent_key_interpreted_as_stop
    required_for_changes:
      paths:
        - golang/cluster_controller/**
        - golang/node_agent/**
      task_terms:
        - key not found
        - desired state
        - stop service
        - delete
    commands:
      - go test ./golang/cluster_controller/... -run AbsentKey
      - go test ./golang/node_agent/... -run MissingKey
    evidence:
      - service continues running when desired state key is absent
      - explicit delete intent required before stopping service

  - id: test.pkill_uses_x_flag_not_f_flag
    title: pkill must use -x (exact match) not -f (argv match)
    protects:
      invariants: []
      failure_modes:
        - mcp.orphan_port_hold
    required_for_changes:
      paths:
        - packages/metadata/**
        - golang/node_agent/**
      task_terms:
        - pkill
        - process kill
        - service stop
        - ExecStartPre
    commands:
      - grep -r "pkill -f" packages/metadata/ golang/ && exit 1 || exit 0
    evidence:
      - pkill -f matches parent shell argv and causes self-SIGKILL
      - pkill -x matches exact binary name only

  - id: test.install_result_committed_to_etcd
    title: Install success must be committed to etcd before returning
    protects:
      invariants:
        - infra.heartbeat_not_desired_authority
      failure_modes:
        - install.result.partial_commit
    required_for_changes:
      paths:
        - golang/node_agent/**
      task_terms:
        - install
        - commit
        - etcd
        - node agent
    commands:
      - go test ./golang/node_agent/... -run InstallResult
    evidence:
      - etcd write succeeds before install RPC returns
      - partial commit is detected and retried

  - id: test.released_artifact_immutable_different_digest
    title: Published artifact content is immutable — same version must mean same digest
    protects:
      invariants:
        - repository.artifact.content_immutable_after_publish
      files:
        - golang/repository/repository_server/allocate_upload.go
        - golang/repository/repository_server/import_provisional.go
    run:
      commands:
        - go test ./golang/repository/... -run TestINV1_ReleasedArtifactImmutable

  - id: test.installer_refuses_local_fallback_on_orphaned
    title: Installer must reject local fallback when repository marks artifact orphaned
    protects:
      invariants:
        - repository.desired_build_id_is_hard_reachability_root
      files:
        - golang/repository/repository_server/resolver.go
    run:
      commands:
        - go test ./golang/repository/... -run TestInstallerRefusesLocalFallbackOnOrphaned

  - id: test.desired_build_id_deletion_blocked
    title: Deletion and revocation of a desired build_id must be blocked by reachability guard
    protects:
      invariants:
        - repository.desired_build_id_is_hard_reachability_root
      files:
        - golang/repository/repository_server/reachability_guard.go
    run:
      commands:
        - go test ./golang/repository/... -run "TestDeletionSafety_DesiredBuildID|TestRevokeSafety_DesiredBuildID|TestDesiredBuildIDImmutableAfterWrite"

  - id: test.workflow_dispatch_refused_when_scylla_down
    title: Workflow dispatch must return Unavailable while Scylla session is reconnecting
    protects:
      failure_modes:
        - scylla.workflow_reconnect_concurrent_storm
        - workflow.scylla_session_nil_drops_to_unavailable
      files:
        - golang/workflow/workflow_server/scylla_reconnect.go
    run:
      commands:
        - go test ./golang/workflow/... -run "TestWorkflowDispatchRefusedWhenScyllaDown|TestNoConcurrentReconnectStorm"

  - id: test.profile_catalog_bijection_invariant
    title: All profiles must have at least one component; all referenced profiles must be defined
    protects:
      invariants:
        - cluster.founding_profiles_quorum_immutable
      files:
        - golang/cluster_controller/cluster_controller_server/profiles_normalize.go
    run:
      commands:
        - go test ./golang/cluster_controller/... -run "TestValidateCatalog"

  - id: test.grpc_backbone_contract
    title: All RPCs must include cluster_id and respect call-depth limits after cluster init
    protects:
      files:
        - golang/mcp/aggregator_policy.go
        - golang/interceptors/acc.go
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestGrpcBackboneContract"

  - id: test.upload_bundle_artifact_key_format
    title: UploadBundle dual-write must use 5-field artifact key with build_number=0
    protects:
      invariants:
        - repository.build_id_server_generated_not_client_driven
      files:
        - golang/repository/repository_server/allocate_upload.go
    run:
      commands:
        - go test ./golang/repository/... -run "TestUploadBundleDualWrite"

  - id: test.config_listener_uses_0000_not_loopback
    title: Service listeners must bind to 0.0.0.0, never 127.0.0.1
    protects:
      invariants:
        - etcd.is_source_of_truth
      files:
        - golang/config/minio_config.go
    run:
      commands:
        - go test ./golang/config/... -run "TestListenerBind_Uses0000_NotLoopback"

  - id: test.vip_holder_from_runtime_not_profile
    title: VIP holder must be derived from runtime VRRP status, not node profile
    protects:
      failure_modes:
        - vip_contamination.node_routable_ip_returns_vip
      files:
        - golang/config/minio_config.go
    run:
      commands:
        - go test ./golang/config/... -run "TestVIPHolder_DerivedFromRuntimeStatus_NotProfile|TestVIPHolder_ReflectsActualMaster"

  - id: test.workflow_drain_catches_queued_requests
    title: Workflow drain on startup must process queued requests before accepting new ones
    protects:
      invariants:
        - workflow.dispatch_is_not_completion
      files:
        - golang/workflow/workflow_server/scylla_reconnect.go
    run:
      commands:
        - go test ./golang/workflow/... -run "TestDrainOnStartupCatchesQueuedRequest"

  - id: test.resolver_filter_excludes_blob_verified
    title: Resolver must exclude BLOB_VERIFIED artifacts — only PUBLISHED is installable
    protects:
      invariants:
        - repository.artifact.installable_compound_predicate
        - repository.published_requires_verified_manifest
      files:
        - golang/repository/repository_server/resolver.go
    run:
      commands:
        - go test ./golang/repository/... -run "TestResolverFilter_ExcludesNonInstallableStates"

  - id: test.reconciler_no_downgrade_without_force
    title: Reconciler must not downgrade a package version without Force=true
    protects:
      invariants:
        - node.package_downgrade_requires_force_flag
      files:
        - golang/node_agent/node_agent_server/apply_package_release.go
    run:
      commands:
        - go test ./golang/repository/... -run "TestReconcilerNoDowngradeWithoutForce"

  - id: test.service_errors_when_etcd_unreachable
    title: Services must return errors (not stale defaults) when etcd is unreachable
    protects:
      invariants:
        - etcd.is_source_of_truth
      files:
        - golang/config/etcd_client.go
    run:
      commands:
        - go test ./golang/config/... -run "TestServiceErrorsWhenEtcdUnreachable"

  - id: test.doctor_leader_blocks_follower_remediation
    title: Cluster-doctor follower must return UNAVAILABLE for all remediation RPCs
    protects:
      invariants:
        - doctor.remediation_requires_leader
      failure_modes:
        - doctor.approval_token_replay_across_failover
    required_for_changes:
      paths:
        - golang/cluster_doctor/**
      task_terms:
        - leader election
        - remediation
        - healer
        - follower
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestFollowerRemediationBlocked"

  - id: test.doctor_hard_blocked_actions_rejected
    title: ETCD_PUT, ETCD_DELETE, NODE_REMOVE must return BLOCKED from the remediation gate
    protects:
      invariants:
        - doctor.hard_blocked_actions_never_execute
    required_for_changes:
      paths:
        - golang/cluster_doctor/**
      task_terms:
        - hard block
        - remediation gate
        - failure policy
        - ETCD_PUT
        - NODE_REMOVE
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestHardBlockedActionsRejected"

  - id: test.doctor_escalation_after_three_cooldown_rejections
    title: Three cooldown rejections must flip requires_approval and block further auto-dispatch
    protects:
      invariants:
        - doctor.escalation_threshold_gates_repeated_attempts
      failure_modes:
        - doctor.escalation_state_lost_on_restart
    required_for_changes:
      paths:
        - golang/cluster_doctor/**
      task_terms:
        - escalation
        - cooldown
        - remediation gate
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestEscalationAfterThreeCooldowns"

  - id: test.doctor_evidence_stale_blocks_execution
    title: Remediation execution must be blocked when evidence age exceeds MaxEvidenceAge
    protects:
      invariants:
        - doctor.evidence_trust_must_be_authoritative_for_execution
      failure_modes:
        - doctor.stale_evidence_authorizes_remediation
    required_for_changes:
      paths:
        - golang/cluster_doctor/**
      task_terms:
        - evidence trust
        - evidence age
        - stale evidence
        - provenance
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestStaleEvidenceBlocksExecution"

  - id: test.doctor_approval_token_binding_prevents_replay
    title: Replayed approval token (same JTI) must be rejected even after leader failover
    protects:
      invariants:
        - doctor.approval_token_binding_prevents_replay
      failure_modes:
        - doctor.approval_token_replay_across_failover
    required_for_changes:
      paths:
        - golang/cluster_doctor/**
      task_terms:
        - approval token
        - JTI
        - replay
        - leader failover
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestApprovalTokenJTIReplay"

  - id: test.doctor_cache_not_poisoned_by_node_scope
    title: Node-scoped findings must not appear in cluster-delta lastEmittedFindings
    protects:
      invariants:
        - doctor.cache_separation_prevents_delta_poisoning
      failure_modes:
        - doctor.cache_poisoning_from_node_scoped_findings
    required_for_changes:
      paths:
        - golang/cluster_doctor/**
      task_terms:
        - cache findings
        - delta
        - finding scope
        - node scope
    run:
      commands:
        - go test ./golang/cluster_doctor/... -run "TestCacheScopeNotPoisonedByNodeFindings"

  - id: test.heal_audit_jsonl_bounded_by_rotation
    title: HealAuditStore must rotate the JSONL file at maxBytes to enforce diagnostic_output_must_be_bounded
    protects:
      invariants:
        - meta.diagnostic_output_must_be_bounded
    required_for_changes:
      paths:
        - golang/cluster_doctor/cluster_doctor_server/rules/heal_audit.go
      task_terms:
        - heal audit
        - audit jsonl
        - rotation
        - diagnostic bound
    run:
      commands:
        - go test ./golang/cluster_doctor/cluster_doctor_server/rules/ -run "TestHealAuditStore"
