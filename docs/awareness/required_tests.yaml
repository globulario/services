  notes: "Implemented 2026-06-05 in workflow_server/import_day0_test.go.\nApproach (b) from the prior deferred-list was chosen: the COUNT\nquery and the write path were extracted into package-level\nfunction variables (day0CountExistingFn, day0WriteRunFn) that\ntests can override.\n\nThree tests pin the invariant:\n  - TestImportDay0Trace_MissingLogIsSilent (BEST-EFFORT: missing\n    log file silently returns; no Scylla needed)\n  - TestImportDay0Trace_NilSessionIsSilent  (BEST-EFFORT: log\n    file exists but session is nil \u2192 silent return)\n  - TestImportDay0Trace_IdempotentAcrossRestarts (IDEMPOTENT: a\n    second call with existing>0 must NOT call the write seam,\n    even with the log file present and the parser returning\n    valid lines)\n\nTest seams used in production unchanged: day0CountExistingFn\nwraps getSession + COUNT, day0WriteRunFn wraps the StartRun +\nRecordStep block, both calling through to the same code as\nbefore refactor.\n"
