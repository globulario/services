        - recovery fence
        - reseed
        - reconciliation paused
    run:
      commands:
        - go test ./golang/cluster_controller/cluster_controller_server/ -run "TestIsNodeUnderRecoveryState|TestReconcilerSkipsNodeWhenRecoveryPaused"

  - id: test.installed_state_unobservable_preserves_day0_grace
    title: GetNodeHealthDetailV1 must preserve Day-0 grace when installed-state is unobservable
    protects:
      invariants:
        - meta.authority_must_express_uncertainty
        - health.must_not_use_inventory_as_runtime_truth
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/handlers_health.go
      task_terms:
        - loadInstalledUnixForNode
        - Day-0 grace
        - decideVersionVerdictWithInstallTime
        - runtime_identity_unproven
    run:
      commands:
        - go test ./golang/cluster_controller/cluster_controller_server/ -run "TestDecideVersionVerdictWithInstallTime"

  - id: test.config_policy_observability_propagates_to_caller
    title: applyConfigPolicyPreInstall must distinguish observable-empty from unreachable-repository
    protects:
      invariants:
        - meta.authority_must_express_uncertainty
        - install.join_path_must_complete_install_contract
    required_for_changes:
      paths:
        - golang/node_agent/node_agent_server/package_config_pre.go
        - golang/node_agent/node_agent_server/apply_package_release.go
      task_terms:
        - applyConfigPolicyPreInstall
        - FAIL_ON_LOCAL_MODIFICATION
        - config policy observable
        - dial repository
    run:
      commands:
        - go test ./golang/node_agent/node_agent_server/ -run "TestApplyConfigPolicy"

  - id: test.workflow.deferred_run_retryable_after_cooldown
    title: Deferred runs must skip dispatch during cooldown and resume after — WF-DEFER B2 contract
    protects:
      invariants:
        - workflow.deferred_run_retryable_when_blocker_clears
      failure_modes:
        - workflow.abandoned_defer_never_retried
      files:
        - golang/workflow/workflow_server/executor_defer.go
        - golang/workflow/workflow_server/executor_defer_test.go
    required_for_changes:
      paths:
        - golang/workflow/workflow_server/executor_defer.go
        - golang/workflow/workflow_server/executor.go
      task_terms:
        - shouldSkipForDeferral
        - findActiveDeferredRun
        - deferred run
        - cooldown
        - BackoffUntilMs
        - WF-DEFER
    run:
      commands:
        - go test ./golang/workflow/workflow_server/ -run "TestSchedulerSkipsDeferredBeforeCooldown|TestSchedulerResumesAfterCooldown|TestSchedulerIgnoresNonDeferredStatuses|TestSchedulerHandlesNilLatestRun"
    evidence:
      - cooldown is enforced before BackoffUntilMs
      - run becomes dispatchable after cooldown expires
      - non-deferred statuses are unaffected by the scheduler skip

  - id: test.workflow.abandoned_defer_requires_operator_clear
    title: ABANDONED defer must short-circuit dispatch ahead of cooldown and survive workflow-server restart
    protects:
      invariants:
        - workflow.deferred_run_retryable_when_blocker_clears
      failure_modes:
        - workflow.abandoned_defer_never_retried
      files:
        - golang/workflow/workflow_server/correlation_defer_state.go
        - golang/workflow/workflow_server/correlation_defer_state_rpc.go
        - golang/workflow/workflow_server/correlation_defer_state_test.go
        - golang/workflow/workflow_server/executor.go
    required_for_changes:
      paths:
        - golang/workflow/workflow_server/correlation_defer_state.go
        - golang/workflow/workflow_server/correlation_defer_state_rpc.go
        - golang/workflow/workflow_server/executor.go
      task_terms:
        - correlation_defer_state
        - ABANDONED
        - max_defers
        - WakeDeferredRunsByBlockerTag
        - defer-state clear
        - WF-DEFER B3
        - WF-DEFER B4
    run:
      commands:
        - go test ./golang/workflow/workflow_server/ -run "TestShouldSkipForAbandoned|TestNextDeferStateAbandonsAtMax|TestDispatchOrderAbandonedBeforeCooldown|TestMemoryStoreSurvivesWorkflowServerRestart|TestMemoryStoreClearByOperator|TestWakePreservesDeferCount|TestWakeIgnoresAbandoned|TestFindByBlockerTag_MatchesNonAbandoned"
    evidence:
      - ABANDONED short-circuits dispatch ahead of cooldown check
      - defer counter and ABANDONED bit survive workflow-server restart
      - wake-by-blocker-tag preserves defer counter (does not reset)
      - wake skips ABANDONED rows
      - operator clear is the only path back to dispatchable for ABANDONED

  - id: test.workflow.stale_release_callback_generation_guard
    title: Stale workflow completion callback must not overwrite a newer release phase — generation guard
    protects:
      invariants: []
      failure_modes:
        - workflow.stale_release_callback_overwrites_generation
      files:
        - golang/cluster_controller/cluster_controller_server/workflow_release.go
        - golang/cluster_controller/cluster_controller_server/release_pipeline.go
        - golang/workflow/workflow_server/executor.go
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/workflow_release.go
        - golang/cluster_controller/cluster_controller_server/release_pipeline.go
