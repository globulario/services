        - go test ./golang/cluster_doctor/cluster_doctor_server/rules/ -run "TestHealAuditStore"

  - id: test.cluster_status_rollup_degrades_on_incomplete_data
    title: overallStatus must NOT report CLUSTER_HEALTHY when DataIncomplete=true
    protects:
      invariants:
        - meta.fallback_must_degrade_semantics
      failure_modes:
