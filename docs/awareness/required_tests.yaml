  - id: test.workflow.receipt_classification_monotonic_and_conservative
    title: Receipt classification must be monotonic (SUCCEEDED never reclassified) and conservative (unknown is RETRY, not success)
    protects:
      invariants:
        - workflow.receipt_classification_monotonic_and_conservative
        - workflow.dispatch_is_not_completion
        - workflow.success_requires_backend_confirmation
      failure_modes:
        - fm.industry.optimistic_success_for_irreversible_action
      files:
        - golang/workflow/workflow_server/receipt_failure_classifier.go
        - golang/workflow/workflow_server/receipt_failure_classifier_test.go
        - golang/workflow/workflow_server/step_receipts.go
    required_for_changes:
      paths:
        - golang/workflow/workflow_server/receipt_failure_classifier.go
        - golang/workflow/workflow_server/step_receipts.go
      task_terms:
        - classifyStepFailureForReceipt
        - stepReceiptMeta
        - RETRY_LATER
        - BLOCKED
        - auto_retry
        - unblock_signals
    run:
      commands:
        - go test ./golang/workflow/workflow_server/ -run "TestClassifyStepFailureForReceipt_NativeDependencyMissing|TestClassifyStepFailureForReceipt_TransientTimeout|TestBuildStepReceiptPayload_BlockedFields|TestReceiptClassificationMonotonic_SucceededNeverReclassified|TestReceiptClassificationConservative_UnknownIsRetryNotSuccess"
    evidence:
      - existing classifier branches preserve auto_retry and unblock_signals for transient/blocked
      - SUCCEEDED receipts are not retracted by later observations
      - unknown error strings default to RETRY_LATER, never to success
    status: partial
    no_test_yet_reason: |
      TestReceiptClassificationMonotonic_SucceededNeverReclassified and
      TestReceiptClassificationConservative_UnknownIsRetryNotSuccess
      are TODO. Three existing tests
      (TestClassifyStepFailureForReceipt_NativeDependencyMissing,
      TestClassifyStepFailureForReceipt_TransientTimeout,
      TestBuildStepReceiptPayload_BlockedFields) cover the per-case
      classification but neither monotonicity (success not retractable)
      nor the conservative default (unknown → RETRY) is asserted.
      Implementing these two tests is the next code patch after this
      coverage entry lands.

  - id: test.workflow.day0_trace_import_idempotent_and_best_effort
    title: Day-0 install trace replay must be idempotent across restarts and silent on missing inputs
    protects:
      invariants:
        - workflow.day0_trace_import_is_idempotent_and_best_effort
      files:
        - golang/workflow/workflow_server/import_day0.go
    required_for_changes:
      paths:
        - golang/workflow/workflow_server/import_day0.go
      task_terms:
        - importDay0Trace
        - day0-install
        - day0LogPath
        - Day-0 trace
        - workflow_runs replay
    run:
      commands:
        - go test ./golang/workflow/workflow_server/ -run "TestImportDay0Trace_IdempotentAcrossRestarts|TestImportDay0Trace_MissingLogIsSilent|TestImportDay0Trace_NilSessionIsSilent"
    evidence:
      - second call with same correlation_id produces zero new workflow_runs
      - missing /var/lib/globular/day0-install.jsonl silently returns
      - nil Scylla session silently returns; no panic, no error
    status: partial
    no_test_yet_reason: |
      2 of 3 tests implemented as of 2026-06-05 in
      workflow_server/import_day0_test.go:
        - TestImportDay0Trace_MissingLogIsSilent (pins BEST-EFFORT
          rule: missing log file silently returns; no Scylla needed)
        - TestImportDay0Trace_NilSessionIsSilent  (pins second half
          of BEST-EFFORT: log file exists but session is nil →
          silent return)
      Added day0LogPath as a var (was const) to enable path override.

      TestImportDay0Trace_IdempotentAcrossRestarts is still TODO.
      It pins the IDEMPOTENT rule: a second call to importDay0Trace
      with the same correlation_id="day0-install" must produce zero
      new workflow_runs rows. Implementing requires either:
        (a) a memory-backed gocql session mock — gocql doesn't expose
            a clean interface, so this is a non-trivial adapter;
        (b) extracting the COUNT-check + StartRun-call paths behind
            function-variable test seams that tests can override; OR
        (c) an integration-test harness with a real Scylla.
      Deferred pending one of those three approaches being chosen.
      The silent-path tests already cover the BEST-EFFORT half of
      the invariant; the IDEMPOTENT half awaits the harness.

