required_tests:
- id: TestIsBuiltinSuperadmin
  title: Built-in superadmin "sa" recognized by one canonical predicate (@domain-stripped, case-insensitive)
  protects:
    failure_modes:
    - rbac.authority_recognition_predicate_drift_across_sites
    files:
    - golang/rbac/rbac_server/rbac_access.go
    - golang/rbac/rbac_server/rbac_role_bindings_test.go
  run:
    commands:
    - go test ./golang/rbac/rbac_server/ -run TestIsBuiltinSuperadmin
- id: TestCallerIsAdmin_BuiltinSA
  title: callerIsAdmin recognizes the built-in sa superadmin (no stored binding required)
  protects:
    failure_modes:
    - rbac.authority_recognition_predicate_drift_across_sites
    files:
    - golang/rbac/rbac_server/rbac_role_bindings.go
    - golang/rbac/rbac_server/rbac_role_bindings_test.go
  run:
    commands:
    - go test ./golang/rbac/rbac_server/ -run TestCallerIsAdmin_BuiltinSA
- id: TestGetRoleBinding_SAReadsOtherSubject_NoFallback
  title: sa reads any subject's binding (no permissive fallback); non-admin reading another subject still denied
  protects:
    failure_modes:
    - rbac.authority_recognition_predicate_drift_across_sites
    files:
    - golang/rbac/rbac_server/rbac_role_bindings.go
    - golang/rbac/rbac_server/rbac_role_bindings_test.go
  run:
    commands:
    - go test ./golang/rbac/rbac_server/ -run TestGetRoleBinding_SAReadsOtherSubject_NoFallback
- id: TestDefaultEvalCond_Len
  title: DefaultEvalCond len() must fail closed on nil or missing values
  protects:
    failure_modes:
    - workflow.reconcile_nil_collection_fails_foreach_run_storm
    files:
    - golang/workflow/engine/conditions.go
    - golang/workflow/engine/conditions_test.go
  run:
    commands:
    - go test ./golang/workflow/... -run TestDefaultEvalCond_Len
- id: TestReconcileClassifyDrift_EmptyReturnsNonNilSlice
  title: reconcileClassifyDrift must return an initialized empty slice for no drift
  protects:
    failure_modes:
    - workflow.reconcile_nil_collection_fails_foreach_run_storm
    files:
    - golang/cluster_controller/cluster_controller_server/reconcile_actions.go
    - golang/cluster_controller/cluster_controller_server/reconcile_classify_drift_empty_test.go
  run:
    commands:
    - go test ./golang/cluster_controller/... -run TestReconcileClassifyDrift_EmptyReturnsNonNilSlice
- id: TestIncidentFingerprint_StableAcrossOccurrences
  title: Incident fingerprint must stay stable across repeated occurrences of the same signature
  protects:
    failure_modes:
    - ai_executor.repeat_diagnosis_drains_personal_subscription
    files:
    - golang/ai_executor/ai_executor_server/dedup.go
    - golang/ai_executor/ai_executor_server/dedup_test.go
  run:
    commands:
    - go test ./golang/ai_executor/... -run TestIncidentFingerprint_StableAcrossOccurrences
- id: TestIncidentFingerprint_DistinguishesSignatures
  title: Incident fingerprint must distinguish different rule, event, and service signatures
  protects:
    failure_modes:
    - ai_executor.repeat_diagnosis_drains_personal_subscription
    files:
    - golang/ai_executor/ai_executor_server/dedup.go
    - golang/ai_executor/ai_executor_server/dedup_test.go
  run:
    commands:
    - go test ./golang/ai_executor/... -run TestIncidentFingerprint_DistinguishesSignatures
- id: TestIncidentFingerprint_UnitFallback
  title: Incident fingerprint must fall back to unit when service is absent
  protects:
    failure_modes:
    - ai_executor.repeat_diagnosis_drains_personal_subscription
    files:
    - golang/ai_executor/ai_executor_server/dedup.go
    - golang/ai_executor/ai_executor_server/dedup_test.go
  run:
    commands:
    - go test ./golang/ai_executor/... -run TestIncidentFingerprint_UnitFallback
- id: test.desired_build_id_immutable_after_write
  title: Desired build_id must not change after resolution
  protects:
    invariants:
    - desired.build_id_immutable
    failure_modes:
    - minio.version_drift_auth_failure
  required_for_changes:
    paths:
    - golang/cluster_controller/**
    - golang/node_agent/**
    task_terms:
    - build_id
    - desired state
    - convergence
    - version resolution
  commands:
  - go test ./golang/cluster_controller/... -run BuildID
  - go test ./golang/node_agent/... -run DesiredState
  evidence:
  - desired build_id cannot be overwritten once set
  - drift comparison uses build_id not version string
- id: test.heartbeat_does_not_write_desired_state
  title: Heartbeat must only write observed/installed state, never desired state
  protects:
    invariants:
    - infra.heartbeat_not_desired_authority
    failure_modes:
    - node_agent.state_poisoning_from_stale_reconciler
  required_for_changes:
    paths:
    - golang/node_agent/**
    task_terms:
    - heartbeat
    - installed state
    - observed state
    - node agent
  commands:
  - go test ./golang/node_agent/... -run Heartbeat
  evidence:
  - heartbeat writes only to installed/runtime keys
  - no writes to /globular/resources/DesiredService/ from node agent
- id: test.absent_key_does_not_stop_service
  title: Missing desired state key must not trigger service stop
  protects:
    invariants:
    - critical_state.absence_is_not_destructive_intent
    failure_modes:
    - critical_state.absent_key_interpreted_as_stop
  required_for_changes:
    paths:
    - golang/cluster_controller/**
    - golang/node_agent/**
    task_terms:
    - key not found
    - desired state
    - stop service
    - delete
  commands:
  - go test ./golang/cluster_controller/... -run AbsentKey
  - go test ./golang/node_agent/... -run MissingKey
  evidence:
  - service continues running when desired state key is absent
  - explicit delete intent required before stopping service
- id: test.pkill_uses_x_flag_not_f_flag
  title: pkill must use -x (exact match) not -f (argv match)
  protects:
    invariants: []
    failure_modes:
    - mcp.orphan_port_hold
  required_for_changes:
    paths:
    - packages/metadata/**
    - golang/node_agent/**
    task_terms:
    - pkill
    - process kill
    - service stop
    - ExecStartPre
  commands:
  - grep -r "pkill -f" packages/metadata/ golang/ && exit 1 || exit 0
  evidence:
  - pkill -f matches parent shell argv and causes self-SIGKILL
  - pkill -x matches exact binary name only
- id: test.install_result_committed_to_etcd
  title: Install success must be committed to etcd before returning
  protects:
    invariants:
    - infra.heartbeat_not_desired_authority
    failure_modes:
    - install.result.partial_commit
  required_for_changes:
    paths:
    - golang/node_agent/**
    task_terms:
    - install
    - commit
    - etcd
    - node agent
  commands:
  - go test ./golang/node_agent/... -run InstallResult
  evidence:
  - etcd write succeeds before install RPC returns
  - partial commit is detected and retried
- id: test.released_artifact_immutable_different_digest
  title: "Published artifact content is immutable \u2014 same version must mean same digest"
  protects:
    invariants:
    - repository.artifact.content_immutable_after_publish
