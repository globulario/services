        - go test ./golang/cluster_doctor/... -run "TestFollowerRemediationBlocked"

  - id: test.doctor_hard_blocked_actions_rejected
    title: ETCD_PUT, ETCD_DELETE, NODE_REMOVE must return BLOCKED from the remediation gate
    protects:
      invariants:
