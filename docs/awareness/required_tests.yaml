    protects:
      invariants:
        - meta.connection_errors_must_not_be_absorbed
    required_for_changes:
      paths:
        - golang/interceptors/ServerInterceptors.go
      task_terms:
        - cached client
        - invalidateClient
        - isTransportFailure
        - getLogClient
        - sync.Once
    run:
      commands:
        - go test ./golang/interceptors/ -run "TestIsTransportFailure|TestInvalidateClient"

  - id: test.gc_refuses_when_desired_state_unverifiable
    title: Repository GC + checkDeletionSafety must refuse when collectDesiredBuildIDs returns trusted=false
    protects:
      invariants:
        - meta.fallback_must_degrade_semantics
        - repository.purge_must_not_delete_active_desired_builds
      failure_modes:
        - repository.desired_build_id_orphaned
    required_for_changes:
      paths:
        - golang/repository/repository_server/reachability_guard.go
        - golang/repository/repository_server/gc.go
      task_terms:
        - reachability guard
        - desired state pin
        - GC artifact archive
        - controller TLS
    run:
      commands:
        - go test ./golang/repository/repository_server/ -run "TestDeletionSafety_DesiredStateUnknown_Refuses"

  - id: test.list_desired_buildids_refuses_partial_fetch
    title: ListDesiredBuildIDs must return Unavailable when any kind fetch fails, never a partial set
    protects:
      invariants:
        - meta.authority_must_express_uncertainty
        - repository.purge_must_not_delete_active_desired_builds
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/desired_state_handlers.go
      task_terms:
        - ListDesiredBuildIDs
        - parallel fetch
        - desired build_id set
        - repository GC pin
    run:
      commands:
        - go test ./golang/cluster_controller/cluster_controller_server/ -run "TestListDesiredBuildIDs"

  - id: test.heartbeat_inventory_complete_false_on_any_error
    title: NodeStatus.InventoryComplete must be false when ComputeInstalledServices errored or any per-kind ListInstalledPackages failed
    protects:
      invariants:
        - meta.authority_must_express_uncertainty
        - infra.heartbeat_observer_only_not_authority
    required_for_changes:
      paths:
        - golang/node_agent/node_agent_server/heartbeat.go
      task_terms:
        - InventoryComplete
        - heartbeat inventory
        - ComputeInstalledServices
        - per-kind partial
    run:
      commands:
        - go test ./golang/node_agent/node_agent_server/ -run "TestInventoryComplete"

  - id: test.release_workflow_skips_node_on_transient_etcd_error
    title: release_workflow must skip a node (not reinstall) when GetInstalledPackage returns a transient etcd error
    protects:
      invariants:
        - meta.absence_scope_must_be_explicit
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/workflow_release.go
      task_terms:
        - release workflow targets
        - installed_state.GetInstalledPackage
        - transient etcd error reinstall
    run:
      commands:
        - go test ./golang/cluster_controller/cluster_controller_server/ -run "TestReleaseWorkflow"

  - id: test.highest_healthy_version_refuses_observation_blackout
    title: highestHealthyInstalledVersion must return observable=false when no node has a fresh heartbeat
    protects:
      invariants:
        - meta.absence_scope_must_be_explicit
        - meta.authority_must_express_uncertainty
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/desired_state_handlers.go
      task_terms:
        - highestHealthyInstalledVersion
        - version regression guard
        - heartbeat blackout
        - downgrade gate
    run:
      commands:
        - go test ./golang/cluster_controller/cluster_controller_server/ -run "TestHighestHealthyInstalledVersion"

  - id: test.verifier_verdicts_distinguish_trusted_from_etcd_failure
    title: loadVerifierVerdicts must return trusted=false when the etcd prefix-Get errors
    protects:
      invariants:
        - meta.authority_must_express_uncertainty
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/handlers_health.go
      task_terms:
        - loadVerifierVerdicts
        - verifier verdict map
        - claim-only fallback
    run:
