        - pipeline state
        - rollback eligibility
        - publish state fallback
    run:
      commands:
        - go test ./golang/repository/repository_server/ -run "TestPipelineState_IsKnown"

  - id: test.heartbeat_entrypoint_identity_from_manifest_not_disk
    title: assignEntrypointChecksumMetadata writes manifest identity into entrypoint_checksum, disk hash into evidence field
    protects:
