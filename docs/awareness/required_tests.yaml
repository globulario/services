        - go test ./golang/cluster_controller/cluster_controller_server/ -run "TestLoadVerifierVerdicts"

  - id: test.recovery_fence_fail_closed_on_etcd_outage
    title: Reconciler must fence a node when isNodeUnderRecovery cannot observe etcd state
    protects:
      invariants:
        - meta.authority_must_express_uncertainty
        - critical_state.deletion_requires_audited_intent
    required_for_changes:
      paths:
        - golang/cluster_controller/cluster_controller_server/recovery_state_store.go
        - golang/cluster_controller/cluster_controller_server/reconcile_nodes.go
      task_terms:
