  - TestSweepRuntimeDepBlocks_DoesNotClearWhenDepsMissing
  - TestSweepRuntimeDepBlocks_ListErrorIsNonFatal
  severity: high
  status: active
  summary: "This is a stay-fixed regression guard.\n\nWhen the controller writes a `BLOCKED_MISSING_NATIVE_DEP` runtime\n\
    convergence record (via `writeRuntimeDepBlock` and the\n`runtime_dep_block` action key), that record encodes a\npoint-in-time\
    \ observation: dep X is not active for node N. The\nreconciler's dispatch gate (`hasUnservedNodes` in\n`release_pipeline.go`)\
    \ reads the latest convergence record and\nrefuses to dispatch when it sees BLOCKED. The invariant: when\nthe dep observably\
    \ transitions to active AND its join phase is\nverified, BOTH the per-package latest convergence record AND the\ncontroller\
    \ action key MUST be cleared so the next reconcile\ntick can dispatch.\n\nArchitectural implementation (already in tree,\
    \ lives in\n`critical_key_prereqs.go`):\n  - `writeRuntimeDepBlock` — writes the deterministic action\n    key + latest\
    \ convergence record when the dep is unhealthy.\n  - `clearRuntimeDepBlock` — deletes BOTH keys (best-effort,\n    errors\
    \ logged not fatal).\n  - `sweepRuntimeDepBlocks` — level-triggered safety net called\n    unconditionally every reconcile\
    \ tick from\n    `reconcile_nodes.go`. Lists each node's BLOCKED records,\n    re-runs `checkRuntimeDeps`, and clears\
    \ only those records\n    whose dep is now observably satisfied.\n  - `checkRuntimeDeps` (in `component_resolve.go`) —\
    \ the\n    dep-satisfaction predicate. For stateful infra\n    (scylladb / minio / etcd) it requires `*JoinPhase ==\n\
    \    Verified`, not just systemd active. For `KindCommand` deps\n    it checks installed version, not unit state.\n\n\
    Historical incident: INC-2026-0005 (globule-dell Day-1 join,\n2026-05-23) — three manual `etcdctl del` clearing waves\
    \ were\nneeded to converge one node because the level-triggered sweep\ndid not yet exist. The runtime fix shipped 2026-05-24\
    \ in\ncommits e47c2316 (auto-clear via `clearRuntimeDepBlock`) and\ndba27d03 (the `sweepRuntimeDepBlocks` safety net +\
    \ wiring into\nreconcile_nodes.go).\n\nThis invariant exists to keep that fix in place. Removing the\nsweep, weakening\
    \ the join-phase gate in `checkRuntimeDeps`, or\nmaking the clear unreachable (e.g. by gating it behind a\ncondition that\
    \ the bootstrap race itself prevents) reproduces\nINC-2026-0005.\n"
  title: Runtime dependency-block records must continue to be cleared once the blocking dependency is observed as satisfied
    and join-phase verified
