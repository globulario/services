  severity: critical
  status: active
  summary: "A field stores ONE kind of value. The kind is named in the proto\ncomment (or the awareness anchor on its parent\
    \ identity). Every\nwriter of the field must produce a value of that kind; every\nreader interprets it as that kind. Conditional\
    \ interpretation\n(\"if writer A set this it means X, if writer B set it it means Y\")\nis the bug — the fix is to split\
    \ the field, never to add the\ncondition.\n\nCardinal cases observed in the wild:\n\n  - InstalledPackage.Checksum was\
    \ being written by some installer\n    paths as a release-identity hash (the\n    ComputeReleaseDesiredHash output, ~5804f523…)\
    \ and by other\n    paths as a binary SHA (~2eb07b67…). Readers that compared it\n    against ResolvedEntrypointChecksum\
    \ (binary SHA from manifest)\n    saw permanent rollout.installed_hash_mismatch. The fix in\n    v1.2.161 made every installer\
    \ write the binary SHA, matching\n    the proto comment. The forbidden_fix anchored here pins that\n    the BUG was the\
    \ conditional semantic, not just the wrong\n    value.\n\n  - NodeReleaseStatus.InstalledHash had the same shape: workflow-\n\
    \    callback writer #2 stored release-identity; convergence-scan\n    writer #1 stored binary SHA. Fixed in v1.2.162.\n\
    \n  - UpdatedUnix had two semantic interpretations: proof writer\n    treated it as \"PID-start anchor\"; heartbeat treated\
    \ it as\n    \"now\". Both are inside one service (node-agent) — same shape\n    at the sub-actor level. Fixed in v1.2.164.\n\
    \nThe rule: if a field can carry two values that mean different\nthings, the field has been over-loaded. Split it. Either\
    \ two\nfields (each unambiguous), or rename to make the semantic\nexplicit and reject the wrong-kind write at the writer.\n"
  title: Every storage field has exactly one declared semantic across all writers; conditionally interpreting one field as
    multiple kinds of identity based on metadata is the bug
  test_not_applicable_reason: architectural declaration; enforced by principle-check:installed_package.timestamp_writers_must_preserve_during_observe
    (per-instance)
- enforcement: 'For every named identity field, the canonical source must be

    documented in the proto comment or in an awareness anchor.

    Writers must compute the value from the canonical source. Readers

    that need the value compute it from the same source (or read it

    from the owner) and verify by recomputation, not by trusting an

    alternative storage location. Identity values that are

    deterministically derived (e.g. ComputeReleaseDesiredHash) must

    be recomputed on demand if there is any doubt; never recovered

    from a secondary source.

