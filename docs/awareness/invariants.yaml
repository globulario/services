  scan_pattern: \b(cli|kv|kvClient|etcdcli|etcdClient|client|c)\.(Put|Delete)\s*\(|\bclientv3\.Op(Put|Delete)\s*\(
  scan_pattern_description: "etcd state-mutation sites. Two forms:\n  1. Direct Put/Delete calls on a client identifier whose\
    \ name\n     suggests an etcd client (cli, kv, client, ...).\n  2. Transaction ops clientv3.OpPut / clientv3.OpDelete\
    \ (used\n     inside cli.Txn(...).Then(...)). Added 2026-06-09 after a\n     triage found 7 transaction-based writes in\
    \ actor-writer dirs\n     that the form-1 regex could not see — a write evading the\n     scanner means drift=0 overstates\
    \ safety. Both forms must be\n     matched or transaction writes become an enforcement blind spot.\nNarrow by design;\
    \ excludes _test.go files.\n"
  severity: critical
  status: active
  summary: "Sharpening of workflow.source_of_operational_truth. The existing\nintent says \"all cluster mutations flow through\
    \ workflows\" — which\nis correct at the service level but underspecifies the discipline.\nThe pointwise rule is: every\
    \ state mutation must belong to an\nIDENTIFIABLE workflow INSTANCE — a specific run id + step id that\nowns it.\n\nThe\
    \ 4-layer model is a workflow TEMPLATE that the cluster\ninstantiates in parallel for every (artifact, node) pair needing\n\
    convergence (see intent\nworkflow.four_layer_is_template_instantiated_per_artifact_node).\nThat means every mutation written\
    \ by an actor — repository\npromoting an artifact to PUBLISHED, controller writing a desired\npin, node-agent writing\
    \ an installed receipt, verifier writing a\nruntime proof — must be traceable to ONE workflow instance:\n\n  - run_id\
    \    — which template instance\n  - step_id   — which step of that template\n  - actor     — who the step named to perform\
    \ the write\n  - target    — the (artifact, node) pair the instance owns\n\nThe forbidden shape is a mutation with no\
    \ such binding: a state\nwrite whose only authority is \"the controller decided to do it,\"\n\"the heartbeat saw drift\
    \ and corrected it,\" or \"remediation ran\noutside the workflow engine.\" Those are drift to plan mode — the\nanti-pattern\
    \ Globular's design exists to prevent.\n\nSix explicit, narrowly-scoped EXCEPTIONS (documented elsewhere\nin this graph).\
    \ Each exception names a STRUCTURAL category of\nwrites that legitimately operates outside a workflow instance —\nnot\
    \ a service-specific carve-out:\n\n  1. Observer-only self-state — a service writes its OWN\n     observed state (what\
    \ it sees, what it's running, what it\n     rendered). Does not change desired state. Governed by\n     infra.heartbeat_observer_only_not_authority.\
    \ Covers\n     node-agent heartbeat, node-agent minio_systemd_reconcile\n     generation/fingerprint writes, controller\
    \ leader_pending_\n     update_etcd, controller kind_mismatch_etcd diagnostic\n     emits. The discriminator: the write\
    \ describes \"what I am\",\n     never \"what should happen\".\n\n  2. Bounded auto-heal — cluster-doctor healer performs\
    \ delete-\n     stale-cache / clear-resolved-drift via direct RPC with\n     JSONL audit. Governed by the healer_direct_actions\n\
    \     exception on workflow.source_of_operational_truth. The\n     discriminator: bounded action set, JSONL audit, no\
    \ new\n     cluster intent introduced.\n\n  3. Audit-wrapper workflows — AI remediation consumer wraps a\n     direct\
    \ node-agent restart RPC in a workflow run record so\n     the audit trail exists even though the workflow is not the\n\
    \     execution coordinator (ai_remediation_consumer_audit_wrapper).\n     The discriminator: workflow is the audit container,\
    \ not\n     the orchestrator.\n\n  4. Pre-workflow primitives — writes that the workflow engine\n     itself depends on\
    \ cannot be inside a workflow. Covers\n     leader_election.go lease writes (leader election is what\n     determines\
    \ who runs workflows) and node-agent main.go\n     port registration (a service must be reachable before\n     workflows\
    \ can dispatch to it). The discriminator: the\n     workflow engine cannot dispatch its first step until this\n     write\
    \ succeeds, so this write is below the workflow layer\n     in the dependency order.\n\n  5. Service-self-configuration\
    \ via typed admin RPC — a service\n     persists its own configuration (repository upstreams,\n     source policies, RBAC\
    \ application records) via its typed\n     gRPC handler. The handler validates and audits. The\n     discriminator: the\
    \ operator's intent is captured at the\n     gRPC boundary (request audit, authn, RBAC), and the\n     persist is a transparent\
    \ serialization of the validated\n     request — **single state-changing primitive per RPC**,\n     no multi-step orchestration\
    \ to wrap.\n     Examples: repository_source_policy.go,\n     sync_from_upstream.go, node_agent application_actions.go.\n\
    \n     STRICTER WORDING (added after 2026-06-05 audit found\n     hidden workflows inside files claiming this exception):\n\
    \     Exception 5 applies AT FUNCTION GRANULARITY, not file\n     granularity. A file may contain both single-step RPC\n\
    \     handlers (legitimately exception 5) AND multi-step\n     handlers that orchestrate work (NOT exception 5 — they\n\
    \     are hidden workflows; see failure_modes hidden_workflow.*).\n     To claim exception 5 for a function, that function\
    \ MUST:\n       (a) call at most ONE state-mutation primitive (one\n           etcd Put/Delete OR one Scylla mutation\
    \ OR one disk\n           write — pick one), AND\n       (b) not invoke other actors via gRPC for state changes\n    \
    \       as part of the same RPC, AND\n       (c) not orchestrate retries or alternative paths in\n           response\
    \ to mid-call failure.\n     Functions that orchestrate multiple writes — even\n     across helpers in the same file —\
    \ are hidden workflows.\n     They must be lifted into a workflow definition. Known\n     hidden workflows found in the\
    \ 2026-06-05 audit:\n       - handlers_node.go::RemoveNode\n       - node_removal_requests.go::processNodeRemovalRequests\n\
    \       - ingress_spec_guard.go::restoreIngressSpecFromBackup\n     Each has a failure_mode entry naming the lift_to_workflow\n\
    \     remediation.\n\n  6. Event-bus ephemera — short-lived lease-bound writes that\n     implement pub-sub semantics\
    \ (event delivery, subscription\n     registration). The discriminator: TTL-bound, never the\n     source of truth for\
    \ any layer, and consumers treat absence\n     as normal.\n\nAny mutation outside these six exceptions, and outside an\n\
    identified workflow instance, is a violation. The audit\nquestion is pointwise: at every state write call site, name\n\
    either the workflow_run_id + step_id that owns it, or the\nstructural exception (1–6) that justifies it.\n"
  title: Every state mutation must belong to an identifiable workflow instance — pointwise, not service-level
