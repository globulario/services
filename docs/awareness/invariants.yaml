  related_invariants:
  - meta.identity_computation_must_be_invariant
  severity: critical
  status: active
  summary: "An identity value (checksum, build_id, version, hash, timestamp\nanchor) has exactly ONE canonical source. The\
    \ four-layer model\nnames WHO writes a path; this invariant names WHAT a value means\nand that the meaning is fixed for\
    \ life.\n\nConcrete canonical sources (non-exhaustive):\n\n  - ArtifactManifest.EntrypointChecksum = sha256(<entrypoint\
    \ binary\n    as published>). Computed once at publish, by the publisher\n    (CI). Frozen for the life of the (publisher,\
    \ name, version,\n    platform, build_number) tuple.\n\n  - ArtifactManifest.BuildId = UUIDv7 allocated server-side by\
    \ the\n    repository at publish. Never client-supplied. Immutable for\n    life.\n\n  - ArtifactManifest.BuildNumber\
    \ = integer allocated server-side\n    per (version, platform), monotonic, never reset. Immutable\n    for life.\n\n \
    \ - ServiceRelease.Status.DesiredHash = ComputeReleaseDesiredHash(\n    publisher, name, version, build_number, config).\
    \ A\n    deterministic function: same inputs → same output. Recomputing\n    it must return the same value or the inputs\
    \ changed.\n\n  - InstalledPackage.Checksum = the sha256 of the binary on disk\n    at install time. The proto comment\
    \ is explicit: \"SHA256 of\n    installed archive\". Every writer must respect this semantic.\n\n  - InstalledPackage.InstalledUnix\
    \ = the install moment. For\n    self-hosted services it is the running PID's /proc/<pid>\n    mtime anchor (self_hosted_runtime_proof_writer);\
    \ for\n    workflow-installed services it is the apply moment. Immutable\n    for the install — does not change on observe,\
    \ sync, or\n    re-discovery.\n\n  - InstalledPackage.UpdatedUnix = the moment the record's\n    underlying material actually\
    \ changed (different version,\n    different build_id, different checksum). Does NOT bump on\n    observe-only operations.\n\
    \nVerification is by recomputing the canonical source and comparing\nagainst the storage. A disagreement between\nsha256(/usr/lib/globular/bin/<entrypoint>)\
    \ and\nmanifest.EntrypointChecksum is a finding, NOT a different version\nof the truth. Don't pick one; report the disagreement.\n"
  title: Every named identity value has exactly one canonical computation and one canonical source; once defined, the value
    is immutable for the (subject, identity) pair
  test_not_applicable_reason: architectural declaration; enforced by code review and awareness briefing, not unit-testable
