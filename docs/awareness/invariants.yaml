      severity: critical
      status: active
      summary: |
        The TopologyTransition record (IsDestructive=true, Approved=true) authorises
        clearing .minio.sys on the affected nodes to enable a mode change (e.g.
        standalone → distributed). The clearing must be ONE-SHOT per generation: once
        a node has wiped for generation N, every subsequent reconcile cycle while
        that record still exists at the same generation MUST skip the wipe. Without
        this idempotency, the reconcile loop wipes .minio.sys every cycle, MinIO
        never gets a stable window to write its fresh format.json, and the
        distributed pool stays permanently in "Insufficient number of drives online"
        with the gateway returning 503 {"error":"object store unavailable"}.

