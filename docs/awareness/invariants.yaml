    file: cluster_controller/cluster_controller_server/convergence_committer.go
    reason: 'convergence_committer.go stamps UpdatedUnix at the moment

      it commits a successful node-side install — the timestamp

      IS the install anchor for this code path (the controller-

      observed install completion). Anchor write at install

      commit, not observe-time stomp.

      '
  - category: exception_install_anchor_write
    file: node_agent/node_agent_server/apply_package_release.go
    reason: 'The apply path sets UpdatedUnix to time.Now() at install

      commit and on repair — these ARE anchor writes (the

      moment the install or repair completes is the new anchor).

      Multiple sites in this file legitimately set the anchor;

      classified per-file because every site here is an

      install/repair authority moment.

      '
