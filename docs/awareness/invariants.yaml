      scan_pattern: placeholder_unused_when_analysis_mode_is_ruleguard
      severity: high
      status: active
      summary: |
        Per-instance enforcement of meta.principal_must_survive_proxy_chains.
        The bug shape is the confused deputy (Hardy 1988): a gRPC server
        extracts peer.FromContext to identify the caller and authorizes
        against that peer identity. When a gateway, sidecar, or trusted
        proxy sits in front of the service, the peer cert is the
        gateway's — not the user's — so authorizing against the peer
        grants the gateway's scope to anyone the gateway accepts.

        The principle says the originating principal must survive the
        proxy chain via JWT claims, signed RPC metadata, or an mTLS
        chain whose terminal subject is the principal. The peer
        identity is metadata about the path the request took, not
        authority for the request.

        Canonical good shape:
          1. Extract the peer identity for transport-level allowlisting.
          2. Extract the principal from JWT claims (via the interceptor
             chain) for authorization.
          3. Authorize against the PRINCIPAL.

        Today's sweep: 0 findings. The interceptor chain centralizes
        principal extraction in golang/interceptors and handlers
        authorize against the resolved principal, not raw peer.
        Pure regression detector — catches a new handler that bypasses
        the interceptor chain and inspects peer.FromContext for an
        authorization decision.
      title: gRPC server handlers must authorize against the originating principal (JWT claims, signed metadata) — never against peer.FromContext alone
