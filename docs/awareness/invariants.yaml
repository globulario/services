  - TestExtractRunInstallPackageHashes_OnlyConvergence
  - TestExtractRunInstallPackageHashes_OnlyBinary
  - TestExtractRunInstallPackageHashes_BothEmpty
  - TestExtractRunInstallPackageHashes_Whitespace
  - TestRunInstallPackageHashSchema_PhantomHashIsConvergenceIdentity
  - TestDispatch_ResolverEntrypointChecksumIsBinaryHash
  severity: critical
  status: active
  summary: "The install-package workflow carries two hashes with strictly distinct\nmeanings:\n\n  - desired_hash    = convergence\
    \ identity hash. Schema:\n                      sha256(\"<publisher>/<name>=<version>+b:<N>;\") via\n                \
    \      ComputeReleaseDesiredHash. Used ONLY for\n                      convergence comparison (canSkipInstallPackage,\n\
    \                      StampInfraConvergenceHash, LocalHash in\n                      ConvergenceResultV1).\n\n  - expected_sha256\
    \ = BINARY sha256 from the repository manifest's\n                      entrypoint_checksum. Used ONLY as\n          \
    \            ApplyPackageReleaseRequest.ExpectedSha256 and\n                      compared against the installed binary\
    \ by\n                      verifyInstalledBinaryHashStrict.\n\nThese two MUST be extracted into distinct variables and\
    \ threaded\nthrough distinct code paths. Any fallback (`if A==\"\" then A = B`),\nany helper that \"normalises\" both\
    \ into one value, and any aliasing\nthrough `desiredHash` style variables that downstream sites then feed\ninto ExpectedSha256,\
    \ recreates the v1.2.119 regression in which the\nconvergence identity hash silently became the binary verify hash and\n\
    every dispatched install was rejected with\ninstalled_binary_hash_mismatch.\n\nEmpty propagation is the correct behaviour\
    \ for either schema being\nabsent. When desired_hash is empty, canSkipInstallPackage falls back\nto version/buildID matching.\
    \ When expected_sha256 is empty, the\nverify gate writes installed_unverified honestly. Cross-feeding the\nother schema\
    \ is forbidden.\n\nPinned by extractRunInstallPackageHashes and the\nTestExtractRunInstallPackageHashes_* test suite.\n"
  title: install-package workflow's two hash inputs are distinct schemas and must never alias into a single value
