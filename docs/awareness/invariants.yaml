- id: infra.node_specific_truth_must_be_observed_via_node_local_client
  title: Per-node / per-endpoint runtime truth must be read from a client pinned to that node, never from a shared multi-member pooled client that may route elsewhere
  summary: |
    A child of infra.runtime_truth_must_be_observed_via_native_api. When the
    question is about ONE specific node/member ("is THIS member the leader", "what
    is THIS endpoint's status", "who are THIS node's gossip peers"), the answer
    must come from a client dialed at that node. A shared cluster-wide client (a
    multi-host gocql session, the shared pooled etcd client, an arbitrary
    Endpoints()[0]) can route the query to a DIFFERENT member, and per-node tables
    (system.peers excludes self; an endpoint's leader view can be stale under a
    partition) then yield an answer that belongs to the wrong node. This is the
    generalization of INC-2026-0011 (gocql routed system.local/peers to the wrong
    member -> false group0-stale verdict) and the etcd infra-truth observer's
    local-only dial. Reading per-node truth through a pooled client is forbidden
    when the result drives a node-scoped or destructive decision.
