      meta_principle_instances:
        - notes: |
            The pointwise rule is the per-mutation enforcement of the parent
            meta-principle. The parent says "intent commits before action,
            retry is the only response, no alternative paths once committed."
            This invariant operationalises that for every state write:
            name the workflow_run_id + step_id that committed the intent.
            "Drift to plan mode" is the exact "alternative path" the parent
            forbids.
          parent: meta.state_mutations_must_be_durably_committed_before_side_effects
          relation: per_mutation_enforcement
        - notes: |
            The workflow service is a router, not a writer. Attributing a
            mutation to the workflow service substitutes the courier's
            identity for the actor's — exactly the wrong-writer shape
            this meta-principle catches.
