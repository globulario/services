  status: active
  summary: "Per-instance enforcement of meta.failure_response_must_contract_not_amplify\nfor the fire-and-forget-goroutine\
    \ pattern. The bug class is the\nzombie-leader incident: when a recoverable error fires, naive\nhandlers spawn `go func()\
    \ { retry() }()` — and under sustained\nfailure, hundreds of those goroutines accumulate, each blocked\non retries. CPU\
    \ starvation freezes the leader's own liveness\nloop; the cluster loses its leader without anyone noticing.\n\nThe fix\
    \ patterns:\n  - bounded worker pool (errgroup with limit, semaphore)\n  - singleflight gate (at most one in-flight reaction)\n\
    \  - synchronous handling (let the caller see the error)\n  - circuit breaker (stop reacting after N failures, wait)\n\
    \nThe ruleguard rule catches `go func() { ... }()` or `go f(...)`\nas a direct child of an `if err != nil` block — with\
    \ the\nmetavariable constrained to look like a Go err variable\n(`err`, `*Err`) so nil-checks on optional services\n(`if\
    \ srv.foo != nil { go ... }`) don't trip the rule.\n\nToday's sweep: 0 findings codebase-wide. Pure regression\ndetector\
    \ for the zombie-leader bug class.\n"
