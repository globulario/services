        On every reconcile tick, `reconcile_nodes.go` must call
        `srv.sweepRuntimeDepBlocks(ctx, nodes)` before per-node
        processing. The sweep must, for each node:

          1. List runtime convergence results for the node.
          2. Filter to records with Outcome == BlockedMissingNativeDep
             AND ReasonCode == "runtime_deps_not_ready" — never touch
             other outcomes.
          3. Re-evaluate `checkRuntimeDeps(comp, healthyUnits,
             installedVersions, node)` for the record's package.
          4. If the result is empty (dep now satisfied AND join-phase
             verified): call `clearRuntimeDepBlock(ctx, [nodeID], pkg,
             kind)` which deletes the action key
             `controller/<node>/<kind>/<pkg>/runtime_dep_block` AND the
             latest convergence record. Log
             `runtime-dep-block: auto-cleared stale block for kind/pkg
             on node` so the clear is traceable.
          5. Otherwise: leave the record in place.

        The sweep must remain level-triggered and idempotent — its
        correctness depends on running every tick, not only on
        dep-active state transitions. The edge-triggered path in
        `release_pipeline.go` (the `depClearedNodeIDs` branch of
        `reconcileResolved`) is a fast path; the sweep is the safety
        net for the bootstrap race where the block is written between
        a release event and the next dep-active observation.
      forbidden_fixes:
        - remove_sweepRuntimeDepBlocks_call_from_reconcile_nodes
        - weaken_join_phase_gate_in_checkRuntimeDeps_to_systemd_active_only
        - clear_dep_block_without_re_running_checkRuntimeDeps_first
        - delete_unrelated_convergence_outcomes_in_the_sweep
        - manually_delete_dep_block_keys_via_etcdctl_as_recovery_mechanism
        - mask_stale_dep_blocks_in_hasUnservedNodes_so_dispatch_proceeds_anyway
        - bypass_dep_block_dispatch_gate_to_unstall_a_specific_node
        - increase_dep_block_TTL_so_records_expire_naturally_instead_of_being_cleared
        - silently_skip_dep_block_writes_when_a_concurrent_dep_active_signal_is_pending
        - clear_dep_block_on_install_path_only_without_a_reconcile_sweep
      id: reconcile.dep_block_records_must_be_cleared_when_dep_satisfies
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/critical_key_prereqs.go
            - golang/cluster_controller/cluster_controller_server/reconcile_nodes.go
        state:
            - /globular/convergence/nodes/{node}/packages/{kind}/{name}/latest
            - /globular/convergence/actions/controller/{node}/{kind}/{pkg}/runtime_dep_block
        symbols:
            - writeRuntimeDepBlock
            - clearRuntimeDepBlock
            - sweepRuntimeDepBlocks
            - checkRuntimeDeps
            - hasUnservedNodes
      related_failure_modes:
        - reconcile.stale_dep_block_persists_after_dep_active
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
      required_tests:
        - TestSweepRuntimeDepBlocks_ClearsWhenDepsSatisfied
        - TestSweepRuntimeDepBlocks_DoesNotClearWhenDepsMissing
        - TestSweepRuntimeDepBlocks_ListErrorIsNonFatal
      severity: high
      status: active
      summary: |
        This is a stay-fixed regression guard.

        When the controller writes a `BLOCKED_MISSING_NATIVE_DEP` runtime
        convergence record (via `writeRuntimeDepBlock` and the
        `runtime_dep_block` action key), that record encodes a
        point-in-time observation: dep X is not active for node N. The
        reconciler's dispatch gate (`hasUnservedNodes` in
        `release_pipeline.go`) reads the latest convergence record and
        refuses to dispatch when it sees BLOCKED. The invariant: when
        the dep observably transitions to active AND its join phase is
        verified, BOTH the per-package latest convergence record AND the
        controller action key MUST be cleared so the next reconcile
        tick can dispatch.

        Architectural implementation (already in tree, lives in
        `critical_key_prereqs.go`):
          - `writeRuntimeDepBlock` — writes the deterministic action
            key + latest convergence record when the dep is unhealthy.
          - `clearRuntimeDepBlock` — deletes BOTH keys (best-effort,
            errors logged not fatal).
          - `sweepRuntimeDepBlocks` — level-triggered safety net called
            unconditionally every reconcile tick from
            `reconcile_nodes.go`. Lists each node's BLOCKED records,
            re-runs `checkRuntimeDeps`, and clears only those records
            whose dep is now observably satisfied.
          - `checkRuntimeDeps` (in `component_resolve.go`) — the
            dep-satisfaction predicate. For stateful infra
            (scylladb / minio / etcd) it requires `*JoinPhase ==
            Verified`, not just systemd active. For `KindCommand` deps
            it checks installed version, not unit state.

        Historical incident: INC-2026-0005 (globule-dell Day-1 join,
        2026-05-23) — three manual `etcdctl del` clearing waves were
        needed to converge one node because the level-triggered sweep
        did not yet exist. The runtime fix shipped 2026-05-24 in
        commits e47c2316 (auto-clear via `clearRuntimeDepBlock`) and
        dba27d03 (the `sweepRuntimeDepBlocks` safety net + wiring into
        reconcile_nodes.go).

        This invariant exists to keep that fix in place. Removing the
        sweep, weakening the join-phase gate in `checkRuntimeDeps`, or
        making the clear unreachable (e.g. by gating it behind a
        condition that the bootstrap race itself prevents) reproduces
        INC-2026-0005.
      title: Runtime dependency-block records must continue to be cleared once the blocking dependency is observed as satisfied and join-phase verified
