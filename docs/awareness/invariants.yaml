        - TestObjectstoreNoDesiredStateDoesNotFireWithNoStorageNodes
        - TestObjectstoreRegistryEntryComplete
      severity: critical
      status: active
      summary: |
        Objectstore topology must have controller-owned desired state before any node starts or reconfigures MinIO. /globular/objectstore/config must be in config.CriticalEtcdKeys and critical_state_registry. Node-agent must hold LKG and not infer topology when key absent.
      title: Objectstore desired state must be registry-governed
    - description: |
        ReleaseTopologyLock must be idempotent: releasing a lock that is already absent must return success. Callers must not need to check lock existence before releasing.
      id: objectstore.lock_release_is_idempotent
