  summary: "Per-instance enforcement of meta.diagnostic_output_must_be_bounded\nfor retry-style connection loops. The bug\
    \ shape (2026-06-04\nregression, commit 0afcb65b):\n\n  for {\n      ...\n      if err != nil {\n          logger.Error(\"\
    connection failed\", \"err\", err)  // bare\n          time.Sleep(10 * time.Second)\n          continue\n      }\n   \
    \   ...\n  }\n\nA persistent dependency outage (event service, scylla, minio,\nupstream registry) produces one log line\
    \ per retry interval\nuntil the outage clears — 360 lines/hr at 10s retry, more if\nmany services hit the same outage.\
    \ The lines fill log buckets,\nrotate normal entries out, and produce alarm-fatigue for\noperators. Severity escalates\
    \ when log shipment caps and\nhealthy services are denied output capacity.\n\nThe fix (commit 0afcb65b for ai_watcher.eventLoop)\
    \ introduced\nthe dedup state `lastConnErr` + `lastConnErrAt` + `connErrSuppress`\noutside the loop, then logged only\
    \ on err-change after a\ntime window, with a \"repeated N\" summary on the next change\nand \"connection recovered\" on\
    \ success.\n\nStructural detection: pre-fix has `logger.Error` and `time.Sleep`\nas DIRECT siblings inside the `if err\
    \ != nil` block. Post-fix\nnests `logger.Error` inside a dedup-guard if/else, moving it\nout of the direct-sibling position\
    \ — so the rule's three-\nstatement match no longer fires on the canonical fix.\n\nScope is intentionally narrow per the\
    \ 2026-06-05 audit pass:\nonly golang/ai_watcher and golang/ai_router. Today's sweep in\nthose dirs: 0 findings. The rule\
    \ also found 5 sites with the\nsame bug shape in OTHER dirs (cluster_doctor, node_agent,\nblog) — surfaced in commit notes\
    \ for a follow-up audit; out\nof scope here.\n"
