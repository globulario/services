    \ not block on\n     this. Missing log file, nil Scylla session, parse\n     errors on individual lines all silently return.\n\
    \     Promoting any of these to fatal would couple workflow-\n     server startup to a file that only exists on the\n\
    \     founding controller node, and break joiner-node\n     startup.\n\nFailure here degrades history visibility (operator\
