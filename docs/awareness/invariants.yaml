      severity: high
      status: active
      summary: |
        Publishing an internal address (10/8, 172.16/12, 192.168/16,
        loopback, IPv6 ULA, link-local) to a public DNS zone leaks
        internal cluster topology to the public internet — anyone
        running `dig` against the zone can enumerate private
        subnets, NAT layouts, and host counts. It also breaks
        external reachability for the published name because clients
        outside the LAN cannot route to the address.

        The mitigation is a single chokepoint: every Provider
        implementation (cloudflare, rfc2136, future route53) MUST
        call FilterPublicIPs (in provider.go) BEFORE invoking the
        upstream API. The filter drops every IP IsPrivateIP would
        recognize, unless the operator explicitly set
        Config.AllowPrivateIPs=true (a deliberate split-horizon
        configuration).

        Provider credentials (cloudflare api_token, rfc2136
        tsig_secret) come from Config.ProviderConfig which the
        controller sources from etcd. Reading them from environment
        variables is forbidden by the etcd-is-the-sole-source-of-truth
