  summary: 'The controller is the join point between repository authority (which

    holds the manifest''s entrypoint_checksum) and node-agent execution

    (which compares the installed binary hash against expected). If the

    controller fails to forward the checksum, the verify gate cannot

    complete — every install is honestly reported as installed_unverified,

    but the cluster never reaches verified state and bridge-recovery is

    repeatedly needed to install fresh binaries.


    This invariant requires that every ApplyPackageRelease dispatch from

    the controller resolves the package manifest (already done for

    asset_url and build_id) and reads entrypoint_checksum at the same

    time, then sets the ExpectedSha256 field on the request struct (or

    the workflow inputs that flow into it).


