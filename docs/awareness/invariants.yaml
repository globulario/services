      severity: critical
      status: active
      summary: |
        Globular tracks every service across four independent truth layers,
        each with exactly one writing actor:

          L1 Artifact   — written by repository service (via globular pkg
                          publish / CI). Read by everyone else.
          L2 Desired    — written by cluster-controller (via operator
                          commands, seed, platform-upgrade). Read by
                          node-agents and the workflow service.
          L3 Installed  — written by the node-agent on each node (and only
                          for its own node). Read by cluster-controller,
                          workflow service, cluster-doctor.
          L4 Runtime    — observed by systemd / Envoy. Never written to
                          etcd as a separate authoritative record; the
                          per-node node-agent reads it from /proc, systemd,
                          and health probes and forwards observations.

        The workflow-service orchestrates between actors but writes only
        its own run state (not L1/L2/L3). cluster-doctor is a read-side
        authority only — see invariant:cluster_doctor.observer_only_never_writes_etcd.

        A write by an actor outside its assigned layer is an architectural
        violation, not just a bug. Examples observed 2026-06-04:
          - controller's release_pipeline put a release-identity hash
            (L2 convergence concern) into InstalledPackage.Checksum
            (L3 binary-SHA field) → 5804f523 vs 2eb07b67 split
          - heartbeat (L3 observer sub-actor) stomped UpdatedUnix written
            by the proof writer (L3 authority sub-actor) →
            service.old_pid_after_upgrade
          - repository's UploadArtifact wrote bytes to MinIO mirror
            instead of POSIX CAS (L1 violation: MinIO is not an L1 store)
      title: Each of the four truth layers (Artifact, Desired, Installed, Runtime) has exactly one writing actor; cross-layer writes by non-owners are forbidden
