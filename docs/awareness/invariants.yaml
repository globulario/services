        - TestEnsureSinglePeerSucceeds
        - TestEnsureSequentialFallback
        - TestEnsureAllPeersFail
        - TestEnsureNoCandidates
        - TestSpec1_MissingBundleAutoSyncFromTrustedPeer
        - TestSpec2_WrongBuildIDRejected
        - TestSpec3_UntrustedTLSSourceRejected
        - TestSpec6_UnsafeTarRejected
        - TestSpec7_InstallIsAtomic
        - TestSpec8_SyncCommandEndToEnd
        - TestDay1RefusesReadyWhenBundleMissing
        - TestDay1RefusesReadyWhenBundleStale
        - TestDay1RefusesReadyWhenBundleMismatched
        - TestArchitectureClassificationBlockedByStaleBundle
      severity: critical
      status: active
      summary: |
        Phase C/D contract for the awareness bundle subsystem. Runtime nodes
        may detect missing/stale/mismatched bundles and auto-fetch from
        trusted cluster sources, but they MUST NOT install anything that
        does not exactly match the active release-index version + build_id,
        does not pass tar-safety + sha256 verification, and was not pulled
        over a TLS channel verified against the cluster CA.

        "Automatic ensure, not automatic trust." The node may keep trying
        sources with bounded backoff while it stays in
        AWARENESS_BUNDLE_MISSING / STALE / MISMATCH, but every install path
        flows through the same set of safety checks. There is no fast-path
        bypass for emergency installs.
      title: A node may auto-install a missing awareness bundle only when the candidate matches the active release-index and passes integrity verification
