      severity: critical
      status: active
      summary: |
        An identity value (checksum, build_id, version, hash, timestamp
        anchor) has exactly ONE canonical source. The four-layer model
        names WHO writes a path; this invariant names WHAT a value means
        and that the meaning is fixed for life.

        Concrete canonical sources (non-exhaustive):

          - ArtifactManifest.EntrypointChecksum = sha256(<entrypoint binary
            as published>). Computed once at publish, by the publisher
            (CI). Frozen for the life of the (publisher, name, version,
            platform, build_number) tuple.

          - ArtifactManifest.BuildId = UUIDv7 allocated server-side by the
            repository at publish. Never client-supplied. Immutable for
            life.

          - ArtifactManifest.BuildNumber = integer allocated server-side
            per (version, platform), monotonic, never reset. Immutable
            for life.

          - ServiceRelease.Status.DesiredHash = ComputeReleaseDesiredHash(
            publisher, name, version, build_number, config). A
            deterministic function: same inputs → same output. Recomputing
            it must return the same value or the inputs changed.

          - InstalledPackage.Checksum = the sha256 of the binary on disk
            at install time. The proto comment is explicit: "SHA256 of
            installed archive". Every writer must respect this semantic.

          - InstalledPackage.InstalledUnix = the install moment. For
            self-hosted services it is the running PID's /proc/<pid>
            mtime anchor (self_hosted_runtime_proof_writer); for
            workflow-installed services it is the apply moment. Immutable
            for the install — does not change on observe, sync, or
            re-discovery.

          - InstalledPackage.UpdatedUnix = the moment the record's
            underlying material actually changed (different version,
            different build_id, different checksum). Does NOT bump on
            observe-only operations.

        Verification is by recomputing the canonical source and comparing
        against the storage. A disagreement between
        sha256(/usr/lib/globular/bin/<entrypoint>) and
        manifest.EntrypointChecksum is a finding, NOT a different version
        of the truth. Don't pick one; report the disagreement.
      title: Every named identity value has exactly one canonical computation and one canonical source; once defined, the value is immutable for the (subject, identity) pair
