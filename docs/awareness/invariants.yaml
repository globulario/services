    \ succeeded, or failed. A release that has\nentered FAILED (e.g. because the release-resolver could\nnot find the artifact\
    \ on the first attempt — a publish\nrace) does NOT auto-recover when the resolver later\nsucceeds. The drift-reconciler\
    \ may still dispatch child\nworkflows and observe SUCCEEDED status, but the release\nitself remains FAILED and no install\
    \ is actually\ndispatched.\n\nThe controller MUST provide an explicit recovery path:\n\n  1. Detect the FAILED-with-resolvable-artifact\n\
    \     condition and re-PENDING the release, OR\n  2. Have the drift-reconciler re-create the release\n     when it sees\
    \ drift against a FAILED release with\n     a resolvable target, OR\n  3. Treat the user re-issuing\n     `globular services\
    \ desired set` as an explicit\n     recovery signal that clears FAILED.\n\nToday none of these happen automatically; operators\n\
    recover via `sudo globular services apply-desired\n--controller <addr>:12000 --insecure` which bypasses\nthe broken ServiceRelease\
    \ state entirely. That works\nbut leaves the ServiceRelease record stuck in FAILED\nand obscures the original failure\
    \ for incident review.\n"
