- enforcement: "- VerifyBundle runs manifest verification, tar-safety scan, and\n  sha256 verification before any filesystem\
    \ mutation outside staging.\n- PullBundle requires a non-nil ClusterCAPool. Nil pool returns\n  ErrPeerTLSUnverified before\
    \ any network call. There is no\n  InsecureSkipVerify path for authoritative bundle installs.\n- InstallBundle re-runs\
    \ Verify before extracting. Extraction goes\n  to a unique staging dir; only after validateExtracted passes does\n  the\
    \ staging tree atomically rename into the immutable versioned\n  path; only after that does the current symlink switch\
    \ via tmp-then-\n  rename. Crash between rename and symlink swap is recoverable\n  (idempotent re-run completes the swap).\n\
    - ExtractTarSafe re-classifies every entry per ValidateTarSafe rules\n  during extraction. First unsafe entry stops extraction\
    \ and removes\n  the staging tree.\n- DiscoverSources filters peers by build_id match (and optional\n  cluster_id, recency,\
    \ RUNNING status) before they are even tried.\n- EnsureAwarenessBundle never inherits trust from a peer's claim;\n  PullBundle\
    \ re-verifies the manifest against the caller's expected\n  (version, build_id) regardless of what discovery selected.\n\
    - Classifier.Classify sets Readiness[LevelAwarenessReady]=false when\n  the bundle is missing, stale, mismatched, schema-unsupported,\
    \ or\n  verification-failed. Architecture-sensitive classifications\n  (SCYLLA_NOT_READY, ETCD_NOT_READY, etc.) are checked\
    \ AFTER the\n  bundle gates; a stale graph cannot classify a runtime fault.\n- DAY1_COMPLETE depends on AWARENESS_READY:\
    \ a node never reports\n  DAY1_COMPLETE while the bundle is anything other than READY.\n"
  forbidden_fixes:
  - install_bundle_whose_build_id_differs_from_release_index
  - derive_build_id_from_bundle_filename
  - install_bundle_with_unsupported_schema_version
  - skip_sha256_verification_to_recover_a_pull
  - install_bundle_pulled_over_unverified_tls
  - extract_tar_entries_with_absolute_paths_or_traversal
  - mark_awareness_ready_after_failed_verification
  - mark_day1_complete_with_stale_or_missing_bundle
  - rebuild_graph_on_runtime_node_to_recover_from_stale
  - bypass_atomic_install_to_speed_up_recovery
  - delete_prior_active_bundle_on_install_to_save_disk
  - treat_a_node_serving_a_bundle_as_proof_the_bundle_is_trusted
