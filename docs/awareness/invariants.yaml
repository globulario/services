    \ return nil, nil\n  - return nil, fmt.Errorf(\"timeout\")                  (string-only, %w missing)\n  - return defaultValue,\
    \ nil\n\nTranslation patterns (e.g. a HealthCheck function converting\nconnection errors into a structured HealthReport\
    \ with the\nerror preserved as a string field) are legitimate but require\nexplicit classification under exception_files\
    \ with a reason.\n"
