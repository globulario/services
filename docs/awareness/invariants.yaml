  severity: critical
  status: active
  summary: 'node-agent''s findLocalPackage searches localPackageDirs for a .tgz matching

    the requested package name, version, and platform. When the exact .tgz is

    absent, the historical Day-1 wildcard fallback returned the

    lexicographic-newest version of the package in the same dir. That

    fallback was meant for bootstrap callers with no authoritative version

    ("" or "0.0.0-dev"), but it fired for any cache miss — including Day-2

    upgrades with an explicit version request.


    Result: a request for v1.2.115 silently substituted v1.2.110 from

    /var/lib/globular/packages/, the install reported SUCCESS, the cluster

    kept reporting drift forever, and the controller''s release pipeline

    could not converge. See failure_modes.release.explicit_version_wildcard_installs_wrong_version.


