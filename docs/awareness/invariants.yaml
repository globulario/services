  ruleguard_rules_file: cmd/principle-check/rules/duration_vs_deadline_field_naming.go
  scan_pattern: placeholder_unused_when_analysis_mode_is_ruleguard
  severity: warning
  status: active
  summary: "Per-instance enforcement of meta.duration_versus_deadline_is_not_interchangeable.\nA field named Timeout int gives\
    \ the reader no way to know\nwhether the value is seconds, milliseconds, microseconds, or\na Unix deadline timestamp.\
    \ The encoding choice (duration vs\ndeadline) ages differently across process restart and NTP\ncorrection; mixing them\
    \ silently corrupts retry/expiry logic.\n\nAcceptable forms:\n  Timeout       time.Duration       (unambiguous via type)\n\
    \  TimeoutSeconds int                (unambiguous via name)\n  BackoffMs      int                (unambiguous via name)\n\
    \  DeadlineUnix   int64              (explicit deadline)\n\nToday's sweep: 0 findings. The codebase consistently uses\n\
    time.Duration or the *Seconds suffix. Pure regression\ndetector for new struct fields.\n"
  title: Struct fields named Timeout/Delay/Wait/Backoff/TTL with int-family type must carry a unit qualifier — operators cannot
    tell seconds from milliseconds from a deadline
  unknown_helper_files: []
  workflow_step_handler_files: []
- enforcement: 'Before writing or extending code that handles package storage,

    transport, recovery, or any operation that crosses a layer

    boundary (Repository → Desired → Installed → Runtime), the

    assistant MUST query the awareness graph for the relevant

    invariants. Specifically: call awareness.briefing on the target

    file AND awareness.query with class=invariant search terms

    matching the layer/component being touched. Reading the source

    code alone — including the existing implementation of the very

    thing being "fixed" — is insufficient. The buggy code is not the

    contract; the awareness graph is.


    When the briefing returns empty for a topic that clearly has an

    architectural rule somewhere (e.g. "where do packages live"),

    the assistant must broaden the query, briefing on related files,

    or explicitly state that the rule is not in the graph yet rather

    than substituting code-inspection-derived assumptions.

    '
  forbidden_fixes:
  - extend_existing_buggy_pattern_without_querying_architecture
  - infer_architecture_from_code_when_awareness_anchor_exists
  id: assistant.query_awareness_before_assuming_architecture
  protects:
    files:
    - CLAUDE.md
    - docs/awareness/invariants.yaml
    - docs/awareness/forbidden_fixes.yaml
    symbols:
    - awareness.briefing
    - awareness.query
    - awareness.resolve
  related_invariants:
  - meta.authority_must_express_uncertainty
  severity: high
  status: active
  summary: 'Lesson from the v1.2.162 publish-reconciler heal-from-mirror revert

    (2026-06-04): when fixing a bug in a high-risk area (repository

    publish path, MinIO mirror, package storage), the assistant grepped

    the codebase, observed bytes in MinIO, and wrote a "heal-from-mirror"

    sweep that preserved a pre-existing architectural violation instead

    of fixing the underlying drift. The awareness graph contained the

    rule that would have prevented this (MinIO is for secondary user

    data only) but the assistant did not query for the storage authority

    before designing the fix.

    '
  title: AI assistants must query the awareness graph for "where does X live architecturally" before writing code that touches
    X's storage, transport, or authority surfaces
  test_not_applicable_reason: process invariant for AI agents; enforced by Claude hooks (enforce-briefing.sh), not unit-testable
