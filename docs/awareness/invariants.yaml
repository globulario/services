- decision_guidance:
  - impact-ci is the final automated gate — it enforces that required_tests listed in invariants.yaml actually exist on disk
    before merge
  - Never exit 0 when required tests are missing, even as a 'temporary workaround' — this breaks the invariant→test→CI enforcement
    chain entirely
  - The exit code must be 1 (not panic, not 2) so CI systems can distinguish 'test missing' from 'tool crashed'
