      summary: |
        Per-instance enforcement of meta.timestamp_is_an_observation_not_an_event_time.
        A struct field named bare "Timestamp" / "CreatedAt" / "UpdatedAt"
        / "Time" carrying a *timestamppb.Timestamp, int64, uint64, or
        string conveys no information about which of the four moments
        a distributed event has (event-actual, observer-recorded,
        transport-arrived, storage-committed) nor whose clock recorded
        it. Consumers that interpret the field as one of those moments
        get the answer wrong by whatever lag exists between them, which
        is unbounded across nodes.

        Acceptable shapes carry a verb-prefix (CapturedAt, ProducedAt,
        ObservedAt, CommittedAt) AND a units/encoding suffix (Unix,
        UnixMs, UnixNano) or use time.Time directly.

        Today's sweep: 0 findings. The codebase already names temporal
        fields with the canonical InstalledUnix / ProducedAtUnix /
        CapturedAtUnix shapes. Pure regression detector — catches a new
        proto or struct that ships a bare Timestamp / CreatedAt field.
