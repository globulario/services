  summary: 'Per-instance enforcement of meta.competing_writers_must_converge_or_be_fenced

    for the service-restart competing-writers shape. The bug class:

    two convergence ticks each decide to restart the same service,

    and without singleflight protection both fire — producing a

    cascade of SIGTERMs that hits systemd''s start-limit-hit state

    and requires manual reset.


    The legitimate restart sites are operations procedures (cert

    rotation, Day-0 bootstrap, backup-manager restore). Those run

    serially under operator control and don''t compete with the

    convergence loop. node_agent/node_agent_server IS scanned (as of

    2026-06-11) because it also houses convergence/reconcile/apply

    logic — a future reconcile-path restart added there must be

    caught. Its two known ops-procedure restart files

    (certificate.go = cert rotation, workflow_day0.go = Day-0

    bootstrap) are named EXCEPTIONS. backup_manager stays out of

    scope: it has no convergence loop, so all its restarts are

    categorically ops procedures and scanning it would only produce

    future false positives. NOTE (surfaced during the 2026-06-11

    scope triage): backup_manager/restore.go::restartAllServices

    restarts core convergence-managed units (controller, node-agent);

    its race-safety rests on the OPERATIONAL invariant "restore runs

    only on a quiesced cluster," not on code-level singleflight —

    a latent assumption, not an enforced fence.


    The convergence-driven restart path goes through

    repairVerifyRuntime which is singleflight-gated. Any code in

    cluster_controller_server or workflow_server that calls

    `systemctl restart` directly bypasses the gate.


    Today''s sweep finds 0 sites — pure regression detector. A

    future PR that adds a direct restart in a convergence /

    reconcile / workflow path surfaces as DRIFT.

    '
