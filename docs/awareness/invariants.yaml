      severity: medium
      status: active
      summary: |
        Per-instance enforcement of meta.write_creates_completion_obligation
        for the defer-in-loop bug class. Go defers run at FUNCTION
        exit, not loop-iteration exit. A defer inside a `for` body
        adds to the function's defer stack each iteration; on a tight
        loop iterating N times, N deferred closures accumulate and
        only run when the outer function returns. File handles, HTTP
        bodies, etcd leases, mutex locks all leak.

        Canonical good shape — wrap the iteration body in a closure
        (or extract a helper) so each iteration has its own
        defer-scope:

          for _, item := range items {
              func() {
                  f, err := os.Open(item.path)
                  if err != nil { return }
                  defer f.Close()
                  ...
              }()
          }

        2026-06-05 audit caught 3 sites; all 3 fixed. Sites 1 + 2
        (config/service_discovery.go, domain/reconciler.go) used
        closure-extraction. Site 3 (cluster_controller_server/
        reconciler.go:265 — `defer releaseDedupSlot()` in a 220-line
        outer-for body with a nested loop) was IIFE-wrapped: the
        outer-for body is now an immediately-invoked closure, and
        the 14 outer-for `continue` statements were converted to
        `return` (semantically equivalent: closure returns resume
        the outer for's next iteration). The nested
        `for _, v := range topoViolations` has no `continue` of its
        own, so the conversion was unambiguous. cluster_controller
        tests pass.
      title: defer inside a for-loop body accumulates on the function defer stack — resources leak until the outer function returns
