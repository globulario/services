  summary: "WF-DEFER B2/B3/B4 — deferred workflow execution is the cluster's\nprimary mechanism for handling transient unavailability\
    \ of a\ndependency (waiting on a wave, on a blocker_tag, or on an\noperator-controlled resource). A deferred run must\
    \ never become\npermanently unretryable because of an internal bookkeeping\nfailure:\n\n  - The persistent across-runs\
    \ defer counter\n    (correlation_defer_state, B3) must survive workflow-server\n    restart. If the row is lost, the\
    \ cooldown contract is broken\n    and the run either re-dispatches forever or is silently\n    abandoned.\n\n  - At dispatch\
    \ time, the executor must check three things in\n    order: (1) ABANDONED status (operator must clear via\n    `globular\
    \ workflow defer-state clear`), (2) cooldown still\n    active (BackoffUntilMs > now), (3) a prior run for the same\n\
    \    correlation_id is still in defer cooldown. Order matters —\n    ABANDONED short-circuits cooldown; cooldown short-circuits\n\
    \    new dispatch.\n\n  - WakeDeferredRunsByBlockerTag (B4) must skip ABANDONED rows\n    and must NOT reset the defer\
    \ counter on wake; the counter\n    only resets on a clean RUN_STATUS_SUCCEEDED or on explicit\n    operator clear.\n\n\
    \  - The blocker_tag carried on a deferred run must round-trip:\n    persisted on defer, looked up on wake, cleared on\
    \ success.\n    Losing the tag silently turns event-driven cooldown\n    shortcut into time-only cooldown.\n\nWithout\
