      severity: critical
      status: active
      summary: |
        RemediationAudit.Redacted() must strip any Params entry whose key indicates a
        token/secret/password/api_key OR whose value matches a JWT shape. Compliance
        boundary: even if a caller accidentally puts a raw token in remediation params,
        the durable etcd record must not contain it. The TokenJTI field is the only
        token-related material allowed in audit records — and it is a public identifier,
        not a credential.
      title: Audit writers must redact approval-token and secret material before persisting
