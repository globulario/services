          - publish_state == PUBLISHED  (lifecycle lifecycle gate, written by promoteToPublished)
          - artifact_state == PUBLISHED (pipeline state gate, written by transitionArtifactState)
        The legacy-empty fallthrough (artifact_state == "") is allowed only for rows that
        predate the state machine; the backfill repairs them. Any non-empty artifact_state
        other than PUBLISHED (BLOB_VERIFIED, MANIFEST_WRITTEN, BROKEN_*, QUARANTINED, REVOKED)
        makes the artifact non-installable even when publish_state is PUBLISHED.
