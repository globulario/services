          - cluster_doctor/rules/repository_dns_invariants.go reads
            /globular/resources/* directly on every invariant evaluation
            instead of calling controllerClient (already dialled in the
            collector, never used for this purpose).
          - cluster_doctor/rules/package_version_authority.go same shape.
          - Multiple globularcli paths scan desired-state etcd directly
            in admin commands.

        Single-layer queries by the owner itself, or local readiness
        queries inside one process (e.g. a service answering "am I up?"
        through systemd Type=notify), are NOT bypasses and remain in
        their owner. The principle applies when the question crosses
        layers, nodes, or services.
      title: Reading a layer's owned etcd prefix or backing store directly bypasses the owner's canonicalization, version, and in-memory contracts — truth flows out through the owner's typed RPC
