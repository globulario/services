  summary: "The symmetric companion to four_layer.layer_has_single_writing_actor.\nWriters are authority; readers must consult\
    \ that authority via its\ntyped RPC, not by reading the underlying storage:\n\n  L1 Artifact  → repository.{ListArtifacts,\
    \ GetArtifactManifest,\n                             GetArtifactVersions, DescribePackage}\n  L2 Desired   → cluster_controller.{GetDesiredState,\n\
    \                                     GetServiceRelease,\n                                     GetInfrastructureRelease,\n\
    \                                     GetClusterHealthV1,\n                                     GetNodeReleaseStatus}\n\
    \  L3 Installed → node_agent.{GetInventory, ListInstalledPackages,\n                             GetInstalledPackage,\n\
    \                             GetServiceRuntimeProof,\n                             GetSubsystemHealth}\n  L4 Runtime\
    \   → node_agent (forwards systemd / Envoy / /proc\n                             observations via typed RPCs above)\n\n\
    A direct read of the backing store skips:\n  - the owner's canonicalization (e.g. controller resolves version →\n    build_id\
    \ once and stores both; a direct reader sees whichever\n    field was set first and may miss the resolution)\n  - the\
    \ owner's in-memory state (writes the owner hasn't yet flushed,\n    optimistic reads that need the owner's commit barrier)\n\
    \  - version contracts (the owner may reject reads of pre-Day-1\n    state; direct readers don't get that gate)\n  - audit\
    \ attribution (the typed RPC records the requester; direct\n    etcd reads are anonymous)\n\nLive regressions in this\
    \ class observed today:\n  - cluster_doctor/rules/repository_dns_invariants.go reads\n    /globular/resources/* directly\
    \ on every invariant evaluation\n    instead of calling controllerClient (already dialled in the\n    collector, never\
    \ used for this purpose).\n  - cluster_doctor/rules/package_version_authority.go same shape.\n  - Multiple globularcli\
    \ paths scan desired-state etcd directly\n    in admin commands.\n\nSingle-layer queries by the owner itself, or local\
    \ readiness\nqueries inside one process (e.g. a service answering \"am I up?\"\nthrough systemd Type=notify), are NOT\
    \ bypasses and remain in\ntheir owner. The principle applies when the question crosses\nlayers, nodes, or services.\n"
  title: Reading a layer's owned etcd prefix or backing store directly bypasses the owner's canonicalization, version, and
    in-memory contracts — truth flows out through the owner's typed RPC
