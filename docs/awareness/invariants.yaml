- id: scylladb.group0_voter_quorum_must_hold
  title: Scylla group0 voter quorum must be observably held before Scylla is runtime-healthy
  severity: high
  status: active
  summary: >
    Scylla group0 (the cluster-metadata Raft) can lose voter quorum while CQL
    stays readable: reads/writes to existing keyspaces still succeed, but schema
    and topology changes are blocked. A Scylla-backed service must therefore not
    be treated as runtime-healthy on cql_ready alone — group0 voter quorum must
    be observably held. The authoritative voter count belongs to the infra-probe
    truth plane (the controller's scylla_group0_view.go already reads
    system.raft_group0_members for DDL preflight). ai_watcher's scylla_group0
    probe (PR-14) DIAGNOSES quorum risk as a DIAGNOSTIC_CLAIM finding that cites
    the truth-plane ref; until the infra probe exposes a first-class group0 voter
    count, the watcher's membership math is honest proxy evidence only.
  protects:
