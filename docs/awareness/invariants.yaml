      summary: |
        Per-instance enforcement of meta.harvest_and_yield_are_distinct_availability_dimensions
        for the doctor rules tree. The collector applies the principle
        correctly — it calls snap.addError(source, op, err) on every
        failed sub-fetch and snap.addSource(...) on every success, so
        the Snapshot carries both data and provenance. INC-2026-0004
        codified this pattern.

        The gap is one layer up. The proactive scan of 2026-06-06
        showed that ZERO of the 48 doctor rule files consult
        snap.Errors before reasoning on snapshot data. A rule
        iterating snap.Nodes after cluster_controller.ListNodes failed
        reads an empty slice and concludes "no nodes here" — instead
        of "I cannot tell." Same failure shape as INC-2026-0004 across
        every rule.

        STRUCTURAL FIX LANDED 2026-06-09. Enforcement is now two-sided
        and lives in the rule-dispatch infrastructure (rules/registry.go),
        not in per-rule discipline alone:
          - FALSE_NEGATIVE (a rule whose only source errored emits no
            finding, masking an outage as healthy): EvaluateAll/
            EvaluateForNode now emit one INVARIANT_UNKNOWN finding per
            errored source (snapshotSourceUnavailableFindings), so an
            unavailable source is always a first-class finding and is
            never silently "healthy". annotateForReducedHarvest still
            tags the findings that WERE produced.
          - FALSE_POSITIVE (a rule treats an errored source as a
            confirmed negative and emits a confident INVARIANT_FAIL):
            gated in CI by TestNoRuleEmitsConfidentFailureOnErroredSnapshot,
            a registry-wide ratchet with a shrink-only allowlist.
        High-risk cluster-scoped rules (etcd quorum/stale/bootstrap/
        crash, service drift, leader pending-update) additionally call
        snap.HadError and return nil. The collector's silently-dropped
        etcd Get errors (ingress status, scylla schema_guard,
        leader_pending_update) were fixed so snap.HadError is truthful.

        The ruleguard matcher is now PRECISE: it excludes Evaluate
        bodies that consult snap.HadError, so the drift count (85 → 79
        on 2026-06-09) tracks real per-rule adoption rather than a flat
        debt total. The remaining rules are covered by the registry
        layer + the ratchet; per-rule guards are added where a rule's
        verdict depends on a single source.
