        instance attempts to bind its port. MUST use -x (matches process name exactly),
        never -f — `pkill -f` matches against the FULL command line of every process,
        including the parent shell whose argv contains the binary name as its pkill
        argument, so the parent shell self-SIGKILLs and ExecStartPre fails. Note: -x
        relies on the kernel comm field which is truncated to 15 chars (TASK_COMM_LEN);
        for binaries with names longer than 15 characters, use the regex bracket trick:
        pkill -9 -f '[<first_char>]<rest_of_name>' (e.g. '[c]luster_controller_server').
