- id: etcd.mutex_key_must_not_prefix_non_lock_keys
  title: An etcd concurrency.Mutex key must not be a prefix of any non-lock key
  severity: high
  status: active
  summary: >
    etcd's concurrency.Mutex treats EVERY key under its prefix as a lock
    contender — it acquires by PUTting <mutexKey>/<lease> and waiting on the
    lowest-create-revision key with that prefix. If a non-lock key (state,
    config, data) is nested under the mutex prefix, it is mistaken for an
    un-releasable lock holder: every Mutex.Lock waits for it forever and times
    out, deadlocking the critical section it guards. A distributed-lock mutex key
    must therefore be a LEAF sibling of any related data key, never a prefix of
    it (e.g. mutex ".../foo/lock" + state ".../foo/state", never mutex ".../foo"
    + state ".../foo/state"). The behavioral_memory migration shipped the broken
    layout and every cross-version migration timed out until the state key was
    cleared.
  protects:
    files:
    - golang/ai_memory/ai_memory_server/behavioral_migration.go
  related_invariants:
  - meta.authority_must_express_uncertainty
  required_tests:
  - TestBehavioralMigrationMutexKeyNotPrefixOfStateKey
  forbidden_fixes:
  - nest_a_data_key_under_an_etcd_mutex_prefix
- id: scylla.added_column_requires_backfill_alter_for_upgrades
  title: A column added to a CREATE TABLE must ship a matching backfill ALTER for upgrades
  severity: high
  status: active
  summary: >
    CREATE TABLE IF NOT EXISTS is a no-op on a table that already exists, so a
    column added only to a CREATE statement reaches fresh installs but NEVER
    existing deployments. Any schema change that adds a column MUST also ship an
    idempotent ALTER TABLE ADD (tolerating "column already exists") and bump the
    schema version so the migration re-applies on already-migrated clusters.
    Otherwise upgraded clusters silently lack the column and writes fail with
    "Unknown identifier <col>". The behavioral_memory PR-9 columns
    (cluster_id/condition_ref/severity/authority_level on signals/evidence)
    shipped only in CREATE TABLE, so pre-PR-9 clusters lost all behavioral writes.
  protects:
    files:
    - golang/ai_memory/ai_memory_server/behavioral_schema.go
    - golang/ai_memory/ai_memory_server/behavioral_migration.go
  related_invariants:
  - meta.failure_response_must_contract_not_amplify
  required_tests:
  - TestBehavioralSchemaPR9ColumnsHaveBackfillAlter
  forbidden_fixes:
  - add_column_only_to_create_table_without_backfill_alter
- id: cluster_doctor.degraded_mode_must_not_depend_on_diagnosed_path
  title: cluster-doctor must cross-check the direct backend before declaring a service down
  severity: high
  status: active
  summary: >
    A cluster-doctor that can only reach services through the same gateway it is
    diagnosing is useless exactly when it is needed. When a service is
    unreachable via the Envoy gateway, the doctor must cross-check the direct
    backend port before concluding the service is down. A gateway route that
    answers a non-gRPC content-type (text/html) while the backend is healthy is a
    BROKEN ROUTE, not a down service — the correct verdict is "route/filter-chain
    suspected", not "service down". Degraded-mode checks must not depend solely on
    the path they diagnose, and a cross-check that cannot be completed is
    INVARIANT_UNKNOWN / CHECK_ERROR, never a confident FAIL.
  protects:
    files:
    - golang/cluster_doctor/cluster_doctor_server/rules/gateway_backend_divergence.go
    - golang/cluster_doctor/cluster_doctor_server/collector/gateway_backend_divergence.go
