  severity: high
  status: active
  summary: "receipt_failure_classifier.go decides whether a step receipt\nmeans RETRY_LATER (transient), BLOCKED (deterministic\
    \ block\nawaiting unblock signal), or terminal failure. That decision\nfeeds the workflow's terminal-status write and\
    \ the controller's\nrelease-phase callback. Classification must obey two rules:\n\n  1. MONOTONIC — once a backend-confirmed\
    \ RUN_STATUS_SUCCEEDED\n     receipt exists for a (run_id, step), a subsequent\n     observation (retry, late callback,\
    \ orphan resume) must not\n     reclassify it as FAILED. dispatch_is_not_completion cuts\n     both ways: dispatch is\
    \ not proof of success, and a retry\n     observation is not proof of failure once success was\n     durably recorded.\n\
    \n  2. CONSERVATIVE — ambiguous or missing evidence must classify\n     as RETRY_LATER (with auto_retry=true) or BLOCKED-with-\n\
    \     unblock-signal, never as terminal success. The classifier\n     is the last gate before the controller acts on a\
    \ result;\n     treating \"I cannot tell\" as \"succeeded\" creates the\n     optimistic_success_for_irreversible_action\
    \ failure shape.\n\nThe classifier is also the seam where retry policy is encoded\n(RETRY_POLICY=BACKOFF vs ON_UNBLOCK_SIGNAL\
    \ vs none). Any new\nerror string added to the switch tables must declare its retry\npolicy explicitly — silent default\
    \ (no auto_retry, no unblock\nsignal) is a silent abandonment.\n"
  title: Receipt classification must be monotonic and conservative — dispatch is not completion, success is not retractable
