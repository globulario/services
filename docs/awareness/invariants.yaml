  - TestRunPackageReleaseWorkflow_DispatchSiteInspectsRespStatus
  severity: critical
  status: active
  summary: '`release_pipeline.go` has three near-identical SetFields apply

    functions — `applyPatchToSvcStatus`, `applyPatchToAppStatus`,

    `applyPatchToInfraStatus` — corresponding to the three release

    kinds (ServiceRelease, ApplicationRelease, InfrastructureRelease).

    Adding a new SetFields label (e.g. `"available"`, `"retry"`,

    `"awareness_bundle"`) to the wrong apply function is a SILENT

    defect: the wrong function returns false from its default branch,

    `patchReleaseStatus`''s equality guard then skips Apply, and the

    reconcile loop logs intent (e.g. `marking AVAILABLE`) on every

    cycle while etcd never advances. The mirror trap is on the

    dispatch side: workflow runners return `(resp, err)` where

    `resp.Status` encodes per-wave success/failure independently of

    the engine-level `err`. A call site that writes `_, err :=` and

    only branches on `err != nil` drops `RUN_STATUS_FAILED` /

