        - TestWakePreservesDeferCount
        - TestWakeIgnoresAbandoned
      severity: high
      status: active
      summary: |
        WF-DEFER B2/B3/B4 — deferred workflow execution is the cluster's
        primary mechanism for handling transient unavailability of a
        dependency (waiting on a wave, on a blocker_tag, or on an
        operator-controlled resource). A deferred run must never become
        permanently unretryable because of an internal bookkeeping
        failure:

          - The persistent across-runs defer counter
            (correlation_defer_state, B3) must survive workflow-server
            restart. If the row is lost, the cooldown contract is broken
            and the run either re-dispatches forever or is silently
            abandoned.

          - At dispatch time, the executor must check three things in
            order: (1) ABANDONED status (operator must clear via
            `globular workflow defer-state clear`), (2) cooldown still
            active (BackoffUntilMs > now), (3) a prior run for the same
            correlation_id is still in defer cooldown. Order matters —
            ABANDONED short-circuits cooldown; cooldown short-circuits
            new dispatch.

          - WakeDeferredRunsByBlockerTag (B4) must skip ABANDONED rows
            and must NOT reset the defer counter on wake; the counter
            only resets on a clean RUN_STATUS_SUCCEEDED or on explicit
            operator clear.

          - The blocker_tag carried on a deferred run must round-trip:
            persisted on defer, looked up on wake, cleared on success.
            Losing the tag silently turns event-driven cooldown
            shortcut into time-only cooldown.

        Without these guarantees, a transient blocker becomes a permanent
        cluster wedge — the symptom Dave catalogued repeatedly in
        MEMORY.md (INC-2026-0017 wave-blocked retry dispatch loss,
        WF-DEFER B3 persistent counter, B4 blocker tag templating).
      title: Deferred workflow runs must remain retryable until either the blocker clears or the operator explicitly abandons
