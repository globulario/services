        - TestDispatch_WithBlockOverridesInputs
        - TestDispatch_AuditAllCallSitesSetExpectedSha256
        - TestDispatch_ResolverEntrypointChecksumIsBinaryHash
      severity: critical
      status: active
      summary: |
        The controller is the join point between repository authority (which
        holds the manifest's entrypoint_checksum) and node-agent execution
        (which compares the installed binary hash against expected). If the
        controller fails to forward the checksum, the verify gate cannot
        complete — every install is honestly reported as installed_unverified,
        but the cluster never reaches verified state and bridge-recovery is
        repeatedly needed to install fresh binaries.

        This invariant requires that every ApplyPackageRelease dispatch from
        the controller resolves the package manifest (already done for
        asset_url and build_id) and reads entrypoint_checksum at the same
        time, then sets the ExpectedSha256 field on the request struct (or
        the workflow inputs that flow into it).

        Missing entrypoint_checksum in the manifest is acceptable but must
        propagate as the empty string. The node-agent gate then writes
        installed_unverified honestly. A controller-side synthesis or
        fallback that fills in a hash from any source other than manifest
        authority is forbidden — passing the package tarball sha256 (the
        v1.2.56/v1.2.57/v1.2.58 hash-schema confusion) is specifically
        forbidden because it guarantees failed_binary_hash_mismatch on every
        apply.

        The audit test walks every ApplyPackageReleaseRequest literal in the
        source tree and fails if a new site is added without ExpectedSha256
        set, or without an explicit allow-list entry documenting the
        degraded exception. There should be very few degraded entries
        (operator escape hatch, rollback previous-revision).
      title: Every controller ApplyPackageRelease dispatch that expects verified SUCCESS must carry expected_sha256 from manifest.entrypoint_checksum
