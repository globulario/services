      severity: critical
      status: active
      summary: |
        MinIO's per-drive format.json (disk UUID, pool/set index, DeploymentID) is
        the cluster's only authoritative formatted-drive identity. Standard MinIO
        recovery (mc admin heal) requires a quorum of formatted drives to bootstrap,
        so if every drive loses its format.json the cluster cannot self-heal —
        leaving operators to choose between data loss (reformat) or offline backup
        restore (which most deployments don't have).

        Each node-agent's MinIO reconcile cycle must (a) snapshot the on-disk
        format.json into etcd at /globular/objectstore/format_backup/<node_id>/<drive_basename>
        after MinIO has successfully written it, scoped by the current topology
        fingerprint, and (b) restore from the snapshot before MinIO is allowed to
        start when format.json is missing from disk AND the snapshot's topology
        fingerprint matches the current desired state. Per-drive identity stays
        local — the snapshot is also per-drive. The topology fingerprint guard
        prevents restoring an incompatible format after a deliberate transition
        (e.g. xl-single → xl distributed).

