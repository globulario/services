    \ clear is traceable.\n  5. Otherwise: leave the record in place.\n\nThe sweep must remain level-triggered and idempotent\
    \ — its\ncorrectness depends on running every tick, not only on\ndep-active state transitions. The edge-triggered path\
    \ in\n`release_pipeline.go` (the `depClearedNodeIDs` branch of\n`reconcileResolved`) is a fast path; the sweep is the\
