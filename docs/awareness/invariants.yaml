      severity: high
      status: planned
      summary: |
        When a service process escapes its systemd cgroup (e.g., via a child fork, exec, or
        race during upgrade), systemd cannot track or kill it on restart. The orphan continues
        holding its port, causing the new instance to reallocate to a different port. This
        triggers a cascade: etcd gets a new address, the mesh may route to the old address,
        the controller sees an interface mismatch, and opens circuit breakers. Every service
        unit file AND its inline spec counterpart must include:
