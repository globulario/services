  ruleguard_rules_file: cmd/principle-check/rules/identity_field_writers_preserve_semantic.go
  scan_pattern: placeholder_unused_when_analysis_mode_is_ruleguard
  severity: critical
  status: active
  summary: 'Per-instance enforcement of meta.identity_computation_must_be_invariant

    for the InstalledPackage.UpdatedUnix and .InstalledUnix fields. The

    v1.2.164 regression: heartbeat.go (an observer-only context)

    unconditionally stamped existing.UpdatedUnix = time.Now().Unix()

    on every sweep. The verifier read max(InstalledUnix, UpdatedUnix)

    > PID-start and flagged service.old_pid_after_upgrade on

    correctly-installed services. Fix: heartbeat preserves the

    existing value for self-hosted services on the allowlist.


    The principle: these timestamp fields carry the INSTALL ANCHOR

    — when the running binary''s PID started, derived from the

    manifest install or the proof writer. Observer contexts that

    report "what I see now" must NOT substitute their observe

    timestamp for the anchor. Either preserve the existing value

    (the v1.2.164 fix) or — for legitimate anchor-write paths

    (install commit, repair, default-if-unset) — set it to the

    derived anchor at that moment.


    The ruleguard rule catches `$_.UpdatedUnix = time.Now().Unix()`

    and `$_.InstalledUnix = time.Now().Unix()` shapes. Legitimate

    anchor writers (install/repair paths, default-if-unset)

    are classified as EXCEPTION below; any NEW writer outside

    this allowlist is a regression candidate.

    '
  title: InstalledPackage timestamp writers must preserve the install anchor during observe — never stomp with wall-clock
    time.Now()
