  architectural_decision: "Resolved 2026-06-05. The deferred test\nTestReconcileLoop_DispatchesOneInstancePerArtifactNodePair\n\
    carried an ambiguity between two readings of \"one workflow\ninstance per (artifact, node) pair\":\n\n  (a) one step-receipt\
    \ instance (run_id + step_id) per pair,\n      with one workflow_run per release iterating nodes via\n      foreach; OR\n\
    \  (b) one workflow_run row per pair (N runs per release).\n\nThe operative reading is (a). Evidence:\n\n  - release.apply.package.yaml\
    \ has an apply_per_node step with\n    foreach: $.selected_targets that produces N per-node step\n    receipts inside\
    \ ONE run.\n  - release.apply.infrastructure.yaml and release.apply.controller.yaml\n    follow the same shape (foreach\
    \ over followers / targets).\n  - The controller dispatches ONE workflow per release via\n    RunPackageReleaseWorkflow(...,\
    \ nodeIDs []string, ...) in\n    release_pipeline.go; the inflightWorkflows map is keyed by\n    releaseID, not (releaseID,\
    \ nodeID).\n  - The existing required_tests already pin the per-step actor\n    attribution (TestMarkNodeSucceeded_*,\n\
    \    TestReleaseApplyWorkflows_NoStateMutationAttributedToWorkflowService),\n    which is the per-pair grain in interpretation\
    \ (a).\n\nTestReleaseApplyWorkflows_DispatchOneRunPerReleaseWithPerNodeForeach\nis the closure test: it statically asserts\
    \ every\nrelease.apply.*.yaml has a foreach step, encoding interpretation\n(a) into a YAML-static regression check so\
    \ a future refactor\nthat splits one release into N workflow_run rows would fail this\ntest and require either updating\
    \ the architectural_decision\nblock here OR reverting the YAML.\n\nA controller-level dispatch-tuple capture test (the\
    \ original\nframing — TestReconcileLoop_*) remains conceivable but is no\nlonger required: the dispatch path is single-run-per-release\
    \ by\nconstruction, and the YAML-static test pins that construction.\nA future test seam on executeWorkflowCentralized\
    \ would be\nuseful for testing failure-injection scenarios but is not\nload-bearing for this invariant.\n"
