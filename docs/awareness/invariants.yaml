      summary: |
        Per the platform's storage rule, MinIO is for secondary user data only.
        Package artifacts physically live in two places, both POSIX:
          1. /var/lib/globular/packages/ — the canonical install-time CAS that
             node-agent's InstallPackage reads from. Filled by Day-0 bundle, by
