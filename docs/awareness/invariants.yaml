  severity: high
  status: active
  summary: "Per-instance enforcement of meta.principal_must_survive_proxy_chains.\nThe bug shape is the confused deputy (Hardy\
    \ 1988): a gRPC server\nextracts peer.FromContext to identify the caller and authorizes\nagainst that peer identity. When\
    \ a gateway, sidecar, or trusted\nproxy sits in front of the service, the peer cert is the\ngateway's — not the user's\
    \ — so authorizing against the peer\ngrants the gateway's scope to anyone the gateway accepts.\n\nThe principle says the\
    \ originating principal must survive the\nproxy chain via JWT claims, signed RPC metadata, or an mTLS\nchain whose terminal\
    \ subject is the principal. The peer\nidentity is metadata about the path the request took, not\nauthority for the request.\n\
    \nCanonical good shape:\n  1. Extract the peer identity for transport-level allowlisting.\n  2. Extract the principal\
    \ from JWT claims (via the interceptor\n     chain) for authorization.\n  3. Authorize against the PRINCIPAL.\n\nToday's\
    \ sweep: 0 findings. The interceptor chain centralizes\nprincipal extraction in golang/interceptors and handlers\nauthorize\
    \ against the resolved principal, not raw peer.\nPure regression detector — catches a new handler that bypasses\nthe interceptor\
    \ chain and inspects peer.FromContext for an\nauthorization decision.\n"
  title: gRPC server handlers must authorize against the originating principal (JWT claims, signed metadata) — never against
    peer.FromContext alone
