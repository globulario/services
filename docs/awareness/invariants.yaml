      summary: |
        ServiceRelease.Status.Phase is the controller's
        authoritative claim about whether a release is in
        progress, succeeded, or failed. A release that has
        entered FAILED (e.g. because the release-resolver could
        not find the artifact on the first attempt — a publish
        race) does NOT auto-recover when the resolver later
        succeeds. The drift-reconciler may still dispatch child
        workflows and observe SUCCEEDED status, but the release
        itself remains FAILED and no install is actually
        dispatched.

