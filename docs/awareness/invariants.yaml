      id: awareness.child_intent_must_align_with_parent
      protects:
        files:
            - docs/intent/meta/intent_requirement_child_alignment_contract.yaml
            - docs/intent/
        symbols:
            - intent.parent_intent
            - intent.created_from_requirement
            - intent.alignment.verdict
            - intent.capability_resolution.verdict
      related_failure_modes:
        - services.drift_never_escalates
      required_tests:
        - TestMetaIntentRequirementChildAlignmentContractIsActive
      severity: critical
      status: active
      summary: |
        Intent creates requirements; requirements may create child intents. Every child
        intent must prove alignment with its parent before it may create code, workflow
        steps, schema, remediation, or operational behavior. A child intent may specialize
        or operationalize the parent — it must not broaden, invert, bypass, duplicate, or
        replace it. Without this rule, decomposition silently drifts: a technically useful
        child intent can quietly reroute authority, hide degraded state, or duplicate an
        owned capability while still "resolving" its requirement. See
        docs/intent/meta/intent_requirement_child_alignment_contract.yaml and
        docs/awareness/intent_alignment_preflight.md.
      title: Requirement-born child intents must preserve parent intent direction
    - decision_guidance:
        - impact-ci is the final automated gate — it enforces that required_tests listed in invariants.yaml actually exist on disk before merge
        - Never exit 0 when required tests are missing, even as a 'temporary workaround' — this breaks the invariant→test→CI enforcement chain entirely
        - The exit code must be 1 (not panic, not 2) so CI systems can distinguish 'test missing' from 'tool crashed'
      forbidden_fixes:
        - skip_required_test_check_in_ci
        - exit_0_on_missing_mandatory_tests
      id: awareness.ci.impact_ci_enforces_required_tests
      implemented_by:
        - file: golang/globularcli/awareness_impact_ci_cmd.go
          functions:
            - awarenessImpactCICmd
            - verifyGapTestsDirs
          trust: declared
      protects:
        files: null
        symbols:
            - awarenessImpactCICmd
            - verifyGapTestsDirs
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
      required_tests:
        - TestAwarenessImpactCI_ExitsOneOnMissingTest
        - TestAwarenessImpactCI_PassesWhenTestsPresent
      severity: critical
      status: active
      summary: |
        The CI enforcement command (awareness impact-ci) is the automated guardrail
        that prevents merging code that implements invariants without their required
        tests. It must: (1) run ExplainImpactByFile for each changed file; (2) verify
        that all required_tests referenced by impacted invariants exist on disk;
        (3) exit 1 with an actionable graph-path-annotated error message when tests
        are missing. Without this, the entire invariant→test enforcement chain has no
        automated enforcement.
      title: awareness impact-ci must exit 1 when required tests are missing for changed files
      verified_by:
        - TestAwarenessImpactCI_ExitsOneOnMissingTest
        - TestAwarenessImpactCI_PassesWhenTestsPresent
    - authority: null
      decision_guidance:
        - Any new edge constant in graph/edges.go MUST be added to edgeDomains in domain.go before merging — missing entries default to DomainInformation, silently making decision-class edges invisible to the scorer
        - Do not default a new edge to DomainDecision to 'make it rank higher' — only edges that encode allowed/forbidden actions or required verification belong in the decision domain
      forbidden_fixes:
        - skip_edge_domain_classification
        - default_new_edge_to_decision_domain
        - ignore_forbidden_fix_edges_in_scoring
      id: awareness.graph.domain_classification_required
      implemented_by:
