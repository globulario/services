    - enforcement: |
        - Build pipeline computes seed_sha256 over canonical-form YAML for each entry; stamps
          it into provenance.seed_sha256 in the bundled file; emits the same hash into the
          awareness bundle manifest under entries[].seed_sha256.
        - InstallBundle extracts docs/operational-knowledge/ to /var/lib/globular/operational-
          knowledge/ as part of the atomic bundle install.
        - SeederWorkflow runs once per cluster after ai-memory becomes verified. For each YAML
          entry: compute SHA256, compare to manifest, abort the workflow with FAILED status on
          mismatch. On match: upsert into ai-memory with metadata.source="seed",
          metadata.seed_version, metadata.seed_sha256, metadata.immutable=true.
        - ai-memory's Update and Delete RPCs MUST reject any request targeting an entry with
          metadata.source = "seed" unless the gRPC principal is "seeder". Returns
          PERMISSION_DENIED. Exception: the seeder workflow itself may upsert when the
          seed_sha256 changes (bundle upgraded).
