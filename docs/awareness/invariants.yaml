      title: The CNI plugin must be running and ready on each Kubernetes node
    - id: k8s.core_dns.available
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
      severity: critical
      status: planned
      summary: |
        CoreDNS failure breaks all K8s service discovery. Always check if the node
        hosting CoreDNS is substrate-healthy before escalating.
      title: CoreDNS must be available and responding to queries
    - id: k8s.crashlooping_pods.explained
      related_invariants:
        - meta.absence_scope_must_be_explicit
      severity: medium
      status: planned
      summary: |
        CrashLoopBackOff may be workload_owned (app crash) or substrate_owned
        (storage mount, network unreachable). Check substrate first.
      title: Every CrashLoopBackOff pod must have a classified root cause before escalation
    - forbidden_fixes:
        - confuse_k8s_etcd_with_globular_etcd
      id: k8s.etcd.quorum_available
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
      severity: critical
      status: planned
      summary: |
        This is the Kubernetes-internal etcd (typically port 2379 on control-plane nodes),
        NOT the Globular etcd. They are separate instances. Quorum loss is
        kubernetes_control_plane_owned unless a substrate node failure caused it.
      title: Kubernetes-internal etcd must maintain quorum
    - id: k8s.kube_proxy.available_on_each_node
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
      severity: high
      status: planned
      summary: |
        kube-proxy failure breaks service routing. May be substrate-owned if the
        node is unhealthy from a Globular perspective.
      title: kube-proxy must be available on each Kubernetes node
    - id: k8s.namespace_not_stuck_terminating
      related_invariants:
        - meta.half_done_must_not_look_done
      severity: medium
      status: planned
      summary: |
        A stuck namespace indicates either a finalizer issue (workload_owned) or
        API server/etcd problem (kubernetes_control_plane_owned). Never delete
        finalizers without classifying the root cause.
      title: No Kubernetes namespace may be stuck in Terminating state for more than 10 minutes
    - id: k8s.nodes.ready_count_matches_expected
      related_invariants:
        - meta.assertions_must_carry_their_scope
      severity: critical
      status: planned
      summary: |
        A mismatch between Ready K8s nodes and healthy Globular nodes indicates either
        a substrate issue or a Kubernetes node registration problem. The substrate check
        must happen first — a down Globular node IS the root cause of K8s NotReady.
      title: The number of Ready Kubernetes nodes must match the number of healthy Globular nodes
    - id: k8s.pending_pods.explained
      related_invariants:
        - meta.absence_scope_must_be_explicit
      severity: medium
      status: planned
      summary: |
        Unclassified Pending pods are unknown_insufficient_evidence. Classification
        requires checking: scheduler events, PVC binding status, node capacity,
        and substrate health.
      title: Every pod stuck in Pending for more than 5 minutes must have a classified reason
    - id: k8s.pvc_bound_or_reason_known
      related_invariants:
        - meta.absence_scope_must_be_explicit
      severity: high
      status: planned
      summary: |
        Unbound PVCs block pod scheduling. May be substrate_owned if the storage
        provisioner (MinIO, NFS) is a Globular-managed service that is down.
      title: Every PersistentVolumeClaim must be bound or have a classified reason for being unbound
    - id: k8s.service_has_ready_endpoints
      related_invariants:
        - meta.absence_scope_must_be_explicit
      severity: high
      status: planned
      summary: |
        A service with zero endpoints means all backing pods are unavailable.
        This may be substrate_owned if pods are crashing due to node/storage issues.
      title: Every Kubernetes Service must have at least one ready endpoint
    - id: k8s.system_pods.available
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
      severity: high
      status: planned
      summary: |
        kube-system pod failures cascade to workload failures. Check substrate
        (node health, storage, network) before classifying as workload_owned.
      title: All kube-system pods must be available and not crash-looping
    - enforcement: |
        - The keepalived config rendered by node-agent MUST include a vrrp_script block per
          health-check target.
        - The interval/fall/rise parameters MUST be tuned to detect failure within ~3-5
          seconds without flapping on transient blips.
        - The VRRP priority + weight MUST be sized so that a single failed check drops a
          MASTER below the next BACKUP's priority.
      forbidden_fixes:
        - skip_vrrp_script_to_avoid_flapping
        - hardcode_master_priority_so_one_node_always_wins
      id: keepalived.health_gated_failover
      protects:
        files:
            - golang/node_agent/node_agent_server/internal/ingress/keepalived/render.go
            - golang/node_agent/node_agent_server/internal/actions/keepalived.go
        state:
            - /etc/keepalived/keepalived.conf
            - /globular/ingress/v1/spec
            - /globular/ingress/v1/status/<node-id>
        symbols:
            - renderKeepalivedConfig
            - vrrpScriptForCluster
      related_failure_modes:
        - vip_contamination.node_routable_ip_returns_vip
      related_invariants:
        - meta.authority_must_express_uncertainty
      required_tests:
        - TestKeepalivedConfigContainsHealthScript
        - TestUnhealthyMasterLosesPriorityBelowBackup
      severity: warning
      status: active
      summary: |
        Each keepalived-bearing node runs vrrp_script health checks (gateway responsive,
        controller reachable). If checks fail, the node demotes itself by lowering its VRRP
        priority via `weight`, causing another node to win the election and take the VIP.

        This prevents a sick node from holding the VIP and routing external traffic to itself
        while broken. A node with broken local gateway should LOSE the VIP, not keep it.
      title: keepalived MUST only advertise as MASTER when local services are healthy; failover triggered by health check failure
    - forbidden_fixes:
        - continue_writing_after_lease_expiry
        - fence_only_at_individual_write_sites_not_interceptor
        - retry_lease_before_fencing_in_flight_writes
      id: leader.write_must_be_fenced_on_lease_expiry
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/leader_election.go
            - golang/cluster_controller/cluster_controller_server/leader_proxy.go
            - golang/cluster_controller/cluster_controller_server/leader_liveness.go
      related_invariants:
        - meta.competing_writers_must_converge_or_be_fenced
      required_tests:
        - TestLeaderFence_RejectsWriteAfterLeaseExpiry
      severity: critical
      status: active
      summary: |
        When the cluster controller loses its election lease, it must immediately
        reject all write operations to etcd — even if the process still holds
        leadership context in memory. Writes after lease expiry constitute a
        split-brain risk: two controllers may write conflicting desired state
        simultaneously. The fence must be enforced at the interceptor level,
        not at individual write sites.
      title: Controller leader must fence all writes immediately on lease expiry
    - forbidden_fixes:
        - add_etcd_get_to_allowedremotetools_for_debugging
        - add_etcd_put_or_etcd_delete_to_allowedremotetools_under_any_condition
        - introduce_a_separate_remote_allowlist_for_privileged_tools
        - make_allowedremotetools_configurable_at_runtime
        - route_etcd_calls_through_a_proxy_tool_that_is_itself_in_the_allowlist
      id: mcp.etcd.tools_must_not_join_remote_allowlist
      protects:
        files:
            - golang/mcp/tools_etcd.go
            - golang/mcp/aggregator_policy.go
        symbols:
            - allowedRemoteTools
            - registerEtcdTools
      related_failure_modes:
        - mcp.etcd_remote_allowlist_expansion
      related_invariants:
        - meta.state_mutations_must_be_durably_committed_before_side_effects
      severity: critical
      status: active
      summary: |
        golang/mcp/tools_etcd.go exposes etcd_get / etcd_put / etcd_delete as
        local diagnostic tools. They reach past every typed service into the
        cluster's source of truth, and an arbitrary put or delete can corrupt
        cluster state in ways that surface as cascading failures across
        subsystems hours later.

        The cross-node remote_call surface (golang/mcp/aggregator_policy.go's
        allowedRemoteTools) is a strict allowlist of READ-ONLY tools that one
        node's MCP server may invoke on another's. Adding any etcd_* tool
        there would let a compromised or misbehaving peer MCP mutate
        cluster-wide etcd state without an audit trail or controller-side
        guard — directly violating the
        critical_state.deletion_requires_audited_intent invariant.

        Etcd tools must stay local-only. The allowlist is intentionally not
        configurable at runtime; adding etcd_* requires an explicit code
        change here AND in aggregator_policy.go, both of which are reviewable.
      title: Direct etcd MCP tools MUST NOT appear in the cross-node aggregator remote_call allowlist
    - forbidden_fixes:
        - substitute_os_readfile_for_fileservice_readfile_in_mcp_bridge
        - add_a_local_disk_fallback_when_file_service_is_unreachable
        - cache_file_service_responses_on_local_disk
        - implement_a_host_fs_helper_inside_tools_file_and_call_it_from_a_handler
        - bypass_file_service_for_files_under_a_safelist_of_paths
      id: mcp.file_tool_uses_file_service_not_host_fs
      protects:
        files:
            - golang/mcp/tools_file.go
        symbols:
            - registerFileTools
      related_failure_modes:
        - mcp.file_tool_host_fs_escape
      related_invariants:
        - meta.storage_is_not_semantic_authority
      severity: critical
      status: active
      summary: |
        golang/mcp/tools_file.go is the agent-facing bridge for file
        operations on cluster-user data. The cluster's file service enforces
        RBAC (per-user mount roots, per-resource permissions, audit log).
        The MCP bridge forwards path strings verbatim to the file service —
        validation, authorization, and audit all happen server-side.

        Substituting os.* / ioutil.* / filepath.Walk against the host
        filesystem inside an MCP file tool would:

          - bypass RBAC entirely (the host fs has no per-user mount root)
          - expose host paths to agents, including /var/lib/globular/pki/,
            other tenants' MinIO data dirs, etc.
          - silently produce results the file service would have rejected
          - leave no audit trail on the file service

        The bridge's job is to translate args + propagate the caller's
        identity to the file service, NOT to fulfill the operation locally.
        Adding "a fast path that just reads the file directly" is the
        canonical way to ship this bug.
      title: MCP file tools MUST go through the Globular file service gRPC API; direct host-fs access is forbidden
    - decision_guidance:
        - 'New MCP tool needs to call a gRPC service? Use: conn, err := s.clients.get(ctx, gatewayEndpoint()); stub := mypb.NewMyServiceClient(conn)'
        - Never import a *_client package inside golang/mcp/ — the shared pool in clients.go is the only dial path
        - Never call config.ResolveServiceAddr or config.GetMeshAddress from a tool handler — gatewayEndpoint() in clients.go already does this correctly
      forbidden_fixes:
        - mcp_tool_custom_grpc_client
        - mcp_tool_direct_service_discovery
      id: mcp.tools.use_gateway_client_pool
      protects:
        files:
            - golang/mcp/tools_awareness.go
            - golang/mcp/tools_backup.go
            - golang/mcp/tools_cluster.go
            - golang/mcp/clients.go
        symbols:
            - gatewayEndpoint
            - clientPool.get
      related_invariants:
        - meta.storage_is_not_semantic_authority
      required_tests:
        - TestAwarenessToolsDialThroughGateway
      severity: high
      status: active
      summary: |
        Every MCP tool that calls a Globular gRPC service must obtain its connection
        via s.clients.get(ctx, gatewayEndpoint()) — the shared clientPool defined in
        golang/mcp/clients.go. Envoy's gRPC path-based routing then delivers the call
        to the correct service regardless of which node it is running on.

        Creating a standalone *grpc.ClientConn, rolling custom TLS config, or
        implementing per-tool service discovery (etcd lookup, gateway /config fallback,
        direct port resolution) is forbidden. Those paths each re-implement logic that
        is already correct and tested in clients.go, and they bypass the Envoy mesh
        — breaking HA failover, load balancing, and connection reuse.

        The awareness tools were the canonical example of this mistake: they used a
        custom awareness_graph_client.Client with its own ResolveServiceAddr call,
        which failed when the MCP process could not reach etcd directly, producing a
        misleading "service not registered in etcd" error even when the service was
        running and Envoy had a valid route.
      title: MCP tools must dial services through the shared gateway client pool, never with custom gRPC clients
    - forbidden_fixes:
        - apply_migration_without_idempotency_guard
        - skip_migration_check_if_key_partially_written
        - assume_migration_already_ran_without_verification
      id: migration.state_path_upgrade_must_be_idempotent
      protects:
        files:
            - golang/repository/repository_server/migration.go
            - golang/cluster_controller/cluster_controller_server/state.go
            - golang/node_agent/node_agent_server/state.go
      related_invariants:
        - meta.half_done_must_not_look_done
      required_tests:
        - TestMigrateBuildIDs_Idempotent
        - TestMigrateLegacyStatePath_Idempotent
        - TestMigrateLegacyStatePath_NodeAgent_Idempotent
      severity: high
      status: active
      summary: |
        Any state path migration (etcd key rename, schema upgrade, build_id
        backfill) must be idempotent: running it twice on the same state must
        produce the same final state with no corruption, double-application, or
        spurious writes. This applies to node_agent startup migrations and
        controller startup migrations. Non-idempotent migrations cause silent
        data corruption on restart after a crash mid-migration.
      title: State path migrations must be idempotent — safe to run twice
    - actor_writer_dirs:
        - golang/cluster_controller/cluster_controller_server
      analysis_mode: ruleguard
      exception_files:
        - category: exception_canonical_stableip_fallback
          file: cluster_controller/cluster_controller_server/state.go
          reason: |
            state.go:550 is INSIDE the StableIP() method itself —
            specifically the fallback branch that returns PrimaryIP()
            when no non-VIP IP can be found in node.Identity.Ips.
            This is the canonical implementation of the fix; calling
            PrimaryIP here is correct because StableIP IS the
            ambiguity-disambiguator and this is its degraded path.
      forbidden_fixes:
        - use_primaryip_for_pool_membership
        - use_primaryip_for_etcd_endpoint
        - use_primaryip_for_scylla_hosts
      id: netutil.identity_getter_must_express_vip_ambiguity
      protects:
        files:
            - golang/netutil/node_identity.go
            - golang/cluster_controller/cluster_controller_server/state.go
        symbols:
            - PrimaryIP
            - StableIP
      related_invariants:
        - meta.authority_must_express_uncertainty
      required_tests: []
      ruleguard_rules_file: cmd/principle-check/rules/authority_uncertainty_primaryip_ambiguous.go
      scan_pattern: placeholder_unused_when_analysis_mode_is_ruleguard
      severity: high
      status: active
      summary: |
        Per-instance enforcement of meta.authority_must_express_uncertainty
        for the PrimaryIP / StableIP authority surfaces. The principle:
        when a node holds the cluster VIP, PrimaryIP() returns the
        VIP, not the node's stable identity. PrimaryIP cannot tell the
        caller "the answer depends on whether I'm currently holding the
        VIP" — it just returns a string. Callers in identity-critical
        contexts (etcd endpoint publish, scylla hosts, /etc/hosts,
        self-identification, pool membership) fabricate stable identity
        from this unstable value, producing drift when the VIP moves.

        The fix in every prior incident: replace PrimaryIP() with
        StableIP(clusterVIP), which excludes the VIP and forces the
        caller to name the VIP explicitly — the question "do you want
        my stable identity or my transient VIP role?" surfaces at
        every call site instead of being hidden inside one method.

        Three prior incidents in this class:
          - etcd member eviction (VIP-holder's published endpoint moved
            with the VIP, breaking etcd cluster membership)
          - scylla cluster contamination (publishScyllaHostsIfNeeded
            wrote VIP into hosts list)
          - /etc/hosts cross-node contamination on VIP failover

        The ruleguard rule matches `$_.PrimaryIP()` callsites. Today's
        sweep finds 2 production sites in cluster_controller_server
        that compare PrimaryIP() against localIP for self-
        identification — both are DRIFT candidates worth review. One
        site in state.go (line 550) is the canonical fallback inside
        StableIP itself; classified as EXCEPTION.
      title: Identity-critical comparisons must use StableIP(vip), not PrimaryIP — the floating VIP corrupts self-identification and pool membership
      unknown_helper_files: []
      workflow_step_handler_files: []
    - forbidden_fixes:
        - admit_node_when_join_id_mismatches
        - grant_admission_on_etcd_lookup_failure
        - skip_join_id_check_for_legacy_nodes
      id: node.admission.proof_must_match_issued_join_id
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/node_admission_proof.go
            - golang/cluster_controller/cluster_controller_server/node_admission_status.go
      related_invariants:
        - meta.binding_outlives_evidence_until_invalidated
      required_tests:
        - TestAdmissionProof_WrongJoinIDBlocks
        - TestAdmissionProof_WrongNodeIdentityBlocks
        - TestAdmissionProof_EtcdFailedBlocksAdmission
      severity: critical
      status: active
      summary: |
        A node presenting an admission proof must provide a join_id that exactly
        matches the join_id recorded in the join request in etcd. If they differ,
        admission is rejected regardless of all other proof components. Etcd
        failure during proof lookup must block admission — it must never default
        to granted.
      title: Node admission proof must match the join ID issued at request time
    - description: |
        Node-agent must refuse to downgrade any installed package to a lower version unless Force=true is explicitly set in the apply request. Automatic rollback is forbidden at the node layer.
      forbidden_fixes:
        - adding auto-downgrade logic for "health recovery"
        - making Force=true the default to avoid operator friction
        - allowing version rollback without an explicit desired-state change
      id: node.package_downgrade_requires_force_flag
      protects:
        files:
            - golang/node_agent/node_agent_server/apply_package_release.go
      rationale: |
        Discovered via production guard in apply_package_release.go:262 ("refuse to downgrade ... automatic rollback is forbidden"). Automatic rollback hides the root cause, can cascade to other nodes, and bypasses the 4-layer model — the controller must always initiate downgrade via desired state, not the node.
      related_invariants:
        - meta.state_mutations_must_be_durably_committed_before_side_effects
      required_tests:
        - TestApplyPackageRelease_RefusesDowngradeWithoutForce
      severity: critical
      status: active
      title: Automatic package downgrade is forbidden — Force=true required for manual rollback
    - forbidden_fixes:
        - allow_node_agent_to_read_other_nodes_plans
        - grant_node_executor_desired_state_write
        - grant_node_executor_rbac_admin
        - bypass_scope_gate_for_bootstrap_convenience
      id: node.scope.agent_has_minimal_read_write_boundary
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/node_scope.go
      related_invariants:
        - meta.storage_is_not_semantic_authority
      required_tests:
        - TestEnforceNodeScope_CrossNode_ReportNodeStatus
        - TestEnforceNodeScope_CrossNode_ReportPlanRejection
        - TestNodeExecutorCannotAccessOtherNodesPlans
        - TestNodeExecutorCannotMutateDesiredState
        - TestNodeExecutorCannotPublish
        - TestNodeExecutorCannotPerformRBACAdmin
      severity: critical
      status: active
      summary: |
        A node-scoped principal (node agent service account) may only report or
        read state for its own node. Cross-node reads of other nodes' plans or
        status must be rejected. Node executors must never write desired state,
        publish artifacts, perform RBAC admin, or access controller-admin paths
        regardless of context. The enforcement is at the interceptor scope gate,
        not by convention.
      title: Node agents are confined to their own node — no cross-node reads or writes
    - forbidden_fixes:
        - downgrade_skip_path_to_always_reinstall_to_avoid_the_state_drift
        - treat_etcd_service_config_mismatch_as_self_healing_via_next_install
        - patch_apply_desired_to_force_an_install_dispatch_regardless_of_skip_result
      id: node_agent.install_skip_must_refresh_runtime_proof
      protects:
        files:
            - golang/node_agent/node_agent_server/grpc_workflow_skip.go
        symbols:
            - canSkipInstallPackage
            - installSkipResultAlreadyInstalled
      related_failure_modes:
        - node_agent.install_skip_without_service_config_update
        - service.old_pid_after_upgrade
      related_invariants:
        - meta.half_done_must_not_look_done
      required_tests: []
      severity: critical
      status: active
      summary: |
        The install-skip path in grpc_workflow_skip.go's
        canSkipInstallPackage exists because re-installing an
        already-correct binary is wasteful. The optimization
        is sound. The bug is that the skip path skips MORE
        than just the install:

          - it does NOT push an updated service-config record
            to etcd
          - it does NOT refresh InstalledUnix / UpdatedUnix
            anchors to the PID start time (the
            service.old_pid_after_upgrade contract)
          - it does NOT re-emit the installed_revision record
            to the repository

        Result: the binary is correctly at the new version,
        but every consumer of etcd's service-config thinks the
        OLD version is installed. The 4-layer truth model
        disagrees with itself: Layer 1 (repository) says
        N+1, Layer 2 (desired) says N+1, Layer 3 (installed
        as reported in etcd) says N, Layer 4 (running PID
        binary) says N+1.

        The fix MUST refresh state without re-running the
        install — read the new manifest, stamp the etcd
        service-config record, refresh proof timestamps, and
        emit the installed_revision record. Treating skip as
        "no-op" is the bug.
      title: When node-agent skips install because the desired version is already physically present, it MUST refresh service-config and runtime proof in etcd
    - forbidden_fixes:
        - start_minio_without_objectstore_desired_state
        - infer_objectstore_topology_from_local_state
        - omit_objectstore_config_from_critical_registry
      id: objectstore.desired_state_must_be_registry_governed
      protects:
        files:
