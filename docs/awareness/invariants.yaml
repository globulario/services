        repository service's storage (Scylla manifest + MinIO blob). But
        node-agent's install path is local-only — it searches
        /var/lib/globular/packages/ (and the pinned dir) for a .tgz by exact
        filename. Nothing bridged the two: new versions arrived in the
        repository service but the local install dir was never updated.

