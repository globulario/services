  severity: high
  status: active
  summary: 'The workflow service is a router for state mutations attributed

    to other actors (cluster-controller, node-agent, repository,

    etc.). Its OWN state writes are limited to runtime bookkeeping:

    workflow_runs rows, step receipts, correlation_defer_state

    rows, etc. These live in Scylla, not etcd.


    Direct etcd writes from inside golang/workflow/ would violate

    four_layer.workflow_actor_attribution_required — the workflow

    service substituting its identity for an actor''s. The only

    legitimate etcd write from this directory is at pre-workflow

    bootstrap: SeedCoreWorkflows writes the workflow definitions

    to etcd at controller startup (etcd is below the workflow

    layer; the definitions are read at workflow dispatch time).


    This invariant is the principle-check v1 multi-principle proof:

    same scan pattern as workflow.every_state_mutation_belongs_to_a_workflow_instance,

    different actor scope (workflow/ instead of the three primary

    actor-writer dirs), independent exception classification.

    '
  title: The workflow service writes only its own runtime state (step receipts, defer counters) — never cluster intent
  unknown_helper_files: []
  workflow_step_handler_files: []
