- id: gateway.cohosted_grpc_services_must_be_declared
  title: A process that hosts multiple gRPC services must declare every reachable hosted service
  severity: high
  status: active
  summary: >
    A runtime process may serve more than one gRPC service on a single port (e.g.
    ai_memory also serves behavioral_memory.BehavioralMemoryService on the same
    gRPC server). The gateway/xDS route model only sees declared service names, so
    every externally reachable hosted service MUST be declared in service-registration
    metadata (HostedServices). xDS/gateway route generation must emit a route for
    the registered service Name AND each declared hosted service name, all targeting
    the same backend cluster unless explicitly overridden. Otherwise the gateway can
    lie: the backend is healthy on its direct port while the gateway has no route for
    the undeclared service, so requests fall through to the HTTP catch-all and return
    HTTP 200 text/html.
