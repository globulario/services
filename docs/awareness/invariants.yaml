  summary: 'Per-instance enforcement of meta.physical_clocks_disagree_use_logical_ordering.

    The bug shape: `time.Since(time.Unix(storedTimestamp, 0))` —

    converting a stored Unix timestamp to time.Time and comparing

    it against the local wall clock. This is Go''s idiomatic

    "how stale is this record?" pattern and is only correct when

    the timestamp was produced by the SAME node''s clock.


    When the timestamp comes from a remote node''s report (heartbeat,

    status update, workflow receipt), the comparison uses two

    independent physical clocks that drift independently. NTP

    corrects them but not atomically, so the staleness calculation

    can be negative, wildly wrong, or transiently correct.


    The correct pattern (already implemented for LastSeen):

    the SERVER stamps the observation at receipt time using its

    own clock, and all staleness checks compare against that

    server-stamped value.


    Also matches the millisecond variant:

    `time.Since(time.UnixMilli(storedMs))`


    Today''s sweep: 12 findings in cluster_controller. All known

    sites are server-stamped (the controller wrote the timestamp

    and later compares against its own clock) or leader-local

    (leader''s own atomic counter). These are CONFORMANT. The rule

    is a pure regression detector — a new time.Since(time.Unix(...))

    in a convergence/reconcile path would appear as UNKNOWN.

    '
