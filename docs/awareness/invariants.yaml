            controller-stamped at state-change time. Staleness checks
            use the controller's own clock.
        - category: server_stamped
          file: cluster_controller/cluster_controller_server/handlers_health.go
          reason: |
            installedUnix is the install-time anchor (PID start or
            apply time). The Day-0 unproven grace window compares
            against the controller's clock. The timestamp was set by
            the node agent but the grace window is generous enough
