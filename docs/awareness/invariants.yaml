        Discovered via TestReleaseTopologyLock_Idempotent in actors_objectstore_test.go:366. Workflow cleanup steps are retried on failure — a non-idempotent release causes cleanup to fail after a prior successful release, leaving the workflow in a stuck CLEANUP state.
      related_invariants:
        - meta.half_done_must_not_look_done
      required_tests:
        - TestReleaseTopologyLock_Idempotent
      severity: high
      status: active
      title: MinIO topology lock release must succeed even if lock does not exist
    - description: |
        ObjectStoreIntent.Member=true is necessary but not sufficient. A node must also appear in DesiredObjectStoreMembers in etcd before the controller treats it as a pool member.
      forbidden_fixes:
        - using ObjectStoreIntent.Member alone to determine pool membership
        - auto-enrolling nodes without a DesiredObjectStoreMembers write
      id: objectstore.membership_requires_explicit_desired_state
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/objectstore_members.go
      rationale: |
        Discovered via // INVARIANT comment in objectstore_members.go:17. Intent alone cannot drive membership — the controller must write a deliberate desired-state entry. Otherwise nodes join or leave the pool silently based on intent changes, causing MinIO erasure group instability.
      related_invariants:
        - meta.storage_is_not_semantic_authority
      severity: critical
      status: active
      title: MinIO pool membership requires explicit DesiredObjectStoreMembers entry
    - forbidden_fixes:
        - write_minio_config_from_local_state_without_etcd_source
        - omit_rendered_artifact_metadata_from_minio_contract_file
        - treat_minio_env_file_as_authoritative_topology_source
      id: objectstore.minio.config_render_source_must_be_etcd
      protects:
        files:
            - golang/node_agent/node_agent_server/minio_contract_reconcile.go
            - golang/node_agent/node_agent_server/minio_systemd_reconcile.go
            - golang/config/objectstore_config.go
        state:
            - /globular/objectstore/config
      related_invariants:
        - meta.storage_is_not_semantic_authority
      required_tests:
        - TestReconcileMinioContract_AlwaysSetsRenderedArtifactMetadata
        - TestLocallyEditedContractCannotBecomeTopologyAuthority
      severity: critical
      status: active
      summary: |
        MinIO runtime configuration files on disk — including minio.env and the systemd
        distributed.conf override — are rendered artifacts of ObjectStoreDesiredState.
        They must never be authored locally or treated as a source of truth. Each rendered
