  ruleguard_rules_file: cmd/principle-check/rules/connection_errors_must_not_be_absorbed.go
  scan_pattern: placeholder_unused_when_analysis_mode_is_ruleguard
  severity: high
  status: active
  summary: "Per-instance enforcement of meta.connection_errors_must_not_be_absorbed\nfor Go code in the services repo. The\
    \ bug shape this invariant\npins is:\n\n  conn, err := <connect_func>(...)\n  if err != nil {\n      // ... maybe log\
    \ or capture into a struct field ...\n      return nil, nil       // ← err CLASS absorbed\n  }\n\nThe connect_func is\
    \ one of: net.Dial / net.DialTimeout /\n(*net.Dialer).Dial / tls.Dial / tls.DialWithDialer /\ngrpc.Dial / grpc.DialContext\
    \ / grpc.NewClient /\nclientv3.New / (*gocql.ClusterConfig).CreateSession.\n\nReturning nil for the error position collapses\
    \ the connection\nerror class — TLS handshake failure, auth rejection, host\nunreachable, etcd endpoint down, Scylla quorum\
    \ lost all become\nthe same \"nothing happened\" signal at the caller. Three prior\nincidents (VIP cert 16h outage, auth-token\
    \ silent failure,\nScylla late-connect nil-handle) all match this shape.\n\nAcceptable patterns:\n  - return nil, err\
    \                                    (preserve identity)\n  - return nil, fmt.Errorf(\"...: %w\", err)             (wrap,\
