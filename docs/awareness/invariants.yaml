        records the generation last wiped on this node. clearMinioSysIfTransitionApproved
        reads the marker before wiping; if the marker equals state.Generation, the wipe
        is a no-op. A genuinely new transition (different generation) naturally re-arms
        the wipe path.
      title: A MinIO .minio.sys destructive wipe must execute exactly once per topology generation per node
