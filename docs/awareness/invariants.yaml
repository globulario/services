        - category: exception_translation_to_structured_health_report
          file: globular_service/describe_health.go
          reason: |
            HealthCheck function (DescribeService) intentionally translates
            grpc.DialContext errors into a structured HealthReport with
            the error preserved as report.Error (string) and the status
            set to HealthNotServing. The function returns (report, nil)
            for the Go-level error position because the connection error
            class is captured in report.Status + report.Error, not in
            the Go error return. Callers (Prometheus exporters, doctor
            sweeps) read report.Status. The error class survives — just
            via a different channel than typed-error propagation.
      forbidden_fixes:
        - forbidden.absorb_tls_error_into_timeout
        - forbidden.cache_nil_handle_permanently
        - return_nil_for_err_after_failed_dial
      id: connection.dial_err_must_carry_class_through_return_path
      protects:
        files:
            - golang/globular_service/describe_health.go
            - golang/globular_client/
        symbols:
            - DialContext
            - grpc.Dial
            - tls.Dial
            - net.Dial
      related_invariants:
        - meta.connection_errors_must_not_be_absorbed
      required_tests: []
      ruleguard_rules_file: cmd/principle-check/rules/connection_errors_must_not_be_absorbed.go
      scan_pattern: placeholder_unused_when_analysis_mode_is_ruleguard
      severity: high
      status: active
      summary: |
        Per-instance enforcement of meta.connection_errors_must_not_be_absorbed
        for Go code in the services repo. The bug shape this invariant
        pins is:

          conn, err := <connect_func>(...)
          if err != nil {
              // ... maybe log or capture into a struct field ...
              return nil, nil       // ← err CLASS absorbed
          }

        The connect_func is one of: net.Dial / net.DialTimeout /
        (*net.Dialer).Dial / tls.Dial / tls.DialWithDialer /
        grpc.Dial / grpc.DialContext / grpc.NewClient /
        clientv3.New / (*gocql.ClusterConfig).CreateSession.

        Returning nil for the error position collapses the connection
        error class — TLS handshake failure, auth rejection, host
        unreachable, etcd endpoint down, Scylla quorum lost all become
        the same "nothing happened" signal at the caller. Three prior
        incidents (VIP cert 16h outage, auth-token silent failure,
        Scylla late-connect nil-handle) all match this shape.

        Acceptable patterns:
          - return nil, err                                    (preserve identity)
          - return nil, fmt.Errorf("...: %w", err)             (wrap, preserve via %w)
          - return nil, &TypedConnectionError{Cause: err, ...} (lift to typed sentinel)

        Forbidden:
          - return nil, nil
          - return nil, fmt.Errorf("timeout")                  (string-only, %w missing)
          - return defaultValue, nil

        Translation patterns (e.g. a HealthCheck function converting
        connection errors into a structured HealthReport with the
        error preserved as a string field) are legitimate but require
        explicit classification under exception_files with a reason.
      title: Connection-dial errors must carry their class (TLS/auth/dial/quorum) through the return path — never absorbed into nil
      unknown_helper_files: []
      workflow_step_handler_files: []
