      severity: critical
      status: active
      summary: |
        A field stores ONE kind of value. The kind is named in the proto
        comment (or the awareness anchor on its parent identity). Every
        writer of the field must produce a value of that kind; every
        reader interprets it as that kind. Conditional interpretation
        ("if writer A set this it means X, if writer B set it it means Y")
        is the bug — the fix is to split the field, never to add the
        condition.

        Cardinal cases observed in the wild:

          - InstalledPackage.Checksum was being written by some installer
            paths as a release-identity hash (the
            ComputeReleaseDesiredHash output, ~5804f523…) and by other
            paths as a binary SHA (~2eb07b67…). Readers that compared it
            against ResolvedEntrypointChecksum (binary SHA from manifest)
            saw permanent rollout.installed_hash_mismatch. The fix in
            v1.2.161 made every installer write the binary SHA, matching
            the proto comment. The forbidden_fix anchored here pins that
            the BUG was the conditional semantic, not just the wrong
            value.

          - NodeReleaseStatus.InstalledHash had the same shape: workflow-
            callback writer #2 stored release-identity; convergence-scan
            writer #1 stored binary SHA. Fixed in v1.2.162.

          - UpdatedUnix had two semantic interpretations: proof writer
            treated it as "PID-start anchor"; heartbeat treated it as
            "now". Both are inside one service (node-agent) — same shape
            at the sub-actor level. Fixed in v1.2.164.

        The rule: if a field can carry two values that mean different
        things, the field has been over-loaded. Split it. Either two
        fields (each unambiguous), or rename to make the semantic
        explicit and reject the wrong-kind write at the writer.
      title: Every storage field has exactly one declared semantic across all writers; conditionally interpreting one field as multiple kinds of identity based on metadata is the bug
