    - enforcement: |
        - VerifyBundle runs manifest verification, tar-safety scan, and
          sha256 verification before any filesystem mutation outside staging.
        - PullBundle requires a non-nil ClusterCAPool. Nil pool returns
          ErrPeerTLSUnverified before any network call. There is no
          InsecureSkipVerify path for authoritative bundle installs.
        - InstallBundle re-runs Verify before extracting. Extraction goes
          to a unique staging dir; only after validateExtracted passes does
          the staging tree atomically rename into the immutable versioned
          path; only after that does the current symlink switch via tmp-then-
          rename. Crash between rename and symlink swap is recoverable
          (idempotent re-run completes the swap).
        - ExtractTarSafe re-classifies every entry per ValidateTarSafe rules
          during extraction. First unsafe entry stops extraction and removes
          the staging tree.
        - DiscoverSources filters peers by build_id match (and optional
          cluster_id, recency, RUNNING status) before they are even tried.
        - EnsureAwarenessBundle never inherits trust from a peer's claim;
          PullBundle re-verifies the manifest against the caller's expected
          (version, build_id) regardless of what discovery selected.
        - Classifier.Classify sets Readiness[LevelAwarenessReady]=false when
          the bundle is missing, stale, mismatched, schema-unsupported, or
          verification-failed. Architecture-sensitive classifications
          (SCYLLA_NOT_READY, ETCD_NOT_READY, etc.) are checked AFTER the
          bundle gates; a stale graph cannot classify a runtime fault.
        - DAY1_COMPLETE depends on AWARENESS_READY: a node never reports
          DAY1_COMPLETE while the bundle is anything other than READY.
      forbidden_fixes:
        - install_bundle_whose_build_id_differs_from_release_index
        - derive_build_id_from_bundle_filename
        - install_bundle_with_unsupported_schema_version
        - skip_sha256_verification_to_recover_a_pull
        - install_bundle_pulled_over_unverified_tls
        - extract_tar_entries_with_absolute_paths_or_traversal
        - mark_awareness_ready_after_failed_verification
        - mark_day1_complete_with_stale_or_missing_bundle
        - rebuild_graph_on_runtime_node_to_recover_from_stale
        - bypass_atomic_install_to_speed_up_recovery
        - delete_prior_active_bundle_on_install_to_save_disk
        - treat_a_node_serving_a_bundle_as_proof_the_bundle_is_trusted
