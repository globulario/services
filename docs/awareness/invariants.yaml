        directory name per logical service. The canonical form is the service's
        hyphenated package name (e.g. cluster-doctor, node-agent, ai-executor).
        Legacy aliases (underscore-form like cluster_doctor, no-separator form
        like clusterdoctor) may be RECOGNIZED for cleanup classification, but
        must not be ACTIVE runtime directories.

