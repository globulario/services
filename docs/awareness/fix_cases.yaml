    dod: All infrastructure convergence paths use ComputeInfrastructureDesiredHash, not ResolvedArtifactDigest.
    notes: "DONE 2026-05-07. infrastructure_reconciler.go: infraReleaseBuildID/infraHashConverged/mustNotUseResolvedArtifactDigest pure helpers. infra_release_handler.go: infraDesiredHashValid/infraWorkflowInputsValid. installed_services.go: StampInfraConvergenceHash stamps convergence hash after INFRASTRUCTURE install. grpc_workflow.go: calls StampInfraConvergenceHash on INFRASTRUCTURE install success. Breaks the Envoy restart storm loop."

