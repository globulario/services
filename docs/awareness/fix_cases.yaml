    dod: All infrastructure convergence paths use ComputeInfrastructureDesiredHash, not ResolvedArtifactDigest.
    notes: "Identified during Envoy restart storm 2026-05-06"

  - id: scylla_critical_keyspace_rf_policy
    title: Critical Scylla keyspace replication factor must match policy
    status: DONE
    pattern: "scylla keyspace RF below policy"
    category: database_resilience
    target_invariants:
      - scylla.critical_keyspace_replication_policy
    fixed_files:
      - golang/cluster_controller/cluster_controller_server/scylla_schema_guard.go
      - golang/cluster_doctor/cluster_doctor_server/rules/scylla_health.go
    required_tests:
      - TestRFPolicyEnforcedOn5NodeCluster
      - TestRFPolicyAllowsRF1OnSingleNode
      - TestRFAlterFailurePublishesDegradedStatus
    dod: Any critical keyspace below policy is detected, surfaced, and remediable without silent acceptance.
    notes: "DONE 2026-05-04. Residual: expand catalog coverage as new keyspaces added."

  - id: bootstrap_state_promotion
    title: Bootstrap desired state must require explicit promotion
    status: PARTIAL
    pattern: "bootstrap state authoritative"
    category: desired_state
    target_invariants:
      - desired.bootstrap_state_requires_promotion
    fixed_files: []
    remaining_files:
      - golang/cluster_controller/cluster_controller_server/desired_state_publisher.go
      - golang/cluster_controller/cluster_controller_server/promotion_reconciler.go
    required_tests:
