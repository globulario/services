      - TestFirstBootClaimsConvergenceOnlyAfterPromotion
    dod: Bootstrap defaults cannot accidentally become permanent cluster intent.
    notes: "PARTIAL 2026-05-04. authoritative field stamped; promotion reconciler not implemented."

  - id: absence_as_destructive_intent
    title: Missing control-plane key must not stop or delete runtime
    status: DONE
    pattern: "missing key stopped service"
    category: safety
    target_invariants:
      - critical_state.absence_is_not_destructive_intent
    fixed_files:
      - golang/node_agent/node_agent_server/ingress_consumer.go
    remaining_files:
      - golang/node_agent/node_agent_server/objectstore_consumer.go
      - golang/node_agent/node_agent_server/envoy_consumer.go
      - golang/node_agent/node_agent_server/dns_consumer.go
    required_tests:
      - TestMissingKeyDoesNotStopRuntime
      - TestDeleteKeyWhileRunningKeepsRuntimeActive
    dod: No critical runtime shuts down solely because a key is absent.
    notes: "DONE for ingress 2026-05-04. Objectstore/envoy/dns rollout is FUTURE."

  - id: lkg_expansion
    title: Last-known-good state must cover all critical consumers
    status: DONE
    pattern: "last known good"
    category: resilience
    target_invariants:
      - runtime.last_known_good_required_for_critical_consumers
    fixed_files:
      - golang/globular_service/lkg/lkg.go
      - golang/node_agent/node_agent_server/ingress_reconcile.go
      - golang/node_agent/node_agent_server/dns_sync.go
      - golang/node_agent/node_agent_server/minio_contract_reconcile.go
      - golang/node_agent/node_agent_server/xds_config_reconcile.go
    required_tests:
      - TestCorruptLKGRejectedPriorStateRetained
      - TestAtomicLKGWriteSurvivesRestart
      - TestEtcdOutageServesFromLKG
    dod: LKG is durable, validated, and reusable across all critical consumers.
    notes: "DONE 2026-05-07. All four critical consumers now have LKG. DNS was already done in dns_sync.go (loadDNSInitConfigWithLKGPath); objectstore already done in minio_contract_reconcile.go; ingress done in ingress_reconcile.go. The remaining_files in the original entry named files that do not exist — the consumers were wired into existing files. Envoy/xDS: new xds_config_reconcile.go implements file-first LKG guard for /var/lib/globular/xds/config.json (same pattern as dns_sync.go). All three required tests pass."

  - id: critical_state_registry_ownership
    title: Every critical key must have a registered owner and policy
    status: PARTIAL
    pattern: "critical key registry"
    category: governance
    target_invariants:
