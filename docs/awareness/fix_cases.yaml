    required_tests:
      - TestProjectionHangDoesNotBlockReleaseLane
      - TestScyllaDegradedAllowsIngressRepublish
      - TestTimeoutReleasesLaneLock
    dod: Global starvation pattern is eliminated by architecture, not operator intervention.
    notes: "DONE 2026-05-04. Lane isolation, timeout, metrics in place. New lanes must include timeout+status contract."

  - id: bounded_critical_queries
    title: All critical control-plane queries must have context deadline
    status: DONE
    pattern: "unbounded query"
    category: resilience
    target_invariants:
      - critical_queries.must_be_bounded
    fixed_files:
      - golang/cluster_controller/cluster_controller_server/reconciler.go
      - golang/cluster_controller/cluster_controller_server/dns_reconciler.go
    required_tests:
      - TestQueryTimeoutMappedToDegradedCategory
      - TestSlowBackendTriggersTimeoutAndLaneRecovery
    dod: No critical reconcile path can hang indefinitely.
    notes: "DONE 2026-05-07. withBounded() applied to 13 hot paths + DNS reconciler. fetchServiceInstances bounded via goroutine+select. Timeout errors map immediately to DEGRADED (not after 3 errors). Both required tests pass."

  - id: derived_state_blocks_authority
    title: Derived state failure must not block authority publication
    status: DONE
    pattern: "projection blocks authority"
    category: convergence
    target_invariants:
