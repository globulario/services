      - TestDeleteWithValidApprovalAccepted
      - TestStaleApprovalGenerationRejected
    dod: Key deletion is intentional, auditable, and reversible by default.
    notes: "PARTIAL 2026-05-04. Ingress delete-approval exists; integration + multi-domain missing."

  - id: reconcile_lane_starvation
    title: Reconcile lanes must not starve completion or critical publishers
    status: DONE
    pattern: "reconcile starvation"
    category: convergence
    target_invariants:
      - reconcile.global_work_must_not_starve_completion
    fixed_files:
