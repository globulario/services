      - TestDerivedLaneErrorDoesNotFlipAuthorityToBlocked
    dod: Authority lanes stay active under derived-state failures.
    notes: "DONE 2026-05-04. Authority-first ordering enforced."

  - id: recovery_without_dns
    title: Recovery must work without DNS resolution
    status: DONE
    pattern: "DNS unavailable recovery"
    category: resilience
    target_invariants:
      - recovery.must_not_depend_on_dns_only
    fixed_files:
      - golang/globularcli/resilience_cmds.go
      - golang/config/cluster_dns.go
    required_tests:
      - TestIngressCLIWorksWithDNSDisabled
      - TestControllerToNodeSkipsDNSOnLookupFailure
    dod: DNS outage does not block recovery of ingress/objectstore/schema invariants.
    notes: "DONE 2026-05-07. ClusterDialContext now falls back to /globular/cluster/dns/records (etcd hostname→IP map) when DNS UDP fails. Secondary fallback: Tier-0 host lists (GetMinioHosts/GetScyllaHosts/GetDNSHosts). Proven in Docker simulation: DNS stopped on all 3 nodes, etcd accessible, minio.globular.internal resolvable via records map. Both required tests pass."

  - id: destructive_action_guards
