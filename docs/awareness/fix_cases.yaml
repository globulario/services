    remaining_files: []
    required_tests:
      - TestRegistryKeyHasCompletePolicy
      - TestUnknownWriterRejected
      - TestDeleteCriticalKeyTriggerOwnerRestore
    dod: Critical key governance is declarative and enforceable via doctor iteration.
    notes: "DONE 2026-05-07. CriticalKeyPolicy struct + CriticalKeyPolicies table (8 entries covering all 5 keys + 3 prefixes) added to config package. OwnerForKey(), ValidateCriticalKeyOwner(), PolicyGapsForKeys() added. Collector populates CriticalKeyPolicyGaps statically (no etcd). Doctor criticalKeyOwnershipComplete invariant fires ERROR when any key in CriticalEtcdKeys/Prefixes lacks a policy entry — acts as CI regression guard. All 3 required tests pass. The controller's criticalStateRegistry in main package remains unchanged; the config package carries the subset accessible to doctor and other importers."

