      - TestExplicitValidDisableStopsRuntimeAndAuditable
    dod: Destructive transitions are always explicit, validated, and attributable.
    notes: "DONE 2026-05-07. IsExplicitDisable() guards node-agent keepalived action (spec.go). Doctor invariant ingressUnguardedDisableIntent fires CRITICAL from the desired spec itself — proactively, before any node processes it. Complements ingressAmbiguousDisableRejected (node status path). 4 tests pass: TestMalformedDisableDoesNotStopRuntime (4 sub-cases), TestExplicitValidDisableStopsRuntimeAndAuditable, TestActiveSpecProducesNoFinding, TestMissingSpecProducesNoFinding."

