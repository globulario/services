    remaining_files: []
    required_tests:
      - TestDeleteWithoutApprovalRestoresKey
      - TestDeleteWithValidApprovalAccepted
      - TestStaleApprovalGenerationRejected
    dod: Key deletion is intentional, auditable, and reversible by default.
    notes: "DONE 2026-05-07. Shared criticalKeyDeleteApproval struct + isValidDeleteApproval() + hasDeleteApprovalFromKVs() extracted to delete_approval.go (testable without etcd). objectstore_reconciler.go guards /globular/objectstore/config — restores from state via publishObjectStoreDesiredStateLocked() when key absent without valid tombstone at /globular/objectstore/delete_approval/. pki_reconciler.go guards /globular/pki/ca — restores via publishCAMetadataLocked() when absent without tombstone at /globular/pki/ca_delete_approval/. Both guards started from main.go alongside startIngressSpecGuard. Approval maxAge=24h; invalid actor/reason rejected. 3 required tests pass including boundary conditions."

