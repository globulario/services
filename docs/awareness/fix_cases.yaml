    required_tests:
      - TestRegistryKeyHasCompletePolicy
      - TestUnknownWriterRejected
      - TestDeleteCriticalKeyTriggerOwnerRestore
    dod: Critical key governance is declarative and enforceable via doctor iteration.
    notes: "PARTIAL 2026-05-04. Registry structs exist; doctor iteration not fully wired."

  - id: intent_markers_tombstones
    title: Critical key deletion requires audited intent marker
