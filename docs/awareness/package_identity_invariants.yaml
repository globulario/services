invariants:
  - id: repository.package_build_lane_unique
    title: Repository build-number lane must map to at most one build_id
    severity: critical
    status: active
    summary: >
      For a given publisher, package name, version, platform, and build_number,
      the repository must expose at most one canonical build_id. Multiple build_id
      values under the same lane make desired/applied hashes diverge while the
      human-visible build_number appears unchanged.
    protects:
      state:
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/release_ledger.go
        - golang/repository/repository_server/repository_findings.go
        - golang/repository/repository_server/artifact_verify_rpc.go
      symbols:
        - appendToLedger
        - ListRepositoryFindings
        - RepairArtifact
    forbidden_fixes:
      - delete_desired_build_id
      - select_latest_to_hide_collision
      - overwrite_existing_build_id
      - archive_desired_pinned_artifact_without_safety_check
    required_tests:
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestRepositoryDoctorReportsDuplicateBuildNumberCollision
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestPublishRejectsSameBuildNumberDifferentBuildID
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestRepairDoesNotUseBuildNumberAsIdentity

    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: repository.build_id_global_unique
    title: build_id must identify exactly one artifact tuple
    severity: critical
    status: active
    summary: >
      A build_id is the canonical artifact identity. It must not be reused across
      package names, versions, platforms, kinds, or checksums. If a build_id maps
      to more than one artifact tuple, repository metadata is corrupt and
      convergence must stop before install.
    protects:
      state:
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/release_ledger.go
        - golang/repository/repository_server/repository_findings.go
      symbols:
        - appendToLedger
        - ListRepositoryFindings
    forbidden_fixes:
      - reuse_build_id_for_new_artifact
      - rewrite_manifest_to_match_desired
      - silently_pick_first_build_id_match
    required_tests:
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestBuildIDMapsToSingleArtifactIdentity
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestRepositoryDoctorReportsBuildIDReuse

    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: repository.publish_idempotent_same_digest
    title: Re-publishing identical artifact bytes must return existing build_id
    severity: high
    status: active
    summary: >
      CI retries and upstream sync retries are allowed only when the artifact
      bytes/digest are identical. The repository must return the existing build_id
      for identical bytes and reject different bytes under the same immutable
      package/version/build lane.
    protects:
      state:
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/import_provisional.go
      symbols:
        - ImportProvisionalArtifact
    forbidden_fixes:
      - allocate_new_build_id_for_same_digest_retry
      - accept_different_digest_same_published_version
      - bypass_version_immutability_on_retry
    required_tests:
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestUploadIdempotentSameDigestReturnsExistingBuildID
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestUploadDifferentDigestSamePublishedVersionRejected

    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: repository.upload_reservation_is_single_build_authority
    title: Upload must honor repository-issued reservation build_id and build_number
    severity: critical
    status: active
    summary: >
      When AllocateUpload has reserved a version/build lane, UploadArtifact must
      use that reservation's build_id and build_number as the sole authority for
      the publish attempt. The upload path must not mint a second build_id,
      recalculate build_number, or create a new artifact row when identical
      bytes already exist for that package identity.
    protects:
      state:
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/allocate_upload.go
        - golang/repository/repository_server/artifact_handlers.go
      symbols:
        - AllocateUpload
        - UploadArtifact
        - findExistingArtifactByDigest
    forbidden_fixes:
      - upload_recomputes_reserved_build_number
      - upload_mints_new_build_id_despite_reservation
      - create_second_build_row_for_same_digest_retry
    required_tests:
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestUploadReservationIsSingleBuildAuthority
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestUploadReservationSameDigestDoesNotCreateNewBuild
    related_invariants:
      - repository.publish_idempotent_same_digest
      - release.version_single_authority
  - id: repository.repair_selects_existing_build
    title: Repair must select broken existing builds, not only installable builds
    severity: high
    status: active
    summary: >
      Repair exists to heal broken rows. If repair resolves only installable
      artifacts, it will fail on BROKEN_MISSING_BLOB and other broken states with
      misleading "no builds" errors. Repair selection must use existing build
      records and then repair state toward installability.
    protects:
      state:
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/artifact_verify_rpc.go
        - golang/repository/repository_server/artifact_state.go
      symbols:
        - RepairArtifact
        - transitionArtifactState
    forbidden_fixes:
      - use_installable_latest_resolver_for_repair
      - say_no_builds_when_broken_rows_exist
      - mutate_desired_to_avoid_repair
    required_tests:
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestRepairArtifactUsesLatestExistingBuildWhenBroken
      - golang/repository/repository_server/package_identity_required_tests_test.go::TestRepositoryRepairDoesNotRequireInstallableState

    related_invariants:
      - meta.absence_scope_must_be_explicit
  - id: repository.collision_repair_requires_desired_safety
    title: Collision repair must check desired pins before archiving or demoting artifacts
    severity: critical
    status: active
    summary: >
      A duplicate/corrupt repository row may not be archived, deleted, demoted, or
      overwritten until the repair path proves that no desired state pins that
      build_id. Desired pins are the cluster contract.
    protects:
      state:
        - /globular/repository/artifacts/*
        - /globular/resources/ServiceDesiredVersion/*
      files:
        - golang/repository/repository_server/reachability_guard.go
        - golang/repository/repository_server/gc.go
      symbols:
        - checkDeletionSafety
        - checkRevokeSafety
        - collectDesiredBuildIDs
        - ArchiveUnreachableArtifacts
    forbidden_fixes:
      - archive_without_desired_check
      - delete_collision_row_without_desired_check
      - clear_desired_to_allow_archive
    required_tests:
      - TestCollisionRepairRefusesDesiredPinnedArtifact
      - TestCollisionRepairArchivesOnlyUnpinnedDuplicate
    related_invariants:
      - meta.binding_outlives_evidence_until_invalidated

  # ─────────────────────────────────────────────────────────────────────────
  # Package-lifecycle authority contracts (docs/design/package-lifecycle.md §7.2)
  # Decision 2026-06-23: repository is the single version authority; local/agent
  # builds use the dev channel; kind is identity; convergence is by build_id.
  # status: proposed until the P1/P2 enforcement code + required tests land.
  # ─────────────────────────────────────────────────────────────────────────
  - id: release.version_single_authority
    title: The release version has exactly one authority — the repository service
    severity: critical
    status: active
    summary: >
      The human release version (e.g. 1.2.235) is allocated by exactly one
      authority: the repository service, on the release channel, gated by a
      release-authority capability. CI's git tag is the release INTENT input;
      the repository validates monotonicity and records the allocation. No other
      caller — local deploy, agent/MCP, or CI self-stamping — may allocate or
      advance a release version. Two version authors is the root cause of chronic
      unconvergeable services drift (local 1.2.234 below CI 1.2.235).
    protects:
      state:
        - /globular/repository/artifacts/*
        - /globular/resources/ServiceDesiredVersion/*
      files:
        - golang/repository/repository_server/allocate_upload.go
        - golang/deploy/deploy.go
        - .github/workflows/release.yml
      symbols:
        - AllocateUpload
        - resolveVersionIntent
    forbidden_fixes:
      - local_deploy_allocates_release_version
      - ci_self_stamps_version_bypassing_repository
    required_tests:
      - golang/repository/repository_server/release_version_single_authority_test.go::TestVersionSingleAuthority_RegressionRejected
      - golang/repository/repository_server/release_version_single_authority_test.go::TestVersionSingleAuthority_PublishedVersionImmutable
      - golang/repository/repository_server/release_version_single_authority_test.go::TestVersionSingleAuthority_BumpAdvancesFromPublished
    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: package.release_vs_dev_channel_boundary
    title: Local and agent builds are dev-channel only and never become cluster truth
    severity: critical
    status: active
    summary: >
      A build on the dev channel (local developer or agent/MCP) is dev-lane only and
      never a convergence target. Enforced at three points: (a) VERSION ALLOCATION —
      devLaneVersion (local_publish_guard.go) coerces a DEV build to a `-dev.N` lane
      strictly below the latest release, so it cannot allocate/advance a release
      version; (b) DESIRED-STATE AUTHORITY — channelEligibleForDesiredState gates
      validateArtifactInRepo (the single desired-state write chokepoint, called only
      by upsertOne), rejecting a DEV-channel artifact from ServiceDesiredVersion so
      NO caller (operator CLI, agent/MCP, or deploy) can make a dev build cluster
      truth (forbidden_fix:agent_build_writes_cluster_desired_state); (c) DEPLOY
      CLIENT — deployUpdatesDesiredState makes `globular deploy --channel dev`
      publish the dev artifact but SKIP the desired-state write (clear log, not an
      error — dev is a legitimate build/test flow). The manifest's canonical channel
      field is the authority; channel is never inferred from the version string.
    protects:
      state:
        - /globular/repository/artifacts/*
        - /globular/resources/ServiceDesiredVersion/*
      files:
        - golang/repository/repository_server/local_publish_guard.go
        - golang/cluster_controller/cluster_controller_server/desired_state_handlers.go
        - golang/deploy/deploy.go
      symbols:
        - devLaneVersion
        - channelEligibleForDesiredState
        - deployUpdatesDesiredState
    forbidden_fixes:
      - local_deploy_allocates_release_version
      - agent_build_writes_cluster_desired_state
    required_tests:
      - golang/cluster_controller/cluster_controller_server/release_vs_dev_desired_test.go::TestChannelEligibleForDesiredState_DevRejected
      - golang/cluster_controller/cluster_controller_server/release_vs_dev_desired_test.go::TestChannelEligibleForDesiredState_ReleaseTiersAccepted
      - golang/deploy/deploy_channel_test.go::TestDeployUpdatesDesiredState_DevSkips
      - golang/deploy/deploy_channel_test.go::TestDeployUpdatesDesiredState_ReleaseChannelsWrite
      - golang/repository/repository_server/dev_version_semantics_test.go::TestDevLaneVersion_CoercedResultIsLaneLegalAndBelowRelease
      - golang/repository/repository_server/dev_version_semantics_test.go::TestDevLaneVersion_CleanSemverEqualToReleaseIsSuffixed
    related_invariants:
      - release.version_single_authority
  - id: convergence.identity_is_build_id
    title: Convergence AUTHORITY decisions must compare build_id, not the version-only summary hash
    severity: critical
    status: active
    summary: >
      Any decision with AUTHORITY over "is this node converged?" must compare
      build_id, the sole convergence identity — same version + different build_id is
      NOT converged. Enforced at the two authority seams: (1) per-package
      convergence — classifyPackageConvergence treats build_id as an independent
      dimension (D3), failing closed on a same-version/different-build_id artifact;
      (2) reference-node acceptance for repair — repair_node_workflow's
      referenceNodeBuildIDMismatch refuses a reference node whose installed build_id
      differs from the resolved desired build_id for any desired service. The
      cluster SUMMARY hash (hashDesiredServiceVersions / computeAppliedServicesHash)
      is a COARSE version-only signal — fine for reconcile stamping and health
      display, but it is NOT convergence-identity authority and the repair gate no
      longer rests acceptance on it alone. Services with no resolved desired
      build_id (upstream-native / dev) are skipped — identity cannot be enforced
      where none exists. DEFERRED (Path A, see docs/design/cg3-convergence-identity-scope.md):
      making the cluster summary hash itself build_id-exact on both sides, and the
      drift detector's ahead-vs-behind (desired-regressed vs needs-upgrade)
      distinction — both are a higher-blast-radius spine change, not required to
      close the authority bite this invariant governs.
    protects:
      state:
        - /globular/resources/ServiceDesiredVersion/*
      files:
        - golang/cluster_controller/cluster_controller_server/repair_node_workflow.go
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
      symbols:
        - referenceNodeBuildIDMismatch
        - classifyPackageConvergence
    forbidden_fixes:
      - compare_version_string_for_convergence
    required_tests:
      - golang/cluster_controller/cluster_controller_server/repair_node_buildid_test.go::TestReferenceNodeBuildID_SameVersionDifferentBuildRefused
      - golang/cluster_controller/cluster_controller_server/repair_node_buildid_test.go::TestReferenceNodeBuildID_MissingInstalledBuildRefused
      - golang/cluster_controller/cluster_controller_server/repair_node_buildid_test.go::TestReferenceNodeBuildID_NoDesiredBuildIDSkipped
      - golang/cluster_controller/cluster_controller_server/build_id_convergence_dimension_test.go::TestBuildIDDimension_DifferentBuildIDNotConverged
      - golang/cluster_controller/cluster_controller_server/build_id_convergence_dimension_test.go::TestBuildIDDimension_MatchingBuildIDConverges
    related_invariants:
      - desired.build_id_immutable
      - meta.identity_computation_must_be_invariant
  - id: desired.no_regression_all_paths
    title: Desired version must not regress on any write path
    severity: critical
    status: active
    summary: >
      No write path may set a desired version below the currently-installed or
      currently-published-highest version. Enforced per path: the operator
      UpsertDesiredService path and the node-materialize path (reconcile_nodes.go,
      which routes through upsertOne) pass through enforceServiceDesiredFloor for
      SERVICE writes and routeInfrastructureDesired's infrastructure floor for
      INFRASTRUCTURE writes, failing closed on downgrade unless an explicit audited
      allow_regression override (operator.override_intent). The repository
      build-advance path (reconcileDesiredFromRepository) is forward-only by
      construction: it advances build_number only when strictly greater and never
      changes the pinned version. build_id is carried immutably
      (desired.build_id_immutable).
    required_tests:
      - TestDesiredRegression_ServiceBelowFloorRejected
      - TestDesiredRegression_InfraBelowFloorRejected
      - TestDesiredRegression_ServiceOverridePermitsAndAudits
      - TestDesiredRegression_InfraOverridePermitsAndAudits
      - TestDesiredRegression_AtOrAboveFloorSucceeds
    protects:
      state:
        - /globular/resources/ServiceDesiredVersion/*
      files:
        - golang/cluster_controller/cluster_controller_server/desired_state_handlers.go
        - golang/cluster_controller/cluster_controller_server/reconcile_nodes.go
        - golang/cluster_controller/cluster_controller_server/reconcile_runtime.go
      symbols:
        - upsertOne
        - enforceServiceDesiredFloor
        - routeInfrastructureDesired
        - highestHealthyInstalledVersion
        - reconcileDesiredFromRepository
    forbidden_fixes:
      - materialize_desired_from_unverified_local_install
      - overwrite_desired_build_id_silently
    related_invariants:
      - desired.build_id_immutable
      - convergence.identity_is_build_id
  - id: desired.keyed_by_kind_and_name
    title: Desired-state records are keyed by (kind, name); cross-kind writes are rejected
    severity: critical
    status: active
    summary: >
      kind is part of package identity. Every desired/installed record is keyed by
      (kind, name); the service lane (ServiceDesiredVersion) and the infrastructure
      desired lane never share a key. Cross-kind writes are refused on every operator
      surface: the controller rejects a SERVICE desired write for an infrastructure or
      command package on both UpsertDesiredService and RemoveDesiredService
      (rejectCrossKindDesiredWrite), and `globular services desired set` hard-refuses
      non-SERVICE kinds (serviceDesiredKindGate, fail-closed on unverifiable kind) with
      no --force bypass. Infrastructure has its own first-class typed path
      (ApplyInfrastructureRelease); upsertOne routes an infrastructure-managed name to
      its InfrastructureRelease rather than writing a cross-kind ServiceDesiredVersion ghost.
    required_tests:
      - TestUpsertRejectsCrossKindDesiredRecord
      - TestRemoveDesiredServiceRejectsCrossKind
      - TestRejectCrossKindDesiredWrite_ByCatalogKind
      - TestServiceDesiredKindGate_ServiceProceeds
      - TestServiceDesiredKindGate_InfrastructureRefused
      - TestServiceDesiredKindGate_CommandRefused
      - TestServiceDesiredKindGate_UnknownKindFailsClosed
      - TestServiceDesiredKindGate_RepoUnreachableFailsClosed
    protects:
      state:
        - /globular/resources/ServiceDesiredVersion/*
      files:
        - golang/cluster_controller/cluster_controller_server/desired_state_handlers.go
        - golang/cluster_controller/cluster_controller_server/reconciler.go
        - golang/globularcli/services_cmds.go
      symbols:
        - upsertOne
        - rejectCrossKindDesiredWrite
        - routeInfrastructureDesired
        - serviceDesiredKindGate
        - collectDesiredVersions
        - RemoveDesiredService
        - DeleteServiceDesiredVersion
    forbidden_fixes:
      - cli_writes_cross_kind_desired_record
    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: publish.release_artifact_must_be_stripped
    title: Release-channel artifacts must be trimpath/stripped
    severity: high
    status: active
    summary: >
      An artifact published to the release (STABLE) channel must be built stripped
      (-trimpath -ldflags "-s -w"). An unstripped debug build (the ~2x 15-18MB
      build_number 1 local artifacts) is rejected at publish, before promotion to
      PUBLISHED, by the artifact-shape law in UploadArtifact: for the release
      channel, validateReleaseArtifactStripped extracts the entrypoint ELF and
      rejects it (FailedPrecondition) if it carries a symbol table (.symtab) or
      DWARF (.debug_*/.zdebug_*). In the same STABLE-channel gate,
      validateReleaseArtifactSizeEnvelope rejects an archive whose size exceeds
      2x the latest published release size for the same package/platform from the
      release ledger — the coarse ratchet for the historical debug/unstripped ~2x
      artifact class. Scope: ELF-only for the strip check; non-ELF artifacts
      (darwin/windows) and archives with no detectable entrypoint pass that half
      of the gate (out of scope, not implicitly trusted). DEV-lane builds are
      exempt.
    protects:
      state:
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/release_artifact_shape.go
        - golang/repository/repository_server/artifact_handlers.go
      symbols:
        - UploadArtifact
        - validateReleaseArtifactStripped
        - validateReleaseArtifactSizeEnvelope
        - elfDebugSectionName
    forbidden_fixes:
      - publish_unstripped_debug_build_to_release_channel
    required_tests:
      - golang/repository/repository_server/release_artifact_shape_test.go::TestReleaseArtifactStripped_RejectsUnstrippedELF
      - golang/repository/repository_server/release_artifact_shape_test.go::TestReleaseArtifactStripped_AcceptsStrippedELF
      - golang/repository/repository_server/release_artifact_shape_test.go::TestReleaseArtifactStripped_NonELFPasses
      - golang/repository/repository_server/release_artifact_shape_test.go::TestElfDebugSectionName_Policy
      - golang/repository/repository_server/release_artifact_shape_test.go::TestReleaseArtifactSizeEnvelope_RejectsGreaterThan2xPriorRelease
      - golang/repository/repository_server/release_artifact_shape_test.go::TestReleaseArtifactSizeEnvelope_AllowsEqualTo2xPriorRelease
      - golang/repository/repository_server/release_artifact_shape_test.go::TestReleaseArtifactSizeEnvelope_SkipsWhenNoPriorReleaseSize
    related_invariants:
      - release.version_single_authority
  - id: staging.content_addressed
    title: Node-agent staging cache must be content-addressed and verified against the desired manifest
    severity: high
    status: active
    summary: >
      The node-agent staging cache must key artifacts by content (digest/build_id),
      not by a mutable generic filename. Today /var/lib/globular/staging/<pub>/<name>/
      latest.artifact is identity-erasing, and the cache-digest integrity check
      compares the cached blob against the INSTALLED artifact's manifest instead of
      the DESIRED one, producing a permanent false cache_digest_mismatch when desired
      != installed. The fix is two-part: InstallPackage writes the staged artifact
      to a content-addressed `<sha256>.artifact` path and refreshes
      `latest.artifact` only as a compatibility alias; verify_integrity resolves the
      DESIRED manifest digest and verifies the cache against that desired artifact
      first, falling back only when no desired digest is available.
    protects:
      state:
        - /var/lib/globular/staging/*
      files:
        - golang/node_agent/node_agent_server/installer_api.go
        - golang/node_agent/node_agent_server/internal/actions/verify_integrity.go
      symbols:
        - DownloadArtifactToDir
        - resolveArtifactDigest
    forbidden_fixes:
      - compare_cached_blob_against_installed_manifest
    required_tests:
      - golang/node_agent/node_agent_server/staging_cache_test.go::TestWriteStagedArtifactCache_WritesContentAddressedFileAndLatestAlias
      - golang/node_agent/node_agent_server/internal/actions/verify_integrity_test.go::TestContentAddressedStagedArtifactPath_UsesDigestNotLatestAlias
    related_invariants:
      - convergence.identity_is_build_id

  # ─────────────────────────────────────────────────────────────────────────
  # RBAC-native package authority (docs/design/package-lifecycle.md §3.4)
  # Decision 2026-06-23: authority is the EXISTING RBAC model — no parallel
  # publisher identity. Federation (trusted_publisher) proves WHO; RBAC decides
  # WHAT; the repository allocates; the controller converges by build_id.
  # ─────────────────────────────────────────────────────────────────────────
  - id: package.publisher_namespace_is_rbac_resource
    title: A publisher namespace is an RBAC-owned resource, not a free string
    severity: critical
    status: active
    summary: >
      A package publisher is an RBAC namespace resource owned by RBAC subjects (owner
      role). It is not a free-form string and not a parallel identity. Every authority
      decision about a publisher resolves through the namespace's RBAC owners and
      permissions.
    protects:
      state:
        - /repository/namespaces/*
      files:
        - golang/repository/repository_server/namespace.go
        - golang/repository/repository_server/trusted_publisher.go
      symbols:
        - GetNamespace
    forbidden_fixes:
      - forbidden_fix.package.add_parallel_publisher_type_enum
    required_tests:
      - repository:TestReleaseAllocationRequiresNamespacePermission
    related_invariants:
      - package.publisher_kind_derived_from_rbac_subject
      - meta.identity_computation_must_be_invariant
  - id: package.publisher_kind_derived_from_rbac_subject
    title: Publisher kind is derived from the owning RBAC subject, never a parallel enum
    severity: high
    status: active
    summary: >
      The "type" of a publisher (organization vs user vs service) is derived from the
      kind of its owning RBAC subject (Organization | Account | service account).
      A standalone publisher.type enum duplicates RBAC subject identity and is forbidden.
    protects:
      state:
        - /repository/namespaces/*
      files:
        - golang/repository/repository_server/namespace.go
        - proto/resource.proto
      symbols:
        - GetNamespace
    forbidden_fixes:
      - forbidden_fix.package.add_parallel_publisher_type_enum
    required_tests:
      - repository:TestAccountWithoutReleasePermissionGetsDevOnly
      - repository:TestOrganizationOwnerMayAllocateStableWhenPermissionExists
    related_invariants:
      - package.publisher_namespace_is_rbac_resource
  - id: package.release_allocation_requires_rbac_permission
    title: Release allocation requires an RBAC permission on the publisher namespace
    severity: critical
    status: active
    summary: >
      Allocating a release-channel (STABLE) version requires the resolved subject to
      hold repository.release.allocate on the target publisher namespace. No caller —
      CI, local, or agent — may allocate a release without passing this RBAC permission
      check. Fail closed if the subject, namespace, or permission cannot be proven.
    protects:
      state:
        - /repository/namespaces/*
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/allocate_upload.go
        - golang/rbac/rbac_server/rbac_access.go
      symbols:
        - AllocateUpload
    forbidden_fixes:
      - forbidden_fix.package.allow_stable_without_rbac_permission
      - forbidden_fix.package.allow_git_tag_to_allocate_release_without_repository
    required_tests:
      - repository:TestReleaseAllocationRequiresNamespacePermission
    related_invariants:
      - package.stable_channel_requires_release_permission
      - release.version_single_authority
  - id: package.forge_binding_is_not_authorization
    title: Forge binding federates identity only; it never grants authorization
    severity: critical
    status: active
    summary: >
      A forge identity (GitHub org/user/repo, a forge token, a CI environment) may only
      answer "which RBAC subject is this?" via trusted_publisher federation. It must
      never directly authorize an action. The shortcut "GitHub org == globulario
      therefore allow STABLE" is forbidden; authorization is always a separate RBAC
      permission check on the resolved subject.
    protects:
      state:
        - /repository/namespaces/*
      files:
        - golang/repository/repository_server/trusted_publisher.go
        - golang/repository/repository_server/allocate_upload.go
      symbols:
        - resolveForgeIdentity
        - authorizeRelease
    forbidden_fixes:
      - forbidden_fix.package.authorize_release_from_forge_identity_directly
    required_tests:
      - repository:TestForgeIdentityMustResolveToSubjectBeforeAuthorization
      - repository:TestGitHubOrgBindingDoesNotBypassRBAC
      - repository:TestForgeTrustAndRBACAuthorizationAreSeparateSteps
    related_invariants:
      - package.release_allocation_requires_rbac_permission
  - id: package.ci_is_not_release_authority
    title: CI is a forge adapter, not a release authority
    severity: high
    status: active
    summary: >
      CI holds no implicit release privilege. It authenticates, resolves to an RBAC
      subject via trusted_publisher, and then passes normal RBAC authorization. A git
      tag is intent, not authority. Hardcoding a privileged CI release actor is forbidden.
    protects:
      state:
        - /repository/namespaces/*
      files:
        - golang/security/roles.go
        - golang/repository/repository_server/allocate_upload.go
        - .github/workflows/release.yml
      symbols:
        - AllocateUpload
    forbidden_fixes:
      - forbidden_fix.package.hardcode_ci_release_privilege
      - forbidden_fix.package.allow_git_tag_to_allocate_release_without_repository
    required_tests:
      - repository:TestCIWithoutResolvedSubjectCannotAllocateRelease
    related_invariants:
      - package.forge_binding_is_not_authorization
      - release.version_single_authority
  - id: package.stable_channel_requires_release_permission
    title: A STABLE-channel write requires release permission; DEV-only subjects cannot
    severity: critical
    status: active
    summary: >
      Targeting the STABLE channel requires the resolved subject to hold
      repository.release.allocate on the namespace. A subject without it (e.g. a user
      Account that owns no release permission) may only target DEV. STABLE writes from
      DEV-only subjects must fail closed.
    protects:
      state:
        - /repository/namespaces/*
        - /globular/repository/artifacts/*
      files:
        - golang/repository/repository_server/allocate_upload.go
        - golang/repository/repository_server/artifact_handlers.go
      symbols:
        - AllocateUpload
        - UploadArtifact
    forbidden_fixes:
      - forbidden_fix.package.allow_stable_without_rbac_permission
    required_tests:
      - repository:TestAccountWithoutReleasePermissionGetsDevOnly
      - repository:TestOrganizationOwnerMayAllocateStableWhenPermissionExists
    related_invariants:
      - package.release_allocation_requires_rbac_permission
      - package.release_vs_dev_channel_boundary
