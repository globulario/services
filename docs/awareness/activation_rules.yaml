# docs/awareness/activation_rules.yaml
#
# Machine-readable awareness activation rules (v1 — simplified).
# Two rules replace the original six. Hook enforcement unchanged.
#
# The knowledge model (invariants, failure modes, forbidden fixes,
# meta-principles, incident patterns, learning rules) is NOT affected.

activation_rules:
  version: v1
  namespace: globular.platform

  rules:

    # ── AUTO: hook-enforced briefing for high-risk directories ──────────────
    - id: auto_briefing
      name: Automatic briefing before editing high-risk directories
      trigger: file_path
      mandatory: true
      enforcement: hook   # enforce-briefing.sh + enforce-briefing-bash.sh
      tools:
        - awareness.briefing(file=<path>)
      applies_to:
        kind: path_prefix
        paths:
          - golang/node_agent/
          - golang/cluster_controller/
          - golang/services_manager/
          - golang/repository/
          - golang/rbac/
          - golang/security/
          - golang/mcp/
          - golang/cluster_doctor/
          - golang/ai_executor/
          - docs/awareness/
          - docs/intent/
      rationale: >
        These directories contain state authority, security boundaries,
        package identity, awareness internals, or convergence logic.
        Errors cascade across layers. The hook enforces the call; the
        agent handles the result per empty_policy below.
      status: active

    # ── MANUAL: task-level briefing for authority surfaces ──────────────────
    - id: manual_briefing
      name: Task-level briefing when touching authority surfaces
      trigger: task_concept
      mandatory: true
      enforcement: agent_judgment   # no hook — agent decides
      tools:
        - awareness.briefing(task=<task description>)
        - awareness.impact(file=<path>)   # when target files are known
      applies_to:
        kind: concept_keywords
        concepts:
          - desired state
          - installed state
          - runtime state / runtime evidence
          - convergence / reconciliation
          - service health
          - package install / publish
          - repository identity / artifact state
          - etcd truth
          - node-agent authority
          - cluster controller dispatch
          - security / RBAC / token logic
          - workflow resume / receipts
          - cluster-doctor remediation / repair plans
          - awareness-graph internals (yaml2nt, scanner, RDF, Oxigraph)
      rationale: >
        State authority and security logic is the core architectural
        contract. The 4-layer model must never be collapsed. Any task
        touching these concepts must start with awareness context.
      status: active

  # ── Empty-briefing policy ────────────────────────────────────────────────
  #
  # Empty ≠ safe. But empty also ≠ always noisy.
  # The response depends on the risk tier of the target.

  empty_policy:
    description: >
      How to handle briefing status=empty, based on the risk tier
      of the edit. The goal: silence when safe, alarm when not.

    tiers:

      - tier: low_risk
        description: >
          Edit changes no behavior (formatting, typos, comments,
          test fixtures, import reorder, dependency bump with no API change).
        action: proceed
        announce: false
        summary: omit AWG line

      - tier: high_risk_target
        description: >
          Edit is in a high-risk directory OR touches an authority surface
          (security/RBAC, repository publish/installability, workflow
          resume/receipts, cluster-doctor remediation, convergence,
          desired-state, runtime evidence) but the edit itself may be
          minor (rename, log message, non-behavioral).
        action: treat_as_degraded
        announce: true
        summary: "AWG: DEGRADED — empty briefing for high-risk target; proceeded with fallback reasoning/tests"
        follow_up:
          - check high_risk_files.yaml
          - use code/tests/docs as fallback evidence

      - tier: behavior_change_in_high_risk
        description: >
          Edit changes behavior in a high-risk directory or authority
          surface. This is the case that originally required the full
          awareness template.
        action: escalate
        announce: true
        summary: "AWG: DEGRADED — empty briefing for behavior-changing edit in high-risk code"
        follow_up:
          - run awareness.impact(file=<path>)
          - run awareness.briefing(task=<task description>)
          - query related authority/repair-plan domains
          - if still empty, continue only with explicit uncertainty and tests

  # ── Status handling (non-empty) ──────────────────────────────────────────

  status_handling:
    ok:
      description: >
        Use the returned context. Follow invariants and forbidden fixes.
        Run required tests. Resolve any referenced_id marked high or critical.
      action: proceed_with_context

    degraded:
      description: >
        Awareness service is unavailable. Do NOT proceed with high-risk
        architectural changes unless the user explicitly approves. Use
        code/tests/docs/runtime as fallback evidence and say so.
      action: pause_and_report

  # ── Low-risk exemptions ──────────────────────────────────────────────────
  #
  # One rule: if the edit changes no behavior, awareness is optional.
  # The hook still fires in high-risk dirs (it can't know intent), but
  # the agent satisfies it with the briefing call and moves on quietly.

  low_risk_rule: >
    If the edit changes no behavior, awareness is optional.
    This covers: formatting, typos, comments outside @awareness blocks,
    test data fixtures, import reorder, dependency bumps with no API change.

  # ── Summary format ──────────────────────────────────────────────────────
  #
  # One line per non-trivial code task. Replaces the 9-field template.

  summary_format:
    normal: "AWG: briefing(<target>) | invariants: X, Y | uncertainty: Z"
    degraded: "AWG: DEGRADED — fallback: <what was checked>"
    empty_low_risk: "(omit AWG line)"
    empty_high_risk: "AWG: DEGRADED — empty briefing for high-risk target; proceeded with fallback reasoning/tests"
