  - id: golang/cluster_doctor/cluster_doctor_server/config_test.go:TestConfig_DefaultHealerMode_IsObserve
    file: golang/cluster_doctor/cluster_doctor_server/config_test.go
    symbol: TestConfig_DefaultHealerMode_IsObserve
    package: main
    language: go
    doc: "TestConfig_DefaultHealerMode_IsObserve locks the safe default for the\nbackground auto-healer. \"observe\" classifies findings without mutating\nany state — the only mode that does NOT require Path B (healer loop) to\nbe unified with Path A (ExecuteRemediation gates). Any change that\nwould silently re-enable enforce-by-default must update this test and\npass code review with an explicit justification.\n\nSee the audit at docs/intent/remediation.must_go_through_workflow.yaml\nand the Patch A rationale in commit history."
  - id: golang/cluster_doctor/cluster_doctor_server/config_test.go:TestLoadConfigNormalizesLoopback
    file: golang/cluster_doctor/cluster_doctor_server/config_test.go
    symbol: TestLoadConfigNormalizesLoopback
    package: main
    language: go
    doc: "TestLoadConfigNormalizesLoopback locks in the contract exposed by\ndocs/endpoint_resolution_policy.md: controller_endpoint/workflow_endpoint\nloaded from disk with a loopback IP literal must be rewritten to\n\"localhost\" before any dial is attempted. The cluster service cert\nhas DNS:localhost in its SAN but not IP:127.0.0.1, so a dial against\n\"127.0.0.1:12000\" fails TLS verification.\n\nThis is a regression test: the same deployed config that caused the\noriginal bug (127.0.0.1:12000 written by old packaging) must now\nround-trip to localhost:12000."
  - id: golang/cluster_doctor/cluster_doctor_server/dispatch_by_value_test.go:TestGatedDispatcher_ResolvesFindingByValue_NoCacheClobber
    file: golang/cluster_doctor/cluster_doctor_server/dispatch_by_value_test.go
    symbol: TestGatedDispatcher_ResolvesFindingByValue_NoCacheClobber
    package: main
    language: go
    doc: "TestGatedDispatcher_ResolvesFindingByValue_NoCacheClobber locks in the AWG\nre-audit fix (meta.code.local_state_must_not_become_hidden_authority): the\nhealer dispatcher must execute against the Finding it already holds, NOT by\nclobbering the shared lastFindings lookup cache and round-tripping through\nfinding_id resolution. The previous code overwrote lastFindings with a\none-element slice; a concurrent GetClusterReport could overwrite it again\nbetween the write and the read, so remediation acted on the wrong evidence\n(or spuriously NotFound)."
