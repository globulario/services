    doc: "TestWriteQuorumLost_StaleInventory_DataComplete_StillFires verifies that\nstale inventories classified as uncertain still produce CRITICAL when\nDataIncomplete=false (the collector believes the snapshot is complete).\nIf the collector reports no errors, uncertain nodes count as down."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_StaleRemoteInventory_Suppressed
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
