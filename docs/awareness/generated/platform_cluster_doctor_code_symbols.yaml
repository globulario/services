    package: rules
    language: go
    doc: "Awareness required-test name wrapper: partial snapshot evidence must not\ncreate a false-positive write-quorum loss."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_StaleInventory_DataComplete_StillFires
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
