    doc: "TestWriteQuorumLost_StaleRemoteInventory_Suppressed verifies that when\ncfg.InventoryStalenessThreshold is set and remote inventories are older\nthan the threshold, the rule treats them as uncertain (noInventory) rather\nthan confirmed-down. This prevents stale cached snapshots from producing\nCRITICAL when MinIO is transitioning."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_UnitNameWithoutServiceSuffix_Matches
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
