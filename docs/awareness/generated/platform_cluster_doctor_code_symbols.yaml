  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_KnownDown_DataIncomplete_StillFires
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
    symbol: TestWriteQuorumLost_KnownDown_DataIncomplete_StillFires
    package: rules
    language: go
    doc: "TestWriteQuorumLost_KnownDown_DataIncomplete_StillFires verifies that a\nconfirmed-down node (inventory present, MinIO not active) fires CRITICAL\neven when DataIncomplete=true. The suppression only applies when ALL \"down\"\nnodes are in the uncertain no_inventory bucket."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_NoInventoryOnly_DataIncomplete_Suppressed
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
    symbol: TestWriteQuorumLost_NoInventoryOnly_DataIncomplete_Suppressed
    package: rules
    language: go
    doc: "TestWriteQuorumLost_NoInventoryOnly_DataIncomplete_Suppressed is the key\nfalse-positive regression test: 4 of 5 pool nodes have no_inventory because\nthe snapshot collector failed to reach their node agents (DataIncomplete=true).\nOnly 1 node is confirmed active. This matches the production pattern where\nMinIO is fully healthy (5/5 nodes, CONVERGED) but the doctor would fire CRITICAL\nbecause no_inventory was treated identically to \"confirmed down\"."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_NoInventory_DataComplete_Fires
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
