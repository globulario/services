    package: rules
    language: go
    doc: "TestWriteQuorumLost_NoInventory_DataComplete_Fires verifies that when the\nsnapshot is complete (no collection errors), no_inventory nodes ARE counted\nas down — the node is genuinely unreachable, not a collector fluke."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_OneNodeActive_CRITICAL
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
    symbol: TestWriteQuorumLost_OneNodeActive_CRITICAL
    package: rules
    language: go
    doc: "Scenario 6: MinIO applied, 2 of 3 nodes down → write quorum lost (2 active drives < 2 quorum).\nWait — with 3 drives, write_quorum = 3 - 1 = 2. With 1 active node (1 drive), 1 < 2 → CRITICAL."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_PartialSnapshot_LocalNodeOnly_DataComplete_Fires
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
    symbol: TestWriteQuorumLost_PartialSnapshot_LocalNodeOnly_DataComplete_Fires
    package: rules
    language: go
    doc: "TestWriteQuorumLost_PartialSnapshot_LocalNodeOnly_DataComplete_Fires verifies\nthat when the snapshot is marked complete (no collection errors) but pool IPs\nare still absent from snap.Nodes, the finding still fires — the collector\nbelieves it has a full picture, so missing IPs genuinely have no NodeRecord."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_PartialSnapshot_LocalNodeOnly_Suppressed
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
    symbol: TestWriteQuorumLost_PartialSnapshot_LocalNodeOnly_Suppressed
    package: rules
    language: go
    doc: "TestWriteQuorumLost_PartialSnapshot_LocalNodeOnly_Suppressed is the primary\nregression test for the spurious CRITICAL seen in production.\n\nEach cluster-doctor instance builds its own snapshot. When snap.Nodes\ncontains only the local node (the collector fetched only its own NodeRecord),\nnodeIDByPoolIP returns \"\" for every other pool IP. Before the fix those\nunknown IPs were classified as knownDown, making len(knownDownNodes) > 0 and\npreventing the DataIncomplete suppression from firing.\n\nScenario: 5-node pool, snap.Nodes = only the local node (ryzen), local MinIO\nactive, DataIncomplete=true (collector failed to reach other node agents).\nExpected: 0 findings — partial snapshot is not evidence of quorum loss."
  - id: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go:TestWriteQuorumLost_PartialSnapshot_NoFalsePositive
    file: golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap_test.go
