  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_RejectFourKeyShapeReintroduction
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_RejectFourKeyShapeReintroduction
    package: main
    language: go
    doc: "TestShouldMigrate_RejectFourKeyShapeReintroduction is the explicit\nregression for the live observation: even if a stale snapshot lacks\ninstalled_by AND lacks unit_file_sha256 (entirely empty receipt),\nthe helper must still refuse migration when fresh etcd has either\nsignal. This is the worst case for the wipe — a stale snapshot\nread minutes before any canonical stamp."
