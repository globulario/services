  - id: golang/node_agent/node_agent_server/apply_package_service_unit_recovery_test.go:TestIsServiceKind
    file: golang/node_agent/node_agent_server/apply_package_service_unit_recovery_test.go
    symbol: TestIsServiceKind
    package: main
    language: go
    doc: "TestIsServiceKind: only SERVICE is a daemon that MUST have a systemd unit, so\nonly SERVICE routes a missing-unit apply to recovery. COMMAND binaries and\nINFRASTRUCTURE packages whose spec sets install_systemd=false (etcdctl, mc,\nrclone, ...) are legitimately unit-less and must stay binary-only."
  - id: golang/node_agent/node_agent_server/apply_package_service_unit_recovery_test.go:TestRecreateServiceUnitFromSpec_MissingPackageFails
    file: golang/node_agent/node_agent_server/apply_package_service_unit_recovery_test.go
    symbol: TestRecreateServiceUnitFromSpec_MissingPackageFails
    package: main
    language: go
    doc: "TestRecreateServiceUnitFromSpec_MissingPackageFails: when the package archive\nis not present locally, unit recovery must return an error (which the apply\npath turns into a loud failure) rather than silently succeeding. The positive\npath — recover the unit AND start the service — runs the shared installer\nengine and requires root + systemd + a real package, so it is exercised by the\ninstaller-engine integration tests (the same engine INFRASTRUCTURE uses), not\nhere."
