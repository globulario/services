  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshHasInstalledByOnly_SkipsAsUnproven
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshHasInstalledByOnly_SkipsAsUnproven
    package: main
    language: go
    doc: "TestShouldMigrate_FreshHasInstalledByOnly_SkipsAsUnproven covers the\ntransient window where the canonical install path has stamped\ninstalled_by but unit_file_sha256 is not yet populated. The helper\nmust skip migration (otherwise we'd lose installed_by) and fail\nclosed so the next heartbeat re-reads."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshHasMigrationSourceOnly_SkipsNoOpinion
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshHasMigrationSourceOnly_SkipsNoOpinion
    package: main
    language: go
    doc: "TestShouldMigrate_FreshHasMigrationSourceOnly_SkipsNoOpinion covers\nthe case where a previous migration cycle already stamped\nmigration_source for this unit but unit_file_sha256 was somehow not\npersisted. The helper must not re-stamp (idempotency safety): a\nsecond migration write would overwrite any field that another writer\nhas since added. Return \"\" so authority 1 surfaces the drift on the\nnext heartbeat once unit_file_sha256 is back."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshHasNoReceipt_AllowsMigration
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshHasNoReceipt_AllowsMigration
    package: main
    language: go
    doc: "TestShouldMigrate_FreshHasNoReceipt_AllowsMigration proves the helper\npermits migration only when the fresh etcd row has NO receipt\nprovenance — this is the legitimate first-time path for pre-refactor\ninstalls that have a sidecar on disk but no canonical receipt yet."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshHasNonReceiptMetadataOnly_AllowsMigration
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshHasNonReceiptMetadataOnly_AllowsMigration
    package: main
    language: go
    doc: "TestShouldMigrate_FreshHasNonReceiptMetadataOnly_AllowsMigration\nproves the helper does NOT mistake non-receipt fields like\nentrypoint_checksum for receipt provenance. Only the three receipt\nsignals (unit_file_sha256, installed_by, migration_source) gate the\nmigration."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshHasUnitFileSha256_DriftOnMismatch
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshHasUnitFileSha256_DriftOnMismatch
    package: main
    language: go
    doc: "TestShouldMigrate_FreshHasUnitFileSha256_DriftOnMismatch proves the\nhelper reports unit_file_drift (not \"\") when disk disagrees with the\nfresh receipt. This is the drift path that the heartbeat should\nsurface — not the migration path."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshHasUnitFileSha256_SkipsAndNoOpinionOnMatch
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshHasUnitFileSha256_SkipsAndNoOpinionOnMatch
    package: main
    language: go
    doc: "TestShouldMigrate_FreshHasUnitFileSha256_SkipsAndNoOpinionOnMatch is\nthe core regression for the heartbeat-wipe bug observed live on\n2026-06-03 (project_receipt_wipe_in_heartbeat.md): a stale pkg\nsnapshot would let checkUnitHashDrift call stampMigrationFromLegacy\nSidecar and clobber a freshly-stamped canonical receipt. The pure\ndecision helper now refuses migration when fresh etcd already has\nunit_file_sha256 and the disk matches it."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshIsNil_SkipsNoOpinion
    file: golang/node_agent/node_agent_server/migration_decision_test.go
    symbol: TestShouldMigrate_FreshIsNil_SkipsNoOpinion
    package: main
    language: go
    doc: "TestShouldMigrate_FreshIsNil_SkipsNoOpinion proves the helper backs\noff (no opinion) when the fresh read returns nil. Migration would\nhave to invent a new record from stale snapshot evidence; better to\nstay silent and let the next cycle re-read."
  - id: golang/node_agent/node_agent_server/migration_decision_test.go:TestShouldMigrate_FreshShaNormalization
