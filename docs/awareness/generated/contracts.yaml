    name: BehavioralMemoryService
    description: 'BehavioralMemoryService is the protocol-shaped surface of the behavioral-memory kernel — a governed-learning layer that turns raw operational signals into evidence-backed, authority-mapped, condition-scoped behavioral principles, and then enforces them at action time.  It is deployed *inside* the ai-memory service today (one binary, two gRPC services) but is defined as a standalone service contract so the kernel can be promoted to its own deployment later without changing the domain model.  The vocabulary (EvidenceLaneMode, PromotionDecision, the governance status ladder) deliberately mirrors the awareness-graph (AWG) governance model so the two can share a kernel in the future. AWG governs *code/repair* contracts; this service governs *runtime/operation* contracts. Same meta-principle: no claim of resolution without authority, condition scope, evidence, and proof.  PR-1 scope: contract + skeleton only. All RPCs currently return UNIMPLEMENTED. — gRPC service BehavioralMemoryService with 19 RPC(s): RecordSignal, ExtractClaim, RecordEvidence, MapAuthority, RecordContradiction, RegisterCondition, RunContradictionCheck, ProposePrinciple, PromotePrinciple, RevokePrinciple, ExplainPrinciple, ResolveGovernedContext, CheckAction, RecordOutcome, GeneratePromotionCandidate, ListPromotionCandidates, GenerateReconciliationReport, ListReconciliationReports, GetGovernanceCoverage.'
