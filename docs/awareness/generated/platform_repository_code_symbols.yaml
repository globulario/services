    language: go
    doc: "TestVA6_AppendToLedger_SameVersionPlatform_Rejected verifies that\nappendToLedger rejects a second (version, platform) entry with a different\nbuild_id. This is the core ledger-level enforcement of version immutability."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA6_AppendToLedger_SameVersionSameBuildID_Idempotent
