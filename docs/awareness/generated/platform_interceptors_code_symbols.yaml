    package: interceptors
    language: go
    doc: "TestInvalidateClient_AbsentIsNoOp ensures invalidating a non-cached entry\nis safe (sync.Map.Delete is documented as no-op for missing keys, but we\npin the assumption so a future cache-type swap doesn't regress it)."
  - id: golang/interceptors/cache_invalidation_test.go:TestInvalidateClient_RemovesCachedEntry
    file: golang/interceptors/cache_invalidation_test.go
    symbol: TestInvalidateClient_RemovesCachedEntry
    package: interceptors
    language: go
    doc: "TestInvalidateClient_RemovesCachedEntry pins the cache-eviction contract.\nWithout this, a peer restart or cert rotation leaves the cluster reusing\na dead handle until process restart (forbidden.cache_nil_handle_permanently)."
  - id: golang/interceptors/cache_invalidation_test.go:TestIsTransportFailure_AppCodesDoNotInvalidate
    file: golang/interceptors/cache_invalidation_test.go
    symbol: TestIsTransportFailure_AppCodesDoNotInvalidate
    package: interceptors
    language: go
    doc: "TestIsTransportFailure_AppCodesDoNotInvalidate ensures we don't drop a\nhealthy cached client over an application-level \"no\" answer. The codes\nlisted below all leave the underlying gRPC connection valid and reusable."
  - id: golang/interceptors/cache_invalidation_test.go:TestIsTransportFailure_NilAndNonStatus
    file: golang/interceptors/cache_invalidation_test.go
    symbol: TestIsTransportFailure_NilAndNonStatus
    package: interceptors
    language: go
    doc: "TestIsTransportFailure_NilAndNonStatus confirms the helper handles nil\nand plain (non-grpc) errors without crashing or false-positiving — both\nmust return false (no invalidation)."
  - id: golang/interceptors/cache_invalidation_test.go:TestIsTransportFailure_TransportCodesInvalidate
    file: golang/interceptors/cache_invalidation_test.go
    symbol: TestIsTransportFailure_TransportCodesInvalidate
    package: interceptors
    language: go
    doc: "TestIsTransportFailure_TransportCodesInvalidate pins the contract for the\ninvalidateClient gate: only transport-level codes (Unavailable,\nUnauthenticated, DeadlineExceeded) should trigger cache invalidation.\nApplication-level codes (NotFound, InvalidArgument, PermissionDenied) leave\nthe connection valid and MUST NOT cause the cache to be dropped.\nEnforces meta.connection_errors_must_not_be_absorbed by ensuring the\nsignal that triggers re-connect is well-typed."
  - id: golang/interceptors/perm_cache_invalidation_test.go:TestFlushPermCache_SurgicalAndComplete
    file: golang/interceptors/perm_cache_invalidation_test.go
    symbol: TestFlushPermCache_SurgicalAndComplete
    package: interceptors
    language: go
    doc: "TestFlushPermCache_SurgicalAndComplete is the ratchet for the cross-service\ninvalidation path of meta.authorization_check_is_a_snapshot_not_a_promise.\nOn an RBAC change the interceptor flushes its permission-decision cache so a\nrevoked binding stops being honored before the TTL expires. The flush must be\n(1) COMPLETE — no permCacheEntry survives, so no stale grant lingers — and\n(2) SURGICAL — the shared cache also holds stream-auth markers, client conns,\nand index ints, which must NOT be dropped."
  - id: golang/interceptors/perm_cache_snapshot_test.go:TestPermCacheGrantTTLIsBounded
    file: golang/interceptors/perm_cache_snapshot_test.go
    symbol: TestPermCacheGrantTTLIsBounded
    package: interceptors
    language: go
    doc: "TestPermCacheGrantTTLIsBounded is the ratchet for\nmeta.authorization_check_is_a_snapshot_not_a_promise. The permission-decision\ncache is per-service and is NOT invalidated when a binding is revoked, so the\nGRANT TTL is the upper bound on how long a revoked permission keeps being\nhonored across the mesh. It was 15 minutes before 2026-06-09; this gate keeps\nit within the documented bound so the revocation window cannot silently\nregress. Raising the window requires deliberately raising permGrantTTLMaxBound\n(a reviewable change) — or, preferably, implementing cross-service cache\ninvalidation so a longer TTL is safe."
