  - id: golang/verifier/attestation_bridge_test.go:TestAttestVerdict_MismatchOnBinaryHashDrift
    file: golang/verifier/attestation_bridge_test.go
    symbol: TestAttestVerdict_MismatchOnBinaryHashDrift
    package: verifier
    language: go
    doc: "TestAttestVerdict_MismatchOnBinaryHashDrift — when the running binary's\nhash differs from the desired entrypoint checksum, the verdict must be\nMISMATCH. This is the case the existing verifier already flags via\nFindingRunningBinaryHashMismatch — attestation surfaces it as a\ndistinct typed verdict consumers can match on directly."
