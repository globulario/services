    language: go
    doc: "TestAttestVerdict_OrphanOnMissingLaunchAuthority — covers the contract\ncase where systemd doesn't claim the running PID. AttestVerdict must\nsurface this so the verifier carries the explicit ORPHAN signal beyond\nthe existing runtime_identity_unproven coarse verdict."
  - id: golang/verifier/attestation_bridge_test.go:TestAttestVerdict_SkipsHashCheckForWrapperPackages
    file: golang/verifier/attestation_bridge_test.go
    symbol: TestAttestVerdict_SkipsHashCheckForWrapperPackages
    package: verifier
    language: go
    doc: "TestAttestVerdict_SkipsHashCheckForWrapperPackages — wrapper services\n(keepalived, scylladb) install outside /usr/lib/globular/bin and have\nno enforceable manifest checksum. AttestVerdict must skip the hash\nbinding for those so the verdict isn't a false MISMATCH."
  - id: golang/verifier/attestation_bridge_test.go:TestAttestVerdict_TrustedOnFullBindingMatch
    file: golang/verifier/attestation_bridge_test.go
    symbol: TestAttestVerdict_TrustedOnFullBindingMatch
    package: verifier
    language: go
    doc: "TestAttestVerdict_TrustedOnFullBindingMatch — wiring contract test.\nWhen the proof's PID, exe, binary hash, service id, and launch\nauthority all match the target's expectations, AttestVerdict returns\nTRUSTED. This is the happy-path verdict the doctor and operators want\nto see on a healthy service."
