  - id: golang/verifier/verifier_apply_time_test.go:TestApplyTime_FallbackVisible_NoFalsePositiveWhenProcessFresh
    file: golang/verifier/verifier_apply_time_test.go
    symbol: TestApplyTime_FallbackVisible_NoFalsePositiveWhenProcessFresh
    package: verifier
    language: go
    doc: "TestApplyTime_FallbackVisible_NoFalsePositiveWhenProcessFresh verifies that\nwhen the installed-state is missing and we fall back to the release-level\ntimestamp, a fresh process (started after ApplyTime) does not trigger any\nstale-process finding. Also confirms apply_time_source appears in evidence\nif a stale-process finding does fire."
  - id: golang/verifier/verifier_apply_time_test.go:TestApplyTime_InstalledUnixPreservedOnMetadataUpdate
    file: golang/verifier/verifier_apply_time_test.go
    symbol: TestApplyTime_InstalledUnixPreservedOnMetadataUpdate
    package: verifier
    language: go
    doc: "TestApplyTime_InstalledUnixPreservedOnMetadataUpdate verifies the verifier's\nown logic: when ApplyTime=T1 (from InstalledUnix) and a process starts at\nT1+1s, no stale-process finding fires — even if UpdatedUnix would be T2.\nThe collector already resolved T1 and the verifier must use it faithfully."
  - id: golang/verifier/verifier_apply_time_test.go:TestApplyTime_NodeJoin_NoStaleProcessOnExistingNode
    file: golang/verifier/verifier_apply_time_test.go
    symbol: TestApplyTime_NodeJoin_NoStaleProcessOnExistingNode
    package: verifier
    language: go
    doc: "TestApplyTime_NodeJoin_NoStaleProcessOnExistingNode is the primary regression\nfor the node-join false-positive.\n\nScenario: ryzen had mcp installed at T1. Process started at T1+2s (normal boot).\nA new node joins at T2; this bumps LastTransitionUnixMs on the ServiceRelease\nto T2. Old code: ApplyTime=T2 → process_start_time(T1+2s) < T2-30s → FAIL.\nNew code: ApplyTime=T1 (from InstalledPackage.InstalledUnix) → T1+2s > T1-30s → no finding."
  - id: golang/verifier/verifier_apply_time_test.go:TestApplyTime_RealIdentityChange_OldPidCaught
    file: golang/verifier/verifier_apply_time_test.go
    symbol: TestApplyTime_RealIdentityChange_OldPidCaught
    package: verifier
    language: go
    doc: "TestApplyTime_RealIdentityChange_OldPidCaught verifies that when a real\nidentity change bumps InstalledUnix to T2, an old PID (started at T1) is\ncorrectly caught at critical severity."
  - id: golang/verifier/verifier_apply_time_test.go:TestApplyTime_RealUpgrade_OldProcessDetected
    file: golang/verifier/verifier_apply_time_test.go
    symbol: TestApplyTime_RealUpgrade_OldProcessDetected
    package: verifier
    language: go
    doc: "TestApplyTime_RealUpgrade_OldProcessDetected verifies that a genuine upgrade\nthat left an old PID running is caught at critical severity.\n\nScenario: Process started at T1 (old version). A real upgrade happened at T2\n(InstalledUnix=T2, IsFirstInstall=false). Process was never restarted."
  - id: golang/verifier/verifier_apply_time_test.go:TestApplyTime_ReleasePatchDoesNotAffectRuntimeIdentity
    file: golang/verifier/verifier_apply_time_test.go
    symbol: TestApplyTime_ReleasePatchDoesNotAffectRuntimeIdentity
    package: verifier
    language: go
    doc: "TestApplyTime_ReleasePatchDoesNotAffectRuntimeIdentity verifies that a release\nmetadata update (e.g. a label change with the same binary) at T2 does not cause\nthe verifier to flag an existing healthy process that started at T1+1s.\n\nThe key: ApplyTime must come from InstalledUnix (T1), not from the release\ntransition time (T2). The verifier receives the already-resolved T1 and must\nnot fire any stale-process finding."
  - id: golang/verifier/verifier_oldpid_boundary_test.go:TestVerifyTarget_NoOpUpdatedBump_NoFalseOldPid
    file: golang/verifier/verifier_oldpid_boundary_test.go
    symbol: TestVerifyTarget_NoOpUpdatedBump_NoFalseOldPid
    package: verifier
    language: go
    doc: "Test 1 (outcome half): the xds false-positive class. A no-op metadata reconcile\nbumped UpdatedUnix, so the collector set ApplyTime=T2 (recent, max) while\nOldPidBoundary stays at T1 (stable InstalledUnix). The PID is healthy\n(running==installed) and started ~T1. old_pid_after_upgrade must NOT fire:\nbefore the split it compared against ApplyTime (=T2) and a process at T1 looked\n\"older than the apply\"; now it compares against the stable boundary (T1)."
  - id: golang/verifier/verifier_oldpid_boundary_test.go:TestVerifyTarget_ProcessOlderThanBoundary_StillFlagged
    file: golang/verifier/verifier_oldpid_boundary_test.go
    symbol: TestVerifyTarget_ProcessOlderThanBoundary_StillFlagged
    package: verifier
    language: go
    doc: "Sanity counter-test: the split must NOT blind old_pid to a genuinely stale PID.\nWhen the process started BEFORE the stable boundary itself, the finding must\nstill fire (running==installed, so it's the timing tell, escalating past the\nrestart-pending window)."
  - id: golang/verifier/verifier_oldpid_boundary_test.go:TestVerifyTarget_ProofPendingWithinGrace_StaysInfo
    file: golang/verifier/verifier_oldpid_boundary_test.go
    symbol: TestVerifyTarget_ProofPendingWithinGrace_StaysInfo
    package: verifier
    language: go
    doc: "Test 3 (1dc77898 regression guard): after an upgrade the restarted process's\nproof is briefly nil. A RECENT ApplyTime (=max, bumped by the upgrade) must keep\nruntime_identity_unproven inside the Day-0/post-upgrade grace window (info) —\neven though OldPidBoundary is an old first-install time. This proves the split\nleft the grace window reading ApplyTime, not the stable boundary."
