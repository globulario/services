  - id: golang/ai_memory/behavioral/core/governance_refs_test.go:TestProposePrinciple_RejectsMalformedRefs
    file: golang/ai_memory/behavioral/core/governance_refs_test.go
    symbol: TestProposePrinciple_RejectsMalformedRefs
    package: core
    language: go
    doc: "TestProposePrinciple_RejectsMalformedRefs is the Priority-5 + Priority-1 golden\ntest: a proposal whose refs look like comma-split prose is rejected at write\ntime with a single structured GovernanceError that lists EVERY offender (never\none-rejection-at-a-time) and never flags the valid ref."
  - id: golang/ai_memory/behavioral/core/raw_owner_write_ratchet_test.go:TestRawOwnerStateWritePromotedBlocksRawWrite
    file: golang/ai_memory/behavioral/core/raw_owner_write_ratchet_test.go
    symbol: TestRawOwnerStateWritePromotedBlocksRawWrite
    package: core_test
    language: go
    doc: "Governed Operation Gateway behavioral ratchet (Slice 5): once\nprinciple.cluster.no_raw_owner_owned_state_write is PROMOTED, CheckAction must\nREFUSE a raw owner-owned-state write presented under any of its natural action\nnames (the action_aliases on forbidden.cluster.raw_owner_owned_state_write) — and\nmust NOT over-block unrelated actions. The principle and its aliases are read from\nthe real cluster_operator seed pack, so a future edit that drops an alias or\nunbinds the forbidden move breaks this test."
  - id: golang/ai_memory/behavioral/core/runtime_engagement_test.go:TestCheckActionDeclaredConditionEngagesGates
    file: golang/ai_memory/behavioral/core/runtime_engagement_test.go
    symbol: TestCheckActionDeclaredConditionEngagesGates
    package: core
    language: go
    doc: "A high-risk principle scoped to a REAL condition still engages — and demands\napproval — when the caller DECLARES that condition, even if the action does not\nmatch a forbidden move. Engagement via declared condition must be preserved (only\nsentinel-only-without-match applicability is excluded)."
  - id: golang/ai_memory/behavioral/core/runtime_engagement_test.go:TestCheckActionSentinelOnlyDoesNotOverBlock
    file: golang/ai_memory/behavioral/core/runtime_engagement_test.go
    symbol: TestCheckActionSentinelOnlyDoesNotOverBlock
    package: core
    language: go
    doc: "Regression: a high-risk principle promoted under the condition.always sentinel is\nin scope for EVERY action, but it must only BLOCK the action its forbidden move\nnames. An unrelated action must NOT inherit the principle's high-risk approval\nrequirement — otherwise one always-applicable rule (e.g. never-hot-swap) forces\nneeds_human_approval on every action in the domain (the over-blocking the\nre-audit caught on the live cluster)."
  - id: golang/ai_memory/behavioral/core/runtime_match_test.go:TestForbiddenAliasIndex
    file: golang/ai_memory/behavioral/core/runtime_match_test.go
    symbol: TestForbiddenAliasIndex
    package: core
    language: go
    doc: "forbiddenAliasIndex must read action_aliases (comma-separated) from the domain\npack via the registry, trim whitespace, and return nil when the registry or the\ndomain is absent (so callers fall back to exact match)."
  - id: golang/ai_memory/behavioral/core/runtime_match_test.go:TestForbiddenRefMatches
    file: golang/ai_memory/behavioral/core/runtime_match_test.go
    symbol: TestForbiddenRefMatches
