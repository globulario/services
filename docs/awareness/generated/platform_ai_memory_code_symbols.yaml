    package: core
    language: go
    doc: "TestPromotePrinciple_BlockedReturnsSatisfactionRecipe is the Priority-3 golden\ntest: a blocked promotion must return the COMPLETE satisfaction recipe — a\nsummary plus a step per unsatisfied requirement, each carrying actionable\nnext_operations — so an agent never discovers the contract one rejection at a\ntime. The gate must still refuse (enforcement unchanged)."
  - id: golang/ai_memory/behavioral/core/governance_refs_test.go:TestProposePrinciple_AcceptsCanonicalRefs
