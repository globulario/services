    doc: "TestMigrationConstants ensures the constants are sane — schemaVersion must\nbe positive and the TTL must be reasonable. These act as guardrails against\naccidental zeroing during refactors."
  - id: golang/ai_memory/ai_memory_server/migration_coordinator_test.go:TestMigrationKeyHierarchy
    file: golang/ai_memory/ai_memory_server/migration_coordinator_test.go
    symbol: TestMigrationKeyHierarchy
    package: main
    language: go
    doc: "TestMigrationKeyHierarchy verifies that migrationStateKey is a child of\nmigrationMutexKey. concurrency.NewMutex creates keys under the mutex prefix,\nso the state key must NOT share that prefix — otherwise etcd list queries\nunder the mutex prefix would accidentally return the state record."
