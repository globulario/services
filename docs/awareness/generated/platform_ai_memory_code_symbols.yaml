  - id: golang/ai_memory/ai_memory_server/behavioral_migration_fix_test.go:TestBehavioralListByScopeIndexesPresent
    file: golang/ai_memory/ai_memory_server/behavioral_migration_fix_test.go
    symbol: TestBehavioralListByScopeIndexesPresent
    package: main
    language: go
    doc: "v10 regression: ListPromotionCandidates / ListReconciliationReports failed at\nruntime with ScyllaDB's ALLOW FILTERING error because they enumerated the entity\ntable by the (project,domain) PREFIX of a composite ((project,domain,id))\npartition key. The fix lists from dedicated single-partition by-scope indexes\nkeyed ((project,domain), id). This guards that (a) those index tables are part of\nthe schema and (b) the schema version was bumped so already-\"complete\" clusters\nre-run the migration and create them."
  - id: golang/ai_memory/ai_memory_server/behavioral_migration_fix_test.go:TestBehavioralMigrationMutexKeyNotPrefixOfStateKey
    file: golang/ai_memory/ai_memory_server/behavioral_migration_fix_test.go
    symbol: TestBehavioralMigrationMutexKeyNotPrefixOfStateKey
    package: main
    language: go
    doc: "Bug #1 regression: the migration mutex key must be a leaf sibling of the state\nkey, never a prefix of it. etcd's concurrency.Mutex treats every key under its\nprefix as a lock contender, so a state key nested under the mutex prefix\n(the historical \"/globular/migrations/scylla/behavioral_memory\" mutex with the\nstate at \".../behavioral_memory/state\") is mistaken for an un-releasable lock\nholder and every Mutex.Lock waits for it forever, timing out every migration."
  - id: golang/ai_memory/ai_memory_server/behavioral_migration_fix_test.go:TestBehavioralSchemaPR9ColumnsHaveBackfillAlter
    file: golang/ai_memory/ai_memory_server/behavioral_migration_fix_test.go
    symbol: TestBehavioralSchemaPR9ColumnsHaveBackfillAlter
    package: main
    language: go
    doc: "Bug #2 regression: every PR-9 governed-observation column added to the\nsignals/evidence CREATE TABLE must have a matching backfill ALTER in the\nordered migration statements, positioned after the CREATE — otherwise tables\ncreated before the column existed (CREATE IF NOT EXISTS is a no-op on them)\nnever get it and behavioral writes fail with \"Unknown identifier <col>\"."
