  - id: golang/ai_memory/ai_memory_server/ops_knowledge_recall_seed_integration_test.go:TestOpsKnowledgeRecallSeedConvergesDuplicates
    file: golang/ai_memory/ai_memory_server/ops_knowledge_recall_seed_integration_test.go
    symbol: TestOpsKnowledgeRecallSeedConvergesDuplicates
    package: main
    language: go
    doc: "Integration test for the ops-knowledge recall self-seed convergence\n(loadOpsKnowledgeRecallSeed) against a REAL ScyllaDB.\n\nIt enforces the seed-idempotency invariant (ai-memory decision 45f7fc31):\nre-running the embedded self-seed must leave EXACTLY ONE canonical row per\nsemantic key (project, id), and it must self-heal duplicates an older seeder\nleft behind. The live store held 162 ids × 3 rows (created_at/escaped-content\ndrift) precisely because the previous LIMIT-1 replace logic converged one row\nper run instead of all of them.\n\nSkipped unless BEHAVIORAL_SCYLLA_HOSTS is set (no Scylla container in the\ndefault dev/CI environment here); the deterministic content-normalization half\nof the invariant is covered by TestRecallSeedContentNormalized in the\ncluster_operator package, which runs everywhere."
  - id: golang/ai_memory/ai_memory_server/text_search_test.go:TestMemoryMatchesAllTerms
    file: golang/ai_memory/ai_memory_server/text_search_test.go
    symbol: TestMemoryMatchesAllTerms
    package: main
    language: go
    doc: "TestMemoryMatchesAllTerms is the regression for the 2026-06-21 ai-memory bug:\nmemory_query text_search matched the ENTIRE query as one contiguous substring,\nso any multi-word query returned zero results even when each term was present\n— silently masking the seeded ops.* corpus from semantic recall. The filter\nnow requires every whitespace-separated term to appear in title+content (AND)."
  - id: golang/ai_memory/behavioral/api/kernel_hygiene_test.go:TestKernelHasNoClusterSpecificImports
    file: golang/ai_memory/behavioral/api/kernel_hygiene_test.go
    symbol: TestKernelHasNoClusterSpecificImports
    package: api
    language: go
    doc: "The generic behavioral-memory kernel must stay domain-agnostic: it may never\nimport cluster/operator-specific systems or Globular cluster packages. Cluster\nspecifics arrive only as opaque refs resolved through the domain registry, and\nthe cluster_operator pack lives OUTSIDE behavioral/ (a later PR).\n\nThis test walks every non-test .go file under behavioral/ and fails if any\nimport path contains a forbidden marker. It is the mechanical enforcement of\nthe design's domain-isolation rule."
