  - id: golang/mcp/mcp_etcd_authority_pin_test.go:TestMCP_AggregatorAllowlistDoesNotIncludeEtcdTools
    file: golang/mcp/mcp_etcd_authority_pin_test.go
    symbol: TestMCP_AggregatorAllowlistDoesNotIncludeEtcdTools
    package: main
    language: go
    doc: "TestMCP_AggregatorAllowlistDoesNotIncludeEtcdTools is the\nremote-call pin. invariant:mcp.etcd.tools_must_not_join_remote_allowlist\nnames the rule; this test asserts it concretely against the\nallowedRemoteTools map."
  - id: golang/mcp/mcp_etcd_authority_pin_test.go:TestMCP_EtcdToolsNotInSourceTree
    file: golang/mcp/mcp_etcd_authority_pin_test.go
    symbol: TestMCP_EtcdToolsNotInSourceTree
    package: main
    language: go
    doc: "TestMCP_EtcdToolsNotInSourceTree is the source-level pin. It walks the\nmcp package and asserts that no file (except this test, the test\nscaffolding, and the historical aggregator_policy entry that names\nforbidden tools) contains a string literal `\"etcd_get\"`, `\"etcd_put\"`,\nor `\"etcd_delete\"`.\n\nThe aggregator_policy.go entries for etcd_put / etcd_delete in\nforbiddenRemoteTools are explicit \"if anyone re-creates this, it's\nforbidden remotely\" markers; they remain after v1.2.167 as\ndocumentation. This test allowlists that one file."
  - id: golang/mcp/mcp_etcd_authority_pin_test.go:TestMCP_EtcdToolsNotRegistered
    file: golang/mcp/mcp_etcd_authority_pin_test.go
    symbol: TestMCP_EtcdToolsNotRegistered
    package: main
    language: go
    doc: "TestMCP_EtcdToolsNotRegistered is the runtime pin. It boots a server\nwith the test-friendly registerAllTools path and asserts that no MCP\ntool named etcd_get / etcd_put / etcd_delete (or any near-equivalent)\nis in the registered map after init."
