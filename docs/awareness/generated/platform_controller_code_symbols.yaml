test_symbols:
  - id: golang/cluster_controller/cluster_controller_server/artifact_kind_exhaustive_test.go:TestAllProtoArtifactKindsEnumerated
    file: golang/cluster_controller/cluster_controller_server/artifact_kind_exhaustive_test.go
    symbol: TestAllProtoArtifactKindsEnumerated
    package: main
    language: go
    doc: "TestAllProtoArtifactKindsEnumerated catches the meta-drift: if proto\nadds a new ArtifactKind without updating allProtoArtifactKinds above,\nevery downstream exhaustiveness test silently passes against a stale\nuniverse. We diff the names in our enumeration against proto's known\nnames, and fail when they disagree.\n\nWithout this test the bug shape recurses: the test that catches drift\nin kindRank etc. is itself drift-prone (same shape as the coreWorkflows\nhardcoded list)."
  - id: golang/cluster_controller/cluster_controller_server/artifact_kind_exhaustive_test.go:TestKindRankCoversAllProtoArtifactKinds
    file: golang/cluster_controller/cluster_controller_server/artifact_kind_exhaustive_test.go
    symbol: TestKindRankCoversAllProtoArtifactKinds
    package: main
    language: go
    doc: "TestKindRankCoversAllProtoArtifactKinds asserts that recovery_planner.go's\nkindRank() returns a non-default rank for every named proto ArtifactKind.\nThe unknownKindRank fallback is reserved for actually-unknown strings\n(e.g. a kind added to the proto without a code update). If a proto-known\nvalue lands there, the install order is degraded silently."
  - id: golang/cluster_controller/cluster_controller_server/artifact_kind_exhaustive_test.go:TestLookupResolvedEntrypointChecksumKindsExhaustive
    file: golang/cluster_controller/cluster_controller_server/artifact_kind_exhaustive_test.go
    symbol: TestLookupResolvedEntrypointChecksumKindsExhaustive
    package: main
    language: go
    doc: "TestLookupResolvedEntrypointChecksumKindsExhaustive asserts that every\nproto ArtifactKind produces a candidates list in\nrelease_runtime_convergence.go's lookupResolvedEntrypointChecksum\nswitch. We can't call the function directly (it hits Scylla via\nsrv.resources), so we mirror the switch logic here and assert it\ncovers every kind. Mirror drift is caught by Test*Enumerated above\nand by the fact that both this test and the switch must change\ntogether — see the comment block at the switch site."
  - id: golang/cluster_controller/cluster_controller_server/bootstrap_gate_test.go:TestBootstrapGate_EnvoyReady_IsTheDeltaWindow
    file: golang/cluster_controller/cluster_controller_server/bootstrap_gate_test.go
    symbol: TestBootstrapGate_EnvoyReady_IsTheDeltaWindow
    package: main
    language: go
    doc: "TestBootstrapGate_EnvoyReady_IsTheDeltaWindow verifies the critical\ninvariant: EnvoyReady is in bootstrapInfraReady but NOT in bootstrapPhaseReady.\nThis is the window where control-plane-critical services can deploy to unblock\nnodes stuck before workload_ready (e.g. due to MinIO topology contract)."
  - id: golang/cluster_controller/cluster_controller_server/bootstrap_gate_test.go:TestBootstrapInfraReady_PhaseMatrix
