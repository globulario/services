    symbol: TestVerifyConvergenceFailsStepWhenFindingStillPresent
    package: engine
    language: go
    doc: "TestVerifyConvergenceFailsStepWhenFindingStillPresent — the workflow\ntruth-consistency contract: dispatch success + verification reporting\n\"still present\" must fail the step so the workflow run status is not\nreported as success."
  - id: golang/workflow/engine/actors_doctor_outcome_test.go:TestVerifyConvergenceMarksFailedWhenExecuteNeverRan
    file: golang/workflow/engine/actors_doctor_outcome_test.go
    symbol: TestVerifyConvergenceMarksFailedWhenExecuteNeverRan
    package: engine
    language: go
    doc: "TestVerifyConvergenceMarksFailedWhenExecuteNeverRan — defense in\ndepth: if a workflow somehow reaches verify without execute having\nwritten an execution_result (e.g. skipped step, malformed YAML), the\noutcome must NOT default to PENDING — that would look like \"in\nprogress\" forever. It must be FAILED."
  - id: golang/workflow/engine/actors_doctor_remediation_correlation_test.go:TestDoctorActorHandlersPropagateCorrelationAndRunID
