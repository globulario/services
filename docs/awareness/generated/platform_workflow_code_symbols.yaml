  - id: golang/workflow/engine/actors_doctor_outcome_test.go:TestVerifyConvergenceEmitsSucceededOutcomeWhenFindingResolved
    file: golang/workflow/engine/actors_doctor_outcome_test.go
    symbol: TestVerifyConvergenceEmitsSucceededOutcomeWhenFindingResolved
    package: engine
    language: go
    doc: "TestVerifyConvergenceEmitsSucceededOutcomeWhenFindingResolved — wiring\ntest for workflow.remediation_truth_consistency. After a successful\nexecute step + verify-converged outcome, the verify handler writes a\nstructured remediation_outcome with status SUCCEEDED and is_success\ntrue. Callers (CLI/MCP) read this verdict directly."
  - id: golang/workflow/engine/actors_doctor_outcome_test.go:TestVerifyConvergenceFailsStepWhenFindingStillPresent
