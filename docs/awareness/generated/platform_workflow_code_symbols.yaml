  - id: golang/workflow/engine/action_registration_test.go:TestActorCapabilityParity
    file: golang/workflow/engine/action_registration_test.go
    symbol: TestActorCapabilityParity
    package: engine
    language: go
    doc: "TestActorCapabilityParity verifies that every action the central\nregistry declares for an actor is also present in that actor's local\nregistration. This is a hard requirement — see\ndocs/centralized-workflow-execution.md §4."
  - id: golang/workflow/engine/action_registration_test.go:TestAllRegisterFunctionsAreCalled
    file: golang/workflow/engine/action_registration_test.go
    symbol: TestAllRegisterFunctionsAreCalled
    package: engine
    language: go
    doc: "TestAllRegisterFunctionsAreCalled walks the engine package source and\nasserts that every `func RegisterXxxActions(router *Router, ...)`\ndeclaration is invoked by registerAllActorsWithStubs.\n\nThis guards against the meta-drift shape that caused the original bug:\nnew actor groups (controller_deploy, ingress, invariant, node_recovery,\nnode_remove, platform_upgrade) shipped a Register*Actions function but\nnobody remembered to add the call here, so the test that was supposed\nto catch unregistered handlers silently ignored entire actor groups.\nWithout this meta-guard the helper would drift again the next time an\nactor group is added."
  - id: golang/workflow/engine/action_registration_test.go:TestEmbeddedWorkflowsHaveRegisteredActions
    file: golang/workflow/engine/action_registration_test.go
    symbol: TestEmbeddedWorkflowsHaveRegisteredActions
    package: engine
    language: go
    doc: "TestEmbeddedWorkflowsHaveRegisteredActions asserts that every\n(actor, action) pair referenced by the workflow YAML files shipped\nin this repo has a Go handler registered with the engine Router.\n\nThe goal is to catch a whole class of bugs at test time instead of\nat runtime:\n\n  - renamed an action in Go? the YAML still references the old name\n    → this test fails.\n  - added a new step in YAML? forgot to register the handler\n    → this test fails.\n  - changed actor constant? mismatched actor/action key\n    → this test fails.\n\nWithout this, the first sign of trouble is a workflow run failing\nin production with \"no handler for actor=X action=Y\". That is much\ntoo late — connective-tissue bugs should be compile/test-time bugs."
  - id: golang/workflow/engine/action_registration_test.go:TestFallbackResolveExactTakesPrecedence
    file: golang/workflow/engine/action_registration_test.go
    symbol: TestFallbackResolveExactTakesPrecedence
    package: engine
    language: go
    doc: "TestFallbackResolveExactTakesPrecedence verifies the Router dispatch\ncontract: exact (actor, action) matches take precedence over fallback\nhandlers, and fallbacks reject unknown actions."
  - id: golang/workflow/engine/action_registration_test.go:TestYAMLActionsReferenceKnownActors
    file: golang/workflow/engine/action_registration_test.go
    symbol: TestYAMLActionsReferenceKnownActors
    package: engine
    language: go
    doc: "TestYAMLActionsReferenceKnownActors ensures every actor type used in YAML\ndefinitions maps to a known actor registration set. If a YAML references\nactor \"foo\" but no registration function exists for it, the action can\nnever be dispatched."
  - id: golang/workflow/engine/actors_backpressure_test.go:TestInstallWithJoinRetry_BudgetExhausted
    file: golang/workflow/engine/actors_backpressure_test.go
    symbol: TestInstallWithJoinRetry_BudgetExhausted
    package: engine
    language: go
    doc: "TestInstallWithJoinRetry_BudgetExhausted verifies failure after all retries.\nAcceptance criteria: result is failed, not silent success, reason includes backpressure."
  - id: golang/workflow/engine/actors_backpressure_test.go:TestInstallWithJoinRetry_ContextCancelled
    file: golang/workflow/engine/actors_backpressure_test.go
    symbol: TestInstallWithJoinRetry_ContextCancelled
    package: engine
    language: go
    doc: "TestInstallWithJoinRetry_ContextCancelled verifies context cancellation is respected."
  - id: golang/workflow/engine/actors_backpressure_test.go:TestInstallWithJoinRetry_PermanentFailImmediate
