    symbol: TestInstallWithJoinRetry_PermanentFailImmediate
    package: engine
    language: go
    doc: "TestInstallWithJoinRetry_PermanentFailImmediate verifies permanent errors\nare not retried. Checksum mismatch must fail on first attempt."
  - id: golang/workflow/engine/actors_backpressure_test.go:TestInstallWithJoinRetry_SucceedsAfterTransient
