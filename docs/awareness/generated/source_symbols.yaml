  - id: golang/interceptors/cache_invalidation_test.go:TestIsTransportFailure_AppCodesDoNotInvalidate
    file: golang/interceptors/cache_invalidation_test.go
    symbol: TestIsTransportFailure_AppCodesDoNotInvalidate
    package: interceptors
