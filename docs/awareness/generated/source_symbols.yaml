    language: go
    doc: "TestDispatch_ResolverEntrypointChecksumIsBinaryHash documents the hash schema\ncontract: ResolvedArtifact.EntrypointChecksum is the BINARY sha256, and\nResolvedArtifact.Digest is the PACKAGE TARBALL sha256. The dispatch chain\nmust propagate EntrypointChecksum, not Digest. Confusing the two is the\nv1.2.56/v1.2.57/v1.2.58 hash-schema-confusion bug class — see hash schema\ndocumentation in release_resolver.go."
  - id: golang/cluster_controller/cluster_controller_server/dispatch_native_version_test.go:TestNormalizeDesiredVersion_AcceptsNativeTags
    file: golang/cluster_controller/cluster_controller_server/dispatch_native_version_test.go
    symbol: TestNormalizeDesiredVersion_AcceptsNativeTags
    package: main
    language: go
    doc: "Regression for failure_mode\nrelease.platform_upgrade_dispatch_rejects_non_semver_versions.\n\nplatform_upgrade.dispatch upserts a desired-state record for every package it\ndecides to upgrade, including upstream-native (non-SemVer) packages (ffmpeg\nn8.x, minio/mc RELEASE.x). upsertOne previously normalized the version with\nversionutil.Canonical, which rejects native tags as \"invalid semver\" — so a\nsingle native package (ffmpeg) failed the whole dispatch step and the platform\nupgrade reported FAILED even though every SemVer package converged. The fix:\nupsertOne normalizes via normalizeDesiredVersion (NormalizeExact), which\npreserves native tags. These tests fail if anyone reverts to Canonical."
  - id: golang/cluster_controller/cluster_controller_server/dispatch_native_version_test.go:TestNormalizeDesiredVersion_CanonicalizesSemverAndRejectsGarbage
    file: golang/cluster_controller/cluster_controller_server/dispatch_native_version_test.go
    symbol: TestNormalizeDesiredVersion_CanonicalizesSemverAndRejectsGarbage
    package: main
    language: go
  - id: golang/cluster_controller/cluster_controller_server/dispatch_native_version_test.go:TestRegressesBelowFloor_NativeVersionsAreNotRegressions
    file: golang/cluster_controller/cluster_controller_server/dispatch_native_version_test.go
    symbol: TestRegressesBelowFloor_NativeVersionsAreNotRegressions
    package: main
    language: go
    doc: "The no-regression floor must tolerate native versions: they cannot be ordered\nby SemVer, so regressesBelowFloor returns false rather than falsely flagging a\ndowngrade. This is what makes the dispatch fix safe — a native upgrade is never\nrejected as a regression, and the repository artifact resolver stays the final\ngate on installability."
