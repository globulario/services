  - id: golang/cluster_controller/cluster_controller_server/workflow_actor_attribution_test.go:TestMarkNodeSucceeded_AttributedToActorNotWorkflowService
    file: golang/cluster_controller/cluster_controller_server/workflow_actor_attribution_test.go
    symbol: TestMarkNodeSucceeded_AttributedToActorNotWorkflowService
    package: main
    language: go
    doc: "TestMarkNodeSucceeded_AttributedToActorNotWorkflowService pins the actor-\nattribution contract for the mark_node_succeeded step across every\nrelease.apply.*.yaml definition. The step writes per-node state into a\nServiceRelease/InfrastructureRelease — a Layer-3 mutation. Per\nfour_layer.workflow_actor_attribution_required, the writing actor must\nbe cluster-controller (the controller owns desired-state writes,\nincluding release-status patches), NOT workflow-service.\n\nThe regression shape this test catches: a future YAML edit that changes\n`actor: cluster-controller` to `actor: workflow-service` for any\nmark_node_succeeded step, which would attribute the write to the\nworkflow service's identity (violating both invariants above)."
  - id: golang/cluster_controller/cluster_controller_server/workflow_actor_attribution_test.go:TestReleaseApplyWorkflows_DispatchOneRunPerReleaseWithPerNodeForeach
    file: golang/cluster_controller/cluster_controller_server/workflow_actor_attribution_test.go
    symbol: TestReleaseApplyWorkflows_DispatchOneRunPerReleaseWithPerNodeForeach
    package: main
    language: go
    doc: "TestReleaseApplyWorkflows_DispatchOneRunPerReleaseWithPerNodeForeach pins\nthe operative reading of\nworkflow.every_state_mutation_belongs_to_a_workflow_instance for the\nrelease-apply path: the cluster instantiates ONE workflow run per release\nand the workflow internally iterates over candidate nodes via foreach,\nproducing N per-(release, node) step receipts.\n\nInterpretation (a) from the invariant: \"one workflow instance per\n(artifact, node) pair\" means one step-receipt instance (run_id +\nstep_id), not one run_id. The per-(release, node) attribution lives in\nthe step receipts written by the foreach body, not in distinct\nworkflow_runs rows. See invariants.yaml entry\nworkflow.every_state_mutation_belongs_to_a_workflow_instance,\nno_test_yet_reason → architectural decision.\n\nThe regression shape this test catches: a future refactor that removes\nthe foreach from a release.apply.*.yaml (so the dispatcher would have to\nfan out N workflow runs at the controller level, contradicting the\none-run-per-release architecture)."
  - id: golang/cluster_controller/cluster_controller_server/workflow_actor_attribution_test.go:TestReleaseApplyWorkflows_NoStateMutationAttributedToWorkflowService
    file: golang/cluster_controller/cluster_controller_server/workflow_actor_attribution_test.go
    symbol: TestReleaseApplyWorkflows_NoStateMutationAttributedToWorkflowService
    package: main
    language: go
    doc: "TestReleaseApplyWorkflows_NoStateMutationAttributedToWorkflowService is\nthe broader sibling test: scan every release.apply.*.yaml and assert no\nstep using a state-mutation action (controller.*, node.*, repository.*)\nis attributed to actor: workflow-service.\n\nThe workflow service is the ROUTER between actors. Its job is to\ndispatch each step to the actor named in the YAML — never to substitute\nits own identity. A workflow-service-attributed mutation is the exact\nforbidden_fix shape captured by\nactor_substitutes_workflow_service_identity_for_step_actor."
  - id: golang/cluster_controller/cluster_controller_server/workflow_definitions_load_test.go:TestCoreWorkflowDefinitions_ThreadExpectedSha256
    file: golang/cluster_controller/cluster_controller_server/workflow_definitions_load_test.go
    symbol: TestCoreWorkflowDefinitions_ThreadExpectedSha256
    package: main
    language: go
    doc: "TestCoreWorkflowDefinitions_ThreadExpectedSha256 is the headline\nregression. It pins workflow.definitions_must_thread_required_verification_fields\nagainst the real on-disk definitions in golang/workflow/definitions/.\n\nFor release.apply.package and release.apply.controller, the definition\nMUST:\n\n  1. Declare a verification-field input (either resolved_entrypoint_checksum\n     or expected_sha256) in its inputs: block.\n  2. Thread that field into a node.install_package step's with: block as\n     expected_sha256.\n\nWithout these, the controller's expected_sha256 propagation chain breaks\nat the workflow definition layer — the controller resolves the manifest\nchecksum, asks the workflow to thread it, the YAML drops it on the floor,\nand node-agent honestly writes installed_unverified. This is the v1.2.119\nfailure shape captured in\nfailure_mode.workflow.stale_definitions_block_expected_sha256_propagation."
