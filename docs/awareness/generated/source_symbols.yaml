  - id: golang/repository/repository_server/version_authority_test.go:TestVA1_V2BOM_PlatformReleaseFieldIsOnTopLevelOnly
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA1_V2BOM_PlatformReleaseFieldIsOnTopLevelOnly
    package: main
    language: go
    doc: "TestVA1_V2BOM_PlatformReleaseFieldIsOnTopLevelOnly verifies that\nplatform_release is a single top-level BOM field and is NOT copied into\nindividual package entries during generation or validation."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA1_V2BOM_PlatformReleaseIsMetadataNotVersion
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA1_V2BOM_PlatformReleaseIsMetadataNotVersion
    package: main
    language: go
    doc: "TestVA1_V2BOM_PlatformReleaseIsMetadataNotVersion pins the core invariant\nwith the concrete fixture from the version-authority cleanup spec:\n  - platform_release = 1.2.52  (BOM composition identifier)\n  - storage.version  = 1.2.43  (artifact's own semantic version)\n\nExpected: idx.Packages[storage].Version == \"1.2.43\"\nForbidden: idx.Packages[storage].Version == \"1.2.52\"\n\nWithout this test a future change that \"helpfully\" stamps all entries with\nplatform_release would silently violate the BOM invariant and cause the\nreconciler to request a non-existent version of unchanged packages."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA2_NormalizeEntry_OriginReleaseDefaultsToReleaseTagNotPlatformRelease
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA2_NormalizeEntry_OriginReleaseDefaultsToReleaseTagNotPlatformRelease
    package: main
    language: go
    doc: "TestVA2_NormalizeEntry_OriginReleaseDefaultsToReleaseTagNotPlatformRelease\nconfirms origin_release falls back to entry.ReleaseTag when absent,\nNOT to the platform_release. (ReleaseTag is set by CI to the tag the\nartifact was published under; it may equal platform_release for changed\npackages, but must NOT for unchanged packages.)"
  - id: golang/repository/repository_server/version_authority_test.go:TestVA2_NormalizeEntry_VersionFromEntry
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA2_NormalizeEntry_VersionFromEntry
    package: main
    language: go
    doc: "TestVA2_NormalizeEntry_VersionFromEntry verifies that normalizeReleaseEntry\nuses the entry's own Version field, never the enclosing index's PlatformRelease.\nThe sync_from_upstream pipeline sets n.PlatformRelease as post-normalization\nmetadata (not a version override) — this test documents that contract."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA3_NonPublishedArtifact_NotInstallable
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA3_NonPublishedArtifact_NotInstallable
    package: main
    language: go
    doc: "TestVA3_NonPublishedArtifact_NotInstallable verifies that isRowInstallable\nenforces PUBLISHED-only eligibility for the install path. A STAGING or\nVERIFIED artifact appearing in the ledger must never be selected as an\ninstall candidate — it hasn't cleared the artifact law gate."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA3_VERIFIED_ArtifactExcludedFromResolver
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA3_VERIFIED_ArtifactExcludedFromResolver
    package: main
    language: go
    doc: "TestVA3_VERIFIED_ArtifactExcludedFromResolver ensures that a VERIFIED\n(not yet PUBLISHED) artifact is not returned by ResolveArtifact.\nVERIFIED means download + digest check passed but completePublish hasn't\nrun — the artifact law gate is not cleared and it must not reach the reconciler."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA4_BuildIDIsInstallIdentity_TwoVersionsTwoBuilds
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA4_BuildIDIsInstallIdentity_TwoVersionsTwoBuilds
    package: main
    language: go
    doc: "TestVA4_BuildIDIsInstallIdentity_TwoVersionsTwoBuilds verifies that two\nartifacts at different versions with different build_ids are distinct install\nidentities. The convergence decision must be based on build_id, not\nversion alone.\n\nUnder the version-immutability invariant (VA-6), a given (version, platform)\nhas exactly ONE canonical build_id — CI cannot produce two different build_ids\nfor the same version. To get a new build_id, the version must be bumped.\n\nScenario: storage@1.2.43 is published as build A. A hotfix ships as\nstorage@1.2.44 (build B). The node has build A installed; desired state\nspecifies build B. The reconciler must re-deploy — it may not skip because\nthe version strings differ by only a patch."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA4_BuildNumberIsDisplayOnly
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA4_BuildNumberIsDisplayOnly
    package: main
    language: go
    doc: "TestVA4_BuildNumberIsDisplayOnly verifies that build_number alone is\ninsufficient to distinguish artifact identity. Two builds at the same\nversion with different build_numbers are both valid — the identity anchor\nis build_id (UUID), not build_number (integer display counter).\n\nThe reconciler must NEVER use build_number as the convergence key.\nINV-4 in invariant_test.go also covers this; this test adds the version\nauthority framing (same version, two distinct identities)."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA4_SameVersionDifferentBuildID_Rejected
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA4_SameVersionDifferentBuildID_Rejected
    package: main
    language: go
    doc: "TestVA4_SameVersionDifferentBuildID_Rejected verifies that the version-\nimmutability invariant is enforced: a second artifact with the same\n(version, platform) but a different build_id must be rejected at publish time.\nCallers must bump the version to get a new build_id."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA5_UnchangedPackageVersionSurvivesPlatformUpgrade
    file: golang/repository/repository_server/version_authority_test.go
    symbol: TestVA5_UnchangedPackageVersionSurvivesPlatformUpgrade
    package: main
    language: go
    doc: "TestVA5_UnchangedPackageVersionSurvivesPlatformUpgrade simulates a platform\nupgrade from 1.2.43 → 1.2.52 where dns=1.2.44 is unchanged. The new BOM\nmust carry dns.version=1.2.44, not dns.version=1.2.52.\n\nThis is the root cause of the version authority bug that the cleanup spec\ntargets: if the CI pipeline stamps all packages with the platform_release,\nthe reconciler requests dns@1.2.52 which doesn't exist, causing Day-1\nconvergence failure for unchanged packages."
  - id: golang/repository/repository_server/version_authority_test.go:TestVA6_AppendToLedger_SameVersionDifferentPlatform_Allowed
