    package: main
    language: go
    doc: "TestWorkflowGateExpiresCooldownEvenWithoutProbe verifies the natural-close\npath: once the cooldown deadline passes, the breaker reports closed AND the\nexported gauge drops to 0, even if no caller drove the half-open probe.\nRegression for the doctor stuck reporting \"circuit OPEN\" indefinitely after\na single transient workflow blip on an otherwise-idle cluster."
  - id: golang/cluster_controller/cluster_controller_server/workflow_health_gate_test.go:TestWorkflowGateHalfOpenAllowsExactlyOneProbe
    file: golang/cluster_controller/cluster_controller_server/workflow_health_gate_test.go
