  - id: golang/cluster_controller/cluster_controller_server/component_resolve_test.go:TestMaterializeDeps_ExistingInfraReleaseReflectedInDesiredCanon
    file: golang/cluster_controller/cluster_controller_server/component_resolve_test.go
    symbol: TestMaterializeDeps_ExistingInfraReleaseReflectedInDesiredCanon
    package: main
    language: go
    doc: "TestMaterializeDeps_ExistingInfraReleaseReflectedInDesiredCanon verifies\nthat when an InfrastructureRelease for a required infra dep already exists in\nthe store, materializeMissingInfraDesired updates desiredCanon locally so\nFilterIntentByDesired classifies the block as dependency_not_ready (the dep\nis \"desired but not yet healthy\") rather than dependency_seeding_in_progress.\n\nWithout this fix, loadDesiredServices (which only loads ServiceDesiredVersion)\nwould not include the InfrastructureRelease, leaving desiredCanon unaware\nthat scylladb is desired — causing perpetual seeding_in_progress."
  - id: golang/cluster_controller/cluster_controller_server/component_resolve_test.go:TestMaterializeDeps_InfraApplyFailureMarksUnresolvable
