  - id: golang/cluster_doctor/cluster_doctor_server/audit_correlation_test.go:TestExecuteRemediationStampsCorrelationFromContext
    file: golang/cluster_doctor/cluster_doctor_server/audit_correlation_test.go
    symbol: TestExecuteRemediationStampsCorrelationFromContext
    package: main
    language: go
    doc: "Smoke test: an end-to-end ExecuteRemediation call produces an audit\nwhose correlation fields are populated. The doctor is not running etcd\nin this unit test — auditRemediation gracefully no-ops the persistence\nstep on etcd error — so we exercise the in-process audit struct path\nby inspecting the rejection response's reason wiring."
  - id: golang/cluster_doctor/cluster_doctor_server/audit_correlation_test.go:TestRemediationAuditCarriesCorrelationFields
    file: golang/cluster_doctor/cluster_doctor_server/audit_correlation_test.go
    symbol: TestRemediationAuditCarriesCorrelationFields
    package: main
    language: go
    doc: "TestRemediationAuditCarriesCorrelationFields — contract test.\nEvery audit record must carry a correlation_id, even when the caller\ndidn't supply one (deterministic fallback). When the caller does supply\na correlation header it must be preserved so doctor and workflow audits\njoin. WorkflowRunID must propagate when present."
  - id: golang/cluster_doctor/cluster_doctor_server/audit_isolation_test.go:TestRemediation_AuditDoesNotLeakToProductionEtcd
    file: golang/cluster_doctor/cluster_doctor_server/audit_isolation_test.go
    symbol: TestRemediation_AuditDoesNotLeakToProductionEtcd
    package: main
    language: go
    doc: "TestRemediation_AuditDoesNotLeakToProductionEtcd is the regression\nguard for the Patch C audit-leak fix. It asserts two things:\n\n 1. The package's default audit persistor is NOT the production\n    etcd-writing function. If a future change accidentally reverts\n    the TestMain swap, this test fails immediately.\n\n 2. ExecuteRemediation's audit path writes through auditEtcdPersistFn\n    (not via a private path that bypasses the seam). We assert this\n    by installing a capturing stub and verifying it receives a record\n    when ExecuteRemediation runs.\n\nTogether these prove no unit-test invocation reaches the cluster's\n/globular/cluster_doctor/audit/ namespace."
