  - id: golang/cluster_controller/cluster_controller_server/upgrade_backpressure_test.go:TestUpgradeLoopSuppression
    file: golang/cluster_controller/cluster_controller_server/upgrade_backpressure_test.go
    symbol: TestUpgradeLoopSuppression
    package: main
    language: go
    doc: "TestUpgradeLoopSuppression is the mandatory integration test for the full\ndispatch-gate chain. It exercises the scenario that caused the original\nupgrade loops: a 3-node cluster where one node is blocked and another is\nunserved. The test verifies that:\n  1. A blocked node (BLOCKED_*/FAILED_PERMANENT) does NOT count as unserved.\n  2. A truly unserved node still triggers dispatch (hasUnservedNodes=true).\n  3. Once all non-blocked nodes are served, the loop stops (false)."
