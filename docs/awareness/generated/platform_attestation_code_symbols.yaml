    language: go
    doc: "TestRuntimeAttestationBindsPidHashServiceAndBuild — contract test.\nA trusted attestation must bind PID, exe path, binary hash, service id,\nbuild id, launch authority, and observed-after-start. Mismatch on any\nbinding rejects."
  - id: golang/attestation/attestation_test.go:TestVerifierRejectsAttestationOlderThanProcessStart
    file: golang/attestation/attestation_test.go
    symbol: TestVerifierRejectsAttestationOlderThanProcessStart
    package: attestation
    language: go
    doc: "TestVerifierRejectsAttestationOlderThanProcessStart — contract test.\nObservedAt < ProcessStartTime is physically impossible for an honest\nobserver (you can't see a process before it exists). The attestation\nmust be flagged as stale/replayed, never honored as live evidence."
