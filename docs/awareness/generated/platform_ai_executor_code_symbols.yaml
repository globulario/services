  - id: golang/ai_executor/ai_executor_server/dedup_test.go:TestIncidentFingerprint_DistinguishesSignatures
    file: golang/ai_executor/ai_executor_server/dedup_test.go
    symbol: TestIncidentFingerprint_DistinguishesSignatures
    package: main
    language: go
    doc: "TestIncidentFingerprint_DistinguishesSignatures ensures the fingerprint is not\nso coarse that genuinely different problems collapse together (which would\nsuppress real diagnoses). Rule, event, and service each change the signature."
  - id: golang/ai_executor/ai_executor_server/dedup_test.go:TestIncidentFingerprint_StableAcrossOccurrences
    file: golang/ai_executor/ai_executor_server/dedup_test.go
    symbol: TestIncidentFingerprint_StableAcrossOccurrences
    package: main
    language: go
    doc: "TestIncidentFingerprint_StableAcrossOccurrences is the core dedup invariant:\ntwo occurrences of the same problem (same rule + event + service) but with\nDIFFERENT incident_ids must produce the SAME fingerprint. If this regresses,\nevery repeat looks new and the ai_executor re-runs a full LLM diagnosis on\neach one — the workflow-storm token drain that motivated the ledger."
  - id: golang/ai_executor/ai_executor_server/dedup_test.go:TestIncidentFingerprint_UnitFallback
    file: golang/ai_executor/ai_executor_server/dedup_test.go
    symbol: TestIncidentFingerprint_UnitFallback
    package: main
    language: go
    doc: "TestIncidentFingerprint_UnitFallback verifies the signature falls back to the\n\"unit\" field when \"service\" is absent, so systemd-unit incidents still dedup."
