    language: go
    doc: "TestUnknownWriterRejected verifies that ValidateCriticalKeyOwner returns an\nerror when the writer is not the registered owner of a critical key, and\nreturns nil for the correct owner and for unregistered keys.\n\nInvariant: critical_state.registry_ownership_required"
  - id: golang/config/critical_write_ratchet_test.go:TestEveryCriticalKeyOwnerGuardedAtThePrimitive
    file: golang/config/critical_write_ratchet_test.go
    symbol: TestEveryCriticalKeyOwnerGuardedAtThePrimitive
    package: config
    language: go
    doc: "TestEveryCriticalKeyOwnerGuardedAtThePrimitive is the RT-3 funnel ratchet.\n\nIt asserts that EVERY key in CriticalKeyPolicies is owner-guarded by the write\nprimitives: a writer that is neither the owner nor an authorized writer is\nrejected on PutRuntimeWithClass, DeleteRuntimeWithClass, AND RunTxnWithClass —\nbefore any etcd I/O.\n\nThis is the bypass ratchet's enforceable half, and it auto-extends:\n  - add a new critical key to the table → it is covered here with no edit;\n  - remove the owner guard from any write primitive → every case here fails.\n\nThe other half — catching a NEW raw cli.Put/Txn that bypasses the primitives\nentirely — is the principle-check scanner (raw writes in the swept dirs are\nDRIFT unless consciously allowlisted). Together they close the funnel: critical\nwrites must go through the guarded seam, and the seam always guards them."
  - id: golang/config/critical_writer_identity_test.go:TestLocalWriterIdentityGuard
    file: golang/config/critical_writer_identity_test.go
    symbol: TestLocalWriterIdentityGuard
    package: config
    language: go
    doc: "TestLocalWriterIdentityGuard proves the critical-write primitive enforces the\nregistered process identity: fail-open when unset, allow owner + authorized\nwriters, reject a writer not permitted for the key."
  - id: golang/config/critical_writer_identity_test.go:TestValidateCriticalKeyOwner_MultiWriter
