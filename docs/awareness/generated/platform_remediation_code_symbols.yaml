test_symbols:
  - id: golang/remediation/outcome_test.go:TestDispatchSuccessWithoutVerificationIsPending
    file: golang/remediation/outcome_test.go
    symbol: TestDispatchSuccessWithoutVerificationIsPending
    package: remediation
    language: go
    doc: "TestDispatchSuccessWithoutVerificationIsPending — contract test. The\nmost common bug this contract guards against: an action runs, the\nexecutor returns 0, and the workflow declares victory before the\nverification step proves anything. That must always be PENDING."
  - id: golang/remediation/outcome_test.go:TestFindingRemainsActiveUntilVerifiedResolution
    file: golang/remediation/outcome_test.go
    symbol: TestFindingRemainsActiveUntilVerifiedResolution
    package: remediation
    language: go
    doc: "TestFindingRemainsActiveUntilVerifiedResolution — contract test. A\nfinding stays in the active set until a remediation outcome with\nIsSuccess()==true is recorded. Pending and Degraded must NOT clear the\nfinding — operators must still see it."
  - id: golang/remediation/outcome_test.go:TestRemediationWorkflowSuccessRequiresFindingResolved
    file: golang/remediation/outcome_test.go
    symbol: TestRemediationWorkflowSuccessRequiresFindingResolved
    package: remediation
    language: go
    doc: "TestRemediationWorkflowSuccessRequiresFindingResolved — contract test.\nThe workflow may report SUCCEEDED to operators only when the underlying\nfinding actually cleared. Verification alone is not enough — the verify\nstep may have run and reported \"still present\", which must NOT be\nsuccess."
  - id: golang/remediation/override_test.go:TestOverrideAuditNamesBypassedPolicy
    file: golang/remediation/override_test.go
    symbol: TestOverrideAuditNamesBypassedPolicy
    package: remediation
    language: go
    doc: "TestOverrideAuditNamesBypassedPolicy — contract test. The audit entry\nderived from an override MUST name the bypassed policy and the actor.\nAn auditor reading the record alone must be able to answer \"what was\nbypassed, by whom, why, and was it verified?\""
  - id: golang/remediation/override_test.go:TestOverrideRequiresReasonScopeAndExpiry
    file: golang/remediation/override_test.go
    symbol: TestOverrideRequiresReasonScopeAndExpiry
    package: remediation
    language: go
    doc: "TestOverrideRequiresReasonScopeAndExpiry — contract test. Each missing\nor incomplete field rejects the override. The validator's job is to\nturn a \"force\" flag into a structured intent."
  - id: golang/remediation/override_test.go:TestOverrideStillRequiresVerification
    file: golang/remediation/override_test.go
    symbol: TestOverrideStillRequiresVerification
    package: remediation
    language: go
    doc: "TestOverrideStillRequiresVerification — contract test. An override\nbypasses a policy GATE, not the verification step. The presence of an\noverride must not make Outcome.IsSuccess() return true without\nFindingResolved."
  - id: golang/remediation/policy_test.go:TestFailureRatePolicyBlocksAfterThresholdByActionClass
    file: golang/remediation/policy_test.go
    symbol: TestFailureRatePolicyBlocksAfterThresholdByActionClass
    package: remediation
    language: go
    doc: "TestFailureRatePolicyBlocksAfterThresholdByActionClass — contract test.\nDifferent action classes have different thresholds. PACKAGE_REINSTALL is\nfar more expensive than SYSTEMCTL_RESTART, so its breaker trips much\nsooner. A single global threshold would either over-retry destructive\nactions or under-retry cheap ones."
  - id: golang/remediation/policy_test.go:TestFailureRatePolicyPersistsAcrossRestart
    file: golang/remediation/policy_test.go
    symbol: TestFailureRatePolicyPersistsAcrossRestart
    package: remediation
    language: go
    doc: "TestFailureRatePolicyPersistsAcrossRestart — contract test. A future\ndoctor process must inherit the same policy from etcd. Simulate restart\nby serializing the operator-published override and re-reading it through\nthe LoadFromEtcd path. Defaults must still merge in for any class the\noverride didn't name — silence is not \"unlimited retries.\""
  - id: golang/remediation/policy_test.go:TestRemediationCircuitBreakerUsesSharedPolicy
    file: golang/remediation/policy_test.go
    symbol: TestRemediationCircuitBreakerUsesSharedPolicy
    package: remediation
    language: go
    doc: "TestRemediationCircuitBreakerUsesSharedPolicy — contract test. The\nfailure-rate decision must be identical whether the question comes from\nthe doctor handler (server-side) or from the workflow assess step\n(pipeline-side). They must consult the same policy object so an operator\noverride propagates everywhere without per-surface re-implementation."
