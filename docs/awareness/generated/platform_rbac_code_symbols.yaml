  - id: golang/rbac/rbac_server/rbac_deny_override_test.go:TestDenyOverridesOwnerAllow
    file: golang/rbac/rbac_server/rbac_deny_override_test.go
    symbol: TestDenyOverridesOwnerAllow
    package: main
    language: go
    doc: "TestDenyOverridesOwnerAllow verifies that an explicit deny on a path\nblocks an owner even though owners normally have full access.\nSince owner validation requires the resource service for non-sa accounts,\nwe test this by setting up sa as an owner AND explicitly denied.\nThe deny must win over ownership."
  - id: golang/rbac/rbac_server/rbac_deny_override_test.go:TestDenyOverridesSAAllow
    file: golang/rbac/rbac_server/rbac_deny_override_test.go
    symbol: TestDenyOverridesSAAllow
    package: main
    language: go
    doc: "TestDenyOverridesSAAllow verifies that an explicit deny on a path\nblocks the sa account even though sa normally has full access."
  - id: golang/rbac/rbac_server/rbac_deny_override_test.go:TestSAAllowedWhenNoDeny
