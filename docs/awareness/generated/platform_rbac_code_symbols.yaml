    symbol: TestSAAllowedWhenNoDeny
    package: main
    language: go
    doc: "TestSAAllowedWhenNoDeny verifies that sa retains full access when\nthere is no explicit deny rule on the path."
  - id: golang/rbac/rbac_server/rbac_deny_override_test.go:TestSAAllowedWhenNoPermissionsExist
