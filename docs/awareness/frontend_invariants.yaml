# Frontend operator truth invariants
#
# These invariants govern what AI agents must verify before editing frontend (TypeScript/React)
# code in operator-grade UIs. Awareness is NOT a browser runtime API — it does not run in the
# browser. It is an AI-editing safety layer: the AI agent calls awareness before touching
# frontend files, and awareness returns the relevant invariants and failure modes that constrain
# what the edit may do.
#
# Core correction:
#   awareness serves the AI agent before editing frontend code.
#   the frontend does not call awareness.
#   the awareness graph describes the frontend as the subject being analyzed.
#
# State authority rule: every visible UI state must be bound to the correct authority layer.
#   runtime health  → live probe or health RPC (never desired state)
#   installed state → installed-state record in etcd (never catalog)
#   workflow result → workflow terminal state (never dispatch confirmation)
#   RBAC permission → RBAC RPC result (never UI-local assumption)

invariants:

  - id: ui.visible_state_requires_authority
    title: Every visible UI state must be bound to an explicit backend, workflow, RBAC, or local authority
    severity: critical
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      Every badge, status indicator, progress bar, action button, and warning in the operator
      UI must bind its displayed value to a concrete authority: a runtime health RPC, an
      installed-state record, a workflow terminal state, or an RBAC permission check.
      A UI element that shows state without binding to an authority is displaying guesswork.
      The binding must be verifiable: if you cannot name the source of truth for a UI element,
      the element is wrong.
    enforcement: |
      Before editing any frontend component that renders service status, package state, action
      availability, or workflow progress, verify that the data binding is wired to the correct
      authority layer (runtime, installed, desired, workflow, RBAC). Check that the component
      does not derive the displayed value from a different layer. Any mismatch is a violation
      of this invariant.
    forbidden_fixes:
      - forbidden.runtime_from_desired
      - forbidden.unknown_as_healthy
      - ui.fix.derive_runtime_from_desired
    required_tests:
      - TestStatusBadge_BoundToRuntimeProbe_NotDesiredState
      - TestInstalledIndicator_BoundToInstalledStateRecord
      - TestWorkflowProgress_BoundToWorkflowTerminalState
    related_principles:
      - state.runtime_not_desired
      - state.unknown_must_not_default_to_healthy
      - evidence.missing_is_not_known_bad

    related_invariants:
      - meta.storage_is_not_semantic_authority
  - id: ui.dangerous_warning_must_remain_visible
    title: Dangerous or destructive-operation warnings must remain visible across responsive layouts and skins
    severity: high
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      Operator UIs often include warnings about destructive topology changes, quorum-loss risk,
      data-loss risk, or irreversible operations. These warnings must not be hidden by:
        - Responsive CSS breakpoints collapsing sections on mobile/narrow viewports
        - Theme or skin changes that reduce visual contrast or recolor warning elements
        - Tab panels or accordions that move warnings into collapsed sections
        - Animation or transition effects that remove warnings from the DOM prematurely
      If a user can reach an action button without seeing the associated warning, the invariant
      is violated.
    enforcement: |
      Before editing layout, theme, or responsive breakpoint code near warning components,
      verify that destructive-operation warnings remain in the DOM and visually prominent
      at all tested viewport sizes. "Visually prominent" means distinct background/border
      color, not just inline text.
    forbidden_fixes:
      - ui.fix.hide_warning_on_small_viewport
      - ui.fix.place_critical_warning_in_collapsed_section
    required_tests:
      - TestDestructiveWarning_VisibleAtAllBreakpoints
      - TestDestructiveWarning_NotHiddenByThemeChange

    related_invariants:
      - meta.structure_must_not_be_stripped_in_projection
  - id: ui.ai_text_must_not_invent_state
    title: AI-generated UI text may decorate wording but must not invent system state
    severity: critical
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      Operator UIs may use AI-generated or AI-assisted text for explanations, summaries,
      help copy, and error descriptions. This is acceptable when the AI text decorates or
      rephrases a backend fact. It is not acceptable when the AI text:
        - Invents a success, failure, or approval that the backend did not confirm
        - Hides a blocked workflow reason behind humorous or vague text
        - Requests, displays, or infers personal or sensitive data for fictional flows
        - Presents a speculative state as if it were observed fact
      The backend is always authoritative. AI text is presentation only.
    enforcement: |
      Any frontend code that calls an LLM API, uses a text-generation component, or
      renders AI-drafted copy must be reviewed against this invariant. The review must
      confirm that the text is bound to a concrete backend value and does not introduce
      claims that the backend did not produce.
    forbidden_fixes:
      - ui.fix.ai_invents_state
      - forbidden.ai_text_invents_state
    required_tests:
      - TestAIExplanation_DoesNotInvertBackendFact
      - TestAIText_ShowsBlockedReason_NotGenericMessage

    related_invariants:
      - meta.storage_is_not_semantic_authority
  - id: ui.action_requires_permission_contract
    title: User actions in the UI must declare and respect their required RBAC permission
    severity: high
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      Every action button, form submit, or context-menu item that triggers a state mutation
      (install, deinstall, upgrade, restart, wipe, configure) has a required RBAC permission.
      That permission must be:
        1. Declared in the component (as a prop, a hook, or a comment)
        2. Checked before the action is enabled — if the permission is known ahead of time,
           disable the button and explain why
        3. Handled distinctly on denial — PERMISSION_DENIED must not look like a network error
      Disabling an action after the user clicks it (post-submit denial) is worse than pre-disabling
      it. Pre-disabling requires knowing the RBAC result early enough to render the button state.
    enforcement: |
      Before editing any action component, verify that it has a permission declaration and that
      the action is disabled when the permission is denied. Check that the error path for
      PERMISSION_DENIED renders a distinct message — not a generic retry or network error.
    forbidden_fixes:
      - ui.fix.enable_action_without_permission
      - forbidden.ui_action_enabled_without_permission
      - forbidden.permission_denied_as_network_error
    required_tests:
      - TestActionButton_Disabled_WhenPermissionDenied
      - TestPermissionDenied_RenderedDistinctly_NotAsNetworkError
    related_failure_modes:
      - fm.industry.permission_denied_rendered_as_network_error

    related_invariants:
      - meta.binding_outlives_evidence_until_invalidated
  - id: ui.status_freshness_must_be_surfaced
    title: UI status indicators must surface the freshness of their data source
    severity: high
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      Operator UIs that display cluster health, node status, or service availability must
      show when the displayed data was last observed. A status that was healthy two hours ago
      is not proof of current health. Users must be able to distinguish:
        - Live data (collected within the last polling interval)
        - Recent data (collected within the last N minutes, within acceptable staleness)
        - Stale data (older than the declared TTL — must be marked explicitly)
      Stale data rendered as current misleads the operator into believing the system is
      healthy when monitoring has failed or the collector is lagging.
    enforcement: |
      Any component that polls or subscribes to cluster status must display a freshness
      indicator (timestamp, "as of N minutes ago", or a stale badge). If the data source
      has not refreshed within the polling TTL, the component must show a visual stale
      indicator — not the last-good value as if it were current.
    forbidden_fixes:
      - forbidden.unknown_as_healthy
    required_tests:
      - TestStatusIndicator_ShowsFreshnessTimestamp
      - TestStatusIndicator_MarkedStale_WhenCollectorLags
    related_failure_modes:
      - fm.industry.stale_cache_served_as_live_state

  # ── Second-pass frontend invariants: generalization cross-links ───────────────

    related_invariants:
      - meta.silence_is_not_valid_for_unexpected
  - id: ui.success_requires_authoritative_confirmation
    title: UI success states must be bound to backend, workflow, or runtime confirmation — not local click or dispatch state
    severity: high
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      A button click, form submit, or API call dispatch is not proof that the operation
      succeeded. For any operation that mutates cluster state (installs, upgrades, topology
      changes, decommissions), the UI must not show a success badge, toast, or confirmation
      until the workflow or backend has reached a terminal success state.
      Premature success reporting misleads the operator into believing the operation is
      complete, and for irreversible operations creates a dangerous false safety signal.
    enforcement: |
      Before editing any component that shows post-action success state (success toast,
      completion badge, "done" message), verify that the success signal is bound to a
      workflow terminal SUCCEEDED state or explicit backend confirmation — not to the
      dispatch RPC response. Check that ACCEPTED and SUCCEEDED are handled separately.
    forbidden_fixes:
      - forbidden.dispatch_as_success
      - forbidden.optimistic_destructive_success
    required_tests:
      - TestSuccessToast_NotShown_OnDispatchOnly
      - TestSuccessToast_ShownOnly_OnWorkflowTerminal
    related_principles:
      - workflow.dispatch_is_not_completion
    related_failure_modes:
      - fm.industry.optimistic_success_for_irreversible_action

    related_invariants:
      - meta.write_creates_completion_obligation
  - id: ui.floating_identity_must_not_be_hidden
    title: UI screens showing cluster membership, leader identity, or network identity must distinguish stable node identity from floating VIP reachability
    severity: high
    status: planned
    # origin: { type: principle, confidence: high }
    summary: |
      Operator UIs that display cluster topology, etcd membership, storage pool membership,
      leader identity, or node network addresses must distinguish:
        - Stable node IP: the durable, per-physical-node address that remains constant
        - Floating VIP: the cluster's reachable gateway address, held by one node at a time
      When a UI shows the VIP as if it were a node's IP, the operator cannot tell which
      physical node the VIP is currently on, cannot detect VIP contamination in membership
      lists, and may make dangerous operational decisions based on the wrong identity.
    enforcement: |
      Before editing any UI component that renders IP addresses, peer URLs, etcd members,
      ScyllaDB seeds, MinIO pool members, or gateway IPs, verify that:
        - The cluster VIP is shown distinctly (labeled "VIP" or "gateway address")
        - Individual node IPs are shown as their stable, physical addresses
        - The UI does not conflate PrimaryIP() output with stable node identity
    forbidden_fixes:
      - forbidden.vip_as_node_identity
    required_tests:
      - TestMembershipView_DistinguishesVIP_FromNodeIP
      - TestLeaderView_ShowsStableNodeIP_NotVIP
    related_principles:
      - identity.stable_node_identity_not_floating_vip
    related_failure_modes:
      - fm.globular.vip_transition_cascade
      - fm.industry.floating_address_used_as_durable_identity
    related_invariants:
      - meta.structure_must_not_be_stripped_in_projection

  # ── TODO (design source: awareness repo docs/awareness/frontend-awareness.md) ──
  # Future Tier 1.5 frontend discovered graph: extract components, routes,
  # backend calls, state atoms, and authority bindings from TypeScript/frontend
  # code to support frontend_trace_component, frontend_explain_screen,
  # frontend_plan_feature, and frontend_verify_change. Not implemented yet —
  # declared contracts (this file) come first: frontend awareness protects
  # operator truth; the UI must never make desired, cached, or optimistic
  # state look like confirmed truth.

  # ── Frontend execution mechanics invariants ───────────────────────────────────
  # These invariants govern how the UI updates, remembers, listens, caches, and
  # reacts. They complement the existing invariants (which govern what the UI says)
  # by protecting the mechanics that move truth around without corrupting it.

  - id: ui.partial_update_preserves_screen_context
    title: Frontend updates must refresh the smallest responsible UI region, not the full page
    severity: high
    status: active
    summary: |
      A frontend update must refresh only the component, data holder, panel, row, or card
      responsible for the changed data. Full page reloads are forbidden when the change can be
      propagated by state update, DOM event, subscription event, or targeted data refresh.
      Full page reloads destroy operator context: expanded panels, selected node, filter state,
      scroll position, warning visibility, and diagnostic flow.
    enforcement: |
      Before adding location.reload(), window.location = ..., router.refresh(), full re-mount
      behavior, or a whole-screen refresh, verify that a targeted data-holder refresh cannot
      solve the problem. If a local state bug requires a reload to hide itself, that is a bug
      in state management, not a justification for a reload.
    forbidden_fixes:
      - ui.fix.full_page_reload_for_local_state_change
      - ui.fix.refresh_screen_to_hide_state_bug
    required_tests:
      - TestDataHolderRefresh_DoesNotReloadWholePage
      - TestRefreshPreservesExpandedPanelAndSelection
    related_failure_modes:
      - fm.ui.full_page_reload_masks_state_bug

  - id: ui.dom_event_contract_must_be_typed_and_scoped
    title: DOM events used for frontend synchronization must have a declared contract
    severity: high
    status: active
    summary: |
      DOM events used for frontend synchronization must have a declared contract: event name,
      payload shape, owner, producer, consumers, and scope. DOM events are useful for loosely
      coupled UI updates, but without contracts they become invisible control flow. An event
      named "refresh" or "update" with an untyped payload is an undocumented global event bus.
      Frontend event detail must not be treated as backend truth.
    enforcement: |
      Before adding or changing CustomEvent, dispatchEvent, or addEventListener for
      cross-component communication, verify: the event name is namespaced (e.g.,
      globular:service-runtime-updated), the payload is typed or schema-checked, the producer
      and consumers are known, malformed payloads are safely ignored, and the event detail is
      not used as backend authority. Generic event names (refresh, update, reloadEverything)
      are forbidden.
    forbidden_fixes:
      - ui.fix.global_event_bus_without_contract
      - ui.fix.untyped_custom_event_payload
      - ui.fix.event_detail_as_backend_truth
    required_tests:
      - TestDomEvent_HasTypedPayloadContract
      - TestMalformedDomEvent_DoesNotMutateAuthoritativeState
    related_failure_modes:
      - fm.ui.untyped_dom_event_causes_wrong_refresh

  - id: ui.data_holder_is_cache_not_authority
    title: DOM elements, component stores, and frontend singletons are caches — they must not become backend authority
    severity: critical
    status: active
    summary: |
      A DOM element, component store, browser cache, or frontend singleton may hold data for
      rendering efficiency, but must never become the authority for backend truth. Data-holder
      elements are mirrors, not sources of truth. Backend-authoritative fields (runtime health,
      workflow success/failure, installed version, desired state, permission result, package
      identity, node membership, objectstore topology) must always be sourced from backend
      authority, not from a data-holder element.
    enforcement: |
      Before adding a data-holder component, declare which fields are local UI state and which
      fields come from backend authority. Local UI state includes: selected row, expanded panel,
      draft text, current tab, temporary filter input, cached query result. Backend authority
      includes: runtime health, workflow success/failure, installed version, desired state,
      permission result, package identity, node membership, and topology truth. Data-holder
      elements must invalidate when the backend authority changes.
    forbidden_fixes:
      - ui.fix.data_holder_as_status_authority
      - ui.fix.dom_dataset_as_backend_truth
    required_tests:
      - TestDataHolder_InvalidatesFromBackendEvent
      - TestDataHolder_DoesNotInventRuntimeStatus
    related_failure_modes:
      - fm.ui.data_holder_becomes_authority
    related_invariants:
      - ui.visible_state_requires_authority

  - id: ui.async_result_must_not_overwrite_newer_state
    title: Late async responses must not overwrite newer frontend state
    severity: high
    status: active
    summary: |
      Frontend requests often race. A slower old response can arrive after a newer request and
      silently revert the UI to a stale state. Any component that issues concurrent requests
      against the same target state must guard against late responses overwriting newer state.
    enforcement: |
      Before writing code that issues concurrent requests against the same target state, verify
      that one of the following guards is used: AbortController to cancel the previous request,
      request generation counter, resource revision check, timestamp comparison, correlation ID,
      last-started request guard, or backend version/generation check before applying the
      response.
    forbidden_fixes:
      - ui.fix.accept_last_arriving_response_as_latest
      - ui.fix.no_abort_or_generation_for_concurrent_requests
    required_tests:
      - TestLateResponse_DoesNotOverwriteNewerState
      - TestAbortedRequest_DoesNotMutateComponentState
    related_failure_modes:
      - fm.ui.stale_async_response_reverts_state

  - id: ui.subscription_lifecycle_must_be_owned
    title: Any component that registers listeners, subscriptions, or polling must own cleanup
    severity: high
    status: active
    summary: |
      Any component that registers event listeners, subscriptions, streams, timers, or polling
      loops must own the matching cleanup path. Leaked listeners cause duplicate refreshes, stale
      updates, memory leaks, and state mutation after component unmount.
    enforcement: |
      Before adding addEventListener, setInterval, setTimeout loops, subscribe, watch,
      WebSocket, EventSource, gRPC-web streams, or custom store listeners, verify that the
      matching cleanup path exists and removes the exact listener/subscription when the
      component unmounts or the scope ends. The cleanup must run even when the component
      unmounts due to navigation or error.
    forbidden_fixes:
      - ui.fix.listener_without_cleanup
      - ui.fix.polling_loop_survives_component_unmount
      - ui.fix.stale_subscription_updates_new_screen
    required_tests:
      - TestComponentUnmount_RemovesDomListener
      - TestSubscriptionCleanup_PreventsDuplicateRefresh
    related_failure_modes:
      - fm.ui.listener_leak_duplicates_refresh

  - id: ui.list_identity_must_use_backend_id
    title: Dynamic lists must key rows by stable backend identity, not array index or display name
    severity: high
    status: active
    summary: |
      Dynamic lists must key rows by stable backend identity, not array index, display name,
      sort position, translated text, or label. When sorting, filtering, drag/drop, or
      virtualization changes list order, unstable keys move component state to the wrong row.
      This can silently mismatch expanded state, selection state, or inline edit state with
      the wrong item.
    enforcement: |
      Before writing or editing lists that render services, nodes, packages, workflows, tasks,
      resources, users, roles, or permissions, verify that the row key is a stable backend
      identity (service_id, node_id, package_id, workflow_run_id, resource_id, permission_id,
      user_id, role_id). Array index and display name are forbidden as row keys for anything
      that can reorder, filter, or sort.
    forbidden_fixes:
      - ui.fix.list_key_uses_array_index
      - ui.fix.display_name_as_identity
    required_tests:
      - TestListReorder_PreservesRowStateByBackendId
      - TestFilteredList_DoesNotMoveStateBetweenRows
    related_failure_modes:
      - fm.ui.index_key_moves_row_state

  - id: ui.empty_loading_unknown_failed_are_distinct
    title: Empty, loading, unknown, stale, denied, and failed UI states must not collapse into one generic state
    severity: high
    status: active
    summary: |
      These states mean different things operationally: empty means authority says zero results;
      loading means query is in progress; unknown means authority has not been established;
      stale means old data is being shown; denied means the user lacks permission; failed means
      the backend or query failed. Collapsing any two of these into a single generic UI state
      hides the true operational condition from the operator.
    enforcement: |
      Before editing spinners, empty states, error banners, fallback panels, or result tables,
      verify that: permission denied is not rendered as empty; backend failure is not rendered
      as infinite loading; unknown is not rendered as healthy or empty; stale data is visibly
      marked; empty success requires an authoritative response confirming zero results.
    forbidden_fixes:
      - ui.fix.spinner_hides_backend_failure
      - ui.fix.empty_state_hides_permission_denied
      - ui.fix.unknown_rendered_as_empty_success
    required_tests:
      - TestPermissionDenied_NotRenderedAsEmptyList
      - TestBackendFailure_NotRenderedAsInfiniteSpinner
      - TestUnknownState_NotRenderedAsHealthyOrEmpty
    related_failure_modes:
      - fm.ui.permission_denied_rendered_as_empty
    related_invariants:
      - ui.visible_state_requires_authority
      - ui.action_requires_permission_contract

  - id: ui.form_submit_must_be_idempotent_or_singleflight
    title: Mutating form submissions must be idempotent or guarded by single-flight behavior
    severity: high
    status: active
    summary: |
      Double-clicks, Enter key submit, retry buttons, and network retry can create duplicate
      workflows or duplicate backend mutations. Every mutating form submission must be either
      idempotent or protected by a single-flight guard that prevents duplicate requests while
      one is in flight.
    enforcement: |
      Before editing mutating forms or buttons that trigger workflow start, BPMN work item
      completion, approval/reject, package deploy, service restart, role/permission changes,
      topology apply, or destructive actions, verify one of: submit disabled while pending;
      idempotency key used; backend operation is idempotent; frontend single-flight guard
      exists; retry reuses the same operation identity when appropriate.
    forbidden_fixes:
      - ui.fix.double_submit_starts_duplicate_workflow
      - ui.fix.retry_creates_new_mutation_without_idempotency_key
    required_tests:
      - TestDoubleClick_DoesNotCreateDuplicateMutation
      - TestRetry_ReusesIdempotencyKey
    related_failure_modes:
      - fm.ui.double_submit_creates_duplicate_mutation

  - id: ui.navigation_state_must_be_shareable_when_operationally_relevant
    title: Operationally relevant screen state must survive reload and navigation when appropriate
    severity: medium
    status: active
    summary: |
      For diagnostic UIs, the selected node, service, workflow run, resource, tab, filter,
      and time range are part of the operator's context. This context must survive reload,
      back/forward navigation, and sharing when it is operationally relevant. State stored
      only in ephemeral component state is lost when the operator navigates away or shares
      a URL with a colleague.
    enforcement: |
      Before editing diagnostic pages, topology views, workflow views, admin screens, and
      audit pages, decide whether selected context should live in route params, query params,
      fragment, or durable local UI state. Do not store operationally important context only
      in ephemeral component state when the user must be able to return to it or share it.
    forbidden_fixes:
      - ui.fix.operational_context_lost_on_navigation
      - ui.fix.selected_resource_only_in_ephemeral_state
    required_tests:
      - TestWorkflowRunSelection_SurvivesReload
      - TestFilterState_RoundTripsThroughURL
    related_failure_modes:
      - fm.ui.operational_context_lost_on_navigation

  - id: ui.accessibility_must_preserve_operational_meaning
    title: Critical UI meaning must not depend only on color, hover, animation, or visual layout
    severity: medium
    status: active
    summary: |
      Accessibility in an operator UI is not cosmetic — it preserves operational meaning.
      Critical UI states (warnings, errors, disabled reasons, destructive action risk) must
      not depend only on color, hover, animation, visual layout, or icon shape. If an operator
      using a screen reader or keyboard cannot access the same operational meaning as one using
      a mouse, the UI has an operational gap, not merely an accessibility gap.
    enforcement: |
      Before editing status badges, warnings, forms, modals, command menus, or destructive
      actions, verify: status has text, not color only; warnings are not hover-only; destructive
      actions expose risk in a readable form; disabled actions expose their reason; keyboard
      navigation works for critical actions.
    forbidden_fixes:
      - ui.fix.color_only_status
      - ui.fix.warning_only_visible_on_hover
      - ui.fix.disabled_button_without_reason
    required_tests:
      - TestStatusBadge_HasTextAndAriaLabel
      - TestDestructiveWarning_AnnouncedToAssistiveTech
      - TestDisabledAction_ExposesReason
    related_invariants:
      - ui.dangerous_warning_must_remain_visible
      - ui.action_requires_permission_contract

  - id: ui.cache_invalidation_must_follow_authority_generation
    title: Client cache invalidation must follow backend authority generation, version, or explicit invalidation event
    severity: high
    status: active
    summary: |
      Time-only cache expiration is not enough for operator-critical state. Frontend caches for
      runtime status, workflow runs, installed state, permissions, topology, package metadata,
      or resource details must include the authority identity needed to invalidate them correctly.
      A frontend cache that outlives the backend generation it represents is showing the operator
      stale truth.
    enforcement: |
      Before adding frontend caching for operator-critical state, verify that cache entries
      include the authority identity that drives invalidation: backend generation, resource
      revision, build_id, workflow_run_id, event sequence, permission version, user/role
      identity, explicit invalidation DOM event, or subscription event. Time-only expiry
      (TTL alone) is insufficient for operator-critical state.
    forbidden_fixes:
      - ui.fix.time_only_cache_for_operator_state
      - ui.fix.cache_not_invalidated_on_backend_generation_change
    required_tests:
      - TestCacheInvalidates_WhenGenerationChanges
      - TestPermissionCacheInvalidates_WhenUserOrRoleChanges
    related_failure_modes:
      - fm.ui.time_only_cache_hides_backend_change
    related_invariants:
      - ui.status_freshness_must_be_surfaced

  - id: ui.error_boundary_must_preserve_diagnostic_context
    title: Frontend error boundaries must preserve diagnostic context, not blank the operator screen
    severity: high
    status: active
    summary: |
      A rendering failure should not erase the operator's diagnostic context: selected resource
      identity, visible warnings, last-known data timestamp, or safe recovery options. An error
      boundary that blanks the screen destroys the operator's ability to understand what failed
      and how to recover.
    enforcement: |
      Before editing error boundaries or fallback screens, verify that the fallback shows: which
      component or panel failed, selected resource identity when safe to display, last known
      safe data timestamp if available, a safe retry action, a link or path back to stable parent
      context, and critical warning state if already known. Blanking the screen is never the
      correct fallback for a partial component failure.
    forbidden_fixes:
      - ui.fix.error_boundary_blanks_operator_context
      - ui.fix.error_boundary_hides_critical_warning
    required_tests:
      - TestErrorBoundary_ShowsFailedComponentAndResourceId
      - TestErrorBoundary_PreservesCriticalWarning
    related_failure_modes:
      - fm.ui.error_boundary_loses_diagnostic_context
    related_invariants:
      - ui.dangerous_warning_must_remain_visible
