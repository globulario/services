causal_rules:
  - id: etcd_disk_pressure_to_workflow_timeout
    root_signal: etcd_disk_pressure
    trigger_keywords:
      - NOSPACE
      - database space exceeded
      - etcd disk
    sequence:
      - event: etcd_nospace
        component: etcd
        keywords: [NOSPACE, database space]
      - event: leader_instability
        component: etcd/controller
        keywords: [lost leader, elected leader, leader changed]
      - event: controller_lease_churn
        component: controller
        keywords: [lease expired, lease lost, leadership]
      - event: workflow_dispatch_timeout
        component: workflow
        keywords: [dispatch timeout, context deadline exceeded, workflow]
    confidence: medium
    explanation_template: "etcd disk pressure likely destabilized control-plane operations, leading to workflow dispatch failures."
    recommended_fix_order:
      - etcdctl alarm list — confirm NOSPACE is active
      - compact revision history (etcdctl compact <rev>)
      - defrag all members (etcdctl defrag --endpoints=<all>)
      - verify disk usage dropped below quota
      - etcdctl alarm disarm — only after disk is below quota
      - verify etcd quorum and leader stability (etcdctl endpoint health)
      - verify controller leadership (watch controller logs for 'acquired leader lease')
      - verify workflow dispatch resumes

  - id: port_squatting_to_unknown_grpc_service
    root_signal: wrong_process_on_port
    trigger_keywords:
      - address already in use
      - port in use
    sequence:
      - event: port_in_use
        component: network
        keywords: [address already in use, bind]
      - event: unknown_grpc_service
        component: grpc
        keywords: [unknown service, unknown gRPC service, connection refused]
      - event: service_client_failure
        component: service
        keywords: [workflow, service client, unavailable]
    confidence: high
    explanation_template: "A wrong process is occupying the expected port, causing gRPC clients to receive 'unknown service' errors."
    recommended_fix_order:
      - identify listener process (ss -tlnp or lsof -i)
      - verify cgroup or systemd unit ownership
      - kill orphan if proven safe
      - restart expected service
      - verify gRPC service descriptor

  - id: minio_offline_disk_to_artifact_failure
    root_signal: minio_disk_failure
    trigger_keywords:
      - offline disk
      - healing
      - drive offline
    sequence:
      - event: minio_disk_offline
        component: minio
        keywords: [offline disk, drive offline, healing]
      - event: artifact_unavailable
        component: repository
        keywords: [artifact, download failed, not found, checksum]
      - event: service_install_blocked
        component: node_agent
        keywords: [install failed, artifact, workflow blocked]
    confidence: medium
    explanation_template: "MinIO disk failure is blocking artifact availability, causing service install workflows to fail."
    recommended_fix_order:
      - check MinIO disk health (mc admin info)
      - verify MinIO healing status
      - verify artifact availability in repository
      - retry blocked install workflows

  - id: systemd_notify_failure_to_install_drift
    root_signal: systemd_notify_missing
    trigger_keywords:
      - activating
      - start operation timed out
      - READY=1
    sequence:
      - event: service_stuck_activating
        component: systemd
        keywords: [activating, start operation timed out, TimeoutStartSec]
      - event: port_held_by_orphan
        component: network
        keywords: [address already in use, orphan, ppid=1]
      - event: waitactive_timeout
        component: node_agent
        keywords: [WaitActive, timeout, install FAILED, installed state]
    confidence: high
    explanation_template: "Service failed to send sd_notify READY=1, causing systemd to kill and restart it, accumulating orphaned processes that hold the port."
    recommended_fix_order:
      - verify service sends READY=1 after binding listener
      - kill orphaned processes holding the port
      - add ExecStartPre to clear orphans before start
      - verify WaitActive completes after fix

  - id: convergence_committer_race_to_self_upgrade_loop
    root_signal: convergence_committer_delay
    trigger_keywords:
      - install workflow dispatched repeatedly
      - cluster-controller restarted
      - convergenceCommitter
    sequence:
      - event: controller_installs_itself
        component: cluster-controller
        keywords: [install workflow, cluster-controller, dispatch]
      - event: controller_restarts_before_commit
        component: cluster-controller
        keywords: [restarted, restart, controller restart]
      - event: no_installed_record_committed
        component: etcd
        keywords: [installed state, ConvergenceResultV1, committed]
      - event: reconciler_redispatches_install
        component: cluster-controller
        keywords: [dispatch, install, missing]
    confidence: high
    explanation_template: "The convergenceCommitter startup delay exceeded the time before the next controller restart, so no installed record was committed, causing the reconciler to repeatedly redispatch the cluster-controller install workflow."
    recommended_fix_order:
      - check convergenceCommitter startup delay (must be <= 5s)
      - add runOnce() call at Start() to commit before first tick
      - verify etcd /globular/nodes/{node}/packages/service/cluster-controller exists after fix
      - confirm no further install workflow dispatched within 60s

  - id: vip_missing_from_cert_sans_to_node_unreachable
    root_signal: tls_cert_sans_mismatch
    trigger_keywords:
      - certificate error
      - tls handshake failed
      - x509 certificate
      - VIP
    sequence:
      - event: cert_issued_without_vip
        component: pki
        keywords: [certificate, issued, SAN, SubjectAltName]
      - event: client_tls_handshake_failure
        component: network
        keywords: [TLS handshake, certificate, x509]
      - event: node_unreachable_via_vip
        component: cluster-controller
        keywords: [unreachable, VIP, connection refused, timeout]
    confidence: high
    explanation_template: "A TLS certificate was issued without the VIP IP in its SANs. Clients connecting via the VIP received certificate errors, making the node appear unreachable despite its services running."
    recommended_fix_order:
      - openssl x509 -noout -ext subjectAltName — confirm VIP missing
      - reissue certificate with VIP in SAN list
      - restart services to load new certificate
      - verify with openssl s_client -connect VIP:443

  - id: auth_token_wrong_mac_to_permission_denied
    root_signal: auth_token_using_wrong_mac
    trigger_keywords:
      - permission denied
      - unauthorized
      - token invalid
      - MAC address
    sequence:
      - event: token_generated_with_wrong_mac
        component: authentication
        keywords: [token, MAC, generated, wrong node]
      - event: token_validation_fails
        component: authentication
        keywords: [invalid token, unauthorized, permission denied]
      - event: service_calls_rejected
        component: grpc
        keywords: [permission denied, unauthorized, unauthenticated]
    confidence: medium
    explanation_template: "Authentication token was generated using the wrong node's MAC address (e.g., using local MAC instead of node-specific MAC), causing all token validations to fail with permission denied."
    recommended_fix_order:
      - check which MAC address was used for token generation
      - verify node identity in etcd (node MAC should match token MAC)
      - regenerate token using correct node MAC
      - verify permission denied errors resolve

  - id: acme_cert_path_mismatch_to_https_failure
    root_signal: acme_cert_symlink_missing
    trigger_keywords:
      - ACME
      - Let's Encrypt
      - cert not found
      - TLS
      - wrong certificate
    sequence:
      - event: acme_cert_written_to_domains_path
        component: domain-reconciler
        keywords: [ACME, cert, /var/lib/globular/domains, fullchain.pem]
      - event: xds_reads_from_different_path
        component: xds
        keywords: [xDS, TLS, /var/lib/globular/config/tls/acme, cert not found]
      - event: envoy_serves_wrong_cert
        component: envoy
        keywords: [certificate, TLS, serving]
    confidence: high
    explanation_template: "ACME cert reconciler writes to /var/lib/globular/domains/{domain}/fullchain.pem but xDS reads from /var/lib/globular/config/tls/acme/{domain}/. Without a symlink between them, Envoy serves the old (cluster-internal) certificate for external requests."
    recommended_fix_order:
      - confirm cert at /var/lib/globular/domains/{domain}/fullchain.pem
      - create symlink /var/lib/globular/config/tls/acme/{domain}/ → /var/lib/globular/domains/{domain}/
      - reload xDS config
      - verify Envoy serves Let's Encrypt cert via openssl s_client

  - id: scylladb_raft_join_sequencing_to_stall
    root_signal: scylladb_raft_join_parallel
    trigger_keywords:
      - Raft join
      - ScyllaDB
      - join stalled
      - Bootstrap
    sequence:
      - event: first_scylla_node_joining
        component: scylladb
        keywords: [joining, bootstrapping, Raft, first node]
      - event: second_node_starts_join_simultaneously
        component: scylladb
        keywords: [joining, bootstrapping, Raft, second node]
      - event: both_nodes_stall
        component: scylladb
        keywords: [stalled, timeout, bootstrap failed]
    confidence: high
    explanation_template: "ScyllaDB Raft cluster joins must be sequential. If two nodes attempt to join simultaneously, both stall waiting for the other to complete the bootstrap process."
    recommended_fix_order:
      - confirm only one ScyllaDB node is bootstrapping at a time
      - wait for first node's ScyllaDB to become healthy before starting second
      - use 'nodetool status' to confirm first node is UN (Up/Normal) before joining second
      - add sequencing gate in join script

  - id: non_leader_reconciler_to_dns_flicker
    root_signal: non_leader_applies_dns
    trigger_keywords:
      - DNS flickering
      - multiple controllers
      - domain reconciler
      - DNS conflict
    sequence:
      - event: non_leader_runs_domain_reconciler
        component: cluster-controller
        keywords: [domain reconciler, not leader, apply]
      - event: non_leader_overwrites_leader_state
        component: dns
        keywords: [DNS, overwrite, conflict, record]
      - event: dns_flickering
        component: dns
        keywords: [flickering, record changed, inconsistent]
    confidence: high
    explanation_template: "The domain and DNS reconcilers were not gated on leadership. Multiple controller nodes ran the reconcilers simultaneously, applying conflicting DNS records that caused flickering and ACME challenge failures."
    recommended_fix_order:
      - add IsLeader() gate to domain_reconciler.go before any writes
      - add IsLeader() gate to dns_reconciler.go before any writes
      - verify only leader applies DNS records (check controller logs on non-leader)
      - verify ACME challenges succeed after fix
