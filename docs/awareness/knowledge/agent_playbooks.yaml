    title: "Awareness cannot read etcd — desired state, installed packages, and node status are invisible"
    criticism: "etcd holds the authoritative desired state (/globular/resources/DesiredService/), installed packages (/globular/nodes/{id}/packages/), and node status. Without reading it, awareness cannot join Desired → Installed layers or detect divergence between what should be installed and what is."
    why_it_matters: "The core 4-layer model requires joining Layer 2 (Desired) to Layer 3 (Installed). Without etcd, awareness can only see Layer 3 from the node-agent heartbeat, not whether Layer 2 agrees. Desired/Installed divergence is the most common source of cluster instability."
    requirement: "Add a read-only etcd snapshot collector that reads DesiredService, DesiredRelease, node packages, and node status keys. NEVER write to etcd. Emit source_tier=etcd_desired_state nodes. Add cross-layer edges connecting Desired → Installed → Runtime."
