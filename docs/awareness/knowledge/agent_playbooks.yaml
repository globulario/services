---
# agent_playbooks.yaml — Awareness agent playbooks and known capability gap patterns.
#
# Section 1: playbooks — review workflows for converting critique into requirements.
# Section 2: capability_gap_patterns — known awareness capability gaps with full
#             requirement structures. Used by awareness.self_review and
#             awareness.requirement_from_critique.
#
# status values: open | implemented
# priority values: P0 (blocking / false confidence) | P1 (high value) | P2 (nice to have)

playbooks:
  - id: closed_loop_review
    title: Convert critique into requirement and closure condition
    trigger:
      - awareness review
      - Claude criticism
      - repeated gap finding
    required_output:
      - criticism
      - requirement
      - implementation_plan
      - tests_required
      - closure_condition
      - knowledge_updates
    forbidden_behavior:
      - open-ended criticism without requirement
      - saying no_match means safe
      - declaring complete without tests

capability_gap_patterns:
  - id: awareness.learn_from_verified_fix
    priority: P0
    keywords:
      - learn from fix
      - verified fix
      - learning loop
      - knowledge base update
      - encode lessons
      - automatically learn
      - remember
    title: "Awareness does not automatically convert verified fixes into knowledge proposals"
    criticism: "Awareness only amplifies documented knowledge — it does not automatically grow from verified fixes. The loop from incident → fix → verified lesson → knowledge update is still manual."
    why_it_matters: "Every time a bug recurs, it represents a knowledge encoding failure. The knowledge base only improves if a human remembers to encode lessons after an incident."
    requirement: "Add awareness.learn_from_fix that converts verified incident/fix context into proposed updates to failure_modes.yaml, forbidden_fixes.yaml, scan_rules.yaml, invariants.yaml, or metric_thresholds.yaml. Requires human approval before modifying knowledge files."
    implementation_plan:
      - "Add awareness.learn_from_fix MCP tool accepting incident_id, symptom_text, root_cause, fix_summary, verification, changed_files, tests_added, known_bad_fix"
      - "Generate ProposalSpec objects compatible with existing proposal workflow"
      - "Save proposals to docs/awareness/proposals/ only — never mutate knowledge YAML directly"
      - "Mark graph rebuild required after applying knowledge changes"
    tests_required:
      - TestLearnFromFix_NewFailureMode
      - TestLearnFromFix_ForbiddenFixProposal
      - TestLearnFromFix_NoDirectYAMLMutation
      - TestLearnFromFix_ProposalIsLoadable
    closure_condition: "Given a verified fix, awareness produces at least one reviewable knowledge proposal or explains why no durable lesson should be added."
    knowledge_updates:
      - target_file: design_patterns.yaml
        entry: closed_loop_learning
        operation: add_or_update
    prevents_repeat_criticism: "Future reviews cannot say 'awareness does not learn from verified fixes' once learn_from_fix exists, creates proposal objects from verified fixes, tests prove proposals require approval, and applied proposals update YAML."
    status: implemented

  - id: awareness.offline_diagnose
    priority: P1
    keywords:
      - offline
      - cluster down
      - grpc unavailable
      - logs only
      - no runtime
      - broken cluster
      - journalctl
      - systemd
      - diagnose without cluster
    title: "Awareness cannot diagnose when gRPC runtime sources are down"
    criticism: "Runtime gRPC sources only work when the cluster is healthy enough to answer. But awareness is most needed when the cluster is badly broken."
    why_it_matters: "During an actual outage, the cluster may be too broken to serve gRPC. An operator with only logs and systemd status cannot get useful awareness output."
    requirement: "Add awareness.offline_diagnose that parses logs/journalctl/systemd/etcdctl text and matches against known failure modes without requiring a live cluster."
    implementation_plan:
      - "Accept journalctl_text, systemd_status, etcdctl_output, docker_compose_logs as text inputs"
      - "Extract events matching 15+ known patterns (NOSPACE, port in use, unknown gRPC service, etc.)"
      - "Score extracted events against failure_modes.yaml and invariants.yaml"
      - "Build a timestamped timeline when timestamps are present"
      - "Return evidence, timeline, suspected failure modes, confidence, blind spots"
    tests_required:
      - TestOfflineDiagnose_EtcdNospace
      - TestOfflineDiagnose_PortSquatting
      - TestOfflineDiagnose_EmptyInput
    closure_condition: "An operator with only journalctl output from a broken cluster can get meaningful failure mode matches and a timeline without any live gRPC connection."
    knowledge_updates:
      - target_file: failure_modes.yaml
        entry: offline_diagnosis_workflow
        operation: add_procedure_note
    prevents_repeat_criticism: "Future reviews cannot say 'awareness is useless when cluster is down' once offline_diagnose exists and its tests pass."
    status: implemented

  - id: awareness.ast_scan
    priority: P1
    keywords:
      - grep-based
      - ast
      - indirect
      - hidden pattern
      - const
      - variable
      - helper function
      - static analysis
    title: "scan_violations uses regex only and misses indirect dangerous patterns"
    criticism: "scan_violations is grep-based and can miss patterns hidden behind constants, helper functions, or variable assignments (e.g. const addr = '127.0.0.1'; grpc.Dial(addr))."
    why_it_matters: "A const target = '127.0.0.1' pattern passes all regex checks but is still a hard-rule violation. Grep cannot trace variable values."
    requirement: "Add Go AST scanning to scan_violations using go/parser + go/ast. Detect loopback in consts/vars, grpc.Dial with loopback arg, os.Getenv for config, os/exec in controller, retry without terminal."
    implementation_plan:
      - "Create golang/awareness/scan package using stdlib go/parser + go/ast"
      - "Implement ScanGoFile and ScanGoDir functions"
      - "Detect: loopback string literals, loopback in const/var, grpc.Dial with loopback, os.Getenv, os/exec import in controller"
      - "Merge AST findings with regex findings in scan_violations tool, dedup by file+line"
      - "Each finding includes scanner: 'go_ast' or scanner: 'regex'"
    tests_required:
      - TestScanGoFile_LoopbackStringLiteral
      - TestScanGoFile_ConstLoopback
      - TestScanGoFile_GRPCDialLoopback
      - TestScanGoFile_OsGetenv
      - TestScanGoFile_ExecImportInController
    closure_condition: "A fixture with const target = '127.0.0.1:12000'; grpc.Dial(target) must produce a violation mapped to hard_rule.no_localhost with scanner: go_ast."
    knowledge_updates:
      - target_file: scan_rules.yaml
        entry: loopback_in_grpc_dial_via_const
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'scan is only grep-based' once the AST scanner package exists and its fixture tests pass."
    status: implemented

  - id: awareness.causal_chain
    priority: P1
    keywords:
      - causal chain
      - root cause chain
      - linked symptoms
      - cascading failure
      - why did this cause that
      - multiple symptoms
    title: "Awareness reports symptoms individually but cannot build causal chains"
    criticism: "If etcd disk pressure, leader flaps, and workflow timeouts all appear simultaneously, awareness reports all three but cannot say etcd caused the others."
    why_it_matters: "An operator sees 5 alerts and doesn't know which to fix first. Without a causal chain, they may fix a symptom instead of the root cause."
    requirement: "Add awareness.causal_chain that groups related symptoms into likely causal sequences using causal_rules.yaml."
    implementation_plan:
      - "Create docs/awareness/knowledge/causal_rules.yaml with known causal chain rules"
      - "Add awareness.causal_chain MCP tool"
      - "Score evidence/events against each rule's sequence steps"
      - "Return chains where ≥50% of steps match, with recommended fix order"
    tests_required:
      - TestCausalChain_EtcdNspaceToWorkflowTimeout
      - TestCausalChain_UnrelatedSymptoms
      - TestCausalChain_PartialMatchBelowThreshold
    closure_condition: "Given a mix of etcd, controller, and workflow symptoms, awareness groups them into a chain with a recommended fix order rather than listing them separately."
    knowledge_updates:
      - target_file: causal_rules.yaml
        entry: additional_chains_as_discovered
        operation: extend
    prevents_repeat_criticism: "Future reviews cannot say 'awareness cannot trace causation' once causal_chain exists and its tests pass for the 4 known chain types."
    status: implemented

  - id: awareness.real_runtime_sources
    priority: P0
    keywords:
      - noop
      - runtime sources
      - empty snapshot
      - real grpc
      - live data
      - cluster data
      - no data
    title: "All RuntimeBridge sources were noops — no live cluster data"
    criticism: "RuntimeBridge sources all return empty — the runtime snapshot looks healthy because there is no data, not because the cluster is healthy."
    why_it_matters: "A noop runtime source produces a false impression of a clean cluster. Silent noop is worse than a reported error."
    requirement: "Implement real gRPC-backed sources for cluster_doctor, cluster_controller, workflow service. Add SourceHealth metadata distinguishing noop/healthy/error. Noop must be explicit and visible."
    implementation_plan:
      - "Add GrpcDoctorSource, GrpcStateSource, GrpcServiceStatusSource, GrpcWorkflowSource"
      - "Add SourceHealth struct with Kind, Healthy, Error, Transport, Auth fields"
      - "Noop sources report Kind=noop explicitly"
      - "BuildBridge() wires real sources when addresses are configured, noop otherwise"
    tests_required:
      - TestSourceHealthFor_Noop
      - TestSourceHealthFor_RealSource_Success
      - TestSourceHealthFor_RealSource_Error
    closure_condition: "Runtime snapshot source_health must never be empty. Every source reports noop or healthy or error. No silent empty results."
    knowledge_updates:
      - target_file: invariants.yaml
        entry: runtime_source_health_must_be_explicit
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'runtime sources are all noops' once real gRPC sources exist and source_health is populated for every source."
    status: implemented

  - id: awareness.metric_thresholds_wired
    priority: P0
    keywords:
      - threshold
      - 90%
      - default threshold
      - service-specific threshold
      - metric not using config
      - hardcoded threshold
    title: "Metric thresholds were hardcoded — service-specific YAML thresholds not used"
    criticism: "Runtime snapshot Match() instantiated empty MetricThresholds, so service-specific thresholds from metric_thresholds.yaml never influenced warnings."
    why_it_matters: "etcd disk at 76% should warn (threshold: 70%) but was silent because generic 90% threshold was used."
    requirement: "Wire metric_thresholds.yaml into runtime snapshot evaluation via MatchWithThresholds(). Service-specific thresholds must override defaults."
    implementation_plan:
      - "Add MatchWithThresholds(invIDs, fmIDs []string, thresholds *MetricThresholds) method to Snapshot"
      - "Bridge.Snapshot() calls MatchWithThresholds with loaded thresholds"
      - "RuntimeTool loads thresholds via LoadMetricThresholds(docsDir) and passes to bridge"
    tests_required:
      - TestLoadMetricThresholds_ServiceSpecificOverridesDefault
      - TestMatchWithThresholds_ServiceSpecificEtcdDisk
      - TestMatchWithThresholds_NilUsesDefaults
    closure_condition: "A metric sample for etcd at 76% produces a warning with threshold_source: etcd, warn_threshold: 70."
    knowledge_updates:
      - target_file: metric_thresholds.yaml
        entry: additional_service_thresholds_as_discovered
        operation: extend
    prevents_repeat_criticism: "Future reviews cannot say 'thresholds are hardcoded' once MatchWithThresholds exists and the etcd threshold test passes."
    status: implemented

  - id: awareness.coverage_model
    priority: P0
    keywords:
      - coverage
      - not checked
      - raw yaml inferred
      - checked clean
      - false confidence
      - no_match safe
    title: "Coverage was inferred from match count, not tracked explicitly"
    criticism: "RawYAMLChecked=false could appear even when raw YAML ran and found nothing, because coverage was inferred from len(matches)>0."
    why_it_matters: "NO_MATCH means safe only if we know the check actually ran. Inferred coverage allows false confidence."
    requirement: "Change Coverage from bool fields to CoverageState enum: not_checked, checked_clean, checked_with_matches, failed, noop, stale, not_applicable."
    implementation_plan:
      - "Define CoverageState type with 7 values"
      - "Change Coverage struct fields to CoverageState"
      - "computeConfidence() must always set RawYAML to checked_clean or checked_with_matches, never not_checked"
    tests_required:
      - TestCoverage_RawYAMLWithZeroMatchesIsCheckedClean
      - TestCoverage_RawYAMLWithMatches
      - TestCoverage_RuntimeNoop
    closure_condition: "A preflight where raw YAML ran but found nothing reports coverage.raw_yaml=checked_clean, not not_checked. NO_MATCH is only reported when coverage is checked_clean."
    knowledge_updates:
      - target_file: design_patterns.yaml
        entry: explicit_coverage_not_inferred
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'coverage is inferred' once CoverageState enum exists and the checked_clean/not_checked tests pass."
    status: implemented

  - id: awareness.mtls_grpc_sources
    priority: P1
    keywords:
      - mtls
      - mutual tls
      - grpc auth
      - unauthenticated grpc
      - tls certificate
      - grpc security
      - insecure grpc
    title: "gRPC runtime sources do not support mTLS — production clusters require mutual TLS"
    criticism: "Runtime bridge sources connect to gRPC endpoints without mTLS. Production Globular clusters require mTLS on all inter-service gRPC. Without mTLS, the bridge cannot connect to any production cluster."
    why_it_matters: "The runtime snapshot is useless on production clusters if the gRPC sources cannot authenticate. This turns a useful tool into a noop on the systems that matter most."
    requirement: "Add mTLS configuration to the gRPC runtime bridge. Accept CA cert, client cert, and client key paths. Fall back to insecure only in dev mode with an explicit warning."
    implementation_plan:
      - "Add CACert, ClientCert, ClientKey, ServerName, Insecure fields to Config"
      - "Build tls.Config from those fields in BuildBridge()"
      - "Pass credentials.NewTLS(tlsCfg) to grpc.NewClient()"
      - "Report transport: mtls or transport: insecure in SourceHealth"
      - "Test: fake gRPC server with TLS cert accepts mTLS client connection"
    tests_required:
      - TestGrpcSourceConfig_InsecureDialOptions
      - TestGrpcSourceConfig_NoCAUsesSystemTLS
      - TestSourceHealth_WithTransportMTLS
    closure_condition: "A runtime snapshot against a production cluster with mTLS succeeds and reports transport: mtls in source_health. Insecure is never used silently."
    knowledge_updates:
      - target_file: invariants.yaml
        entry: grpc_bridge_must_use_mtls_on_production
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'runtime bridge ignores mTLS' once the tls.Config wiring exists and the mTLS transport test passes."
    status: implemented

  - id: awareness.graph_freshness
    priority: P1
    keywords:
      - stale graph
      - graph not rebuilt
      - graph freshness
      - hash mismatch
      - rebuild recommendation
      - outdated graph
    title: "Awareness graph can become stale without any warning"
    criticism: "The awareness graph is precompiled. If source YAML files change, the graph silently serves stale data. There is no freshness check or rebuild recommendation."
    why_it_matters: "An agent consulting a stale graph gets wrong invariants and wrong failure modes. The mistake is invisible — the graph appears healthy but the data is outdated."
    requirement: "Add graph freshness tracking via content hashing of source YAML files. Preflight output must include graph_freshness with source_hash, graph_hash, stale flag, and rebuild recommendation."
    implementation_plan:
      - "Compute SHA256 of all source YAML files at graph build time, store hash in graph metadata"
      - "On preflight, recompute source hash and compare to stored hash"
      - "If stale, include graph_freshness.stale=true and rebuild_recommendation in preflight output"
      - "CLI rebuild command: globular awareness rebuild"
    tests_required:
      - TestFreshness_KnowledgeNewerThanGraph
      - TestFreshness_FreshGraph
      - TestFreshness_NoBuilds
    closure_condition: "Preflight output always includes graph_freshness. If source files changed since last build, stale=true and rebuild_recommendation is non-empty."
    knowledge_updates:
      - target_file: design_patterns.yaml
        entry: graph_freshness_tracking
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'graph is silently stale' once freshness tracking exists and the stale detection test passes."
    status: implemented

  - id: awareness.snapshot_storage
    priority: P2
    keywords:
      - snapshot storage
      - suggest incident
      - runtime history
      - baseline snapshot
      - compare snapshots
      - snapshot not stored
    title: "Runtime snapshots are ephemeral — suggest_incident cannot compare to baseline"
    criticism: "suggest_incident generates incident candidates from a single runtime snapshot. Without stored historical snapshots, it cannot detect drift from a known-good baseline."
    why_it_matters: "A single snapshot shows current state. A comparison to a stored baseline shows what changed. Without storage, transient noise and real incidents look identical."
    requirement: "Add snapshot storage so suggest_incident can compare current state to a stored baseline. Snapshots stored under docs/awareness/snapshots/ with timestamp. Baseline = most recent approved snapshot."
    implementation_plan:
      - "Add snapshot save/load to runtime package"
      - "suggest_incident optionally loads baseline from snapshots dir"
      - "Diff current vs baseline: new warnings, cleared warnings, changed metrics"
      - "Return delta as evidence for incident candidates"
    tests_required:
      - TestSnapshotStorage_SaveAndLoad
      - TestSuggestIncident_WithBaselineReportsDelta
      - TestSuggestIncident_WithoutBaselineDegradesGracefully
    closure_condition: "suggest_incident with a stored baseline reports delta between baseline and current, not just current state."
    knowledge_updates:
      - target_file: design_patterns.yaml
        entry: snapshot_storage_for_baseline_comparison
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'suggest_incident has no baseline' once snapshot storage exists and the delta test passes."
    status: open

  - id: awareness.etcd_control_plane_knowledge_gap
    priority: P1
    keywords:
      - etcd nospace
      - etcd leader
      - leader instability
      - objectstore false positive
      - missing etcd failure mode
      - etcd knowledge
      - control-plane cascade
      - nospace alarm
      - fix order
      - etcd before controller
      - etcd before workflow
      - etcd.nospace_alarm
      - etcd.leader_instability
      - controller.lease_expired
      - workflow.dispatch_timeout
      - maps to objectstore
      - false positive objectstore
      - dedicated failure mode
      - knowledge base etcd
    title: "failure_modes.yaml lacks dedicated etcd control-plane cascade entries — offline_diagnose maps to objectstore false positives"
    criticism: "When offline_diagnose receives journalctl logs showing etcd NOSPACE alarm, etcd leader loss, controller lease expired, and workflow dispatch timeout, it maps the incident to objectstore failure modes rather than etcd/control-plane ones, because failure_modes.yaml has no dedicated etcd.nospace_alarm, etcd.leader_instability, controller.lease_expired_due_to_etcd_instability, or workflow.dispatch_timeout_due_to_control_plane_instability entries."
    why_it_matters: "The etcd NOSPACE → leader loss → controller lease → workflow timeout cascade is one of the most common and dangerous Globular outage patterns. Without dedicated failure mode entries, offline_diagnose produces misleading matches. An operator may investigate MinIO/objectstore instead of clearing the etcd alarm."
    requirement: "Add four failure mode entries (etcd.nospace_alarm, etcd.leader_instability, controller.lease_expired_due_to_etcd_instability, workflow.dispatch_timeout_due_to_control_plane_instability) and four forbidden fix entries to failure_modes.yaml. Add the fix-order rule: resolve etcd NOSPACE before touching controller or workflow. Include diagnostic_commands and required_tests."
    implementation_plan:
      - "Promote learned-fix-etcd_nospace_control_plane_cascade-* proposal from docs/awareness/proposals/"
      - "Add etcd.nospace_alarm entry with symptoms, root_cause, architecture_fix, diagnostic_commands (etcdctl alarm list, compact, defrag, alarm disarm, endpoint health)"
      - "Add etcd.leader_instability entry linked to etcd.nospace_alarm as upstream"
      - "Add controller.lease_expired_due_to_etcd_instability as downstream of leader_instability"
      - "Add workflow.dispatch_timeout_due_to_control_plane_instability as terminal symptom"
      - "Add forbidden fixes: disarm before compact, restart etcd without NOSPACE fix, restart controller before etcd stable, restart workflow before controller stable"
      - "Verify offline_diagnose maps test logs to etcd entries (not objectstore) after promotion"
    tests_required:
      - TestOfflineDiagnose_EtcdNOSPACE_MapsToEtcdFailureMode
      - TestOfflineDiagnose_EtcdNOSPACE_DoesNotMapToObjectstore
      - TestOfflineDiagnose_EtcdNOSPACE_SurfacesDirectDiagnostics
      - TestCausalChain_EtcdNOSPACE_ProducesControlPlaneCascade
      - TestSuggestIncident_FixOrder_EtcdBeforeWorkflow
      - TestForbiddenFixes_EtcdCascade
      - TestCausalRules_ProductionFile_EtcdCascadePresent
    closure_condition: "Given the same journalctl logs (etcd NOSPACE + leader loss + controller lease expired + workflow timeout), offline_diagnose returns etcd/control-plane failure modes with score > 0.5, objectstore entries are absent or lower-scored, and recommended_next_diagnostics includes etcdctl alarm list as first step."
    knowledge_updates:
      - target_file: failure_modes.yaml
        entry: etcd.nospace_alarm
        operation: add
      - target_file: failure_modes.yaml
        entry: etcd.leader_instability
        operation: add
      - target_file: failure_modes.yaml
        entry: controller.lease_expired_due_to_etcd_instability
        operation: add
      - target_file: failure_modes.yaml
        entry: workflow.dispatch_timeout_due_to_control_plane_instability
        operation: add
      - target_file: forbidden_fixes.yaml
        entry: disarm_alarm_before_compact
        operation: add
      - target_file: forbidden_fixes.yaml
        entry: restart_workflow_before_etcd_stable
        operation: add
      - target_file: causal_rules.yaml
        entry: etcd_disk_pressure_to_workflow_timeout
        operation: update_diagnostics
    prevents_repeat_criticism: "Future reviews cannot say 'offline_diagnose maps etcd incidents to objectstore' once the four failure mode entries are promoted to failure_modes.yaml and TestOfflineDiagnose_EtcdNOSPACE_MapsToEtcdFailureMode passes."
    pending_proposal: "etcd-control-plane-cascade-INC-etcd-nospace"
    status: implemented
    closure_achieved_at: "2026-05-07"
    closure_evidence:
      - "etcd.nospace_alarm promoted to failure_modes.yaml (score 1.00 on etcd NOSPACE logs)"
      - "etcd.leader_instability promoted to failure_modes.yaml (score 1.00)"
      - "workflow.dispatch_timeout_due_to_control_plane_instability promoted (score 1.00)"
      - "controller.lease_expired_due_to_etcd_instability promoted (score 0.67)"
      - "6 forbidden fixes promoted to forbidden_fixes.yaml"
      - "directPatternToFailureMode keywords made etcd-specific (nospace/mvcc/alarm) — objectstore absent from results"
      - "score update logic replaces alreadyInFMList skip — direct pattern boosts override RawKnowledgeFallback ties"
    remaining_blind_spots: []

  - id: awareness.offline_diagnose_symptom_scoring_gap
    priority: P1
    keywords:
      - bag of words
      - symptom scoring
      - offline_diagnose false positive
      - raw yaml blob
      - objectstore root_cause mentions etcd
      - full yaml scoring
      - symptom-only
      - score against corpus
      - blob matching
    title: "offline_diagnose scores full YAML blobs — root_cause text causes false positives when different failure modes share keywords"
    criticism: "offline_diagnose used RawKnowledgeFallback against full YAML blobs (including root_cause, remediation, architecture_fix), so an objectstore failure mode whose root_cause mentioned 'etcd' scored equal to etcd.nospace_alarm on etcd NOSPACE logs. Scoring must use only the symptom and title fields."
    why_it_matters: "Bag-of-words against full blobs will always produce false positives when failure modes causally reference each other. An operator diagnosing an etcd outage must not be sent to investigate MinIO because objectstore's root_cause says 'caused by etcd instability'."
    requirement: "offline_diagnose primary failure-mode scoring must use symptom+title fields only (symptomBasedFMMatch). Full blob matching is acceptable as fallback for invariants only, and as FM fallback when symptom matching produces zero results."
    implementation_plan:
      - "Add extractFMSymptomsText() helper — concatenates title + symptoms[] only"
      - "Add buildEventKeywords() helper — tokenizes event patterns+text, applies stop-word filter"
      - "Add symptomBasedFMMatch() — scores FMs by token overlap against symptom corpus only"
      - "Replace primary RawKnowledgeFallback FM path with symptomBasedFMMatch"
      - "Keep RawKnowledgeFallback for invariants + as FM fallback when symptom scoring is empty"
    tests_required:
      - TestOfflineDiagnose_SymptomsOnlyScoring_NoFalsePositives
      - TestOfflineDiagnose_EtcdNOSPACE_DoesNotMapToObjectstore
    closure_condition: "Given etcd NOSPACE logs, objectstore failure modes score strictly below etcd.nospace_alarm even when objectstore's root_cause field mentions 'etcd'."
    knowledge_updates:
      - target_file: agent_playbooks.yaml
        entry: awareness.offline_diagnose_symptom_scoring_gap
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'offline_diagnose uses bag-of-words and produces false positives' because symptomBasedFMMatch uses title+symptoms only, not full YAML blobs."
    status: implemented
    closure_achieved_at: "2026-05-07"
    closure_evidence:
      - "extractFMSymptomsText() implemented — only title + symptoms[]"
      - "buildEventKeywords() implemented with stop-word filtering"
      - "symptomBasedFMMatch() is now primary FM scoring in offline_diagnose handler"
      - "RawKnowledgeFallback demoted to invariant path + FM fallback"
      - "TestOfflineDiagnose_EtcdNOSPACE_DoesNotMapToObjectstore passes — no false positives"
    remaining_blind_spots: []

  - id: awareness.self_review_test_verification_gap
    priority: P0
    keywords:
      - self_review trusts status implemented
      - test verification
      - gap marked implemented without tests
      - verifyGapTests
      - tests_required unverified
      - false confidence
      - implemented without evidence
      - test not found
      - tests_partial
    title: "self_review trusts status:implemented in agent_playbooks.yaml without verifying required tests exist in the codebase"
    criticism: "self_review reported gaps as 'implemented' based solely on status:implemented in agent_playbooks.yaml, with no check that the required test functions actually exist in golang/awareness/**/*_test.go. This produces false confidence — a gap could be marked implemented after code is deleted."
    why_it_matters: "The self_review tool is the closed-loop discipline's source of truth. If it trusts agent_playbooks.yaml without verifying tests, regressions go undetected. A deleted test silently leaves the system in a broken state that self_review considers healthy."
    requirement: "When a gap has status:implemented, self_review must scan golang/awareness/**/*_test.go for each function name in tests_required and report verification_status: tests_found | tests_partial | tests_not_found | no_tests_required | unverified."
    implementation_plan:
      - "Add VerificationStatus and VerificationNote fields to closedGapResult struct"
      - "Add verifyGapTests(repoRoot, testsRequired) function — walks golang/awareness/**/*_test.go"
      - "Strip annotation notes from test names (e.g. 'TestFoo (note)' → 'TestFoo') before scanning"
      - "Call verifyGapTests in self_review handler for each status:implemented gap"
      - "Report tests_found / tests_partial / tests_not_found / no_tests_required / unverified"
    tests_required:
      - TestSelfReview_ClosedGap_HasVerificationStatus
      - TestSelfReview_ClosedGap_TestsVerified
      - TestSelfReview_ClosedGap_UnverifiedWhenNoTests
    closure_condition: "self_review reports verification_status:tests_found for gaps whose required tests exist, tests_partial for partial, and tests_not_found for gaps marked implemented with nonexistent tests."
    knowledge_updates:
      - target_file: agent_playbooks.yaml
        entry: awareness.self_review_test_verification_gap
        operation: add
