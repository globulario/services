    title: "Graph mixes decision edges and information edges — decision paths are polluted with low-signal links"
    criticism: "Graph edges do not distinguish decision-relevant links (forbidden_action, required_test, causal_rule) from information links (references, mentions, similar_to). This pollutes decision paths with low-signal context and weakens preflight's top_decision_paths ranking."
    why_it_matters: "When an agent queries top_decision_paths, it should get the shortest, highest-confidence causal path to the decision. Mixing information edges inflates path length and buries the real decision path in noise."
    requirement: "Add edge_class field to all graph edges: decision (direct causal/forbidden/required), information (context/reference/similar). Add edge_weight 0.1–1.0. Decision-class edges weight 1.0, information-class edges weight 0.1. graph.Path() and graph.Nearest() must support class-filtered and weight-ranked queries."
    implementation_plan:
      - "Add EdgeClass type: decision | information to graph schema"
      - "Add Weight float64 (0.1–1.0) to graph edge"
      - "Migrate existing edge types: forbidden_action, required_test, causal_rule, blocks → decision. references, mentions, similar_to, related → information."
      - "Update UpsertEdge() to accept EdgeClass and Weight"
      - "Update graph.Path() to support class_filter=decision option"
      - "Update graph.Nearest() to rank by cumulative edge weight when class_filter set"
      - "decision_context tool: use class_filter=decision for top_decision_paths"
    tests_required:
      - TestEdgeClass_DecisionEdgeHighWeight
      - TestEdgeClass_InformationEdgeLowWeight
      - TestGraphPath_ClassFilteredDecisionOnly
      - TestGraphNearest_WeightRankedResults
      - TestDecisionContext_UsesDecisionClassFilter
    closure_condition: "awareness.decision_context with class_filter=decision returns only decision-class edges in top_decision_paths. The same query without filter includes information edges. edge_weight is present on all edges."
    knowledge_updates:
      - target_file: design_patterns.yaml
        entry: decision_information_edge_separation
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'decision paths are polluted with information edges' once EdgeClass and Weight exist on all edges and decision_context uses class_filter=decision."
    status: implemented
    closure_evidence:
      - "graph/edges.go: EdgeClassDecision/Structural/Information constants; classifyEdge(kind) auto-assigns class+weight"
      - "decisionEdgeKinds map: blocks, requires, forbids, safe_when, unsafe_when, violates, enforces, requires_test, governed_by, caused_by, fixed_by, remediated_by, unblocks"
      - "structuralEdgeKinds map: owns, depends_on, calls, imports, reads, writes, defines, produces, emits, tested_by, implements, controls, implemented_by, current_status_of, runtime_depends_on"
      - "All other edges auto-classified as information (weight=0.3)"
      - "graph/query.go: NeighborsByClass(), EdgesByClass(), TraverseDecision() BFS on decision-class edges only"
      - "5 tests in edge_class_test.go; decision_context MCP tool adds decision_causal_chain via TraverseDecision + class_filter=decision in coverage output"

