      - "Accept etcd endpoints from config (never hardcoded)"
      - "Read /globular/resources/DesiredService/* → emit DesiredService(name, version, profiles) nodes"
      - "Read /globular/resources/ServiceRelease/* → emit Release(name, build_id, version) nodes"
      - "Read /globular/nodes/{id}/packages/* → emit InstalledPackage(node, name, version, build_id) nodes"
      - "Read /globular/nodes/{id}/status → emit NodeStatus(node, healthy, last_heartbeat) nodes"
      - "NEVER write to etcd — read-only client only"
      - "Add cross-layer edges: DesiredService→InstalledPackage (desired_to_installed), InstalledPackage→SystemdUnit (installed_to_runtime)"
      - "Detect and emit divergence edges when desired version != installed version"
    tests_required:
      - TestEtcdCollector_ReadsDesiredService
      - TestEtcdCollector_ReadsInstalledPackages
      - TestEtcdCollector_EmitsDivergenceEdge
      - TestEtcdCollector_NeverWritesToEtcd
      - TestEtcdCollector_SkipsOnConnectionFailure
    closure_condition: "After collection, awareness.path('desired:minio','installed:minio') returns a path with edge type desired_to_installed. Divergence is flagged when versions differ."
