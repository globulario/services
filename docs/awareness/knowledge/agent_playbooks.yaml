      - target_file: invariants.yaml
        entry: desired_installed_must_converge
        operation: add
    prevents_repeat_criticism: "Future reviews cannot say 'awareness cannot join Desired to Installed' once the etcd collector exists and cross-layer divergence edges are emitted."
    status: implemented
    closure_evidence:
