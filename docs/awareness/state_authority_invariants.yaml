# State authority invariants
#
# These invariants encode the principle that each layer of system truth has a distinct
# authority and must not be inferred from a different layer. They are derived from first
# principles and are validated by Globular production incidents.
#
# Origin classes used below:
#   principle       — deducible from first principles before any incident
#   globular_incident — observed in production; very high confidence
#
# These invariants are intentionally project-agnostic. Any operator-grade distributed system
# must respect them.

invariants:

  - id: state.runtime_not_desired
    title: Runtime health must never be inferred from desired state
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      Desired state expresses intent: what the operator wants the system to do.
      Runtime state expresses observed reality: what is actually running and healthy.
      The two are independent. A service may be desired but not installed. It may be
      installed but not running. It may be running but unhealthy. Any code path that
      reads desired state and draws a conclusion about runtime health is wrong.
    enforcement: |
      Code that renders health indicators, status badges, or availability signals
      must read from the runtime authority (systemd, health-check RPC, live probe).
      It must never read from desired state, desired release records, or install
      workflow completions as a substitute for runtime evidence.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/node_agent/node_agent_server/runtime_proof.go
    forbidden_fixes:
      - forbidden.runtime_from_desired
      - marking_available_from_local_success_only
      - assume_installed_means_running
    required_tests:
      - TestRuntimeStatus_NotDerivedFromDesiredState
      - TestDesiredEnabled_DoesNotImplyHealthy
    related_failure_modes:
      - fm.industry.partial_failure_hidden_by_global_green

    related_invariants:
      - meta.storage_is_not_semantic_authority
  - id: state.installed_not_catalog
    title: Installed state must never be inferred from repository catalog availability
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      The repository catalog records what packages exist and can be installed.
      The installed-state record in etcd records what is actually installed on a node.
      Catalog presence is a necessary but not sufficient condition for installation.
      Any code path that concludes a service is installed because its artifact exists
      in the catalog is wrong. The node-agent must write the installed-state record
      after successful installation; the controller must read that record, not the catalog.
    enforcement: |
      Install status must be read from /globular/nodes/{node_id}/packages/{kind}/{name}
      (installed-state in etcd). It must never be inferred from repository catalog
      availability, BOM membership, or workflow dispatch alone.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/node_agent/node_agent_server/installed_services.go
    forbidden_fixes:
      - marking_available_from_local_success_only
      - mark_release_available_from_local_success
    required_tests:
      - TestInstalledState_NotDerivedFromCatalog
      - TestBOMMembership_DoesNotImplyInstalled

    related_invariants:
      - meta.storage_is_not_semantic_authority
  - id: workflow.success_requires_backend_confirmation
    title: UI or CLI success must require backend/workflow confirmation
    severity: high
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      A command dispatch or button click is not proof that the requested operation
      completed. Operations that mutate cluster state — installing packages, changing
      topology, upgrading services, applying configuration — must go through a workflow.
      The workflow must reach a terminal state (SUCCEEDED or FAILED). Success must not
      be reported to the user until the workflow terminal state is observed or, for
      async operations, a durable accepted receipt is confirmed.
    enforcement: |
      gRPC RPCs that trigger workflows must return an accepted status, not a success
      status. Callers — CLI, frontend, MCP tools — must poll or stream workflow status
      and report terminal state to the user. Early-return success after dispatch is
      explicitly forbidden.
    protects:
      files:
        - golang/workflow/workflow_server/step_receipts.go
        - golang/cluster_controller/cluster_controller_server/workflow_invariant.go
    forbidden_fixes:
      - forbidden.optimistic_destructive_success
      - marking_available_from_local_success_only
    required_tests:
      - TestWorkflowDispatch_ReturnsAccepted_NotSuccess
      - TestCLI_ReportsTerminalWorkflowState

    related_invariants:
      - meta.write_creates_completion_obligation
  - id: objectstore.partial_snapshot_unknown_not_down
    title: Missing inventory in a partial objectstore snapshot must be treated as unknown, not known-down
    severity: critical
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      When the cluster-doctor or any diagnostic tool collects an objectstore health snapshot,
      the collector may have incomplete data: not all node inventory records may be present.
      A node absent from a partial snapshot means the collector did not receive that node's
      record — it does not mean MinIO is down on that node. Treating absence as known-down
      causes false quorum-loss findings, incorrect remediation proposals, and operator alarm
      fatigue. The correct classification for an absent node record is UNKNOWN.
    enforcement: |
      Objectstore health rules must distinguish between:
        PRESENT      — NodeRecord received and health confirmed
        UNKNOWN      — NodeRecord absent from snapshot (collector gap, not proven down)
        KNOWN_DOWN   — NodeRecord present and explicitly reports unhealthy/unreachable
      Only KNOWN_DOWN nodes count toward quorum loss findings.
      DataIncomplete snapshots must emit a caveat, not a quorum-loss finding.
    protects:
      files:
        - golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap.go
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
    forbidden_fixes:
      - forbidden.partial_snapshot_false_quorum_loss
    required_tests:
      - TestObjectstoreQuorum_AbsentNodeIsUnknownNotDown
      - TestObjectstoreQuorum_PartialSnapshot_EmitsCaveat
      - TestObjectstoreQuorum_KnownDown_StillCountsForLoss
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot

    related_invariants:
      - meta.absence_scope_must_be_explicit
  - id: ops.vip_requires_observed_owner
    title: VIP ownership must be proven from runtime evidence, not assumed from topology or package expectations
    severity: high
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      The cluster VIP (keepalived floating IP) is owned at runtime by exactly one node at any
      moment, determined by VRRP negotiation. No configuration record, desired-state entry, or
      package installation record proves that keepalived is active or that the VIP is held by
      any specific node. Treating a node as VIP-holder without runtime evidence leads to wrong
      routing, certificate SAN mismatches, and cascading failures when the VIP moves. The VIP
      holder must be identified from etcd /globular/ingress/v1/status/{node_id} or from a live
      VRRP probe — never from package-installed records or node profiles alone.
    enforcement: |
      Any code that must know the current VIP holder must read
      /globular/ingress/v1/status/{node_id} and look for the MASTER state.
      Never assume a node holds the VIP because its profile includes 'gateway'
      or because globular-keepalived is installed on it.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/state.go
        - golang/node_agent/node_agent_server/internal/actions/keepalived.go
    forbidden_fixes:
      - forbidden.vip_without_runtime_proof
    required_tests:
      - TestVIPHolder_DerivedFromRuntimeStatus_NotProfile
      - TestVIPHolder_ReflectsActualMaster
    related_failure_modes:
      - fm.globular.vip_transition_cascade

    related_invariants:
      - meta.storage_is_not_semantic_authority
  - id: network.no_loopback_escape_for_cluster_identity
    title: Cluster identity, TLS SAN validation, and service routing must not be bypassed with localhost or 127.0.0.1
    severity: critical
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      Replacing a cluster DNS name, node IP, or VIP with localhost or 127.0.0.1 to work
      around a TLS, DNS, SAN, or routing failure hides the root cause without fixing it.
      It creates a single-node illusion that breaks when the client or the target service is
      on a different physical node. It also bypasses Envoy/gateway routing, RBAC enforcement,
      and mTLS identity — making the cluster less secure and less observable.
      The only acceptable use of localhost is for etcdctl pointing to a local etcd instance
      and for the local DNS resolver entry in resolv.conf.
    enforcement: |
      All inter-service gRPC calls must use FQDN endpoints resolved from etcd.
      All listener bind addresses must use 0.0.0.0, not 127.0.0.1.
      If a TLS or SAN error occurs, fix the certificate or the DNS record —
      never switch to loopback as a workaround.
    protects:
      files:
        - golang/config/endpoint_resolver.go
        - golang/netutil/node_identity.go
    forbidden_fixes:
      - forbidden.localhost_dns_bypass
    required_tests:
      - TestInterServiceCall_UsesResolvedFQDN_NotLoopback
      - TestListenerBind_Uses0000_NotLoopback

    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: runtime.desired_enabled_not_alive
    title: Desired-enabled state must not be used as proof that a service is alive
    severity: critical
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      A DesiredService record with enabled=true means the operator wants the service to run.
      It says nothing about whether the service process is currently alive, healthy, or
      responsive. Multiple production incidents recorded services stuck in INSTALLING or
      DEGRADED while their desired state showed enabled. Probing desired state to answer
      "is it running?" returns a stale intent, not a live observation.
    enforcement: |
      Liveness and health checks must probe the runtime layer: systemd unit state,
      the gRPC health RPC, or a live socket connect. Desired state records may be
      read to understand intent; they must never substitute for a live probe when
      the question is about current availability.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/cluster_doctor/cluster_doctor_server/rules/installed_state_runtime_mismatch.go
    forbidden_fixes:
      - forbidden.runtime_from_desired
      - assume_installed_means_running
      - skip_systemd_health_check_if_installed
    required_tests:
      - TestServiceLiveness_UsesRuntimeProbe_NotDesiredState
    related_failure_modes:
      - fm.industry.partial_failure_hidden_by_global_green
      - fm.industry.missing_inventory_misclassified_as_down

  # ── Generative meta-principles ────────────────────────────────────────────────
  # These are not individual rules — they are the generating functions from which
  # all specific authority invariants below (and in authority_rules.yaml) can be
  # derived. An AI agent that internalizes these can reject violations even when
  # no specific invariant has been written for the exact case yet.
  #
  # Origin: Dave + Claude, 2026-06-04. Derived from first principles, production
  # incidents, and codebase audit.
  #
  # Categories (each is a different kind of thinking):
  #   authority  — "who owns this truth, and is this code that owner?"
  #   signal     — "is the truth arriving intact, or degraded/silent/absorbed?"
  #   lifecycle  — "will this operation complete, and will I know if it doesn't?"
  #   dependency — "what breaks if a non-critical thing fails?"

    related_invariants:
      - meta.fallback_must_degrade_semantics
  - id: meta.storage_is_not_semantic_authority
    title: "Storage is not semantic authority — truth belongs to the owning actor, not the backing store"
    category: authority
    antipattern: "I can see the data so I own it"
    wrong_instinct: Having etcd access feels like having authority — but access is not ownership
    severity: critical
    status: active
    summary: |
      A shared datasource (etcd, ScyllaDB, MinIO, local files) is only a source
      of durable record. It is not automatically the source of truth. Truth belongs
      to the actor that owns the semantic meaning of the state.

      Before reading or writing state, classify:
        1. What layer does this state belong to?
        2. Which actor owns this truth?
        3. Which typed RPC/API is the allowed read path?
        4. Which typed RPC/API is the allowed write path?
        5. What is the canonical source of identity?
        6. Is the value mutable, immutable, observed, derived, or canonical?

      If the code is not the owning actor, the access is architecturally wrong —
      regardless of whether a specific invariant exists for that case yet.

      Non-owner actors must not read another actor's backing store and call the
      result truth. They must ask the owning actor through its typed API.
      Non-owner actors must not write another actor's backing store, even for repair.
      Admin/CLI/MCP/tests/migrations obey the same boundaries — "admin" means
      authorized to call the owner, not authorized to bypass ownership.

      If the correct owner/API does not exist yet, stop and design the smallest
      owner-mediated API. Do not patch around with direct storage access.
    enforcement: |
      Every code path that reads or writes shared state must be traceable to the
      owning actor's typed API. Direct storage access by non-owners is an
      architectural violation. Temporary exceptions require an explicit allowlist
      entry with a named migration target. The allowlist must shrink over time.
    forbidden_fixes:
      - forbidden.direct_store_read_as_truth
      - forbidden.direct_store_write_for_repair
      - forbidden.admin_bypass_ownership
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.globular.vip_transition_cascade

  - id: meta.fallback_must_degrade_semantics
    title: "Fallback must degrade semantics — a fallback that returns the same shape as truth will be mistaken for truth"
    category: signal
    antipattern: "Return something rather than nothing"
    wrong_instinct: Helpfulness over honesty — returning a value feels better than returning an error, but a fake value propagates silently
    severity: critical
    status: active
    summary: |
      Fallbacks may preserve availability, but they must not preserve the illusion
      of certainty. A fallback value must not return through the same field/type/shape
      as canonical truth unless explicitly marked as degraded, observed, approximate,
      stale, or uncertified.

      Every fallback result must expose: source of the value, whether it is canonical,
      confidence/status, and what canonical source was unavailable.

      A fallback must never silently upgrade itself into identity, intent, proof,
      or authority. When a function returns "" for a missing cluster_id, or 0 for a
      missing build_number, the caller cannot distinguish "canonical answer is empty"
      from "couldn't reach the owner." The type is the same, so the lie propagates.
    enforcement: |
      Fallback return paths must use a distinct type, wrapper, or status field that
      the caller can inspect. Returning zero-values or empty strings through the
      same type as canonical truth is forbidden when the source is a fallback.
    forbidden_fixes:
      - forbidden.unknown_as_healthy
      - forbidden.missing_inventory_as_down

  - id: meta.authority_must_express_uncertainty
    title: "Authority must express uncertainty — if the owner cannot say 'unknown', callers will turn silence into lies"
    category: signal
    antipattern: "Empty is a valid response"
    wrong_instinct: Simplicity over precision — returning an empty proto feels clean, but callers can't tell absence from error
    severity: high
    status: active
    summary: |
      If an owning actor cannot express "unknown," "stale," "degraded," "conflict,"
      "not canonical," or "source unavailable," callers will manufacture certainty
      from silence.

      Owner APIs must distinguish: not found (canonical absence), not observed,
      unknown, stale, degraded, conflict, canonical source missing, permission
      denied, in progress, and corrupt/unverifiable. Never collapse these into
      empty results, zero values, or success with partial data.
    enforcement: |
      Owner RPCs must return explicit status codes or status fields that distinguish
      absence from uncertainty. Callers must propagate uncertainty — never silently
      resolve it to a concrete value.
    related_failure_modes:
      - fm.industry.partial_failure_hidden_by_global_green
      - fm.industry.missing_inventory_misclassified_as_down

  - id: meta.absence_scope_must_be_explicit
    title: "Absence scope must be explicit — 'not found where' is not the same as 'does not exist'"
    category: signal
    antipattern: "Not found means doesn't exist"
    wrong_instinct: Confusing one view with all views — a cache miss or replica miss is not proof of global absence
    severity: high
    status: active
    summary: |
      "Not found" is not a fact until the system says where it looked and who owns
      existence. A cache miss, local file miss, replica miss, index miss, or stale
      view miss does not prove global absence.

      Any absence result must declare: scope searched, source queried, owner of
      existence, freshness of the view, whether the result is canonical, and whether
      other replicas/sources may still contain the object.
    enforcement: |
      Code that acts on "not found" must verify the scope of the lookup before
      concluding non-existence. A single-replica miss must not trigger deletion,
      re-creation, or failure escalation that assumes global absence.
    forbidden_fixes:
      - forbidden.partial_snapshot_false_quorum_loss
      - forbidden.missing_inventory_as_down
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.industry.missing_inventory_misclassified_as_down

  - id: meta.identity_computation_must_be_invariant
    title: "Identity computation must be invariant — one field, one meaning, one canonical computation, everywhere"
    category: authority
    antipattern: "Same field name means same thing"
    wrong_instinct: Trusting the type without checking the computation — checksum at publish and checksum at verify can be different computations behind the same name
    severity: critical
    status: active
    summary: |
      Identity-bearing fields (checksum, build_id, version, installed_hash,
      desired_hash, timestamp anchor) must have exactly one semantic meaning
      and one canonical computation. The computation must be the same at every
      point where the field is produced, compared, or verified.

      This is a different class of bug than ownership violation. Here the
      authority is correct — the right actor wrote the field. The store is
      correct. The type checks. But the field stopped meaning one thing because
      different contexts compute it differently.

      Example: entrypoint_checksum at publish time = sha256(artifact bytes).
      At verify time on the node = sha256(installed binary path). If anything
      transforms the bytes between publish and install, the same field name
      now means two different computations. The verifier says "mismatch" for
      a correctly installed binary, or worse, says "match" for a corrupted one.

      A missing canonical identity is a finding, not permission to fabricate
      a replacement from a secondary observation. A field with a stable type
      and unstable meaning is a loaded trap.

      For every identity value, define:
        1. The subject it identifies
        2. The field that stores it
        3. The actor allowed to produce it
        4. The canonical computation/source
        5. Its lifetime and immutability rule
        6. The verification path (must use the same computation as production)
    enforcement: |
      Identity fields must be produced by exactly one computation. Any code
      that compares, verifies, or acts on an identity field must use the same
      canonical computation that produced it. If a transformation occurs between
      production and verification (packaging, relocation, wrapping), the
      identity must be recomputed after transformation by the owning actor —
      never by the verifier independently.
    forbidden_fixes:
      - forbidden.recompute_identity_at_verification
      - forbidden.fabricate_identity_from_secondary_observation
    related_failure_modes:
      - fm.globular.vip_transition_cascade
      - fm.industry.floating_address_used_as_durable_identity

  - id: meta.write_creates_completion_obligation
    title: "Every write is a promise — an unfinished promise is a blockage"
    category: lifecycle
    antipattern: "Write and move on"
    wrong_instinct: Fire and forget feels efficient — but a blocking record without a cleanup path becomes a permanent stall
    severity: critical
    status: active
    summary: |
      When code writes a state record (etcd key, Scylla row, convergence record,
      lock, status entry), it creates an obligation. Either the same actor completes
      the lifecycle, or there is an explicit sweep that clears stale records, or
      the record has a TTL. Half-written state that nobody owns the cleanup for
      becomes a permanent stall.

      Before writing a blocking record, verify:
        1. Who completes or clears this record?
        2. Is the cleanup edge-triggered (on next event) or level-triggered (periodic sweep)?
        3. What happens if the completing event never arrives?
        4. Is there a circuit-breaker or TTL?

      Known violations in this codebase:
        - writeCriticalKeyBlock: NO cleanup function exists at all
        - writeRuntimeDepBlock: sweep exists but was edge-triggered only (INC-2026-0005)
        - DownloadArtifact refill: state transitions silently ignored (_ = transition)

      Known good examples:
        - ConvergenceCommitter: atomic txn — write + cleanup in same etcd op
        - Workflow defer B3: durable counter + Abandoned flag + ClearOnSuccess
    enforcement: |
      Every function that writes a blocking record must have a corresponding
      cleanup path (explicit delete, sweep, or TTL). Code review must verify
      the cleanup path exists before approving the write.
    forbidden_fixes:
      - forbidden.write_blocking_record_without_cleanup
      - forbidden.edge_triggered_cleanup_only_for_blocking_records
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot

  - id: meta.half_done_must_not_look_done
    title: "Half-done must never look done — intermediate state must not satisfy completeness predicates"
    category: lifecycle
    antipattern: "One field is enough to check"
    wrong_instinct: Premature optimization of predicates — checking artifact_state without manifest_json feels sufficient, but a partial write satisfies the single-field check
    severity: critical
    status: active
    summary: |
      When a multi-step operation is interrupted, the intermediate state must be
      distinguishable from the terminal state. If a skip/completeness predicate
      cannot tell the difference between "done" and "half-done," every interruption
      becomes permanent.

      Before writing a completeness check, verify:
        1. Does this check ALL required fields, not just one?
        2. Can a partial write (step 1 done, step 2 not) satisfy this predicate?
        3. Is there an explicit intermediate state that the predicate rejects?
        4. On retry, does the code resume from the intermediate state?

      Known violations in this codebase:
        - canSkipDueToExistingState checked artifact_state but not manifest_json (INC-2026-0012)
        - CLI installServiceTgz writes unit files but not .sha256 sidecar

      Known good examples:
        - canSkipInstallPackage: checks version + build_id + checksum + active unit
        - needsSelfHostedInstalledStateRefresh: 7 independent checks, ALL must be true
        - promoteToPublished: 4-step state machine with explicit intermediates
    enforcement: |
      Completeness predicates must check ALL fields that a complete operation
      would have written. A single-field check on a multi-field write is a
      violation. State machines must have explicit intermediate states that
      skip predicates reject.
    forbidden_fixes:
      - forbidden.single_field_completeness_check_on_multi_field_write

  - id: meta.silence_is_not_valid_for_unexpected
    title: "Silence is not a valid response to the unexpected — unhandled cases must fail closed"
    category: lifecycle
    antipattern: "Default is safe"
    wrong_instinct: A no-op default feels harmless — but a silently skipped switch case means the system stops making progress without anyone noticing
    severity: high
    status: active
    summary: |
      When a switch/dispatch does not match, the default must be an explicit
      error or escalation — not a no-op. Silent discard of an unrecognized case
      is how a system stops making progress without anyone noticing.

      Before writing a dispatch, verify:
        1. Does the switch have a default case?
        2. Does the default log the unexpected value?
        3. Does the default return an error or escalate?
        4. If the default falls back to a "safe" behavior, is that behavior documented?

      Known violations in this codebase:
        - applyPatchToAppStatus: no default case, silent no-op on unknown SetFields
        - applyPatchToInfraStatus: no default case (caused INC infra retry bug)
        - lookupResolvedEntrypointChecksum kind switch: unknown kind silently defaults to SERVICE
        - lookupResolvedEntrypointChecksum type switch: no default for new release types
        - classifyPackageConvergence: unknown systemd state silently becomes RuntimeUnknown

      Known good examples:
        - applyPatchToSvcStatus: default logs canary phrase + returns false
        - resolveResumeAction: logs unknown policy before fallback
    enforcement: |
      Switch statements on state/status enums in dispatch or state-machine code
      must have a default case that logs the unexpected value. Silent no-op
      defaults in release pipeline routing are forbidden.
    forbidden_fixes:
      - forbidden.silent_default_in_state_dispatch
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot

  - id: meta.critical_path_no_non_critical_dependency
    title: "The critical path must not depend on non-critical services — a dependency you don't need will kill you on the recovery path"
    category: dependency
    antipattern: "One more RPC won't hurt"
    wrong_instinct: Convenience over resilience — adding a repository call to heartbeat feels useful, but when the repository is down the heartbeat dies too
    severity: critical
    status: active
    summary: |
      A critical function (heartbeat, leader liveness, connection establishment)
      must not pick up a dependency on a non-critical service (repository, event
      bus, analytics, monitoring). When the non-critical thing fails, it takes
      down the critical path — not by crashing, but by blocking, flooding, or
      silencing.

      Before adding a call to a critical path, ask:
        1. Can this function complete its job if the callee is down?
        2. Does this call have a bounded timeout that won't stall the caller?
        3. Can a failure in this call cascade into the critical path?
        4. Is this call necessary for the critical function, or just convenient?

      Incidents:
        - Power outage: heartbeat Phase 3 called repository → hung when ScyllaDB down → nodes unreachable 45 min
        - Zombie leader: event service disconnect → emitClusterEvent floods → CPU starvation → heartbeats freeze
        - VIP cert: grpc.WithBlock() swallowed x509 errors into timeout → 16h silent outage
    enforcement: |
      Heartbeat, leader liveness, and connection establishment paths must have
      zero dependencies on non-infrastructure services. Any RPC in a critical
      path must have a bounded timeout and must not block the caller on failure.
    forbidden_fixes:
      - forbidden.add_rpc_to_heartbeat_critical_path
      - forbidden.unbounded_dial_in_critical_path

  - id: meta.competing_writers_must_converge_or_be_fenced
    title: "Distributed actors doing the same job must converge, not compete — two writers with different state will fight until one wins by accident"
    category: authority
    antipattern: "Everyone should reconcile independently"
    wrong_instinct: Redundancy feels safe — but uncoordinated redundancy is a fight where timing decides the winner, not correctness
    severity: critical
    status: active
    summary: |
      When multiple actors can write the same state, and they have different
      views of truth, the last writer wins — and the last writer is determined
      by timing, not correctness. This is different from "who owns the truth"
      (meta.storage_is_not_semantic_authority) — here both actors believe they
      are the owner.

      Before allowing multiple writers, ask:
        1. Can two instances of this actor run simultaneously?
        2. If they disagree, who wins? Is the winner the most correct, or the most recent?
        3. Is there a leader gate, priority ordering, or consensus mechanism?
        4. What happens during a leadership transition?

      Incidents:
        - Let's Encrypt cert: 3 controllers ran domain reconciler independently → dell overwrote ryzen's success with error
        - DNS flickering: 3 DNS reconcilers with different in-memory state → records appeared/disappeared
        - INFRASTRUCTURE overwrites SERVICE: two installed-state records for same package, wrong iteration order → stale won
        - Dell's 0.0.1 controller grabbed leader → downgraded entire cluster
    enforcement: |
      Reconcilers that write shared state must be leader-gated. When multiple
      records can exist for the same entity (e.g. INFRASTRUCTURE and SERVICE kind
      for the same package), there must be a deterministic priority order.
      Non-leader instances must return early without touching state.
    forbidden_fixes:
      - forbidden.reconciler_without_leader_gate
      - forbidden.multiple_kind_records_without_priority_order

  - id: meta.connection_errors_must_not_be_absorbed
    title: "Errors must not be silent on connection paths — a connection error absorbed into a timeout is an invisible outage"
    category: signal
    antipattern: "Timeouts are normal"
    wrong_instinct: Generic wrappers feel robust — but grpc.WithBlock() turning a TLS mismatch into "context deadline exceeded" hides the real error for hours
    severity: high
    status: active
    summary: |
      Connection-establishment code absorbs specific errors (TLS mismatch,
      wrong key, unreachable host) into generic timeouts or nil values. The
      caller sees "timeout" or "nil" — the same shape as "slow network" or
      "not initialized yet." The specific error is lost, and the outage
      becomes invisible.

      Before using a connection wrapper, ask:
        1. Does this wrapper (grpc.WithBlock, context.WithTimeout) preserve the specific error?
        2. Can the caller distinguish "TLS failed" from "host slow"?
        3. If the connection fails silently, how long until someone notices?
        4. Is there a pre-flight check that surfaces the real error?

      Incidents:
        - VIP cert: grpc.WithBlock() swallowed x509 errors → "context deadline exceeded" for 16 hours
        - Auth token: GenerateServiceToken errors silently swallowed → all auth failed with no visible error
        - ScyllaDB late-connect: nil scylla handle stayed nil forever — no retry, no error, no recovery
    enforcement: |
      Connection paths must surface specific errors before falling back to
      timeouts. Pre-flight checks (TLS validation, auth probe) should run
      before the generic dial wrapper. Nil handles from failed initialization
      must be retried, not cached permanently.
    forbidden_fixes:
      - forbidden.absorb_tls_error_into_timeout
      - forbidden.cache_nil_handle_permanently

  - id: meta.circular_dependency_must_have_break_glass
    title: "Every circular dependency must have a break-glass path that doesn't go through the cycle — a system that deploys itself must have a path that doesn't go through itself"
    category: dependency
    antipattern: "The pipeline will fix itself"
    wrong_instinct: Trust in the normal path — when repository is broken, deploying a fix through the repository feels like the right path, but the cycle is stuck
    severity: critical
    status: active
    summary: |
      When A depends on B and B depends on A, the normal operational path
      forms a cycle. When either component breaks, the normal path through
      the other can't fix it — the cycle is stuck. This is the chicken-egg
      problem: the deploy pipeline can't deploy a fix for itself, the
      controller can't dispatch a fix for the controller, the repository
      can't publish a fix to the repository.

      Every circular dependency must have a documented break-glass path
      that operates OUTSIDE the cycle. The break-glass must:
        1. Not go through the broken component
        2. Verify identity (checksum against manifest) before applying
        3. Be bounded and audited (not an open-ended bypass)
        4. Return to the normal path once the cycle is unbroken

      Before introducing a dependency, ask:
        1. Can this service update/fix itself through its own infrastructure?
        2. If that infrastructure is broken, what's the recovery path?
        3. Does the recovery path go through the broken component?
        4. Is there a documented break-glass that bypasses the cycle?
        5. Has the break-glass path been tested?

      Incidents:
        - INC-2026-0013: repository v1.2.110 couldn't deploy v1.2.116 through itself — bridge via scp from CI binary
        - INC-2026-0014: controller missing expected_sha256 couldn't deploy fix through its own dispatch — bridge again
        - Workflow YAML sync: controller v1.2.119 needed new YAMLs deployed by its own pipeline — manual cp
        - Day-0 bootstrap: etcd needed for config, config in etcd; ScyllaDB needed for workflows, workflows for ScyllaDB join; PKI needed for gRPC, gRPC for PKI issuance
    enforcement: |
      Every self-referential deploy path (service that publishes/installs itself)
      must have a documented break-glass recovery procedure. The bridge pattern
      (scp verified binary from healthy peer, manual install, return to normal
      pipeline) is the canonical break-glass. Hot-deploying locally-built binaries
      is NOT a valid break-glass — no ldflags means checksum mismatch means the
      cycle breaks again.
    forbidden_fixes:
      - forbidden.hot_deploy_local_binary_as_break_glass
      - forbidden.bypass_cycle_with_direct_storage_write
    related_failure_modes:
      - fm.globular.vip_transition_cascade

  - id: meta.failure_response_must_contract_not_amplify
    title: "Failure response must contract, not amplify — retry, re-enqueue, and re-emit must be bounded, or the response becomes the outage"
    category: lifecycle
    antipattern: "Retry harder"
    wrong_instinct: Persistence feels like resilience — but unbounded retry under failure consumes the resources that recovery needs
    severity: critical
    status: active
    summary: |
      When something fails, the system's natural response is to retry, re-enqueue,
      re-emit, or respawn. If that response is unbounded, it amplifies the original
      failure into a cascade. The system doesn't die from the error — it dies from
      its own reaction to the error.

      The correct response to sustained failure is contraction: do LESS, not more.
      Circuit breakers, backoff, semaphores, rate limits, staggered re-enqueue.
      The system must preserve resources for recovery, not burn them on retries
      that can't succeed.

      Before adding a retry or re-enqueue, ask:
        1. If this call fails, how many retries will fire?
        2. Is there an upper bound on concurrent retries?
        3. Does the retry rate increase or decrease under sustained failure?
        4. Can the retry mechanism itself consume the resources needed for recovery?
        5. Is there a circuit breaker that stops retrying and waits?

      Incidents:
        - Zombie leader: event disconnect → fire-and-forget goroutines → 1000 concurrent retries → CPU starvation → heartbeats freeze
        - Reconcile storm: controller restart → 30 releases re-enqueued simultaneously → workflow overwhelmed → cascade timeouts
        - Doctor amplification: INC-2026-0004 — per-node findings emitted as cluster events → 100+ events/min for stable findings
        - Dep-block cycling: FAILED→PENDING→FAILED with no backoff → infinite dispatch loop
    enforcement: |
      Every retry path must have a circuit breaker or bounded backoff. Fire-and-forget
      goroutines on error paths are forbidden — each one must be tracked and bounded.
      Re-enqueue after failure must be staggered, not simultaneous. Event emission
      must be deduplicated against a delta cache.
    forbidden_fixes:
      - forbidden.unbounded_retry_on_transient_failure
      - forbidden.fire_and_forget_goroutine_on_error_path
      - forbidden.simultaneous_reenqueue_after_restart

  - id: meta.diagnostic_output_must_be_bounded
    title: "Diagnostic output must be bounded — one error must not become N records, or the diagnosis becomes a harder failure than the disease"
    category: lifecycle
    antipattern: "Log everything for debugging"
    wrong_instinct: Observability feels always good — but unbounded logging under sustained failure fills the disk, and disk full kills services that were perfectly healthy
    severity: critical
    status: active
    summary: |
      When an error repeats, the system's diagnostic output (logs, events,
      convergence records, audit entries) grows proportionally. If the output
      is unbounded, a sustained error fills a shared resource — disk, etcd
      quota, memory, event bus. The resource exhaustion is a HARDER failure
      than the original error: a login bug is fixable, but a full disk kills
      everything including the tools you'd use to fix the login bug.

      This is distinct from meta.failure_response_must_contract_not_amplify:
      that principle bounds the system's ACTIVE response (retry, re-enqueue).
      This principle bounds the system's PASSIVE output (log, emit, record).
      Both are needed — a circuit breaker on retries doesn't help if each
      retry also writes 10 log lines.

      Before adding logging or event emission to an error path, ask:
        1. If this error repeats 1000 times, how many records are written?
        2. Is there a rate limit on output under sustained failure?
        3. Can this output exhaust a shared resource (disk, etcd, memory)?
        4. Does the first occurrence carry enough context, or does repetition add info?
        5. Is there a "same error, count++" pattern instead of "same error, log++"?

      Incidents:
        - Doctor amplification: 100+ events/min for stable per-node findings (INC-2026-0004)
        - etcd NOSPACE: convergence records piling up from repeated failed dispatches
        - Crash-loop services filling systemd journal → disk full → cascade to healthy services
        - Login error loop → log line per attempt → disk exhaustion
    enforcement: |
      Error-path logging must use rate-limiting (log first occurrence + count,
      not every occurrence). Event emission must be deduplicated against a delta
      cache. Convergence records must overwrite (deterministic action ID), not
      accumulate. Shared resources (disk, etcd) must have usage alerts that fire
      before exhaustion.
    forbidden_fixes:
      - forbidden.unbounded_logging_in_error_loop
      - forbidden.event_emit_without_dedup_cache
      - forbidden.convergence_record_accumulation_without_overwrite

  # ── Round-2 candidate principles ──────────────────────────────────────────────
  # Origin: Dave + Claude, 2026-06-05. Derived from retroactive classification of
  # 103 failure_modes against the original 14 principles. Patterns surfaced:
  #   - meta.identity_computation_must_be_invariant was hitting 20+ failures
  #     across 4 distinct sub-flavors → spawn structure_must_not_be_stripped
  #   - meta.absence_scope_must_be_explicit had no positive twin → broaden via
  #     assertions_must_carry_their_scope (covers BOTH positive and negative)
  #   - Approval/bootstrap staleness wasn't named anywhere → spawn
  #     binding_outlives_evidence
  #   - "Drift to plan mode" — the discipline against in-process multi-step
  #     mutations bypassing workflow — had no principle anchor → spawn
  #     state_mutations_must_be_durably_committed
  # status=candidate: each principle needs (a) re-classification of failure
  # modes to confirm pull-rate, (b) a code-side audit run to confirm it
  # predicts bugs the original 14 didn't catch. Promote to active only when
  # both gates pass.

  - id: meta.structure_must_not_be_stripped_in_projection
    title: "Meaning lives in structure — a value projected down to its primitive shape carries the lie of universality"
    category: authority
    antipattern: "Just give me the value"
    wrong_instinct: A primitive type feels universal — but the scope/subject/source the value lived inside is part of what it meant; stripping it leaves a shape the consumer reads as global truth
    severity: critical
    status: candidate
    summary: |
      Every value lives inside a structure that gives it meaning: a subject
      (identity-of-WHAT), a source (which canonical registry it came from),
      a generation marker. The bare primitive — bool, string, sha256, int —
      is a projection that preserves the shape while discarding the structure.
      Consumers downstream read the shape as universal: an entry-point
      checksum becomes a bundle checksum, an inlined kind-list becomes the
      catalog, a hardcoded list of platforms becomes the platform truth.

      This is the sibling of meta.fallback_must_degrade_semantics. That one
      covers fallback paths returning canonical shapes. This one covers
      NON-fallback paths — identity passing, catalog reading, type erasure —
      doing the same harm by other mechanisms.

      Two enforcement flavors fall under this principle:

        a. Subject-aliasing projection — every cross-boundary identity uses
           a typed wrapper or a field name that includes its subject
           (entrypoint_checksum, not just checksum). Fallback paths must
           REFUSE to substitute one subject's identity for another's; the
           caller of an empty-identity must observe its emptiness, not
           silently get someone else's identity.

        b. Catalog-inlining projection — when a canonical registry exists,
           hardcoded copies in code are forbidden. Test fixtures may use
           literals; production code must read the registry.

      Before passing a value across a boundary, ask:
        1. What structure is this value carrying its meaning in?
           (subject name, registry reference, generation counter)
        2. Does the receiver's type carry that structure?
        3. Is the projection an aliasing (subject collapsed) or an inlining
           (registry reference collapsed)?
        4. Could the consumer mistake the projected shape for a wider truth
           than the producer observed?

      Known violations (subject-aliasing):
        - node_agent.install_package_aliases_convergence_hash_into_expected_sha256
        - node_agent.installer_download_aliases_entrypoint_as_bundle_hash
        - controller.apply_package_missing_expected_sha256_blocks_verified_install
      Known violations (catalog-inlining):
        - runtime.command_package_false_positive
        - repository.sync_silently_drops_noarch_artifacts
        - filesystem.service_runtime_dir_naming_drift
        - xds.infra_preparing_loop_from_kind_mismatch
      Known good:
        - artifact_state split into PipelineState + PipelineUnknown sentinel
        - canonicalServiceName helper centralized name normalization
        - package kind canonical registry pattern (session_package_kind_truth)
    enforcement: |
      Every cross-boundary value must preserve the structure that gives it
      meaning. Subject-aliasing requires typed wrappers or disambiguating
      field names; catalog-inlining is forbidden in production code when a
      registry exists. The two flavors have distinct fix shapes but share
      one root: don't let the shape outlive the structure.
    forbidden_fixes:
      - substitute_convergence_hash_for_binary_checksum_when_latter_empty
      - alias_bundle_sha_into_entrypoint_sha_variable
      - inline_catalog_membership_list_in_production_code
      - hardcode_package_kind_classification_outside_canonical_registry

  - id: meta.assertions_must_carry_their_scope
    title: "Every assertion — positive or negative — carries the scope of its truth; aggregation without naming the scope is a lie"
    category: signal
    antipattern: "OK is OK, missing is missing"
    wrong_instinct: A passing check feels universal, an absent record feels final — but every observation lives in a scope (which node, which moment, which tenant); stripping the scope strips the truth
    severity: critical
    status: candidate
    summary: |
      Both "I see X" and "I don't see X" are scoped observations. The
      scope is part of the truth. A consumer that reads the observation
      without the scope can mistake local for global, instance for cluster,
      moment for forever.

      This principle subsumes meta.absence_scope_must_be_explicit by
      extending its rule to positive assertions. The mechanism is the
      same: aggregation that strips the scope-tag produces a value whose
      shape looks global but whose evidence was local. Once this principle
      is promoted to active, meta.absence_scope_must_be_explicit becomes
      its negative-half sub-rule.

      Before reading or emitting any health/proof/observation:
        1. What is the scope of the observation (node, instance, moment,
           tenant)?
        2. Does the consumer's question match that scope, or are they
           asking a wider question and reading this answer as authoritative
           for it?
        3. Is the scope a field on the value or a comment the caller has
           to remember?
        4. Does aggregation strip the scope without naming itself?

      Known violations (positive scope):
        - cluster.cross_node_file_drift
        - controller.non_leader_heartbeat_false_positive
        - doctor.cache_poisoning_from_node_scoped_findings
        - install.desired_state.invisible_service
      Known violations (negative scope — previously covered):
        - critical_state.absent_key_interpreted_as_stop
        - fm.globular.objectstore_partial_snapshot
        - awareness.degraded_source_sentinel_collapsed_to_critical
        - dnsprovider.internal_topology_leak_via_public_dns_publish
      Known good:
        - cluster_doctor split lookup-cache (any scope) from delta-authority
          (cluster-wide only) — commit c574dfe5
    enforcement: |
      Every health/proof/verdict/finding value carries an explicit scope
      field or typed wrapper covering both positive and negative cases.
      Aggregation across scopes is allowed only via a function whose name
      and signature make the aggregation visible.
    forbidden_fixes:
      - aggregate_scoped_value_into_global_without_aggregation_function
      - read_per_instance_metric_as_global_without_label_filter
      - treat_local_absence_as_global_absence
      - treat_node_scoped_finding_as_cluster_scoped

  - id: meta.binding_outlives_evidence_until_invalidated
    title: "Every binding carries 'I checked this then' — when 'now' is different from 'then', the binding is a phantom unless re-validated"
    category: lifecycle
    antipattern: "If it was approved, it's approved"
    wrong_instinct: A decision feels durable once made — but the evidence the decision was bound to may have moved, and the binding without its evidence is a ghost that authorizes the wrong present
    severity: critical
    status: candidate
    summary: |
      When an authority issues an approval, emits a proof, or sets a
      bootstrap marker, it does so against evidence that was current at
      that moment. The binding from authority to consumer carries an
      implicit "I checked this then." Time passes — seconds, minutes, a
      failover, a restart. The "then" world the binding was made against
      may no longer exist; the binding persists as if it does.

      This is the consumer-side sibling of
      meta.write_creates_completion_obligation. That one says: the
      PRODUCER of state must arrange for its termination. This one says:
      the CONSUMER of evidence must arrange for its re-validation — or
      the evidence's age becomes the failure.

      Two flavors fall under this principle:

        a. Approval/evidence half-life — approval was bound to evidence
           current at approval-time; the consumer at execution-time may
           span a leader failover, a restart, or just enough wall-clock
           that the evidence digest no longer matches reality. Before
           consuming any approval, the consumer must re-check the
           binding's evidence digest is still current.

        b. Bootstrap-marker expiry — "we're early" is a state with
           semantic consequences (relaxed permissions, grace windows,
           alternative paths). The early phase ends. No event naturally
           fires when the phase ends; the steady-state code doesn't know
           about the marker. The marker persists as evidence of an early
           phase that already ended, authorizing behavior steady-state
           would refuse.

      Before consuming a binding (approval, proof, evidence, marker):
        1. What evidence was this binding made against?
        2. How would I detect that the evidence has changed?
        3. Is the binding's freshness expressed in its type (TTL,
           generation counter, evidence digest) or implicit?
        4. What event SHOULD fire to invalidate this binding, and is
           that event guaranteed to fire?
        5. If no event fires (phase ends quietly, marker has no
           clearing path), is there a level-triggered re-validation?

      Known violations:
        - doctor.stale_evidence_authorizes_remediation
        - doctor.approval_token_replay_across_failover
        - doctor.escalation_state_lost_on_restart
        - bootstrap.flag_persists_post_day_1
        - desired.bootstrap_premature_convergence
        - service.bootstrap_ordering_skew
      Known good:
        - workflow defer B3 durable counter — evidence for "we've tried
          N times" survives restart
        - feedback_day0_unproven_grace — explicit half-life on
          runtime_identity_unproven findings; verifier degrades severity
          based on age
    enforcement: |
      Every binding from authority to consumer must include an evidence
      digest or generation number that the consumer re-validates at
      consumption time. Bindings whose validity depends on phase or time
      must carry their own freshness check; in-memory-only bindings
      across actions that can span a restart or failover are forbidden.
      Bootstrap markers must be paired with a clearing path (event or
      level-triggered sweep) OR a freshness check at every consumer that
      respects them.
    forbidden_fixes:
      - approval_token_replayed_after_successful_execution
      - approval_validity_assumed_durable_across_failover
      - escalation_state_kept_in_memory_only
      - bootstrap_flag_persists_without_clearing_path
      - day0_grace_without_expiry_check

  - id: meta.state_mutations_must_be_durably_committed_before_side_effects
    title: "Intent commits before action, retry is the only response to failure — no alternative paths once committed"
    category: lifecycle
    antipattern: "Just run the steps; if X fails, try Y instead"
    wrong_instinct: Computing the actions and executing them inline feels efficient, and falling back to a different path on failure feels resilient — but a failure between step 1 and step N leaves the world half-changed with no resume point, and an alternative path leaves the audit record claiming you did X when you actually did Y
    severity: critical
    status: candidate
    summary: |
      Two halves of one contract:

      Commit-first half:
        A state-changing operation that spans more than one observable
        side effect MUST be committed to a durable coordinator BEFORE
        any side effect runs. The coordinator owns: (a) the intent
        record (what should happen), (b) the per-step progress (where
        we are), (c) the terminal-state guarantee (every started intent
        reaches SUCCEEDED or FAILED), and (d) the resume contract (a
        new process picks up where the old one left off, idempotently).

      No-alternative-path half:
        Once an intent is committed, the only exits are SUCCESS or
        FAIL. Retry is the response to transient failure. Falling
        back to a different action — "X failed so I'll try Y instead"
        — is forbidden because it makes the audit trail lie: the
        intent record says X, the world shows Y. Even a human-operated
        repair path counts; the principle says the human's intent
        must also commit before action.

      Plans are deliberation. Workflows are commitment. A plan computes
      actions and may execute them; a workflow PERSISTS the computed
      plan before executing any of it AND enforces that no alternative
      action is taken after commitment. Together, durable intent +
      retry-only-loop are what give a state change its observable
      reliability.

      Bug class this principle catches:
        - "Lost intent" — process executes step 1, restarts before step
          2; new process has no record that a mutation was in flight;
          observers see step-1 effects without explanation.
        - "Frozen partial" — process executes step 1, fails step 2 with
          no retry contract; the system is half-changed forever because
          nothing owns the obligation to finish.
        - "Double execution" — process executes step 1, dies, new
          process re-executes from the top because the only record was
          in the dead process's memory.
        - "Untraceable change" — observer sees a state change but cannot
          find the operator/agent/code path that decided it.
        - "Audit lies" — intent record claims X happened, observable
          state shows Y happened (because step 2 fell back to an
          alternative when the canonical path failed). The audit
          trail is now structurally untrustworthy.
        - "Workaround corrupts" — operator reaches for fix-etcd.sh /
          direct disk write / inline retry-with-different-args
          because the canonical path is blocked. The system now has
          state that no workflow record explains.

      Before computing actions that will change cluster state, ask:
        1. Does this operation cross any failure boundary (multi-RPC,
           multi-node, multi-second wall-clock)?
        2. Is the intent persisted somewhere a new process could find
           and resume from?
        3. Is each step individually idempotent so a resume doesn't
           double-execute?
        4. Does the operation reach a terminal state, or does failure
           leave it in an indeterminate "started but not finished" state
           forever?
        5. Is there an audit record naming WHO decided this and WHEN?

      Known violations:
        - controller.platform_upgrade_bypassed_workflow_authority
        - mcp.governor_bypass_via_ad_hoc_execute_tool
        - mcp.etcd_remote_allowlist_expansion
      Known good:
        - WF-DEFER B3 durable counter — intent + retry-count survive
          restart, ABANDONED is a terminal state
        - convergence_committer atomic txn — write+cleanup in same etcd
          op so the intent and its closure are co-durable
        - workflow.RUN_STATUS_FAILED contract — every workflow reaches
          SUCCEEDED or FAILED; no zombies
    enforcement: |
      Every state-changing operation that spans more than a single etcd
      transaction MUST flow through the workflow service. Direct CLI →
      etcd writes are forbidden for any change that requires multiple
      coordinated side effects. MCP tools that mutate state must do so
      via plan → validate → approve → execute (which dispatches a
      workflow), never via direct RPC to a state-changing endpoint.

      No-alternative enforcement: workflow step handlers may NOT branch
      to an alternative action on transient failure. The only sanctioned
      responses are (a) retry the same step, (b) reach a terminal
      FAILED state and surface the failure for human/escalation review.
      Falling back to a different artifact source, a different RPC, a
      different node, or a manual repair path violates the contract
      because it leaves the workflow record claiming one intent while
      the world records another.
    forbidden_fixes:
      - cli_bulk_apply_state_via_direct_etcd_writes
      - mcp_tool_executes_mutation_without_workflow_dispatch
      - inline_multistep_mutation_without_durable_intent_record
      - reuse_in_memory_plan_after_leader_failover
      - fall_back_to_alternative_action_on_workflow_step_failure
      - manual_repair_path_diverges_from_committed_workflow_intent

  # ── Generalization principles (second pass) ───────────────────────────────────
  # These invariants encode the abstract reasoning layer. They generalize from
  # specific Globular incidents to classes of distributed-system mistakes, so
  # AI agents can recognize not just the exact bug but the family it belongs to.

  - id: state.unknown_must_not_default_to_healthy
    title: Unknown, incomplete, or stale state must not be rendered or classified as healthy
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      Unknown state is a first-class operator truth. When a collector fails, a snapshot
      is incomplete, or a data source is stale, the resulting gap is UNKNOWN — not HEALTHY.
      Any code path that defaults an unknown or unobserved state to healthy is suppressing
      real operational evidence and hiding potential failures from operators.
      UNKNOWN must propagate to every status rollup, badge, and health summary.
    enforcement: |
      Status aggregation logic must explicitly handle three states: HEALTHY, DEGRADED, UNKNOWN.
      UNKNOWN must never be coerced to HEALTHY. When the data source is absent or stale,
      the rollup must emit UNKNOWN or STALE — not a passing result.
      Doctor rules, health dashboards, and CLI output must all respect this.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/cluster_doctor/cluster_doctor_server/rules/installed_state_runtime_mismatch.go
    forbidden_fixes:
      - forbidden.unknown_as_healthy
    required_tests:
      - TestStatusRollup_UnknownSubsystem_NotGreen
      - TestCollectorGap_ProducesUnknown_NotHealthy
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.industry.partial_failure_hidden_by_global_green
      - fm.industry.missing_inventory_misclassified_as_down

    related_invariants:
      - meta.authority_must_express_uncertainty
  - id: evidence.missing_is_not_known_bad
    title: Missing evidence must not be treated as evidence of failure unless the contract explicitly says absence proves failure
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      In distributed systems, missing data has two very different meanings:
        - Collector gap: the evidence collection path failed or timed out
        - Known-bad: the node is confirmed unreachable or in a failure state
      These are not the same. A node absent from a snapshot means the collector
      did not receive its record — it does not mean MinIO is down on that node,
      that the etcd member is evicted, or that the service is failed.
      Treating absence as proof of failure causes false CRITICAL findings,
      incorrect remediation, and operator alarm fatigue.
    enforcement: |
      Any rule that counts "down" members, "missing" nodes, or "absent" services
      must distinguish:
        PRESENT      — evidence collected and health confirmed
        UNKNOWN      — evidence absent (collector gap, timeout, incomplete snapshot)
        KNOWN_BAD    — evidence collected and confirms unhealthy
      Only KNOWN_BAD contributes to severity escalation. UNKNOWN requires a caveat,
      not a critical finding. Rules that cannot distinguish the two must emit UNKNOWN
      and defer to the operator.
    protects:
      files:
    forbidden_fixes:
      - forbidden.missing_inventory_as_down
      - forbidden.partial_snapshot_false_quorum_loss
    required_tests:
      - TestAbsentRecord_ClassifiedAsUnknown_NotKnownBad
      - TestPartialSnapshot_NoCritical_WhenOnlyUnknown
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.industry.missing_inventory_misclassified_as_down

    related_invariants:
      - meta.absence_scope_must_be_explicit
  - id: identity.stable_node_identity_not_floating_vip
    title: Stable node identity must not be derived from a floating VIP or failover reachability address
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      A floating Virtual IP (VIP) represents reachability for a cluster role — it moves
      between nodes during failover. It is not the durable identity of any node.
      When a VIP is used as the stable identity for a node (etcd advertise URL, ScyllaDB
      host entry, MinIO pool IP, controller leader IP match), the identity becomes
      unstable: it moves to a different physical node without the affected node being
      aware. This causes membership corruption, leader election failures, and cascading
      multi-service outages when the VIP transitions.
    enforcement: |
      All code that needs a stable, durable node IP must use StableIP(clusterVIP),
      which explicitly excludes the floating VIP from the IP selection.
      Never use PrimaryIP(), Ips[0], or AdvertiseIp without first filtering the VIP.
      The VIP must be read from /globular/ingress/v1/spec and excluded before any
      identity-bearing operation.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/state.go
    forbidden_fixes:
      - forbidden.vip_as_node_identity
      - hardcode_node_to_pool_mapping_to_avoid_filter
      - filter_out_vip_in_node_identity_ips
    required_tests:
      - TestStableIP_ExcludesVIP
      - TestEtcdAdvertiseURL_UsesStableIP_NotVIP
      - TestScyllaHosts_ExcludeVIP
    related_failure_modes:
      - fm.globular.vip_transition_cascade
      - fm.industry.floating_address_used_as_durable_identity

    related_invariants:
      - meta.identity_computation_must_be_invariant
  - id: workflow.dispatch_is_not_completion
    title: Dispatching an action is not proof that the action completed successfully
    severity: high
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      When an operator submits a command, clicks a button, or calls an RPC, the system
      receives the intent and dispatches it — it does not immediately execute and confirm
      completion. For any operation that goes through a workflow (install, upgrade, topology
      change, configuration apply), there is a gap between dispatch and convergence.
      Reporting success at dispatch time misleads the operator into believing the system
      has already converged. For irreversible or destructive operations, this creates a
      false safety signal — the operator believes the task is done and moves on.
    enforcement: |
      Dispatch events must return ACCEPTED, not SUCCESS.
      Callers (CLI, UI, MCP tools) must poll or stream the workflow status until a
      terminal state (SUCCEEDED, FAILED, BLOCKED) is observed.
      Success must be reported only after terminal state is confirmed.
      Destructive operations must require explicit operator confirmation before dispatch.
    protects:
      files:
        - golang/workflow/workflow_server/executor.go
        - golang/workflow/engine/engine.go
    forbidden_fixes:
      - forbidden.dispatch_as_success
      - forbidden.optimistic_destructive_success
    required_tests:
      - TestDispatch_ReturnsAccepted_NotSuccess
      - TestCLI_WaitsForTerminalWorkflowState
    related_failure_modes:
      - fm.industry.optimistic_success_for_irreversible_action
      - fm.industry.missing_inventory_misclassified_as_down
    related_invariants:
      - meta.state_mutations_must_be_durably_committed_before_side_effects

  - id: meta.code_must_not_mirror_external_enumerations
    title: "Code mirrors of external truth drift silently — derive the set, don't author it"
    category: authority
    antipattern: "A small hand-maintained list of names will stay up to date"
    wrong_instinct: A hardcoded slice is fast, readable, and trivially correct today — so it feels safer than a discovery loop. But the slice is a second authority for the set, and the moment the external source gains a member, the mirror diverges. No compile error, no test failure (the tests use the same mirror), just silent runtime drift that surfaces months later in production.
    severity: critical
    status: candidate
    summary: |
      Whenever a directory, proto enum, etcd prefix, package registry,
      installed catalog, or external configuration file defines a set of
      named entities, ANY Go code that enumerates "the canonical members
      of that set" must derive the enumeration from the source — never
      hand-maintain a parallel slice/map/switch.

      The bug shape is:
        1. An external authority owns a set: filenames in a directory,
           values in a proto enum, keys in a registry, CREATE statements
           in service code.
        2. A Go file declares its own enumeration of that set as a
           `[]string`, `map[string]bool`, or exhaustive `switch`.
        3. The two evolve at different rates. A new entry is added to
           the authority and forgotten in the mirror.
        4. The mirror is the input to a critical loop (seeding, install,
           policy enforcement, dispatch, RF guard). Items not in the
           mirror are silently dropped, mis-classified, or unprotected.
        5. Failure surfaces months later in a context where the root —
           "code disagreed with the directory" — looks nothing like the
           symptom — "ingress can't come up", "RBAC keyspace at RF=1",
           "workflow not found".

      This is distinct from but related to:
        - meta.identity_computation_must_be_invariant — a stricter sibling
          about identity FIELDS. Here we're about SETS.
        - meta.competing_writers_must_converge_or_be_fenced — there both
          writers are alive; here one writer (the mirror) is FROZEN code
          and the other (the directory) keeps growing.
        - meta.storage_is_not_semantic_authority — same family. The
          directory IS the authority; the mirror is a cache that lies.

      Sibling bug shapes that have ALL fired in production:
        - coreWorkflows: 11 hardcoded names, 22 YAMLs on disk →
          cluster.ingress_spec_restore never seeded → ingress blocked
          on Day-0 install. (2026-06-06; v1.2.195 fix)
        - action_registration_test.collectAllYAMLPaths: 9 paths in a
          slice, 22 YAMLs in the directory → the test that should have
          caught the coreWorkflows bug missed it because it shared the
          same drift shape three levels deep. (same incident)
        - registerAllActorsWithStubs / actorRegistrationSet: 6 of 20
          Register*Actions functions silently un-called → the test
          designed to enforce handler parity silently passed against an
          incomplete universe. (same incident, meta-recursive)
        - commandPackages + skipSystemdUnits: hand-mirrored from
          /packages/specs/*_cmd.yaml. Phantom "cli" entry; missing
          claude-cmd; missing oxigraph; misclassified mcp. (same incident)
        - kindRank + lookupResolvedEntrypointChecksum candidates: 4 of 7
          proto ArtifactKind values hit the default branch → AGENT,
          SUBSYSTEM, AWARENESS_BUNDLE silently mis-ordered or
          mis-routed. (caught by exhaustiveness test)
        - criticalScyllaKeyspaces: 7 hardcoded keyspace names; codebase
          actually creates 10. ai_conversations, rbac_permissions,
          shared_index running unenforced — silently RF=1 on multi-node
          clusters until the test discovered them. (2026-06-06)
        - infraNames in artifact_handlers.go:1881: fourth copy of the
          same infrastructure list, comment explicitly admitting "Source
          of truth: packages/specs/*.yaml". Comment-as-confession is the
          fingerprint.

      The fingerprint comment: "must stay in sync with X", "source of
      truth is Y", "maintained manually", "the node-agent cannot import
      the controller's catalog". Every one of these is an admission that
      the author knew the trap and shipped it anyway.
    enforcement: |
      Default rule: any code declaring "the canonical set of X" must
      derive the set from the same authority that owns X. Acceptable
      authorities are:
        - filesystem directory scans (os.ReadDir + extension filter)
        - proto enum value tables (protoreflect or *_name maps)
        - etcd prefix listings (kv.Get with prefix)
        - service-published catalogs read at startup or test time

      When a structural derivation isn't yet possible (cross-package
      import cycle, runtime vs. build-time scope mismatch), the
      hardcoded mirror is allowed BUT must:
        1. Carry a comment naming the source of truth and explaining
           the structural blocker.
        2. Be paired with a CI-time test that walks the truth source
           and fails on drift in either direction (mirror missing an
           entry, mirror containing a phantom).
        3. Reference this meta-principle in the comment so future
           readers see the documented architectural debt.

      Code that switches over a proto enum value must either handle every
      named value with an explicit case, OR carry a documented constraint
      that limits the accepted inputs (and a test asserting the constraint
      and the switch share the same set). A bare `default` that silently
      categorizes unknown values as the "normal" branch is forbidden.

      Test patterns proven to work:
        - TestEmbeddedWorkflowsHaveRegisteredActions: walks YAML dir,
          asserts every (actor, action) tuple has a registered handler.
        - TestCommandAndSkipUnitListsMatchSpecs: walks packages/specs,
          asserts hardcoded maps match the union of cmd+infrastructure
          spec files (plus documented carve-outs with stated reasons).
        - TestKindRankCoversAllProtoArtifactKinds: enumerates every
          proto ArtifactKind value, asserts each returns non-default.
        - TestCriticalScyllaKeyspacesMatchSourceCreateStatements: walks
          all .go files for CREATE KEYSPACE statements + Keyspace constant
          patterns, asserts the policed-set matches the created-set.
        - TestAllRegisterFunctionsAreCalled: walks the package source for
          Register*Actions declarations, asserts each is invoked.

      Each test above caught real, shipped drift on first run. Treat the
      pattern as load-bearing for any future hardcoded mirror.
    forbidden_fixes:
      - forbidden.add_to_mirror_without_extending_test
      - forbidden.silence_drift_warning_with_documented_carveout_only
    related_invariants:
      - meta.identity_computation_must_be_invariant
      - meta.competing_writers_must_converge_or_be_fenced
      - meta.storage_is_not_semantic_authority

  - id: meta.abstraction_must_not_hide_unmeasured_cost
    title: "An abstraction that swallows its own failure mode is worse than no abstraction"
    category: signal
    antipattern: "If the abstraction returns the same type on success and failure, the caller can carry on"
    wrong_instinct: A helper that returns a sensible default on the rare path feels considerate — callers don't need a branch, the code looks clean. But "sensible default" and "real answer" have the same shape, so every caller now silently treats failure as success. The abstraction has absorbed the failure into the success channel; the bug surfaces three layers downstream as garbage data, and the path back to the swallowed signal is dead.
    severity: critical
    status: candidate
    summary: |
      An abstraction (helper, resolver, template engine, parser, wrapper)
      MUST surface its failure mode in a shape distinguishable from
      success. Returning the same type on "I found it" and "I didn't"
      makes the caller structurally unable to tell the two apart. The
      caller's correctness then depends on a runtime assumption the
      type system cannot enforce.

      This is the failure shape behind Bravo's FindNamedField (Lampson
      §3.1, 1983): an O(n²) loop that LOOKED like an O(n) abstraction
      because the abstraction hid the cost of repeated FindIthField
      calls. The bug was not in the algorithm; it was in the
      abstraction's contract — the caller had no way to see what they
      were paying for.

      The modern shape is the workflow engine's `$.<field>` resolver
      bug (2026-06-06): when the path doesn't resolve, the resolver
      returns the LITERAL template string `"$.spec_bytes"` instead of
      an error or nil. Every caller then treats the unresolved
      template as a valid value, JSON-unmarshals it, and gets
      `invalid character '$'` three steps later. The signal that
      "resolution failed" was lost the moment the resolver chose to
      degrade silently into the success channel.

      The general shape:
        1. An abstraction has two paths: the normal success path and a
           rare/failure path.
        2. The author makes the failure path return a value of the same
           type and shape as success — usually for caller convenience.
        3. Callers cannot distinguish; their downstream logic interprets
           the failure value as a real result.
        4. The bug surfaces far from its origin in a context that gives
           the operator no hint about which abstraction swallowed the
           signal.

      This is distinct from `meta.fallback_must_degrade_semantics`:
      that principle says "if you fall back, the result must say so."
      This one says "the abstraction's contract must make it
      structurally impossible to lose the signal in the first place."
      Fallback is a runtime choice; abstraction shape is a type-system
      choice. Both must hold.

      Sibling cases in our codebase:
        - Workflow engine `$.` resolver returning literal template
          (caught only by JSON unmarshal three layers downstream).
        - Earlier in this session: ai-memory port discovery returning
          "" for "not found yet" AND for "key missing forever". The
          installer treated empty as permanent → skipped day-0 seed.
        - Hypothetical but extant: any helper returning `(string,
          error)` where the string is non-empty on the error path.

      The fingerprint: a function whose error path returns a usable-
      looking value of the same type as the success path. Read the
      function. Ask: "can the caller, given only the return value,
      tell success from failure?" If no, the abstraction is dishonest.
    enforcement: |
      Abstractions whose normal path returns T should make their
      failure path return one of:

        - (T, error) where T's zero value is unambiguous
        - (T, bool) where bool is presence — Lampson's "Use hints"
          pattern, with explicit verification at the call site
        - *T — nil-distinguishable from any returned value
        - A sum type (Result / Option / sealed interface) where the
          type system FORBIDS treating failure as success

      Forbidden: returning a "sensible-looking default" of type T on
      the failure path. "Empty string when key missing", "zero value
      when parse failed", "the literal template string when path
      didn't resolve" — all violations. The abstraction owes the
      caller a refusal, not a placeholder.

      Test pattern: for every abstraction whose return type is T, the
      test suite must include a case where the rare/failure path is
      taken, and assert that the returned value is structurally
      distinguishable from any valid success result. Test passing
      because "the default value never collides with a real value in
      practice" is not enough — the type system must enforce the
      distinction, not the test data.

      For existing abstractions where the contract is already
      ambiguous: log a finding, add the failure case test, and either
      change the return type or document the violation as
      architectural debt with a tracking ID.
    forbidden_fixes:
      - forbidden.return_zero_value_on_silent_failure
      - forbidden.add_caller_side_runtime_check_instead_of_type_signal
    related_invariants:
      - meta.fallback_must_degrade_semantics
      - meta.silence_is_not_valid_for_unexpected
      - meta.authority_must_express_uncertainty
    related_failure_modes:
      - fm.industry.optimistic_success_for_irreversible_action

  - id: meta.end_to_end_check_is_the_only_truth
    title: "The only authoritative correctness check is at the actor that owns the cross-layer intent"
    category: authority
    antipattern: "Every layer verified its own concerns, therefore the whole thing is correct"
    wrong_instinct: Layered verification feels rigorous — node-agent checks the install, controller checks the release, systemd checks the unit. But each layer only verifies its layer's concerns; the cross-layer property (the SERVICE that was supposed to ship is actually running the right binary and answering requests) is owned by no individual layer. Aggregating per-layer green into "system green" is a category error — you've just made the partial true into a partial lie.
    severity: critical
    status: candidate
    summary: |
      The end-to-end argument (Saltzer, Reed & Clark 1984, anticipated
      by Lampson 1983 §4.1): an authoritative correctness verdict for
      a cross-layer property MUST come from an actor that owns the
      cross-layer intent. Intermediate-layer checks are STRICTLY
      performance optimizations — they catch failures early and reduce
      load, but they are never proof.

      In our 4-layer state model (repository → desired → installed →
      runtime), every layer has its own correct-locally verdict. The
      controller knows the desired state is consistent. The node-agent
      knows the binary was installed. systemd knows the unit is
      loaded. Each of these is true within its layer's scope. None of
      them, alone or in aggregate, answers the cross-layer question
      "is the service Globular promised the user actually serving
      requests with the binary the manifest names?" That answer
      belongs to cluster-doctor, which is the only actor whose
      verification spans all four layers simultaneously.

      The violation looks like:
        1. Operator asks "is the cluster healthy?"
        2. Code answers by aggregating per-layer status flags.
        3. Each per-layer flag is correct within its scope.
        4. The aggregated answer is wrong because the cross-layer
           property was never checked.
        5. Operator believes the system is green; the cross-layer
           failure surfaces hours or days later when actual user
           traffic hits the unverified path.

      Bug-shape catalog (all observed):
        - SUCCEEDED workflow returning SUCCESS because the actor
          returned SUCCESS — but the side effect the workflow was
          dispatched to produce was never observed in the world.
          (Whole class of workflow.dispatch_is_not_completion
          incidents.)
        - 200 OK from a /health endpoint when the process is alive but
          its database connection is broken.
        - "Install succeeded" reported by node-agent because the file
          was written, when the service binary on disk has a different
          sha256 than the manifest the controller intended to ship.
          (Phase 38 entrypoint_checksum incidents.)
        - "ServiceRelease AVAILABLE" because every node reported
          installed_state=desired_version, while one of those nodes
          was running the OLD binary because its PID hadn't been
          rolled. (service.old_pid_after_upgrade family.)

      The end-to-end actor must be the actor that owns the intent
      whose correctness is being verified. For "is this release
      converged?" that's the controller's release pipeline. For "is
      the cluster healthy?" that's cluster-doctor. For "did this
      transaction commit?" that's the workflow service.

      Importantly: this does NOT forbid intermediate checks. It
      forbids treating intermediate checks AS authoritative. They are
      performance optimizations — earlier failure detection, lower
      cost, faster feedback. They never replace the end-to-end check.
    enforcement: |
      For every cross-layer property the system exposes (health,
      converged, succeeded, available, ready), name the actor that
      owns that intent and route the verdict through it. No other
      actor's local verdict may be used as the cross-layer answer.

      Concretely:
        - "Cluster health" answers come from cluster-doctor, never
          from per-node heartbeats aggregated by the dashboard.
        - "Release converged" answers come from the controller's
          release-pipeline RUN_STATUS, never from per-node
          installed_state matches.
        - "Workflow succeeded" answers come from the workflow service's
          terminal-state record, never from the dispatcher's return code.
        - "Service healthy" at the cross-layer level comes from a
          live request-path probe, never from systemd's
          unit-is-active flag alone.

      Intermediate checks are explicitly labeled as performance
      optimizations in code comments and metric names. When an
      intermediate check disagrees with the end-to-end verdict, the
      end-to-end verdict wins and the disagreement is itself a
      finding.

      For every claim of cross-layer correctness in code or UI, ask:
        1. Which actor owns the intent this verifies?
        2. Is the verdict generated by that actor, or assembled from
           lower-layer signals?
        3. If assembled, is the assembler the end-to-end owner, or is
           it just an aggregator with no view of cross-layer state?

      The aggregator-as-authority is the failure mode this principle
      catches.
    forbidden_fixes:
      - forbidden.aggregate_layer_status_into_cross_layer_verdict
      - forbidden.dispatch_as_proof_of_completion
      - forbidden.local_health_endpoint_as_cluster_health
    related_invariants:
      - meta.storage_is_not_semantic_authority
      - meta.assertions_must_carry_their_scope
      - workflow.dispatch_is_not_completion
      - cluster_doctor.is_the_authority_for_health_state_queries

  - id: meta.early_consolidation_ossifies_uncertainty
    title: "Code that crystallizes before its true shape is understood becomes cement around its bug"
    category: lifecycle
    antipattern: "Now that we have N examples, let me write the canonical N-entry list"
    wrong_instinct: Consolidation feels like maturity — once you see the pattern, codify it. But codifying *too early*, before the universe is known, freezes the wrong shape. The consolidated form then gets imported, depended on, and trusted, until changing it requires touching every dependent. The bug becomes structural, not local; fixing it requires architecture, not edits.
    severity: critical
    status: candidate
    summary: |
      Lampson's "Plan to throw one away" (§3.3, 1983) is usually read
      as advice about implementation strategy: build the first
      version expecting to discard it. The deeper observation is
      about TIMING of canonicalization. A hardcoded list, a sealed
      type, an exhaustive switch, a frozen interface — each of these
      is a commitment that the current understanding is complete.
      When the commitment is made before understanding is complete,
      every subsequent consumer inherits the frozen wrong shape.

      Distinct from `meta.code_must_not_mirror_external_enumerations`:
      that principle says "if the truth lives elsewhere, don't mirror
      it here." This one says "if the truth is still emerging, don't
      crystallize it yet." A new service's canonical type signature,
      written when only the first caller exists, will be wrong for
      the second caller — but the second caller will work around it,
      cementing the wrong shape rather than fixing it.

      The fingerprint shapes:
        1. A `type Foo struct { A, B, C }` written when only one
           caller exists. The second caller needs D; instead of
           adding D, they add a side-channel map. Now there are two
           shapes.
        2. A `map[string]bool` enumerating "the canonical things"
           that gets exported and consumed by 12 packages before the
           13th member exists. The 13th gets added by an unrelated
           PR that doesn't realize there are 12 consumers to update.
        3. A function signature `Do(ctx, name string) error` written
           before the second argument (kind, version, etc.) was
           understood. Adding a parameter is a breaking API change;
           callers grow stringly-typed compound encodings instead.
        4. Workflow YAMLs frozen with `dispatchModel: documentation`
           after a single example — the next workflow that *should*
           be documentation-only doesn't get the marker because the
           author doesn't know about the convention.

      The relationship to `code_must_not_mirror_external_enumerations`:
      a hardcoded mirror is one specific case of early consolidation —
      the canonical form was frozen before the external truth source
      finished growing. But ossification happens even without an
      external source: the codebase invents its own emerging truth and
      canonicalizes it too early. Both principles apply; both fixes
      compose.

      Known violations from this session:
        - coreWorkflows (11 hardcoded). The author probably wrote it
          when there *were* only 11. The 12th (cluster.ingress_spec_restore)
          shipped without the slice being touched.
        - actorRegistrationSet. Written when there were 6 actor
          groups. The 7th through 12th got Register*Actions but no
          entry here.
        - Lampson's own taxonomy. He explicitly says he could only
          identify ~26 hints in 1983 — and then 2025-era distributed
          systems found ~20 more. Even his consolidation was early
          relative to the eventual universe. That's not a flaw; it's
          the principle's defining example.
    enforcement: |
      Before consolidating an emerging shape into a canonical form,
      ask:

        1. Has the set stopped growing? (Three months without a new
           member? Three users? Three failure modes?)
        2. Is the consolidation derivable from a still-evolving source,
           or is the consolidation itself the source?
        3. If a new member appears tomorrow, what changes? Is it a
           one-line addition, or does it require touching every consumer?
        4. Does the canonical form have an "I don't know yet" slot, or
           does it force every member to commit to all dimensions now?

      Permissible consolidation patterns:
        - Closed types when the variants are constrained by physics or
          protocol (e.g., proto enum values, HTTP methods).
        - Maps and slices DERIVED from a discoverable source (the
          fix for hardcoded mirrors).
        - Interface types with explicit extension points (`Options`
          structs with defaults, opt-in flags).

      Forbidden consolidation:
        - Hardcoded N-entry slices in critical paths when N is
          observably still growing.
        - Sealed exhaustive switches over an emerging set without a
          default case that surfaces unknowns as findings.
        - Function signatures that encode multiple identities into
          a single stringly-typed argument because the caller "only
          needs name today."

      When a piece of code MUST be consolidated early (performance,
      type safety), document the consolidation explicitly and pair it
      with a CI test that walks the truth source and fails on drift —
      same pattern as `code_must_not_mirror_external_enumerations`.
    forbidden_fixes:
      - forbidden.workaround_frozen_shape_with_side_channel
      - forbidden.add_to_hardcoded_set_without_extending_discovery
    related_invariants:
      - meta.code_must_not_mirror_external_enumerations
      - meta.identity_computation_must_be_invariant

  - id: meta.bad_path_must_make_progress
    title: "Failure response must move the system toward a terminal state, not freeze it indefinitely"
    category: lifecycle
    antipattern: "Retry forever; eventually it'll work"
    wrong_instinct: Retry feels safe — if you don't know whether a transient failure will clear, why not keep trying? But infinite retry without progression turns the system into a CPU heater. The failure isn't getting worse, but it isn't getting better either, and from the operator's view the system is "still trying" forever. Stuck-with-no-progression is its own failure mode, distinct from amplification, and equally fatal.
    severity: critical
    status: candidate
    summary: |
      Lampson's "Separate normal and worst case" (§2.1, 1983) usually
      gets quoted for the speed half — "the normal case must be fast."
      The fault-tolerance half — "the worst case must make some
      progress" — is the load-bearing one. A failure-handling path
      that loops without progression is indistinguishable from a hang;
      from the operator's view the system has frozen. The CPU is busy,
      the logs are flowing, the workflow runs are dispatching — and
      nothing is changing. This is its own failure mode, distinct from
      amplification.

      The dual relationship with
      `meta.failure_response_must_contract_not_amplify`:
        - Amplification: one error → N errors. (Unbounded retry, fire-
          and-forget retry-on-failure goroutine, log-on-every-tick
          when the failure persists.)
        - Stuck: error → error → error forever, at the same rate,
          forever. (Circuit breaker re-opens on retry, persistent
          retry budget that never exhausts, deferred workflow waiting
          for a condition the rest of the system needs to provide.)

      Both are violations of the worst-case-must-make-progress half of
      Lampson's hint. Contract-not-amplify says "don't get worse."
      Must-make-progress says "don't stay the same — move toward a
      terminal state, even if that state is FAILED."

      Bug-shape catalog:
        - Workflow CIRCUIT_BREAKER_OPEN for 30s, on close attempts
          retry, retry fails, circuit re-opens for 30s, forever. From
          operator's view: "still backing off after 6 hours." No
          escalation, no abandonment, no human-visible signal that
          this needs intervention.
        - The 2026-06-06 ingress-spec-restore loop: dispatch every
          30s for a workflow definition that doesn't exist in etcd.
          For an entire day, every tick: "dispatch → not found →
          retry." The system was making no progress and emitting no
          finding that said "this is permanently broken."
        - Deferred workflow waiting for dependency D; D is itself
          deferred waiting for E; E is deferred waiting for D. The
          deferral system is making "progress" in the sense that the
          counters tick, but the actual state-mutation never occurs.
          ABANDONED state was added (WF-DEFER B3) to surface this.
        - Health probe returns "still checking" indefinitely because
          the dependency it checks is slow; nothing distinguishes
          "slow today" from "permanently unreachable" for the operator.

      The principle: every failure-handling path must have a
      terminal state, reachable in bounded time or bounded attempts,
      that produces an operator-visible verdict. "Still trying" is
      not a verdict.

      Note that "terminal" doesn't mean "success." FAILED is a
      terminal state, as is ABANDONED, as is BLOCKED-PENDING-OPERATOR.
      The contract is that the system stops making the same choice
      and surfaces a decision — to a human, to a higher-layer
      orchestrator, or to an alert.
    enforcement: |
      Every retry, defer, backoff, circuit-breaker, or wait loop
      must answer:

        1. What's the upper bound? (Attempts, wall-clock, distinct
           failure shapes?)
        2. What terminal state is reached when the bound is hit?
        3. Who sees the terminal state — operator, ticket, alert,
           workflow recorder?
        4. Is the terminal state DIFFERENT from the looping state?
           (If the system goes from "trying" to "trying" forever,
           the principle is violated even if the rate is bounded.)

      Acceptable patterns:
        - Workflow runs with MaxDefers + ABANDONED terminal state
          (WF-DEFER B3 is the canonical implementation).
        - Circuit breakers with bounded re-open count; after N
          re-opens, escalate to a CRITICAL finding and stop retrying
          until an operator clears it.
        - Retry-with-jitter loops with absolute wall-clock cap that
          transitions to FAILED at the cap.

      Forbidden patterns:
        - `for { sleep(); retry() }` with no bound.
        - Circuit breaker that re-opens on each post-cooldown failure
          forever, with no escalation.
        - Deferred workflows whose blocker condition can only be
          satisfied by a workflow that's itself deferred (deadlock by
          design).
        - "Still checking" / "in progress" / "pending" states with no
          timeout to a verdict.

      Test pattern: for every retry/defer/backoff loop, write a test
      where the underlying failure is permanent. Assert that the
      system reaches a terminal state within bounded time or attempts,
      AND that the terminal state surfaces to an observer (workflow
      run record, finding, alert, log at ERROR severity).
    forbidden_fixes:
      - forbidden.unbounded_retry_loop
      - forbidden.circuit_breaker_without_escalation
      - forbidden.pending_state_without_timeout_to_verdict
    related_invariants:
      - meta.failure_response_must_contract_not_amplify
      - meta.write_creates_completion_obligation
      - meta.half_done_must_not_look_done
    related_failure_modes:
      - workflow.abandoned_defer_never_retried

  - id: meta.timeout_is_a_decision_not_a_truth
    title: "A timeout means 'I did not hear back in time' — never 'the other side failed'"
    category: signal
    antipattern: "Connection timed out, so the service is down"
    wrong_instinct: A timeout feels definitive because it's a hard boundary — the request didn't complete in the budget. But that's a statement about YOUR observation, not the world. The other side could be slow but proceeding, finished but with the response in flight, blocked on something you don't see, or actually down. Turning a four-way uncertainty into a binary "down" is a lie the system then makes decisions on.
    severity: critical
    status: candidate
    summary: |
      A timeout is the failure of an OBSERVATION to complete within a
      budget — not the failure of the OBSERVED actor. Tanenbaum's first
      fallacy ("the network is reliable") has a direct corollary:
      timeouts are not decisive. Code that treats
      `err == context.DeadlineExceeded` as proof of remote failure
      makes consequential decisions on incomplete information.

      What a timeout can actually mean:
        1. The other side is slow but still working.
        2. The other side finished; the response is in flight or queued.
        3. The other side is blocked on a dependency it can't reach.
        4. The other side is actually down.
        5. The PATH between us is broken; the other side is fine.
        6. YOUR observer is overloaded and missed the response.

      Without additional evidence, none of these can be distinguished.
      Code that picks one — usually (4) — and proceeds is making a
      consequential decision on a one-bit signal that doesn't carry
      enough information to support that decision.

      Bug shapes from our history:
        - INC-2026-0004 collector partial snapshot: a 5s timeout on a
          node's inventory query was classified as "node absent." The
          doctor then aggregated this absent-observation into a
          "cluster lost quorum" finding. The node was healthy; the
          collector's budget was too short. 100+ false findings per
          minute resulted.
        - VIP-keepalived eviction: a controller decided a peer had
          failed because its heartbeat timed out → quorum action →
          real outage. The peer was reachable through a different
          route the controller didn't try.
        - MinIO partial snapshot inventory: nodes that didn't respond
          in time were marked "down" — leading to false quorum-loss
          findings that cascaded into automatic remediation.
        - Workflow dispatch RPC timing out: the workflow MIGHT have
          started. Treating it as "didn't start" risks dispatching
          twice. (See related: idempotence_is_a_requirement_not_a_quality.)

      The principle is NOT "never act on a timeout." Sometimes you must.
      The principle is "act with explicit acknowledgement that the
      action is being taken under uncertainty, and the system records
      that uncertainty rather than upgrading the observation to a fact."
    enforcement: |
      Every code path that handles a timeout MUST:

        1. Distinguish "timeout" from "remote error returned" — they
           are different signals and merge to the same logged-error
           type only by mistake.
        2. Model "unknown" as a third state distinct from "known-up"
           and "known-down." Where the consumer can't represent
           three-valued state, document the assumption being made.
        3. When a decision MUST be made on the timeout (because the
           caller can't wait forever), either:
              (a) Pick the SAFE-DEFAULT option that doesn't presume
                  the other side's state — usually retry with
                  exponential backoff and a final ABANDON terminal
                  state (see bad_path_must_make_progress).
              (b) Cross-check with a different observer before acting.
              (c) Explicitly log "made under timeout uncertainty, may
                  be wrong" so the audit trail names the gamble.
        4. When acting on a timeout would mutate cluster state
           (quorum changes, leader transitions, drains), the action
           MUST require an explicit confirmation from a second source
           — a different probe, a different observer, or a wait period.

      Particular forbidden patterns:
        - Treating timeout as "node is down" in the collector layer.
        - Treating timeout as "service is unhealthy" in health rules
          without retry or cross-check.
        - Treating dispatch-RPC timeout as "didn't start" — proceed
          only when the dispatched action is idempotent.
    forbidden_fixes:
      - forbidden.treat_timeout_as_remote_failure
      - forbidden.classify_absent_observation_as_known_down
      - forbidden.cluster_state_mutation_on_single_timeout
    related_invariants:
      - meta.absence_scope_must_be_explicit
      - meta.authority_must_express_uncertainty
      - meta.connection_errors_must_not_be_absorbed
      - meta.idempotence_is_a_requirement_not_a_quality
    related_failure_modes:
      - fm.industry.missing_inventory_misclassified_as_down
      - fm.globular.objectstore_partial_snapshot

  - id: meta.idempotence_is_a_requirement_not_a_quality
    title: "Every operation that can be retried, replayed, or re-dispatched MUST be idempotent — there is no 'might be retried'"
    category: lifecycle
    antipattern: "We'll make it idempotent later if we need to"
    wrong_instinct: Idempotence reads like a property — "this operation happens to be safe to run twice." That framing makes it optional, something you adopt once a problem shows up. But in any system with retry, restart, dispatch deduplication, workflow resume, or message redelivery, every operation will eventually run multiple times. Whether the operation is idempotent determines whether the system is correct or corrupted.
    severity: critical
    status: candidate
    summary: |
      In any system with retry budgets, workflow resume, dispatch
      deduplication, restart safety, hot-standby failover, or message
      replay, EVERY operation is potentially executed more than once.
      This is not the exception; it is the design surface. Code MUST
      be written assuming multi-execution is the normal case.

      Pat Helland's framing: every state mutation should be MEMOIZED —
      keyed by a stable identifier so the system can recognize "I've
      already done this and don't need to do it again." Memoization
      is to operations what content-addressing is to data: both turn
      "have I seen this?" from a hard question into a hash lookup.

      Bug shapes:
        - Workflow step that creates a resource without IF NOT EXISTS:
          attempt 1 creates it, transient network glitch, attempt 2
          fails because "already exists." The workflow's terminal
          status records FAILED. Reality: the resource was successfully
          created on attempt 1. The audit trail is now a lie.
        - Counter increment via raw `UPDATE c SET v = v + 1`: every
          retry double-counts. Must be UPSERT with a dedup key, or a
          conditional update keyed on a prior-value guard.
        - DDL: CREATE TABLE without IF NOT EXISTS fails on replay.
          ALTER TABLE may be entirely non-idempotent and require a
          version check + skip pattern.
        - Notification dispatch: "send the email" run twice = 2
          emails. Either the email queue dedups by message-id (good)
          or the dispatcher checks a sent-log first (also good); a
          bare `send()` call is not safe.
        - File-system writes that append: every replay re-appends.
          Use content-addressed paths or overwrite-with-known-content
          semantics.

      Distinct from `meta.state_mutations_must_be_durably_committed_before_side_effects`:
      that principle is about INTENT — the workflow record must
      commit before any side effect runs, so a restart can find
      "where am I?" THIS principle is about EFFECT — each side
      effect must be repeatable so finding "where am I?" and
      continuing from there doesn't double-apply.

      Both are required and neither replaces the other. Together they
      give the system the property: "any operation that's been
      committed can be safely resumed from any in-progress point."
    enforcement: |
      Every step in a workflow, every handler an actor exposes, every
      retry-capable RPC must satisfy idempotence one of two ways:

        (a) Built into the operation: UPSERT, CREATE IF NOT EXISTS,
            content-addressed file paths, conditional updates with
            prior-value or version guards.
        (b) Guarded by a dedup check at the caller: read
            already-applied marker, skip if present.

      Test pattern: every retryable operation must have a test that
      invokes it twice in succession and asserts the system state is
      identical to invoking it once. "Run it twice; assert same
      result" is the contract.

      Operations that GENUINELY cannot be made idempotent (one-shot
      irreversible signals to an external system, payment capture,
      etc.) must be:
        1. Marked explicitly in code as NOT_IDEMPOTENT.
        2. Dispatched only through a workflow step that holds an
           at-most-once execution gate (persistent attempt record +
           single-execution lock + post-execution acknowledgement).
        3. The fact that the step is non-idempotent must be visible
           in the audit trail and the workflow YAML.

      The default assumption — "this operation is safe to retry" —
      must be backed by code or refused. "It's probably fine" is not.
    forbidden_fixes:
      - forbidden.add_retry_to_non_idempotent_operation
      - forbidden.assume_first_attempt_succeeded_on_retry_eligible_failure
      - forbidden.non_idempotent_workflow_step_without_at_most_once_gate
    related_invariants:
      - meta.state_mutations_must_be_durably_committed_before_side_effects
      - meta.write_creates_completion_obligation
      - meta.timeout_is_a_decision_not_a_truth

  - id: meta.topology_change_is_a_first_class_event
    title: "Cluster topology is a dynamic input — code that caches it at startup operates on a snapshot that becomes a lie within minutes"
    category: dependency
    antipattern: "The endpoints I cached at startup are still good"
    wrong_instinct: At any given second the cluster looks fixed — N nodes, M services, these routes, this leader. Code written against that snapshot looks correct in isolation. But topology changes during normal operation — leader elections, VIP migrations, joins, drains, cert rotations, service-config updates. Each is a routine event, not an exception. Code that doesn't subscribe to topology changes caches a snapshot that becomes false within minutes — and then makes decisions on the false snapshot until something else fails loudly enough to force a reload.
    severity: critical
    status: candidate
    summary: |
      Distributed system topology — peer addresses, leader identity,
      VIP holder, service ports, membership, certificate validity,
      route reachability — changes during NORMAL cluster operation.
      Tanenbaum's sixth fallacy ("the topology doesn't change") is
      false in every operator-grade system. Code that treats topology
      as a startup-time fact will operate on stale data within
      minutes of any normal cluster activity.

      The pattern: every piece of topology data has an implicit
      freshness contract. Code that consumes topology must either:
        (a) Subscribe to changes — etcd watch, mesh discovery, event
            bus — and react when the watched key changes.
        (b) Re-fetch on a bounded interval AND refuse to act on data
            past the freshness bound (see bounded_staleness_must_be_named).
        (c) Explicitly accept staleness with a documented bound and
            a documented response when the bound is exceeded.

      Bug shapes from our codebase:
        - INC-2025: keepalived/etcd eviction. PrimaryIP() returned the
          floating VIP on the VIP-holder node; controllers cached the
          returned address at startup. When the VIP migrated, every
          decision keyed on PrimaryIP was now keyed on whatever node
          happened to hold the VIP — a moving target. Multiple
          incidents traced to this single missing topology
          subscription.
        - gocql session pinned to a single seed: when the seed went
          down, the session's view of the ring was frozen at the
          last refresh. Group 0 stale-voter detection failures came
          from this — the gocql client routed system.local and
          system.peers to different nodes that disagreed about
          membership.
        - DNS records cached past TTL: services that resolved a peer's
          name once at startup kept hitting the dead address after a
          rebalance.
        - /etc/hosts vs etcd: /etc/hosts is a snapshot; etcd is the
          live view. Code that read /etc/hosts at startup missed
          every subsequent change. The fix was always "read from
          etcd" — but the bug recurred because new code defaulted to
          /etc/hosts.
        - Leader-aware code that determined leadership at startup:
          when the leader transitioned, the code kept acting as the
          old leader. Multiple incidents — eventually fixed by
          subscribing to the lease key.

      A topology change should produce a structured event that any
      observer can subscribe to: leader transitioned, VIP moved, node
      joined, cert rotated. If the producer of the change can't emit
      such an event, that's the bug — not the consumer's
      cache-staleness handling.
    enforcement: |
      All inter-service addresses, leader identities, VIP holders,
      service ports, node memberships, certificate validity, route
      reachability MUST come from a live source:
        - etcd watches on the canonical key
        - cluster controller RPC with bounded freshness
        - service-mesh discovery (xDS)
        - event-bus subscriptions for cluster events

      Forbidden sources for topology:
        - Reads from a configuration file written at install time.
        - Startup-time DNS resolution cached for the process lifetime.
        - "Bootstrap" addresses passed via env-var or flag once.
        - Snapshots of cluster state taken at one moment and reused
          without a freshness check.

      Cached topology data MUST declare its staleness contract — see
      bounded_staleness_must_be_named_not_assumed — and MUST refuse
      to make consequential decisions past the bound. "Consequential"
      means anything that mutates state, dispatches to a peer, or
      reports cluster-wide health.

      Topology change MUST emit a structured event from the producer
      (the actor that owns the truth) so consumers can react. A
      producer that mutates topology without emitting the event is
      the root cause of every downstream stale-cache bug.

      Tests for topology-aware code must include "membership changed
      during operation" as an explicit case — not as an end-of-test
      cleanup, but as the scenario under test.
    forbidden_fixes:
      - forbidden.cache_peer_address_at_startup_without_refresh
      - forbidden.read_topology_from_config_file_at_runtime
      - forbidden.treat_stable_topology_as_invariant
      - forbidden.mutate_topology_without_emitting_event
    related_invariants:
      - meta.connection_errors_must_not_be_absorbed
      - meta.bounded_staleness_must_be_named_not_assumed
      - meta.binding_outlives_evidence_until_invalidated
      - meta.competing_writers_must_converge_or_be_fenced
    related_failure_modes:
      - fm.globular.vip_transition_cascade

  - id: meta.bounded_staleness_must_be_named_not_assumed
    title: "Cached, replicated, or derived state must declare its staleness contract — 'eventually consistent' is a category, not a contract"
    category: authority
    antipattern: "It'll catch up eventually"
    wrong_instinct: When you cache or replicate data, the optimistic view is that callers don't really care about being slightly stale — they'll re-read soon, or the staleness window is "small enough." But "small enough" relative to what? Without a named bound, every caller adopts a different assumption — the dashboard refreshes every 5s, the reconciler runs every 30s, the doctor every 5m, each treating the data as authoritative for its own purposes. Each is operating under a different staleness; the system invariant they share becomes undefined.
    severity: critical
    status: candidate
    summary: |
      Any data source that is NOT the authoritative writer — caches,
      read replicas, eventually-consistent stores, async projections,
      derived views, memoized results — has a STALENESS contract. The
      contract names how far behind the canonical truth the source
      can be while still being authoritative for a particular kind
      of decision. Without a named contract, every consumer assumes
      a different bound; the system's correctness becomes undefined.

      "Eventually consistent" is a CATEGORY, not a contract. The
      contract is the latency bound on that eventuality: "consistent
      within 1 etcd watch tick", "consistent within 30s of the
      source's write", "consistent within the next reconciler cycle."
      Without the bound, callers cannot reason about whether the data
      they're reading is authoritative for the decision they're
      about to make.

      Bug shapes we have hit:
        - Awareness graph staleness — the topic that surfaced this
          session. A memory recorded from a prior cluster session
          referenced a file path that had since been renamed. The
          stale memory was retrieved as authoritative; the
          recommendation was for code that no longer existed. The
          missing piece was the staleness contract: memories about
          repo state are stale-at-record-time and must be verified
          against current state before acting on them. The fix
          (project_stale_context_detection.md) IS the missing
          contract being added retroactively.
        - etcd watch lag: a service that writes a key and then
          immediately reads-via-watch expects to see its own write.
          The watched view may be lagging by tens to hundreds of
          milliseconds. Without a contract, the service makes
          decisions on stale state and silently corrupts.
        - gocql queries at consistency=ONE: reads may return values
          the writer hasn't yet propagated to other replicas.
          Acceptable when staleness is named (e.g., "this is OK for
          dashboard purposes; reconciliation uses LOCAL_QUORUM").
          Corrupting when assumed away.
        - doctor's installed_state observation: read from a Phase 2
          inventory updated every N seconds. Decisions on "is the
          cluster converged?" are correct only if N is named and
          the decision logic respects it. We had incidents where
          convergence verdicts were made on inventories that were
          older than the cycle the verdict was meant to cover.
        - DNS records: TTL is the staleness contract. Code that
          resolves and caches without TTL respect breaks during
          normal operations — the bind here is rare but lethal.

      The principle generalizes the database concept of "bounded
      staleness" (CosmosDB, Spanner) to anywhere caching or
      replication occurs in the system.
    enforcement: |
      Every data source that is NOT the authoritative writer must
      declare three properties:

        1. STALENESS BOUND — the max age at which the data can still
           be treated as authoritative. Expressed in time (seconds)
           or in source events (cycles, watch ticks, replication
           events).
        2. SOURCE-OF-TRUTH POINTER — where to refetch when the
           bound is exceeded or when authoritative-now is required.
        3. EXCEEDED BEHAVIOR — what to do when the bound is hit
           but no fresh data is available: refuse to serve, return
           a "stale" marker, escalate to the source, etc.

      Decision points must respect the bound:
        - "Current leader identity" needs ≤1 lease-tick staleness
          before quorum-affecting actions.
        - "Current installed version" needs ≤N reconciler cycles
          before "converged" verdicts.
        - "Current routable peers" needs ≤N etcd-watch ticks before
          dispatching cross-node work.

      Forbidden patterns:
        - "Eventually consistent" as a documented contract with no
          bound.
        - Serving cached values past the staleness window without
          marking the response as stale.
        - Treating any replicated or cached state as authoritative
          without naming its staleness profile.

      Tests: any code that consumes cached/replicated state must
      have a test that fixes the cache at the staleness boundary AND
      a test that pushes it past, asserting different (correct)
      behavior in each case.
    forbidden_fixes:
      - forbidden.eventually_consistent_with_no_bound
      - forbidden.serve_cached_value_past_staleness_window
      - forbidden.treat_replicated_state_as_authoritative_without_naming_staleness
    related_invariants:
      - meta.storage_is_not_semantic_authority
      - meta.identity_computation_must_be_invariant
      - meta.fallback_must_degrade_semantics
      - meta.end_to_end_check_is_the_only_truth

  - id: meta.partition_response_must_be_predeclared
    title: "An actor's response to network partition must be decided BEFORE the partition occurs — choosing in the moment is the bug"
    category: dependency
    antipattern: "If we get partitioned, we'll figure out what to do"
    wrong_instinct: A network partition is rare, so it feels reasonable to defer thinking about partition response until it happens. But partition response cannot be a runtime choice — different code paths under partition will choose differently, and the actor's behavior under partition becomes a function of which call site fired first. The CAP theorem isn't a permission to choose under fire; it's a forcing function to commit to a posture before the partition occurs so the system has consistent behavior under stress.
    severity: critical
    status: candidate
    summary: |
      Brewer's CAP theorem says that during a network partition, a
      system can serve consistent reads (CP) OR remain available (AP),
      not both. The principle here is the operationalization: every
      actor or service in the system MUST predeclare its partition
      response — what it will do when it can't reach its quorum, its
      coordinator, its peers, or its sources of authoritative state.

      "Predeclare" means the choice is encoded in the actor's design,
      visible in code and documentation, and consistent across every
      code path. NOT a runtime choice taken per-call by whichever
      function happens to fire first.

      Predeclared CP postures in our system:
        - etcd: refuses writes during partition; the operator
          accepts unavailability for consistency.
        - cluster_controller (when not leader): refuses state-changing
          RPCs and proxies to the leader; under partition with no
          leader, RPCs fail closed.
        - workflow service: refuses to dispatch when the actor
          endpoint can't be confirmed reachable; failure is loud.

      Predeclared AP postures:
        - MinIO erasure coding within tolerance: continues serving
          reads/writes while parts of the storage pool are
          unreachable.
        - DNS service: serves cached records past authoritative
          bound, marking responses as stale.
        - Day-0 bootstrap window: a deliberate "we are operating in
          a degenerate trust partition; we accept the loss of
          consistency for the bounded bootstrap period." This IS a
          predeclared partition response.

      The bug shape — UN-predeclared partition response:
        - cluster_doctor rules each handle "absent observation"
          differently. Some treat absence as known-down (AP-flavored
          choice); others as unknown (CP-flavored choice). The doctor's
          aggregate behavior under partition is a function of which
          rules fire — that's not a posture, it's accidental policy.
          (Fixed in objectstore.partial_snapshot_unknown_not_down,
          but the meta-principle was never stated.)
        - Reconciler decisions about "this node hasn't reported in N
          minutes" — different reconciler paths choose differently:
          some skip the node, some treat the absence as "needs
          repair." Same code base, inconsistent partition response.
        - Service mesh that proxies under partition: some routes
          fail loudly, some serve cached responses, some return
          empty results. The same partition produces different
          observable behavior depending on which URL the user hits.

      The principle: every actor must be able to answer the question
      "what does this actor do when it can't reach its dependencies?"
      with a single, documented, code-consistent answer.

      This is distinct from circular_dependency_must_have_break_glass:
      that principle is about deploy-time cycles. This is about
      runtime stress response. Both belong to Dependency because both
      are about what holds the system together when the graph between
      components is unreliable.
    enforcement: |
      Every actor (service, daemon, workflow handler) must have a
      DOCUMENTED partition posture, named in either:
        - Its top-of-file @awareness annotation
        - Its README or doc/services/<name>.md
        - The actor's gRPC service-level Doc string

      The posture must specify, for each dependency the actor
      consumes:
        1. CP vs AP under partition with that dependency
        2. What "unreachable" means concretely (timeout, error code,
           absence of heartbeat)
        3. What the actor returns to its callers under that partition
           (error code, stale data, refusal, degraded service)
        4. What state mutations are gated on the dependency's
           reachability

      Code review must verify:
        - All code paths under "dependency unreachable" produce
          consistent behavior matching the declared posture.
        - The posture is testable: there is a test that simulates
          the partition and asserts the declared behavior.

      Forbidden:
        - Different code paths for the same actor responding to the
          same partition with different postures.
        - "Best effort" responses with no declared posture — best
          effort is not a posture, it's an admission of incoherent
          design.
        - Defaulting to "serve cached data" or "treat as failed"
          based on accident-of-call-order rather than declared
          posture.
    forbidden_fixes:
      - forbidden.choose_partition_response_at_runtime
      - forbidden.different_code_paths_different_postures
      - forbidden.best_effort_response_without_declared_posture
    related_invariants:
      - meta.bounded_staleness_must_be_named_not_assumed
      - meta.timeout_is_a_decision_not_a_truth
      - meta.absence_scope_must_be_explicit
      - meta.circular_dependency_must_have_break_glass

  - id: meta.physical_clocks_disagree_use_logical_ordering
    title: "Physical clocks on different nodes never agree precisely — for causal ordering, use logical clocks; for total order, use consensus"
    category: authority
    antipattern: "Compare wall-clock timestamps to decide which event happened first"
    wrong_instinct: A timestamp feels like an unambiguous moment, so comparing two timestamps feels like determining which event came first. But the two timestamps come from two physical clocks that drift independently, and "first" by clock comparison can disagree with "first" by causality. Code that orders cross-node events by wall-clock timestamps will eventually corrupt — usually silently, occasionally catastrophically, always at the moment NTP corrects.
    severity: critical
    status: candidate
    summary: |
      Lamport's 1978 "Time, Clocks, and the Ordering of Events in a
      Distributed System" established the result that any system
      requiring distributed agreement on event ordering CANNOT rely
      on physical clock comparison. Physical clocks drift, get
      NTP-corrected, and disagree across nodes by amounts that
      routinely exceed the latency between the events being ordered.
      A timestamp produced on node A and a timestamp produced on
      node B cannot be reliably compared to determine which event
      happened first.

      The fix has three flavors depending on what kind of ordering is
      needed:

        1. CAUSAL ordering — "B depends on A, A must come first."
           Use logical clocks: Lamport timestamps, vector clocks,
           hybrid logical clocks (HLC), or correlation chains.
           etcd revisions and Raft (term, index) tuples are logical
           clocks. Workflow step dependsOn declarations are causal
           ordering at the design layer.

        2. TOTAL ordering — "every observer agrees on the sequence."
           Use a consensus log: etcd's mvcc store, Raft's commit log,
           Scylla's group 0. The cost of total order is the cost of
           consensus; for events that don't need total order, don't
           pay it.

        3. OBSERVATIONAL ordering — "this observer noticed A then B."
           Wall-clock timestamps are fine for THIS, because the
           observer's own clock is the ground truth for its own
           observations. But the result is local-only; cross-node
           comparison is forbidden.

      Bug shapes from our codebase:
        - Last-write-wins by physical timestamp: Scylla's default
          conflict resolution uses cell timestamps. When two nodes
          write the same key concurrently and their clocks are
          skewed, the "later" write (by clock) may have been the
          earlier write (by causality). Data loss is silent.
        - Cross-node event ordering: code asks "is heartbeat A
          newer than heartbeat B?" by comparing the embedded Unix
          timestamps. Each timestamp was generated by the heartbeat's
          source node. The comparison is meaningless unless the
          skew bound is known and accounted for.
        - Workflow run sequencing: if RunIDs were timestamp-prefixed
          and two controllers dispatched runs concurrently from
          different machines, the lexical RunID order would NOT
          correspond to dispatch causality. We use UUIDs + workflow
          recorder sequence numbers for this reason; the recorder's
          sequence is the logical clock.
        - "When did the certificate become valid?" — the NotBefore
          field is the issuer's clock at signing time. Verifiers on
          other nodes may see "not yet valid" because their clock
          is ahead, OR "expired" because their clock is behind. This
          is why we have the cert-skew-tolerance configuration.

      The principle generalizes: any decision that depends on the
      ordering of two events that originated on different nodes
      requires a logical clock, a consensus log, or a documented
      skew bound — never raw physical timestamps.
    enforcement: |
      Code that orders events must classify each event's source:

        - Same-node events: wall-clock timestamps from one clock,
          compared via that clock's own monotonic guarantee. Safe.
        - Cross-node events with causal dependency: must use a
          logical clock or correlation chain. etcd revisions and
          Raft (term, index) are the recommended primitives.
        - Cross-node events without explicit causality: cannot be
          ordered. Operations that depend on "which came first"
          must EITHER establish a logical ordering OR be designed
          to not require the answer (commutative operations, set
          semantics, last-writer-wins with version vectors).

      Forbidden patterns:
        - Reading two timestamps generated on different nodes and
          comparing them to decide ordering.
        - Using wall-clock timestamps as a sort key for distributed
          state without a skew bound or logical fallback.
        - "Last update wins" by physical timestamp without version
          vectors or HLC.
        - Treating Cassandra/Scylla cell timestamps as a causal
          clock; they are NOT one.

      Where physical timestamps must appear in records (audit logs,
      heartbeats, schedule rows), label them as OBSERVATIONAL — they
      tell you when the recording observer noticed something, not
      when the event happened in any cross-node sense.

      Test pattern: for any code that orders cross-node events, write
      a test that injects clock skew between the two sources and
      asserts the ordering logic produces a documented result —
      either correct (because logical clocks are in use) or refuses
      to answer (because raw comparison is not safe).
    forbidden_fixes:
      - forbidden.compare_cross_node_wall_clock_timestamps_for_ordering
      - forbidden.last_write_wins_by_physical_timestamp_without_version_vector
      - forbidden.assume_ntp_synced_clocks_for_distributed_decisions
    related_invariants:
      - meta.timestamp_is_an_observation_not_an_event_time
      - meta.clock_skew_invalidates_cross_node_time_comparison
      - meta.identity_computation_must_be_invariant
      - meta.competing_writers_must_converge_or_be_fenced

  - id: meta.timestamp_is_an_observation_not_an_event_time
    title: "A recorded timestamp is the observer's clock at moment of observation — not when the event actually happened"
    category: signal
    antipattern: "The record says it happened at T, so it happened at T"
    wrong_instinct: When a system records an event_time of 13-42-30, the natural reading is "the event occurred at that moment." But the field was written by a process — the observer — at the moment the observer NOTICED the event. The event may have occurred earlier; the observer may have been delayed; the storage system may have persisted the record at yet another moment. Treating the recorded timestamp as the event's actual time conflates three distinct moments and corrupts every reconstruction that depends on the difference.
    severity: critical
    status: candidate
    summary: |
      Every timestamp in a system has a producer — a clock running on
      a process at the moment of WRITE. The semantic the timestamp
      carries depends on which clock and what the writer was
      observing. There are at least four distinct moments the same
      record could mean:

        1. The EVENT's actual moment (when the thing happened in
           the world).
        2. The OBSERVER's moment (when a process noticed the event
           and recorded it).
        3. The TRANSPORT's moment (when the message containing the
           observation reached the next hop).
        4. The STORAGE's moment (when the record was committed to
           durable state).

      A field named `timestamp` or `created_at` without further
      qualification typically captures #2 or #4, almost never #1.
      Code that treats the recorded value as #1 will be wrong by
      whatever delay exists between #1 and the recording moment —
      which is unbounded in distributed systems.

      Pat Helland's framing: data records are MEMORIES. A memory
      carries the moment at which the memory was formed, not the
      moment of the event the memory is about. The two coincide
      only when the observer IS the actor that caused the event.

      Bug shapes from our codebase:
        - InstalledUnix / UpdatedUnix anchoring (memory note,
          INC-2026-0016): the proof writer anchored these fields to
          /proc/<pid> mtime — i.e. when the PROCESS started — not to
          wall-clock at install. That was the CORRECT design because
          the field needed to mean "when was this installation
          fingerprinted" not "when was this wall-clock moment." But
          earlier code had used wall-clock and produced permanent
          `service.old_pid_after_upgrade` findings. Same field name,
          two different observer clocks, two different semantics.
        - Workflow step receipts: `started_at` and `finished_at` are
          on the ACTOR's clock for actor-side events but on the
          RECORDER's clock for the recorder's own state changes.
          Cross-receipt comparisons that mix the two are unsound.
        - Cluster event emit-time: `emitClusterEvent(name, payload,
          ts)` captures the emit moment. The event subscribers see
          the timestamp and assume it's the moment the underlying
          condition was OBSERVED to be true; but the emit may lag
          observation by tens of milliseconds.
        - DNS record TTL expiration: NotAfter is the issuer's clock
          at signing; verifier's clock decides "expired now" —
          two different moments, possibly skewed.
        - Backup completion timestamps: the moment backup tool
          declared success vs the moment the underlying storage
          committed the last byte — different.

      The principle is NOT "never use timestamps." It's "every
      timestamp carries the observer's clock at the recording
      moment; consumers must not interpret it as another moment
      without explicit semantics."
    enforcement: |
      Every timestamp field in a schema or message must declare:

        1. WHICH CLOCK produced it (wall, monotonic, logical).
        2. WHICH OBSERVER recorded it (process, role, layer).
        3. WHAT MOMENT it captures (event, observation, transport,
           storage).
        4. WHAT THE CONSUMER may infer from it (causality only,
           bounded ordering with skew tolerance, observational-only).

      The declaration can live in proto field docs, schema comments,
      or @awareness annotations. Without it, the timestamp is a
      silent trap.

      Forbidden patterns:
        - Bare `timestamp` or `created_at` field with no semantic
          declaration in code that's consumed cross-process.
        - Treating a record's timestamp as the event's actual time
          when the event and the observer are different actors.
        - Cross-observer timestamp comparison without a documented
          skew bound.
        - Reconstructing a sequence of events purely from recorded
          timestamps when the events were observed by different
          processes.

      For event reconstruction (incident analysis, audit), each
      record must carry both the OBSERVER ID and the OBSERVATION
      moment, so reconstructors can map records back to a coherent
      timeline using whatever skew bound or logical clock is
      available.

      Tests for time-sensitive code must include a scenario where
      the observer's clock differs from the event source's clock,
      asserting the code's behavior is documented and intentional
      under that difference.
    forbidden_fixes:
      - forbidden.treat_recorded_timestamp_as_event_time
      - forbidden.reconstruct_timeline_from_cross_observer_timestamps
      - forbidden.unqualified_timestamp_field_in_distributed_schema
    related_invariants:
      - meta.physical_clocks_disagree_use_logical_ordering
      - meta.clock_skew_invalidates_cross_node_time_comparison
      - meta.assertions_must_carry_their_scope
      - meta.identity_computation_must_be_invariant

  - id: meta.clock_skew_invalidates_cross_node_time_comparison
    title: "Comparing timestamps from two nodes without a skew bound is structurally unsound — Spanner's TrueTime made this explicit by returning uncertainty intervals, not points"
    category: signal
    antipattern: "Both nodes use NTP, so their clocks agree closely enough"
    wrong_instinct: NTP keeps clocks within a few milliseconds of UTC, so comparing two NTP-synced timestamps feels like comparing two ground-truth values. But NTP's accuracy guarantee is statistical, not bounded — a node mid-sync can be off by hundreds of milliseconds; a node post-leap-second can be off by a full second; a node with a broken NTP daemon can be off by minutes. Code that compares timestamps without a documented skew bound is making decisions on an uncertainty interval it doesn't know exists.
    severity: critical
    status: candidate
    summary: |
      Google's Spanner introduced TrueTime as the operationalization
      of clock-uncertainty thinking. TrueTime returns not a moment
      but an INTERVAL — TT.now() = [earliest, latest]. Any operation
      that depends on "is A before B?" must compare the intervals,
      not the midpoints; if the intervals overlap, the question is
      structurally unanswerable without waiting for the uncertainty
      to clear.

      The principle generalizes: any code comparing timestamps from
      different nodes must either:
        (a) Know and respect the maximum skew bound between the
            two clocks (TrueTime-style: refuse to act when the
            uncertainty interval covers the question).
        (b) Use a logical clock instead (etcd revision, HLC,
            consensus log position).
        (c) Document the comparison as best-effort with explicit
            failure modes when skew exceeds expectations.

      Bug shapes we have hit or are at risk of:
        - Heartbeat freshness across nodes: doctor compares "node A
          heartbeat at T_A" with "node B heartbeat at T_B" to decide
          which is more recent. Both timestamps come from each
          node's own clock. Without a skew bound, the answer may be
          wrong by whatever the actual skew is. (Mostly mitigated
          because we use lease-keepalive semantics, but the
          comparison shape exists in collector code.)
        - TLS certificate validity: NotBefore/NotAfter come from
          issuer's clock at signing; the verifier on a different
          node makes the validity decision against its own clock.
          We've shipped clock-skew tolerance in pki code precisely
          because this principle held without us naming it.
        - Backup completion ordering: comparing "Backup X completed
          at T_X" with "Backup Y completed at T_Y" when X and Y ran
          on different nodes — answer depends on the skew, not the
          backups.
        - Audit trail reconstruction: an incident response that
          stitches together log entries from multiple nodes by
          their wall-clock timestamps. The reconstructed timeline
          is wrong by whatever the inter-node skew was during the
          incident — usually not catastrophic but routinely
          misleading.

      The principle says nothing controversial about single-node
      time. Wall-clock comparisons within a single process, against
      a single clock, are fine. The hazard is the moment a
      comparison crosses a process boundary without the skew
      ledger.
    enforcement: |
      Code that compares timestamps across processes or nodes MUST
      satisfy one of three contracts:

        1. SKEW-BOUNDED: the maximum drift between the two clocks
           is known (via NTP stratum, lease keepalive, or PTP) and
           the comparison logic accounts for it. Acceptable when
           the bound is tight relative to the decision's
           sensitivity.

        2. LOGICAL-CLOCK: the comparison uses a clock that doesn't
           depend on physical time — etcd revision, Raft (term,
           index), HLC, vector clock, monotonic-counter token. The
           wall-clock timestamps are observational metadata only.

        3. UNCERTAIN-INTERVAL: the comparison explicitly returns
           one of {definitely-before, definitely-after, can't-tell}
           and the caller handles the can't-tell case. This is the
           TrueTime pattern.

      Forbidden patterns:
        - Bare `if t_a.Before(t_b)` where t_a and t_b come from
          different nodes' clocks, with no skew adjustment.
        - "NTP keeps it within a few ms" assumption in code that
          makes consequential decisions on the comparison.
        - Timestamp-based deduplication keys for cross-node writes
          (two writers can produce the same "timestamp" within a
          millisecond — birthday paradox makes this likely).

      For new schemas storing distributed events, prefer (logical
      clock value, observer ID, observer wall-clock) as the
      timestamp triple. Logical clock orders; observer ID scopes;
      wall-clock provides human-readable context. The trio carries
      enough to reconstruct ordering without overclaiming.
    forbidden_fixes:
      - forbidden.cross_node_timestamp_compare_without_skew_bound
      - forbidden.timestamp_based_dedup_key_across_writers
      - forbidden.ntp_synced_means_clocks_agree_assumption
    related_invariants:
      - meta.physical_clocks_disagree_use_logical_ordering
      - meta.timestamp_is_an_observation_not_an_event_time
      - meta.authority_must_express_uncertainty
      - meta.binding_outlives_evidence_until_invalidated

  - id: meta.duration_versus_deadline_is_not_interchangeable
    title: "'Wait 30 seconds' and 'wait until 13:42:30' mean different things across restarts, pauses, and NTP corrections — the choice is semantic"
    category: lifecycle
    antipattern: "Duration and deadline are different ways of saying the same thing"
    wrong_instinct: A 30-second backoff and a 13:42:30 deadline computed as `now + 30s` look equivalent at the moment they're created. But they age differently — a duration restarts on resume, a deadline persists; a duration is immune to NTP correction, a deadline isn't; a duration depends on knowing "when did I start," a deadline depends on knowing "what time is it now." Code that stores one and interprets it as the other will be silently wrong at exactly the moment a restart or correction occurs.
    severity: critical
    status: candidate
    summary: |
      Time-bound state in a system can be encoded one of two ways:

        DURATION: "wait N units after time T₀." Stored as the unit
        count; the meaning depends on knowing when T₀ was. Restart-
        and-resume implies the duration counter restarts (the
        process forgot its T₀). NTP corrections don't shift the
        meaning (because the duration is relative to a remembered
        point).

        DEADLINE: "act at absolute time T₁." Stored as the wall-
        clock moment; the meaning depends on the current wall-
        clock matching some external truth. Restart preserves the
        deadline (T₁ is still T₁ on the wall clock). NTP correction
        shifts the meaning of "now," and may make the deadline pass
        in the past or jump forward.

      The two are semantically different. The choice between them
      is determined by what the code needs to be robust against:

        - Process restart, paused process, system suspend: use
          DEADLINE (the deadline persists across the gap).
        - Wall-clock jumps (NTP corrections, leap seconds, manual
          clock changes): use DURATION (the duration is anchored
          to a monotonic interval, not the wall clock).
        - Both: use DURATION expressed on the MONOTONIC clock
          (which doesn't jump) and also persist the absolute
          start moment so the policy survives restart.

      Storing a DEADLINE while writing code that interprets it as
      a DURATION, or vice versa, produces silent bugs at exactly
      the moments the discrepancy matters — restarts and
      corrections.

      Bug shapes from our codebase:
        - WF-DEFER backoff: the workflow defer record stores a
          backoff value. If stored as "retry after N seconds from
          now," a workflow service restart loses N and resumes
          incorrectly. If stored as "backoff until Unix T," a
          forward NTP correction makes the deadline pass instantly.
          WF-DEFER B3 settled on a hybrid: persist `backoff_until_ms`
          (deadline) for restart-safety AND a max-attempts
          ABANDONED gate so a perpetually-passing deadline
          eventually terminates the run.
        - Circuit breaker "open for 30 seconds": stored as
          `opened_at + 30s_duration` makes restart re-open the
          breaker for another 30 seconds (wrong — the cooldown
          should have been counted across the restart). Stored as
          `opens_until_ts` survives restart but is subject to wall-
          clock jumps.
        - Token TTLs: a token issued with "expires in 1 hour" is
          ambiguous — duration since issue, or deadline computed at
          issue? We standardized on absolute-deadline (`exp` claim
          in JWT spec) for cross-process consistency, but earlier
          code mixed the two.
        - Lease renewal: "renew the lease in 5 seconds" (duration,
          starts now) vs "renew before deadline T" (deadline,
          persists). etcd leases use deadlines for safety; some
          higher-level code accidentally treats them as durations.

      The principle is NOT "always use one." It's "the choice
      MUST be deliberate and the schema MUST make the choice
      legible."
    enforcement: |
      Every time-bound field in a schema, RPC, or workflow input
      must carry an unambiguous name:

        - `*_duration_seconds` or `*_after_ms` for DURATION
          semantics.
        - `*_until_unix` or `*_deadline_ms` for DEADLINE semantics.
        - Both, when the code needs to be robust to both restart
          and NTP correction.

      Forbidden patterns:
        - Field named bare `timeout` or `delay` without
          duration-vs-deadline disambiguation.
        - Storing a duration and computing `now + duration` at use
          time, without recording the start moment.
        - Storing a deadline computed at write time without
          considering wall-clock jumps that may invalidate it.
        - Mixing the two interpretations across processes that
          read the same field.

      For state that must survive process restart (defer records,
      circuit-breaker state, retry budgets, lease records), prefer
      DEADLINE expressed as an absolute moment, AND a max-attempts
      or max-elapsed-monotonic gate so the policy still terminates
      under wall-clock weirdness.

      For state that must be immune to wall-clock changes (rate-
      limiters, fairness counters), use DURATION on the monotonic
      clock — never on the wall clock.

      Tests for time-bound code must include both a "process
      restarts mid-wait" case and a "wall-clock jumps forward
      during wait" case, asserting documented behavior in each.
    forbidden_fixes:
      - forbidden.bare_timeout_field_without_semantic_qualifier
      - forbidden.duration_stored_without_start_moment_for_restart_safety
      - forbidden.deadline_stored_without_monotonic_terminator
    related_invariants:
      - meta.write_creates_completion_obligation
      - meta.bad_path_must_make_progress
      - meta.timestamp_is_an_observation_not_an_event_time
      - meta.bounded_staleness_must_be_named_not_assumed

  - id: meta.fail_safe_defaults_when_authority_is_uncertain
    title: "When the authority decision cannot be made, the default is REFUSE — never 'allow because we could not check'"
    category: authority
    antipattern: "If RBAC times out we let the request through so it does not break"
    wrong_instinct: A failed authorization check feels like a system problem, not a security problem — the user did nothing wrong, the RBAC service is just slow, so denying their request feels unfair. But "I could not verify your authority" is the SAFE direction precisely because the alternative is "I let in someone I cannot prove should be in." Default-allow turns every authorization-system failure into a silent escalation; default-deny turns it into a loud availability problem the operator notices and fixes.
    severity: critical
    status: active
    promoted_from_candidate:
      date: 2026-06-06
      reason: |
        Predicted role_binding_check.go fallback gap during the
        proactive review pass. The interceptor's RBAC fallback returned
        ALLOW if any locally-loaded role granted the method, bypassing
        the user's actual role restriction during any RBAC outage. The
        principle named the gap; partial mitigation landed (error
        preserved, metric+WARN log emitted) and the structural fix is
        tracked as a follow-up.
      first_predicted_bug:
        file: golang/interceptors/role_binding_check.go
        symbol: checkRoleBinding
        commit: pending
    summary: |
      Saltzer and Schroeder's 1975 paper "The Protection of
      Information in Computer Systems" gave eight design principles
      for secure systems. The second — fail-safe defaults — says that
      access decisions should be based on permission rather than
      exclusion, and the default situation should be lack of access.
      Operationalized: any code path where the authorization decision
      CANNOT be made must default to REFUSE.

      The principle catches the failure mode where availability
      pressure pushes the system toward allow-on-uncertainty. The
      logic feels reasonable per-incident — "the RBAC service is
      down, we cannot leave users locked out" — but it is the
      wrong default. The right default is loud availability failure;
      the operator then knows to fix the broken system, not silently
      let unverified principals in.

      Bug shapes from our codebase and adjacent literature:
        - RBAC interceptor under partition: when the policy service
          or its backing store is unreachable, the interceptor MUST
          deny. Allowing requests through "until RBAC comes back"
          is a silent escalation window. Our interceptor chain at
          golang/interceptors enforces this; the principle was
          never stated as meta.
        - JWT verification when the signing-key fetch fails: the
          token's claims cannot be trusted without verification.
          Allow-on-keyfetch-fail would mean any unsigned token is
          accepted during the failure window.
        - Bootstrap window: deliberately a relaxed-auth window, but
          BOUNDED and EXPLICIT. The principle is not violated by a
          bootstrap window; it would be violated by "we appear to
          still be bootstrapping, so allow." The window is gated by
          /var/lib/globular/bootstrap.enabled and a deadline.
        - Certificate chain validation timeout: a chain that cannot
          be validated must be rejected, not "trusted because the
          revocation server was slow."
        - mTLS handshake with an unknown peer: must terminate the
          connection. Allow-on-unknown-peer would defeat the entire
          mesh trust model.

      The principle is NOT "be paranoid about every request." It's
      "make the safe direction the DEFAULT, so that decisions to
      allow are deliberate and decisions to deny are automatic."
    enforcement: |
      Every authorization check must satisfy:

        1. The check returns one of {ALLOW, DENY, UNCERTAIN}.
        2. UNCERTAIN is treated identically to DENY by every
           consumer — there is no third "let it through" branch.
        3. The UNCERTAIN result is logged at sufficient severity
           that operators notice repeated occurrences (one failed
           check is noise; ten per second is an outage signal).
        4. Bootstrap or break-glass relaxation windows are EXPLICIT,
           BOUNDED, and AUDIT-LOGGED at the moment of relaxation,
           not silent defaults.

      Forbidden patterns:
        - if rbacErr is not nil then allow with a warning log.
        - Empty/missing token treated as anonymous and allowed past
          permission gates.
        - Cached "last known good" auth decision used past its
          staleness window (see authorization_check_is_a_snapshot).
        - Default-allow service accounts when role binding lookup
          fails.

      Tests for any authorization-handling code must include the
      case where the underlying authority service is unreachable,
      asserting that the check returns DENY and the system surfaces
      the failure to operators.
    forbidden_fixes:
      - forbidden.default_allow_on_authorization_service_error
      - forbidden.silent_anonymous_passthrough_on_missing_token
      - forbidden.cached_auth_decision_past_staleness
    related_invariants:
      - meta.authorization_check_is_a_snapshot_not_a_promise
      - meta.bounded_staleness_must_be_named_not_assumed
      - meta.bad_path_must_make_progress
      - meta.partition_response_must_be_predeclared

  - id: meta.authorization_check_is_a_snapshot_not_a_promise
    title: "An authorization decision is bounded by the moment it was made — the underlying authority can change before the action is taken"
    category: lifecycle
    antipattern: "We checked permissions at the start, so the long-running operation is good for the whole run"
    wrong_instinct: An authorization check feels like a transaction — it succeeds, and now you know the principal is allowed. But the check measured the state of permissions at the moment of measurement, not the state for the lifetime of the operation. Role bindings change, tokens get revoked, certificates expire, accounts get disabled. Code that treats a successful check as a permanent green light for the duration of an operation creates a window where the operation continues with permissions that have been revoked.
    severity: critical
    status: candidate
    summary: |
      Saltzer and Schroeder's third principle — complete mediation —
      states that every access to every object must be checked for
      authority, every time. Operationalized in modern systems: any
      authorization decision is a SNAPSHOT of permission state at
      the moment of the check; the snapshot becomes stale the
      instant the next change to the underlying authority occurs.
      The TOCTOU window is between the snapshot and the action.

      This principle has two halves that are both load-bearing:

        COMPLETE MEDIATION: every access checks permission. Caching
        an auth decision and reusing it across multiple accesses
        without revalidation skips checks that the principle says
        must happen. The cache is correct only as long as the
        underlying permission has not changed; absent invalidation,
        the cache becomes a liar.

        TOCTOU: even the check itself measures a point-in-time
        state. By the moment the authorized action executes, the
        state may have changed. For operations longer than the
        time between authority state changes, the check must be
        repeated at the action boundary.

      Bug shapes:
        - Cached RBAC results: a service caches "user X is allowed
          to call RPC Y" for performance. Admin revokes the binding.
          Service still answers ALLOW until the cache expires.
          The principle says either invalidate on binding change
          OR keep cache TTL short enough that staleness is bounded
          by acceptable risk.
        - Long-running workflows: a workflow run authorized at
          dispatch may execute steps hours later. If the principal's
          permissions are revoked mid-run, subsequent steps continue
          with revoked authority. Workflow steps that affect
          destructive state should re-check at the step boundary,
          not rely on dispatch-time authorization.
        - JWT verification once-per-connection: if a JWT is verified
          when the connection opens and never again, a revoked
          token continues being honored for the connection's
          lifetime. mTLS connections may persist for minutes; JWT
          claims for an hour. The mismatch is exploitable.
        - Certificate validity: NotAfter is the expiration deadline;
          if a long-running connection started before expiry and
          continued past, the binding is no longer authorized but
          the connection still serves requests. (See
          binding_outlives_evidence_until_invalidated.)
        - Service account permissions changed during a deploy:
          the deploy uses a service account with cluster-admin;
          the deploy pauses for review; permission is revoked
          during review; deploy resumes and still has admin
          because the resume code reuses the original token.

      The principle does NOT forbid caching — it forbids caching
      WITHOUT INVALIDATION. The cache must either subscribe to
      authority changes OR have a TTL bounded by the acceptable
      risk of staleness OR be revalidated at high-stakes action
      boundaries.
    enforcement: |
      Authorization caching is permitted with three conditions:

        1. EXPLICIT TTL — the cache entry has a maximum age past
           which it MUST be revalidated.
        2. INVALIDATION SUBSCRIPTION — when the underlying authority
           changes (role binding update, token revocation, cert
           rotation), the cache is invalidated synchronously.
        3. ACTION-BOUNDARY REVALIDATION — for destructive or
           irreversible operations, the cache is bypassed and a
           fresh check is performed regardless of TTL.

      Long-running operations (workflows, batch jobs, streaming
      RPCs) must declare which authority bindings persist through
      the operation and which must be revalidated at step
      boundaries.

      Forbidden patterns:
        - In-memory auth cache with no TTL, no invalidation
          subscription, and no revalidation.
        - JWT verified once at connection open, never re-verified
          across the connection's lifetime.
        - Long-running workflow trusting a dispatch-time token
          across destructive steps without re-checking the
          principal still holds the binding.
        - Reusing a token across a restart without checking
          whether the underlying authority is still bound.

      Tests for any authorization-cached code must include the
      case where the underlying binding is revoked between the
      cache write and the next read, asserting the cache is either
      invalidated, expired, or bypassed for the action.
    forbidden_fixes:
      - forbidden.permanent_auth_cache_without_invalidation
      - forbidden.long_running_op_trusts_dispatch_time_token_for_destructive_steps
      - forbidden.jwt_verified_once_per_connection_for_persistent_streams
    related_invariants:
      - meta.fail_safe_defaults_when_authority_is_uncertain
      - meta.binding_outlives_evidence_until_invalidated
      - meta.bounded_staleness_must_be_named_not_assumed
      - meta.identity_computation_must_be_invariant

  - id: meta.least_privilege_is_not_a_default_it_is_an_explicit_grant
    title: "Every actor's privileges must be explicit and minimal — the default for a new actor is NO privileges, not 'whatever was convenient at creation time'"
    category: authority
    antipattern: "It is easier to grant cluster admin and tighten later"
    wrong_instinct: Setting up a new service or AI actor with broad permissions feels efficient — you do not know yet which RPCs it will need, so granting more avoids breaking things. But the act of postponing privilege restriction is the act of leaving the default at "more than necessary." The "tighten later" never happens for the same reason scaffolding never gets removed; the broad permission becomes a load-bearing assumption other code grows to depend on. The principle says the SAFE default is zero, and every grant must be earned by an explicit need.
    severity: critical
    status: candidate
    summary: |
      Saltzer and Schroeder's sixth principle — least privilege —
      states that every program and every user should operate with
      the minimum set of privileges necessary to complete the job.
      Operationalized: the default state for any new actor (service
      account, AI agent, workflow step, scheduled task) is NO
      privileges; each privilege must be explicitly granted with a
      named reason and bounded scope.

      The principle is especially critical for actors with low
      friction to create — AI service accounts, scheduled jobs,
      automation hooks — because the cost of granting broad
      permissions feels lower than the cost of debugging the next
      "permission denied" error during development. The deferred
      tightening is a debt that compounds; the broad permission
      becomes structural because other code starts to depend on it.

      For our codebase, the principle interacts strongly with the
      AI service tier model:

        TIER 0 (OBSERVE): read-only diagnosis. Always safe; can be
        granted broadly across AI services because the worst case
        is information disclosure within an already-authorized
        scope.

        TIER 1 (AUTO_REMEDIATE): pre-approved scoped mutations
        (service restart, cache clear). Each Tier-1 action must
        be in an explicit allowlist named for the actor; "all
        Tier-1 actions" is not an allowlist.

        TIER 2 (REQUIRE_APPROVAL): destructive or out-of-band
        actions. Default grant for any actor is zero Tier-2; each
        action requires a human approval grant.

      Bug shapes:
        - Service account created with the union of all scopes the
          service "might need" — convenient at creation, dangerous
          at runtime because the actual scope used is a small
          subset of the granted scope, and the unused scopes are
          available to any code path that gets compromised.
        - AI executor scheduled task with cluster-admin because
          "we'll narrow it down later" — the narrowing-down PR
          never lands.
        - Workflow step that runs as the workflow service's
          identity, with full cluster scope, when the step only
          needs to write a single etcd key.
        - Test service accounts retained in production with broad
          access because rotating them is a separate cleanup task.

      The principle does NOT mean "audit every existing actor for
      least privilege right now" — that is a cleanup operation
      with its own cost. It means "every NEW actor starts at zero
      and gets explicit grants" so the new actors do not become
      the next round of legacy broad-scoped accounts.
    enforcement: |
      For every new actor (service account, AI service, workflow,
      scheduled task, automation hook):

        1. INITIAL STATE — zero privileges. The creation flow that
           grants any privilege must require the privilege to be
           NAMED.
        2. NAMED REASON — each grant carries a brief reason in the
           role binding metadata. "Needs to read /globular/services"
           is a reason; "for the X service" is not.
        3. BOUNDED SCOPE — privileges name resources, not
           wildcards, except where the wildcard is structurally
           necessary (e.g. "list all services" by definition
           cannot name each).
        4. PERIODIC REVIEW — privileges granted should have an
           expiration or review marker; permanent grants are
           reserved for foundational service accounts.

      For destructive actions, the AI executor's Tier 2 gate is
      the canonical implementation: the actor has the BINDING to
      request the action, but not the AUTHORITY to execute it
      without human approval.

      Forbidden patterns:
        - Default-grant of cluster-admin to any new service account.
        - Wildcard grants ("all RPCs on all services") without a
          named structural reason.
        - Reusing an existing broad-scoped account for a new actor
          rather than creating a new minimal one.
        - "Temporary" privilege escalations without an expiration.

      Tests for actor creation flows must include the case where
      the requested privilege exceeds the actor's documented need,
      asserting the system either refuses the grant or surfaces
      the gap as a finding.
    forbidden_fixes:
      - forbidden.default_cluster_admin_for_new_service_account
      - forbidden.wildcard_grant_without_named_structural_reason
      - forbidden.temporary_privilege_escalation_without_expiration
    related_invariants:
      - meta.fail_safe_defaults_when_authority_is_uncertain
      - meta.storage_is_not_semantic_authority
      - meta.absence_scope_must_be_explicit

  - id: meta.principal_must_survive_proxy_chains
    title: "When auth flows through a proxy, the downstream service must know WHO originated the request — not WHO proxied it"
    category: signal
    antipattern: "The gateway authorized the request, so the service can trust the gateway's principal"
    wrong_instinct: A gateway or sidecar that handles authentication feels like a natural boundary — once past the gateway, the request is trusted. But the gateway's identity is not the user's identity, and downstream services that authorize against the proxy's principal instead of the originating principal grant access to anyone the gateway proxies for. This is the confused deputy problem under a new name; it has been written about since the 1980s and keeps recurring because the proxy boundary FEELS like an authorization boundary, but the principal identity must traverse it intact.
    severity: critical
    status: candidate
    summary: |
      Hardy's 1988 description of the "confused deputy" problem
      named a failure shape that the security community has been
      rediscovering ever since: a privileged intermediary, asked
      to perform an action on behalf of a less-privileged
      principal, performs the action with its OWN authority rather
      than the principal's. The principal's identity was lost in
      transit; the action succeeds with the intermediary's broader
      access; security is silently breached.

      The modern shape in service-mesh and microservice architectures:

        - Gateway authenticates the user, then proxies to a backend
          service. The backend sees the gateway's identity (gateway
          mTLS cert) but not the user's identity. If the backend
          authorizes against "is this caller in the mesh," every
          user the gateway accepted gets full backend access.

        - Sidekick or supervisor process performs operations on
          behalf of multiple service tenants. If sidekick's identity
          is what backends see, sidekick becomes a confused deputy
          for any tenant it serves.

        - Workflow actor dispatching to a backend on behalf of a
          workflow run. The backend authorizes the workflow
          service's identity rather than the originating user's;
          any workflow can call any backend RPC the workflow
          service is broadly allowed to.

        - AI executor running an operator-requested action. The
          executor's identity has Tier 1 permissions; if the
          backend trusts the executor's identity without
          requiring the operator's principal to be presented, the
          executor becomes the confused deputy.

      The principle says the originating PRINCIPAL must be a
      first-class part of the authorization signal — present in
      RPC metadata, signed or transmitted via mTLS chain, and
      checked by the backend against its own authority records.
      The proxy's identity is metadata about the path the request
      took, not authority for the request.

      Audit-trail consequences: if the principal does not survive,
      the audit log names the wrong actor. Every recorded action
      attributes to the proxy, and the audit trail loses the
      ability to answer "who did this?"
    enforcement: |
      Every RPC handler that authorizes the caller must verify two
      identities:

        1. The TRANSPORT identity — the mTLS peer cert that
           established the connection. This identifies the
           IMMEDIATE caller (gateway, sidecar, peer service).
        2. The PRINCIPAL identity — the originating user, AI
           service, scheduled task, or operator on whose behalf
           the request was made. This identifies WHO the action
           authorizes against.

      The two must be checked together: the transport identity
      must be ALLOWED to make requests on behalf of principals,
      AND the principal identity must be ALLOWED to perform the
      requested action.

      Principal identity is propagated by:

        - Bearer tokens (JWT) that name the principal in the
          claims.
        - mTLS client certificates that name the principal in the
          subject or extension.
        - Signed RPC metadata in the gRPC headers (with a HMAC
          tied to the transport identity to prevent forgery).

      Forbidden patterns:
        - Backend authorizes against the gateway/sidecar identity
          and treats the request as "trusted" without checking
          the principal.
        - Audit log records the proxy identity as the actor.
        - Workflow actor authority is the workflow service's
          authority — without the dispatching principal's
          identity propagated.
        - AI executor performing actions against backends that
          trust the executor's identity rather than the requesting
          operator's.

      Tests for any RPC with a proxy in front of it must include
      a case where the proxy is compromised — assert that the
      backend's authorization decisions still depend on the
      principal, not on the proxy's identity.
    forbidden_fixes:
      - forbidden.authorize_against_proxy_identity_instead_of_principal
      - forbidden.audit_log_records_proxy_as_actor
      - forbidden.workflow_step_inherits_workflow_service_authority_without_originator
    related_invariants:
      - meta.fail_safe_defaults_when_authority_is_uncertain
      - meta.assertions_must_carry_their_scope
      - meta.identity_computation_must_be_invariant
      - meta.binding_outlives_evidence_until_invalidated

  - id: meta.observability_must_match_decision_horizon
    title: "The granularity and freshness of emitted signal must match the granularity and freshness of the decisions that depend on it"
    category: signal
    antipattern: "Emit one heartbeat per minute and use it to drive sub-second routing"
    wrong_instinct: Observability feels like a fixed property of a system — you set up Prometheus, you have metrics. But the cadence at which signals are emitted determines the cadence at which decisions can be made on them. Emit hourly and you cannot react sub-hourly; emit per-millisecond and you drown in volume the consumer cannot process. The cadence is not a back-end choice; it is a contract between the producer and every decision that depends on the data.
    severity: critical
    status: candidate
    summary: |
      The granularity at which a system emits signals and the
      freshness of those signals must match the granularity and
      freshness of the DECISIONS that consume them. Mismatch
      produces one of two failure modes:

        - UNDER-EMITTED: signals arrive too coarsely or too slowly
          for the decisions that need them; consumers operate
          blind and use heuristics, defaults, or stale snapshots
          to fill the gap. Decisions are wrong because the
          information needed to make them was never available.

        - OVER-EMITTED: signals arrive at higher resolution than
          any consumer needs; producers spend resources on volume
          that is then aggregated away or dropped on the floor.
          The expense is real; the value is zero. Worse, the
          volume often crowds out the signal a consumer DOES need.

      The cadence hierarchy emerges naturally from the decision
      hierarchy. In our cluster:

        - Per-second decisions (request routing, health probes):
          need sub-second signals. xDS handles this via streaming
          updates from the controller.
        - Per-5-second decisions (heartbeat freshness, leader
          lease): need 5-second signals. Node-agent heartbeats
          and etcd leases meet this.
        - Per-30-second decisions (drift reconciliation, infra
          quorum checks): need 30-second signals. The reconciler
          loop runs at this cadence and consumes signals from
          slower sources accordingly.
        - Per-60-second decisions (cluster-wide findings, doctor
          rules): need 60-second signals. cluster_doctor's
          collector cadence matches.

      The hierarchy is correct precisely because each layer's
      cadence matches the cadence of decisions it serves. If we
      had heartbeats at 5s and drift reconciliation at 5s but
      doctor rules at 1s, the doctor would be blind to its own
      input cadence — running 12 times per data point. If
      heartbeats were per-minute and reconciliation per-second,
      the reconciler would always be acting on stale data.

      Bug shapes:
        - Sub-second routing decisions made on per-minute health
          probe data: requests routed to a peer that became
          unhealthy 45 seconds ago.
        - Doctor rules fired on signals that update slower than
          the rule cadence: the same finding emitted N times
          before the underlying data could possibly have changed.
        - Logs at DEBUG level for every per-request decision
          flooding storage: the actual signal is buried in volume.
        - Metrics scraped every 15s used for circuit-breaker logic
          that needs to react in 100ms: the breaker cannot
          respond fast enough.

      The principle is a contract between producer and consumer.
      Either side that changes its cadence without renegotiating
      breaks the contract; either side that ignores the cadence
      breaks the contract silently.
    enforcement: |
      Every signal emitted by the system must carry an implicit
      or explicit cadence contract. Producers state how often
      they emit and at what granularity; consumers state what
      decisions they make on the signal and the freshness they
      require.

      Where the producer and consumer cadences mismatch:
        - PRODUCER FASTER than consumer needs: aggregate at the
          consumer boundary, not at the producer; emit at full
          rate so other consumers can use the signal at higher
          fidelity.
        - PRODUCER SLOWER than consumer needs: either the
          decision must be re-scoped to match the available
          cadence (most common correct fix) OR the producer
          must increase emission rate (requires renegotiating
          producer resource budget).

      Forbidden patterns:
        - Decisions made at a cadence faster than any input
          signal updates.
        - Aggregation at the producer that destroys signal needed
          by other consumers (see metric_aggregation_destroys_
          actionable_signal).
        - Log levels chosen to "have data when we need it" without
          considering storage cost or query velocity.
        - Polling intervals chosen by convention rather than by
          decision-horizon analysis.

      Tests for any code that consumes time-varying signal must
      include the case where the signal cadence is slower than
      assumed, asserting the code degrades to a documented
      response (refuse to decide, escalate to a slower decision,
      return stale-flagged data) rather than acting on stale data
      as if it were fresh.
    forbidden_fixes:
      - forbidden.fast_decision_on_slow_signal_without_staleness_check
      - forbidden.high_volume_emit_without_consumer_for_full_rate
      - forbidden.cadence_chosen_by_convention_not_decision_analysis
    related_invariants:
      - meta.bounded_staleness_must_be_named_not_assumed
      - meta.feedback_loop_must_be_faster_than_drift
      - meta.metric_aggregation_destroys_actionable_signal
      - meta.diagnostic_output_must_be_bounded

  - id: meta.feedback_loop_must_be_faster_than_drift
    title: "A control loop running slower than the drift it is meant to correct will oscillate or diverge — never converge"
    category: lifecycle
    antipattern: "We reconcile every 5 minutes and that should be enough"
    wrong_instinct: A reconciler that runs periodically feels like it eventually catches up. If something drifts, the next tick will detect and correct. But control theory has a hard result on this — if the disturbance rate exceeds the correction rate, the system either oscillates around the target without converging, or diverges away from it. The reconciliation cadence is not a configuration choice; it is a stability condition.
    severity: critical
    status: candidate
    summary: |
      Classical control theory: for a feedback system to converge
      on a target, the loop's response time must be FASTER than
      the disturbance rate of the system being controlled. If the
      disturbance arrives faster than the loop can correct, the
      system either:

        - OSCILLATES, with each correction overshooting because
          the loop sees stale state at decision time;
        - DIVERGES, with each correction lagging behind a moving
          target that has already moved further.

      In neither case does the system converge to the desired
      state. The disturbance rate and the loop frequency are
      coupled by Nyquist-style sampling logic — the loop must
      sample at least twice as fast as the highest frequency
      disturbance to track it. Slower than that, and the loop
      will alias the disturbance into apparent stability while
      the actual state drifts.

      Operationalized in our codebase:

        - Drift-reconciler at 30s cadence vs drift detection that
          happens on every state change: the reconciler must run
          fast enough that the average time-to-correction is
          less than the time-between-disturbances. The IIFE fix
          to drift-reconciler yesterday (defer fires per-iteration)
          was this principle being applied without naming —
          the loop body must close over its own iteration so
          each tick is independent.

        - cluster_doctor rules at 60s vs invariant violations
          that can occur in seconds: when a violation persists
          for less than 60s, the doctor never sees it — the
          system has an unobservable window in which any state
          can transit unseen. We accept this for low-severity
          rules but design the rule cadence to be faster than
          the state-of-concern cadence for critical rules.

        - Workflow defer backoff exponential: each retry interval
          must be SHORTER than the average time the underlying
          condition takes to change. If the backoff is 30s and
          the condition typically clears in 10 minutes, the
          retries are wasted; if the backoff is 30s and the
          condition typically clears in 5 seconds, the retries
          run too often.

        - Heartbeat at 5s vs lease at 15s: the heartbeat must
          come at a fraction of the lease so a single missed
          heartbeat does not expire the lease. The ratio is the
          system's resilience to transient network glitches.

      Bug shapes:
        - Reconciler at 5min for drift that occurs every 30s: the
          loop never catches up; the system shows persistent
          drift that mysteriously "resolves itself" between
          observation windows.
        - Circuit breaker re-evaluation slower than the failure
          rate: the breaker stays open while the underlying
          system is healing and breaking and healing again.
        - Backup verification at 24h cadence on a backup window
          that completes in 6h: 18 hours of "verified" status
          while a partial backup sits undetected.
    enforcement: |
      For every reconciler, scheduler, or control loop:

        1. Identify the DISTURBANCE RATE — how often the
           controlled state changes in normal operation.
        2. Identify the LOOP FREQUENCY — how often the loop
           executes.
        3. Verify the loop frequency is AT LEAST 2x the
           disturbance rate (Nyquist condition).
        4. Where the loop must be slower (cost, fanout,
           coordination), DOCUMENT the maximum disturbance rate
           the loop can track and surface as a finding when the
           system exceeds it.

      For loops that aggregate across multiple workers (foreach,
      parallel reconciliation), the effective frequency per
      controlled element is `loop_freq / element_count` — slower
      than the raw loop frequency. The disturbance-to-loop ratio
      must account for fanout.

      Forbidden patterns:
        - Reconciler cadence chosen for operator convenience
          (every minute, every 5 minutes) without measuring the
          actual disturbance rate.
        - Loop body that does not close over its own iteration
          (the IIFE-wrap fix from 2026-06): defer in a for-loop
          body without IIFE wrap fires once at function return,
          not per-iteration.
        - Aggregation in the loop that batches across iterations
          and effectively divides the per-element frequency.
        - Loops whose cadence depends on input volume in a way
          the operator cannot predict.

      Tests for any control loop must include the case where the
      disturbance rate exceeds the loop's tracking capability,
      asserting the system either reports the overload (good)
      or degrades gracefully (acceptable) rather than silently
      drifting (forbidden).
    forbidden_fixes:
      - forbidden.reconciler_cadence_slower_than_disturbance_rate
      - forbidden.defer_in_for_loop_without_iife_wrap
      - forbidden.loop_aggregation_that_dilutes_per_element_frequency
    related_invariants:
      - meta.bad_path_must_make_progress
      - meta.observability_must_match_decision_horizon
      - meta.write_creates_completion_obligation
      - meta.failure_response_must_contract_not_amplify

  - id: meta.alert_must_name_a_violated_invariant_not_a_crossed_threshold
    title: "Alerts that fire on numerical thresholds produce noise during normal spikes and silence during creative failures — alerts should name failed invariants"
    category: signal
    antipattern: "Alert when CPU is over 90%"
    wrong_instinct: A threshold alert (CPU > 90, error rate > 5%, latency > 200ms) feels like a defined condition — when the number crosses the line, something is wrong. But the threshold encodes only ONE failure shape — the one whose symptom is that specific number. Real failures take infinite shapes; healthy load spikes produce the same number. The threshold confuses symptom with cause and produces noise during normal operation and silence during anything novel.
    severity: critical
    status: candidate
    summary: |
      An alerting system based on numerical thresholds has two
      structural failure modes:

        FALSE POSITIVES during normal operation. Load spikes,
        legitimate batch jobs, planned maintenance, and seasonal
        variation all cross the same thresholds healthy systems
        sometimes hit. Operators learn to ignore the alerts
        because the alerts are usually wrong. This is the
        alert-fatigue death spiral.

        FALSE NEGATIVES during creative failures. Real
        production failures rarely match the failure shape the
        threshold was tuned for. A cache becoming silently
        corrupt does not raise CPU. A connection pool exhaustion
        does not raise error rate. The threshold misses the
        novel failure entirely.

      Both failure modes follow from treating threshold-crossing
      as the signal. The crossing is at best a SYMPTOM of an
      underlying invariant violation; the invariant is what
      actually matters.

      Compare with INVARIANT-BASED alerting:

        - The SLO budget is exhausted (the system promised X%
          availability; the budget for the period is gone).
        - The convergence target is unreachable (the system
          promised to converge a release; observation N cycles
          later still shows drift).
        - The dependency declared unavailable (RBAC's own health
          probe returned NOT_SERVING; the dependency is not
          slow — it is broken).
        - The 4-layer state model is violated (repository says
          version X, desired says X, installed says X, runtime
          shows binary Y).

      Each of these is a violation of a stated promise. The
      alert is not "I noticed a number" but "the system is no
      longer true to its contract." The operator's response is
      to the violation, not to the noise.

      cluster_doctor's findings model IS this principle in
      action. Each finding names an invariant and the evidence
      that the invariant was violated. Findings are not "metric
      X crossed threshold Y" — they are "rule R reports state
      cannot be true given evidence E." That is invariant-based
      alerting at the layer it belongs.

      Bug shapes we have hit:
        - Alerts on raw CPU/memory/disk percentages that fired
          during legitimate workloads (training jobs, large
          backups) and got muted.
        - Latency alerts at fixed thresholds that produced false
          positives on initial startup (cold caches) and false
          negatives during gradual degradation (latency creeping
          up over weeks).
        - Error-rate alerts that missed creative failures where
          the error rate stayed flat but the success semantics
          had drifted (request succeeded but returned wrong data).

      The principle does NOT forbid metrics. Metrics are the
      input to invariant evaluation. The principle forbids
      treating threshold-crossings as the OUTPUT of the
      alerting system; the output must be invariant violations
      with evidence.
    enforcement: |
      Alerting policy in any new code:

        1. NAME the invariant the alert protects ("availability
           SLO held over the rolling 30-day window", "every
           required node converges within the release deadline",
           "RBAC's own health probe must succeed").
        2. The metric is the EVIDENCE supporting the invariant
           check, not the alert condition itself. Alert fires
           when the invariant FAILS, not when the metric crosses.
        3. The alert payload names BOTH the invariant and the
           evidence, so the operator's first question — "what
           promise was broken?" — has an answer in the alert
           message.
        4. If you cannot name the invariant the alert protects,
           the alert should not exist. Threshold-based alerting
           without an invariant is operator noise.

      Migration from existing threshold alerts:
        - For each existing threshold, identify the invariant
          it was meant to protect.
        - Rewrite the alert in invariant terms; the threshold
          becomes part of the evidence calculation.
        - Where no invariant exists, EITHER define one and tie
          the alert to it OR delete the alert.

      Forbidden patterns:
        - Alerts whose definition is "metric X > Y for N
          seconds" with no named invariant.
        - Alert payloads that report the number without
          naming the broken promise.
        - "Symptom alerts" intended to fire on any unusual
          behavior; these become noise because behavior is
          never not-unusual.

      Tests for any new alerting code must assert that the
      alert names a specific invariant and that the invariant
      is documented in the awareness graph.
    forbidden_fixes:
      - forbidden.threshold_alert_without_named_invariant
      - forbidden.alert_payload_reports_metric_not_promise
      - forbidden.symptom_alert_on_unusual_behavior
    related_invariants:
      - meta.observability_must_match_decision_horizon
      - meta.metric_aggregation_destroys_actionable_signal
      - meta.assertions_must_carry_their_scope
      - meta.silence_is_not_valid_for_unexpected

  - id: meta.metric_aggregation_destroys_actionable_signal
    title: "Aggregation summarizes; aggregation also destroys — the individual events that contained the actionable signal are gone"
    category: signal
    antipattern: "We have p99 latency, we know what is slow"
    wrong_instinct: A summary statistic feels like a complete answer — p99 latency tells you the slow tail, error rate tells you the failure rate, throughput tells you the load. But aggregation discards every property of the individual events that did not contribute to the summary number. The p99 tells you SOMETHING is slow; the outlier requests tell you WHAT. If only the aggregate survives, the operator has a number to watch but not a problem to fix.
    severity: critical
    status: candidate
    summary: |
      Aggregation is information loss by design. A histogram
      preserves shape but loses identities of contributing
      events. A counter preserves total but loses per-event
      attribution. A gauge preserves current value but loses
      history. The information loss is the point — aggregates
      are cheap to store and fast to query precisely because
      they are smaller than the events that produced them.

      The cost: every property of the individual events that
      was not preserved by the aggregate is gone. Was the p99
      latency caused by a specific user? A specific request
      type? A specific backend version? A specific geographic
      region? If the aggregate did not preserve those
      dimensions, the operator cannot ask.

      Charity Majors' framing (the observability community):
      metrics tell you SOMETHING is happening; structured
      events tell you WHAT happened. Metrics are the smoke
      detector; events are the fire investigation. Both have
      uses; conflating them produces systems where operators
      know the smoke is real but cannot trace it to the fire.

      For our codebase:
        - Prometheus metrics (rates, histograms, gauges) tell us
          the cluster is in a degraded state. They cannot tell
          us WHICH artifact failed verification, WHICH node
          stalled, WHICH workflow ran past its budget.
        - cluster_doctor findings are the events — each finding
          names the affected resource, the rule that fired, the
          evidence that supported the firing. The aggregate
          (count of findings) is useful for trending; the
          individual finding is what the operator acts on.
        - The doctor's evolution from "metrics with thresholds"
          to "findings with evidence" was this principle being
          applied retroactively. The metrics did not become
          wrong; they became insufficient.

      Bug shapes:
        - A spike in p99 latency that turned out to be one
          user's bulk-export request: the aggregate hid the
          attribution, the operator spent days chasing a
          systemic cause that did not exist.
        - An error rate alert that turned out to be ONE
          backend dying: the rate aggregated across all
          backends so the dead one did not show until the
          rate exceeded the threshold for all healthy ones
          combined.
        - A backup-completion-rate metric that masked
          per-backup failures: backups were 99% complete
          because most succeeded; the 1% that failed had
          specific identities the metric could not name.

      The principle is NOT "do not use aggregates." Aggregates
      are useful and cheap. The principle is "where the
      decision depends on the IDENTITY of the contributing
      events, the aggregate is insufficient — you must also
      preserve the events."
    enforcement: |
      For every metric emitted, ask:

        1. What decision does this metric drive?
        2. Does the decision need to know WHICH events
           contributed, or just HOW MANY?
        3. If WHICH, the metric is insufficient — the system
           must also emit identifying events (structured logs,
           findings, traces) with the dimensions the decision
           needs.
        4. The metric becomes a SUMMARY of the events; the
           events are the ground truth for any investigation.

      Pattern for new observability code:
        - HIGH-VOLUME, LOW-CARDINALITY events get metric
          aggregation (request counts, error totals).
        - LOW-VOLUME, HIGH-VALUE events get structured events
          with all relevant dimensions (failures, findings,
          security events, state transitions).
        - The boundary between the two is determined by the
          decision horizon: if the operator will ever ask
          "which one?", the event must exist.

      Forbidden patterns:
        - Counting failures without recording which ones.
        - Latency histograms without trace sampling that
          preserves the slow requests' identities.
        - Coverage metrics that aggregate across artifacts
          without preserving the failing artifact identities.
        - Aggregated "system health" scores that do not name
          which subsystem contributed each deficit.

      For new metrics: define the structured event that
      supports the metric BEFORE defining the aggregate; the
      aggregate is derived from the events, not standalone.

      Tests for any new aggregate-emitting code must include
      a case where one identifiable event is responsible for
      the entire aggregate, asserting the system can recover
      the identifying event from logs, findings, or traces.
    forbidden_fixes:
      - forbidden.aggregate_metric_without_underlying_events
      - forbidden.system_health_score_without_per_subsystem_attribution
      - forbidden.high_cardinality_metric_labels_to_compensate_for_missing_events
    related_invariants:
      - meta.observability_must_match_decision_horizon
      - meta.alert_must_name_a_violated_invariant_not_a_crossed_threshold
      - meta.assertions_must_carry_their_scope
      - meta.diagnostic_output_must_be_bounded
