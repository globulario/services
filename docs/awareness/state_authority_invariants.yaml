# State authority invariants
#
# These invariants encode the principle that each layer of system truth has a distinct
# authority and must not be inferred from a different layer. They are derived from first
# principles and are validated by Globular production incidents.
#
# Origin classes used below:
#   principle       — deducible from first principles before any incident
#   globular_incident — observed in production; very high confidence
#
# These invariants are intentionally project-agnostic. Any operator-grade distributed system
# must respect them.

invariants:

  - id: state.runtime_not_desired
    title: Runtime health must never be inferred from desired state
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      Desired state expresses intent: what the operator wants the system to do.
      Runtime state expresses observed reality: what is actually running and healthy.
      The two are independent. A service may be desired but not installed. It may be
      installed but not running. It may be running but unhealthy. Any code path that
      reads desired state and draws a conclusion about runtime health is wrong.
    enforcement: |
      Code that renders health indicators, status badges, or availability signals
      must read from the runtime authority (systemd, health-check RPC, live probe).
      It must never read from desired state, desired release records, or install
      workflow completions as a substitute for runtime evidence.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/node_agent/node_agent_server/runtime_proof.go
    forbidden_fixes:
      - forbidden.runtime_from_desired
      - marking_available_from_local_success_only
      - assume_installed_means_running
    required_tests:
      - TestRuntimeStatus_NotDerivedFromDesiredState
      - TestDesiredEnabled_DoesNotImplyHealthy
    related_failure_modes:
      - fm.industry.partial_failure_hidden_by_global_green

  - id: state.installed_not_catalog
    title: Installed state must never be inferred from repository catalog availability
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      The repository catalog records what packages exist and can be installed.
      The installed-state record in etcd records what is actually installed on a node.
      Catalog presence is a necessary but not sufficient condition for installation.
      Any code path that concludes a service is installed because its artifact exists
      in the catalog is wrong. The node-agent must write the installed-state record
      after successful installation; the controller must read that record, not the catalog.
    enforcement: |
      Install status must be read from /globular/nodes/{node_id}/packages/{kind}/{name}
      (installed-state in etcd). It must never be inferred from repository catalog
      availability, BOM membership, or workflow dispatch alone.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/node_agent/node_agent_server/installed_services.go
    forbidden_fixes:
      - marking_available_from_local_success_only
      - mark_release_available_from_local_success
    required_tests:
      - TestInstalledState_NotDerivedFromCatalog
      - TestBOMMembership_DoesNotImplyInstalled

  - id: workflow.success_requires_backend_confirmation
    title: UI or CLI success must require backend/workflow confirmation
    severity: high
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      A command dispatch or button click is not proof that the requested operation
      completed. Operations that mutate cluster state — installing packages, changing
      topology, upgrading services, applying configuration — must go through a workflow.
      The workflow must reach a terminal state (SUCCEEDED or FAILED). Success must not
      be reported to the user until the workflow terminal state is observed or, for
      async operations, a durable accepted receipt is confirmed.
    enforcement: |
      gRPC RPCs that trigger workflows must return an accepted status, not a success
      status. Callers — CLI, frontend, MCP tools — must poll or stream workflow status
      and report terminal state to the user. Early-return success after dispatch is
      explicitly forbidden.
    protects:
      files:
        - golang/workflow/workflow_server/step_receipts.go
        - golang/cluster_controller/cluster_controller_server/workflow_invariant.go
    forbidden_fixes:
      - forbidden.optimistic_destructive_success
      - marking_available_from_local_success_only
    required_tests:
      - TestWorkflowDispatch_ReturnsAccepted_NotSuccess
      - TestCLI_ReportsTerminalWorkflowState

  - id: objectstore.partial_snapshot_unknown_not_down
    title: Missing inventory in a partial objectstore snapshot must be treated as unknown, not known-down
    severity: critical
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      When the cluster-doctor or any diagnostic tool collects an objectstore health snapshot,
      the collector may have incomplete data: not all node inventory records may be present.
      A node absent from a partial snapshot means the collector did not receive that node's
      record — it does not mean MinIO is down on that node. Treating absence as known-down
      causes false quorum-loss findings, incorrect remediation proposals, and operator alarm
      fatigue. The correct classification for an absent node record is UNKNOWN.
    enforcement: |
      Objectstore health rules must distinguish between:
        PRESENT      — NodeRecord received and health confirmed
        UNKNOWN      — NodeRecord absent from snapshot (collector gap, not proven down)
        KNOWN_DOWN   — NodeRecord present and explicitly reports unhealthy/unreachable
      Only KNOWN_DOWN nodes count toward quorum loss findings.
      DataIncomplete snapshots must emit a caveat, not a quorum-loss finding.
    protects:
      files:
        - golang/cluster_doctor/cluster_doctor_server/rules/objectstore_physical_overlap.go
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
    forbidden_fixes:
      - forbidden.partial_snapshot_false_quorum_loss
    required_tests:
      - TestObjectstoreQuorum_AbsentNodeIsUnknownNotDown
      - TestObjectstoreQuorum_PartialSnapshot_EmitsCaveat
      - TestObjectstoreQuorum_KnownDown_StillCountsForLoss
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot

  - id: ops.vip_requires_observed_owner
    title: VIP ownership must be proven from runtime evidence, not assumed from topology or package expectations
    severity: high
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      The cluster VIP (keepalived floating IP) is owned at runtime by exactly one node at any
      moment, determined by VRRP negotiation. No configuration record, desired-state entry, or
      package installation record proves that keepalived is active or that the VIP is held by
      any specific node. Treating a node as VIP-holder without runtime evidence leads to wrong
      routing, certificate SAN mismatches, and cascading failures when the VIP moves. The VIP
      holder must be identified from etcd /globular/ingress/v1/status/{node_id} or from a live
      VRRP probe — never from package-installed records or node profiles alone.
    enforcement: |
      Any code that must know the current VIP holder must read
      /globular/ingress/v1/status/{node_id} and look for the MASTER state.
      Never assume a node holds the VIP because its profile includes 'gateway'
      or because globular-keepalived is installed on it.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/state.go
        - golang/node_agent/node_agent_server/internal/actions/keepalived.go
    forbidden_fixes:
      - forbidden.vip_without_runtime_proof
    required_tests:
      - TestVIPHolder_DerivedFromRuntimeStatus_NotProfile
      - TestVIPHolder_ReflectsActualMaster
    related_failure_modes:
      - fm.globular.vip_transition_cascade

  - id: network.no_loopback_escape_for_cluster_identity
    title: Cluster identity, TLS SAN validation, and service routing must not be bypassed with localhost or 127.0.0.1
    severity: critical
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      Replacing a cluster DNS name, node IP, or VIP with localhost or 127.0.0.1 to work
      around a TLS, DNS, SAN, or routing failure hides the root cause without fixing it.
      It creates a single-node illusion that breaks when the client or the target service is
      on a different physical node. It also bypasses Envoy/gateway routing, RBAC enforcement,
      and mTLS identity — making the cluster less secure and less observable.
      The only acceptable use of localhost is for etcdctl pointing to a local etcd instance
      and for the local DNS resolver entry in resolv.conf.
    enforcement: |
      All inter-service gRPC calls must use FQDN endpoints resolved from etcd.
      All listener bind addresses must use 0.0.0.0, not 127.0.0.1.
      If a TLS or SAN error occurs, fix the certificate or the DNS record —
      never switch to loopback as a workaround.
    protects:
      files:
        - golang/config/endpoint_resolver.go
        - golang/netutil/node_identity.go
    forbidden_fixes:
      - forbidden.localhost_dns_bypass
    required_tests:
      - TestInterServiceCall_UsesResolvedFQDN_NotLoopback
      - TestListenerBind_Uses0000_NotLoopback

  - id: runtime.desired_enabled_not_alive
    title: Desired-enabled state must not be used as proof that a service is alive
    severity: critical
    status: active
    # origin: { type: globular_incident, confidence: very_high }
    summary: |
      A DesiredService record with enabled=true means the operator wants the service to run.
      It says nothing about whether the service process is currently alive, healthy, or
      responsive. Multiple production incidents recorded services stuck in INSTALLING or
      DEGRADED while their desired state showed enabled. Probing desired state to answer
      "is it running?" returns a stale intent, not a live observation.
    enforcement: |
      Liveness and health checks must probe the runtime layer: systemd unit state,
      the gRPC health RPC, or a live socket connect. Desired state records may be
      read to understand intent; they must never substitute for a live probe when
      the question is about current availability.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/cluster_doctor/cluster_doctor_server/rules/installed_state_runtime_mismatch.go
    forbidden_fixes:
      - forbidden.runtime_from_desired
      - assume_installed_means_running
      - skip_systemd_health_check_if_installed
    required_tests:
      - TestServiceLiveness_UsesRuntimeProbe_NotDesiredState
    related_failure_modes:
      - fm.industry.partial_failure_hidden_by_global_green
      - fm.industry.missing_inventory_misclassified_as_down

  # ── Generative meta-principles ────────────────────────────────────────────────
  # These are not individual rules — they are the generating functions from which
  # all specific authority invariants below (and in authority_rules.yaml) can be
  # derived. An AI agent that internalizes these can reject violations even when
  # no specific invariant has been written for the exact case yet.
  #
  # Origin: Dave + Claude, 2026-06-04. Derived from first principles, production
  # incidents, and codebase audit.
  #
  # Categories (each is a different kind of thinking):
  #   authority  — "who owns this truth, and is this code that owner?"
  #   signal     — "is the truth arriving intact, or degraded/silent/absorbed?"
  #   lifecycle  — "will this operation complete, and will I know if it doesn't?"
  #   dependency — "what breaks if a non-critical thing fails?"

  - id: meta.storage_is_not_semantic_authority
    title: "Storage is not semantic authority — truth belongs to the owning actor, not the backing store"
    category: authority
    antipattern: "I can see the data so I own it"
    wrong_instinct: Having etcd access feels like having authority — but access is not ownership
    severity: critical
    status: active
    summary: |
      A shared datasource (etcd, ScyllaDB, MinIO, local files) is only a source
      of durable record. It is not automatically the source of truth. Truth belongs
      to the actor that owns the semantic meaning of the state.

      Before reading or writing state, classify:
        1. What layer does this state belong to?
        2. Which actor owns this truth?
        3. Which typed RPC/API is the allowed read path?
        4. Which typed RPC/API is the allowed write path?
        5. What is the canonical source of identity?
        6. Is the value mutable, immutable, observed, derived, or canonical?

      If the code is not the owning actor, the access is architecturally wrong —
      regardless of whether a specific invariant exists for that case yet.

      Non-owner actors must not read another actor's backing store and call the
      result truth. They must ask the owning actor through its typed API.
      Non-owner actors must not write another actor's backing store, even for repair.
      Admin/CLI/MCP/tests/migrations obey the same boundaries — "admin" means
      authorized to call the owner, not authorized to bypass ownership.

      If the correct owner/API does not exist yet, stop and design the smallest
      owner-mediated API. Do not patch around with direct storage access.
    enforcement: |
      Every code path that reads or writes shared state must be traceable to the
      owning actor's typed API. Direct storage access by non-owners is an
      architectural violation. Temporary exceptions require an explicit allowlist
      entry with a named migration target. The allowlist must shrink over time.
    forbidden_fixes:
      - forbidden.direct_store_read_as_truth
      - forbidden.direct_store_write_for_repair
      - forbidden.admin_bypass_ownership
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.globular.vip_transition_cascade

  - id: meta.fallback_must_degrade_semantics
    title: "Fallback must degrade semantics — a fallback that returns the same shape as truth will be mistaken for truth"
    category: signal
    antipattern: "Return something rather than nothing"
    wrong_instinct: Helpfulness over honesty — returning a value feels better than returning an error, but a fake value propagates silently
    severity: critical
    status: active
    summary: |
      Fallbacks may preserve availability, but they must not preserve the illusion
      of certainty. A fallback value must not return through the same field/type/shape
      as canonical truth unless explicitly marked as degraded, observed, approximate,
      stale, or uncertified.

      Every fallback result must expose: source of the value, whether it is canonical,
      confidence/status, and what canonical source was unavailable.

      A fallback must never silently upgrade itself into identity, intent, proof,
      or authority. When a function returns "" for a missing cluster_id, or 0 for a
      missing build_number, the caller cannot distinguish "canonical answer is empty"
      from "couldn't reach the owner." The type is the same, so the lie propagates.
    enforcement: |
      Fallback return paths must use a distinct type, wrapper, or status field that
      the caller can inspect. Returning zero-values or empty strings through the
      same type as canonical truth is forbidden when the source is a fallback.
    forbidden_fixes:
      - forbidden.unknown_as_healthy
      - forbidden.missing_inventory_as_down

  - id: meta.authority_must_express_uncertainty
    title: "Authority must express uncertainty — if the owner cannot say 'unknown', callers will turn silence into lies"
    category: signal
    antipattern: "Empty is a valid response"
    wrong_instinct: Simplicity over precision — returning an empty proto feels clean, but callers can't tell absence from error
    severity: high
    status: active
    summary: |
      If an owning actor cannot express "unknown," "stale," "degraded," "conflict,"
      "not canonical," or "source unavailable," callers will manufacture certainty
      from silence.

      Owner APIs must distinguish: not found (canonical absence), not observed,
      unknown, stale, degraded, conflict, canonical source missing, permission
      denied, in progress, and corrupt/unverifiable. Never collapse these into
      empty results, zero values, or success with partial data.
    enforcement: |
      Owner RPCs must return explicit status codes or status fields that distinguish
      absence from uncertainty. Callers must propagate uncertainty — never silently
      resolve it to a concrete value.
    related_failure_modes:
      - fm.industry.partial_failure_hidden_by_global_green
      - fm.industry.missing_inventory_misclassified_as_down

  - id: meta.absence_scope_must_be_explicit
    title: "Absence scope must be explicit — 'not found where' is not the same as 'does not exist'"
    category: signal
    antipattern: "Not found means doesn't exist"
    wrong_instinct: Confusing one view with all views — a cache miss or replica miss is not proof of global absence
    severity: high
    status: active
    summary: |
      "Not found" is not a fact until the system says where it looked and who owns
      existence. A cache miss, local file miss, replica miss, index miss, or stale
      view miss does not prove global absence.

      Any absence result must declare: scope searched, source queried, owner of
      existence, freshness of the view, whether the result is canonical, and whether
      other replicas/sources may still contain the object.
    enforcement: |
      Code that acts on "not found" must verify the scope of the lookup before
      concluding non-existence. A single-replica miss must not trigger deletion,
      re-creation, or failure escalation that assumes global absence.
    forbidden_fixes:
      - forbidden.partial_snapshot_false_quorum_loss
      - forbidden.missing_inventory_as_down
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.industry.missing_inventory_misclassified_as_down

  - id: meta.identity_computation_must_be_invariant
    title: "Identity computation must be invariant — one field, one meaning, one canonical computation, everywhere"
    category: authority
    antipattern: "Same field name means same thing"
    wrong_instinct: Trusting the type without checking the computation — checksum at publish and checksum at verify can be different computations behind the same name
    severity: critical
    status: active
    summary: |
      Identity-bearing fields (checksum, build_id, version, installed_hash,
      desired_hash, timestamp anchor) must have exactly one semantic meaning
      and one canonical computation. The computation must be the same at every
      point where the field is produced, compared, or verified.

      This is a different class of bug than ownership violation. Here the
      authority is correct — the right actor wrote the field. The store is
      correct. The type checks. But the field stopped meaning one thing because
      different contexts compute it differently.

      Example: entrypoint_checksum at publish time = sha256(artifact bytes).
      At verify time on the node = sha256(installed binary path). If anything
      transforms the bytes between publish and install, the same field name
      now means two different computations. The verifier says "mismatch" for
      a correctly installed binary, or worse, says "match" for a corrupted one.

      A missing canonical identity is a finding, not permission to fabricate
      a replacement from a secondary observation. A field with a stable type
      and unstable meaning is a loaded trap.

      For every identity value, define:
        1. The subject it identifies
        2. The field that stores it
        3. The actor allowed to produce it
        4. The canonical computation/source
        5. Its lifetime and immutability rule
        6. The verification path (must use the same computation as production)
    enforcement: |
      Identity fields must be produced by exactly one computation. Any code
      that compares, verifies, or acts on an identity field must use the same
      canonical computation that produced it. If a transformation occurs between
      production and verification (packaging, relocation, wrapping), the
      identity must be recomputed after transformation by the owning actor —
      never by the verifier independently.
    forbidden_fixes:
      - forbidden.recompute_identity_at_verification
      - forbidden.fabricate_identity_from_secondary_observation
    related_failure_modes:
      - fm.globular.vip_transition_cascade
      - fm.industry.floating_address_used_as_durable_identity

  - id: meta.write_creates_completion_obligation
    title: "Every write is a promise — an unfinished promise is a blockage"
    category: lifecycle
    antipattern: "Write and move on"
    wrong_instinct: Fire and forget feels efficient — but a blocking record without a cleanup path becomes a permanent stall
    severity: critical
    status: active
    summary: |
      When code writes a state record (etcd key, Scylla row, convergence record,
      lock, status entry), it creates an obligation. Either the same actor completes
      the lifecycle, or there is an explicit sweep that clears stale records, or
      the record has a TTL. Half-written state that nobody owns the cleanup for
      becomes a permanent stall.

      Before writing a blocking record, verify:
        1. Who completes or clears this record?
        2. Is the cleanup edge-triggered (on next event) or level-triggered (periodic sweep)?
        3. What happens if the completing event never arrives?
        4. Is there a circuit-breaker or TTL?

      Known violations in this codebase:
        - writeCriticalKeyBlock: NO cleanup function exists at all
        - writeRuntimeDepBlock: sweep exists but was edge-triggered only (INC-2026-0005)
        - DownloadArtifact refill: state transitions silently ignored (_ = transition)

      Known good examples:
        - ConvergenceCommitter: atomic txn — write + cleanup in same etcd op
        - Workflow defer B3: durable counter + Abandoned flag + ClearOnSuccess
    enforcement: |
      Every function that writes a blocking record must have a corresponding
      cleanup path (explicit delete, sweep, or TTL). Code review must verify
      the cleanup path exists before approving the write.
    forbidden_fixes:
      - forbidden.write_blocking_record_without_cleanup
      - forbidden.edge_triggered_cleanup_only_for_blocking_records
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot

  - id: meta.half_done_must_not_look_done
    title: "Half-done must never look done — intermediate state must not satisfy completeness predicates"
    category: lifecycle
    antipattern: "One field is enough to check"
    wrong_instinct: Premature optimization of predicates — checking artifact_state without manifest_json feels sufficient, but a partial write satisfies the single-field check
    severity: critical
    status: active
    summary: |
      When a multi-step operation is interrupted, the intermediate state must be
      distinguishable from the terminal state. If a skip/completeness predicate
      cannot tell the difference between "done" and "half-done," every interruption
      becomes permanent.

      Before writing a completeness check, verify:
        1. Does this check ALL required fields, not just one?
        2. Can a partial write (step 1 done, step 2 not) satisfy this predicate?
        3. Is there an explicit intermediate state that the predicate rejects?
        4. On retry, does the code resume from the intermediate state?

      Known violations in this codebase:
        - canSkipDueToExistingState checked artifact_state but not manifest_json (INC-2026-0012)
        - CLI installServiceTgz writes unit files but not .sha256 sidecar

      Known good examples:
        - canSkipInstallPackage: checks version + build_id + checksum + active unit
        - needsSelfHostedInstalledStateRefresh: 7 independent checks, ALL must be true
        - promoteToPublished: 4-step state machine with explicit intermediates
    enforcement: |
      Completeness predicates must check ALL fields that a complete operation
      would have written. A single-field check on a multi-field write is a
      violation. State machines must have explicit intermediate states that
      skip predicates reject.
    forbidden_fixes:
      - forbidden.single_field_completeness_check_on_multi_field_write

  - id: meta.silence_is_not_valid_for_unexpected
    title: "Silence is not a valid response to the unexpected — unhandled cases must fail closed"
    category: lifecycle
    antipattern: "Default is safe"
    wrong_instinct: A no-op default feels harmless — but a silently skipped switch case means the system stops making progress without anyone noticing
    severity: high
    status: active
    summary: |
      When a switch/dispatch does not match, the default must be an explicit
      error or escalation — not a no-op. Silent discard of an unrecognized case
      is how a system stops making progress without anyone noticing.

      Before writing a dispatch, verify:
        1. Does the switch have a default case?
        2. Does the default log the unexpected value?
        3. Does the default return an error or escalate?
        4. If the default falls back to a "safe" behavior, is that behavior documented?

      Known violations in this codebase:
        - applyPatchToAppStatus: no default case, silent no-op on unknown SetFields
        - applyPatchToInfraStatus: no default case (caused INC infra retry bug)
        - lookupResolvedEntrypointChecksum kind switch: unknown kind silently defaults to SERVICE
        - lookupResolvedEntrypointChecksum type switch: no default for new release types
        - classifyPackageConvergence: unknown systemd state silently becomes RuntimeUnknown

      Known good examples:
        - applyPatchToSvcStatus: default logs canary phrase + returns false
        - resolveResumeAction: logs unknown policy before fallback
    enforcement: |
      Switch statements on state/status enums in dispatch or state-machine code
      must have a default case that logs the unexpected value. Silent no-op
      defaults in release pipeline routing are forbidden.
    forbidden_fixes:
      - forbidden.silent_default_in_state_dispatch
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot

  - id: meta.critical_path_no_non_critical_dependency
    title: "The critical path must not depend on non-critical services — a dependency you don't need will kill you on the recovery path"
    category: dependency
    antipattern: "One more RPC won't hurt"
    wrong_instinct: Convenience over resilience — adding a repository call to heartbeat feels useful, but when the repository is down the heartbeat dies too
    severity: critical
    status: active
    summary: |
      A critical function (heartbeat, leader liveness, connection establishment)
      must not pick up a dependency on a non-critical service (repository, event
      bus, analytics, monitoring). When the non-critical thing fails, it takes
      down the critical path — not by crashing, but by blocking, flooding, or
      silencing.

      Before adding a call to a critical path, ask:
        1. Can this function complete its job if the callee is down?
        2. Does this call have a bounded timeout that won't stall the caller?
        3. Can a failure in this call cascade into the critical path?
        4. Is this call necessary for the critical function, or just convenient?

      Incidents:
        - Power outage: heartbeat Phase 3 called repository → hung when ScyllaDB down → nodes unreachable 45 min
        - Zombie leader: event service disconnect → emitClusterEvent floods → CPU starvation → heartbeats freeze
        - VIP cert: grpc.WithBlock() swallowed x509 errors into timeout → 16h silent outage
    enforcement: |
      Heartbeat, leader liveness, and connection establishment paths must have
      zero dependencies on non-infrastructure services. Any RPC in a critical
      path must have a bounded timeout and must not block the caller on failure.
    forbidden_fixes:
      - forbidden.add_rpc_to_heartbeat_critical_path
      - forbidden.unbounded_dial_in_critical_path

  - id: meta.competing_writers_must_converge_or_be_fenced
    title: "Distributed actors doing the same job must converge, not compete — two writers with different state will fight until one wins by accident"
    category: authority
    antipattern: "Everyone should reconcile independently"
    wrong_instinct: Redundancy feels safe — but uncoordinated redundancy is a fight where timing decides the winner, not correctness
    severity: critical
    status: active
    summary: |
      When multiple actors can write the same state, and they have different
      views of truth, the last writer wins — and the last writer is determined
      by timing, not correctness. This is different from "who owns the truth"
      (meta.storage_is_not_semantic_authority) — here both actors believe they
      are the owner.

      Before allowing multiple writers, ask:
        1. Can two instances of this actor run simultaneously?
        2. If they disagree, who wins? Is the winner the most correct, or the most recent?
        3. Is there a leader gate, priority ordering, or consensus mechanism?
        4. What happens during a leadership transition?

      Incidents:
        - Let's Encrypt cert: 3 controllers ran domain reconciler independently → dell overwrote ryzen's success with error
        - DNS flickering: 3 DNS reconcilers with different in-memory state → records appeared/disappeared
        - INFRASTRUCTURE overwrites SERVICE: two installed-state records for same package, wrong iteration order → stale won
        - Dell's 0.0.1 controller grabbed leader → downgraded entire cluster
    enforcement: |
      Reconcilers that write shared state must be leader-gated. When multiple
      records can exist for the same entity (e.g. INFRASTRUCTURE and SERVICE kind
      for the same package), there must be a deterministic priority order.
      Non-leader instances must return early without touching state.
    forbidden_fixes:
      - forbidden.reconciler_without_leader_gate
      - forbidden.multiple_kind_records_without_priority_order

  - id: meta.connection_errors_must_not_be_absorbed
    title: "Errors must not be silent on connection paths — a connection error absorbed into a timeout is an invisible outage"
    category: signal
    antipattern: "Timeouts are normal"
    wrong_instinct: Generic wrappers feel robust — but grpc.WithBlock() turning a TLS mismatch into "context deadline exceeded" hides the real error for hours
    severity: high
    status: active
    summary: |
      Connection-establishment code absorbs specific errors (TLS mismatch,
      wrong key, unreachable host) into generic timeouts or nil values. The
      caller sees "timeout" or "nil" — the same shape as "slow network" or
      "not initialized yet." The specific error is lost, and the outage
      becomes invisible.

      Before using a connection wrapper, ask:
        1. Does this wrapper (grpc.WithBlock, context.WithTimeout) preserve the specific error?
        2. Can the caller distinguish "TLS failed" from "host slow"?
        3. If the connection fails silently, how long until someone notices?
        4. Is there a pre-flight check that surfaces the real error?

      Incidents:
        - VIP cert: grpc.WithBlock() swallowed x509 errors → "context deadline exceeded" for 16 hours
        - Auth token: GenerateServiceToken errors silently swallowed → all auth failed with no visible error
        - ScyllaDB late-connect: nil scylla handle stayed nil forever — no retry, no error, no recovery
    enforcement: |
      Connection paths must surface specific errors before falling back to
      timeouts. Pre-flight checks (TLS validation, auth probe) should run
      before the generic dial wrapper. Nil handles from failed initialization
      must be retried, not cached permanently.
    forbidden_fixes:
      - forbidden.absorb_tls_error_into_timeout
      - forbidden.cache_nil_handle_permanently

  - id: meta.circular_dependency_must_have_break_glass
    title: "Every circular dependency must have a break-glass path that doesn't go through the cycle — a system that deploys itself must have a path that doesn't go through itself"
    category: dependency
    antipattern: "The pipeline will fix itself"
    wrong_instinct: Trust in the normal path — when repository is broken, deploying a fix through the repository feels like the right path, but the cycle is stuck
    severity: critical
    status: active
    summary: |
      When A depends on B and B depends on A, the normal operational path
      forms a cycle. When either component breaks, the normal path through
      the other can't fix it — the cycle is stuck. This is the chicken-egg
      problem: the deploy pipeline can't deploy a fix for itself, the
      controller can't dispatch a fix for the controller, the repository
      can't publish a fix to the repository.

      Every circular dependency must have a documented break-glass path
      that operates OUTSIDE the cycle. The break-glass must:
        1. Not go through the broken component
        2. Verify identity (checksum against manifest) before applying
        3. Be bounded and audited (not an open-ended bypass)
        4. Return to the normal path once the cycle is unbroken

      Before introducing a dependency, ask:
        1. Can this service update/fix itself through its own infrastructure?
        2. If that infrastructure is broken, what's the recovery path?
        3. Does the recovery path go through the broken component?
        4. Is there a documented break-glass that bypasses the cycle?
        5. Has the break-glass path been tested?

      Incidents:
        - INC-2026-0013: repository v1.2.110 couldn't deploy v1.2.116 through itself — bridge via scp from CI binary
        - INC-2026-0014: controller missing expected_sha256 couldn't deploy fix through its own dispatch — bridge again
        - Workflow YAML sync: controller v1.2.119 needed new YAMLs deployed by its own pipeline — manual cp
        - Day-0 bootstrap: etcd needed for config, config in etcd; ScyllaDB needed for workflows, workflows for ScyllaDB join; PKI needed for gRPC, gRPC for PKI issuance
    enforcement: |
      Every self-referential deploy path (service that publishes/installs itself)
      must have a documented break-glass recovery procedure. The bridge pattern
      (scp verified binary from healthy peer, manual install, return to normal
      pipeline) is the canonical break-glass. Hot-deploying locally-built binaries
      is NOT a valid break-glass — no ldflags means checksum mismatch means the
      cycle breaks again.
    forbidden_fixes:
      - forbidden.hot_deploy_local_binary_as_break_glass
      - forbidden.bypass_cycle_with_direct_storage_write
    related_failure_modes:
      - fm.globular.vip_transition_cascade

  - id: meta.failure_response_must_contract_not_amplify
    title: "Failure response must contract, not amplify — retry, re-enqueue, and re-emit must be bounded, or the response becomes the outage"
    category: lifecycle
    antipattern: "Retry harder"
    wrong_instinct: Persistence feels like resilience — but unbounded retry under failure consumes the resources that recovery needs
    severity: critical
    status: active
    summary: |
      When something fails, the system's natural response is to retry, re-enqueue,
      re-emit, or respawn. If that response is unbounded, it amplifies the original
      failure into a cascade. The system doesn't die from the error — it dies from
      its own reaction to the error.

      The correct response to sustained failure is contraction: do LESS, not more.
      Circuit breakers, backoff, semaphores, rate limits, staggered re-enqueue.
      The system must preserve resources for recovery, not burn them on retries
      that can't succeed.

      Before adding a retry or re-enqueue, ask:
        1. If this call fails, how many retries will fire?
        2. Is there an upper bound on concurrent retries?
        3. Does the retry rate increase or decrease under sustained failure?
        4. Can the retry mechanism itself consume the resources needed for recovery?
        5. Is there a circuit breaker that stops retrying and waits?

      Incidents:
        - Zombie leader: event disconnect → fire-and-forget goroutines → 1000 concurrent retries → CPU starvation → heartbeats freeze
        - Reconcile storm: controller restart → 30 releases re-enqueued simultaneously → workflow overwhelmed → cascade timeouts
        - Doctor amplification: INC-2026-0004 — per-node findings emitted as cluster events → 100+ events/min for stable findings
        - Dep-block cycling: FAILED→PENDING→FAILED with no backoff → infinite dispatch loop
    enforcement: |
      Every retry path must have a circuit breaker or bounded backoff. Fire-and-forget
      goroutines on error paths are forbidden — each one must be tracked and bounded.
      Re-enqueue after failure must be staggered, not simultaneous. Event emission
      must be deduplicated against a delta cache.
    forbidden_fixes:
      - forbidden.unbounded_retry_on_transient_failure
      - forbidden.fire_and_forget_goroutine_on_error_path
      - forbidden.simultaneous_reenqueue_after_restart

  - id: meta.diagnostic_output_must_be_bounded
    title: "Diagnostic output must be bounded — one error must not become N records, or the diagnosis becomes a harder failure than the disease"
    category: lifecycle
    antipattern: "Log everything for debugging"
    wrong_instinct: Observability feels always good — but unbounded logging under sustained failure fills the disk, and disk full kills services that were perfectly healthy
    severity: critical
    status: active
    summary: |
      When an error repeats, the system's diagnostic output (logs, events,
      convergence records, audit entries) grows proportionally. If the output
      is unbounded, a sustained error fills a shared resource — disk, etcd
      quota, memory, event bus. The resource exhaustion is a HARDER failure
      than the original error: a login bug is fixable, but a full disk kills
      everything including the tools you'd use to fix the login bug.

      This is distinct from meta.failure_response_must_contract_not_amplify:
      that principle bounds the system's ACTIVE response (retry, re-enqueue).
      This principle bounds the system's PASSIVE output (log, emit, record).
      Both are needed — a circuit breaker on retries doesn't help if each
      retry also writes 10 log lines.

      Before adding logging or event emission to an error path, ask:
        1. If this error repeats 1000 times, how many records are written?
        2. Is there a rate limit on output under sustained failure?
        3. Can this output exhaust a shared resource (disk, etcd, memory)?
        4. Does the first occurrence carry enough context, or does repetition add info?
        5. Is there a "same error, count++" pattern instead of "same error, log++"?

      Incidents:
        - Doctor amplification: 100+ events/min for stable per-node findings (INC-2026-0004)
        - etcd NOSPACE: convergence records piling up from repeated failed dispatches
        - Crash-loop services filling systemd journal → disk full → cascade to healthy services
        - Login error loop → log line per attempt → disk exhaustion
    enforcement: |
      Error-path logging must use rate-limiting (log first occurrence + count,
      not every occurrence). Event emission must be deduplicated against a delta
      cache. Convergence records must overwrite (deterministic action ID), not
      accumulate. Shared resources (disk, etcd) must have usage alerts that fire
      before exhaustion.
    forbidden_fixes:
      - forbidden.unbounded_logging_in_error_loop
      - forbidden.event_emit_without_dedup_cache
      - forbidden.convergence_record_accumulation_without_overwrite

  # ── Round-2 candidate principles ──────────────────────────────────────────────
  # Origin: Dave + Claude, 2026-06-05. Derived from retroactive classification of
  # 103 failure_modes against the original 14 principles. Patterns surfaced:
  #   - meta.identity_computation_must_be_invariant was hitting 20+ failures
  #     across 4 distinct sub-flavors → spawn structure_must_not_be_stripped
  #   - meta.absence_scope_must_be_explicit had no positive twin → broaden via
  #     assertions_must_carry_their_scope (covers BOTH positive and negative)
  #   - Approval/bootstrap staleness wasn't named anywhere → spawn
  #     binding_outlives_evidence
  #   - "Drift to plan mode" — the discipline against in-process multi-step
  #     mutations bypassing workflow — had no principle anchor → spawn
  #     state_mutations_must_be_durably_committed
  # status=candidate: each principle needs (a) re-classification of failure
  # modes to confirm pull-rate, (b) a code-side audit run to confirm it
  # predicts bugs the original 14 didn't catch. Promote to active only when
  # both gates pass.

  - id: meta.structure_must_not_be_stripped_in_projection
    title: "Meaning lives in structure — a value projected down to its primitive shape carries the lie of universality"
    category: authority
    antipattern: "Just give me the value"
    wrong_instinct: A primitive type feels universal — but the scope/subject/source the value lived inside is part of what it meant; stripping it leaves a shape the consumer reads as global truth
    severity: critical
    status: candidate
    summary: |
      Every value lives inside a structure that gives it meaning: a subject
      (identity-of-WHAT), a source (which canonical registry it came from),
      a generation marker. The bare primitive — bool, string, sha256, int —
      is a projection that preserves the shape while discarding the structure.
      Consumers downstream read the shape as universal: an entry-point
      checksum becomes a bundle checksum, an inlined kind-list becomes the
      catalog, a hardcoded list of platforms becomes the platform truth.

      This is the sibling of meta.fallback_must_degrade_semantics. That one
      covers fallback paths returning canonical shapes. This one covers
      NON-fallback paths — identity passing, catalog reading, type erasure —
      doing the same harm by other mechanisms.

      Two enforcement flavors fall under this principle:

        a. Subject-aliasing projection — every cross-boundary identity uses
           a typed wrapper or a field name that includes its subject
           (entrypoint_checksum, not just checksum). Fallback paths must
           REFUSE to substitute one subject's identity for another's; the
           caller of an empty-identity must observe its emptiness, not
           silently get someone else's identity.

        b. Catalog-inlining projection — when a canonical registry exists,
           hardcoded copies in code are forbidden. Test fixtures may use
           literals; production code must read the registry.

      Before passing a value across a boundary, ask:
        1. What structure is this value carrying its meaning in?
           (subject name, registry reference, generation counter)
        2. Does the receiver's type carry that structure?
        3. Is the projection an aliasing (subject collapsed) or an inlining
           (registry reference collapsed)?
        4. Could the consumer mistake the projected shape for a wider truth
           than the producer observed?

      Known violations (subject-aliasing):
        - node_agent.install_package_aliases_convergence_hash_into_expected_sha256
        - node_agent.installer_download_aliases_entrypoint_as_bundle_hash
        - controller.apply_package_missing_expected_sha256_blocks_verified_install
      Known violations (catalog-inlining):
        - runtime.command_package_false_positive
        - repository.sync_silently_drops_noarch_artifacts
        - filesystem.service_runtime_dir_naming_drift
        - xds.infra_preparing_loop_from_kind_mismatch
      Known good:
        - artifact_state split into PipelineState + PipelineUnknown sentinel
        - canonicalServiceName helper centralized name normalization
        - package kind canonical registry pattern (session_package_kind_truth)
    enforcement: |
      Every cross-boundary value must preserve the structure that gives it
      meaning. Subject-aliasing requires typed wrappers or disambiguating
      field names; catalog-inlining is forbidden in production code when a
      registry exists. The two flavors have distinct fix shapes but share
      one root: don't let the shape outlive the structure.
    forbidden_fixes:
      - substitute_convergence_hash_for_binary_checksum_when_latter_empty
      - alias_bundle_sha_into_entrypoint_sha_variable
      - inline_catalog_membership_list_in_production_code
      - hardcode_package_kind_classification_outside_canonical_registry

  - id: meta.assertions_must_carry_their_scope
    title: "Every assertion — positive or negative — carries the scope of its truth; aggregation without naming the scope is a lie"
    category: signal
    antipattern: "OK is OK, missing is missing"
    wrong_instinct: A passing check feels universal, an absent record feels final — but every observation lives in a scope (which node, which moment, which tenant); stripping the scope strips the truth
    severity: critical
    status: candidate
    summary: |
      Both "I see X" and "I don't see X" are scoped observations. The
      scope is part of the truth. A consumer that reads the observation
      without the scope can mistake local for global, instance for cluster,
      moment for forever.

      This principle subsumes meta.absence_scope_must_be_explicit by
      extending its rule to positive assertions. The mechanism is the
      same: aggregation that strips the scope-tag produces a value whose
      shape looks global but whose evidence was local. Once this principle
      is promoted to active, meta.absence_scope_must_be_explicit becomes
      its negative-half sub-rule.

      Before reading or emitting any health/proof/observation:
        1. What is the scope of the observation (node, instance, moment,
           tenant)?
        2. Does the consumer's question match that scope, or are they
           asking a wider question and reading this answer as authoritative
           for it?
        3. Is the scope a field on the value or a comment the caller has
           to remember?
        4. Does aggregation strip the scope without naming itself?

      Known violations (positive scope):
        - cluster.cross_node_file_drift
        - controller.non_leader_heartbeat_false_positive
        - doctor.cache_poisoning_from_node_scoped_findings
        - install.desired_state.invisible_service
      Known violations (negative scope — previously covered):
        - critical_state.absent_key_interpreted_as_stop
        - fm.globular.objectstore_partial_snapshot
        - awareness.degraded_source_sentinel_collapsed_to_critical
        - dnsprovider.internal_topology_leak_via_public_dns_publish
      Known good:
        - cluster_doctor split lookup-cache (any scope) from delta-authority
          (cluster-wide only) — commit c574dfe5
    enforcement: |
      Every health/proof/verdict/finding value carries an explicit scope
      field or typed wrapper covering both positive and negative cases.
      Aggregation across scopes is allowed only via a function whose name
      and signature make the aggregation visible.
    forbidden_fixes:
      - aggregate_scoped_value_into_global_without_aggregation_function
      - read_per_instance_metric_as_global_without_label_filter
      - treat_local_absence_as_global_absence
      - treat_node_scoped_finding_as_cluster_scoped

  - id: meta.binding_outlives_evidence_until_invalidated
    title: "Every binding carries 'I checked this then' — when 'now' is different from 'then', the binding is a phantom unless re-validated"
    category: lifecycle
    antipattern: "If it was approved, it's approved"
    wrong_instinct: A decision feels durable once made — but the evidence the decision was bound to may have moved, and the binding without its evidence is a ghost that authorizes the wrong present
    severity: critical
    status: candidate
    summary: |
      When an authority issues an approval, emits a proof, or sets a
      bootstrap marker, it does so against evidence that was current at
      that moment. The binding from authority to consumer carries an
      implicit "I checked this then." Time passes — seconds, minutes, a
      failover, a restart. The "then" world the binding was made against
      may no longer exist; the binding persists as if it does.

      This is the consumer-side sibling of
      meta.write_creates_completion_obligation. That one says: the
      PRODUCER of state must arrange for its termination. This one says:
      the CONSUMER of evidence must arrange for its re-validation — or
      the evidence's age becomes the failure.

      Two flavors fall under this principle:

        a. Approval/evidence half-life — approval was bound to evidence
           current at approval-time; the consumer at execution-time may
           span a leader failover, a restart, or just enough wall-clock
           that the evidence digest no longer matches reality. Before
           consuming any approval, the consumer must re-check the
           binding's evidence digest is still current.

        b. Bootstrap-marker expiry — "we're early" is a state with
           semantic consequences (relaxed permissions, grace windows,
           alternative paths). The early phase ends. No event naturally
           fires when the phase ends; the steady-state code doesn't know
           about the marker. The marker persists as evidence of an early
           phase that already ended, authorizing behavior steady-state
           would refuse.

      Before consuming a binding (approval, proof, evidence, marker):
        1. What evidence was this binding made against?
        2. How would I detect that the evidence has changed?
        3. Is the binding's freshness expressed in its type (TTL,
           generation counter, evidence digest) or implicit?
        4. What event SHOULD fire to invalidate this binding, and is
           that event guaranteed to fire?
        5. If no event fires (phase ends quietly, marker has no
           clearing path), is there a level-triggered re-validation?

      Known violations:
        - doctor.stale_evidence_authorizes_remediation
        - doctor.approval_token_replay_across_failover
        - doctor.escalation_state_lost_on_restart
        - bootstrap.flag_persists_post_day_1
        - desired.bootstrap_premature_convergence
        - service.bootstrap_ordering_skew
      Known good:
        - workflow defer B3 durable counter — evidence for "we've tried
          N times" survives restart
        - feedback_day0_unproven_grace — explicit half-life on
          runtime_identity_unproven findings; verifier degrades severity
          based on age
    enforcement: |
      Every binding from authority to consumer must include an evidence
      digest or generation number that the consumer re-validates at
      consumption time. Bindings whose validity depends on phase or time
      must carry their own freshness check; in-memory-only bindings
      across actions that can span a restart or failover are forbidden.
      Bootstrap markers must be paired with a clearing path (event or
      level-triggered sweep) OR a freshness check at every consumer that
      respects them.
    forbidden_fixes:
      - approval_token_replayed_after_successful_execution
      - approval_validity_assumed_durable_across_failover
      - escalation_state_kept_in_memory_only
      - bootstrap_flag_persists_without_clearing_path
      - day0_grace_without_expiry_check

  - id: meta.state_mutations_must_be_durably_committed_before_side_effects
    title: "Intent commits before action, retry is the only response to failure — no alternative paths once committed"
    category: lifecycle
    antipattern: "Just run the steps; if X fails, try Y instead"
    wrong_instinct: Computing the actions and executing them inline feels efficient, and falling back to a different path on failure feels resilient — but a failure between step 1 and step N leaves the world half-changed with no resume point, and an alternative path leaves the audit record claiming you did X when you actually did Y
    severity: critical
    status: candidate
    summary: |
      Two halves of one contract:

      Commit-first half:
        A state-changing operation that spans more than one observable
        side effect MUST be committed to a durable coordinator BEFORE
        any side effect runs. The coordinator owns: (a) the intent
        record (what should happen), (b) the per-step progress (where
        we are), (c) the terminal-state guarantee (every started intent
        reaches SUCCEEDED or FAILED), and (d) the resume contract (a
        new process picks up where the old one left off, idempotently).

      No-alternative-path half:
        Once an intent is committed, the only exits are SUCCESS or
        FAIL. Retry is the response to transient failure. Falling
        back to a different action — "X failed so I'll try Y instead"
        — is forbidden because it makes the audit trail lie: the
        intent record says X, the world shows Y. Even a human-operated
        repair path counts; the principle says the human's intent
        must also commit before action.

      Plans are deliberation. Workflows are commitment. A plan computes
      actions and may execute them; a workflow PERSISTS the computed
      plan before executing any of it AND enforces that no alternative
      action is taken after commitment. Together, durable intent +
      retry-only-loop are what give a state change its observable
      reliability.

      Bug class this principle catches:
        - "Lost intent" — process executes step 1, restarts before step
          2; new process has no record that a mutation was in flight;
          observers see step-1 effects without explanation.
        - "Frozen partial" — process executes step 1, fails step 2 with
          no retry contract; the system is half-changed forever because
          nothing owns the obligation to finish.
        - "Double execution" — process executes step 1, dies, new
          process re-executes from the top because the only record was
          in the dead process's memory.
        - "Untraceable change" — observer sees a state change but cannot
          find the operator/agent/code path that decided it.
        - "Audit lies" — intent record claims X happened, observable
          state shows Y happened (because step 2 fell back to an
          alternative when the canonical path failed). The audit
          trail is now structurally untrustworthy.
        - "Workaround corrupts" — operator reaches for fix-etcd.sh /
          direct disk write / inline retry-with-different-args
          because the canonical path is blocked. The system now has
          state that no workflow record explains.

      Before computing actions that will change cluster state, ask:
        1. Does this operation cross any failure boundary (multi-RPC,
           multi-node, multi-second wall-clock)?
        2. Is the intent persisted somewhere a new process could find
           and resume from?
        3. Is each step individually idempotent so a resume doesn't
           double-execute?
        4. Does the operation reach a terminal state, or does failure
           leave it in an indeterminate "started but not finished" state
           forever?
        5. Is there an audit record naming WHO decided this and WHEN?

      Known violations:
        - controller.platform_upgrade_bypassed_workflow_authority
        - mcp.governor_bypass_via_ad_hoc_execute_tool
        - mcp.etcd_remote_allowlist_expansion
      Known good:
        - WF-DEFER B3 durable counter — intent + retry-count survive
          restart, ABANDONED is a terminal state
        - convergence_committer atomic txn — write+cleanup in same etcd
          op so the intent and its closure are co-durable
        - workflow.RUN_STATUS_FAILED contract — every workflow reaches
          SUCCEEDED or FAILED; no zombies
    enforcement: |
      Every state-changing operation that spans more than a single etcd
      transaction MUST flow through the workflow service. Direct CLI →
      etcd writes are forbidden for any change that requires multiple
      coordinated side effects. MCP tools that mutate state must do so
      via plan → validate → approve → execute (which dispatches a
      workflow), never via direct RPC to a state-changing endpoint.

      No-alternative enforcement: workflow step handlers may NOT branch
      to an alternative action on transient failure. The only sanctioned
      responses are (a) retry the same step, (b) reach a terminal
      FAILED state and surface the failure for human/escalation review.
      Falling back to a different artifact source, a different RPC, a
      different node, or a manual repair path violates the contract
      because it leaves the workflow record claiming one intent while
      the world records another.
    forbidden_fixes:
      - cli_bulk_apply_state_via_direct_etcd_writes
      - mcp_tool_executes_mutation_without_workflow_dispatch
      - inline_multistep_mutation_without_durable_intent_record
      - reuse_in_memory_plan_after_leader_failover
      - fall_back_to_alternative_action_on_workflow_step_failure
      - manual_repair_path_diverges_from_committed_workflow_intent

  # ── Generalization principles (second pass) ───────────────────────────────────
  # These invariants encode the abstract reasoning layer. They generalize from
  # specific Globular incidents to classes of distributed-system mistakes, so
  # AI agents can recognize not just the exact bug but the family it belongs to.

  - id: state.unknown_must_not_default_to_healthy
    title: Unknown, incomplete, or stale state must not be rendered or classified as healthy
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      Unknown state is a first-class operator truth. When a collector fails, a snapshot
      is incomplete, or a data source is stale, the resulting gap is UNKNOWN — not HEALTHY.
      Any code path that defaults an unknown or unobserved state to healthy is suppressing
      real operational evidence and hiding potential failures from operators.
      UNKNOWN must propagate to every status rollup, badge, and health summary.
    enforcement: |
      Status aggregation logic must explicitly handle three states: HEALTHY, DEGRADED, UNKNOWN.
      UNKNOWN must never be coerced to HEALTHY. When the data source is absent or stale,
      the rollup must emit UNKNOWN or STALE — not a passing result.
      Doctor rules, health dashboards, and CLI output must all respect this.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/release_runtime_convergence.go
        - golang/cluster_doctor/cluster_doctor_server/rules/installed_state_runtime_mismatch.go
    forbidden_fixes:
      - forbidden.unknown_as_healthy
    required_tests:
      - TestStatusRollup_UnknownSubsystem_NotGreen
      - TestCollectorGap_ProducesUnknown_NotHealthy
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.industry.partial_failure_hidden_by_global_green
      - fm.industry.missing_inventory_misclassified_as_down

  - id: evidence.missing_is_not_known_bad
    title: Missing evidence must not be treated as evidence of failure unless the contract explicitly says absence proves failure
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      In distributed systems, missing data has two very different meanings:
        - Collector gap: the evidence collection path failed or timed out
        - Known-bad: the node is confirmed unreachable or in a failure state
      These are not the same. A node absent from a snapshot means the collector
      did not receive its record — it does not mean MinIO is down on that node,
      that the etcd member is evicted, or that the service is failed.
      Treating absence as proof of failure causes false CRITICAL findings,
      incorrect remediation, and operator alarm fatigue.
    enforcement: |
      Any rule that counts "down" members, "missing" nodes, or "absent" services
      must distinguish:
        PRESENT      — evidence collected and health confirmed
        UNKNOWN      — evidence absent (collector gap, timeout, incomplete snapshot)
        KNOWN_BAD    — evidence collected and confirms unhealthy
      Only KNOWN_BAD contributes to severity escalation. UNKNOWN requires a caveat,
      not a critical finding. Rules that cannot distinguish the two must emit UNKNOWN
      and defer to the operator.
    protects:
      files:
    forbidden_fixes:
      - forbidden.missing_inventory_as_down
      - forbidden.partial_snapshot_false_quorum_loss
    required_tests:
      - TestAbsentRecord_ClassifiedAsUnknown_NotKnownBad
      - TestPartialSnapshot_NoCritical_WhenOnlyUnknown
    related_failure_modes:
      - fm.globular.objectstore_partial_snapshot
      - fm.industry.missing_inventory_misclassified_as_down

  - id: identity.stable_node_identity_not_floating_vip
    title: Stable node identity must not be derived from a floating VIP or failover reachability address
    severity: critical
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      A floating Virtual IP (VIP) represents reachability for a cluster role — it moves
      between nodes during failover. It is not the durable identity of any node.
      When a VIP is used as the stable identity for a node (etcd advertise URL, ScyllaDB
      host entry, MinIO pool IP, controller leader IP match), the identity becomes
      unstable: it moves to a different physical node without the affected node being
      aware. This causes membership corruption, leader election failures, and cascading
      multi-service outages when the VIP transitions.
    enforcement: |
      All code that needs a stable, durable node IP must use StableIP(clusterVIP),
      which explicitly excludes the floating VIP from the IP selection.
      Never use PrimaryIP(), Ips[0], or AdvertiseIp without first filtering the VIP.
      The VIP must be read from /globular/ingress/v1/spec and excluded before any
      identity-bearing operation.
    protects:
      files:
        - golang/cluster_controller/cluster_controller_server/state.go
    forbidden_fixes:
      - forbidden.vip_as_node_identity
      - hardcode_node_to_pool_mapping_to_avoid_filter
      - filter_out_vip_in_node_identity_ips
    required_tests:
      - TestStableIP_ExcludesVIP
      - TestEtcdAdvertiseURL_UsesStableIP_NotVIP
      - TestScyllaHosts_ExcludeVIP
    related_failure_modes:
      - fm.globular.vip_transition_cascade
      - fm.industry.floating_address_used_as_durable_identity

  - id: workflow.dispatch_is_not_completion
    title: Dispatching an action is not proof that the action completed successfully
    severity: high
    status: active
    # origin: { type: principle, confidence: high }
    summary: |
      When an operator submits a command, clicks a button, or calls an RPC, the system
      receives the intent and dispatches it — it does not immediately execute and confirm
      completion. For any operation that goes through a workflow (install, upgrade, topology
      change, configuration apply), there is a gap between dispatch and convergence.
      Reporting success at dispatch time misleads the operator into believing the system
      has already converged. For irreversible or destructive operations, this creates a
      false safety signal — the operator believes the task is done and moves on.
    enforcement: |
      Dispatch events must return ACCEPTED, not SUCCESS.
      Callers (CLI, UI, MCP tools) must poll or stream the workflow status until a
      terminal state (SUCCEEDED, FAILED, BLOCKED) is observed.
      Success must be reported only after terminal state is confirmed.
      Destructive operations must require explicit operator confirmation before dispatch.
    protects:
      files:
        - golang/workflow/workflow_server/executor.go
        - golang/workflow/engine/engine.go
    forbidden_fixes:
      - forbidden.dispatch_as_success
      - forbidden.optimistic_destructive_success
    required_tests:
      - TestDispatch_ReturnsAccepted_NotSuccess
      - TestCLI_WaitsForTerminalWorkflowState
    related_failure_modes:
      - fm.industry.optimistic_success_for_irreversible_action
      - fm.industry.missing_inventory_misclassified_as_down
