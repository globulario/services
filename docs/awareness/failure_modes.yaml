    - blast_radius:
        - All in-flight workflow runs stall for the reconnect duration
        - Orphan scanner may claim runs that are still active
      description: |
        The workflow Scylla session manager uses an atomic reconnecting flag to prevent concurrent reconnect attempts. If the guard is bypassed or multiple callers race past it, parallel reconnect goroutines each close the session and attempt a new connection simultaneously, causing pool thrashing and inconsistent generation state.
      id: scylla.workflow_reconnect_concurrent_storm
      protects:
