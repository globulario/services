        - Session generation counter increments more than once per reconnect cycle
        - Workflow query failures that resolve then immediately recur
      title: Multiple concurrent Scylla reconnect goroutines breach the single-reconnect guarantee
      trigger: |
        High request volume during Scylla downtime; multiple onPingFailure() calls arrive concurrently before the reconnecting flag is set.
    - architecture_fix: |
        The verifier classifies the timing skew with a per-target hint:

          IsFirstInstall=true  → service.bootstrap_ordering_skew (degraded)
          IsFirstInstall=false → service.old_pid_after_upgrade   (critical)

        The doctor collector populates IsFirstInstall by looking at the
        InstalledPackage record's installedUnix vs updatedUnix: within
        60s of each other, this is the same operation (no re-apply has
        happened since the original install). Any subsequent re-apply
        bumps updatedUnix; installedUnix is preserved as the original
        install timestamp.

        Binary-hash checks (installed_binary_hash_mismatch,
        running_binary_hash_mismatch) remain the authoritative drift
        signal in both cases. The timing finding is the tell about
        systemd restart effectiveness; the hash findings are the tell
        about which bytes are running. Both can fire independently.
      id: service.bootstrap_ordering_skew
      known_bad_fixes:
        - Suppressing service.old_pid_after_upgrade globally to stop the install-time noise (loses the upgrade-bug signal)
        - Skewing ApplyTime backward to "before any process could have started" (lies about when the controller commanded apply)
        - Filtering by service name (whitelist install-time-only services) — fragile and incomplete
      related_invariants:
        - meta.authority_must_express_uncertainty
        - rollout.convergence_requires_runtime_proof
      required_tests:
        - TestVerifyTarget_FirstInstallProcessOlderThanApply_BootstrapOrderingSkew
      root_cause: |
        Day-0 install.sh starts services before the controller bootstrap
        sequence records an apply timestamp for each ServiceRelease /
        InfrastructureRelease. The result: every service on a fresh node
        has ProcessStartTime earlier than ApplyTime by minutes-to-hours,
        even though every binary on disk and every running PID is correct.

        Treating this as service.old_pid_after_upgrade (critical) was the
        v1.2.56 false-positive: it screams stale-bytes-serving when the
        bytes are correct — the apply timestamp just hasn't caught up
        with reality. Operators learned to ignore the finding, which
        defeats its purpose for the case it's MEANT to catch (a genuine
        upgrade where systemd restart didn't take).
      severity: degraded
      symptoms:
        - GetServiceRuntimeProof reports ProcessStartTime earlier than the controller's last apply timestamp
        - the verifier emits service.bootstrap_ordering_skew (degraded) instead of service.old_pid_after_upgrade (critical)
        - only fires when IsFirstInstall=true; an upgrade with the same shape fires the critical finding
      title: Service process started before the controller recorded its apply — expected during fresh install only
    - architecture_fix: |
        platform-upgrade must write ServiceDesiredVersion records directly to etcd
        (key: /globular/resources/ServiceDesiredVersion/{name}) using the same approach
        as updateInfraReleaseVersion. Direct etcd writes are mesh-independent and work
        at any bootstrap phase. The controller reads these records from etcd on every
        reconcile tick regardless of how they were written.
      forbidden_fixes:
        - manually_seeding_desired_state_per_node
        - skipping_service_packages_from_bom
        - writing_desired_state_via_grpc_only_during_bootstrap
      id: service.desired_state.pipeline_gap
      related_invariants:
        - meta.state_mutations_must_be_durably_committed_before_side_effects
        - service.desired_state.bom_completeness
      related_services:
        - cluster-controller
        - globularcli
      required_tests:
        - TestPlatformUpgradeWritesServiceDesiredVersionWithoutMesh
        - TestAllBOMPackagesHaveDesiredState
      root_cause: |
        platform-upgrade wrote ServiceDesiredVersion records via the gRPC UpsertDesiredService
        RPC, which routes through Envoy on port 443. During early Day-0/Day-1 bootstrap the
        mesh may not yet be routing, causing those calls to fail silently. Infrastructure
        packages were unaffected because their path writes directly to etcd. The result is
        that all service packages in the BOM have no desired state record and the controller
        reconciler is entirely unaware of them.
      severity: high
      symptoms:
        - services show 1/2 or 0/N in cluster status (installed on some nodes only)
        - controller reconciler never dispatches install workflows for service packages
        - ServiceDesiredVersion records missing from etcd for published service packages
        - running "globular services desired set NAME VERSION" manually fixes the symptom per-service
        - infra packages converge normally but workload services do not install
      title: platform-upgrade omits ServiceDesiredVersion records during early bootstrap
    - architecture_fix: |
        Remove the os.Getenv() call. Resolve from etcd via config.GetServiceConfigurationById
        or similar. If etcd is unreachable, ERROR — do not fall back to defaults.

        For local dev environments: use a local etcd seed via the same code path as production.
      forbidden_fixes:
        - keep_env_var_as_fallback_for_dev_only
        - silently_prefer_env_var_when_set
        - widen_to_other_env_vars_to_be_consistent
      id: service.endpoint.os_getenv_for_addresses
      related_invariants:
        - meta.storage_is_not_semantic_authority
        - service.endpoint.etcd_address_reachability
        - etcd.endpoint_reachability
      related_services:
        - '*'
      required_tests:
        - TestServiceConfigSourceIsAlwaysEtcd
        - TestNoOsGetenvInServiceServerCode
      root_cause: |
        A developer added an env-var fallback for "easier local testing" or to "avoid the
        etcd dependency at startup". This violates the etcd-is-sole-source-of-truth rule:
        env-var-driven config is per-node mutable, untracked, and breaks reproducibility.

        Symptom that triggers detection: two nodes with identical Globular config behave
        differently because one has an env var set.
      severity: critical
      symptoms:
        - service config code contains os.Getenv("...ENDPOINT...") or similar
        - service ignores etcd config when an env var is set
        - behaviour differs across nodes due to local env var differences
      title: A service uses os.Getenv() to resolve a cluster address — bypasses etcd source-of-truth
    - architecture_fix: |
        1. Add ExecStartPre=+/bin/sh -c 'pkill -9 -x <binary> || true' to every service unit file
           (and its inline spec counterpart) so any orphan is killed before the new instance starts.
           MUST use -x (process-name match) — never -f, which also matches the parent shell's argv
           and self-SIGKILLs. For binary names >15 chars, use the bracket trick:
           pkill -9 -f '[<first_char>]<rest>' instead.
        2. The controller must scope circuit breaker effects: an open CB on workflow must block
           only workflow-dependent dispatch, not ALL install workflows.
        3. When a service re-registers a new address in etcd, the controller must probe the new
           address with the correct gRPC service interface (not just TCP) before trusting it for
           routing. A mismatch must trigger node-agent remediation (restart), not a global CB open.
      forbidden_fixes:
        - ignoring_orphan_processes_assuming_systemd_handles_them
        - relying_on_service_restart_without_pkill_guard
        - circuit_breaker_that_blocks_all_reconciliation_on_single_service_failure
      id: service.endpoint.port_squatting_cgroup_escape
      related_invariants:
        - meta.competing_writers_must_converge_or_be_fenced
        - service.endpoint.etcd_address_reachability
        - service.endpoint.cgroup_escape_guard
      related_services:
        - workflow
        - mcp
        - cluster-controller
      required_tests:
        - TestWorkflowOrphanKilledBeforeRestart
        - TestCircuitBreakerScopedToAffectedService
      root_cause: |
        When a service process exits uncleanly (e.g., SIGKILL or crash) without systemd catching it
        (e.g., child fork, or process moved to a different cgroup before systemd could track it),
        the process continues running and holds the original port. When systemd starts a new
        instance (Restart=on-failure), the new process cannot bind the original port and
        reallocates to a free port. The new address is written to etcd, but the mesh (Envoy/xDS)
        may not yet be updated. The controller probes the orphan, gets a valid gRPC connection that
        does NOT implement the expected service interface, and opens the circuit breaker.
        With the circuit breaker open, posture goes RECOVERY_ONLY and all new install workflows
        are blocked — making this a cluster-wide reconciliation stopper triggered by a single
        runaway process.
      severity: critical
      symptoms:
        - service restarts but immediately reallocates to a different port (e.g., workflow moves from 10220 to 10221)
        - etcd config for service shows new port (10221) but mesh/Envoy still routes to old port (10220)
        - gRPC probe to old port gets a response but "Unimplemented unknown service X" — orphan is answering
        - controller circuit breaker opens on workflow dispatch failures
        - posture transitions to RECOVERY_ONLY and all new install workflows are blocked
        - ss -lnt on node shows the old port still bound by a process not in the service cgroup
        - systemctl status globular-workflow.service shows active but a different PID holds the old port
      title: Orphaned service process squats original port after cgroup escape, stale address in etcd blocks reconciliation
    - additional_root_causes: |
        Observed 2026-06-04 on cluster-controller: the proof writer's PID-anchored
        UpdatedUnix was overwritten on every heartbeat tick by heartbeat.go Phase 2
        (the artifact-sync writer). The verifier read max(InstalledUnix, UpdatedUnix)
        = wall-clock now > PID start and flagged the running binary as stale even
        though it was the correctly-installed one. This is a proof-anchor-stomp
        variant of the broader forbidden_fix use_wall_clock_for_installed_unix_timestamp.
        Fix: heartbeat Phase 2 preserves existing.UpdatedUnix for services on the
        selfHostedServiceNames allowlist (node-agent, cluster-controller,
        cluster-doctor, repository). See TestHeartbeatPhase2_SelfHosted_PreservesUpdatedUnix.
      architecture_fix: |
        Phase 2 carries ProcessStartTime; Phase 9 compares to the
        controller-tracked apply time for the target. If start < apply,
        the verifier raises this finding regardless of whether other
        proofs agree — the operator decides whether to force-restart or
        investigate the unit configuration.
      id: service.old_pid_after_upgrade
      known_bad_fixes:
        - Assuming a fresh systemctl restart cycles the PID (drop-in overrides may prevent restart; verify ProcessStartTime advanced)
        - Bumping the version and hoping the next deploy will catch it (silent for an entire release window)
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - rollout.convergence_requires_runtime_proof
        - infra.heartbeat_observer_only_not_authority
      required_tests:
        - TestVerifyTarget_ProcessOlderThanApply_OldPidAfterUpgrade
        - TestVerifyTarget_UpgradeProcessOlderThanApply_StillCritical
        - TestHeartbeatPhase2_SelfHosted_PreservesUpdatedUnix
        - TestHeartbeatPhase2_AllSelfHostedServices_PreserveUpdatedUnix
      root_cause: |
        A package install / version bump that succeeded on disk but whose
        unit reload-or-restart didn't actually replace the PID. Common
        causes: a TimeoutStopSec that exceeded the systemd kill window, a
        manual `systemctl daemon-reload` without `restart`, or a drop-in
        override that pinned RestartPolicy.

        ProcessStartTime is the cheapest signal that "the apply actually
        had an effect." Phase 9's verifier reads it from GetServiceRuntimeProof
        and compares against the target's ApplyTime.
      severity: critical
      symptoms:
        - ProcessStartTime (from systemctl show ExecMainStartTimestamp) is older than the controller's last apply timestamp for this service
        - same PID has been running since before the upgrade was commanded
        - verifier emits service.old_pid_after_upgrade
      title: Live process predates the last apply — restart did not take effect
    - architecture_fix: |
        Phase 2 added GetServiceRuntimeProof on node-agent which dereferences
        /proc/<pid>/exe and hashes the result. Phase 9 verifier compares
        running_exe_sha256 to installed_sha256 and emits this finding when
        they disagree. The contract is that a successful release is one
        where every layer (disk, /proc, runtime version, systemd
        effective unit) agrees — not just one or two.
      id: service.running_binary_hash_mismatch
      known_bad_fixes:
        - Manually `systemctl restart` and assuming it took (it's the same failure mode — re-verify after restart, don't assume)
        - Trusting systemctl is-active (active says the PID exists, not that it runs the right bytes)
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - diagnostics.must_measure_reality
        - doctor.must_compare_claims_to_proofs
      required_tests:
        - TestVerifyTarget_NewBinaryOldPid_RunningBinaryHashMismatch
      root_cause: |
        systemd's notion of "active" tracks the supervised PID's existence,
        not the bytes it loaded. A binary swap that succeeds on disk but
        whose restart fails silently leaves the cluster in this state: disk
        is right, inventory is right, ActiveState=active, but the process
        is the previous incarnation.

        Without Phase 2's GetServiceRuntimeProof RPC, nothing in Globular
        re-reads /proc/<pid>/exe. Health checks trust ActiveState; doctor
        trusts inventory. The drift is invisible until a downstream check
        (an RPC that exercises a new feature, a version probe) fails.
      severity: critical
      symptoms:
        - /proc/<pid>/exe hashes to a different value than /usr/lib/globular/bin/<name>
        - new binary was deployed but the live PID is still running the old one (systemd restart didn't take, or the new file was deleted before the restart)
        - verifier emits service.running_binary_hash_mismatch
        - cluster appears converged (controller, inventory, systemd active) but RPCs hit the old code paths
      title: Running process is executing a different binary than what is installed on disk
    - architecture_fix: |
        Phase 2 captures runtime_version when the service exposes one
        (services without a /version endpoint emit an entry in proof.Errors
        and the verifier degrades to service.runtime_identity_unproven
        rather than blanket-passing). Phase 9 raises this finding when
        runtime_version != desired_version.
      id: service.running_version_mismatch
      known_bad_fixes:
        - Trusting the build tag in /etc/globular and never probing the live process (defeats the point of runtime proof)
        - Hard-coding version strings into source (forbidden by an existing invariant; build flags inject the value via ldflags)
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - health.must_not_use_inventory_as_runtime_truth
      required_tests:
        - TestVerifyTarget_RuntimeVersionDiffers_VersionMismatch
        - TestDecideVersionVerdict_BuildIdsDiffer_VersionsDiffer_Mismatch
      root_cause: |
        Runtime version reporting (each service exposing its version via a
        /version endpoint or a gRPC reflection method) is the strongest
        single-field proof that "the binary running is the binary intended."
        Disagreement implies one of: the binary on disk is wrong (different
        finding, hash check catches that first), the runtime version probe
        is reading from a stale source, or the running PID is from an old
        deploy (service.old_pid_after_upgrade catches that).

        When all hash checks agree but runtime version disagrees, the most
        likely cause is a binary that was rebuilt without bumping the
        embedded version constant — a build hygiene issue rather than a
        deploy issue.
      severity: critical
      symptoms:
        - runtime_version from GetServiceRuntimeProof != ServiceReleaseSpec.Version
        - verifier emits service.running_version_mismatch
        - service is responsive but answers RPCs as the wrong major.minor
      title: Live process /version response disagrees with the desired version
    - architecture_fix: |
        The verifier returns the proof partial and surfaces the specific
        collection errors in Finding.Evidence["errors"]. Operators see
        which sub-check failed and remediate it (typically: re-run the
        proof after the transient condition clears). Persisting the
        degraded state lets doctor enumerate "what proofs we don't have"
        independently of "what proofs we have that disagree."

        The Day-0 grace check is the helper isDay0UnprovenGrace in
        verifier.go: requires BOTH IsFirstInstall=true AND ApplyTime
        within the last 5 minutes. The cluster_controller's
        decideVersionVerdict cooperates via isDay0UnprovenGraceVerdict
        which trusts the verifier's severity tag rather than re-deriving
        the grace condition — single source of truth.
      id: service.runtime_identity_unproven
      known_bad_fixes:
        - Treating a single collection error as a green outcome ("at least the rest agreed")
        - Treating a single collection error as a critical outcome ("partial proof is suspicious") — both lose the distinction between "we don't know" and "we know it's wrong"
        - Blanket-downgrading runtime_identity_unproven to info to silence Day-0 noise (loses the signal for genuinely-stuck node-agents — the grace must be bounded by IsFirstInstall + ApplyTime window)
      related_invariants:
        - meta.authority_must_express_uncertainty
        - diagnostics.must_measure_reality
      required_tests:
        - TestVerifyTarget_ErrorsOnly_DegradesUnknown
        - TestVerifyTarget_NoProof_Unknown
        - TestVerifyTarget_Day0FirstInstall_NoProof_DowngradesToInfo
        - TestVerifyTarget_FirstInstallStaleApply_NoProof_StaysDegraded
        - TestVerifyTarget_Upgrade_NoProof_StaysDegraded
        - TestVerifyTarget_Day0FirstInstall_ErrorsOnly_DowngradesToInfo
        - TestDecideVersionVerdict_VerifierDay0GraceInfo_IsOk
      root_cause: |
        Diagnostic honesty rule: missing proof is NOT proof of failure, but
        it is also NOT proof of success. When the verifier cannot read
        /proc/<pid>/exe (PID died mid-check, permission denied), cannot
        reach systemctl show (systemd-coredumped, broken IPC), or cannot
        hash the binary (filesystem error), the resulting verdict is
        unknown and this finding is raised at degraded severity.

        DAY-0 GRACE EXCEPTION: on a brand-new install (IsFirstInstall=true)
        whose apply happened within day0UnprovenGraceWindow (5 min), the
        finding is downgraded to INFO severity. Rationale: services come
        up in waves over 2-3 minutes during Day-0; the very first doctor
        sweep runs before the node-agent has had a chance to collect
        proofs for every just-applied service, and treating that window
        as degraded opens a doctor_finding incident per service per node
        that auto-resolves within 2 minutes but leaves a permanent
        RESOLVED record. The downgrade only applies during the grace
        window — outside it (or on any upgrade) severity reverts to
        degraded so a genuinely stuck node-agent still surfaces.
      severity: degraded
      symptoms:
        - GetServiceRuntimeProof returns a ServiceRuntimeProof with non-empty Errors[]
        - verifier degrades the target to ProofUnknown
        - operator sees the service in service health but cannot tell whether it actually matches desired state
      title: Runtime proof is partial — at least one collection step failed
    - architecture_fix: |
        Every service main MUST initialise its Version field from the
        package-level Version variable that gen-version.sh / ldflags
        populates. Working pattern (search, title, media, dns, file,
        ai-*, ...):

          srv.Version = Version             // direct
          // OR
          cfg.Version = Version             // through DefaultConfig

        The build/gen-version.sh sentinel in zz_version_generated.go
        already panics at init() if `Version` is empty, so the build
        side of the contract is enforced. The remaining hole is the
        service-init side: a forgotten `srv.Version = ""` silently
        defeats the entire ldflags pipeline.
      id: service.runtime_version_empty_from_main
      known_bad_fixes:
        - Editing zz_version_generated.go directly (it's regenerated; the fix won't survive a build)
        - Reading Version from etcd at init time (the value isn't available pre-bootstrap and forms a Day-0 chicken-and-egg with the verifier)
        - Suppressing the runtime_identity_unproven WARN globally — that's a known_bad_fix already listed under service.runtime_identity_unproven and would hide genuine stuck-agent cases
        - Special-casing the affected services in detectGlobularBinaryVersion to fall back to the marker file when --describe returns empty (papers over the bug for one consumer while leaving the verifier's runtime probe broken)
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - health.must_not_use_inventory_as_runtime_truth
        - rollout.convergence_requires_runtime_proof
        - service.lifecycle.version_field_must_not_be_overwritten
      required_tests:
        - TestServiceVersion_DescribeReportsBuildTimeVersion
      root_cause: |
        Two shapes of the same bug in service entrypoints:

        1. Direct: `srv.Version = ""` in main() (monitoring_server,
           repository_server pre-2026-05-21).
        2. Indirect: a Config struct with `Version: ""` default that
           the server struct copies via `Version: cfg.Version`
           (torrent_server pre-2026-05-21).

        Both shapes execute AFTER the package-level `Version` variable
        is set by `-X main.Version=<ver>` ldflags injection, so the
        ldflags value gets clobbered to "" before any caller observes
        it. The bug stayed invisible from Sep 2025 until 2026-05-20 when
        the verifier package (golang/verifier/) was wired into the
        cluster-doctor sweep — before that, no diagnostic surface
        actually compared --describe Version against desired.

        Day-0 visibility chain: install.sh deploys the binary (or a
        bootstrap shim) → version marker is whatever apply-package
        wrote → heartbeat reports installed version → controller hash
        differs → workflow re-installs from repository → marker updated
        → drift clears. But during the gap (and on every fresh boot
        before reconcile lands), the doctor surface shows the WARN.
      severity: degraded
      symptoms:
        - '`<svc>_server --describe` prints `"Version": ""` even though the binary was built with `-X main.Version=<ver>`'
        - '`<svc>_server --version` prints an empty line'
        - on a Day-0 cluster, the controller's health check reports `version:<svc> FAIL — not installed (desired X.Y.Z)` because the heartbeat resolves the empty --describe Version to the `0.0.1` package-default fallback
        - cluster-doctor's services drift surface shows `~ version drift` (desired X.Y.Z, installed 0.0.1) until the controller auto-dispatches install-package
        - after auto-reconcile, the version marker is correct but the binary still under-reports — verifier flags service.runtime_identity_unproven if the runtime-proof sweep races the version-marker write
      title: Service main hardcodes Version="" which wipes the ldflags-injected build-time value
    - architecture_fix: |
        Phase 6 of the Diagnostic Honesty Refactor adds a tiny shared package
        (golang/fallback) with three operations:

          - fallback.Enter(Active{Service, Dependency, Mode, PrimaryError,
            AffectedPaths, NodeID, Since}) — register the fallback. Idempotent:
            re-entry preserves the original Since timestamp so the "how long"
            counter stays honest, but refreshes PrimaryError + AffectedPaths so
            doctor sees the latest evidence.
          - fallback.Exit(service, dependency, mode) — clear when the primary
            is back. Cheap no-op when nothing was registered.
          - fallback.Snapshot() — enumerate every currently-active fallback.
            Stable order, no I/O. Doctor / verifier / cluster events scrape this.

        Wire-up rule: every silent fallback path must call Enter on the way
        into the substitute and Exit on the next successful primary read. The
        repository Scylla→MinIO ledger path (artifact_handlers.go) is the
        reference implementation. Identified follow-up wire-ups (tracked
        outside this commit):

          - DNS in-memory cache fallback (dns_server/handlers.go:174)
          - Node-agent repository → local package fallback (installer_api.go:95)
          - Storage resilient mirror cache-fill (storage_backend/resilient_storage.go:54)
          - Objectstore admission etcd-skip (repository_server/objectstore_admission.go:66)
          - Workflow YAML local-disk fallback (workflow/v1alpha1/loader.go)

        Once Phase 9 (verifier) is live the doctor / cluster event bus
        consumes Snapshot() and emits service.silent_fallback_active per
        active fallback. Operators see green Phase + non-green fallback list,
        which is the contract.
      id: service.silent_fallback_active
      known_bad_fixes:
        - Adding a per-service slog.Warn at the fallback point — that is the silent-fallback bug, just with more verbose logs
        - Bumping the cluster status to DEGRADED globally — degrades the wrong thing; the user-facing path is still working
        - Suppressing the fallback entirely (failing the request) — kills the user path; the whole point of fallback is to keep it alive while making the degradation visible
        - Using a per-service ad-hoc registry — fragments the directory and means doctor has to know N protocols for the same finding
      related_invariants:
        - meta.fallback_must_degrade_semantics
        - fallback.must_emit_degraded_finding
        - diagnostics.must_measure_reality
      required_tests:
        - TestEnter_Idempotent_SincePreserved
        - TestEnter_RefreshesPrimaryErrorAndAffectedPaths
        - TestEnter_NotifierFiresOnceOnFirstEntry
        - TestExit_RemovesEntry
        - TestExitMatching_ClearsByDependency
        - TestSnapshot_StableOrder
        - TestEnter_ConcurrentDoesNotPanic
      root_cause: |
        Globular services historically followed the Postel-style "be liberal in
        what you accept" pattern at the dependency boundary: if the primary
        (ScyllaDB ledger, MinIO bucket, etcd config store) was unreachable, the
        request handler would silently switch to a cached / local / in-memory
        substitute and return success. That keeps the user-facing path alive,
        which is correct — but it also keeps the *cluster* looking green, which
        is the lie.

        The structural cost is twofold:

          1. The 4-layer state model assumes every claim of "healthy" is anchored
             in independent measurement. Silent fallback violates that: the
             service claims OK while running on a substitute. Doctor cannot
             distinguish "primary intact" from "primary down, serving from cache".
          2. Operators only learn about the degradation when something downstream
             *also* breaks (cache expires, MinIO eventually goes down, the
             single-node fallback runs out of disk). The window between primary
             failure and operator awareness is the failure window.

        The brief is unambiguous on the contract: fallback may keep the path
        alive, but it MUST NOT keep the system green. Every fallback path is
        required to register itself so doctor / verifier code can enumerate it.
      severity: degraded
      symptoms:
        - service health surface reports OK or healthy while operators see latency / staleness in production
        - slog WARN messages mention "degraded", "fallback", "falling back to <X>", but doctor and cluster events show nothing
        - golang/fallback.Snapshot() (or the per-service equivalent) returns a non-empty list while cluster.health shows green
        - a primary dependency (ScyllaDB, MinIO, etcd, repository) was unreachable but the request still succeeded — neither error count nor cluster event records the divergence
        - the "how long have we been degraded" question has no answer the operator can pull from a structured source
      title: A service is currently serving requests from a substitute backend (cache / local disk / read-only) because its primary dependency failed
    - architecture_fix: |
        Track drift start timestamp per node in Collector. Escalate: <2min=WARN, >5min=ERROR, >5min on critical service=CRITICAL.
      forbidden_fixes:
        - keep_drift_warning_forever_without_escalation
      id: services.drift_never_escalates
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - services.drift_must_age_and_escalate
      related_services:
        - cluster-doctor
      required_tests:
        - TestDriftUnder2MinIsWarn
        - TestDriftOver5MinIsError
      root_cause: |
        Doctor rule had static SEVERITY_WARN for any desired/applied hash mismatch regardless of age. No driftSince tracking, no escalation.
      severity: medium
      symptoms:
        - cluster.services.drift stuck at WARN for hours
        - operator does not notice critical drift on ingress node
        - drift becomes background noise
      title: Service drift warning stays at WARN indefinitely
    - architecture_fix: |
        Two pure functions added in golang/deploy and consumed by the verifier
        once Phase 9 is live:

          - ParseSystemdUnit(rendered string) map[string][]string  — extracts
            directive values per section. Repeatable directives (ExecStartPre,
            Environment, After, Wants) are preserved as slices in source order.
          - DetectEffectiveUnitDrift(rendered string, eff EffectiveUnitProperties)
            UnitDriftVerdict — pure comparison. Verified when every directive
            systemd surfaced agrees with the rendered intent. Drift when at
            least one disagrees; FindingID = systemd.effective_config_drift.
            Unknown when proof is missing (do not assert drift against an empty
            effective bag — that is exactly the diagnostic dishonesty this
            refactor exists to remove).

        The detector does NOT compare the full unit-file sha256 byte-for-byte:
        systemd's drop-in override mechanism means FragmentPath can be honest
        while effective values are overridden. Field-level comparison catches
        both the byte-identical hand-edit case and the drop-in case.

        Phase 9 wires DetectEffectiveUnitDrift into the doctor / verifier path
        so the finding surfaces alongside the other Phase 1/2/3/4 proofs.
      id: systemd.effective_config_drift
      known_bad_fixes:
        - Comparing only the unit-file sha256 (drop-in overrides leave the file unchanged but redirect ExecStart=)
        - Comparing only `systemctl is-active` (systemd reports the process is up — that is not the same as "the process is running the binary you intended")
        - Hand-running `systemctl daemon-reload` and assuming drift went away (reload re-reads files but does not replace overrides)
        - Treating any "Unit not found" or "FragmentPath empty" as a transient and retrying — the brief is explicit that missing proof is degraded, not green
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - systemd.effective_unit_must_match_rendered_unit
        - rollout.convergence_requires_runtime_proof
        - diagnostics.must_measure_reality
      required_tests:
        - TestDetectEffectiveUnitDrift_AllAgree_Verified
        - TestDetectEffectiveUnitDrift_TypeDiffers_Drift
        - TestDetectEffectiveUnitDrift_ExecStartPathDiffers_Drift
        - TestDetectEffectiveUnitDrift_MissingFragmentPath_Drift
        - TestDetectEffectiveUnitDrift_EmptyEffective_UnknownNotDrift
        - TestParseSystemdUnit_ExtractsServiceDirectives
        - TestParseSystemdUnit_PreservesRepeatedDirectives
      root_cause: |
        Until Phase 5b nothing in Globular re-read installed unit files or asked
        systemd what it had actually loaded. The deploy step rendered a unit and
        copied it to /etc/systemd/system; from then on, the cluster assumed
        systemd was running exactly that. Three independent paths can break the
        assumption:

          1. A `systemctl edit` drop-in (/etc/systemd/system/<unit>.service.d/*.conf)
             overrides ExecStart= or Type= last-wins; systemd loads the override,
             FragmentPath still points at the original unit, so a naive comparator
             that only hashed the unit file path would miss the drift.
          2. An operator hand-edited /etc/systemd/system/<unit>.service after the
             last deploy. The on-disk content drifts from the rendered template
             but the deploy pipeline never re-checks.
          3. A stale unit from a previous package version is still on disk
             (deploy step wrote a new unit to a *different* path, or the rename
             dance left both around) and systemd is loading whichever it found
             first.

        In every case the effective unit systemd is using is not the unit the
        controller intended to ship, and `systemctl status` looks healthy.

        Phase 2 (GetServiceRuntimeProof) already collects the evidence:
        EffectiveType, EffectiveExecStart, FragmentPath, SystemdUnitSha256. Phase
        5b adds the comparator: DetectEffectiveUnitDrift in golang/deploy
        consumes the rendered unit content + the effective property bag and
        returns a verdict { Status, Drifts[], FindingID }.
      severity: high
      symptoms:
        - GetServiceRuntimeProof reports EffectiveType different from the Type= we rendered for the service
        - GetServiceRuntimeProof reports EffectiveExecStart whose path= does not match the rendered ExecStart binary
        - GetServiceRuntimeProof reports an empty FragmentPath even though the service is supposed to be installed
        - SystemdUnitSha256 (collected by node-agent against /etc/systemd/system/<unit>) does not match the rendered unit hash the controller holds
        - service appears active and "running fine" but is executing an out-of-date binary or wrong start command
        - operator hand-edited /etc/systemd/system/<unit>.service to "fix" something and that edit silently outlives the next deploy
      title: systemd is loading a unit whose effective Type/ExecStart/FragmentPath disagrees with the unit Globular rendered
    - id: systemic.credentials_in_config_and_source
