      root_cause: |
        The pre-v1.2.160 `globular platform-upgrade` CLI implementation
        (golang/globularcli/upgrade_cmds.go) iterated the BOM and called
        upsertServiceDesiredVersion for every package — service AND
        infrastructure — writing /globular/resources/ServiceDesiredVersion
        records directly to etcd. This bypassed:

          1. the per-node profile gate (a package's profiles vs. each
             node's profiles)
          2. the per-node installed-state check (was the package even
             installed on this node before the upgrade?)
          3. version comparison (the CLI clobbered the spec even when
             the cluster was already at or ahead of the BOM)
          4. local-repository resolvability (the CLI wrote BOM build_ids
             without verifying the local repo could serve them, producing
             orphans)

        It also bypassed workflow.source_of_operational_truth — there
        was no workflow record, no audit, no re-entry point, and no
        rollback. Once written, the ServiceDesiredVersion overrode the
        operator's intent until manually reverted per-package.

