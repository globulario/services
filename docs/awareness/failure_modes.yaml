    - architecture_fix: |
        Every direct resources.Apply on a release record must compare the fields the writer is
        about to mutate against their current values and return nil when nothing meaningful
        changed. LastTransitionUnixMs is anchored to actual transitions, not to redundant writes,
        so a no-op write must NOT bump it. See patchInfraReleaseStatus in release_reconciler.go
        for the canonical equality-guard pattern.
      forbidden_fixes:
        - workflow.unconditional_release_status_apply
      id: controller.release_status_writer_bypasses_equality_guard
