    - architecture_fix: |
        See the related invariant
        `reconcile.dep_block_records_must_be_cleared_when_dep_satisfies`
        for the contract. The implementation is the
        `writeRuntimeDepBlock` + `clearRuntimeDepBlock` +
        `sweepRuntimeDepBlocks` triad in `critical_key_prereqs.go`
        and the unconditional sweep call in `reconcile_nodes.go`.
        The sweep is level-triggered and idempotent: it inspects
        every node's BLOCKED records, re-runs `checkRuntimeDeps`,
        and clears only records whose dep is now observably
        satisfied AND join-phase verified.
      historical_resolution: |
        Resolved as a runtime gap on 2026-05-24 in services commits:
          - e47c2316 — day1-join: fix backpressure handling and
            auto-clear stale dep-blocks. Introduced
            `clearRuntimeDepBlock` and the edge-triggered clear in
            `reconcileResolved`.
          - dba27d03 — fix node leave and rejoin issue. Introduced
            `sweepRuntimeDepBlocks` (level-triggered safety net)
            and wired it into `reconcile_nodes.go` so it runs every
            reconcile tick.
        Existing regression tests in
        `critical_key_prereqs_test.go`:
          - TestSweepRuntimeDepBlocks_ClearsWhenDepsSatisfied
          - TestSweepRuntimeDepBlocks_DoesNotClearWhenDepsMissing
          - TestSweepRuntimeDepBlocks_ListErrorIsNonFatal

        This failure_mode is therefore a regression-risk record, NOT
        a description of a current runtime gap. It exists so a future
        edit that removes the sweep, weakens
        `checkRuntimeDeps`, or breaks the clear contract is flagged
        before the regression is shipped. The related invariant
        `reconcile.dep_block_records_must_be_cleared_when_dep_satisfies`
        is the stay-fixed guard.
      id: reconcile.stale_dep_block_persists_after_dep_active
      known_bad_fixes:
        - treating manual `etcdctl del` as the supported recovery — it leaves the next race unaddressed and bakes the operator into the dispatch loop
        - masking the BLOCKED record in `hasUnservedNodes` so dispatch proceeds anyway — defeats the dep-block gate entirely, breaks legitimate cases where the dep IS inactive
        - increasing the dep-block record's TTL so it expires naturally — replaces a known stall with a longer one, still loses dispatch attempts inside the TTL window
        - only clearing on the install path — bootstrap-race windows can write a BLOCKED record AFTER the install path's clear runs, so the record sticks until the next install attempt that never happens because dispatch is blocked
        - weakening `checkRuntimeDeps` to bypass the join-phase gate — this directly reintroduces INC-2026-0005's race window
      related_invariants:
        - meta.write_creates_completion_obligation
        - reconcile.dep_block_records_must_be_cleared_when_dep_satisfies
        - convergence.no_infinite_retry
        - critical_state.absence_is_not_destructive_intent
      related_services:
        - cluster-controller
        - node-agent
        - etcd
      required_tests:
        - TestSweepRuntimeDepBlocks_ClearsWhenDepsSatisfied
        - TestSweepRuntimeDepBlocks_DoesNotClearWhenDepsMissing
        - TestSweepRuntimeDepBlocks_ListErrorIsNonFatal
      root_cause: |
        Historical root cause (resolved 2026-05-24): `writeRuntimeDepBlock`
        in `critical_key_prereqs.go` was edge-triggered by reconcile
        events that observed the dep inactive, but there was no
        symmetric clearer that ran on subsequent ticks observing the
        dep active. Bootstrap-time races made this visible: a node's
        xds_ready phase wrote BLOCKED records at t=T while
        envoy/xds finished starting at t=T+Δ; the next reconcile
        tick saw the records but the dispatch gate in
        `hasUnservedNodes` (release_pipeline.go) refused to dispatch
        the very work that would have cleared them. Result: infinite
        stall until an operator did manual etcd surgery. INC-2026-0005
        (globule-dell Day-1 join, 2026-05-23) needed three manual
        clearing waves before the node converged: 6 keys during
        bootstrap, 34 keys after workload_ready, 2 keys for the
        sctool dep on scylla-manager. See
        session_dell_join_dep_block_fix.

        Regression triggers (this is the part to watch in code
        review):
          - The unconditional `srv.sweepRuntimeDepBlocks(ctx, nodes)`
            call at the top of `reconcileNodes` is removed, hoisted
            behind a feature flag, or moved into a code path that is
            only reachable under specific node states.
          - `sweepRuntimeDepBlocks` is refactored to filter records
            without re-running `checkRuntimeDeps` (e.g. clearing
            blocks whose dep was reported active "recently" via a
            timestamp on the record instead of a fresh evaluation).
          - `checkRuntimeDeps` is loosened so a stateful infra dep
            (scylladb / minio / etcd) is treated as satisfied on
            systemd-active alone, without `*JoinPhase == Verified`.
          - The `runtime_deps_not_ready` ReasonCode filter is widened
            so the sweep deletes other BLOCKED outcomes too.
          - The clear path stops deleting BOTH the action key AND the
            latest convergence record (e.g. only the action key is
            deleted), leaving `hasUnservedNodes` reading the stale
            convergence record.
          - The deterministic action ID format changes without
            updating `runtimeDepBlockKindFromActionID`, so the sweep
            silently emits empty kind values and the clear writes to
            a different key than the original block.
      severity: high
      symptoms:
        - '(historical / regression-only) node stuck at one of: xds_ready / envoy_ready / awareness_ready / workload_ready for >5 min after the blocking infra service is reported active'
        - (historical / regression-only) `hasUnservedNodes` returns true for the node yet the reconciler never dispatches an install workflow for the blocked package
        - (historical / regression-only) `globular cluster_get_node_health_detail <node>` shows the blocking dep as active, but the convergence record still reads BLOCKED_MISSING_NATIVE_DEP
        - (historical / regression-only) etcd contains `/globular/convergence/nodes/{node}/packages/{kind}/{pkg}/latest` with outcome=BLOCKED_MISSING_NATIVE_DEP and `/globular/convergence/actions/controller/{node}/{kind}/{pkg}/runtime_dep_block` still present after dep is active
        - (historical / regression-only) manual `etcdctl del` of those two keys followed by `globular services repair` unsticks the node — proves the deps are healthy and the records are stale
        - '(regression canary) the journal stops emitting `runtime-dep-block: auto-cleared stale block for ...` lines on a cluster where bootstrap races are expected (e.g. fresh node joins) — implies the sweep is no longer running, no longer reaching the clear branch, or `checkRuntimeDeps` has been silently loosened'
      title: A node holds its bootstrap phase because a prior BLOCKED_MISSING_NATIVE_DEP record was never cleared after the dep became active
