    - architecture_fix: |
        Stamp a per-node local marker file (/var/lib/globular/minio/.transition-applied-gen)
        recording the topology generation for which this node performed the wipe. Subsequent
        reconciles read the marker — if it matches state.Generation, the wipe is skipped.
        A genuinely new transition (different generation) mismatches the marker and re-arms
        the wipe path naturally. Per-node local state is appropriate because each node's
        wipe is independent and the marker is purely for idempotency on the local filesystem.

        Fix landed in commit 6ef2edc4 (node-agent 1.2.60+):
        - clearMinioSysIfTransitionApproved checks the marker before wiping
        - Stamps the marker with state.Generation after a successful wipe
        - Subsequent reconciles short-circuit when the marker matches the current generation

        Operational recovery from the loop (if it ever recurs on older node-agents):
        1. Delete /globular/objectstore/topology/transition/<gen> from etcd to dis-arm the gate
        2. systemctl stop globular-minio.service on ALL nodes simultaneously
        3. Verify .minio.sys exists on all nodes (the wipe loop should now be stopped)
        4. systemctl start globular-minio.service on ALL nodes simultaneously
           — fresh distributed bootstrap, format.json written cleanly
      id: objectstore.minio.transition_wipe_loop
      known_bad_fixes:
        - Restarting just one MinIO instance hoping the cluster will recover (it needs quorum bootstrap)
        - Deleting bucket data dirs trying to "start fresh" (destroys user objects, doesn't fix the loop)
        - Reapproving the topology transition with a new generation (re-triggers wipe with no marker)
        - Forcing the topology workflow to "complete" via etcd writes (workflow has no concept of wipe completion)
        - Editing the format.json by hand to a synthesized value (UUID mismatch, MinIO refuses)
      related_invariants:
        - meta.competing_writers_must_converge_or_be_fenced
        - objectstore.minio.wipe_is_idempotent_per_generation
        - objectstore.topology_contract
      required_tests:
        - TestTransitionWipe_AppliedMarker_SkipsSecondWipe
        - TestTransitionWipe_NewGeneration_ReArmsWipe
        - TestTransitionWipe_MarkerStampedAfterSuccess
        - TestTransitionWipe_MarkerSurvivesNodeAgentRestart
      root_cause: |
        clearMinioSysIfTransitionApproved (golang/node_agent/node_agent_server/minio_systemd_reconcile.go)
        gates the .minio.sys wipe purely on the etcd TopologyTransition record's IsDestructive +
        Approved + Generation fields. The gate has no "already applied" memory: every reconcile
        cycle while the record exists at the current desired generation, the wipe re-fires.

        Sequence per reconcile:
          1. .minio.sys exists (MinIO re-created it on the previous cycle while healing)
          2. transitionAuthorizesWipe(transition, state, nodeIP) returns true
          3. clearMinioSysForModeChange removes .minio.sys (RemoveAll)
          4. MinIO sees unformatted drive on the next probe (~10s), enters healing loop
          5. MinIO recreates .minio.sys/buckets/, /config/, /multipart/ as part of healing
          6. format.json never gets written because distributed bootstrap requires a quorum
             of formatted drives — and every node is in the same wipe loop
          7. Next reconcile (~30s later): back to step 1

