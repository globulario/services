        - 'no ''objectstore-apply: processing request'' log lines for hours after the watcher''s last error'
      title: objectstore-apply-watcher exits its goroutine when etcd watch returns 'mvcc compacted'; not re-established
    - architecture_fix: |
        Two layers. (1) Collector: record every failed sub-fetch via snap.addError so snap.HadError
        and snap.DataIncomplete are truthful (fix the silently-dropped etcd reads). (2) Registry
        dispatch: EvaluateAll/EvaluateForNode emit one INVARIANT_UNKNOWN finding per missing source
        (snapshotSourceUnavailableFindings) carrying a non-empty CheckError, so an unavailable
        source is always a first-class finding and is never counted as a FAIL. High-risk
        cluster-scoped rules (etcd quorum/stale/bootstrap/crash, service drift, leader
        pending-update) additionally call snap.HadError and return nil to refuse to answer on
        partial data. Per-node map-iterating rules (certificate health, ingress/scylla guardians)
        are covered by the registry layer — a top-level `return nil` there would wrongly suppress
        findings for the healthy nodes still present in the map.
      forbidden_fixes:
        - treat_empty_snapshot_field_as_healthy
        - return_nil_in_per_node_rule_suppressing_present_nodes
        - drop_collector_subfetch_error_without_addError
      id: cluster_doctor.rule_goes_silent_when_source_errors
