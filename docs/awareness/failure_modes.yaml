        specific plan id between validate and execute.

        A new MCP tool that calls exec.Command (or any other side-effecting
        runner) outside the governor — e.g. a "convenience" execute branch
        added to a knowledge tool like tools_cli.go, or a per-domain
        execute helper added to tools_workflow.go — defeats the
