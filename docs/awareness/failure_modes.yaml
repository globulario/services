        - TestEvaluateAll_PartialSnapshot_FindingAnnotated
      root_cause: |
        Doctor rule Evaluate methods read typed Snapshot fields (snap.Nodes, snap.NodeHealths,
        snap.CertificateStatus, snap.ScyllaSchemaGuardStatus, ...). When a collector sub-fetch
        fails the corresponding field is left empty/nil. Rules that iterate the empty field emit
        no finding, so a real condition is masked: "source errored" becomes indistinguishable from
        "healthy/empty". annotateForReducedHarvest only tags findings that WERE produced, so a rule
        that produces nothing leaves the masked outage invisible. Compounding it, several collector
        etcd reads (ingress/v1/status, scylla/schema_guard, controller/leader_pending_update)
        silently dropped their Get error (`if err == nil { ... }` with no else), so snap.HadError
        returned false even when the read failed.
      severity: high
      symptoms:
        - cluster-doctor reports a clean/healthy sweep while an upstream (controller, node-agent, etcd) is unreachable
        - a cert-expiry / etcd-quorum / service-drift finding that should fire is silently absent
        - snap.DataIncomplete is true but no finding names the unavailable source
      title: Doctor rule emits no finding when its collector source errored, masking a real outage as healthy
