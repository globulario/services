    - architecture_fix: |
        Three patterns work:
        1. node.StableIP(clusterVIP) — explicitly excludes the cluster VIP. Use when picking
           a single representative IP for publication / addressing.
        2. nodeAny<X>(node, list) helpers — match against ANY of node.Identity.Ips. Use when
           CHECKING membership in a stable list.
        3. nodeIDByPoolIP(snap.Nodes, poolIPs) — bulk-build a poolIP→nodeID map by iterating
           every node's full Identity.Ips list. Use when a rule needs to resolve multiple
           pool IPs to nodeIDs in one pass.

        Fixes landed:
        - a4ea9ef1: etcd memberNode/dns/gateway paths via StableIP
        - ead2bb94 (1.2.28): MinIO pool admission via nodeAnyIPInPool in minio_pools.go
        - <next commit>: cluster-doctor's 5 sites (write_quorum_lost, format_heal_deadlock,
          duplicate_physical_path, active_on_non_member, poolEndpoints) via
          nodeIDByPoolIP / nodeHasIP helpers in node_ip_matching.go
      forbidden_fixes:
        - hardcode_node_to_pool_mapping_to_avoid_filter
        - filter_out_vip_in_node_identity_ips
        - special_case_keepalived_master_as_an_exception
        - read_advertise_ip_without_falling_through_to_ips_list
      id: vip_contamination.node_routable_ip_returns_vip
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - objectstore.topology_contract
        - etcd.endpoint_reachability
      related_services:
        - cluster-controller
        - cluster-doctor
        - keepalived
        - dns
        - ai-memory
      required_tests:
        - TestMinioJoin_VIPHolder_MatchesByAnyIP
        - TestEtcdMemberMatchAcceptsAnyOfNodeIps
        - TestDNSReconcilerExcludesVIPFromPerNodeARecords
        - TestPublishGatewayUsesStableIP
        - TestNodeIDByPoolIP_MatchesByAnyIP
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestWriteQuorumLost_VIPHolder_RealDowntimeStillFires
      root_cause: |
        Two distinct failure mechanisms in the same class — both stem from reducing a multi-IP
        node identity to a single IP for comparison against a curated stable IP list.

        Mechanism A — first-IP-is-VIP:
        node.Identity.Ips lists ALL the node's IPs. For the keepalived MASTER, the floating
        VIP appears (typically as the first or among the first entries). Helpers that pick a
        single representative IP — node.PrimaryIP(), node.Identity.Ips[0], nodeRoutableIP() —
        return the VIP whenever the node holds it. Comparing that VIP against a stable-IP
        pool list never matches.

        Mechanism B — AdvertiseIp-is-empty:
        NodeIdentity has a separate single-string field `AdvertiseIp` distinct from the
        repeated `Ips` list. The controller does not currently populate AdvertiseIp (verified
        live 2026-05-10 — empty on every node in a 5-node cluster). Consumers that compare
        `n.GetIdentity().GetAdvertiseIp() == ip` get `"" == "10.0.0.x"` → false, which
        either produces a false-positive ("node not in pool" → write_quorum_lost,
        unapproved_path) OR a silent false-negative ("can't determine IP, skip" — real
        violations missed in active_on_non_member).

        Anything downstream that COMPARES that single representative IP against a curated,
        stable IP list (etcd peer URLs, MinIO pool nodes, controller pool nodes, DNS
        records, admitted disks, doctor invariants) fails to match — and treats the node as
        unknown / stale / non-member / down.
      severity: critical
      symptoms:
        - an etcd member is wrongly evicted as 'stale' immediately after keepalived enable
        - DNS per-node A records contain both the real IP and the VIP for every per-node FQDN
        - MinIO publish filter excludes the VIP-holder from ObjectStoreDesiredState.Nodes (chicken-and-egg with MinioJoinPhase=non_member)
        - publishGateway / publishController DNS records mix the VIP among gateway/controller node IPs
        - cluster-doctor objectstore.write_quorum_lost CRITICAL active_drives=0 even when MinIO is healthy on every storage node (live mc admin info shows 3/3 drives Ok)
        - cluster-doctor objectstore.minio.unapproved_path CRITICAL on every admitted disk after a topology apply that previously succeeded
        - cluster-doctor objectstore.minio.active_on_non_member silently misses real violations (false-NEGATIVE — rule continues on empty IP rather than firing)
      title: Single-IP node identity reads cause VIP-contamination misclassification across multiple subsystems
    - blast_radius:
        - Release pipeline stuck behind permanently-deferred run; no self-recovery without operator intervention
        - AI executor sees the run as "in progress" and does not recommend remediation
        - Compounds with workflow.dispatch_is_not_completion — caller (controller) cannot tell deferred from in-flight
      description: |
        A deferred run is the cluster's primary mechanism for surviving a transient blocker (waiting on a wave, on a blocker_tag, or on an operator resource). The run is held in RUN_STATUS_DEFERRED with a cooldown (BackoffUntilMs) and a persistent across-runs counter (correlation_defer_state, WF-DEFER B3). When the blocker clears — either by cooldown expiry or by an event matching the blocker_tag (WakeDeferredRunsByBlockerTag, B4) — the run must be eligible to dispatch again.
        It becomes permanently unretryable when any of the following is silently broken:

          1. correlation_defer_state row is lost across workflow-server
             restart (B3 persistence broken) — defer_count resets to 0,
             but the blocker_tag and abandoned bit are gone, and the
             run keeps re-deferring forever without ever hitting
             max_defers → ABANDONED.

          2. Run reaches max_defers and is correctly marked ABANDONED,
             but the operator has no signal — no log, no event, no
             doctor finding. The CLI clear (`globular workflow
             defer-state clear`) is the only escape and the operator
             does not know to run it.

          3. WakeDeferredRunsByBlockerTag fails to match the live
             blocker_tag (typo at persist time, or templating bug
             dropped the tag silently). The cooldown still expires
             eventually, but the event-driven shortcut is lost and the
             cluster waits minutes/hours for the timer.

          4. Wake silently resets defer_count (B3 violation). The run
             starts re-counting from zero, defers indefinitely without
             ever reaching ABANDONED, and the operator never sees the
             "operator action required" signal.
      forbidden_fixes:
        - reset_defer_counter_on_workflow_server_restart
        - clear_abandoned_correlations_on_a_timer_without_operator_consent
        - wake_resets_defer_counter
        - drop_blocker_tag_on_persist_to_simplify_schema
        - silently_succeed_when_correlation_defer_state_row_missing
      id: workflow.abandoned_defer_never_retried
      protects:
        files:
            - golang/workflow/workflow_server/executor_defer.go
            - golang/workflow/workflow_server/correlation_defer_state.go
            - golang/workflow/workflow_server/correlation_defer_state_rpc.go
            - golang/workflow/workflow_server/executor.go
            - golang/workflow/workflow_server/schema.go
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - workflow.deferred_run_retryable_when_blocker_clears
        - workflow.dispatch_is_not_completion
      required_tests:
        - TestNextDeferStateAbandonsAtMax
        - TestMemoryStoreSurvivesWorkflowServerRestart
        - TestWakePreservesDeferCount
        - TestWakeIgnoresAbandoned
        - TestDispatchOrderAbandonedBeforeCooldown
      severity: high
      status: active
      symptoms:
        - Workflow runs in RUN_STATUS_DEFERRED that never advance, with no warning log saying correlation now ABANDONED
        - Wave-block cooldown ticks forever; downstream releases stuck in WAVE_BLOCKED
        - '`globular workflow defer-state list` shows rows with defer_count=0 that have been deferring for hours'
        - WakeDeferredRunsByBlockerTag returns 0 matched runs for an event that operators expect to unblock specific work
      title: Deferred workflow run becomes permanently unretryable — blocker_tag, persistent counter, or wake-by-tag bookkeeping lost
      trigger: |
        Scylla schema migration that drops the correlation_defer_state table; workflow-server upgrade that clears the table; bug in blocker_tag templating; wake handler that calls ResetDeferCount instead of preserving it.
    - architecture_fix: |
        Workflow dispatch must perform a health preflight check. If Scylla is degraded, dispatch must return an error and let the caller retry with backoff.
      forbidden_fixes:
        - dispatch_workflow_when_scylla_down
        - ignore_backend_health_on_dispatch
      id: workflow.backend_unavailable
      related_invariants:
        - meta.write_creates_completion_obligation
        - workflow.backend_health_gate
      related_services:
        - workflow-service
        - cluster-controller
      required_tests:
        - TestWorkflowDispatchRefusedWhenScyllaDown
      root_cause: |
        Workflow dispatch did not check backend (Scylla) health before creating the workflow record. Records written during Scylla instability may be orphaned if the write partially succeeds.
      severity: high
      symptoms:
        - workflow records created with no executor
        - workflow stays in RUNNING state forever
        - action results never committed
        - cluster state diverges from desired
      title: Workflow dispatched when backend is down
    - architecture_fix: |
        Fix order is strict:
        1. Confirm etcd NOSPACE is cleared (alarm list empty, endpoint health all healthy)
        2. Confirm controller has acquired leader lease (watch controller logs)
        3. Workflow dispatch typically recovers automatically within 30-60s after controller stabilises
        4. If workflows remain CONVERGING >5min post-stabilisation:
           globular workflow list-runs --status blocked
           → manually re-trigger or advance blocked workflows
        NEVER restart workflow service before etcd and controller are stable.
      forbidden_fixes:
        - workflow.restart_before_control_plane_stable
        - workflow.treat_as_root_cause
      id: workflow.dispatch_timeout_due_to_control_plane_instability
      related_invariants:
        - meta.state_mutations_must_be_durably_committed_before_side_effects
      related_services:
        - workflow
        - cluster_controller
        - etcd
      required_tests:
        - TestOfflineDiagnose_WorkflowTimeout_MapsToControlPlaneInstability
        - TestSuggestIncident_FixOrder_EtcdBeforeWorkflow
      root_cause: |
        The workflow service dispatches steps by writing to etcd and coordinating with the
        cluster controller. When etcd rejects writes (NOSPACE) or no controller holds the
        leader lease, dispatch RPCs time out. This failure is always a symptom — the root
        cause is upstream in etcd or the controller.
        WARNING: Do not fix workflow before fixing etcd and controller.
      severity: high
      symptoms:
        - '''context deadline exceeded dispatching workflow step'''
        - '''workflow stuck at CONVERGING'''
        - workflow runs remain in ACTIVE/CONVERGING state indefinitely
        - no new workflow steps dispatched
        - globular workflow list-runs shows blocked workflows piling up
      title: workflow dispatch timeout — terminal symptom of upstream etcd or controller instability, not the root cause
    - architecture_fix: |
        Wrap every handler invocation in safeInvoke, which recovers a panic and
        converts it into an ordinary step error (logging the stack once for
        diagnosis). The step then fails/retries normally and the run reaches a
        terminal state; the process survives. Applies to the sequential, foreach,
        and onFailure-hook dispatch sites — and, critically, to parallel goroutines
        where the panic would otherwise crash the process.
      forbidden_fixes:
        - invoke_step_handler_without_panic_recovery
        - recover_only_on_the_sequential_path_not_in_goroutines
      id: workflow.engine_step_panic_crashes_process
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - meta.state_mutations_must_be_durably_committed_before_side_effects
      related_intents:
        - reconciliation.must_be_idempotent_and_bounded
      related_services:
        - workflow
      required_tests:
        - TestEngine_PanickingStepReachesTerminalState
        - TestEngine_PanickingParallelStepDoesNotCrashProcess
      root_cause: |
        The engine had no recover() at any dispatch site. A step handler that
        panicked unwound the stack out of the engine; because the engine runs
        every step through an executeDAG goroutine, an unrecovered panic took
        down the whole workflow service process (a goroutine panic cannot be
        recovered by the caller). This violates the terminal-state guarantee —
        the run never reaches SUCCEEDED/FAILED — and is the "unexpected case
        handled by silence/crash" shape: one bad actor handler becomes a
        cluster-wide outage of the coordinator.
      severity: high
      symptoms:
        - workflow service process exits on a single bad step (panic in an actor handler)
        - run is left non-terminal with no FAILED record; observers see a vanished process, not a failed run
        - goroutine panic in the crash log, created by ...executeDAG
      title: A panicking step handler crashes the workflow service instead of failing the run
    - architecture_fix: |
        Commit-first. A StartRun failure is fatal: ExecuteWorkflow aborts BEFORE
        engine.Execute and returns an error so the caller retries the whole
        dispatch (retry is the only response — no proceeding fail-open). StartRun
        is an idempotent upsert (CQL INSERT by primary key + supersedePriorRuns)
        and engine steps are idempotent (reconciliation.must_be_idempotent_and_bounded),
        so a retry that re-commits and re-executes does not double-apply. StartRun
        is indirected through the startRunFn package var so the
        commit-before-side-effect ordering is gated by a behavioral test.
      forbidden_fixes:
        - proceed_to_execute_when_run_record_commit_fails
        - treat_run_start_persistence_as_best_effort
      id: workflow.executor_dispatches_side_effects_before_run_record_commits
      related_invariants:
        - meta.state_mutations_must_be_durably_committed_before_side_effects
        - workflow.every_state_mutation_belongs_to_a_workflow_instance
      related_intents:
        - reconciliation.must_be_idempotent_and_bounded
      related_services:
        - workflow
        - cluster-controller
      required_tests:
        - TestExecuteWorkflow_StartRunCommitFailure_NoSideEffects
      root_cause: |
        ExecuteWorkflow persisted the run record via StartRun, then treated a
        StartRun failure as NON-FATAL ("execution proceeds even if recording
        fails") and called engine.Execute regardless. The engine then dispatched
        all actor side effects with no durable coordinator record — the
        "lost intent / untraceable change" class: the intent was never committed
        but the world was changed, and there is no resume point or audit trail.
        The source-grep state_mutations scanner cannot see this; it is a runtime
        ordering / error-handling bug, not a write-site shape — surfaced 2026-06-09
        while scoping the runtime ordering ratchet.
      severity: high
      symptoms:
        - cluster mutations (installs, restarts) occur with no workflow_runs row explaining them
        - a workflow-service restart cannot find or resume a run whose side effects already ran
        - observers/audit see effects with no run record naming who decided them and when
      title: Executor dispatches actor side effects even when the durable run record (StartRun) fails to commit
    - blast_radius:
        - Run state unreliable for affected workflow
        - Side effects may be applied twice (installs, etcd writes, notifications)
      description: |
        The executor heartbeat must be renewed every 30 seconds. If a workflow step takes longer than orphanHeartbeatTimeout (30s) without refreshing the lease, the orphan scanner (runs every 15s) may claim the run and start a new executor. Two executors then compete to complete the same run, producing conflicting state writes.
      forbidden_fixes:
        - increasing orphanHeartbeatTimeout as a substitute for fixing slow steps
        - disabling the orphan scanner to prevent double-claim
      id: workflow.orphan_lease_slow_step_double_claim
      protects:
        files:
            - golang/workflow/workflow_server/executor_lease.go
            - golang/workflow/workflow_server/executor_resume.go
            - golang/workflow/workflow_server/executor.go
      related_invariants:
        - meta.competing_writers_must_converge_or_be_fenced
      severity: high
      status: active
      symptoms:
        - Two "executor lease: claimed orphan, resuming" log entries for the same run_id
        - Run state shows SUCCEEDED then FAILED (or vice versa)
        - Duplicate workflow effects (service installed twice, etcd key written twice)
      title: Slow workflow step causes orphan scanner to claim active run — double execution
      trigger: |
        Slow etcd write, Scylla query timeout, or CPU starvation causes a step to take >30s without the lease heartbeat being renewed.
    - fixed_in: 308ed1bf
      id: workflow.run_outputs_data_race
      protects:
        files:
            - golang/workflow/engine/resume.go
            - golang/workflow/engine/engine.go
      related_invariants:
        - meta.competing_writers_must_converge_or_be_fenced
      root_cause: |
        resume.go recordResumeDecision wrote run.Outputs without outputMu.
        engine.go evalCondition read run.Outputs without outputMu. Both
        race with parallel step goroutines that write under the lock. Fix:
        lock in recordResumeDecision; snapshot outputs under lock in evalCondition.
      severity: high
      status: fixed
      symptoms:
        - Race detector fires under parallel step execution during resume
        - Corrupted step outputs or panic from concurrent map access
      title: run.Outputs read/written without outputMu in resume and condition evaluation — concurrent map access UB
    - blast_radius:
        - A foreach step gated by `when` fails every reconcile pass on a healthy cluster
        - cluster.reconcile run FAILS continuously; repeated dispatch rejections trip the workflow.backend_pressure WARN
        - Self-healing remediation dispatch path appears broken even when nothing is wrong
      description: |
        executeForeach evaluated the step `when` guard AFTER resolving the
        foreach collection and AFTER the nil-collection FAIL / empty-collection
        SKIP checks. The non-foreach dispatch path (executeStep) evaluates
        `when` BEFORE the step body, so foreach steps were asymmetric: a step
        explicitly gated off by `when: false` could still FAIL because its
        collection reference resolved to nil. cluster.reconcile's
        dispatch_remediations is guarded by `len(remediation_items) > 0`, but on
        a clean cluster classify_drift produces no items and the empty result
        serializes to JSON null across the actor RPC boundary, so the collection
        arrives as nil (not an empty list) — never reaching the empty-SKIP path,
        and FAILing the gated step every ~30s.
      id: workflow.foreach_when_guard_evaluated_after_collection_resolution
      fixed_in: infra-truth-plane-etcd-minio-envoy
      known_bad_fixes:
        - Collapsing the nil-collection case into a silent SKIP for all foreach steps (re-breaks meta.silence_is_not_valid_for_unexpected — an UNGATED foreach over nil must still FAIL loudly)
        - Making classify_drift emit a sentinel non-empty list to dodge the nil case
        - Removing the `when` guard from dispatch_remediations and relying on the empty-SKIP path (fails because the value is nil, not [])
      protects:
        files:
            - golang/workflow/engine/engine.go
      violates_contracts:
        - contract.workflow.foreach_guard_order
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - meta.competing_writers_must_converge_or_be_fenced
      related_failure_modes:
        - workflow.run_outputs_data_race
      required_tests:
        - TestForeach_WhenGuardSkipsBeforeUnresolvedCollection
        - TestForeach_WhenGuardTrueStillFansOut
        - TestForeach_UnresolvedCollectionFails
      resolution: |
        In executeForeach, evaluate the `when` guard FIRST, against a run.Outputs
        snapshot taken under outputMu (the same lock discipline as the
        non-foreach path; this also closes the unlocked read flagged by
        workflow.run_outputs_data_race). If when==false -> SKIP without touching
        the collection. Only when the guard passes (or is absent) resolve the
        collection and keep the nil->FAIL invariant for steps that are actually
        supposed to run.
      severity: high
      status: fixed
      symptoms:
        - 'reconcile:<ts> runs FAILED every ~30s with: step dispatch_remediations: foreach collection "$.remediation_items" did not resolve to a list'
        - doctor WARN workflow.backend_pressure with sustained dispatch rejections on an otherwise-healthy cluster
        - short_circuit_clean (len == 0) succeeds in the same run while dispatch_remediations (len > 0) fails — proves the value is nil, not a real list
      title: foreach `when` guard evaluated after collection resolution — gated step FAILs on a nil collection
    - id: workflow.stale_definitions_block_expected_sha256_propagation
      known_bad_fixes:
        - using a cluster-controller binary bridge to mask the missing field
        - patching the controller or node-agent to ignore the missing checksum field
        - syncing only one workflow YAML and leaving the package/controller pair inconsistent
        - mutating installed_state to verified to silence the gap
        - treating empty expected_sha256 as success in any layer
      related_invariants:
        - meta.half_done_must_not_look_done
        - workflow.definitions_must_thread_required_verification_fields
        - controller.apply_package_release_requires_manifest_checksum
        - runtime.success_requires_expected_binary_checksum
      required_tests:
        - TestDispatch_PopulatesExpectedSha256FromManifest
        - TestDispatch_AuditAllCallSitesSetExpectedSha256
      resolution: |
        Sync golang/workflow/definitions/*.yaml to /var/lib/globular/workflows/
        (the same operation install-day0.sh performs at Day-0), chown to globular,
        and restart globular-cluster-controller so it re-seeds etcd. After
        restart, /globular/workflows/release.apply.* in etcd carries the new
        fields and subsequent dispatches log expected_sha256_present=true.

        The forward fix is to package the workflow YAMLs with cluster-controller
        so the install pipeline updates both atomically.
      root_cause: |
        The v1.2.119 cluster-controller binary correctly resolves
        manifest.entrypoint_checksum and threads it into workflow inputs as
        resolved_entrypoint_checksum. But the controller seeds the workflow
        definition for release.apply.package / release.apply.controller from
        /var/lib/globular/workflows/*.yaml. install-day0.sh installs those YAMLs
        once at Day-0; nothing keeps them in sync when the controller binary
        is upgraded via the normal install pipeline. A pre-v1.2.119 YAML on
        disk does not declare the new resolved_entrypoint_checksum input
        and does not thread it to install_package's with: block. The result:
        the controller code asks the workflow engine for an input that the
        loaded definition does not contain, the actor receives empty, and the
        ApplyPackageReleaseRequest carries ExpectedSha256="" — silently
        breaking the verification contract that the binary was supposed
        to enforce.
      severity: critical
      symptoms:
        - controller dispatches log expected_sha256_present=false despite running the v1.2.119 binary
        - workflow-seed log shows etcd workflow entries that lack resolved_entrypoint_checksum / expected_sha256 fields
        - node-agent honestly writes installed_unverified or rejects installs as binary hash mismatch
        - cluster_doctor reports installed-state drift but the controller binary commit is correct
      title: Stale workflow YAML definitions on disk break the v1.2.119 expected_sha256 propagation chain
    - blast_radius:
        - Service release blocked indefinitely
        - Reconciliation diverges from intent until operator manually resets
      description: |
        When a workflow completes after the release generation has advanced (e.g. a retry started a new run), the stale callback must be discarded. The generation guard in handleWorkflowCompletion checks expectedGeneration but the check and write are not atomic — a concurrent advance between the check and the write can let a stale callback overwrite the current phase.
      id: workflow.stale_release_callback_overwrites_generation
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/workflow_release.go
            - golang/cluster_controller/cluster_controller_server/release_pipeline.go
            - golang/workflow/workflow_server/executor.go
      related_invariants:
        - meta.competing_writers_must_converge_or_be_fenced
      required_tests:
        - TestDeleteCriticalReleaseRejectsGenerationMismatch
      severity: high
      status: active
      symptoms:
        - Release phase regresses to an earlier state (e.g. INSTALLING after SUCCEEDED)
        - Reconciler re-dispatches an already-completed release
        - Convergence loops without ever reaching SUCCEEDED
      title: Stale workflow completion callback overwrites a newer release phase via generation race
      trigger: |
        Slow network delay on workflow completion RPC; release generation advances (retry or manual re-trigger) between the guard check and the etcd write.
    - architecture_fix: |
        Package kind must come from ONE canonical registry (package.json metadata). The spec YAML
        and catalog must derive from this source, never independently classify. Add validation at
        build time that asserts spec.kind == package.json.kind. Any disagreement is a build error,
        not a runtime silent mismatch.
      forbidden_fixes:
        - hardcode_kind_list_in_reconciler
        - infer_kind_from_service_name
      id: xds.infra_preparing_loop_from_kind_mismatch
      related_invariants:
        - meta.half_done_must_not_look_done
      related_services:
        - xds
        - repository
        - node_agent
      required_tests:
        - TestPackageKindFromCanonicalRegistry
        - TestXDSConvergesAfterKindMismatchFixed
      root_cause: |
        Package kind classification (infrastructure vs service) was duplicated across spec YAML,
        package.json, and the catalog. When these disagreed, the reconciler applied the wrong
        convergence logic: service-kind packages use a different readiness gate than
        infrastructure-kind. xds and gateway are infrastructure but were classified as service in
        one of the three sources, causing the readiness gate to never fire.
      severity: high
      symptoms:
        - xds or gateway DesiredService shows phase=infra_preparing indefinitely
        - reconciler repeatedly re-attempts xds/gateway install with no progress
        - install workflow completes SUCCEEDED but convergence never happens
        - package kind in spec differs from package.json or catalog classification
        - controller log shows "kind=service" but reconciler routes it as "kind=infrastructure"
      title: xds or gateway stuck in infra_preparing due to package kind classification conflict
    - architecture_fix: |
        Send all decorative/diagnostic output to stderr; reserve stdout for the
        --describe JSON. Concretely: slog handlers target os.Stderr (including
        the nil-logger fallbacks in globule.New / xds server.New / watcher.New),
        and PrintBanner writes to os.Stderr. The --describe branch then emits
        exactly one JSON line to stdout. Verified by running
        `<bin> --describe 1>out 2>err` and asserting out parses as JSON.
      forbidden_fixes:
        - moving the --describe branch earlier but leaving the logger/banner on os.Stdout (the next stdout write reintroduces the bug)
        - teaching the node agent to strip non-JSON lines / scan for the JSON line (papers over a corrupt machine channel; --version and the verifier probe still break)
        - silencing the node agent's "describe failed ... skipping port preflight" log instead of fixing the producer
      id: observability.describe_banner_pollutes_stdout_breaks_port_preflight
      related_invariants:
        - observability.describe_stdout_is_machine_only
        - meta.silence_is_not_valid_for_unexpected
      related_services:
        - gateway
        - xds
      required_tests:
        - TestPrintBannerNeverWritesToStdout
      root_cause: |
        gateway/xds main() construct their slog logger on os.Stdout, and gateway
        constructs a globule (globule.New -> PrintBanner) BEFORE the --describe
        branch. PrintBanner did color.Green.Println / fmt.Println to stdout
        ("Globular v1.0.0 ..."). So `gateway --describe` emitted:
            Globular v1.0.0 (build 0)
            ...
            {"Id":"gateway.GatewayService",...}
        The node agent parses the first bytes as JSON -> "invalid character 'G'".
        xds had the same shape via its always-on "loaded/missing service config"
        Info line (offending char 't' from "time=..."). Both repos' nil-logger
        fallbacks (globule.New, xds server.New, watcher.New) also defaulted to
        os.Stdout — latent siblings of the same class.
      severity: degraded
      status: active
      symptoms:
        - 'node-agent log: "start: describe failed for /usr/lib/globular/bin/gateway; skipping port preflight ... invalid character ''G'' looking for beginning of value"'
        - port preflight silently skipped for gateway/xds — a port conflict would not be caught before unit start
        - '`<bin> --describe` stdout contains the Globular banner or slog lines before the JSON'
      title: gateway/xds --describe emits the banner and logs on stdout, corrupting the JSON the node agent parses for port preflight (preflight then silently skipped)
    - architecture_fix: |
        Classify the missing-unit case by package kind, not by os.Stat alone:
          - SERVICE + unit missing -> recover the unit by running the package's
            bundled spec (specs/<svc>.yaml) through the installer engine
            (install_services/enable/start), then enable/restart/verify. If no
            unit can be produced, fail loudly: installed_state=failed, Ok=false.
            Never report a unit-less SERVICE installed.
          - INFRASTRUCTURE (install_systemd=false) / COMMAND + unit missing ->
            genuine binary-only; unchanged.
        Plus resolve the installed binary from the manifest entrypoint sidecar
        (versionutil.ReadEntrypoint) before the {name}_server guess, and write
        that sidecar BEFORE the install switch so the first-install describe/
        port-config resolves the real binary (awareness-graph, not
        awareness_graph_server).
      forbidden_fixes:
        - classifying a SERVICE with a missing unit as binary-only and returning Ok/installed (leaves the daemon down, drives the reinstall storm)
        - reporting installed_state=installed for a SERVICE whose unit could not be created (half-done must not look done)
        - guessing the binary path as ReplaceAll(name,'-','_')+'_server' instead of reading the manifest entrypoint sidecar
        - special-casing awareness-graph in the verifier/reconciler instead of teaching the SERVICE install path to create the unit
      id: package.install.service_unit_missing_classified_binary_only
      related_invariants:
        - package.install.service_unit_missing_must_not_be_binary_only
        - package.install.installed_state_requires_runtime_artifact_integrity
        - install.join_path_must_complete_install_contract
        - meta.half_done_must_not_look_done
        - meta.failure_response_must_contract_not_amplify
      related_services:
        - node-agent
        - awareness-graph
      required_tests:
        - TestIsServiceKind
        - TestServiceUnitUnrecoverableResponse_FailsLoud
        - TestRecreateServiceUnitFromSpec_MissingPackageFails
        - TestExecutableForServiceResolvesManifestEntrypoint
      root_cause: |
        installer_api.go InstallPackage routes INFRASTRUCTURE through the
        installer engine (runs the full spec, creates units) but SERVICE/COMMAND
        through installPayload, which writes only units a package bundles under
        systemd/. service-dist packages (e.g. awareness-graph 0.0.22) ship the
        unit *inline* in the spec's install_services step and bundle specs/<svc>.yaml
        instead of systemd/<unit> — so installPayload wrote the binary but never
        the unit. The apply path then os.Stat'd /etc/systemd/system/<unit>, found
        nothing, logged "binary-only package, skipping restart", and wrote
        installed_state=installed with Ok=true. The reconciler saw
        installed_state matching desired but the unit gone (installSkipDeniedUnitGone),
        forced a reinstall, which re-ran the same binary-only path — reinstall
        every ~2 min forever, while the ServiceRelease verify_runtime kept failing
        (status=inactive) and ultimately ABANDONED after 5 defers. Compounded by
        the describe/port-config best-effort step resolving the binary as
        awareness_graph_server (the {name}_server guess) which does not exist.
      severity: degraded
      status: active
      symptoms:
        - 'node-agent log: "apply-package: <unit> has no systemd unit — binary-only package, skipping restart" for a SERVICE'
        - 'node-agent log: "install-package <svc>: installed_state matches but <unit> is missing; reinstalling" every ~2 min (reinstall storm)'
        - ServiceRelease ABANDONED after 5/5 defers on verify_runtime with status=inactive (want active)
        - 'installed_state shows status=installed for a service whose globular-<svc>.service unit does not exist on disk'
        - 'describe/port-config best-effort error: stat /usr/lib/globular/bin/<name>_server: no such file or directory'
      title: SERVICE package with a missing systemd unit is misclassified binary-only — apply reports installed, unit never starts, reconciler reinstalls forever and the release abandons

    # ── Frontend perception-bug failure modes (fm.ui.*) ─────────────────────
    # Referenced by the frontend execution-mechanics invariants ported from
    # the predecessor awareness repo (services@ac4bda3b). Origin: principle-
    # derived (no Globular incident yet — the admin console does not exist);
    # each names the anticipated bug class its invariant guards against.
    # Tests are the declared per-invariant gate tests; they become real with
    # the first console components.

    - id: fm.ui.data_holder_becomes_authority
      title: A DOM element or component store silently becomes the authority for backend truth
      severity: high
      root_cause: |
        A data-holder element (component store, dataset attribute, frontend
        singleton) was introduced as a render cache, then other code started
        reading domain truth (runtime health, permission, completion) from it
        instead of from the owning service. The mirror became the source.
      related_invariants:
        - ui.data_holder_is_cache_not_authority
        - meta.code.local_state_must_not_become_hidden_authority
      required_tests:
        - TestDataHolder_DoesNotInventRuntimeStatus

    - id: fm.ui.untyped_dom_event_causes_wrong_refresh
      title: An untyped or generic DOM event triggers the wrong component refresh
      severity: medium
      root_cause: |
        A CustomEvent named "refresh"/"update" with an untyped payload became
        an undocumented global event bus; a malformed or unrelated dispatch
        refreshed the wrong region or mutated state from event detail treated
        as backend truth.
      related_invariants:
        - ui.dom_event_contract_must_be_typed_and_scoped
      required_tests:
        - TestMalformedDomEvent_DoesNotMutateAuthoritativeState

    - id: fm.ui.full_page_reload_masks_state_bug
      title: A full-page reload hides a state-management bug and destroys operator context
      severity: medium
      root_cause: |
        A local state bug was "fixed" with location.reload(), erasing expanded
        panels, selection, filters, and warning visibility — the bug remained,
        now invisible, and the operator paid the context cost on every update.
      related_invariants:
        - ui.partial_update_preserves_screen_context
      required_tests:
        - TestRefreshPreservesExpandedPanelAndSelection

    - id: fm.ui.stale_async_response_reverts_state
      title: A slow stale response overwrites newer frontend state
      severity: high
      root_cause: |
        Concurrent requests against the same target state raced; the older
        response arrived last and silently reverted the UI to stale values —
        no guard (abort, generation counter, revision check) existed.
      related_invariants:
        - ui.async_result_must_not_overwrite_newer_state
        - meta.binding_outlives_evidence_until_invalidated
      required_tests:
        - TestLateResponse_DoesNotOverwriteNewerState

    - id: fm.ui.listener_leak_duplicates_refresh
      title: Leaked listeners or polling loops cause duplicate refreshes and post-unmount mutations
      severity: medium
      root_cause: |
        A component registered listeners/timers/subscriptions without owning
        cleanup; after unmount or navigation the orphans kept firing —
        duplicate refreshes, stale updates to the new screen, memory growth.
      related_invariants:
        - ui.subscription_lifecycle_must_be_owned
      required_tests:
        - TestSubscriptionCleanup_PreventsDuplicateRefresh

    - id: fm.ui.index_key_moves_row_state
      title: Array-index row keys attach state to the wrong item after reorder or filter
      severity: high
      root_cause: |
        A dynamic list keyed rows by array index or display name; sorting,
        filtering, or virtualization reordered the list and expanded/selected/
        edit state silently migrated to a different operational object.
      related_invariants:
        - ui.list_identity_must_use_backend_id
      required_tests:
        - TestListReorder_PreservesRowStateByBackendId

    - id: fm.ui.permission_denied_rendered_as_empty
      title: Permission denied or backend failure renders as a clean empty state
      severity: high
      root_cause: |
        The result pipeline collapsed denied/failed/unknown into the generic
        empty state; the operator read "zero results" where the truth was "you
        may not see this" or "the query failed" — a perception bug with
        authority implications.
      related_invariants:
        - ui.empty_loading_unknown_failed_are_distinct
        - meta.ui.state_certainty_must_be_visually_distinct
      required_tests:
        - TestPermissionDenied_NotRenderedAsEmptyList

    - id: fm.ui.double_submit_creates_duplicate_mutation
      title: Double-click or retry creates duplicate workflows or backend mutations
      severity: high
      root_cause: |
        A mutating submit lacked idempotency and single-flight guarding;
        double-click, Enter+click, or network retry dispatched the mutation
        twice — duplicate workflow runs, duplicate approvals, double applies.
      related_invariants:
        - ui.form_submit_must_be_idempotent_or_singleflight
      required_tests:
        - TestDoubleClick_DoesNotCreateDuplicateMutation

    - id: fm.ui.operational_context_lost_on_navigation
      title: Operationally relevant screen context is lost on reload or cannot be shared
      severity: medium
      root_cause: |
        Selected node/run/filter context lived only in ephemeral component
        state; reload, back-navigation, or sharing a URL with a colleague
        dropped the diagnostic context mid-incident.
      related_invariants:
        - ui.navigation_state_must_be_shareable_when_operationally_relevant
      required_tests:
        - TestWorkflowRunSelection_SurvivesReload

    - id: fm.ui.time_only_cache_hides_backend_change
      title: A TTL-only frontend cache outlives the backend generation it mirrors
      severity: high
      root_cause: |
        Operator-critical state was cached with time-only expiry and no
        authority identity (generation, revision, build_id, invalidation
        event); the backend moved on and the screen kept showing the old
        truth until the timer happened to fire.
      related_invariants:
        - ui.cache_invalidation_must_follow_authority_generation
        - meta.binding_outlives_evidence_until_invalidated
      required_tests:
        - TestCacheInvalidates_WhenGenerationChanges

    - id: fm.ui.error_boundary_loses_diagnostic_context
      title: An error boundary blanks the screen and erases the operator's diagnostic context
      severity: high
      root_cause: |
        A rendering failure triggered a catch-all fallback that replaced the
        whole region — selected resource identity, last-known data timestamp,
        visible warnings, and safe recovery actions all vanished exactly when
        the operator needed them most.
      related_invariants:
        - ui.error_boundary_must_preserve_diagnostic_context
        - meta.ui.failure_must_preserve_diagnostic_context
      required_tests:
        - TestErrorBoundary_PreservesCriticalWarning
    - id: scylla.wrong_config_appears_healthy
      title: A ScyllaDB node with a wrong (e.g. loopback) config looks healthy because the daemon is active — it silently forms an isolated single-node ring
      severity: high
      status: active
      root_cause: |
        Before the infrastructure truth plane, a node's ScyllaDB health was judged
        by "is scylla-server.service active?" plus log scraping. A misrendered
        config — listen_address/seeds pointing at 127.0.0.1, an empty or mismatched
        cluster_name, or a self-only seed list on a joining node — still produces a
        running daemon. systemd reports active, CQL answers locally, and nothing
        errors loudly. The node bootstraps an ISOLATED single-node ring while every
        coarse signal says "green". The wrongness only surfaces later as missing
        data, RF/quorum failures, or a join that never converges — far from the
        root cause. This is the infra instance of
        fm.industry.partial_failure_hidden_by_global_green: a green daemon masks an
        invalid config.
      trigger: |
        The ScyllaDB post-install renderer (or controller-provided desired state)
        emits a config with a loopback cluster-facing address, empty/mismatched
        cluster_name, or self-only seeds on a joining node — and the daemon starts
        anyway.
      symptoms:
        - scylla-server.service is active and CQL answers locally, but the node sees no peers
        - new keyspaces/data do not replicate; RF cannot be satisfied
        - a joining node never converges into the existing ring
        - doctor/heartbeat report the node healthy until a downstream quorum failure
      blast_radius:
        - Stateful platform services backed by ScyllaDB silently lose redundancy
        - A "successful" join leaves an isolated node that diverges from the ring
      architecture_fix: |
        The infra truth plane attests the rendered config against desired state
        BEFORE trusting "active": loopback cluster addresses are CRITICAL
        (scylla.loopback_forbidden), config mismatches are ERROR
        (scylla.config_valid), and the lifecycle FSM marks the node STALLED (not
        healthy) when the daemon is active on a critically-invalid config or when a
        joining node is isolated. daemon_active, healthy, and config_valid are kept
        as separate signals so "active" can never imply "healthy". Doctor raises the
        finding; MCP infra_explain_stall gives the causal answer and points repair
        at the config owner, never a manual file edit.
      forbidden_fixes:
