failure_modes:
    - architecture_fix: |
        A handler whose result crosses the actor boundary into a workflow `when`
        guard or `foreach` MUST return an initialized empty slice ([]any{}),
        never a nil slice. reconcileClassifyDrift now returns []any{} for an
        empty drift report (same precedent as selectReleaseTargets);
        reconcileScanDrift initializes driftItems to []any{}. Defence in depth in
        the engine: executeForeach evaluates the `when` guard BEFORE resolving
        the collection, so a step gated by `when: len(x) > 0` skips cleanly
        instead of failing when x resolves to nil (commit 057be407 + the output
        snapshot-under-lock refinement). The evaluator's fail-closed contract is
        deliberate and unchanged — evalLen treats a nil/absent value as length
        -1 so a producer bug surfaces rather than silently short-circuiting; the
        fix belongs in the producer, not the evaluator.
      forbidden_fixes:
        - return_nil_slice_for_an_empty_collection_that_crosses_the_actor_boundary
        - change_evalLen_to_treat_nil_as_length_0_instead_of_fixing_the_producer
        - collapse_unresolved_foreach_collection_into_a_silent_skip
      id: workflow.reconcile_nil_collection_fails_foreach_run_storm
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/reconcile_actions.go
            - golang/workflow/engine/engine.go
            - golang/workflow/engine/conditions.go
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - meta.fallback_must_degrade_semantics
      related_services:
        - cluster-controller
        - workflow-service
      required_tests:
        - TestReconcileClassifyDrift_EmptyReturnsNonNilSlice
        - TestDefaultEvalCond_Len
      root_cause: |
        reconcileClassifyDrift returned `nil, nil` when the drift report was
        empty (the common no-drift case). That nil became the run output
        remediation_items, which crosses the actor boundary and serializes to
        JSON null, resolving back as nil. The reconcile workflow's guards use the
        len() idiom: short_circuit_clean `len(remediation_items) == 0` and
        dispatch_remediations `len(remediation_items) > 0`. evalLen deliberately
        treats a nil value as length -1 (fail-closed), so BOTH guards evaluated
        false: short_circuit_clean never finalized the clean case, and (on the
        deployed binary, whose executeForeach resolved the collection before the
        when guard) the dispatch_remediations foreach hit a nil collection and
        FAILED, emitting workflow.run.failed every reconcile tick (~every 90s).
        That storm of workflow.run.failed incidents is what the ai_executor then
        re-diagnosed on every repeat — see
        ai_executor.repeat_diagnosis_drains_personal_subscription.
      severity: high
      symptoms:
        - workflow.run.failed emitted by cluster.reconcile every reconcile interval on a healthy cluster
        - reconcile step dispatch_remediations fails with "foreach collection did not resolve to a list"
        - short_circuit_clean never runs even when there is no drift
        - a downstream ai_executor incident storm re-diagnosing the same workflow failure
      title: Reconcile classify_drift returns nil for empty drift, failing the foreach and storming workflow.run.failed
    - architecture_fix: |
        Two independent defects compounded into the drain; both are now closed.
        (1) Credential source: the anthropic client must use only an explicitly
        provisioned, separately-billed credential (Anthropic.ApiKey, or a key at
        the service-user path). It MUST NOT scan /home/* for a developer's
        personal Claude login, and the autonomous diagnoser MUST NOT fall back to
        the `claude` CLI (which spends whatever interactive subscription is logged
        in). No key -> deterministic analyzer (AI is supplementary, never
        required). (2) Dedup: every diagnosis is persisted under a stable
        incident signature (rule|event|service) and reads/writes share the same
        fp:<fingerprint> tag; a repeated signature reuses the prior diagnosis and
        skips the LLM, bumping an occurrence counter. This restores the intent
        ai.memory_queried_before_claude_to_boost_confidence, which existed but was
        non-functional.
      forbidden_fixes:
        - harvest_personal_claude_credentials_by_scanning_home_dirs
        - fall_back_to_claude_cli_subscription_on_the_autonomous_incident_path
        - persist_incident_diagnosis_only_on_the_remediation_path
        - use_different_tags_for_the_dedup_read_query_and_write_store
        - include_incident_id_in_the_dedup_fingerprint
      id: ai_executor.repeat_diagnosis_drains_personal_subscription
      protects:
        files:
            - golang/ai_executor/ai_executor_server/dedup.go
            - golang/ai_executor/ai_executor_server/diagnoser.go
            - golang/ai_executor/ai_executor_server/anthropic_client.go
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
        - meta.absence_scope_must_be_explicit
        - meta.storage_is_not_semantic_authority
      related_services:
        - ai-executor
      required_tests:
        - TestIncidentFingerprint_StableAcrossOccurrences
        - TestIncidentFingerprint_DistinguishesSignatures
        - TestIncidentFingerprint_UnitFallback
      root_cause: |
        diagnoser had no working dedup: the only ai_memory write (recordOutcome)
        ran on the remediation path, so tier-0 observe-only incidents were never
        persisted; the read query was tagged by ruleID while the write was tagged
        by root_cause, so tags never matched; and there was no occurrence counter.
        ai_memory incident count stayed 0, so every occurrence looked new. A
        workflow failing every ~90s (workflow_foreach_null_collection) therefore
        triggered a full AI diagnosis on each repeat. The AI backend, in turn,
        harvested a developer's personal Claude Max OAuth token from /home/*,
        replicated it into etcd, tried the API with a stale model id
        (claude-sonnet-4-20250514 -> 404), and fell back to `claude --print` on
        that personal subscription — so each redundant diagnosis billed a human's
        account. Mechanism (CLI subscription fallback) x volume (no dedup) = an
        unbounded silent drain.
      severity: high
      symptoms:
        - a background `claude --print` process runs as the service user and spends an operator's personal Claude tokens
        - ai_executor logs "anthropic API failed, falling back to CLI" then "claude: invoking CLI" on a loop
        - the same incident root_cause is re-diagnosed every ~90s with proposed_action observe_and_record
        - ai_memory has zero stored incidents despite continuous incident processing
        - a personal Claude Max OAuth token is present in etcd at /globular/secrets/anthropic-credentials
      title: AI executor re-diagnoses every repeat of the same incident and drains a personal Claude subscription
    - architecture_fix: |
        Auto-execute requires an EXPLICIT tier==1. Any other value fails safe to
        approval-required (ACTION_PENDING) with a WARN log — the dangerous action
        is the explicit grant, the unknown case defaults to deny.
      forbidden_fixes:
        - auto_execute_remediation_as_the_tier_fall_through
        - treat_unrecognized_tier_as_auto_remediate
      id: ai_executor.unknown_tier_defaults_to_auto_execute
      related_invariants:
        - meta.least_privilege_is_not_a_default_it_is_an_explicit_grant
        - meta.silence_is_not_valid_for_unexpected
        - meta.fail_safe_defaults_when_authority_is_uncertain
      related_services:
        - ai-executor
      required_tests:
        - TestRemediator_UnknownTierFailsSafeNoAutoExecute
      root_cause: |
        remediator.execute branched `if tier==0 {observe}` then `if tier==2
        {approval}` and let everything else fall through to auto-execute. Because
        tier is a raw int32 (proto3, no enum), the auto-execute path — the ONLY
        one that takes a real action — was the DEFAULT for tier==1 AND every
        unrecognized value (negative, 3+, garbled, a future tier). The dangerous
        action was the fall-through, not an explicit grant. Violates
        meta.least_privilege_is_not_a_default_it_is_an_explicit_grant (the default
        for any actor/action is zero privilege) and
        meta.silence_is_not_valid_for_unexpected (an unhandled case must fail
        closed). The tier IS the execution-authority gate
        (intent ai.decision_tier.gates_execution), so a default-to-execute
        fall-through breaches that gate.
      severity: high
      symptoms:
        - an AI remediation action runs without human approval for a tier value that is not 0/1/2
        - a peer proposal, buggy caller, or future proto tier triggers auto-remediation unexpectedly
        - actions execute when the operator expected approval-gating
      title: AI remediator auto-executes on any unrecognized decision tier (dangerous action is the fall-through)
    - blast_radius:
        - All AI-assisted diagnosis and remediation unavailable
        - MCP tools that depend on ai_router return errors permanently
        - Recovery requires operator to restart the ai_router service
      description: |
        applyStabilityControls sets MaxRetries=0 when avgErrorRate exceeds 30%. This stops amplification but also stops the self-healing path — once disabled, every request fails immediately, keeping the error rate at 100%. The router cannot recover on its own; it requires external intervention to reset.
      forbidden_fixes:
        - removing the >30% circuit breaker without adding an auto-recovery path
        - treating MaxRetries=0 as a permanent steady state rather than a transient gate
      id: ai_router.cascade_disables_retry_prevents_recovery
      protects:
        files:
            - golang/ai_router/ai_router_server/stability.go
      related_invariants:
        - meta.fallback_must_degrade_semantics
      severity: high
      status: active
      symptoms:
        - All AI router requests fail immediately with no retry
        - Error rate metric stuck at 100% — never recovers
        - No "circuit breakers critical" log after initial trigger (rate stays pegged)
        - Downstream services (ai_executor, ai_watcher) appear completely offline
      title: AI router disables all retries at >30% error rate — recovery becomes impossible without external intervention
      trigger: |
        Transient spike drives avg error rate above 30% threshold. Circuit breaker fires. All retries disabled. Error rate locks at 100%.
    - fixed_in: 4c639b4d
      id: ai_watcher.connection_error_marked_resolved
      protects:
        files:
            - golang/ai_watcher/ai_watcher_server/server.go
      related_invariants:
        - meta.fallback_must_degrade_semantics
        - meta.connection_errors_must_not_be_absorbed
      root_cause: |
        server.go:549-569 set INCIDENT_RESOLVED for three distinct connection
        failure paths. Fix: changed all to INCIDENT_FAILED.
      severity: high
      status: fixed
      symptoms:
        - Incidents appear resolved in dashboard during executor outage
        - No operator signal that incidents were not actually diagnosed
      title: Executor connection errors (addr empty, TLS, dial) mark incident as RESOLVED — false terminal success state
    - architecture_fix: |
        Skip _test.go files in ValidateAnnotations, consistent with the goast extractor convention (production //globular: annotations are never written in test files). Single-line WalkDir filter change: !strings.HasSuffix(path, ".go") || strings.HasSuffix(path, "_test.go").
      id: annotation_scanner_false_positive
      intentional_gap: true
      intentional_gap_reason: Awareness-internal CI false-positive class, not a runtime concern. Architecture fix is a one-line WalkDir filter and the regression test (TestValidateAnnotationsSkipsTestFiles) prevents reoccurrence. A doctor rule would add ceremony without operational signal — this never reaches production behavior.
      intentional_gap_review_after: "2026-08-10"
      related_invariants:
        - meta.fallback_must_degrade_semantics
      related_services:
        - awareness/enforce
      required_tests:
        - TestValidateAnnotationsSkipsTestFiles
      root_cause: |
        ValidateAnnotations uses line-level text scanning (strings.Split + TrimSpace prefix check). Any line matching the //globular: prefix — even inside multi-line raw string literals — is treated as a real annotation. Test fixture files intentionally embed malformed annotation strings to exercise the validator, causing false-positive ERRORs from the package's own tests.
      severity: MEDIUM
      symptoms:
        - awareness audit reports ERRORs from _test.go files, not production code
        - 'Flagged lines are inside backtick string literals that embed intentionally-malformed //globular: patterns'
        - CI gate exits 1 despite no real annotation defect
      title: Text-based annotation scanner flags string literal content as real annotations
    - architecture_fix: |
        1. Codify the awareness-first protocol explicitly: before any code
           edit in a high-risk directory, the assistant MUST call
           awareness.briefing on the target file AND awareness.query for
           the layer/topic being touched (e.g. "package storage authority",
           "transport identity", "release lifecycle"). Briefing-only is not
           sufficient when the briefing returns no anchors for a topic that
           clearly has architectural rules elsewhere.
        2. Treat the awareness graph as authoritative over the running
           implementation. When an anchor exists and the code disagrees,
           the code is the bug. Fixes must remove the violation, not
           extend it.
        3. Add architectural unit-tests where possible (e.g.
           TestPublishReconciler_DoesNotHealFromMirror) that fail if the
           anti-pattern is reintroduced even after the awareness anchor
           is technically still present in the graph.
      forbidden_fixes:
        - heal_published_artifacts_from_minio_mirror
        - treat_minio_mirror_as_package_source_under_checksum_guard
        - extend_existing_buggy_pattern_without_querying_architecture
        - infer_architecture_from_code_when_awareness_anchor_exists
      id: assistant.extended_legacy_buggy_path_instead_of_querying_architecture
      no_test_yet_reason: |
        TestPublishReconciler_DoesNotHealFromMirror (in
        publish_posix_authority_test.go) is the unit-test guard against
        the specific anti-pattern that produced this failure mode. A
        broader meta-test of "did the assistant query awareness before
        writing" is enforceable only via the PreToolUse hook on
        high-risk dirs (already in place per CLAUDE.md hard rule #7).
        The combination of the unit test and the hook is the regression
        surface.
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - repository.minio_is_not_valid_package_source
        - assistant.query_awareness_before_assuming_architecture
      related_services:
        - repository
        - awareness-graph
      required_tests:
        - TestPublishReconciler_DoesNotHealFromMirror
      root_cause: |
        The assistant treated the running implementation as the architectural
        contract, instead of querying the awareness graph for the relevant
        invariants/forbidden_fixes/intents before designing the fix.
        Specifically, the assistant grepped the code, observed an existing
        pattern (e.g. MinIO-as-mirror reads), and extended that pattern in
        the fix on the assumption that "if it's in the code it must be
        intended". The awareness graph contained the rule that would have
        prevented this (MinIO is not for packages) but the assistant
        skipped the query and read the source directly.

        Live regression that produced this failure mode: 2026-06-04 v1.2.162
        publish-reconciler heal-from-mirror sweep. The assistant extended
        ResilientStorage's mirror-fallback pattern into a "heal published
        artifacts from MinIO mirror" sweep, preserving the architectural
        drift. Reverted before merge after the operator pointed at
        /var/lib/globular/packages/ as the canonical package CAS.
      severity: high
      symptoms:
        - A 'fix' commit lands that mechanically extends an existing pattern (mirror writes, fallback chains, field aliasing) while the existing pattern was itself a known rule violation in CLAUDE.md or the awareness graph.
        - The assistant's plan cites the existing buggy implementation as evidence for the new design ('that's how the code currently works').
        - An invariant or forbidden-fix anchor on the same topic exists in the awareness graph but does not appear in the assistant's pre-write briefing record.
        - The operator catches the architectural violation in review, not the static checks or the test suite.
      title: AI assistant extended a pre-existing architecturally-broken code path while "fixing" a related bug, preserving the violation instead of removing it, because it did not query the awareness graph for the storage/authority contract before designing the fix
    - fixed_in: e04c2df8
      id: auth.dead_peer_fallback_loop
      protects:
        files:
            - golang/authentication/authentication_server/handlers.go
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
      root_cause: |
        handlers.go:546 had `if len(nodes) == 0` guarding a `for range nodes`
        loop — the loop body was structurally unreachable. Fix: inverted to
        `if len(nodes) > 0`.
      severity: critical
      status: fixed
      symptoms:
        - Authentication fails for users on non-primary nodes
        - Error message says "failed to authenticate" with no peer attempt
      title: Peer authentication fallback has inverted guard — loop body unreachable, multi-node auth silently fails
    - architecture_fix: |
        1. Introduce golang/awareness/sourceroot with a typed Result
           returning Found(path) | Absent | Inaccessible(err) |
           WrongContext(path, reason). No string sentinels. No silent
           cwd fallback.
        2. Migrate awarGitRoot to delegate to sourceroot.Resolve.
        3. Each consumer switches on the typed state. Non-Found states
           are telemetry-unavailable signals at info severity.
        4. coverage_report adds a dedicated "unverified" status (was:
           collapsed into "critical"). health_pulse already separated
           "unverified" from "tests_not_found" in commit 1acd3fbb;
           that fix is referenced here as the precedent.
        5. Forbidden-fix entry
           collapse_source_absent_into_critical_missing_evidence
           prevents future PRs from re-introducing the conflation.
      forbidden_fixes:
        - collapse_source_absent_into_critical_missing_evidence
        - fall_back_to_cwd_when_git_root_unknown
        - count_unverified_as_tests_not_found
      id: awareness.degraded_source_sentinel_collapsed_to_critical
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - awareness.source_scan_requires_verified_repo_root
        - awareness.no_match_is_not_safe
      related_services:
        - mcp
        - awareness
      required_tests:
        - TestSourceRoot_NotInGitRepoReturnsAbsent
        - TestSourceRoot_ExplicitPathInvalidReturnsInaccessible
        - TestAwarGitRoot_NotInRepoReturnsEmpty
        - TestVerifyGapTests_EmptyRepoRootReturnsUnverified
        - TestCoverageReport_NoRepoRootIsUnverifiedNotCritical
      root_cause: |
        Several awareness subsystems ask the same question — "is a real
        source tree available to scan from this process?" — and each
        invents its own degraded answer instead of using a typed primitive:

          • awarGitRoot returns os.Getwd() on git rev-parse failure
            (so the install dir gets scanned as if it were a repo).
          • verifyGapTests returns the string "unverified" when repoRoot
            is empty; the health_pulse consumer's switch collapses
            everything-not-classified into tests_not_found.
          • GoFileCoverage returns EligibleGoFilesTotal=0 with
            ConfidenceImpact=unknown when repoRoot is empty; the
            coverage_report consumer ignores ConfidenceImpact and uses
            the percent directly, so 0% < 70% → critical.
          • dbPath resolution prefers the bundle path if present and
            falls back to a legacy writable path otherwise; there is
            no symmetric handling for "bundle present but couldn't be
            opened cleanly," and the legacy fallback is a stale 1.4 MB
            shadow with ~300 nodes.

        Each layer's unit tests run inside a git checkout where the
        degraded path is never reached, so the conflation is invisible
        until composed on a production host. The result an operator
        sees is a wall of critical-severity alerts about graph
        coverage and missing tests, all of which are pure telemetry
        false positives. The system that's supposed to know its own
        knowledge gaps is loudly lying about them.
      severity: critical
      symptoms:
        - 'graph_integrity_check reports REQUIRED_TEST_MISSING (severity: critical) for tests that demonstrably exist in source'
        - coverage_report shows graph_coverage.status = critical with 0 eligible / 0 indexed Go files on a production MCP host
        - health_pulse alerts 'N implemented gap(s) have missing tests' when verifyGapTests was actually returning unverified
        - operator restarts MCP and finds awareness tools returning empty or degraded results despite the awareness graph being loaded in Oxigraph
        - every awareness query from a production MCP host trips at least one critical alert about coverage or missing tests
      title: Awareness source-availability sentinel is collapsed into a critical-severity missing-evidence finding
    - affects:
        files:
            - cmd/principle-check/ruleguard_scan.go
            - cmd/principle-check/positive_control_test.go
            - cmd/principle-check/rules/timestamp_field_must_be_qualified.go
            - cmd/principle-check/rules/duration_vs_deadline_field_naming.go
      architecture_fix: |
        Positive-control attestation: cmd/principle-check/positive_control_test.go
        runs every ruleguard rule against a known-bad fixture under
        rules/testdata/positive/<rule>/ and fails unless the rule fires.
        A rule that cannot flag known-bad code is dead and is rejected,
        so a production "0 findings" from an attested rule now means
        "attested clean", not "uncharted". The attested rules are gated
        against the services tree via `make principle-check-ruleguard-tree`
        (wired into principle-check-all), and CI installs ruleguard so the
        attestation enforces rather than silently skipping. Narrow-by-tool
        rules document their coverage gap explicitly rather than passing
        silently.
      forbidden_fixes:
        - treat_scanner_zero_findings_as_clean_without_positive_control
        - parse_failure_output_absorbed_as_no_findings
        - convert_narrow_matcher_to_comprehensive_regex_that_floods_accepted_sites_then_disable_it
        - gate_a_ruleguard_rule_without_a_positive_control_fixture
      id: awareness.scanner_zero_findings_conflates_clean_with_dead
      related_invariants:
        - meta.negative_result_requires_coverage_attestation
        - meta.assertions_must_carry_their_scope
        - meta.silence_is_not_valid_for_unexpected
        - awareness.failure_mode_requires_test_or_reason
      related_services:
        - awareness-graph
      required_tests:
        - TestRuleguardRulesHavePositiveControl
      root_cause: |
        The production scanner (cmd/principle-check/ruleguard_scan.go)
        shells out to `ruleguard -rules <file>` and parses report lines;
        absence of report lines is indistinguishable between "rule ran,
        code is clean", "rule matched nothing because it is mis-scoped",
        and "rule failed to load and produced nothing." An empty result
        carries the SHAPE of safety but possibly the MEANING of ignorance
        (meta.negative_result_requires_coverage_attestation). A related,
        coarser form of the same trap:
        awareness.empty_graph_silently_treated_as_no_awareness.
        Two scanners are additionally only NARROW tripwires whose silence
        must not be read as comprehensive coverage: gogrep cannot bind
        interior struct fields, so timestamp_field_must_be_qualified and
        duration_vs_deadline_field_naming catch only single-field structs
        (a measured 36 interior ambiguous time/timestamp fields in the
        tree are uncharted by these rules — a NAMED gap, not clean).
      severity: high
      symptoms: |
        principle-check ran a ruleguard rule and reported "scanned 0
        ruleguard findings / CONFORMANT 0 / DRIFT 0", and this was read as
        "the architecture conforms." In reality the rule matched nothing —
        not because the code is clean, but because the rule never
        exercised the code. Concrete instances found 2026-06-11:
          - timestamp_field_must_be_qualified was DEAD: a
            Type.Is("*timestamppb.Timestamp") clause crashed ruleguard's
            rule loader (parse error), so the entire rule (incl. the
            int64/uint64/string cases) produced zero findings in
            production while ruleguard_scan.go silently treated the
            parse-failure output as "scan completed, no findings."
          - 21 other ruleguard rules reported 0 findings with no evidence
            they could fire on anything (CONFORMANT 0 across all scopes).
      title: A linter/scanner reporting "0 findings" cannot be trusted as "clean" unless the rule is proven able to fire — a broken, mis-scoped, or dead rule reports zero exactly like clean code
    - architecture_fix: |
        Day-1 finalize MUST atomically clear the bootstrap flag as the LAST step (after
        founding quorum verified, after sa password changed, after CA rotated). On controller
        startup, if day1_phase == ready AND bootstrap.enabled present, controller logs a
        critical warning, refuses to accept loopback RPCs, and emits the doctor finding.
      forbidden_fixes:
        - silently_remove_flag_on_doctor_finding
        - widen_bootstrap_ttl_to_avoid_re_creation
      id: bootstrap.flag_persists_post_day_1
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - founding.quorum.three_nodes_required
      related_services:
        - cluster-controller
        - node-agent
      required_tests:
        - TestDay1FinalizeClearsBootstrapFlag
        - TestControllerRefusesLoopbackWhenFlagPersistsPostDay1
      root_cause: |
        Bootstrap mode is gated by a flag file with a 30-min TTL. The day-1 join flow is
        responsible for removing the flag once the cluster reaches founding quorum. If the
        join completed but the flag wasn't cleaned up, the cluster is in a permanent
        bootstrap-mode state — any localhost connection can perform unauthenticated mutations.

        Causes observed:
        - Crash in the day-1 finalize step before the cleanup ran
        - Manual operator intervention that re-created the flag without intent
        - Bug in the founding-quorum classifier that left day-1 in a partial state
      severity: critical
      symptoms:
        - ls /var/lib/globular/bootstrap.enabled returns a file on a post-day-1 cluster
        - loopback-only RPCs continue to bypass auth
        - doctor finding bootstrap.flag_persists_post_day_1 fires
      title: /var/lib/globular/bootstrap.enabled flag found on a node after day-1 join completed — security regression
    - architecture_fix: |
        Determine non-membership (pool non-empty AND node not in MinioPoolNodes)
        BEFORE the prepared check and resolve the node to MinioJoinNonMember
        (non-blocking). Preserve explicit authority: nodes not in
        DesiredObjectStoreMembers (not_listed / intent_not_member) must remain
        untouched at None, per incident 9598b8f7.
      forbidden_fixes:
        - require_minio_active_to_pass_storage_joining
        - block_bootstrap_on_minio_for_non_pool_members
        - mark_unlisted_nodes_nonmember
      id: bootstrap.held_minio_nonmember_stranded_at_none
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - objectstore.topology_contract
        - meta.half_done_must_not_look_done
      related_services:
        - cluster-controller
      required_tests:
        - TestMinioJoin_HeldNonMember_NoMinioUnit
        - TestMinioJoin_NotListedMember_StaysUntouched
      root_cause: |
        reconcileMinioJoinPhases only marked a node MinioJoinNonMember AFTER it
        passed nodeIsPreparedForMinioJoin. A held node that is not in the active
        MinioPoolNodes and has not started (or no longer reports) globular-minio.service
        failed the prepared check and hit `continue`, leaving MinioJoinPhase at the
        empty MinioJoinNone. The bootstrap storage-join gate advances only on
        Verified OR NonMember, so a node stranded at None wedged forever. MinIO can
        only be configured once the pool is expanded to the node (apply-topology /
        quorum); it must never block bootstrap before then.
      severity: high
      symptoms:
        - node never advances past storage_joining (or its bootstrap phase reports waiting on globular-minio.service)
