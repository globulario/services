        - etcd /globular/controller/reconcile/lanes/cluster_reconcile shows phase:OK, recently updated
        - globular_controller_reconcile_dropped_not_leader_total > 0 on the scraped instance
        - No globular_controller_is_leader metric exists in Prometheus
      title: Non-leader controller heartbeat appears stale — false CRITICAL from prometheus.controller_stalled
