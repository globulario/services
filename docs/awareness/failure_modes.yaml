        - Reconnect behavior differs across cluster with no etcd visibility
        - MESH_TLS_SERVER_NAME env var silently overrides TLS identity check
      title: globular_client and globularcli use os.Getenv for operational config — competing authority with etcd
    - id: systemic.hardcoded_default_port_constants
      protects:
        files:
            - golang/globular_service/services.go
            - golang/process/process.go
      related_invariants:
        - meta.fallback_must_degrade_semantics
      remediation_plan: |
        Remove per-service defaultPort constants. Change the startup contract:
        if port allocator fails (etcd unavailable), return error. Bootstrap
        services (controller:12000, node-agent:11000) keep their documented
        bootstrap ports.
      root_cause: |
        Service startup pattern: `var defaultPort = 100XX` used as the pre-etcd
        bootstrap value. The port allocator resolves from etcd at runtime, but
        the constant serves as a silent fallback when etcd is unavailable.
        HARD RULE says: if etcd can't provide a value, error out.
      severity: medium
      status: active
      symptoms:
        - Service starts on a hardcoded port when etcd config is absent
        - Port collision when two services share the same default (blog + conversation both use 10029)
      title: Every service has a hardcoded defaultPort constant — silent fallback instead of fail-on-missing-config
    - id: systemic.non_atomic_multi_step_writes
      protects:
        files:
            - golang/blog/blog_server/handlers.go
            - golang/conversation/conversation_server/conversation.go
            - golang/rbac/rbac_server/rbac_permissions.go
            - golang/config/etcd_service_config.go
            - golang/pki/etcd_sync.go
      related_invariants:
        - meta.state_mutations_must_be_durably_committed_before_side_effects
        - meta.half_done_must_not_look_done
      remediation_plan: |
        For etcd-backed writes: use etcd Txn (mini-transaction) to write
        related keys atomically. For Badger/ScyllaDB: use batch writes.
        Where true atomicity is impossible, add a cleanup sweep that
        detects and repairs orphaned index entries.
      root_cause: |
        Pattern: function writes key A, then key B, then key C as separate
        etcd.Put or store.SetItem calls. Crash between any two writes leaves
        a permanently inconsistent state. No compensation or rollback path.
      severity: high
      status: active
      symptoms:
        - Blog post exists but is absent from author index after crash
        - Conversation created but not indexed for participant and has no RBAC owner
        - RBAC permission record written but share/type indexes stale
        - Service config desired key updated but runtime key stale
      title: Multiple services write 2-5 separate keys without etcd transactions — partial failure creates inconsistent state
    - id: systemic.publisher_id_hardcoded_localhost
      protects:
