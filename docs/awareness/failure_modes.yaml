      known_bad_fixes:
        - Keep emitting per-package "runtime status stale" findings and dedupe them downstream in render — the amplification AND the misclassification already live in the rule layer
        - Raise the staleness threshold to hide the burst without removing the per-package fan-out
        - Suppress on a threshold that can outrun node.reachable, dropping coverage when no node-level finding fires
      related_industry_patterns:
        - fm.industry.missing_inventory_misclassified_as_down
        - fm.industry.partial_failure_hidden_by_global_green
      related_invariants:
        - meta.diagnostic_output_must_be_bounded
        - meta.absence_scope_must_be_explicit
        - state.unknown_must_not_default_to_healthy
      related_services:
        - cluster-doctor
      required_tests:
        - TestInstalledStateRuntimeMismatch_StaleHeartbeat_SuppressedOwnedByNodeReachable
      root_cause: |
        installed_state_runtime_mismatch.Evaluate computed node-wide heartbeat staleness
        (lastSeen age > 3m) once per node, then emitted one finding PER installed package with
        reason "runtime status stale". A stale heartbeat means the node is dark — its runtime is
        UNKNOWN, not "not converged" — so the rule (1) amplified one node outage into N findings
        (N = installed-package count) and (2) asserted unknown runtime as "not converged"
        (a KNOWN_BAD claim) from absent evidence. The node-scoped node.reachable rule already owns
        the node-unreachable signal and emits a single CRITICAL.
      severity: high
      symptoms:
        - cluster-doctor shows dozens of installed_state_runtime_mismatch ERRORs for a single node, every one with reason "runtime status stale (last seen ... ago)"
        - the finding count tracks the node's installed-package count, not any real per-package problem
        - a node.reachable CRITICAL already names the same node in the same sweep
        - all the per-package findings clear at once the moment the node heartbeats again
      title: Doctor emits one installed_state_runtime_mismatch per package for an unreachable node, amplifying one outage into N findings and misclassifying unknown runtime as down
    - architecture_fix: |
        Any rule that evaluates cluster health from a snapshot must distinguish:
          PRESENT      — evidence collected and confirms healthy
          UNKNOWN      — evidence absent (collector gap, RPC error, timeout)
          KNOWN_BAD    — evidence collected and confirms unhealthy

        UNKNOWN must never be treated as KNOWN_BAD. This applies to objectstore quorum,
        etcd member health, and any other rule that counts "down" members from an inventory.
        Rules must read snap.DataIncomplete and suppress CRITICAL findings that would be
        false positives if UNKNOWN nodes are actually healthy.
      id: fm.globular.objectstore_partial_snapshot
      known_bad_fixes:
        - Classify absent NodeRecord as knownDown — hides the ambiguity behind a false CRITICAL
        - Ignore snap.DataIncomplete and always fire on insufficient active_drives
        - Retry the snapshot read and fire the finding even on the first clean collection
      related_industry_patterns:
        - fm.industry.missing_inventory_misclassified_as_down
        - fm.industry.partial_failure_hidden_by_global_green
      related_invariants:
        - meta.absence_scope_must_be_explicit
        - objectstore.partial_snapshot_unknown_not_down
        - evidence.missing_is_not_known_bad
        - state.unknown_must_not_default_to_healthy
      related_services:
        - cluster-doctor
        - cluster-controller
      required_tests:
        - TestWriteQuorumLost_PartialSnapshot_NoFalsePositive
        - TestWriteQuorumLost_DataIncomplete_NoCritical
        - TestFingerprintDivergence_DataIncomplete_SuppressesMissing
        - TestObjectstoreQuorum_AbsentNodeIsUnknownNotDown
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison
      root_cause: |
        The snapshot collector could not reach one or more nodes — either a transient RPC error,
        a pod restart, or a slow response that exceeded the collection window. The affected nodes'
        inventory records are absent from the snapshot. Old code classified absent NodeRecord
        entries as "known down" rather than "unknown", causing every pool node without an
        inventory record to count against the write-quorum threshold. With all five pool nodes
        absent (e.g., after a full collector failure), active_drives=0 < write_quorum=4 → CRITICAL.

        The fix is captured in objectstore_physical_overlap.go (objectstore.write_quorum_lost):
          - absent pool IP (no NodeRecord in snap.Nodes) → noInventory bucket
          - absent inventory (nodeID known but snap.Inventories[id]=nil) → noInventory bucket
          - stale inventory (age > InventoryStalenessThreshold) → noInventory bucket
          - snap.DataIncomplete=true && len(knownDownNodes)==0 → suppress CRITICAL entirely
        Only knownDownNodes (inventory present, unit state explicitly not-active) count toward quorum loss.

        The same principle applies to objectstore.minio.fingerprint_divergence: when DataIncomplete=true,
        missing fingerprints are suppressed; only actually diverged fingerprints (wrong value) fire.
      severity: critical
