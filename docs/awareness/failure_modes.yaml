        - repository_list_findings reports dozens of PUBLISHED_MISSING_BLOB CRITICAL findings
        - a live VerifyArtifact / repository repair on the same artifact returns OK / "no repair needed"
        - findings carry no node/instance scope (node_id empty) yet read as cluster-wide data loss
        - the count tracks the published-manifest count, and shrinks as local CAS replication catches up
        - the storm appears during or right after a multi-node join, when a fresh repository instance has the full index but few local blobs
      title: Repository integrity scan reports PUBLISHED_MISSING_BLOB cluster-wide when the blob is only absent from the answering instance's local CAS
    - architecture_fix: |
        All member-identity-requiring services must use StableIP(clusterVIP) — not PrimaryIP().
        StableIP excludes the floating VIP by filtering it from the IP list before selecting
        the representative address. The VIP is read from /globular/ingress/v1/spec vip_failover.vip.

        Affected surfaces that must be patched:
          1. install-day1.sh: NODE_IP selection must exclude VIP when ingress mode is vip_failover
          2. etcd member advertise/listen URLs: use StableIP(clusterVIP)
          3. ScyllaDB host list: use StableIP(clusterVIP) in publishScyllaHostsIfNeeded
          4. MinIO pool IPs: use StableIP(clusterVIP) in objectstore topology
          5. node_agent_endpoint_fallback.go: do not prefer PrimaryIP when VIP is known
          6. Controller leader/self matching: use VIP-aware comparison

        Pre-emptive: rename legacy "globular-etcd" etcd member to sanitized hostname before
        any VIP/keepalived change, so the hostname fallback in removeStaleMembers protects it.
      id: fm.globular.vip_transition_cascade
      known_bad_fixes:
        - Adding VIP to etcd member advertise URLs (doubles the identity poisoning)
        - Restarting keepalived/etcd without repairing the identity source selection
        - Disabling TLS to hide VIP/SAN mismatch
        - Manually editing one node's etcd.yaml without fixing the upstream render logic
        - Re-running the join script with --repair-etcd without renaming the legacy member first
      related_industry_patterns:
        - fm.industry.floating_address_used_as_durable_identity
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
        - ops.vip_requires_observed_owner
        - network.no_loopback_escape_for_cluster_identity
        - identity.stable_node_identity_not_floating_vip
      related_services:
        - cluster-controller
        - cluster-doctor
        - node-agent
      required_tests:
        - TestRemoveStaleMembers_VIPHolder_NotEvicted
        - TestEtcdAdvertiseURL_UsesStableIP_NotVIP
        - TestScyllaHosts_ExcludeVIP
        - TestNodeAgentFallback_NeverReturnsVIP
        - TestControllerLeaderMatch_VIPAware
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison
      root_cause: |
        PrimaryIP() returns the keepalived floating VIP when a node holds it (because the VIP is
        the first non-loopback interface). This VIP leaks into:
          1. etcd member advertise/listen URLs (written at join time by install-day1.sh)
          2. removeStaleMembers desiredPeerURLs (controller reads node.PrimaryIP and builds the URL set)
          3. ScyllaDB hosts list (publishScyllaHostsIfNeeded)
          4. MinIO pool IPs (objectstore topology)
          5. Node-agent fallback endpoint selection
          6. Controller leader/self IP matching

        When the VIP moves from node A to node B during a keepalived change, the peer URLs
        for node A no longer match its etcd member record (the VIP is now on B). The controller's
        removeStaleMembers loop sees a mismatch, classifies node A's member as stale, and removes it.
        If node A also uses a legacy bootstrap member name ("globular-etcd" instead of sanitized
        hostname), the hostname fallback in removeStaleMembers also fails to protect it.
      severity: critical
      symptoms:
        - Healthy etcd member exits cleanly (status=0) right after a keepalived/VIP spec change
        - etcdctl member list shows an unstarted placeholder where the evicted node was
        - 'globular CLI fails: dial tcp <node>:2379 connection refused on the node whose etcd was evicted'
        - cluster-doctor fires etcd.member_evicted or etcd.quorum_lost after a VIP failover
        - node-agent fallback dials the wrong node (VIP holder instead of target node)
        - Controller leader election misbehaves when VIP is the first routable IP
        - ScyllaDB or MinIO endpoint lists include the floating VIP, causing connection failures when VIP moves
      title: keepalived VIP transition causes healthy etcd member eviction and control-plane instability
    - architecture_fix: |
        Enforce the four-layer model as binding, not just documented:

          1. Anchor the actor → layer mapping and the etcd path → owner
             registry as critical invariants (Commit A — this commit).
          2. Publish the structured etcd_path_ownership.yaml registry
             that enumerates each prefix with its owning service and the
             typed RPC outside callers must use (Commit B).
          3. Add a cluster-doctor rule that walks all four layers per
             (service, node) and emits four_layer.cross_layer_drift
             findings when layers disagree (Commit C). Add a static
             checker in cmd/four_layer_audit/ that walks every etcd
             .Put / installed_state.Write* call site, classifies the
             prefix, and fails the build when the calling package is
             not the registered owner.

        The doctor rule and the static checker turn the principle from
        documentation into a runtime contract.
      forbidden_fixes:
        - cross_layer_write_by_non_owner
        - cluster_doctor_direct_write_to_etcd
        - bypass_doctor_for_cross_layer_health_finding
      id: four_layer.cross_layer_write_creates_drift
      no_test_yet_reason: |
        The cross-layer class is exercised by the existing per-incident
        regression tests above. A meta-test that enforces the full
        four-layer alignment at runtime is the cluster-doctor rule
        planned in Commit C; a build-time meta-test is the static
        checker also planned in Commit C. Until those land, the
        per-incident tests cover the known shapes and the briefing on
        any file in the protects.files lists of the related invariants
        surfaces the class so a future contributor sees it before
        introducing a new shape.
      related_invariants:
        - meta.storage_is_not_semantic_authority
        - four_layer.layer_has_single_writing_actor
        - four_layer.actor_layer_mapping
        - etcd.path_has_single_owner
        - cluster_doctor.observer_only_never_writes_etcd
        - cluster_doctor.is_the_authority_for_health_state_queries
        - four_layer.workflow_actor_attribution_required
      related_services:
        - cluster-controller
        - node-agent
        - repository
        - cluster-doctor
        - workflow
      required_tests:
        - TestDecideNodeRolloutProof_ClusterControllerStaleHashRegression
        - TestMarkNodeSucceeded_StoresBinarySHA_NotReleaseIdentity
        - TestHeartbeatPhase2_SelfHosted_PreservesUpdatedUnix
        - TestUploadArtifact_FinalGate_RejectsPostPublishLocalBlobMissing
        - TestPublishReconciler_DoesNotHealFromMirror
      root_cause: |
        An etcd write was performed by a service that is not the registered
        owner for that key prefix, OR was performed by a sub-actor inside
        the owning service that does not hold the per-field authority
        within that service. The path's owner has its own contract for the
        field's semantics; the non-owner writes a value with a different
        semantic, and downstream readers cannot tell whether the value
        they read is from the owner or the impostor. The bug looks
        different to each reader (depending on what semantic they expect)
        but the structural shape is one: layer or actor authority was
        not enforced at the write site.

        Live regressions in this class observed 2026-06-04:
          1. cluster-controller's release_pipeline wrote
             ServiceRelease.Status.DesiredHash (a release-identity hash,
             L2 concern) into a field consumed as a binary SHA on the L3
             side, producing the 5804f523 vs 2eb07b67 split.
          2. node-agent's heartbeat (L3 observer sub-actor) overwrote
             UpdatedUnix that the self-hosted proof writer (L3 authority
             sub-actor) had anchored to PID start, producing permanent
             service.old_pid_after_upgrade for cluster-controller.
          3. repository's UploadArtifact wrote bytes to MinIO mirror as
             part of completePublish, and the publish-reconciler's
             attempted "heal from mirror" sweep (reverted in v1.2.163)
             treated the mirror as a valid L1 source even though MinIO
             is not an L1 authority.
      severity: critical
      symptoms:
        - InstalledPackage.Checksum field contains a release-identity hash instead of the binary SHA the proto declares (5804f523 vs 2eb07b67 shape)
        - NodeReleaseStatus.InstalledHash and the convergence proof disagree on what kind of hash they represent
        - InstalledUnix or UpdatedUnix in installed_state advances past the running PID's start mtime, producing service.old_pid_after_upgrade for a service that is actually running the correct binary
        - PUBLISHED artifact has no blob in the authoritative POSIX CAS but the publish RPC returned SUCCESS
        - cluster-doctor and another service emit disagreeing health verdicts for the same (service, node) pair because both compute it independently
      title: A write by an actor outside its assigned layer creates persistent cross-layer drift that surfaces as a different symptom in every observer until the layer authority is restored
    - affects:
        files:
            - golang/verifier/verifier.go
        symbols:
            - VerifyTarget
            - FindingRestartPending
            - restartPendingWindow
      detection: |
        - cluster-doctor shows critical service.old_pid_after_upgrade for a self-hosted service (cluster-controller / cluster-doctor / repository) right after an upgrade apply
        - the SAME service has NO service.running_binary_hash_mismatch finding (running entrypoint == installed entrypoint)
        - the finding clears on its own within a sweep or two once the service restarts onto the new binary
      id: verifier.self_hosted_restart_window_flagged_as_critical_old_pid
      known_bad_fixes:
        - suppressing service.old_pid_after_upgrade globally (loses the genuine stale-PID upgrade signal)
        - widening applyGraceWindow to minutes (masks genuinely stale PIDs that are seconds-to-minutes old)
        - gating the downgrade on installed==desired entrypoint checksum (that comparison is intentionally omitted — CI computes the checksum from a different artifact, so it is systematically false)
        - marking the finding PASS/info so it never surfaces (a restart that never completes must still escalate to critical)
      related_invariants:
        - meta.authority_must_express_uncertainty
        - runtime.identity_attestation_must_bind_pid_hash_service_and_build
        - verifier.timing_tell_must_not_override_authoritative_hash
      required_tests:
        - TestVerifyTarget_RecentUpgradeRunningMatchesInstalled_RestartPending
        - TestVerifyTarget_StuckRestartBeyondWindow_EscalatesToOldPid
        - TestVerifyTarget_RecentUpgradeRunningDiffersFromInstalled_StaysCritical
      resolution: |
        verifier.go case 4: when the live PID predates ApplyTime on an upgrade but the
        running entrypoint already equals the installed entrypoint (the authoritative
        running-vs-installed hash proves current bytes) AND the apply is within
        restartPendingWindow (3m), emit degraded service.restart_pending instead of
        critical service.old_pid_after_upgrade. A PID that outlives the window while
        still predating ApplyTime falls through to critical (the restart genuinely did
        not take). Genuine stale bytes (running != installed) are never downgraded —
        service.running_binary_hash_mismatch + critical old_pid still fire.
      root_cause: |
        old_pid_after_upgrade fires when process_start < ApplyTime - applyGraceWindow on
        an upgrade. For self-hosted services the apply RPC records ApplyTime (wall clock)
        and the service then restarts ITSELF; there is a window where the binary on disk
        is already the new version (running == installed) but ApplyTime is ahead of the
        restart. The 30s applyGraceWindow covers systemd second-rounding, not a
        multi-sweep self-hosted restart, so the verifier raised a CRITICAL finding for a
        benign, self-correcting transient — churning doctor incidents on every self-hosted
        upgrade. Sibling of the INC-2026-0016 timestamp-anchoring class, but triggered by
        the apply-time write + restart lag rather than the heartbeat refresh.
        Tracked as INC-2026-0020 (cluster-controller v1.2.215 / build eb9a2dac,
        observed then self-cleared 2026-06-14).
      severity: high
      symptoms:
        - critical service.old_pid_after_upgrade appears for a self-hosted service right after an upgrade and clears within minutes
        - no accompanying service.running_binary_hash_mismatch (running bytes already match installed)
        - doctor/incident churn on every self-hosted control-plane upgrade
      title: Self-hosted upgrade restart window flagged as critical old_pid_after_upgrade even though the live PID already serves the current binary
    - architecture_fix: |
        After ListArtifacts(), deduplicate to keep only the highest-version manifest per
        (name, platform) before iterating. Only the latest published version is authoritative
        for kind resolution. Old versions are ignored.

        Implemented in commit 72cc72b2: syncRepoArtifactsToEtcd builds a latestArts map
        keyed by (name, platform) and retains the winner by versionutil.Compare, breaking
        ties by build_number. The arts slice is replaced with the deduplicated contents
        before the classification and staleService logic runs.
