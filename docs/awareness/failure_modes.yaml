    - id: etcd.nospace_alarm
      title: 'etcd NOSPACE alarm: database space exceeded — all writes rejected, control-plane cascade begins'
      severity: critical
      symptoms:
        - '''mvcc: database space exceeded'' appears in etcd logs'
        - etcd rejects all write RPCs with NOSPACE error
        - etcd leader begins losing heartbeat quorum
        - controller cannot renew leader lease
        - workflow dispatch times out or hangs
        - reconciler stalls — no desired-state changes applied
      root_cause: |
        etcd database grew beyond its configured quota (default 2 GiB). Common causes:
        excessive revision history accumulation, write storm from a reconcile loop, or
        compaction/defragmentation not running on schedule. Once the NOSPACE alarm fires,
        etcd rejects ALL writes — including leader heartbeats — causing leader loss and a
        cascading control-plane failure affecting controller, workflow, and reconciler.
      architecture_fix: |
        Fix order is strict — do not skip steps:
        1. etcdctl alarm list   → confirm NOSPACE is active
        2. REV=$(etcdctl endpoint status --write-out=json | jq -r '.[0].Status.header.revision')
           etcdctl compact $REV → compact revision history
        3. etcdctl defrag --endpoints=<all>  → release disk space
        4. Verify disk usage dropped below quota
        5. etcdctl alarm disarm   → ONLY after disk is below quota
        6. etcdctl endpoint health → confirm all members healthy
        7. etcdctl endpoint status --write-out=table → confirm stable leader
        8. Watch controller logs for "acquired leader lease"
        9. Watch workflow logs for successful dispatch
      forbidden_fixes:
        - etcd.disarm_before_compact
        - etcd.restart_nodes_without_nospace_fix
      related_invariants:
        - etcd.must_not_exceed_quota
      related_services:
        - etcd
        - cluster_controller
        - workflow
      required_tests:
        - TestOfflineDiagnose_EtcdNOSPACE_MapsToEtcdFailureMode
        - TestOfflineDiagnose_EtcdNOSPACE_DoesNotMapToObjectstore
        - TestCausalChain_EtcdNOSPACE_ProducesControlPlaneCascade
    - id: etcd.leader_instability
      title: 'etcd leader instability: repeated leader loss caused by NOSPACE or disk I/O pressure'
      severity: critical
      symptoms:
        - '''lost leader'' in etcd logs'
        - '''elected leader'' appears repeatedly within short interval'
        - etcd leader_id changes in etcdctl endpoint status output
        - controller lease renewal fails during leader instability window
        - no controller holds authoritative lease — reconciler stalls
      root_cause: |
        etcd leader cannot commit entries or send heartbeats when the NOSPACE alarm is
        active (writes rejected) or when disk I/O latency exceeds the election timeout.
        Repeated leader elections cascade: the controller cannot renew its etcd lease,
        the lease expires, all controllers enter re-election, and no controller is
        authoritative for the duration. Workflow dispatch RPCs time out.
      architecture_fix: |
        1. Resolve the upstream cause first (NOSPACE alarm or disk I/O pressure)
        2. etcdctl endpoint status --write-out=table → watch leader_id until stable
        3. Wait for no "lost leader" / "elected leader" messages for ≥60s
        4. Only then look at controller/workflow — do not restart them during instability
      forbidden_fixes:
        - etcd.restart_nodes_without_nospace_fix
        - controller.restart_before_etcd_stable
      related_invariants:
        - etcd.quorum_must_be_stable_before_controller_action
      related_services:
        - etcd
        - cluster_controller
      required_tests:
        - TestOfflineDiagnose_EtcdLeaderLoss_MapsToEtcdLeaderInstability
        - TestCausalChain_LeaderLoss_After_NOSPACE
    - id: controller.lease_expired_due_to_etcd_instability
      title: controller leader lease expired because etcd cannot commit writes during NOSPACE or leader instability
      severity: high
      symptoms:
        - '''lease expired, attempting re-election'' in controller logs'
        - no controller holds the leader lease — all controllers in re-election loop
        - reconciler produces no changes to desired state
        - workflow steps are not dispatched
        - etcd shows concurrent write attempts from multiple controller instances
      root_cause: |
        The cluster controller renews its leader lease by writing to etcd. When etcd
        cannot commit writes (NOSPACE alarm) or has no stable leader, lease renewal fails.
        All controller instances detect lease expiry and attempt re-election simultaneously,
        flooding etcd with new lease write attempts — which also fail if NOSPACE is still
        active. The result is a re-election storm that continues until etcd is healthy.
      architecture_fix: |
        1. Verify etcd is healthy first: etcdctl alarm list (must be empty), etcdctl endpoint health (all healthy)
        2. Watch controller logs for "acquired leader lease" — do not intervene before this
        3. Do NOT restart controller processes before etcd is stable — restarts add more lease write load
        4. If lease not acquired within 5 min after etcd stabilises, check for split-brain (two leaders)
      forbidden_fixes:
        - controller.restart_before_etcd_stable
        - controller.kill_to_clear_lease_contention
      related_invariants:
        - etcd.quorum_must_be_stable_before_controller_action
        - controller.single_leader_invariant
      related_services:
        - cluster_controller
        - etcd
      required_tests:
        - TestOfflineDiagnose_ControllerLeaseExpired_MapsToCorrectFailureMode
        - TestSuggestIncident_ControlPlaneCascade_EtcdFirst
    - id: workflow.dispatch_timeout_due_to_control_plane_instability
      title: workflow dispatch timeout — terminal symptom of upstream etcd or controller instability, not the root cause
      severity: high
      symptoms:
        - '''context deadline exceeded dispatching workflow step'''
        - '''workflow stuck at CONVERGING'''
        - workflow runs remain in ACTIVE/CONVERGING state indefinitely
        - no new workflow steps dispatched
        - globular workflow list-runs shows blocked workflows piling up
      root_cause: |
        The workflow service dispatches steps by writing to etcd and coordinating with the
        cluster controller. When etcd rejects writes (NOSPACE) or no controller holds the
        leader lease, dispatch RPCs time out. This failure is always a symptom — the root
        cause is upstream in etcd or the controller.
        WARNING: Do not fix workflow before fixing etcd and controller.
      architecture_fix: |
        Fix order is strict:
        1. Confirm etcd NOSPACE is cleared (alarm list empty, endpoint health all healthy)
        2. Confirm controller has acquired leader lease (watch controller logs)
        3. Workflow dispatch typically recovers automatically within 30-60s after controller stabilises
        4. If workflows remain CONVERGING >5min post-stabilisation:
           globular workflow list-runs --status blocked
           → manually re-trigger or advance blocked workflows
        NEVER restart workflow service before etcd and controller are stable.
      forbidden_fixes:
        - workflow.restart_before_control_plane_stable
        - workflow.treat_as_root_cause
      related_invariants:
        - workflow.dispatch_requires_stable_control_plane
      related_services:
        - workflow
        - cluster_controller
        - etcd
      required_tests:
        - TestOfflineDiagnose_WorkflowTimeout_MapsToControlPlaneInstability
        - TestSuggestIncident_FixOrder_EtcdBeforeWorkflow
    - id: failure_mode.inc_2026_0002
      title: MCP service orphaned processes hold port 10260, blocking WaitActive and install convergence
      severity: HIGH
      deprecated: true
      deprecated_reason: "Incident-named placeholder. The same root cause and symptoms are captured by mcp.orphan_port_hold (proper-named, with the same architecture fix and forbidden_fixes). Keep this id only as a redirect so historical incidents that reference it still resolve."
      replacement: mcp.orphan_port_hold
      symptoms:
        - globular-mcp.service stays in 'activating (start)' indefinitely, never reaching 'active (running)'
        - systemd kills mcp_server after TimeoutStartSec (90s) with 'start operation timed out'
        - 'New mcp_server instances fail to bind port 10260: ''address already in use'''
        - Orphaned mcp_server processes survive systemd kills and hold port 10260
        - node-agent WaitActive(30s) times out after install — marks install FAILED, installed state stays at old version
        - 'node reports: day1_phase_reason = workloads not ready: mcp'
        - 'Drift: desired=1.2.15, installed=1.2.14 persists despite artifact being downloaded and pinned'
        - 'Manual intervention required: sudo killall -9 mcp_server'
      root_cause: |
        mcp_server declared Type=notify in its systemd unit but never called sd_notify("READY=1")
        after binding the HTTP listener. systemd therefore held the service in 'activating' state
        indefinitely and killed it after TimeoutStartSec (90s). With Restart=always/RestartSec=2,
        a new instance started before the previous one fully released port 10260, accumulating
        orphaned mcp_server processes (PPid=1, escaped cgroup) that each held the port.
        node-agent's supervisor.WaitActive(30s) timed out waiting for 'active' state after
        install, so installed-state in etcd was never updated — producing persistent version drift
        even though the binary on disk was already replaced.
      architecture_fix: |
        Fix 1 (applied): Add sdNotifyReady(ctx) in serveHTTP() immediately after net.Listen
        succeeds. Sends READY=1 to systemd via NOTIFY_SOCKET, then sends WATCHDOG=1 every 30s
        (half of WatchdogSec=60). Also sends STOPPING=1 on ctx cancellation. File changed:
        golang/mcp/transport_http.go. Deployed as mcp@1.2.15.

        Fix 2 (recommended): Add ExecStartPre=+/bin/sh -c 'pkill -9 -x mcp_server || true'
        to the globular-mcp.service unit as defence-in-depth against orphaned processes from
        any future restart race, regardless of sd_notify status. MUST use -x (process-name
        match), never -f — -f matches the parent shell's argv and self-SIGKILLs.
      related_services:
        - mcp
        - node_agent
      required_tests:
        - TestMCPSdNotifySentAfterBind
        - TestMCPServiceReachesActiveAfterRestart
        - TestWaitActiveSucceedsWithNewBinary

    - id: minio.version_drift_auth_failure
      title: MinIO binary version differs across nodes causing auth failures
      severity: critical
      symptoms:
        - MinIO requests fail with auth/signature errors on specific nodes only
        - globular-minio.service active but ListBuckets returns 403 from affected node
        - node heartbeat shows installed=1.x.y but process fingerprint matches older binary
        - version drift persists across restarts because old binary survives in PATH
      root_cause: |
        A typo in the heartbeat phase-2 loop caused a node's installed MinIO version to go
        undetected. The old binary was left on disk while etcd recorded the new version.
        When requests were routed to the node with the old binary, MinIO's HMAC signature
        verification failed against credentials issued for the new version. The mismatch was
        invisible to the controller because heartbeat reported the etcd version, not the
        on-disk binary fingerprint.
      architecture_fix: |
        Process fingerprinting: compute and cache a SHA-256 checksum of the binary at startup.
        Heartbeat phase-2 compares the running checksum against the etcd artifact checksum
        (entrypoint_checksum field). On mismatch, node transitions to NEEDS_REPAIR and triggers
        a re-download rather than silently reporting the wrong version.
      related_invariants:
        - node.heartbeat.phase2_version_from_running_binary
      related_services:
        - minio
        - node_agent
      required_tests:
        - TestHeartbeatDetectsChecksumMismatch
        - TestMinIOVersionDriftTriggersRepair

    - id: node_agent.state_poisoning_from_stale_reconciler
      title: Node installs wrong version from stale reconciler after leader failover
      severity: critical
      symptoms:
        - node installs version 0.0.1 or placeholder immediately after leader re-election
        - etcd desired state shows current version but installed state regresses
        - controller log shows new leader running reconciler against stale desired state snapshot
        - downgrade guard fires but is overridden by force-install path
      root_cause: |
        After a leader failover, the new controller leader started its reconciler against an
        in-memory desired state snapshot from the previous leader's session. The snapshot
        contained a placeholder (0.0.1) for a package that had not yet been assigned a real
        version. The reconciler installed the placeholder version, poisoning the node's installed
        state. The downgrade guard was bypassed because the old leader's state was not fully
        written to etcd before failover.
      architecture_fix: |
        Reconciler must load desired state exclusively from etcd at startup after acquiring
        leadership — never from an in-memory snapshot from a prior leader session.
        Unconditional downgrade guard: if desired version < installed version AND Force=false,
        skip the install regardless of source. Only Force=true (explicit operator command) permits
        downgrade. No automatic rollback ever.
      related_invariants:
        - controller.reconciler.no_downgrade_without_force
        - controller.reconciler.desired_state_from_etcd_only
      forbidden_fixes:
        - auto_rollback_on_crash
        - reconcile_from_in_memory_snapshot_after_failover
      related_services:
        - node_agent
        - controller
      required_tests:
        - TestReconcilerNoDowngradeWithoutForce
        - TestReconcilerLoadsDesiredStateFromEtcdOnLeaderElection

    - id: xds.infra_preparing_loop_from_kind_mismatch
      title: xds or gateway stuck in infra_preparing due to package kind classification conflict
      severity: high
      symptoms:
        - xds or gateway DesiredService shows phase=infra_preparing indefinitely
        - reconciler repeatedly re-attempts xds/gateway install with no progress
        - install workflow completes SUCCEEDED but convergence never happens
        - package kind in spec differs from package.json or catalog classification
        - controller log shows "kind=service" but reconciler routes it as "kind=infrastructure"
      root_cause: |
        Package kind classification (infrastructure vs service) was duplicated across spec YAML,
        package.json, and the catalog. When these disagreed, the reconciler applied the wrong
        convergence logic: service-kind packages use a different readiness gate than
        infrastructure-kind. xds and gateway are infrastructure but were classified as service in
        one of the three sources, causing the readiness gate to never fire.
      architecture_fix: |
        Package kind must come from ONE canonical registry (package.json metadata). The spec YAML
        and catalog must derive from this source, never independently classify. Add validation at
        build time that asserts spec.kind == package.json.kind. Any disagreement is a build error,
        not a runtime silent mismatch.
      related_invariants:
        - package.kind.single_canonical_source
      forbidden_fixes:
        - hardcode_kind_list_in_reconciler
        - infer_kind_from_service_name
      related_services:
        - xds
        - repository
        - node_agent
      required_tests:
        - TestPackageKindFromCanonicalRegistry
        - TestXDSConvergesAfterKindMismatchFixed

    - id: ops_knowledge.seed_drift_post_install
      title: An AI Memory entry with provenance.source=seed has content that no longer matches the awareness bundle's manifest hash
      severity: warning
      symptoms:
        - "doctor finding ops_knowledge.seed_drift fires for one or more entry ids"
        - "globular ops-knowledge verify reports drift between disk YAML and ai-memory rows"
        - "AI sessions get inconsistent operational guidance from the seed (rare; usually noticed via doctor first)"
      root_cause: |
        Either:
        1. A privileged caller bypassed the seeder principal and wrote a seed-tagged entry directly
           (immutability layer broken or RBAC misconfigured), OR
        2. The on-disk YAML at /var/lib/globular/operational-knowledge/ was modified post-install
           without re-running the bundle install path (manual edit), OR
        3. ScyllaDB row corruption (very rare; would also affect non-seed memories).
      architecture_fix: |
        Treat ai-memory as the canonical store and the bundle as the authoritative source. On
        drift, trust the bundle: re-run the seeder workflow which upserts back to the bundle's
        sha256. Investigate WHY the drift happened — usually a misconfigured CLI tool or a
        bypassed RBAC check. ai-memory's immutability layer should be tested every release.
      forbidden_fixes:
        - allow_human_to_overwrite_seed_to_silence_finding
        - increase_drift_threshold_to_hide_low_severity_drift
      related_invariants:
        - ops_knowledge.seed_integrity
      related_services:
        - ai-memory
        - cluster-doctor
        - awareness
      required_tests:
        - TestDoctorDetectsSeedDriftWithinOneCycle
        - TestSeederUpsertHealsDrift

    - id: ops_knowledge.unauthorized_seed_mutation
      title: A non-seeder principal attempted (and was allowed) to UPDATE or DELETE an AI Memory entry tagged provenance.source=seed
      severity: critical
      symptoms:
        - "audit log shows memory_update / memory_delete on a seed entry from a principal other than 'seeder'"
        - "ai-memory write succeeded but the value diverges from the bundle manifest"
      root_cause: |
        The immutability check in ai-memory's Update/Delete handlers either was not implemented,
        was bypassed by a debug/admin path, or the RBAC policy granted seed-write to too broad
        a role (e.g., 'admin' instead of just 'seeder').

        Critical because operational knowledge is the AI's source of truth for incident response.
        A poisoned seed entry could cause future AI sessions to recommend wrong remediations.
      architecture_fix: |
        Reject all writes to entries with metadata.source = "seed" unless principal is exactly
        "seeder". Log all such attempts at WARN level with principal id + entry id. Doctor
        emits ops_knowledge.unauthorized_seed_mutation finding with severity=critical until
        the next clean seeder run heals the entry.
      forbidden_fixes:
        - widen_seeder_role_to_admin
        - silently_swallow_permission_denied_in_audit_log
        - skip_immutability_check_for_test_environments     # tests should set up a 'seeder' service-account, not bypass
      related_invariants:
        - ops_knowledge.seed_integrity
      related_services:
        - ai-memory
        - rbac
      required_tests:
        - TestAdminPrincipalCannotMutateSeed
        - TestSeederPrincipalCanUpsertSeed
        - TestUnauthorizedAttemptIsLoggedAndRejected

    - id: ops_knowledge.seeder_workflow_skipped
      title: AI Memory has zero seed-source entries even though the awareness bundle is installed and verified
      severity: warning
      symptoms:
        - "globular memory query --tags seed returns empty"
        - "doctor finding ops_knowledge.seed_missing fires"
        - "fresh AI sessions have no operational baseline (Claude asks the same questions every session)"
      root_cause: |
        The day-1 seeder workflow either never ran or failed silently. Causes:
        - ai-memory was unhealthy when the seeder workflow was scheduled and the workflow
          gave up without retry
        - the workflow was disabled or removed
        - a release upgrade introduced new seed entries but the seeder didn't detect bundle
          version change and skipped the upsert
      architecture_fix: |
        Seeder runs as a proper Workflow Service workflow with idempotent semantics, bounded
        retry, and a terminal state (SUCCEEDED/FAILED). On every controller startup, check if
        the bundle's seed_version differs from what's in ai-memory's metadata; if so, schedule
        the seeder. Log success at INFO with entries-upserted count.
      forbidden_fixes:
        - run_seeder_inline_in_controller_startup_without_workflow_service
        - skip_seeder_silently_if_ai_memory_unhealthy   # must surface as a finding instead
      related_invariants:
        - ops_knowledge.seed_integrity
      related_services:
        - workflow
        - ai-memory
        - cluster-controller
      required_tests:
        - TestSeederSchedulesOnBundleVersionChange
        - TestSeederRetriesOnTransientAIMemoryFailure
        - TestSeederTerminatesAfterMaxAttempts

    - id: vip_contamination.node_routable_ip_returns_vip
      title: Single-IP node identity reads cause VIP-contamination misclassification across multiple subsystems
      severity: critical
      symptoms:
        - "an etcd member is wrongly evicted as 'stale' immediately after keepalived enable"
        - "DNS per-node A records contain both the real IP and the VIP for every per-node FQDN"
        - "MinIO publish filter excludes the VIP-holder from ObjectStoreDesiredState.Nodes (chicken-and-egg with MinioJoinPhase=non_member)"
        - "publishGateway / publishController DNS records mix the VIP among gateway/controller node IPs"
        - "cluster-doctor objectstore.write_quorum_lost CRITICAL active_drives=0 even when MinIO is healthy on every storage node (live mc admin info shows 3/3 drives Ok)"
        - "cluster-doctor objectstore.minio.unapproved_path CRITICAL on every admitted disk after a topology apply that previously succeeded"
        - "cluster-doctor objectstore.minio.active_on_non_member silently misses real violations (false-NEGATIVE — rule continues on empty IP rather than firing)"
      root_cause: |
        Two distinct failure mechanisms in the same class — both stem from reducing a multi-IP
        node identity to a single IP for comparison against a curated stable IP list.

        Mechanism A — first-IP-is-VIP:
        node.Identity.Ips lists ALL the node's IPs. For the keepalived MASTER, the floating
        VIP appears (typically as the first or among the first entries). Helpers that pick a
        single representative IP — node.PrimaryIP(), node.Identity.Ips[0], nodeRoutableIP() —
        return the VIP whenever the node holds it. Comparing that VIP against a stable-IP
        pool list never matches.

        Mechanism B — AdvertiseIp-is-empty:
        NodeIdentity has a separate single-string field `AdvertiseIp` distinct from the
        repeated `Ips` list. The controller does not currently populate AdvertiseIp (verified
        live 2026-05-10 — empty on every node in a 5-node cluster). Consumers that compare
        `n.GetIdentity().GetAdvertiseIp() == ip` get `"" == "10.0.0.x"` → false, which
        either produces a false-positive ("node not in pool" → write_quorum_lost,
        unapproved_path) OR a silent false-negative ("can't determine IP, skip" — real
        violations missed in active_on_non_member).

        Anything downstream that COMPARES that single representative IP against a curated,
        stable IP list (etcd peer URLs, MinIO pool nodes, controller pool nodes, DNS
        records, admitted disks, doctor invariants) fails to match — and treats the node as
        unknown / stale / non-member / down.
      architecture_fix: |
        Three patterns work:
        1. node.StableIP(clusterVIP) — explicitly excludes the cluster VIP. Use when picking
           a single representative IP for publication / addressing.
        2. nodeAny<X>(node, list) helpers — match against ANY of node.Identity.Ips. Use when
           CHECKING membership in a stable list.
        3. nodeIDByPoolIP(snap.Nodes, poolIPs) — bulk-build a poolIP→nodeID map by iterating
           every node's full Identity.Ips list. Use when a rule needs to resolve multiple
           pool IPs to nodeIDs in one pass.

        Fixes landed:
        - a4ea9ef1: etcd memberNode/dns/gateway paths via StableIP
        - ead2bb94 (1.2.28): MinIO pool admission via nodeAnyIPInPool in minio_pools.go
        - <next commit>: cluster-doctor's 5 sites (write_quorum_lost, format_heal_deadlock,
          duplicate_physical_path, active_on_non_member, poolEndpoints) via
          nodeIDByPoolIP / nodeHasIP helpers in node_ip_matching.go
      forbidden_fixes:
        - hardcode_node_to_pool_mapping_to_avoid_filter
        - filter_out_vip_in_node_identity_ips             # the node legitimately HAS that IP; filter at the consumer instead
        - special_case_keepalived_master_as_an_exception
        - read_advertise_ip_without_falling_through_to_ips_list   # AdvertiseIp is empty in production; a fallback-less read is broken by definition
      related_invariants:
        - objectstore.topology_contract
        - etcd.endpoint_reachability
      related_services:
        - cluster-controller
        - cluster-doctor
        - keepalived
        - dns
        - ai-memory
      required_tests:
        - TestMinioJoin_VIPHolder_MatchesByAnyIP
        - TestEtcdMemberMatchAcceptsAnyOfNodeIps
        - TestDNSReconcilerExcludesVIPFromPerNodeARecords
        - TestPublishGatewayUsesStableIP
        - TestNodeIDByPoolIP_MatchesByAnyIP
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestWriteQuorumLost_VIPHolder_RealDowntimeStillFires

    - id: cluster_controller.objectstore_apply_watcher_dies_silently
      title: objectstore-apply-watcher exits its goroutine when etcd watch returns 'mvcc compacted'; not re-established
      severity: critical
      symptoms:
        - "globular objectstore topology apply times out with 'timeout waiting for controller to process apply request'"
        - "/globular/objectstore/topology/apply_request key exists in etcd but apply_result is empty"
        - "controller log shows 'objectstore-apply-watcher: watch error: etcdserver: mvcc: required revision has been compacted' some time before the apply was attempted"
        - "no 'objectstore-apply: processing request' log lines for hours after the watcher's last error"
      root_cause: |
        startObjectStoreApplyWatcher's loop handles ev.Err() with `continue`, then keeps
        ranging over the same etcd Watch channel. Once etcd emits 'mvcc compacted', the
        channel closes; the next select returns ok=false and the goroutine `return`s.
        safeGo doesn't re-spawn it.

        Because the drain on startup is the only other ingestion path, and drain only runs
        for the leader, the only operational recovery is: restart all controllers in sequence
        so a freshly-started controller wins the next election and drains the queued request.
      architecture_fix: |
        On any watch error or channel-closed event, sleep with bounded backoff and re-establish
        the Watch from the latest revision (Watch with WithRev(currentRev+1) after re-reading
        the key). Log at WARN. The same pattern likely exists in other Watch-based goroutines
        in the controller — audit and fix together.

        Until fixed in code, the recovery runbook is:
        docs/operational-knowledge/runbooks/recover-stuck-topology-apply.yaml
      forbidden_fixes:
        - swallow_compacted_error_silently
        - skip_apply_request_processing_when_watch_died        # this is the current bug
        - require_human_to_restart_controller_for_every_apply  # only acceptable as a temporary workaround
      related_invariants:
        - objectstore.topology_contract
        - convergence.no_infinite_retry
      related_services:
        - cluster-controller
        - etcd
      required_tests:
        - TestApplyWatcherRecoversFromCompactedRevision
        - TestApplyWatcherReestablishesWithLatestRev
        - TestDrainOnStartupCatchesQueuedRequest

    - id: bootstrap.flag_persists_post_day_1
      title: /var/lib/globular/bootstrap.enabled flag found on a node after day-1 join completed — security regression
      severity: critical
      symptoms:
        - "ls /var/lib/globular/bootstrap.enabled returns a file on a post-day-1 cluster"
        - "loopback-only RPCs continue to bypass auth"
        - "doctor finding bootstrap.flag_persists_post_day_1 fires"
      root_cause: |
        Bootstrap mode is gated by a flag file with a 30-min TTL. The day-1 join flow is
        responsible for removing the flag once the cluster reaches founding quorum. If the
        join completed but the flag wasn't cleaned up, the cluster is in a permanent
        bootstrap-mode state — any localhost connection can perform unauthenticated mutations.

        Causes observed:
        - Crash in the day-1 finalize step before the cleanup ran
        - Manual operator intervention that re-created the flag without intent
        - Bug in the founding-quorum classifier that left day-1 in a partial state
      architecture_fix: |
        Day-1 finalize MUST atomically clear the bootstrap flag as the LAST step (after
        founding quorum verified, after sa password changed, after CA rotated). On controller
        startup, if day1_phase == ready AND bootstrap.enabled present, controller logs a
        critical warning, refuses to accept loopback RPCs, and emits the doctor finding.
      forbidden_fixes:
        - silently_remove_flag_on_doctor_finding
        - widen_bootstrap_ttl_to_avoid_re_creation
      related_invariants:
        - founding.quorum.three_nodes_required
      related_services:
        - cluster-controller
        - node-agent
      required_tests:
        - TestDay1FinalizeClearsBootstrapFlag
        - TestControllerRefusesLoopbackWhenFlagPersistsPostDay1

    - id: service.endpoint.os_getenv_for_addresses
      title: A service uses os.Getenv() to resolve a cluster address — bypasses etcd source-of-truth
      severity: critical
      symptoms:
        - "service config code contains os.Getenv(\"...ENDPOINT...\") or similar"
        - "service ignores etcd config when an env var is set"
        - "behaviour differs across nodes due to local env var differences"
      root_cause: |
        A developer added an env-var fallback for "easier local testing" or to "avoid the
        etcd dependency at startup". This violates the etcd-is-sole-source-of-truth rule:
        env-var-driven config is per-node mutable, untracked, and breaks reproducibility.

        Symptom that triggers detection: two nodes with identical Globular config behave
        differently because one has an env var set.
      architecture_fix: |
        Remove the os.Getenv() call. Resolve from etcd via config.GetServiceConfigurationById
        or similar. If etcd is unreachable, ERROR — do not fall back to defaults.

        For local dev environments: use a local etcd seed via the same code path as production.
      forbidden_fixes:
        - keep_env_var_as_fallback_for_dev_only
        - silently_prefer_env_var_when_set
        - widen_to_other_env_vars_to_be_consistent
      related_invariants:
        - service.endpoint.etcd_address_reachability
        - etcd.endpoint_reachability
      related_services:
        - "*"  # any service that resolves cluster addresses
      required_tests:
        - TestServiceConfigSourceIsAlwaysEtcd
        - TestNoOsGetenvInServiceServerCode

    - id: awareness.degraded_source_sentinel_collapsed_to_critical
      title: Awareness source-availability sentinel is collapsed into a critical-severity missing-evidence finding
      severity: critical
      symptoms:
        - "graph_integrity_check reports REQUIRED_TEST_MISSING (severity: critical) for tests that demonstrably exist in source"
        - "coverage_report shows graph_coverage.status = critical with 0 eligible / 0 indexed Go files on a production MCP host"
        - "health_pulse alerts 'N implemented gap(s) have missing tests' when verifyGapTests was actually returning unverified"
        - "operator restarts MCP and finds it has 'opened (read-write): /var/lib/globular/awareness/graph.db' — a small writable shadow — even though /var/lib/globular/awareness/current/graph.db is installed and ~40 MB"
        - "every awareness query from a production MCP host trips at least one critical alert about coverage or missing tests"
      root_cause: |
        Several awareness subsystems ask the same question — "is a real
        source tree available to scan from this process?" — and each
        invents its own degraded answer instead of using a typed primitive:

          • awarGitRoot returns os.Getwd() on git rev-parse failure
            (so the install dir gets scanned as if it were a repo).
          • verifyGapTests returns the string "unverified" when repoRoot
            is empty; the health_pulse consumer's switch collapses
            everything-not-classified into tests_not_found.
          • GoFileCoverage returns EligibleGoFilesTotal=0 with
            ConfidenceImpact=unknown when repoRoot is empty; the
            coverage_report consumer ignores ConfidenceImpact and uses
            the percent directly, so 0% < 70% → critical.
          • dbPath resolution prefers the bundle path if present and
            falls back to a legacy writable path otherwise; there is
            no symmetric handling for "bundle present but couldn't be
            opened cleanly," and the legacy fallback is a stale 1.4 MB
            shadow with ~300 nodes.

        Each layer's unit tests run inside a git checkout where the
        degraded path is never reached, so the conflation is invisible
        until composed on a production host. The result an operator
        sees is a wall of critical-severity alerts about graph
        coverage and missing tests, all of which are pure telemetry
        false positives. The system that's supposed to know its own
        knowledge gaps is loudly lying about them.
      architecture_fix: |
        1. Introduce golang/awareness/sourceroot with a typed Result
           returning Found(path) | Absent | Inaccessible(err) |
           WrongContext(path, reason). No string sentinels. No silent
           cwd fallback.
        2. Migrate awarGitRoot to delegate to sourceroot.Resolve.
        3. Each consumer switches on the typed state. Non-Found states
           are telemetry-unavailable signals at info severity.
        4. coverage_report adds a dedicated "unverified" status (was:
           collapsed into "critical"). health_pulse already separated
           "unverified" from "tests_not_found" in commit 1acd3fbb;
           that fix is referenced here as the precedent.
        5. Forbidden-fix entry
           collapse_source_absent_into_critical_missing_evidence
           prevents future PRs from re-introducing the conflation.
      forbidden_fixes:
        - collapse_source_absent_into_critical_missing_evidence
        - fall_back_to_cwd_when_git_root_unknown
        - count_unverified_as_tests_not_found
      related_invariants:
        - awareness.source_scan_requires_verified_repo_root
        - awareness.no_match_is_not_safe
      related_services:
        - mcp
        - awareness
      required_tests:
        - TestSourceRoot_NotInGitRepoReturnsAbsent
        - TestSourceRoot_ExplicitPathInvalidReturnsInaccessible
        - TestAwarGitRoot_NotInRepoReturnsEmpty
        - TestVerifyGapTests_EmptyRepoRootReturnsUnverified
        - TestCoverageReport_NoRepoRootIsUnverifiedNotCritical
    - id: repository.desired_build_id_orphaned
      title: package fetch returns NotFound for build_id referenced by desired state
      severity: critical
      symptoms:
        - 'node-agent log: "build_id ... could not be resolved (repository unreachable)"'
        - 'controller log: install workflows stuck in FAILED_TRANSIENT looping on the same build_id'
        - 'doctor finding: repository.desired_build_ids_resolve fails for one or more services'
        - install-storm against the repository (NotFound on every retry) without convergence
        - DesiredService rows pin build_id=X, repository.ListArtifacts shows no entry for build_id=X
        - new nodes hitting cold start cannot reach Applied — Layer 3 stays empty forever
      root_cause: |
        Repository metadata / Scylla index rows for a build_id were deleted while
        desired state (ServiceDesiredVersion, InfrastructureRelease, ServiceRelease,
        DesiredService) still pinned the immutable build_id. Once the index loses
        the entry, ResolveArtifact returns NotFound, the fallback paths (POSIX CAS,
        GitHub mirror, MinIO mirror) demand a sha256 they cannot synthesize without
        the manifest, and the install-storm begins. The original incident was
        triggered by a node-removal workflow ("N etcd keys cleaned, M releases
        purged") that cascaded into a repository purge with no reference-safety
        check against desired state.
      architecture_fix: |
        1. collectDesiredBuildIDs in golang/repository/repository_server/reachability_guard.go
           must scan ALL four desired-state etcd prefixes:
             /globular/resources/ServiceDesiredVersion/
             /globular/resources/InfrastructureRelease/
             /globular/resources/DesiredService/
             /globular/resources/ServiceRelease/
           and accept BOTH Spec.BuildID and Status.ResolvedBuildID.
        2. checkDeletionSafety + checkRevokeSafety must consult both installed AND
           desired build_id sets; block deletion with a stable PurgeBlockedReason
           code (RepositoryPurgeBlockedReferencedBuild_desired) and an audit event.
        3. resolveByBuildID must distinguish three outcomes — success, NotFound
           (manifest absent), and DesiredBuildIdOrphaned/FailedPrecondition
           (manifest exists but demoted). Conflating the last two is what produced
           the install-storm.
        4. node-agent fallback path must check the error sentinel: ErrBuildIDOrphaned
           and ErrBuildIDNotFound BOTH forbid local-pinned-tarball fallback
           (CannotFallbackWithoutManifestOrChecksum); only ErrRepositoryUnreachable
           permits it.
        5. Doctor invariant repository.desired_build_ids_resolve fires whenever an
           active desired build_id is not represented by any node's installed
           build_id set — surfaces the orphan before the install-storm kicks in.
      forbidden_fixes:
        - change_desired_version_or_build_id_by_hand_to_clear_error
        - disable_require_checksum_to_allow_unverifiable_fallback
        - manually_copy_package_blobs_without_index_repair
        - restart_node_agent_repeatedly_hoping_repository_recovers
        - delete_desired_build_id_to_silence_install_storm
        - relax_require_checksum_when_mirror_lookup_lacks_sha256
      related_invariants:
        - repository.purge_must_not_delete_active_desired_builds
        - repository.desired_build_id_must_resolve
        - repository.fallback_requires_manifest_and_checksum
      related_services:
        - repository
        - cluster-controller
        - node-agent
        - cluster-doctor
      required_tests:
        - TestDeletionSafety_DesiredBuildID_IsBlocked
        - TestRevokeSafety_DesiredBuildID_IsBlocked
        - TestCollectDesiredBuildIDs_ScansAllFourPrefixes
        - TestResolveByBuildIDOrphaned_ReturnsFailedPrecondition
        - TestInstallerRefusesLocalFallbackOnOrphaned
        - TestDoctorRule_RepositoryDesiredBuildIDsResolve
    - id: dns.desired_ghost_records
      title: DNS records point to nodes where service is planned, inactive, or not installed
      severity: high
      symptoms:
        - gateway.<domain>, api.<domain>, *.<domain>, dns.<domain> resolve to IPs whose owning node has the service "planned" or "inactive"
        - client gRPC dials oscillate between success and TCP refused as the TTL flips between healthy and dead candidates
        - _cluster-controller._tcp.<domain> SRV record contains nodes whose globular-cluster-controller.service is inactive or missing
        - DNS reconciler log shows record-write loops without any "WITHDREW" lines despite stuck installs
        - new node added to cluster appears in DNS records before its packages are installed
      root_cause: |
        The DNS reconciler in golang/cluster_controller/cluster_controller_server/dns_state.go
        computed candidates from Profile (Layer 2 / Desired) alone — `node.HasProfile("gateway")`,
        `node.HasProfile("control-plane")`, etc. It did NOT consult per-node
        InstalledVersions (Layer 3) or systemd unit state (Layer 4) before
        emitting A / SRV records. As a result, a node that was planned to run
        gateway but hadn't completed installation, or whose gateway unit had
        gone inactive, still appeared in gateway.<domain>. Clients then
        load-balanced into a dead endpoint for each TTL.
      architecture_fix: |
        1. NodeInfo carries explicit readiness inputs: InstalledServices map
           (Layer 3) and RuntimeHealthy map (Layer 4), plus Draining/Quarantined
           lifecycle flags.
        2. ComputeDesiredStateWithFunnels applies a gateForService funnel for
           every record group that promises a service:
              Desired (profile) → Installed → Runtime healthy → Published
           A record is emitted ONLY when all three layers agree.
        3. Per-node A/AAAA records (which describe the NODE, not a service) are
           withdrawn when Draining/Quarantined.
        4. The reconciler logs structured WITHDREW lines per record group so
           operators can see the funnel and reason about ghost-record withdrawal.
        5. Doctor invariant dns.records_match_runtime_health fires when any node
           with a record-bearing profile has the corresponding service planned
           but not installed, or installed but runtime-unhealthy — surfaces a
           reconciler bug or an unpatched DNS server before clients notice.
      forbidden_fixes:
        - lower_dns_ttl_so_bad_resolutions_expire_faster
        - restart_dns_only_to_force_record_refresh
        - hardcode_known_good_nodes_in_dns_config
        - remove_profile_from_node_to_hide_record
        - publish_dns_from_desired_or_profile_state
        - rely_on_dns_to_recover_dns
      related_invariants:
        - dns.records_must_be_installed_and_runtime_healthy
        - dns.wildcard_must_not_include_unhealthy_nodes
      related_services:
        - cluster-controller
        - dns
        - gateway
        - cluster-doctor
      required_tests:
        - TestComputeDesiredState_PlannedNotInstalled_NoRecord
        - TestComputeDesiredState_InstalledNotHealthy_NoRecord
        - TestComputeDesiredState_HealthyNode_PublishesRecord
        - TestComputeDesiredState_DrainingNode_WithdrawsRecords
        - TestComputeDesiredState_WildcardExcludesUnhealthy
        - TestComputeDesiredState_ControllerSRVOnlyHealthy
        - TestDoctorRule_DNSRecordsMatchRuntimeHealth
