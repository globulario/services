        - adding a kind-specific bypass for AWARENESS_BUNDLE in the sync loop (parallel hidden path, future kinds re-create the same gap)
        - removing the platform filter entirely (would accept genuinely wrong-arch entries, breaking the per-arch separation rule)
        - importing the bundle via a separate non-sync code path (creates two source-of-truth import flows for the same BOM)
        - treating any unknown platform as noarch (silently accepts typos and corrupted BOM entries)
        - retrying sync with a different targetPlatform to "catch" noarch entries (timing-dependent, races with the controller)
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - repository.sync_must_not_silently_drop_noarch_artifacts
        - repository.imported_package_must_be_local_install_resolvable
      required_tests:
        - TestPlatformMatchesTarget
        - TestSyncFromUpstream_NoArchEntryNotFilteredByPlatform
        - TestSyncFromUpstream_ArchSpecificEntryStillFilteredOnMismatch
        - TestSyncFromUpstream_AwarenessBundleNoArchImportsCleanly
      resolution: |
        v1.2.118 sync_from_upstream.go: replace strict equality with platformMatchesTarget helper.

        platformMatchesTarget(entry, target):
          - empty entry: accept (legacy grandfathering)
          - case-insensitive noarch: accept on every target
          - exact equal: accept
          - otherwise: reject

        Constant noArchPlatform and the helper live next to each other so the
        signal string and matcher cannot drift. Helper is the SINGLE point in
        the codebase that interprets noarch; any future filter must call it
        rather than reimplement the comparison.

        Layout: the helper does NOT broaden filtering for arch-specific entries.
        A linux_arm64 entry is still rejected on a linux_amd64 consumer. Only
        the noarch case is specialized.
      root_cause: |
        The sync entry loop in sync_from_upstream.go used strict equality to filter BOM
        entries by platform against the consumer's targetPlatform (linux_amd64). The
        awareness bundle is published with platform=noarch because its payload
        (compiled graph + YAML knowledge) has no native-code architecture binding,
        and the BOM authoritatively declares it portable across every target.

        Strict equality treats noarch as "wrong platform" and continues past the
        entry without surfacing any signal. The downstream code (processSyncEntry,
        importUpstreamArtifact, materializeLocalPackageArchive) is never reached
        for that entry. No row is written; no error is logged; the sync result
        object has zero entries for that name. The doctor's DesiredBuildIdOrphaned
        rule only fires later, divorced from the cause.

        First surfaced 2026-05-28: 11 sibling services were repaired via repair_blob
        but globular-awareness-bundle remained orphaned because the platform filter
        rejected it before any code in the sync path could see it.
      severity: critical
      symptoms:
        - repository_upstream_sync returns zero results for a BOM entry that exists in the release-index.json
        - DesiredBuildIdOrphaned critical finding fires for globular-awareness-bundle even though the bundle is in the release
        - manifests table has no row for the bundle artifact_key (not even a skeleton)
        - ServiceRelease stays WAITING with reason artifact_not_published indefinitely
        - cluster-doctor reports artifact_not_published but the artifact is sitting in the GitHub release
        - sync logs do not contain a rejection or error for the dropped entry
      title: BOM entries with platform=noarch are silently dropped by the sync platform filter, producing zero-result imports and downstream orphan findings
    - affects:
        files:
            - golang/repository/upstream/local_source.go
            - golang/repository/upstream/git_source.go
        symbols:
            - safeJoin
      detection: |
        Direct: grep for `HasPrefix` near `filepath.Join` that does
        NOT call `EvalSymlinks` first in the upstream/ package.
        Runtime: a malicious package archive containing a symlink
        whose target escapes the package root would surface as the
        OpenArtifact call returning a host-file's contents instead of
        the artifact bytes — and the manifest sha256 verification
        downstream would mismatch, surfacing as a doctor finding for
        artifact_corruption rather than as a security event.
      id: repository.upstream_path_traversal_via_symlinks
      related_invariants:
        - meta.silence_is_not_valid_for_unexpected
        - repository.upstream_local_paths_must_reject_traversal
      required_tests:
        - TestSafeJoin_RejectsDotDot
        - TestSafeJoin_RejectsAbsolute
        - TestGitIndex_RejectsPathTraversal
      severity: critical
      status: active
      summary: |
        If safeJoin (in golang/repository/upstream/local_source.go)
        ever drops its filepath.EvalSymlinks step, a symlink placed
        inside the configured local_root that targets a path outside
        the root would let an operator-uploaded archive (or a
        malicious git tag in the sibling GIT_INDEX provider) read
        arbitrary files on the host — including /etc/shadow,
        /var/lib/globular/pki/ca.key, other tenants' MinIO data, or
        sibling cluster credentials.

        A common shortcut is `strings.HasPrefix(joined, root+"/")`
        WITHOUT EvalSymlinks. This looks correct because the joined
        path is textually under the root — but the symlink only
        reveals itself when followed. Tests must use an actual
        symlinked layout, not just `..` paths.

        Mitigated today by safeJoin's three-step guard (reject
        absolute, reject "..", then EvalSymlinks-then-prefix-check),
        protected by invariant
        repository.upstream_local_paths_must_reject_traversal.
      title: Symlink inside LOCAL_DIR root escapes to host filesystem when symlink evaluation is skipped
