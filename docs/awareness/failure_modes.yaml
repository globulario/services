    - id: etcd.wrong_config_appears_healthy
      title: An etcd member with a wrong (loopback, self-not-in-initial-cluster, or self-only) config looks healthy because the daemon is active — it silently forms an isolated single-member cluster
      severity: high
      status: active
      root_cause: |
        Before the infrastructure truth plane covered etcd, a node's etcd health was
        judged by "is globular-etcd.service active?". A misrendered config —
        listen-peer-urls / advertise-client-urls pointing at 127.0.0.1 or 0.0.0.0, a
        member absent from its own initial-cluster (rendered when the node had no
        routable IP), a self-only initial-cluster on a joining node, or an empty /
        mismatched initial-cluster-token — still produces a running daemon. systemd
        reports active and the local v3 API answers, yet the member bootstraps an
        ISOLATED single-member cluster (or a parallel cluster under a different token)
        while every coarse signal says "green". The wrongness only surfaces later as a
        join that never converges, a control-plane that cannot reach quorum, or a
        split-brain etcd — far from the root cause. This is the etcd instance of
        fm.industry.partial_failure_hidden_by_global_green.
      trigger: |
        The cluster-controller etcd renderer emits a config with a loopback/0.0.0.0
        cluster-facing URL, a member missing from its own initial-cluster, a self-only
        initial-cluster on a joining node, or a mismatched initial-cluster-token — and
        the daemon starts anyway.
      symptoms:
        - globular-etcd.service is active and the local v3 API answers, but member list does not cover the expected members
        - a joining member never appears in the existing cluster's member list
        - control-plane services intermittently fail to reach etcd quorum
        - doctor/heartbeat report the member healthy until a downstream quorum failure
      blast_radius:
        - The control plane loses quorum redundancy while appearing healthy
        - A "successful" join leaves an isolated etcd member or a split-brain cluster
      architecture_fix: |
        The infra truth plane attests the rendered etcd.yaml against desired state
        BEFORE trusting "active": loopback/unspecified ADVERTISE URLs are CRITICAL
        (etcd.loopback_forbidden — listen/bind URLs may be 0.0.0.0, only loopback
        is forbidden there), membership/token/peer-TLS mismatches are ERROR
        (etcd.config_valid), and the lifecycle FSM marks the member STALLED (not
        healthy) when the daemon is active on a critically-invalid config or on a
        CORRUPT alarm. daemon_active, healthy, and config_valid stay separate signals
        so "active" can never imply "healthy". The runtime observer dials the member's
        advertised client URL (never a hardcoded loopback) and reads the native v3 API
        (status, member list, alarms). Doctor raises the finding; MCP
        infra_explain_stall gives the causal answer and points repair at the config
        owner (the controller renderer), never a manual etcd.yaml edit.
      forbidden_fixes:
        - treat_systemd_active_as_scylla_health
        - hand_edit_scylla_yaml_as_the_permanent_fix_instead_of_the_renderer
      related_invariants:
        - infra.process_active_is_not_health
        - infra.config_must_be_attested_before_start
        - etcd.loopback_forbidden
        - etcd.config_valid
        - etcd.member_not_stalled
        - meta.half_done_must_not_look_done
      related_intents:
        - infrastructure.etcd.quorum_backed_config_authority
      related_services:
        - node-agent
        - cluster-doctor
      protects:
        files:
            - golang/node_agent/node_agent_server/infra_truth/etcd_attestation.go
            - golang/node_agent/node_agent_server/infra_truth/etcd_lifecycle.go
            - golang/cluster_doctor/cluster_doctor_server/rules/etcd_infra.go
      required_tests:
        - golang/node_agent/node_agent_server/infra_truth/etcd_test.go::TestAttestEtcdConfig_LoopbackPeerURL
        - golang/node_agent/node_agent_server/infra_truth/etcd_test.go::TestDeriveEtcdLifecycle_States
        - golang/cluster_doctor/cluster_doctor_server/rules/etcd_infra_test.go::TestEtcdInfraJoinStalled_Corrupt

    - id: minio.wrong_topology_appears_healthy
      title: A MinIO node rendered standalone (or with a wrong drive count) looks healthy because the daemon is active — it silently forms an isolated store and can reformat drives
      severity: critical
      status: active
      root_cause: |
        Before the infrastructure truth plane covered MinIO, a node's MinIO health
        was judged by "is globular-minio.service active?" plus a TCP dial of :9000.
        A misrendered minio.env — MINIO_VOLUMES carrying a single local path while
        the desired topology is distributed, a volume count that disagrees with
        desired nodes×drives, or a loopback endpoint — still produces a running
        daemon. systemd reports active and the S3 port answers, yet the node forms
        an ISOLATED single-node store that diverges from the pool, and MinIO can
        silently reformat the drives (format.json) when the volume topology changes
        underneath it. The wrongness surfaces later as object-not-found errors,
        lost redundancy, or an erasure set that never forms — far from the root
        cause. This is the MinIO instance of
        fm.industry.partial_failure_hidden_by_global_green, and it carries the
        format.json blast radius (drive-count mismatch → silent reformat).
      trigger: |
        config.RenderMinioEnv emits a standalone MINIO_VOLUMES (single local path)
        for a node whose ObjectStoreDesiredState is distributed, a volume count
        that disagrees with desired nodes×drives, or a loopback volume endpoint —
        and globular-minio.service starts anyway.
      symptoms:
        - globular-minio.service is active and :9000 answers, but the node is not part of the erasure set
        - objects written via the pool are not found on this node (or vice versa)
        - redundancy/erasure coding is silently lost; a single node is a SPOF
        - drives get reformatted (format.json) after a topology change, dropping data
      blast_radius:
        - Object redundancy is silently lost while the node reports active
        - A drive-count mismatch can trigger a format.json reformat that drops stored objects
      architecture_fix: |
        The infra truth plane attests the rendered minio.env against the
        controller-published ObjectStoreDesiredState BEFORE trusting "active":
        loopback volume endpoints are CRITICAL (minio.loopback_forbidden), a
        standalone-in-cluster split-brain or a drive-count mismatch is CRITICAL
        (minio.topology_matches_desired — the format.json blast-radius guard), and
        the lifecycle FSM marks the member STALLED (not healthy) when the daemon is
        active on such a topology. daemon_active, healthy, and config_valid stay
        separate signals. The runtime observer reads MinIO's native, credential-free
        /minio/health/live and /minio/health/cluster endpoints so a live member with
        no write quorum is reported DEGRADED, never healthy. Doctor raises the
        finding; MCP infra_explain_stall points repair at the config owner
        (ObjectStoreDesiredState + RenderMinioEnv), never a manual minio.env edit.
      forbidden_fixes:
        - hand_edit_scylla_yaml_as_the_permanent_fix_instead_of_the_renderer
      related_invariants:
        - infra.process_active_is_not_health
        - infra.config_must_be_attested_before_start
        - minio.loopback_forbidden
        - minio.topology_matches_desired
        - minio.member_not_stalled
        - meta.half_done_must_not_look_done
      related_intents:
        - infrastructure.minio.objectstore_contract_and_topology
        - objectstore.topology_requires_contract
      related_services:
        - node-agent
        - cluster-doctor
      protects:
        files:
            - golang/node_agent/node_agent_server/infra_truth/minio_attestation.go
            - golang/node_agent/node_agent_server/infra_truth/minio_lifecycle.go
            - golang/cluster_doctor/cluster_doctor_server/rules/minio_infra.go
      required_tests:
        - golang/node_agent/node_agent_server/infra_truth/minio_test.go::TestAttestMinioConfig_SplitBrainStandaloneInCluster
        - golang/node_agent/node_agent_server/infra_truth/minio_test.go::TestAttestMinioConfig_DriveCountMismatch
        - golang/node_agent/node_agent_server/infra_truth/minio_test.go::TestDeriveMinioLifecycle_States

    - id: envoy.active_but_mesh_dead
      title: An Envoy data plane looks healthy because the daemon is active, but a missing lds_config or an LDS wedge means port 443 never binds and the HTTP mesh is down
      severity: critical
      status: active
      root_cause: |
        Before the infrastructure truth plane covered Envoy, the data plane's
        health was judged by "is globular-envoy.service active?". But Envoy is an
        xDS-dynamic data plane: a bootstrap missing dynamic_resources.lds_config (or
        an ADS cluster not defined in static_resources) produces a running daemon
        with NO listeners — port 443 never binds. Worse, even with a correct
        bootstrap, the LDS handshake can wedge: CDS applies cluster config but LDS
        update_attempt stays at 0 (the root cause is usually an upstream restart
        storm that SIGTERMs Envoy before LDS completes). In both cases systemd
        reports active and the admin /server_info may even say the process is up,
        yet HTTP routing through Envoy is dead. This is the Envoy instance of
        fm.industry.partial_failure_hidden_by_global_green and overlaps the runtime
        wedge anchored as envoy.lds_update_attempt_zero_despite_cds_progress.
      trigger: |
        The gateway/xDS writes a bootstrap missing lds_config / ads_config / the
        ADS cluster, OR an upstream restart storm wedges the LDS handshake so CDS
        progresses while listener_manager.lds.update_attempt stays 0 — and
        globular-envoy.service is active either way.
      symptoms:
        - globular-envoy.service is active but curl to https://<node>:443 hangs/refuses
        - admin /stats shows cluster_manager.cds.update_success > 0 while listener_manager.lds.update_attempt == 0
        - listener_manager.total_listeners_active == 0
        - the HTTP mesh (controller, MCP, gateway-routed traffic) is unreachable
      blast_radius:
        - The entire HTTP mesh on the node is down while the node reports active
        - Restarting Envoy to "fix" it deepens the wedge when the cause is a restart storm
      architecture_fix: |
        The infra truth plane attests the rendered bootstrap BEFORE trusting
        "active": a missing ads_config/lds_config or an undefined ADS cluster is
        CRITICAL (envoy.config_valid) and marks the lifecycle STALLED. The runtime
        observer reads Envoy's native admin API (/ready, /server_info, /stats)
        per-node and classifies the LDS wedge (cds_update_success>0 &&
        lds_update_attempt==0) as STALLED, pinning
        envoy.lds_progress_required_for_http_mesh_readiness — complementing the
        cluster-scope, Prometheus-derived envoy.lds_wedge rule with direct per-node
        observation that works even when Prometheus has not scraped. daemon_active,
        healthy, and config_valid stay separate signals. The doctor rule is
        diagnostic-only and explicitly tells the operator NOT to restart Envoy —
        a restart loop deepens the wedge.
      forbidden_fixes:
        - restart_envoy_in_an_infinite_loop_to_hide_lds_zero_state
        - assume_cds_progress_implies_lds_progress_because_they_share_an_ads_stream
      related_invariants:
        - infra.process_active_is_not_health
        - infra.config_must_be_attested_before_start
        - envoy.config_valid
        - envoy.lds_progress_required_for_http_mesh_readiness
        - meta.half_done_must_not_look_done
      related_failure_modes:
        - envoy.lds_update_attempt_zero_despite_cds_progress
      related_intents:
        - infrastructure.envoy.service_mesh_data_plane_with_xds_authority
      related_services:
        - node-agent
        - cluster-doctor
      protects:
        files:
            - golang/node_agent/node_agent_server/infra_truth/envoy_attestation.go
            - golang/node_agent/node_agent_server/infra_truth/envoy_lifecycle.go
            - golang/cluster_doctor/cluster_doctor_server/rules/envoy_infra.go
      required_tests:
        - golang/node_agent/node_agent_server/infra_truth/envoy_test.go::TestAttestEnvoyConfig_MissingLDS_CriticalStaticWedge
        - golang/node_agent/node_agent_server/infra_truth/envoy_test.go::TestEnvoyProbeStructured_LDSWedgeStalled
        - golang/cluster_doctor/cluster_doctor_server/rules/envoy_infra_test.go::TestEnvoyInfraLDSProgress_WedgeDetected

    - id: health_gate_trusts_systemd_active_blind_to_runtime
      title: A readiness / convergence / bootstrap gate trusts `systemctl is-active` as proof a component is serving, blind to the runtime states (no quorum, no listeners, wrong topology) that the infra truth plane detects
      severity: high
      status: resolved
      root_cause: |
        The infrastructure truth plane (infra.process_active_is_not_health) made one
        component, ScyllaDB, prove readiness by a CQL port probe rather than systemd —
        the comment in DefaultIsServiceActive literally notes "systemd shows active
        during Raft join but CQL isn't ready yet." But the same lesson was never
        applied to the OTHER gates: workflow service-readiness, day-0 cluster-health
        validation, the post-cert-restart network gate, and ingress/VRRP state all
        still treat `systemctl is-active <unit>` as the verdict. etcd can be active
        without quorum or a leader; Envoy can be active but LDS-wedged (no listeners,
        port 443 unbound); MinIO can be active but split-brain standalone; keepalived
        can be active but not the VRRP MASTER. Each gate then declares "ready /
        converged / bootstrapped" on top of a component that is up but not serving.
        This is a systemic, cross-component instance of
        fm.industry.partial_failure_hidden_by_global_green discovered by auditing the
        codebase with the truth-plane lens (2026-06-16).
      trigger: |
        Any readiness/convergence/health gate calls `systemctl is-active` (or
        systemd ActiveState) for an infra component and returns the result as the
        ready/healthy verdict, without observing the component's native runtime
        truth (etcd member/leader, MinIO /minio/health/cluster, Envoy admin
        /stats listeners, keepalived VRRP state).
      symptoms:
        - a workflow/day-0 step reports SUCCEEDED / "cluster health validated" while etcd has no quorum, Envoy has no listeners, or MinIO is split-brain
        - DNS/ingress includes a node whose keepalived is active but not the VRRP master
        - convergence appears complete while traffic through the mesh is dead
      blast_radius:
        - Gates admit a node / complete a bootstrap on top of a non-serving component, hiding the real failure until a downstream request fails
      architecture_fix: |
        Back each gate with the component's native runtime observation — the same
        signals the infra truth plane already computes (GetInfraProbe lifecycle
        MEMBER_READY, the Envoy LDS-progress check, the MinIO write-quorum check,
        an etcd leader/member check), or at minimum a port/health probe like the
        ScyllaDB branch of DefaultIsServiceActive already does. Keep `is-active`
        only as a cheap pre-gate before the real observation, never as the verdict.
      audit_sites:
        - "REMEDIATED golang/workflow/engine/actors.go::DefaultIsServiceActive — the node-agent now injects IsServiceActive=srv.isServiceReady (golang/node_agent/node_agent_server/infra_readiness.go), which blocks readiness on a STALLED infra component and passes on MEMBER_READY, falling back to DefaultIsServiceActive otherwise. Covers the workflow readiness gate (nodeVerifyServicesActive) on both the workflow-runner and day-0 paths."
        - "REMEDIATED golang/node_agent/node_agent_server/server.go::envoyUnitActive — the cert-watcher convergence gate (certificate.go) now also fails on srv.envoyDataPlaneStalled, so a STALLED Envoy (LDS wedge) no longer passes the post-cert-restart network validation. STALLED-only, no warmup false-negative."
        - "REMEDIATED golang/node_agent/node_agent_server/workflow_day0.go::ValidateClusterHealth — day-0 health now also fails when srv.infraComponentStalled(etcd) shows etcd active-but-STALLED (no quorum/leader/CORRUPT), cache-only so a cold bootstrap cache keeps the is-active verdict."
        - "REMEDIATED golang/node_agent/node_agent_server/internal/ingress/status.go::DetectVRRPState — VRRP state is now derived from the authoritative VIP-ownership fact (holds VIP => MASTER) instead of is-active + journal-log scraping; also fixed a real bug where `ip addr show \"\" iface` (stray empty arg) made VIP detection always fail."
      related_invariants:
        - infra.process_active_is_not_health
        - infra.runtime_truth_must_be_observed_via_native_api
        - meta.half_done_must_not_look_done
      related_services:
        - workflow
        - node-agent
        - cluster-doctor
      required_tests:
        - golang/node_agent/node_agent_server/infra_readiness_test.go::TestInfraReadiness_DecisionMatrix
        - golang/node_agent/node_agent_server/infra_readiness_test.go::TestEnvoyDataPlaneStalled
        - golang/node_agent/node_agent_server/internal/ingress/vrrp_state_test.go::TestDeriveVRRPState
      protects:
        files:
            - golang/workflow/engine/actors.go
            - golang/node_agent/node_agent_server/infra_readiness.go
            - golang/node_agent/node_agent_server/certificate.go
            - golang/node_agent/node_agent_server/workflow_day0.go
            - golang/node_agent/node_agent_server/internal/ingress/status.go
            - golang/node_agent/node_agent_server/server.go

    - id: etcd.auto_rejoin_leader_guard_fails_open
      title: The "never auto-rejoin the etcd leader" guard failed OPEN — when the leader could not be identified it proceeded with an empty leaderNodeID and could wipe the leader, destroying quorum
      severity: critical
      status: resolved
      root_cause: |
        reconcileEtcdAutoRejoin identifies the current etcd leader so it never wipes
        it (wiping the leader's data dir destroys quorum with no recovery path). The
        identification was best-effort inside an `if err == nil` block: if Status
        errored, MemberList errored, no leader was elected (Leader==0), or the
        reported leader did not map to a known node, leaderNodeID stayed empty and
        the "never wipe the leader" guard (`if leaderNodeID != "" && ...`) was simply
        skipped. A node in EtcdJoinRejoinRequired that was in fact the leader could
        then be wiped. The safety check failed OPEN on exactly the uncertainty
        (no quorum, partition, election in progress) where wiping is most dangerous —
        a destructive action proceeding on missing evidence
        (evidence.missing_is_not_known_bad inverted).
      trigger: |
        The controller runs reconcileEtcdAutoRejoin while the etcd Status/MemberList
        read fails or returns no elected leader (quorum loss, partition, election),
        with at least one node in EtcdJoinRejoinRequired.
      symptoms:
        - an etcd node is wiped/rejoined during quorum loss instead of being left alone
        - cluster loses etcd quorum with no automatic recovery after an auto-rejoin
      blast_radius:
        - Destroying the etcd leader destroys cluster quorum and the control plane
      architecture_fix: |
        The leader identification now FAILS CLOSED. reconcileEtcdAutoRejoin refuses
        ALL auto-rejoins this cycle (returns without mutation, retries next reconcile)
        when the endpoint list is empty, Status errors, no leader is elected, the
        member list errors, or the reported leader is not a mappable current member.
        The mapping logic is extracted into the pure helper resolveEtcdLeaderNode,
        whose leaderKnown=false output is the fail-closed signal. Honors
        node_recovery.fence_before_destructive_reseed and
        inventory.missing_means_uncertain.
      forbidden_fixes:
        - proceed_with_auto_rejoin_when_the_etcd_leader_cannot_be_identified
      related_invariants:
        - destructive_actions.require_explicit_guard
        - evidence.missing_is_not_known_bad
        - infra.node_specific_truth_must_be_observed_via_node_local_client
      related_intents:
        - node_recovery.fence_before_destructive_reseed
        - infrastructure.etcd.quorum_backed_config_authority
      related_services:
        - cluster-controller
      protects:
        files:
            - golang/cluster_controller/cluster_controller_server/etcd_members.go
      required_tests:
        - golang/cluster_controller/cluster_controller_server/etcd_rejoin_test.go::TestResolveEtcdLeaderNode_FailsClosedWhenUncertain

    - id: scylla.probe_dials_loopback_not_rendered_bind
      title: The infra probe dialed a hardcoded 127.0.0.1 for ScyllaDB's REST/CQL instead of the rendered bind address, so a healthy node was falsely reported daemon_starting
      severity: high
      status: active
      root_cause: |
        The Phase-1 infra truth-plane probe (ScyllaProber) hardcoded its native-API
        targets to http://127.0.0.1:10000 (REST) and 127.0.0.1:9042 (CQL). ScyllaDB
        binds those ports to the CLUSTER-FACING address — rpc_address for CQL and
        api_address for REST — which Globular renders to the node IP (e.g.
        10.0.0.63), NOT loopback. The probe even parsed the rendered config (it
        reported api_address/rpc_address=10.0.0.63 in result.rendered) but never
        used those values for the dial. So on every healthy node the loopback dial
        got connection-refused, the probe set rest_api_ready=false/cql_ready=false,
        and the lifecycle FSM reported daemon_starting forever. Doctor then raised a
        false scylla.probe_required_when_installed ERROR against a node that was
        serving CQL and gossiping normally. This is the INVERSE of
        scylla.wrong_config_appears_healthy: there a sick node looked green; here a
        healthy node looked sick — both because a health signal was not bound to the
        address the daemon actually uses.
      trigger: |
        ScyllaDB binds rpc_address/api_address to a non-loopback node IP (the normal
        cluster-facing configuration) and the infra probe runs its REST/CQL
        reachability checks against 127.0.0.1.
      symptoms:
        - infra_explain_stall/infra_probe_component report daemon_starting with rest_api_ready=false while scylla-server is active and serving
        - probe errors show "connection refused" dialing 127.0.0.1 port 10000 (REST) and 127.0.0.1 port 9042 (CQL)
        - result.rendered shows api_address/rpc_address = node IP, contradicting the loopback dial in the errors
        - doctor emits ERROR scylla.probe_required_when_installed on a node whose ScyllaDB is healthy
      blast_radius:
        - False ERROR findings on every healthy node whose ScyllaDB binds the node IP — erodes trust in doctor and masks real probe failures
        - A node can never reach INFRA_MEMBER_READY via the probe even though it is a working ring member
      architecture_fix: |
        The probe derives its native-API targets from the rendered config at probe
        time (ScyllaProber.resolveEndpoints): REST base from api_address, CQL address
        from rpc_address, falling back to loopback only when the rendered value is
        empty or a bind-all address (0.0.0.0/::). Explicit injections (a test
        httptest server) are honored verbatim. 127.0.0.1 is now a fallback, never a
        hardcoded assumption — the probe observes the address ScyllaDB actually binds.
      forbidden_fixes:
        - hardcode_loopback_for_infra_native_api_probe
        - treat_loopback_connection_refused_as_daemon_not_ready_without_checking_rendered_bind_address
      related_invariants:
        - infra.runtime_truth_must_be_observed_via_native_api
        - infra.process_active_is_not_health
        - meta.assertions_must_carry_their_scope
      related_services:
        - node-agent
        - cluster-doctor
      protects:
        files:
            - golang/node_agent/node_agent_server/infra_truth/scylla_probe.go
      required_tests:
        - golang/node_agent/node_agent_server/infra_truth/scylla_probe_endpoints_test.go::TestResolveEndpoints_UsesRenderedBindAddress
        - golang/node_agent/node_agent_server/infra_truth/scylla_probe_endpoints_test.go::TestResolveEndpoints_HonorsExplicitInjection
    - id: infra.self_only_seed_isolation_false_positive_on_established_member
      title: Static self-only seed / initial-cluster attestation flags an already-converged founding member as a joining node that "will form an isolated ring" — a healthy node falsely degraded
      severity: high
      status: active
      root_cause: |
        bootstrap_intent is derived from cluster membership: any non-self peer or
        seed in the desired state makes deriveBootstrapIntent return "joining"
        (deriveBootstrapIntent in desired.go / etcd_desired.go). That classifier is
        identity- and time-blind — it conflates "the cluster currently has more than
        one member" with "THIS node is joining an existing ring". So once a second
        node joins, the FOUNDING node's expected_peers grows to include it and the
        founder is retroactively reclassified as "joining".

        The seed / initial-cluster attestation then fires statically: a joining node
        whose seeds (ScyllaDB) or initial-cluster (etcd) contain only self is
        predicted to "bootstrap an isolated single-node/member ring" and raised as an
        ERROR (scylla.config_valid / etcd.config_valid). But that is a PREDICTION
        about a future bootstrap, evaluated with no reference to runtime. For an
        established founder the bootstrap already happened and did NOT isolate it:
        operation_mode is NORMAL with live non-self gossip peers (ScyllaDB), or a
        leader exists with member_count >= 2 (etcd). The ERROR drags a genuinely
        healthy member to lifecycle DEGRADED and can trigger needless remediation of
        a working ring. The lifecycle FSM already reasons correctly from runtime
        (lifecycle.go: isolation only when a joining node observes zero peers), so the
        static attestation CONTRADICTED the FSM's own runtime view. This is the same
        class as scylla.probe_dials_loopback_not_rendered_bind — a healthy node made
        to look sick because a config-derived signal was not reconciled against the
        address/state the daemon actually has.
      trigger: |
        A founding node (seeds/initial-cluster = self) remains in a cluster that a
        second node has joined, so its membership-derived bootstrap_intent flips to
        "joining" while its rendered seed/initial-cluster list is still self-only —
        and the node is already a NORMAL/leader-backed ring member.
      symptoms:
        - infra_probe_component reports config_valid=false / lifecycle=degraded for a node whose runtime shows operation_mode=NORMAL, gossip_live>=2, peers_match=true (ScyllaDB) or has_leader=true, member_count>=2 (etcd)
        - the violation evidence reads "seeds=<self> bootstrap_intent=joining-node" / "initial-cluster=<self> bootstrap_intent=joining-node" on the founding node
        - doctor raises ERROR scylla.config_valid / etcd.config_valid against a healthy ring member
        - the violation's predicted harm ("will bootstrap an isolated single-node ring") is directly contradicted by the same probe's observed_peers
      blast_radius:
        - Healthy founding nodes report DEGRADED, eroding trust in the truth plane and masking real config violations
        - An automated remediator acting on the false ERROR could disrupt a working ring (re-render / restart of a healthy member)
      architecture_fix: |
        The self-only seed / initial-cluster rule is reconciled against runtime
        before it fires. The probe gathers runtime truth BEFORE attestation and
        passes it in (AttestScyllaConfig/AttestEtcdConfig take a runtime arg). When
        runtime PROVES established multi-node membership — ScyllaDB operation_mode
        NORMAL with a live non-self gossip peer (scyllaProvenEstablishedMember), or
        etcd has_leader with member_count >= 2 and a non-self observed peer
        (etcdProvenEstablishedMember) — the prediction is counterfactual and the
        violation is downgraded from ERROR to an INFO seed/membership-hygiene note
        (not silenced: a wiped restart with self-only seeds would still re-isolate).
        With no runtime proof (nil runtime, or not yet NORMAL/leaderless) the rule
        stays an ERROR so a config that would isolate a FRESH node is still caught
        before start (infra.config_must_be_attested_before_start). A genuinely
        isolated node (NORMAL but self-only gossip / member_count 1) still raises the
        ERROR — the fix narrows the false positive without masking
        scylla.wrong_config_appears_healthy / etcd.wrong_config_appears_healthy.
      forbidden_fixes:
        - silence_self_only_seed_rule_entirely_losing_pre_bootstrap_protection
        - trust_systemd_active_or_daemon_active_alone_as_proof_of_ring_membership
        - hand_edit_scylla_yaml_or_etcd_yaml_as_the_permanent_fix_instead_of_the_renderer
      related_invariants:
        - infra.process_active_is_not_health
        - infra.runtime_truth_must_be_observed_via_native_api
        - infra.config_must_be_attested_before_start
        - scylla.config_valid
        - etcd.config_valid
        - meta.assertions_must_carry_their_scope
      related_services:
        - node-agent
        - cluster-doctor
      protects:
        files:
            - golang/node_agent/node_agent_server/infra_truth/attestation.go
            - golang/node_agent/node_agent_server/infra_truth/etcd_attestation.go
            - golang/node_agent/node_agent_server/infra_truth/scylla_probe.go
            - golang/node_agent/node_agent_server/infra_truth/etcd_probe.go
      required_tests:
        - golang/node_agent/node_agent_server/infra_truth/attestation_test.go::TestAttestScyllaConfig_SelfOnlySeed_EstablishedMember_NoError
        - golang/node_agent/node_agent_server/infra_truth/attestation_test.go::TestAttestScyllaConfig_SelfOnlySeed_ActuallyIsolated_StillError
        - golang/node_agent/node_agent_server/infra_truth/attestation_test.go::TestAttestScyllaConfig_SelfOnlySeed_PreBootstrap_StillError
        - golang/node_agent/node_agent_server/infra_truth/etcd_test.go::TestAttestEtcdConfig_SelfOnlyInitialCluster_EstablishedMember_NoError
        - golang/node_agent/node_agent_server/infra_truth/etcd_test.go::TestAttestEtcdConfig_SelfOnlyInitialCluster_ActuallyIsolated_StillError
        - golang/node_agent/node_agent_server/infra_truth/etcd_test.go::TestAttestEtcdConfig_SelfOnlyInitialCluster_PreBootstrap_StillError
    - id: node_agent.state_path_default_desync_from_backup_exclusion
      title: Node-agent state-path default drifts out of sync with backup-manager exclusion config
      severity: high
      root_cause: |
        The default node-agent state path is defined in node_agent_server/main.go, and
        the backup manager maintains an independent exclusion list that references that
        path. Changing the default (e.g. to /var/lib/globular/node-agent/state.json) in
        main.go without updating the backup exclusion leaves the backup config pointing
        at the old path — node-agent runtime state is then backed up or excluded at the
        wrong location. The same value lives in two places with no single source, so the
        two drift apart silently.
      symptoms:
        - backup config references a node-agent state path that main.go no longer uses
        - node-agent state.json is unexpectedly included in (or excluded from) backups
        - moving the default state path silently breaks backup coverage with no error
      architecture_fix: |
        The state-path default must be a single source consumed by BOTH the node-agent
        main and the backup-manager exclusion config (derive the exclusion from the same
        constant/config key, never a hand-copied literal). A regression test asserts the
        backup exclusion entry equals the node-agent state-path default.
      related_services:
        - node_agent
        - backup_manager
      no_test_yet_reason: |
        Flagged by a P1 PR review on node_agent_server/main.go; no test yet asserts that
        the state-path default equals the backup exclusion entry. A sync-assertion test
        (default == exclusion) should be added together with the single-source fix.
      discovered_from: |
        cold-source audit of globulario/services (2026-06-15), dedup-verified as not
        covered by node_agent.state_poisoning_from_stale_reconciler (stale reconciler,
        different) or migration.state_path_upgrade_must_be_idempotent (idempotent path
        upgrade, different).
    - id: repository.skeleton_row_promoted_or_reported_installable
      root_cause: |
        manifest_json is written only by syncManifestToScylla, which is best-effort
        (warn + return on PutManifest failure). The downstream state writes in
        promoteToPublished — UpdatePublishState and transitionArtifactState — are bare
        Scylla UPDATEs (UPSERT). If the manifest sync failed transiently but the state
        UPSERTs succeed, the result is a row that reads publish_state=PUBLISHED +
        artifact_state=PUBLISHED with manifest_json=NULL — a "skeleton row" readers can
        never resolve (proto syntax error forever). The skip path guarded this via
        manifestJSONPresent (after INC-2026-0012), but two siblings did not: the
        promotion chokepoint (promoteToPublished) and the install predicate
        (isRowInstallable), which reported such a row installable from its state columns
        alone.
      architecture_fix: |
        promoteToPublished refuses to write PUBLISHED unless manifestJSONPresent(ctx,key)
        — one chokepoint covering every promotion path (upload + reconciler). The caller
        (UploadArtifact) returns Result=false so the publish is retried. isRowInstallable
        adds a len(row.ManifestJSON)==0 guard; every read query feeding it (GetManifest /
        ListManifests / FindByEntrypointChecksum) SELECTs manifest_json, so a genuinely
        published row never false-negatives. manifestJSONPresent returns true when Scylla
        is nil, so legacy/no-ledger deployments are unaffected. The blob-loss sibling
        (same principle, different mechanism) is closed in isInstallableForRef: a row can
        read PUBLISHED while its local CAS blob is gone (lost before the
        BROKEN_MISSING_BLOB transition, or a legacy artifact_state=="" row), so the
        install gate now also requires artifactBlobPresent — local POSIX CAS is the
        installability authority; mirror presence is not consulted.
      forbidden_fixes:
        - promote_to_published_without_confirming_manifest_json_present
        - report_row_installable_from_state_columns_without_manifest_json
        - make_state_writes_succeed_while_manifest_sync_is_best_effort
        - report_installable_when_local_cas_blob_is_missing
      id_note: same class as INC-2026-0012; these are the sibling sites the principle predicted
      protects:
        files:
            - golang/repository/repository_server/publish_workflow.go
            - golang/repository/repository_server/artifact_state.go
            - golang/repository/repository_server/artifact_handlers.go
      related_invariants:
        - repository.artifact_presence_requires_metadata_and_blob
        - meta.half_done_must_not_look_done
      related_services:
        - repository
      required_tests:
        - TestPromoteToPublished_RefusesSkeletonRow
        - repository:TestVA3_NonPublishedArtifact_NotInstallable
        - TestIsInstallableForRef_RequiresBlobPresent
    - id: repository.update_artifact_binary_soft_fails_immutability_rejection
      root_cause: |
        UpdateArtifactBinary (delta-deploy) wrote a new build of an already-published
        version, then on completePublish failure downgraded the error to slog.Warn and
        returned Status="verified" with no gRPC error — after already writing a
        divergent-digest VERIFIED manifest, Scylla row, and provenance. When the failure
        was the ledger's permanent immutability rejection (appendToLedger, repair=nil),
        it was reported identically to a transient "retry later" deferral, leaving a
        phantom the reconciler can never promote, with the caller misled into thinking
        the operation succeeded.
      architecture_fix: |
        Mirror UploadArtifact's gate up front: getPublishedDigest for the version — same
        digest is an idempotent no-op (return Status=published, no new build); a different
        digest returns codes.AlreadyExists before any bytes/manifest/provenance are
        written. The durable immutability invariant was always held by appendToLedger;
        this makes the rejection early, explicit, and phantom-free. To deploy new bytes,
        bump the version.
      forbidden_fixes:
        - report_verified_success_when_completePublish_rejected_for_immutability
        - store_divergent_digest_phantom_for_an_already_published_version
        - conflate_permanent_immutability_rejection_with_transient_deferral
      protects:
        files:
            - golang/repository/repository_server/artifact_handlers.go
      related_invariants:
        - repository.artifact.content_immutable_after_publish
        - meta.silence_is_not_valid_for_unexpected
      related_services:
        - repository
      required_tests:
        - TestUpdateArtifactBinary_RejectsSameVersionDifferentDigest
    - id: repository.law_gate_degrades_open_when_catalog_unavailable
      root_cause: |
        completePublish loads the published catalog for cross-artifact law validation
        (no-dep-on-application, acyclic hard_deps). On a Scylla read failure
        loadPublishedCatalog returns nil; the code logged a warning and proceeded with
        the cross-artifact rules silently skipped. For an artifact that declares hard_deps
        those rules are the entire gate, so a dependency cycle or a dep-on-application
        could reach PUBLISHED during the degraded window.
      architecture_fix: |
        When catalog==nil AND the manifest declares hard_deps, completePublish returns an
        error and refuses promotion rather than degrading the gate open. Artifacts with no
        hard_deps still proceed (the cross-artifact rules are moot for them), preserving
        availability where it is safe.
      forbidden_fixes:
        - promote_hard_deps_artifact_with_cross_artifact_validation_skipped
        - treat_nil_catalog_load_failure_as_empty_catalog
      protects:
        files:
            - golang/repository/repository_server/publish_workflow.go
      related_invariants:
        - meta.failure_response_must_contract_not_amplify
      related_intents:
        - repository.publish_pipeline_is_ordered
      related_services:
        - repository
      required_tests:
        - TestCompletePublish_RefusesHardDepsWhenCatalogUnavailable
    - id: gateway.cohosted_grpc_service_route_missing_returns_html
      root_cause: |
        xDS route generation (Globular internal/xds/watchers/watcher.go
        buildServiceResources) emits exactly one gateway route per REGISTERED
        etcd service Name. When a process co-hosts a second gRPC service on the
        same port without declaring it, xDS emits no route for that service's
        gRPC path. Native-gRPC / gateway requests to the undeclared service fall
        through to the HTTP catch-all and return HTTP 200 text/html, while the
        backend service is healthy on its direct port. Observed:
        behavioral_memory.BehavioralMemoryService is co-hosted on the ai_memory
        process (behavioral_handlers.go) but was not declared; memory_* worked
        through the gateway while behavioral_* returned text/html over the SAME
        endpoint/connection (signal
        signal.ai_memory.gateway_route_missing_for_cohosted_service.confirmed).
      architecture_fix: |
        Declare co-hosted services in registration metadata (HostedServices) and
        have xDS emit a prefix route per declared hosted name to the host
        service's cluster. ai_memory declares
        behavioral_memory.BehavioralMemoryService (services PR #45); the xDS
        builder generates the routes (Globular PR #2). Release-boundary repair:
        takes effect only after BOTH the ai_memory binary (re-registers with
        HostedServices) and the xDS/gateway binary (reads it, regenerates routes)
        are redeployed. Until then the gateway route is absent; direct-port access
        is unaffected and is diagnostic/degraded-mode evidence only.
      forbidden_fixes:
        - clients_must_not_permanently_bypass_gateway_for_cohosted_services
      protects:
        files:
            - golang/ai_memory/ai_memory_server/server.go
            - Globular/internal/xds/watchers/watcher.go
      related_invariants:
        - gateway.cohosted_grpc_services_must_be_declared
      related_services:
        - ai-memory
        - gateway
      required_tests:
        - xds_emits_routes_for_hosted_services
    - id: scylladb.group0_quorum_loss_invisible_to_watcher
      root_cause: |
        ai_watcher was event-name driven: it only reacted to named events someone
        chose to publish. A Scylla group0 (cluster-metadata Raft) quorum loss
        emits no such event — and because CQL stays readable when group0 is down,
        nothing crashed and no service.* event fired. The condition was found only
        by a manual infra_probe. The infra-probe scylladb runtime map exposes
        cql_ready / gossip_live / observed_peers but no first-class group0 voter
        count, so even an automated reader of the truth plane could not see quorum
        directly.
      architecture_fix: |
        PR-14 adds ai_watcher runtime vigilance probes: governed interval health
        checks that detect condition CLASSES, not named events. The scylla_group0
        probe sources the infra-probe truth plane (node-agent GetInfraProbe
        scylladb) and emits a DIAGNOSTIC_CLAIM finding into behavioral-memory when
        group0 quorum looks lost — inferred from an explicit group0/raft/quorum
        violation or from membership-majority math (trusted only at founding
        quorum >=3). The probe never queries Scylla directly (a competing source
        of truth) and never auto-promotes. The remaining gap — making the group0
        voter count first-class on the infra-probe truth plane so detection stops
        being proxy inference — is recorded as a candidate invariant on every
        finding and as behavioral-memory proposed principle
        principle.scylladb.group0_voter_quorum_must_hold (human-gated).
      forbidden_fixes:
        - watcher_queries_scylla_directly_or_auto_promotes_probe_finding
      protects:
        files:
            - golang/ai_watcher/ai_watcher_server/probes.go
            - golang/ai_watcher/ai_watcher_server/probe_scylla_group0.go
            - golang/node_agent/node_agent_server/infra_truth/scylla_probe.go
      related_invariants:
        - scylladb.group0_voter_quorum_must_hold
        - meta.authority_must_express_uncertainty
      related_services:
        - ai-watcher
        - scylladb
        - node-agent
      required_tests:
        - TestScyllaGroup0Probe_EmitsStructuredFindingOnQuorumLoss
