        controller bypassing the mesh, then a manual systemd
        restart of the target service.

        The root cause is the FAILED phase: once a ServiceRelease
        is FAILED, subsequent reconcile cycles need an explicit
        recovery path (re-PENDING) to re-drive the install. The
        drift-reconciler's child workflow returns SUCCEEDED
        trivially because it sees the release as terminal.
