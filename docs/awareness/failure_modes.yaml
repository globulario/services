    - id: etcd.nospace_alarm
      title: 'etcd NOSPACE alarm: database space exceeded — all writes rejected, control-plane cascade begins'
      severity: critical
      symptoms:
        - '''mvcc: database space exceeded'' appears in etcd logs'
        - etcd rejects all write RPCs with NOSPACE error
        - etcd leader begins losing heartbeat quorum
        - controller cannot renew leader lease
        - workflow dispatch times out or hangs
        - reconciler stalls — no desired-state changes applied
      root_cause: |
        etcd database grew beyond its configured quota (default 2 GiB). Common causes:
        excessive revision history accumulation, write storm from a reconcile loop, or
        compaction/defragmentation not running on schedule. Once the NOSPACE alarm fires,
        etcd rejects ALL writes — including leader heartbeats — causing leader loss and a
        cascading control-plane failure affecting controller, workflow, and reconciler.
      architecture_fix: |
        Fix order is strict — do not skip steps:
        1. etcdctl alarm list   → confirm NOSPACE is active
        2. REV=$(etcdctl endpoint status --write-out=json | jq -r '.[0].Status.header.revision')
           etcdctl compact $REV → compact revision history
        3. etcdctl defrag --endpoints=<all>  → release disk space
        4. Verify disk usage dropped below quota
        5. etcdctl alarm disarm   → ONLY after disk is below quota
        6. etcdctl endpoint health → confirm all members healthy
        7. etcdctl endpoint status --write-out=table → confirm stable leader
        8. Watch controller logs for "acquired leader lease"
        9. Watch workflow logs for successful dispatch
      forbidden_fixes:
        - etcd.disarm_before_compact
        - etcd.restart_nodes_without_nospace_fix
      related_invariants:
      related_services:
        - etcd
        - cluster_controller
        - workflow
      required_tests:
        - TestOfflineDiagnose_EtcdNOSPACE_MapsToEtcdFailureMode
        - TestOfflineDiagnose_EtcdNOSPACE_DoesNotMapToObjectstore
        - TestCausalChain_EtcdNOSPACE_ProducesControlPlaneCascade
    - id: etcd.leader_instability
      title: 'etcd leader instability: repeated leader loss caused by NOSPACE or disk I/O pressure'
      severity: critical
      symptoms:
        - '''lost leader'' in etcd logs'
        - '''elected leader'' appears repeatedly within short interval'
        - etcd leader_id changes in etcdctl endpoint status output
        - controller lease renewal fails during leader instability window
        - no controller holds authoritative lease — reconciler stalls
      root_cause: |
        etcd leader cannot commit entries or send heartbeats when the NOSPACE alarm is
        active (writes rejected) or when disk I/O latency exceeds the election timeout.
        Repeated leader elections cascade: the controller cannot renew its etcd lease,
        the lease expires, all controllers enter re-election, and no controller is
        authoritative for the duration. Workflow dispatch RPCs time out.
      architecture_fix: |
        1. Resolve the upstream cause first (NOSPACE alarm or disk I/O pressure)
        2. etcdctl endpoint status --write-out=table → watch leader_id until stable
        3. Wait for no "lost leader" / "elected leader" messages for ≥60s
        4. Only then look at controller/workflow — do not restart them during instability
      forbidden_fixes:
        - etcd.restart_nodes_without_nospace_fix
        - controller.restart_before_etcd_stable
      related_invariants:
      related_services:
        - etcd
        - cluster_controller
      required_tests:
        - TestOfflineDiagnose_EtcdLeaderLoss_MapsToEtcdLeaderInstability
        - TestCausalChain_LeaderLoss_After_NOSPACE
    - id: controller.lease_expired_due_to_etcd_instability
      title: controller leader lease expired because etcd cannot commit writes during NOSPACE or leader instability
      severity: high
      symptoms:
        - '''lease expired, attempting re-election'' in controller logs'
        - no controller holds the leader lease — all controllers in re-election loop
        - reconciler produces no changes to desired state
        - workflow steps are not dispatched
        - etcd shows concurrent write attempts from multiple controller instances
      root_cause: |
        The cluster controller renews its leader lease by writing to etcd. When etcd
        cannot commit writes (NOSPACE alarm) or has no stable leader, lease renewal fails.
        All controller instances detect lease expiry and attempt re-election simultaneously,
        flooding etcd with new lease write attempts — which also fail if NOSPACE is still
        active. The result is a re-election storm that continues until etcd is healthy.
      architecture_fix: |
        1. Verify etcd is healthy first: etcdctl alarm list (must be empty), etcdctl endpoint health (all healthy)
        2. Watch controller logs for "acquired leader lease" — do not intervene before this
        3. Do NOT restart controller processes before etcd is stable — restarts add more lease write load
        4. If lease not acquired within 5 min after etcd stabilises, check for split-brain (two leaders)
      forbidden_fixes:
        - controller.restart_before_etcd_stable
        - controller.kill_to_clear_lease_contention
      related_invariants:
      related_services:
        - cluster_controller
        - etcd
      required_tests:
        - TestOfflineDiagnose_ControllerLeaseExpired_MapsToCorrectFailureMode
        - TestSuggestIncident_ControlPlaneCascade_EtcdFirst
    - id: workflow.dispatch_timeout_due_to_control_plane_instability
      title: workflow dispatch timeout — terminal symptom of upstream etcd or controller instability, not the root cause
      severity: high
      symptoms:
        - '''context deadline exceeded dispatching workflow step'''
        - '''workflow stuck at CONVERGING'''
        - workflow runs remain in ACTIVE/CONVERGING state indefinitely
        - no new workflow steps dispatched
        - globular workflow list-runs shows blocked workflows piling up
      root_cause: |
        The workflow service dispatches steps by writing to etcd and coordinating with the
        cluster controller. When etcd rejects writes (NOSPACE) or no controller holds the
        leader lease, dispatch RPCs time out. This failure is always a symptom — the root
        cause is upstream in etcd or the controller.
        WARNING: Do not fix workflow before fixing etcd and controller.
      architecture_fix: |
        Fix order is strict:
        1. Confirm etcd NOSPACE is cleared (alarm list empty, endpoint health all healthy)
        2. Confirm controller has acquired leader lease (watch controller logs)
        3. Workflow dispatch typically recovers automatically within 30-60s after controller stabilises
        4. If workflows remain CONVERGING >5min post-stabilisation:
           globular workflow list-runs --status blocked
           → manually re-trigger or advance blocked workflows
        NEVER restart workflow service before etcd and controller are stable.
      forbidden_fixes:
        - workflow.restart_before_control_plane_stable
        - workflow.treat_as_root_cause
      related_invariants:
      related_services:
        - workflow
        - cluster_controller
        - etcd
      required_tests:
        - TestOfflineDiagnose_WorkflowTimeout_MapsToControlPlaneInstability
        - TestSuggestIncident_FixOrder_EtcdBeforeWorkflow
    - id: failure_mode.inc_2026_0002
      title: MCP service orphaned processes hold port 10260, blocking WaitActive and install convergence
      severity: HIGH
      deprecated: true
      deprecated_reason: "Incident-named placeholder. The same root cause and symptoms are captured by mcp.orphan_port_hold (proper-named, with the same architecture fix and forbidden_fixes). Keep this id only as a redirect so historical incidents that reference it still resolve."
      replacement: mcp.orphan_port_hold
      symptoms:
        - globular-mcp.service stays in 'activating (start)' indefinitely, never reaching 'active (running)'
        - systemd kills mcp_server after TimeoutStartSec (90s) with 'start operation timed out'
        - 'New mcp_server instances fail to bind port 10260: ''address already in use'''
        - Orphaned mcp_server processes survive systemd kills and hold port 10260
        - node-agent WaitActive(30s) times out after install — marks install FAILED, installed state stays at old version
        - 'node reports: day1_phase_reason = workloads not ready: mcp'
        - 'Drift: desired=1.2.15, installed=1.2.14 persists despite artifact being downloaded and pinned'
        - 'Manual intervention required: sudo killall -9 mcp_server'
      root_cause: |
        mcp_server declared Type=notify in its systemd unit but never called sd_notify("READY=1")
        after binding the HTTP listener. systemd therefore held the service in 'activating' state
        indefinitely and killed it after TimeoutStartSec (90s). With Restart=always/RestartSec=2,
        a new instance started before the previous one fully released port 10260, accumulating
        orphaned mcp_server processes (PPid=1, escaped cgroup) that each held the port.
        node-agent's supervisor.WaitActive(30s) timed out waiting for 'active' state after
        install, so installed-state in etcd was never updated — producing persistent version drift
        even though the binary on disk was already replaced.
      architecture_fix: |
        Fix 1 (applied): Add sdNotifyReady(ctx) in serveHTTP() immediately after net.Listen
        succeeds. Sends READY=1 to systemd via NOTIFY_SOCKET, then sends WATCHDOG=1 every 30s
        (half of WatchdogSec=60). Also sends STOPPING=1 on ctx cancellation. File changed:
        golang/mcp/transport_http.go. Deployed as mcp@1.2.15.

        Fix 2 (recommended): Add ExecStartPre=+/bin/sh -c 'pkill -9 -x mcp_server || true'
        to the globular-mcp.service unit as defence-in-depth against orphaned processes from
        any future restart race, regardless of sd_notify status. MUST use -x (process-name
        match), never -f — -f matches the parent shell's argv and self-SIGKILLs.
      related_services:
        - mcp
        - node_agent
      required_tests:
        - TestMCPSdNotifySentAfterBind
        - TestMCPServiceReachesActiveAfterRestart
        - TestWaitActiveSucceedsWithNewBinary

    - id: minio.version_drift_auth_failure
      title: MinIO binary version differs across nodes causing auth failures
      severity: critical
      symptoms:
        - MinIO requests fail with auth/signature errors on specific nodes only
        - globular-minio.service active but ListBuckets returns 403 from affected node
        - node heartbeat shows installed=1.x.y but process fingerprint matches older binary
        - version drift persists across restarts because old binary survives in PATH
      root_cause: |
        A typo in the heartbeat phase-2 loop caused a node's installed MinIO version to go
        undetected. The old binary was left on disk while etcd recorded the new version.
        When requests were routed to the node with the old binary, MinIO's HMAC signature
        verification failed against credentials issued for the new version. The mismatch was
        invisible to the controller because heartbeat reported the etcd version, not the
        on-disk binary fingerprint.
      architecture_fix: |
        Process fingerprinting: compute and cache a SHA-256 checksum of the binary at startup.
        Heartbeat phase-2 compares the running checksum against the etcd artifact checksum
        (entrypoint_checksum field). On mismatch, node transitions to NEEDS_REPAIR and triggers
        a re-download rather than silently reporting the wrong version.
      related_invariants:
      related_services:
        - minio
        - node_agent
      required_tests:
        - TestHeartbeatDetectsChecksumMismatch
        - TestMinIOVersionDriftTriggersRepair

    - id: node_agent.state_poisoning_from_stale_reconciler
      title: Node installs wrong version from stale reconciler after leader failover
      severity: critical
      symptoms:
        - node installs version 0.0.1 or placeholder immediately after leader re-election
        - etcd desired state shows current version but installed state regresses
        - controller log shows new leader running reconciler against stale desired state snapshot
        - downgrade guard fires but is overridden by force-install path
      root_cause: |
        After a leader failover, the new controller leader started its reconciler against an
        in-memory desired state snapshot from the previous leader's session. The snapshot
        contained a placeholder (0.0.1) for a package that had not yet been assigned a real
        version. The reconciler installed the placeholder version, poisoning the node's installed
        state. The downgrade guard was bypassed because the old leader's state was not fully
        written to etcd before failover.
      architecture_fix: |
        Reconciler must load desired state exclusively from etcd at startup after acquiring
        leadership — never from an in-memory snapshot from a prior leader session.
        Unconditional downgrade guard: if desired version < installed version AND Force=false,
        skip the install regardless of source. Only Force=true (explicit operator command) permits
        downgrade. No automatic rollback ever.
      related_invariants:
      forbidden_fixes:
        - auto_rollback_on_crash
        - reconcile_from_in_memory_snapshot_after_failover
      related_services:
        - node_agent
        - controller
      required_tests:
        - TestReconcilerNoDowngradeWithoutForce
        - TestReconcilerLoadsDesiredStateFromEtcdOnLeaderElection

    - id: xds.infra_preparing_loop_from_kind_mismatch
      title: xds or gateway stuck in infra_preparing due to package kind classification conflict
      severity: high
      symptoms:
        - xds or gateway DesiredService shows phase=infra_preparing indefinitely
        - reconciler repeatedly re-attempts xds/gateway install with no progress
        - install workflow completes SUCCEEDED but convergence never happens
        - package kind in spec differs from package.json or catalog classification
        - controller log shows "kind=service" but reconciler routes it as "kind=infrastructure"
      root_cause: |
        Package kind classification (infrastructure vs service) was duplicated across spec YAML,
        package.json, and the catalog. When these disagreed, the reconciler applied the wrong
        convergence logic: service-kind packages use a different readiness gate than
        infrastructure-kind. xds and gateway are infrastructure but were classified as service in
        one of the three sources, causing the readiness gate to never fire.
      architecture_fix: |
        Package kind must come from ONE canonical registry (package.json metadata). The spec YAML
        and catalog must derive from this source, never independently classify. Add validation at
        build time that asserts spec.kind == package.json.kind. Any disagreement is a build error,
        not a runtime silent mismatch.
      related_invariants:
      forbidden_fixes:
        - hardcode_kind_list_in_reconciler
        - infer_kind_from_service_name
      related_services:
        - xds
        - repository
        - node_agent
      required_tests:
        - TestPackageKindFromCanonicalRegistry
        - TestXDSConvergesAfterKindMismatchFixed

    - id: ops_knowledge.seed_drift_post_install
      title: An AI Memory entry with provenance.source=seed has content that no longer matches the awareness bundle's manifest hash
      severity: warning
      symptoms:
        - "doctor finding ops_knowledge.seed_drift fires for one or more entry ids"
        - "globular ops-knowledge verify reports drift between disk YAML and ai-memory rows"
        - "AI sessions get inconsistent operational guidance from the seed (rare; usually noticed via doctor first)"
      root_cause: |
        Either:
        1. A privileged caller bypassed the seeder principal and wrote a seed-tagged entry directly
           (immutability layer broken or RBAC misconfigured), OR
        2. The on-disk YAML at /var/lib/globular/operational-knowledge/ was modified post-install
           without re-running the bundle install path (manual edit), OR
        3. ScyllaDB row corruption (very rare; would also affect non-seed memories).
      architecture_fix: |
        Treat ai-memory as the canonical store and the bundle as the authoritative source. On
        drift, trust the bundle: re-run the seeder workflow which upserts back to the bundle's
        sha256. Investigate WHY the drift happened — usually a misconfigured CLI tool or a
        bypassed RBAC check. ai-memory's immutability layer should be tested every release.
      forbidden_fixes:
        - allow_human_to_overwrite_seed_to_silence_finding
        - increase_drift_threshold_to_hide_low_severity_drift
      related_invariants:
        - ops_knowledge.seed_integrity
      related_services:
        - ai-memory
        - cluster-doctor
        - awareness
      required_tests:
        - TestDoctorDetectsSeedDriftWithinOneCycle
        - TestSeederUpsertHealsDrift

    - id: ops_knowledge.unauthorized_seed_mutation
      title: A non-seeder principal attempted (and was allowed) to UPDATE or DELETE an AI Memory entry tagged provenance.source=seed
      severity: critical
      symptoms:
        - "audit log shows memory_update / memory_delete on a seed entry from a principal other than 'seeder'"
        - "ai-memory write succeeded but the value diverges from the bundle manifest"
      root_cause: |
        The immutability check in ai-memory's Update/Delete handlers either was not implemented,
        was bypassed by a debug/admin path, or the RBAC policy granted seed-write to too broad
        a role (e.g., 'admin' instead of just 'seeder').

        Critical because operational knowledge is the AI's source of truth for incident response.
        A poisoned seed entry could cause future AI sessions to recommend wrong remediations.
      architecture_fix: |
        Reject all writes to entries with metadata.source = "seed" unless principal is exactly
        "seeder". Log all such attempts at WARN level with principal id + entry id. Doctor
        emits ops_knowledge.unauthorized_seed_mutation finding with severity=critical until
        the next clean seeder run heals the entry.
      forbidden_fixes:
        - widen_seeder_role_to_admin
        - silently_swallow_permission_denied_in_audit_log
        - skip_immutability_check_for_test_environments     # tests should set up a 'seeder' service-account, not bypass
      related_invariants:
        - ops_knowledge.seed_integrity
      related_services:
        - ai-memory
        - rbac
      required_tests:
        - TestAdminPrincipalCannotMutateSeed
        - TestSeederPrincipalCanUpsertSeed
        - TestUnauthorizedAttemptIsLoggedAndRejected

    - id: ops_knowledge.seeder_workflow_skipped
      title: AI Memory has zero seed-source entries even though the awareness bundle is installed and verified
      severity: warning
      symptoms:
        - "globular memory query --tags seed returns empty"
        - "doctor finding ops_knowledge.seed_missing fires"
        - "fresh AI sessions have no operational baseline (Claude asks the same questions every session)"
      root_cause: |
        The day-1 seeder workflow either never ran or failed silently. Causes:
        - ai-memory was unhealthy when the seeder workflow was scheduled and the workflow
          gave up without retry
        - the workflow was disabled or removed
        - a release upgrade introduced new seed entries but the seeder didn't detect bundle
          version change and skipped the upsert
      architecture_fix: |
        Seeder runs as a proper Workflow Service workflow with idempotent semantics, bounded
        retry, and a terminal state (SUCCEEDED/FAILED). On every controller startup, check if
        the bundle's seed_version differs from what's in ai-memory's metadata; if so, schedule
        the seeder. Log success at INFO with entries-upserted count.
      forbidden_fixes:
        - run_seeder_inline_in_controller_startup_without_workflow_service
        - skip_seeder_silently_if_ai_memory_unhealthy   # must surface as a finding instead
      related_invariants:
        - ops_knowledge.seed_integrity
      related_services:
        - workflow
        - ai-memory
        - cluster-controller
      required_tests:
        - TestSeederSchedulesOnBundleVersionChange
        - TestSeederRetriesOnTransientAIMemoryFailure
        - TestSeederTerminatesAfterMaxAttempts

    - id: vip_contamination.node_routable_ip_returns_vip
      title: Single-IP node identity reads cause VIP-contamination misclassification across multiple subsystems
      severity: critical
      symptoms:
        - "an etcd member is wrongly evicted as 'stale' immediately after keepalived enable"
        - "DNS per-node A records contain both the real IP and the VIP for every per-node FQDN"
        - "MinIO publish filter excludes the VIP-holder from ObjectStoreDesiredState.Nodes (chicken-and-egg with MinioJoinPhase=non_member)"
        - "publishGateway / publishController DNS records mix the VIP among gateway/controller node IPs"
        - "cluster-doctor objectstore.write_quorum_lost CRITICAL active_drives=0 even when MinIO is healthy on every storage node (live mc admin info shows 3/3 drives Ok)"
        - "cluster-doctor objectstore.minio.unapproved_path CRITICAL on every admitted disk after a topology apply that previously succeeded"
        - "cluster-doctor objectstore.minio.active_on_non_member silently misses real violations (false-NEGATIVE — rule continues on empty IP rather than firing)"
      root_cause: |
        Two distinct failure mechanisms in the same class — both stem from reducing a multi-IP
        node identity to a single IP for comparison against a curated stable IP list.

        Mechanism A — first-IP-is-VIP:
        node.Identity.Ips lists ALL the node's IPs. For the keepalived MASTER, the floating
        VIP appears (typically as the first or among the first entries). Helpers that pick a
        single representative IP — node.PrimaryIP(), node.Identity.Ips[0], nodeRoutableIP() —
        return the VIP whenever the node holds it. Comparing that VIP against a stable-IP
        pool list never matches.

        Mechanism B — AdvertiseIp-is-empty:
        NodeIdentity has a separate single-string field `AdvertiseIp` distinct from the
        repeated `Ips` list. The controller does not currently populate AdvertiseIp (verified
        live 2026-05-10 — empty on every node in a 5-node cluster). Consumers that compare
        `n.GetIdentity().GetAdvertiseIp() == ip` get `"" == "10.0.0.x"` → false, which
        either produces a false-positive ("node not in pool" → write_quorum_lost,
        unapproved_path) OR a silent false-negative ("can't determine IP, skip" — real
        violations missed in active_on_non_member).

        Anything downstream that COMPARES that single representative IP against a curated,
        stable IP list (etcd peer URLs, MinIO pool nodes, controller pool nodes, DNS
        records, admitted disks, doctor invariants) fails to match — and treats the node as
        unknown / stale / non-member / down.
      architecture_fix: |
        Three patterns work:
        1. node.StableIP(clusterVIP) — explicitly excludes the cluster VIP. Use when picking
           a single representative IP for publication / addressing.
        2. nodeAny<X>(node, list) helpers — match against ANY of node.Identity.Ips. Use when
           CHECKING membership in a stable list.
        3. nodeIDByPoolIP(snap.Nodes, poolIPs) — bulk-build a poolIP→nodeID map by iterating
           every node's full Identity.Ips list. Use when a rule needs to resolve multiple
           pool IPs to nodeIDs in one pass.

        Fixes landed:
        - a4ea9ef1: etcd memberNode/dns/gateway paths via StableIP
        - ead2bb94 (1.2.28): MinIO pool admission via nodeAnyIPInPool in minio_pools.go
        - <next commit>: cluster-doctor's 5 sites (write_quorum_lost, format_heal_deadlock,
          duplicate_physical_path, active_on_non_member, poolEndpoints) via
          nodeIDByPoolIP / nodeHasIP helpers in node_ip_matching.go
      forbidden_fixes:
        - hardcode_node_to_pool_mapping_to_avoid_filter
        - filter_out_vip_in_node_identity_ips             # the node legitimately HAS that IP; filter at the consumer instead
        - special_case_keepalived_master_as_an_exception
        - read_advertise_ip_without_falling_through_to_ips_list   # AdvertiseIp is empty in production; a fallback-less read is broken by definition
      related_invariants:
        - objectstore.topology_contract
        - etcd.endpoint_reachability
      related_services:
        - cluster-controller
        - cluster-doctor
        - keepalived
        - dns
        - ai-memory
      required_tests:
        - TestMinioJoin_VIPHolder_MatchesByAnyIP
        - TestEtcdMemberMatchAcceptsAnyOfNodeIps
        - TestDNSReconcilerExcludesVIPFromPerNodeARecords
        - TestPublishGatewayUsesStableIP
        - TestNodeIDByPoolIP_MatchesByAnyIP
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestWriteQuorumLost_VIPHolder_RealDowntimeStillFires

    - id: cluster_controller.objectstore_apply_watcher_dies_silently
      title: objectstore-apply-watcher exits its goroutine when etcd watch returns 'mvcc compacted'; not re-established
      severity: critical
      symptoms:
        - "globular objectstore topology apply times out with 'timeout waiting for controller to process apply request'"
        - "/globular/objectstore/topology/apply_request key exists in etcd but apply_result is empty"
        - "controller log shows 'objectstore-apply-watcher: watch error: etcdserver: mvcc: required revision has been compacted' some time before the apply was attempted"
        - "no 'objectstore-apply: processing request' log lines for hours after the watcher's last error"
      root_cause: |
        startObjectStoreApplyWatcher's loop handles ev.Err() with `continue`, then keeps
        ranging over the same etcd Watch channel. Once etcd emits 'mvcc compacted', the
        channel closes; the next select returns ok=false and the goroutine `return`s.
        safeGo doesn't re-spawn it.

        Because the drain on startup is the only other ingestion path, and drain only runs
        for the leader, the only operational recovery is: restart all controllers in sequence
        so a freshly-started controller wins the next election and drains the queued request.
      architecture_fix: |
        On any watch error or channel-closed event, sleep with bounded backoff and re-establish
        the Watch from the latest revision (Watch with WithRev(currentRev+1) after re-reading
        the key). Log at WARN. The same pattern likely exists in other Watch-based goroutines
        in the controller — audit and fix together.

        Until fixed in code, the recovery runbook is:
        docs/operational-knowledge/runbooks/recover-stuck-topology-apply.yaml
      forbidden_fixes:
        - swallow_compacted_error_silently
        - skip_apply_request_processing_when_watch_died        # this is the current bug
        - require_human_to_restart_controller_for_every_apply  # only acceptable as a temporary workaround
      related_invariants:
        - objectstore.topology_contract
        - convergence.no_infinite_retry
      related_services:
        - cluster-controller
        - etcd
      required_tests:
        - TestApplyWatcherRecoversFromCompactedRevision
        - TestApplyWatcherReestablishesWithLatestRev
        - TestDrainOnStartupCatchesQueuedRequest

    - id: bootstrap.flag_persists_post_day_1
      title: /var/lib/globular/bootstrap.enabled flag found on a node after day-1 join completed — security regression
      severity: critical
      symptoms:
        - "ls /var/lib/globular/bootstrap.enabled returns a file on a post-day-1 cluster"
        - "loopback-only RPCs continue to bypass auth"
        - "doctor finding bootstrap.flag_persists_post_day_1 fires"
      root_cause: |
        Bootstrap mode is gated by a flag file with a 30-min TTL. The day-1 join flow is
        responsible for removing the flag once the cluster reaches founding quorum. If the
        join completed but the flag wasn't cleaned up, the cluster is in a permanent
        bootstrap-mode state — any localhost connection can perform unauthenticated mutations.

        Causes observed:
        - Crash in the day-1 finalize step before the cleanup ran
        - Manual operator intervention that re-created the flag without intent
        - Bug in the founding-quorum classifier that left day-1 in a partial state
      architecture_fix: |
        Day-1 finalize MUST atomically clear the bootstrap flag as the LAST step (after
        founding quorum verified, after sa password changed, after CA rotated). On controller
        startup, if day1_phase == ready AND bootstrap.enabled present, controller logs a
        critical warning, refuses to accept loopback RPCs, and emits the doctor finding.
      forbidden_fixes:
        - silently_remove_flag_on_doctor_finding
        - widen_bootstrap_ttl_to_avoid_re_creation
      related_invariants:
        - founding.quorum.three_nodes_required
      related_services:
        - cluster-controller
        - node-agent
      required_tests:
        - TestDay1FinalizeClearsBootstrapFlag
        - TestControllerRefusesLoopbackWhenFlagPersistsPostDay1

    - id: service.endpoint.os_getenv_for_addresses
      title: A service uses os.Getenv() to resolve a cluster address — bypasses etcd source-of-truth
      severity: critical
      symptoms:
        - "service config code contains os.Getenv(\"...ENDPOINT...\") or similar"
        - "service ignores etcd config when an env var is set"
        - "behaviour differs across nodes due to local env var differences"
      root_cause: |
        A developer added an env-var fallback for "easier local testing" or to "avoid the
        etcd dependency at startup". This violates the etcd-is-sole-source-of-truth rule:
        env-var-driven config is per-node mutable, untracked, and breaks reproducibility.

        Symptom that triggers detection: two nodes with identical Globular config behave
        differently because one has an env var set.
      architecture_fix: |
        Remove the os.Getenv() call. Resolve from etcd via config.GetServiceConfigurationById
        or similar. If etcd is unreachable, ERROR — do not fall back to defaults.

        For local dev environments: use a local etcd seed via the same code path as production.
      forbidden_fixes:
        - keep_env_var_as_fallback_for_dev_only
        - silently_prefer_env_var_when_set
        - widen_to_other_env_vars_to_be_consistent
      related_invariants:
        - service.endpoint.etcd_address_reachability
        - etcd.endpoint_reachability
      related_services:
        - "*"  # any service that resolves cluster addresses
      required_tests:
        - TestServiceConfigSourceIsAlwaysEtcd
        - TestNoOsGetenvInServiceServerCode

    - id: awareness.degraded_source_sentinel_collapsed_to_critical
      title: Awareness source-availability sentinel is collapsed into a critical-severity missing-evidence finding
      severity: critical
      symptoms:
        - "graph_integrity_check reports REQUIRED_TEST_MISSING (severity: critical) for tests that demonstrably exist in source"
        - "coverage_report shows graph_coverage.status = critical with 0 eligible / 0 indexed Go files on a production MCP host"
        - "health_pulse alerts 'N implemented gap(s) have missing tests' when verifyGapTests was actually returning unverified"
        - "operator restarts MCP and finds awareness tools returning empty or degraded results despite the awareness graph being loaded in Oxigraph"
        - "every awareness query from a production MCP host trips at least one critical alert about coverage or missing tests"
      root_cause: |
        Several awareness subsystems ask the same question — "is a real
        source tree available to scan from this process?" — and each
        invents its own degraded answer instead of using a typed primitive:

          • awarGitRoot returns os.Getwd() on git rev-parse failure
            (so the install dir gets scanned as if it were a repo).
          • verifyGapTests returns the string "unverified" when repoRoot
            is empty; the health_pulse consumer's switch collapses
            everything-not-classified into tests_not_found.
          • GoFileCoverage returns EligibleGoFilesTotal=0 with
            ConfidenceImpact=unknown when repoRoot is empty; the
            coverage_report consumer ignores ConfidenceImpact and uses
            the percent directly, so 0% < 70% → critical.
          • dbPath resolution prefers the bundle path if present and
            falls back to a legacy writable path otherwise; there is
            no symmetric handling for "bundle present but couldn't be
            opened cleanly," and the legacy fallback is a stale 1.4 MB
            shadow with ~300 nodes.

        Each layer's unit tests run inside a git checkout where the
        degraded path is never reached, so the conflation is invisible
        until composed on a production host. The result an operator
        sees is a wall of critical-severity alerts about graph
        coverage and missing tests, all of which are pure telemetry
        false positives. The system that's supposed to know its own
        knowledge gaps is loudly lying about them.
      architecture_fix: |
        1. Introduce golang/awareness/sourceroot with a typed Result
           returning Found(path) | Absent | Inaccessible(err) |
           WrongContext(path, reason). No string sentinels. No silent
           cwd fallback.
        2. Migrate awarGitRoot to delegate to sourceroot.Resolve.
        3. Each consumer switches on the typed state. Non-Found states
           are telemetry-unavailable signals at info severity.
        4. coverage_report adds a dedicated "unverified" status (was:
           collapsed into "critical"). health_pulse already separated
           "unverified" from "tests_not_found" in commit 1acd3fbb;
           that fix is referenced here as the precedent.
        5. Forbidden-fix entry
           collapse_source_absent_into_critical_missing_evidence
           prevents future PRs from re-introducing the conflation.
      forbidden_fixes:
        - collapse_source_absent_into_critical_missing_evidence
        - fall_back_to_cwd_when_git_root_unknown
        - count_unverified_as_tests_not_found
      related_invariants:
        - awareness.source_scan_requires_verified_repo_root
        - awareness.no_match_is_not_safe
      related_services:
        - mcp
        - awareness
      required_tests:
        - TestSourceRoot_NotInGitRepoReturnsAbsent
        - TestSourceRoot_ExplicitPathInvalidReturnsInaccessible
        - TestAwarGitRoot_NotInRepoReturnsEmpty
        - TestVerifyGapTests_EmptyRepoRootReturnsUnverified
        - TestCoverageReport_NoRepoRootIsUnverifiedNotCritical
    - id: repository.desired_build_id_orphaned
      title: package fetch returns NotFound for build_id referenced by desired state
      severity: critical
      symptoms:
        - 'node-agent log: "build_id ... could not be resolved (repository unreachable)"'
        - 'controller log: install workflows stuck in FAILED_TRANSIENT looping on the same build_id'
        - 'doctor finding: repository.desired_build_ids_resolve fails for one or more services'
        - install-storm against the repository (NotFound on every retry) without convergence
        - DesiredService rows pin build_id=X, repository.ListArtifacts shows no entry for build_id=X
        - new nodes hitting cold start cannot reach Applied — Layer 3 stays empty forever
      root_cause: |
        Repository metadata / Scylla index rows for a build_id were deleted while
        desired state (ServiceDesiredVersion, InfrastructureRelease, ServiceRelease,
        DesiredService) still pinned the immutable build_id. Once the index loses
        the entry, ResolveArtifact returns NotFound, the fallback paths (POSIX CAS,
        GitHub mirror, MinIO mirror) demand a sha256 they cannot synthesize without
        the manifest, and the install-storm begins. The original incident was
        triggered by a node-removal workflow ("N etcd keys cleaned, M releases
        purged") that cascaded into a repository purge with no reference-safety
        check against desired state.
      architecture_fix: |
        1. collectDesiredBuildIDs in golang/repository/repository_server/reachability_guard.go
           must scan ALL four desired-state etcd prefixes:
             /globular/resources/ServiceDesiredVersion/
             /globular/resources/InfrastructureRelease/
             /globular/resources/DesiredService/
             /globular/resources/ServiceRelease/
           and accept BOTH Spec.BuildID and Status.ResolvedBuildID.
        2. checkDeletionSafety + checkRevokeSafety must consult both installed AND
           desired build_id sets; block deletion with a stable PurgeBlockedReason
           code (RepositoryPurgeBlockedReferencedBuild_desired) and an audit event.
        3. resolveByBuildID must distinguish three outcomes — success, NotFound
           (manifest absent), and DesiredBuildIdOrphaned/FailedPrecondition
           (manifest exists but demoted). Conflating the last two is what produced
           the install-storm.
        4. node-agent fallback path must check the error sentinel: ErrBuildIDOrphaned
           and ErrBuildIDNotFound BOTH forbid local-pinned-tarball fallback
           (CannotFallbackWithoutManifestOrChecksum); only ErrRepositoryUnreachable
           permits it.
        5. Doctor invariant repository.desired_build_ids_resolve fires whenever an
           active desired build_id is not represented by any node's installed
           build_id set — surfaces the orphan before the install-storm kicks in.
      forbidden_fixes:
        - change_desired_version_or_build_id_by_hand_to_clear_error
        - disable_require_checksum_to_allow_unverifiable_fallback
        - manually_copy_package_blobs_without_index_repair
        - restart_node_agent_repeatedly_hoping_repository_recovers
        - delete_desired_build_id_to_silence_install_storm
        - relax_require_checksum_when_mirror_lookup_lacks_sha256
      related_invariants:
        - repository.purge_must_not_delete_active_desired_builds
        - repository.desired_build_id_must_resolve
        - repository.fallback_requires_manifest_and_checksum
      related_services:
        - repository
        - cluster-controller
        - node-agent
        - cluster-doctor
      required_tests:
        - TestDeletionSafety_DesiredBuildID_IsBlocked
        - TestRevokeSafety_DesiredBuildID_IsBlocked
        - TestCollectDesiredBuildIDs_ScansAllFourPrefixes
        - TestResolveByBuildIDOrphaned_ReturnsFailedPrecondition
        - TestInstallerRefusesLocalFallbackOnOrphaned
        - TestDoctorRule_RepositoryDesiredBuildIDsResolve
    - id: dns.desired_ghost_records
      title: DNS records point to nodes where service is planned, inactive, or not installed
      severity: high
      symptoms:
        - gateway.<domain>, api.<domain>, *.<domain>, dns.<domain> resolve to IPs whose owning node has the service "planned" or "inactive"
        - client gRPC dials oscillate between success and TCP refused as the TTL flips between healthy and dead candidates
        - _cluster-controller._tcp.<domain> SRV record contains nodes whose globular-cluster-controller.service is inactive or missing
        - DNS reconciler log shows record-write loops without any "WITHDREW" lines despite stuck installs
        - new node added to cluster appears in DNS records before its packages are installed
      root_cause: |
        The DNS reconciler in golang/cluster_controller/cluster_controller_server/dns_state.go
        computed candidates from Profile (Layer 2 / Desired) alone — `node.HasProfile("gateway")`,
        `node.HasProfile("control-plane")`, etc. It did NOT consult per-node
        InstalledVersions (Layer 3) or systemd unit state (Layer 4) before
        emitting A / SRV records. As a result, a node that was planned to run
        gateway but hadn't completed installation, or whose gateway unit had
        gone inactive, still appeared in gateway.<domain>. Clients then
        load-balanced into a dead endpoint for each TTL.
      architecture_fix: |
        1. NodeInfo carries explicit readiness inputs: InstalledServices map
           (Layer 3) and RuntimeHealthy map (Layer 4), plus Draining/Quarantined
           lifecycle flags.
        2. ComputeDesiredStateWithFunnels applies a gateForService funnel for
           every record group that promises a service:
              Desired (profile) → Installed → Runtime healthy → Published
           A record is emitted ONLY when all three layers agree.
        3. Per-node A/AAAA records (which describe the NODE, not a service) are
           withdrawn when Draining/Quarantined.
        4. The reconciler logs structured WITHDREW lines per record group so
           operators can see the funnel and reason about ghost-record withdrawal.
        5. Doctor invariant dns.records_match_runtime_health fires when any node
           with a record-bearing profile has the corresponding service planned
           but not installed, or installed but runtime-unhealthy — surfaces a
           reconciler bug or an unpatched DNS server before clients notice.
      forbidden_fixes:
        - lower_dns_ttl_so_bad_resolutions_expire_faster
        - restart_dns_only_to_force_record_refresh
        - hardcode_known_good_nodes_in_dns_config
        - remove_profile_from_node_to_hide_record
        - publish_dns_from_desired_or_profile_state
        - rely_on_dns_to_recover_dns
      related_invariants:
        - dns.records_must_be_installed_and_runtime_healthy
        - dns.wildcard_must_not_include_unhealthy_nodes
      related_services:
        - cluster-controller
        - dns
        - gateway
        - cluster-doctor
      required_tests:
        - TestComputeDesiredState_PlannedNotInstalled_NoRecord
        - TestComputeDesiredState_InstalledNotHealthy_NoRecord
        - TestComputeDesiredState_HealthyNode_PublishesRecord
        - TestComputeDesiredState_DrainingNode_WithdrawsRecords
        - TestComputeDesiredState_WildcardExcludesUnhealthy
        - TestComputeDesiredState_ControllerSRVOnlyHealthy
        - TestDoctorRule_DNSRecordsMatchRuntimeHealth

    # ── Globular incident: objectstore partial snapshot ────────────────────────

    - id: fm.globular.objectstore_partial_snapshot
      title: Partial objectstore snapshot classifies absent nodes as known-down, firing false quorum-loss findings
      severity: critical
      # origin: { type: globular_incident, confidence: very_high }
      symptoms:
        - cluster-doctor fires objectstore.write_quorum_lost with active_drives=0 even though all MinIO nodes are running
        - objectstore.minio.fingerprint_divergence fires for nodes that have actually rendered the correct topology
        - Doctor report shows quorum loss immediately after a partial etcd read error
        - Evidence shows data_incomplete=true alongside all pool nodes in the no_inventory bucket
        - Restarting the cluster doctor makes the CRITICAL finding disappear without any MinIO change
      root_cause: |
        The snapshot collector could not reach one or more nodes — either a transient RPC error,
        a pod restart, or a slow response that exceeded the collection window. The affected nodes'
        inventory records are absent from the snapshot. Old code classified absent NodeRecord
        entries as "known down" rather than "unknown", causing every pool node without an
        inventory record to count against the write-quorum threshold. With all five pool nodes
        absent (e.g., after a full collector failure), active_drives=0 < write_quorum=4 → CRITICAL.

        The fix is captured in objectstore_physical_overlap.go (objectstore.write_quorum_lost):
          - absent pool IP (no NodeRecord in snap.Nodes) → noInventory bucket
          - absent inventory (nodeID known but snap.Inventories[id]=nil) → noInventory bucket
          - stale inventory (age > InventoryStalenessThreshold) → noInventory bucket
          - snap.DataIncomplete=true && len(knownDownNodes)==0 → suppress CRITICAL entirely
        Only knownDownNodes (inventory present, unit state explicitly not-active) count toward quorum loss.

        The same principle applies to objectstore.minio.fingerprint_divergence: when DataIncomplete=true,
        missing fingerprints are suppressed; only actually diverged fingerprints (wrong value) fire.
      architecture_fix: |
        Any rule that evaluates cluster health from a snapshot must distinguish:
          PRESENT      — evidence collected and confirms healthy
          UNKNOWN      — evidence absent (collector gap, RPC error, timeout)
          KNOWN_BAD    — evidence collected and confirms unhealthy

        UNKNOWN must never be treated as KNOWN_BAD. This applies to objectstore quorum,
        etcd member health, and any other rule that counts "down" members from an inventory.
        Rules must read snap.DataIncomplete and suppress CRITICAL findings that would be
        false positives if UNKNOWN nodes are actually healthy.
      known_bad_fixes:
        - Classify absent NodeRecord as knownDown — hides the ambiguity behind a false CRITICAL
        - Ignore snap.DataIncomplete and always fire on insufficient active_drives
        - Retry the snapshot read and fire the finding even on the first clean collection
      related_invariants:
        - objectstore.partial_snapshot_unknown_not_down
        - evidence.missing_is_not_known_bad
        - state.unknown_must_not_default_to_healthy
      related_industry_patterns:
        - fm.industry.missing_inventory_misclassified_as_down
        - fm.industry.partial_failure_hidden_by_global_green
      related_services:
        - cluster-doctor
        - cluster-controller
      required_tests:
        - TestWriteQuorumLost_PartialSnapshot_NoFalsePositive
        - TestWriteQuorumLost_DataIncomplete_NoCritical
        - TestFingerprintDivergence_DataIncomplete_SuppressesMissing
        - TestObjectstoreQuorum_AbsentNodeIsUnknownNotDown
        # Existing regression tests that already cover this:
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison

    # ── Globular incident: VIP transition cascades into etcd eviction ─────────

    - id: fm.globular.vip_transition_cascade
      title: keepalived VIP transition causes healthy etcd member eviction and control-plane instability
      severity: critical
      # origin: { type: globular_incident, confidence: very_high }
      # source: failuregraph_seeds/vip_transition_evicts_etcd_member.yaml
      #         failuregraph_seeds/vip_identity_poisoning_cross_layer.yaml
      symptoms:
        - Healthy etcd member exits cleanly (status=0) right after a keepalived/VIP spec change
        - etcdctl member list shows an unstarted placeholder where the evicted node was
        - "globular CLI fails: dial tcp <node>:2379 connection refused on the node whose etcd was evicted"
        - cluster-doctor fires etcd.member_evicted or etcd.quorum_lost after a VIP failover
        - node-agent fallback dials the wrong node (VIP holder instead of target node)
        - Controller leader election misbehaves when VIP is the first routable IP
        - ScyllaDB or MinIO endpoint lists include the floating VIP, causing connection failures when VIP moves
      root_cause: |
        PrimaryIP() returns the keepalived floating VIP when a node holds it (because the VIP is
        the first non-loopback interface). This VIP leaks into:
          1. etcd member advertise/listen URLs (written at join time by install-day1.sh)
          2. removeStaleMembers desiredPeerURLs (controller reads node.PrimaryIP and builds the URL set)
          3. ScyllaDB hosts list (publishScyllaHostsIfNeeded)
          4. MinIO pool IPs (objectstore topology)
          5. Node-agent fallback endpoint selection
          6. Controller leader/self IP matching

        When the VIP moves from node A to node B during a keepalived change, the peer URLs
        for node A no longer match its etcd member record (the VIP is now on B). The controller's
        removeStaleMembers loop sees a mismatch, classifies node A's member as stale, and removes it.
        If node A also uses a legacy bootstrap member name ("globular-etcd" instead of sanitized
        hostname), the hostname fallback in removeStaleMembers also fails to protect it.
      architecture_fix: |
        All member-identity-requiring services must use StableIP(clusterVIP) — not PrimaryIP().
        StableIP excludes the floating VIP by filtering it from the IP list before selecting
        the representative address. The VIP is read from /globular/ingress/v1/spec vip_failover.vip.

        Affected surfaces that must be patched:
          1. install-day1.sh: NODE_IP selection must exclude VIP when ingress mode is vip_failover
          2. etcd member advertise/listen URLs: use StableIP(clusterVIP)
          3. ScyllaDB host list: use StableIP(clusterVIP) in publishScyllaHostsIfNeeded
          4. MinIO pool IPs: use StableIP(clusterVIP) in objectstore topology
          5. node_agent_endpoint_fallback.go: do not prefer PrimaryIP when VIP is known
          6. Controller leader/self matching: use VIP-aware comparison

        Pre-emptive: rename legacy "globular-etcd" etcd member to sanitized hostname before
        any VIP/keepalived change, so the hostname fallback in removeStaleMembers protects it.
      known_bad_fixes:
        - Adding VIP to etcd member advertise URLs (doubles the identity poisoning)
        - Restarting keepalived/etcd without repairing the identity source selection
        - Disabling TLS to hide VIP/SAN mismatch
        - Manually editing one node's etcd.yaml without fixing the upstream render logic
        - Re-running the join script with --repair-etcd without renaming the legacy member first
      related_invariants:
        - ops.vip_requires_observed_owner
        - network.no_loopback_escape_for_cluster_identity
        - identity.stable_node_identity_not_floating_vip
      related_industry_patterns:
        - fm.industry.floating_address_used_as_durable_identity
      related_services:
        - cluster-controller
        - cluster-doctor
        - node-agent
      required_tests:
        - TestRemoveStaleMembers_VIPHolder_NotEvicted
        - TestEtcdAdvertiseURL_UsesStableIP_NotVIP
        - TestScyllaHosts_ExcludeVIP
        - TestNodeAgentFallback_NeverReturnsVIP
        - TestControllerLeaderMatch_VIPAware
        # Existing regression tests already covering this:
        - TestWriteQuorumLost_VIPHolder_NotMisclassifiedAsDown
        - TestNodeIDByPoolIP_EmptyAdvertiseIpDoesNotPoison

    - id: controller.non_leader_heartbeat_false_positive
      title: Non-leader controller heartbeat appears stale — false CRITICAL from prometheus.controller_stalled
      severity: critical
      symptoms:
        - prometheus.controller_stalled fires CRITICAL with age_seconds ~3+ hours
        - controller logs show hard_unmet=[not_leader] continuously
        - globular_controller_loop_heartbeat_unix is stale on the local controller instance
        - etcd /globular/controller/reconcile/lanes/cluster_reconcile shows phase:OK, recently updated
        - globular_controller_reconcile_dropped_not_leader_total > 0 on the scraped instance
        - No globular_controller_is_leader metric exists in Prometheus
      root_cause: |
        Prometheus scrapes only the local controller instance. Non-leader controller instances
        never update globular_controller_loop_heartbeat_unix — the heartbeat loop is gated on
        holding the etcd leader lease. The ClusterDoctor prometheus_runtime.go rule computed
        age = time() - max(globular_controller_loop_heartbeat_unix) without verifying whether
        the scraped instance is the leader. The actual leader (on a different node) is healthy,
        evidenced by etcd reconcile lanes being updated seconds ago.
      architecture_fix: |
        Fixed in prometheus_runtime.go: suppress prometheus.controller_stalled when
        reconcile_dropped_not_leader_total > 0, confirming the scraped instance is a follower.
        Longer-term: add globular_controller_is_leader gauge (1=leader, 0=follower) to the
        controller binary, and gate the heartbeat age check on that metric so the rule is
        self-documenting and survives multi-instance Prometheus scraping.
        Authoritative source for leader health: etcd /globular/controller/reconcile/lanes/
        updated_at_unix, which is written by whichever node is actually running as leader.
      known_bad_fixes:
        - Restarting globular-cluster-controller.service based on heartbeat metric alone
        - Forcing leader re-election when reconcile lanes show phase:OK
        - Treating heartbeat_unix=stale as controller down without checking etcd lane timestamps
      related_invariants:
        - prometheus.controller_stalled.non_leader_guard
      required_tests:
        - TestControllerStall_NonLeaderHeartbeatIsNotCritical
        - TestControllerStall_LeaderHeartbeatStaleIsCritical
        - TestControllerStall_NoDropMetric_StillFires

    - id: objectstore.admitted_disk_data_conflict
      title: MinIO admitted disk paths contain pre-existing non-MinIO data — topology wipe would cause data loss
      severity: critical
      symptoms:
        - ClusterDoctor fires CRITICAL objectstore.minio.existing_data_guard
        - risky_paths lists admitted nodes with /mnt/data or similar paths
        - ls /mnt/data shows non-MinIO content; no .minio.sys directory present
        - globular objectstore disk list shows paths approved without --force-existing-data
        - MinIO is not yet running (no minio_cluster_nodes_online_total in Prometheus)
      root_cause: |
        Disk paths were admitted to the MinIO pool (globular objectstore disk approve) when
        the paths already contained data from previous use. The admission did not use the
        --force-existing-data flag to explicitly acknowledge that existing data may be destroyed
        by a MinIO topology workflow wipe of .minio.sys. The doctor invariant fires CRITICAL
        to block any destructive MinIO topology operation until the operator explicitly decides:
        (a) acknowledge data loss with --force-existing-data, OR
        (b) reject the path and re-admit with an empty path.
      architecture_fix: |
        Operational fix only — no code change required. Per risky node:
          Option A (acknowledge data loss):
            globular objectstore disk approve --node <node-id> --path <path> \
              --node-ip <ip> --force-existing-data
          Option B (choose a different path):
            globular objectstore disk reject --node <node-id> --path <current-path>
            # then re-admit with an empty path
        Never run MinIO topology wipe workflows while this CRITICAL is active.
      known_bad_fixes:
        - Running topology wipe to clear the warning — destroys existing data
        - Ignoring the CRITICAL and proceeding with MinIO expansion workflows
        - Deleting .minio.sys to force a clean state without backing up existing data
        - Deleting the admitted disk entry to silence the finding without operator decision
      related_invariants:
        - objectstore.minio.existing_data_guard
        - objectstore.topology_contract
      required_tests:
        - TestObjectstoreAdmit_ExistingData_RequiresForceFlag
        - TestObjectstoreTopologyWipe_BlockedByDataGuard
        - TestDoctorFinding_ExistingDataGuard_CriticalWhenNotForceAcknowledged

    - id: objectstore.minio.transition_wipe_loop
      title: Destructive MinIO topology transition wipes .minio.sys every reconcile cycle, format.json never stable
      severity: critical
      symptoms:
        - https://<domain>/ returns 503 {"error":"object store unavailable"} from the gateway
        - sudo ls /mnt/data/data/.minio.sys/format.json fluctuates between present and missing every ~30 seconds
        - "MinIO logs spam \"Unable to load healing tracker on '/mnt/data/data': unformatted drive found, re-initializing\""
        - "MinIO logs spam \"Error: Read failed. Insufficient number of drives online\" on every node"
        - "node-agent logs show \"minio-systemd: clearing /mnt/data/data/.minio.sys — approved destructive topology transition\" repeating on each syncTicker"
        - etcd /globular/objectstore/topology/transition/<gen> exists with is_destructive=true approved=true
        - all 5 nodes show .minio.sys/buckets/, .minio.sys/config/, .minio.sys/multipart/ as freshly created empty dirs with no format.json
        - "distributed pool never reaches quorum; outage persists indefinitely (observed: 11+ hours before manual intervention)"
      root_cause: |
        clearMinioSysIfTransitionApproved (golang/node_agent/node_agent_server/minio_systemd_reconcile.go)
        gates the .minio.sys wipe purely on the etcd TopologyTransition record's IsDestructive +
        Approved + Generation fields. The gate has no "already applied" memory: every reconcile
        cycle while the record exists at the current desired generation, the wipe re-fires.

        Sequence per reconcile:
          1. .minio.sys exists (MinIO re-created it on the previous cycle while healing)
          2. transitionAuthorizesWipe(transition, state, nodeIP) returns true
          3. clearMinioSysForModeChange removes .minio.sys (RemoveAll)
          4. MinIO sees unformatted drive on the next probe (~10s), enters healing loop
          5. MinIO recreates .minio.sys/buckets/, /config/, /multipart/ as part of healing
          6. format.json never gets written because distributed bootstrap requires a quorum
             of formatted drives — and every node is in the same wipe loop
          7. Next reconcile (~30s later): back to step 1

        Net effect: format.json lives for only seconds between successive wipes, never long
        enough for clients to make progress. The TopologyTransition was correctly approved
        exactly once by the operator (standalone → distributed migration); the bug is that
        the gate treats "approved" as "wipe forever" instead of "wipe once".
      architecture_fix: |
        Stamp a per-node local marker file (/var/lib/globular/minio/.transition-applied-gen)
        recording the topology generation for which this node performed the wipe. Subsequent
        reconciles read the marker — if it matches state.Generation, the wipe is skipped.
        A genuinely new transition (different generation) mismatches the marker and re-arms
        the wipe path naturally. Per-node local state is appropriate because each node's
        wipe is independent and the marker is purely for idempotency on the local filesystem.

        Fix landed in commit 6ef2edc4 (node-agent 1.2.60+):
        - clearMinioSysIfTransitionApproved checks the marker before wiping
        - Stamps the marker with state.Generation after a successful wipe
        - Subsequent reconciles short-circuit when the marker matches the current generation

        Operational recovery from the loop (if it ever recurs on older node-agents):
        1. Delete /globular/objectstore/topology/transition/<gen> from etcd to dis-arm the gate
        2. systemctl stop globular-minio.service on ALL nodes simultaneously
        3. Verify .minio.sys exists on all nodes (the wipe loop should now be stopped)
        4. systemctl start globular-minio.service on ALL nodes simultaneously
           — fresh distributed bootstrap, format.json written cleanly
      known_bad_fixes:
        - Restarting just one MinIO instance hoping the cluster will recover (it needs quorum bootstrap)
        - Deleting bucket data dirs trying to "start fresh" (destroys user objects, doesn't fix the loop)
        - Reapproving the topology transition with a new generation (re-triggers wipe with no marker)
        - Forcing the topology workflow to "complete" via etcd writes (workflow has no concept of wipe completion)
        - Editing the format.json by hand to a synthesized value (UUID mismatch, MinIO refuses)
      related_invariants:
        - objectstore.minio.wipe_is_idempotent_per_generation
        - objectstore.topology_contract
      required_tests:
        - TestTransitionWipe_AppliedMarker_SkipsSecondWipe
        - TestTransitionWipe_NewGeneration_ReArmsWipe
        - TestTransitionWipe_MarkerStampedAfterSuccess
        - TestTransitionWipe_MarkerSurvivesNodeAgentRestart

    - id: objectstore.minio.format_json_not_recoverable
      title: MinIO per-drive format.json has only one copy (on the drive) — any cause of loss takes down the entire pool with no recovery path
      severity: critical
      symptoms:
        - .minio.sys/format.json missing on all (or quorum of) drives in a distributed pool
        - MinIO logs "unformatted drive found" on every node, never progresses past healing
        - mc admin heal cannot bootstrap because it needs a quorum of formatted drives to start
        - bucket xl.meta files are intact on disk but unreadable through MinIO (no format = no UUID mapping)
        - "operator's only options were: accept full data loss + reformat, or restore .minio.sys from offline backup (if one exists)"
        - "same failure surfaces from many independent causes: approved destructive transition, container ephemeral storage, accidental rm, filesystem corruption, volume re-mount with wrong path"
      root_cause: |
        format.json contains per-drive identity (disk UUID, pool/set index) AND the cluster's
        DeploymentID. MinIO writes it once when a drive is first formatted. There is no
        cluster-wide backup, no etcd snapshot, and no recovery procedure that doesn't require
        quorum of already-formatted drives. When every drive's format.json goes missing
        simultaneously (e.g., the wipe loop in objectstore.minio.transition_wipe_loop, or a
        coordinated event like container restart on ephemeral volumes), the cluster
        deadlocks: distributed bootstrap needs all drives "fresh", healing needs quorum of
        formatted drives, and neither condition is met.

        The architectural assumption was that the on-disk file is durable enough. That holds
        for typical bare-metal SSDs, but fails the moment anything (intentional or accidental)
        deletes the file faster than MinIO can replicate it across the pool.
      architecture_fix: |
        Per-drive format.json snapshots in etcd, keyed by (node_id, drive_basename), with a
        topology fingerprint guard:

          /globular/objectstore/format_backup/<node_id>/<drive_basename>
            → { node_id, drive_path, topology_generation, topology_fingerprint,
                format_json_bytes, format_json_sha256, backed_up_at_unix }

        Each MinIO reconcile cycle (node-agent 1.2.61+):
          1. restoreMinioFormatFromEtcd: if format.json is missing on disk AND etcd has a
             snapshot whose topology_fingerprint matches the current desired state, restore
             the file. Never overwrites an existing on-disk format — MinIO's bytes are
             authoritative when present.
          2. backupMinioFormatToEtcd: read the on-disk format.json; if the bytes changed
             since the last etcd snapshot (sha drift) OR no snapshot exists yet, write a
             new snapshot.

        Per-drive identity (UUID, pool/set index) stays local — the snapshot is per-drive
        too. The topology fingerprint guard prevents restoring an incompatible format after
        a deliberate transition (e.g. xl-single → xl distributed). The approved destructive
        transition path (clearMinioSysForModeChange) also calls purgeMinioFormatBackupForNode
        so a real transition genuinely reformats instead of being undone by restore.

        Fix landed in commit 82f10991 (node-agent 1.2.59+), wired into reconcile in
        commit 6ef2edc4 (1.2.60+), cleanup in 1.2.61.
      known_bad_fixes:
        - Manually copying a single-node format.json to all distributed drives (UUID + erasure-set size mismatch — MinIO refuses)
        - Re-formatting the cluster fresh without backing up bucket data first (data loss)
        - Synthesizing format.json from etcd topology + new UUIDs (cluster's existing xl.meta files reference the old UUIDs)
        - Treating "MinIO can't read its own drives" as a MinIO bug and waiting for upstream fix
        - Periodically rsync'ing .minio.sys to another path — bypasses topology fingerprint guard, can restore stale format after a deliberate transition
      related_invariants:
        - objectstore.minio.format_json_durable_in_etcd
        - objectstore.minio.wipe_is_idempotent_per_generation
      required_tests:
        - TestFormatBackup_BackupAfterFormatWritten
        - TestFormatBackup_RestoreWhenMissingOnDisk
        - TestFormatBackup_RestoreSkippedWhenFormatPresent
        - TestFormatBackup_RestoreSkippedOnTopologyFingerprintMismatch
        - TestFormatBackup_PurgedAfterApprovedDestructiveTransition
        - TestFormatBackup_NeverOverwritesValidOnDiskFormat

    - id: package.installed_binary_hash_mismatch
      title: Installed binary on disk does not match the artifact manifest the controller intended to ship
      severity: critical
      symptoms:
        - node-agent reports installed-state Checksum matching the desired hash, but a re-hash of /usr/lib/globular/bin/<name> at convergence time disagrees
        - verifier emits package.installed_binary_hash_mismatch
        - service appears installed per inventory; a doctor sweep that re-hashes the file finds drift
      root_cause: |
        Phase 1 of the refactor gates apply_package on a post-install hash
        check; if that gate is bypassed or the on-disk bytes are replaced
        out-of-band after apply (manual scp, rogue ansible run, container
        restart restoring an older layer), the installed-state record drifts
        from the actual artifact. Doctor that only reads installed-state
        won't catch it — Phase 9's verifier re-hashes via GetServiceRuntimeProof
        and surfaces the gap.
      architecture_fix: |
        Phase 1 enforces hash match at apply time; Phase 9 verifier re-checks
        at convergence time via ServiceRuntimeProof.InstalledSha256 (the proof
        re-hashes the file rather than trusting the stored checksum). Doctor
        consumes /globular/verification/runtime/<node>/<service> and raises
        this finding when proof and claim diverge.
      known_bad_fixes:
        - Re-running apply without finding out who replaced the binary (treats the symptom; the next out-of-band write recurs)
        - Trusting the inventory Checksum and ignoring the proof (the lie the refactor exists to remove)
      related_invariants:
        - diagnostics.must_measure_reality
        - doctor.must_compare_claims_to_proofs
      required_tests:
        - TestVerifyTarget_OldBinaryOnDisk_InstalledHashMismatch

    - id: service.running_binary_hash_mismatch
      title: Running process is executing a different binary than what is installed on disk
      severity: critical
      symptoms:
        - /proc/<pid>/exe hashes to a different value than /usr/lib/globular/bin/<name>
        - new binary was deployed but the live PID is still running the old one (systemd restart didn't take, or the new file was deleted before the restart)
        - verifier emits service.running_binary_hash_mismatch
        - cluster appears converged (controller, inventory, systemd active) but RPCs hit the old code paths
      root_cause: |
        systemd's notion of "active" tracks the supervised PID's existence,
        not the bytes it loaded. A binary swap that succeeds on disk but
        whose restart fails silently leaves the cluster in this state: disk
        is right, inventory is right, ActiveState=active, but the process
        is the previous incarnation.

        Without Phase 2's GetServiceRuntimeProof RPC, nothing in Globular
        re-reads /proc/<pid>/exe. Health checks trust ActiveState; doctor
        trusts inventory. The drift is invisible until a downstream check
        (an RPC that exercises a new feature, a version probe) fails.
      architecture_fix: |
        Phase 2 added GetServiceRuntimeProof on node-agent which dereferences
        /proc/<pid>/exe and hashes the result. Phase 9 verifier compares
        running_exe_sha256 to installed_sha256 and emits this finding when
        they disagree. The contract is that a successful release is one
        where every layer (disk, /proc, runtime version, systemd
        effective unit) agrees — not just one or two.
      known_bad_fixes:
        - Manually `systemctl restart` and assuming it took (it's the same failure mode — re-verify after restart, don't assume)
        - Trusting systemctl is-active (active says the PID exists, not that it runs the right bytes)
      related_invariants:
        - diagnostics.must_measure_reality
        - doctor.must_compare_claims_to_proofs
      required_tests:
        - TestVerifyTarget_NewBinaryOldPid_RunningBinaryHashMismatch

    - id: service.old_pid_after_upgrade
      title: Live process predates the last apply — restart did not take effect
      severity: critical
      symptoms:
        - ProcessStartTime (from systemctl show ExecMainStartTimestamp) is older than the controller's last apply timestamp for this service
        - same PID has been running since before the upgrade was commanded
        - verifier emits service.old_pid_after_upgrade
      root_cause: |
        A package install / version bump that succeeded on disk but whose
        unit reload-or-restart didn't actually replace the PID. Common
        causes: a TimeoutStopSec that exceeded the systemd kill window, a
        manual `systemctl daemon-reload` without `restart`, or a drop-in
        override that pinned RestartPolicy.

        ProcessStartTime is the cheapest signal that "the apply actually
        had an effect." Phase 9's verifier reads it from GetServiceRuntimeProof
        and compares against the target's ApplyTime.
      architecture_fix: |
        Phase 2 carries ProcessStartTime; Phase 9 compares to the
        controller-tracked apply time for the target. If start < apply,
        the verifier raises this finding regardless of whether other
        proofs agree — the operator decides whether to force-restart or
        investigate the unit configuration.
      known_bad_fixes:
        - Assuming a fresh systemctl restart cycles the PID (drop-in overrides may prevent restart; verify ProcessStartTime advanced)
        - Bumping the version and hoping the next deploy will catch it (silent for an entire release window)
      related_invariants:
        - rollout.convergence_requires_runtime_proof
      required_tests:
        - TestVerifyTarget_ProcessOlderThanApply_OldPidAfterUpgrade
        - TestVerifyTarget_UpgradeProcessOlderThanApply_StillCritical

    - id: service.bootstrap_ordering_skew
      title: Service process started before the controller recorded its apply — expected during fresh install only
      severity: degraded
      symptoms:
        - GetServiceRuntimeProof reports ProcessStartTime earlier than the controller's last apply timestamp
        - the verifier emits service.bootstrap_ordering_skew (degraded) instead of service.old_pid_after_upgrade (critical)
        - only fires when IsFirstInstall=true; an upgrade with the same shape fires the critical finding
      root_cause: |
        Day-0 install.sh starts services before the controller bootstrap
        sequence records an apply timestamp for each ServiceRelease /
        InfrastructureRelease. The result: every service on a fresh node
        has ProcessStartTime earlier than ApplyTime by minutes-to-hours,
        even though every binary on disk and every running PID is correct.

        Treating this as service.old_pid_after_upgrade (critical) was the
        v1.2.56 false-positive: it screams stale-bytes-serving when the
        bytes are correct — the apply timestamp just hasn't caught up
        with reality. Operators learned to ignore the finding, which
        defeats its purpose for the case it's MEANT to catch (a genuine
        upgrade where systemd restart didn't take).
      architecture_fix: |
        The verifier classifies the timing skew with a per-target hint:

          IsFirstInstall=true  → service.bootstrap_ordering_skew (degraded)
          IsFirstInstall=false → service.old_pid_after_upgrade   (critical)

        The doctor collector populates IsFirstInstall by looking at the
        InstalledPackage record's installedUnix vs updatedUnix: within
        60s of each other, this is the same operation (no re-apply has
        happened since the original install). Any subsequent re-apply
        bumps updatedUnix; installedUnix is preserved as the original
        install timestamp.

        Binary-hash checks (installed_binary_hash_mismatch,
        running_binary_hash_mismatch) remain the authoritative drift
        signal in both cases. The timing finding is the tell about
        systemd restart effectiveness; the hash findings are the tell
        about which bytes are running. Both can fire independently.
      known_bad_fixes:
        - Suppressing service.old_pid_after_upgrade globally to stop the install-time noise (loses the upgrade-bug signal)
        - Skewing ApplyTime backward to "before any process could have started" (lies about when the controller commanded apply)
        - Filtering by service name (whitelist install-time-only services) — fragile and incomplete
      related_invariants:
        - rollout.convergence_requires_runtime_proof
      required_tests:
        - TestVerifyTarget_FirstInstallProcessOlderThanApply_BootstrapOrderingSkew

    - id: service.runtime_version_empty_from_main
      title: Service main hardcodes Version="" which wipes the ldflags-injected build-time value
      severity: degraded
      symptoms:
        - "`<svc>_server --describe` prints `\"Version\": \"\"` even though the binary was built with `-X main.Version=<ver>`"
        - "`<svc>_server --version` prints an empty line"
        - on a Day-0 cluster, the controller's health check reports `version:<svc> FAIL — not installed (desired X.Y.Z)` because the heartbeat resolves the empty --describe Version to the `0.0.1` package-default fallback
        - cluster-doctor's services drift surface shows `~ version drift` (desired X.Y.Z, installed 0.0.1) until the controller auto-dispatches install-package
        - after auto-reconcile, the version marker is correct but the binary still under-reports — verifier flags service.runtime_identity_unproven if the runtime-proof sweep races the version-marker write
      root_cause: |
        Two shapes of the same bug in service entrypoints:

        1. Direct: `srv.Version = ""` in main() (monitoring_server,
           repository_server pre-2026-05-21).
        2. Indirect: a Config struct with `Version: ""` default that
           the server struct copies via `Version: cfg.Version`
           (torrent_server pre-2026-05-21).

        Both shapes execute AFTER the package-level `Version` variable
        is set by `-X main.Version=<ver>` ldflags injection, so the
        ldflags value gets clobbered to "" before any caller observes
        it. The bug stayed invisible from Sep 2025 until 2026-05-20 when
        the verifier package (golang/verifier/) was wired into the
        cluster-doctor sweep — before that, no diagnostic surface
        actually compared --describe Version against desired.

        Day-0 visibility chain: install.sh deploys the binary (or a
        bootstrap shim) → version marker is whatever apply-package
        wrote → heartbeat reports installed version → controller hash
        differs → workflow re-installs from repository → marker updated
        → drift clears. But during the gap (and on every fresh boot
        before reconcile lands), the doctor surface shows the WARN.
      architecture_fix: |
        Every service main MUST initialise its Version field from the
        package-level Version variable that gen-version.sh / ldflags
        populates. Working pattern (search, title, media, dns, file,
        ai-*, ...):

          srv.Version = Version             // direct
          // OR
          cfg.Version = Version             // through DefaultConfig

        The build/gen-version.sh sentinel in zz_version_generated.go
        already panics at init() if `Version` is empty, so the build
        side of the contract is enforced. The remaining hole is the
        service-init side: a forgotten `srv.Version = ""` silently
        defeats the entire ldflags pipeline.
      known_bad_fixes:
        - Editing zz_version_generated.go directly (it's regenerated; the fix won't survive a build)
        - Reading Version from etcd at init time (the value isn't available pre-bootstrap and forms a Day-0 chicken-and-egg with the verifier)
        - Suppressing the runtime_identity_unproven WARN globally — that's a known_bad_fix already listed under service.runtime_identity_unproven and would hide genuine stuck-agent cases
        - Special-casing the affected services in detectGlobularBinaryVersion to fall back to the marker file when --describe returns empty (papers over the bug for one consumer while leaving the verifier's runtime probe broken)
      related_invariants:
        - health.must_not_use_inventory_as_runtime_truth
        - rollout.convergence_requires_runtime_proof
        - service.lifecycle.version_field_must_not_be_overwritten
      required_tests:
        - "TestServiceVersion_DescribeReportsBuildTimeVersion"

    - id: service.running_version_mismatch
      title: Live process /version response disagrees with the desired version
      severity: critical
      symptoms:
        - runtime_version from GetServiceRuntimeProof != ServiceReleaseSpec.Version
        - verifier emits service.running_version_mismatch
        - service is responsive but answers RPCs as the wrong major.minor
      root_cause: |
        Runtime version reporting (each service exposing its version via a
        /version endpoint or a gRPC reflection method) is the strongest
        single-field proof that "the binary running is the binary intended."
        Disagreement implies one of: the binary on disk is wrong (different
        finding, hash check catches that first), the runtime version probe
        is reading from a stale source, or the running PID is from an old
        deploy (service.old_pid_after_upgrade catches that).

        When all hash checks agree but runtime version disagrees, the most
        likely cause is a binary that was rebuilt without bumping the
        embedded version constant — a build hygiene issue rather than a
        deploy issue.
      architecture_fix: |
        Phase 2 captures runtime_version when the service exposes one
        (services without a /version endpoint emit an entry in proof.Errors
        and the verifier degrades to service.runtime_identity_unproven
        rather than blanket-passing). Phase 9 raises this finding when
        runtime_version != desired_version.
      known_bad_fixes:
        - Trusting the build tag in /etc/globular and never probing the live process (defeats the point of runtime proof)
        - Hard-coding version strings into source (forbidden by an existing invariant; build flags inject the value via ldflags)
      related_invariants:
        - health.must_not_use_inventory_as_runtime_truth
      required_tests:
        - TestVerifyTarget_RuntimeVersionDiffers_VersionMismatch
        - TestDecideVersionVerdict_BuildIdsDiffer_VersionsDiffer_Mismatch

    - id: service.runtime_identity_unproven
      title: Runtime proof is partial — at least one collection step failed
      severity: degraded
      symptoms:
        - GetServiceRuntimeProof returns a ServiceRuntimeProof with non-empty Errors[]
        - verifier degrades the target to ProofUnknown
        - operator sees the service in service health but cannot tell whether it actually matches desired state
      root_cause: |
        Diagnostic honesty rule: missing proof is NOT proof of failure, but
        it is also NOT proof of success. When the verifier cannot read
        /proc/<pid>/exe (PID died mid-check, permission denied), cannot
        reach systemctl show (systemd-coredumped, broken IPC), or cannot
        hash the binary (filesystem error), the resulting verdict is
        unknown and this finding is raised at degraded severity.

        DAY-0 GRACE EXCEPTION: on a brand-new install (IsFirstInstall=true)
        whose apply happened within day0UnprovenGraceWindow (5 min), the
        finding is downgraded to INFO severity. Rationale: services come
        up in waves over 2-3 minutes during Day-0; the very first doctor
        sweep runs before the node-agent has had a chance to collect
        proofs for every just-applied service, and treating that window
        as degraded opens a doctor_finding incident per service per node
        that auto-resolves within 2 minutes but leaves a permanent
        RESOLVED record. The downgrade only applies during the grace
        window — outside it (or on any upgrade) severity reverts to
        degraded so a genuinely stuck node-agent still surfaces.
      architecture_fix: |
        The verifier returns the proof partial and surfaces the specific
        collection errors in Finding.Evidence["errors"]. Operators see
        which sub-check failed and remediate it (typically: re-run the
        proof after the transient condition clears). Persisting the
        degraded state lets doctor enumerate "what proofs we don't have"
        independently of "what proofs we have that disagree."

        The Day-0 grace check is the helper isDay0UnprovenGrace in
        verifier.go: requires BOTH IsFirstInstall=true AND ApplyTime
        within the last 5 minutes. The cluster_controller's
        decideVersionVerdict cooperates via isDay0UnprovenGraceVerdict
        which trusts the verifier's severity tag rather than re-deriving
        the grace condition — single source of truth.
      known_bad_fixes:
        - Treating a single collection error as a green outcome ("at least the rest agreed")
        - Treating a single collection error as a critical outcome ("partial proof is suspicious") — both lose the distinction between "we don't know" and "we know it's wrong"
        - Blanket-downgrading runtime_identity_unproven to info to silence Day-0 noise (loses the signal for genuinely-stuck node-agents — the grace must be bounded by IsFirstInstall + ApplyTime window)
      related_invariants:
        - diagnostics.must_measure_reality
      required_tests:
        - TestVerifyTarget_ErrorsOnly_DegradesUnknown
        - TestVerifyTarget_NoProof_Unknown
        - TestVerifyTarget_Day0FirstInstall_NoProof_DowngradesToInfo
        - TestVerifyTarget_FirstInstallStaleApply_NoProof_StaysDegraded
        - TestVerifyTarget_Upgrade_NoProof_StaysDegraded
        - TestVerifyTarget_Day0FirstInstall_ErrorsOnly_DowngradesToInfo
        - TestDecideVersionVerdict_VerifierDay0GraceInfo_IsOk

    - id: cluster.cross_node_file_drift
      title: A cluster-visible file disagrees across nodes that were supposed to be in lockstep
      severity: degraded
      symptoms:
        - operator sees one gateway serve a "404" or stale asset while a peer gateway serves the right content
        - webroot drift went unnoticed for two days because each node's health check only inspected its own state
        - certificate fullchain.pem differs between gateways and clients alternate between trust-OK and trust-FAIL on retry
        - rendered systemd unit file differs between nodes for the same service; one node runs the new spec, another runs the old
        - service spec under /var/lib/globular/specs is present on one node, absent on another
        - installed binary at /usr/lib/globular/bin/<name> differs in hash between nodes that supposedly applied the same release
      root_cause: |
        Nothing in Globular today owns the question "is this file the same on
        every node that's supposed to have it?" Each service inspects its own
        local state; the controller only sees aggregate inventory claims
        (Phase 4 surfaces those as ProofStatus, but the layer beneath
        ProofStatus — the actual file bytes — is still a per-node black box).

        Three patterns produced the drift the brief calls out:

          1. Hand-applied fix on one node that nobody propagated. Webroot
             assets dropped on the active gateway during firefighting, never
             pushed to peers.
          2. Partial completion of a deploy step where the unit was rendered
             on the first node and the orchestrator died before the second
             ran. Phase 4 catches this at the build_id layer; Phase 7 catches
             it for content that doesn't roll up to build_id (specs, units,
             webroot files, certs).
          3. Mismatched authority: a class of files SHOULD be objectstore-
             backed, but a legacy code path still writes local-only on some
             nodes. The "is this drift?" question has no answer because the
             authority is undefined.

        In every case the system looked green because every node looked OK
        in isolation. There is no cross-node consistency check until Phase 7.
      architecture_fix: |
        Phase 7 adds golang/crossnodedrift, a small pure-decision package:

          - Authority constants (replicated, objectstore_backed,
            generated_from_etcd, generated_from_repository, node_local,
            undefined). Each PathClass declares exactly one.
          - KnownPathClasses() catalog covering webroot, public_app_assets,
            service_specs, rendered_systemd_units, objectstore_config,
            envoy_xds_snapshots, cert_san_files, package_installed_binaries.
            Every entry MUST declare an authority — leaving it Undefined
            raises FindingAuthorityUndefined deliberately, so the omission
            is loud not silent.
          - DetectDrift(class, path, []NodeObservation, AuthorityContext) →
            DriftVerdict. Pure function. Encodes the per-authority rules:
            replicated requires identical hash on every node (or all absent);
            objectstore_backed permits local-absent (cache miss) but flags
            present-but-different; generated_from_* requires every node's
            local copy to hash-match the regenerated content.

        Collection errors never raise drift on their own — the verdict is
        unknown for that node and the detector continues for the rest. This
        is the same diagnostic-honesty rule the rest of the refactor follows:
        missing proof is NOT proof of failure.

        Phase 9 wires the collector: a node-agent RPC that hashes each path
        class on demand, the controller aggregates observations, doctor
        emits cluster.cross_node_file_drift or cluster.authority_undefined.
      known_bad_fixes:
        - Running `rsync` from a "known good" node to the others — fixes the symptom for one path class, leaves the next one drifted next week
        - Logging drift to slog.Warn and moving on — that is the exact silent-fallback bug Phase 6 corrected, just with a different name
        - Declaring a path class node_local because "it's complicated" — node_local means "drift is legitimate by design"; only use it when that's actually true
        - Storing the same content in multiple authoritative places (e.g. both etcd AND objectstore) so neither is authoritative — fragments the truth and reintroduces the same class of bug
        - Raising drift on a single error observation — collection errors are unknown, not drift, per the diagnostic-honesty rule
      related_invariants:
        - diagnostics.must_measure_reality
        - fallback.must_emit_degraded_finding
      required_tests:
        - TestDetectDrift_Webroot_OneNodePresentOthersAbsent_Drift
        - TestDetectDrift_ObjectstoreBacked_LocalPresentObjectstoreEmpty_Drift
        - TestDetectDrift_ObjectstoreBacked_LocalHashDiffers_Drift
        - TestDetectDrift_ObjectstoreBacked_LocalAbsent_OK
        - TestDetectDrift_AuthorityUndefined_RaisesFinding
        - TestDetectDrift_GeneratedFromEtcd_OneAbsent_Drift
        - TestDetectDrift_AllErrored_Unknown
        - TestKnownPathClasses_NoneUndefined

    - id: service.silent_fallback_active
      title: A service is currently serving requests from a substitute backend (cache / local disk / read-only) because its primary dependency failed
      severity: degraded
      symptoms:
        - service health surface reports OK or healthy while operators see latency / staleness in production
        - slog WARN messages mention "degraded", "fallback", "falling back to <X>", but doctor and cluster events show nothing
        - golang/fallback.Snapshot() (or the per-service equivalent) returns a non-empty list while cluster.health shows green
        - a primary dependency (ScyllaDB, MinIO, etcd, repository) was unreachable but the request still succeeded — neither error count nor cluster event records the divergence
        - the "how long have we been degraded" question has no answer the operator can pull from a structured source
      root_cause: |
        Globular services historically followed the Postel-style "be liberal in
        what you accept" pattern at the dependency boundary: if the primary
        (ScyllaDB ledger, MinIO bucket, etcd config store) was unreachable, the
        request handler would silently switch to a cached / local / in-memory
        substitute and return success. That keeps the user-facing path alive,
        which is correct — but it also keeps the *cluster* looking green, which
        is the lie.

        The structural cost is twofold:

          1. The 4-layer state model assumes every claim of "healthy" is anchored
             in independent measurement. Silent fallback violates that: the
             service claims OK while running on a substitute. Doctor cannot
             distinguish "primary intact" from "primary down, serving from cache".
          2. Operators only learn about the degradation when something downstream
             *also* breaks (cache expires, MinIO eventually goes down, the
             single-node fallback runs out of disk). The window between primary
             failure and operator awareness is the failure window.

        The brief is unambiguous on the contract: fallback may keep the path
        alive, but it MUST NOT keep the system green. Every fallback path is
        required to register itself so doctor / verifier code can enumerate it.
      architecture_fix: |
        Phase 6 of the Diagnostic Honesty Refactor adds a tiny shared package
        (golang/fallback) with three operations:

          - fallback.Enter(Active{Service, Dependency, Mode, PrimaryError,
            AffectedPaths, NodeID, Since}) — register the fallback. Idempotent:
            re-entry preserves the original Since timestamp so the "how long"
            counter stays honest, but refreshes PrimaryError + AffectedPaths so
            doctor sees the latest evidence.
          - fallback.Exit(service, dependency, mode) — clear when the primary
            is back. Cheap no-op when nothing was registered.
          - fallback.Snapshot() — enumerate every currently-active fallback.
            Stable order, no I/O. Doctor / verifier / cluster events scrape this.

        Wire-up rule: every silent fallback path must call Enter on the way
        into the substitute and Exit on the next successful primary read. The
        repository Scylla→MinIO ledger path (artifact_handlers.go) is the
        reference implementation. Identified follow-up wire-ups (tracked
        outside this commit):

          - DNS in-memory cache fallback (dns_server/handlers.go:174)
          - Node-agent repository → local package fallback (installer_api.go:95)
          - Storage resilient mirror cache-fill (storage_backend/resilient_storage.go:54)
          - Objectstore admission etcd-skip (repository_server/objectstore_admission.go:66)
          - Workflow YAML local-disk fallback (workflow/v1alpha1/loader.go)

        Once Phase 9 (verifier) is live the doctor / cluster event bus
        consumes Snapshot() and emits service.silent_fallback_active per
        active fallback. Operators see green Phase + non-green fallback list,
        which is the contract.
      known_bad_fixes:
        - Adding a per-service slog.Warn at the fallback point — that is the silent-fallback bug, just with more verbose logs
        - Bumping the cluster status to DEGRADED globally — degrades the wrong thing; the user-facing path is still working
        - Suppressing the fallback entirely (failing the request) — kills the user path; the whole point of fallback is to keep it alive while making the degradation visible
        - Using a per-service ad-hoc registry — fragments the directory and means doctor has to know N protocols for the same finding
      related_invariants:
        - fallback.must_emit_degraded_finding
        - diagnostics.must_measure_reality
      required_tests:
        - TestEnter_Idempotent_SincePreserved
        - TestEnter_RefreshesPrimaryErrorAndAffectedPaths
        - TestEnter_NotifierFiresOnceOnFirstEntry
        - TestExit_RemovesEntry
        - TestExitMatching_ClearsByDependency
        - TestSnapshot_StableOrder
        - TestEnter_ConcurrentDoesNotPanic

    - id: systemd.effective_config_drift
      title: systemd is loading a unit whose effective Type/ExecStart/FragmentPath disagrees with the unit Globular rendered
      severity: high
      symptoms:
        - GetServiceRuntimeProof reports EffectiveType different from the Type= we rendered for the service
        - GetServiceRuntimeProof reports EffectiveExecStart whose path= does not match the rendered ExecStart binary
        - GetServiceRuntimeProof reports an empty FragmentPath even though the service is supposed to be installed
        - SystemdUnitSha256 (collected by node-agent against /etc/systemd/system/<unit>) does not match the rendered unit hash the controller holds
        - service appears active and "running fine" but is executing an out-of-date binary or wrong start command
        - operator hand-edited /etc/systemd/system/<unit>.service to "fix" something and that edit silently outlives the next deploy
      root_cause: |
        Until Phase 5b nothing in Globular re-read installed unit files or asked
        systemd what it had actually loaded. The deploy step rendered a unit and
        copied it to /etc/systemd/system; from then on, the cluster assumed
        systemd was running exactly that. Three independent paths can break the
        assumption:

          1. A `systemctl edit` drop-in (/etc/systemd/system/<unit>.service.d/*.conf)
             overrides ExecStart= or Type= last-wins; systemd loads the override,
             FragmentPath still points at the original unit, so a naive comparator
             that only hashed the unit file path would miss the drift.
          2. An operator hand-edited /etc/systemd/system/<unit>.service after the
             last deploy. The on-disk content drifts from the rendered template
             but the deploy pipeline never re-checks.
          3. A stale unit from a previous package version is still on disk
             (deploy step wrote a new unit to a *different* path, or the rename
             dance left both around) and systemd is loading whichever it found
             first.

        In every case the effective unit systemd is using is not the unit the
        controller intended to ship, and `systemctl status` looks healthy.

        Phase 2 (GetServiceRuntimeProof) already collects the evidence:
        EffectiveType, EffectiveExecStart, FragmentPath, SystemdUnitSha256. Phase
        5b adds the comparator: DetectEffectiveUnitDrift in golang/deploy
        consumes the rendered unit content + the effective property bag and
        returns a verdict { Status, Drifts[], FindingID }.
      architecture_fix: |
        Two pure functions added in golang/deploy and consumed by the verifier
        once Phase 9 is live:

          - ParseSystemdUnit(rendered string) map[string][]string  — extracts
            directive values per section. Repeatable directives (ExecStartPre,
            Environment, After, Wants) are preserved as slices in source order.
          - DetectEffectiveUnitDrift(rendered string, eff EffectiveUnitProperties)
            UnitDriftVerdict — pure comparison. Verified when every directive
            systemd surfaced agrees with the rendered intent. Drift when at
            least one disagrees; FindingID = systemd.effective_config_drift.
            Unknown when proof is missing (do not assert drift against an empty
            effective bag — that is exactly the diagnostic dishonesty this
            refactor exists to remove).

        The detector does NOT compare the full unit-file sha256 byte-for-byte:
        systemd's drop-in override mechanism means FragmentPath can be honest
        while effective values are overridden. Field-level comparison catches
        both the byte-identical hand-edit case and the drop-in case.

        Phase 9 wires DetectEffectiveUnitDrift into the doctor / verifier path
        so the finding surfaces alongside the other Phase 1/2/3/4 proofs.
      known_bad_fixes:
        - Comparing only the unit-file sha256 (drop-in overrides leave the file unchanged but redirect ExecStart=)
        - Comparing only `systemctl is-active` (systemd reports the process is up — that is not the same as "the process is running the binary you intended")
        - Hand-running `systemctl daemon-reload` and assuming drift went away (reload re-reads files but does not replace overrides)
        - Treating any "Unit not found" or "FragmentPath empty" as a transient and retrying — the brief is explicit that missing proof is degraded, not green
      related_invariants:
        - systemd.effective_unit_must_match_rendered_unit
        - rollout.convergence_requires_runtime_proof
        - diagnostics.must_measure_reality
      required_tests:
        - TestDetectEffectiveUnitDrift_AllAgree_Verified
        - TestDetectEffectiveUnitDrift_TypeDiffers_Drift
        - TestDetectEffectiveUnitDrift_ExecStartPathDiffers_Drift
        - TestDetectEffectiveUnitDrift_MissingFragmentPath_Drift
        - TestDetectEffectiveUnitDrift_EmptyEffective_UnknownNotDrift
        - TestParseSystemdUnit_ExtractsServiceDirectives
        - TestParseSystemdUnit_PreservesRepeatedDirectives

    - id: rollout.partial_not_converged
      title: Release reports AVAILABLE while one or more required nodes are below installed_verified proof
      severity: critical
      symptoms:
        - cluster-controller shows a ServiceRelease / InfrastructureRelease in Phase=AVAILABLE
        - the same release shows status.proof_status=inventory_claim, unknown, or mismatch
        - status.findings contains "rollout.partial_not_converged"
        - per-node NodeReleaseStatus entries have proof_status in (inventory_claim, mismatch) while Phase=AVAILABLE
        - doctor surfaces partial rollouts despite the controller treating them as converged
        - operators see the platform as green, but new RPCs hit stale binaries on some nodes
      root_cause: |
        Before Phase 4 the AVAILABLE transition was written from a single signal:
        the node-agent reported "installed" via the workflow callback (workflow_release.go
        MarkNodeSucceeded), or detectServiceDrift saw an InstalledPackage entry whose
        build_id matched the resolved release build_id. Both signals are claims from
        the node-agent — neither is independent proof that the on-disk binary or the
        running process matches the artifact the controller intended to ship.

        A node-agent crash, partial extraction, stale heartbeat, or a workflow that
        succeeded for 4 of 5 nodes can leave a release at "AVAILABLE per workflow"
        while the cluster is actually PARTIAL. The 4-layer state model (Repository →
        Desired → Installed → Runtime) treats Installed as a separate truth source
        from Runtime, but the rollout state machine collapsed them.
      architecture_fix: |
        Two changes, intentionally additive:

        1. NodeReleaseStatus and ServiceReleaseStatus / InfrastructureReleaseStatus /
           ApplicationReleaseStatus gain a ProofStatus dimension distinct from Phase.
           The levels are weakest → strongest: inventory_claim → installed_verified →
           runtime_verified, plus mismatch and unknown. ProofStatus is a roll-up of
           per-node verdicts (decideNodeRolloutProof in release_proof_status.go)
           computed against the etcd InstalledPackage record + the running systemd
           unit. installed_verified requires the artifact checksum/build_id measured
           at apply time (Phase 1) to still match the resolved release, AND the
           systemd unit to be active. runtime_verified is the Phase 9 ceiling once
           GetServiceRuntimeProof is wired into the convergence loop.

        2. detectServiceDrift now computes a per-node verdict for every node in the
           release and rolls them up via aggregateRolloutProof. The release-level
           ProofStatus is the floor across required nodes. If the release sits at
           AVAILABLE but the floor is below installed_verified, the finding
           rollout.partial_not_converged is added to status.findings so doctor and
           operator UIs can surface the gap without re-deriving it.

        Phase 4 does NOT block the AVAILABLE transition. That is Phase 9's job:
        the external verifier consumes GetServiceRuntimeProof, writes its result
        under /globular/verification/runtime/<node>/<service>, and lets the
        controller raise the proof floor to runtime_verified. Once that loop is
        live, strict mode can refuse AVAILABLE when proof is short of
        runtime_verified.
      known_bad_fixes:
        - Treating "node-agent says installed" as proof — the node-agent is the entity being verified
        - Inferring runtime_verified from systemd ActiveState alone — systemd reports the process is up, not which binary it loaded
        - Adding fallback paths that promote inventory_claim to installed_verified on heartbeat freshness — heartbeat freshness is a different invariant
        - Marking AVAILABLE based on workflow run state ("MarkNodeSucceeded was called") — that is the structural lie the refactor exists to remove
      related_invariants:
        - rollout.convergence_requires_runtime_proof
        - diagnostics.must_measure_reality
      required_tests:
        - TestDecideNodeRolloutProof_HashMatch_RuntimeNotActive_PartialNotConverged
        - TestAggregateRolloutProof_PartialRollout_PartialNotConvergedFinding
        - TestAggregateRolloutProof_MismatchFloor_KeepsPerNodeFinding
        - TestAggregateRolloutProof_NotAtAvailable_NoPartialFinding
    - id: release.explicit_version_wildcard_installs_wrong_version
      title: Explicit version request silently resolves to older local archive via wildcard fallback, installing the wrong binary
      severity: critical
      symptoms:
        - apply-package declares running-and-verified for the requested version but the installed binary reports an older version when invoked with --version
        - node-agent log line installing-from-local-package references a filename that encodes an older version than the caller requested
        - pin-artifact step saves the requested-version .tgz to the pinned dir but install already ran from a different file in the unpinned dir
        - ServiceRelease workflow reports RUN_STATUS_SUCCEEDED but cluster_get_convergence_detail still shows version drift for the same package
        - subsequent sync attempts return SYNC_SKIPPED with detail already-present-with-matching-digest blob-verified because the older local cache is treated as authoritative presence
        - controller release-pipeline log shows ensureServiceRelease recreating in phase WAITING before a fresh dispatch then a stale workflow finalizes as ok
      root_cause: |
        Two compounding gaps in the install pipeline:

        (a) installer_api.findLocalPackage falls back to findLocalPackageAnyVersion (wildcard,
            lexicographic-newest) whenever the exact-version .tgz isn't on disk, regardless of
            whether the caller passed an explicit version. The fallback was designed for Day-1
            bootstrap when caller has no authoritative version, but it fires for any cache miss.

        (b) repository_upstream_sync imports into the repository service's storage (Scylla manifest
            + MinIO blob) but never materializes the .tgz to /var/lib/globular/packages/ — the
            local-only path node-agent reads from. So new versions arrive in the repository service
            but never in the local cache. Day-2 upgrades therefore find no exact-version .tgz
            locally, and bug (a) substitutes the older archive.

        Together: caller asks for v1.2.115 → no v1.2.115 tgz locally → wildcard returns
        v1.2.110 tgz → installer extracts v1.2.110 binary → apply-package's verify gate either
        sees no expected_sha256 (legacy degraded path) or compares actual against missing expected
        and returns nil error — install reports SUCCESS at v1.2.115.

        First seen 2026-05-28 during v1.2.115 ServiceRelease for repository: installed binary
        sha256=479e9393 (v1.2.110), expected manifest sha256=cee70c5a (v1.2.115 inner binary).
        Workflow declared SUCCEEDED. Convergence stalled.
      detection: |
        - Compare installed binary --version against ServiceRelease version.
        - Compare sha256sum of installed binary against repository manifest's entrypoint_checksum.
        - cluster_get_convergence_detail: services show as installed=NEW but service-reported
          version is still OLD.
        - ls /var/lib/globular/packages/ — if no <name>_<new_version>_<platform>.tgz exists for
          a recently-dispatched ServiceRelease, the materialize step never ran.
      resolution: |
        Three layered fixes (v1.2.116):

        Read-side: installer_api.findLocalPackage refuses wildcard when caller passed an explicit
        version (anything other than "" or "0.0.0-dev"). Missing exact match → return "" so the
        installer surfaces "not found" rather than silently substituting.

        Supply-side: repository_upstream_sync's importUpstreamArtifact success path calls
        materializeLocalPackageArchive to write the .tgz to /var/lib/globular/packages/ via
        temp+atomic rename, idempotent on matching size+sha256.

        Verify-side: verifyInstalledBinaryHashStrict returns an explicit BinaryVerdict
        (Verified / Unverified / Mismatch / Missing). Missing expected_sha256 is now Unverified
        (writes installed-state with status=installed_unverified, Ok=false), not silent success.
        Mismatch and missing-binary remain hard failures via BinaryHashMismatchError / BinaryMissingError.
      known_bad_fixes:
        - Allowing wildcard fallback when the caller passed an explicit version, on the theory that "newest local is probably close enough"
        - Declaring apply-package SUCCESS based only on systemd ActiveState — service is up, but not necessarily the desired binary
        - Treating older local archives as satisfying newer desired versions via lexicographic substitution
        - Repairing by editing desired pins to whatever happened to install (mutates desired state from runtime observation)
        - Bypassing repository manifest authority with filesystem observation alone (ls of /var/lib/globular/packages/ is not the manifest)
      related_invariants:
        - installer.explicit_version_requires_exact_artifact
        - repository.imported_package_must_be_local_install_resolvable
        - runtime.success_requires_expected_binary_checksum
        - desired_installed_runtime_identity_must_match
      required_tests:
        - TestFindLocalPackage_ExplicitVersion_NoExact_ReturnsEmpty
        - TestFindLocalPackage_ExplicitVersion_v1_2_115_MustNotResolve_v1_2_110
        - TestMaterializeLocalPackageArchive_WritesTgzToLocalInstallDir
        - TestMaterializeLocalPackageArchive_VersionMatchesImportedManifest
        - TestVerifyStrict_OldBinaryMustNotSatisfyNewExpectedHash
        - TestVerifyStrict_MissingExpectedChecksum_ReturnsUnverified
    - id: filesystem.service_runtime_dir_naming_drift
      title: Multiple naming conventions for the same logical service runtime directory produce duplicate empty namespaces and noisy layout drift
      severity: warn
      symptoms:
        - cluster doctor reports artifact.layout_drift_local with hyphenated and underscored variants of the same service name listed as unexpected
        - directories like cluster-doctor cluster_doctor clusterdoctor coexist under /var/lib/globular for the same logical service
        - duplicate runtime directories with different ownership (e.g. node-agent is globular-globular, node_agent is root-root)
        - several pairs appear empty but cannot be safely auto-cleaned because no contract names them
        - layout drift WARN count grows over time as new services are added by different code paths
      root_cause: |
        Service runtime directory identity was never made canonical. Different code paths derived directory names independently:

        - some paths used the package name verbatim (hyphenated, e.g. cluster-doctor)
        - others substituted underscores for hyphens to match Go binary identifier rules (cluster_doctor)
        - older code dropped separators altogether (clusterdoctor)

        Each path could MkdirAll its preferred form, leaving residue from every convention. The doctor's hard-coded allowlist had to enumerate every variant or emit false WARNs for legitimate runtime state. The list grew without ever fixing the underlying identity problem.

        Compounding: there was no centralized helper to resolve "what is the canonical runtime dir for service X". The duplicates also produced ownership drift because the path that created the dir set the ownership; later writes to the alternate name happened as a different user.

        First surfaced 2026-05-28 on globule-ryzen: 4 AI services + node-agent + cluster-doctor + cluster-controller + backup-manager + scylla-manager each had hyphen+underscore pair dirs.
      detection: |
        - cluster doctor artifact.layout_drift_local finding lists hyphenated and underscored variants of the same service name
        - ls /var/lib/globular shows pairs like cluster-doctor and cluster_doctor with matching prefix
        - stat reveals ownership differs between paired dirs
        - one of the pair is empty
      resolution: |
        v1.2.117: refactor artifact_layout_drift_local.go from hard-coded allowlist to a canonical-runtime-dir model with evidence-based classification.

        New canonical_runtime_dir.go provides:
          CanonicalRuntimeDir(name) - returns the canonical form, mapping known legacy aliases
          LegacyRuntimeAliases(canonical) - returns known historical aliases
          AllRuntimeDirAliases(name) - returns canonical + aliases
          IsKnownRuntimeDirAlias(name) - reports membership in the alias model

        Doctor rule classifies each unknown top-level entry as:
          classOK - platform base or canonical installed runtime dir
          classCleanupEmpty - empty legacy alias of installed-or-known service (INFO)
          classCleanupTransient - backup files like *.bak.* or day0-install.jsonl (INFO)
          classWarnDuplicate - non-empty legacy alias coexisting with canonical (WARN, operator review)
          classWarnUnknown - truly unknown dir (WARN)

        Layout rule remains layout-only: it does NOT enforce or suppress permission invariants. Sensitive dirs like etcd are enforced by separate rules.
      known_bad_fixes:
        - silencing the warning by appending random names to a hard-coded allowlist forever
        - auto-deleting non-empty legacy duplicate dirs (may have real data)
        - chmod/chown service dirs without proving the active runtime path first
        - mutating installed state to hide layout drift
        - treating empty and non-empty duplicates as the same risk
        - letting each service invent its own runtime dir normalization
        - suppressing real permission errors because a directory name is now allowlisted
      related_invariants:
        - service.runtime_dir_name_must_be_canonical
        - doctor.layout_drift_must_reflect_real_risk
        - sensitive_runtime_dirs_require_strict_permissions
      required_tests:
        - TestLayoutDrift_LegitimateInstalledServiceRuntimeDir_NoDrift
        - TestLayoutDrift_UnknownNonEmptyDir_ProducesWarn
        - TestLayoutDrift_EmptyLegacyAliasOfInstalledService_IsCleanupCandidate
        - TestLayoutDrift_ClusterDoctorAliasesAreDeterministic
        - TestLayoutDrift_NodeAgentAliasesAreDeterministic
        - TestLayoutDrift_KnownServicesIncluded
        - TestLayoutDrift_PlatformBaseSilentDoesNotSuppressOtherInvariants
        - TestLayoutDrift_NonEmptyDuplicateAliasProducesDuplicateWarn
    - id: repository.sync_silently_drops_noarch_artifacts
      title: BOM entries with platform=noarch are silently dropped by the sync platform filter, producing zero-result imports and downstream orphan findings
      severity: critical
      symptoms:
        - repository_upstream_sync returns zero results for a BOM entry that exists in the release-index.json
        - DesiredBuildIdOrphaned critical finding fires for globular-awareness-bundle even though the bundle is in the release
        - manifests table has no row for the bundle artifact_key (not even a skeleton)
        - ServiceRelease stays WAITING with reason artifact_not_published indefinitely
        - cluster-doctor reports artifact_not_published but the artifact is sitting in the GitHub release
        - sync logs do not contain a rejection or error for the dropped entry
      root_cause: |
        The sync entry loop in sync_from_upstream.go used strict equality to filter BOM
        entries by platform against the consumer's targetPlatform (linux_amd64). The
        awareness bundle is published with platform=noarch because its payload
        (compiled graph + YAML knowledge) has no native-code architecture binding,
        and the BOM authoritatively declares it portable across every target.

        Strict equality treats noarch as "wrong platform" and continues past the
        entry without surfacing any signal. The downstream code (processSyncEntry,
        importUpstreamArtifact, materializeLocalPackageArchive) is never reached
        for that entry. No row is written; no error is logged; the sync result
        object has zero entries for that name. The doctor's DesiredBuildIdOrphaned
        rule only fires later, divorced from the cause.

        First surfaced 2026-05-28: 11 sibling services were repaired via repair_blob
        but globular-awareness-bundle remained orphaned because the platform filter
        rejected it before any code in the sync path could see it.
      detection: |
        - repository_upstream_sync with only=<bundle-name> returns empty results array
        - cqlsh "SELECT count(*) FROM repository.manifests WHERE name='globular-awareness-bundle';" returns 0
        - controller log: "ServiceRelease core@globular.io/awareness-bundle: artifact not in repository, entering WAITING"
        - BOM has the bundle entry with platform=noarch (verify with curl + python: jq for platform)
      resolution: |
        v1.2.118 sync_from_upstream.go: replace strict equality with platformMatchesTarget helper.

        platformMatchesTarget(entry, target):
          - empty entry: accept (legacy grandfathering)
          - case-insensitive noarch: accept on every target
          - exact equal: accept
          - otherwise: reject

        Constant noArchPlatform and the helper live next to each other so the
        signal string and matcher cannot drift. Helper is the SINGLE point in
        the codebase that interprets noarch; any future filter must call it
        rather than reimplement the comparison.

        Layout: the helper does NOT broaden filtering for arch-specific entries.
        A linux_arm64 entry is still rejected on a linux_amd64 consumer. Only
        the noarch case is specialized.
      known_bad_fixes:
        - declaring the awareness bundle with platform=linux_amd64 to work around the filter (duplicates artifact under every arch namespace, breaks identity)
        - adding a kind-specific bypass for AWARENESS_BUNDLE in the sync loop (parallel hidden path, future kinds re-create the same gap)
        - removing the platform filter entirely (would accept genuinely wrong-arch entries, breaking the per-arch separation rule)
        - importing the bundle via a separate non-sync code path (creates two source-of-truth import flows for the same BOM)
        - treating any unknown platform as noarch (silently accepts typos and corrupted BOM entries)
        - retrying sync with a different targetPlatform to "catch" noarch entries (timing-dependent, races with the controller)
      related_invariants:
        - repository.sync_must_not_silently_drop_noarch_artifacts
        - repository.imported_package_must_be_local_install_resolvable
      required_tests:
        - TestPlatformMatchesTarget
        - TestSyncFromUpstream_NoArchEntryNotFilteredByPlatform
        - TestSyncFromUpstream_ArchSpecificEntryStillFilteredOnMismatch
        - TestSyncFromUpstream_AwarenessBundleNoArchImportsCleanly
    - id: controller.apply_package_missing_expected_sha256_blocks_verified_install
      title: Controller dispatch builds ApplyPackageRelease without expected_sha256, blocking verified install success
      severity: critical
      symptoms:
        - node-agent install-package writes installed_unverified with reason "no expected_sha256 provided in apply request"
        - drift-reconciler redispatches every 30 seconds because Ok=false from the apply
        - cluster_doctor reports controller.apply_package_missing_expected_sha256_blocks_verified_install
        - normal install pipeline never reaches Status=installed; bridge-recovery is repeatedly needed
        - controller-self-update dispatches package digest as ExpectedSha256 and every apply fails with failed_binary_hash_mismatch
      root_cause: |
        The v1.2.116 node-agent verify gate (verifyInstalledBinaryHashStrict) requires
        expected_sha256 to declare BinaryVerified. Without it the gate returns
        BinaryUnverified and the caller writes installed_unverified with Ok=false.
        Until v1.2.119, the controller-side dispatch chain (remoteApplyPackageRelease,
        followerSelfApply, release.apply.package and release.apply.controller
        workflows) never propagated manifest.entrypoint_checksum from the resolver
        into the apply request — even though ReleaseResolver.Resolve already read
        the value. The dispatch path simply dropped it.

        followerSelfApply additionally used target.Checksum (PACKAGE TARBALL sha256
        prefixed with "sha256:") as ExpectedSha256, a hash-schema confusion that
        guaranteed failed_binary_hash_mismatch on every self-update.
      resolution: |
        v1.2.119: every controller ApplyPackageRelease dispatch resolves
        manifest.entrypoint_checksum (BINARY sha256) and passes it as
        ExpectedSha256. RunPackageReleaseWorkflow accepts
        resolved_entrypoint_checksum and propagates it through workflow inputs
        into the install_package step. ControllerDeployConfig.ApplyPackageRelease
        and NodeDirectApplyConfig.InstallPackage both grew an expectedSha256
        parameter. The audit test TestDispatch_AuditAllCallSitesSetExpectedSha256
        walks every ApplyPackageReleaseRequest literal in the source tree and
        fails if a new site is added without ExpectedSha256 set (or without an
        explicit allow-list entry documenting the degraded exception).
      known_bad_fixes:
        - disabling the node-agent verify gate so missing expected_sha256 returns SUCCESS
        - synthesizing expected_sha256 from the binary already on disk
        - parsing filename to derive expected_sha256
        - mutating desired state to match installed runtime after verification fails
        - adding a parallel ApplyPackageRelease dispatch path that bypasses manifest resolution
        - passing the package tarball sha256 as ExpectedSha256 (hash-schema confusion)
      related_invariants:
        - controller.apply_package_release_requires_manifest_checksum
        - runtime.success_requires_expected_binary_checksum
        - desired_installed_runtime_identity_must_match
      required_tests:
        - TestDispatch_PopulatesExpectedSha256FromManifest
        - TestDispatch_EmptyManifestChecksumPropagatesAsEmpty
        - TestDispatch_ControllerDeployPropagatesExpectedSha256
        - TestDispatch_ControllerDeployEmptyExpectedSha256PropagatesAsEmpty
        - TestDispatch_WithBlockOverridesInputs
        - TestDispatch_AuditAllCallSitesSetExpectedSha256
        - TestDispatch_ResolverEntrypointChecksumIsBinaryHash
    - id: workflow.stale_definitions_block_expected_sha256_propagation
      title: Stale workflow YAML definitions on disk break the v1.2.119 expected_sha256 propagation chain
      severity: critical
      symptoms:
        - controller dispatches log expected_sha256_present=false despite running the v1.2.119 binary
        - workflow-seed log shows etcd workflow entries that lack resolved_entrypoint_checksum / expected_sha256 fields
        - node-agent honestly writes installed_unverified or rejects installs as binary hash mismatch
        - cluster_doctor reports installed-state drift but the controller binary commit is correct
      root_cause: |
        The v1.2.119 cluster-controller binary correctly resolves
        manifest.entrypoint_checksum and threads it into workflow inputs as
        resolved_entrypoint_checksum. But the controller seeds the workflow
        definition for release.apply.package / release.apply.controller from
        /var/lib/globular/workflows/*.yaml. install-day0.sh installs those YAMLs
        once at Day-0; nothing keeps them in sync when the controller binary
        is upgraded via the normal install pipeline. A pre-v1.2.119 YAML on
        disk does not declare the new resolved_entrypoint_checksum input
        and does not thread it to install_package's with: block. The result:
        the controller code asks the workflow engine for an input that the
        loaded definition does not contain, the actor receives empty, and the
        ApplyPackageReleaseRequest carries ExpectedSha256="" — silently
        breaking the verification contract that the binary was supposed
        to enforce.
      resolution: |
        Sync golang/workflow/definitions/*.yaml to /var/lib/globular/workflows/
        (the same operation install-day0.sh performs at Day-0), chown to globular,
        and restart globular-cluster-controller so it re-seeds etcd. After
        restart, /globular/workflows/release.apply.* in etcd carries the new
        fields and subsequent dispatches log expected_sha256_present=true.

        The forward fix is to package the workflow YAMLs with cluster-controller
        so the install pipeline updates both atomically.
      known_bad_fixes:
        - using a cluster-controller binary bridge to mask the missing field
        - patching the controller or node-agent to ignore the missing checksum field
        - syncing only one workflow YAML and leaving the package/controller
          pair inconsistent
        - mutating installed_state to verified to silence the gap
        - treating empty expected_sha256 as success in any layer
      related_invariants:
        - workflow.definitions_must_thread_required_verification_fields
        - controller.apply_package_release_requires_manifest_checksum
        - runtime.success_requires_expected_binary_checksum
      required_tests:
        - TestDispatch_PopulatesExpectedSha256FromManifest
        - TestDispatch_AuditAllCallSitesSetExpectedSha256
    - id: etcd.nospace_alarm_blocks_reconciliation
      title: "etcd reaches backend quota and raises alarm:NOSPACE, blocking all controller writes and reconciliation"
      severity: critical
      symptoms:
        - 'controller logs show repeated "rpc error code = ResourceExhausted desc = etcdserver: mvcc: database space exceeded"'
        - convergence-committer reports outcome=FAILED_TRANSIENT for every service every cycle
        - leader election refresh publish failed context deadline exceeded
        - "runtime-dep-block: write block ... etcd put ... mvcc: database space exceeded"
        - drift cannot be redispatched, installed_state cannot be persisted
        - no new apply-package attempts fire; reconciliation appears frozen even though dispatch code is correct
        - etcdctl endpoint health returns "Active Alarm(s) NOSPACE" and unhealthy
      root_cause: |
        etcd's mvcc backend reached its configured quota (default 2 GiB) and
        the storage maintainer raised alarm:NOSPACE. While the alarm is
        active, etcd accepts reads but rejects all writes. Globular's
        controller depends on etcd writes for leader election, installed_state
        persistence, runtime_dep_blocks, and convergence commits, so every
        reconciliation cycle fails at the persistence layer regardless of
        whether the controller code path is correct.

        This is a persistence-layer failure, NOT a defect in the v1.2.119
        verification chain, the workflow dispatch path, or the apply-package
        contract.
      resolution: |
        Standard etcd maintenance, ordered:
          1. capture endpoint status + alarms + health for the incident record
          2. snapshot save to /var/lib/globular/recovery/etcd-snapshots/
          3. read current revision via endpoint status --write-out=json
          4. etcdctl compact <REV>
          5. etcdctl defrag --command-timeout=5m
          6. etcdctl alarm disarm
          7. verify writes resume via test put/get/del and re-check alarm list
          8. observe Globular reconciliation resume

        If alarm returns under load, the live keyspace itself is too large
        for the quota — produce loads/etcd_nospace_recovery_impact_report.md
        with prefix inventory before raising quota or designing retention.
      known_bad_fixes:
        - clearing alarm:NOSPACE without first compacting and defragging
          (the underlying space is still exhausted; writes will fail again immediately)
        - deleting etcd keys blindly to free space without a prefix inventory
          and documented retention policy
        - increasing etcd quota as the first response (skips diagnosis of
          which prefix is growing; defers the cleanup that will eventually
          be required anyway)
        - treating the resulting FAILED_TRANSIENT convergence outcomes as a
          v1.2.119 verification chain defect
        - weakening the node-agent verify gate because controller writes are blocked
        - mutating desired or installed state to silence the reconciliation backlog
        - restarting random Globular services hoping they pick up correct state
          while etcd still refuses writes
        - running `rm -rf` against etcd data directory
      related_invariants:
        - etcd.must_have_free_backend_space_for_reconciliation
      required_tests: []
    - id: node_agent.install_package_aliases_convergence_hash_into_expected_sha256
      title: install-package fallback aliased desired_hash (convergence identity) into ExpectedSha256 (binary verify), failing every dispatched install
      severity: critical
      symptoms:
        - "apply-package: REJECTED SERVICE/<pkg>@<ver> — installed binary hash mismatch ... expected sha256=<de2b04ff...>, actual sha256=<entrypoint_checksum value>"
        - same build_id reported in both the manifest and the rejection log, yet the hashes differ
        - failing_on increases for every service the controller dispatches once expected_sha256 starts flowing through workflow inputs
        - convergence-committer reports outcome=FAILED for every dispatched install
        - the rejected "expected" hash matches ComputeReleaseDesiredHash output, not any binary or tarball sha256
      root_cause: |
        Before v1.2.119, the install-package workflow inputs did not carry
        desired_hash. The node-agent runInstallPackage path had a fallback:

            desiredHash := strings.TrimSpace(inputs["desired_hash"])
            if desiredHash == "" {
                desiredHash = strings.TrimSpace(inputs["expected_sha256"])
            }
            ApplyPackageReleaseRequest{ ExpectedSha256: desiredHash }

        which was harmless only because neither key was set.

        The v1.2.119 controller dispatch starts supplying BOTH desired_hash
        (convergence identity = ComputeReleaseDesiredHash output) and
        expected_sha256 (manifest entrypoint_checksum). The fallback then
        bound the FIRST one — the convergence identity hash — to
        ExpectedSha256, sending a hash with the wrong schema into the
        node-agent verify gate. The gate honestly returned
        installed_binary_hash_mismatch because the convergence identity
        could never equal the binary sha256.

        Net effect: every install dispatched through the v1.2.119 chain
        appeared to fail, even though the local package CAS, the repository
        Scylla manifest, and the installed binary all agreed on the binary
        sha256. The system was correct end to end except for one variable
        aliasing in the node-agent.

        Sentinel value: for dns@1.2.113+364 the phantom hash was
        de2b04ff64ce4489f2d8a6b151571f6f3941cb28674e0124e9d3db2d739ad414 =
        sha256("core@globular.io/dns=1.2.113+b:364;").
      resolution: |
        Split the two schemas at extraction time, never alias:

            convergenceHash := strings.TrimSpace(inputs["desired_hash"])
            expectedSha256  := strings.TrimSpace(inputs["expected_sha256"])

        canSkipInstallPackage and LocalHash / StampInfraConvergenceHash use
        convergenceHash. ApplyPackageReleaseRequest.ExpectedSha256 uses
        expectedSha256 only. When expected_sha256 is empty the verify gate
        writes installed_unverified honestly — the contract calls for
        explicit-empty propagation, not a same-call fallback.

        Captured by extractRunInstallPackageHashes; pinned by
        TestExtractRunInstallPackageHashes_* and
        TestRunInstallPackageHashSchema_PhantomHashIsConvergenceIdentity.
      known_bad_fixes:
        - reintroducing the fallback under a "graceful degradation" label
        - shortening the function by combining both keys into one variable
        - '"normalising" the convergence hash and the binary hash with a single helper'
        - changing ComputeReleaseDesiredHash to return the entrypoint_checksum so the alias works
        - using inputs["expected_sha256"] as the convergence hash when desired_hash is absent
        - downgrading the verify gate to "warn" so installs pass even with the wrong-schema hash
      related_invariants:
        - install_package.hash_schemas_must_not_alias
        - controller.apply_package_release_requires_manifest_checksum
        - runtime.success_requires_expected_binary_checksum
      required_tests:
        - TestExtractRunInstallPackageHashes_BothPresent
        - TestExtractRunInstallPackageHashes_OnlyConvergence
        - TestExtractRunInstallPackageHashes_OnlyBinary
        - TestExtractRunInstallPackageHashes_BothEmpty
        - TestExtractRunInstallPackageHashes_Whitespace
        - TestRunInstallPackageHashSchema_PhantomHashIsConvergenceIdentity

    - id: node_agent.installer_download_aliases_entrypoint_as_bundle_hash
      title: DownloadArtifactToDir verifies the .tgz bundle against the entrypoint_checksum (binary hash), failing every fresh download with a false-positive "artifact digest mismatch"
      severity: critical
      status: fixed
      symptoms:
        - "node-agent log: `installer-api: <pkg>@<ver> not found locally, downloading from repository <addr>`"
        - "followed by: `apply-package: install failed for SERVICE/<pkg>@<ver>: install <pkg>: not in local dirs and repository download failed: download <pkg>@<ver> from <addr>: artifact digest mismatch: want <X> got <Y>`"
        - "X (the 'want' digest) equals the manifest's entrypoint_checksum field — the BINARY hash"
        - "Y (the 'got' digest) equals the manifest's checksum field — the .tgz BUNDLE hash, which is what was actually downloaded"
        - "every fresh package version (i.e. not already cached under /var/lib/globular/packages/) fails on first install"
        - "workaround: pre-staging the .tgz at /var/lib/globular/packages/<name>_<ver>_<plat>.tgz lets the local-cache path skip the download verifier"
      root_cause: |
        InstallPackage receives the manifest's entrypoint_checksum as
        expectedSHA256 (per INC-2026-0014's dispatch contract — the
        controller passes entrypoint_checksum so the post-extraction
        binary verifier in apply_package_verify has it on hand).

        installer_api.go passed that same expectedSHA256 to
        DownloadArtifactToDir as the bundle verification target.
        DownloadArtifactToDir's old behaviour was: if expectedSHA256 was
        non-empty, skip manifest resolution and use the caller's value as
        the bundle hash. The downloaded .tgz bytes were then compared
        against the entrypoint_checksum — two distinct hash schemas
        aliased into one verification call.

        First observed when publishing awareness-graph@0.0.7: the package
        was correctly published to the repository (bundle CAS + manifest
        intact), the controller's dispatch carried the correct
        entrypoint_checksum, but no node could install because the
        downloader rejected every fresh download.
      affected_files:
        - golang/node_agent/node_agent_server/internal/actions/artifact.go
        - golang/node_agent/node_agent_server/installer_api.go
      fix_summary: |
        DownloadArtifactToDir now ALWAYS calls resolveArtifactDigest to
        fetch the BUNDLE digest from the manifest, and verifies the
        downloaded bytes against THAT. The expectedEntrypointSHA256
        parameter (renamed for clarity) is no longer used for bundle
        verification; it flows through for the post-extraction binary
        verifier as before. Comments at both the function definition and
        the call site spell out the invariant so future edits don't
        re-introduce the alias.
      related_invariants:
        - install_package.hash_schemas_must_not_alias
        - repository.fallback_requires_manifest_and_checksum
      required_tests:
        - TestDownloadArtifactToDir_AlwaysResolvesManifestEvenIfEntrypointHashProvided

    - id: release_pipeline.set_fields_silent_noop_on_wrong_kind
      title: SetFields case added to wrong apply function (or dispatch result discarded) leaves release stuck while controller logs intent every cycle
      severity: critical
      symptoms:
        - "controller logs `applyPatchToSvcStatus: unknown SetFields=<label>` (or App/Infra variant) on every reconcile tick"
        - "controller logs intent like `marking AVAILABLE` repeatedly while the ServiceRelease / InfrastructureRelease etcd state stays at `phase=RESOLVED`"
        - "release stuck with `WAVE_BLOCKED` or `RUN_STATUS_FAILED` message and `RetryCount=0`, `NextRetryUnixMs=0`"
        - "drift-reconciler is the only path back to convergence; `globular services repair` consistently unsticks a deploy that wouldn't recover on its own"
        - reconcile loop is hot but etcd never advances
      root_cause: |
        Two symmetric defects in release_pipeline.go, both silent:

        1. Routing-side: `applyPatchToSvcStatus`, `applyPatchToAppStatus`,
           `applyPatchToInfraStatus` have near-identical bodies. A new
           SetFields case (e.g. `"available"`, `"retry"`,
           `"awareness_bundle"`) added to the wrong apply function takes
           the default branch, returns false, and `patchReleaseStatus`'s
           equality guard skips Apply. Compile-time: no error. Runtime:
           the canary log fires every reconcile cycle.

        2. Dispatch-side: workflow runners
           (`RunPackageReleaseWorkflow`, etc.) return `(resp, err)` where
           `resp.Status` encodes per-wave outcomes (`RUN_STATUS_FAILED`,
           `WAVE_BLOCKED`) independently of `err`. A call site that
           writes `_, err := workflow.Run(...)` and only branches on
           `err != nil` drops the wave-failure response. `RetryCount` is
           never incremented, `NextRetryUnixMs` is never set, the
           reconciler's NextRetry guard sees zero and never re-enqueues.
           Drift-reconciler becomes the only recovery path.

        Both defects appear together because patch-apply and dispatch
        live in the same file and follow the same shape across Svc/App/Infra.
      architecture_fix: |
        - Pin every SetFields label to its matching release-kind apply
          function. Tests must enumerate which labels each function accepts;
          a wrong-switch route fails the test, not just lints clean.
        - Replace every `_, err := workflow.Run(...)` dispatch site with
          either `dispatchWaveResult(handle, resp, err)` or explicit
          three-branch handling (engine error / wave failure / full
          success). The `"retry"` SetFields case must increment
          `RetryCount` and set `NextRetryUnixMs` (Svc/App; Infra uses
          watch-event re-enqueue but the retry path still needs the case).
        - When you fix one pipeline (Svc/App/Infra), audit the other two
          for the symmetric gap on BOTH the patch-apply and dispatch sides.
      known_bad_fixes:
        - adding the SetFields case to all three apply functions "to be safe" — silent overwrite of one kind's status by another's patch path
        - tightening `patchReleaseStatus`'s equality guard so the no-op becomes a no-op-with-write
        - re-enqueueing via drift-reconciler timer instead of explicit retry counters (drift-reconciler is recovery, not retry policy)
        - raising the reconciler tick rate to make drift-reconciler the only path back run faster (mask, not fix)
        - increasing workflow queue capacity to hide the retry storm
      related_invariants:
        - release_pipeline.set_fields_routing_must_match_release_kind
        - workflow.dispatch_is_not_completion
        - workflow.success_requires_backend_confirmation
        - convergence.no_infinite_retry
      related_services:
        - cluster-controller
        - workflow-service
      required_tests:
        - TestApplyPatchTo_SetFieldsRoutingMatchesReleaseKind
        - TestApplyPatchTo_UnknownSetFieldsEmitsCanaryLogAndReturnsFalse
        - TestRunPackageReleaseWorkflow_WaveBlockedResponseTriggersRetry
        - TestRunPackageReleaseWorkflow_DispatchSiteInspectsRespStatus

    - id: reconcile.stale_dep_block_persists_after_dep_active
      title: A node holds its bootstrap phase because a prior BLOCKED_MISSING_NATIVE_DEP record was never cleared after the dep became active
      severity: high
      historical_resolution: |
        Resolved as a runtime gap on 2026-05-24 in services commits:
          - e47c2316 — day1-join: fix backpressure handling and
            auto-clear stale dep-blocks. Introduced
            `clearRuntimeDepBlock` and the edge-triggered clear in
            `reconcileResolved`.
          - dba27d03 — fix node leave and rejoin issue. Introduced
            `sweepRuntimeDepBlocks` (level-triggered safety net)
            and wired it into `reconcile_nodes.go` so it runs every
            reconcile tick.
        Existing regression tests in
        `critical_key_prereqs_test.go`:
          - TestSweepRuntimeDepBlocks_ClearsWhenDepsSatisfied
          - TestSweepRuntimeDepBlocks_DoesNotClearWhenDepsMissing
          - TestSweepRuntimeDepBlocks_ListErrorIsNonFatal

        This failure_mode is therefore a regression-risk record, NOT
        a description of a current runtime gap. It exists so a future
        edit that removes the sweep, weakens
        `checkRuntimeDeps`, or breaks the clear contract is flagged
        before the regression is shipped. The related invariant
        `reconcile.dep_block_records_must_be_cleared_when_dep_satisfies`
        is the stay-fixed guard.
      symptoms:
        - "(historical / regression-only) node stuck at one of: xds_ready / envoy_ready / awareness_ready / workload_ready for >5 min after the blocking infra service is reported active"
        - "(historical / regression-only) `hasUnservedNodes` returns true for the node yet the reconciler never dispatches an install workflow for the blocked package"
        - "(historical / regression-only) `globular cluster_get_node_health_detail <node>` shows the blocking dep as active, but the convergence record still reads BLOCKED_MISSING_NATIVE_DEP"
        - "(historical / regression-only) etcd contains `/globular/convergence/nodes/{node}/packages/{kind}/{pkg}/latest` with outcome=BLOCKED_MISSING_NATIVE_DEP and `/globular/convergence/actions/controller/{node}/{kind}/{pkg}/runtime_dep_block` still present after dep is active"
        - "(historical / regression-only) manual `etcdctl del` of those two keys followed by `globular services repair` unsticks the node — proves the deps are healthy and the records are stale"
        - "(regression canary) the journal stops emitting `runtime-dep-block: auto-cleared stale block for ...` lines on a cluster where bootstrap races are expected (e.g. fresh node joins) — implies the sweep is no longer running, no longer reaching the clear branch, or `checkRuntimeDeps` has been silently loosened"
      root_cause: |
        Historical root cause (resolved 2026-05-24): `writeRuntimeDepBlock`
        in `critical_key_prereqs.go` was edge-triggered by reconcile
        events that observed the dep inactive, but there was no
        symmetric clearer that ran on subsequent ticks observing the
        dep active. Bootstrap-time races made this visible: a node's
        xds_ready phase wrote BLOCKED records at t=T while
        envoy/xds finished starting at t=T+Δ; the next reconcile
        tick saw the records but the dispatch gate in
        `hasUnservedNodes` (release_pipeline.go) refused to dispatch
        the very work that would have cleared them. Result: infinite
        stall until an operator did manual etcd surgery. INC-2026-0005
        (globule-dell Day-1 join, 2026-05-23) needed three manual
        clearing waves before the node converged: 6 keys during
        bootstrap, 34 keys after workload_ready, 2 keys for the
        sctool dep on scylla-manager. See
        session_dell_join_dep_block_fix.

        Regression triggers (this is the part to watch in code
        review):
          - The unconditional `srv.sweepRuntimeDepBlocks(ctx, nodes)`
            call at the top of `reconcileNodes` is removed, hoisted
            behind a feature flag, or moved into a code path that is
            only reachable under specific node states.
          - `sweepRuntimeDepBlocks` is refactored to filter records
            without re-running `checkRuntimeDeps` (e.g. clearing
            blocks whose dep was reported active "recently" via a
            timestamp on the record instead of a fresh evaluation).
          - `checkRuntimeDeps` is loosened so a stateful infra dep
            (scylladb / minio / etcd) is treated as satisfied on
            systemd-active alone, without `*JoinPhase == Verified`.
          - The `runtime_deps_not_ready` ReasonCode filter is widened
            so the sweep deletes other BLOCKED outcomes too.
          - The clear path stops deleting BOTH the action key AND the
            latest convergence record (e.g. only the action key is
            deleted), leaving `hasUnservedNodes` reading the stale
            convergence record.
          - The deterministic action ID format changes without
            updating `runtimeDepBlockKindFromActionID`, so the sweep
            silently emits empty kind values and the clear writes to
            a different key than the original block.
      architecture_fix: |
        See the related invariant
        `reconcile.dep_block_records_must_be_cleared_when_dep_satisfies`
        for the contract. The implementation is the
        `writeRuntimeDepBlock` + `clearRuntimeDepBlock` +
        `sweepRuntimeDepBlocks` triad in `critical_key_prereqs.go`
        and the unconditional sweep call in `reconcile_nodes.go`.
        The sweep is level-triggered and idempotent: it inspects
        every node's BLOCKED records, re-runs `checkRuntimeDeps`,
        and clears only records whose dep is now observably
        satisfied AND join-phase verified.
      known_bad_fixes:
        - "treating manual `etcdctl del` as the supported recovery — it leaves the next race unaddressed and bakes the operator into the dispatch loop"
        - "masking the BLOCKED record in `hasUnservedNodes` so dispatch proceeds anyway — defeats the dep-block gate entirely, breaks legitimate cases where the dep IS inactive"
        - "increasing the dep-block record's TTL so it expires naturally — replaces a known stall with a longer one, still loses dispatch attempts inside the TTL window"
        - "only clearing on the install path — bootstrap-race windows can write a BLOCKED record AFTER the install path's clear runs, so the record sticks until the next install attempt that never happens because dispatch is blocked"
        - "weakening `checkRuntimeDeps` to bypass the join-phase gate — this directly reintroduces INC-2026-0005's race window"
      related_invariants:
        - reconcile.dep_block_records_must_be_cleared_when_dep_satisfies
        - convergence.no_infinite_retry
        - critical_state.absence_is_not_destructive_intent
      related_services:
        - cluster-controller
        - node-agent
        - etcd
      required_tests:
        - TestSweepRuntimeDepBlocks_ClearsWhenDepsSatisfied
        - TestSweepRuntimeDepBlocks_DoesNotClearWhenDepsMissing
        - TestSweepRuntimeDepBlocks_ListErrorIsNonFatal

    - id: infra.desired_hash_convergence_mismatch_loop
      title: Using raw artifact digest as infrastructure desired hash causes permanent convergence mismatch loop
      severity: critical
      status: active
      description: >
        Infrastructure desired hashes MUST be computed with ComputeInfrastructureDesiredHash.
        Using ResolvedArtifactDigest (raw artifact blob SHA256) produces a permanent mismatch:
        the controller always sees convergence mismatch and perpetually re-dispatches the
        install workflow, causing an Envoy restart storm (observed 2026-05-06).
      trigger: >
        Any code path that stores desiredHash = resolvedArtifactDigest instead of
        ComputeInfrastructureDesiredHash(...) output.
      symptoms:
        - Controller perpetually re-dispatches infrastructure install workflow
        - Envoy/DNS/keepalived services restart in a tight loop
        - Convergence metrics never reach 100%
        - lookupServiceReleaseBuildID returns DesiredHash that never equals computed hash
      blast_radius:
        - Infrastructure services (Envoy, DNS) oscillate — control plane unstable
        - All services lose routing stability during the loop
      detection: mustNotUseResolvedArtifactDigest guard in infrastructure_reconciler.go
      protects:
        files:
          - golang/cluster_controller/cluster_controller_server/infrastructure_reconciler.go
      forbidden_fixes:
        - using resolvedArtifactDigest directly as the convergence desired hash
        - computing the hash outside of ComputeInfrastructureDesiredHash

    - id: scylla.workflow_reconnect_concurrent_storm
      title: Multiple concurrent Scylla reconnect goroutines breach the single-reconnect guarantee
      severity: high
      status: active
      description: >
        The workflow Scylla session manager uses an atomic reconnecting flag to prevent
        concurrent reconnect attempts. If the guard is bypassed or multiple callers race
        past it, parallel reconnect goroutines each close the session and attempt a new
        connection simultaneously, causing pool thrashing and inconsistent generation state.
      trigger: >
        High request volume during Scylla downtime; multiple onPingFailure() calls
        arrive concurrently before the reconnecting flag is set.
      symptoms:
        - Multiple "reconnecting to Scylla" log entries with overlapping timestamps
        - Session generation counter increments more than once per reconnect cycle
        - Workflow query failures that resolve then immediately recur
      blast_radius:
        - All in-flight workflow runs stall for the reconnect duration
        - Orphan scanner may claim runs that are still active
      protects:
        files:
          - golang/workflow/workflow_server/scylla_reconnect.go
      required_tests:
        - TestNoConcurrentReconnectStorm

    - id: interceptors.loopback_amplification_host_crash
      title: High-volume inter-service loopback traffic amplifies into an event storm that crashes the node
      severity: critical
      status: active
      description: >
        Local service-to-service calls (A→B→C→A) over loopback have a higher rate limit
        (5000/30s) than external calls (500/30s). A tight call chain under load can generate
        1000-3000 req/s over loopback before the limiter fires. This was observed to crash
        the host. The loopback threshold is defense-in-depth, not a safety guarantee.
      trigger: >
        Circular or deep call chains between services on the same node during a high-load
        event (e.g. reconcile storm, mass workflow dispatch). No backpressure at the call site.
      symptoms:
        - Node CPU pegged at 100% from interceptor hot path
        - All services on the node become unresponsive
        - Rate limiter logs showing loopback threshold breaches
        - Host-level OOM or process crash
      blast_radius:
        - All services on the affected node unavailable
        - etcd member on node may become unreachable → potential leader election
        - Cascades to cluster-wide request timeouts
      protects:
        files:
          - golang/interceptors/rate_tracker.go

    - id: workflow.orphan_lease_slow_step_double_claim
      title: Slow workflow step causes orphan scanner to claim active run — double execution
      severity: high
      status: active
      description: >
        The executor heartbeat must be renewed every 30 seconds. If a workflow step takes
        longer than orphanHeartbeatTimeout (30s) without refreshing the lease, the orphan
        scanner (runs every 15s) may claim the run and start a new executor. Two executors
        then compete to complete the same run, producing conflicting state writes.
      trigger: >
        Slow etcd write, Scylla query timeout, or CPU starvation causes a step to take >30s
        without the lease heartbeat being renewed.
      symptoms:
        - Two "executor lease: claimed orphan, resuming" log entries for the same run_id
        - Run state shows SUCCEEDED then FAILED (or vice versa)
        - Duplicate workflow effects (service installed twice, etcd key written twice)
      blast_radius:
        - Run state unreliable for affected workflow
        - Side effects may be applied twice (installs, etcd writes, notifications)
      protects:
        files:
          - golang/workflow/workflow_server/executor_lease.go
          - golang/workflow/workflow_server/executor_resume.go
          - golang/workflow/workflow_server/executor.go
      forbidden_fixes:
        - increasing orphanHeartbeatTimeout as a substitute for fixing slow steps
        - disabling the orphan scanner to prevent double-claim

    - id: workflow.stale_release_callback_overwrites_generation
      title: Stale workflow completion callback overwrites a newer release phase via generation race
      severity: high
      status: active
      description: >
        When a workflow completes after the release generation has advanced (e.g. a retry
        started a new run), the stale callback must be discarded. The generation guard in
        handleWorkflowCompletion checks expectedGeneration but the check and write are not
        atomic — a concurrent advance between the check and the write can let a stale
        callback overwrite the current phase.
      trigger: >
        Slow network delay on workflow completion RPC; release generation advances
        (retry or manual re-trigger) between the guard check and the etcd write.
      symptoms:
        - Release phase regresses to an earlier state (e.g. INSTALLING after SUCCEEDED)
        - Reconciler re-dispatches an already-completed release
        - Convergence loops without ever reaching SUCCEEDED
      blast_radius:
        - Service release blocked indefinitely
        - Reconciliation diverges from intent until operator manually resets
      protects:
        files:
          - golang/cluster_controller/cluster_controller_server/workflow_release.go
          - golang/cluster_controller/cluster_controller_server/release_pipeline.go
          - golang/workflow/workflow_server/executor.go
      required_tests:
        - TestDeleteCriticalReleaseRejectsGenerationMismatch

    - id: event.scylla_bus_nil_session_silent_drop
      title: Event publish silently returns nil when Scylla session is nil — event is lost
      severity: high
      status: active
      description: >
        The ScyllaDB event bus publish() function returns nil (success) when the session
        is nil or instanceID is empty. The caller receives no error but the event is never
        written. This happens during reconnect windows and on bus shutdown.
      trigger: >
        Scylla reconnect in progress (session set to nil at line 227); event publish
        races with the nil window. Also on clean shutdown before session is established.
      symptoms:
        - No publish error in logs
        - Event count metrics show no failures
        - Downstream subscribers never receive the event
        - Audit trail has gaps that are impossible to detect without cross-referencing
      blast_radius:
        - Events permanently lost — no replay possible after nil-window drop
        - Compliance audit gaps if dropped events are security-relevant
        - Workflow run status notifications silently dropped
      protects:
        files:
          - golang/event/event_server/scylla_bus.go

    - id: ai_router.cascade_disables_retry_prevents_recovery
      title: AI router disables all retries at >30% error rate — recovery becomes impossible without external intervention
      severity: high
      status: active
      description: >
        applyStabilityControls sets MaxRetries=0 when avgErrorRate exceeds 30%. This
        stops amplification but also stops the self-healing path — once disabled, every
        request fails immediately, keeping the error rate at 100%. The router cannot
        recover on its own; it requires external intervention to reset.
      trigger: >
        Transient spike drives avg error rate above 30% threshold. Circuit breaker
        fires. All retries disabled. Error rate locks at 100%.
      symptoms:
        - All AI router requests fail immediately with no retry
        - Error rate metric stuck at 100% — never recovers
        - No "circuit breakers critical" log after initial trigger (rate stays pegged)
        - Downstream services (ai_executor, ai_watcher) appear completely offline
      blast_radius:
        - All AI-assisted diagnosis and remediation unavailable
        - MCP tools that depend on ai_router return errors permanently
        - Recovery requires operator to restart the ai_router service
      protects:
        files:
          - golang/ai_router/ai_router_server/stability.go
      forbidden_fixes:
        - removing the >30% circuit breaker without adding an auto-recovery path
        - treating MaxRetries=0 as a permanent steady state rather than a transient gate

    - id: doctor.stale_evidence_authorizes_remediation
      title: Stale findings authorize a remediation action, executing against already-recovered state
      severity: critical
      symptoms:
        - remediation executes against a service that was already recovered by another mechanism
        - double-remediation — the action was performed twice, causing instability
        - evidence timestamp in audit trail predates the last successful healthcheck
        - PostAction audit shows "finding_id was resolved before dispatch"
      root_cause: |
        The evidence trust gate was bypassed or MaxEvidenceAge was too large. The doctor
        approved a remediation using evidence from a prior scan cycle. By dispatch time,
        the target had already recovered, causing a spurious disruption.
      architecture_fix: |
        Enforce MaxEvidenceAge per action severity in CheckEvidenceTrust. Re-verify evidence
        freshness immediately before dispatch (not at approval time). Return AWAITING_EVIDENCE
        if re-verify fails.
      forbidden_fixes:
        - disable_evidence_trust_gate_before_remediation
        - using_approval_time_evidence_for_dispatch_time_verification
      related_invariants:
        - doctor.evidence_trust_must_be_authoritative_for_execution
      required_tests:
        - test.doctor_evidence_stale_blocks_execution

    - id: doctor.cache_poisoning_from_node_scoped_findings
      title: Node-scoped findings fed into cluster delta cache produce phantom events at 100+/min
      severity: high
      symptoms:
        - finding event rate spikes to 100+ events/minute in cluster_doctor metrics
        - same finding appears and disappears rapidly in doctor dashboards
        - '"new finding" events fired for findings already emitted in the prior cycle'
        - cluster_id missing from finding metadata (indicates node-scoped source)
      root_cause: |
        cacheFindings wrote node-scoped findings into the same cache used for cluster-delta
        computation. On each sweep, node-scoped findings appeared "new" vs the cluster-only
        lastEmittedFindings, generating phantom delta events. Root cause of INC-2026-0004.
        Commit a821e0fa fixed production; test.doctor_cache_not_poisoned_by_node_scope
        prevents regression.
      architecture_fix: |
        Split the two caches: lastFindings (all scopes, for lookup) and lastEmittedFindings
        (cluster-wide only, for delta). Only cluster-wide findings feed delta comparison.
      forbidden_fixes:
        - use_node_scope_findings_for_cluster_delta
      related_invariants:
        - doctor.cache_separation_prevents_delta_poisoning
      required_tests:
        - test.doctor_cache_not_poisoned_by_node_scope

    - id: doctor.approval_token_replay_across_failover
      title: Approval token replayed on new leader after failover re-authorizes same action
      severity: critical
      symptoms:
        - remediation action executes twice for the same finding and evidence snapshot
        - audit trail shows same jti used twice with different leader IDs
        - approval token timestamp predates the leader failover event
        - second execution target was already in a recovered state
      root_cause: |
        When a doctor leader fails over, the new leader does not check the JTI replay guard
        in etcd. An operator (or attacker) replays an approval token issued to the previous
        leader. The new leader finds the token valid (not expired, signature ok) and executes
        the action a second time.
      architecture_fix: |
        Store all consumed JTIs in etcd with TTL = token.exp + 5m. On every approval
        consumption, CheckJTIReplay reads from etcd (not in-memory). New leaders inherit
        the full JTI blacklist automatically via etcd reads.
      forbidden_fixes:
        - skip_approval_token_jti_replay_check
        - storing_jti_blacklist_only_in_memory
      related_invariants:
        - doctor.approval_token_binding_prevents_replay
      required_tests:
        - test.doctor_approval_token_binding_prevents_replay

    - id: heartbeat.stale_kind_manifest_poisons_installed_state
      title: Old artifact versions with a reclassified kind delete the correctly-classified installed-state record every heartbeat
      severity: critical
      symptoms:
        - INFRASTRUCTURE/<svc> record is recreated in etcd on every heartbeat cycle even though the install pipeline wrote SERVICE/<svc>
        - verifier emits service.old_pid_after_upgrade for <svc> on every cycle — updatedUnix keeps advancing past the process start time
        - cluster.services.drift fires permanently for <svc> despite a successful install
        - install-package dispatches for <svc> succeed but the record is overwritten before the next reconcile
        - "'apply-package: removed stale INFRASTRUCTURE record for SERVICE <svc>' appears in logs on re-install but then returns"
      root_cause: |
        syncRepoArtifactsToEtcd in heartbeat.go calls ListArtifacts(), which returns ALL
        published versions. When an artifact's kind changes between releases (e.g., mcp was
        published as INFRASTRUCTURE in 1.2.131/1.2.132 and reclassified to SERVICE in 1.2.133),
        the old INFRASTRUCTURE manifests are still returned. The heartbeat's staleService
        deletion logic sees the INFRASTRUCTURE manifest for <svc>, finds an existing SERVICE/<svc>
        record (correctly written by the install pipeline), treats it as misclassified, and
        deletes it — replacing it with INFRASTRUCTURE/<svc>@1.2.132 with a fresh updatedUnix.

        This bumps ApplyTime ahead of the process start time on every cycle, so
        service.old_pid_after_upgrade fires perpetually. The install pipeline re-installs
        SERVICE/<svc>, the heartbeat immediately overwrites it, and the cycle repeats.
      architecture_fix: |
        After ListArtifacts(), deduplicate to keep only the highest-version manifest per
        (name, platform) before iterating. Only the latest published version is authoritative
        for kind resolution. Old versions are ignored.

        Implemented in commit 72cc72b2: syncRepoArtifactsToEtcd builds a latestArts map
        keyed by (name, platform) and retains the winner by versionutil.Compare, breaking
        ties by build_number. The arts slice is replaced with the deduplicated contents
        before the classification and staleService logic runs.
      known_bad_fixes:
        - iterate_all_artifact_versions_for_kind_resolution
        - delete_old_published_artifact_versions_to_stop_heartbeat_poisoning
      related_invariants:
        - infra.heartbeat_observer_only_not_authority
      required_tests:
        - TestSyncRepoArtifacts_DeduplicatesOldVersionsBeforeKindResolution

    - id: doctor.escalation_state_lost_on_restart
      title: Escalation counter resets on doctor restart, allowing a hard-rate-limited action to bypass approval gate
      severity: high
      symptoms:
        - action that was previously escalated (requires approval) is auto-dispatched after restart
        - escalation counter in metrics drops to 0 at restart time
        - healer_loop dispatches previously-blocked action without operator intervention
      root_cause: |
        The escalation counter was stored only in memory. After a doctor restart or leader
        failover, the counter resets to 0, clearing the requires_approval flag. The next
        cooldown-rejected attempt starts from zero and can complete up to 3 new rejections
        before re-escalating, giving the healer a window to auto-dispatch.
      architecture_fix: |
        Persist escalation state (per action+target) in etcd with key pattern
        /globular/doctor/escalation/{action}/{target}. Reload on leader acquisition.
        Only clear escalation via explicit operator API call.
      forbidden_fixes:
        - auto_clear_escalation_without_operator_approval
        - storing_escalation_state_only_in_memory
      related_invariants:
        - doctor.escalation_threshold_gates_repeated_attempts
      required_tests:
        - test.doctor_escalation_after_three_cooldown_rejections

    - id: node_agent.apply_package_release_buildid_skip_ignores_checksum
      title: ApplyPackageRelease idempotency guard skips reinstall when build_id matches even if installed binary checksum differs from manifest expected_sha256
      severity: high
      symptoms:
        - node-agent log shows "build_id matches — already applied" followed immediately by "checksum mismatch" from the verifier
        - installed_state.Checksum differs from manifest.entrypoint_checksum but installed phase stays AVAILABLE
        - cluster-doctor reports hash_drift on a service that was just installed at the correct version
        - heartbeat emits runtime_identity_unproven finding for a service whose systemd unit is active
        - canSkipInstallPackage denies skip (correct), but ApplyPackageRelease re-grants skip via the build_id guard
        - binary was replaced out-of-band (globular deploy or local build) without a corresponding installed_state.Checksum update
      root_cause: |
        ApplyPackageRelease has two distinct idempotency guards:
        1. canSkipInstallPackage (grpc_workflow_skip.go) — correctly compares installed checksum against
           req.GetExpectedSha256() and denies skip on mismatch.
        2. A second guard inside apply_package_release.go — only checked build_id (UUID), ignoring
           req.GetExpectedSha256(). This allowed the second guard to short-circuit reinstall even when
           the first guard correctly identified a checksum mismatch.

        The result: a service binary replaced out-of-band (e.g. via `globular deploy`, a local
        go build, or a direct cp) retains the same build_id as the manifest build, so the second
        guard skips reinstall and the installed_state.Checksum is never updated. The verifier then
        detects the discrepancy and emits hash_drift indefinitely.

        This is INC-2026-0019, filed 2026-05-31.
      architecture_fix: |
        The second guard inside ApplyPackageRelease must call buildIDSkipChecksumOK(installed, expected)
        before allowing skip. buildIDSkipChecksumOK returns false (must reinstall) when both hashes
        are present and disagree, and true (skip allowed) when either hash is absent or they agree.

        Fixed in commit covering INC-2026-0019: added buildIDSkipChecksumOK helper to
        grpc_workflow_skip.go and wired it into the build_id guard block in apply_package_release.go.

        The helper normalizes hashes (strips sha256: prefix, lowercases) before comparison.
      forbidden_fixes:
        - skipping_reinstall_based_on_build_id_alone_without_checksum_validation
        - treating_build_id_match_as_proof_of_binary_identity
        - clearing_hash_drift_without_reinstalling_the_package
        - updating_installed_state_checksum_without_reinstalling_the_binary
      protects:
        files:
          - golang/node_agent/node_agent_server/apply_package_release.go
          - golang/node_agent/node_agent_server/grpc_workflow_skip.go
      related_invariants:
        - runtime.success_requires_expected_binary_checksum
      required_tests:
        - TestBuildIDSkipChecksumOK

    - id: node_agent.installer_download_fallback_skips_checksum
      title: Installer download fallback fetches archive unverified when expectedSHA256 is empty
      severity: critical
      symptoms:
        - node-agent log shows "WARN artifact downloaded without SHA256 verification" during an install triggered by services desired set
        - package installs successfully but verifier immediately reports hash_drift or runtime_identity_unproven
        - an attacker or corrupted repository can deliver a different binary than the one published; installer accepts it
        - join-path installs (where controller does not pass expectedSHA256) silently bypass the fallback checksum guard
      root_cause: |
        DownloadArtifactToDir — the new repository download fallback in installer_api.go —
        accepted expectedSHA256="" from its caller and forwarded it directly to
        downloadArtifactFromRepository. When expectedSHA256 is empty,
        downloadArtifactFromRepository logs a WARN and proceeds without hash verification:
        the archive checksum is computed post-download but never compared against anything.

        On the join path and in most services-desired-set flows, the controller does not
        supply expectedSHA256 to InstallPackage, so the field arrives as "". The original
        implementation therefore downloaded every repository-fallback package without
        any integrity check.

        Caught by awareness briefing on installer_api.go surfacing invariant
        repository.fallback_requires_manifest_and_checksum. Fixed in commit cb317e5a.
      architecture_fix: |
        DownloadArtifactToDir must resolve the archive checksum from the repository
        manifest (GetArtifactManifest) before calling downloadArtifactFromRepository
        whenever expectedSHA256 == "". If GetArtifactManifest fails, the download
        must be aborted — fetching without a checksum to verify against is forbidden.

        Fixed: DownloadArtifactToDir now calls resolveArtifactDigest(ctx, repoAddr, ...)
        when expectedSHA256 is empty, and passes the resolved digest to
        downloadArtifactFromRepository. A manifest-lookup failure causes a hard error
        before any bytes are fetched.
      forbidden_fixes:
        - pass_empty_expected_sha256_to_downloadArtifactFromRepository
        - log_warn_and_continue_when_no_checksum_available
        - skip_manifest_prefetch_for_performance_on_join_path
        - trust_repository_is_safe_without_verifying_downloaded_bytes
      protects:
        files:
          - golang/node_agent/node_agent_server/internal/actions/artifact.go
          - golang/node_agent/node_agent_server/installer_api.go
        symbols:
          - DownloadArtifactToDir
          - downloadArtifactFromRepository
          - resolveArtifactDigest
      related_invariants:
        - repository.fallback_requires_manifest_and_checksum
        - desired_installed_runtime_identity_must_match
      required_tests:
        - TestDownloadArtifactToDir_ResolvesChecksumWhenEmpty
        - TestDownloadArtifactToDir_RejectsDownloadWhenManifestUnavailable
    - id: repository.upstream_path_traversal_via_symlinks
      title: Symlink inside LOCAL_DIR root escapes to host filesystem when symlink evaluation is skipped
      severity: critical
      status: active
      summary: |
        If safeJoin (in golang/repository/upstream/local_source.go)
        ever drops its filepath.EvalSymlinks step, a symlink placed
        inside the configured local_root that targets a path outside
        the root would let an operator-uploaded archive (or a
        malicious git tag in the sibling GIT_INDEX provider) read
        arbitrary files on the host — including /etc/shadow,
        /var/lib/globular/pki/ca.key, other tenants' MinIO data, or
        sibling cluster credentials.

        A common shortcut is `strings.HasPrefix(joined, root+"/")`
        WITHOUT EvalSymlinks. This looks correct because the joined
        path is textually under the root — but the symlink only
        reveals itself when followed. Tests must use an actual
        symlinked layout, not just `..` paths.

        Mitigated today by safeJoin's three-step guard (reject
        absolute, reject "..", then EvalSymlinks-then-prefix-check),
        protected by invariant
        repository.upstream_local_paths_must_reject_traversal.
      affects:
        files:
          - golang/repository/upstream/local_source.go
          - golang/repository/upstream/git_source.go
        symbols:
          - safeJoin
      detection: |
        Direct: grep for `HasPrefix` near `filepath.Join` that does
        NOT call `EvalSymlinks` first in the upstream/ package.
        Runtime: a malicious package archive containing a symlink
        whose target escapes the package root would surface as the
        OpenArtifact call returning a host-file's contents instead of
        the artifact bytes — and the manifest sha256 verification
        downstream would mismatch, surfacing as a doctor finding for
        artifact_corruption rather than as a security event.
      related_invariants:
        - repository.upstream_local_paths_must_reject_traversal
      required_tests:
        - TestSafeJoin_RejectsDotDot
        - TestSafeJoin_RejectsAbsolute
        - TestGitIndex_RejectsPathTraversal
    - id: repository.upstream_token_leak_via_unredacted_log
      title: GitHub asset token or HTTP bearer token surfaces in operator log because a code path bypassed RedactAssetURL
      severity: high
      status: active
      summary: |
        GitHub Releases asset URLs contain a presigned token in the
        query string. A new caller in the repository sync pipeline
        that logs the raw URL — typically for "debug" or "trace"
        purposes — leaks the token into the operator log archive,
        and from there into shipped diagnostic bundles that may be
        forwarded to support channels.

        The mitigation is structural: every URL that touches a log
        emitter MUST go through RedactAssetURL first. A test that
        only checks "logger called" is insufficient — the test must
        assert the log content contains no `?token=` or
        `?X-Amz-Signature=` substring.
      affects:
        files:
          - golang/repository/upstream/parse.go
          - golang/repository/upstream/github.go
          - golang/repository/upstream/git_source.go
        symbols:
          - RedactAssetURL
          - redactGitError
      detection: |
        Direct: grep for `log.Printf` / `logger.Info` / `slog.*` near
        an asset URL variable in the upstream/ package — any such
        site that does not call RedactAssetURL first is a leak.
        Runtime: a shipped support bundle whose log contains a
        substring matching `\?[A-Za-z0-9_-]+=` near a *.amazonaws.com
        or api.github.com URL has leaked.
      related_invariants:
        - repository.upstream_credentials_must_be_redacted_in_audit_logs
      required_tests:
        - TestRedactAssetURL_StripsQueryParams
        - TestRedactGitError
    - id: dnsprovider.internal_topology_leak_via_public_dns_publish
      title: Internal subnet topology leaked to public internet because a DNS provider published RFC1918 addresses
      severity: high
      status: active
      summary: |
        When an external DNS Provider implementation publishes a
        record without first calling FilterPublicIPs, any RFC1918
        / loopback / link-local IP in the input slice ends up in
        the public zone. Anyone running `dig` against the zone
        learns:

          - the cluster's internal subnet structure
          - approximate host counts per subnet
          - NAT / split-horizon presence

        The leak is silent — Cloudflare or the RFC2136 server
        accept the update happily — and it survives until a
        security review notices. External reachability for the
        published name is also broken because clients outside the
        LAN cannot route to a private address.

        Mitigated by FilterPublicIPs in provider.go (the single
        chokepoint), protected by invariant
        dnsprovider.private_ips_must_not_publish_to_public_dns.
      affects:
        files:
          - golang/cluster_controller/cluster_controller_server/internal/dnsprovider/provider.go
          - golang/cluster_controller/cluster_controller_server/internal/dnsprovider/cloudflare.go
          - golang/cluster_controller/cluster_controller_server/internal/dnsprovider/rfc2136.go
        symbols:
          - FilterPublicIPs
      detection: |
        Direct: grep for `UpsertA` / `UpsertAAAA` implementations in
        internal/dnsprovider/ that do NOT call FilterPublicIPs
        before transmitting.
        Runtime: `dig +short A <fqdn> @8.8.8.8` returning an IP
        in 10/8, 172.16/12, 192.168/16, fc00::/7, or fe80::/10.
      related_invariants:
        - dnsprovider.private_ips_must_not_publish_to_public_dns
    - id: mcp.governor_bypass_via_ad_hoc_execute_tool
      title: A non-governor MCP tool grows an ad-hoc execute branch and bypasses plan/validate/approve
      severity: critical
      status: active
      summary: |
        The MCP governor (golang/mcp/tools_governor.go) implements the only
        sanctioned execution path: plan → validate → check_approval → execute.
        Each step is a separate MCP tool with the operator approving a
        specific plan id between validate and execute.

        A new MCP tool that calls exec.Command (or any other side-effecting
        runner) outside the governor — e.g. a "convenience" execute branch
        added to a knowledge tool like tools_cli.go, or a per-domain
        execute helper added to tools_workflow.go — defeats the
        operator-in-the-loop contract. Agents would be able to perform
        cluster-affecting actions without an approved plan id, which is
        exactly what the governor exists to prevent.

        Mitigated today by the structural property that os/exec inside the
        mcp/ package appears only in tools_governor.go. A future regression
        test should grep the mcp/ tree for `os/exec` imports outside
        tools_governor.go and fail on additions.
      affects:
        files:
          - golang/mcp/tools_governor.go
          - golang/mcp/tools_cli.go
        symbols:
          - registerGovernorTools
      detection: |
        Direct: grep for `"os/exec"` import or `exec.Command` call in
        any golang/mcp/*.go file other than tools_governor.go.
        Runtime: an audit log line shows a tool other than
        globular_cli.execute/execute_plan invoking a CLI command.
      related_invariants:
        - mcp.governor.plan_validate_approve_execute_is_only_execute_path
    - id: mcp.file_tool_host_fs_escape
      title: MCP file tool reads or writes the host filesystem directly, bypassing the file service RBAC + audit
      severity: critical
      status: active
      summary: |
        tools_file.go is supposed to forward every file operation to the
        Globular file service over gRPC. The file service enforces
        per-user mount roots, per-resource RBAC, and writes an audit log
        entry for every access.

        A regression that calls os.ReadFile / os.WriteFile / filepath.Walk
        inside an MCP file tool — typically as a "fallback when the file
        service is unreachable" or a "fast path for files under safe
        paths" — gives an agent direct access to the host filesystem
        of the MCP process. Depending on which user the MCP process runs
        as, that can include /var/lib/globular/pki/, other tenants' data,
        and arbitrary host config.

        Mitigated by routing every handler through the file service
        client. The bridge MUST NOT import os or io/ioutil for path
        access; the only acceptable I/O in tools_file.go is gRPC bytes
        in/out of the file service.
      affects:
        files:
          - golang/mcp/tools_file.go
        symbols:
          - registerFileTools
      detection: |
        Direct: grep for `os.ReadFile`, `os.WriteFile`, `os.Open`,
        `os.Create`, `filepath.Walk`, `ioutil.ReadFile`, `ioutil.WriteFile`
        inside tools_file.go. Any match is a violation.
        Runtime: agent successfully reads/writes a path that the file
        service would have rejected for the same caller identity.
      related_invariants:
        - mcp.file_tool_uses_file_service_not_host_fs
    - id: mcp.etcd_remote_allowlist_expansion
      title: Direct etcd MCP tool added to the cross-node aggregator remote_call allowlist
      severity: critical
      status: active
      summary: |
        golang/mcp/aggregator_policy.go's allowedRemoteTools is the closed
        allowlist of tools that one node's MCP server may invoke on another
        via mcp.remote_call. Every entry is READ-ONLY by current policy.

        Adding etcd_get / etcd_put / etcd_delete to the allowlist —
        whether "just temporarily for debugging" or "to support a new
        cross-node introspection use case" — would let any peer MCP
        server mutate this node's view of cluster state without an
        audit trail or controller-side guard. The blast radius is
        cluster-wide (etcd is the source of truth for every
        subsystem) and silent (mutations propagate without a workflow
        record).

        Mitigated structurally: the allowlist is a Go map literal in
        source, reviewed at code-review time. A regression test that
        scans allowedRemoteTools at startup and rejects any prefix
        match against `etcd_` or `etcdctl` would harden this further.
      affects:
        files:
          - golang/mcp/aggregator_policy.go
          - golang/mcp/tools_etcd.go
        symbols:
          - allowedRemoteTools
      detection: |
        Direct: grep allowedRemoteTools in aggregator_policy.go for any
        key starting with `etcd_` or matching the tool names registered
        by tools_etcd.go.
        Runtime: an mcp.remote_call audit entry where the tool name is
        any etcd_* would have succeeded — should be a hard policy reject.
      related_invariants:
        - mcp.etcd.tools_must_not_join_remote_allowlist
    - id: release.publish_race_stuck_failed_with_succeeded_children
      title: ServiceRelease stays FAILED after publish race while drift-reconciler reports child workflows SUCCEEDED with no actual install
      severity: critical
      status: active
      summary: |
        When `globular services desired set <svc> <ver>` is invoked
        immediately after `pkg publish`, the controller's first
        reconcile cycle may race the repository's indexing of the
        new artifact. The release-resolver returns "no published
        artifact found" → ensureServiceRelease moves
        ServiceRelease to phase=FAILED.

        On subsequent cycles the release-resolver does find the
        artifact (resolved build=1). The drift-reconciler then
        reports `child_status=SUCCEEDED` on every reconcile pass —
        but no actual install workflow is dispatched to the
        node-agent. The release stays in FAILED while the
        apparent success metrics tick. Operators see "everything
        succeeded" in workflow runs while convergence is stalled.

        Observed live during Phase 23 release (v0.0.19) on
        2026-06-03 03:32:02 (FAILED) → 03:32:33+ (succeeded
        children with no install). Worked around by
        `sudo globular services apply-desired` against the local
        controller bypassing the mesh, then a manual systemd
        restart of the target service.

        The root cause is the FAILED phase: once a ServiceRelease
        is FAILED, subsequent reconcile cycles need an explicit
        recovery path (re-PENDING) to re-drive the install. The
        drift-reconciler's child workflow returns SUCCEEDED
        trivially because it sees the release as terminal.
      affects:
        files:
          - golang/cluster_controller/cluster_controller_server/release_reconciler.go
          - golang/cluster_controller/cluster_controller_server/reconcile_runtime.go
        symbols:
          - ensureServiceRelease
          - reconcileServiceRelease
      detection: |
        Direct: grep controller logs for "ServiceRelease ... reconciling phase=FAILED"
        followed by repeated "drift-reconciler ... dispatching" + "item terminal:
        ... child_status=SUCCEEDED" — if the installed version on the target node
        does not match desired, this is the class.
        Runtime: a release whose Status.Phase=FAILED but whose drift-reconciler
        keeps reporting child SUCCEEDED is the diagnostic signature.
      related_invariants:
        - release.failed_state_requires_explicit_recovery_or_requeue
    - id: envoy.lds_update_attempt_zero_despite_cds_progress
      title: Envoy consumes CDS updates but never attempts LDS — listener_manager.lds.update_attempt stays 0 while cds progresses
      severity: critical
      status: active
      summary: |
        Envoy accepts CDS responses from xDS (admin /clusters
        shows 26 clusters loaded, cds.update_success increments
        every 5s). But listener_manager.lds.update_attempt
        remains 0 — Envoy never even attempts to fetch listeners
        from the same ADS stream that delivers clusters.

        Result: Envoy stays in server state PRE_INITIALIZING,
        port 443 returns connection refused, all mesh-routed
        traffic (MCP HTTP, controller RPCs via mesh, browser
        diagnostics) fails. Direct gRPC to per-service ports
        (e.g. 10120 for awareness-graph) still works because
        those bypass Envoy entirely.

        xDS-side: the snapshot in
        Globular/internal/xds/builder/builder.go correctly
        builds 2 listeners per snapshot and the xDS service log
        confirms "xDS snapshot pushed" with listener resources
        present. The gap is on the Envoy consumer side — likely
        a node-id mismatch, a silent LDS rejection, or a
        bootstrap config that disables LDS even though it claims
        ads-based lds_config.

        Cluster-doctor's grpc_backbone_contract rule does NOT
        currently detect this — it checks gRPC reachability,
        not LDS update attempts. A future doctor rule should
        compare Envoy admin /stats listener_manager.lds.*
        against expected values.

        Observed live during Phase 23 (2026-06-03 03:44+) after
        a service install storm caused Envoy to be SIGTERM'd
        and the systemd start-limit-hit prevented further
        restarts.
      affects:
        files:
          - golang/node_agent/node_agent_server/xds_config_reconcile.go
        symbols:
          - reconcileXDSConfig
      detection: |
        Direct: `curl http://127.0.0.1:9901/stats?filter=listener_manager.lds`
        on the Envoy host. If lds.update_attempt=0 while cds.update_attempt > 0,
        this is the class.
        Runtime: `curl http://127.0.0.1:9901/server_info` shows state
        PRE_INITIALIZING. Mesh ports 443/8443 return connection refused
        but per-service ports are reachable.
      related_invariants:
        - envoy.lds_progress_required_for_http_mesh_readiness
    - id: node_agent.install_skip_without_service_config_update
      title: Node-agent install-skip path returns success without refreshing the service-config etcd record
      severity: critical
      status: active
      summary: |
        grpc_workflow_skip.go's canSkipInstallPackage may return
        installSkipResultAlreadyInstalled when the binary on
        disk matches the desired entrypoint_checksum AND the
        systemd unit is active. The caller treats this as
        success and does NOT push an updated service-config
        record to etcd.

        Consequence: the binary on disk is correctly at the new
        version (e.g. v0.0.19) but
        /globular/services/<svc>/config.Version still records
        the previous version (e.g. v0.0.18). The 4-layer truth
        model now disagrees: Layer 3 (installed) says new,
        Layer 4 (runtime) says new, but Layer 2 (desired)
        records the old version because etcd is wrong.

        Surfaces as: `globular services desired set <svc> <new>`
        + `apply-desired` reports "already installed" + the
        service config_get returns the OLD version while
        running the NEW binary. Sibling of
        service.old_pid_after_upgrade — same family of "install
        completed but state record didn't update."

        Observed live during Phase 23 (2026-06-03 03:38) with
        awareness-graph v0.0.19.
      affects:
        files:
          - golang/node_agent/node_agent_server/grpc_workflow_skip.go
        symbols:
          - canSkipInstallPackage
          - installSkipResultAlreadyInstalled
      detection: |
        Direct: compare `mcp__globular__service_config_get <svc>` Version
        field against the binary's `--version` output on the host. A
        mismatch where the binary is newer than the etcd record after a
        recent `apply-desired` indicates the skip path didn't refresh
        the service config.
        Runtime: workflow runs report status SUCCEEDED with version
        equal to the OLD version while the binary on disk is the NEW
        version.
      related_invariants:
        - node_agent.install_skip_must_refresh_runtime_proof
