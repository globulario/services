        - TestEnsureMirrorDurability_AlreadyInMirrorIsIdempotent
      root_cause: |
        promoteToPublished verified the blob in the seeding node's LOCAL POSIX CAS (correct — local
        CAS is the installability authority) but did NOT verify the blob was durably in the shared
        MinIO mirror before flipping to PUBLISHED. The upload's mirror write is best-effort
        (ResilientStorage.WriteFile logs and continues on mirror failure), so a transient mirror
