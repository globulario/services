        - etcd
      required_tests:
        - TestPublishWaveStateInfraSkipsApplyWhenMessageUnchanged
        - TestPublishWaveStateServiceSkipsApplyWhenMessageAndReasonUnchanged
      root_cause: |
        Status writers in cluster_controller that go through the patch helpers (patchInfraReleaseStatus,
        patchReleaseStatus) inherit an equality guard that compares Phase/Message/TransitionReason
        before calling resources.Apply. Writers that bypass those wrappers and call resources.Apply
        directly (publishWaveState, status announcers, periodic re-stampers) have no such guard:
        every invocation produces a new MVCC revision even when the resulting status is byte-identical
        to the previous one. Repeated workflow dispatches against the same release multiply the bloat.
      severity: high
      symptoms:
        - a single InfrastructureRelease or ServiceRelease key shows extreme MVCC version count (tens of thousands) in etcdctl get --write-out=fields
        - etcd database grows quickly between compactions even though only a handful of releases exist
        - re-dispatch loops (e.g. envoy restart-storm) amplify the bloat because every workflow invocation rewrites the same record N times
        - cumulative write-load (version × value_size) is dominated by a small number of release records
      title: release status writer bypasses the equality guard and rewrites InfrastructureRelease/ServiceRelease records on every call, causing etcd MVCC bloat
