        - objectstore.minio.fingerprint_divergence fires for nodes that have actually rendered the correct topology
        - Doctor report shows quorum loss immediately after a partial etcd read error
        - Evidence shows data_incomplete=true alongside all pool nodes in the no_inventory bucket
        - Restarting the cluster doctor makes the CRITICAL finding disappear without any MinIO change
      title: Partial objectstore snapshot classifies absent nodes as known-down, firing false quorum-loss findings
    - architecture_fix: |
        A PUBLISHED artifact must be recoverable on every repository instance. promoteToPublished
        calls ensureMirrorDurability AFTER local verification and BEFORE declaring PUBLISHED: if a
        mirror is configured and the blob is absent from it, re-push the locally-verified bytes and
        verify. Respect repository.minio_independence — NEVER block publish when the mirror is
        unconfigured or unreachable; log a deferred-durability warning instead. Closing the
        mirror-unreachable-at-publish window fully requires a local→mirror reconciler (separate).
