    - affects:
        files:
            - golang/mcp/tools_file.go
        symbols:
            - registerFileTools
      detection: |
        Direct: grep for `os.ReadFile`, `os.WriteFile`, `os.Open`,
        `os.Create`, `filepath.Walk`, `ioutil.ReadFile`, `ioutil.WriteFile`
        inside tools_file.go. Any match is a violation.
