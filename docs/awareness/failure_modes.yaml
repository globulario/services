    - id: controller.apply_package_missing_expected_sha256_blocks_verified_install
      known_bad_fixes:
        - disabling the node-agent verify gate so missing expected_sha256 returns SUCCESS
        - synthesizing expected_sha256 from the binary already on disk
        - parsing filename to derive expected_sha256
        - mutating desired state to match installed runtime after verification fails
        - adding a parallel ApplyPackageRelease dispatch path that bypasses manifest resolution
        - passing the package tarball sha256 as ExpectedSha256 (hash-schema confusion)
      related_invariants:
        - meta.half_done_must_not_look_done
        - controller.apply_package_release_requires_manifest_checksum
        - runtime.success_requires_expected_binary_checksum
        - desired_installed_runtime_identity_must_match
      required_tests:
        - TestDispatch_PopulatesExpectedSha256FromManifest
        - TestDispatch_EmptyManifestChecksumPropagatesAsEmpty
        - TestDispatch_ControllerDeployPropagatesExpectedSha256
        - TestDispatch_ControllerDeployEmptyExpectedSha256PropagatesAsEmpty
        - TestDispatch_WithBlockOverridesInputs
        - TestDispatch_AuditAllCallSitesSetExpectedSha256
        - TestDispatch_ResolverEntrypointChecksumIsBinaryHash
      resolution: |
        v1.2.119: every controller ApplyPackageRelease dispatch resolves
        manifest.entrypoint_checksum (BINARY sha256) and passes it as
        ExpectedSha256. RunPackageReleaseWorkflow accepts
        resolved_entrypoint_checksum and propagates it through workflow inputs
        into the install_package step. ControllerDeployConfig.ApplyPackageRelease
        and NodeDirectApplyConfig.InstallPackage both grew an expectedSha256
        parameter. The audit test TestDispatch_AuditAllCallSitesSetExpectedSha256
        walks every ApplyPackageReleaseRequest literal in the source tree and
        fails if a new site is added without ExpectedSha256 set (or without an
        explicit allow-list entry documenting the degraded exception).
      root_cause: |
        The v1.2.116 node-agent verify gate (verifyInstalledBinaryHashStrict) requires
        expected_sha256 to declare BinaryVerified. Without it the gate returns
        BinaryUnverified and the caller writes installed_unverified with Ok=false.
        Until v1.2.119, the controller-side dispatch chain (remoteApplyPackageRelease,
        followerSelfApply, release.apply.package and release.apply.controller
        workflows) never propagated manifest.entrypoint_checksum from the resolver
        into the apply request — even though ReleaseResolver.Resolve already read
        the value. The dispatch path simply dropped it.

        followerSelfApply additionally used target.Checksum (PACKAGE TARBALL sha256
        prefixed with "sha256:") as ExpectedSha256, a hash-schema confusion that
        guaranteed failed_binary_hash_mismatch on every self-update.
      severity: critical
      symptoms:
        - node-agent install-package writes installed_unverified with reason "no expected_sha256 provided in apply request"
        - drift-reconciler redispatches every 30 seconds because Ok=false from the apply
        - cluster_doctor reports controller.apply_package_missing_expected_sha256_blocks_verified_install
        - normal install pipeline never reaches Status=installed; bridge-recovery is repeatedly needed
        - controller-self-update dispatches package digest as ExpectedSha256 and every apply fails with failed_binary_hash_mismatch
      title: Controller dispatch builds ApplyPackageRelease without expected_sha256, blocking verified install success
    - architecture_fix: |
        Make the breaker EDGE-triggered: act only on the closed->open transition. Once open with no
        half-open probe outstanding, additional failures are recorded in the rolling window but do
        NOT re-arm the cooldown, reset the probe, re-increment the open counter, or re-log. Only a
        failed half-open probe re-arms the cooldown (a genuine new attempt). One logical open ==
        one counter increment == one log line.
      forbidden_fixes:
        - raise_doctor_pressure_threshold_to_hide_burst
        - suppress_circuit_open_log_without_fixing_amplification
        - level_triggered_breaker_reopen_on_every_failure
      id: controller.circuit_breaker.level_triggered_burst_amplification
      related_invariants:
        - meta.failure_response_must_contract_not_amplify
        - meta.diagnostic_output_must_be_bounded
      related_services:
        - cluster-controller
      required_tests:
        - TestWorkflowGateBurstOpensExactlyOnce
        - TestReconcileBreakerBurstOpensExactlyOnce
      root_cause: |
        workflowHealthGate.RecordFailure (and the sibling reconcileCircuitBreaker.RecordTimeout)
        used a level-triggered open condition: `if len(failures) >= threshold { open... }`.
        During bring-up the reconciler dispatches many releases concurrently; when the workflow
        backend is briefly unready, a burst of ExecuteWorkflow RPCs fails near-simultaneously.
        Every failure past the threshold re-ran the open logic — re-arming circuitOpenUntil,
        resetting the half-open probe, re-incrementing the open counter, and re-logging — so one
        logical open event was amplified into N (26 observed on 2026-06-09). Re-arming the cooldown
        on each concurrent failure also extends the open window and can starve the half-open probe.
      severity: medium
      symptoms:
        - workflow_circuit_breaker_open_total jumps by tens in under a second (observed 26 in ~1s)
        - controller log shows "circuit OPEN — N failures" repeated with N climbing 5,6,7,... within the same second
        - cluster-doctor reports "Workflow dispatch pressure SUSTAINED" with a large workflow_dispatch_rejected_total during/after bring-up
        - finding self-clears at the 15m window (rate_5m == 0) because the underlying backend recovered on its own
      title: Circuit breaker re-opens on every failure past threshold, amplifying one bring-up blip into N opens
    - architecture_fix: |
        1. Verify etcd is healthy first: etcdctl alarm list (must be empty), etcdctl endpoint health (all healthy)
        2. Watch controller logs for "acquired leader lease" — do not intervene before this
        3. Do NOT restart controller processes before etcd is stable — restarts add more lease write load
        4. If lease not acquired within 5 min after etcd stabilises, check for split-brain (two leaders)
      forbidden_fixes:
        - controller.restart_before_etcd_stable
        - controller.kill_to_clear_lease_contention
      id: controller.lease_expired_due_to_etcd_instability
      related_invariants:
        - meta.critical_path_no_non_critical_dependency
      related_services:
        - cluster_controller
        - etcd
      required_tests:
        - TestOfflineDiagnose_ControllerLeaseExpired_MapsToCorrectFailureMode
        - TestSuggestIncident_ControlPlaneCascade_EtcdFirst
      root_cause: |
        The cluster controller renews its leader lease by writing to etcd. When etcd
        cannot commit writes (NOSPACE alarm) or has no stable leader, lease renewal fails.
        All controller instances detect lease expiry and attempt re-election simultaneously,
        flooding etcd with new lease write attempts — which also fail if NOSPACE is still
        active. The result is a re-election storm that continues until etcd is healthy.
      severity: high
      symptoms:
        - '''lease expired, attempting re-election'' in controller logs'
        - no controller holds the leader lease — all controllers in re-election loop
        - reconciler produces no changes to desired state
        - workflow steps are not dispatched
        - etcd shows concurrent write attempts from multiple controller instances
      title: controller leader lease expired because etcd cannot commit writes during NOSPACE or leader instability
    - architecture_fix: |
