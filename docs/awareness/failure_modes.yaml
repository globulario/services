failure_modes:
    - id: service.desired_state.pipeline_gap
      title: platform-upgrade omits ServiceDesiredVersion records during early bootstrap
      severity: high
      symptoms:
        - services show 1/2 or 0/N in cluster status (installed on some nodes only)
        - controller reconciler never dispatches install workflows for service packages
        - ServiceDesiredVersion records missing from etcd for published service packages
        - running "globular services desired set NAME VERSION" manually fixes the symptom per-service
        - infra packages converge normally but workload services do not install
      root_cause: |
        platform-upgrade wrote ServiceDesiredVersion records via the gRPC UpsertDesiredService
        RPC, which routes through Envoy on port 443. During early Day-0/Day-1 bootstrap the
        mesh may not yet be routing, causing those calls to fail silently. Infrastructure
        packages were unaffected because their path writes directly to etcd. The result is
        that all service packages in the BOM have no desired state record and the controller
        reconciler is entirely unaware of them.
      architecture_fix: |
        platform-upgrade must write ServiceDesiredVersion records directly to etcd
        (key: /globular/resources/ServiceDesiredVersion/{name}) using the same approach
        as updateInfraReleaseVersion. Direct etcd writes are mesh-independent and work
        at any bootstrap phase. The controller reads these records from etcd on every
        reconcile tick regardless of how they were written.
      forbidden_fixes:
        - manually_seeding_desired_state_per_node
        - skipping_service_packages_from_bom
        - writing_desired_state_via_grpc_only_during_bootstrap
      related_invariants:
        - service.desired_state.bom_completeness
      related_services:
        - cluster-controller
        - globularcli
      required_tests:
        - TestPlatformUpgradeWritesServiceDesiredVersionWithoutMesh
        - TestAllBOMPackagesHaveDesiredState

    - id: release.failed.wave_succeeded_commit_error
      title: ServiceRelease stays FAILED after wave succeeds when workflow commit RPC fails
      severity: medium
      symptoms:
        - ServiceRelease phase is FAILED or DEGRADED
        - 'message contains WAVE_BLOCKED ... note=RUN_STATUS_SUCCEEDED'
        - packages ARE installed on all nodes (etcd installed records present, checksums match)
        - blocked_reason is workflow_unavailable or workflow_handler_missing
        - no active workflow runs for affected releases
        - health checks show version:X as ok but release status shows FAILED
      root_cause: |
        After a workflow wave completes successfully (packages installed on all nodes), the
        workflow executor writes the final phase-commit RPC to the controller. If the workflow
        service restarts, loses its gRPC connection, or reallocates its port at that exact
        moment, the commit RPC fails. The ServiceRelease is left in FAILED/DEGRADED with
        WAVE_BLOCKED message even though the packages are installed and correct. The reconciler
        self-heals via signal #2 (node heartbeat reports correct installed version) but only
        after the retry backoff expires and a no-op workflow verifies convergence.
      architecture_fix: |
        The reconciler already has a self_healed_converged path in reconcileFailed: when all
        nodes report the desired version via heartbeat (signal #2 in hasUnservedNodes), the
        release is re-entered as PENDING → workflow runs verify_installed → AVAILABLE.
        No code change needed for self-heal. To reduce the recovery window, the retry backoff
        can be shortened when desired_hash matches all installed checksums. Separately, the
        workflow service must not reallocate its port mid-install (fix: ExecStartPre kill
        guard before the new process starts).
      forbidden_fixes:
        - manually_patching_release_phase_to_available
        - skipping_workflow_run_to_force_available
        - marking_release_available_from_local_success
      related_invariants:
        - install.result.atomic_commit
        - convergence.no_infinite_retry
      related_services:
        - cluster-controller
        - workflow-service
      required_tests:
        - TestServiceReleaseRecoveryAfterWorkflowCommitFailure
        - TestWaveBlockedSucceededSelfHeals

    - id: install.desired_state.invisible_service
      title: Service never installs on any node because ServiceDesiredVersion record is absent
      severity: high
      symptoms:
        - service shows 0/N instances in cluster status
        - no ServiceRelease record exists for the service
        - no install workflows ever dispatched for the service
        - cluster node full-status shows version check failing with "not installed (desired X)"
        - repository has a published artifact for the service
      root_cause: |
        The controller reconciler only manages services that have a ServiceDesiredVersion
        record in etcd. If that record is missing (never written by platform-upgrade, or
        written via gRPC when the mesh was down, or never added to the BOM), the reconciler
        is completely unaware of the service. Profile-aware dispatch and dependency ordering
        are both irrelevant — the service is invisible at the Desired layer.
      architecture_fix: |
        Ensure ServiceDesiredVersion records are written as part of every publish and
        platform-upgrade pipeline run. Use direct etcd writes (not gRPC) so bootstrap
        timing cannot cause silent omissions. Doctor should detect published-but-undesired
        services and emit a SEVERITY_WARN.
      forbidden_fixes:
        - manually_running_services_desired_set_per_service
        - assuming_publish_implies_desired_state
      related_invariants:
        - service.desired_state.bom_completeness
      related_failure_modes:
        - service.desired_state.pipeline_gap
      related_services:
        - cluster-controller
        - repository
        - globularcli
      required_tests:
        - TestPublishedServiceWithoutDesiredStateDetectedByDoctor

    - id: install.result.partial_commit
      title: Leader dies during install result promotion
      severity: critical
      symptoms:
        - node-agent completed package install locally
        - etcd installed-state missing
        - reconciler dispatches same install repeatedly
        - action result exists without promotion
      root_cause: |
        Installed-state, result promotion, and action cleanup were committed as separate etcd writes. Leader failover could leave partial state.
      architecture_fix: |
        Commit installed-state, result promotion, and action cleanup in one etcd transaction.
      forbidden_fixes:
        - retry_install_blindly
        - clear_action_before_installed_state
        - mark_release_available_from_local_success
      related_invariants:
        - install.result.atomic_commit
        - convergence.no_infinite_retry
      related_services:
        - cluster-controller
        - node-agent
        - workflow-service
      required_tests:
        - TestLeaderFailoverDuringResultCommit
        - TestPendingSyncRecovery
    - id: objectstore.local_membership_inference
      title: Node-agent infers MinIO membership from local disk
      severity: critical
      symptoms:
        - MinIO starts on a node not in ObjectStoreDesiredState
        - objectstore topology generation mismatch
        - split-brain objectstore writes
        - data loss on erasure-coded pool
      root_cause: |
        Node-agent checked local disk state (e.g., minio data directory exists) to decide whether to start MinIO, instead of reading ObjectStoreDesiredState from etcd.
      architecture_fix: |
        Node-agent must only start MinIO when the node is present in ObjectStoreDesiredState. Local disk state is irrelevant to membership.
      forbidden_fixes:
        - start_minio_from_local_health_check
        - infer_minio_membership_from_disk
      related_invariants:
        - objectstore.topology_contract
      related_services:
        - node-agent
        - repository
      required_tests:
        - TestMinioHeldWhenNodeNotInPool
        - TestTopologyRenderParity
    - id: deterministic.install.failure.retry_loop
      title: Deterministic install failure causes infinite retry loop
      severity: high
      symptoms:
        - same install action dispatched repeatedly
        - action count for same package grows unbounded
        - controller log flooded with same failure message
        - cluster convergence never completes
      root_cause: |
        Reconciler treated a deterministic failure (e.g., artifact not found, checksum mismatch, wrong architecture) as transient and retried on every tick without classifying the failure or marking the action BLOCKED.
      architecture_fix: |
        Classify failures before retry: transient errors get bounded backoff, deterministic errors become BLOCKED and require input change to unblock.
      forbidden_fixes:
        - blind_reconcile_retry
        - treating_all_failures_as_transient
      related_invariants:
        - convergence.no_infinite_retry
      related_services:
        - cluster-controller
        - node-agent
      required_tests:
        - TestDeterministicFailureDoesNotRetryForever
    - id: repository.minio.recovery_cycle
      title: Repository and MinIO form a recovery deadlock
      severity: critical
      symptoms:
        - node-agent cannot install packages during recovery
        - repository reports MinIO unavailable
        - MinIO cannot start because node-agent cannot install it
      root_cause: |
        node-agent depends on repository during package_install (required). repository depends on MinIO for blob reads (required). MinIO depends on node-agent to install its binary. This creates a required cycle during the recovery phase.
      architecture_fix: |
        Repository must be able to serve metadata without MinIO (metadata_first invariant). MinIO bootstrap must use a local BOM cache path. node-agent bootstrap must use local_bom_cache during recovery, not network repository.
      forbidden_fixes:
        - gate_metadata_reads_on_minio_health
        - store_artifact_index_only_in_minio
      related_invariants:
        - repository.metadata_first
        - objectstore.topology_contract
      related_services:
        - node-agent
        - repository
      required_tests:
        - TestListArtifactsWhenMinIODown
        - TestBootstrapRecoveryWithLocalBOMCache
    - id: workflow.backend_unavailable
      title: Workflow dispatched when backend is down
      severity: high
      symptoms:
        - workflow records created with no executor
        - workflow stays in RUNNING state forever
        - action results never committed
        - cluster state diverges from desired
      root_cause: |
        Workflow dispatch did not check backend (Scylla) health before creating the workflow record. Records written during Scylla instability may be orphaned if the write partially succeeds.
      architecture_fix: |
        Workflow dispatch must perform a health preflight check. If Scylla is degraded, dispatch must return an error and let the caller retry with backoff.
      forbidden_fixes:
        - dispatch_workflow_when_scylla_down
        - ignore_backend_health_on_dispatch
      related_invariants:
        - workflow.backend_health_gate
      related_services:
        - workflow-service
        - cluster-controller
      required_tests:
        - TestWorkflowDispatchRefusedWhenScyllaDown
    - id: annotation_scanner_false_positive
      title: Text-based annotation scanner flags string literal content as real annotations
      severity: MEDIUM
      symptoms:
        - awareness audit reports ERRORs from _test.go files, not production code
        - 'Flagged lines are inside backtick string literals that embed intentionally-malformed //globular: patterns'
        - CI gate exits 1 despite no real annotation defect
      root_cause: |
        ValidateAnnotations uses line-level text scanning (strings.Split + TrimSpace prefix check). Any line matching the //globular: prefix — even inside multi-line raw string literals — is treated as a real annotation. Test fixture files intentionally embed malformed annotation strings to exercise the validator, causing false-positive ERRORs from the package's own tests.
      architecture_fix: |
        Skip _test.go files in ValidateAnnotations, consistent with the goast extractor convention (production //globular: annotations are never written in test files). Single-line WalkDir filter change: !strings.HasSuffix(path, ".go") || strings.HasSuffix(path, "_test.go").
      related_services:
        - awareness/enforce
      required_tests:
        - TestValidateAnnotationsSkipsTestFiles
    - id: scylla.critical_keyspace_under_replicated
      title: Critical Scylla keyspace replication factor below policy
      severity: critical
      symptoms:
        - Scylla keyspace RF=1 on multi-node cluster
        - doctor emits scylla.keyspace.rf_policy_violation
        - repair_required=true in schema guard status
        - keyspace data at risk if any storage node fails
      root_cause: |
        Cluster storage node count increased but RF was not raised to match policy. Or ALTER TABLE failed silently.
      architecture_fix: |
        schema guard must detect RF < required, emit finding, publish repair_required, and enqueue repair action. Never auto-lower RF.
      forbidden_fixes:
        - auto_lower_replication_factor
        - ignore_rf_violation_in_multi_node
      related_invariants:
        - scylla.critical_keyspace_replication_policy
      related_services:
        - cluster-controller
        - scylladb
      required_tests:
        - TestRFPolicyEnforcedOn5NodeCluster
        - TestRFPolicyAllowsRF1OnSingleNode
    - id: desired.bootstrap_premature_convergence
      title: Bootstrap state treated as authoritative desired state
      severity: critical
      symptoms:
        - first-boot cluster marks convergence before promotion runs
        - bootstrap records appear in installed-state as final
        - node-agent installs from unvalidated seed data
      root_cause: |
        Desired-state records lacked source/authoritative fields. Controller promotion reconciler not implemented. Consumers treated any written record as final.
      architecture_fix: |
        Add source=bootstrap/authoritative=false fields. Require controller promotion pass before records are considered final. Consumers reject bootstrap records as non-final.
      forbidden_fixes:
        - treat_bootstrap_state_as_authoritative
        - claim_convergence_from_bootstrap_records
      related_invariants:
        - desired.bootstrap_state_requires_promotion
      related_services:
        - cluster-controller
        - node-agent
      required_tests:
        - TestBootstrapRecordIgnoredAsFinalByConsumers
        - TestFirstBootClaimsConvergenceOnlyAfterPromotion
    - id: critical_state.absent_key_interpreted_as_stop
      title: Missing etcd key causes runtime shutdown
      severity: critical
      symptoms:
        - keepalived/envoy/minio stops without explicit disable intent
        - runtime shut down after etcd key deleted or expired
        - no explicit_disabled=true in any spec
      root_cause: |
        Consumer interpreted missing key as a stop command rather than holding LKG. Absence == destructive intent was the implicit policy.
      architecture_fix: |
        Consumer policy must be missing/timeout/invalid => HOLD_LAST_KNOWN_GOOD. Only explicit valid disable spec may stop runtime.
      forbidden_fixes:
        - stop_runtime_on_missing_key
        - delete_runtime_on_timeout
        - treat_invalid_spec_as_disable_intent
      related_invariants:
        - critical_state.absence_is_not_destructive_intent
      related_services:
        - node-agent
        - cluster-controller
      required_tests:
        - TestMissingKeyDoesNotStopRuntime
    - id: runtime.lkg_corrupt_or_missing
      title: Last-known-good state corrupt or absent causing service interruption
      severity: high
      symptoms:
        - service restarts with empty config after etcd outage
        - LKG file checksum mismatch detected on load
        - service loses routing config during control-plane blip
      root_cause: |
        LKG write was not atomic (no tmp+fsync+rename), or generation guard was absent, or LKG was overwritten with invalid state.
      architecture_fix: |
        LKG write must be atomic. Checksum and monotonic generation validation required. Corrupt LKG must be rejected and prior valid state retained, not deleted.
      forbidden_fixes:
        - overwrite_lkg_with_invalid_state
        - ignore_lkg_when_authority_unavailable
        - accept_corrupt_lkg
      related_invariants:
        - runtime.last_known_good_required_for_critical_consumers
      related_services:
        - node-agent
        - envoy
        - minio
      required_tests:
        - TestCorruptLKGRejectedPriorStateRetained
        - TestAtomicLKGWriteSurvivesRestart
    - id: critical_state.unregistered_key_governance
      title: Critical etcd key has no registered owner or policy
      severity: high
      symptoms:
        - doctor detects missing key but no restoration occurs
        - unknown writer overwrites critical key without rejection
        - delete policy missing for class-A key
      root_cause: |
        Critical key not in config.CriticalEtcdKeys or critical_state_registry. No owner, schema, restore strategy, or delete approval policy defined.
      architecture_fix: |
        All critical keys must be in the registry with complete governance fields. Doctor iterates registry to detect missing/invalid/stale keys automatically.
      forbidden_fixes:
        - write_critical_key_without_registered_owner
        - delete_critical_key_without_policy
        - accept_unknown_writer_for_critical_state
      related_invariants:
        - critical_state.registry_ownership_required
      related_services:
        - cluster-controller
        - cluster-doctor
      required_tests:
        - TestRegistryKeyHasCompletePolicy
    - id: critical_state.accidental_key_deletion
      title: Critical desired-state key deleted without approval
      severity: critical
      symptoms:
        - ingress spec missing from etcd without any explicit operator action
        - VIP stops floating without keepalived being intentionally disabled
        - critical key disappears and is not auto-restored
      root_cause: |
        No delete-approval marker required. Any etcd client with write permission could delete the key, and the controller did not restore it on next cycle.
      architecture_fix: |
        Controller must restore missing critical keys unless a valid delete-approval marker exists with matching generation and leader identity.
      forbidden_fixes:
        - delete_desired_state_without_approval_marker
        - treat_missing_key_as_delete_intent
        - accept_stale_delete_approval
      related_invariants:
        - critical_state.deletion_requires_audited_intent
      related_services:
        - cluster-controller
      required_tests:
        - TestDeleteWithoutApprovalRestoresKey
        - TestDeleteWithValidApprovalAccepted
    - id: reconcile.lane_starvation
      title: Blocked reconcile phase starves completion and critical publishers
      severity: high
      symptoms:
        - ingress spec not republished despite new desired state
        - release lane blocked behind stuck projection rebuild
        - controller log shows lane "previous run still active"
      root_cause: |
        Reconcile lanes share a single goroutine or lock. One blocked phase (projection scan, Scylla slow query) prevents all other lanes from running.
      architecture_fix: |
        Isolated lane executors with per-lane timeout and independent "previous run active" tracking. Emergency lane always runnable.
      forbidden_fixes:
        - start_new_global_work_while_completion_is_blocked
        - allow_reconcile_tick_to_starve_terminal_commit
      related_invariants:
        - reconcile.global_work_must_not_starve_completion
      related_services:
        - cluster-controller
      required_tests:
        - TestProjectionHangDoesNotBlockReleaseLane
    - id: critical_queries.unbounded_hang
      title: Unbounded query blocks critical reconcile loop
      severity: high
      symptoms:
        - controller reconcile tick takes >60s
        - DNS reconciler hangs on backend query
        - watchdog fires because controller stops heartbeating
      root_cause: |
        Critical control-path query ran without context deadline. Scylla/etcd/DNS backend slow or unresponsive; query blocks indefinitely.
      architecture_fix: |
        All critical control-path queries must use bounded context with 5-15s deadline. Timeout must map to DEGRADED result category, not hang.
      forbidden_fixes:
        - run_unbounded_query_in_reconcile_path
        - ignore_context_timeout_in_critical_query
        - block_controller_loop_on_external_query
      related_invariants:
        - critical_queries.must_be_bounded
      related_services:
        - cluster-controller
        - dns
      required_tests:
        - TestQueryTimeoutMappedToDegradedCategory
    - id: derived_state.projection_blocks_authority
      title: Projection failure prevents authoritative state publication
      severity: high
      symptoms:
        - ingress spec not republished when projection scan is stuck
        - objectstore config stale despite controller having fresh state
        - repair workflow not dispatched because derived lane is blocked
      root_cause: |
        Authority publication was gated on derived/projection lane success. Projection failure propagated to authority lane as a blocking error.
      architecture_fix: |
        Authority lanes publish first each cycle. Projection failure marks projection degraded only, not authority.
      forbidden_fixes:
        - require_derived_state_before_publishing_authority
        - block_authority_on_cache_availability
      related_invariants:
        - derived_state.must_not_block_authority
      related_services:
        - cluster-controller
      required_tests:
        - TestProjectionScanHangAllowsIngressRepublish
    - id: recovery.dns_required_for_dns_recovery
      title: DNS recovery requires working DNS — circular dependency
      severity: high
      symptoms:
        - operator cannot run DNS repair CLI because DNS is down
        - controller cannot reach nodes because DNS lookup fails during recovery
        - "cluster stuck: DNS broken, DNS repair needs DNS"
      root_cause: |
        CLI and controller used hostname resolution for all cluster operations. Direct IP fallback not implemented. DNS outage is self-referential.
      architecture_fix: |
        All resilience CLI commands must support --controller IP:port. Controller-to-node critical paths must prefer node IP from membership/state when DNS lookup fails.
      forbidden_fixes:
        - require_dns_for_dns_recovery
        - require_service_discovery_when_discovery_is_unhealthy
      related_invariants:
        - recovery.must_not_depend_on_dns_only
      related_services:
        - dns
        - cluster-controller
      required_tests:
        - TestIngressCLIWorksWithDNSDisabled
    - id: destructive_actions.ambiguous_disable
      title: Ambiguous or malformed disable spec stops runtime
      severity: critical
      symptoms:
        - service stopped despite no operator intent
        - disable spec missing reason or has stale generation
        - IsExplicitDisable rejects spec but runtime stops anyway
      root_cause: |
        Destructive action guard not called on all code paths. Ambiguous disable (missing reason/generation/checksum) accepted as valid stop intent.
      architecture_fix: |
        Shared guard API (IsExplicitDisable) must be called before every destructive action. Rejected ambiguous disables must emit doctor finding. Rate-limited audit event for operator review.
      forbidden_fixes:
        - stop_runtime_from_ambiguous_disable
        - wipe_state_without_approved_transition
        - delete_runtime_data_from_ambiguous_state
        - perform_destructive_action_from_inferred_intent
      related_invariants:
        - destructive_actions.require_explicit_guard
      related_services:
        - node-agent
        - cluster-controller
      required_tests:
        - TestMalformedDisableDoesNotStopRuntime
        - TestExplicitValidDisableStopsRuntimeAndAuditable
    - id: topology.unsafe_drift_applied
      title: Topology drift reconciler applies unsafe topology change
      severity: critical
      symptoms:
        - storage node removed below quorum by drift reconciler
        - MinIO erasure-coding pool loses redundancy without operator approval
        - controller profile changed on node below founding quorum
      root_cause: |
        Drift reconciler applied topology change without calling topology safety preflight. Safety checks were only on the direct RPC path, not in the drift action planner.
      architecture_fix: |
        Topology preflight must be called in drift reconciler action planner for every topology/runtime change. Unsafe actions are blocked individually; other safe reconciles continue.
      forbidden_fixes:
        - infer_topology_from_local_disk
        - reconcile_topology_without_contract
        - apply_topology_drift_without_generation_check
      related_invariants:
        - topology.reconciler_must_respect_safety_contract
      related_services:
        - cluster-controller
        - node-agent
      required_tests:
        - TestStaleMajorityTopologyRejectedWhileSafeActionsRun
    - id: services.drift_never_escalates
      title: Service drift warning stays at WARN indefinitely
      severity: medium
      symptoms:
        - cluster.services.drift stuck at WARN for hours
        - operator does not notice critical drift on ingress node
        - drift becomes background noise
      root_cause: |
        Doctor rule had static SEVERITY_WARN for any desired/applied hash mismatch regardless of age. No driftSince tracking, no escalation.
      architecture_fix: |
        Track drift start timestamp per node in Collector. Escalate: <2min=WARN, >5min=ERROR, >5min on critical service=CRITICAL.
      forbidden_fixes:
        - keep_drift_warning_forever_without_escalation
      related_invariants:
        - services.drift_must_age_and_escalate
      related_services:
        - cluster-doctor
      required_tests:
        - TestDriftUnder2MinIsWarn
        - TestDriftOver5MinIsError
    - id: pki.ca_not_published
      title: PKI CA metadata not published to etcd
      severity: high
      symptoms:
        - pki.ca_not_published warning fires from doctor
        - /globular/pki/ca absent from etcd
        - no governance policy — key has no owner, no delete policy
      root_cause: |
        /globular/pki/ca not in config.CriticalEtcdKeys or critical_state_registry. Controller publishes it but no policy enforces restoration if deleted.
      architecture_fix: |
        Add /globular/pki/ca to CriticalEtcdKeys and critical_state_registry with owner=cluster-controller, RestoreFromState, DeleteNeverAutomatic.
      forbidden_fixes:
        - omit_pki_ca_from_critical_registry
      related_invariants:
        - pki.ca_metadata_must_be_published
      related_services:
        - cluster-controller
        - cluster-doctor
      required_tests:
        - TestPKICANotPublishedFiresWhenCAMetadataNilAndNodesExist
    - id: runtime.command_package_false_positive
      title: Doctor flags COMMAND packages as missing systemd units
      severity: medium
      symptoms:
        - installed_state_runtime_mismatch fires for yt-dlp, rclone, sha256sum, globular-cli
        - doctor reports false-positive ERROR for packages with no daemon
        - operator investigates non-existent systemd unit failure
      root_cause: |
        commandPackage() in the rule is a hardcoded list. New command packages added to catalog not in the list are incorrectly flagged.
      architecture_fix: |
        Query package kind from catalog (getCatalogEntry). COMMAND packages have no runtime unit expectation. Hardcoded list is tech debt until catalog integration complete.
      forbidden_fixes:
        - hardcode_command_package_runtime_expectations_forever
        - require_systemd_unit_for_command_package
        - ignore_package_kind_in_runtime_proof
      related_invariants:
        - runtime.installed_state_must_match_package_kind
      related_services:
        - cluster-doctor
      required_tests:
        - TestCommandPackageWithNoUnitProducesNoFinding
    - id: mcp.orphan_port_hold
      title: Orphaned mcp_server process holds port 10260, blocking service start
      severity: high
      symptoms:
        - globular-mcp.service fails to start with 'address already in use' on :10260
        - mcp retries port bind 10 times then exits with code 1
        - systemctl start fails but no crashed service visible
        - mcp_server process with PPid=1 (escaped cgroup) visible in ps
        - INC-2026-0002 and INC-2026-0003
      root_cause: |
        A previous mcp_server instance escaped the systemd cgroup (PPid=1) during a
        restart race or cgroup-misconfigured kill. It continues holding :10260 indefinitely.
        When a new globular-mcp.service starts, all 10 bind retries fail and the service exits.
      architecture_fix: |
        Add ExecStartPre=+/bin/sh -c 'pkill -9 -f mcp_server || true' to globular-mcp.service
        unit file. This kills any escaped orphan before attempting to bind the port.
        Applied in packages/metadata/mcp/systemd/globular-mcp.service and
        packages/metadata/mcp/specs/mcp_service.yaml as of INC-2026-0003.
        Manual recovery: ssh to affected node and run: sudo killall -9 mcp_server
      forbidden_fixes:
        - restart_mcp_without_killing_orphan
        - reduce_bind_retry_count_to_mask_orphan
        - change_mcp_port_as_workaround
      related_invariants:
        - runtime.installed_state_not_liveness
      related_services:
        - mcp
      required_tests:
        - TestMCPStartFailsWhenOrphanHoldsPort
        - TestExecStartPreKillsOrphan

    - id: mcp.day1_install_no_start
      title: mcp spec missing start_services step — Day-1 install does not start mcp
      severity: medium
      symptoms:
        - mcp binary installed on joining node but globular-mcp.service is inactive
        - no globular-mcp.service journal entries after install
        - node-agent reports mcp in installed list but service is not running
        - convergence result never emitted (WaitActive never reached)
        - reconciler dispatches missing_package remediation for mcp repeatedly
      root_cause: |
        The mcp_service.yaml spec had no start_services or health_checks steps.
        The spec comment said "Day-0 script starts all services together at the end."
        For Day-1 joining nodes, there is no such script — the workflow must start the service.
      architecture_fix: |
        Add start_services and health_checks steps to mcp_service.yaml after enable_services.
        Applied in packages/metadata/mcp/specs/mcp_service.yaml as of INC-2026-0003.
        Any package spec that is installed on Day-1 joining nodes MUST have start_services
        unless the service is intentionally deferred (document why if so).
      forbidden_fixes:
        - manually_start_mcp_without_fixing_spec
        - skip_health_checks_to_avoid_waitactive_timeout
      related_invariants:
        - convergence.no_infinite_retry
        - install.result.atomic_commit
      related_services:
        - mcp
        - node-agent
      required_tests:
        - TestMCPStartedAfterDay1Install
        - TestDay1SpecHasStartServicesStep

    - id: objectstore.no_desired_state_governance
      title: Objectstore desired state key has no registry governance
      severity: critical
      symptoms:
        - objectstore.no_desired_state fires but controller does not restore
        - node-agent infers MinIO topology from local disk when key absent
        - /globular/objectstore/config absent — MinIO starts from stale local config
      root_cause: |
        /globular/objectstore/config not in config.CriticalEtcdKeys or critical_state_registry. No restoration policy, no delete approval required.
      architecture_fix: |
        Add /globular/objectstore/config to registry with owner=cluster-controller, RestoreFromState, DeleteNeverAutomatic. Node-agent must hold LKG and not infer topology.
      forbidden_fixes:
        - start_minio_without_objectstore_desired_state
        - infer_objectstore_topology_from_local_state
        - omit_objectstore_config_from_critical_registry
      related_invariants:
        - objectstore.desired_state_must_be_registry_governed
      related_services:
        - cluster-controller
        - node-agent
        - minio
      required_tests:
        - TestObjectstoreNoDesiredStateFiresWhenNilAndStorageNodes
