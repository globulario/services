    - architecture_fix: |
        The second guard inside ApplyPackageRelease must call buildIDSkipChecksumOK(installed, expected)
        before allowing skip. buildIDSkipChecksumOK returns false (must reinstall) when both hashes
        are present and disagree, and true (skip allowed) when either hash is absent or they agree.

        Fixed in commit covering INC-2026-0019: added buildIDSkipChecksumOK helper to
        grpc_workflow_skip.go and wired it into the build_id guard block in apply_package_release.go.

        The helper normalizes hashes (strips sha256: prefix, lowercases) before comparison.
      forbidden_fixes:
        - skipping_reinstall_based_on_build_id_alone_without_checksum_validation
        - treating_build_id_match_as_proof_of_binary_identity
        - clearing_hash_drift_without_reinstalling_the_package
        - updating_installed_state_checksum_without_reinstalling_the_binary
      id: node_agent.apply_package_release_buildid_skip_ignores_checksum
      protects:
        files:
            - golang/node_agent/node_agent_server/apply_package_release.go
            - golang/node_agent/node_agent_server/grpc_workflow_skip.go
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - runtime.success_requires_expected_binary_checksum
      required_tests:
        - TestBuildIDSkipChecksumOK
      root_cause: |
        ApplyPackageRelease has two distinct idempotency guards:
        1. canSkipInstallPackage (grpc_workflow_skip.go) — correctly compares installed checksum against
           req.GetExpectedSha256() and denies skip on mismatch.
        2. A second guard inside apply_package_release.go — only checked build_id (UUID), ignoring
           req.GetExpectedSha256(). This allowed the second guard to short-circuit reinstall even when
           the first guard correctly identified a checksum mismatch.

        The result: a service binary replaced out-of-band (e.g. via `globular deploy`, a local
        go build, or a direct cp) retains the same build_id as the manifest build, so the second
        guard skips reinstall and the installed_state.Checksum is never updated. The verifier then
        detects the discrepancy and emits hash_drift indefinitely.

        This is INC-2026-0019, filed 2026-05-31.
      severity: high
      symptoms:
        - node-agent log shows "build_id matches — already applied" followed immediately by "checksum mismatch" from the verifier
        - installed_state.Checksum differs from manifest.entrypoint_checksum but installed phase stays AVAILABLE
        - cluster-doctor reports hash_drift on a service that was just installed at the correct version
        - heartbeat emits runtime_identity_unproven finding for a service whose systemd unit is active
        - canSkipInstallPackage denies skip (correct), but ApplyPackageRelease re-grants skip via the build_id guard
        - binary was replaced out-of-band (globular deploy or local build) without a corresponding installed_state.Checksum update
      title: ApplyPackageRelease idempotency guard skips reinstall when build_id matches even if installed binary checksum differs from manifest expected_sha256
    - id: node_agent.install_package_aliases_convergence_hash_into_expected_sha256
      known_bad_fixes:
        - reintroducing the fallback under a "graceful degradation" label
        - shortening the function by combining both keys into one variable
        - '"normalising" the convergence hash and the binary hash with a single helper'
        - changing ComputeReleaseDesiredHash to return the entrypoint_checksum so the alias works
        - using inputs["expected_sha256"] as the convergence hash when desired_hash is absent
        - downgrading the verify gate to "warn" so installs pass even with the wrong-schema hash
      related_invariants:
        - meta.identity_computation_must_be_invariant
        - install_package.hash_schemas_must_not_alias
        - controller.apply_package_release_requires_manifest_checksum
        - runtime.success_requires_expected_binary_checksum
      required_tests:
        - TestExtractRunInstallPackageHashes_BothPresent
        - TestExtractRunInstallPackageHashes_OnlyConvergence
        - TestExtractRunInstallPackageHashes_OnlyBinary
        - TestExtractRunInstallPackageHashes_BothEmpty
        - TestExtractRunInstallPackageHashes_Whitespace
        - TestRunInstallPackageHashSchema_PhantomHashIsConvergenceIdentity
      resolution: |
        Split the two schemas at extraction time, never alias:

            convergenceHash := strings.TrimSpace(inputs["desired_hash"])
            expectedSha256  := strings.TrimSpace(inputs["expected_sha256"])

        canSkipInstallPackage and LocalHash / StampInfraConvergenceHash use
        convergenceHash. ApplyPackageReleaseRequest.ExpectedSha256 uses
        expectedSha256 only. When expected_sha256 is empty the verify gate
        writes installed_unverified honestly — the contract calls for
        explicit-empty propagation, not a same-call fallback.

        Captured by extractRunInstallPackageHashes; pinned by
        TestExtractRunInstallPackageHashes_* and
        TestRunInstallPackageHashSchema_PhantomHashIsConvergenceIdentity.
      root_cause: |
        Before v1.2.119, the install-package workflow inputs did not carry
        desired_hash. The node-agent runInstallPackage path had a fallback:

            desiredHash := strings.TrimSpace(inputs["desired_hash"])
            if desiredHash == "" {
                desiredHash = strings.TrimSpace(inputs["expected_sha256"])
            }
            ApplyPackageReleaseRequest{ ExpectedSha256: desiredHash }

        which was harmless only because neither key was set.

        The v1.2.119 controller dispatch starts supplying BOTH desired_hash
        (convergence identity = ComputeReleaseDesiredHash output) and
        expected_sha256 (manifest entrypoint_checksum). The fallback then
        bound the FIRST one — the convergence identity hash — to
        ExpectedSha256, sending a hash with the wrong schema into the
        node-agent verify gate. The gate honestly returned
        installed_binary_hash_mismatch because the convergence identity
        could never equal the binary sha256.

        Net effect: every install dispatched through the v1.2.119 chain
        appeared to fail, even though the local package CAS, the repository
        Scylla manifest, and the installed binary all agreed on the binary
        sha256. The system was correct end to end except for one variable
        aliasing in the node-agent.

        Sentinel value: for dns@1.2.113+364 the phantom hash was
        de2b04ff64ce4489f2d8a6b151571f6f3941cb28674e0124e9d3db2d739ad414 =
        sha256("core@globular.io/dns=1.2.113+b:364;").
