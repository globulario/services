    - architecture_fix: |
        Two layers. (1) TTL bound: shorten the GRANT TTL so the revocation window
        is bounded (permGrantTTL = 60s), pinned under a documented ceiling
        (permGrantTTLMaxBound) that a ratchet enforces so it cannot silently
        regress to 15m. A stale DENY after a new grant is only an availability
        annoyance, so the DENY TTL stays 30s. (2) Cross-service invalidation
        (landed 2026-06-09): the RBAC service bumps an etcd generation key
        (/globular/system/rbac/generation) on every permission/binding mutation;
        every service's interceptor watches that key and surgically flushes its
        permission-decision cache on change (flushPermCache drops only
        permCacheEntry values, leaving stream/conn entries), so a revocation takes
        effect mesh-wide in ~one etcd round-trip. The TTL remains the backstop if
        the watch is down (best-effort invalidation: a failed bump degrades to TTL,
        never blocks the mutation).
      forbidden_fixes:
        - cache_authorization_grant_without_a_bounded_revocation_window
        - longer_grant_ttl_than_deny_ttl_without_invalidation
      id: interceptors.perm_cache_grant_outlives_revocation
      related_invariants:
        - meta.authorization_check_is_a_snapshot_not_a_promise
        - meta.binding_outlives_evidence_until_invalidated
      related_services:
        - interceptors
        - rbac
      required_tests:
        - TestPermCacheGrantTTLIsBounded
        - TestFlushPermCache_SurgicalAndComplete
      root_cause: |
        The interceptor's permission-decision cache stored an ALLOW for 15 minutes
        (denials for 30s). The asymmetry optimized the deny->grant direction ("a
        new grant takes effect in seconds") but left the security-critical
        grant->revoke direction slow: a revoked permission kept being honored for
        up to 15 minutes across every service, and the per-service cache is not
        invalidated when the RBAC service's own cache is. This is the canonical
        "cached RBAC results outlive the binding" shape of
        meta.authorization_check_is_a_snapshot_not_a_promise — a cached auth
        decision is a snapshot, and without invalidation a long TTL is a lie.
      severity: high
      symptoms:
        - a user keeps passing an authorization check for minutes after an admin revoked their binding
        - revocation appears to "not take effect" until the per-service interceptor cache expires
        - rbac permission change invalidates only the RBAC service cache, not the callers' interceptor caches
      title: Permission-decision cache honors a revoked grant for up to 15 minutes (stale-allow window)
    - architecture_fix: |
        rbacUncertainAllow makes the fallback fail closed by default. The
        permissive local-roles fallback is retained ONLY where it cannot widen
        into a state-changing escalation: the "sa" service/superadmin identity
        (service plumbing must not deadlock on an RBAC blip), the bounded explicit
        bootstrap window (security.DefaultBootstrapGate — the principle's named
        exception), and read-only methods (!security.IsMutatingRPC, which fails
        closed on unknown methods). A real user invoking a mutating method while
        RBAC is unreachable outside bootstrap is DENIED and the refusal is metered
        (rbac.fallback_denied_fail_safe) and WARN-logged.
      forbidden_fixes:
        - allow_request_when_rbac_check_cannot_be_made
        - local_roles_fallback_grants_if_any_role_allows_for_mutations
      id: interceptors.rbac_fallback_allows_user_mutation_on_outage
      related_invariants:
        - meta.fail_safe_defaults_when_authority_is_uncertain
      related_intents:
        - security.deny_overrides_allow
      related_services:
        - interceptors
        - rbac
      required_tests:
        - TestRBACFallback_FailsClosedForUserMutationOutsideBootstrap
      root_cause: |
        When the RBAC service is unreachable, checkRoleBinding fell back to
        checkLocalRoles, which returns ALLOW if ANY locally-loaded cluster role
        grants the method — it does not consult the specific user's binding. So
        during any RBAC outage a low-privilege user could clear a high-privilege
        check: a silent privilege-escalation window. This is the canonical
        violation of meta.fail_safe_defaults_when_authority_is_uncertain — when
        the authority decision cannot be made, the default must be REFUSE, not
        "allow because we could not check".
      severity: critical
      symptoms:
        - a viewer-only user performs an admin-only mutation while the RBAC service is unreachable
        - rbac.fallback_local_roles_used increments during an RBAC outage with no corresponding deny
        - audit shows access granted with no role binding actually verified
      title: RBAC interceptor's local-roles fallback allows a user's mutating call during an RBAC outage (silent escalation)
