notes: |
  `_, err := workflow.Run(...)` discarded a RUN_STATUS_FAILED result with
  err=nil, so a wave-blocked run was never retried (commit a03b1937). The fix
  made the wave-blocked terminal result dispatch a bounded retry rather than
  silently dropping it. Recorded as a success outcome linking the convergence
  invariant and the durable-step-receipt recipe: the lesson is that a blocking
  result is a completion obligation, and resume must act on it, not absorb it.
