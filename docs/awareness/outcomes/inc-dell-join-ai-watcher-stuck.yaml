notes: |
  awareness_diagnose scoped the failure (one package of 25; everything else
  self-healed exactly as its forbidden_conclusions predicted) and node-agent
  logs gave the root cause: envoy reload during the xds topology push for the
  joining node refused :443 for seconds; the failed install step's retry was
  dispatched for 24 packages but never for ai-watcher, whose unit (laid down
  before its binary) flapped to start-limit. The legal fix was the smallest
  typed lever: `globular services desired set ai-watcher 1.2.208` — an
  idempotent re-assert that bumped the desired generation and let convergence
  re-plan; install + healthy unit followed in under a minute. No etcd
  surgery, no unit hacks, no apply-desired (sidecar-skipping path).
  Candidate failure mode filed:
  join.mesh_reload_must_not_terminalize_install_retries (candidates queue).
