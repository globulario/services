name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GOWORK: "off"
  GOOS: linux
  GOARCH: amd64
  CGO_ENABLED: "1"

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout packages
        uses: actions/checkout@v4
        with:
          repository: globulario/packages
          path: packages

      - name: Checkout Globular (xds + gateway)
        uses: actions/checkout@v4
        with:
          repository: globulario/Globular
          path: Globular

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      # ── Free disk space (runner has ~14GB, large binaries fill it fast) ──
      - name: Free disk space
        run: |
          sudo docker system prune -af 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      # ── System dependencies for CGO packages ─────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsqlite3-dev libwebp-dev unixodbc-dev bzip2 unzip

      # ── Go setup ──────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/golang/go.sum

      # ── Version ───────────────────────────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building release: ${VERSION}"

      # ── Build all Go services ─────────────────────────────────────────────
      - name: Build all Go services
        working-directory: services/golang
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ../../dist/bin

          # Inject version into every binary at link time
          LDFLAGS="-X main.version=${VERSION} -X main.buildVersion=${VERSION} -s -w"

          echo "Building all services with version=${VERSION}..."

          # Read services.list and build each target
          while IFS='|' read -r target output; do
            target="${target%%#*}"
            target="${target// /}"
            output="${output// /}"
            [[ -z "${target}" ]] && continue

            bin_name=$(basename "${output}")
            # compute_server is not yet ready for release
            [[ "${bin_name}" == "compute_server" ]] && continue

            echo "  → Building ${bin_name}..."
            go build -ldflags "${LDFLAGS}" -o "../../dist/bin/${bin_name}" "${target}"
          done < build/services.list

          # Keep globularcli for the service package; also expose as 'globular' for CLI install
          cp ../../dist/bin/globularcli ../../dist/bin/globular

          echo "Build complete:"
          ls -lh ../../dist/bin/

      # ── Build xds + gateway (from Globular repo) ──────────────────────────
      - name: Build xds and gateway
        working-directory: Globular
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          LDFLAGS="-X main.version=${VERSION} -X main.buildVersion=${VERSION} -s -w"
          go build -ldflags "${LDFLAGS}" -o ../dist/bin/xds ./cmd/xds
          go build -ldflags "${LDFLAGS}" -o ../dist/bin/gateway ./cmd/gateway
          echo "xds:     $(ls -lh ../dist/bin/xds | awk '{print $5}')"
          echo "gateway: $(ls -lh ../dist/bin/gateway | awk '{print $5}')"

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: services/golang
        run: go test ./... -race -short -timeout 120s

      # ── Build globular-installer ───────────────────────────────────────────
      - name: Build globular-installer
        working-directory: globular-installer
        env:
          GOWORK: "off"
          CGO_ENABLED: "0"
        run: |
          go build -o ../dist/bin/globular-installer ./cmd/globular-installer
          chmod +x ../dist/bin/globular-installer
          echo "globular-installer: $(ls -lh ../dist/bin/globular-installer | awk '{print $5}')"

      # ── Create noop binary for scylladb ───────────────────────────────────
      - name: Create noop binary
        run: |
          printf '#!/bin/sh\n# Scylladb is installed via .deb packages.\nexit 0\n' > dist/bin/noop
          chmod +x dist/bin/noop

      # ── Download third-party infra binaries ───────────────────────────────
      - name: Download infra binaries
        run: |
          set -euo pipefail
          cd dist/bin

          ETCD_VERSION="3.5.14"
          ENVOY_VERSION="1.35.3"
          PROMETHEUS_VERSION="3.5.1"
          ALERTMANAGER_VERSION="0.28.1"
          NODE_EXPORTER_VERSION="1.10.2"
          SIDEKICK_VERSION="7.0.0"
          RESTIC_VERSION="0.18.1"
          RCLONE_VERSION="1.73.1"

          echo "→ etcd ${ETCD_VERSION}..."
          curl -fsSL "https://github.com/etcd-io/etcd/releases/download/v${ETCD_VERSION}/etcd-v${ETCD_VERSION}-linux-amd64.tar.gz" \
            | tar xzf - --strip-components=1 \
                --wildcards "*/etcd" "*/etcdctl"
          chmod +x etcd etcdctl

          echo "→ envoy ${ENVOY_VERSION}..."
          curl -fsSL "https://github.com/envoyproxy/envoy/releases/download/v${ENVOY_VERSION}/envoy-${ENVOY_VERSION}-linux-x86_64" -o envoy
          chmod +x envoy

          echo "→ minio (latest stable)..."
          curl -fsSL "https://dl.min.io/server/minio/release/linux-amd64/minio" -o minio
          chmod +x minio

          echo "→ mc (latest stable)..."
          curl -fsSL "https://dl.min.io/client/mc/release/linux-amd64/mc" -o mc
          chmod +x mc

          echo "→ prometheus ${PROMETHEUS_VERSION}..."
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz" \
            | tar xzf - --strip-components=1 \
                --wildcards "*/prometheus"
          chmod +x prometheus

          echo "→ alertmanager ${ALERTMANAGER_VERSION}..."
          curl -fsSL "https://github.com/prometheus/alertmanager/releases/download/v${ALERTMANAGER_VERSION}/alertmanager-${ALERTMANAGER_VERSION}.linux-amd64.tar.gz" \
            | tar xzf - --strip-components=1 \
                --wildcards "*/alertmanager"
          chmod +x alertmanager

          echo "→ node_exporter ${NODE_EXPORTER_VERSION}..."
          curl -fsSL "https://github.com/prometheus/node_exporter/releases/download/v${NODE_EXPORTER_VERSION}/node_exporter-${NODE_EXPORTER_VERSION}.linux-amd64.tar.gz" \
            | tar xzf - --strip-components=1 \
                --wildcards "*/node_exporter"
          chmod +x node_exporter

          echo "→ sidekick ${SIDEKICK_VERSION}..."
          curl -fsSL "https://github.com/minio/sidekick/releases/download/v${SIDEKICK_VERSION}/sidekick-linux-amd64" -o sidekick
          chmod +x sidekick

          echo "→ restic ${RESTIC_VERSION}..."
          curl -fsSL "https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}/restic_${RESTIC_VERSION}_linux_amd64.bz2" \
            | bunzip2 > restic
          chmod +x restic

          echo "→ rclone ${RCLONE_VERSION}..."
          curl -fsSL "https://github.com/rclone/rclone/releases/download/v${RCLONE_VERSION}/rclone-v${RCLONE_VERSION}-linux-amd64.zip" \
            -o /tmp/rclone.zip
          unzip -j /tmp/rclone.zip "rclone-v${RCLONE_VERSION}-linux-amd64/rclone" -d .
          chmod +x rclone

          echo ""
          echo "Infra binaries:"
          ls -lh etcd etcdctl envoy minio mc prometheus alertmanager node_exporter sidekick restic rclone noop

      # ── Create infra packages ─────────────────────────────────────────────
      - name: Create infra packages
        env:
          BUILD_ID: ${{ github.run_number }}
        run: |
          set -euo pipefail
          mkdir -p dist/packages

          PACKAGES_META="packages/metadata"
          DIST_BIN="dist/bin"

          # Map: package-name → binary-filename-in-dist-bin
          declare -A INFRA_BIN_MAP=(
            [scylladb]=noop
            [etcd]=etcd
            [etcdctl]=etcdctl
            [envoy]=envoy
            [minio]=minio
            [mc]=mc
            [prometheus]=prometheus
            [alertmanager]=alertmanager
            [node-exporter]=node_exporter
            [sidekick]=sidekick
            [restic]=restic
            [rclone]=rclone
          )

          for pkg_name in "${!INFRA_BIN_MAP[@]}"; do
            bin_name="${INFRA_BIN_MAP[${pkg_name}]}"
            bin_path="${DIST_BIN}/${bin_name}"

            if [[ ! -f "${bin_path}" ]]; then
              echo "  ⚠ Skipping ${pkg_name} (${bin_name} not found)"
              continue
            fi

            meta_dir="${PACKAGES_META}/${pkg_name}"
            if [[ ! -d "${meta_dir}" ]]; then
              echo "  ⚠ Skipping ${pkg_name} (no metadata at ${meta_dir})"
              continue
            fi

            # Read version and entrypoint from existing package.json
            PKG_VERSION=$(python3 -c "import json; print(json.load(open('${meta_dir}/package.json'))['version'])")
            PKG_ENTRYPOINT=$(python3 -c "import json; print(json.load(open('${meta_dir}/package.json'))['entrypoint'].split('/')[-1])")

            echo "  → Packaging ${pkg_name} v${PKG_VERSION}..."

            tmpdir=$(mktemp -d)

            # Copy all metadata (package.json, specs/, systemd/, scripts/, debs/)
            cp -r "${meta_dir}/." "${tmpdir}/"

            # Place binary using the entrypoint name from package.json
            mkdir -p "${tmpdir}/bin"
            cp "${bin_path}" "${tmpdir}/bin/${PKG_ENTRYPOINT}"
            chmod 755 "${tmpdir}/bin/${PKG_ENTRYPOINT}"

            # Compute SHA256 of binary
            CHECKSUM="sha256:$(sha256sum "${bin_path}" | awk '{print $1}')"

            # Update package.json: version + entrypoint_checksum + build_id (mandatory for release)
            python3 - "${tmpdir}/package.json" "${PKG_VERSION}" "${CHECKSUM}" "${BUILD_ID}" <<'PYEOF'
          import json, sys, os
          path, version, checksum, build_id = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          if not build_id:
              print(f"ERROR: BUILD_ID is empty for {path}", file=sys.stderr)
              sys.exit(1)
          with open(path) as f:
              d = json.load(f)
          d['version'] = version
          d['entrypoint_checksum'] = checksum
          d['build_id'] = build_id
          with open(path, 'w') as f:
              json.dump(d, f, indent=2)
          PYEOF

            out_file="dist/packages/${pkg_name}_${PKG_VERSION}_linux_amd64.tgz"
            tar -C "${tmpdir}" -czf "${out_file}" .
            rm -rf "${tmpdir}"

            echo "    ✓ $(basename "${out_file}") ($(du -sh "${out_file}" | cut -f1))"
          done

          echo ""
          echo "Infra packages built: $(ls dist/packages/*.tgz | wc -l)"

      # ── Create service packages ───────────────────────────────────────────
      - name: Create service packages
        env:
          BUILD_ID: ${{ github.run_number }}
        run: |
          set -euo pipefail

          PACKAGES_META="packages/metadata"
          DIST_BIN="dist/bin"

          # Map: package-name → binary filename in dist/bin
          declare -A BIN_MAP=(
            [authentication]=authentication_server
            [backup-manager]=backup_manager_server
            [blog]=blog_server
            [catalog]=catalog_server
            [cluster-controller]=cluster_controller_server
            [cluster-doctor]=cluster_doctor_server
            [conversation]=conversation_server
            [discovery]=discovery_server
            [dns]=dns_server
            [echo]=echo_server
            [event]=event_server
            [file]=file_server
            [ldap]=ldap_server
            [log]=log_server
            [mail]=mail_server
            [media]=media_server
            [monitoring]=monitoring_server
            [node-agent]=node_agent_server
            [persistence]=persistence_server
            [rbac]=rbac_server
            [repository]=repository_server
            [resource]=resource_server
            [search]=search_server
            [sql]=sql_server
            [storage]=storage_server
            [title]=title_server
            [torrent]=torrent_server
            [workflow]=workflow_server
            [compute]=compute_server
            [ai-memory]=ai_memory_server
            [ai-executor]=ai_executor_server
            [ai-watcher]=ai_watcher_server
            [ai-router]=ai_router_server
            [xds]=xds
            [gateway]=gateway
            [mcp]=mcp
            [globular-cli]=globularcli
          )

          for pkg_name in "${!BIN_MAP[@]}"; do
            bin_name="${BIN_MAP[${pkg_name}]}"
            bin_path="${DIST_BIN}/${bin_name}"

            if [[ ! -f "${bin_path}" ]]; then
              echo "  ⚠ Skipping ${pkg_name} (${bin_name} not built)"
              continue
            fi

            # Use pre-committed metadata directory (package.json, specs/, systemd/)
            meta_dir="${PACKAGES_META}/${pkg_name}"
            if [[ ! -d "${meta_dir}" ]]; then
              echo "  ⚠ Skipping ${pkg_name} (no metadata at ${meta_dir})"
              continue
            fi

            # Read per-package version from metadata — the release tag is NOT the package version
            PKG_VERSION=$(python3 -c "import json; print(json.load(open('${meta_dir}/package.json'))['version'])")
            if [[ -z "${PKG_VERSION}" ]]; then
              echo "  ✗ ${pkg_name}: version field missing in ${meta_dir}/package.json" >&2
              exit 1
            fi

            echo "  → Packaging ${pkg_name} v${PKG_VERSION}..."

            tmpdir=$(mktemp -d)

            # Copy metadata (package.json, specs/, systemd/) into tmpdir
            cp -r "${meta_dir}/." "${tmpdir}/"

            # Place freshly built binary
            mkdir -p "${tmpdir}/bin"
            cp "${bin_path}" "${tmpdir}/bin/${bin_name}"
            chmod 755 "${tmpdir}/bin/${bin_name}"

            # Compute SHA256 of the binary
            CHECKSUM="sha256:$(sha256sum "${bin_path}" | awk '{print $1}')"

            # Stamp package.json: version (per-package) + entrypoint_checksum + build_id (mandatory)
            python3 - "${tmpdir}/package.json" "${PKG_VERSION}" "${CHECKSUM}" "${BUILD_ID}" <<'PYEOF'
          import json, sys
          path, version, checksum, build_id = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          if not build_id:
              print(f"ERROR: BUILD_ID is empty for {path}", file=sys.stderr)
              sys.exit(1)
          with open(path) as f:
              d = json.load(f)
          d['version'] = version
          d['entrypoint_checksum'] = checksum
          d['build_id'] = build_id
          with open(path, 'w') as f:
              json.dump(d, f, indent=2)
          PYEOF

            out_file="dist/packages/${pkg_name}_${PKG_VERSION}_linux_amd64.tgz"
            tar -C "${tmpdir}" -czf "${out_file}" .
            rm -rf "${tmpdir}"

            echo "    ✓ $(basename "${out_file}") ($(du -sh "${out_file}" | cut -f1))"
          done

          echo ""
          echo "Packages:"
          ls dist/packages/*.tgz | wc -l
          du -sh dist/packages/

      # ── Clean intermediate build artifacts to reclaim disk space ─────────
      - name: Clean build artifacts
        run: |
          # Preserve the two binaries needed for the release tarball,
          # then wipe the rest of dist/bin (service binaries, xds, gateway, etc.)
          mkdir -p dist/release-bin
          mv dist/bin/globular dist/release-bin/globular
          mv dist/bin/globular-installer dist/release-bin/globular-installer
          rm -rf dist/bin
          df -h /

      # ── Generate release index (Phase 2) ─────────────────────────────────
      # Reads every .tgz in dist/packages/, validates required fields and
      # uniqueness, then writes dist/release-index.json.
      # Fails the release job loudly if any validation rule is violated.
      - name: Generate release index
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import json, hashlib, tarfile, glob, sys
          from pathlib import Path
          from datetime import datetime, timezone
          import os

          version  = os.environ["RELEASE_VERSION"]
          tag      = os.environ["GITHUB_REF_NAME"]
          repo     = os.environ["GITHUB_REPOSITORY"]
          base_url = f"https://github.com/{repo}/releases/download/{tag}"
          platform = "linux_amd64"

          seen_keys  = {}   # (name, version, build_id, platform) → filename
          seen_files = set()
          entries    = []
          errors     = []

          for f in sorted(glob.glob("dist/packages/*.tgz")):
              path       = Path(f)
              raw        = path.read_bytes()
              pkg_digest = "sha256:" + hashlib.sha256(raw).hexdigest()
              file_errors = []
              pkg = {}

              # Package format invariant: every archive must contain ./package.json
              try:
                  with tarfile.open(path) as tf:
                      try:
                          member = tf.getmember("./package.json")
                          pkg = json.loads(tf.extractfile(member).read())
                      except KeyError:
                          file_errors.append("missing ./package.json")
              except Exception as e:
                  file_errors.append(f"failed to read archive: {e}")

              if not file_errors:
                  # Required release fields — no silent defaults allowed
                  for field in ("name", "version", "build_id"):
                      if not pkg.get(field):
                          file_errors.append(f"package.json missing required field '{field}'")

                  # Platform consistency (if declared in manifest)
                  pkg_platform = pkg.get("platform", "")
                  if pkg_platform and pkg_platform != platform:
                      file_errors.append(
                          f"platform '{pkg_platform}' != release platform '{platform}'"
                      )

                  # Duplicate artifact key check
                  key = (pkg.get("name",""), pkg.get("version",""), pkg.get("build_id",""), platform)
                  if key in seen_keys:
                      file_errors.append(
                          f"duplicate artifact key {key} — also in {seen_keys[key]}"
                      )
                  else:
                      seen_keys[key] = path.name

                  # Duplicate filename check
                  if path.name in seen_files:
                      file_errors.append("duplicate filename in release set")
                  seen_files.add(path.name)

              if file_errors:
                  for e in file_errors:
                      errors.append(f"  {path.name}: {e}")
                  continue

              entries.append({
                  "name":                pkg["name"],
                  "kind":                pkg.get("kind", "service"),
                  "publisher":           pkg.get("publisher", "globulario"),
                  "version":             pkg["version"],
                  "build_id":            pkg["build_id"],
                  "platform":            platform,
                  "filename":            path.name,
                  "package_digest":      pkg_digest,
                  "manifest_digest":     "",
                  "entrypoint_checksum": pkg.get("entrypoint_checksum", ""),
                  "asset_url":           f"{base_url}/{path.name}",
                  "release_tag":         tag,
                  "published_at":        datetime.now(timezone.utc).isoformat(),
              })

          if errors:
              print("ERROR: Release index generation failed:", file=sys.stderr)
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)

          index = {
              "schema_version":   1,
              "release_tag":      tag,
              "globular_version": version,
              "publisher":        "globulario",
              "packages":         entries,
          }
          out = Path("dist/release-index.json")
          out.write_text(json.dumps(index, indent=2))
          print(f"Generated release index: {len(entries)} packages → {out}")
          PYEOF

      # ── Assemble release tarball ───────────────────────────────────────────
      - name: Assemble release tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GIT_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          RELEASE_NAME="globular-${VERSION}-linux-amd64"
          RELEASE_DIR="dist/${RELEASE_NAME}"

          mkdir -p "${RELEASE_DIR}/packages"

          # CLI binary (user-facing name)
          cp dist/release-bin/globular "${RELEASE_DIR}/globular"
          chmod 755 "${RELEASE_DIR}/globular"

          # Day-0 installer binary
          cp dist/release-bin/globular-installer "${RELEASE_DIR}/globular-installer"
          chmod 755 "${RELEASE_DIR}/globular-installer"

          # Scripts from globular-installer (setup-tls.sh, install-day0.sh, etc.)
          cp -r globular-installer/scripts "${RELEASE_DIR}/scripts"
          chmod +x "${RELEASE_DIR}/scripts"/*.sh 2>/dev/null || true

          # Welcome page assets — seeded into MinIO webroot on first install
          if [[ -d globular-installer/internal/assets/webroot ]]; then
            cp -r globular-installer/internal/assets/webroot "${RELEASE_DIR}/webroot"
          fi

          # All packages (infra + service) — move to avoid doubling disk usage
          mv dist/packages/*.tgz "${RELEASE_DIR}/packages/"

          # Release index — included in tarball and uploaded as a standalone asset
          cp dist/release-index.json "${RELEASE_DIR}/release-index.json"

          # Installer script (installs node_agent, caches packages, creates systemd unit)
          cp services/scripts/install.sh "${RELEASE_DIR}/install.sh"
          chmod +x "${RELEASE_DIR}/install.sh"

          # Checksums for individual packages
          (cd "${RELEASE_DIR}/packages" && sha256sum *.tgz > SHA256SUMS)

          # README
          PKG_COUNT=$(ls "${RELEASE_DIR}/packages/"*.tgz | wc -l)
          cat > "${RELEASE_DIR}/README.md" <<HEREDOC
          # Globular ${VERSION}

          An open-source microservices platform for self-hosted distributed systems.
          No containers. No Kubernetes. No cloud required.

          ## Install

          \`\`\`bash
          sudo bash install.sh
          \`\`\`

          ## What's Included

          - \`globular\` — CLI tool
          - \`globular-installer\` — Day-0 package installer
          - \`scripts/\` — Bootstrap scripts (TLS, minio contract, DNS, etc.)
          - \`packages/\` — ${PKG_COUNT} packages (Globular services + infrastructure)
          - \`install.sh\` — Installer entry point

          Infrastructure (etcd, MinIO, Envoy, ScyllaDB, Prometheus, etc.) is bundled in packages/.

          ## Next Steps

          After install.sh completes:

          \`\`\`bash
          sudo systemctl start globular-node-agent
          globular cluster bootstrap --domain <your-domain> --profile core --profile gateway
          \`\`\`

          Full guide: https://globular.io/docs/operators/installation

          ## Built From

          Repository: https://github.com/globulario/services
          Tag:        ${GIT_TAG}
          Commit:     ${GITHUB_SHA}
          HEREDOC

          # Create release tarball
          cd dist
          tar czf "${RELEASE_NAME}.tar.gz" "${RELEASE_NAME}/"
          sha256sum "${RELEASE_NAME}.tar.gz" > "${RELEASE_NAME}.tar.gz.sha256"

          echo "Release tarball: $(du -sh "${RELEASE_NAME}.tar.gz" | cut -f1)"
          echo "Contents:"
          tar tzf "${RELEASE_NAME}.tar.gz" | head -50 || true

      # ── Publish ───────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Globular ${{ steps.version.outputs.version }}"
          files: |
            dist/globular-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            dist/globular-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
            dist/globular-${{ steps.version.outputs.version }}-linux-amd64/packages/*.tgz
            dist/release-index.json
          generate_release_notes: true
          body: |
            ## Globular ${{ steps.version.outputs.version }}

            An open-source microservices platform for self-hosted distributed systems — native Linux binaries, systemd supervision, etcd as the single source of truth.

            ### Install

            ```bash
            VERSION="${{ steps.version.outputs.version }}"

            curl -LO "https://github.com/globulario/services/releases/download/v${VERSION}/globular-${VERSION}-linux-amd64.tar.gz"
            curl -LO "https://github.com/globulario/services/releases/download/v${VERSION}/globular-${VERSION}-linux-amd64.tar.gz.sha256"
            sha256sum -c "globular-${VERSION}-linux-amd64.tar.gz.sha256"

            tar xzf "globular-${VERSION}-linux-amd64.tar.gz"
            cd "globular-${VERSION}-linux-amd64"
            sudo bash install.sh
            ```

            ### Bootstrap

            ```bash
            sudo systemctl start globular-node-agent

            globular cluster bootstrap \
              --node localhost:11000 \
              --domain <your-domain> \
              --profile core \
              --profile gateway
            ```

            ### Documentation

            - [Getting Started](https://globular.io/docs/getting-started)
            - [Installation Guide](https://globular.io/docs/operators/installation)
            - [Architecture Overview](https://globular.io/docs/operators/architecture-overview)
            - [Adding Nodes](https://globular.io/docs/operators/adding-nodes)
