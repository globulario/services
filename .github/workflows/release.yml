name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GOWORK: "off"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/golang/go.sum

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all Go services
        working-directory: services/golang
        run: go build ./...

      - name: Run tests
        working-directory: services/golang
        run: go test ./... -race -short

      - name: Build CLI
        working-directory: services/golang
        run: go build -o ../../dist/globular ./globularcli

      - name: Build documentation site
        working-directory: services
        run: |
          pip3 install mkdocs-material
          mkdocs build

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="globular-${VERSION}"
          mkdir -p "${RELEASE_DIR}"

          # CLI binary
          cp dist/globular "${RELEASE_DIR}/"

          # Documentation site
          cp -r services/site "${RELEASE_DIR}/docs-site"

          # Deploy script
          cp services/scripts/deploy-docs.sh "${RELEASE_DIR}/"
          cp services/mkdocs.yml "${RELEASE_DIR}/"

          # Source reference
          echo "Built from: https://github.com/globulario/services/tree/${GITHUB_REF_NAME}" > "${RELEASE_DIR}/BUILD_INFO.txt"
          echo "Version: ${VERSION}" >> "${RELEASE_DIR}/BUILD_INFO.txt"
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${RELEASE_DIR}/BUILD_INFO.txt"

          # Note about full installation
          cat > "${RELEASE_DIR}/README.md" << 'EOF'
          # Globular v${VERSION}

          This release contains:
          - `globular` — CLI tool
          - `docs-site/` — pre-built documentation (deploy with deploy-docs.sh)

          For a full cluster installation (all services + infrastructure),
          build from source. See: https://globular.io/docs/operators/building-from-source/
          EOF

          # Checksums
          cd "${RELEASE_DIR}"
          sha256sum globular > checksums.sha256
          cd ..

          # Create tarball
          tar czf "${RELEASE_DIR}-linux-amd64.tar.gz" "${RELEASE_DIR}/"
          sha256sum "${RELEASE_DIR}-linux-amd64.tar.gz" > "${RELEASE_DIR}-linux-amd64.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            globular-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            globular-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## Globular ${{ steps.version.outputs.version }}

            This release contains the CLI tool and pre-built documentation site.

            For full cluster installation, see [Building from Source](https://globular.io/docs/operators/building-from-source/).

            ### CLI

            ```bash
            curl -LO https://github.com/globulario/services/releases/download/${{ github.ref_name }}/globular-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            tar xzf globular-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            sudo cp globular-${{ steps.version.outputs.version }}/globular /usr/local/bin/
            ```

            ### Documentation

            Full docs: https://globular.io/docs/
