name: ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  # Disable go.work — it references sibling repos (Globular, globular-installer)
  # that only exist in the local dev layout, not in CI.
  GOWORK: "off"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: golang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: golang/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: golang
          args: --timeout=5m

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Check proto files compile
        run: |
          cd golang
          go build ./...
