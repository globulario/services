name: ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GOWORK: "off"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/golang

    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Checkout packages
        uses: actions/checkout@v4
        with:
          repository: globulario/packages
          path: packages

      # awareness-graph is PRIVATE, so the default GITHUB_TOKEN cannot reach it
      # (the other sibling repos are public). Non-fatal: if checkout fails the
      # job continues and the self-contained behavioral ratchets below still
      # hard-gate. The principle-check source-scanner step is guarded on this
      # checkout's outcome, so it activates automatically once an org PAT with
      # read access to awareness-graph is added as the AWARENESS_GRAPH_PAT
      # secret — at which point it becomes a hard gate (the step itself has no
      # continue-on-error).
      - name: Checkout awareness-graph (principle-check scanner)
        id: checkout_awareness_graph
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: globulario/awareness-graph
          path: awareness-graph
          token: ${{ secrets.AWARENESS_GRAPH_PAT || github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Download dependencies
        run: go mod download

      - name: Generate version stub
        run: bash build/gen-version.sh 0.0.0-ci

      - name: Build
        run: go build ./...

      # Service security boundaries (hard gate, infra-free). Enforces the
      # os/exec contracts that HARD RULE #6 documents but nothing CI-ran until
      # now: the controller launches no processes, mutating systemd unit actions
      # in the node agent go through internal/supervisor (EX-2 unit-control
      # boundary), and every RPC carries a (globular.auth.authz) annotation.
      - name: Enforce service security boundaries (check-services)
        working-directory: services
        run: make check-services

      - name: Invariant Tests
        run: go test ./repository/repository_server/... -run "TestINV|TestReservation|TestMigrate" -v -count=1 -race

      - name: Unit Tests
        run: go test ./... -race -short -coverprofile=coverage.out
        continue-on-error: true  # Some tests need infrastructure (etcd, ScyllaDB) not available in CI

      - name: Build awareness CI tools
        run: |
          go build -o bin/globular ./globularcli
          # ruleguard powers the positive-control attestation inside
          # principle-check-all (awareness-graph cmd/principle-check
          # positive_control_test.go). Without it on PATH the attestation
          # SKIPS — the ruleguard rules go unverified and could be
          # silently dead, exactly the failure the attestation exists to
          # catch (meta.negative_result_requires_coverage_attestation).
          GOTOOLCHAIN=go1.25.0 go install github.com/quasilyte/go-ruleguard/cmd/ruleguard@v0.4.5
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Enforcement gates (hard-fail). These run the meta-principle checks that
      # the broad "Unit Tests" step above does NOT gate (it is continue-on-error
      # because some tests need etcd/ScyllaDB). The checks below are infra-free
      # and authoritative for their invariants.
      #
      # 1. Source-shape scanner: every cluster state mutation goes through a
      #    workflow or a named exception. principle-check-all covers
      #    meta.state_mutations_must_be_durably_committed_before_side_effects and
      #    workflow.workflow_service_writes_only_own_runtime_state; it exits
      #    non-zero on DRIFT (a new direct/transaction etcd write that is neither
      #    workflow-routed nor an allowlisted exception).
      - name: Enforce state-mutation invariants (principle-check, hard gate)
        if: steps.checkout_awareness_graph.outcome == 'success'
        working-directory: ${{ github.workspace }}/awareness-graph
        run: make principle-check-all
        env:
          SERVICES_REPO: ${{ github.workspace }}/services

      # 2. Behavioral ratchets: the runtime halves the source scanner cannot see
      #    — commit-before-execute, terminal-state guarantee (incl. step-panic
      #    recovery), no-alternative-path — plus the cluster-doctor harvest-yield
      #    ratchet. All infra-free. The TestEngine_ prefix gates every engine-level
      #    ratchet, so new ones enforce automatically.
      - name: Enforce behavioral ratchets (hard gate)
        run: |
          go test -count=1 -run 'TestEngine_|TestExecuteWorkflow_StartRunCommitFailure_NoSideEffects' ./workflow/engine/... ./workflow/workflow_server/...
          go test -count=1 -run 'TestNoRuleEmitsConfidentFailureOnErroredSnapshot|TestClusterScopedRulesRefuseOnSourceError|TestEvaluateAll_EmptyFindings_SurfacesSourceUnavailable' ./cluster_doctor/cluster_doctor_server/rules/...
          go test -count=1 -run 'TestRBACFallback_FailsClosedForUserMutationOutsideBootstrap|TestPermCacheGrantTTLIsBounded|TestFlushPermCache_SurgicalAndComplete' ./interceptors/...
          go test -count=1 -run 'TestReportNodeStatus_LastSeenUsesServerClockNotNodeClock' ./cluster_controller/cluster_controller_server/...
          go test -count=1 -run 'TestRemediator_UnknownTierFailsSafeNoAutoExecute' ./ai_executor/ai_executor_server/...
          go test -count=1 -run 'TestPromotionDurabilityGate' ./ai_memory/ai_memory_server/...

      # 3. Awareness YAML structural check. The `globular awareness` CLI
      #    was removed when AWG became a standalone sidecar (1c8a4888);
      #    validation now lives in the awareness-graph repo as
      #    `awg validate`, so this gate requires the AG checkout.
      #    Catches dangling related refs, missing source files, dup IDs.
      #    (The old validate-deps step is gone with golang/awareness/.)
      - name: Enforce awareness YAML validity (awg validate, hard gate)
        if: steps.checkout_awareness_graph.outcome == 'success'
        working-directory: ${{ github.workspace }}/awareness-graph
        run: go run ./cmd/awg validate -repo-root ${{ github.workspace }}/services

      # 4. Full awareness audit — HARD GATE (embeddata freshness via the canonical
      #    deduped generation, YAML validity, N-Triples validity, coverage gaps,
      #    stale file refs, test coverage). Exits 1 on any FAIL; WARNs don't block.
      # RE-ARMED 2026-06-22: the embeddata-freshness check was held advisory while
      # the awareness-graph seed generator was non-deterministic (per-run /tmp
      # authoredIn in both the shell build and cmd_rebuild.go). Both leaks are fixed
      # on awareness-graph master (mirror repo-relative subpath + strip the temp
      # root), the seed is byte-stable, and ownership-model B tolerates cross-repo
      # (services-generated) lag while gating awareness-graph-owned triples. Verified
      # `awg audit -check` → embeddata-freshness PASS, 0 fail. continue-on-error
      # removed so freshness is now authoritative — a stale/non-deterministic seed
      # fails the build.
      - name: Awareness audit (awg audit -check, hard gate)
        if: steps.checkout_awareness_graph.outcome == 'success'
        working-directory: ${{ github.workspace }}/awareness-graph
        run: go run ./cmd/awg audit -check -services-repo ${{ github.workspace }}/services -ag-repo .

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Check proto files compile
        run: |
          cd services/golang
          bash build/gen-version.sh 0.0.0-ci
          go build ./...

  lint:
    runs-on: ubuntu-latest
    # Advisory while the ratchet proves itself. The job drowned in legacy
    # errcheck debt for months (red on every run = zero signal). It now
    # lints ONLY issues introduced by the push (--new-from-rev), so green
    # is achievable and red means THIS change added a violation. Flip this
    # to blocking (delete continue-on-error) after a week of green runs;
    # the legacy debt is tracked separately and burns down on touch.
    continue-on-error: true
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services
          # Full history: --new-from-rev needs the parent commit to diff
          # against; the default shallow clone has no HEAD~1.
          fetch-depth: 0

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Generate version stub
        run: |
          cd services/golang
          bash build/gen-version.sh 0.0.0-ci

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin to an explicit golangci-lint version known to support
          # Go 1.25. The previous `latest` was resolving to v1.64.8
          # (built with go1.24) which failed: "the Go language version
          # (go1.24) used to build golangci-lint is lower than the
          # targeted Go version (1.25.0)". v2.12.2 is the latest stable
          # at time of bump and supports Go 1.25.
          version: v2.12.2
          working-directory: services/golang
          # Ratchet mode: report only issues introduced since the parent
          # commit. Legacy errcheck debt (hundreds of findings across old
          # services) stays out of the signal; new violations surface.
          args: --timeout=10m --new-from-rev=HEAD~1
