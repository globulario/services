name: ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GOWORK: "off"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/golang

    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Checkout packages
        uses: actions/checkout@v4
        with:
          repository: globulario/packages
          path: packages

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Download dependencies
        run: go mod download

      - name: Generate version stub
        run: bash build/gen-version.sh 0.0.0-ci

      - name: Build
        run: go build ./...

      - name: Invariant Tests
        run: go test ./repository/repository_server/... -run "TestINV|TestReservation|TestMigrate" -v -count=1 -race

      - name: Unit Tests
        run: go test ./... -race -short -coverprofile=coverage.out
        continue-on-error: true  # Some tests need infrastructure (etcd, ScyllaDB) not available in CI

      - name: Build awareness CI tools
        run: go build -o bin/globular ./globularcli

      - name: Validate awareness contracts against code (depends_on drift)
        # Walks every packages/metadata/<svc>/awareness.yaml, parses depends_on,
        # and confirms each claimed dependency has evidence in golang/<svc>/.
        # Catches the failure mode where awareness.yaml says "depends on
        # ScyllaDB" but the code actually uses Badger / Mongo / etcd / etc.
        #
        # Currently warn-only (continue-on-error) because 6 known contracts
        # drift today. Flip to hard-fail once those are fixed — the validator
        # already exits non-zero when drift exists, so removing the
        # continue-on-error line is the only change.
        continue-on-error: true
        run: |
          go build -o bin/validate-deps ./awareness/cmd/validate-deps
          ./bin/validate-deps --services .. --packages ../../packages
        working-directory: services/golang

      # ──────────────────────────────────────────────────────────────────
      # Awareness CI evidence chain — DEFERRED.
      #
      # The four steps that used to live here:
      #   - "Run awareness tests and generate CI evidence"
      #   - "Check awareness strict_verified (no regression)"
      #   - "Intent audit (architecture regression check)"
      #   - "Awareness semantic-diff authority gate"
      # all depend on CLI subcommands that are not implemented in
      # `golang/globularcli` today:
      #   - awareness test-results
      #   - awareness ci-check
      #   - awareness intent-audit
      #   - awareness semantic-diff git
      # AND on a Go package `golang/awareness/` (used by both the test
      # target `go test ./awareness/...` and the dependency validator
      # `./awareness/cmd/validate-deps`) that does not exist in master.
      #
      # Building all four subcommands plus the supporting Go package is
      # a substantial new ticket — Option A in the original triage was
      # rejected as too large. This block replaces them with a single
      # explicit deferred-notice step so the workflow runs green while
      # the missing infrastructure is documented.
      #
      # To restore: implement the subcommands + the awareness Go
      # package, then re-add the original four steps (preserved in
      # commit history; see services/master @ 5d303515 and earlier).
      #
      # Lint version backlog ticket and the 205 v1→v2 findings are
      # tracked separately; not addressed here.
      # ──────────────────────────────────────────────────────────────────
      - name: Awareness CI evidence (deferred)
        run: |
          echo "::notice::Awareness CI evidence chain deferred — globular awareness {test-results, ci-check, intent-audit, semantic-diff} subcommands and the golang/awareness package are not implemented. See backlog ticket: 'restore awareness CI evidence chain'."

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Check proto files compile
        run: |
          cd services/golang
          bash build/gen-version.sh 0.0.0-ci
          go build ./...

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true   # lint failures are advisory — never block CI
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Generate version stub
        run: |
          cd services/golang
          bash build/gen-version.sh 0.0.0-ci

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin to an explicit golangci-lint version known to support
          # Go 1.25. The previous `latest` was resolving to v1.64.8
          # (built with go1.24) which failed: "the Go language version
          # (go1.24) used to build golangci-lint is lower than the
          # targeted Go version (1.25.0)". v2.12.2 is the latest stable
          # at time of bump and supports Go 1.25.
          version: v2.12.2
          working-directory: services/golang
          args: --timeout=10m
