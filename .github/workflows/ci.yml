name: ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GOWORK: "off"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/golang

    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Checkout packages
        uses: actions/checkout@v4
        with:
          repository: globulario/packages
          path: packages

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Download dependencies
        run: go mod download

      - name: Generate version stub
        run: bash build/gen-version.sh 0.0.0-ci

      - name: Build
        run: go build ./...

      - name: Invariant Tests
        run: go test ./repository/repository_server/... -run "TestINV|TestReservation|TestMigrate" -v -count=1 -race

      - name: Unit Tests
        run: go test ./... -race -short -coverprofile=coverage.out
        continue-on-error: true  # Some tests need infrastructure (etcd, ScyllaDB) not available in CI

      - name: Build awareness CI tools
        run: go build -o bin/globular ./globularcli

      - name: Validate awareness contracts against code (depends_on drift)
        # Walks every packages/metadata/<svc>/awareness.yaml, parses depends_on,
        # and confirms each claimed dependency has evidence in golang/<svc>/.
        # Catches the failure mode where awareness.yaml says "depends on
        # ScyllaDB" but the code actually uses Badger / Mongo / etcd / etc.
        #
        # Currently warn-only (continue-on-error) because 6 known contracts
        # drift today. Flip to hard-fail once those are fixed — the validator
        # already exits non-zero when drift exists, so removing the
        # continue-on-error line is the only change.
        continue-on-error: true
        run: |
          go build -o bin/validate-deps ./awareness/cmd/validate-deps
          ./bin/validate-deps --services .. --packages ../../packages
        working-directory: services/golang

      - name: Run awareness tests and generate CI evidence
        run: |
          mkdir -p ../.awareness
          go test -json ./awareness/... -timeout 120s -short \
            | ./bin/globular awareness test-results \
                --command "go test -json ./awareness/... -short" \
                --output ../.awareness/test-results.json
          jq -e '.passed == true' ../.awareness/test-results.json \
            || { echo "::error::Awareness test suite failed — see .awareness/test-results.json"; exit 1; }

      - name: Check awareness strict_verified (no regression)
        run: |
          ./bin/globular awareness ci-check \
            --playbooks ../docs/awareness/knowledge/agent_playbooks.yaml \
            --test-results ../.awareness/test-results.json \
            --repo-root .. \
            --json | tee ../.awareness/ci-check-report.json
          STRICT=$(jq '.strict_verified_count' ../.awareness/ci-check-report.json)
          NOT_FOUND=$(jq '.tests_not_found_count' ../.awareness/ci-check-report.json)
          INVALID=$(jq '.invalid_metadata_count' ../.awareness/ci-check-report.json)
          echo "strict_verified: $STRICT"
          if [ "$NOT_FOUND" -gt 0 ] || [ "$INVALID" -gt 0 ]; then
            echo "::error::$((NOT_FOUND + INVALID)) implemented gap(s) have missing or invalid test evidence"
            jq '.gaps[] | select(.verification_status == "tests_not_found" or .verification_status == "invalid_metadata")' \
              ../.awareness/ci-check-report.json
            exit 1
          fi

      - name: Build awareness graph and verify freshness
        run: |
          # Build the graph from source YAML truth files.
          ./bin/globular awareness build \
            --repo .. \
            --db ../.globular/awareness/graph.db
          # Session-start check: graph freshness, runtime, CI, proposals.
          ./bin/globular awareness session-start \
            --repo .. \
            --db ../.globular/awareness/graph.db \
            --output json | tee ../.awareness/session-start.json
          # Fail if graph is stale after a fresh build (indicates build error).
          STALE=$(jq '.graph.stale' ../.awareness/session-start.json)
          if [ "$STALE" = "true" ]; then
            echo "::error::Graph is stale immediately after build — awareness build step may have failed"
            exit 1
          fi
          echo "::notice::Graph freshness check passed"

      - name: Graph integrity check
        run: |
          ./bin/globular awareness graph-integrity \
            --docs-dir ../docs/awareness \
            --repo-root .. \
            --json | tee ../.awareness/graph-integrity-report.json
          STATUS=$(jq -r '.status' ../.awareness/graph-integrity-report.json)
          EXIT_CODE=$(jq '.exit_code' ../.awareness/graph-integrity-report.json)
          echo "graph integrity status: $STATUS (exit_code=$EXIT_CODE)"
          if [ "$EXIT_CODE" -ge 2 ]; then
            echo "::error::Graph integrity check failed — critical violations detected"
            jq '.invalid_shapes[] | select(.severity == "critical")' ../.awareness/graph-integrity-report.json
            jq '.missing_tests[]' ../.awareness/graph-integrity-report.json
            exit 1
          fi
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "::warning::Graph integrity warnings detected"
            jq '.invalid_shapes[]' ../.awareness/graph-integrity-report.json
          fi

      - name: Upload awareness test evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: awareness-test-results
          path: |
            .awareness/test-results.json
            .awareness/ci-check-report.json
            .awareness/graph-integrity-report.json
            .awareness/session-start.json

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Check proto files compile
        run: |
          cd services/golang
          bash build/gen-version.sh 0.0.0-ci
          go build ./...

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true   # lint failures are advisory — never block CI
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Generate version stub
        run: |
          cd services/golang
          bash build/gen-version.sh 0.0.0-ci

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/golang
          args: --timeout=5m
