name: ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GOWORK: "off"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/golang

    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/golang/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -short -coverprofile=coverage.out

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/golang
          args: --timeout=5m

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout services
        uses: actions/checkout@v4
        with:
          path: services

      - name: Checkout utility
        uses: actions/checkout@v4
        with:
          repository: globulario/utility
          path: utility

      - name: Checkout globular-installer
        uses: actions/checkout@v4
        with:
          repository: globulario/globular-installer
          path: globular-installer

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Check proto files compile
        run: |
          cd services/golang
          go build ./...
