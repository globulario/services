name: globular-services
kind: platform

runtime:
  enabled: true
  adapter: globular

languages:
  go: true
  proto: true
  typescript: true
  yaml: true
  markdown: true

source_roots:
  - golang

awareness:
  root: docs/awareness
  invariants:
    - docs/awareness/invariants.yaml
    - docs/awareness/convergence_rules.yaml
    - docs/awareness/awareness_self_invariants.yaml
  failure_modes:
    - docs/awareness/failure_modes.yaml
  forbidden_fixes:
    - docs/awareness/forbidden_fixes.yaml
  incident_patterns:
    - docs/awareness/incidents
  design_patterns:
    - docs/awareness/design_patterns.yaml
  services:
    - docs/awareness/services.yaml
  decisions:
    - docs/awareness/decisions.yaml
  forbidden_assumptions:
    - docs/awareness/forbidden_assumptions.yaml
  required_tests:
    - docs/awareness/required_tests.yaml
  subsystem_boundaries:
    - docs/awareness/subsystem_boundaries.yaml
  authority_rules:
    - docs/awareness/authority_rules.yaml
  preflight_questions:
    - docs/awareness/preflight_questions.yaml
  remediation_contracts:
    - docs/awareness/remediation_contracts.yaml
