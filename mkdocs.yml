    - Observability: operators/observability.md
    - Backup and Restore: operators/backup-and-restore.md
    - High Availability: operators/high-availability.md
    - Failure Scenarios: operators/failure-scenarios.md
    - Cluster Doctor: operators/cluster-doctor.md
    - Network and Routing: operators/network-and-routing.md
    - Certificate Lifecycle: operators/certificate-lifecycle.md
