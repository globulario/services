site_name: Globular Documentation
site_url: https://globular.io/docs/
site_description: Documentation for the Globular microservices platform
repo_url: https://github.com/globulario/services
repo_name: globulario/services

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

docs_dir: docs

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - The Globular Talk: talk/index.md

  - Concepts:
    - Why Globular: concepts/why-globular.md

  - Operators:
